  - {type: variant, offset: 530, length: 0, content: '', WYG: 乾隆四十九年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀}
  - {type: page-break, offset: 530, content: '', id: KR4d0465_WYG_000-4a, image: WYG1201/WYG1201-0403a.png}
  - {type: variant, offset: 533, length: 0, content: '', WYG: 原序皇元宅天下百許年倡明古文纔姚公牧菴一人而已盖常人之文多剽陳襲故弗克振㧞惟牧菴公才驅氣駕縱横開閣紀律惟意其大畧如古勁將率市人戰彼雖數不我習一號令之則鼓行六合所向風從無敵不北雖路絶海嶽亦莫不迎鋭而開猶度平衍視彼選兵而陣擇地而途纔一再敵輙衰然且老者相萬矣走年二十四見公于京師時公直學士院每有所述于燕酣後岸然瞑坐詞致砰隠書者或不能供章成則雄剛古邃讀者或不能句尤能約要于繁出竒于腐江海駛而蛟龍拏風霆薄而元氣溢森乎其芒寒熇乎其輝煜一時名勝靡不鰓鰓焉盡閟所有伏避其路而将相鼎族輦金篚幣託銘先世勲徳者路謁門趨如水赴壑厥問之崇學者仰之山斗矣每往來江湖間贐餞燕勞月無虚朝二千石趨翼下風吟嘯自若巷陌之者謂君神仙人嘗謂唐三百年其文為世所珍者李邕韓愈二人或所蔇若市或酬金牣門最其凡論之公盖兼有至其外榮達喜施與宏逸髙朗中表惟一年愈艾而氣莭愈隆顧有前人所未備者然則公之竒侅瑰異者獨文乎哉公没之十一年當泰定改元江西省臣求所述于文凡如干篇将板行世郎中蔣煥華甫走書濟南以文序請竊惟韓昌黎文李漢氏序歐陽公文蘇軾氏序公與二子代雖不同要皆間氣所鍾斯文宗匠振古之人豪也走何人敢于焉置喙辭不獲因紀平昔所嘗得諸心}
  - {type: page-break, offset: 533, content: '', id: KR4d0465_WYG_000-4b, image: WYG1201/WYG1201-0403b.png}
  - {type: page-break, offset: 533, content: '', id: KR4d0465_WYG_000-5a, image: WYG1201/WYG1201-0403c.png}
  - {type: variant, offset: 534, length: 0, content: '', WYG: 者姑副所懇公諱燧字端甫仕至翰林學士承㫖榮禄大夫集賢大學士太子賔客牧庵其自號云濟南張養浩撰文章有一代之宗工其出也秉山川之靈闗天地之運所謂百年㡬見者也漢四百年惟司馬遷父子揚雄班固四人兩晉魏隋之間則無聞矣唐三百年惟韓愈栁宗元二人宋三百年惟歐陽修蘇軾二人當是時非無作者雜出其間與三四君子相與度長而絜大並駕而齊驅焉然皆掇拾剽竊不能成一家之言負當代宗工之任此山川之氣天地之運誠有時而或息即我朝國初最號多賢而文章衆稱一代之宗工者惟牧庵姚公一人耳公營州栁城人營州之族好馳馬試劍遊畋為樂公獨嗜學績文早負竒氣非所謂秉山川之靈闗天地之運者乎至大戊申公為翰林承㫖予忝末屬始拜公于翰林是年冬詔修成宗皇帝實}
