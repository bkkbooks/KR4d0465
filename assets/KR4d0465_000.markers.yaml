  - {type: variant, offset: 69, length: 1037, content: 二人宋三百年惟歐陽修蘇軾二人當是時非無作者雜岀其間與三四君子相與度長而挈大並駕而齊驅焉然皆掇拾剽竊不能成一家之言負當代宗工之任此山川之氣天地之運誠有時而或息卽我朝國初最號多賢而文章衆稱一代之宗工者惟牧庵姚公一人耳公營州柳城人營州之族好馳馬試劍遊畋爲樂公獨嗜學積文早負奇氣非所謂秉山川之靈關天地之運者乎至大戊申公爲翰林承旨予忝末屬始拜公于翰林是年終詔修成宗皇帝實錄日侍公筆硯間遂得手鈔公文數十篇玩誦日夜不置其後實錄成進方將求公全帙編次而公謁告南來矣曩得寜國所刊木讀之旣非全帙譌舛尤多每爲悵然也至順壬申公之門人翰林待制劉公時中始以公之全集自中書移命江浙以郡縣贍學餘錢命工鋟木大惠後學予時承乏提舉江浙儒學因獲董領其事私竊欣幸乃與錢塘學者葉景修重加校讎分門别類得古賦三篇詩二百二十二篇序三十八篇記五十三篇碑銘墓誌一百四十篇制誥五十八篇傳二篇贊十五篇說十一篇祝冊十篇雜著十三篇樂府百二十四篇總六百八十九篇年譜猶可見其各體文之原數案牧庵集今無全本卽此序及凡五十卷竊惟公之文雄深雅贍世罕有知焉譬之太羹玄酒食而無味然足以饗天嗚呼草玄者之有望于後世之子雲也宜哉至順昭陽作噩之歲季春之閏儒林郎江淅等處儒學提舉鄱陽吳善序原序皇元宅天下百許年倡明古文纔牧庵姚公一人而巳蓋常人之文多剽陳襲故窘趣弗克振拔惟公才驅氣駕縱横開闔紀律惟意其大畧如古勁將率市人戰彼雖素不我習一號令之則鼓行六合所向風從無敵不北雖路絶海獄亦莫不迎銳而開猶度平衍視彼選兵而陣擇地而途纔一再敵輒衰焉且老者相萬矣走年二十四見公于京師時公直學士院每有所述于醼酣後岸然瞑坐詞致砰隱書者或不能供章成則雄剛古邃讀者或不能句尤能約要于繁出奇于腐江海駛而蛟龍拏風霆薄而元氣溢森乎其芒寒皜乎其輝煜一時名勝靡不鰓鰓焉自閟所有伏避其路而將相鼎族輦金篚幣託銘先世勳德者路謁門趨如水赴壑厥問之崇學者仰之山斗矣每往來江湖間贐餞宴勞月無虛朝二千石趨翼下風吟嘯自若巷陌觀者謂君神仙人嘗謂唐三百年其文爲世所珍者李邕韓愈二人或所蔇若巿或酬金牣門最其凡論之公蓋兼有至其外榮達喜施與宏逸高朗中表惟一年愈艾而氣節愈隆顧有前人前未備者然則公之奇侅瑰異者獨文平哉公沒之十一年當泰定攺元江西省臣求所述于家凡如千篇將板行世郞中賈煥華甫走書濟南以文序請竊惟韓昌黎文李漢氏序歐陽公文蘇軾氏序公與二子代雖不同要皆間氣所鍾斯文宗匠振古之人豪也走何人敢於焉置喙辭不獲因紀平昔所嘗得諸心目者姑副所懇公諱燧字端甫仕至翰林學士承旨榮祿大夫集賢大學士太子賔客牧庵其自號云濟南張養洁撰牧庵集武英殿聚珍版, WYG: ''}
