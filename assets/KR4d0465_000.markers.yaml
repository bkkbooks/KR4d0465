  - {type: variant, offset: 535, length: 4, content: 卷一祝册, WYG: 日侍公筆硯間遂得手鈔公文數十篇玩誦日夜不置其後實録成進方将求公全帙編次而公謁告南來矣曩得寕國所刋本校之既非全校帙譌舛尤多每為悵然也至順壬申之門人翰林待衛劉公時中始以公全集自中書移命江浙以郡縣贍學餘錢命公駸木大恵後學予時承乏提學江浙儒學因獲董領其事私竊欣幸乃與錢塘學者業景修従加校讐分門别類得古賦}
