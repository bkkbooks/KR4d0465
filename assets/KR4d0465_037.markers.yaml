  - {type: variant, offset: 10, length: 0, content: '', WYG: 齋先生遊最故且乆于同門之士學為最怠而不加進自親夏楚時猶爾况今載名仕版逺處數千里之外哉昔之怠者為忘不加進者阤而為退矣宜季正之取友而差際余之心安焉而不敢有憾不謂徒以從遊之乆故愿因鄙言獲進拜先生屨前嗚呼其志則勤其意則良惜所藉以為介福其一人也是一也义先生自謝致而歸屏跡桑梓養安泉石家事不以干于心鄉人莫得見其面于時欲求如祭酒之授徒來則受之亦難也余則止之無行雖然以先生平昔樂教之心且熟子之兄伯静之名嘗哀其愿見未得竟抑志以卒有弟如此篤學而善學行已以化鄉岸然不流于今俗翹然自是以古人千里羸糧而就正焉又觀夫人有可進成徳逹才之具必不拒其見也余則勸之令行且景星鳳凰之為物人或睹之猶為生之幸况大人君子徳道之容可以興起一世仁義之言足以發揮百王者哉或一進拜而聞其緒論必决滯為通易暗為明大有得於曩昔也有得而私之仁人之用心不然行哉余將湏其歸而見告也送暢純甫序歐陽子為宋一代文人一時所交海内豪俊之士計不千百而止及謝希深尹師魯二人者死序集古録遂以無謝尹知者之恨嗚呼豈文昌也作者難而知之者尤難歟余嘗思古之人惟其言之可以後行為恃以待他日子雲者出將不病夫舉一世之人不余知也今乃若是其亦有知者為快而失之為悲歟余冠首時未嘗學文視輩流所作惟見其不如古人者雖不敢輕非諸口而亦未嘗輕是于心也過而自思人之能者余操慮持論且然余不能之何以免人無嫉賢之機余年二十四始取韓文讀之走筆式為持以示人譬如童子之問草彼能是予亦能是彼有是余亦有是特為士林禦海之一技焉耳或謂有作者風私心益不喜以為彼忠厚者不欲遽相斥笑姑為是諛言以愚之不然殆鼓舞之希進其成也自是䝉恥益作既示之人且就正于先師先師亦賞其辭而戒之曰弓矢為物以待盜也得盜得之亦將待人文章固發聞士子之利噐然先有能一世之名將何以應人之見役者非其人而與之之與廢其人而拒之鈞罪也非周身斯世之道也余用是廢作有亦不以示人絶甫自言得余雙字不言不録而棄之又言世無知公者豈惟知之讀而能句句而得其意者猶少嗚呼世固有厭空桑之瑟而思聞鼓缶者乎然文章以道輕重道以文章輕重世復有班孟堅者出表古今人物九品之中必以一等置歐陽子則為去聖賢也有級而不逺其文雖無謝尹之知不害于後後猶以失之為悲下下之外豈别有等置余為哉則為去聖賢也無級而絶逺其文如風花之逐水霜葉之委土朝夕腐耳豈有一言之㡬乎古可聞之將來乎純甫獨信之自余不可不謂之知己足為百年之快恐純甫由此而取四海不知言之非也然純甫實善文其不輕以出者將以今為未積積而至于他日以騷雅末流典謨一致乎將恃夫位民既而循吏持憲既為才御史富民又將為良大農道行一時無暇于為言乎豈以世莫巳知有之而退藏于宻也由積而為書他日與道行一時無暇于為言則可由莫巳知而不出若余也雖不善文而善知文則純甫為失人矣今以農副行田隴右于其别也叙以問之至元丁亥七夕送郭肅政安道序書有道有體有勢謂為太耶周官則班之六藝謂細耶次之禮樂難耶舉天下之人孰不為之易耶則纊一代能名世者不數人若是者亦未可以細視易言之也斯其道也其體則有篆𨽻草三等本而上之草出𨽻𨽻出篆則篆者書之源或曰𨽻而下有正走則曰唐湖刺楊漢公跋千禄字書以顔魯公𨽻書為盡鍾繇之精能則正者實𨽻也其勢則有拘有束以言篆譬則弁冕端人將執事于郊廟于于其趨縮縮其循周旋則至圓不能如規折旋則至方不能過矩𨽻則常服燕居不可多拘家人視以為嚴君而亦可少放草則雄勇武夫夫纓曼胡而衣短後挺茅運鈹進勇退躍蹤横入出頓挫起卸揮霍研拂極其放而惟吾意之所至焉然為是者雖云出乎手而一心為之師心拘亦拘心放亦放未有心放而能篆亦未有心拘而能草勢必至理必然者也走嘗觀今為篆者無牧舉其誰求一蹴而可臻古人之閫戺者則郭肅政安道一人焉耳夫日為是拘藝則心存而不放豈不幾于克念作聖者耶視走之惟事乎草心放而不知拘者相逺萬也安道號西埜好學而善文無乎是則書不能獨振耀今之世矣将别而紏郡于岳序以問之送李茂卿序太凡今仕惟三塗一由宿衛一由儒一由吏由宿衛者言出中禁中書奉行制敕而巳十一之由儒者則校官及品者提舉教授出中書未及者則正録而下出行省宣慰十分一之半由吏者省臺院中外庻司郡縣十九有半焉吏部病其自九品而上宜得者䋲絶來無窮而吾應者貟有盡故為格以扼之必歴月九千始許入官猶以為未也再下令後是增多至百有二十月嗚呼積十年矣勞乎哉李君茂卿嘗同燧受學先師司徒公儒者也父户部恩澤既推其兄之子及將試吏堂帖令出掾湖廣省盈九十月將赴銓中書燧賀之曰人有不職幸不紏於御史者君以勤效無此人有饕墨幸不罹罪罟者君以清慎無此人有依庇有力竊離所事同列之懽以自求容一時幸不譴斥者君以中行不阿無此人有挾任而商賊之州縣而倍責嬴入以肥其家幸不私于民與衆樹姻黨子弟入官以防後至之塗幸不貶于士者君禄入外無他營捨僕馬則顧影無朋舉無此舉無為為賀其可賀者諺曰兩姑之間難為婦上政事堂下㕘幕多或二千人其事之來抱素求署無一可後者皆視其色聴其言動止移畧比不齟齬使馴馴如式從已而出譬則庖人善適衆口酸鹹者好之不齊然非暫也必八年之乆大而經}
