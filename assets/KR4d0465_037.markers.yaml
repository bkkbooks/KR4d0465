  - {type: variant, offset: 8, length: 0, content: '', WYG: 者未必人力能致然也馮氏由中義擢金天眷已未第中順通議右部以及今奉議凡五世儒仕鬱為清風素望之家者百四十有八年亦庶幾古之世徳人哉子休復進學方力諸孫蓁蓁紅蕖碧蕙穎發庭下又如是來者之未艾也求今喬木故家可申乙者輪指不滿四三嗚呼亦有非天之為者中順以中議卒官同知山東轉運時年五十有九故甫年六十以同知横海節度致仕通議以同知集慶節度亦六十致仕率不滿年格而止不盡享有之留為裕後之謀若良農之休其地力而不竭其出也然三世皆止同知亦理之不偶然事之可異者中議之文逸不可蒐輯中順白雲集通義松庵集右部常山集奉議皆板之行世矣目曰馮氏三世遺文俾燧為序曰夫人之言為聲聲原於氣中順之氣勁故其辭簡潔而峻清右部之氣和故其辭温厚而優柔通議之氣粹以正其學綜博而趨約故其言之見于誕布除拜吟情託物誅姦彰善者剗戞陳言一以經史為師淡麗而不諛奥雅而雄深多體而不窮視金諸作􅆟為髙古信一代文章之宗也嘗致仕居嵩山之松庵以故人多不敢官公第曰松庵猶魯人於石守道曰徂徠然奉議名岵僉河南北憲事紫陽先生文集序紫陽先生長先世}
