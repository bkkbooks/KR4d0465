  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書集部五}
  - {type: page-break, offset: 0, content: '', id: KR4d0465_WYG_000-1a, image: WYG1201/WYG1201-0401a.png}
  - {type: variant, offset: 3, length: 2, content: 附錄, WYG: 别集類四元提要臣等謹案牧庵集三十六卷元姚燧撰燧字端甫號牧庵河南人姚樞從子也案元史稱樞為柳城人元無柳城當是據誌狀之文著其祖貫耳初以薦為秦王府文學後歴官至翰林學士承㫖集賢大學士謚曰文事蹟具元史本傳燧雖受學於許衡而文章則過衡逺甚張養浩作是集序稱其才驅氣駕縱横開闔紀律惟意如古勁將率市人戰鼓行六合無敵不北柳貫作燧謚議稱其典冊之雅奥詔令之深醇抉其浮靡一返古轍而銘誌箴頌雄偉光潔家傳人誦莫得而掩雖不免同時推奬之詞然宋濂撰元史稱其文閎肆該洽豪而不宕剛而不厲舂容盛大有西漢風宋末弊習為之一變國初黄宗羲選明文案其序亦云唐之韓柳宋之歐曽金之元好問元之虞集姚燧其文皆非有明一代作者所能及則皆異代論定其語如出一轍燧之文品亦可概見矣其集久佚不傳明文淵閣書目有牧庵集二十冊而諸家著録皆未之及劉昌輯中州文表所選燧詩較元文類僅多數首文則無出文類之外者昌跋稱牧庵集五十首聞松江士人家有刻本南北奔走竟莫能致今所得乃録本多殘缺視刻本僅十之二黄宗羲序天一閣書目云嘗聞胡震亨家有牧庵集後求之不得葢已久佚惟永樂大典所收頗夥校以劉致}
