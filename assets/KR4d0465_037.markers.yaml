  - {type: variant, offset: 3, length: 0, content: '', WYG: 牧庵集今無全本即此序及年譜猶可見其各體文之原數凡五十卷竊惟公之文雄深雅健世罕有知焉譬如太羮𤣥酒食而無味然足以享天嗚呼草𤣥者之有望于後世之子雲也宜哉至順昭陽作噩之嵗季春之閠儒林郎江浙等處儒學提舉鄱陽呉善序欽定四庫全書牧庵集卷一元姚燧撰祝冊加謚祖宗告祀南郊冊文維至大二年蒼龍己酉冬十月庚戌朔十有九日戊辰嗣皇帝臣某臣頼上天之佑祖宗之靈得以𦕈末之躬託于億兆京垓臣民之上持盈守威凡今三年身至太廟兩嘗祼将非獨于親立愛臣家庻亦孝治可先天下而祠官讀祝于太祖室惟曰聖武皇帝處宗室亦惟曰景㐮皇帝至世祖室則曰聖徳神功文武皇帝名譽之羙垂無已者多及六言顧于創業之主垂統之宗開我後人承承繼繼億萬維年者稱述成功盛徳有所未盡心實欿然謹遣太尉尚書右丞相臣某禋致牲玉燔柴泰壇昭告昊天上帝加諡曰太曰法天唘運聖武皇帝睿宗曰仁聖景㐮皇帝伏惟圎靈居髙聴卑灼臣微忱勅我祖宗歆此嘉誅臣不勝感激戰栗之至皇帝尊號玉冊文維至大二年正月乙酉朔越七日辛丑皇太子中書令樞宻使臣某謹率中外文武百僚頓首頓首謹言昔我世祖既平炎趙質之于書幅員廣長振古無倫覆燾之下八紘萬國莫敢不庭何獨一王西北岸然憑道阻脩方命正朔徳綏之而不摰威董之而不讋夫豈不能齊罪致罰深入其地終以聖人親其宗廟包荒有年成宗繼序憤乆驁頑天鍳昭明於裕皇孫獨無陛下授以太祖皇帝信寳撫軍漢北是固以張足付神器之本時未及冠承命即行其視萬里明闠寒冽之鄊不逺不難如堂適庭至則奨厲諸軍修明法制簡拔果藝均苦分勞解衣燠寒推食飫飢洸洸汔汔士氣日作睿算伐謀待冦嵗至奪人以先身踐戎行霆馳電擊大北其羣虗已不務日慎一日始終十年不狃屡勝狂狡不懲悉鋭來加當以選鋒伺間出竒盡襲輜重彷徨無歸度不能軍耄倪纍纍降口百萬坐致敉寕平四十年未靖之梗成兩祖宗未䆒之志天下之人聞其風聲思覩天光者顒顒翹翹九圍一心握是乾符歸正宸極弛武事之夙習洽新化以文治立愛自親曽未旬浃上尊太后問安以時下建儲宮庻政是先又舉列聖未遑之典欽崇元祀玉瓚黄流薦祼太室還蹕龍興徘徊太祖龍旂九斿􅗴金于斯肇基帝業為城中都又以孔子垂範百王将二千年而顯諡未稱加大成于至聖文宣王上立勞于軍與凡庭臣悉大賚之間嵗不登既賬既恤虞施未博民罹罪罟再肆大宥至徳難名赫赫巍巍惟天為大掛一漏萬井觀如斯求可盡臣下歸羙報上者惟是徽稱謹玉冊并玉寶上尊號曰統天繼聖欽文英武大章孝皇帝欽惟陛下立天之地立極生民茂對鴻名于億萬年皇太后尊號玉冊文維至大三年嵗次庚戌冬十月甲辰朔越五日戊申嗣皇帝臣某臣伏惟顯考順宗未臨海㝢𦕈𦕈小子託其遺體顧踐丕基惟事臣母養以天下何無不有何欲不臻而隆名盛典辭未見俞非臣所以表微恍酬大徳也欽惟皇太后陛下貞順而齊肅明哲而剛淵居常處變愛威異施臣在先朝受詔漢北往撫諸軍可謂逺役以義割恩縦臾其行迨􅛍河陽永懐彌切親至五䑓禱于佛乗尚憑隂隲早遂振旅閤閣是崇靈貺用昭旋聞國恤并日馳赴邪謀方興授冊儲皇曽不再日掃清宫掖待臣以來俾付神器自非睿㫁安敉内訌往嵗鑾輅再􅛍五䑓净供大修以畢夙願極心為臣天燾地持日居月諸其大其明非言所喻詩之言也母氏劬勞推之眇末咻仁喣慈百倍為艱圖以報塞惟崇顯號者强而名之庶㡬聖徳昭明天下是用類于上帝禋于六宗奉玉冊玉寶上尊號曰儀天興聖慈仁昭懿夀元皇太后欽惟皇太后陛下慶躋莫上之尊福衍無疆之厯菲躬是保慈訓是承詔制行銅錢詔原注至大二年十月錢幣之法其來逺矣三代以降沿革不常世祖皇帝建元之初頒行交鈔以權民用已有鈔幣兼行之意盖錢以權物鈔以權錢子母相資信而有證今鈔法一新期於公私兩利重惟經乆之計必復鼓鑄之規至大三年十月赦朕自嗣守丕基致孝太室奉上玉冊寳加諡太祖為法天唘運聖武皇帝光獻翼聖太后睿宗仁孝景㐮皇帝顯懿莊聖皇后世祖聖徳神功文武皇帝昭睿順聖景后裕宗文恵明孝皇帝徽仁裕聖皇后順宗昭聖衍孝皇帝成宗欽明廣孝皇帝貞慈静懿皇后于斯之時宜䧄徳音誕告天下猶恐數赦或賊良民今因西北叛王不受正朔五十餘年其子徹伯爾盖愆前人盡有部衆歸命闕庭及庫庫齊謀為非覬未忍置理刑以輕典與夫崇建大刹上為列聖報徳𠖇𠖇下為生民祈福昭昭者亦既成功皆我聖母之徳之致已于此月五日奉玉冊玉寶上尊號曰儀天興聖慈仁昭懿夀元皇太后屬大慶禮成宜敷渙號以新民聴於戯非在有司一乃心力以輔余治期底隆平即位詔原注至大四年三月惟昔先帝事皇太后撫朕眇躬孝友天至由朕同託順考遺體重以母弟之嫡加有削年内難之功于其踐阼曽未逾月授以皇太子寶領中書令樞宻使百揆機務聴所搃裁于今五年先帝奄棄天下勲戚元老咸謂大寳之䋲既有成命非與前聖賓天而始徴求宗親議所宜立者比當稽周漢晉唐故事即正宸極朕以國恤方新誠有未忍是用經時今則上奉皇太后勉進之命下狥諸王勸戴之勤三月十八日于大都大明殿即皇帝位凡尚書省誤國之臣先已服誅同惡之徒亦已放殛百司庶政息歸中書令丞相特們徳爾平章政事諤勒哲李道後等從新殛治其可為今法程拯民急者具如左方於戯凡爾有官君子皆古所謂治天澤食天禄者宜一心力欽乃攸司無替朕命左丞許衡贈官制天非繼聖學之墜緒則不生命世之大才國欲與王道以比隆肆用為烝民之先覺何物故之已久尚人思之未忘故資善大夫中書左丞集賢大學士兼國子祭酒領太史院事許衡玉裕而金相凖平而䋲直出處則惟義所在言動亦以禮自持休休焉有容属属乎其敬人能𢎞道惟朝聞夕死之是期我欲至仁匪晝誦夜思之不得行已似秋霜烈日化人如時雨和風來席下之摳衣滿户外者列屨達簡在帝心者率多丞弼窮固守師説者不失善良鶴鳴九臯而聲聞于天鳯翔千仭必徳輝乃下爰立相以堯君舜民之志所告上皆伊訓説命之言丹扆斤姦少不避電霆之軋擊青䑓治厯本于䇲日月而送迎由理窮而智益明隨任使而職斯舉今既亡矣誰其嗣之於戯在爾身在垂没世之名于朕心有失同時之恨雖成廟納書以命諡固已振木鐸之髙風而功臣胙土則未加用申錫宻章于下地光靈如在功之其承可贈正學垂宗佐運寵臣太傅開府儀同三司追封魏國公諡仍文正中書右丞相塔喇台追封淇陽王制出入帷幄在人十能而已則千訏謀廟堂為相一年而疾居半竟邦家之殄瘁宜王禮以追崇具官某維昔開國之遺苖乃今太師之元嗣由爾世胄為我親臣事世祖至今也凡三朝職中書而乆者非一日灼其亷明而忠亮與大㳟遜而温文眷兹中書出庶政之原居以右相絶百僚之席使加中政機搃六軍善調䕶而長宮師監纂修以成國史加此重責皆所裕為一徳可以寛鄙夫片言奚止簡繁務思過榮之可畏視倖利以不貪同綰餘艾者十人爾先辭免其太尉均受錫田以萬畆爾獨還致于司空觀父子之並相一門求聖與尚友千古改衣改作緇衣何頼乎武桓拜後拜前赤舄未慙于周魯方歌功于清廟倐委魄于𤣥閭豈意少者殁而老者存益信理難明而理難測憐乃公獨傷于漢北誓爾後均胙乎淇陽於􅃧何但上下床盡餘子可束之髙閣如失左右手慨正人不止于下泉咨爾靈明歆朕休命可特贈封諡為懐正昭徳佐治功臣開府儀同三司太師上柱國淇陽恵穆王索隆噶台贈營國威翼公制朕聞康王之入端門其從呂伋文帝之來代邸亦拜宋昌固知非心膂之臣不以付爪牙之任具官某任足以致逺㫁可為克剛以世祖見萬里之明于親臣極一時之選爱其春秋之方盛責以夙夜之惟勤昉試于中俾執十而衛闕旋出之外與受鉞以􅊭淮召移全軍往追叛戚既誓捐軀之許敢辭奔命之勞何以報之所未聞者杯孟璨瑳以陳上賓虞秩秩之初筵鞍勒盤陀以校金人避騤騤之上駟榮生如此哀死可無庸建爾于上公即家為國廣綏予之孝子與親共尊靈而有知歆是殊渥可楊㳟懿贈𢎞農郡文康公制聲相應而氣相求允謂風流之二老生有封而死有贈式昭㤙數于九原其肩隨許魏國者誰歟而目為秦君子則公也故集賢館學士太中大夫兼太史院事楊恭懿抱經濟學恥章句儒守四書為入道之階梯持一敬為立身之根柢其辨析則江河之莫禦其操履則山嶽而不移信蠶有績而蟹有筐化三輔䘮親之自致無鶉生突而牂生奥視萬鍾于我亦何加所師授者皆成徳逹才有朋來者必忠告善道非商山之幣不起而宣室之席始前由道徳禮樂刑政藴之胸故厯象日月星辰指諸掌明朝花謝數之精者堯夫何處堯夫君其問諸李郃是皆非常人所企及宜其為吾道之指歸今也則亡誰其能及於戯天下之事日銷月鑠惟餘不杇之聲名闗西之風山髙水長尚爾克開其苖裔英靈不昧異渥其承可劉秉忠贈趙國文正公制運際風雲不可謂生時之無益名垂宇宙斯克當没世而不忘将求若人展無與匹開府儀同三司太傅上柱國趙國文正公某淵深而智山静其仁方見龍之在田嘗迨天之未雨貫百王之一其道于聖學以開明敷五典之三為綱肇人紀之修叙身本斯立政條用章頒禄于陜之東西屯田于淮之南北從征六詔與越三江賛神武不殺之仁洽民心好生之徳咸嘉謨之入告至大業之佐成是以楓宸之念功俾于蘭省而搃政属王旅簞壺之迎勞随王輿文軌之混同而獨身不及見之亦衆心所甚惜者至元之詔進保為傅大徳之誓以正易真在先朝之恤雖曰已隆自今日而思猶荅末及何功臣之見後復太師之未加豈朕待為于爾其告於戯非登朝霞以棲其魄從往聖陟降于帝庭則抱明月而逰乎方訪裔孫徘徊于神道章追刻蜜㤙重書棺可王思亷之考贈恒山郡正獻公制隂雨膏之由太山出靈于膚寸滄浪清者乃嶓冡導漾之濫觴即物理已然而求見世徳自㣲而著某官某之考炳禀姿温粹涖事敏恭知惟讀其父書示不㤀乎家學方兎在野之並逐猶鴻集澤之未安筮仕其時立勞于國為令雖囿乎百里施治可型之四方収敲朴之威以求得情乎獄拒摧筦之䇿以堙興利之源得古人用其一緩其二之心故取民也有制非若後世之朝三暮四之術其得民也以仁逮夫中統之建元治最十路于宣幕丕享其身者淵停而雲蓄以昌爾後者天施而地生由服勤祖宗之兩朝俾迨秩丞疑于二品於戯推子以及其父不于大郡以疏封知臣宜莫如君曷報舊人之共政可妣贈恒山郡夫人制婦人之爵視夫若子之貴賤而為尊卑夫貴而子卑官始大而終成寥寥無聞夫卑官子致位将相故人生榮死而死之雖勢之必至營魄有知寵數欽若然猶視嫓徳娠賢之何如某官某之妣武氏其天雖未至于顯庸而盡瘁州縣惟恐利澤不加于民而聲名日延可謂嫓徳迨其子壮羙知世祖典瑞于中大官再上食必以見及而不後之随時燠寒嵗賜之服而克翼翼小心未嘗見貶于聖訓者兩朝四紀自宥宻而進丞疑而館閣於月旦評者推傳相為稱首謝事而去晚有宮賓之招亦以老辭凡若此者皆出㫁機之朴可謂娠賢汝武氏兼有之斯具羙矣可㸺珠氏塔塔爾贈蜀國武定公制朕惟他臣之家由其子孫位登将相故褒命其親上及三代皆有國之禮􅀴崇大臣也具官某惟爾家則不然尚論其世雖源逺未分而同出于天潢矧其考博囉岱逹爾罕有功太祖立國之初及爾之身承是勲勞由帶憲宗御器械出秉麾鉞疆理四川西起劔閣而東盡蘷門勁騎一蹂而宋人去平土城郭壁山栅木假息嵗月不敢出犯其鋒非獨為國震耀武威張今混一之本使爾子孫席是以興接武為将纉乃舊服亦為爾家邁徳之祖求他臣家由子孫貴以褒命者語豈同日哉於戱可嘉也已可考贈蔡國武穆公制知臣宜莫如君凡曰有勞而必報推子以求其父父雖未仕而亦封實原始之教忠特飭終而追恤具官之考福寛初由力穡旋致豐貲嘗倒困以周旋率裂劵而免負俾鄊鄰傾心而懐恵善頌其家鍾光嶽全氣以生賢元勲于國禄及養以五鼎年㡬躋于九陵於􅃧世皆流澤于目前潢汙随涸爾獨揚名于身後華衮何加尚其光靈服此茂渥可妣贈牛氏蔡國夫人制四民之中士無恒産工利器用商遷有無而皆資衣食于農斯古有國官人必于力田由善務本故生子勞而向義多為鉅臣具官某之妣牛氏由生令子當今季朝砧夕鼎之時獨完其宗為歸吾元以開勲為顯諸侯而與其大安享禄養以終循是褒章宜及所自可太訓之考贈韓國敬穆公制惟勤夙夜莫踰執御之臣何物暑寒敢曰休安其室属世皇違豫召路寝以入居方憑几之道揚我又綴衣之庭出恨不攀龍髯而俱上悼其附鳳翼之不終從事孫曽如臨父母最知三朝之知遇加于百辟之等威何以報之先徳用章庶其誓者下泉無憾某官某之考秉氣通正為才裕優當僉其國之都議司聞振下民之餓嬴者損布為端之三百與米為斛之一千百銀桷之副諸五金品之亞者初匪干民之譽如家量貸如公量収實以推君之仁示朝信道而工信度種徳若此生賢則宜求臣鄰之顯親至師垣之極爵於戯髙車駟馬雖不覬于生前兖冕桓圭亦足華于生後光之不冺明命用歆可妣賈氏贈韓國夫人之制夫封婦命雖君禮臣之所同子貴母榮以古騐今而由異欲彰孝之潔白可後典其焚黄某官某之妣賈氏賦質柔嘉為心恭懿出宜天北山之李宜爾室家求奉祀南澗之賓奠其宗牖匪直善閨門之主饋又佐割帑廪以振􅏇如聞閫外之􅊚皆曰女中之士篤生哲嗣實為親臣於戯由雛伏以引鳳飛故得飾終于下土信蟹筐而蝉績可以興孝于他門可妻韋氏封韓國夫人制惟爾之家世緒紀逺自漢儒賢及𤣥成父子繼為丞相傳魯論于灰燼之末實開道統之源至唐其族尤盛女為后而男尚主與仙李蟠根終始厯數百年其遺澤餘波及爾身者與衮衣赤芾者匹最為近象于魁三而朱幩藋茀以朝何異去天之尺五出門輝輝行路咨嗟可謂極命婦之榮而未正小君之號不其闕與為降㤙綸可中書左丞相阿都台追封順昌郡王制臣為委質勞于同軌之間君以念功㤙以禭衣之後雖飾終其時有所未及在追恤今日烏可或遺爰寵幽褒用昭異數具宦某力齊嶽負量與川函託開國将種之苞根挺明堂工師之大木受任閫外賈勇籌邊為憲宗入蜀之前鋒因殘百粤非世祖投江以尺箠不返三苖報効之私寤寐不置百其身以奚恤一乃心之是期㑹師貞險順而貞得夬剛决柔之兆考版圖之幅裂秉旄鉞以鼓行将削尊號于偏方必使義聲以先路勢乗破竹名正苞茅有不待風蛇之蟠赤而已飛塵星馹之㨗如震如怒袵金革北方之强于理于疆盡江漢南國之紀羣黎壺漿而崩岑㓜主席藁以泥頭瘁事非伊成功能爾非十年為丞于行省奄一旦違世于先朝白雲杳歸于青山清風空遺于黄閣像未麟䑓之貎服先龍衮之升既進師垣又建王國俾大書于神路過者式焉示絶等于臣隣忠則勸矣尚膺茂渥少慰榮魂可妻扎拉爾氏追贈順昌郡夫人制大帝立極之十五年嘗曰昔我太祖戡定中夏日不暇給由天未厭宋徳帝制偏方命将出師一家天下今惟其時曽不三年墟其廟社雖曰睿算萬舉萬全亦大臣奉辭宣力死職忘身有以致兹厥功茂著用是追崇故光祿大夫江西等處行中書省左丞相阿都台為推忠翼運功臣開府儀同三司太師上柱國順昌郡武敏王其故妻扎拉爾氏在父母家幽閑而禮其移天也淑慎有聞所可䀌傷在不夀考以語嫓徳不及夫丞相建希世之功以語娠賢不得食子大夫糾官邪之禄非賁𤣥壌曷慰貞魂可妻哈塔錦氏封順昌郡王太夫人制漢祖王呉芮于長沙郡史豈及其家為晉武君祜妻以萬嵗鄉夫則未嘗王也求能兼者伊何人斯非為臣利用行師有瓴水建髙屋之功則其婦大封封爵無女蘿施長松之好具官某妻姆于華望嬪我元勲貞順範之閨門恭儉化其行里問安興聖錫宴大明導必中貴人以前坐則外命婦之上寵莫宜于象服光何賴乎魚軒皎日穴同天豈私從其死矢髙風物表人則争仰其生榮與爾貽謀服我休命可張𢎞範贈齊國忠武公制由弓冶而為箕裘世其家之餘子用詩書以驅鋒鏑儒能将者㡬人非資文武之全才安立功名于昌運鎮國上将軍江東建康道宣慰使都元帥贈銀青榮禄大夫平章政事謚武烈公張𢎞範統明而敏學沉毅而善謀為二千石則有譽于魏邦嗣萬夫長克用光于蔡國城濟南夾寨卒圍齊盗以梟夷壁漢隂上游式遏荆蠻之豕突􅎔長江而光濟㧞列郡之後降獨制帥兼守其揚州盡全師反攻吾木栅奮前茅以騎擊居顔行纔十三人麾後騎以鼓乗斬首虜倍九千級震兵威于淮右授使節于江東方遣伻趣三宮之入朝其丞相挟兩王以出國設偽號以干正朔萃亡命而蠢甌閩率趨利之孤軍活坐屠之一郡獲俘不䤋就敵是求遂令衆叛以親離猶且兄終而弟及轉偷生于閩海竟滅跡于崖山萬里言旋九重入覲殷腆之紀緒已絶吴語之勞苦甚温恃為祈父之爪牙而􅃍啟曽参之手足於戯雖爾身不及識而世祖告䇿則具存于朕心不能忘在功臣胙土之未錫故即發身之自爰疏賜履之封尚其明靈服此茂渥可母贈齊國太夫人制身先齊家所以立興仁之本天昌厥後昭其有教子之方憫爾劬勞寵之贈恤贈推忠效節翼運功臣太師開府儀同三司上柱國齊國忠武公張𢎞範之母趙氏肅穆持正舍𢎞有容心静而安惟修善以積慶氣禀者秀能為國以毓賢信有開之必先庸厚報其所自令譽未傳于千古湛㤙下及于九泉於戱後之視此亦猶今典章具在逝者如斯未嘗往神爽如生可妻封齊國夫人制因親教愛孝可移忠揚名顯親報不忘本􅃔倫所繫典則用彰贈推忠效節翼運功臣太師開府儀同三司上柱國齊國忠武公張𢎞範之妻某氏厚積度源恪遵禮範純乎坤道能静守于母儀正于家人可敦勸于風化親見門閭之髙大載加名爵以推崇佩此光榮俾之耆艾於戯寵章所賁推吾永錫之仁慈教是遵尚勵堅貞之節可納古爾封營國顯公制開國居先亦既攀龍而附鳯傳家有託尤在峙鵠而停鸞非天不享而日斯邁故北京路逹嚕噶齊納古爾自夫㓜學以及壮行擅翩翩佳公子之稱植矯矯大丈夫之操嗣為元帥代其耋親虎節相承可謂父菑而子播龍光不爽式昭臣敬而君仁纔纉舊服之數年遽棄慈闈于一旦噫雖功不施于逺而芳其流則多有後而才方将天門之宿衛於中何憾已増泉壌之輝光加有褒章以慰貞魂可妻封營國夫人制仙李蟠根天桃華灼既及閨其名族而作配于元戎内佐堂構其父基外勉勤勞于王事棄詩書于馬上髀肉從消對勲業于鏡中鬢毛未改何為不淑俾稱未亡求斯世之賢者亦為女之士者於戯適從夫而死從子可既令始而令終髙為谷而深為陵名必傳今以傳古可烏頁爾贈營國忠勇公制惟太祖之基命龍遂乗雲有良臣以樹勲魚猶得水展我同姓豈伊異人具官某氣鍾光嶽之純全誠貫金石之堅確智足謀國勇則冠軍佐天運之維新憤人心之未定既降復叛必煩以行既自北而徂南首遼尾魏亦攘左而塞右膺之背秦語其䟦履于四方數豈戎衣之百襲為庸巳懋其報宜之可當非劉氏之不王姑唘若魯侯之大宇併申褒典少慰其靈噫佳城之鬱年三千名固已昭乎白日分國于肇州十二澤期不斬于黄河可妻李氏贈營國夫人制佐命飛龍及見九斿之大斾剖符虎節可輕十乗之元戎贈以報其忠勞禮宜均乎伉儷具官某之妻由有淑質莫不令儀鬱桃李之穠華藹茞蘭之芳佩委女齋而莫牖吉蠲克謹其禴祠之子狩而韔兮險阻偹嘗于軍旅實從于疆而于理豈専宜室而宜家於戯雖魚軒未及于生歸以親觀羙而象服可由乎死冺不大疏封可張柔贈蔡國武康公制風雲從而龍虎騰物有感于類應日月出而螢爝息理無待于他求具官某當聖武蹂山東而北歸旋貞祐棄河朔而南播俾司留鑰兼秉帥麾知厯數之将窮束干戈而胥附珍孔山堅壁之賈瑀抗真定反虜之武仙徙治保州斬荆棘以立府寺徒戎汴闗棄寳玉而収圖書事睿太憲之三宗封易淶遂以萬户至世皇移全軍以成毫偃枹鼓不鳴郊壘者三年懲齊虜削諸侯俾城燕平板幹可壮邦㡬于千里年雖云其耋矣功誰出其右焉求先朝爵之上公何啻無十一于千百故今朕贈以太傅實加異尋常而再三又増賁于九原兼及揚及二代而父而子皆使同大帝之已封我祖我孫可謂于功臣而無負庸躋絶等以慰明靈可妻毛氏贈蔡國夫人制朕惟祖宗創業之艱必有摧鋒宣力不二心之臣雲從影附克戡多難以成耆定之功是用賁以追錫之榮而配亦與焉於戯非吾将相勲業之家其孰能得之具官某之妻毛氏淑慎柔嘉渉臘書史在金叔世實與蔡國同其艱危及後為顯諸侯憤世婦人不悍為俗寕殄其夫之後不使媵侍在側者而獨善逮其下藹有恵及小星之譽男女二十餘人教養不異已出故敦勸閨壼者不舉是為師先朝旌異之賜衣一襲詩曰鼓鐘于宮聲聞于外者其不信然死既同穴而迢封者其可異諸乎可牧庵集卷一欽定四庫全書牧庵集卷二元姚燧撰詔制楊爾昌贈夀國安惠公制人之祖其木之本培植既深曽之孫如榦之柯㪚分斯茂比切雲霄于千尺豈濡兩露之一朝具官某生際時艱役編氓籍雖迹沉浮于里社而名表襮于鄉閭徳邁乃身盡力菑畬其地澤流爾後聨芳侍從之臣矧侍前皇有聞今日茍不上推其所自爰進丞疑何以下詔夫將來用光㝠漠可妻富察氏贈夀國夫人制姆名門於遼右醮華望之𢎞農言必女箴動循婦道篤生奕奕之令子實為洸洸之武夫觀其臨陳以捐軀于時蹈難可知卜鄰之提耳平昔教忠矧曽孫以宫臣為儲貳之傅友上推徳澤皆發慶源於􅃧朕之贈右揆而勲䕶軍疏恩已極爾于榖異室而死同穴受祉不那告第以兹制綸欽若楊徳崇贈夀國康懿公制羇于人而合于天徴書惟信非其身而在其子從古已然源不浚則流豈長弓必勁而矢方剽取譬若近為理則同具官某自葉流根去華務實以名聞于裕廟遂驛致為邸臣不大其施以昌爾後膳祠主客郎官所職之殷繁嘉吉軍賔閣老相資而損益生而有光于門户死者何憾于泉扃位亞師垣展矣三司之列寵加公衮巋然九命之尊伊爾明靈尚膺茂渥可妻陳氏贈夀國夫人制以育姜敬仲之遺苗歸有周揚侯之餘裔合姓皆神明之後生子宜禮度之閑進長儀曹近清光之尤切動咨閣老率舊章而不忘因觀從槖之能然皆出斷機之所自秩上公以九命既疏大國之封開夀域于八荒宜正小君之號用資告第貞魄是承可王守道贈夀國忠惠公制臣之邁徳固將流慶于後昆王者念功必使被澤其先世肆即下地爰進大封具官王顯之父守道生值時艱出膺人傑屬金源之南播屹恒鎮而中居彼猶冀死灰之然而潛出代交之䇿誘同官以所部曲殱都師不遺稚孩佐太尉之孤軍奮雪讐恥復連城以千里盡返故常鴻集之氓遂其奠居梟悍之卒戢不為暴用輕典以刑新國克逺省以任舊人損户簿征折劵恤匱故飲惠者相率而尸祝其聞風者或形之詠歌非獨專乎軍諮兼亦正夫侯度帝曰嘉止璽書爛雲漢之章民曰異諸金節等河山之誓於􅃧功豈一書而足爵宜九命之加矧有子嘗任其股肱尤可厚飾終之典雖若汝不復于骨肉必猶多用物之精其克欽承尚永無斁可妻封夀國夫人制凡曰有官之君子克慎其終亦惟主饋之家人能勉以正典既所天之加恤義無同穴之見遺某官某之妻姆張懿徽婦主貞順令閨門之不出奠宗牖之必親齊國賢妃纔警雞鳴于昧旦魯侯夀母未聞燕喜于期頥合斯異代以觀有不同年而語飬以辨章之廩禄何報春暉服其裕聖之笥衣足華嵗晏居勤纂組而無逸動釋几杖而不隨受祉之那比隆安有亦黄髪之良異者而素心之所慕焉於􅃧開予夀域于八荒毓封先汝進夫上公以九命濟美後人可耶律祭酒考贈淶水郡莊慎公制臣克厥艱而始明敏其徳子焉能仕皆由父教之忠眷予問義之人師實漢僕射之位長固求還笏難斷抗章是用追崇其先庻以垂裕乃後具官某中書猶子丞相從兄宗承遼室之遺苗禰祀金源而全節尚論其世孰踰爾家而又誨嗣續善詩禮之敦于以見平生戛紈袴之習自夫共工之謝晏然同俗之安爭饋肆乎五漿振衣岡於千仞奉先惟孝雖耆耋于禴祀也親焉接下以恭其臧獲之乆故者民耳匪直八官而知止抑展在家而必聞惜棄世于九齡負為國之三老於􅃧神遊安徃定徘徊乎故鄉衮寵即封用昭章于疑墓嘉誄以副殊渥罔遺可王思亷之祖沂贈恒山郡莊惠侯制商容殷臣周武過閭而必式亷頗趙將漢文制敵而尚思至公因見夫古人褒善不嫌于異代某官某之祖沂言出無擇量深有容當天歩未改玉之時明刑書為亡金之用立人由己飾吏以儒始知法以佐州尋假令而為縣以不揚威子長吏斯免濫罰于平民不惡而嚴雖文無害伍符尺籍事専司六部之間駟焉高門報顧在百年之後有孫四紀及相兩朝晚年嘗作客夫青宫時竟遂明農於緑野遺榮若此埀裕尚多於􅃧父為士而子大夫爾知守死生于𦵏祭考贈公而祖侯服朕誕敷隆殺之等威尚其光靈歆此明命可祖妣贈恒山郡夫人制求世徳于上古神明後者莫先于帝高陽屈原云然亦豈顧後之人哉惟自是屈節雖不可譜其次傳則汝為其遺苗從可知也然自佩繽紛于繁飾及夫曰黄昏以為期思公子于芷蘭不言而喻貽下女以杜若無忌可知溯厥芳聞宜兹象服於戯教爾孫導其先路既竭其力以事君恐王毋懷乎故都俾從夫爵而啟宇降斯寵命賁彼幽扃可贈焦徳裕考制我國家禮御羣臣凡有位躋乎將相恩推上世必皆宇啟于公侯匪專勸忠用以光孝具官某之考某生當立武之日負其先衆之才既長千夫將經百戰毎獲俘而不殺其乆奴而必民化盜賊而為善良振餓羸使遂生活方亂離之靡定而仁惠之兼施自他人若是之有為而平日皆在所可紀由為子之束于貧賤故世徳不能以昭明則爾後之熾昌亦式榖之教誨夫既一門各盡其道可于九原不顯其光可焦徳裕贈恒國忠肅公制事睿太憲以及世祖可謂圖任之舊人官趙蜀源而盡東甌亦既敉寧于新國于勞庸之是迹何甄録之可遺爰啟大封用昭幽壌具官某忠壯而信厚剛毅而純明皆得自天且資以學當王略經綸之際適金源逋播之秋覆巢太行遂武仙之首惡引翼開府雪史帥之血仇從後蹕董漕于川中尋持憲省風于隴右行役之逺聲名益延及太師之濟江乏才臣之謀閫自家而起乗傳以從既同輻裂之􅁤文又翦彚興之莨莠為勩之夥枚舉豈殫方分省政之參俄有邦光之殄於􅃧永辭白日佳城鬱三千年不及清風黄閣留一萬古可納喇追封蜀國忠武公制朕聞率土之臣莫如同姓干城之將尤可異恩故逺稽于禮經用厚加乎愍册具官某其在弱冠嘗為選鋒迅與鷹揚號為萬人之敵虓如虎視隱然千里之威屬鉅冦之反郊乏總戎之制閫來可居此孰有異然其為人心所歸不待君命之至推使秉鉞辭拒循墻即下令于轅門已折衝于樽爼握機旗建四川之草木知名開壁鼓行三峽之星河動影勇頗牧之非匹䇿孫呉之可方八阽危則膺衆所不先分賜予則如士之最下勁騎所蹙堅城毎摧如斯宣力于兩朝何止出竒于百戰於􅃧降年弗永為烈則多雖狀不及識之亦心未嘗忘者置户以守何樵牧可侵馬鬛之􅇕故壘即封或魂魄猶思蠶叢之國可伊蘇徳勒贈蜀國武㐮公制遣戍以歌采薇命于天子者為將三世故國非謂喬木名曰世臣者即戎百年生而他人孰可方之没則斯朕所甚愍者具官某川涵而岳負玉裕而金相受鉞于成童之年交綏于大敵之陣觀其進退以坐作得於生長之見聞勇必冠軍功則推衆非有是為將之體其何以服人之心雖﨑嶇殘蜀之餘乆纔五稔顧敉寧平宋之後艱已百罹置郡縣于夷蠻斥邉疆于甘肅或分使節或秉政鈞自陜右而雲南躐辨章而丞相勲亦懋矣年則未焉何期立極之新而失圖任之舊於􅃧乃祖乃父既不異乎錦里之封爾子爾孫亦可同是蜜章為刻光靈如在明命用歆可張𢎞略贈蔡國忠毅公制保塞承勲孰曰將門之無種陵川受學兵推師道之有傳既不墜其冶弓而復敦以詩禮方資用世奄鬱佳城中奉大夫河南江北等處行中書省參知政事張𢎞略易武以文克忠由孝在憲廟已頒其虎瑞故世皇洊致之龍光㑹盜發於東秦加兵助乎南紀援徐方之傳檄夙料如成當炎夏以交綏宵奔已墮歸守衞士兼長儀司賜金釦之巵被錦粲之服以中奉秉宣麾於淮浦仍前授移使節於洪都大憝既殱餘孽何頼超參南省之機政隨開北首而棺懸雖未陳夫襚衣猶及贈其褒衮於􅃧乃公既邦之蔡無庸改封其家有廟於燕可從與享精爽不昧明命用歆可秦國忠翊之弟巴克實巴追封古哩郡㳟懿公制繄朕聞汝惟昔在軍謂人集菀而已集枯羨鳥烏之暇豫何寸有長而尺有短投龜䇿之卜居道理之安死生奚計某剛毅而明敏貞信而沈幾逃自叛王棄其盡室義定君王之分石可轉而心靡移恩輕妻子之私裾雖牽而首不肯遄其歸以萬里始克覲于九重帝曰嘉哉世所難者故其賚賜之物俄然充牣其庭或為廷士于中或將邉兵于外居無常所至則有功月旦之評士咸髙其一節春秋之筆史無待于他書不有褒章何發潛徳於􅃧恩如爾家之奕葉能令名者幾人封依兄國于拂林兼位崇以二品靈而有識生氣凜然可楊福贈夀國武莊公制所遺乎死丈夫横尸于戰場其凜若生太史納書于幽隧人臣斯得天寵何加具官某方初入官于逺行役第知爭先而賈勇何有反顧而蓄疑將工礮之萬夫壯軍威于千里志恢王畧恨衣帯不甘南紀之存魄毅國殤殉枹鼓以示北方之矯與馬革包棺以奚異詎蜜章納壌之未聞展也興哀為之賜諡爰加美號忠期昭白于廣庭式慰明靈制許焚黄于神道可馬實贈扶風郡莊惠侯制惟仁者為能愛人雖甚急賢才之得觀逺臣以其所主始可精淑慝之分故世皇大公其心致多士善用此道具官某栖身巖穴屏跡市朝既力穡資其讀書復懸榻慎于取友用先正魏公之薦得温室省樹之觀問惟對以國言事見可于天聴賚衣在笥進秩題輿萬里之塗牽車共期到逺九仭之山止簣不願為髙竟自遂以終身敢維憎兹多口傳家有子應宿為郎治膳司主客之殷繁酌嘉吉軍賔而損益諸有疑貳皆資老成於􅃧克對無羞皆汝教忠之自或靈有識欽予追恤之褒可䝉克特穆爾祖考伊蘓追封秦國康惠公制朕禮遇臣下將責其報上而効忠故先之惟親而立愛人曰予知不力善烏得夫令名祖以孫尊必既貴乃推以哀典尚書左丞䝉克特穆爾之祖考伊蘇繄我髙后于爾先人聞為世之所賢奏遣伻而將致由渠既耄辭不能徃以汝克肖代之而行非家學有自而來不父譽如是之力春秋方富初供奉乎東朝夙夜惟勤載徒征于西域託椒房之親以為傅父居畫室之館以鞠帝姬雖一話而一言可三薰而三沐即其時皆書之册視他日取用為模至今天府所藏尚存擇古地官爰加以贈於􅃧子兆民以敷五典生不及邦教之是司公九命而勲上階没其與子封而為亞英靈不爽幽賁其承可祖妣克哷氏和斯納蘇贈秦國夫人制婦人能動循禮度既宜室而且宜家王者之加鍚號封不從夫則必從子存亡奚間古今所同贈光禄大夫大司徒上柱國秦國惠康公之妻尚書左丞䝉克特穆爾之祖妣克哷氏和斯納蘇貞静而幽閒柔明而茂淑徳實在已貴不以夫由嬪椒房娶妻必食于河鯉爰從戎輅大人未造而淵龍由託子其王姫是用尊為傅毋盛哉車服之出入蔚為門户之光華生子則賢既間闗功成于萬里有孫而相亦崇髙位至于三公何爾身不及見之斯朕心所尤惜者於􅃧髙后之明並日月生及依其末光夫人之行如山河没可忘其幽賁大秦啟宇貞魄用歆可考崇福使阿實克岱追封秦國忠翊公制贈以褒忠凡善無㣲而不録名取副實夫言有大而非夸惟逺藩之舊人及承事乎列聖匪封大國安賁下泉某考昔在憲宗未登宸極初因太子同生于其地故即在軍鈞鍚以是名嘉與帝姫共其傅毋臣求愛遇于當世人誰過諸女采撫鞠於内庭妻亦賜者逮六飛之廵蜀乗世傳而超燕世祖異觀宗臣不劣所欲則與之聚為猷而必其成屬叛王阻兵于北荒致懿親絶使于西海責從間途以徃奚翅乎十萬里之遥竟懷重寳而歸已忽焉四三年之久最其勞勩無與比倫報宜其身顧後者天命田出舌在今其子補豈專乎衮闕用方頼其錢流設爾無是之雋功亦朕不遺其哀典位崇太傅何及鍾繇虎賁之共舁宇啟大秦足表造父馬迹之不至英靈不爽茂渥其承可李道復曽祖考執贈韓國公制於傳有言至誠之道可以前知在易亦曰積善之家必有餘慶何天道之應若質劑而取償而人事之脩如菑畬而望穫具官某之曽祖考某尚論其世孰踰其家自後唐僅十五傳至今代實四百載秋闈戰藝嘗從退鷁以俱飛晚節考槃遂卷屠龍而弗試猶不失一鄉之善士矧其資上黨之素侯源濬也則其流長城髙者由夫基厚冝爾來裔為我藎臣一乃心之是期百其身以奚恤與同休戚嘗憂杞國之天不大聲色再抱咸池之日将以圖報惟有疏榮故于三代之相承皆以上公而為贈於􅃧汝為其曽王父雖不及股肱于廟朝朕命以子大夫尚或可肉骨于泉壌光靈不泯恩綍用歆可曽祖妣郭氏贈韓國夫人制内言不出于梱雖無事之可書大孝能顯其親凡有功而必報此古聖人勵忠之意亦士大夫反本之心某官某之曽祖母秉徳淵純移天令淑正位乎内利家人在饋之貞以禮自防見君子采薇之説遂衍曽孫之慶用疏列土之封精爽有知欽承惟永可考贈韓國忠獻公制九仭為山覆簣其址百川學海濫觴是源因於已然而即觀莫不積始而至厚某官某之考某淵深而智山静而仁當勝衣弱冠之年奮前驅執殳之役以從王事為馮忠靖周旋者勤不告勞能審敵情效余華明成敗者算無遺䇿後移漕幕與府佐所至事治而言行在乎他人自足為賢而推爾能猶未言善屬裕皇妙擇乎師友俾子孟入侍于皇孫凡太后之所如必耄年而不後輿疾河内道卒冀方其盡瘁以事為如何于無徳不報之有待遭成廟違棄其萬國與先帝臨御于四年洪濟于艱嘉猷是頼兩扶青天之紅日一新黄閣之清風能蹈難而不辭實教忠之所自於戯觀子可知其父乃古人不同時而云然事君能致其身則今朕與偕行而見者生負為明堂之八柱没冝享清廟之六瑚爰啟茅封式光蓬顆可母王氏贈韓國夫人制婦人能循禮度既冝室而冝家王者之加號封不從夫則從子死生莫間今古所同某官某之母温㳟而懿徽柔惠而貞順觀其儀之不􅑯冝爾子之曰賢㑹姦宄何鼎湖之格天潛圖内難頼忠良辨虞淵之取日尋復重光如斯借筯之籌皆出斷機之教延登伊始追鍚維新爰循從爵之封庸示歸魚之寵尚斯冥漠少慰靈明可妻贈韓國夫人制國家以名器之公盍深求于崇報夫婦乃人倫之本冝並著于顯榮爰考典章用敷寵數某官某之妻賦柔嘉之性凝婉静之姿姆于名門素守女箴之訓婦此良士峻居儲傳之嚴所期夙夜之相成不謂死生之有間慨駒隂之不待失同依日月之光緬象服之是宜尚足表河山之行進封大國正號小君庻其營魂歆此嘉命可妻封韓國夫人制王政重于報功國風本于正始齊家有道内助臣忠賞爵惟公尚從夫貴以厚人倫之别以彰婦徳之嚴某官某之妻懿敏柔明雍和專静遴選蚤由于名閥篤恭宻侍于慈闈嘉若令姿歸于重輔行學素足乎已富貴尤虗其心義調琴瑟之和禮飭笄珈之盛俾爾夀俾爾昌熾豈惟偕老之榮在其身在其子孫孰愈兼全之羙克膺寵渥茂介禎祥可牧庵集卷三欽定四庫全書牧庵集卷三元姚燧撰序讀史管見序宋社既墟詔令湖南憲使盧摯以内翰籍江南諸郡在官四庫精善書板舟致京師付興文署以故宣之致堂讀史管見亦歸興文自是庠後學之士廢讀是書大徳辛丑燧持憲節使江之東物色乆之明年得本旌徳吕氏之塾而劉安官校是邦㑹其月廩師生之餘榖充于庾而錢羡于帑足以傭工俾翻刋焉因憶曩遊江西閻編修宏方掾此省出管見藁數紙曰斯公遺墨俞秋山故物也嘗貽其子壻黄有開有開貽宏宏敢以上之}
