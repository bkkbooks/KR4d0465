  - {type: variant, offset: 9, length: 0, content: '', WYG: 少師文獻公十有五年交友間少師獨畏而不敢字者言必稱先生由其為河南徴收課税所長官兼亷訪使按部洛西識燧于㓜稚迨少師棄長尚書幕隠居蘇門輦致子之以不力于學數加困楚先生聞而馳書止曰某令器也姑無為是急其蚤成長自不爾先生四子保垣萬駒緱山嵩山皆中下殤既俾弟之子元楨嗣其職世祖以王教起為京兆宣撫司叅議年七十其嵗乙夘卒乾州四女長適張箎者相失兵間次王亨皆前夫人劉出且卒執亾妻手語夫人吳曰他日無醮他門必歸姚氏後是四年燧壻其家得觀還山集者于夫人所夫人襲先生還集寶有甚至不以付三壻夫人卒亾室在蘇門其書歸王氏亨亦不得而有次姨自櫝之後燧為秦邸文學亾室求之百至不可恚而與其姊絶尋卒刺膠州子子監江州路位總管上者晦求板之亦不可季姨適任良及主荆門長林簿求先生書與俱十一帙中止校某四時晦已卒弟曙也自江州來長林省其姑録四帙歸後亨子某壻昭文館大學士楊元父其母亦卒得疾䘮心燧持憲節使江之東之三年當大徳癸夘昭文子寅由為南䑓監察御史過華陰于王氏敗笥故書間得其七帙寅槖以遺燧思四帙在季姨所者他日必合而一㑹季姨終良䘮携其子某親迎吾家舟及齊安亦卒燧傷之曰嗚呼何是書之多艱哉今年四月曙滿秩南劒録事将西入秦求七帙板之建寜書坊過宣燧以寅所授授之因慨晦始受學先生常面命之曙後先生卒一年而生顧能成其兄志而文其祖書行今與後先生弟而慈孫哉若先生酅國世家傳次及平生嗜學述作之富與一世之士服為闗西夫子者有遺山江漢西庵三先生之碑銘之集序言故燧著是五十年間幽鬱于昔将昭章于今者于篇終云郭野齊詩集序古之人武以戡亂文以守成顧時義焉何如遇斯為之今為士者事㑹之來縮項惴讋不敢一出而用其學自班乎武人成功之間無已太固而拘乎嘗聞郭野齊公自其未冠而為士子時喜闗弓馳馬讀韜鈐書其先公禁切之毎不為止交逰或近狂之而弗善焉迨筮仕也連三佐戎幕用其畫軍旅率輙效而先公始信其他日果繇武立勞者㑹至元丁夘大集諸道兵襄陽張平宋本一時材武智計之士莫不䋲聮輻凑各試其能長圍之下凡六年而拔之乘破竹鋭浮馬箠渡江乃得專一旅之衆踐蛇茹蟲﨑嶇楚越之徼以蠻獠之鷔岸詐諼曽不敢少傃其鋒既懐柔者必仁存而信撫之使人不知有易代之懼又握虎節以卒于軍今縣官故事職乎民者子孫或不必世能世之者率職乎軍父死而子繼之兄終而弟及之如漢之徹侯以故其子嗣長萬夫而始弗善之者自妄其言之迂狂柔頥瞠目若不可少望其遺塵嗚呼亦諸生之壮偉哉燧逰餘杭都漕冠公理賦兩淛曰余野齋相好者子亦有雅一日焉今嗣詹戍是求序其遺集子容讓為因得讀之盡卷為詩六百餘首曰嗚呼子曰詩可興可怨今之詩雖不得方三百篇可攷以知國風與王政之小大要亦繇于吟咏性情有闗羙惡風刺而發非徒作也矧其善為形容所遇如函夏蠻裔之山川習尚諷之如人身履其地史氏㫁章取之亦奚異于觀之風其有咈吾心感吾心而出吾口者直至而激烈不自知其言之不可為誅姦之屬鏤也今也同時援蹟襄陽材武智計之士功與公等位與公夷與或過之者将千輩而有一言若是幾于道者乎則公兼衆人之能在衆人則不敢覬公之至也公諱昂字彦髙始知山東統軍司事改經厯官再經厯襄陽統軍司擢副沅州路安撫使同知沅州再副招討沿邉溪峒使俄陞為真改虎莭長萬夫戍撫州遷廣東宣慰使仍虎莭将本軍以卒嗣侯震也輯其遺文板之播曉一世日吾先人非獨功如是有言又如是其能子哉樗庵集序余讀陳杞世家叙舜禹契稷伯夷伯翳之裔于帝王與顯諸侯曰有本紀言有世家言獨于臯陶封英六曰無譜嘗為之廢卷曰嗚呼英六建國也厯虞夏商周四代之間将二千年由無譜雖以太史公之綜博猶不能推采其世竟與滕薛騶小不足齒列者同歸于弗論則清風素望之家子孫能完有其譜不隕世徳者豈不難其人焉此歐公取以表宰相世系于唐書也然惟世事搢紳者知尚乎此其或徙業不儒纔四三傳于所宗親猶不能舉名曽高况族從之遠而蕃乎千嵗之緒一朝而㣲絶其發太史之歎而見比英六者不知他日幾何人也近世惟吳氏從五代晋少帝降遼為名臣之三世三相國陳秦燕秦燕皆中令中令而下官少異矣然繼繼搢紳至提舉鄧州學校君八世宗從百數十人非君死生一譜于板蕩之中不使其遺裔得見先徳之盛于今曰嗚呼其善為子職者後君沒之十九年至元庚寅子京出其譜而見其然且求叙君樗菴集因伏讀終帙得古賦三古詩八十四律詩九百八十七樂章三百二十表書啓五十四序引三碑誌事状十三祭誺一青詞祝文九十二榜疏十一凡千五百七十篇非其中閎肆該蓄能是富多乎哉聞君在全季也年猶甚盛已受海内聞臣譽士之知書候其門必曰内翰葢已與其不蹈是地不足以盡其學能今斯人者復皆淪亾頋求君故人子及識之垂鬌中若燧者耶亦足為斯集之悲也竊嘗泛觀大率古人之書不行其時而傳諸後故其時之人及見其槩有不若後人之盡其完則斯集之所悲豈非適為燧所幸歟夫讀其書必知其人質者拘窘掞者㳺誇近者膚卑豪者峻宕剛者麤厲而弱者氣乏與夫徇今者陳茶戾古者無法葩艶者遠實喜異者艱﨑失志者詆訕躁淺者迫切而挾數者詖傾其失非盡乎此也惟所性中正宏厚者故能優柔而明炳洞暢而温醇斯大雅君子言符其徳者也斯集有之然不茍作尤致意于朋舊患難死生之際亦足為後學篤倫理之師瞽見如此異時者出将以余為知言云其出處詳見故河南府提舉學校李君竹齋所撰埋辭又聞平生于遼金右族字名官勲世數子弟及其外氏何人皆能黙疏而備言我外舅紫陽翁嘗勸其為書豈将資筆近鑑耶惜不果成也京今嗣為州教偘偘自持操置門第甚髙其姻與友必求其類真不隕世徳者其喜譚遼金世族葢習聞餘論庻其能成書乎盧威仲文集序一元之氣不能皆陽故陰時出而乗之然而制陰者必陽也世道不能常泰于君子故小人迭出而否之然制小人者必君子也古之人往往於和光同俗之中寓其扶陽抑陰之意聖人何心哉順天道也一小人生而君子必與之並生焉生此者所以制彼也仲舒汲黯並𢎞湯而生張猛周堪並㳟顯而生朱雲梅福並光禹而生天意可知矣是以鳯憚王章賢惮王嘉覽惮陳蕃冀惮李固操惮孔融諸武惮仁傑仙客禄山惮九齡守澄惮劉蕡异鏄惮韓愈惮之者人也所以使之惮者非天乎吾友威仲之生其将使世之有所惮乎其天以傾世道之陰乎其文吾不得而多見其大者矣甲辰一疏奪權人之分而其立可使蟹匡范冠而蝉緌夸者知位之不可恃悖者知禮之不可失其有功于名誼如此埀紳學館之際是非必陳邪正必辦闕政無能言而言之者必威仲也巨憸無能拒而拒之者必威仲也射精而猿號鑑明而塵至威仲於是不見容於表著之底矣湛浮田里嘯傲江湖此自古忠臣志士所不免威仲身詘而道不詘矣余嘗熟玩其文之一二大抵體根于氣氣根于識識正而氣正氣正而體正故勁特而偉健明白而洞逹激烈而懇到望而知其為威仲之文葢君子之文也抑余有聞年有少壮老之不侔氣有明昏憊之殊致故為善于少壮之日則易而自立于衰暮之節則難惟學則一而已矣孟子曰我善飬吾浩然之氣又曰以直養而無害又曰是集義所生者夫如是謂之學此威仲所素講者余復誦而勉之髙麗瀋王詩序天下之事以古方今不異則同異乎古則同乎今異乎今則同乎古異必一居無有若髙麗氏之古今兩異者姑即已事而觀之始晋惠之永興盡宋文之元嘉偏方立國若成李雄代什翼犍凉張寔吕光南凉秃髪烏孤西凉段業李暠北凉沮渠䝉遜夏赫連勃勃後秦姚萇西秦乞伏國仁燕慕容皝垂南燕慕容徳西燕慕容冲合是數國之年取其兩端冲少不能踰紀沮渠不及四十年一何促促若是耶庸以較夫髙麗氏王建立國于唐明宗長興壬辰厯晋漢周金宋以及至大庚戌傳二十八厯三百七十九年垂統之遥繼序之遥昭昭况頼聖世億萬維年其來猶未艾者獨何修而臻此哉豈負固海隅中土之兵不能以至歟将善于事大不失其貢職歟将修明治具禮樂刑政維持之效歟抑箕子之澤百世而不斬也吾所謂異古者此焉耳其異于今均之曰王異姓之于天宗有間也然宗王􅢖受封大國同升虚邑何也未嘗祖别子于廟人民則天子使吏治之其府雖得置監郡與府属皆請而命諸朝而刑人殺人動兵何敢越律其民五家賦詩為斤纔一猶不聼下令擅徴發其地皆輪之天府嵗終頒之其網亦宻矣遇髙麗氏則不然有宗廟烝嘗以奉其先也有百官布列以率其職也其刑賞號令專行其國征賦則盡是所轄之境惟所用之不入天府若是而曰異乎今者然乎非歟最二祖之所併苞何翅萬國其苖胃有世其土而王者乎雖牽塗人之裾以問之亦皆曰無有萬國獨一焉世祖又為乃先生降以安平帝姫追封秦國實生今王于屬為甥而妃又裕皇元子晋王公主父子先後連姻帝室當儲皇之敉寜内訌也王與定策故皇上報之加開府儀同三司太子太師上柱國瀋陽王駙馬都尉征東行中書省左丞相髙䴡國王後以宗王封大國者惟一字遂與同之又原降制惟曰瀋王進尚書右丞相加推忠揆義協謀佐運功臣湛露㤙光可謂無以尚者其相與參軍踵門謂燧曰詞垣之臣不可不有詩也君為序之翰長乃帥其屬共為賦頌褒揚揄拂歸美聖徳歌功台階其聲鑑鍧若金鐘大鏞之戞乎虞業焉其文焜煌若山龍藻火之摛乎繪絺焉既不遺于一善燧序先之則為箕舌之粃糠有譏其贅者矣遐觀䑓唱和詩序遐觀䑓者今常之無錫丞前南陽府教梅谿楊蔚彦亨之别業也其扁則致仕翰林承㫖王公鹿菴所作用筆髙古神間韻逺真天下之竒書哉彦亨自賦之外詩若歌者十有三人余識五人曰樂吏部梁兵部李庭賔王繼明張毅也其八人未之傾葢焉捧玩披今名篇俊發諧互鏗鍠皦繹通暢金石之音未足以喻其正而䴡也摛藻煥輝絢爛奪睞黼黻之繡未足以方其實而章也二十五年余罷直玉堂之明年彦亨亦秩滿無鍚聚居穣侯之國余忘為詩君先挑嘗焉日夕和賡浸淫卷軸顧余豈敢追配大雅然騏骥千里駑馬程以十日或猶及之是以竭力蹷倒景之後而不辭也于是之時彦亨求序梅谿唱和余莞然笑之非求序也特詫彼十三人者之能言相媿焉耳雖然子見夫善奕之與拙奕乎拙奕獲偶善奕則其智日增善奕之避拙奕則懼其術之退也君懼退術耶余智烏乎增将曰負博局而惟夫子之是從也壽龎禮部母夫人詩序古之人曰觀其子可以知其父父丈夫也我丈夫也身以接之何嫌宜若不待由子而知若夫母也則非有親好於平日有不得一躋堂陛而跂其几杖非由子以觀其知有無從者葢迹其己事也天下之人惟善其常而變故欣戚一發乎情必善常其變而變其常而後欣戚不千一揆以義方龎詠之銓官海南也去京師萬里䝉犯炎瘴蒸如毒厲而至于海舶渉洋矣蕩以㫪雲之濤引以排山之風幸其既岸始礪兵負甲以鬭未服之獠出萬有一生之塗滿嵗不可必其來歸亦至戚也使母夫人如他人去其子百里期盡旬月而反煦煦以節早夜時饑渴為戒繼以牽衣相泣者則詠雖勇于功名亦安能㫁襟以去乎哉其果為行由夫人之能勉以君命之不可反汗臣職之宜于賢勞也故曰常其變然詠嘗御史裏行嘗修撰翰林今為小宗伯皆清列也鄉距京師可冄曰而至其養則膳服足以華悦其口體其逰則貴家姻里願頼其儀法亦至欣也而夫人猶不輕去先人墳墓以安享有寜家扵淶水之濵視榮耀若無與已然者故曰變其常諺曰不啼之兒誰不能持嗚呼如是求之其情與義有遯而不得者乎至元二十有三年燧始識詠于燕後是七年相遭武昌是年如海南皆數夕而别元貞始年始同官翰林入同事而出同適驩浹而閒暇計始至是踰一紀矣可訪親好以縻官于庭無所為而至于淶故于躋堂陛而跂几杖且不得而遂焉矧齒其年乎哉惟知生以四月一日詠自善為文凡庭臣之文者率作歌詩為壽燧欲序之前年妨以史事去年廹南歸令閒退于郢無掣乎中故書所由為序示詠以致三千里之賀王憲副母夫人九十詩後序常讀詩禮之言而知其祝壽考者恒在于有官君子也聖人之心非不欲四海之民盡然頋其勢有不可必得而其仁止于不饑不寒無金革以沒其齒而已矣君子則不然責以其治代天工也效以其澤及斯民也縻之以好爵酬之以重禄王者既崇髙富貴之故人之䝉其賴者其報惟有壽考之一言曰庶幾乎由吾是祝而永年可悠長父母吾也嗚呼君子之于民有父母之道者也非生而出之者也而民猶忠厚若是况君子于親託其遺體乎則其祝壽考者将什百千萬于斯民之于吾也匪徒祝之又以其禄養之卿士有家者也以家養諸侯有國者也以國養或曰民之無國家而壽考者若何而為養曰漢民之長吏存問嵗時致帛絮牛酒者猶其遺意也允中方為河南北憲副有官君子也母氏夫人年今九十壽考者也食四品禄家養者也養有禄故能備儀物備儀物則可愉裕而無憂愉裕而無憂則壽考者益昌延而無期矣允中以黄髪之子奉白髪之親䔍其孝者為何然然未嘗觀木之稚也氣鋭皆上聳而挺直無求依其旁其老也勢竭皆下樛而婆娑有求質于下亦理之曰自然而人亦或有不是異者也則夫以髪之親撫黄髪之子益隆其愛者又如何是皆足為吾身昊天不弔者之深悲矣余識允中十年于今未嘗言及其親己丑秋遣其子銘持諸賢為夫人序詩八十者二十人二十五篇詩序其九十者二十六人三十三篇編為兩軸最之為四十三人五十八篇葢有同是一人先後兩賦之者或累篇者其孫錫於其王母不得比之他人宜别之嗚呼多乎哉大而庭臣之賢下而髦士之良稚髦之不必齊其年也戚疏之不必一其好也亦容有不得升堂以企望夫彤管之儀者焉而洋洋誦歌若是于以見凡允中交者皆母之訓也然反扳而覆誦之猶病其言有矛盾者既稱夫人婦王婉順矣當節度君守趙将以城活斯民而夫人一言制之是越壼内而出干戎律也顧以節度君之雄烈識度其揆義委質取必夫人之一言是舉閫外而入禀牆帷也兩戾其道恐君夫人之賢兩不為是筆斯言者将以是而信來世非誣人耶且今之巧于術智者人猶莫忖其心之何在况蒼蒼之髙天幽邈卑人以年而曰吾得之必之何在而致非誣天耶余之斯言雖足取愠一世而世之人以為知言者多矣詩中或有贊夫人能誦浮屠書者抑不知為是者将報徳在今歟其徼福未來乎以為在今外宰物而歸之浮屠之鬼迷孰大焉以其未來乎既享有于昭昭又求不可必得于𡨕𡨕覬孰甚焉彼為浮屠法者必信其書而崇其道者也懐之西堂徳公亦僧之巨擘焉年百十一方年百有三時尼有白姓同齒者曰夕誦浮屠言徳止之曰人恃氣以生者也今老而衰已不能充乎五内而暢之四末汝猶忍耗之故楮上耶白為之止彼為浮屠法者猶戒其徒以老無讀其書而夫人不為浮屠法者顧誦之不置允中其以是幸諫之曰某之友姚燧者實云然誠由是能止誦則夫人當氣實而神深多蓄而少出不伐而益完自今保壽考益昌延於無期者皆由燧得之敢以是祝鄭龍岡先生挽詩序觀人之道當概其心所存與身所履如何而論之夫然後中而無失今也名卿賢士之物故莫不有詩人挽悼之髣髴其平生或以徳書或以交言或以遇榮或以御恤或以名而慕或年而仰二或以政而思或以文而揚往往各得其一事一言而未概心所存身所履始終何如也譬之繪工始學畫人耳目鼻口顴頥顔角理髪須各自為處終未嘗集而為面使真見夫妍醜善人惡壽夭貴賤為誰某之全燧少時聞鄭龍岡公第知家富清玩可與古李鄴侯王副車者敵薰然承平故家習也後國學生始與其孫有節有文二人者友于時公即世已乆而二友年尤少亦未嘗詢及先徳何如今年來關中有文以安西行省員外郎示吾友江西行省郎中髙道凝所撰埋銘而得見公大節有三一曰亷太宗賜銀五萬兩辭今上賜鈔二千緡償責辭二曰讓太宗再富以地比諸侯王封冄辭貴以上相位两中書右又辭三曰仁金以蹙國汴都尚城守大宗怒其後服拔将甘心公怫逆曲折陳觧城賴不屠所全無慮數十萬人世之知公淺淺者惟曰尚醫夫善鍼艾藥石者孰與和扁意佗稽之書傳所起死惟各数人使四子者存盡鍼艾藥石一世之技能起数十萬人之死于膏血横流之下乎嗚呼四子之所能者公或能公不公之所能不惟四子之必不能雖一時四海勲戚将相結主知未固者皆不能也古稱仁人之言其利博哉其不信然乎然自公之霣謝凡在廷將相善言經為通儒文為名家詩誺以之集將百篇煥乎其黼絺鏘乎其璜珩所以髣髴平生者将無一善之遺餘矣吾猶病夫各得一事一言未概其全也故著三大節而叙之俾觀者未及其詳而先領其要焉馮松庵挽詩序二十有三年夏燧以湖北副憲奉檄趨京師以疾留襄陽僉河南憲馮君岵亦以疾得告來襄陽便醫予與之姻友相好也故得與讀遺山敬齋所撰君祖松庵之碑誌焉以兩公之文形容大君子之盛烈可謂不遺餘力曲極為言矣然論出處要歸之際不過反覆用違其長而徳有銜若哀其不遇然者私竊惑也且諧于時之為遇未若不乖于義為遇之善者也自今以觀亦嘗思金之叔世為何時哉譬如病阽脉絶息困之人為良醫計帷有如秦和之于晋侯不發藥而委去自免誤人之名一策焉耳彼大君子者頋豈不醫若而強起自試于必亡之國乎雖然有義焉使先生已為將相國命民心休戚存亡視吾一身故死生有不恤焉耳幸其時無是位浮沉于常官于時不可為于義無必死膏車而歸搴裳以行徜徉于泉石肆志于文酒間此正大君子用世全名之先識髙致兹可謂大遇尚奚不遇之云為哉當時之人年位居前者猶俯而友之其敵也皆跂而師之下焉者恨望履絇而未見者未必不由乎此惜兩公畧不及之也嗚呼燧言為妄後生之論立崖而求異斯其恒態果有取乎先生未必不以燧為獲我心一興慨于九原也又先婦翁紫陽之詩髯雷短宋是門生而元碑止載雷李王冀及渠五人宋不與焉然兩峰亦人豪也遊先生之門若不玷焉遺山何為獨見黜此又惑也先生之殁距今四十有七年自當其時及身接之殁而哀之以文者亦遠而忘焉况如燧者生長去先生千有餘里地如彼其遠也年甫三嵗齒如此其穉也目未嘗接其輝光耳不及聞夫謦欬殁不知所謂哀乆不知所謂忘亦人之情宜然也而燧之不忘先生者異甚葢先生殁以庚子嵗七月十有四日我先人之棄其孤亦同以是嵗月日燧雖惡逆非忘先忌者是日収淚之餘必思吾先人維時于先生及識不及識不可知而得與海内重名之士葢棺同以是嵗月日亦可少無憾于𡨕𡨕而燧思先人必及先生者盡此身而後止也牧庵集卷三欽定四庫全書牧庵集卷四元姚燧撰序序江漢先生死生嵗乙未王師徇地漢上軍法凡城邑以兵得者悉阬之徳安由嘗逆戰其斬刈首馘動以十億計先公受詔凡儒服挂浮籍者皆出之得故江漢先生見公戎服而髯不以南人士子遇之至帳中見陳琴書愕然曰北人亦知事此耶公為之一莞與之言信奇士即出所為文若干篇以九族殫殘不欲北因與公訣蘄死公止共宿實覊戒之既覺月色爛然惟寢衣留故所公遽鞍馬周號於積尸間無有也行及水裔見已被髪脱履仰天而祝葢少須臾蹈水未入也公曰果天不君與衆已同禍爰其全之則上承千百年之統而下垂千百世之洪緒者將不在是身耶徒死無義可除君而北無他也至燕名益大著北方經學實賴鳴之遊其門者將百人多逹材其間燧生也後不及拜其屨前獲識其子卿月者七年矣凡再見之初以府僚見之洛陽雖嘗以好兄余猶未語此今以憲屬來鄧始及之且徳先公不忘也燧曰嗚呼自先公言之夫既受詔出之軍中而使之死不以命非善其職且儒同出者乎千數纔得如先生一人而使之泯没無聞非崇其道此公所懼而必生之也自先生觀之孰親親其七尺之軀而大其所闗入持瓦缶將盿之猶有惜而不果者必茹毒罹禍不可一日居故忍而為此出處非不思也乃中夜以興蹀膏血以禦魑魅徑竹莽以觸虎豹而始及水仰天而祝其行非不祝也夫思而後行行之以決則其勢多難奪于中路使非先公自行而他人赶之能捨所忍為以回其復生之志收其巳逰之志反就是一日不可居之禍毒乎由是言之先生之死求以無辱不全以歸其生也不以不赴而以知巳此其胷中揆制一時相為高下之權衡也然古之人為知巳死者有之無有為知己而生者先生以古人所不為者報之先公而先公所受先生也巳多矣奚徳哉卿月與余相視一泫卿月歸序所與言者贖之别丁編修序至元十九年余辭秦憲而歸東周明年復受命貳荆憲自惟才之非也行路之遼也家貧而力之薄也多疾而江南風土之未宜也實難其來然不遑偃蹇自寜者公則壓于君命勢不容巳私則以為人生文軋混同之時不及夫年未艾以覽江山人物之勝勿之則有歉然之悔斯意之不欲巳者出處之大畧然也自厯制憲至今其間望舒二十四弦晦居府者三一而水舟陸馬周厯乎復灃峡歸鼎五州十七縣者反居三之二焉其于江山之清駛奇峭人才之標特秀異實若富于胷中求如鼎之前編修宻院官丁公及事勝國三朝嘗先顯者或無有倫焉宜其文章之宏肆年徳之髙邵日聞天朝累起而將官之而公辭之至今又于嚮見干進而不釋者之中所無也余以是多公公之報遇于余者宜與人異按部巳竟將還憲府辱以髙文叙行再三讀之愛其詞甚華而義至嚴情甚宻而禮至周而其病在夫一失之不攻衆長之是諛曰雄其文粹其學正其傳尚其世而善其政斯豈余所虞于公者公之世所知其學文其文果余匹其傳與政果不學加乎豈均無之姑為是人甘言相遇乎非歟余如何公而知如是為一報余如告人公以善懐述不余知也公心焉如何不然公誠無意焉而余過疑及此則反取罪為髙明妄人矣或有意督遇將肆公所責之心公焉又如何獨甚善于公者巳辭徴不仕若忘世肆志而能損巳有權輿沅陽書院聚徒而育師聖而祝釐以成已而開物詠歌太平以老不可以謂賢者不出而無益斯世也書院之基巳移文鼎牧俾給左契復移文軍府俾拔其園蔬又為榜懸之院門以觀其速成而戒其中止今余之歸或得請去荆憲而北不知公由何事何時相遇中原一握手復道今日為請或蒼蒼者再牽而南又過十州必覩書院既成升堂以揖峩弁之士來而告之曰子觀大夫役之築者乎十人為什操杵負畚而力作者九人逸者一人䄂手旁歌俾九人者勤力而忘勞力董率而犒功逸者與受直焉今日之居諸君知徳編修負畚操杵之勞亦思䄂手傍歌者乎以是為學者引譬而資公一笑送宰先生至元三年二月未盡之三日宰相生謂燧曰余將遊秦子能序文兹行乎予掉鞅遊天下殆周獨秦未嘗一至又秦士捨修撰雷君亦莫有一識子昔家秦其所忠者誰人所通信者又誰盍枚舉之予階子言一進謁之也燧曰秦固衣冠之藪澤也在燧未有遍加者焉蓋年之前乎燧者率隆名碩徳既幼燧而未與之言後乎燧者燧何所慕賴乎彼而為之伍故遺十百而得一二也請為先生誦之有楊元父者吾師與之抗禮者也其學也粹而正其操履也堅而不渝其執親之憂也哀而禮其能也愽而肆之䆳史學讀至落落奇倚之士必慷慨感激思見其人于今使先生之至不嫌于自明肯曰向之儒服登常山一言折猖狂之盜而落其角距者實余也彼有聞而不奇先生者乎雖先生夙有負氣使酒之聲彼將視為古奇傑士之恒態必濶畧而有取乎此也先生行哉其尚有合于斯人歟又有韓邦傑劉無競吕伯充者皆吾師之弟子也年皆長于燧若韓之能官劉之天質之羙吕之學問之該徹皆燧所不敢望而及計之今以吕以練服在躬未可出之二人有造先生之館煩從者為燧一訊安焉送雷季正序余從}
