  - {type: variant, offset: 5, length: 1, content: 撰, WYG: 遂受寶之踰十年矣併摹卷首每笑鍾繇求蔡邕書于韋誕而不得誕死至發冢以取其癖如是觀公今書于用筆精未必逮邕求邕書之存今者止于獨断惟箋漢氏名物豈若公于千二百六十二年之事千状萬彚叢臻其前一揆義禮之正褒以勸善貶以誅惡使地下之人寵受華衮恥䝉市撻其效法春秋扶植人極之功何邕所敢跌及復哀其時邕死孔融思之以虎賁之貌惟肖飲必引與之同賦蕩之七章曰雖無老成人尚有典刑然非是藁世烏乎知其􅇡削之勤已精求精已密加密埀後之不茍哉足使學者不煩發冢可少槩見公書于今移融之慨歎夫尚有典刑者不在虎賁而在此也其書已貽之同門友許約安求為序既喜是板為興文之始兼䟽其得藁之由與今所歸以諗觀者國統離合表序走未壮時讀通鑑綱目書于蘇門山嘗病國統散于逐年事首不能一覽而得其離合之概焉因年經而國緯之如史記諸表私藏諸簏遇有疑忘即是而叩無異多聞博識之見告者四十年矣是嵗之秋同門友許君得卿自金陵過宣留語冄月間以示之得卿善其非出己意而新竒為説特抽綱目所有彚而為編雖刋置凡例之後猶不謂僭而校官劉君恭方刋胡公讀史管見于宣庠聞之謂因是工可㫁手于旬浹遂取徽建二本重勘校之得三誤焉其一建安二十五年徽作延康元年凡例曰中嵗改元無事義者以後為正其在興廢存亾之間闗義理得失者以前為正其下注云建安二十五年改元延康考之范史及陳志注文是漢號通鑑所書乃若曹丕稱王時所改者今不能悉見例云然則為漢為丕疑猶未決矧其時正在興廢存亾之間今以前為正從建注二十五年其一章武三年徽大書三年後主禅建興元年建無三年餘與徽一凡例則曰章武三年五月後生即位改元建興而通鑑目録舉要自是年之首即稱建興非惟失其事實而於君臣父子之教所害甚大故今正之即是觀無三年者則昭烈為無終獨建之失曰後主者徽建皆非嘗求其原由陳壽晋臣晋受魏禅不敢帝漢而臣魏故不曰漢曰蜀謂昭烈父子為先主後主通鑑因之反帝魏而主蜀後為目録事皆書漢豈晚知其非欲正之而未及歟至綱目書出始曰漢中王即皇帝位統斯正矣而于其子獨曰後主何哉且自建興以及炎興用天子制以臨四方者實四十年鄧艾至成都書帝出降明年又書魏封故漢帝禅為安樂公亾國之餘且然豈于即位正始之年不帝反曰後主乎是與十四十五十六卷之起盡反凡例諸曰後主者皆溺於熟口順耳不思而失於刋正者也凡例又曰有被廢無謚者但曰帝某而不用後人所貶之爵建興之帝未嘗被廢亦均於無諡者故曰取晋帝奕與唐睿宗景雲二年注𤣥宗皇帝先天元年明年始大書𤣥宗明皇帝開元元年者例大書三年注帝禅建興元年明年大書帝禅建興二年庶前後參稽可皆脗合無齟齬也又其一天寶十五載注肅宗皇帝至徳元載明年惟曰二載未嘗大書肅宗皇帝至徳為無始故今于二載上加肅宗皇帝至徳使得上同于開元嗚呼三者均失而延康之取至徳之去猶皆小小何也統固在也若章武之距建興纔三年耳遽有帝父主子之異豈不于統大有闗乎故特書曰帝禅有罪走為不韙者度不可以户説雖面受之心不然焉或以為知言非獨走也有見可一時之快而建興之帝亦将雪其比徳失統主稱千載之恥於九原矣唐詩鼓吹注序鼓吹軍樂也大駕前後部設之􅃥數百人具器惟鉦皷長鳴中鳴觱篥皆金革竹無絲惟取便於騎作大朝會則置案於宫縣間雜而奏之最聲之宏壮而震厲者也或以旌武功而殺其數取以名書則由髙宗退居徳夀嘗纂唐宋遺事為幽閒皷吹故遺山本之選唐詩近體六百餘篇亦以是名豈永歌之其聲亦可齒是歟嘗疑遺山論詩于西崐有無人作鄭箋之恨漫不知何説心竊異之後聞髙吏部談遺山誦義山錦瑟中四偶句以為㝢意于適怨清和始知謂鄭箋者殆是事也遺山代人雲南參政郝公新齋視為鄉先生自童子時嘗親几杖得其去取之指歸恐其遺㤀以易數寒暑之勤既輯所聞與竒文隠事之雜見他書者悉附章下則公可當元門忠臣其又鄭箋之孔疏歟公将種也父兄再世數人皆長萬夫于皷吹之賠犦矟而導繡㦥者似已飫聞晚乃同文人詞士以是選為後部寂寂而自隨無亦太希聲乎其亦宏壮而震厲者亦有時乎為用也兵志有之不恃敵之不我攻走聞江南詩學壘有元戎壇有精騎假有詩敵挑戰而前公以元戎握機於中無有精騎孰與出禦走頗知詩或少數年使得備精騎之一曲橫槊于筆陣間必能劘壘得儁而還惜今白首不得公一振凱也公由陜西憲長以宣撫使巡行郡國河淮之南欲序故燧書此馮氏三世遺文序古之人道徳積躬而孝弟行于家風教及于鄉而勲名流于天下後世父基而子構祖塗而孫轍存乎當時簪紳榮之埀之于今竹帛煥焉是之謂世徳之家如楊震袁安四五世迭為三公桓氏世為帝者師與後漢祚相終始下乃唐之韋杜八葉蕭氏其間彰明較著者尚多由是以來有志樹立門户者夫豈無其人哉然不一再傳子或不才孫復不令仁義之不修詩禮之日捐徙業下逐百工衆技之利自混於齊氓能不觸刑辟以及其宗祀者又於不才不令之中有絶俗之識者也嗚呼世徳之易霣而難傳如是者果天歟天未嘗禍善人有開于始而無聞于終有先于前而見羞于後者必自夫人焉必人也耶簞食豆羮為物亦薄矣吾之與人猶必揆之于義以裁其當否况如天者将畀人以世徳寜不靳吝愛嫪誘之于冥㝠相之于昭昭俾繼繼生賢不墜}
