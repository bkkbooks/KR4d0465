  - {type: variant, offset: 224, length: 0, content: '', WYG: 佞次及其救時之弊為條三十曰立省部則庶政出一綱舉紀張令不行于朝而變于夕辟才行舉逸遺慎銓選汰職員則不專世爵而人才出班俸禄則贜穢塞而公道開定法律審刑獄則收生殺之權于朝諸侯不得而專丘山之罪不致苟免毫髪之過免罹極法而寃抑有伸設監司明黜陟則善良姦窳而得而舉刺閣徴斂則部族不横于誅求簡驛傳則州郡不困于需索修學校崇經術旌節孝以為育人才厚風俗美教化之基使士不媮于文華重農桑寛賦税省徭役禁游惰則民力紓不趨于浮偽且免習工技者歳加富溢勤耕織者日就飢寒肅軍政使田里不知行營徃復之擾攘賙匱乏恤鰥寡使顛連無告者有養布屯田以實邉戍通漕運以廩京都倚債負則賈胡不得以子為母如牸生牸牛十年干頭之法破稱貸之家廣儲蓄復常平以待凶荒立平凖以權物估却利便以塞倖塗杜告訐以絶訟源各疏弛張之方其下本末兼該細大不遺文不具述上竒其才由是動必見詢使授太子經以太師淇陽王之兄故丞相圗們格爾故右丞布哈濟達今司馬圗們婁為之伴讀日以三綱五常先哲格言薫陶徳性明年憲宗即位凡軍民在赤老温山南者聽上總之大為張宴羣下罷酒將遣人正公頃者諸人皆賀汝獨黙然豈有意耶對曰臣欲陳之他日不謂遽問且今天下土地之廣人民之殷財賦之阜有加漢地者乎軍民吾盡有之天子何為異時庭臣間之必悔見奪不若惟持兵權供億之須取之有司則勢順理安上曰慮所不及者遣人入聞願總兵與國戮力報可公䇿太祖承天大命兵取天下功未及竟而遂陟遐太祖平金遣二太子總大軍南伐䧏唐鄧均徳安四地㧞棗陽光化留軍戍邉襄樊夀泗繼亦來歸而夀泗之民盡于軍官分有由是降附路絶雖歳加兵淮蜀軍將惟利剽殺子女玉帛悉歸其家城無居民野皆榛莾何若以是秋去春來之兵分屯要地冦至則戰冦去則耕積榖髙廪邉備既實俟時大舉則宋可平上善之始置屯田經畧司于汴西起穰鄧宿重兵與襄陽制閫犄角東連陳亳清口桃源列障守之又置都運司于衞轉粟于河繼餽諸州陜西則移隴右汪義武公戍利州劉忠惠公黑馬于城都割河東觧之鹽池歸陜西置從宜所中糧興元猶懼不繼置行部秦州順嘉陵漕潼關沔地轉粟入利其年大封同姓敕上于南京關中自擇其一公曰南京河徙無常土薄水淺舄鹵生之不若關中厥田上上古名天府陸海上願有關中帝曰是地户寡河南懷孟地狹民夥可取自益遂兼有河内壬子夏入覲受命征大理至曲先腦而夜宴羣下公為陳宋祖遣曹彬取南唐敕無效潘美伐蜀嗜殺及克金陵市不易肆以其主歸明日早行上據鞍呼曰汝昨夕言曹彬不殺者吾能為之公馬上賀曰聖人之心仁明如此生民之幸有國福也明年夏禡牙六盤大張教條俾公以王府尚書身至京兆置宣撫司以楊中書為使奏諸干夫長不法奪有人室者旬月之間民大和浹道不拾遺師行留裕宗後謂曰姚公茂吾不能離恐廢汝學今遣竇漢卿教汝先遣三使入大理諭招許不殺掠大軍經土蕃刋木求塗以前三使先至諭㫖彼以為誑磔其尸于樹大師及城其相高祥登陴望之見吾軍威之盛駭愕口張不收飭公盡裂槖帛為幟書止殺之令分號街陌由是其民父子完保軍士無一人敢取一錢直者惟急求三使之首或曰投洱水中遣漁者無得也俾公為文以祭賜其家人數十戸世無有與及歸馬多道死公惟一馬瘠不可乘之則牽之襟榖數升時摇末盂以飼雪深三尺軍馬所經踏為氷梯惟旄牛負槖以從徒步僅千里而中原馬至分賚之始免繭足上駐六盤公疾求居闗中教使勸農身至八州諸縣諭上重農之㫖凡今闗中桑成列者皆所訓植嵗丙辰公入見或讒王府得中土心帝遣阿勒達爾大為勾考置局闗中推究經畧宣撫官吏及征商無遺羅以百四十二條曰俟終局日入此罪者惟劉史兩萬戸以聞餘悉不請以誅上聞不樂公曰帝君也兄也吾弟且臣事難與較逺將受禍未若盡是邸妃主以行之為乆居謀疑將自釋復初好矣上難之翌曰語再及曰臣過是無策思乆之曰從汝從汝先遣使以來覲告時帝在河聞不信之之曰是心異矣曰來詐也再使至詔許馳二百乘傳棄輜重先及見天顔始霽大㑹之次上立酒尊前帝酌之拜退復坐及再至又酌之三至帝泫然上亦泣下竟不令有所白而止敕罷闗西鈎考廢行部安撫經畧宣撫都漕諸司帝規自將南伐與上閲地圗俾公跪指瀕江州郡津步要地可舟越者遂復上兵遣由鄂入歲已未秋及江而憲廟崩渝問至上猶濟江駐兵結層樓蒙以臯比日居其上臨攻鄂城東北賈似道聞公􅖴謀軍中比為王猛城垂㧞前茅上及長沙下及隆興聞叛王將為非覬子家遣前芧還遂振旅斷浮梁以歸帝即大位以王文統為平章盡止藩府舊臣立十道宣撫使諸侯惟嚴忠濟為强横難制乃以公為東平至居庸北制下受命即南或勸無入當入覲陛辭公曰文統新當國彼將以我為奪其位至治郡置勸農檢察二人以監之推物力以均賦役罷鐵官居三月大駕北征天后留燕遣使召公曰兒輩㓜時汝授之書何久留彼時圖們格爾為丞相惟專從衛宫閫諸事疑則見謀二年拜太子太師公曰皇太子惟立安可先有太師還到中書改大司農公在在太宗世詔孔子五十一代孫元措仍襲封衍聖公卒其子與族爭求嗣為訟及潜藩帝時曰第往力學俟有成徳達才我則官之又聞曲阜有太常雅樂命東平守臣輦其歌工舞郎與樂色爼豆祭服至日月山帝親臨觀飭東平守臣員闕充補無輟肆習臣宣撫東平嘗閔先聖之賢之後詩書不通義理不䆒與凡庶等叛洛士揚庸選孔顔孟三族諸孫俊秀者授之經而學夫禮盍真授庸教官以成國家育才待聘風動四方之美又詳議王鏞亦善士練習故實宜令提舉禮樂庶其歲久不致崩壊皆從之又具奏八事曰舉老成以輔皇子重省臣以振朝網定法制以齊庶政立銓選以轉百官其四如兵衛屯田學校農桑皆所屢陳又具四事保民守信强幹弱枝修内治外敦本抑末子兵衛又申奏曰内地之民不習武事不耐勞苦第可使出財賦以資國用西京北京諸路之民習武耐勞可盡復其差賦充本路保甲屯田使進有取而出有歸可鎮内竊以禦外侮漢軍除守禦内邊可選進勇富强三萬燕京東西分屯置營以壯神都此左右中三衛起本者詔赴中書議事講定條格且勉諭曰姚樞辭避台司朕甚嘉焉省中庶務須賴一二老成同心圖贊仰與左三部尚書劉肅往盡乃心其尚無隱除成與丞相史忠武公奏之帝深嘉納後詔中書右丞相安圖同知樞宻院事巴延翰林學士承旨哈喇哈遜近史天澤姚樞講定新格朕已親覽可行于今卿等聞否亦當一一參改速行其間一二可増損者記録以聞李璮召其質子彦簡竊歸反有迹矣帝問卿料如何對曰使璮乘吾北征之釁留後兵寡瀕海搗燕閉闗居庸惶駭人心為上䇿與宋連和負固持久令數擾邊使吾罷于奔救為中䇿如出兵濟南待山東諸侯應援此成擒耳帝曰若是賊將何出對曰出下䇿三年文統伏誅西域之人為所壓抑者伏闕羣言回回雖時盗國錢物未若秀才敢為反逆帝曰在昔潜藩商訂天下人物亦及文統姚公茂言此人學術不純以游説干諸侯他日必反去年竇漢卿工書累數千言亦發其必為亂首秀才豈盡皆斯人然文統之相參知政事商以挺實譽之至是費寅以九事中時恚忌訟商公為文統西南之朋引陜西郎中行宣撫使趙良弼為徴幽商公上都以良弼多智畧疑為文統流亞械繋于獄㑹遣鄂托克行院成都而無輔行俾省擇人公奏惟商挺可陛下寛其前罪責成斯行遂出而遣之公又入奏方踐阼之初非良弼詗事闗中恐後事㑹寧身負矯擅誅東西川兩帥之罪以寛陛下西顧之憂推是為心忠純皎然安得與文統蓄異志者比臣請質闔門百口必其無他帝悟出之四年拜中書左丞至元之元出省臣三罷世侯置牧守遷轉河東山西河南山東官吏公行省河東山西明年而歸或言中書政事大壊帝怒大降大臣罪有入不測者公上言太祖開創跨越前古施治未遑自後數朝官盛刑濫民困財殫陛下天資仁聖自昔在潜聼聖典訪老成日講治理如刑州河南陜西皆不治之甚者為置安撫經略宣撫三司共法選人以君職頒俸以養亷去汚濫以清政勸農桑以富氏不及三年號稱大治諸路之民望陛下之治已如赤子求母先帝陟遐國難並興天開聖人纉承大統即用厯代遺制内立省部外設監司自中統至今五六年間外侮内叛㫁繼不絶然能使官離債負民安賦役府庫粗實倉廩粗完鈔法粗行國用粗足官吏轉換政事更新皆陛下克保祖宗之基信用先王之法所致今陛下于基業為守成于治道為創始正宜息聖心荅天心結民心睦親族以固本建儲副以重祥定大臣以當國開經筵以格心修邊傋以防虞蓄糧餉以待歉立學校以育才勸農桑以厚生是可以光先烈可以成帝徳可以遺子孫可以流逺譽以陛下才畧行此有餘邇者伏聞聰聼日煩朝廷政令者改月異如始栽之本生而復移既架之屋起而復毁逺近臣民不勝戰懼惟恐大本一廢逺業難成為陛下之後憂國家之重患帝恚為釋五年用兵襄陽立河南行省經理屯田以公僉省八年十覲十年拜昭文館大學士祥定禮儀使其年襄陽下問其事宜公對曰文煥以江淮一使兼上路總管生劵軍縱還熟劵徙之河北皆可十一年初議大舉奏如大將非中書右丞相安圖同志樞宻院事巴延不可七月左丞相巴延陛辭付敕書惟逆戰者如軍律餘止殺掠古之善取江南者惟曹彬一人汝能不殺是亦一彬也既濟江下鄂使至夜召見公帝憂見色曰自太祖戡定天下列聖繼之豈固存之豈久帝制南國耶盖天命未絶朕昔濟江而家難作天不終此大惠而歸今巴延雖濟江天能終此與否猶未可知是家三百年天下天命未在吾家先在于彼勿易視之其有事宜可書以進公言嚴兵守鄂無使荆閫㫁陽羅渡先遣使責負歲帑留行之罪明明年公又言由陛下降不殺虜之詔巴延濟江兵不踰時西起蜀川東薄海隅降城三十户踰百萬自古平南若未有此之神㨗者然自夏徂秋不秋不降皆有軍官不思國之大計不體陛下之深仁利財剽殺是致降城四壁之外縣邑丘虚曠土無民國將安用比聞揚州焦山淮安人殊死戰我雖克勝所傷亦多宋之不能為國審矣而臨安未肯輕下好生惡死人常情蓋不敢也惟懼吾招倈止殺之信不實詐其來耳是用力拒宜申遣公幹官専輔巴延宣布止殺之詔有犯令者必誅無赦若此則賞罰必立恩信必行聖慮不勞軍力不廢老氏有曰大兵之後必有凶年疾疫隨之軍雖不試而民止其半今况民去南畆來嵗之食將安何仰帕手腰刀必倡為亂袒背一呼數十萬衆不難集也雖非勁軍壁山柵水卒未易平是一宋未亡復生一宋又南方官府以情破法鞭背文面或盛竹絡投諸江中又鹽鐵酒酤榷始漢代其後因之不廢今方新附若復徴之人㪚離制曰鞭背黥面及諸濫刑宜急除之而榷酤後議十三年罷昭文館拜翰林院學士承㫖仍詳定禮儀宋平凡其侍從之臣以士子入見者必令見公詢其學行而官之九月享廟拜大禮使明年上以自九月不雨至于三月問可以恵利斯民者公曰糜榖之多無若醪醴麴孽京師列肆百數日釀有多者二三石者月已耗榖萬石百肆計之不可勝算與祈神賽社費亦不貲宜悉禁絶皆從之初公方奏事得疾忽跽不能言帝急命從臣扶出登車至家未甦百日而愈後三年疾再至昏黙三日薨夀七十八京師士夫哭祭如失親戚曰自今帝側圖回天下者豈復有斯人者耶惟僉宻院趙良弼賻俸半嵗而位祭其家終䘮時孤侄燧仕陜西提刑煒獨舉其咎藁𦵏京城東南方墅後十八年當元貞二年五煒煒徙𦵏卜于西洛金門土祖塋别兆于輝菊山之陽公天資含𢎞而仁怒恭敏而勤儉理生惟務本實不事末作未嘗疑人欺已有負其徳亦不留怨胷中憂患之來不見言色魏國公每譽其善于順受人莫可及在京晩屢輟禄雖奉朝請假質劵劑盈束視貧甘心不一出言恃其久故千人聞不足于上有來即請必反覆忠告惟恐吾言之不盡及東筆中書或咎公獨遺門牆故人公曰用人威福當出天子果若賢材烏避不聞其瑣尾者烏敢藉權樹親貧市私恩乎他善衆多今惟表其大益斯世者四其一倡鳴斯道使今天下鄉校䝉童之師猶知以小學四書為先雖戴恵文身為刀筆筐篋之行與非華人亦手披口誦是書求厠士列者往往多然故丞相之制辭有曰徳全天意學得聖傳㫖固有在于斯也再則中土士夫不知為廟作主奉以天祀自公始輝人多化之而祖考妥靈有所三征西南夷為陳曹彬取南唐兵不血刃賛神武以不殺四世祖之淵龍規一幅隕之判裂也請開屯田淮蜀以兵戍之固已起平宋之本及議南伐而難大將又上言非中書丞相安圖同知宥宻巴陵兩人不可宋平又與諮謀其新國圖任其降臣隨有兩王作難海隅當十五年炎燼撲滅而公始薨古以揆之晉羊祜首䇿平吳吳平而身不及見樂毅有曰善作者不必善成蓋當其時自明其身不終所事于燕恵數百年後猶能取必于祜今焉不效于公歟四夫人惟王氏先公卒繼宋氏後公七年卒公贈少師贈吳興郡夫人及公國魯與完顔氏李氏皆從封魯國夫人從公三十四完顔亦卒故三夫人皆祔煒李出今中奉大夫河南北亷使具忠厚清慎有克繼先烈之譽二女姊宋出娣完顔出姊卒娣繼皆嫁為開封府武公中子杞淮東肅政肅訪使妻偕卒孫尚孩嗚呼燧生三嵗而孤公卵翼之不知其蒙闇教督而急其成俾初有聞承乏翰林復世公官恐公事業不能詳盡不敢干他詞臣故惟自述文不過華質不至俚而摭其實焉而已銘曰惟天聰明視聴自民沃天子心啓莫匪臣舜察邇言昌言禹拜稱聖萬世臣何與在粤若世祖方龍躍淵載命徴車遐蒐逸賢即輝起之爰置左右授太子經靡不叩公感一介盡其平生所學與知傾敷悃誠首八事脩身以始親賢畏天愛民以次申以州條捄弊方施治所宜如紀在綱上總兵民工請民去上封國公擇地所征而南詔公陳遏劉上曰汝言吾行優展也神武操既有要天下定一于時已兆移兵戍邊首蜀尾淮免夫春秋剽殺去來汴置經畧秦以宣撫三年其民歌舞樂土治效若斯公于之是一出為猷不為贊彌又從濟江内難方蹶帝遄其歸大統入繼移昔已試施諸萬方帝思舊人台衮用章公拜稽首元良未建臣何力有太師顧先改為大農尋拜左丞申以責難書存可徴南土既平諮謀新國昭文禁林必首見及後聖相承言行其生没為法程謚以諱名既又進加功臣開府莫尊太師莫尊國魯哀榮若斯大書穹碑比其生全千祀可貽董文忠神道碑公諱文忠字顔誠真定藁城人董世不可逺系其考諱俊材太祖以兵略金地由農畝將鄉民萬衆來歸官以龍虎衛上將軍左副元帥知中山府事時太尉史忠武公兄河北西路都元帥天倪開閫真定其倅武仙殺元帥家百口據真定叛而臣金太尉集兄散卒復之仙走壁雙門夜又襲入太尉惟與故侍衛親軍都指揮李伯祐投䟦渉塹奔藁左副聞亂已艤舟滹沱即馬入藁合力再復之仙走壁抱犢旋踰河太宗以太尉為真定河間東平濟南大名五路萬户左副長千夫從追義宗歸徳薄北門而陳左右皆陂澤太尉以無戰地為言首帥薩竒蘇布哈不從而大將蘇布特自汴召太尉計事金縱兵撃没其軍左副死事夫人李氏九子公次居八諸兄鞠友之憲宗即位明年壬子年二十有二始入侍世祖潜藩承㫖王文康公鶚言詩教問公能乎對曰臣少讀書惟知入則竭力以事父母出則致身事君而已詩非所學從征南詔其兄平章忠獻公文炳耻不得從自藁將家僮二百騎追之大軍深入矣路經吐蕃戰而後逹纔餘數騎已未伐宋王師臨江與忠獻率勇士百人乘鵃䑠先濟教遣他將舟師繼之三㨗得敵䝉衝百艘遂圍鄂上正宸極中統之元置符寶局以公為郎後官奉訓大夫居益近宻上嘗不名惟第呼董八亦異數也而公不為容悦随時獻納中禁事秘外多不聞舉所可知如至元二年安圖以右丞相入領中書建陳十事言忤天聽公曰丞相由勲閥王孫夙以賢聞今其始政人方延佇傾耳而所請若是後何以為乃從旁代對懇悃詳切如身條是䟽者始得報可八年侍講徒單公履欲行貢舉知上于釋崇教抑禪乘是隙言儒亦有是科書生類教道學類禪上怒已召先少師文獻公司徒許文正公與一左相庭辯公自外入上曰汝日誦四書亦道學者公曰陛下每言士不治經究心孔孟而為賦詩何闗修身何益為國由是海内之士稍知從事實學臣今所誦皆孔孟言烏知所謂道學哉而俗儒守亡國餘習求售已能欲錮其説恐非陛下上建皇極外修人紀之頼也事為之止君子以為善于羽翼斯文十一年以大師南伐民困供億奏蠲常嵗他名之征後燕見降將問宋所由以亡皆曰賈似道當國薄武人而惟文儒之宗武人怨之故大師至外而疆場内而京都莫有闘志釋甲投戈歸命恐後上問公其言何如公曰似道薄汝而君則爵以貴汝禄以富汝未嘗汝薄也而以有憾而相移怨而君不戰而坐視亡國如臣節何似道薄汝豈以逆知汝曹不足恃為一旦用乎上深善之詔徙大都獵户郢中奏止還貧弱者弛收官鬻田器之税聴民自為以勸本富民會患多盜敇苟犯皆殺無赦所在繫纍充牣犴獄公言今殺人于貨與窃一錢直上鈞死一㫁不屬憯黷莫甚恐于陛下致祥之氣好生之徳多所干傷敇革之或漢人毆國人傷又或告太府屬盧某盗監監布上命殺以懲衆言言今刑曹于囚罪入死者已有司辭猶必詳讞是事未可因人一言遽寘重典宜付有司薄責閲實以俟後命乃遣近臣圖門覆傷公覆監布告毆得誣杖遣之監布葢太府始受端外皆有羡尺適上方工官有需其人惜毀成端㫁以給非身利而為也降㫖原之責侍臣曰方朕怒際卿曹皆結喙非董八啓沃朕心則殺是非辜必竊竊取議中外矣賜金尊曰用旌卿直儲皇亦曉宫臣曰方壓以雷霆而容止話言暇不失次卒矯以正實人臣難能者太府屬摯而泣謝曰鄙人腰領賴公以全公曰吾雅非知子其必拯諸阽危者蓋與國平刑非期予見徳也其返而摰自安圖北伐犯法臣阿哈瑪特獨用國柄盗弄威福衆立親黨懼平章亷布憲復相為防其私表以右丞行省江陵者踰年公奏希憲昭代名臣今端揆虚席尚多不可久使居外以孤人望宜蚤賜環從之十六年十月乙亥還自萬夀宫祝釐所奏曰陛下始以燕王為中令樞宻使纔一至中書後冊儲皇累使明習軍國事者十有餘年終守謙抑非不奉明詔也亦朝廷處之未極其道夫事已奏裁而始啓白為人臣子惟有唯黙避任不敢以命令可否制敕而已以臣所知曷令有司啓而後聞其有未安㫁以制改則理順而分不踰必不敢辭責元良矣其日盡前省院䑓臣将百人上面諭曰自今庻務聴皇太子臨决而後入聞尋語儲皇以八宗植國本者其識勿亾禮部吕昌元請立門下省封駁制敕以絶中書風曉近習奏請之源上鋭欲行之詔庭臣雜議怒承㫖少保王文忠公磐曰如是益事汝不入告而使南土後至之臣言之用學何為必今日開是省庭臣三日始奏公為侍中兼其屬多至數十人其臣弗便也入言陛下將别置省斯誠其時得人則可寛聖心以新民聽今聞盗詐之臣與居其間言多目公公恚辯曰上每稱臣不盗不詐今汝顧臣而言意實在臣其顯言盗詐何事上出奏者公猶愬不止且攻其賊國之姦上曰朕自知之彼不汝言也然終忌公得君清慎無過莫可指以為報者乃以楮鏹萬緡為夀求歡擯棄不取忠獻公卒官中書左丞故太傅巴延公表其可相上使嗣為公曰臣兄有戡定南土之勞位是則可臣暬御居中宣何力焉而可嗣為十八年陞局為典瑞監郎為卿官以正議大夫俄授資徳大夫僉書樞宻院事卿如故始不從蹕留居大都儿宫籞城門直舍徼道環衛營屯禁兵太府少府軍器尚乘等監皆領焉兵馬司舊隸中書併付公將權臣累請奪還中書不報始大明殿皆資遼右浮海濕材有司急其成功遽丹漆之不能十年叩之皆抨然中空為抽二十餘極比乘與逺壯加其舊是冬十月二十有五日雞鳴入直忽踣家庭氣息奄奄上遣中使持藥投救不及遂絶傷怛不已猶覬其息敕勿速斂五日乃匶且知公圖書外無他居積賻錢數千萬儲􅀢等是以十月六日歸𦵏其鄉髙里先塋從始至終實三十年征伐蒐田無地不從凡乘輿衣服鞶帶藥餌大小無慮數百十橐靡不司之中夜有需不湏燭索可立至前風雨寒暑饑渇駿奔心無怠萌口絶勩語屬屬乎惟以執事不恪獲譴為懼故能滋久眷寵彌深上中嵗多足疾一日樞宻院奏軍務上卧晝可公在御榻枕扶而跽比終奏日已移晷屏氣肅肅曽不流盻他日院臣言始吾以公居中而逸烏知其勞如是在他人不可一日彊志勉力為者何可幾及何可幾及公曰君所見特是時吾固日雞一鳴而跽燭入而出後或長直四十日不至家夜雜妃嬪候侍休寢榻下上呼之方憊熟寐不應命妃蹴興之妃不敢前上詈曰董八誠愛之専敬慎之至事朕踰父汝以妾母蹴之何嫌而為是拘拘其感孚聖心得是見與有舉一世億萬維人所未能者為臣則然其在家出門弟弟敦宗賢賢信友淵毅而明炳遜恭而易直倫理之間人文粲然元臣故老奉朝請者上所存問及有欲言皆由公傳達權幸不敢讒危之及是則皆出涕几筵曰哀哉若人曽未終夀而不淑自兹君側失正人矣一貴戚獨曰天乎世無吾曹千人誠不加少而奪公歸耶下至傭人販夫亦失聲投業後二十有一年當大徳辛丑今天子言念其功贈光禄大夫司徒封夀國公謚忠貞配顧氏從封夀國夫人聖語褒揚六珈増麗男五人士珍中書省㕘知政事某以門功令保定之曲揚某内供奉某未仕女三人長適太尉子中書左丞彬中蚤卒季適中書左丞張公子集賢大學士某男孫五人未仕女孫六人長由其姑歸史氏故又適左丞子某餘㓜在姆士珍將銘墳道持遼陽行省㕘政王公思亷之狀逺走江東而以訪燧義有二焉一以其伯仲父忠獻與故㕘知政事翰林承㫖文用與公由先少師儲邸舊學命之不官必曰先生一于燧嘗同受學司徒文正公且與今忠獻子其兄江浙行省右丞士選相好實再世契奚言而辭銘曰在易六位以爻居四上承五君多懼之地於皇前聖與天巍巍神明其變雷霆其威公三十年日侍帷幄出入起居不辱于數初匪智計其身包周臣職克脩敬慎無尤天府其觀曰郎典寶其自任重引君當道不剛悻悻不柔容容揆義為中闕焉彌縫或攻聖學異教之似公曰其言皆孔孟氏彼去其實務華詞章為利達資何闗倫常足明其心斯道力衛展與朋黨弭禍于未父子之間進説多艱庶政既先國本泰山其入告内無是為大他随事陳罔遺于外其非廷尉獄由平反施今必臧等乎納言姦窳滔天庭伐其慝雖未即誅中劇矛㦸黄髪番番致臣而家嵗時存問天語柔嘉晚書宥宻瑞監仍柄何天不弔年過知命前聖終之賻以送終嗣聖功之追爵上公人臣寵光至是焉極矧子廊廟清劭執徳無石維年竹帛豈夷頼乖体聲其以是詩牧庵集卷十五欽定四庫全書牧庵集卷十六元姚燧撰神道碑平章政事史公神道碑史氏自癸酉我太祖蹙金南播之嵗尚書都元帥父子相繼轉鬭河北十年元帥死武仙亂故開府儀同三司平章軍國重事中書左丞相贈太尉諡忠武公收其兄兵轉鬭河北又十年抜相衛薄金北門金主奮鋭自將踰河衛實受其鋒太尉再戰再敗其兩帥之衆十有八萬金主度不能國走死蔡太宗大其勳以為萬户俾將真定河間東平濟南大名五路之兵憲宗以戰迹著衛封以衛之汲胙城新鄉䕶嘉蘇門五縣由是故榮祿大夫平章政事公以太尉元子得節度衛憲宗征蜀詔太尉以公從會其陟遐太尉還一王召公偕北絶漠留謙州依其儲氏姑居五年而歸先是李壇反誅太尉請裁強諸侯權自今兵民之家父死而子始繼兄終而弟可及其子弟同時並官者無以職掌小大皆罷之請由臣家以始併辭衛封制曰可太尉一門一日皆虎符金銀符者十七人而太尉故所將兵自先朝以解授兄子江漢大都督權戍鄧及是亦解𨽻他將公無以為者數年㑹故中書左丞劉武敏公拯請伐襄陽張平宋本大集天下兵于漢之南而太尉亦謝政公請立勞軍中朝議猶避鄧之舊軍俾與張蔡公子𢎞範易將始授懐逺大將軍亳州萬户虎符太尉飭之曰戰無後人與築夾寨始猶囘逺包山絡野綿亘百里三進薄城應中授外息耗一絶其將張貴突圍出公斬之盡有其舟仗攻樊城先登拔之襄陽隨下賜白金衣裘鞍馬弓矢從大軍南征越郢下復夏貴鎻戰艦絶漢為陣我舟不可越公戲下馬千户嘗𨽻都督萬衆從上以未渡江請為導柂舟出沙武口入湖達江故丞相阿珠公將二十五萬户為前五萬户擇一人帥公其一帥先諸將濟江後繼未集與宋將今中書左丞程鵬飛遇殺傷相當公被三創鵬飛七創肩輿走鄂鄂隨下丞相請以輕進撓法罪公詔錄其勞賜白金五百兩大軍既東從故丞相阿爾哈雅時已平章分兵圍潭州攻鐡垻百日礮激柵木傷肩流矢貫章先登拔之以軍民安撫留戍招摩逋殘既集既安入覲加定逺大將軍以太尉玉帶賜物也人無敢復請上之制曰太尉所服汝服何嫌即賜之自是公班諸將獨一品服從攻靜江衆皆轒輼自蔽鑿城將穿公分地獨居礮􅀈所集轒輼不可嚮伺有怠隙樹鈎援攀堞蟻附而登抜之平章北還以公元勲貴胄威名非他將可軰留治静江初城既兵當剽殺之餘官舍民屋盡于焚毀公賦戲曰其視吾為師隙為居第市為列肆必完無苟學校祠廟大其故制猶不能實畫地募民又賦鄉縣之豪析族城居而所居第宏最靜江曰示吾久此不為去計亦制越一奇也民始勞之㫁手則屋取傭鬻直已相什百旋為通都民男女為人所奴從主北者或思鄉亡歸拘之有司可籍究者三千人省議欲一切徒來公曰至鄂必分為勢家有託以徒必道亡不達且生他變既止不徒以男女又相偶皆籍民之及無敢覬取者行徇定昭賀梧潯藤容象貴鬰林栁融賓邕横㢘欽高化廣西之州十八肇慶徳慶豐廣東之州三皆除三年田租發倉稻以丐貧民遣鄭何朱國寶劉五剛趙珪趙修已五萬户戍賀昭梧融邕馬天麟宋景劉君進花禮完顔世英李宗張武鄒瑛閻國順托歡十千户戍潯賓容象栁亷欽高化又以十千户不兼職民則任分而令不専皆便宜假以軍民總管事聞制皆為之當静江受兵溪洞諸夷既降雲南公曰邕容視左右兩江猶身之有手足今歸雲南度吾不能制必輕為冦入則吾禦歸則吾猶是吾不遑一日息兵其界也遣使諭曰爾捨朝發絶制之邕容乃逺託數千里經數夷地不至之雲南何以應緩急或他日爾越界為市諸戍必以入冦加誅爾矣且朝京師路迂皆非已之得者溪洞聞之翻雲南來者五十州後雲南爭之其省平章為書讓之曰吾與先太尉久共政汝不可有吾成功各驛以聞公使先制詔聴公節度使昭勇大將軍廣西宣撫使尋罷宣撫改鎮國上將軍廣南西道宣慰司宋既亡也其將相張世傑陳宜中挾益王昰衛王昺浮海趨福州立益王傳檄海嶺之州曰余復廣之東西豪傑啗其爵賞爭起為應裂裳為旗荷矛為兵者動萬為羣公戒諸將盜至以時降斬不得使牢根窟能以衆來者官之盜去不敢求迹平民而深為延誅時方乏鹽發廋下令斬首來者以鹽為購諜言夏貴已復瀕江諸州江路既絶不可復北諸將來還静江計事實欲合勢公曉之曰君軰亦摇敵懼耶孰貴能復江不能踰嶺審不可北猶與諸君取塗雲南歸矣今無輒棄戍也省議棄肇慶徳慶封併兵戍梧公曰委地徹備適示適怯増兵戍之劇賊蘇仲集潭之潰軍萬人自王鎮龍山俟嵗事作官軍毒暑不可入外肆為刼而植稼其内嵗事畢聞將加誅則偽出降仍嵗為是大為横象賓貴四川之梗公令四川為堡其界守以土豪日嚴警斥官軍行前縱大廬柵隨以民夫具檐芟禾仲窮來歸猶官以賓之嶺方令走王新立古縣斬李應辰李福潯州由靜江北全永皆城守潭州路絶而永尤急羅飛圍之七月其府判官潘澤民間請濟師公又分步騎赴之大殄其衆永境遂謐後益王死衛王繼立趨廣州璧海中崖山曽淵子以參政開督府雷州公再諭降不可進兵逼之淵子奔碙川獲其兩都統驛送京師遣萬户劉仲海戍雷世傑將萬衆至仲海出奇擊走後羞墮其詐計悉衆來圍城中絶食士皆煮草為糧公抽兵漕穀欽亷高化諸州再破走之用兵海南詔公親戍雷式遏西突會衛王蹈海死南海平廣東之户十耗八儿而廣西獨完不殘及户賦酒酢算公以嶺南地險而民寡俗悍而産貧征之適急其為盜省是其説蠲之至今廣西並湖南不困後𢎞範入覲請復將亳州兵制可還公鄧之舊軍拜參制政事行廣南西道宣慰使入覲拜資徳大夫中書左丞行省湖廣用兵日本詔督造戰艦六百仍送揚州用兵安南詔給糧仗廣西師還二十二年約蘓穆爾以中書左丞來而湖廣囂然多事民喪其遂生之心矣以公嘗督海艦費計巨萬大為鉤考毫推縷剔求可中公者無可得乃責償軍民三萬定明年移省江西仍中書左丞又明年拜中書左丞俄復右丞還之湖廣其人已平章恃有援藉怒詈同列辯詐鷙刻師心而行聲勢張甚以公結聖知固謙抑不報強禦者獨不忍以言色侵之凡與處四年拜榮祿大夫平章政事㑹大料民州縣賦紙為藉渠以户率如干為十五萬定可官有之令州縣别方為籍集吏計局程篤實嚴將有首償者而赦令下渠猶曰第可原哀求罪耳錢不可貰公以鴻恩之餘宜無深誅不從公則曰最今籍用當十萬定而悉徵之吏將重賦之民民益殫矣渠曰吾徵其餘責償五萬定其逆慿怒當大紛一言從容十赦一二民丐二十者此類元惡伏辜可以得為而公亦薨實至元二十八年秋七月十有五日年止五十八性友愛喜施有積必分之諸父諸姑昆弟羣從空槖不愛焉甥姪男女孤者鞠之時其㛰嫁力不足猶稱貸為之閨壼不敢干外事與人交襟懐曠夷雖疎且殘不峻陛級不留門廡游億絲竹尚友東山者老而不哀焉公諱格字晉明聚書萬卷鼎彞圖畫一室號曰裕齋其先大興永清人曽祖成珪晦徳其鄉生行尚書六部事諱秉直實生太尉諱天澤妣夫人木年氏夫人劉氏儲氏兩張氏子七人燿榮餘未名女二人在室男女孫皆一人公未有子子都督子即燿也篤其愛曰是他日可虞者以從戰廣西勞授靜江同知遷廣東宣慰副使換浙西宣慰副使前薨一年朝議不欲宰相兼將許其子弟世公累請將燿未報會以其喪來明年命下授燿虎符鄧州舊軍萬户即舉公柩與四夫人喪以其年十一月二十七日葬真定之真定縣太保莊太尉兆次甫封以榮入覲曰是臣所後父先生格之子生十四年矣宜代臣將制可授勞仍故虎符昭勇大將軍萬户别授燿虎符拜榮祿大夫平章政事行省福建歸過鄂人故公者感是二子一世平章一世長萬夫符節相煥麾葢相逐至為隕泣嗚呼曰可良子已客有李裕者嘗以理問官事公江西數千里畢公之葬又奔走京師營立二子其盡義故吏者如何燧亦故公者隧首之碑其可辭銘曰乾文言曰聖作物覩以類從親雲龍風虎迺今觀之匪古専然天于皇輿將畀其全亦匪一聖能同軌轍聖武我祖􅗴金河北而宋畫守猶江之南留大遺艱待帝之戡孰有有君無其臣者太尉父于佐一函夏父平河北子江之南佩訓其庭無後事慚故横江流揚楫先濟鼓其故軍嘗敵全鋭及從移兵潭桂兩州登陴兩先兩後戍留均之為勩而桂尤瘁基屋火餘以完府市走檄所下廿有四州胡難而妥旋化而仇䲔鯢騰海孤猘陸起威柔四年平始再底捐我廋儲復而田繇方户廣東十纔一凋湖廣再相元惡再友吾潔是求孰涅而黝一日霣首公壓宜信天不憖愁遺一疾不振難偶者時難立事難令之名難終之位時天之位餘非人耶易世之難匪哲曰何矧其惟孝不添世徳太尉既老平章軍國公世平章太尉之光燿復世公祖孫相望榮未成童赤臠龍虎歸偃斧匠奚憾之茹載烈兹碑石獸衛之與滹河流相永無期榮祿大夫福建等處行中書省平章政事大司農史公神道碑公燿諱字煥卿曽祖秉直當嵗癸酉太祖加兵于金率焦岱鄉民萬人迎降燕郊官以行六部尚書祖天倪以從蹕􅗴河北山東功授金紫光祿大夫兵馬都元帥開閫真定武仙為倅尚書䇿仙其志蓄禍盇􅀢為備都帥謂大人奈何教兒猜中而不信人尚書恚其一孫不故真定總管攝江漢大都督權如北京曰吾不忍其併及難也後仙果戕都帥一家百口舉城臣金都帥季中書右丞相贈太尉忠武公方為質太師國王將覲漠北在燕市䞇物聞變而南收都帥潰軍後真定逐仙出保西山仙再盜入再復之遂南踰河太宗以太尉為真定河間東平大名濟南五路萬户世祖淵龍以憲宗母弟總天下兵起平宋本置屯田經畧司于河之安以太尉為使都督為屯田萬户將兵二萬戍鄧當荆閫衝嵗内辰是地生公㓜為太尉所奇愛異他孫後罷世侯移都督牧東平至元六年方圍襄陽太尉以開封奉朝請制始以元子格為萬户猶避鄧之舊軍將亳州兵時未有子屢求子公太尉許之凡圍襄下卾無不與偕由是知兵甫及冠行省版長千夫從參政崔公斌逐趙宣機餘冠萬人公居顔行射殺數人賊氣為隳遂潰崔善其能曰將種也解佩刀以贈後阿爾哈雅平章抜静江獨留戍帝兵或請其由則曰吾去而是土或販戍將必誅史宣慰以太尉子朝廷終不重罪之宣慰聞之甚慼調其孤軍行徇定昭賀梧潯藤容象貴鬰林栁融賓邕横㢘欽高化廣西之州十八肇慶徳慶封廣東之州三公後殿而前茅之功授承直郎同知潭州總管府事趙都軍盜據肇慶假公徳慶總管討平之授奉訓大夫潭州路治中改廣東道宣慰副使平賊黎徳獲蜑船千艘繼餽唆都南征事治而民安之改浙江宣慰副使從浙省臣破賊栁分使衆七千括蒼又破吕成婁蒙才衆十萬斬其尤猖獗建黄屋署官至平章者楊鎮龍及厲制置皆于東陽玉山摧俞高五百餘人紹興又斬詹老鷂林雄劉甲一潘正皆有衆萬餘自王于温處間者後元帥張𢎞範平南海還求將亳軍還鄧舊史氏詔從之朝廷以南紀平諸將功至省臣者仍將其軍制許自擇欲將去相欲相罷將時公父已為右丞宥宻請以張温將鄧軍帝曰太尉一軍豈可代以他人宜問其子格可誰授者右丞遣伻入聞臣子燿可且召公來襲公不至辭以俟弟榮成長則授之明年右丞升章平俄薨顧言以真定諸産貽之公奔赴鄂既至明日制授朝列大夫鄧州舊軍萬户公號誓柩前必以萬户歸榮所親謂是虎節上瑞也可傳子孫無窮必且利之言未足信公乃究求貨財為親長覬取者多至萬緡皆奪歸之與田宅奴婢析其五弟而自不有舉平章及四夫人劉儲兩張氏之喪葬真定之真定縣太保莊太尉次兆甫封以榮入覲曰是臣所後父先臣某之子生十四年矣宜代臣將帝曰太尉以官授二兄子汝復欲解職汝弟真太尉苗胄可之方議征闍波大將未得制授公榮祿大夫福建等處行中書省平章政事辭以年少無功受寵太峻請囘臣所授他人惟卑官以行或請以國人首相帝曰太尉可同漢人耶其孫非國人何公又請故平章政事某知海道平章高興今河南省丞相者知兵偕行亦可之别錫虎符鞍勒弓矢翭甲既行集兵矣會高平章請濟師帝曰彼國之人祼而懦多兵何為損其軍四之三且不欲太尉諸孫蹈海遂後公乃命今平章鄂國公史弼以行成宗元貞始年賜錦衣二襲拜資徳大夫江浙行省右丞臨安自入叛圖民居官屋入傭直震邸者四萬餘家火餘雖民自屋其基而傭直不除平章某者利之謂地及丈可鬻楮緡為錢五萬與民可免置官嵗徴其逋鋭欲行之公曰是令一下貧民無貲以取取率富室得不自居亦傭之民加直其先民等傭居與直富室何若仍歸震邸一定之直嵗無所加之寛乎謀既不行乃以東南之民多田而租入少將覆畝以征公緩之謂宜俟畢農功而議又禁官市惡鹽鐫損江東金額高麗王遣周侍郎浮海來商有司求比泉廣市舶十取其三公曰王于屬為副車且内附久豈可下同海外不臣之國惟如令三十税一會人訟平章迎詔裼衣上香引公為徵制遣御史即問公言未見其裼但不帶耳當國者阿其人顧奏公敗事黜之大徳之元遷江西左丞俄移湖廣左丞一年復江西左丞以屯田贛州軍兵多死瘴癘與廣東宣慰司加民丁糧于田租外者皆罪之召入為大司農公不擕家乘傳赴之既至覈其公幣稽逋為緡數千萬率勢位家假出為商久未歸其子錢者悉徵入之人怨與請不恤也未幾杭章以大夫人楊年八十餘求辭歸養未報以大徳九年乙巳二月壬辰薨年五十子今瑞州總管壎時為樞宻院㫁事官奉柩歸葬真定姜因祖山原都督公兆次嘗讀通鑑書閑武事者則其家學故志功名至所有譽性剛狷不撓于人雖國人貴臣有不足吾意者不少下之亦有是恒齟齬而不少變其節始至元十有二年徇地廣之西東終二十有七年中間為宣副平羣盜海濱浙左厯紀有半使黷于貨子女玉帛將牣其家而無田于江之南無宅官所至傭屋以居積債在人亦開國苗嗣貴而能平者雖五十不稱天亦不可謂之年云嗚呼其天乎哉夫人劉氏公祖姑之孫以賢淑聞姻里壎概其立政清慎明敏世有史氏佳公子克世其家之目女適王少師子典寶少監師聖自餘男女一人公召至京始生而不及見者銘曰在昔都督于鄧秉鉞鼓其蒸徒與襄掎各䇿宋之平必基是拜㑹罷世侯成始未終大兵之南路由襄始未成之終與有者子從所後父後殿前茅下廿列城盡廣際交宣副閩浙羣盜孔棘大刑以鋤卒底寧謐而父平章謝長萬夫授公而薨既降命書公曰臣季平章元嗣年今成童化代臣世帝多其讓俾世平章往征闍波南洋是航而復中已改命他將成宗繼序三省四相自右浙右左江之西俄左湖廣江西再為靡靈不施奚窳不除且繩上已弗率于度常久勞外召大司農方艾之年而忽告凶人䀌傷心即世之宻胡畀其才而奪夀考司是者天生子則賢不永其躬而永其傳其兆安從從禰江漢載銘穹碑陵谷高岸便宜副總帥汪公神道碑便宜副都總帥忠讓公諱忠臣字漢輔便宜都總帥隴西宜武公之冢嗣便宜都總帥忠烈公徳臣中書左丞忠惠公良臣四川行樞宻副使清臣之兄故副都總帥惟益之考中書左丞忠肅公惟正今平章政事惟賢中書右丞惟考參知政事惟覲宣慰使便宜都總帥惟和同知宣慰權總帥惟屯純田萬户上萬户惟簡惟允上千户惟弼知階西和州惟敬惟恭之伯考今懐逺大將軍便宜都總帥安昌為資永昌王必昌之祖宣慰使元昌副萬户朝昌便宜都總帥夀昌之伯祖也卒以元元丙寅四月五日受諡于元貞二年丙申推至義武卒年癸卯實五十四年祖孫一門三世五公又許連姻王室自餘將相使牧為質猶十八人此吾元有國而來所無者嗚呼不曰世臣之家謂之何哉公王姓由大父彦忠世汪骨族故汪姓金主以甲午正月死蔡義武時即險移鞏治石門山猶行以興王朔明年乙未始下太宗義為其主後來仍金官官以便宜都總帥俾從皇子奎騰征蜀公留質帝所忠烈質皇子所制後令公從征蜀以管軍總領從破文階州大安軍從攻成都入其郛義武陷㐲中急公疾戰殺傷數十人竟衛翼而出壬寅以破土畨疊州功賜銀符明年義武卒有子七人皇子擇宜世帥者意在忠烈謂公曰汝宜世吾欲帥汝弟而得無後其心乎公曰王未有言臣欲推授為子與兄有異耶王高其行以公鞏昌元帥知府事丙午以前茅忠南功換金符故事祖宗賓天所授符節悉取還之故公金符亦歸之官憲宗二年士子償賜之俾權都總帥是明年癸丑世祖以太弟總天下名既移忠烈一軍戍和州會將軍南詔禡牙臨洮公來趨覲俾督漕嘉陵繼利州公造舟棧塗水陸兼行走缺足兵籍而恤乏民力始益昌不以饑告成午憲宗自將討蜀忠烈集諸將問計樓上曰吾州凋傷之餘玉帛無所于得一旦東于至左右近貴之臣需求何以為資公則曰吾曹抜身健兒惟有能將卒士衆効死前驅何至為是媚人定死前驅公惟恤吾事子其責忠烈泫然灌酒地曰兄與諸將熏心誓是徳臣何言所孤兄諸將託者有如此酒大駕至利巡所治樓璧橋隍歎曰使吾非戍之敵先之則四川領喉之地可必能嵗月平哉遂移帥西南攻劒闗闗之西隘曰苦竹隆慶府治其上西北東三面嶄絶深可千尺猿猱不能逺以上下者也其南一塗一人側足可登不可並行敵盡鋭禦者惟此而帝敕諸軍攻未至某地無張汝幟自伐鼓督之公前登帝望幟張倡偽歌呼六軍和之聲動天地隘之兵民飛崖如蝶前是獲敵張都統仗為蜀𨗳反紿帝曰吾能誘此柵令遣降入行則反為敵用且世吾軍何地強弱何倉豐餒教使勿下帝為書繫筒箭三射入栅令必生致獲之磔以徇賚飽為兩四百五十潼川府治長寧山攻復先登賚銀如苦竹數加以金弊為匹二十七復以軍東即嘉陵為舟行計輿礟竿鉅絙以從公奏無所事此此前塗所不乏者不若舟米數千石葢此去多稻而求粟無有宜虞以廩病者時逢州壁運山閬州壁大獲順慶壁清居廣安壁大梁平破竹皆下東南抵合壁釣魚山渠江水㑹其下石邑入雲其帥王堅據不即下礮矢不可及也梯衝不可接也帝欲乘泣高勢不棄去而必抜之故久蹕此時暑我帥疫矣忠烈卒于軍公泣集將佐議曰吾李卒軍馬韋裹尸與國責塞子惟正雖未弱冠宜也衆曰公言是公言是願奉以代即帥其秋帝崩中統之元制以公為副都總帥從所志貳貞肅同戍清居去順慶平土二十里西北東三面環江北江殊囘逺不可為池南依而壁平可馬馬上無大艱崎其南即合敵出入吾界無時于兵法為交池公又子身受之開屯田練軍實遥候斥詗強鄰入必摧環其軍不令棄去後詔貞肅還鞏昌公獨保成三年璽書褒大之又換金符三年秋抄䕫府獲其團練使解恭知府張甲及路分二人斬刈千馘獲遺甲仗寶幣不可貲計入覲賚以虎符銀章銀幣如長寧之數而加金為兩五十副以鞍勒弓矢衰其從者且以久勞于邊代以忠惠還之鞏昌俾副統總帥由行省受命還得疾秦亭歸志古漳故第而卒年止四十八其年六月從葬古漳先域為性安恬出言質直如其心事隴西郡夫人母包以孝聞友諸季終其身􅀈力竭才羽異之人無可間總帥府屬郡一十四事至殷也身自為與從父副弟副猶子三世時得専殺未嘗妄笞一吏殺一人然至臨敵決戰上馬挺槍離陳先次巧㨗若神當者紛披莫有我禦其弓矢其中可方古人憲廟出畋遇虎命射之一發斷其吭帝喜至解所御金鞍為賜夫人故金蘭定西會徳順五年帥張雲之女惟益纔世副都總帥二年而卒一女適鎮撫帥府張文煥老將之共公者每曰公為人信厚安昌必昌復信厚可曰善世其家者由安昌求銘公碑燧思于公與貞肅所戍之地無不至焉清居之不可恃為國者前所以言楊氏張氏蒲氏皆行帥府大獲運山大梁平故地與便宜其時目曰四帥府清居南迫合獨受敵鋒為三帥扞蔽他日専劉帥戍移貞肅南九十里夾嘉降東西築武勝軍母徳章兩城距合為里亦然畫則其邏設伏嘗待進戰夜則畫地分守傳警鼓柝篝火照城達曙以防竊入一話一言敵盡知之况敢抽兵邀利他求為哉惟是軍當其堅重故三帥反徳嵗以抜敵柵壘掠敵府庫劉其人民逞志于忠涪䕫黔萬施雲安之間上功朝廷用事之臣第知三帥立勞之多而是府獨寥寥也終未有能明其然者又貞肅去清居敵夜大至火民居縛劉帥去鑒大夫之失如此則兩公戍而克完者功不大哉凡此或者貞肅碑所逸故發之此銘曰椒聊逺條求今之世方漢金張纔有汪氏隴西開國義武肇之義武之為不怍倫彝忠讓忠烈忠惠貞肅逓芟川凉力脇謀一繼繼其來將相之多不符埀躬必斧手柯歸覲私廟庭笏駢羅公以其序大宗義武于弟以子宜不降俯乃推儁功潛不自張等翊吾家聞命即行安洋流洋如水就防所有不言其盡瘁致子而天閼歸以何戾彼蒼者穹監下而公惟我皇上心靡不同疇徳未報未隆何功三紀後公一朝哀崇公有令孫人曰公似雖華其年已踐公位古者大宗合族恃之祭求其膰尊祖之思胥是冢旁可萬家邑表阡有碑車過者有式興元行省瓜爾佳公神道碑元貞二年二月資善大夫河南江北等處行中書省右丞臣堅賢言往嵗臣待罪于外㐲奉明詔旁求勲舊臣僚封拜奏對各上其事以備纂修世宗皇帝實錄資用刪取者臣喜㐲思陛下先孝四海發揚前休皆使下臣依光日月誠曠代之希遇謹已次冩臣祖常格臣考隆古岱出處始終為一帙上史館而臣之先汗馬微勞其槩已此何敢上比磐石宗臣勲舊自名惟與劉氏伯林黑馬再世父子來北之初義同一體今焉二臣已各受諡忠順忠惠墳墟墓臣不援陳恐使聖澤獨漏不臣家敢未死請制曰可萬户招討使常格贈龍虎衛二將軍封定襄郡公諡貞敏妻鄂屯氏從封定襄郡夫人興元行省隆古岱贈榮禄大夫沔國公謚忠靖妻耶律氏從封沔國夫人制下山南之民聞者咨嗟泣下曰公卒明年興元屬縣及州若洋城固南城吏民㐲進徳荀徳炎張自顯李顯軰若干人疏公平生立秦憲庭願一上聞許廟事之而竟未下豈天以是忠靖為賜額耶鳴呼有待哉公𤓰爾佳氏女直人其地古肅慎氏之國譌為女真避遼興廟諱真改為直太祖之加兵金也嵗壬申五月劉忠順公與定襄公將兵千二百人來降詔以其衆即守威寜十一月金主遣使啗以大官冀其或貳可復失地定襄縳使以聞詔嘉之擢為萬户招討使人有擾爾民殺之傍郡縣未至者諭使急下事有便宜不待立聞一以詔行之凡鎮威寧四年以嵗丙子卒沔國公嗣萬户金符生十四年矣戊子太宗詔從太史國王戰河東山東庚寅睿宗抜鳳翔明年從破宋大散闗夾嘉陵漢水如鳳沔褒大安興元洋金東抵均諸城皆抜壬辰大破金兵均之三峯山不能國矣詔徙六州民留田威寧時天下荒饑獨山北為樂土四方之人其來如歸乙未詔從塔海甘布征蜀田事宜遣官屬何人攝治者以其名聞乃表今湖廣僉省高安之祖安塔哈代領明年凡四川府州四十殘其七人明年公上言興元形勢西控巴蜀東扼荆襄山南諸城無要此者自始取道滅金漢中無嵗無兵其地與民宋棄不有敵不敢復城郭隳而弗完田野薉而輟耕民窘艱食時吾兵來扶戴白以負嬰黄偷蹔生活竄栖太白窮谷之間吾歸則壯者出為盜賊肆相奪攘甚者仇而殺之而生齒益耗誠能留民戍守招徠未降民見父子不分貨錢之得有也其至恐後為賊良膄便水之田授其耕耒假與種牛俟秋穀守什税四三儲之于庾守之以吏征蜀之師朝至而夕廩焉校以資糧闗中荷擔千里十石不能致一者勞費大省實制蜀一奇也制可詔都元帥量留漢軍其新至之民及田事可無時籍數具效以聞仍賜虎符是月制諭今安撫興元軍民制又以為安撫使一月之間三制併下定宗詔行省興元公至行之如所奏營城塹内治堡壘外増鼓柝烽煙得警曰夜十里不絶市肆村舍民廬數萬區悉起于盪焚之餘墾田數千頃灌以龍江之水收皆畝鍾敖庾盈衍矣官舍居第皆高榱巨棟重楶牡瓦宏壯奇麗可百承平舊宇之上亦志不可然也其土豪傑如洋之趙再興成固張廣南鄭㐲興褒城薛仕成西縣楊濟亷水韓仲炳小黄栁智徳潘水薛閨皆割裂自霸昔為吾寇者也至是皆入所據所郡縣宋邊駮毅之將馬仲自閬張文貴自巴李繼之自廣王安斌自開逹亦挺身歸公腹心仗之指臂使之或説曰反寇無親宜有以虞未可日置左右公曰彼哉人也未必狙詐或如爾言誠狙詐也吾仁結而義激禮接而信示何有于不可化宋害其來反時放兵動吾四鏡屢戰殱之辛亥四川制置使余玠輕我師寡身率兵入寇敗我利路元帥王進于金牛壁其軍中梁山兠鍪夜燭城為之赤潛遣裨將燒絶棧道遏我援繼自率大軍圍而攻之鈎礮梯衝環城數匠謂為孤危期日必抜新集之民還叛與敵公警死拒守督戰益急殺傷過當城中將吏晝或荷甲傳食夜則畫地分守㑹都元帥圖思來援無從得塗值三人自軍所逃還許貰其死令導由他山利道出陳倉玠聞兵大至焚圍遁去公襲戰悉止還所浮亡故事祖宗賓天所授臣下制書符節悉收還之太宗嘗賜虎符已歸之官及是憲宗授以軍民萬户再賜虎符詔叙平金戰勞葢睿宗授以軍宗者今兹玠至汝共事臣皆避逃獨汝戰疾力斬敵十五勞苦至矣自是凡千夫長百夫長十夫長下及僚吏敢有違其節度者罪死丁巳詔與故劉忠惠公哈瑪爾立成都七日而樓堞隍塹皆具戊午同故元帥納喇南征踰馬湖江戰皆㨗葢先是乙夘世祖以太弟總天下兵公奏漢中之田闢已十七而税入恒所逋懸其故惟在軍民之官豪有恃者率頑驁負而不輸顧臣力莫如何也下教若曰自今軍民之官田不税者無廪糧是年下教若曰往者興元軍民俱授敏珠爾與汝節度今敏珠爾征蜀比其還也汝専節度之中統三年改授虎符制仍軍民萬户四年請以今左丞堅賢嗣致仕家居十一年以至元壬申九月七日終于興元舊第正寢春秋七十肇于南鄭味溪之白雲里為兆以其年十一月九日􅉎之壬舍男十人女十人男孫十一人女孫八人嘗聞太祖賜威寧之詔裂熟羊革而書之揆以漢氏功臣之誓曰使河如帯太山如礪國以永存爰及苗裔而已無有事不上聞聴以其言為詔行者及定襄卒而公嗣克光前人轉鬬太山之左右濁河之南北崎嶇數千里間者十九年非睿宗奏是功太宗太宗不知非憲宗舉而揚之于克完漢中之詔則是奏天下不聞且他人樹勲于開國之際其桓銘私傳皆出一時史氏之手其間有善于紀述者後者猶掇其蹟刪為一代之典况祖宗埀法萬世之顯謨乎則公父子身荷二祖三皇及今皇帝生榮死葬六朝之殊遇何如也夫漢氏公臣子孫冒守先列者惟一人侯獨長沙王支庶一門數矦然或先後受封非必昆弟並時今公諸子或拜亞相于中或列藩方于外或總戎旅于邊冠紳之蟬聨符鉞之焜煌則縣官覆獲之俾流慶遺裔者又何如也銘曰維公早峙童子植植既失定襄荷其殳斨與老戎行右頡左頑于河之外于闗之内突而前茅無少挫退金社墟矣庸蜀是劉掉鞅之遥九圍半周再鎮雄藩益暫梁久金穀穰穰斧質在手施陽翕陰舒慘自口為艱為勤列聖不忘報之貴富倍蓰其當大府如城雲屋邃邃朱塵綺疏歌鐘清吹聨目脕顔頤使趣風良庖致餼胎豹蹠熊酒酏介歡䔲荈雪滯紈衣四序為聲綷縩昧者安之耽不知還公時白日未薄西山解兵其子時税于野毳廬氊車勝地即舍維嶓之麓與沔之水往往禽魚識其杖几乃知喬松可召與遊倘徉十年歸安兹丘評者異之于古未有紛華寂寞柄鑿不受公而兼之始慎終全由哲其身匪隲自天人之葢棺旋踵朽息公有哀褒于沔開國生平之名煜其益昭矧子維翹丞弼兩朝無久維石莫信者史一刋不磨用告無止牧庵集卷十六欽定四庫全書牧庵集卷十七元姚燧撰神道碑潁州萬户邸公神道碑公邸姓保定行唐人諱澤字潤之曽祖亨祖義生考府君諱琮金符總押真定大名河間西京保定洺磁濵七州之兵戍睢州以卒公年十一世將是軍七年去城亳鹿邑避河流齧移戍潁州城久荒棄剪荆以苃隍塹樓堞官舍民廬皆所經始宋勍將夏貴夜悉銳東南壁公將射士當之大呼疾戰矢下雨注又虞士氣久用將奪戒司史促其漏丙夜伐五鼓敵以為旦出竒騎撃不利客也騰藉崩潰積骸如京創此大治始不輕犯戍是十四年世祖即位如故事盡收臣下先朝制書符節故公金符亦入之官明年制賜還之至元入觀賜錦衣弓矢鞍勒用兵裹陽將是七川兵半以行大保并國武宣公時以都元帥鈔鴉山㧞平塞砦功最幕府賚白金為兩五十金衣一從城長圍襄陽六年當十年癸酉乃下明年從太傅巴延公時以中書右丞相督大軍南伐至郢初宋遣殿帥范文虎將兵援襄陽度不得進為城郢偹鎻戰艦江中列礟于㟁遏我舟帥下今盪舟黄灣進藤湖入漢越郢去從㧞新城沙洋下復師由沙武口入江從戰青山磯多所俘馘鄂隨下行省論功行賞賚曰銀為兩三百明年留故左丞相阿爾哈雅時以右丞分省守鄂大師其東從右丞分兵下荆南功進武德將軍管軍總管又從攻潭州流矢貫肘汰股裹創復戰城㧞進顯武將軍明年從攻静江礟􅀈傷首岑岑垂絶已日乃蘇既㧞從省還湖南其年宋亾陳宜中挾益衛兩王浮海據門爵人號年規為興復倖利之徒在在起應而羅飛張虎周隆尤其梟傑屠殺長吏刼民為兵動萬為羣阻山為砦以抗官軍衡永路絶公從􅗴平生致三渠裭皮以獻進懷逺大將軍萬户虎符俾將其軍監郴州位總管上至則平郡賊蕭良弼刳兵之餘城中户纔四百布檄招徠安集之内則基屋火餘外各復産其鄉期年將倍萬家孔廟尚茅屋擢進士左元龍為校官佐其工材俾任興葺稍如平時州界韶酃遏韶㓂不窺冝章而興寜之民效惡酃盗聞宣慰司將調兵萬人加誅未啓行公衝焉摯金帛即說曰今盗始起而從徒未繁官軍遽入民懼俘殺必出逋逃無所適歸勢與盗合是驅使為逆也請歸身任致討許之乃歸召父老豪傑曉曰吾止官軍不使得暴吾境汝佃民有從亂者不以相坐聼執送余自贖得五百人惟誅首事二十人餘悉縱還南畝連三大役始得占城之師入以深蹈死地忿怨無施所經城市肆行剽奪瀕道居民十室九空六耰絶種至郴亦然公捕得為暴數十人械送軍中詰其部將威公不伸皆市杖之其徒一夕潜遁踰境再以日夲之師貴造海艦十五艘度費楮幣為貫七十五萬取材有制戢吏侵牟用未能半事已告集後以交趾之師賦餽来千石入桂公曰自是入桂陸行千里負擔之民人勝五斗而止已二千人為擔夫負裝糧者半是行未中道委負而逃可前知也乃集丁之家謀曰吾將出家貲貴諸縣即桂如數䊮之上不失軍興而下可紓民力何如衆歡吹稱願他日比貸錢如子來歸公悉選其嬴又請罷陶坑銀鎸户賦酒醋嵗荒發廪而後聞皆良政也又遷廬州䝉古漢軍萬户郴民耄倪號呼遮留如去親戚未至改潁州萬户戍無為軍至是七路之兵全集戲下而軍容益盛盗起江東省以公威信著譽檄公以其軍討之饒信先譬以禍福皆不煩兵而從宣徽怙惡乃夷萬人于南陵旌徳涇縣又鋤萬人于績溪尤劻勷劻勷璧何秧塘山山周十里峻二百犬省臣以六萬衆攻之數月不能下者因留戍徽蒹拜都萬户之一軍徽民方安之尋還無為省議餘杭勝國故都非得如公老將一軍遏而閑之綏而安之不可故移戍杭以二十有八年其嵗辛邜夏六月二十有一日卒年六十三平生忠直沉毅讀書專經左氏春秋故能謀成而事立臨財不恡施予有積則均之昆弟姻戚其再至潁故人部曲捐金委帛致殷家及疾或在告計日辭禄後卒十三年子武徳將軍潁州萬户戍杭元謙紹介其友劉致持事狀為書燧曰先公之匶藁藏潁濵今將舉歸先塋数宜有碑不得君銘恐勲勞不足以信來世敢泣血請故銘叙此嘗聞國初以二萬户鎮撫中夏右則劉伯林軍秦左則納罕重山軍燕顧成則益大尉忠武史公天澤為真定河間濟南東平大名五路萬户于中後强諸侯頗以力夷惡相下屬皆求名將其軍而千夫之長亦凱得焉由是萬户布列天下其勢雖分然父死子繼兄終弟及相傳虎節一命三品世世不絶則未始變不若治民治賦之臣者死子孫以門功官自下而髙如升階然所可儕比則國家貴以捍侮四方勸忠而收其死力者豈不至且逺哉觀公造家譬則為山嗣睢總押其覆簣也于時是官未必視長于夫何以言之從下荆南勞亦􅀈矣授以總管得以千夫之長同禄轉而西南勁敵是膺堅城是臨莫不賈勇奮其前殳顧以是身于鹵三軍入百死而一幸生遂長萬夫比德開國大藩諸侯殆成功九仭者其為大夫亦壯烈矣然非凴夫大帝赫恕有是南國用武之地技安施哉此夫史公賛蕭曹輩為依日月末光隂符所謂天人合發者也三夫人元配郄氏嚴于持家前卒二十一年繼配兩王氏姊娣也前卒十年姊顧為繼後卒九年三男元謙以佳公子既世虎節好學而文雖居平時營栅部署器械車馬凛如在敵又識世務省訟難惑多資平之次元恒四女適郄長官子璧閻令子齡齡鄭元帥子端仁萬户賈榮祖三男孫長禥㓜未名二女孫銘曰嗟若邸公初由羇童嗣秉父節睢及鹿邑凡戎十年旌敵尚逖城潁而南地交壌隣勍將未嘗時已能軍寡謀輕襲大北其羣㑹帝考貢曰是南紀于何蕭茅曠入包匭乃畀丞相百萬烝徒江漢㴞㴞鼓枻以浮分狥坤隅置公前驅登陴長沙桂林入俘大惽小悖剪無稽逋從戰萬里清楚以吾歸撫其軀矢石遺餘嘗曰臣子居則有異移孝為忠其道豈二當在父側子職焉㳟寸膚之傷䀌心瘝恫及身而將三軍奬率鼓鼓以前顛首奚恤惟公懋功其賚何如虎節皇皇雄長萬夫上昭祖考下傳旄棨子孫其承世守無止匪直克忠孝疇大斯以語燾後幾何其慈冝爾有子踵武之踐四十已聞慎保垂憲爰發潁匶歸從殳丘列勲子碑貽久是謀袁公神道碑袁虞舜裔也舜生姚墟居媯汭子孫以地姚姓以水媯姓以有天下之號則虞姓及周武封胡公滿于陳以國陳姓以陳公謚胡姓袁則肇于陳大夫轅濤塗西京轅固生猶未省文至後漢太尉安而下始為袁矣其家太原石之臨泉者不知始何世何人所可譜則在金有隠德農畆者諱亨生廸業儒愽極羣書尚氣節不食然諾生企京有父風生鐸丰儀煖􅁱克世其家學實生今延安路總管公諱湘字潤夫金之蹙國王公佐持節鎮葭蘆當吾元勁兵之衝殫力竭謀惴不自支一日集將佐使各推辟所知可與計事者或言公賢為書致之三往返始來用其䇿以守則完以戰則㨗衆論多之聞諸汴京官以忠顯校尉遥主延安之延長簿再以功超武節將軍令臨泉石與嵐之合河恃公為藩援以安者五年後王公佐卒鎮人心離異不可復一公曰吾愛一死哉死而兵民完何害敵以不即下藴怨積憤于我者為日已久吾死而捐兵民以甘其心吾寧忍哉遂乘夜載鴟夷濟河欵我大將孛罕營降解所佩誓曰所有二于公者有如此劔將孛義之相與飲酒盡歡以便冝升臨為州版公為帥遣將州兵略地鄜延悉下之移鎮延安臨民徳之寧輕去其鄉不忍去公多携家來從朝廷定賞納上功授延安路兵馬總管時既偃甲兵民方去危即安公敦勸畊稼裁抑㳺隋使各食其力隣境聞之逾河而西雖有良田美業不恤願記處深谷者不可勝計公符其守令居借之廬畊助之牛儒生之賢而文實聳人曕聲動人聼者如侯丘嚴明焦舉張華王明畢美邵瑞張輔之流欲仕者則登之幕府以師羣吏不者則升之學宮以範多士由是悍俗消草而禮讓興行矣㑹大料民止籍主户漏其僑家浮客者或咎以何獨損吾户數公曰若欲肥版籍以衒庻耶一旦賦役下僑浮生心必計曰等賦役也與避人境而不免何如歸吾鄉之安焉客去而主孤實亡而名存祗益累也人服其能圖逺其後河東山西果徒其民公謀使者曰若所以必徙者豈以代吾賦役而汝無得哉吾所籍止主户未嘗妄以僑浮為土著版冊具在可稽也何如勿徙使各奠其居即是民推擇置吏嵗集其職入是以吾土育爾民奚必徙其以是歸語汝帥使者亦度民業已安此雖徙之且道亾不逹許之而還尋有詔令民隨在占籍公猶仁其浮僑為輕其調庸同列害其能且位加吾上多行金帛貴倖以訟公徴使就辯公䞇貴幸幣殊涼薄庭臣以訟者之言方騰能不以賄免顧歎重其忠儉歸益自刻勵四方行李至者相踵廪肉不足為射獵鹿豕以繼贐勞之須皆出其家不足則從富人稱貸郡民之豪傑謀曰吾屬依公以生坐視寡乏莫之省恤人曰我何捐金餉之亦謝不取及大封宗室割所治為公主湯沐邑有説公厚斂入謁可結主知且無令同列得先之也公曰吾豈利下市寵者耶不行先朝時今上以大弟之重徴南詔駐兵六盤山公見行府建言始延安之籍民為兵皆懸賞募之人率收銀三十両始行及逺戍久役津餽不如子前老稚日困于家則怯者挺身而孤亾勇者連伍而俱歸軍吏以法誅之莫之能止也非大選閲郡民厚業饒丁者更代以休其力盈其氣則兵帳不完上然其策讓隣道臣之在行府者曰若曹之來其所請求不過官資之崇􅋻符篩之輕重便已私耳亦嘗有一白軍民利始袁湘者乎聞者愧讋自是雖不自行遣官屬有所奏請上必曰若從袁湘所來耶言輙報可嵗癸丑冬將適京兆未至病歸人來唁疾公安之言笑如平時夫人問焉一旦公疾小加于今日如吾母子寡㓜何惟治命是聞公曰吾平生所為無有不可語人者天將後余是外非若知也以十二月九日卒于正寢年五十有九以某年月日歸𦵏臨川某郷里先人之兆次凡再娶死配焉氏繼配梁氏子男三人馬出一人未名前公卒梁出二人克忠昭勇大將軍隴右河西道提刑按察使克良捉舉太原採木司女二人馬出伯適定西州尹富察仲徳仲適中部縣尹張欽用男孫四人長仕圭餘未名女孫八人在室十八年燧以陜西憲副録囚延安昭勇居自隴右得告家居二際言色固以心推為鉅人長者若不見毛髪比出紈袴習者古之人有云觀其子可知以有父矣明年克良持君書與公事状謁銘墓碑因得究公為人益自信昔者觀人之不大也盖嘗論人之生紛綸尚武之時懦者固不能以自立惟强之依而強者或徑行面無謀亦旋取效亾善謀矣其力不足以先衆則人亦莫之信而為之使嗚呼公以此時克樹功業裂地而侯以傳諸子亦戞戞乎其艱哉是可以載行事于石而見白子後世也繄袁之先世繼顯賢由金百年力本乎田起培而行篤公之自逢時未靖實艱初試人求其生雌從雄鳴有距跳跟有翼奮翔臨泉葭蘆襟帯河山公居其間撻其悖頑智資我謀勇但吾力我麾我招莫不順適國歩未改效死我臣天命維新吾生斯人府葭延長綏舟鄜坊我旗樹降千里其疆朝為逋亡夕則樂康人無我敵束爾矛㦸敏而耕桑督而蠶織而方瘡痏孰爾朘刻孰顰孰呻喣手摩撫隣曰時哉爰適樂上寵光不希鈞言不危説進可行舟扆肯頥不年承辭延民之思今三二年如在柩時黄髪齠子枚誦其美事上之忠繩下之嚴生民之仁與人之謙顯親之孝奉已之廉人一二有公乎其兼延民之恩日逺則㤀我詩之碑百世昭章光禄大夫平章政事啇議陜西等處行中書省事贈恭勤竭力功臣儀同三司太保封雍國公諡忠貞賀公神道碑大徳九年榮禄大夫平章政事上都留守兼本路都總管間平府尹兼虎賁親軍都指揮使賀公以年七十有二丐老制進光禄大夫平章政事啇議陜西等處行中書省事賜白金為兩五百楮緍三萬五千錦衣玉帶既遂養安其卿又以其子參知政事勝襲上都留守虎賁十一年成宗格天儲皇削平内難夏五月念舊臣將有咨度俾中書遣使馳傳召之承命即行而道疾皇帝嗣位下詔萬方其播告使遭諸樊橋以勝參知政事上都留守進拜平章政事為慶公撫膺感極而薨七月九目也年七十四訃聞三宫迭為惋悼遣騰馳十乘傳奔赴隨贈恭勤竭力功臣儀同三司太保封雍國公謚忠貞至人二年七月二十九日行在南坡以公墓碑未銘敕翰林學士承㫖臣燧撰述之仍俾勝馳十五乘傳入秦身視鐫丘嗚呼其榮生哀死始終于公為何如公諱仁傑字寛南其先河東隰州人居京兆則曰祖送徒考惠賁特降金符京兆總管諸軍敖拉贈輸忠立義功臣銀青榮禄大夫司徙雍國公謚貞獻初嵗壬子憲宗國母弟世祖于秦受詔征雲南榪牙略畔之山明年將戒塗貞獻作室得夙藏以白金為兩二千五百來上曰陛下封國所出臣何敢私願佐軍興又曰臣子生一十年矣力能荷祋請置顔符王將備其不已白而専為也幽貞獻長安帝聞之怒縳王將至將中危法以開國世胃而釋公由是入偹􅀫衛經吐蕃㬅沱渉大瀘水入不毛瘴喘沮澤之郷深林有壑絶崖狹蹊馬相縻以顛死萬里而至大理歸由來塗前行者雪深三尺後至及丈峻阪蹄氷為梯衛士多徒行有逺踰千里外者比飲至略畔最請軍亡失馬幾四十萬匹後從濟江歸正宸極眷寵日加征伐蒐田無不從負御服物多至一二十事風雨霜雪寒衣露處饑竭皸􅏿未嘗告勞他人滿直三日而更獨公輿董文忠為長上侍疾或一月不至家燕聞喜訪聞外事至元十有一年梅應春舉瀘州降制即以為其州安撫使明年大兵圍重慶人明年制使張玨遣王立潛師襲瀘取之臨應春殺戍將千户熊耳而有其妻宗甚嬖之宗王相四川行院李忠宣之外妹立後移守合州行東川院者則憲宗李玉器械哈丹庫哩濟蘇二人先朝陟方乎此㧞將甘心故合益負險不下宗説立遣張邰軰蠟書問行至成都請忠宣受降忠宣從五百人至立則開壁納之忠宣以王相罷置其吏而去東院械立奏殺之時安西王受詔征莫比未知合既下也自軍中下教長安遣燧乘傳招之下則許貸立死以為安撫使而誅立敕使先至其日將醢之而教亦至東院以敕教逹行死生異也破械出立而幽之别室相符東院各使再請宥宻以帝有成命不以教聞會西院遣都事吕端善他事至京語公其然公即入聞帝詰宥宻臣曰卿軰以殺人為嬉耶使立生至則已死則汝其從之驛致立為合之安撫使虎符先師許左相多公力能囘天還而立見謝曰教治臣于始賀某活臣于終惟死以報明年帝怒王府一相大治宫室凋弊秦民召至而不敢見公為譽釋于中俾仍相秦以歸其年内出白金陳御榻前如所上數前公謂曰此卿父略畔佐軍興者卿母在此其以是供具為養辭之不可歸請其母曰君賜也冝仁吾宗悉㪚之又明年授正議大夫上都留守兼夲路都總管開平府尹又明年授資徳大夫兼虎賁親軍都指揮使加佩三珠虎符十九年帝曰昔從太祖飲水黒河者至今澤及其子若孫其從征大理者亦朕之黒河也安可不録其勞悉大賚之于公加恩數焉年既及艾侍唯幄日久事益明習人以宻近夭光丞相而下猶必咨託俾詞動静而始入告如是而不怙威不矜寵不黯于貨克兢畏清恪自恃故有言必信晨夕彌縫滋多事祕外不聞其顯知者知擇童女實掖庭命既下矣公曰宫妾不足于使令宜妙擇高門徳望之家端嚴明淑者當之豈可槩行以駭天下聼聞使深山窮谷擁瘇麤惡之子不待其年而急相遇非昭代盛徳舉也又古貢方物皆其上冝今者和市非産其土一切征之増直倍蓰無所于取吏責後期從而罪之實病民甚又水盈司倉任文通稅民不入粟而私給劵取直其外檀事覺顧先陳他吏之為辨服其誣當誅公言罪許自陳得原者令也彼雖誣人事同自陳若重加罪則塞悔遏之塗有言事者亦將創矣又煮海為鹽由人力以出者也山後諸州漕司必逺餽與民而徴其利今頻上都池泊皆鹽實天惠養則人者無有課人禁不得食有盗食者罪當沒歴終不能止而冐犯滋衆是為􅀢畿内也帝皆然之止童女勿擇物非其丄所出勿和市免文通死重杖以懲鹽弛其禁民争徳公為廟李老峪設像以祀三十有五年進階榮禄大夫中書右丞以于勝為中書參知政事及僧格為尚書省以威制天下大為鈎考奏公為留司上都錢粟損失頗多時其長則國人烏納呼及庭辯公曰臣漢人也是雖非臣盗取不能戢吏為姦罪則在臣為之長者則曰臣司留邵事未有不白臣能出者惟當罪臣四十日中彼至七十餘奏而爾公争自罪終不易辭帝曰受爵而推人者有矣罪至而争引歸已者惟汝二人其罷勿竟則公見信于友而結知君者非有素可襲取耶然計始入臣以及丐老實五十四年掌留鑰者居半倉廪府庫一俟啓閉衢去衣食亦仰均賦乗輿嵗至比其南也少乃數月頓舍宴享諸生百司送徃勞來細而米鹽燈燭大内之中奔走徴呼一日數至其所受委不怠下㤀克當聖心未嘗取其逆怒以故資身百備皆出賜予最其多者楮緡五萬玉帶珠衣宴服貂裘華飾可等國人貴臣他珍玩不計人則置之曰不過受也斯其君臣之際交孚然也其家庭則數嵗必一歸省于秦既至不可以久一再月則必牽衣流涕而别前夫人劉卒宫中欲女以國人公以漢人不可偶是鉅族娶從聖武西征留使鄭公師真之孫數年而䘮明三十年終不以疾而失歡其初無媵侍在旁遇寡嫂嚴而有禮與諸弟雖篤其友必飭其過妹夫不謹宵直至撻之與人交坦白以誠藉位勢以暴人者不下也以其年九月二十有一日葬鄠縣太平郷貞獻公姚夫人鄭兆次前夫人劉祔公二男四女勝踐公平章又請推恩上及祖考再世國雍其為孝也大孰加兹與過二都兵馬使𤓰爾佳哈布爾者劉出也最後公薨再月而卒與適河東山西道提刑按察使韓世英子慶今參知政事董士珍子守正虎賁親軍總管楊祺者為鄭出男孫三慶寧興與女孫二皆㓜是正系也其宗從則伯父貞不仕季父斌同知京兆敖拉總管府事四弟義立今同之朝邑禮貴不仕智明營州判官信仲四川南道宣慰副使妹適王權省子貴子男十八人女半之男孫九銘曰大帝淵龍華臣之逄孰近而初孰久而終為世所知同公流輩百十維人官出皆外凋䘮相繼惟董文忠朝夕帷幄與公友從珥侍中貂廿有六載董先朝露乃眷公在生人于死引慝其躬民瘼之求悉其勞庸位亞人臣晚極其報乂爵其子公武之蹈迨歸老秦制曰禄之俾其省臣事諏政咨曽不再稔方銜國恤震邸見招竭蹷力疾天不愁遺道薨樊橋五十六年始終兩朝今聖曰嘻奉常汝諡主爵玉署汝封行制凢厥哀死無後邦經乃陟保衡忠貞易名乃與乃考于雍再國若稽夏書九州有一餘受封家孰京與夷皇上猶以墳道未碑乃敕禁林臣燧次述公于佳城奚憾不足胥是有扈左豐右甘名與不磨終南在南百夫長贈中大夫上輕車都尉曹南郡侯昆都岱公神道碑至大三年下詔萬方推恩中外一日官之先昉于五品由庫崇等而上之列為五爵五品四品由男而子其封皆縣三品二品伯侯以郡一品則國公其世數男子惟考妣一世伯侯及祖妣再世國公及曽考妣三世而極用是中大夫尚書吏部侍郎桑烏遜職登從橐既通以顯贈其考昆都岱中大夫上輕車都尉曹南郡侯祖庫春中大夫上騎都尉曹南伯祖妣額布勒特哩太君妣周太夫人妻馬夫人皆同郡曹南吏侍將侈天寵于碑請燧銘之故摭太常愽士王天祐之狀以叙在太宗世欽察猶未附定宗憲宗時猶王也詔與大將河南王蘇布特討平之其部屬始至中土上騎則其前諸孫頴河南王戯下長百夫以卒公嗣為之從平河中下鳯翔殄敵軍鈞之三銘山破汴蔡滅金後詔王戍河北公始家曹之定陶又從諸侯王扣肯布哈及大將察韓伐宋寒出暑歸嵗以為常殘漢上之襄陽郢復徳安援淮右諸州轉闗千里登陣䧟陳斬刈不可馘計幕府犒功居諸將先金實于櫝衣溢于笥馬連于櫪歸則課僮奴耕稼畜牧隨致豐潤性倜儻嘉施時節撃鮮與閭里故舊為樂其後戍光嵗戊午宋兵犯郛率死士出禦斬獲過當中流矢輿疾至家卒年五十一葬新興東原夫人則周亞尹女也皆柔淑清恭婦德母儀稱于婣族子二人長烏格岱尹出嗣長百夫從攻襄陽新項老白都統濟江下鄂定淮浙由忠顯校尉䝉古軍總把錫金符監真定河南曹州大名翼千户觧職子某次則吏侍從淮安王巴延河南王阿珠濟江元帥府知事升經歴以給西京河東䝉古軍衣糧鈞賜鞍勒弓矢鈔二千五百千入為衛士出監武邑真定兩縣真定升州同知州事進官奉議宣政院斷事官進朝列院經歴驛徴西畨負金為五千鈔八萬五千丁妣夫人周憂依墓為廬摧毁自致鄉里孝之尋起參議院事升西畨宣慰使虎符入為郎銓曹從平寧王亂大㑹供億不乏賜爵二級鈔二千五百千男孫七忠顯校尉某嗣長千夫瑪爾河西福興酬尼資布哈實都皆㓜女孫八人五歸名門嘗反覆䆒觀自上騎至吏侍纔三世矣而歴事太定憲三宗世祖成廟前聖今聖七朝雖不可方開國諸臣亦善承其家者而吏侍􅀹敬慎寡過有才臣稱銘曰盖嘗論刑其極斧鉞誅止有罪猶有小罰大刑維何無慘甲兵幅員判裂争地以城淵淵伐鼓陣子原野入死出生决食頃者嗟哉維公束髪即戎進退金草奮不用躬于河于漢于淮之亂金㓕戡宋勇必軍冠無眼維矢信不識人不殪懦大而賊果臣其在兵志士而死轡庻于事君身曰能致雖死已久而名則延中子垂周卹章自天亦本孝子吏侍之籍其丁内艱即墓而舍敕起院參使畨西南佩之山節虎視眈眈入為郎官銓曹是賊日月為斷當其陟黜矧又兄子方長千夫將久其傳黄金世行門閥之崇有耀閭里碑以表阡百世伊始南京兵馬使贈正議大夫上輕車都尉陳留郡侯布色君神道碑布色氏始由普爾普以佐命功位司空生司徒巴爾圖司徒生太尉哈喇連姻帝室生世宗母宣獻皇后與金紫光禄大夫統軍巴勒統軍生世宗元妃與鎮國上將軍布展鎮國生昭勇大將軍守道昭勇生君諱長德年二十一頎軀偉觀精巧騎射以扈宣宗播南京功官安逺大將軍遥領濵州同知壬辰義宗播歸徳不及從其明年㑹西靣防城提控崔立舉城降盗發陳州南頓項城沈丘假公金符將二千五百人徃平之而劇盗張進犯京陳橋門又殄之收盗積蔽賚以極饑民後從諸侯王伊克南征殘漢之襄樊棗陽郢復徳安淮南黄蘄及安慶而還時未改汴梁版南京兵馬使改令中牟原武太康三縣入為南京警廵使再為兵馬使至元凢年養安其家以十五年四月三日卒年八十五夫人張氏前卒二十年合葬祥符縣之某鄉後三十五年當皇慶之元子荆湖北道宣慰使翰文走書燧曰吾先人仕太宗朝未大清顯庭臣哀其驅馳與剪荆棘茇舍以招徠于戈餘民安集三縣警斥㓂攘于河之南勞勩三十有六年與翰文自學仕略其卑官惟疏九制王府郎中令倅開成路歴知松江漢陽二府入為中書考左司郎中是職也凢陶冶四海之官學夫經國之賦議禮制者皆出乎手非其人有時譽者不授翰文得之其材可知出同知淮東宣慰使轉平陽總響與今宣慰荆湖父子相繼七朝請如故事褒其𤣥墟制可即其考長徳官且議大夫勲上輕車都尉爵陳留郡侯妣張陳留郡夫人祖考守道太中大夫輕車都尉陳留郡伯祖妣完顔陳尹郡太君翰文故妻暢陳留郡夫人臣焉叨此昭融極矣今也有孫兩人伯珪季璋私廟時饗能執豆籩足免無後不孝之蹙求可筆是事國家家之槩者匪公其誰故即汴士張孝友之狀以書且告所未知者曰金有天下諸部各以居地為姓章廟病其書以華言為文不同敕有司定著而一之凢百姓金源郡三十有六廣平郡三十皆白書隴西郡二十有八彭城郡十有六皆黒書其等而别者甚嚴布色氏于金源次居五其素為華望之家不言吁喻銘曰猗嗟之家其在盛時奕世三公男女結褵不于庻姓于帝之室大定哲君猶所自出金厯既祝一氣之機無成不渝無顯不㣲存者遺胃伯千􅀈一今由子貴推恩爵秋祖伯考祖輕車某勲郡子陳留覃及妣嬪勒詩豐碑光華孔煜名與沔流瀰瀰無竭牧庵集卷十七欽定四庫全書牧庵集卷十八元姚燧撰神道碑領太史院事楊公神道碑嗚呼有秦君子楊公諱恭懿字元甫其先始鄉耀之同官中避宋亂徙美原五世祖儀徙今京兆之髙陵與髙祖亨再世力田曾祖植祖禮再世仕縣吏考天徳擢金興定進士第由博之聊城丞掾陜西行臺權大理寺丞主今兆長安慶陽安化簿辟令順徳之隆徳及安化而安化兼録事州之判官三職其脩積官中大夫其徳其烈有先師司徒許文正公墓誌言章宗南郊為太常臣授幣而立御史將劾不恭其友曰大夫習于禮者名行祕言盍從而問曰授坐不立御史慚縮而止太常則孫公通祥實公外王父公以正大乙酉生于其居京兆之雙桂坊童而讀書記識强敏日數千言時艱從中大夫逃亂而東不恒其居于汴于歸徳于天平雖間闗險阻未嘗怠弛其業年十七侍中大夫西歸無田于郊假室以居鄉鄰或繼其匱皆謝不取惟服勞以為養暇則力學綜博于書無不經目而究其心者樞衣之徒户外滿履横經入問為析疑義源源其辭若決江河而下之名聲日延海内縉紳友太中者馳書交譽知之膚者求觀其文侈其肆者以為鱣堂之席有繼與其極者直期以宗盟斯道于將來時已邃易禮春秋思有纂述耻為章句儒而止志于用世反覆史學以監觀廢興存亡理亂得失于千數百年之中曰輔世之具禮樂兵刑禮樂非王者果為不可興行于天下兵恃以芟暴亂而安元元刑取其弼教循本以求皆仁義之資也不講之有素或一旦帥三軍為士師貿貿焉不知其方反受成教武人俗臾乎事雖未試從可㮣見其佐王之略年二十四始得朱子集句章句四經太極圖小學近思錄諸書誦其言而推其意嘆曰人倫日用之常天道性命之妙皆萃此書今入徳有其門矣進道有其塗矣吾何獨不可及前修踵武哉窮理以致其知反躬以踐其實動静云為一乎持敬行之以剛健居之以悠久日就月將俟其成功于􅅗齋之下自任益重前習盡變不事浮末矣嵗甲寅司徒奉潜藩教來秦公往見之際其道徳之光聞其仁義之言于傾葢頃心歸服曰世烏有斯人之倫敬事猶師而司徒友之亦至分庭而行抗席而坐一遇講貫動窮日力而所造益深平居訒于為言䘮中大夫絶口水漿五日䘮𦵏用牲盡袪䘮門惑世之法為具不足稱貸益之棺槨皆黄腸衣衾必縟疏衰􅊡粥悲憂為疾杖始能興司徒㑹𦵏歸語學者曰小子志之曠世墮典夫夫特立而獨行之其功可當肇脩人紀聚居六年司徒東歸𦵏夫人猶中大夫其疾益阽三輔士夫而知由禮制自致其親者皆本之公先是宣撫使行省欲以掌書記共議事祿之皆不能屈至元七年詔司徒由國子祭酒拜中書左丞始與右丞相安圖共政日譽公賢丞相以聞十年上遣協律郎申敬來召疾不能行十一年儲皇下教中書汝如漢恵聘四皓者其聘以來故丞相遣郎中張元智書致是命其冬下車京師上遣大臣勞其逺來他日入見上問何鄉先徳為誰從何師學子今有幾無不周悉其夕嘔血上遣尚醫來候且賜之藥少間明年元月元日之翼日上御香殿以太師南伐使久不至方念之深欲筮之時以日者待詔公車百十為輩獨以命公蓋以其道徳素著可交神明者其言頗秘侍講徒單公履請設取士之科詔先少師文獻公司徒竇文正公與公雜議公上奏曰三代以徳行六藝賓興賢能漢舉孝亷兼䇿經術魏晉尚文辭而經術猶未之遺隋煬始専賦詩唐因之使自投牒貢舉之法遂息雖有明經止于記誦宋仁宗始試經義亦令典矣哲宗復賦詩遼金循習將救斯弊惟如明詔嘗曰士不治經學孔孟之道日為賦詩空文斯言足立萬世治安之本今欲取士宜敕有司舉有行檢通經史之士使無投牒自薦試以五經四書大小義史論時務䇿夫既從事實學則士風還淳民俗趨厚國家得識治之才矣奏入上善之丞相每咨世務倚以自毗㑹其北征公遂請畢男婚而歸十三年詔改厯太史王恂總算同知郭守敬推側司徒明厯理或言公嘗推厯終一甲子而得日月簿食者七十有竒曰日月之𤯝古無是之多也十六年召公著厯義十七年詔時厯成奏曰黄帝迎日推䇿􅀢頊載時象天堯之欽若舜在璣衡周太史正嵗年以序事皆日官世守其業隨時占考以與天合暴秦焚書廢古偽作置閏嵗終兩漢因之建厯之本必先立元元立然後定日法法定然後度周天以定分至賈逵譏其守一元不與天消息杜預謂當順天以求合非謂合以驗天者皆確論也臣今治厯廢厯元日法析舊儀六合三辰四遊而異之省天經黄道惟用四遊移天常赤道遊于南軸之下以取候視之無窒倍八尺之表而五之以影符進退其晷使不失於芒忽日日測考積月為嵗積嵗為世必于厯法益精益宻非但正數十年一改之弊且可上追黄虞三代之舊矣又曰一月之始日月相合謂之合朔漢太初厯用平朔法小大相間或有二大以故日食或不在朔先後一日時亦鮮中宋何承天䇿四十年得三大三小以正朔望使食必在朔隋劉孝孫劉焯為定朔唐博仁均取以造戌寅厯貞觀竟改從平朔李淳風造麟徳厯得四大三小求避人疑間以平朔又為進朔使食避元日一行造大衍厯以為四大三小何害今授時歴後是二年當十九年自八月後四月併大實日月合朔之數皆改從實方奏太史臣皆列跪詔獨起司徒及公曰二老自安是年少皆授學汝者故終奏皆坐畢其説亦異禮也授集賢館學士太中大夫兼太史院事明年以徙家得請歸又明年儲皇俾靈臺郎岳鉉召後中書議相承㫖李濤儲皇不可以公為識治再召又明年詔詡儲皇以為太子賓客二十二年召明年以昭文館大學士正議大夫領太史院事召二十九年以耆艾議事中書召皆辭疾不行三十一年亟疾親賓問之忽長息曰有是哉國哀也聞者危之亂以他言徐又曰誠哉後三日顧言子寅曰敬慎小心以卒實正月二十有五日也後嗣位詔下則賓天果以其日人以為平生與國至誠所格嗚呼使入哭者有如温公則公當亦如吕誨起言天下事矣徴士蕭􅆽誌其墓曰朱文公集周程夫子之大成其學盛于江左北方之士聞而知者固有其人求能究聖賢精微之藴篤志于學真知實踐主乎敬義表裏一致以躬行心得之餘私淑諸人繼前脩而開後覺粹然一出乎正者維司徒暨公嗚呼誠知徳不易之言哉後十年寅以江南行臺監察御史疾得告去自金陵過宣以燧少受知公而耳其雅言求銘墳道然所貴乎君子三焉耳得于位耳道耳得于心之謂徳用于時之謂位行其學之謂道如􅆽之言同其徳矣未及位也以年考之司徒之生前公十有六年入見前十有四其卒也前十有三而卒官皆昭文舘大學士領太史院事同其位矣然是位也皆極人臣之亞為古八命位實行道之鎡謂不得君知名而召既至則溫其玉音以勞疾則尚醫交候饋藥大官繼膳疑政賜問入見坐語聞辭則留留而不可暫聴其去去而思之復召司徒十召公八品其體貌之亦至是哉如是而兩公迭為循牆不可謂道之行亦天也雖然天道逺遥不可以已事而知必來者始見猶農夫焉未有播粒于土而不苗者今也四海匪獨士子凡筐篋之吏求售于時其誦而習亦先四書蓋天理同根人心誦其言而衆則為其道者將多非兩公肇是太平之基其誰力歟斯古之人所以重歎其善作而不必善成者也公以卒年三月從𦵏中大夫之昭文有潜齋遺稿髙祖姚齊氏曾祖祖妣皆紀氏妣寇氏孫氏夫人李氏以柔嘉作配君子姻里徳焉三子寅其胄也寅令令京兆蒲城㝐方學女子子四人適主京兆長安簿席貽士子馮嘉鳯翔提控按牘王繼述樞審院椽傳昱男孫僖女子子二人長適吕曾幼姆銘曰維天生賢匪使自有俾拯烝民為責已厚公于明命實肩實負乾乾其行艮艮其守師古䘮祭如禮不茍三綱之淪我條自手推得其類無倦誨誘學者宗之西土山斗鳶飛魚躍潜齋自蔀令聞之延已徹宸黈束帛戔戔賁及林藪丹扆曰來何暮汝叟大師之南伻斷已久其宜進退汝蓍以叩又曰多士文字儷偶求得碩才奚䇿以取又曰厯義羣啄紛糾汝折衷之其從誰某凡是大政無不可否公拜稽首澹膽悉剖丹扆曰噫惟兹儲后端本萬邦汝賓以友儲后曰今識治黄耉惟汝為可股肱元首公益抗章臣早衰朽養安踰紀僅止中夀歸從先藏奉政之阜止阡有碑無我樵槱垂詩千齡以告爾後鄧州長官趙公神道碑有虞臣伯翳佐舜調馴鳥獸賜嬴姓其後費昌去夏歸商為湯御孟戲中衍為太戌御至周造夫為穆王御服盜驪驊騮騄耳之驥西廵樂而忘歸徐偃王反復御日馳千里破徐賜趙城為趙氏其子孫㪚居何望傳次幾何至公者不可記然由所記憶其先家代之繁畤金亡去其鄉凡再徙始為冀之衡水人又為蔡之平輿人天興癸巳之棄汳播蔡也公以善射足力材兼衆難倡義兵數千為帥聞天兵圍蔡急城中糧絶乃率部曲發平輿富室藏粟負擔疾戰百死奪圍上餽召見行闕嘉其忠勞敕銀符提控復潰圍還保平輿明年甲午金亡將戲下步騎數千下宋時襄陽制開閫改信効左軍統制制閫後厭降將多恐聚此叵測漫為受犒欲致盡阬之大尉江海䇿曰且人窮而來歸誅之不義又吾閫所節度四十五軍半北人令此加誅則吾軍北人各有心矣徒足啟猜長亂漢北之州獨鄧近去吾閫程再日耳北與敵隣乘彼虚棄未戌盍遣是衆先之在彼有生降之徳在我有復地之利一舉而得兩者也閫然之别遣路鈴哈雅實克將若干千人為監來戍至則與實不相善益聞前吾所好相下而顧不容將以計誅又一軍譁譟皆言制閫不足為盡力㑹明年乙未十月天兵略地漢上集將佐南門商戰守宜公扼劍前衆曰始吾下宋正求活我戲下數千人與若妻孥而制閫欲一切以計殱之情露而事廹者數矣今幸出戍不獨任吾别將監之一旦誣以他罪盡無吾噍類反掌不難為也誠不忍若泯泯膾脯冦手必歸皇元後應者斬統領徐海獨辯不可立斷其首以狥一軍皆呼抃受命馳造實營執以出盟令呼宋兵投伏脱甲不吾犯若一人盡歸之襄陽如輙肆動皆誅死實駭汗異常目眙瞠舌橋然不能下頃不得已乃親呼其軍如所教者于是皆受命復與將佐為約是州生齒十萬今日之事將求生之非固苦之將思完之非固離之衆曰生完之耳離苦何為公曰若既相思矣其無殺人父兄而臣妾其子女以利貨財與懐復許矣衆又曰不越公命也乃開門納吾元兵事成終朝肆不變市為具車馬遣實令將其軍盡還之襄陽少不怨制閫昔者圖已而甘心此軍也居再月太宗為太子南征過教以是城甚近襄陽虞力孤不能以自完且嵗荒與均唐三州民徙洛陽之西三縣鄧治長水均治永寜唐治福昌許公權宜行省事乃先勞分苦佐乏藥疾剪棘墾萊府寺田廬於粲一始明年丙申襄樊亦徙洛陽其年公入覲特賜金符錦衣許出戰督軍入守字民别降銀符八十金符八以酬從公將佐同力者奏洛西嵗又荒乞嵗得大名軍儲米為石四萬五千陜州鹽為斤若干萬以廩餓人制可如是資食二州三年後嵗登乃止辛丑授鄧州奏以弟將州兵州兵亦可而是州兵民始分後十二年癸丑大先朝今上以太弟之重命故丞相史忠武公經略河南始屯田漢上張平宋本盡還為徙五軍唐襄樊五州民實南公始復鄧時宋已築襄樊均皆宿重兵徙民各歸其州惟是三州之民無所于歸襄樊僑治州北均僑治西皆倚公為援南州數十里淪為盜區戰外耕内四年之間積榖石七十餘萬丙辰乞骸骨不報明年疾卒實丁巳春三月十有四日年六十有一其月二十有四日肇塋州東南之曲専里以𦵏自䘮及窆祭哭聲振城野數萬人昔受公生之死地者公諱祥字天麟魁貌碩躬望之威如孝親友弟及有地方數百里秉鉞垂符常布衣韋帶粗冠敝鞍江漢大都督為言衣冠貴賤章也何乃為自過儉下自同庶服耶不恤也與將佐言公府則吾節度汝不可不嚴名分之守私處則汝皆少所從起相習者豈可遽脩邊幅改度平日也必齒坐序飲其疏簡目節直坦與人不疑和此考贇妣李生子二人長公弟彦即將州兵者大考仔曾大考康三世連不仕饒資樂施夫人霍以賢聞子一人昭勇大將軍保甲萬户侃今鎮衢州男孫三人伯元仲亨叔利女孫四人適耶律弼李友端劉仲溫季幼槩公之始遭金季年出無授知託援之臣入無素勲可籍于家奮其孤身百戰前驅積勞而加數千徤武之上亦何壯也且人之才相為十百千萬不能齊同以一人當一人為衆人以一人絶出千萬人之上是曰傑俊方天定命昭昭而昧者疑所適歸彼千若萬人奔走為依求以自全其受是依者内揆無可出險反正之才豈以一身貿貿先衆徒死則依人者猶不難于為人依而受者也金既隕祚而後將十餘旅之衆下宋其志仁此人也及宋不察將快其肆毒已乃北戍鄧州為置監將防虞而戎偹之其伺􅀈竊發不保其終何如也非公謀斷灼知改玉安能轉禍為福侯食此州哉然由公而上不仕三世潔實儉勤積累悠長能㪚宿居芘後之功既碩既豐而始大興此勢之必至理之固然者今侃也即基堂之龍盾虎符列名平宋功臣非公作則之報而誰諸孫繼繼脩偉則是澤也夫豈一再傳而遽可艾之耶後𦵏三十有二年至元二十有五年戌子侃自衢遣叔利五千里持衢學官鄭怡所撰行狀走鄧請述墓碑燧哀其在揚厲先烈嘗家洛西與我光人居相宻邇而遊相好也故不終辭銘曰穰之東南有堂其封下為平輿趙公幽宫返是之年周甲子一束髪樹名古人自必翊將衰祈偶方興時如鬬孺子賁獲自支金鼎沉淪提是窮旅曰奔與國涉漢南騖來戍是州始脱危阽乃棄是星日月再瞻甫少庸蘇熯螽薦沴徙北就豐于洛之汭洛凶亦然移粟大名以及還南保甲戰耕與是州民耄穉十萬形影相祔千里往返厚深之仁崇阜增川宜是州民戴為二天朱邑桐鄉古弗是過卜置冡傍萬家且夥有子將軍方耿烈光虎節斯皇孰云公亡匪銘伊白匪石安邈我筆載兹後來者頥提舉太原鹽使司徐君神道碑至大三年中奉大夫僉樞宻院事徐毅慼言于燧先人人以雅善故御史中丞王博文當其為山東河西提刑丐銘先祖提舉府君墓碣中丞不讓而援翰昔毅與子嘗授嘗太傅許文正公于胄學為同門今子長翰林毅僉宥宻為同朝為先人于中丞無是也又子亦識吾先人古所謂知死知生者兼有之其遺善可筆以示雲仍者非子誰賴哉乃序之曰君諱徳舉字進之曾祖澤姚郭祖閏妣郅世農平陽趙城以本富聞石明里考玉材武為皇帥府提控提領崞縣岢嵐州長官後馬公行刑部奏提舉河東南路常平倉妣夫人髙以嵗丙戌生公數嵗撫而謂曰是吾父登金詞科令岐山出也身教之書及長又資使學仕俾嵗偕計㬰趨龍庭甚為參尚書省議樂齊賢馬文玉二人者知擢以為掾巳未遣迎世祖于江北陽邏且徴兵山之東山中統壬戌省調平陽路轉運司經厯以妣夫人憂去官後六年又居考提舉府君憂安西王國㤗凡河東河南山之南與陜西食解池鹽地皆置使督其賦入悉輸王府以君為太原舊由其地炙鹵民盗煮食有司雖宻其禁犯者終不衰止而賦日益不登遂弛其禁聴民煮食惟户責輸賦漕司行習久矣至于都漕欲變其法復轉鹽鬻民君以為若然是驅是邦人納罪罟也仍乃弛其晚惟衆遣吏巡迾不使賤估盜販出境而加賦其舊三之一也民便安之不績亦最陞提舉棄而不仕其平生履厯已此不可謂達而名傍聞四方士夫從之遊公侯用其言而人亦樂以急難見求者在夫重諾而趨利負氣而尚俠其事如李璮將為亂自益都傳檄求臣叛王而平陽總筦李毅不思移文太原為忻之監州恩巴楚所發故兩總管皆誅論毅子青童尚孩坐徙遼海君哀之帥毅家童訟之宥宻以為祖宗之法父子罪不相及且昔檄事青僮何知與禍至兹非昭代罪人不孥之㫖宥宻遂奏而還之今戍四川長萬夫襄陽既下之明年將平宋詔籍中户為兵民甚駭愕至有自􅀈求脱者總管烏塔患之廹君詣宥宻受其成法得于三户抽一遂懐檄歸虞吏為奸教侯取籍閉府幕道院身自差第三户優劣優者為兵劣資其力令出人稱為平有泣謝者初世祖征雲南師未及境書遣三使諭招三人者言祖宗之法殺詔使者城㧞必屠萬一蠻夷怙惡或賊殺臣願無以臣而使是城噍無遺類至則彼以為誕皆殺之懸尸于樹大師既至求其首或謂投洱水中遣漁人網取無所得火其骨函送其家復其門徭田租中一人秦州士子王姓分蠻口數十于州俟其子壯付之後三十年當嵗丙戌詔西省臣訪求三家在亡蠻口已為郡豪張某者冐有王氏子顧受其人傭直君言之憲府坐郡豪以罔受上思官吏見知蔽匿者皆罪黜而還正其口王氏子民奴有嚴姓者主利多直鬻其六七男子于商胡君憤然曰奴有男女若是衆多則知頼其為力也久忍重奴商胡分鬻他地哉白其府曰主郡既有名郡籍則奴亦郡民烏可不告所由而輙鬻之總不損吾户數實損户口府是其言行已數舍遂追還之代贖為民猶其外者至語其家衣止大布大帛食無兼味飲酒不數龠事繼妣石有孝譽分田以恤女弟孀居為子擇師俾齒胄學其知親賢又如何也恒言以飭諸子曰立身本學治生本力穡儉勤羡以周匱急無多積以自灾取友不可茍合勢利臧獲久故既火其劵多至千指自今事汝久者其縱遣之當不恙時伐石為槨穴地倍常有半曰他曰無厚藏明器用陶無法流俗侈靡崇事浮屠以大徳癸夘八月六日卒年七十有八九月二十有八日𦵏石明里先塋以前卒二十有一年元配同里毅母盧夫人祔置毅為治書亷使風紀中外刑曹惟觀今為内總六師外置諸軍逺及為贈祖玉嘉議大夫上輕車都尉平陽郡侯妣髙侯太夫人考徳舉太原鹽使司提舉贈中奉大夫䕶軍平陽郡公妣盧妣邢皆公太夫人非文賢而能之乎繼妣邢夫人生投轂轂濟投宿衛成廟轂掾河東憲司榖大郡永濟倉使與濟皆不祿女歸江南諸道行御史臺治書裴居安男孫四人女孫四人銘曰嗟古君子許友以死非父母存曾不有已後世不然輕合權輿橈酒以金矢死大渝小棘見問聞已掩耳大而去之逺若讐恥允義徐君閔其故侯世業塗地而身亦劉童子何知亦遐以置曰是聖代開伐及嗣教訟于庭萬里還之俾克再家虔秉將戲民有不幸為勢壓仰無待籲求我則往直謂為非俠刀善砥名謂之為俠不蹈難行其居而家井有條理施以裕人自奉則菲伊誰無子無不欲賢師匪其人學則滯偏遣毅齒胄從許文正耳其嘉言目其善行故出用世尊聞行知為民所望宥宻賛毗不昌其身而昌爾後逾信百年種徳始茂子貴而碑令甲得為可恃以傳太師友辭戍守鄧州千户楊公神道碑楊公諱彦珍世汴之杞人曾祖考某祖考某考直皆不仕金垂亡也鄉里及旁縣豪傑以公質而義沈而信脩幹有力馳馬引强奔走服屬之至有二萬衆將之來歸授萬户徙河内定興思立戎勞不樂民治宋將彭義斌侵山東東方諸侯皆避不出犯其鋒或聞風景附始將百人從故張蔡公戰淮北復徐邳兩州勞陞將千夫戰淮南破光廬兩州及安豐軍戰漢上㧞光化棗陽先登又破信陽軍戰襄陽走王總管牛首山斬張太尉鹿門破荆南沙市初鄧既降以嵗荒盡遷其民就食洛西留軍戍守㑹故中書左丞劉公來襲戰塔橋古邨黔陂屢北之其後山西逋民由雕磵故宅岡將趨襄陽率步騎遮止之假種牛曰吾在此汝可去父母邦而南耶與故中書平章游公築楚鐡狗兩堰以灌屯田嵗收粟為石無慮若干萬沾饑羸為口亦無慮若干萬嵗甲寅以平生小大數十戰身被三鎗老厭苦兵子珪能荷芟矣諸憲宗朝求嗣已授副千户得休居十三年以至元乙丑春正月十有八日卒年七十其月二十有九日𦵏州西北十二都之靈徳鄉蒼龍潭壖夫夫同縣盧氏後公卒之二十五年當至元之二十六年嵗辛丑年九十不恙珪及其三秀秀成玉與男孫十有六人與祖世榮欽祖光祖述祖崇祖儀祖遵祖協祖繼祖孚祖襲祖康祖㳟祖由祖亨祖女孫十有八人男曾孫五人儼伃侃偁僎女曽孫八人最三世子孫曾孫男女已五十人男婦女夫甥孫猶不列也朝夕若嵗時問安為夀其前堂宇隘不能容班之庭下之人望之蔚為盛門非天章公潜徳昌熾後裔而何况珪克對前脩有光乃爾耶始有副千户江漢督府版令將突騎干時宋宿兵襄陽與君掎角臨鄧督府度房有恃而虚别遣將以萬襲人之反為均兵遏絶令將所突騎為援戰分道口斬其副將杜胡又戰馬嘶山通道出之從史經略援蜀之開達兩州戰李義聖耳諸山又戰同波訾萬石壩晉城寺獲生口五百城母徳章以拒合州又城大軍平以闞廣安軍歸從故中書左丞相阿珠公圍襄陽戰小堰堡南漳鴉及八瓣凌三山禽解都統樊提轄湖城砦馬軍趙總管野鵝池劉都管肨山問採司王總管狢子川禽無名將樊城斬六年襄陽廼下勞授敦武校尉從中書右丞相巴延公越安陸戰新城降黄宣慰坑沙洋邊都統火死下沔陽攻漢陽先登㧞之戰鄂之陽羅步獲船五十五艘遂濟江下鄂又從中書故左丞相阿爾公分兵而西戰荆口降髙安撫下鄂攻荆南沙市先登坑之徇地峽州下之鄉民多趨險奔施擇峽屬縣宜都富民言動衆聴者駱升署為邑令追還五千户從圍潭州戰西門鉄壩三先登進武略將軍千户金符從下衡永全道四川㧞静江進宣武將軍總管虎符下栁西融州徇地海外未至召還進明威將軍副萬户再遷廣威將軍真為萬户戍襄陽最其受仕至今三十三年所援㧞破坑下名城三十而縣不與禽都統一人總管三人斬州副將一人降安撫都統各一人討湖南叛冦生降渠首四十五人皆全脅從及城㧞而當殱言之大將而脱者不可以鉅萬計小大之戰七十餘身被者五創矢分右巨擘洞肩汰股貫踵先登壓陴而顛血嘗出口積是勞勩位踐三品力有可至數所得為伐石人獸樹列神道又悼公平生與國立家之多艱也石銘之碑無以白悠久自襄走鄧託筆于燧嗚呼臣之事君猶子事父雖出蘇武告李陵之言而千載以為得然事父敬身事君致身道固有不悖並行者曽參將死召門弟子啟手足以示全歸其平居則又以戰陣無勇為非孝夫小而殘形大而隕元至不旋晷孰速戰陳茍于是而曰吾全歸吾全歸則天下無授命之臣君何賴以守邦人子惟無事戎行不善將身以死者是成不孝而執綏援抱以死固其所也况戰不必創創不必死與雖死而名日延哉嘗讀史氏書見鬬將之登陴䧟陳折馘搴旗大者百戰小者數十其身所存鋒鏑遺餘必慷慨感發思有若人者生今之世得奮筆大叙其雋功亦志千古之一快也觀公父子踴躍于金革視身外物再世一轍庻其人焉惜吾文之未稱副也銘曰世曰文士武弁之易謂勇無謀似而非是讀人物志論第英雄英之精秀草木華同雄譬徤獸逸羣振迅天於恒人此與彼吝或畀其全萬邦表貞英故明智雄則勇能人才文武異同胥附武遏亂略文太平具亦既太平忘戰必危猛士赴敵生死斯湏彼文維臣何有是戚執簡之評其可輕出於鑠維公鄉豪始宗無基于前造大金躬金厯祝㫁有衆二萬來歸太宗獨何是亂棄民而戎轉鬬漢淮戍鄧空郛招逋立閈鄧人病饑我徃耕之鄧人聞戒我往戰夷丐老而休年宜延夥而止七十𤣥宅長卧生子如公亦毅能兵克越蜀荆三十名城金石所創凡十五嬰虎符以庸鉄鉞専征曰是徵效先人之教五鼎三牲不享榮報發其幽光𦵏令存章庻幾子心少慰䀌傷切雲之碑蚊奴龜負史臣是銘滋久無斁牧庵集卷十八欽定四庫全書牧庵集卷十九元姚燧撰神道碑參知政事賈公神道碑賈氏之顯在金叔世由大考銀青榮禄大夫上柱國尚書右丞河東郡襄獻公諱守謙相宣廟故曾大父衍金紫光禄大夫曾妣石其夫人焦皆從封河東郡夫人考頥武節將軍兵部主事蔡州觀察推官生公鄭州年十五汴亂已失兵部奉妣夫人孫踰河依舅氏居天平甫及冠入官行臺于時法制寛簡凡受事者惟以賄先或餽黄金為兩半百峻絶不取太宗聞之稱其清慎特敕有司月給白金為兩百世祖淵龍驛致諸邸與語合意俾董城上都竟工丁姚夫人憂去及踐天位首以為中書左右司郎中不名惟官命之坐政事堂位宰相下他為郎者莫之與班由善國言小大庶政不資舌人皆特入奏其冬帝自將討叛王漠北漢人惟丞相史忠武公及公二人者從歸賜西錦服賞其周旋莽閴皸􅏿之鄉不懈益勤也帝問卿郎俸幾何公如數對則曰何薄如是敕増之公曰品制宜然後太保劉文正公奏公參知政事公又曰他日必有由郎援例求執政者將何為禦皆不許至元始元官朝請參議中書省事詔同燧先世父太師文獻公時以中書左丞行省河東山西罷世侯置牧守五年再為左右司郎中者三年盜殺臣為平章欲擅利權病其束手中書不得肆欲奏求分六曹繁務立尚書省授公中書給事中丞相惟署制敕而已隨同兩丞相史公耶律公潤色國史翰林十年襄陽下詔令即汰生熟劵軍隨授知襄陽府府隨陞路官太中襄陽路總管虎符明年詔淮安忠武王巴延時以中書右丞相河南王阿珠以平章楚公阿爾哈雅以右丞行中書省將圍襄諸軍濟以新籍之兵合數十萬衆平宋授公宣撫使議行省事浮漢濟江下鄂大師其東留右丞及公戍鄂明年授僉行中書省事荆閫遣安撫使高世傑來襲右丞出禦敗之降世傑乘鋭下岳進㧞江陵又移軍圍潭獨公留戍士民求見者前其人而却其贄金帛一錢不入其門酒茗之㣲亦絶戢吏卒無入鄉敢縱暴者刑以重典發庾賑饑宋宗室仰食官者仍廪之不變其服而行其楮幣弛湖荻禁聽民漁樵東南未下之州商旅滯此者給繻歸之創舟百數十艘操以水軍免括商民置藥局遣醫更視疾瘻婁安邦以信陽來歸從其子入覲矣禆將陳思聰屠其家逆端則見或議加兵公曰為是益堅其叛惟可計致遣朱千户從十人徃使戒無操兵好謂之曰汝與安邦同功有怨盍明之省何俟其出而屠其家或仇黨夙夜甘心于汝奈何宜身自省告余以故余則直汝不然少猶豫則以叛加兵興誅矣思聰果來隨徵其妻子其徒至數以戕賊主師家與未受使言迎射殺其從二人罪併肆其子諸為亂于市幼主既降其相陳宜中文天祥挾益衛兩王逃之閩廣爵人號年東南大蠢覬倖之徒相煽以動大或數萬小或千數在在為羣蘄寇起司空山剽黄及夀昌夀昌距鄂尤邇鄂屬縣傅高亦集衆跳梁為應公多為檄曉曰汝皆平民為賊驅脅至此俘殺之獲子女貨財渠惡悉有汝何利焉捐父母妻子徒受叛逆之名以取族為鄉里所醜今能投兵返其居者復齒平民不蹤迹其既徃有斬賊首至者以級多少受賞以渠首至者官之言中其情上下猜沮稍稍離渙壓以官軍遂盡株橛翦平無留高亡之江西武寜公又檄敢舍匿者誅及其鄰窮無所歸變姓名返家為尉吏縳致磔死初遣萬户某者討是賊其人顧以高為辭請急盡殱鄂之豪傑大姓以絶禍本公曰應賊者高䑕子何為施就梟夷豪傑大姓初無與知奈何以高誣誅逆天欺君以禍民夫誰敢然汝第徃吾能必其無他其人出留所善部將戒曰聞吾還軍汝舉烽城樓内外合發必盡殱是㑹其戰不利水死其始事彰鄂人大恐轉益徳公恃為司命時精兵盡于圍潭居守半老疾乃雜新民乘城民相誓曰設寇誠至吾曹二三千人必無四顧其家専擁衛賈相十四年官中奉湖北宣慰使明年授參知政事無幾時遷江西行省參知政事民素父母愛而神明敬之號送其去像事于學先聲至江西民有迎訢千里外者時其省收海隅偽命甚急有者坐以連賊無者謂為靳匿將為後用誅論巨室踰三百家猶有幽獄未斷者公至出其非辜不令凡宋告身以城來者朝廷既加其舊官之矣自餘蓄此無所叙復徒自取禍其悉投水火敢有以索兵仗為名俠入民家罔為收匿以起獄取貨與取妄人子女痛繩以法明年大水壊民廬室藏葢者發粟以賙其逃登屋木者遣吏具舟載糜粥糗糒以食脱沈溺數萬家宰相出入以甲士導從至省班立庭下其冬大雪墮地旋消移時不能滿寸右丞托爾楚勲貴胄也顧謂公曰南方並有北寒減三月公曰相公襲貂裘熾炭其前而張幄于後言是則宜彼庭立者必以為加三月矣右丞屬觴于公謝其失言休士于廡由是知其為心斯須不忘恤下也事必資決不敢友視而師之明年李梓發盜據南安公虞他將徃則為暴堅其不下請身徃平纔從兵千營于城北為檄推誠招懐梓發度其猖獗日久勢不敢歸以其徒知公有素或貳其操戰不為用懼左右竊取其首為功乃閉妻子一室自焚死衆皆散還其鄉不戮一人平南安歸江東饒之屬縣都昌杜萬一挾左道媚人有衆萬數狂僣置相公曰都昌與吾南康止限彭蠡此冠不馘將亂南康乃調兵戍遏彭蠡西瀕别遣方招討將其軍仗舟中偽為商農徑造苃舍生禽萬一與伏其相曹者以歸磔龍興市其徒散駭復其民居後有别巨室姓名百數來上云與賊連公曰大慝誅矣延求何為火之而江東宣慰使某者媢其成功遣使入讒公不俟江東兵至惟遣南將徃討私有其藏以八日屠禁日殺人㑹公亦遣使至制責江東便曰賈郎中為者何有過差且是賦非羊豕人也雖殺以朔日猶可十七年詔再征日本賦江浙江西湖廣三省造海艦公極言如是將亂江南欲身任入聞陳其過舉他相以為不可廢閣詔令異同之間其年七月二十日年六十三薨于豫章而始成戰艦遣宣慰某者總致于軍東征丞相憤失軍興將以是日斬使忽詔下既江西海艦後期罷兵君子謂公薨猶利國如古尸諫以其冬十有二月歸葬威州井陘牛山先塋嘗最其平家居事妣夫人曲極生孝敬迨薨移是以養寡姊夫人李氏信氏雍睦無間言視政之休未嘗廢書從戎亦槖駝負書以行從討叛王度漠有暇猶為世祖陳説資治通鑑納君于善延師私熟毓徳諸子日或至其舍出門交友貌粹而言温侃侃易直無有城府機穽尤篤故舊故第邇太室歳常以十月剛日大享其日每風雪冱寒非執豆籩聞鐘鼓振發不敢安卧其室冠服庭立至乎已享積學其躬如是施諸用世事世祖二十有一年其居中當睿聖大有為之時與二三元臣上以毗賛其經國下以燮熈其子民者十有三年出而經理南紀謀猷大軍于襄陽于湖廣于江西新造之邦嚮化未純安而集之煦而濡之如恐一夫不獲其所一有海隅之難盜賊附起禍譬而賞勸徳綏而威撻徐革其面而浹其心俾方三數千里之氓一喙同辭稱其仁人求能推守大帝諭忠武王以曹彬取南唐不殺之訓者無公亞匹嗚呼後公之薨二十有九年今聖言念盡瘁大帝功加生民贈推忠輔義功臣銀青榮禄大夫平章政事定國公諡曰文正哀褒之典無一遺者恩重書棺公而歆兹可作于九原矣五子鐸淮東宣慰使鈞中書省參知政事鉞不禄鏞令曹之禹城鍔知鹽官州二女適臨湘令劉彧僉山東道肅政亷􅀈司事王遂男孫五汝王行臺監察御史汝立汝礪餘未名女孫五有從者三吉州校官許崇慶戍守真揚萬户劉遂夀武庫使劉復餘㓜男曽孫五女曽孫一皆幼銘曰定公筮仕于顧成世弱齡卑官潔慎巳至世祖淵龍謂治須賢蒐以自毗如渴幻泉公焉其時先後胥附及踐天位大正百度以公為郎左右中書凡我庶政丞相共圖日月入告天顔諟顧不恇于威不愉于豫􅂷十五年政治隆平維帝之明公猷是經將一文􅁤襄漢其始出公軍諮為烈益偉既下江夏人暴而仇公則緩之敷澤優優粟饑藥疾于賦于役勝國厲民靡不與黜大盗劻相動萬為曹以言為兵訓枿其豪民視曰公予父予母胡不豫之事以豆爼聞遷省洪出梯齎咨洪聞其來以抃以嬉既釋岸獄載糗與粥舟取溺逃于彼登木南安勦狂不缺斧斨僣偽都昌生致用方惠懐其仁兩省千里聞其告凶號啼婦子疇非相位死而罵長伊疇若公没世不㤀謚於太常傳以太史矧世其徳衆多令子有毖巋山螭石靡穹神保焉依期古與終資徳大夫雲南行中書省右丞贈秉忠執徳威逺功徳開府儀同三司太師上柱國魏國公謚忠節李公神道碑皇上嗣厯之元年制特進中書平章政事教化開府儀同三司太子太保太尉平章軍國重事上柱國魏國公申敕有司夫既子孫膺是顯庸共政中書疇咨㝢内而所光昭世德上及其逺者舊章未修非移孝以勸忠也其訂以上翰林奉常禮曹之臣請贈謚其曾祖考達爾沙貝結為効忠翊運保德功臣開府儀同三司太傅上柱國曰康懿祖色爾勒結為推忠佐命宣力功臣開府儀同三司太師上柱國曰貞獻考資德大夫雲南行中書省右丞阿嚕為秉忠執德威逺功臣開府儀同三司太師上柱國曰忠郎自曽而下三世皆同封魏國公曽祖妣梁祖妣田妣王皆從封魏國夫人制曰可教化以為四世死生胙以大國爵之上公人臣寵光至是焉極雖百其身報塞其能啟求儲皇匪刻金石將無以侈今而垂後敢以是請乃為下令太子賔客姚燧太子諭德蕭􅆽太子太保瀋陽王王璋其為撰書篆額燧據翰林學士程鉅夫事狀與其家乗次曰康懿之先七世相夏同其王李姓以小大稱及貞獻生配姓與官名以色爾勒結太祖戡定天下夏氏既臣㑹其西征復貳帝聞旋師入討勢如頺山之壓卵貞獻總兵㳺徼遇之遂來歸俾同呼圖克特穆爾招沙州州將偽出牛酒犒師發伏以襲首師馬躓以已所乘易使先奔自乘所躓為殿逆擊敗之他日帝問卿臨死地易馬與人果何為心對曰臣新至者陣死奚恤不可失帝器使宿將由是忠之遣兵圍肅州守者其伯氏鈴部謀以城下不克害及其家帝憤㧞城皆殱之不遺齠稚惟聴求其親族臧獲就所得為百戸有六又詔自今親族臧獲未盡收完及田業為為諸人有者亦悉歸之其永為制歲乙未太宗詔定宗憲宗兩諸候王與蘓布特征西域明年帥師戒塗貞獻在行中又明年至袞騰吉斯海尋與諸候王巴圖征俄羅斯至葉爾羌城從憲宗先期至搏戰七日㧞之歳已亥冬十一月至阿蘓穆爾齊蘓城慿堅攻不即下明年春正月凡三閱月貞獻從死士十人躡梯登陴生拉十一人大呼曰城破矣衆蟻附而上遂㧞賜西馬西錦為匹皆九名以巴圖表其戰烈又明年詔班師是役也六年而歸功長千夫禮秩與國人為千戸侯者等加宴服四序異宜凡若干襲與大㑹者皆同其色又俾同伊瑪齊為㫁事官于朝嵗丙午定宗即位曰是大名昔朕分封卿徃為監至燕則同㫁事官哈逹署行臺後憲宗以布扎爾來涖行臺録其舊勞又俾同署别錫虎符以監大名至嵗已未凡為監十四年當繼餽世祖南伐未踰淮輿疾歸薨其家七月二十有八日年六十九傳護轊車返葬肅州祔其先塋别封虚墓大名求便歳祠中統建元天下庶務悉歸中書故忠節公襲虎符惟監大名至元五年詔諸侯王和克齊開國雲南俾將衛士以從至則責治軍旅金齒弗率纔將射士五伯人殄其衆數千獲馴象七致貢京師敇用以駕輿自是蒐田征伐無不乘之實前古未有者始帝加兵雲南取道吐蕃甚回以曲十四年思播既降改由蜀入命公開二塗陸由烏蠻水由馬湖烏蠻合都掌圈豕鵝夷諸種拒而不受累戰始服自時水陸郵傳皆達斜州又俾除左右兩江道達邕管平溪洞夷獠五十餘州十七年詔將雲南萬衆合湖廣四川兵討羅氏鬼國之叛十九年再征獲其酋送京師竄有北死二十有三年詔征緬田瀕南溟大國戰始克之不及郡縣而獲大象二十有七遂送達尚乘明年詔鎮南王再征交趾命將萬衆㑹之平三十八栅前大將軍月至王宫王及世子興道皆舶逃南溟禽一他王以歸明年師還衞鎮南至左右江界辭還嵗戊子夏六月十有八日冒瘴癘道薨軍中年六十三最其履歴始為金齒等國安撫使入覲改善闡安撫使陞雲南等處宣慰都元帥虎符拜雲南行省參知政事再遷左丞末拜資徳大夫右丞加宴服四賜尚方鞍勒弓矢介胄實使相西南二十有一年地周萬里小大之戰無慮百數軍士有勞其出而家大而櫪馬細如槖衣金銀幣具不吝賞予故能得其死力每㨗無衂荷旃夷蠻讋其威名已臣之國撫而綏之為定金賦以戸髙下為衰迨其薨年籍是一省輸金之家近二百萬訃聞帝悼之給五十乘傳還其柩塟大名贈銀青榮禄大夫平章政事諡毅敏公後三十有一年加今封諡燧嘗合是三世以觀貞獻忠節父子逮事二祖三宗六十年間宣力樹勲西夏雲南勤亦至矣受是褒誺其固宜然而康懿則相夏氏實勝國臣由子孫貴亦與哀榮足昭皇元淵乎忠厚恢乎其仁盛徳之至也間又求國魏所由貞獻卒監大名公嗣為之去之雲南公弟又死而公冡嗣之軍國重其姪鄂諾皆為虎符今其為者則公季子呼圖克岱爾若小大宗父子祖孫晜弟六人迭出為者其與世侯奚以異諸亦今代臣隣之鮮儷者公三子二不再見中子則今江西行省平章三女長適同知台州路事巴約特次適浙右右丞宣慰都元帥阿爾丹幼女姆男孫六庶長監中慶路餘未仕女孫二人銘曰即戎有勩官及而世不絶其傳列聖之制由子既貴推恩其先前聖靳之一二有焉於皇今聖徳參載燾立愛自親教民以孝致位光顯必崇其親赤舄執圭私廟畀陳昔李七世卞及康懿左右夏王貞獻則異聖武是忠入殿出鋒後服加殱必全乃宗當顧成廟詔從西伐城凡悖頑賈勇以拔其干天誅曽莫稽逋六稔言還功長千夫定宗御極曰兹魏土分封在予而往其撫忠節世之九年于兹從諸侯王南詔往釐跳梁小夷尺箠以笞大如緬交南溟極浦悉將致討而竟死鼓自其去魏其來其誰則季父姪冡季子為職民世侯前聖已廢獨之家疑若猶在胥今國魏四世靡他其與虚邑不地如何有繩維孫有煜其祖匪師伊公一是開府死者已矣生立朝為民具瞻席絶百僚維明天子啟宇于此咨爾後人思服其始侍衛親軍都指揮使李公神道碑開府儀同三司平章軍國重事中書右丞相贈太尉謚忠武史公中子今中書左丞闢閫江陵行荆湖北道宣尉使杜視今江陵總管李珏則故夫人之季也以其季今東昌總管杞兩嘗壻我先世父中書左丞赠少師文獻公與李氏皆太尉姻又玨友燧而齊年來言曰先太尉所由以致是勲名者先外舅氏指揮實始終左右之而玨亦曰先公出處使相既狀願銘之碑遂參伍故翰林學士李冶敬齋之三韓李氏先德之碑而序曰系之逺者不究已考諱福力穡致饒而施讀書能通其槩親親長長下儕輩無忤仁蟲彖不踐性由天出匪學也生公諱伯祐𨽻太尉兄金紫光禄大夫河北西都元帥麾下十年其倅武仙殺元帥一家百口據真定叛而事金完州中山皆應之先是元帥之考尚書甞戒備山元帥曰大人柰何教兒設嫌遇人尚書恚曰若必死之人手吾不忍二孫同禍乃擕故真定總管楫故江漢大都督權如北京時大尉在燕市入覲禮弊公馳告宜歸復讐大尉從而南潰軍已須滿城之徐河公唱今集賢大學士王顒之考參謀某今參知政事王好禮之考大使縉推大尉嗣兄元帥凡失地皆復之仙走閉雙門公北見太師國王王馳使聞詔太尉真嗣兄河北西路都元帥虎符公為都提控仙復夜襲真定取之太尉惟從公遵城走東北公告太尉吾先自投汝隨而下幸我藉汝使不傷吾死無害也巳果兩全涉塹公又為前水及其頸太尉惟及胷泥奪鞾襪既㟁跣走藁藁師故中書左丞贈平章政事忠献公董文炳之考某已艤舟滹沱馬馬入藁收兵謀將有異謀者公手斬之再復真定仙走璧抱犢旋走逾河轉鎮撫軍民都彈壓豪戢弱立從太尉破衛新諸州又從圍汴城主自將逾河破之黄龍岡走歸徳濁河為池主帥薩竒蘇布哈薄北門而陳左右皆水公以為絶地兵家所忌宜退保寛閒不從㑹中書左丞相赠開府儀同三司太保謚封并國武宣公阿珠之祖蘇布特召太尉入汴計事公與之偕既走軍大殱藁帥董公完帥鄭公韓公十千户皆在死列金亡移兵伐宋下徐州與其縣豐沛功授金符攝本路兵馬都縂管從征襄陽敵柵峭灘石舟師衞之帥下教大尉其必抜而歸乃將公等死士二十人公曰可計致之出十艘為挑皷􅀈而前俟敵逆戰輒退止巳復皷前敵拒又退止三皷敵以為懈而懈也不拒遂疾趨敵舟太尉先登公繼之覆舟師平其柵從戍鄢陵又從拔夀春公拜千夫長後太尉使經畧于汴屯田河南立平宋基以公年先一紀無從留後真定攝萬户府給軍之須約相婚姻憲宗自將征蜀太尉既從世祖以太弟之重分趨荆湖復召公從濟江徇地多資其畫中統建元之明年太尉當國多勞公于上上亦念從濟江以為待衛親軍都指揮使虎符又明年李璮反盜據濟南徴兵諸道誅之衛士亦在遣中大軍衂老鶬口公與董忠献公合請太尉涖軍報可太尉至築夾寨遏奔突以三月璮窮而縳梟磔以徇公既訖賞遂致事陳蒲槊一堂教童妾為歌舞行觴娛留親賔而不自飲囂囂恐不足日為事以至元某年月卒年八十三葬某地為人直諒而不剛愛為言太尉家事亦斥不避在軍不乗喜怒殺人不事老佛再復真定屋之列肆者半城闠有以無居室來丐者人賦一間數年而盡惟其弟存奴婢三千人嵗晚皆民之平金殘宋為元顯侯卒日貧不能葬三夫人赫氏游氏趙氏男十五人珣瑜珍琮瑄瑾公懋珏璇瑜璨珪琳瑀琦其官者珣真定等路管軍千戸總管則寳慶路珏與珪也公懋沭陽令琳提舉越州人匠女十二人皆適名族官者則今參政好禮與今使相故秘書郎張行儉男孫四十一人未名女孫二十四人歸史氏者六人一使相中子官者真定路總管王某濟寧鉅野尉哈斯托里男曽孫十七人女曽孫十三人公既致事時禁綱猶闊諸將多以僮奴伐兵而歳取富人更直多者十人少亦四三㑹用兵襄陽覆實軍籍有此者罪死珣長千夫為其下訐曰指揮所亦庇三人珣引罪不力事將及公珏時為質代曰吾以吾為質不足資用為之吾父未之知下吏重錮御史交讞終不易辭柄臣三人奏置于理三畫可矣而柄臣三人亦終哀其志為親臨刑不悔三奏前赦既原不可者三得堂臣奏軍官未受俸宜無誅可之班宜出矣省院臣終以事宜特聞合而之始可比出凡幽四年從大軍南征功宜别長萬夫之兄珣卒子幼不可世恐人奪有之乃棄巳功求代兄子將曰長千夫吾父兄世官也吾宜世兄須其子壯而之戰鄱陽湖真定􅀈頭堡焦皆㨗攻常州先登抜屬縣宜興從珍宋益衛兩王海中功授吉州總管滿換湖州而江陸斯其為子弟臣槩之大者故表一末銘曰古觀逺臣以其所主賓于而家暫至與去以友賢者之取盛譽烈忠武為元元功求令將相人莫等崇公也主之同其始終其始則自推繼兄帥闘不反丘逐仇再躓戰野無前登陴奮先滅金于殘戡宗于完于河之于淮于漢靡往不皆鄰死奚算忠武報之為好其公世婚媾井里既華終以從蹕未襮之國逮其丞相進一帝側彊場之臣禁旅是師宿入門出肅而祁人之策之曰久其據而公翩如委視投羽其施不㩼不溢其持豈固嗇之多後裕垂茫昧其來匪言而告有碑載銘左是神道牧庵集卷十九欽定四庫全書牧庵集卷二十元姚燧撰神道碑資政大夫同知行宣政院事張公神道碑維張氏汴之浚儀鉅姓金由嵗甲戌宣宗播汴河朔逃兵之民皆扶攜婦子從之而南蕞爾之土其出惟是一夫之耕不足以食百人有司又括粟餉軍以就近之運抗方興之師徭賦百至猶不能支故人心日離望望焉而思大兵之至以紓其急嵗壬辰睿宗大殄其軍鈞之三峯山義宗播歸徳大河失守故其祖得棄鄉北渡樂而家燕會燕薦饑嘗㪚居積以振之祖考之諱皆逸惟知其考字善甫三妣戴李南李實生公諱天祐字吉甫就傅讀書聰頴絶羣兒筮仕經歴工匠總管府以儒術飾吏事至元十四之年轉尹歴城未赴改同知棣州十八年詔發濟南傍近十路民五萬人濬交何以通海漕責公董役丞相哈必齊臨治其上自春徂冬方十一月天寒水氷數言宜休役待春徵集不待臨治所可及行堤見僵死暴棄則䀌傷曰吾曹媚上急公使民凍夭如是悉縱遣之民歡躍歸因彰言曰脱上見尤吾請身坐不以相及事聞帝大嘉異裕宗時為儲皇下令升經厯功徳使司尋改總判院官奉訓仍經歴二十三年官太中太原路總管為纔一年有徳邦民刻石頌之明年官中議參議尚書省參議要官非其才可以彌綸宰相圖回天下者不足舉其職又二年官中奉拜中書參知政事大徳四年僉宣政院七年官資善同知江南行宣政院以三官釋門故於佛氏為教信奉而篤守之慈祥惠愛多所及物有司政或病民如徙江浙巧工入将作亦為之授方使吏不得為姦利居刺樂業而行輕去其鄉不怨焉宣政五年祝髪之徒安之以為不繋出令以重斂諸山者惟公一人拜疏于朝請留者数十上至大已酉卒年六十三越十七日從葬西山其祖始卜之宅嘗稽後世官制貴賤與古反易古自一命至九命上公而極今則九品而進乎一公起布衣積官報政與知院致位二品實古八命侯國之君非獨嵗時有以加數偹儀奉嘗其先為子孫者亦得衣被休光以紓朱紫真善大其門者一女弟同李出適士族夫人耶律氏次王氏劉氏范氏索氏七男志惠忠懇慧恕億五出夫人惟恕王出億劉出六女四出夫人長適實喇布哈三為監州一王出一范出王劉范索卒皆前公夫人子其男女恩過所生至大庚戍翰林學士承㫖耶律希亮曰夫人吾從祖妹也持其從祖兄戩鄂特之狀求銘公碑其辭曰因陵其高力半功倍孰與平地進覆一簣繄張之先發我庾餘責報于天如持左符實生令公始學自力迨其筮仕共工是歴後銓尹縣薄而不為改倅棣令州用事治浚交漕海五十萬指自春徂冬急役未弛公憫凍殤丞相不謀下令縱之擅吾受尤事畫上聞帝嘉曰果遷牧于并頌石璨瑳尚書中書機務兩參事輒背馳資言指南出知宣政實司祝髮故于釋典得其津筏昔人之為箕斂諸山今公之來退食閉闗僧徒安之聞諸滿秩留者抗章上凡數十可因灼見舉職之宜鼎鼎宜其名與位升卒從其先西山之兆勒銘隧首千祀有耀少中大夫敘州等處諸部蠻夷宣撫使張公神道碑公諱庭瑞字天表姓張氏其先臨横州人其曽祖淵祖士明以有功金初再世千夫長考楫皇北京都轉運使徙家自霫三子公其季也㓜志不凡巳以功名自許讀書力學經史之餘兵法地志風卜筮靡所不闚至既冠宿衛憲宗俾從征蜀佐軍前鋒帥如所䇿戰皆㨗會其陟方帥其兩端世祖斬之軍中獨忠謹公仍佐前鋒軍中統始元之明年詔元帥府全師戍清居賜金符俾參其府幕議合時未下直清居南百餘里虚實動静皆可相聞日夜戒備袽漏塞罅敵無得勝加善綏懐所獲詗俘不誅全之小物利人慮亦必及中土艱蜀藥其地饒橘課軍士之休役者曰袖手何為其仁日入皮㡬何升皆庫貯之莫曉為何以也視商旅有貧䘮其資滯不能東者召以其所有畜來無問㡬何蹄畜給一石皆感泣歸語父母妻子曰三相救我自爾相之名籍籍行路用兵開達以虎嘯山闞渠江可絶二州漕塗詔公為帥府先鋒使將五千人城之旬日而營壘儲侍皆完以充制使夏貴集四川兵數萬圍之諸將勉宜速戰公曰無庸彼衆十我往則殱矣可遣間取援帥府湏至為圖今惟有分地死守以老之吾不為主而為客耶敵礮吾壁當所皆穿築柵捍之柵連壊乃離柵為堵虚本不築裂牛馬革衣大樹縻之令可去來礮至則偃已乃復植敵以城不可井必資澗飲泉出甚微下薪土實之公沸人畜溲溺釡中入土以泄其臭人日數合吻皆創裂終夜行壘至於立寐如是踰月援至不敢前公下令曰敵䇿吾怯不出必嚴外而懈内今與之角可必逞志分千五百人為三夜擣貴營果大崩潰禽斬都統欒俊雍貴胡世榮等五人馘首千遺委資械萬計以遁公亦身負數創功聞加賚之澤舉軍覃焉授奉議大夫守髙唐州濟師襄陽始抽中民之家為兵賦州若干百人恐吏出入為市身按籍取其壯者與借衣仗衛兵權冝卑之編諸行伍教以進退不相干越或曰足是抽數州責止矣教之何為公曰吾所抽兵比其啟行縣官或遣使或覆閲耒耜之衣不掩肘骭雖材賁育誰則信之其時留甲退乙更逐紛紛徒自後期衣之兵衣鞬弓手㦸自足觀矣閲使至果惟曰髙唐之兵精良教民力穡野無萊田暇則使修孝悌于鄉校豪梗戢縮盗去其疆鄰獄疑留率咨平直大司農考績以治最聞遷朝列大夫濮州尹詔布多方仍黜其殿者一人為長吏勸辭之省曰如司農言正守職也豈敢為勞且州非守獨為上監下貳功則均功獨旌何為不敢奉詔省奏併升監貳廼尹濮御史臺賢之奏遷中順大夫陜西四川道提刑按察副使風紀峻肅吏重足立為京兆者弗便也中之奉藩都漕公及夫人皆不恙入謝奉教不謹都漕曰吾黨憂汝兄弟蒞官庸懦不足受任今居鷹鸇以撃摶見傷誠克舉之良子酌酒夀之庭臣閔其誣也為避之奏徙四川屯田經畧副使踰年以東西兩川各開樞府大徵兵圍重慶其舟楫兵仗糧儲資取成都者十八換成都路總管而四川中書左丞李忠宣公徳輝以王相理賦四川凡屯田征商與鹽茗竹木山澤之産民已輸而算未入官者皆蒐剔之事倚之公以集一嵗而羡衍彌倍以繼餽漕自餘學校農桒津梁陂渠府寺館傅先政廢弛者莫不興張蜀平升少中大夫諸蠻夷部宣慰使雜獠犬牙綿絡盧叙思播施䕫之瓖者五十餘種椎結荷旃將數千里行御羈縻枿其州縣繩削而碉門𦍑有偕婦女老稚入市者争直殺人為宣直碉門魚通司繋于理其酋斷繩橋止蜀商于徼謀大動兵入㓂篡之其司馳告汪忠肅公惟正以中書左丞行省成都問進討謀公曰𦍑俗悍獷喜馴怒逆其所性然由殺一人而遽待以門墻之㓂小兵不能威大兵不煩興惟可遣使開諭彼雖凌信而昧理至撼以禍福亦豈有不回者耶忠肅曰無踰公者遂從數騎就途前遣入曰吾至矣其相傒而界𦍑盛陳兵來公曰吾從數人而猜備如是何為𦍑人蜀人舉天子民殺人償死一律治之今有司逮所偕來特使辭其見知情之所由來援質耳非併盡誅之也而汝為是跳梁行省如以狀聞萬一赫怒徴近郡加誅而汝噍有遺類乎亦奚不薛之盡劉可鍳也何乃負叛名為之續使壮士推首白刃妻奴人乎此宣慰魚通司碉門者宜言吾懼汝之妄舉而自孽也故越吾司而曉汝其酋率種屬羅拜曰吾昔者取羊生磔其碑卜之視食理何食曰吉白馬将來可不煩兵公乗果白馬神語昭昭敢不惟命乃論殺𦍑賊而出所偕即日復繩橋還蜀商通市遂與約自今市者如故事無入碉門惟集郊闗日昃而歸其酋等曰亦惟命又以民嵗摘茗官収糴之為局自鬻公變其法聴民入劵自與𦍑市令黎雅戍兵屯田自廪罷沂楊山江漕榖以免嘉定州民覆溺都掌蠻反詔公以行省兵誅之公請罪止首惡無及非辜可之其俗惟善挾槍擲人而以過顙厚握松板為盾自蔽已陳公馳馬射之矢出盾背半笴其種駭怛曰何物弓矢如是其力也遂捐兵屈服惟斬其酋達蘭雲軰十人再授敘州等處諸部蠻夷宣撫使後仍故官轉潭州總管浮舟出峽過南郡燧時貳荆憲相語曰吾聞是州户滿百萬良足為治而湖廣省臣方事竣剥禍賊變詐月異嵗新吾不呵之祇益罪耳不能為也遂去之秦其前植業在樊柱者上田五千畝渠義谷水灌之雜蒔桑里可材之木萬根奴婢千指既卑兩兄田賦嵗下不以及兄糴谷入之其自取者惟城中一第與西郊之園百畝耳今歸每不城居徜徜輞川泉石間南直聖燈巖為堂罟魚于淵穽鹿于山賓客過山留飲彌日頗知為詩嘯歌自娛凡居三年忽曰吾樂吾成都竹溪秦父老遮不能止時已疾矣後是三年當至元二十七年四月十四日卒夫人劉氏淑質懿行公所敬友及是偕其三子巘岒岷扶柩還葬安西之咸寧少陵原都漕公之闕且為書託山南江北道肅政暢師文以今集賢盧摯誌銘求銘墓銘摯之言曰公與仲氏俱名良二千石為時所器期以公輔年位未䆒者豈以公年僅過其兄一年止五十七耶惜哉公考悌忠厚深沈明炳朋友孤嫠有不能家必周之使可安以終身有妾慧艶若僻之或告與人語屏所問之則曰吾父也召諸逆旅貌若甚肖叩其離兵失家嵗月與曩聞同隠痣且是公曰而民耶人役也父曰民爾曰欲得之乎對曰鄙人之來直以兒在公所不訪而識之非人父情豈求俱歸公曰而女居吾家終不能抜列羣婢令夫人盡取其奩飾衣服署良券歸其父曰資是嫁之父子泣曰何以報公惟有繪像事之蘄其夀考耳吾友勸農使韓世英歎曰以義斷愛人所難能其力于為善率此類三子惟岒為嫡二女長適李鵬翼次適某銘曰維公自少期我振耀薄宦入官入衛憲廟憲廟受臣其審其難一簡在心誠推六彈六飛之巡前茅劍外大斾攸經有順無悖方號賓天遭顧世皇佐戎清居屢摧斧斨虎嘯孤軍保新立壁飲血勸忠一逐㓂十帝曰歸哉乆勞汝西其守髙唐字我東黎鼓鼙之臣孰手威忍或于元元未善憂軫考績多方治獨最之誕誥尹濮俾長吏師俄爾秦憲旋蜀經畧輟士茅弧授以錢鏄邊榖用豐就牧成都大兵圍渝十萬仰餔需急應繁無少豫暇朝聴之殷恒燭繼夜庸蜀平矣帝曰僰夷厥俗荷旃惟汝使宜其慰其撫節以華汝大狂兵之小頑訓語始猶革面乆浚其心陸馬水舟相望獻琛晚移長沙羞姦窳輩以完吾前惟駕早税凡蜀齊秦長民總戎三十維年四稔居東人逺遥之在庭使簉其收為庸寜已是茂我銘豐碑匪伊桓盈英風百世凛凛猶生山南亷訪副使馮公道碑公以至元二十八年年五十九九月六日卒官朝請大夫山南江北道肅政亷訪副使于襄陽燧逰吳會還過行臺廣陵得訃于故御史中丞魏初所遂出涕相弔後後三年始拜其墓指桓楹誓曰公平生交友間文我怡者他日當銘是為報子休復亦已叙所履厯見求因記前卒六年嘗叙馮氏三世遺文有曰以中議年五十九卒官同知山東西路轉運使故中順方年六十以同知臨海軍節度使致事至通議亦以同知集慶軍節度使六十致仕三世皆止同知亦理之不偶然事之可異者公扺掌曰若是同知不善吾家耶吾他日有避而不為耳今公之夀僅齊中議校所卒官亷副班序正與轉運節度同知者等六命四世卒致皆不逾六十嗚呼造物之迹人果可以意㫖見也中議中順通議為髙曽祖諱仲尹子翼壁考中書右部郎中諱緯世稱馮孝子公之先諱由通議築松庵崧山曰崧後更岵字夀卿童子聰警于書博以疆識賞于中書忠肅公許妻以季之子闕幘由貧試史征商屹屹自飾不盪華惰中統建元時年未壯入掾中書職奏事曹䇿識沉明得失先事日從丞相造膝清光右部為郎自丞相辨章而下皆友諮之父子並政法制未苛不嫌也人榮耀焉或纔禁中省曹多徒顓庸在列庭加汰擢公以風度修凝敷對有次留後一故相長左右幕喜氣排人諸曹讋縮公不下之故事諸曹出皆總管判官獨抑公真定轉運經歴換衛輝總管經歴官承事郎令真定之無極事治考最換令洺之曲周狀其薄貪懦黜之圍㐮陽急發民益兵河之北公惟視地丁入中甲者戸抽一人籍之請託不行苞苴不入形勢富室施計無所凡竄名他役者皆出僚吏無所姦利其間江南既一陞議政大夫僉山南湖北道提刑按察司事換僉嶺北湖南道提刑按察司事二境皆錯壤夷蠻人所憚行公冐阻凌歊瘴鄉蠱俗上下山谷至不可馬或轎以杖殆數千里刺舉周治簡削冗長官吏數百臺臣勞之移近畿甸換河北河南道提刑按察司僉事官市民物不輒與直責悉還之罪去官吏三百籍没賂賕且三千定霜摧電掣蠧朽皆折唐之監州諱發其伏逃訟于朝顧列公實田湖陽三十頃禁殺日殺紆塗乗傳多燒驛薪不法十餘事詔御史問之無絲髪得抵其誣罪陞朝請大夫江西湖北道提刑按察副使未代棄歸尋仍前官換山北遼西道提刑按察副使以疾辭行臺臣終日舉職風紀求歸者其私不可去也擇其去家近在十舍外者以便之再換山南江北道肅政亷訪副使命下數日卒僑葬檀溪之東筮仕至是三十餘年恬忽時榮退易進難數命皆家受之臨繁處劇暇豫而集遭佳林泉野服佩寶璐鳴琴賦詩忘反移日觀所號雪崖亦可得其嗜尚已俸入盡于給故家之孤嫠與娛賓購鼎彞書畫故遺業不盈十金所標襮其閥甚髙跬步恒以羞親為心迨氣息奄奄猶大書松庵墓馮孝子墓雪崖墓賜休復曰各伐石表之阡亦自喜其善全歸也遺文千篇晚而筆力逾進辭多雄剛深古畀于文者不能句求凡再配前夫人楊氏即忠肅公妻者今夫人王氏其母休復與休復母之兩致其道不知者不以為前夫人之生觀行有家為徳如何女温香幼三男孫鶴齡龜齡彪齡二孫女皆下殤銘曰公生自孱見靈奇也葱衡鏘然妙為辭也人一善偏已兼之也其藴淵淵介介持也其履平平循循施也入司奏牋出縣為也同不俗牽異不離也責言言宣責事治也憲府所纒吏不欺也風行嶺壖江之湄也㡬耳順年不云耆也厚夜長眠寤何時也聞之􅀈隕多舊悲也曰良弓傳子為箕也柔木不弦世業悲也獨公青氊守不移也世徳陶甄不外師也子于父田播其菑也父材楠楩子構基也有華蟬嫣冠雙綏也與乃祖背官醜夷也皆不持銓衮職裨也豈天為懸座右巵也不盈其泉斯不攲也信彼微權馮氏私也滹沱之川浩瀰瀰也苗胄必賢餘波滋也母折楚篿以筮疑也麗牲有穿徴銘詩也中書右三部郎中馮公神道碑中統之元肇分天下為十道道置使以宣撫之我先世父中書左丞公受任天平僚列聴自辟傳我真定将以公偕懼不能致乃踵門自起之曰天平地方千里戸版賦出将半諸道而寄至庸淺非得清厚和慎舊徳雅望如先生者孰與匡政令之不逮而抑其過先生負用世才不及見之太平有兆之時陰拱何時敢再拜以參議相屈公荅拜曰某學不切時無有可資吾相取者然不敢虚盛招遂就車行參議無㡬時中書省召入為右三部郎中我先世父以奪吾賢佐吾惟頼以為理居無㡬時亦去公在右部故相贈太尉史忠武公贈太傅文貞劉公平章趙公宋公張公我先世父及左丞張公大参楊公賈公尚書劉公稽古議制動見咨諏又其始至宻院未闢憲臺未建尚書未分兵刑工三曹之事叢坍繁會決門開裕于刑尤慎恤禁天下諸侯不得專殺罪人死者奏可乃論輯要令條付之法吏俾有持循獄成不輒置辟必疏其情文疑闕讞下有司緩湏臾無死以冀萬分一朝或生之也遇于倫敗常者必峻治竟之羇縻之國臣或失對都堂欲詰其謾公言冝示有期不可苛明以怛向化以故于今之治文物燦然非夫人與有佐理中元力耶公諱渭字清父姓馮氏其先居定之中山嘗臣五代晉由齊王虜于遼從徒北京家長興遼滅來南系緒則自公六世祖可譜葢昱生道以再世不譲仕生金承務郎居泗承務生中議大夫同知山東西路轉運使事仲尹中議生中順大夫同知臨海軍節度使事子翼生中順大夫大夫同知集慶軍節度使事壁公之考也自中議而下三世比及進士第獨公由任子仕人疑其為問則曰延賞及世自有虞已然厯古不判如曰假以為忠勞之勸是後世訹廹以利之術非聖人大公至正遇下以誠不忘先烈之義故其子孫不敢以能自致富貴為賢而以獲繩祖父踵武為光也自後世科選之法興風聲之相盪波流之相軋鼓舞奔走一世之人使子孫恒有不籍基祖父可得自我之心甚失興孝天下之道近世惟程夫子仕由先妣我法行之上有稽先王之經下不絶先人之澤初掾尚書刑曹移掌機務後掾尚書省知選除金已蹙國一闕守者無慮數人懐告身致曠數考無所于任吏是職者人恒聚詬其短有見讐轢者公覈精宻而先後黜陞動有比依號為允平出佐靈壁帥府李全聚兵楚州觀望前却不一其操于金于宋皆未有屬帥遺公馳説之欲届而軍受命即行不為吾身叵測毛髪計至則撼以大義陳譬懇悃其㫖惟在不可遺棄故君一言全未即從亦壯其能使不侵辱善還之守均州軍事判官改南京右廂機察初金還汴通議将逾河追及行在失公妣夫人趙嬴博間公亦竄避梗棘茹苦徒行勤以事存哀以求亡通議感其志曰禮父在為母齊衰期父必三年然後娶達子之志也曽參以孝已殺伯奇放皆自後妻為曽元不娶終身吾年今五十其達汝志亦不娶終身金亡侍通議北渡河崎嶇齊魯郊以還真定出則親僕御入則操井臼求擇孤臣亡國之戚不失故家素宦之習可㫖甘其口體而夷懌其心思者皆邭躬為之日夕不去側立而坐休而出一命之湏畧不自遂積嵗為世不異一日戴白紛如猶為孺子時也執䘮奉祭哀敬兩致世多不字惟曰馮孝子化行閨門夫人事之嚴師也出與人交賢愚貴賤一接以敬别置白黑胸中故與學士魏玉峯内翰元遺山學士李欒城故承㫖王慎獨今承㫖王鹿庵最相欵習讀書為文不廢風雨寒暑節録經史細及箋訓又蒐輯金代文章凡積若干百卷専經左氏春秋為右部年七十日吾家由轉運卒官年五十九故臨海集慶再世皆六十致仕獨吾貪榮滿年格歸若後矣會子今朝列大夫江西湖東道提刑按察副使岵自省郎出令無極曰吾祖臨海為是吾獲從養于是天之私我多也平生曉行衛生法年八十二猶形神精彩動人以至元庚午閏十一月十九日卒無極寓舍還葬真定三橋里之東南原通議之兆文有常山集行世凡再娶前夫人王後夫人師金尚書右丞安石其從祖父岵母也孫休復男曽孫鶴齡龜齡二人方童女曽孫一人尚穉後葬之十九年當二十五年戊子岵以公未碑棄江西憲副舟達襄陽六月又䝉暑入鄧示燧所自理埋辭白以先人與而先公相好為故人今繼室汝姚氏甥為􅀈銘先墓碑非子誰義為葢朝請先夫人楊今夫人王其父詳議諱徳溶我姚氏所自出之離孫先世父昆弟叔視之夫人燧姑道也用是不辭銘曰維斧鉞威君之所司奚取于臣人牧專持用誠允明猶屬僭弄矧肆師心刑典不奉中元乾綱既收既張有罪我在敢越奏當公時用獄上體帝徳疑昭枉書情狀巳襮宜刑于辟宜亟徐之恩澤涵柔或幸庶㡬輕平匪寛猛匪深害今三十年作則攸賴古曰仁人利溥一言矧士弼教出治原所又曰仁人立本孝子反覆揆公終始良是公孝越俗格父之慈弊齒寜鰥矢不再妻曽元以還兼公而兩清風在碑無期將卬牧庵集卷二十欽定四庫全書牧庵集卷二十一元姚燧撰神道碑懐逺大將軍招撫使王公神道碑王彦弼方總管南康過燧舟中曰弼老矣將委印歸畢先人墓事出故人監察御史啇琥所狀曰他日必來徐大參琰劉集賢因與燧三人一人銘之足矣劉集賢亦物故余火參逺莫相及且弼嘗事汝先世父左揆公東平故惟君焉請又曰自弼及與君友二十二年别君者幾二十年不于是焉即求以待他日具禮備數而走三千里之石城恐弼暮塗雖倒行無及也燧曰昔司馬遷述漢傳皆蒐訪舊聞與遺老之言為之蓋熾史者宜然非必其時功臣子孫一一求見而始援翰也燧文劣下固不敢自方先賢而其職亦太史也今而曰先左揆門者其可讓為謹按王公諱興秀祖忠信考濟皆農蠡之博野宋村我太祖始加兵中原圍燕不攻而坑中山蹂山東河北諸名城皆碎已䇿金不能國可必滅也自將征西而留太史國王穆呼哩徇河北未下城邑其年衛王弑宣宗立南踰河都大梁兵興民既困徴求之繁餽餫人畜雜死道路至不頼以生有遲我元兵者曰敵勢甕來耶亦有不白吾令特誅其後服望風畏之不敢至者公聞兵將至曰丈夫生三十年而勞苦耒耜屈壓極矣今已委身餌敵暴骨草野且吾君已出民民尚雖死哉吾有自圖富貴耳乃以是撼三十餘村之民汝幸從我我能活汝乃將壯士數百輩出蠡疆迎雨大帥萬户劉伯林御史夫夫蕭公降帥善其來與之幟曰張汝之鄉我兵自斂戢不汝侵也大兵及城城方力完守具礟死蕭大夫兩軍憤厲一鼓屠其城無噍類遺而三十村無毫毛傷者兵去而艱食民死相籍公舊富粟地藏盡發以廪餓人又假為種貴其力田作以繼糊口又築屋數十楹以居病俾醫煮藥其間時其衣食所活又甚多以徇師王徇地大名東平益都功陞新軍千户又陞萬户從師王朝太祖京兆漠北時恒山公武仙壁真定西山滄海公張福柵信安水中授懐逺大將軍招撫使賜金符令招之僅得兩公潰民令㪚居祁蠡深三州種紅花紫草以供上方織局後由諸侯王及功臣家爭遣使十出括匠天下劉某以大丞相行尚書省于燕亦遣公括祁蠡深三州匠為局使公監之先是常祝天曰吾遭此大兵未嘗妄殺人死者活之饑者食之藥其疾而賙其不至未嘗不力于善也而天報施我者使五十無子何獨戾耶明年彦弼生至是告老以彦弼襲職彦弼能譯言嘗屢使憲宗朝少尚氣任俠其友不幸為禍彦弼願揕匕首仇人之胸幸自屠死不悔友止之中統建元我世父宣撫東平召至監米家倉變陳惡為白米八萬石授提領東平路鐡冶右丞相薦之平章塔爾琿公後姦人多竊馬始互市朝廷議其禁始置潼闗大洋孟津中灤三汉等所以徐邳八提舉俾司糾之凡乘馬而南者必視其傅平章首廌彦弼可任我左揆亦譽曰吾知斯人有敗則咎余平章言是以奉直大夫提舉潼闗十二年公亦從養闕下以至元六年三月八日卒歸𦵏祖塋夫人張氏年七十三前公卒子男三人彦弼所至事治發姦人為起三百餘闕下得省參費正寅連謀宋書論誅如法闗南禁溝髙有支渠久堙其源公割俸瀹之至今䝉溉利者二十村再換中順大夫黄州路宣課都提舉民不苛擾而額亦溢再授知安豐府今以少中大夫總管南康治皆有迹仲彦柔季元柔早卒女一人適李信生子讓與一女二十而寡誓不失身為夫子羞子今有官於朝事聞廷臣節之聚土旌里門矣男孫三人元徳元顯校尉金符海道運糧千户元慶忠顯校尉安慶軍總把幼元恭女孫五人長適榮禄大夫平章政事史弼次適江西同僉樞宻院事陳柔次適滁之六合令董仲次適里人薛某幼在室男曽孫四人二早世二幼女曽孫四人亦幼評者謂史行部與公皆以鄉民迎降太祖史氏自太尉與諸子孫將相五人而公之子猶調常銓總管下路何其厚薄遼逺不相及而兩女孫之夫顧皆將相將天移報公徳他門也耶誠然亦理之未塋者燧取銘之銘曰觀先漢臣陳餘張耳耳終漢事餘中畔棄耳有趙王餘斬汦水天方與漢能與者昌天與仇之宜旋踵亡效于計數一軌千古今蠡為州中城外鄉城捍恃强噍類悉戕三十維鄉公樹降幟豈獨室家雞狗完遂人曰是謀王公為之孰是吾鄉可命寄兹既全而兵又廪而餓又朂而稼假種耰播有疾與貧我屋其居于父母邦推愛何如止官懷逺惟富其夀年幾九十一世誰又而其再傅而子而孫金紫垂躬常銓一門兩女孫夫顧皆將相移報他門非天莫諒維天道逺人迹難知其張其門或在異時螭首之碑有光前兆琢銘昭昭來世為告鞏昌路同知總管府事李公神道碑公諱節字子忠考諱松金寜逺大將軍輕車都尉隴西郡開國伯食邑七百户由鞏昌府僉事遷其府判官行元帥府經厯妣夫人髙氏從封隴西郡君祖珪以開國貴贈隴西伯妣夫人某氏太君曾祖槩氣服其鄉鄉人曲直不愬有司求聴其家髙祖澤而上不可世也其李姓隴西人者或曰猶漢將廣之苗胄公生而剛明其尚氣俠得賦自家長知讀書曉習法律遭時艱棘以戰勞自敦武厯忠勇忠顯三校尉既官矣復慨然曰吾自求樹立如人曰吾薄門功何如即吏部取廕試律射皆入等出身奉班祇侯監華之渭南税未上行省開國平凉開國為奏差經厯鞏帥田瑞欲異圖方閉壁錮人出入是日公乘夜縋出走平凉上變及官軍至故便宜都總帥隴西義武公汪世顯時為門將開壁納之縳瑞置法公以先時發膚功轉㑹州軍事判官超鞏昌元帥鎮撫都彈壓兼照磨加忠武校尉便宜都總帥府鎮撫軍民都彈壓天兵巳殘陜西完顔仲徳行省于輩招集熈河慶陽二十四城㪚亡將卒數萬移鞏治依險石石門山知麾下元帥義武忠壯可倚時節至其家拜事其母無異生已金社將隳假義武以便宜都總帥身將三千人東援道敗之餘纔三百人連汴金主已播不至家追及于行説令西駐石門因秦勁兵以圖巴蜀不聴走歸徳走蔡自經死仲徳赴汝水三百人皆從死惟十二人為謀勢今業然石門日夜望吾東音計今日即徒死無益必歸必報十至秦州為秦所止二人越去語鞏時秦帥鈕枯禄已不受鞏命自為七省顧檄義武來計事開國謂義武無行請不往嘗從公既至彼以失乏軍興錮之已誅數人開國度不可得脱殆呼公前曰吾書為賦誤語置枕丁即自經其帥欲併除公賴賂珠其妻免始從䘮歸𦵏之郡東原未卒窆聞敵且至衆悉㪚去公曰吾寜蹈先白刃不忍敵坎不掩暴吾先也竟卒窆去敵旁午馳終不至塋義武孝之俾襲開國帥府經厯蓋甲午正月金亡明年十月其府猶稱天興義武集將佐曰主今亡矣誰與為忠人以羣盗遇余率軍民萬家為口十萬來降皇子奎騰義其後服曰為臣能然何忍罪戮仍官以便宜都帥府凡其前所節度二十四城還受節度公亦仍前宜都總帥府經厯始去險就夷還各城居官舍民廬皆翦荆棘斬蓬茅為之使人父子兄弟得以休養生息至今西土種族殷繁誰之力耶尋陞鞏昌府推官訟清賦平再還其府判官帥從大軍嵗入伐蜀責使繼餽雖千里數石不能致一之地不匱功超僉兵馬都總管府事俄權同知兼便宜府經厯方年六十忽不仕而樂礫石山水為墅其間號蟄窟老人不踐府城絶口官事樹桑及他可材之木若干千章竒花珍果埒是惟樹松二十四不多益也䟽泉列石幽蹊危榭人之至者瞻眺望歸如在物表時興佛老之徒研思丹方奥典如不足日故舊或過必烹羊繫豕劇該縱飲厭醉而罷來者共席不賤耕樵年八十三聰明輕矯不衰壯時登樓上馬不藉扶掖几杖非不御不設也一日疾子孫問焉顧庭筠等語汝兄以䘮來其以為言奴婢數十家吾食其力久其民之以至元甲戌冬十二月三日為詩而卒計始為墅實二十四年或曰二十四松蓋前計所止年也明年三月甲戌袝之襄武城東原先塋二夫人陳夫人前卒二十年繼夫人王前卒三年三子庭玉今資善大夫行西等處行中書省左丞庭鈞鞏昌路兵馬副都總管僉鞏昌府事兼便宜都總帥府經厯庭堅便宜都都帥府鞏昌路都總領二女一適輩昌路都元帥兼權便宜總帥汪翰臣一適魚温内外孫男女合八十九人曽孫男女四十六人平生篤于人倫妣夫人髙卒事繼妣楊夫人不知非非其出及卒遺二女俾陳夫人子之筓未歸者厚其資賄嫁成州武亨在抱者撫至成長嫁帥掾南汝徳又嫁弟忠孤女鞏昌元帥府參議都總領嚴孝忠弟賢府判官卒其子至鞏昌都總領庭某壻劉氏夫婦皆卒又撫其孤女嫁帥掾張珪後庭玉自蜀軍中嵗一再或一來覲公不善曰古人以戰陣無勇為非孝豈可以我故輕去而軍且吾所以甘伏田畆樂之終身而不悔者以汝及功名之㑹有搴取之才必張吾門于他日孝孰大是若晨夕侍傍不乏致養則汝弟責勉思吾言無以匹夫親親為心故庭玉一力邊陲最是質子至將相凡六十年﨑嶇巴蜀甘凉之郊隳名城摧堅陣徠偽臣禽逆王與斬叛將大小之戰四十為時勞臣又善謀畫以世祖之聖能受盡言而不罪人至入告大計諸侯王猶苦于扞格自餘老成顧問之臣日月至前如承㫖王公一咈其聴雷霆之威幾不可濟而皷鼙之帥逺闕廷數千里數嵗不一至焉從容片語回軫聖慮于十年之後而得開可田何道哉豈言適其時不泛不迂而切事情然耶亦素諒其忠也書之言曰啓乃心沃朕心尚其似之此二官之篤其眷者嗚呼有子哉銘曰善為塗行日昃而息所以再程不窘其力即小而喻公焉似之謝仕未衰豈年是期無稱平生日託巖穴徒興草木腐泯為匹思公荷戈遂逐羣雄四顧長嘯横厲雲風事揆義為不罪于教語臣而忠子職已孝人紀立矣為榮斯多人爵崇庳我謂斯何爰樹礤山㑹蔚阡陌匪利斧材惟以種徳責報其子捷于皷抱曾未卅年將相身都有不話言言而既績惟不授事授靡不力嗟今之人或難其全不難令終而難今傳公兩令之桓銘斯琢于礤之山式配吳岳少中大夫静江路總管王公神道碑敦武校尉衡之酃縣尹天錫手事狀拜而言曰先人少中大夫静江路總管始從事故宣撫張子良公于歸徳實先生族姑之夫後以掾事先少師公于汴則天錫今請匪直以先生銘賢公卿之墓之多而來以先人兩公故吏有好故也則昭誄墳道者捨先生奚託先生亦奚其辭燧諾之曰子言良是而先公及識之為序之曰維王之先天平人曽祖而上逸其諱祖鎬金泗之虹縣丞考瑀皇大將察韓署為睢州軍民長官初大將嘗徙淮南某州降民於睢以其家凉再西徙于凉而奴之為其總管李侯訟之大帝潜藩為下教正之還民諸睢長官所領實是民也公諱鈞字閏夫幼而惟儒之師長學吏事流輩以為能惟惆儻自許不凡每恨枳棘非鳯鳥所巢知者竒之惑者笑以為夸也歸徳隣睢金季宣撫公自范陽將其部曲奔泗州將楚將者潬其驍傑與一軍多冐法難馭謀殱之宣撫覺一旦大閲戰士率其徒十三人突入斬楚併其軍徙泗民四萬歸徳中統之元公始從事是府至元五年故左揆劉武敏公開用兵端于襄陽詔集天下兵臨之制寵武敏漢軍都元帥専將其軍其年又詔先少師開省于汴足其餽繼明年擢公掾省九年公䇿撼武敏中合機意為奏官以從仕郎其帥府經符金符故丞相史忠武來蒞師明年襄陽下奏官以襄陽總管府判官十三年詔以湖南戍軍多疾恐坐不習食稻俾公舟粟若干萬斛如湖南故丞相阿爾哈雅所明年丞相奏官以奉議大夫行省左右司員外郎遥知慶逺府又明年升朝列大夫左右司郎中皆仍帥府金符十年升中議大夫永州路總管二十有四年升少中大夫静江路總管二十有七年龍集庚寅夏五月二十有一日㑹雷州官舍年六十四子天錫迎樞歸𦵏襄陽漢北古城後十一年始具碑墳道鳴呼概公平生遷七官未嘗一遭暇豫掾省則當徙河南汴梁之民屯田唐鄧申裕嵩汝六州之郊經厯則畫夜介胄虞敵行壘判官當詔故太傅巴延公將數十萬衆南伐大集啟行襄陽公位府末屬軍旅百需朝出而夕責成其躬徴呼之煩有窮日不遑食者當西南五十餘州新下而宋餘孽兩王儧號海中逺則廣之東西瀕海諸州近而衡永全潭之屬縣江北黄信陽皆袒臂和應覬受偽命以自為名賊殺長吏平民據州縣壁山柵水負險騷亂者在所千萬為羣鉏鏟底平公為員外置同正其安集之方諭信之言撫綏之使傍午于塗幕畵居夥公升左右司郎中之明年兩王死丞相加兵瓊崖儋萬海外四州留後造舟鍜刃饋糧一切供億靡不皆集為永則前政當周龍張虎剽殺之餘長吏利之根㧣深治以取賕售公䋲興事者以法寜謚而休息之州民與儒爭䝉其徳狀其治于省數百輩遂有日本之師賦造海艦皆取材于民而促其期艦於矣犯法臣平章省復覈有司侵牟為計局責償之徴斂户及為静江始是郡由抗王師㧞而坑之官寺民廬一炬盡燬惟婁鈐轄將所部二百五十人壁月城丞相小之而多其忠曰是何必加攻抽兵衛之視其終何為也逾旬婁奮身前行曰吾甚欲降加苦饑何茍恵賜之食惟命乃遺牛數頭米數斛壁下之部將開門取歸復闔吾兵自上瞰之其曹分米炘不待熟生臠牛噉之立盡飭其曹人擁一火礟坐然之聲發如合數百雷霆為一城土震落煙燄蔽空吾兵有驚死者火滅骨盡無圭撮遺亦死事之竒哉迹是可灼其為新造之邦之民也又㑹再詔皇子鎮南王再征交趾民懲前困皆捨業而逃十室空半省檄公身至海北十九州督餽檐負逺向者無慮千萬夫軍不匱儲又持詔料民海外凡四涉鯨波得户増多其舊十有六萬省又為計局責償料民侵牟而徴斂滋酷几是數者皆取民怨仇人循牆而走者及公為之不鷙其威而事功立馴難事之臣而使辱不迨已其才長治劇將順何如也舒嚕氏遼之貴族世連姻帝室由金譌為舒穆嚕夫人舒穆嚕汢漢萬户老格之孫琿塔噶之女萬户圖嚕之姊也歸王能顓家政公卒而門户益樹立雖天錫一子與婦孫宣慰女甚愛之者嚴于教朂不少借以顔色俾以廕及天錫尹酃縣亦确确其艱哉内外姻戚皆服其寡而有操公元配楊氏續廬氏卒𦵏盧兆盧惟一女與今三女皆他夫人生子如已生一適某餘幼銘曰惟兹下民陰隲有天或閼而貧或華以綿世之信之如寒與暑其未逆知不一方所而獨于公始終西南由宋而汴而襄而潭而永而桂極海之外一逺而宦一振以大古九其命今品反之九命無從九品則卑公品登三實古命七州牧侯伯其揆歸一澤俾及子吾元之仁七品官之酃尹發身何嗛于生何憾于死文以列功碑漢之涘平涼府長官元帥兼征行元帥王公神道碑王氏由宋敦武將軍嘗令鳯翔之岐山官卒子孫遂家其縣之姜村大父世昌業今進士舉父大用以材武為千夫長生公而卒公諱鈞以幼名戚七行為孤童子時鞠于季父大有所已犖然有立志長以俠聞自令而下一縣之豪無不與之遊甚為季父所知期以克大吾家㑹我元加兵闗中其視大城堅陣不啻驚風怒電之摧枯震落覆之如此其易也幸大軍去而羣盜復起岐雍之郊百千為曹以剽發財粟為業及既殫亡無所得始掠人為糧于是行省開府長安累調軍誅之不能平長安路絶而生齒益耗矣公倡集鄉兵萬人自將壁拙山後移壁三稜堡偵得賊巢窟縱竒擊之禽張嵩北山斬安和扶風遣辯士説降梁七晜弟乾州梟楊政馬超山磔線張汧陽併將其衆上功幕府遷都督控再授鳯翔安撫使行省棄闗中而東乃移所部與邠涇乾恒數州流民復鳯翔繕城郭闢田野為戰畊具劉咬章自敵來歸麾下多謀殺而取其財者公壯其來發卒衛送入汴由是汴都方聞闗中城邑猶有未盡沒敵者遣間使懐金符即拜鳯隴元帥壬辰大蝗饑移民就食秦州始與今在丞公之祖汪便宜義武公合力拒戰甲辰金亡明年廼下我元義其後服釋不罪也俾將所部從伐蜀自效其年鈔沔州㧞大安軍明年破成都入其郛其年入覲以功賜金符仍故官帥隴州明年䧟遂寜明年襲萬州戰皆㨗又明年由鳯隴平帥改平凉長官元帥兼征行當弭兵之初平涼之民披林莽茨屋以居者無百里食半蓬稗故部曲聞徙鎮皆扶攜老幼以從嵗中得萬家明年再從伐蜀再破成都虜其將以歸完朝駐蹕六盤山平涼實近都供億之湏使者徴發旁午一日數輩皆取給其家後賦入粟沔陽率十而致一皆不忍征之民為代輸三千石故二年闔郡帖然復亦由此故比他諸侯家至今為甚貧凡在郡二十年請老于朝以子贇襲職又八年當至元丁夘春二月五日卒年若干其年四月歸𦵏岐山之先塋數百里間輀車所塗民哭之如失其親戚為位以祭者數萬問之則曰吾屬皆昔見活于公者也夫人李氏同郡著姓前卒子二人贇某官由知平涼府轉同知安西路總管府事方為之資授室而卒男孫二人未名公以不及養先公䘮之終身四十年不御肉受官必推功二弟初為鳯翔安撫使援挂招討使琳都總領後為平凉長官元帥兼征行又引珪代征行琳為副帥陞為郿州復以珪兼知州事雅善岐山令進士劉繪相失兵間及開帥閫繪為民洛西宋自襄鄧並西山出兵為刼居者屢急公為其車馬踰三千里迎盡室以來敬事而歡奉之數年後聞定乞去固留不可厚幣歸之若是者皆坐資篤于倫理不待學能者也大本既立其他聞人父子兄弟虜於人必捐金搆之以全其天屬得蜀士則延致幕下俾有食以仁其妻孥又其稚也銘曰遭時之艱不武有力可以服人人則見役大兵之餘梟狼蝟生膾脯視人何忌不行公憤以歎嵩呼右袒義而從者旋踵盈萬梁氏晜弟嵩和政張兇饕幾時身膏斧斨大慝既殱儔黨謀我有以恵徠用烏不可汝饑然耶我汝糗粻寒切汝膚我有衣裳人人奮激昔迷不又恣公使之公令敢後滄海稽天精衛所仇誓衘木石以絶横流金亡明年猶用其正元輿一軌來方請命從征庸蜀疾戰先登奏功斬墀稱之曰能金節命書擢長帥閫萬室通都棘茨起本使不授館至即我廬賦粟逺輸我牛我車種徳在人淪浹皮骨年胡可長名則不沒矧子肯堂有文而才務昭乃先未艾其來于岐之陽于渭之涘琢詩穹碑終古之視牧庵集卷二十一欽定四庫全書牧庵集卷二十二元姚燧撰神道碑榮禄大夫江淮等處行中書省平章政事游公神道碑公諱顯字子明以至元十有九年拜榮禄大夫江淮等處行中書省平章政事明年夏四月二十有一日薨于位享年七十有四明年十月二十有八日葬汴梁祥符縣之西鄉後是二十有三年當大徳丁未其元子海北廣東道亷訪使永錫俾其猶子偃自汴而郢持故翰林侍讀學士高凝所次事狀以墓碑見託燧徴而叙之游世不可逺本考逸其諱妣吕代之崞縣鉅姓嵗為羊裘三千以衣寒者傭工鑱平太和嶺石路艱崎步軔售直白金為兩五十又伐石橋崞水以通夏冬閡漲病涉鄉民惠之目為崇善老人天馬南牧金宣宗播汴徙君許之臨潁東臯卒𦵏其地嵗壬辰㧞許公𨽻大帥巴爾斯布哈帳下由是善國言俾經厯其府事後同千户阿爾烏蘭從諸侯王南征破金商鈔房禽何太尉襄陽下帥府版為副逹嚕噶齊軍將劉儀段哈雅實克叛執公送建康太尉劉石河言其材武于制置孟珙㑹珙移節于鄂遣石河防秋淮漢公説珙求為前茅遂得俱北將及隨與田僧住二騎夜遁豺虎縱横出入林莽瀕死數數及鄧之新野適阿爾烏蘭巡徼相顧悲喜偕至大將察罕所為驛致龍廷嵗庚子入見具陳恩主棄妻子挺身來歸及自建康抵鄂州軍鎮戊形便兵食虚實我加兵誅可以必舉太宗喜顧邇臣曰若軰曾㣲一言及此因嘉歎公昔太祖由一回鶻迎降賜以羊馬授之璽書從其所為人無誰何卿自脱敵死間闗以來又非其所欲賜白金五萬其兩用之有竭其封襄陽新民二百家世為佃民加錫銀符錦衣二襲亦授之璽書從其所為人無誰何歸率是民復堰鐡拘壅湍水為渠溉稻田千數百頃人頼其利後宿衛憲宗制授之璽書從其所為拉吉爾廸幕長且行賜之酒辭帝曰卿辭朕前將飲無人所耶公曰臣何敢面欺今既効死軍前請從此十年不御歸至鄧大帥軍漢北敵壁間寂無人開門㧞幟招諸軍進及帝自將伐宋謀由蜀入兵及散闗公諫巴蜀水則江流悍急陸則陟降山巘舟車皆不可施利餽繼甚艱六軍出此恐非萬全之策不若取道闗東夷塗直臨江漢世祖時方淵龍帝曰左方之師朕已付之業已至此其有時宜即彼言之嵗戊午也明年世祖已禡而南追覲于蕩隂教自今凡所欲言指故平章政事亷公時以宣撫從征偕以入告大軍至黄陂責中書納罕資取敵舟公言斯人傲忽于事恐既集者不嚴守警將復散走而果然俾公治别帖萬户戰舟而篙師不足公曰江南之民居多瀕水無不能操舟者盡前俘壯士立兩幟下令能右否左得九百人遂濟江授之銀章行宣撫使世祖正位宸極中統之元制位中書左丞大名宣撫使張公仲謙下明年代張公為使其褒辭曰割愛就義遇敵有功處已端方臨事敏給又明年李璮反盗據濟南張公撫訟公嘗通書璮帝謂近習㳺某豈為是者鷙禽為狐所憎然耳及籍璮家而書無有勅以訟者付公聽其甘心其人亡命踰年公召至其妻子曉之令出保無他也其人膝行于庭祈死曰曰吾誠為是汝言而可吾所無有而汝言然汝為妄人敕聽吾甘心則生死惟吾吾其忍汝殺如昔遇之公以平賊入賀進宴故事非宗臣國人胡牀不入宫門殿坐皆席地不為設榻侍宴不稱觴至是公請稱觴制可之後賜黄金盈斤他日帝燕坐虎帳方止人入宫至為衛士所訶爭呼于庭帝曰是非㳺某聲耶召入詰曰何為而然公對臣將有請為衛士所邁不知疾言上徹宸聰罪滅死帝黙久而出之裕宗時為為中書令樞宻使適至復召之人令盡所言對以臣聞將改宣撫司為宣慰司且司者官之名也使而下官之人也由所官之人非才事故弛而不治何闗乎官之名今雖變名宣慰不求惟賢惟能任之仍夫宣撫之人猶惡夫鼔不鳴而新其枹聲豈加大哉因厯短諸臣無少借隐帝顧裕宗曰汝他日求可眷倚者須此輩人至元二年進嘉議大夫益都路總管兼府尹未幾改南京路總管兼府尹四年改大都總管兼府尹公因以乘輿嵗來居冬其儲峙穀食馬藁秸諸物和市之民直多不給為所司盗有豪宗鉅室田疇連阡有恃不輸中下之家率反户及公則以物力多寡差賦之直已無所漁牟敢有為舊驁猾者悉論如律民力紓息其半賜楮幣五千緡入言左右兩丞相安圖巴延二大臣者一居中書其事足治宜分命左丞相為樞宻則六軍之政将日齊肅于前制可以巴延同知院事六年授河北河南道提刑按察使八年㐮陽用兵之四年改總管水軍萬户創石囷七于漢中流以絶敵舟馘圍之兵千改陜西四川道提刑按察使皇子安西王國秦未至公見之六盤順聖皇后賜金帳載數十車用事臣欲置憲府奎鈞慶賜之閣憲副張庭瑞不受曰汝總管自有府其即彼以置留車一夕用事臣纔其不恭銳欲深治力陳辯且責其人霰珍罷右丞相入為大官人有事干者斥曰吾守大釜鬲者他非所知汝王食官不師此而行乃越職沮撓風紀或帝聞之謂王弗戢左右也王雖不善以受知列聖身見其摧大臣于庭且聞帝託裕皇于他日者庭瑞由以得受輕罰二巴延濟江下鄂帝曰㳺某曩者曾事列聖于朕前策取江南熟矣非直能言亦能為者今聞濟江而獨不與意必熱中其召以來授前軍宣撫使大軍臨蘇公從七騎薄城呼曰我㳺宣撫也來曉告爾州州將丞相奉詔諾諸軍以平江南誅賞精明其早自來歸取富比他州將不然梯衝一樹則加誅後服為屠屠常州續耳無殃生齒數百萬也王安撫即以城下公身至坊市集吏民諭以天子仁聖威徳軍律降城不誅其安爾室家無恐或持金為謝曰吾非利貨為者授蘇州宣撫使遣人四出招來逋民凡得十三萬家貸倉穀為石百三十萬為種于民約秋熟償官民歡輸之無少折閲十四年授中奉大夫浙西道宣慰使杭民聞來相語曰吾屬幸哉善撫安蘇州者㳺公至矣明年入覲布幣蕭墻俄帝輦至顧謂之曰卿老人宣力良多一日俾坐胡牀持枤指使宫門何事不集其日入宴坐賜之榻輟大官所上飲食之後疾遣使醫持藥衣白貂裘皆殊恩也疾已入謝言江南頼陛下神武文軌一矣惜往敷宣聖化者不稱任使勅語之中書其年國人為浙西宣慰使者死省奏以國人嗣為上曰㳺某非國人何且指盗殺臣為平章者曰是不可居汝下者豈可久使亞人明年授中書大夫中書右丞行浙西宣慰使又明年用兵日本江淮福建湖廣之兵將十萬衆皆齊集資食于杭凡廪米八十餘萬為石又造海艦若干百艘材不足于足勸富民佐木皆酬其直又鍛治甲仗一令之下星火不喻其急動以失軍興緩制敕從事其堂帖無如瓢木弩莝刀皆預為千事盗殺臣益忌乃好言入聞㳺某髙年當以某人為使少分其勞實欲遣位公右上召其人至曰㳺某老人汝可父事其欲位汝其下三四何所惟其言從十九年是臣見殺于盗其姻黨貪墨姦窳上盗公帑下厲齊民者諸不法皆露而東南新國尤罹其毒公為鉤考惟是一省徴贓四百餘萬為緡明年明州民饑貸米石五萬餘約償如杭及再用兵日本詔軍與百需責使供億其時已疾猶支持視事尋薨于楊州官舍斯其所履厯措注寵數大者自餘其敏政如尹京日必待命于庭秉令中書乃歸治府雖事叢至其前必决一或然火達曙不得家食則必取之市霜雪寒慓至宿于野與造海艦于杭役塲達城二十里比曉已至督視竟則聽政于司夜必二鼓方息其恤孤獨或為人所抑則不大聲色呴呴導使盡言事雖無迹計數以求必得其情其推誠感物如南京盗數人竊戍軍之馬于律當倍其償軍迫南征為先假諸公帑同署者難之公則曰過則在余不及諸君與之期日縱盗歸取之家如言而反悉輸之官受罰不訢為杭生獲荷葉浦賊周先鋒輩四人公曰堂堂宋室國家取猶覆掌鼠子何為皆官以廵檢給衣服貨財遣之曰能與而餘黨舍賊為平民惟汝反靣叛歸亦惟汝旬月招其黨傾其巢窟牛天王據海島官軍加誅積嵗不能平公惟遣象山僧往説之乃與之偕來凡此皆事動天聽者也三夫人張氏趙氏完顔氏子男四人永錫永禄天祥永弼永禄知延安之綏徳州天祥入侍裕廟于東宫與永弼皆不禄女六人長適陜西行省男趙某次適提舉男路構次適襄陽路總管馬國璧次適蘄黄等路副宣慰呼圖克岱次笄而夭季適史太尉忠武公孫知安陸府史熾男孫四人偃億倫僎女孫二人長適提㸃奉宸庫𤓰爾佳思政幼在室男曾孫三人元嗣元偉元暉女曾孫八人銘曰在昔英文名城剖分為開國臣賚其庸勲公時還南首策平宋克沃帝心顧曰禁從咨汝如林孰為斯言斯猶宜同功勞位尊其封襄民為家二百其世有之尚力是獲定憲二廟守而不渝嵗賦名城天府尚輸獨復公家盡私其有雖儲千金富無此厚英文富之世祖貴之在笥衣之玉食饋之位亞人臣龍光匪夷自夫壬辰迄于乙巳五十年中髙明及此謂非人豪謂之曰何槩其平生庻善則多維列聖知無是為大爰筆之碑永白隧外金故昭勇大將軍行都統萬户事榮公神道碑大徳辛丑燧持憲節使江之東其明年袁之總公榮顯祖書遣屬吏聶復禮主政致父都漕君之與其同官題與别駕喬簣成李仲和及江西憲僉郭貫行省檢校閻宏之書為先以龎太史詠所状曾大父金都統萬户公之行拏舟三千里來宣求墳道之碑嗚呼逖矣勤哉是有比焉昔腹勝軍節度趙慤死于金及其子故同僉書樞宻院事良弼使倭哀鳴先朝願詔詞臣賜銘于石制可則異代之臣能忠所事者舉宜得誄乃序之曰孔子遊太山見榮枯期年九十五鹿裘帶索鼓琴而歌于郕之野曰貧士之常死人之終孔子以為能自寛今榮氏家横梅之清池違郕不大逺豈其遺苗歟公諱祐在金叔世宣宗蹙國播汴河朔豪傑所在爭起倡糺義兵完保其鄉金訹以官兾頼其力復所失地聞公有衆踰萬以為昭勇大將軍行都統萬户府事故竒其服别異他軍俾戱下皆華㡌人望空杠孑旄束斾知為公軍遇士大夫長于綏懐衣食皆資其家故戰人致死力所當必摧有效蹠蹻膾人肝者立磔為徇以故其軍生齒並隣不耗焉卒葬清池讃善鄉王强原夫人王氏子男四人興既嗣將將是軍曰吾于申令之際不得不建是都統旗鼔然戱下千户皆父之執不可一旦偃肆居上宜貶吾名止曰千户一軍益躍趯用命其戰必前列以身當當敵有所克獲惟衆取之少不覬見與夫能寛且惠皆聞見之得其家者河朔平太宗即位三年辛卯肇置徴收課稅所河北東西道辟為滄鹽辦課官時理財臣爭以苛剥相高獨能恪其素守人以善譽卒四十五五隆昌堝官堝積鹽而席其鈞石之所次顯與貴女子二適李氏孫男九人當早卒淮都轉運副使自滄鹽利民場為司判副使清鹽使至以承務郎為今官終始鹽官故悉其弊蓋是司惟榷鹺利煮海為之竈則不一其所賦車州縣發軔自竈逺或數百里纔先與直三分一至堝盡售之一遇霖潦留陷濘淖斃牛敗車蹄輪填道策于中書願募商旅納估于官持劵即取諸竈嵗省車直為緡三十餘萬今著為令年饑人噉草根木皮預虞竈民散亡稱貸鉅家米為石千布為端萬分賚之約償樂嵗又大雨水溢竈多冐沒煑不盈數嵗賦用逋度支責徴繫吏牣獄再至京師求遣御史按覆得實復捐七千緡皆惠政也及顯祖同僉宣政院事曰吾子三品榮耀矣遂解組課童耕桑野服徜徉其鄉嗚呼其老子所云知止不殆者耶成漕司廵鹽官次昌珪斌珍得孫都女子女十人適徐李趙某族曾孫男五人欽祖管勾厚財塲繼祖大用庫副次顯祖也今以中憲大夫袁州路總管兼管内勸農事提調造茶勾當袁𨽻行江西省而舉刺則湖東憲府宏貫皆言榮袁州糧二千石治最江西貫燧所畏宏嘗同太史氏言皆可信有是能子為臣明時宜都漕君輕去袖手一堂坐視其猷為也紹祖以國言教授長蘆慶祖禮部奏差女子六人適齊范王楊李嚴六族𤣥孫男五人滋安源溥溢女子子二人銘曰屯難之時弱不自濟其依于强亦勢必至金徳自宣既厭于天接淅而南河朔棄捐倀倀遺黎既安舊土匪連為羣有侮孰禦維兹清池海浦在東桓桓榮公萬夫所雄如鳥之歸有菀彼林約束不待來比烏在無他求為全生是頼譬衆同舟風濤中流莫不奮檝攸濟之求為將是軍善作士氣人華其㡌表襮自異昔魯烝徒貝曺朱綅何是肅暇千載有今萬夫洸洸不一其面而一其心阻海之甸非一公威而一其仁寒饑在人如切吾身孰有不裳吾解以衣未飱孰有我庾其饎猶惠小小有甚大斯匪曰禁殘寡婦孤兒人魚肉之溉鬵已久天懋其功宜熾厥後子長千夫年艾不遥豈俟曾孫畀其光昭嗟惟令孫才優治賦何便不張無􅗜不去迨曾孫貴考槃遽歌子仕父休止足如何曾孫袁州良二千石登古七命其進未極凡之有家孰造孰承詩之金石垂示雲仍浙西亷訪副使潘公神道碑公潘姓諱澤字澤民宣徳府人府在金惟州曾祖嘗為州孔目而逸其諱祖禄考得用生行軍萬户府提控渙及濤與公伯仲氏皆善厚殖其家資公讀書壯而逰先師魯齋左丞許公之門盡戛故習而氣大變飬親不違其志事兄愛以敬閨闥有閑及出門庭卑以下人語恐惴之遇夙無所厚薄者于塗必謙謹戀嫪令盡所言不峻謝别用太保劉文貞公薦由從事太府監擢監知事轉贰左藏庫使出再提舉織染局金符在順天路官承直郎宣徳府則奉訓大夫課皆最陞奉議大夫知𢎞州兼諸軍鄂囉始有土民以行所學郡旱遍禱其境百神已乃詣郭西泉投文祝曰山川之神其所司者惟在能興雲雨以水下土耳今旱暵如是不能膏澤之神固已不得其職使州刺有罪幸漏譴于明天子必將殃之宜止其身吾民何辜横罹斯毒則爾神又佚罰矣敢恐恐退俟終不得命當自劾去其夜有光如星騰泉明日大雨為屋祠龍泉上自公未至州之南並山風為灾又為文禱曰風者天之號令順四時温燠凄凛之氣發逹遂成萬物者也時自為惠反之而已灾况暴厲無節穴涌谷起飄翔塵沙偃揠禾稼以病民哉禾民恃以生上以出縣官租賦下乃仰以粢盛報事乎神明今使之貧窘無所于食目其顰苦之顔耳乎愁嘆之聲神亦安所利之必州刺之是矜其收是􅑀怒自爾風灾衰息民頼至今尤究心用獄前政繫疑盗八人榜掠百至求迹無所公明其非辜皆出之刼家訟公故縱無幾時而盗果得西京械成獄令待命他郡過治囚號市曰此州之人神明公以為包拯復生獨不能相活耶公將召問同列謂宜發卒衛出吾界而已讞非吾事也公曰人求直其枉烏可陽為充耳不聞卒問之葢太原民輸既如約矣倉吏不以時受入鈔貴家奴令代其輸既如約矣奴與偽為鈔者友陽悔之有我善鈔而歸所偽為我急其得不詳視也出而用之而事始露有司鍜成之謂利利賤而買之偽為首當以見知法公列上之竟雪其誣而抵奴與偽為者法賦州市牛公懲他郡驅牛至官擇可受直聽命旬浹奔走煩勞廢其穯事令持價即鄉民自為市吏無所姦利駔儈亦不得上下其直轉知興中州入為監察御史刑部主事恃當國臣知多行不法察院召按不能致公從卒至部捕之一訊而貪墨皆出論如律轉僉山北遼東道提刑按察司事治有田民殺其主者獄已結矣公詳讞之則其妻與所私夫為之乃昭田民當二人法又有訟為豪室奴其一家十七人有司觀顧数年不能正公以凡今鬻人皆畫男女左右食指横理于劵為信以其疎宻判人短長壯少與獄詞同其索劵視中有年十三兒指理如成人公曰偽敗在此為召郡兒年十三十人以符其指皆宻不合豪室遂屈毁劵民之或言髙麗王有逆意集將吏將徙故都詔近臣偕公即治公以王今尚主王設舉事主安不知知安不上變聞而噎嘿以從他臣治獄希意深鷙求竟公獨輕平主果馳使明王無有事從中變制使多得罪獨還公憲尋入都事御史臺剖白羣疑商訂時才自其口出人所畏縮皆身任為無少顧讓然不專已博咨之人嘗曰君子小人喜以朋從觀受薦何人得過半矣又致察其間有失而不中哉今曰必吾所識則識有盡不足列職中外况未必盡賢人曰可者審可不必囿以資格故評臺臣者皆曰自公都事察院監司一時翕翕勝職最衆出為江北淮西道提刑按察使按宣慰家兒怙勢抑買民物不償直與償而不滿者皆比贓論後改提刑按察為肅政亷訪轉江南浙西道肅政亷訪副使方分杭州州以至元壬辰秋七月一日卒年五十五仲氏子希善希逹五千里與柩歸鄉明年八月始葬先域夫人任也三男希大希成希安大成皆前卒希永他室李出三女適任徐張氏皆士族公既貴矣進伯氏子希明事裕宗于東宫今出知隰州後葬二年伯氏懼公平昔之善泯其不聞乃身入山敦工伐石求其同門友祕書少監楊桓狀其事俾燧銘之碑燧曰公之為人桓為行實文何尚焉念今之世子弟為父兄求託金石為傳者或多有之如提控以兄能反復致意其季者纔獨一人鳴呼豈不若是不足為愛敬報歟銘曰維公生資粹其民彞加及先師北面事之仁義㣲辭道徳盛儀日耳以闚如垣厚基增崇其卑如田有鎡多稼離離尊聞行知始由家推慈孝㓜耆閨闥枲絲秩秩其宜出焉郡治視民如兒調均賦夷仁柔膚肌何有創罷其禳其祈山川百祗如指以頥而渥風衰誠之格思罪入髠耏有少枉疑猶已渇饑不身之私竭蹷觧纍必出是期發摘吏欺大治小笞戢威顔眉衣繡斧持遼浙江涯皆所往釐在在歌思曰到逺而如何數奇中塗其萎識不識悲中郎諸碑泰無媿為斯銘如斯琢石以垂信夫他時牧庵集卷二十二欽定四庫全書牧庵集卷二十三元姚燧撰神道碑真定新軍萬户張公神道碑公既卒於戍所衡州之明年而夫人亦卒其中子世其真定等路新軍萬户懐逺大將軍塔喇齊者將歸葬其鄉先塋由是軍受湖廣省節度請告數數終以故事職兵之臣無聴喪葬之文不得命乃曰父子之有在君臣先其序則然未有責其能忠而禁其能孝者吾令何恤俟舟二喪畢葬小從而奪虎節大置於理一惟命竟窆而還凡聞者莫不稱咨其能㧞流俗善於子職無少老一喙焉又曰公之遺烈今雖在人口耳不鑱之石乆或遺忘來者或不聞託以計事至鄂持興國校官陳松年之狀來請銘燧思昔貳荆憲由糾郡常徳公時戍是暇則相過年巳六十五修幹魁顔白鬚蝟張虎目虎吻大掌鉅踵望之森然氣欲搏人談其生平蹈危奮先大小之戰數十嗚呼俾聞風飈鼔鼙闐闐矢石餘軀老而不懲者從可知哉則於公為知死今懐逺以佳公子侍傍又為知生在古人皆當傷與弔者乃三復是狀嘗善松年之能史惟末憾曰濟江將臣公者皆相而獨後公方人固然於及天之厚公者則若未也葢列聖之制職兵民者死其子孫皆世之變自世祖奪職民者符節易其故所死其子孫廕而不世惟職兵之臣萬夫千夫百夫長者父死子繼世傳符節雖漢祖侯功臣之誓曰黄河如帯泰山如礪國以永存爰及苖裔何以尚諸其有相而兼將萬夫者詔俾自擇為之欲將棄相欲相棄將故其時有寜棄相而專將者豈不以相能振耀一時未若既將可傳子孫繹繹無究乎幸公未相相而亦蹈是轍矧他人之家世纔一人而懐逺元兄忠顯校尉管軍總把鑄由從公戰鄂之通地獲於敵死之及子回世特陞千户仲兄史閭亦懐逺大將軍戍瑞州等處萬户獨一門三人金符虎節千里連州相煥以華則天獨厚公者豈不多且遐哉松年憾者恐復為公九原所幸也公諱興祖姓張氏中山無極人曾大父大父不仕父林趙州觀察使改節度判官丞相贈太慰史忠武公為萬夫日𨽻其戲下太宗賜金符千户老以公世從大將察罕征淮南能以少兵擊破其軍虎頭關大將壯之賚銀為百兩間巧於廷賜人馬介胄裝具宋開山南東道制閫於襄陽反㓂洛西殘盧氏永寜殺縛其守長憲宗詔以漢地兵專受命世祖潛藩始置經畧司於汴屯田河南諸州以忠武為使忠武兄之子江漢大都督權為屯田總管萬户宿重兵於鄧去襄不二百里兵信宿至城下鄧甓其城塞西南二門不闢吾袍甲車道屬縣新野西港盡鈔千敵府摘公將兵三百騎與歩半追之及之栲栳潭令騎負一歩敵奪殳斧謀折馬足推歩下騎為陳以待分騎為左右翼合擊敵錯愕無所於應盡殱之完得所鈔戰次馬嬰横屍而顛復騰而上不知左股之折已戰流血滿鞾裹創輿歸府迎賚銀為兩百錦二端曰未足旌勞資市藥也後敵攻新野又大破之白河口中統建元從史經畧樞授東川假以總管戍東安虎嘯一年還鄧戍光化州漕安陽灘禽唐都統㑹中書左丞劉武敏公拯開用兵端大集天下兵圍襄陽從城鹿門江西諸辟戍焦山敗宋援將張順江中殺溺過所當攻樊城督造梯衝又戰江中火其戰艦㫁襄陽援樊㧞移攻襄陽城東南當至元十年凡圍六年襄陽下攻陞總管再官懐逺大將軍副萬户明年詔故太傅布延以左丞相贈開府儀同三司太保并國武宣公阿珍以平章左丞相阿爾哈雅以右丞將大軍南浮漢而下下郢治漢東築新郢漢西鎻戰艦兩城下夾以礮弩横鐡絙江中大軍擊㧞郢北黄灣壁公實先登矢貫左股丞相手傅藥拖舟入藤湖逹漢越郢去從攻沙洋新城㧞而殱之皆負創先登矢又中額三㨗功聞錫虎符從戰漢陽之沙武口陽羅堡生獲其將鄭信矢汰左臂漢鄂既下太傅將大師右丞留後抽十六翼兵俾公帥師成漢陽公曰吾戰是求而顧責守誰不能守則無所施吾所為矣右丞則曰漢鄂乘輿所至視為衝地非材武足以先衆者不可使撫安之不得已徃戍聞荆閫遣安撫髙世傑將兵規復鄂從右丞逆擊走之荆江口世傑窮降詔移軍江陵從功沙市因南風縱火樓栅皆然前登戰城上又戰城中蹛血濡跌殱其軍江陵精銳於是焉盡安撫髙逹以江陵降制置朱䙫孫不出詔以世傑戰而後降非其始志斬江陵市䙫孫死京師猶没入妻子為官奴婢而籍其財右丞功拜平章政事移軍潭州公為鄂公省計事潭留使督攻西北凡三月破石心䑓敵植木栅自蔽或曰火之可入公曰火易沃滅栅心復植且吾師暴處城下三月士咸㐲兵立寐不如礮之使敵不能隊立得廣途期盡十日内薄而登可以逞志平章是使䇿十日公果前登樹旗陴牆諸軍呼聲動天地平章抃賀謂諸將曰非用張某言而屬猶坐城下安撫李芾殺妻子火廨舎倉庫而死潰軍集城西陳江岸公渉淺方仰擊飛石出城傷頰墜水面血及足出戰益疾竟走其軍功聞進官安逺大將軍畧地衡永全桂陽諸州撫其來歸而誅其弗率又從平章移軍靜江四十日㧞之宋餘孽益王爵人號年海中曰余復海嶺諸州相煽以叛潭之群盜在在蠭起平章謂公衡永全桂陽諸州與潭屬縣汝昔畧定盜今復蔓汝其芟之殱文才諭七寨斬祁陽令羅飛主常寜簿若必逹磔周隆張虎新化降其黨蕭隆劉監軍凡馘受偽命二千九百七人縛賊百五十人安集刼䝱二萬三千九百家常德路總管謀應偽先事亦縛斬功聞進昭勇大將軍招討使監歸州位總管上又移監常德仍招討位總管上西南夷為梗初詔征羅氏鬼國㑹其既降未至而還後征亦奚卜薛降之以其王阿利入覲賜衣服弓矢鞍勒公平生殺虎數十一日遇虎一發而踣語其友曰生虎之髭剔齒疾可以已風㧞之虎怒爪鞾裂賴其氣息垂盡不能傷足由是人名公者則加殺虎於姓上至是以國言賜名巴圖尋詔萬户各解使職故公罷招討惟以萬户將真定新軍省檄戌衡茶陵耒陽常寜兼督平永寳慶武岡盜馘其跳梁者二百四十五而伍其汙民責使屯田故來者不失業公尚氣重諾剛不可以威强屈平章始終相從西南者見其不可衆直之醉或腰刀行酒平章避入後閤曰公醉矣戒左右善扶出遇契已者視意所欲與之不少愛焉其時諸將或集皆下之無有位其髙者卒以元貞元年乙未冬十有二月七日年七十五夫人卒以明年夏四月十有七日年七十七葬以大德之元丁酉於其鄉宋邨九男長忠顯次戍瑞州萬户次鵬翼僉嶺北湖南道提刑按察司事次真定萬户皆夫子李出餘皆㓜女女適常某五男孫長武略將軍世千户者金符餘㓜六孫女亦㓜銘曰詩歌虎臣闞如虓虎不間㧞鬚視等塵土以之膽膂秉旄遐荒宣一西南百年未疆荆州之域連城數十襄陽武昌兵及江陵長沙桂林取皆以兵餘郡傳檄反虜起㐲介胄九年晝夜弗釋登危摧完戰必前列荆城底寜移兵夷洞來其降王槃瓠遺種矢石瘢躬元戎奏功大帝一聞一官以庸迨其入覲嘉名天訓乃省在笥華其衣裳又勑尚力業矢象房魚服韔弓雕鞍全勒歸馬躚躚亦爛其飾雖古方伯得專征伐錫命之多將不是越憲憲其勞授報既多葢棺龍光遺𦙍尚荷二長萬夫一千夫長今代一門三將誰兩矧是萬夫一戍燉煌一殘闍波鯨海是航雖基公陛亦遐以勩無羞前人亦曰克世兩間之堅莫石惟年可磨不磷載銘以傳故從事郎真州路總管府經歴吕君神道碑銘并序大德十有一年冬皇上淵龍遣正字吕洙以宫賓起燧於郢相與舟行浮漢而江明年至大之元始識從仕君於儀真傾葢如素留止旬日禮甚恭情甚浹也又明年從仕卒洙自京師犇赴還持集賢待制趙抃之狀以銘墓為託嗚呼禮曰知生而不知死弔而不傷知死而不知生傷而不弔在余為知父於死知子於生可容讓為君諱郁文伯文姓吕氏相之安陽輔巖人葬地與宋相魏國韓公冡相邇世傳為蒙正文穆諸孫以遭宋靖康金貞祐河朔干戈弗靖者皆二十年生齒耗亡十七何譜牒之能存不可推采其次惟地江南今居襄陽者其系最完葢文穆而上温鎮頊韜夣竒龜圖六世下文穆者皆二名簡廼同伴希同夫問同之中同大與祖七世合之為十三世祖下一傳紊矣㣲矣東萊諸孫必續系焉今不得見文穆葬洛陽文文靖公夷簡葬鄭蒙休居壽州大寜大防在藍田豈居相者亦以仕家焉至今鄉人以韓吕二姓為是邦之望皆優裕以治時肇置江南諸道提刑鄂屯實魯為淮西憲副按行所部凡他路幕僚之不職者多被汰黜獨以儀真兵事既集學校修舉㓂攘屏迹鄉師里胥推擇有倫特加賞異白之行廵省惟得斯人力為薦汲將加峻擢後以僧格領尚書丞相勢焰薫天懼抑其志貽悔後來歸養寡親築室東湖之千名以致樂寜與細民逐利什一為甘脆資有純孝譽或勸復仕則摇首不對賓至則封羊酤酒相與為樂以不足日為事計歲有饒惠及窮匱丙午江淮大饑乃損中統禇泉為千者踰十萬州閭賴以不殍死者為口不可殫紀惟不置田於郊曰吾寓公也有是則思子孫嫪以為首忘歸君鄉遣洙從張導江逹善學葢文公之婿黄勉齋饒䨇峯師事焉導江則受學䨇峯觀其必求文公正脉名子以洙沂汶皆取魯國諸川明所願則學孔子末為洹示不忘父母之邦皆可見其為心不苟操履之純也卒以八月二十日卒六十七歸葬其鄉大考珍在金同知渾源州考忠登貞祜進士第監税於衛金亡反其鄉晦徳以卒妣夫人李亦儒家讀書知文於老佛學亦造其㣲監稅卒篤君於學太夫人力焉妻韓氏亦衛國𦙍孫克勤治内有惠及小星之譽前公一年卒洙克佩父師之訓夫豈無自而然哉故為詳此使有傍韓吕合族焉君賦資强敏而嗜學志為世用經史餘力周覧洽記刑書算數尤所精邃筮仕山東道提刑書史詰姦明允雖文無害宋平轉兩淮鹽漕書史是時江淮新國剏為規制抽户為工散弊為本商賈雲集舟楫溯江逺及長沙法簡政平取不剥不羡不岡山賦入其時上計於朝授從仕郎兩淮都漕經歴方數千里之事藂歸是幕力所得為若善御之得輕車熟路便施弊祛功倍曩昔㑹東征倭行省責治軍旅伐材造舟鍜刃餽粟與夫役民為篙師火長百需之來其急雷電以君才優治必必善撥劇乃轉為真州路總管府經歴真州去東征行省最邇未下他州而先及者公以淵龍舊臣或踰分干時其乘雲雷以依日月不難也惟揆道循序表表中行亦時才之可虞者男孫一人女孫有歸與在室者如千人銘曰丞相之貴禮絶百寮平章拜之猶體不摇惟於命官不敢堂帖必謹具階准勑以牒葢尊名爵亦使其人知為王臣自重其身品雖從事居下之上所職則要淮漕幕長煮海為鹽立制禁姦通商惠民鹺利丘山控地之要亘數千里令速責成效於屈指隨以征倭改幕儀真蕞爾一州行省日親軍興百需自近而賦其集有方益爾暇豫餘力及州役均校修逋歸犴清田無萊疇為部使者収其徳美上功於䑓將置風紀時秉國鈞虐焰爍天故棄休居明哲身全事親致樂讀書教子贏資州閭荒歲救死在官與去為惠則􆂮矧子而才家聲克荷太行之東輔巖之里碣以表阡華爾桑梓皇元故懐逺大將軍同知廣東道宣慰司事王公神道碑銘并序三十一年將仕郎同知新州事王弼練服持一書過燧龍興客舎拜言曰此弼先人懐逺大將軍同知廣東道宣慰司事出處大凡與受代所由也中具歲上戰功自生二十五年世吾祖長千夫戍膠州以及至元三十年年五十六六月四日卒廣州凡在官三十二年膠州内地無事戰禦自四年用兵襄陽十三年宋亡與宋臣戰未嘗日釋介胄宋亡至十六年與兩王戰未嘗月釋介胄南海平矣與反虜劇賊戰未嘗歲釋介胄合是三者之戰凡二十七年中十八年三入廣鳴呼勞矣而官已是年以是命也今將以某歲月日還𦵏鄉覇之大城孟邨先塋得善史者銘其碑我先人將不恨其無聞於地上且懐徳地下也敢以哀鳴公大叅龍州李公亦曰是公以鎮撫事先武愍公於帥府先公至地亦至焉者其事然乃序之曰王氏其籍大城者不可世求曾若若祖皆失其諱祖令大城考英故叅張公榮實所將水軍百夫長世祖録其從濟江功賜銀符長升千夫李璮反戰死濟南二子守信禄公以死事臣子之長故世銀符長千夫戍膠州從築夾寨襄陽戰疾力功換金符登最樊之外郛省旌楮緡百戰江中斷横江鐡絙菑楗獲船三十艘㧞樊生致都統徐麟省又旌楮緡百從今太傅南代戰最郢之栁林署省鎮撫攻新城沙洋獲船二艘戰夏貴鄂之陽邏獲船二艘首功三百錫白金二百兩再以都鎮撫從都元帥府定江西諸州授宣武將軍管軍總管於時宋亡其將相更立益衛兩王故廣東不下從破韶州又敗方安撫廣之石門授明威將軍從擊文天祥於贑之興國之空坑止其妻子散降其衆略盡禽前鋒趙賞帥府改行省從右相至廣張經略集戰艦二千海珠寺擊大破之獲其艦百八十斬首不及級計再授明威將軍衛王死入覲宣武將軍虎符還戍廣取葛㞰洞崖石砦殱李梓發兵南安别降林桂芳昆弟新㑹蹙南海軍三千人生致其帥潘舎人歐將軍偽署置官自王清逺遣馬帥陸徐相襲廣州廣州皆擊破之斬三人及其軍干平十數璧歐走如新㑹合黎德徳已集船至七千艘衆號二十萬其别將吳林以八百艘圍馮邨先是公嘗課工於軍伐材於山不資公帑為戰艦三百五十烏船五十載是戰艦徳林衆大潰沈死海洋生致黎徳歐王與偽都督丞相兵馬鈴轄二十四人皆磔之椎其偽璽召入賜衣服弓矢鞍勒加懐逺大將軍同知廣廣東宣慰司事三敗東莞盜張强三千餘人首功三百歸所掠人畜其主廣盜少戢其使入覲恐公受代去歸預乞尚書宜留再授懐逺大將軍同知廣東道宣慰司事降循盜古尾郎長樂自宋亡十年招不能至者版賴勝立興寜廢縣以宅流民又斬汀盜轉入梅循者鍾明亮官并吳禽三首而壊其郡最斬盜為起二十九二百七十一人今著其尤魁驍者皆鄰省連兵頻年不能加誅公必取之廣之屬州皆山險不可馬至梯崖縋谷逐索水則乘鳥船遊擊之不盡不已其為什為伍殺人以剽財之倫皆削棄凡是諸盜名若可易而顧誠難功至今有未靖者老將論者曰大夫死登陴陷陳猶足為名澤及吾妻子今横尸草竊手與經溝瀆不異亦足嗟哉此觀望不屑蔓盜所以也反究公心忠勞如何廣之屬州若士與民及聞今伐爭狀於宣慰亷訪兩司功其盜弭願留公使以殿南荒行省以聞代踰一時而卒惜也夫人石氏子三人弼也知彰其親者非文不逺亦既克子矣餘未名男女孫皆一人㓜甥有戴徳仁者舟從至南康燧書以還可尚矣銘曰北海生濱卒堧魚溟萬里歸棺低昂絳旌維之南溟其險不測其北嶺嶠群盜攸宅嶺嶠何如峻削劘空羣盜利之自王自公凡在勝國敗日難令與今吾元跳踉豪勁公有砧斧腰領汝膏十八年中無有幸逃或曰公哉始勞襄漢終覆武庚椒洋無畔不是之書逐盜諄諄大棄録徴奚示後人曰訖炎趙猶兩孽嘘爾爾死灰乍然已息公與樹功帥從相從貪人所同公差有躬維祝融墟實漢南越大兵艱施小兵弗讋劗無賊良公功之私廣人戶知今思永悲白潛昭幽丞太史職載銘不亡有穹斯石有元故少中大夫淮安路總管兼府尹兼管内勸農事髙公神道碑銘并序至大之元髙氏子璉手其家乘中載教孔孟三族楊潛齋庸孫洧陽希獻太子諭德蕭勤齋㪺為其考少中公之序之行狀埋銘丐太史公牛馬走表其墳道所未識者獨孫洧陽若潛齋勤齋皆走所友其文自足昭今而信後而走綴言其末無乃顧為先徳累歟以故乆未操觚後思共公都漕河南我先世父少師文獻公行省於汴公來受約束於下執事走嘗還贄焉再都漕關中走時秦邸文學相接之數數又非昔一還者矧聞璉也嘗師事同門人劉憲副存齋季偉曰善篤學力行者可虚其請耶遂序之公世平山人諱良弼字輔之祖俊民妣吳君二子進林進金鎮國大將軍守滑倅太宗大封同姓國母弟睿宗真定享國不延莊聖太后主是分邑置規運庫林為之使其歲上供子息蕃多而家亦殷昌姚門君三子公為之冡就傅讀書端重異羣兒㑹真定火延燒千家言之庫使君是灾幸不及吾家吾力不可盍發財以賑君聞擊節曰及物之心見於髫稚他日大吾門者將由是而行如其言既冠㝛衛世祖潛藩後正大位盡付全趙財賦􅃪其網紀而歲登贏時天下困於鉤稽公以全趙獨遺入請亦置計局帝曰世所困者汝獨求之可灼其無有斯冐其間至元改之明年官奉議大夫同知南京都漕錫之金符六年改使河南拘榷稅課所其年仍河南升都運使他道為使惟知徼寵專利賊下㒺上以自私盈路怨咨莫之省恤獨公軫歲旱荒發廋下估市粟以濟其饑大為醮祠以穰蝗孽斯皆職民者宜為而治賦臣顧先之俄然天若悔禍兩澍蝗死人則詩而歌之冀采風謡者取上聞也又以用兵襄陽賦河北諸路之民轉漕人畜勞斃而粟至者亦絶續不時公請增直以糴則人趨利自至以賦民漕功將倍蓰省行其䇿由是軍中囷廩充溢或露積不垣滿秩官朝請知鳳翔府事治民安思永利之乃倡民導汧水起遥望盡閣底五十里再冬而成溉田三千畞水輪十七民之圃蔬園藥者又井井乎其濱岐人惠之姓為髙渠僉憲劉仲修按行其地賦詩勒石紀功安西王開國之三年詔許凡官關中者職不職聼其承制遷黜由是升中順同知陜西都漕其使郭琮恃獲上且阿中盜殺臣雲巴勒肆為非法公與連署凡賊國病民賈禍者縮手避之琮敗獨無所汚朝廷恐其屬偶逃連坐遣使深贄者數輩鉤稽簿書於公無絲髪得遂家居教子樂賓或縱遊山水勝地以自適二十有四年制下其家起以少中大夫總管淮安是郡前以征倭責治海艦歲市財萬富商恒大其直通有司分入其利積材已十三萬下車吏又發郡帑四十萬緡如歲例續市請署公曰已市者足支一紀復市何為下吏於理飛書上列以為徒爾耗蠧縣官富商恐壊其姦夜持五萬緡以禱公曰若欲如他人貸取吾耶吾不能同汝為盜叱去無㡬時行省報竟下如數収市公歎曰吾言不効於是商尸位何為一欎發疾以卒實歲丁亥二月二十有一日也年六十有六公軀幹魁頎風度凝逺望之已知其為不人下者矧其秉德易直剛而不競柔而不撓友善日親惡不急去真善應世務者元配夫人刑君前公卒繼配夫人董君後公十年卒姻里皆師其婦道母儀五子琬璠珪璉瑾琬由任子尹宜陽後公三年卒璠中􅀈以海船船總管戰没交趾三女歸成都三務提領閻郁湖廣行省郎中郭孝華州判官魏餘慶男孫一思誠女三歸王秉餘㓜曾孫男三女二皆益㓜公初𦵏真定後十九年子璉以公生樂家秦没而魂遊逺也徙之長安縣華林鄉祔兩夫人而琬璠皆從窆新兆公弟良輔良輔三子璋㺾瑄居汴佐二子瓘玠居其鄉銘曰姜齊之苖食采於髙地以姓之其來也遥其系其傳文字無紀今其可推纔祖焉爾全趙全湯千里其疆誰之國之繄我睿皇考居其間斗食自晦入出金粟克當其㑹再傳而公世皇飛龍牧庵集卷二十三欽定四庫全書牧庵集卷二十四元姚燧撰神道碑武略將軍知𢎞州程公神道碑由程氏世為太原初縣人燧考歐陽公表唐相系曰程出風姓顓頊生稱稱生老童老童生重黎其後世掌天地之官裔孫封程爵伯洛陽上程聚則其地也至周休父失其官守以諸侯入為王司馬及銘文簡公琳碑則云莫盛于唐宗分為七廣平中山濟陽靈洗其三則皆祖魏安鄉侯昱而系表皆無是言惟异上三四世而止豈今居太原初者或廣平中山分歟其可系則自其髙大父主祁簿政生曽大父禮武科取官忠翊郎至右武大夫守隆州冒陳金兵以殁宋愍節死賜錢百萬歸葬其鄉大父天祐醫以自業卒葬文水考達以太祖建龍旗九斿即位之年丙寅至戊寅兵金之年為十三年年二十餘與兄通弟進倡豪傑來歸完保其鄉為提控為監軍鎮撫軍民都彈壓管民總管銀符甲午金亡之明年還鄉民五百亦占屯籍詔易金符位總管上發平陽河中京兆民二千屯田鳳翔實僑客其地城中猶荒錯荊棘逐虎狼則田疇非立苃舍伐株橛芟蒿萊不可以入錢鏄以觀銍艾戛戛其囏哉矧西則秦鞏未臣行金正朔南大散闗距宗百里北山飢盗縱横日夕相㓂殺丙申又為征蜀所塗師旅去來館餽之須十以率之屯供億七鳳翔纔三後鳳翔民稍集資屯猶六焉為之七年當歲壬寅以終其賢其能其勤其勞有盧昭文摯墓碑言公諱介福字伯祥故事父嗣子得嗣為歲辛亥宋四川制使余玠潜遣偏禆火絶棧道木閣身將大軍攻圍興元城方孤圍公將屯兵五百從都元帥都爾蘓入援及絶無從得塗值三人自圍所亡歸許貫其死令導由他山刋木出陳倉玠以為自天而下焚圍宵遁其年憲宗即位凡中土列聖符節告身盡牧之官明年入覲還金符仍位總管上屯田鳳翔制許專殺有王姓民歐兄至死即就逮其親請鄉鄰善公者懐白金二鎰來貨曰死非他人吾長子也今又以季子償死吾誰與為養惟哀而全之公却金曉曰虎狼獸耳父子兄弟且不相噬人而賊殺同氣其不仁也暴甚虎狼此而不誅何以正是邦之斁敗天倫者竟尸之市尋岐雍民家奴皆蜀俘百十為曹相煽亡歸公悉之還朝廷聞之率以為反遣持齋齊來按事連其主將盡殱之公曰民奴羣逃主何與知惟當誰首亂者由是惟誅七人孟待制嘉之因扁其堂曰明恕戊午憲宗進討西川乗輿入由鳳翔多其津梁館餽廪餼修治豐潔賜金幣五白金為兩百五十世祖立極中統庚申收上符節告身如先朝以前屢入覲潜藩熟公還金符至元四年丁夘以平陽河中屯民為軍假公子松長千夫將戍成都其還鄉民五百人傳官公武略將軍知𢎞州下車渠桑乾水灌田五十里新州廨以示安榮一刮夙昔茍簡之弊歲饑封民所食木膚草實上之巾書得發廪以贍械素豪猾之于治以病民者于市懲衆擢曹徴君子汝弼教授以師是邦使士知學其古人所謂糾姦示惡流恩褒善者類歟十年四川上所戰功制問故符安在對以𢎞州仍佩制解傳松滿秩還岐二十有六年己丑年六十七冬雨木氷羣烏噪集庭樹三日公弗善之覽鑱入奩前諸子訓曰吾平生無他長人惟俯仰無怍愧天人耳若曹可篤學自脩則在家在邦不患無孝忠之聞也惟求善惡在已有無無以人過于毁譽而輕愠易善語訖而卒實十一月二十一日也踰月從葬于其考鳳翔之召亭鄉兆次兩夫人皆前卒謝君四十一年富察君二年四子長松次檜八蕃副都元帥虎符皆不禄悌彬業儒孫五人萬里秦山殤夀山業儒文演陜西萬户虎狼文饒未仕女十皆歸名族其天質仁厚剛方孝友明信哀孤敦宗民奴禮士者有陜西賈提學其墓誌言銘曰猗歟將軍賴基父勲田岐雍郊干耦其耘人初小之治寄是府勢若異然此客爾主後一歲中校其賦踰爾財四三此六七居無事而農我艾我銍警將一旅從㓂入出憲廟兵宋師由褒斜百須餽供應求咄嗟帝用嘉止幣金實匪其為龍光疇與儔比于後世皇詔其子松將屯千夫戊鄰莋卭其半屯民岐雍之界移公刺𢎞足乃騰驥乃渠桑乾膏潤孔多履道以仁越度用苛視民之飢猶巳紾臂亟請于朝發廩以食滿秩養安十五餘年靈烏告凶得氣之先觀古史臣為人紀善雖一行言亦取立傳志在行後尚鍳用勸子孝孫慈乃祖考思惟懼平昔有美棄遺託諸能言金石昭垂走非其人彬爾來即拜手過求先徳為述誄宛而章其言洋洋匪資礎龜疇逺闡揚譚公神道碑譚在周千七百國之一子爵幽王之譚大夫衛碩人之私譚公皆其遺苖後世子孫遂以國姓史代有人其居徳興之懐來髙祖而上不得其世曽祖信金鎮防夀州千夫長祖伯全家累千金父資榮以徇北功皇元帥左都監虎符寄治交城遂令其縣削平盗賊賢士逃亂者多往為依公生以歲戊寅髻年入學頴慧彊敏㧞異羣兒成人兆緒嶷嶷則見十五綜經緯史講貫精熟會課朔望毎魁諸生為交牧盧帥所竒以女妻焉軍中得書則馳送之故其家積多至萬卷國初為制皆世其官父死子繼兄終弟及或父兄存將傳子弟者亦惟命故考府君以元帥左郎監交城令推其弟資用卒公以嫡長嗣為十九年矣太宗之八年丙申州縣守令上皆置監動惟國言公不能也而受成説譯人盧其見欺乃私與善國言者遊目薫而月聒之滿歲而悉能精曉他日郡議不資用譯應務無滯人悉異其不學而至朝廷置斷事官于燕曰司瓊林園之臺人人則曰行臺府檄公往計事歸請省諸工料費横取民者府僚便之舊文谷水分溉交城為平牧郭帥所遏專利其縣民累訟之終不見直躬造大府爭之郭帥少公恃為父執至或師詬公不為報惟理譬折彼遂噤屈至今其水縣蒙其利杖部民持吏短長恣為非法者幾死民惠其威俄入覲因中書耶律公面陳初乙未料民州縣率以無産僑客入籍用示其庶及賦丁悉避逃徙責徴實存官無所取稱貸賈胡困不能償迫改立約以子為母譬以牸生牸牛十年千頭滋息日増帝為哀之制許貰其逋縣無鉤見民公私之負三年勿徴子母對止亡民能歸其復三年縣境大甦而鄰民曰吾獨不居交城耶州縣守令益害其能請督一府逺輸之糧于平陽及至又移輸京兆仍守其出比盡而返數年由是縣民困劇隣矣憲宗壬子復大料民公削其逃徙其兼貧弱雖損户數故是縣差不艱窘歲甲寅世祖淵龍平大理還始入見嘉其舉趾凝重出話慎詳留居藩府官而不名以其弟山阜代為縣遣邇臣出使必以公偕先是分封世祖以京兆由户寡益以懐孟且詔總天下之兵遂置經略司于河南宣慰司從宜所于闗西行部于秦州漕運司于衛安撫司于邢盡遣諸軍屯田戍邊首淮尾蜀以休秋收冬士馬往來之勞東西數千里道不拾遺中侯屯庶翕然歸心歲丁巳宗親間之遂解兵柄他王遣阿勒達爾至京兆大集汴蜀兵民之官下及管庫征商之吏皆入計局為條百四十二文致多方且曉衆曰惟劉萬户史萬户兩人罪請于朝蓋謂忠順公丞相忠武兩公也自餘我到專殺虗焰薫天多迫人于死世祖遣庫濟青左丞與公來臨無與鈎考而彌縫其間時通動息藩府㑹明年世皇身至帝所命下而事始緩猶杖兵民諸官凡昔所置諸司皆廢公歸丁妣郝太夫人艱藩府奪哀起之世祖始分兵南征俾公治懐歲旱復鑿唐温渠引沁水河南諸縣中統建元制褒其賦性寛和練習政事以為懐孟路總管明年入覲賜金符四年換虎符訟隨日决曽不留獄教民植業桑疇麥陂稻塍芡湖果圃苧區水輪步船無有遺利或用致饒民其藏獲侯克寛孫宥等家男女數十人引蕭讓為府史升知事積官運使按察使至元二年罷世侯省懐孟衛輝兩總管入彰徳以公為同知無幾時官嘉議遷河南路總管兼府尹明年奔元帥府君喪交城中書不聼終制迫懐涖職瀍水疊石為岸梁木其上歲易腐敗規為樓十二楹覆之慮其財擅取帑力輕用民得請户曹而始究工上下列肆月收傭直資府公須參政楊公紀績于碑官少中平灤路總管既至疾歸七年散階例降二等與職上下官奉議司農少卿尋進嘉議京兆總管兼府尹者一年改陜西四川道提刑按察使當按行四川以邊方軍政多所鬭略未可以内地文法遽繩脩舉大網而止州胥府史坐贓汚者以始犯罪皆輕平下令治事之餘使學官聚為講觧期通一經庶少變其筐篋刀筆之習漸摩禮義則恥貪凂而不或蹈時詔禁有妻娶妻乃建言不孝有三無後為大世徳下衰婦人以悍妬成俗既無子又以是許制其夫將遏絶苖嗣曽不省恤請自今男子四十無子聼其娶妾中書是之遍示天下十年中書左丞咎順時為宋帥嘉定入㓂大敗僉省嚴忠範于成都沙坎入其郛我師退保子成上械忠範至都俾公代為僉省至則瘞其暴骸完其焚屋賑其飢貧集其流亡撫定一年西南夷羅羅斯内附上以文武兼資可使鎮撫新國以為副都元帥同知宣慰使還京兆治装或説蠻夷無親不常叛服宜以老疾辭行公曰受國厚恩圖報無所以皇上之威徳逺被何往不可何私自幸其安乎就死其所懐人徳我馬革裹骨歸窆是焉志願畢矣遂行未至行槖盡為河西所刼事聞上慰安之再為降制及軍中所須至其境方輸皇元同仁不間逺邇持置大帥安集招懐以捍外侮非利徴求朘削汝也國人大悅而公以不能風土竟疾卒至元己亥九月二十有七日也年五十八門壻李某護其喪歸子克脩迎之中塗號慟屢絶懐路之民哭柩致奠者將三百里以明年某月日葬河内某地後踰三紀公之孫質拜而言曰君及知先祖且與先人同事許文正公求可銘先祖碑者含君焉將誰託筆燧曰鳴呼公奉命始至秦于時識之其後尹洛燧時家洛公遊處必見召嘗謂為忘年友雖辭而不敢居抑不可不謂之知己于其平生若可㮣焉子之言曰惟仁者能好人能惡人蓋先師以初入見潜藩之年驛召至秦後四年公使至見其道徳之容聞其仁義之言考其卓絶之行憂世之志樂天之心出謂人曰今顔子也先師還懐公為之收以求言焉則謂之曰學者或滯于形迹而不適用中理合而一之斯可謂善學者猶導公以用世之方身親接久而始示以性理之妙而操脩之又使克脩盡弃其學而事之其能好人也如何黙爾吉為監于懐以暴戻跋扈名聞一時同列少逆其意或詬詈侵辱不異僕隸公與處八年細故則讓事或害政則誠意馴導以理使孚信之能改而止惟逺以不惡而嚴又游顯代張左丞宣撫大名為諸路總管求金符秦已上公言之中書辭不受命曰聖上不識譚澄耶為顯所舉省為去之其能好人比類亦庶幾其仁者歟太師趙國劉文正公論天下仁牧得邢之張芸夫懐之譚彦清何憂不治哉先師亦言譚侯辭氣温雅雍容樂易達時識治足畏服人其為兩公推與華衮之褒何以尚之夫人盧氏勤儉惠和不侈既責能以身率不輟婦功故婢數千指約束如一壺範之言所至化之克脩事裕皇出為江南湖北河南北陜西漢中三道提刑按察使秉受懿美得之天問學脩為受之師忠信豈弟臨政與人皆踐其父武女九人適淮東宣慰使傅爽延川令李某湖南書史石某江南榷稅使賈時益汾州萬户子杜某杭州總管子楊某灃州總管子鄂屯某參政子盧某交城以次官子王某男孫三人忠尹大名之南樂質宿衛成廟己銓未除文庶未仕女孫七人適湖廣省員外郎表景韓知陵州杜明耶律太傳濮國公孫某東昌總管之孫宿衛成廟許諠宣慰使子傅蔓文某竇某銘曰有翼其恭有温其雍有訒其言有裕其容人有其一足曰善士矧公兼之宜克用世魯昭十九猶有童心公于其時帥政已臨視民之傷猶已致者奔走不皇説上教下事太定憲由邈皇居與率土臣衆以視諸入侍大帝藩府帷幄而日迺與俊義簉擢凡厥大猷亦與有聞權臣肆虐恃觧其紛大帝南征歸正天統于懐于洛于灤于雍于是有衆迭司牧之惠積寵嘉虎節陸離進之風紀詰姦秦蜀惟政以仁不一文律嘉帥縱兵入㓂成都劉吾入民火其外郛奪嚴諸侯于彼僉省以公代往責使撫定安鎮一年移師西戎皇威甫張而遄告凶最公之仕厯年四十其二十年為帝賞識矧其有子官風紀三其取于天而得已貪走賦是詩鑱石墳道期爾後昆百世是保轉運鹽使曹公神道碑維曹肇國則自文王子振鐸以武王弟故與唐康管蔡霍屬以别之鈞曰叔春秋十二國曹猶存其後子孫雖散之四方亦皆曰吾先人顯諸侯􅀈姬氏惟國姓至參以沛吏佐髙帝興漢功侯平陽國或絶或續魏文帝丕篡漢以有中土者凡四傳四十六年自是聞人史不絶書至金初曽祖儀貫籍睢之考城以明罰執法為郡功曹生蔚觧試魁開封生鵉以材武受知皇元帥劉公引為天下規運提舉妣夫人赫舎哩氏金源貴族生公諱世貴字仲明由翰林國史院書冩為元帥府提控初髙麗自太祖世納欵而國王穆呼哩方總兵歲東征不休䖍劉人民而臧獲其子女髙麗患之棄王城徙其民江華島世祖哀其首服為罷歲征諭使復王城今瀋王之祖惑其令功林演之説仍安其所不以時徙帝怒命嗣國王塔納格爾兵其界遣平章政事趙璧行政東省公為行省宣使入與演與同惡豎惟茂禮書宋訟禮侍郎洪紊陳兵以逆公叱責曰汝海邦小夷敢以威脅天子之使則反矣戮十餘人縳演致闕國王導之入覲帝嘉其忠敕授忠翊校尉曹之城武令有惠其民勒石頌之凡三遷皆同知劇郡吉州歲荒發庾以振餓羸隆興羣盗據華洞數調官軍討不能平遣公諭招之悉棄險來下皆齒平民建康去以母喪會庭議凡前峻官者例陁之改温之治中以未終祥禫辭明年官朝列福建閩海道提刑按察副使職乎民者進為風紀非聞望出常調者憲臺不輕以畀至則糺閩省平章黙勒賊民蠧政下詔誅之彼其同列大為震肅滿秩官中順遷興化路總管兼管内勸農事凡民為羣盗鍾明亮刼脅汚染進討將士取而奴者無慮千人皆汰之遷福建都轉運鹽使未上而卒實大徳六年六月二十有九日也年六十一葬太平之須城登賢鄉夫人趙氏南京提舉趙晉之女妻道母儀姻里範之五子定國尹江隂州兼勸農事靖國同武昌等處􅀈茶提舉皆夫人出次室葛正國安國輔國皆葛出方勵學女孫三人銘曰率土之逖將帥侯牧有没其齒天威不覿公一布衣從省東征問罪髙麗負羈以行檄行浮海徙江華島敢拒為亂魁脅縛討王孫導之入告為猷甚為帝嘉邑令用優既試牛刀易猛以惠尋峻其階告洪昇倅吉拯歲荒洪咨諭降持憲于閩渠兇斧亢為牧興化凡㓂滋蔓波汙平民悉頼以澣轉而閩漕鹺利是專甲子方周白日遽捐平昔履厯盡萃乎此在邦必聞可無愧已而所未白在家亦聞衰俗滔滔在官幸身親未卒哭期月已出王事是從笑言自若公則異諸昇護輴車改温又辭練服未除若是自致庶古少跂化民興行足禆至治須鄉登賢而祖有阡碑以表之庸信其傳少中大夫孫公神道碑至元二十有三年燧以直學士召至翰林孫公時為閩省郎中數千里狀其考盧川府君之行將託之石見求既為銘其墳道矣大徳四年為懐孟總管且卒顧言其子壻郭忠恕曰死必求姚翰學銘吾碑至大二年燧方承㫖翰林忠怒其時已為宗正府郎中始致是婦翁之命嗚呼何公區區不鄙余言若是之不忘也公諱顯字榮甫其鄉望遷徙考妣年葬兄姪名爵前述悉之公幼學既長以某家𨽻兵籍歲從大將南征世祖立極置江淮江漢兩大都督東則李璮開閫益都西則史權開閫鄧州與宋楊州襄陽兩制帥掎角及璮誅廢督府皆為統軍至元五年大集天下兵圍襄陽起本平宋八年敕統軍駐淮北實制下流西擾之兵明年改行樞宻院者二年改行中書省于淮之西十年襄陽下廢省復行院明年丞相巴延行中書省將大軍濟江又廢院與是省合公以從戎捍敵應變倉卒益示暇豫未嘗窘錯故由書吏至令史數年不調宋亡明年積是勞勤官中順大夫遥授知英徳府同知太平路總管府事又明年改江西行省郎中宋餘孽兩王盗據廣海遣將給餽凡其征需動咨幕畫隨亦殄平十八年官少中同知荆湖北道宣慰司事朝廷遣使鈎考錢穀及侵牟者遂大徴集諸道官吏無慮千數于鄂省責公主計局其使善煩其令為藁甫定則一易之傍求多塗約束計吏于行苞苴公衆辯曰冊已具矣何至衆多為是持久不絶之務乎有絲髪遺罪請身任使為之止其不屈威暴如此乃歸計吏二十三年廷議以平南􅀦升秩過峻例阤公為朝列遷福建行省郎中以犯法臣隂楮緍十三萬定能正而不阿卒無所染明年以僧格為丞相為尚書省中書六曹悉以歸之而鈎考尤酷省臣而下或杖辱而閩中獨輕平未嘗若浙省迫人于死者南雄械賊百餘人為草竊者當死公讞之惟刑三十人他悉縱遣安溪賊連十五砦為㓂公諭下之省議茍下惟罪首惡至是下者數千人衆欲盡屠壯士分有其子女公㧞劒止曰省議云何敢掠取者論如律惟磔首惡一人大徳二年復少中大夫懐孟路總管兼諸軍鄂囉兼管内勸農事民蒙其利者惟竹始竹之徴利財自戊戍宣課所惟在洛西懐與輝舊皆民産由馮徳用為河南漕長以兩郡之竹妨其課利請官有之制國用司為奏可而禁之法宻雖其故主輒取一箇亦坐以盗數其節為布罰園傍之田民耦耕侵犯而出亦指為罪民甚害之官復謁園伐取竹日益耗而課入不除公策千部請令故主興隣地護守無禁斬伐惟責輸賦是亦復民産之漸也符下從之今鬱為茂草譙楼廟學有老弊者無不經理新完諸王妃主輕郡賦民术席為屋絡綵周之晝食夜息各異為所或前期一月具而不至民又守視不去去又官吏規取其物無所于訴公至製卉布為大幕容倍百人可以離合卷舒既便以輕載以十車之力送往迎來無不至所皆前政未為者病革猶卧治事卒于郡治仰崧堂之别室是年秋九月九日也年六十一夫人程卒以至元十八年繼夫人楊卒以二十有三年今夫人李嘗刲股肉􅃵進覬已其疾斂則斷髪納柩中示與同穴子五二十有七年長某舟死江中次某以任子為單州判官餘未仕女四長程出郭宗正妻今寡次李出適智某餘㓜銘曰崧髙詩言峻極于天維嶽降神王不時廵而公之先世家其下其仕其隠譜無究者及公之生珥筆從戎志期振㧞以立事功周旋統軍行省行院雖屢易至為史不變以才見留謀資其優逮夫濟江勞力大酬英徳太平遙領知倅官之中順副以金端尋于江西長省幕僚進而少中其秧益超轉而荆南同知宣閫奔走聼命踰十名郡例阤始躋朝列稍卑于吳于閩省幕再為後移内地理問汴省復其少中總管懐孟平生履厯其止于斯治兵涖民何事不為為則事治有譽無刺其于為臣亦盡其義其所卒地郡堂仰崧何公于崧生彼此終豈人之為造物者意歸安崧丘後昆以利勸農使陳公夫夫李君神道碑少中大夫嶺北湖南道肅政亷訪使陳元覬語其妣夫人平生于其友姚燧曰河東李氏有開國于金為金吾衛上將軍者子孫雖世搢紳多顯人人不目之惟上本其先曰李金吾云夫人則其諸孫陜令欽若之女先君勸農使將授室祖考妣規措公潁川郡君審于采擇聞夫人淑姿懿行布幣聘之夫人既廟見吾陳氏世緒絶逺族大以蕃先君上有參議提學奉職三兄善于閨壺脩職謹事舅姑孝之娣姒友之姻戚睦之而僕妾恩之咸曰非漸涵姆訓有素不若是以履度循法也歲壬辰規措卒天兵􅗴金河南獨奉職以詔使死亂他族皆完自洛之西徙家觧梁夙所居積蕩無遺矣㑹歲大荒夫人擷穭為糧然火照積以事潁川雖流離造次其故家遺風不衰平時三年而潁川亦卒叅議與張夫人嫂也事之如規措潁川先君叅某軍中或自軍所來橐之一錢尺帛不有之私室必歸兄嫂先君求得奉職二孤女民間夫人子過所生歸諸令門元凱生有三年不為天所恤以歲丁未四月四日卒年三十四葬之嶷山先塋亦頼天之靈獲託其遺體者今白首矣每悼夫人棄世之早前先君二十四年先君後躋位光顯不及同其禄而元凱之士則濡先君休澤者禄養滋不及矣今惟有表章徳美于是金石以慰靈下泉開示子孫于方來者猶或及焉敢屬筆子燧曰吾姚氏與陳同姓也燧之曽祖妣亦李金吾諸孫不知于夫人姑歟又戚屬也此燧不敢以不文為譲者勸農使諱膺夫人二子元凱元英英殤孫坤女孫二人皆有歸矣銘曰良農于穡天勤其力或報之秋秩秩夫人來殯于陳百罹艱優君子中道弗偕其老年復不脩何天隂隲嗇施淑徳貽子是酬持斧繡裳風紀四方民瘼之瘳為時聞臣人賢其賑誰異其謀夀母之子名不世齒泯泯堪羞剡首之碣有美枚列以表阡丘牧庵集卷二十四欽定四庫全書牧庵集卷二十五元姚燧撰墳道碑贈少中大夫輕車都尉渤海郡侯解公墳道碑至元三年武宗若曰内外庻官五品而上既皆宣授于其子孫亦光顯矣而其祖考猶或布衣嵗時廟享工祝致告無所稱謂非所以興孝天下也乃敕省臣列五爵三土加階勲而等威之五品子男從男正子者縣四品郡伯皆惟考一代三品郡侯父及祖二代一品國公祖而上逓衰之至曽為極焉惟褒詞用御前寳者以其名開他如宣授用是少中大夫秘書監丞解節亨之考禧贈少中大夫輕車都尉渤海郡侯妣樊渤海郡太夫人祖政祥中順大夫上騎都尉渤海郡伯祖妣樊渤海郡太君節享將昭聖代禮使臣下之羙且侈吾家千載希闊之遇樹碑先將託筆于燧因惟前古不及三品者不以封謚揆今為制下及五命至徳深仁為何如哉揚厲張皇史臣義為解故解氏略其逺紹惟始上世諱元家真定者有子十有二人高祖諱徹登金進士第五子曽祖其季諱信當金末世為真定綾錦院長官娶安氏實生中順安卒繼娶宻氏國初徙所領織工將度漠道卒野馬川中順事繼妣以孝間讀書力學强敏兼人淹貫經史尤邃易學傍及天文歴法靡不精究金棄河朔全趙已為元有會武仙殺都元帥史天倪以城叛而臣金由太君為高苑金武義將軍女霖之女遂避地高苑嵗戊戍太宗詔試多士中是選者復其家中順以易義登第卒年八十三肇塋殯之渤海安豐鄉之東原太君卒年九十四曾祖死逺役柩不得歸别製衣冠呼其䰟合曽妣考妣兩世皆窆是焉二子禄及少中惟少中樊出誠篤而多學為軒岐言是邦疾者特為司命擇師教子恬忽時榮嵗荒則發庾贍飢凶䘮急貧無待見告賻而周之則吾所儲如彼外府少不留吝稱貸遲歸火券罷償部使者經郡觀省民俗必以其事上聞其章不計堂帖有司大書其門旌曰義士詞垣之臣賦詩交詠凡是鄉閭無間嘗飲惠與否争進饋賀其日免織工取直未入綾餘五百匹至大之元冬十月二十有七日不病而卒年八十一妣郡太夫人亦樊氏金行部員外郎之女常從母受學故于經史及列女傳皆嘗誦習且善書歸子解氏賢淑有間舅姑姻戚稱其孝睦亦以至太之元冬十一月二十日卒二子節亨筮仕為工曹吏出為濟録事叅軍杖其豪右使酒公所者于市由是惡少欽迹再轉徳州判官大新廟學以振風教移獄疑囚凡有司積嵗不能正其罪者皆檄讞之合前為録事聼審得情使誣詆者不得脱死無辜者頼以伸雪無慮引連數百人事有今太子少傳李謙德州學記郡文學所紀部使者之章可稽焉擢光禄寺主事集賢院都事袐書監著作郎今進而丞秩躋三品又降恤詔推恩二代下及􅇕墓其于孝子慈孫責已塞矣撝謙提領濟寕益都屯田以親年下無兼侍辭不赴三女長適知和州萬宣次適同知膠州姜陽季適太常少卿王景元男孫六儼侍儀舍人儀國學生四未名女孫六長適般陽學正麟王餘姆銘曰生烜其名隨死而泯猶于栁車曽未旋軫一世鼎鼎幸趨者多思所致然夫豈在他由積無素功徴徳薄譬被潢潦其盈易泄惟義士君詩禮青氊術已惠人矧財善捐篤生孝子家學弗畔一為集賢兩東觀用是宸楓進官少中推恩其先俾貴與同又爵之侯土以渤海于祖少陁惟土未改中順伯之兩妣皆樊太君夫人賁及墓門平生侯伯精多用物安知斯時不已肉骨矧兹秘丞膴仕日躋爾伯侯進爵會齊安定東原萬家可置户以守之用華百世磁州滏陽髙氏墳道碑有國之所以寵臣下者二曰爵曰錫爵自九品推而上之至一而極雖有䇿制敕授等威其歸皆億萬維臣之同若夫錫也億萬臣中無有百十之見及者人臣得之一已幸矣况于三乎在易師象以三錫命為懐萬邦今江浙行省郎中髙謙昔都中書左司事錫象笏禮曹即中錫貂祛袖狐裘中書左司員外置錫白金百兩金竒服三實三錫矣古所以懐萬邦者集其一身則天子之加禮以使者何如宜謙丐燧大書先桓上以嘉君命之辱下起以本父教之忠也維髙氏自汾之孝義徙磁之滏陽則紬其曽祖府君有官勲于金䘮亂失之祖府君諱閏夫人張氏考府君諱澤字雲卿金既播汴太祖徇地河北人能以州縣下者即以為守令僚屬聼自置罪得專殺磁守杜國用知府君吏能求以自佐推澤為孔目官俾司其州岸獄招求散亡之民大兵之餘市虎田萊驅而翦之以立公宇四境户版僅及千數他州之民聞磁懐輯有譽多來居他州虞捐户數欲徙還之不得遣追胥即徴徭賦士壬天下大料民户嵗入銀四兩民已無所于得州縣廹征不休回鶻利之為券出毋錢代輸嵗責倍償不足則易子為毋不能十年闔郡委積數盈百萬今長逃債多委印去時開尚書省于燕府君頻毎以二者為控曰今天下一家無有此疆界民之錯居爾從土㫁又百穀桑麻衣食之源嵗鱗取之為利無窮古有天下者悉驅㳺惰之民盡力南畝今釋是而戸賦人之銀且産銀之所四海無幾必深山邃谷鑿遂篝火畚礦鼓治而得焉可以盡給四海賦民之求哉若是不已時日消月削窮益滋甚省雖是其説竟以法制立矣皆不得其要領而還中統詔下而負銀始華州遷滏陽令府君曰孔目州佐也他今由吾銓今乃與是班乎薄不欲為後朝廷誅東反虜懲世官弊守令之選收歸吏曺而易其地前為令者悉以令遷府君惟自州佐監武安衞輝單曹酒稅衞輝單曹加提領或咎昔不為令府君則曰命實使然我自棄之又將誰尤天今界予征商不剥下媚上道及民矣安為而不卑之及謙入官来前飭曰吾所以屑俯首者待汝用世也朂大吾宗吾不仕矣以至元甲申夏五二日卒年六十一𦵏某里夫人劉氏以賢淑聞二子長某早世謙始為彰德路總管府判官入為工部員外郎轉都左司事禮曹郎中右司員外郎出尹開州兼諸軍鄂囉遷江浙行省郎中改淮東宣慰副使江西行省郎中冄為浙江行省郎固亦足顕其中親况稽近古父位不充而子或通耀固家不欲子孫貴臨祖考故視子孫今何官勲生封而死贈之使貴與之夷興孝勸忠聖元既法行之加郡國公侯于某將相之家亦他日求推恩之凡也州佐比古上士道可謂未盡行其時矣而先有是仁民之䇿于庭臣欲紓其急其藴豈淺淺哉而天嗇是享于其生其留豐報諸其死俾哀榮及廟墓者匪資謙貴也從而銘曰覆一簣以基崑崙之䑓溉由蘖以須負棟之材此常人之情皆亦蹶蹶其艱哉孰曰昌厥後來為濟時之才弁冕崔嵬而非先德之階豈覊於人而天之諧歟必百世滏水隈有由斯銘而伊人之懐者矣靈山先生董君實墳道碑嘉議大夫昭江路總管内勸農事董章將勒石甄表其考府君靈山之墓持太平郡文學姚和中事状丐銘于燧因惟萬物本乎天人本乎祖稽漢金石惟租始不可推采者則不本之苟可推采無泯泯而不本者故祝睦緒高辛火正祝融度尚與顓頊世掌位統國法度衡方唐扶之胃堯陳球袁良之苗舜孔耽殷烈蔡湛文葉諸君是後神明者可殫紀耶然是推采雖精博之士逺據為説猶啓後人牽傅之惑若春秋傅蔡墨對魏獻子龍問曰飂叔安裔予實甚好龍能求其嗜欲飲食龍多歸之乃擾畜龍以服事帝舜賜姓曰董春秋外傅以蘓顧温董為已姓之族盖黄帝二十五姬酉祁已滕葴任荀僖佶嬛伊惟青陽與夷鼓同已姓則董父非止裔子飂叔安為黄帝裔孫者又較著也在夏殷世大獻無徴周則晋良史狐安于秦將翳漢江都王相仲舒實生廣川其地則今真定屬郡冀之棗強故是姓在趙者多宗之或曰今居真定天禄坊者猶其遺苗君諱􅀈字君實曽祖明善祖好義考信家真定屬縣靈夀其離析天禄固未大逺至君業儒以江都罷㸃百家表章六經使道林有統為羣儒首嘗著玉杯繁露發春秋徴曰吾家學也遂専經春秋當授室鄉先生宗訥竒其願立女焉事考府君妣夫人色養無違有純孝譽味道自腴恬忽勢利不苟上交所親與者纔兩張公安撫芸太参鵬舉殊篤其敬使則廬違逺則書候其安又善植産䅪則散周其鄉嵗荒為糜以全餓人加饋癃老以肉逮三子章竒彦生曰吾以三人為衆吾家四世惟一其傳積德余在有是衆子延師私熟務知修已治人之要以篤其成才不事記覧為詞章誇逐時好既其入官惟飭三事曰忠以事上清以約已仁以裕民古之人未有捨是而名昭于時者晚愛靈山睱與親友縱逰曰是荀卿子所謂秦剡趙有苓及松栢之塞者後與封龍無極三公白右其一則余忘之為六名山皆吾郡之望太常給珍幣祠其得法食者今其文曠墜吾與二三子屬觴乎此亦可為千古一慨者故人號之靈山先生以至元二十有三年丙戍春三月十有一日卒年至六十九其月十有六日𦵏某地以前卒宗夫人祔繼娶孫氏章由卑官積至太平路總管遷總管平江户甲天下賦重而役繁民頑弗率前政徃徃以不職罪去及章來為出令化之不専威虐而政以成績最浙西為良二千石斯克佩先訓之效也後移臨江至未再月以首疾去竒太原路交鈔庫使廪司彦提領蘄州路稅課二女適百户王某鄉人趙某自章而下皆宗出男孫五汝霖主岳之臨湘簿汝枻提舉大益山屯田汝海同知信州路事女孫五一適燕山劉氏男曽孫十二人仲玉仲珍餘未名𤣥孫二人鳴呼後靈山者四世已二十有四人入官不家食者四之一其之而益蕃盛光大清顯者可知也已銘曰維夫于士不全其卑或院窮家或顯庸世其顯庸世無澤民加雖烜其時清議弗華其院窮家肥遯自遂道集其躬令譽日致嗟之有苓伊爾廣川江都之宗實蔓以緜其存遺編玉杯繁露千載茫茫誰究其緒君曰家學吾舍焉師孝親之餘力振起之天爵篤修紛華若遺迨子之仕提耳三事曰忠事上清以自治仁能裕民則古良史章也持循恪慎其身官二千石歴郡必聞有後如斯亦既克述其來其思無賛爾續神道碣孫府君神道碣少中大夫前同知荆湖北道宣慰使今福建行省郎中孫顯自福州使人持其考盧川事状六千里走書京師謁銘神道千燧曰我孫氏故鄭管城力田人也族大且滋紬兵興去平土即險而居始遷今河南之登封會嵗荒先人分族五百指輦祖妣就饒唐之比陽先祖猶留祖妣卒其族以干戈未靖趨漢南先人死懐先塋生謀思先祖借先妣挺身西北至則鄉邑蕭條先祖已無可問其存殁矣寓食河之北數年復歸剪棘而田斬茅而堂日夜作苦十年而能家也復﨑嶇唐鄭之郊即遺龍故老哀號百至以求先祖之柩竟負窆盧川篤孝如是人有亡罪來歸寜抵冐法禁舍匿其家不忍聞知官也事去則衣粮而遺之後有子朋顯益躬力穡不勞使之以奪從師知學為吏晚嵗號盧川老人與紫雲雲嵓玉溪軰年相夷者七人相從泉石間方顯通貴力可以足㫖甘適清温而嚴霜交墜鳴呼命耶孤顯逼以福省始罷今開傳持其印甫畢襄事不得終䘮而南固不為昊天者弔矣重念先人為太早不遇之民行施于家而不昭一時言及其鄉而不聞百里之外功徴而用薄道晦而居卑所以亟勒石者非以溢羙誣世是求庻幾吾宗遺苗知權與斯家之易雖明詔嘗有追封之文猶以例未開不敢倡為之請以試不測之雷霆今幸賜銘非顯生拜公嘉我光人亦將肉骨于九原也敢泣血請燧哀其志且生永寜去登封三百均為河南屬縣為生同里鄉少中宣慰荆湖某為憲為副官同義不可譲嘗究孫氏先世由䘮亂名字皆逸少中之祖伯季四人其作也始徙登封者實生盧川君諱聚字某年八十五以至元丙戍冬十月十日卒𦵏先塋以配元祖氏祔程有賢行以君四十無子為娶姨母尹氏子而生明顕明讀書不仕男孫七人頑將仕郎峽州路知事復將仕郎主枝江簿亨謙䂊節元咸㓜女孫一人亦㓜男曽孫六人未名女曽孫四人逾幼嗚呼君夫婦惸然還登封及其屬纊三世子孫已且二十人其婚姻葛藟之家猶不居是選固已衍為盛門已微而昌始屯而亨天之福人亦易矣哉人少中涖民治軍逺跡嶺海蜚聲振績為時聞臣子貴應銘法曰凡今受姓咸出黄軒其自以氏實為公孫後有王孫别胃王室文由便省去覆而隻有煜兩孫世緒咸遥欲一其初循本自條其居登封由管城徙鋒鏑逃歸孑然一已駢胝手足克艱造家感迷先丘號邇遐求民欲天從爰昭其孝指所在藏假人以造廼安斯窆盧店之阡為子擇師蘄材毓賢日薄西山釋勤日佚闘蘭釀松踐嵩故實伊誰首之内翰馮公君誠未學異世樂同杖屨聮翩榼壼携載傴傴耆耆白首七軰富田連疇夀垂九齡子孫官歸朱紫拜庭君可盡有人所願愛黄腸一棺無恨于盖送終隆數孝子義為嵩髙如拳始爛之碑奉訓大夫知常徳龍陽州孝子梁公神道碣維梁氏世彰德安陽人金進士棟生偉皇府録事生生忠濟為東平嚴侯力能生殺人彰徳時為属城招不能致足白自信不可威屈生君諱璨字文玉脩幹羙鬈好學篤古考府君卒廬于墓側晨夕悲號不異袒括手理垣木鄉隣傷之衆佐其力終䘮初事北安王再辟掾宥宻後從濟江以平宋勞官承務即尹湖之長興民俗生女則教琴筑歌舞長利枝色事人貸嵗满則質他室取生男謂無所于得率不鞠後棄諸水為檄曉曰若新國也未知吾元為律倚市門子猶不敢棄况兹天民長頼給上力役者不特傷汝父子之親亦乖聖世繁育生齒之㫖敢復然者論以違制由讀木蘭院碑載宋寳應丁亥湖水大溢流死數萬聚𦵏於此若京觀然遂䀌傷心罪前為令罹是大厄猶不為虞安必異時湖水不再至耶發民築防延數十里髙袤及丈日急其程如水朝夕至者恱以使之民不怨勞竟工種栁雜木其上以捍衝齧縣有李王祠百區皆非法食毁瓦木用新縣治廟取學尤麗髙敞加什其舊即其羡材倉廪府庫病坊逓舍無不改為居民行旅為之改觀效命義軍故皆鹽夫羣行市中人無誰何一日椎釀甕眇酒翁目叱衙兵追捕或諌如是驟繩恐不利尹君曰吾奉天子命尹此土莅此民安能坐視鼠子與尹爭長雄自為名哉盡收其黨二十餘輩杖之隣死自爾鄉民效尤夙號難令小裂公牒大殺兵吏者皆側足歛手無敢肆暴嘗裏糧紱印行田老父為具食發槖償直父間所紱為何曰吾今也紱縣印耳父出告其鄉鄉民百數十人追及于行爭持酒炙遮留後至者觸噐覆酒流地酒主憤云令去必刄汝觸者曰吾亦有刃報之君曰民以吾故相仇其咎在令惶駭罪其失言二人慚伏君為曉曰吾元禁挾弓矢持刀槊嚴甚輕杖重死若曹何苦干禁挾此為耶且戍兵以索此為名得之則破汝産其皆納置令所乃得兵數千事而還後衙兵暮夜追呼民燭令署畫刻而至訟牒至前决以其日未嘗渫囚圜土屢空去之曰士民號送填道擁馬既乆猶思求頌其德刻石縣門後令不可民請不置者數年一監縣者曰梁令非有恵民何能致然從汝樹石公堂右方書令嵗陽嵗名以彰其賢且俾人灼吾不昧善也至元二十四年丁亥去寳應實一甲子湖大溢水不冐防纔二尺民始歎曰㣲梁令𦵏魚腹矣雖求為魚得乎加承直福建勸農營田副使廵行建寕時羣盗聚浦城戍將方加兵君止之請身至其棚曉曰汝皆平民逃州縣重賦繁役出此甚不得已之䇿汝曹自計甲兵堅利儲餽有繼訓練有素徴發日多孰與官軍而乃以就盡獸聚鳥散之人抗之不敵明矣能從吾言捨險即夷相率而歸小可以徴賞大可以得官孰與闘官軍身膏草野妻子奴人乎因血指為盟民感泣投戈拜賜不煩兵而附順者若干千人後議事福建省㑹南劔俘賊妻孥三百餘人至公曰是多平民為賊驅脅宜旌别之縱歸者半尋遷福建都轉運副使丁妣夫人憂又廬墓終䘮升秦訓大夫知常德龍陽州民聞有惠長興爭境逆而遲其來方大施張以變前習數月代至民復境送而速其去大德四年為子鎮畢婚南劔夏六月十一日卒歸𦵏其鄉先塋夫人同郡李氏二子伯也鈷有學行二女已從同郡趙某許昌程某二孫浩浦至大已酉有司上群從共居族子亦能䘮親如君詩曰教海爾子式榖似之宜特旌異風勵四方庭臣用嘉揭諸大逵為孝義坊過者式焉鎮恐先德猶未白世聞燧舟應宫賔之招自淮安逆至儀真拜而請曰先君墓碑未敢遽言俟他日必即京師見懇今而果來為之詩曰聞古有訓孝子之至不于養生于䘮自致敦古如君未忍其親𤣥宅長還曠野無隣即丘築室僅蔽雨曰呱呱三年忘盥與櫛家本之身克爾親親推以為國何有仁民長與孩乳脫不寃天患防悍馴庻弊皆矯于福營田劭農是官徃造賊巢柔暴舌殘雖生平為盖棺廼定不有太史孰筆卓行瀰瀰清漳源出太行有碣其壖流芳與長武略將軍知秦州史君神道碣至元十有六年其嵗已卯五月二十有一日武畧將軍知秦州史君卒後二十二年夫人亦卒又後是十有一年至大辛亥其子興平令誠三千里馳書京師于燧曰昔太傳魏國文正許公私淑于秦我先人時童子北面事之君年先立于下風今將舉是二喪别塋于長勝坊少陵原樹碣墳道昭示悠長銘捨先友其將誰託余勤其請之逺為序曰維史氏雲中人太祖加兵中國禡牙始此故考府君廣𨽻師王穆呼哩戱下以從殘河􅃋河東功戍鎮西州金蹙國播汴棄関輔從其民于河之南乃偕田侯雄踰西河雄取京兆府君逐盗華州芟荆杞飯蓬稗以立官舍又嵗從太師塔爾海伐蜀功授璽書金符即知華州有子八人君其嫡長諱克㳟字子敬者皆先師所命年十有八府君丐老遂襲為州惟騎射精妙得其家學他皆戞去紈絝豪習遇其聨仕不以刺州自多而克下之華之父老故人咸語曰吾邦君有子能爾其所加禮不以年少而後其父會罷世侯遷刺同州接壤華人信已素满秋刺乾土廣而户寡不虗旬浹以當甘凉諸侯王妃主吐蕃去來驛塗比供億不失幸未速戾實艱實棘勵志州校割俸為倡創新廟學後刺葭州葭瀕西河方攝延安路事咎順冦成都盡發路民為兵以戍君汰貧弱惟抽富民産沃丁衆者籍之輿誦曰平俄秦藩肇建方冬發萬人築白海行邸君營五原寨涵寒甚于他州方是之時急其程作民民必稿死君輟徴集須春赴功其不苛民媚事形勢如此移刺秦州未上而卒纔三十有五嗚呼不年哉大帝淵龍自輝驛致先師至秦實嵗甲寅君從學八寒暑先師嘗譽其原重篤勤有入道資由已未還鄉河内故不卒業而早宦所就已此夫人𤓰爾住氏金遼東行省博勒卓之孫皇先鋒使色埒之女當君之卒年猶盛也三子誠弟謙以門功主同官簿譲不禄觀三子成立若是豈不為善持家學之徴歟女孫三姆銘曰繄君先公興龍之逄㧞民于雲樹勲先功初亦豈易奮殳顔行攻壘畧地大河之陽由晋而西移軍𢎞農乃剪冦攘有華四封何以寵嘉有煒金莭副之命書郡侯是列君襲為州猶小子侯會華世官循年轉流遷之馮翊與華壤錯吏習民安坐嘯畫諾于乾于葭乾難葭尤乾止倐還葭多隐憂隠憂如何籍兵戍蜀與彼秦藩行邸廹築乃恤民寒緩程須春年不三紀未上卒秦司月旦者評有二悼一不終業魏國去蚤一官止西雖曰邇家有施不幸神都去遐不峻其階終始州刺豈天嗇之將爾嗣少陵之原實古上林碣以表阡庸告來今太倉監趙君神道碣燧讀廣平府教張宏状其弟子今奉議大夫僉嶺北湖南道肅政亷訪司事趙勵之考太倉監君之行而取其三焉曰學約而醇官乆而卑操窮而確盖書以乘治忽詩以正性情易以際人天而春秋以謹名分著懲勸其删定繋作雖一出仲尼之手以請賢弟之問聖師之對示萬世以操存涵養為傳心之要典者惟論語為然而君誦之終身不治他經雖不治他經以推治他經譬則破竹將無有迎任而不解其節者豈若今務博者童子知誦六經白首猶迷其源委君亦漢氏諸儒専門一經顧多成才之亞歟故出而仕其卑則監倉夫積乆而易糠腐者惟粟必贏其入而棓其出贏其入也則輸粟之家病棓其出也廩之家忮之或一有言皆觸禁者矧利所在覬得者衆臨制之吏鈎名綜實不于書則于庾鱗比取之月異而嵗新焉幸有慎者已不為盗人則廹使必盗故完往而敗歸絜入而汗出償産傭孥者武敏接也此監府縣倉者然也太倉則儲幅隕之粟于斯其糠腐尤夥尤夥則贏入而棓出者愈無紀極地由邇輦榖則病而忮者易愬易愬則完住而敗歸㓗入而汗出愈速或一二嵗為之不償産傭拏者有之必無二十年之乆而不蹈者非不循俗嚴已以拒人察察醇白者疇克爾然亦确确乎其艱哉或疑是非德之大不曰鄭國之大不曰鄭國之渠鑿涇注填閼者水也井亦水也以之溉也井之利累日夜有不能終畝而鄭渠嵗灌㵼鹵四萬餘頃夫不計井之勞與所居之小之異而責其不為鄭渠世鮮不以為迂使日夜汲之積二十年之乆冽而不竭亦佳井哉監倉古委吏比也仲尼之聖猶止于當會計讀語而學仲尼者能是已矣非徳歟既其歸也有廬于城而無田于野無臧獲以服事朝夕供井舅之勞薪糧之須諸子身之衣惡食菲安不怨尤里之豪悍有耻其乏者曰使幸交我我則周之君曰吾受德鄭暴以捐吾介不可及子勵仕常從之官每飭之曰世固有羞賤貧而希富貴權偉以死無囬者矣莫不一敗瓦裂汝惟義命之安禄入之外不可他勞銖髪以賤其心能謹其事而忠于上則良子也七十九卒猶以是為頋言實至元甲申四月十有一日也君諱􅀈字君璋世居盧龍范陽間四世祖通以材武得官于遼為千夫長祖逹不仕考托監酒上蔡義宗播蔡死蔡亂君踰河僑家洛州將成候兵曹後入監太倉洛今易為廣平為府元配河南胡氏前卒三十二年三子或徳安勵金無經學吾元狥地漢上得江漢先生趙後于雲夢至熟而經生始集或從之逰有善學譽與耆宿友年二十四德安年四十皆前卒一女適肥鄉蓋氏再配東海盧氏前卒二十年男孫某年二十五而卒女孫一適同郡輕氏一適巴圖總􅃹子毛頴孫曽孫一人未名勵自知淮東憲事入掾中䑓又掾中書出同晋州雲南行御史䑓都事今為湖南至所治善恰其先訓者大徳戊戍將故𦵏君與兩夫人于其鄉里求燧銘墓碣銘曰生煒百輝殁淹其升熟曰嗣人克善乗承幽光于生盖棺益耀非子式顕歸以何道嗟太倉君恬養亷貧其志不越式是後人入循周行出而要荒繡衣所如梟狐遁藏期為良子可曰不負令甲聴為于親可後易桓為碣洺水之阡太史繋詩何永不傳牧庵集卷二十五欽定四庫全書牧庵集卷二十六元姚燧撰先徳碑開府儀同三司太尉太保太子太師中書右丞相史公先徳碑至大之元秋七月二十有八日制日丞相慶公之先及事列聖繼世忠謹者既敕有司既諡既封非刻金石終恐不能垂示悠久其令翰林學士承㫖臣燧為撰次之臣聞命競惕誠以不文不能鋪張大君子盛烈上負明詔其冬而其家乘始至自夏故得反復究觀公夏人史姓曽祖考塔塔喇威夏臣贈同徳濟難功臣諡康穆祖考喇勒智喇斡衛太祖贈服勤翊衛功臣謚簡敬考索勒濟爾威闗弓馳馬拳勇絶人入侍世祖潜藩嵗癸丑從平雲南諸國以驍果聞及歸行賞賜馬五匹鈔二千五百兩價與銀埒已未又從濟江攻鄂戰疾力明年帝正天位從征叛三漢北小大之戰十五賜白金幣錦以為䝉古唐古軍民達嚕噶齊年七十八終贈推誠翊運功臣謚忠宣三世皆太師儀同三司上柱國公祖考加開府曽祖妣伊拉齊氏祖妣蔡氏妣鳥納氏夏王外孫皆從封夏國夫人七子同出五人公次居二以竒塔特布濟克名行自童幼從忠宣出入世祖帷握天監灼其已克恭勤至元丙寅選侍裕宗于東宫將二十年敬畏益加無少僣忒遣順考生皇上儲皇詔公保育鞠視之每帝召見則必左右兼抱之至前方幼而學詔教之經以其嫡子額爾吉納侍讀俟其遨嬉廢誦輙撻其子以警之故能終業以㑹將畢聚諸侯王讀太祖大訓加丁寜告戒之始遣就國或皇上儲皇不在列必邀致之使與有聞出申飭曰是汝他日所宜為者其謹識之必舉其辭毋庸怠忘徽仁裕聖皇后以善于薰陶翊賛也責其四衛畨直諸臣事皆咨聞大徳二年成宗詔皇上撫軍漠北曰是昔大帝授朕者今以付汝且以輔導巵從壹是軍務悉聼于公宿衛諸將皆父事之至則訓練六軍總裁法令胥地所宜可屯田者必分耕之以佐軍實屠羊不湯其毛而皮之與餫餽棄訓諸物皆集以市諸部易皮為裘禦戰士冬四年以文移無印難杜問欺又身入聞得裕宗信寶以歸明年八月冦大至公教吾軍衣紅衣于甲以自别俾閧不迷大崩其羣自是冦望紅衣軍則退不戰九年皇上踰金山公視軍士失馬徒者空其羣散之死則不責其償十一年成宗賓天使至皇上欲棄大軍入主居憂公日是使之來惟以告哀且彼事宜難以遥度湏召赴使皇太后儲皇隨以削平内難見告且促其來即自假公平章政事驛至大都軍致金帛于北為朝集備五月皇上立極真授榮禄大夫中書平章政事蓋公雖厯事世祖裕順成三宗其貴有極則始乎今餘月儲皇入陳疇昔調䕶之勞制亦曰非夫人之力安及此加銀青封慶國公妻庫庫楞同封慶國夫人七月進儀同三司太子太保九月加開府太子太傅明年至大之元二月拜中書左丞相復以為太子太保加上柱國四月拜太保六月進太子太傅再進太子太師七月加録軍國重事十一月中書右丞相十九易朔之間凡九降制大臣之位至是極焉又以其兄阿拉克布濟克弟昂吉爾皆榮禄大夫司徒兄兼都元帥弟遥授平章政事弟實喇薩喇榮禄大夫使宣政院寜夏甘肅釋都總統托羅岱管軍千户蚤卒他母亦烏納氏二子烏頁爾威珠格爾威孫男十有七人達實和哩布管軍萬户虎符婁都哩威塔海諾海圗徳勒威伊齊特穆爾額爾吉納年二十二至漠北之明年冦出金山南布庫哩額爾吉納將左衛射士唐顔行當冦驍將既接戰刃槊兩不能施手搏墮馬斬其首明日皇上解御衣所乘馬鞍勒為賜仍偶一良家女冦夜襲他部輜重以遁又將數百騎追敗而止還之四年又殄冦于昻吉爾圖獲人畜財貨不可口匹貲算又明年冦舉國至又戰于哈喇台以數十騎出入其陣數四所當披靡莫之與敵冦大駭却皇上乘之遂大潰斬馘不可級計十年踰金山前茅獲俘萬餘人斯皆効死於乘輿前天目昭覩者明年冦平第諸將功膽略材武推為冠軍立極之日授資徳大夫同知樞宻院事六月賜虎符使大府院事唐古親軍都指揮使七月加特進遥授中書左丞相又進知樞宻院事又兼使典瑞院至大之元五月兼使仁虞院十一月拜御史大夫哩日初事晉王有謹敏稱皇上至軍之明年大戰布庫哩雖勝而冦退未逺與晉軍合而大官廩肉不足則日餽二羊又繼諸軍糧其賦又盡則賦他部供億後多其忠從晉王未致右右立極再月授資善大夫翰林學士承㫖十月進榮禄大夫遥授平章政事行大宗正府伊克札爾固齊十二月授卿典牧至大之元二月賜尚服五月拜光禄大夫遥授中書左丞相七月兼使將作院額哷幼為沙門十一年至軍中賜御服㡌帶俾不祝髪其年官以正議大夫僉宣政院事女孫十八人有從者十曰戩伊特楚曰安巴曰哈達遜曰旺温曰聶辰曰世兼千户曰聶爾巴曰吉逹布曰沙津曰善布男曽孫六人額爾吉納威穆齊爾威布都訥威宿衛乘輿綽爾齊阿哩衮薩里扎拉爾威女曾孫二人臣嘗槩公父子有四徳焉一則曰保育聖躬再則曰舊學三則曰周旋軍中十易寒暑脩扞于艱終則曰扶植皇極𢎞濟登兹其髙明一門之間三為丞相無極無儔人奚間然敢再拜稽首而銘之曰維史胄出書焉有質伊誰云從則周史佚踰二千嵗餘慶茂蕃推而上之實一其原嗟公之家中土亦始其來姑臧不紀其紀可系而名則由其曽奕奕其䋲陛陛其登祖衛聖武左右興祚龍咆虎號風雲胥附考事世皇荷祋與戈昉于南詔爨僰壘摩再從濟江攻鄂東北舞干梯衝執訊雲壁又偕度漠氷雪峨峨手瘃足皸拳勇維何固叛是求凡十五戰不摇疾飈勁草乃見歸以夀終生子如公帝灼其心惟一効忠式昭徳音選臣裕廟其盡其職其徳其要洞洞其信屬屬其恭介介其守廓廓其容皇上儲皇既生順考詔輔翼之俾躬是保及隋授經撻子示懲止其邀嬉大訓服膺其彌為善若是非一臣鄰徳將儔與為匹成廟降制俾從撫軍朔方十年日伺冠氛晝横雕戈夜袵龍盾惟彼不至至戰必遁末踰金山危巢是傾竟令飛揚不逭大刑惟皇作極言念大徳既贈祖考公以夏國美諡崇階罔一或遺父子丞相百辟用師尚服其衣尚乘其馬門户輝光世無二者爰詔史臣樂石特書賀蘭可磨而銘始渝先徳碣河内李氏先徳銘至大庚戍鄃王府長史兼經厯典食司與所部人匠都府官李惟恭持其鄉士席雲漢狀其祖潤文玉使懐之利用庫日民調商征之入吏祿公湏之出不遺于受不僣于發如他人侵蠧以益其家負而債償罪沒産者皆無之與人交以誠御下以寛禮賢樂善者求表其阡燧曰管庫之官則古委史亦下士也豈可筆者豈專由孫貴耶蓋鄃王之考初尚主世祖再尚主裕宗自稱晉王克用裔孫為置守冢數十户於雁門禁民樵牧由分地在髙唐即是進爵為王世居静安黑水之陽為廟以祀孔子元貞始年表賀聖節獨書漢字庻其尊禮斯文者惟恭今臣其子觀其所事者賢若不可辭矧有此大者懷之為州憲宗大封同姓初國世祖于秦以户寡益封之至元之末以封其孫順宗既之國未至疾返賜名懐寜以王今聖時方撫軍于北皇太后儲皇往居者二年則懐為三聖龍潜之地傳曰小國之君當大國之卿為下士是邦者當宜何哉則君善職管庫者有不必言矣卒以大徳乙巳三月十有八日年六十七垂疾猶念惟恭不置曰吾平昔鍾愛是孫今逺宦數千里不及聞吾顧言可憾也哉妣王後二年亦卒二子從鼎從信孫則惟恭其長初由王府郎中羅忠國使懐聞其好學慤有立志遂與偕北即婿其家進之于王王甚禮之言無不從事必見咨妻卒賜楮緡二千五百為取元氏子季惟寅銘曰荀卿子言臂非長封髙而招所見彰斯若可用為君方惟懐為州河之陽實為三聖淵龍鄉其間下士雖守藏或小大國君卿當其貴可參攀鱗翔况復有孫翼賢王逺塞而近孔子堂仕優學以能自疆何畏潜徳無輝光墓碣朝列大夫飛騎尉清河郡伯張君先墓碣章丘為濟南屬邑士子張養浩年少而志厲積學而善文授知平章魯國康利公曰汝學仕耶今之仕者莫不由吏發軔遂用為儀曹史超擢中書滿其年考出令堂邑一守敕約便行弊祛形勢不撓惸鰥不悔民恵之懐咸稱曰自停年之制行令吾縣者前十餘輩無右吾令求紀于石走未遑為今聖淵龍召為宫師府文學進司經宫府随拜監察御史轉翰林待制今都中書右司事由武宗詔内升臣五品而上列五爵三土階勲而等威之封生贈死其先五品則縣子男從而正之與四品郡伯皆止父一世三品二品皆郡三侯二公上及其祖再世一品國公逮其曾三世矣故官父郁朝列大夫勲飛騎尉爵土清河郡伯養浩思異斯寵碣諸墳道且自為狀受姓之逺與家章丘世數可知者則自其髙曾然猶兩世皆逸其諱惟知曽常官武畧將軍監陽丘之燕鎮酒其致斯者任子耶入粟耶武功耶皆見無所武畧四子伯不年而仲不後叔萬季山叔娶郭氏六子澤職管庫于蜀彬徳正徳林秀敏孫十有五思敬思忠四川行省宣使思誠居郵耐榪稱崇興特綬裳履繼季娶苗氏二子一失兵間次朝列則今清河郡君生子英塞皆夭顯今惟養浩祖及諸父振粟於鄉遇盜於家脱人以刃縋井取飲活友於死者有家乘詳惟夫不大振顯數世而發是一旦者可不為明之且人持衡猶必稱物而使之平矧天所司惟一福善而禍滛視其力行非度盛而著者故有不終嵗㢮為衰微而安行所遇必數世而始進于盛者譬之鉅室徹則一日可必平土構且累嵗不能以落其成古人監此所以垂從惡如崩從善如登之戒也夫如是則章丘之藴美含章雖武畧之僅官𣙜酤而猶不能頡頑時榮其上之晦迹又不知其為世幾何亦庻安行所遇者䝉莊有言今夫水其積也不厚則其負大舟也無力朝列之先厚水者也資其後以負大舟也佐五命而所生享報如是未艾其年子之位日髙而所生又隨之而加非若陳省華與三堯共躋台衮者不止也雖然是猶以子貴推言使當時也朝列責其子為農為技則亦不儒而已矣又何自開廣聰明漸涵道徳工其言語流其聲譽居兹清列哉然朝列又為子擇術之精者銘曰嗟今士子人孰不期煜其華辭振擢一時惟其才資得天者薄雖竭爾力而竟落莫矧古有作如車司南能不背馳千百兩三孰興靈竒章丘君子名疇與昭魯國振起引以試吏㧞其俗常令諸近畿佳政用張文學司經寄帝耳目轉而待制典國竿牘進而顯矣推恩所生勲伯土之清河郡城人曰子學其父所詔有赫今隆則為子報子明能然由居止仁維以勸忠示禮使臣圭首方趺碣其墓隧孫熾仍昌其來無止河南勸農道副使白公墓碣彦隆始由太原徒行至河内致其父書魯齊先生願遊其門未有介也乃因吾友翰林侍讀髙凝得操几杖主疑家二年而歸侍其親而先生亦召北矣尋由避宅右揆以集賢館大學士祭酒國學教貴胄乃奏召舊弟子㪚居四方者以故王梓自汴韓思永蘇郁有大名耶律有尚自東平孫安與凝燧燉自河内劉季偉吕端善劉安中自秦獨公自太原十二人者皆驛致館下三年吾儕或病告官去而先生亦浩乎其歸乃奏有尚與公從仕郎國子助教昔者貴胄友也一旦能横經下心事之為師屬非其道聳是曹不可得其馴然北面俄侍裕廟東宫公為講鄭伯克段于鄢已講而出裕廟語人曰是非空言意固有在也以國史院編脩從仕郎仍助教擢奉訓大夫監察御史發阿哈瑪特賊國諸不法彼顧誣公糾摘非實捕送刑部獄引鄰婦有色者教誣公嘗竊往來而鄰婦力明其無有鞠之墮孕而事始白又糾膺帥西京宣慰使道拉實以已憾殺其幕寮凡是皆庸懦縮首危者而峻風節者咸偉之出僉陜西漢中道提刑按察司事燧亦為其道副故得詳西上所為其按厯皆分險僻荒寒諸州南而褒鳳金洋北而綏麟葭丹塗經龍門西河絶崖髙可去水百尺止通一騎必遣導者先之有來騎使駐之寛使卒至則兩不可班視燒棧猶車衢也如是之地皆周焉制度卒有反者不即覺捕惟罪社長監郡與憲司麟州人告陰濟民乘馬疾馳其識仇也問曰所懐書濟民紿以反書仇上變延安延安移文吾憲公又請往治之所牽連二百許人繼燭治之再旬是州小僻無紙至覆舊案以書適近侍臣刮馬其州館隣牆也聞獄吏苛問終曉得公姓名歎曰世有克勉其職如斯人者使人勞告之曰吾見陛下當首聞公竟白濟民無他特杖其紿仇非宜言者公位憲諸君下㑹王相府拜布哈右丞勲臣子開省京兆特異禮公其按問諸司皆拱聴者改僉河南河北提刑按察司事臺檄檢覈中興鈔庫中興改李夏都𨽻隴右河西道憲令竟事始聴東任公又走沙莽往復近萬里半嵗而歸與其副使程思亷發數縣民完堤以捍河水罷當暑賦民牛車轉粟入淇又改僉燕南河北道提刑按察使事趣裝其考已疾行至衛而卒公與兄楹即藏衛西輝之蘇門周卜村南原而其妣亦疾乃朝夕哀死事生即教授于輝明年燧召直翰林感其毁瘁骨見衣表弔哭之餘其徒數十人拜庭進退朋讓賓敬之道囂囂然先生成法也為歎曰嗚呼燧亦先生弟子者何嘗有一善及人如是明年燧疾满告歸鄧而故司農卿侯爵託語彦隆或河南北農副制下必墨縗以出世議隘薄自便非時燧傭車過衛不可留不得身見為書語其然聞方督課有績其妣亦卒附其考墓竟以是謝所事以至元已丑秋八月三日年四十六卒苫廬嗚呼學可以範世行可以礪俗而已是哉夫人賈也以燧平昔善公録河南北道勤農副使苟宗道埋辭求銘神道每一讀之一收淚擲筆數年終不能叙其事去冬以史事又召入翰林過輝夫人祈世母夫人為言持幣泣請且使其子安禮與遊其門者庭拜燧還其幣曰吾無答吾亡友者以是佐刻石湏嗚呼非公仁義行家能使婦人切切者乎惟恐没其夫子一善可曰賢已公諱棟考天禄雖官而不顯居頥樂堂號頥樂先生唐白居易家狀云白姓家太原者楚熊君孫勝白公見殺于楚其子奔秦孫乙丙與裔孫起為武將封武安君賜死杜郵始皇思其功封其子仲太原公豈其苗裔耶銘曰聞古五十年不稱天公是不盈天道未曉學不篤耶得譽先師道不行耶裕廟嘗知職不舉耶三憲著効力不本耶耕播之教况冠獬角敢言人難彈射柄臣聼者毛寒猶枚其外未及其内視親于䘮觀婦于介靡一匪善靡一可凉非我私友月旦章章嗚呼白公耳孫猶令其貫古松嵗逺滋勁士不盛位而盛吾賢盛位者衰盛賢日延有方其趺有剡其首碣石阡隅千祀無朽國子司業滕君墓碣觀漢諸碑凡門生為師作者其文多稱在三之義蓋本欒恭子民生于三父生師教君食惟其所在為言又列郡邑姓名氏官人出幾何錢于碑陰多至百人或倍之令人每興今無古者篤于其師之概至大已酉燧長翰林之明年國史院編脩官東平蔡文淵狀其師國子司業滕君之行與門生許質求表其阡與君之再入成均横經文席者嘗數百人而礱石所資一不偕人出二子獨加異乎古豈不于在三足浮俗斯時耶君諱安上字仲禮其先自洛徙中山不可推采其世考府君某隠徳委吏斗食自捐生君八年而不禄妣李夫人撫君誨曰而性質開朗記識兼人且金名士趙燦離孫不可以貧廢學感聖善言師西巖君克自砥礪勤心聖學暨其長也尊聞行知如不足日私居自持衣冠齊遫及出接物一誠以和郡無少長相謂不字咸稱先生學積其躬道行其家化及其鄉府臣歸髙薦名于朝敕教中山是府多士觀親輝光謦欬欲聞鼎鼎其來服縫掖者將半齊魯庭臣善其職事有聞用以職民主以城簿壓于為監為令與丞刑或過中必揆以義馴馴上説不使黥湼妄加疑盗廢棄永世仁譽既章宣司所臨若縣與州事有未竟必邀往治裁中情法守令憚之出將入迎若事大吏徴為國子博士以其平昔自律有先蚤作晏脩誨誘諄諄發䝉疏疑立懦克剛各因其才矯拂于善黨坐羣行齒而序之其極弗率有黜與朴成均作則井然有條即升監丞再丞太常世祖賓天成宗繼序圓丘請謚大室升祔凡厥禮文酌古損今皆所訂稽元貞之元拜監察御史京師地震上疏曰君失其道謫見於天其咎在内庭竊干外政小人顯厠君子名實混淆刑賞僣差陽為隂乘致静者動宜兢兢祗畏側身脩行及昔所為以盡弭之之道其説累數千百言反覆深切有司不敢以聞君則曰吾不得于言者遂委印去反闗其家著書自怡尋起為國子司業時已疾矣顧言其子治䘮無用二氏以其年乙未夏六月二十有五日卒年五十四𦵏府城東南崔丘里為文一本理義辭㫖暢逹不為險譎非有禆世教者不言有東庵類稿十五卷故江西亷訪使趙秉政板之行世矣又有易解洗心管見藏之家亦多乎哉其不年者世同哀之而文淵猶以不待經筵職絲綸謀廟堂為恨嗚呼夫既師成均官奉常厯臺諌而又有徳有言足矣奚必兼彼數者始為至耶夫人李氏貞順柔嘉婣里範焉後君八年卒子翊去尉東明自致終䘮亦足以君刑家之自今尉元氏兄羽有文行於世銘曰孰不曰士于學始志迄用有成千百一二允矣滕君敏脩篤行鐘鼓衡門益大其聲敕起布衣于定敦教祈祈縫掖來則來效再主禹城簿領勾稽不枉刑墨仁聞日躋满秩而召入為胄監由博而丞俊髦是範轉而奉常禮文斯綱或革而因酌捐用章遷拜御史為帝耳目言責塞求龍鱗逆觸一不見入納履而行反闗立言行後是程方徴司業年過知命遽啓手足理也莫竟短者已而其長斯存何以貞之石有誄言金故甄官署令魏府君墓碣燧還吳中過廣陵日今嘉議大夫行臺御史中丞初請曰吾祖靖肅公顧言以吾曾祖甄官署令即死所藏亂離失其處他日必虚為丘先塋者載其事無使吾先人魂遊徬徉無所于歸而一善故或遺也子義為銘隨又遣其少子可亨挐舟廣陵五千里追之襄陽不及返而及之鄂授其考所輯家塾記曰掇是事銘嗚呼確哉逺而勞焉廼本之曰魏氏由唐相知古子林刺朔州子孫居桑乾桑乾為今𢎞之順聖遼有延恕者生中奉夫夫守成中奉生通奉大夫餘慶通奉生登多爾館酒使子貞登多爾實生甄官署令君諱允元改徳元字信之甄官生進士特賜及第笏特賜生思亷即記家塾者思亷生初初生翰休脩撰必復可系者是九世其大于金由登多爾弟資徳大夫參知政事柱國郡鹿郡開國公子平相世宗致治隆平祖考中奉通奉再世官皆以公貴贈登多爾及子隴右令景元甄官與逸其偉一人再世官皆以公貴廕君始監順聖酒改𢎞洲酒使鄧州槯使抽税設防有方與宜平不增歛姦無走匿額有贏籌民不苛之入副堂厨庫又為使改文繡上林兩署今同知易州入令裁縫署改令甄官署以卒年六十三官止廣威將軍夫人髙氏七男笏珫瑜琦玠璠玉琦太中大夫刑部侍郎玠朝列大夫延安司獄璠翰林脩撰今益靖肅公與特賜皆以明經進士官珫懐逺大將軍耀州庫使瑜監豐利酒皆廕官玉進士未禄卒二女一歸同知荆州節度使事秦徳美一歸其鄉右孫姓氏君究心本富計田疇第舍牛馬雜樹直可為錢千者五萬嵗入粟為石者三萬嵗抽五十一為七子求師取友湏令節休旬大集衣冠令枚誦所業覈其進隋已則䧹序立前侍飲則脩聲輝耳目漸涵化淪其心由是成徳達才多萃其門章宗甚嬖李妃夫人視妃母王姑也數召通籍禁中不可復後秋獵易州君方降道橋諸水復召曰吾思與若晜弟語久矣終不能一致今行之所是在而夫子倅是便宜時也無終見避之深夫人以君出不敢専行俾子瑜諸之亦不可曰是家膏也親將汚人人有為不善者不憚取戻府縣惟憚君知兵興下令甚急敢有舍奴婢亡命不告者罪及其隣人猶利其傭輕私役之覺則殺以滅迹或致大獄君時鄉居聞有出入非常者召問得情嚴其錮防書致其主歸之約示薄威以懲其再無殘其生終不語其主以獲之誰舍所也比卒免家僮久故者民之作詩與新世訣沐浴冠衣揆日而逝君之孝友天得非學其使堂厨以鉅鹿公子叔元未仕曰大臣子故屯其膏澤不見及耶三求推所居官縣官以故事無有不可又恤其無子以靖肅後之靖肅又無子顧言後初則甄官子孫世世圖報鉅鹿者何如也其家塾自序曰由吾季曺鉅鹿輔政兹降脩仁潔義可謂曰久仕之達者列品而九不過中中天嗇為報將待夫後之人取最初之仕外僉提刑司事為副為使入為監察御史治書侍御史侍御史御史中丞三十年間風憲之官無不揚厯司清議者猶大有期曰將不已是于今嗚呼自序君其知子哉矧必復於靖肅公先世其官可大可久與亨學行嶷嶷可述銘曰反覆觀先民吁可哀積元報銜身期後來門令容駟馬堂三槐必責於天者如取懐惟中奉亦然詳用獄至鉅鹿再傳既鈞軸官不私其子甄官承承三遜其季叩莫譍又仁厥乏祀脩撰䋲官以祀比言祀則大以今脩撰孫後者再小宗既顛蕃大宗頼藏偶失故所魂依依招之從先墓來如歸膴膴桑乾原終天地碣孰華其文太史燧牧庵集卷二十六欽定四庫全書牧庵集卷二十七元姚燧撰阡表招撫使李君阡表君諱聚單之碭山三章人以材武善射昏暮命中中鳥金之南播應募為兵積勞為提控河北俶擾嘗經大澤與友相失獨行葭葦間與數賊迕戈汰其股拔以逐而盡殺之然非若是戕已與敵閧未嘗以人血刃挺身踰河至儀封萬夫長孟公熟其父訪名而客之署其軍彈壓尋陞長千夫與總帥李成同戍皇陵岡癸已正月義宗由此渡河播歸徳始從成來歸𨽻大將阿咱爾麾下仍將千夫從攻歸徳亳州考縣金平大帥版軍民招撫使與成將皇陵降民百家徙東明實田黄頭原踰萬畝與佃民及嘗所惠活者數十人分苦均勞闢草萊伐株橜而耰之復積榖多至多至千鍾􅀈宗戚族與四方民醫巫扶攜婦子皆往焉依視其寡乏嵗時衣褐日月廩餽婚姻男女之及期與過而見干者無不周施一旦成邑人謂之小東明平生襟抱坦明大兵屠考縣噍無遺類一生哀祈生曰吾某官良庖也遂匿全之後召客俾具饌皆草惡不可進君怒詰則吐實曰初豈是能特誑主脱死耳其不疑人見欺此類不飲酒而好客與成輩數人為耆年㑹盡歡移日忘疲言惟前朝事絶口府縣得失鄉鄰短長聞人誤及此者則欠伸思睡掩耳而起時以長者多之每恨失學兵間課責諸子讀書如日不足嘗今今孫國子助教鳯輟書掃霜葉庭下則起奪帚自為曰無廢而業于斯須頃且然其急其篤于成者可知已年七十三疾卧不言數日子庭玉方令通許歸省則曰吾忍死待汝遂卒實至元戊寅秋七月二十有三日也𦵏以九月十有五日肇塋黄頭原東後三十二年至大已酉鳯求表君阡殊懇用是計君始家之原年猶未满三十方壯士也當戰伐始休喘蘇悸定之時在他人則徴逐貴介聲妓是娱弋獵是習吹笙鼓簧馳馬嗾狗以快酬十年席盾枕戈死所幸生之勞而獨自求口食于田畝觸風雨犯霜露與農夫耦耕頭蓬葆手蠒而脛不毛矻矻作苦終嵗而不悔比開餘饒衣食于其子孫而先賑恤鄉鄰俾不迫于寒飢亦志而智且惠人哉前夫人張二子庭玉卒令鄆城今平章翰林學士承旨閻公復實銘其碑庭芝使監太名酒繼夫人王二子庭蘭兩淮運鹽提領庭英同提舉鎮江財賦二女歸劉源馮珪珪嘗為江浙行省叅政男孫八人鵬懐孟􅀈總管府知事鶚使監長垣税次鳯也鴻福建巡撿見善使監内黄税見道見賢見可女孫三歸士族張鼎楊謙楊某男曽孫六好徳好義好謙好智好文好信好義翰林國史院史績學纘文銘曰聞古子弟多暴凶嵗荒歉則然矧在金世豪傑彚征戰伐是閑其視殺人如芟草菅人有子女我壓奴使人有貨財利取有已闕穰穰厥家何為不成安事耕畬嗟哉惟君獨嵗勤力匪種穀求惟以種徳善也吾苗不善吾藨期實百年庾維溢髙責報于天如執左契篤生孫子文士陛下黄頭之原土厚俗敦大史銘之式表墓門醫隠閻君阡表至元二十有六年蒼龍在赤奮若餘月初吉士子宏也持所自為其祖事状來請曰昔漢故民呉仲山他傳記無見嘗由發蔵賑施其郷而碑之至今千年風雨㫁剥之餘過而誦者猶懐其人不置也非託筆金石力耶嗚呼我先祖者生不策名于天官殁不受諡于太常處地卑約功烈無所表見一世獨有修之于家興所惠活斯人者故不可碑之記銘善言之士使得以示今而垂後比漢故民耶敢以是累公燧哀其志揚親又喜克用刀于文故序之曰維閻氏曹之漆園人後徙陳之西莘曾祖諱遵令陳之宛丘祖諱某考諱孟兩世不仕君諱瑀字潤夫生而明頴孝謹長由其外舅申璉與張子和同侍疾英邸故盡得其術業事親加以潜覃究誦先秦雨漢方書八年詣到積中故施念于外者疾輒已人徳報之則曰天實生之非必一出吾術也人間不自矜鬻求築其門者日亦滋衆壬辰踰河而北僑居宣徳府以所取衣直衣食寒士申兵陳邃孫周郭通至其館其廬去則贐之魏學士邦彦玉峯亦畧行位與遊時召諸道醫悉領于奉御田濶将以君偕北進尚醫列固以學識淺淺不可親上辭稍居南留真定二紳踰河将復郾城以先業蕭條無誰與鄰留鄢陵十年徙洧川年五十飭其子曰吾從學良醫又勤心竒書古方卒遇一疾猶眩迷于先民數十成説竟不敢必何方定可已疾殆以疾試方况君無吾問學者得吾術自已其疾則可無輕出治人也遂亦自棄醫儒服教子孫讀書恭儉質真異不忤物而同不循俗而介不附勢而强不赫威又精衛攝凡飲奕談謔無益泊戕魂神者終身絶不蹈為故能夀耉八十二卒實至元二十三年十月二十有八日妻申渤海宦族能通孝經論語天父天夫賢孝兩聞年六十二凡前君卒十七年至是合葬洧川某原二子鼎吉今尉潭之瀏陽縣逢吉前君卒一年女子二人一適太原劉麟一適鄢陵張琮男孫八人宏也獻民天民舜民他未名女孫七人幼男曾孫二人益幼銘曰彼函工猶擅仁矧君醫志全仁業卅年起死頻以其嬴及士貧晚棄學篤自信父一郷儒冠巾八十二年疇倫髙可隠墳洧賓夷先考由令陳陁三世迭不振維穹蒼運環循屈之久宜浸伸傳瀏陽初命臣授汝戈盗之眴在後昆奚異身非千嵗磨不磷黙然信期茲珉安西路同州儒學正潘君阡表至大之元江南行臺監察御史潘汝劼時為中臺照磨兼獄丞于安西校官楊定序壬辰變遷闗輔民其祖徳卿與祖妣彭衙段者訣或我他曰相失兵間前配封出子浚與祖子温生五年矣俟時清謐無使廢學雜行遷民失所如徃妣流離平陽風雨寒暑窘蔽土屋井汲竈煬匪躬不致須紡緝傭資學二子艱百罹為操益確久人信之婦婦姆女皆取為法且圖諸孫受所鐫誨有踐與别于所序前頌詠盈軸燧奪史事獨未遑詩今年再手太子文學張養浩事狀欲表其考學正之阡嗚呼不腆之文豈足増華𤣥閭而煩諄復見丐耶惟潘氏同之白水人君字仲良則諱温者曽祖宏登宋武科嘗令赤縣祖挺考震亨則徳卿以詞賦魁金進士夫人則鄉先生叚適安之妷由徴平陽童男入燕繡局資浚以行惟督君學比其還秦六籍之文言熟義通郭温伯女以妷之子楊時邳大用裴子法吕仲和來明之顧副言楊君美諸公皆先朝明進士孟駕之張器玉又其少者而君無不遊造其門得其延譽聚徒教授道化之行鄉鄰訟嚚不愬公宫司平其家恚至歡去仇解好合川蜀之士奴于人者賦錢富室贖登儒籍廟學卑陋捐幣為的倡其郡民徙基髙明州守邑令為咈民欲每自愧匿恐其聞知一臧否言為采風謡取以陟黜由朝廷旌别奴民勢家訟君及民十餘家云皆其父祖俘自軍中君倡赴秦省力辯其非或曰汝自士籍明詔已拔齊編氓何苦于他人為哉君則曰吾與是皆同鄉視其誣不一手援其溺非義竟還正民絶口不矜徳由已然人則恵之至元二十年擢同之學正是前一年走副秦憲凡三輔郡縣而皆嘗驅車馮翊朝邑郃陽澄城白水為同之屬縣獨君位是師儒身任表式數百里間篤民明倫亦豈輕哉教又非昔私淑人者為將十年既謝病歸自號安分野人為約白水凡我同姓塋是邑者歲時上冡無間疎戚老幼畢集周及諸宗實獲古人糺族遺意而入燕兄不聞問者五十餘年攜一子歸悲盡繼喜晨夕奉之若大賓然年七十五年大徳辛丑夏五七日卒疾革來諸子前曰吾于吾親雖孝無所顯揚而獲免玷辱惟忠不及事君若曹他日或有用世其竟吾志走哀之曰莫匪臣也惟視所在晨門夜柝不廢乃事猶足曰忠矧君尊聞行知範其鄉州不調十年亦事君矣奚其訏謀廟堂捍禦疆場奔走豆籩金粟當會郡縣率職始名宣力耶二夫人楊燕子八人長勮次劼也勵勉効勣助朂勣鞏昌帥府奏差他皆業儒一女歸信氏男孫十人未名銘曰繄考府君盛文華竄身金亂死不家妣夫人為魯人髽生君五年猶羈童㷀㷀逺逐遷民東天窮其身操不窮夫其所安人何嗟束君于學蓬在麻闕幘貯腹書盈車返秦先進門刺通杖者倒屣相將逢展于朋儕異其瞳由是聞譽日益加私淑筆耕代菑畬以古指南塗安差蒐才乃如平章公用官州校禄小豐身教不令士自從十年謝老歸彭衙敦宗諸潘方拜嘉忽焉白露淒蒹葭垂絶不忘帝降衷尚飭八子以孝忠八子喻指無齊同南紀劼今綰青緺鐵冠峩峩豸觸邪振而家聲後將遐鄢陵主簿毛府君阡表世所曰君子者二焉曰位焉徳也位其名徳其實位顯而徳不充人則與其名曰幸也致然君子則未也徳脩而位卑人則與其實曰不幸不得敷施所藴一時雖然君子自若也有人于此學以潤身道以悦親莊以齊家恭以與人清以涖官幼老一致無可疵纇可不謂徳乎可不謂君子矣乎燧于聰山毛君見之君諱憲一諱順字吉父廣平肥鄉人曽祖弼祖仁考冲霄金扶溝主簿金亡反其鄉與竇司徒文正公遊妣全前卒事繼妣成惟孝十五能自植授徒其鄉我先世父文獻公聞其善學大書夙夜以思無益不如學也十字為勸扶溝卒廬墳終䘮郡舉孝亷監洺磁常平倉受米八萬石責守其出七年而絶猶羡三千石司徒為翰學授檢討官日為史太尉忠武公講治鑑歲餘辟主鄢陵簿求便妣養歸為邢之書表令臾始邢與洺鈞州及陞邢為順徳府君則白侯邢洺鈞功臣封邑由邢嘗開安撫司故洺受其節度今邢已府而洺猶州求諸地志洺實古廣平郡領邢洺磁威四州洺獨不能引為比耶事聞陞廣平府各為路始不相一侯有病郡井鹵敗者議渠洺灌隍以流惡君曰渠洺不如渠滏洺去郡北五十里餘其流先卑逆導之難滏在郡西南其逺雖倍而髙渠之可勢必至旱資溉田潦資筏材薪蒸秸藁或免車檐可水輪地聽民為業郡食甘冽反餘利也侯是其言發民渠之再歲而成其所永頼一如君策筐篚餘力必集諸曹勸之讀書曲周民妖言惑人責與其令故山南亷副馮岵治獄芟其牽辭不多追逮惟置首惡于理凡椽府十二年都目沁州滿去而人益思轉汴梁提控按牘兼照磨官物務殷繁裁析裕暇于邢于洺于沁于汴侯牧來者皆客遇之不吏也及除濟南上口巡檢乃太息曰吾家世儒顧棄所素而逐盜耶兒淵副巴圖總管于江陵松滋吾其從養號聰山出與邑士唱酬詩入陶韋社中家居卷不去手老而彌篤于學如此以至元已丑五月十一日年六十三而卒創塋松滋瀼東夫人張氏賢淑有聞子三人光祖淵洧光祖前卒淵和粹敏明善文能官今以朝列大夫真為總管洧從仕郎管民總管一女歸鄭州張某男孫頴孫女歸同邑金尚書右丞文定董公師中孫植幼居室銘曰於維毛公為周司空受遺成王太保奭同後十六王當襄末世粤有毛伯猶王卿士遂客平原備十九人從楚一言完趙却秦自時竹帛賢哲世有君其遺苗居徳孔阜授徒肥鄉終養扶溝斗食晨門便妣是謀辭尊而卑輟行以躓匪人之為實我之自而位不充命也如何遺澤在洺滏水同波享在其子受服三命為良牧臣足鴻爾慶瀼水之東馬鬛其封走銘之阡可示無窮阡碣提刑趙公夫人楊君新阡碣維蔚州蜚狐趙氏系不可逺本由今江西湖東道肅政亷訪使秉政而上推得二世祖崑金帥府評事卒葬其鄉二子珪瑨珪將萬夫戍蜚狐後遷刺蠡州留瑨在鄉守舍天馬南牧度形勢不支倡縣民以城下之從太師國王狥地至蠡其刺猶城守礮殺王悍將蕭大夫王恚欲坑城公請以身贖母兄死王哀之併全蠡民以戰績每最進兾州元帥虎符復推與其兄廷議多其悌讓改公兾州軍民總管别錫虎符入覲受和睿宗承制監易州再遷行省中都金平監中山府當憲廟世世祖方淵龍收召聞望之臣求治道之宜今者置經略司于河之南宣撫司從宜府于陜之西行部于秦都漕于衛東西二千里道不拾遺而邢則今中書右丞相之祖封國政弛民散最號弗治求潛藩制官惟歲入其貢賦為置安撫司後邢易為順德升州為府乃以近古太師廣平王從祖托克托與公為斷事官位安撫上公年盛强俾與開國勲臣苗胄為友則潛藩期任公者己不小矣世祖踐極制監真定路位總管上俄遷順天路宣慰使肇置四道提刑按察司以公使燕南河北轉使河北河南累章請老不可年七十九始聽歸卒年八十三以監中山有田朱固鄉不返𦵏飛狐即塋是鄉堯封原亦昭時崇顯夀考人也夫人既同享有其樂公當不恙亦以官植業順徳盡析秉政夫人從養及子貴食其禄以終年八十二不及公才一年何夀考萃是一門哉因惟女子子天父天夫者也父不能必子之貴能之者夫子焉耳而難其全今之儲才將相係望海内者每在乎風紀之官夫人以提刑使之妻而母亷訪使詩曰教誨爾子式榖似之彼奕葉襲芳不隕世徳夫人之功亦鮮儷哉古邦君之妻邦人曰小君禮士䘮妾不得匹其夫必曰君妻曰女君後世封羊祜妻為萬歳鄉君則令甲郡縣君之原可為今不敢氏夫人而君之之凡其不反𦵏中山即别塋順徳李馬村若不同穴記稱合𦵏非古也因求之吾家嶲州都督文獻公開元宰相考也𦵏陕之峽石百官咸㑹焉及妣夫人劉卒則𦵏萬安嵩高西趾去峽石二百里耳以唐相之貴月入俸錢三千緡有力不足于至哉則不合祔者亦從古也今秉政斯兆未必始亦由此燧以其于古有徵為發之夫人生三男二女男秉政秉彞秉衷女適焦簡周某孫男九人秉政政又曰吾他日亦域是嘗聞諸師古人不諱死惟不趨取死之途今之人鼎鼎焉惟死度之趨復苦諱死亦惑哉如師之言則秉政不狥流俗語身後事于其生亦庶幾古達者也銘曰襄國所直趙南魏北其西太行冀方四塞求田惟良宜莫如襄衍沃平平千里其疆生家其間沒即斯瘞奚取日者風水焉泥孰培平原如阜而尊左之右之昭婦穆孫天厚其門既夀既祉流澤淵淵未艾來只世生顯人如夫如子牧庵集卷二十七欽定四庫全書牧庵集卷二十八元姚燧撰墓誌銘南京路總管張公墓誌銘公諱庭珍字國寳曽大考淵大考字明以武力再世為金千夫長家臨潢之全州考楫北京都轉運使故又家北京公于次為中子沉静易直通毅辨彊綜經緯史尤長左氏春秋筮仕已存愛天利物志事先帝以典内帑受知先是髙句驪不請徙居海中江華島上遣使問何由且詗其貳服親擇廷臣可者即命公時二十三至其國王禮事之甚恭書言吾歲入幣大國未嘗不謹臣職非與未臣而敵已臣而叛者比而大軍歲入邊刈吾人民奴吾子女有吾貨財蹙吾土彊吾是以捨衍而完險誠出甚不得已之謀非首鼠他圖為也末疏黄金以兩計白金以鎰計各千百數為夀又言誠以是慺慺之言歸聞之上幸止邊軍無歲入願歲幣外别入如今相夀者數歲歳為謝公勃然曰王以天子之使求貨來耶揮去歸具道王言且保其國無他避掠徙耳上亦悟曰人歲入幣事之又加兵罪之誠何以待不臣而敵已臣而叛者詔令軍止戍邊無入掠自是完東夷室家父子無慮萬億計自將伐宋從至閬中留為按撫使治兵裹摩創殘外供仗糧不擾而集今上即位中統建元自將北伐以故先朝故臣熟西京入漠南路俾置傳驛兼給饋餉至元四年授同僉吐蕃經畧使兵裁叛離仁革狠頑渠酋讋撓滋久安順六年授朝列大夫佩金符責貢安南時已徴天下兵數十萬圍襄陽實為蹶宋起本勲臣故相上與咨軍國謀不可一日離側者皆出行省董師公至其國王立受詔公詰曰王行非止違命干禮于利害且不熟知揆此邦人民土地不當天朝一總管治皇帝不欲郡縣王地版籍王民聼其稱藩遣使諭㫖徳至渥也且王以與宋輯睦緩急而援今百萬之師長圍襄陽鳥飛路絶朝夕將拔席卷渡江覆其國都易如振槁王猶倔岸海徼恃為唇齒自矜尊髙事且上聞天威小震無煩逺召中國雲南十萬之師再月可至則丘墟王廟草棘王庭者將不難為其審䇿之王屈降拜益慚憤將以兵恐公使力士白刃環衛公迺示怠弛袒寢一室盡擲所懸箭弓刀槊付衛士聼汝何為暑渇甚每取江水以進皆温惡不可飲食及索井汲不許曰吾俗不相悦者多投毒井中殺人公曰自所求毒死不恨終汲飲食自若安南君臣多畏公者八年㑹公以安南貢至襄陽猶未抜即授行省郎中承事勲貴巉絶不阿惟見之營衙足蹟不及其門商較事宜言閎色厲或有以凌鷔見短者故右丞相史忠武公天澤觧之曰是其為心忠正侃侃人也久親其人必實吾言十年襄陽下改省為行樞宻院以勞遷中順大夫遙知歸徳府行行院經厯大軍南規渡江復行省公復郎中俄降虎符襄陽路總管陳府尹毁城樓以完廟學散契丹軍以惜月廪剗弊施宜當其先後明年改監郢復二州位安撫使上捐魚荻之賦使人厭腥食家給蒸薪月發食以贍餓乏視便輙行行事已劾聞十四年陞嘉議大夫監平江路位總管上郢復民聞去遮馬號送萬數其治平江考績亦最他路十五年改同知浙東道宣慰使未行改大司農卿丁内艱時軍興法聞喪不得輙行乞奔赴不報公願還所受制書為民行省知不可奪歸之旋艫枵然金玉美色皆無有惟文書襆被而已今中書省右丞相巴延夙嘗疑為凌鷔者後顧為深知公嘗語八曰諸將渡江無有不荒貪獨予與國寳清慎自持聞者以為知言家居四年又終外艱十九年以才起復仍故官嘉議大夫南京路總管兼開封府尹至治之初見星而出見星而歸凡前政積事留獄旬月剖摘皆出尤善發姦伏有控鶴十餘輩比公至僦大第聚居二年黄金横帶出入飲食街陌縱横人謂其真也公曰控鶴役在京師久此不行必劇賊也密喻有司以意期三日盡致其黨索賊以來得金帛寳玊服玩典質券契盈室鞠之皆欵服物則推埋所獲妻妾僕使皆掠民子女或娼妓明日告曉市中皆杖死民駭其神捷闔境乏食已聞未報輒止稅勿輸明年河北大旱民流徙就饒及河朔數萬人郡縣畏損户罪謾以逃聞省部遣使分道邀之許發倉人給三月食還所籍民聚謀曰吾得食三月負難歸重難勝鬻將何噉且各賣質田廬而南至家何為愁歡無聊若出一喙公謂其使曰斯民非賊河南非别界皆聖上民社也非不知奉命不輒濟可以無罪誠不忍老稚􅉐踣吾治甘受禍以活此民則下令車津急濟果有以專行上告者事下御史大夫即治亷之境民皆曰吾侯賢牧其為開封㫁不阿可當今代包拯大夫察其無他薄責而歸奏寢不下秋雨潦河决原無泛杞灌太康自京北東漭為巨浸廣員千里冒垣敗屋人畜流死公括商人漁子船百十艘又編木為笩具糗糒載吏離散四出往取避水升丘巢樹者所全活以口計無慮百千水又齧京城入善利門波流市中晝夜董役土薪木石盡力以與水鬭不少殺乃崩城堰之城害既弭復大發數縣民増外堤防分直為三直役一月逃罰作倍起陽武黒石東盡陳留張弩河綿亘三十里如期三月隄防悉完以至元甲申七月二十二日卒官舍年五十六河南之民識與不識如喪其親戚家纔餘俸半月將歸𦵏貧不能西開封市民雄財者户賻之又遣子弟數百人持錢分程具奠越别治洛陽五百里凡千里及潼闗以其年九月𦵏安西府咸寧縣洪同鄉少陵原都運公塋之左夫人何氏温淑靜端男子三人岳提舉郢復魚湖崇西蜀行省宣使嵤未仕女子三人一適太平州録事韓和一適紀徳信一適鞏思齊後三年其季大中大夫諸蠻夷部宣慰使庭瑞以燧素知公求銘其墓辭曰年五十六固不云天較齊耋耆孰謂夀考究其致之豈無以然國苟有利棄身若捐東北雞林拏舟以使西南雕題登馬已至視數萬里為歩仞餘招麾兩王嗾臺指輿吐蕃獷黠化不犯令由積苦勞至不延命夀也無稱世不為臧死有可述短不害長襄陽軍謀郢復民效已實已著猶其小小開封蠲租舟民于河電霆馳馳懸躬禍羅下燭其忠由明后聖老幹經摧霜風踰勁大浸稽天陸舞龍蛇流死所餘丘木是家乃集舟航乃筏以繼乃求以濟取置平地穴陴摧防萬杵登登役不踰時隠其阜陵民流他彊我飫其食我彊沴傷皆手援溺顒顒公哉人之騶虞彼饞婪婪横目虎貙雖古循吏列傳史册載筆今功孰怍為匹少陵之原有坊其丘銘石道周以暴諸幽中奉大夫荆湖北道宣慰使趙公墓誌銘至元十七年授公陜西漢中道提刑按察使之命下燧時巳為副雖公未至實與聫銜遇聞狀聞臺吾曹代書使名者一年及中丞王博文來使乃有不得一際顔色之恨後燧轉副山南湖北憲治江陵二十三年入直翰林明年公以中奉大夫使持節宣慰荆湖北道亦治江陵終不能相遭以卒後四年當三十有一年燧如龍興始識公之季子大中江州總管兼管内勸農瓛愛其忠厚和粹薰然克世其素範家者常同郎中馬昫登廬嶽數多忘其為新識者歸復過之益相歡也出故李君槃所撰墓碑猶未有埋銘因思與公陜西未嘗同事而嘗同銜湖北未嘗同時而實同治其慕義區區雖所雅好有不如也今自燧直翰林視槃翰長為同事同階同時而同治者槃銘公于昭昭燧不能暴之于幽乎瓛曰固所志也乃敘之令事以類從積官以大中中順嘉議通議正議以及中奉受任凡十九厯中外四十八年莅民則襲永安軍節度使丞真定之藳城尋為令㑹憲宗丈料民公令藁人捐其户數得親戚同籍及後賦下户數白金四兩而藁果不困人已復有經逺謀民有崔進王成共飲成歸而進失其處其兄訟成殺之縣掠成服時州縣得專誅公疑不得其尸緩不即令償死踰月滹沱冰開而尸出騐覈無他乃由醉墮水死乃脱繋繫時年少而位卑人善其能用獄他日遷其定路總管判官東京西京大都南京四總管惟東京虎符西京南京兼尹大同開封府東京當髙麗倭奴用兵之衝其間勃海女真契丹錯居俗各異宜他人得此率謝不往公居三年諸夷帖帖白燕巢堂士多祥而詩之西京大荒聞于朝得發倉儲以丐貧饑民頼全活不流徙聞令下采民女姿徳宜者貢實掖庭公上言山西回逺京師且無大家民女貧陋無有可充椒房下陳徒生民心使育女嫁姻年不及幣徴不納惟幸有男為託殺禮戻古天生紊俗甚非聖世之盛舉也同列危之避不連署公曰此出我獨竟上之事亦報罷南京未行裕宗在東京止之也治賦則銀符真定路宣課副使改課稅所長官陞轉運使領東京路鐵冶考績皆最職兵則千夫長從征李璮濟南在東京南京兼諸軍鄂囉總管持憲則山東東西山北遼西陜西漢中提刑按察惟山東為副按行部治獄無滯囚曹州屬縣禹城械至二賊日嘗殺人者隨聼録之兩人之明非辜言色殊悻直乃移讞疑長清而真賊得二人者以出凡今條責以課桑桑勵學校問民疾以肅風俗職無不舉者在庭則厯兵戸禮三部尚書建言省部任人率先其私非獨名器所由以濫且大啓仕者之争其敢而無畏者至遮乗輿以訟此風豈可崇長而不思有以衰之乎及持使節宣慰荆湖受命湖省而犯法臣肆其兇饕恃有中援威福張甚欲惟以溢户富財牢籠乃大料民兄弟籍者皆異之雖舟人田客僑遊不遺集吏計局不給紙燭又市鈔羅小其時直又賦之民復為憑怒曰吏賦民得者皆官有之又大鉤考積歲稽逋立期送官榜掠號哭之聲相聞民至鬻田屋嫁妻女或赴水自􅆷死定無責責償親戚隣里或嘗主何人家者又逼官吏令首嘗受所治民財及酒食饋遺督責之使日十餘輩燕犒送迎不少遑其恃勢須索者無敢少逆其言一都司貪與妾語宣副跽行酒移晷不持觴省顧總管有與吾姻者責令首償曰吾未嘗取民一錢不從乃摽草老婢令鬻得直輸之後反由是免嗚呼觀同列與所臨守土若此則公之有至難于吾胷者從可知也如是而難事牢不可剔之巨盗不見尤方數千里不遂生之民不疾怨而悅之其持身以閑世故者何如也公諱椿齡字夀卿滿秩荆湖歸未十舍道卒樊城實二十七年十月十二日年七十三返𦵏藳縣其鄉武家里東原祖塋少從金翰林學士王若墟學年二十一中我元戊戍真定選性孝友髙朗尚氣節或曰公豐頥後耳顔角烱然望知為富貴人也維趙受姓絶逺𣺌可譜究者兩世祖諱福有潜徳祖妣靳考諱廸以材聞卒官節度永安軍妣崔故翰長李冶已敘之碑夫人王金吾衛上將軍知中山府善之女公卒十日亦卒壼儀􅗴然撫下有恩能升金陳髙白四人者禮秩已夷不嫌庭臣賢文多序詩之子二人奉直大夫僉山南湖北道肅政廉訪司事瑗與瓛也六男孫執中守中居中行中安中柔中五女孫適崔恕劇𢎞董某皆名族某又中書左揆士選子逾通顯光著者餘幼銘曰胡天于公畀爾極備學善其師仕席其世言塞其責職舉其事卒遐其年生崇其位體良其敵述令其似伊誰無伉或一先弃十日偕老亦誠可異伊誰非傳聨翩伯季握符持節或守或使方古世徳曰少無媿有不信焉𤣥石之視河東檢察李公墓誌銘前集賢侍讀學士今臨江路總管李倜自為其祖河東宣撫檢察公事狀又譜其祖孫七世之系曰公曽祖賢祖彦升叔祖夏考温叔考濟沂公及兩夫人張富察氏弟彬昌欎子昱煒燦姪炯炳燿煇女歸顔鈐梁其孫佐仔與倜也女孫歸郝天挺吳某梁某二在室曽孫傭杲埍􅀈墀均圯女曽孫五人合是七世凡四十四人求燧銘公神道燧思古人掲之石者上惟其統下惟其緒率不旁及宗從倜乃詳然豈傷喪亂以還其存今者巳此將俾來者有究所自耶亦親親篤厚之道也故不畧而手筆之謹按公諱懋時字逸民太祖􅗴金之十年畧地太原太原城守不即下屬縣榆次其令不敢仍居平土徙其民依險逃兵縣東北四十里韓村砦公為民與母夫人及其季皆在逃中聞拔太原令恐䇿無所出即說公曰金主棄河北與河東播汴者五年天方北顧如是馬足所及無不靡滅太原河東鉅鎮猶不能支吾儕偃蹇北方因謂之固一日移兵勢如崩山之壓卵必無幸矣觀公美而長身膽膂拔類鄉里歸心有長者稱袒而一呼樹旗出降民無有不聼命者願公急赴是功雖吾亦恣公使之不敢越公令也公曰令自為之何至授人令曰吾力綿才薄圖生斯人狙黠之徒或忿曰金臣敢然以義罪余事未集而已蹈禍彼得以為名無益也吾所以急子者子而為是必不禍余當是人自為謀之時一為狙黠所先忌汝才而併除之如汝母氏二季何公感其言曰如教乃往見太師國王穆呼哩曰榆次小縣衆且萬人無栅自固王如加兵未必朝至而夕下必盡力以與王將吏鬬雖王將吏能保其不輿一死不扶一傷乎此勢之必至者比其拔也逞志而鬬殱之得倍百里莽曠無人之土王安利哉今不汙一馬得倍百里有萬其衆之民以下執事王何以待之王曰吾受降多矣無有如之人之壮者閑其舉止而辯于為言吾得士矣且曰吾受詔太宗視事所便宜而行之即以公與太原帥攸興同議軍事後假其弟阿襌為王分兵徇地平陽輟公守太原俾從假王以行假王事動咨之下平陽戢剽殺而易置其吏課民墾田事舉令修治有績矣而真定同知總管武仙將兵襲下太原殺興傍縣皆附假王從公馳救皆復之坑其與巨王師及為仙用者獨交城為吾守或讒覃帥雖閉壁實未嘗一出决戰意視勝負誰在以為歸也假王欲攻之公遣人語帥翼曰當悉力與賊角不然屠矣帥如所言出戰敗賊北山下假王乗髙觀之公曰帥無他也遂全之將吏見北山石壁萬桂玉山三寺逃民男女紛綸白假王欲掠之公曰此戰士之家倉卒不及入城者且其夫為吾撃賊何罪而掠其家其緇服皆僧尼得是安施敢復言掠者論以軍律寺得不殘平生脱人于死者此類至今三寺像事之後甚為中書耶律公所才聞之太宗授以太原路宣課所大使公固辭孝養其親時年五十徜佯家居中書不能屈乃官其二季彬行省郎中昌欎平陽路宣課所副使以便事公而二季益恪與其妻視公及兩夫人不啻子婦于父母舅姑兩夫人敬公如賓相安如晜弟其化行一家者又如此年六十一卒實某年二月六日𦵏太原城西井谷村東原昱用事能臣也事載他碑故商大參左山公嘗題其墓子孫官者燦太原路鄂囉鎮撫佐麓川路教授仔東莞監司管勾倜通貴矣俶同知富州壻其家官者太原課稅所副使賈某敖拉千户梁某千户王某郝天挺四川行省參知政事張藻主秀容簿銘曰公生襮外美而頎大雖人所竒猶力未頼一朝榆次林林凋兵令身過之祈主下盟公歸師王萬衆是率吐策以撼言不撓直王曰之人天以賛予俾守太原真帥與俱移戡平陽王假弟節俾往為佐資用不乏太原俄反假王旋旗師不越旬翦以復之交域已汙教與賊戰不待言雪讒誣隨辯維是河東既輯既平而還收身菟裘是營中書除書拒户不視出焉河鋭去果亦至丈夫見世及物之功觀今所就為薄為豐六十一年不曰夀考有予有才銜未施報再世之澤濬發為川蕃爾後昆世文以賢異時何人補遺竹帛惟無他求正視是石唐州知州楊公墓誌銘自盗殺阿哈瑪特後僧格使總制院結知世祖氣熖炟烜爍人倖進者入賄其家或藉其一言以為事從中下必中官官之者月無虚旬每為中奉大夫參知政事居寛所裁甚不得已如請乃簿所蠟級干政者俟有問他日則引以為稽其人不利也一旦為中書右丞相誣而殺之惟其子集賢直學士奉直大夫朂不孥自餘妻及子景奴婢凡資業皆籍入縣官僧格敗誅故奉直大夫知唐州君居簡始敢上疏列明其兄自部曹史主事省掾都左右司檢王中舍郎中知府憲副侍郎宣同典外郡尚書史曹參議中書御史中丞參行省中省政與國宣勞為時才臣章章在人口耳今賊國臣不逭誅夷宜為死者雪其非辜庶彰聖代日月髙懸之明參知政事梁徳珪以聞敕有司償所籍入而朂尋卒無子又哀景雖二子一女而疾廢于莘而女年及笄自燕㩦大參商公左山縣企伊入壻其家自莘而唐纔一閱月而竟卒意者景訃未至與至而未之知到官四十日當元貞乙未十月三十日而君亦卒年止五十七嗚呼何天之不福中奉之家耶身戮一室瓦裂二子繼死一不後一有而弱君訟還所籍又為求壻令恤廢姪之家處是變之極狃薄俗之囿少不失天理民彛之正為弟為從父從祖曰悌與慈雖古人復作有一尚之乎而天之報施者及如是也盖君自筮仕試吏從萬夫長嚴忠濟從已未渡江後使交鈔庫曹州改南京轉運使知事以善其職從其司請陞經厯俄授從仕郎大名路總管府經厯尹汜縣同提舉信州宣課遷承務郎浙西宣慰司經厯換承直郎上都留守司經厯遭事難為身出任之官長有不相能必委曲調順如媒氏之合二姓始異而終同之凡此皆佐人出理者而非其所自為也惟范縣為近民又壓于郡守有不伸及今為唐若可以有為而遽已此哀哉君字子敬姓楊氏漢𢎞農大尉震苗胄五世祖綯為宋儀曹易州死于金兵生邦基秘書監為金名士書畫兩絶人曰可與李公麟者埒以通奉大夫永定軍節度使致仕生郊社署令皜自儀曹而下皆家燕皜生監歸徳酒庭直避金亂居莘生澧君之考也君交人誠和視親識如故知傾貲歡樂之夫人梁氏二子二女翰林國史院檢閱官昇一未名女長適同縣士族王文讓季在室皇上即位之年冬十一月詔修世祖三十五年實録院直檢閱官其究覈故事職也而其未九年燧與侍讀髙凝共總裁之昇也實當筆至元二十七年之一年顧與修撰而下年分其事已可見其文賢無忝面命矣由同官相歡故介其考唐州君先繋㑹從史院諸賢還進史上都及與之别未數月訃至期昇㑹葬莘絰杖言曰昇惡逆不得見先人屬纊已抱終天之恨不得公銘亦不可復食息人世矣敢泣血請乃銘之曰觀人之概惟在其大大使可書其細已葢嗚呼唐州其大何如流風不移天理篤居惟天于人若薄而厚雖所薄今將昌爾後人之識狹其中安知昌厚之求視異銘時薊州甲局提舉劉府君墓誌銘京山安陸屬縣也其尹承事郎兼勸農事劉徳源以邑士安其為先來言曰先生世名篤古善文者聞今賢公卿之胄或不逺數千里及門求表著其先烈者相踵也徳源之治去先生之居四舍耳心竊覬之我先人之位固不大昭于時如得先生銘則沒而名庶延也因叙曰吾劉氏居龍興黒土坂者不知始何祖其諱與次又不可考質先人始以函工賜田通州後以鍛製精堅他工遷彰徳縣院長尋官進義副尉徙平陽雜造局副使再官進義校尉為使又官敦武校尉薊州局使猶領于提舉司以勞深而資久也制以前官超為提舉俄病廢兄徳淵嗣為降同提舉徳源同知許州實侍而南以至元三十一年九月一日卒官舍年六十八顧言必𦵏通之樂村以其年十二月二十五日竁焉又曰鳴呼位有貴賤故功有顯微我先人始以函工一朝而賜服五品其功則止善于其職何顯之能為人子惟其考嘗愆于時者始不敢求以昭明否者其欲逺其聞者亦豈異賢公卿胄之心也惟哀而允之燧曰凡今為制天下歲程惟甲不領于工曹逕入太府縣官親考其苦良而黜陟之衛士必賜而藏之家弊則持故賜求易使畀之新他日有賜藏者罪死況私為者乃先人雖辨雜職而縣官視以為要焉自常工而跂之亦曰遇矣君諱智晜弟四人其次居二娶楊氏前卒一年同穴樂村二男則同提舉與京山也女適太常寺管勾李某銘曰五兵皆賊人戰而恃以不殤惟函為扞焉爾如君二十始傳以及疾廢為之二十年始日千被被全一人亦千人矣其功亦豈微孟子曰函人惟恐傷人由術推心君亦仁哉此其藏廣州懐集令劉君墓誌銘大徳戊戍燧遊長沙太原遇士劉致手所為文若將取正焉者走何以荷之讀之盡卷賞其為辭清抜宏艶為之不已可進乎古人之域既又自狀其先人懐集令之出處丐銘幽墟感其心將昭明所生為叙之曰君諱彦文字子章牛二十八筮仕當中統三年而知堂印乃出管勾北京行省承發省廢而歸授徒其家將十五年謂為無意于世之事㑹者耶當秦邸肇開與故丞相阿爾公之行省長沙也無不往干之㑹同知堂印者許楫為憲長沙言之丞相丞相自省郎中故熟君若晚君來便宜版為郴之録事羣盗竊發無時芟夷未靖也君不忍夷其俗而苟簡于治為之四年又三年始官進義校尉廣之懐集令羣盗恣張䖍人民燔城郭以冒天誅者死無所忌官軍少不足為恃授鄉民兵雜而殱之格鬬屢衂徙民保東山前募民闢田入租私廪者為米八百石一盡于餉増戍之兵與遭㓂之家嶇﨑艱梗炎瘴者四年以至元二十六年四月三十日而竟卒是何宦之不達耶今卑官無要知堂印者去尋相尋丈儼立案前䕶守終日不食須去晨而出暮而歸日必再至丞相家丞相出畋入奏無不與偕裕廟為燕王日當朝廣寒殿君立庭下問盝君何有君則田堂印也索而發封玩之其親接如何其營如何遇也如何皆他人取將相之資也一旦管勾北京行省去丞相千里録事於郴西南北京又數千里終乃令懐集于南海之濱其不寖近而逾逺者世恐無君匹也豈讀書一過千百言不忘力兼人射命中皆文武器畧足以表見一時者有是賢人已不凌人人則忮之耶且求以剸物置干將鉛刀其前䝉稚猶知後鈍而用銛及論取士則以方者為徒足持己而圜者始周乎物故率棄明炳勁持者為不易馴使而顧録含荏弱而不自持者為善適俗而賢之君豈坐是也耶其邵子所謂陽在隂中陽逆行時之為也故平生之道刑家則多其功于政者僅此譬如在此束于溪壑崖谷之險不得奔放平衍為澮為川其溉潤不博者亦勢然哉君石州寧鄉人權殯長沙佛宇文有玉亭小槀祖開參元帥府軍謀考汝欽妣馮氏郡君李氏三子致某某二女歸李氏薛氏銘曰士久其窮觀守之篤吏極其逺試治之勗且中其年而卑其禄皆彼蒼者隂厚其蓄抑不信之以昌爾續牧庵集卷二十八欽定四庫全書牧庵集卷二十九元姚燧撰墓誌銘雷君伯靜甫墓誌銘昔者嘗徵先師魯齋至闗輔闗輔學者則而化之始踐修人倫日用之實不變于流俗之駭議斷斷乎以復古自負能久于其道不數人而伯靜甫其一也然伯靜不及事先師事今昭文大學士潜齋埸公最稱善學而潜齋亦先師視之若友者也先師晚聞伯靜名嘗書示進學之要嗚呼觀兩公之知與亦可概見其為人矣伯靜諱復始字國明由避家諱改今字生以歲丁酉冬十二月二十一日在㓜稚舉動如成人父知事君已有虞曰是大吾家兒也長知讀書不輟朝夕寒暑君戒其躭苦為疾雖暫休之而勤益力不得則思有聞斯人經史諸子積貫淹洽講磨朋友長善救失敬以下之雖不巳若不敢自有餘與人汎接周愛不為町畦惟嚴于擇友事君承顔悦心曲極孝敬一不甘味或終日自咎廢食喪母情文不便今俗之簡失勿行一以禮經為師哀毁摧杖始能興日至君側則變色為舒以安其䀌傷心也友五弟豫世忠恒益觀甚篤然教誘之際凛乎若嚴師莅側晨省各授事出出還必究先軰誰見何得何問遲歸則侯之門疾則親䕶視娣姒晝聚一堂不得還私室均勞同食故久益睦無間言閨門之中翦然有法不幸以至元丙子夏五月八日卒且卒謂弟若子曰吾顧棄大人使哭子耶吾目不瞑下土也汝盡孝終養之其友徴士蕭􅆽哭之曰嗚呼若伯靜者以夷曠淵黙之資醇正精微之學篤信允蹈之力道被其身教行其庭使出而遇必為知務識治之臣振徳蜚聲以利澤一世若不難為也而其成其施已此竟不淑耶燧讀之既悲伯靜之不年大徴士之善言徳行且知言也按雷氏同之郃陽人後徒河中府之河東縣陶邑鄉者八世曽祖希齊不仕祖震通太傅僕府經歴父守義太傅濮府知事由妣夫人趙卒不反葬陶邑特瑩安西之咸寧白鹿鄉平里故從葬平里瑩左妻侯無子後以弟豫子遹今亦卒銘曰義理之在人心者固未嘗泯然非先覺之賢卓識之士唱而鳴之學者安遽能知為帝降之衷民秉之彛而踐行乎人倫日用之間哉古之人聞而知之于百世下猶若得其心傳矧伯靜甫與先師魯齋其師潜齋生並世或親承面命而得其緒論者乎斯文修塗發軔未半而車亡其軸噫此古之人重發不幸類之之歎也然君平日東弟若子師之至矣彼不哀君之未究其躬而忍輟心夙聞家學于其身乎反是思之伯靜又奚以憾為也白鹿之原平里之阡左蔽蓬顆之萋綿而髙可隠者下惟其埏噫乎哉斯賢噫乎哉斯賢瀏陽縣尉閻君墓誌銘閻宏少燧十七年識之七年矣走未嘗遇以凡士宏亦願遊吾門彙所述焉始託銘其祖醫隠君墓于時尉瀏陽考府君不恙也今焉六年又求銘其墓嗚呼何兩君皆不及知而幸襮潜徳其幽宏豈有見走文可以信後世然歟走不讓為者則以荅其為好私余故也君諱鼎吉字和卿醫隠長子其鄉其世其遷徙與醫隠所以教者皆見先誌以至元二十一年尉瀏陽二十六年受代三十年秋七月十七日卒年六十八僑墓長沙元配姚氏再配白氏二子宏掾省江西與蕃也四女一適郡人徒單全一適南陽髙舉二在室孫男女三人宏將以明年五月庚寅歸葬其鄉先瑩自狀曰君㓜躭誦記敏為文辭異其時他門兒者皆其小徳削不致詳而日勤于筆録如易正義論語注漢記傳舊唐傳治鑑節文選杜詩註十餘書無慮數百萬言具藏吾家手澤尚新可以汙車牛未聞人有辨為者與學仕事人則從張公邦彦宣撫天平為四川行樞宻院柴楨照磨用禮卿王博文薦出官瀏陽非賢不即與居母申憂廬墓毁悴杖而後起皆出處不苟倫理至篤者又曰君胷中廓廓無城府商古今人物成敗賢不肖必當其實諌及過不計嫌怨盡我責善樽俎之容粹如不流為詩千餘篇號訥齋以宏信愛必不誣親燧取筆之曰君喟然吾少厲志嗜學官止一尉殆天戯人者則不可也亦思尉為君行道資乎蓋尉有難為有利為江南大縣戸動十萬一尉兵額止于數十而押綱衛使恒抽其半又其身有疾疢喪婚之請其直司日不盈三二十軰盗逐不得必尉焉罪小則輟禄大而奪官是不諒其力少不足以制姦而惟責其專印不職也是其所難凡尉一世同者而君有獨焉在令尉恒居縣禦㓂無敢他遣而湖省犯法臣持遣數千里送所市紗羅京師賦出非其口也入納非其手也市者顧不必送而顧必令不遣者送有司又大其尺度重其鈞權從而責其輕短不使得歸取償有司必舉息立輸又遭例大鉤孝無問其嘗與否迫令首受治民間遺楮緡二千五百其家府又遣修􅲥海戰艦欽亷人難其一君難其三此其所由以貧也其利為者必求為盗罪不扺死嘗墨其肌月呈身有司者署使伺盗曰蛇之所塗蛇能知之吾使過耳口不言所指使自喻之彼方困拘罪籍一朝得交平民出入惟求圖報雖身為盗將不避為況囊槀他盗頥指冨室惟所便取坐受其有盗得其粗我得其細擇世所共寳不可形迹敗者歸之尉有司覈盗不得依日月則杖尉兵一杖加一等三杖而止耳伺盗持尉權一時宜宻置無迹何及焉尉所輟禄幾何而伺盗資之什伯不貲也盗為伺盗忠臣伺盗為尉忠臣又其巧者與隣尉交歡私要言曰吾得盗必使誣汝縣富室曰嘗巢窟焉曰屢資給焉幸羅之獄足吾欲縱之民惟知徳吾耳汝得盗亦如是取償吾縣易地為之胥相益也其月縱兵歸詭代家人責入傭直與民以兵備歛者又所得為也凡是數事今之尉者十出其半又聞一尉始至子嘗借衣尉兵其無可知也比滿積楮緡十五萬歲入稻萬石而不知何術取之也或曰是由賊不急其期日民貸其家責券數月子與母侔無則入其田屋今埒封君不思仕矣嗚呼尉乎禦盗歟師盗歟凡觀夫人觸法肆行徼倖未露悸人大語則君掩耳此倫拘拘恪恪自靖其道不少萌憂不足休休吾心賢何如也是為銘奉議大夫廣州治中閻君墓誌銘至大之元明年燧以學士承㫖翰林閻氏子然來自江西拜且泣言先人嘗以公金石之文獨髙當代故求曽王父醫隠君王父尉潭之瀏陽君與外王父金童子進士秦君道隆之墓不于時人三皆訪公然不天思可銘先人墓者敢越先志他求人哉敢泣血請余感其言而序之君之先始家䝉之漆園入金由其五世祖遵卒令陳之宛丘子仲徙西華再徙洧州生肇自是而下再世則醫隠君瑀與瀏陽君鼎吉生君諱宏字子濟若不好弄而嗜學母氏歸寧亦挾書以從不暫廢誦鄉隣異之成童嘗為冬庠于農隙得束修皆用資已事師聞士子有聲望他郡者不逺數百里徒往致拜就正而知君莫如余先至元茂子辭直翰林客鄧君方壻南陽醫學提舉劉君大亨亦家鄧始以其文為摯相過甚殷余既以所得文法告之及示其所注遺山集余則曰子有進道之資而弊參天地賛化育精神于此耶斯與箋爾雅蟲魚奚異恐以是小知妨大受也君不示以余言為逆其聼而止歸覲瀏陽時故翰林承㫖徐公琰持憲長沙手所為文以先徐公竒之荅詩以譽及參江西省政引以為掾事資其謀抜士子有學行者進為校官㑹故翰林承㫖瓠山王公構調廣選于江省省臣以君晨夕給事元貞之元詔脩世祖實録士在外可與脩者聼其召入瓠山為侍講用其薦為國史院編修官將仕郎凡是二百七十一之帙籖皆其所書滿考進應奉翰林文字官徴事郎同知制誥兼國史院編修上言中書請加左丞崔斌封謚以雪盗殺臣讐其忠讜之誣時相多之選掾中書君不可改承事郎出檢校江西省列曹諸掾簿書稽緩違失皆聼以疏其事達省受罰人無尤者㑹朝廷遣宣撫四道分行天下郡國功罪皆聼升黜今參河南省政陳公某至江西雅知君引以自佐君言貪贓固可汰苟其人初未之知子孫家人為之持憲諸臣必其服者亦宜哀而伸之使不廢棄終身清白國足囬然亦有矯俗僥倖以千名者未可遽以為信不覈其實而受其罔此邵子所以見善未嘗急去也陳公大然之由是此他道廢事皆輕平無怨家赴愬于朝者大徳乙巳余參江西省政君猶檢校見其戞去矜鬻多識敦信義理之學反躬而篤其行温然大雅君子然後自驗嚮所期有進道資言不失也余以明年九月以疾辭去又明年當十年五月十有一日而君卒豫章寓舍年五十二貧無以殯今平章議樞宻事李世安罷左丞休于家買棺藁藏郭東門外又明年官奉議大夫廣州路治中之制下人一歎其不及拜命于生一復華其賁九原也平生不妄笑言風度凝逺望而知其為有諸中者遇士君子家法書名畫與古彛銘欵與一言一行之善莫不筆之雖家空匱人或問之揆義而取不苟其得其達巳者終身不忘容齊卒東平訃聞君以其為江西日嘗新徐孺子祠故即是地為位立叙其情以哭之又圖其像求余為賛歲時以事為翰林日其僕健而才瓠山愛其任事當意遂借役之終出檢校不忍發口召還竟死其家與人交不以合已而翕翕炎于始不以逆已而悻悻叛于終若泛愛然心所與者視其窮約極其力可至以周之洛人王君卿五十生子而妻死謀求乳婦困于無貲從求貸假遂質象笏以應其須子幸不天讀法上章寧用槐板其友楊行簡贖以見歸友人劉景温孝而貧事老母凡百為皆身之為買妾以給役使其急赴義多此類曽祖妣某氏祖妣某氏妣姚氏君則其出繼妣白氏妻秦氏繼劉氏二子然以治中恩澤尉龍興之新建江西憲臣多其好學而文顧遣逐盗用違其長以職官召為屬吏季遷男孫址嗚呼太史公傳夷齊哀其餓死西山引顔淵屢空糟糠不厭而卒蚤夭盗跖日殺不辜肝人之肉竟以夀終以明天道無親常與善人之非然盖天道逺人以數十寒暑之身不要其歸固宜云爾必如周太史筮陳公子完非此其身在其子孫驗于五世昌為正卿八世莫與之京者始不膠于一定姑置夷齊顔子雖夭當世配饗孔子至今諸孫五十餘代猶䝉其澤復無所與盗跖栁下惠弟也安知其子孫不一再世而微絶其栁氏賢而傳之史者又安知非下惠裔邪畧古以求惟徴而家宛丘而下三世不仕積將百年尉瀏陽秋纔九品視古一命顯而未著至君之身操觚牘于鑾坡近負從槖為天子私人出又檢校江右之省月旦為清議所歸顯方著矣僅踰知命而卒明年而治中五品之制下實古五命雖未嘗一展驥足其恩澤猶及子然視其王父尉若異地為職則鈞王父已是然猶進未艾也其大震耀非然之身在其子孫者人亦孰得而必其世哉由是以思天道無親常與善人信也非歟是為銘京路醫學教授李君墓誌銘君李姓諱網字文紀其先真定人祖安道以字行考諱顯榮金廣威將軍内鄉酒使歲壬辰桓山公武仙聞可將任置為千夫長使戰浙川盖當太上皇由興元循漢東出兵也君年方十二以孝聞學能詩矣㑹鄧之節度使耶律瑗盡以州民降宋君侍母郝至襄陽制閫皆處之屬城分君随州明年還鄧乙未歲饑以皇子庫庫齊教徙洛之西君以儒業醫故思到精詣為人診治疾輒巳雖先輩善其術久其道者君不以年少下之人亦捨彼不即而惟君歸也年二十四或云廣威君不亡嘗見之雲中趼足徃求不獲無有也號歸失明乃籲天自悼曰吾壯而為世棄人如母氏之老何于是將身克慎攻治益力盖三年而視復故中統元年制授南京路醫學教授至二十一年改襄陽醫學教援尋詔尚醫今本草中土物且遺闕多又畧無四方之藥宜徧徴天下醫師夙學多聞者議板増入君在徴中三以老丐不就車二十六年歲已丑夏六月三日年六十九卒鄧越五日葬穰縣亭子坡嗚呼人倫之大莫先能子有是一者則天下萬善可必其畢集吾躬摧是言之則君處已之慈祥恭儉與人之忱信和厚者孝基之也六子友直友諒友聞友端友徳友誠恪服訓言近奉晨夕逺職官守皆馴馴有脩謹稱其化家又何如也諒前將仕郎提舉靜江府茶鹽聞前奉訓大夫知夀昌府君不恙時四方達官賢士有過此者或識不識必造其廬州縣牧宰旬好而月聞之亦此邦之雅望君子獨與燧相能方疾委篤猶遣端也求書獲安將掲其寢尚兾其可速已㑹燧疾不親筆硯不果而竟已此哀哉娶金徴仕郎化平令胡士元女六子同出前君卒三月女二人一適張升一適提領常徳路交鈔張居敬男孫五人未名女六人幼誠也縗杖致諸兄命哭請銘乃泣系之銘曰維古中夀七十率有宰物者司入出偶于君年不足一子而全歸始曰卒善遺後人昌後必魂神徂升降體質其千斯年安此室趙君和父墓誌銘至元十六年燧先嬪闗西夫子紫陽翁楊公奐之中女卒禮夫為服齋衰杖期然必三年而後娶達子志也十八年燧時為秦憲聞同之士子趙君和父中女年二十有四由嚴於擇對在室通書聘之君乃聚其族謀曰使君以故中書左轄公猶子顧肯求結䄜吾門是其心非求婦氏閎閥裒選姿顔者苐不欲以失節者匹其身其志已絶其庸人誠可嗣為兄弟者禮辭即許燧以不腆先君之幣迎之巳婚往拜其門君以外舅自居若視其壻為清門子非其耦者乃大副所願自慶得良婦翁從其鄉來長安聚居踰月其年十二月翁歸兩未虞竟自是為死生訣也明年壬午以十一月二十卒露井社其家年止四十九訃至燧與妻蘋自長安三百里各服子壻女服往哭之以其月十六日舉納之其鄉先瑩壬含來㑹塟者或逺數百里老日哭之如失子弟少者哭之如喪父兄自其居至墓所十里祭不絶路或曰嗚呼哉天乎若人之年耶如是者盈千人匹夫可以化其鄉未見有如斯比者夫豈無自然耶君諱居中字和父厥考彦和鄉人誅為明理先生祖考惟良曽祖考師肱髙祖考孚自君而上八世醫行其鄉不徙業又自祖考而下三世兼業儒以醫及人以儒修已人益誦一鄉之善士君之為尤事明理以孝有譽友其弟居仁及馬氏妹逾篤豈惟疾者藂然來歸鄉人有為不善者必訓飭之聞者受言不敢岸傲咈拒之有訟不之府縣而求司直其家取醫直集穀常千斛歲歉則貸之貧無積者凡哭而哀者皆常飲惠食徳人也妻鄧相敬如賓三十餘年無反目言一子惟義君卒之年甫再歲四女長歸同里楊某次歸燧次歸韓瓛幼在室後卒之六年當至元二十四年戊子外姑氏謂燧曰乃外舅汝知己也汝不哀其窮而在下生志不遂乎汝直翰林職史館銘賢公卿墓者夥矣可不有言發其𤣥宅潜輝乎不然則平生修為之勤愈不聞將來矣燧敬應之銘曰生不五十孰謂其年耶業仁冒其鄉道行其室冀缺之賢耶子稚而氣質粹實或幸賴以為傳耶十一世之躓迺今猶然耶彼不絶夫㳙㳙之滴將待夫他日之為淵耶其為世所甚惜者又烏知夫有在天耶嗚呼吾銘之幽石其可以告夫邈緜也非耶故民鍾五六君墓銘文興字叔進繄鍾徙吉潁川自迫於靖康繹騷避吉而來岳世方四由元而冨仕明至實生文興叔進字郎行五六以族次凡是四世皆不位吁哉五六遯迹市乃如天啓所狀事居家孝謹文縝緻嚴訓厥子俾知義自奉殊貶忘勤勩基約以極豐其積此邦師之陶猗視居鄉侃侃和以易不私其有善分施歲荒民饑閃瘠瘁發我廪庾飫老稚崩梁壞塗捷石治至今行者賴其利乙丑之閏月庚出年六十八世廼棄𦵏之三陽先墟比黄室之子南秀嗣南英南金又其季一女結䄜未决議男孫滿十女半是一庭孌兮貫魚似椒聊蕃升必天意豈憐之家久踣躓一朝起行當遐致況如南秀士服被下及二季皆學仕始卑終髙若登陞或者而宗由曲熾匍匐哀求銘𤣥誌伊誰成厥孝子志苟有善兮必門地漢民仲山凡豈異奮筆發隠太史燧臨江路總管府判官夏居母夫人張氏墓誌銘大徳十有一年秋八月臨江路總管府判官夏元亨通燧于郢拜而言曰元亨母汝陽張氏世家也是家金以友義嘗旌其門至居士某者百有八年以終三男二女夫人其姊吾夏氏與同里生十九年而歸先人後徙家洛祖府君諱某金尚醫年九十餘妣朱年八十餘以終于時無他臧獲躬服勞以養姻里孝稱之尚醫不恙時每訓先入汝未盡讀吾書而得吾術其無為醫師以誤人授汝必方為痬醫自業先人守是言及四子天瑞元亨與利貞徳常生教之讀書元亨長矣責使學仕曰汝欲事人必親其大一世者乃遣宿衛皇孫妃今皇太后積勤有年欶提舉龍興茶局歲貢名荈其邸大徳六年調令臨江將上其年十二月七日先人卒年八十有九人曰天者獨鍾夀考于之二家耶既􅉎偃師某鄉獨輦夫人來南有公相與禄以慈㫖甘為醪醴歲時晨夕歌舞為夀而歡其心八年當婦郝卒之明年夫人已為納幣趙矣急其婚期元亨欲俟三月終某杖期求日夫人則曰吾得吉矣竟以八月三日合巹纔六日其日浴已又沐已又易衣家人問其然曰吾所欲也明旦元亨奉檄祠閤早山未至而追者及之以卒告其月九日也年七十有八殯而待其滿秩舟其柩返葬于洛亦嘗揆之順章貢彭蠡大江以溯淮達汴陸去洛讒十五含為便且邇所以由石鐘山溯江漢餘二千里以至此又去此而㐮陸行千里始至吾洛不敢以為迂逺必公見者以公鄉先生文有時譽昔參江西省政嘗書薦其臨江忠慎亷平為知已恃此如得銘先妣幽墟以歸則生與死者華賜及燧燧哀之曰嗚呼使如汝言終杖期郝歸于數日則夫人為不及饗趙婦且古治喪絶而後沐浴而襲今不疾沐浴者猶人之常隨以易衣若襲然明日遂終由前則行嘉禮于喪由後則豫死事于生豈逆知其將然不以語之人乎栁初未之知或天者誘之俾其然也所可甚惜太后正位東朝其澤必先丐其舊臣則元亨亦依日月末光者其榮以禄將大于今夫人不及見之其將歆其豐祀乎天瑞道之營道令未上而卒利貞龍興提舉徳常醫學正男孫三人男曽孫如干人曰事耄姑翁負孝稱其躬有子序鴻皆婦夏之功天報之豐俾食子禄以終歸而君子之穴與同于洛邑天地之中可謂世所憾者無其恫矣牧庵集卷二十九欽定四庫全書牧庵集卷三十元姚燧撰傳太華真隠褚君傳雲臺真隠褚君㓜業儒長而遭時艱求所以託焉而逃者寄跡老子法中受學劉真常栖遲不在城邑多名山中保保之葛琅邪之七峰應之嶽神無常居焉洪後由真常主華陰之雲臺宫始從之西真常居焉徙上方焉弟子主雲臺雲臺華獄也為山益竒上方又天下之絶險自北望之石壁切雲霄峻峭正矗非恃鐵絙不得縁墜上下又不知鐵絙成于何代何人意者古能險之聖也將至其顛下臨壑谷深數里肓煙幕翳其中非神完氣勁鮮不視眩而魄震君負食上下自給如由室適奥嬉然不為艱薄寒則上下負食益勤為禦冬備一歳偶未集雪塞山門計廩纔得當冬之半始服氣氣减食為胎息逺則數日一炊明年山門開弟子徃哭求其尺見歩履話言衰衰他時方神其為非庸人同下山止之曰不可復有徃也已設向師食不繼僵死冰雪弟子雖有喙何説自白其能孝於天下必勿復徃也已君難逆其請指牛心谷曰此漢太尉楊公震授徒之槐市也或聞而稽疑其傳止得公常教授胡不見其居華隂者不識君何據曰然谷南直中方人行二里許深林竒石泉濺濺鳴其下墾地盈畆構室延袤不足尋丈環蒔佳花美箭人之來者始則愛其蕭爽不自知置身塵埃之外居不是晷既已欠伸弛然而思去矣君又屏弟子獨居或勸宜留一人自佐曰吾居此樂彼居此戚所安先不同猶彊而留之能施期月之外要終相棄去吾故與之為約非舂糧採薪不至絶而繼具而去亦古之君子以人望人不竭忠也其出山還雲䑓必以水冰無所仰飲十月為候二月還谷性嗜讀書逾熟左氏博議日食數龠飲酒未醺而止不盡醉也人家得名酒爭攜餉之至則沉罌泉中時依林坐石引瓢獨酌日入則入室而休或坐罷寢覺起行庭中一夕如聞林間行聲戞戛君則曰獸也雖不得其名可試而知引石投之曰麋鹿哉將驚而奔或止而不去者虎耳果止聼不去明旦視樊垣外虎跡縱横再夜起行如前夕不以自戒而止聞而談者神明之亦有他士樵人獵夫之適山初未聞君為熟何人責之具炊寢則假榻甚者易而詬之隨之益勤以安無難色忿言其外若職宜然者去或聞姓名惟他語不告終問之則曰吾求人知耶必求人知而求若知耶吾居此在人所不問而吾所不告也人見其苦人不近人情如是然不違俗上自王公而下及䑓皁争以一際顔色為快燧亦嘗再造廬焉告以人間聲利泛如秋風之過耳噤不酬應叩之山間為樂何如必盡舉平生所見好石幽樹佳泉危棧亹亹忘罷若幸夫人之一徃而我能先之者相送以出覺胸臆塵鄙如雪之見晛消釋無留餘者數目益信夫遊方之外有恬愉静退之士如君者罕類例求也君名志通字伯達名聞天聰俾禱有應不為沴賜號佑徳真人提㸃嶽祠灝靈宫又以嶽祠風雨將騫内出鈔萬八千繦為皃葺費三千易敝而新餙漶為翬過者改觀始知有應務之才特韜之耳年八十得益深聞益彰聖皇始見益急當嵗已夘至元十六年詔中使起之北面命命稽首草莽之臣通也自自知審矣疇昔壯也言不足以資廊廟擇力不足以彊禦侮今老先狗馬填壑晨夕至䝉冐龍光力疾以行行終不達恐傷陛下仁及草木之化是以昧死請中使竟虚車而返今李大參公號知君深且樂誦人善者戒燧傳之無俾不聞於今而冺於後焉公名徳輝字仲實前北京等路行中書省今以中奉大夫出相安西府云行狀中書左丞李忠宣公行狀公諱徳輝字仲實世居通之潞縣曾祖某祖金再世不仕考朴尚書吏部主事妣宗夫人三子長徳英徳芬季公吏部君生三十九年且卒指公謂宗夫人曰吾為吏治獄不任悍鷙刻削人䝉吾力脱罪罟齒平民者衆天或報施善人是兒其大吾門者勿憂貧且賤公方五歲哭之如成人家􅅻儲五升菽夫人舂蓬稗為糧芼藜莧為􅉁活之荒嵗既就外傅嗜讀書束於貧無以自資輟業十大監酒豐州禄食先足㫖甘有餘則市筆札録書夜誦不休夫人以過耽苦慮傷其孱薄也為滅燭止之已乃厭糟鞠歎曰志士顧安比也耶仕不足以匡君福民隠不足以歡親善身雨間之間人夀幾何烏可無或有聞死同腐草木也絶少年輩不游召其所親與率一時名公碩儒嵗丁未用故太傅劉文貞公秉忠薦徵至濳藩俾侍今皇太子講講薦故翰林侍讀學士竇黙故宣撫司參議智迂賢皆就徴癸丑先朝封用親割京兆𨽻潜藩擇庭臣可理賦者使調軍食實出公從宜㑛辟故真州總管髙逸民自佐時汪忠烈公始宿兵利州扼四州衿喉規進取數萬之師仰哺於公乃幕民入粟綿竹散幣集之或給鹽券使歸京兆受直陸輓興元水漕嘉陵一年而錢粟充棟於軍中宋臣介玠議棄平土即雲頂運山大獲得漢白帝釣魚青居苦竹築壘移成都蓬閬洋夔合順慶隆慶八府州治其上號為八柱不戰而自守矣蹙蜀之本實張於斯丁已深峻用事臣大集闗西河南諸臣入計局以中嘗為潜藩用者文致多方於公獨無絲髪得已未從南征至鄢留後行營庚申以為南京經畧使再月又以上北京宣慰使其年皇帝即位中統改元五月又以為燕京宣撫使燕多劇賊造私幣􅄂真行民間陰結死友相誓復仇怨殺人公悉捕誅之雖中書開府在燕令行禁止多不上白是是忤時相意以誣去位從北征還守北山諸關三年惡已相反誅以為山西宣慰使罪權勢之籍以為奴免而良者将千人至元改元罷宣慰使授公嘉議大夫太原路總管兼府尹至是潜藩故臣相無有出為二千石吏者上以太原難治故留居此㑹我先左丞公當分省􅁶調山西湖東世職守令即遣諭㫖公拜稽首曰陛下以臣堪一縣俾為令臣烏乎可擇况以千里寄治非材大懼任使不稱以傷陛下之明敢簿之耶自爾愈益勤勵崇學教以明人倫表孝節以善風俗逐姦贓以剔民賊裁婚𦵏俾師簡儉敦耕桑以富生理之出立社倉以虞水旱之歉一權度以絶斯詐之攘嚴鼓折以驚竒衺之覬凡可與民漸摩仁義者無所不張嘉禾瑞麥六出其境滿秩左部差功最天下右部考過惟草竊盗不獲一人五年㣲入為右三部尚書人有由訟財而失其兄子者公曰何疑焉叔殺之也深竟其獄公所信厚及權貴言可撼公者莫不績求保為衣冠之族無有是焉皆漫不為應懸己奉為賞購之其家人果止變告情狀呈露言者慙服叔竟以是病死我轉户部尚書事無大小必决之一日書判煩勞指為之蠒七年㑹上以皇旱為憂俾録山西河東囚行至懐仁民有魏氏發得木偶特告其妻挾左道厭勝謀殺已經數獄服詞皆具自以為不寃公燭其誣召鞠其妾榜掠一加服不移晷葢妬其女君謂獨陷以是罪可殺之也即直其妻而杖其夫之溺愛受欺當妾死罪觀者神之或咨賞泣下八年授中奉大夫參知北行尚書省事九年罷尚書省以故官參參知北京行行書省事京南徒水嵗泛溢至地下為患公築提竿去皇子安西王有土闗中之明年當十一年奏求公輔已以故官改安西王相至則視瀕涇營牧故地可得數千頃起廬舍疏溝澮其中假牛種田具賦予貧民二千家屯田最一歲入得粟麥石十萬芻槀束百萬公是來也貧不能從妻子留其京師事或上聞賜錢二千緡遣之明年詔以王相撫蜀其年重􅂟猶城守束西川各開樞府合兵數萬人圍之公至成都兩府爭遣使咨受受食方畧公危語動之曰宋今既亡重慶以巨擘之地不降何歸正以公輩利其剽殺不得有子女懼而來耳不然他曰兵未嘗戰及招討畢某偕中使奉璽書來赥最宜正言明告嚴備止攻以須其正反購得軍吏杖之為偽得罪懐之入降水陸之師雷鼓繼進實堅其不下也中使不喻詐計竟以不奉明詔反命如是者皆公輩玩㓂彊場心迹之著白者况復軍政不一相訾紛紛朝夕敗矣豈能必成功為哉兩府多致金帛子女為謝曰戎捷與人法令所不禁也公譲不受出未至秦瀘州畔而重慶圍果潰再退守瀘州十三年秋也明年詔以巴哈與公代為西川副樞公兼王相大軍即發公留成都供億食􅅻支半月賦粟繼之官船不足括商民船千艘日夜督運其年復濾州十五年重慶之圍再合踰月即下紹興南平䕫施思播諸山壁水栅隨之皆下而東樞府猶故將也懲前與西川相觀望致敗惡相屬願獨軍圍合州初公撫蜀徑東川歸以為重慶師閫受圍必徵諸屬州兵盡鋭拒守合州宜虚誠虚諜人持書曉之兵随其後亦制合一竒也即出合俘繋順􅂟獄者縱之使歸語州將張珏以天子威徳逺有宋室淪亡三宫皆北又頌聖量舍宏録功忘過能早自歸必取將相與夏吕北又為書反覆禮義禍福譬解其言以為均為臣也不親於其子孫合之為州不大于宋之天下子孫舉天下而歸我其臣顧偃然負阻窮山而曰吾忠於所事不亦甚惑乎昔也此州人不負於謀求去就者以國有主寕死不欲身被不義之君故爾得制其死命主今亡猶欲以是行之則戲下以盗賦遇君竊若首以徼福一旦不難也其說累數千百言又約書言為檄刋木於山浮板於江江珏未及報而公還王邸至是合遣李興張郃十二人詞事成都皆獲之當斬復為書從歸使喻其將王立其言如喻珏者而豈剴切興至立亦計夙與東府有深怨懼誅復興等導帥幹楊獬獲獵書間至成都降公從兵􅅻數百人赴之東府害之來争有言前嵗公為書招珏誠亦極矣竟不見寤無功而還今立珏牙校也習狙詐不信人特以計致公來使與吾争垂成之功延命晷刻耳未必定降定降公冐吾圍而來受何物視我必不汝進公曰前嵗合以重慶存故力可以同惡今孫孤絶窮而來歸亦其勢然吾非攘若功者誠懼汝憤其後服誣以嘗杭蹕先朝利其剽奪怢心於屠地也吾為國治此民豈計汝嫌怒為哉即單舸濟江薄城下呼立出降安集其民而罷罷置吏立徳之輿金玉餙少艾為謝公曰若以吾為是來耶吾無事乎此其特徃餽之東府合人自立而下家繪事之川蜀平復以王相還邸是年王薨公感其受知深而悼夫棄因之蚤也哭之幾不能生十七年詔公與南省參政程某即其地聼思幡湖南所訟鎮逺王平田㑹西南夷羅氏鬼國叛别詔雲南湖南四川合兵三萬人誅之前茅及境矣公曰蠻夷無親為俗吝貪始由邊將撫之失策積怨以叛好事之臣請加兵誅旁諸小夷洶懼相擅繼叛者必衆恐非直三萬人能歳月平也吾􅀈天子仁聖馳一介之使招之可坐俟其倈豈必煩兵不及以聞遣安珪止三道兵張孝思諭鬼國降其酋阿齊熱公名問曰是活合李公耶其人明信可恃即日受命身至播身降語且泣曰吾屬百萬人非公惠活寕鬭死不降事畢驛聞上為之開可改鬼國為順元路以其弟阿里為宣撫使其年王相府罷十一月二十一日始至黄平是夜也星如斗霣館垣外公弗善也歎曰他日嘗夢主烏江今播水適名烏江與是星皆吾死徵也夫吾嘗誦馬伏波老當益壯之言而竒曹武惠為將不殺得今活羅鬼馬革裹尸歸何憾二十七日卒後七日資政大夫中書左丞安西行中書省之命下蠻夷望轊車為位祭且哭者動百千人塗所􅀴男女空家咨嗟聚觀合之安撫使立衰􅀴卒吏民迎哭傾振山谷為發百人獲喪達興元上聞而悼之贈光禄大夫中書右丞諡忠宣公賜錢二千緡具𦵏先妃詞王遺前僉書王相府事博囉賻錢五百緡具奠明年僉播州安撫司事何彦杭章請即州治之柬為廟制曰可薨年六十二夫人胡氏前公卒今夫人某氏子一人嘉議大夫安西路總管兼府尹諸軍敖拉頍也女二人長適嘉議大夫禮部尚書劉秉恕幼在室嘗㮣公平居以先夫人剛嚴其弟宗亨有小過對衆奮杖撻之不少惜公若何而歡奉使未嘗有厲色遽言其亦能哉哉二兄既位不大耀於時每分吾有不至以寡乏見告其盡禮姊氏不以語人人知為姑若從母不以為兄弟也與人交誠易炳白不張城市機穽不面為許退與他人語以諄諄暴其人所長而韜其不及至䋲檢姦慝奮發忿急不能留怨過然亦不能留怨惡於胷中雖舊欲擠己入不測淵者事己輙忘之畧無校言復意自奉甚薄有積則施之不為子孫他日計西川副樞上嘗賜以玉帯錦衣錢二千五百緡止留其服物餘悉分之親戚賔客一日而盡人問之則曰曩吾家多責券縣官憐而賜償之無負矣吾貴而薄功又可富而厚享耶不思而兩有之神不福人幸以是人曰我貧吾利器也故自入官非素所徃來有相答報者未嘗恃刑勢取一錢直餽再為尚書權臣力能生殺人恥公共事累年足跡獨不及吾門以禄薄用奮為言願奉母錢百人交懽今取子自益郤之亦不為謝王相七年及事先王五年言必切切臣職子道請聞斯行以絶事嫌簡約侍衛以裁浮費無急土木殫匱民力者中外所厭誦凡人賢而有聞滿調將東歸必薦汲之王陞秩留之故關輔得士為多皆視為己職當然未嘗語人由我而然以期見徳遇事謹敏好謀善問多不自用及其未露生人之心愈切取信蠻夷問其諭招椎結荷旃竭蹷慕義三道之兵為之仰首思微利於萬里羞成功於一介霣星烏江馬革包柩斬木通道舁歸要荒抑嘗觀今中統以來將相臣死率於其天天下之情稱其平生所為功髙者惜徳大者思不過如是而極然未有若公逢掖死事為世所壯者也嗚呼賢哉又嘗觀古君臣莫難於合莫尤難于君盖合或可伺所欲以中而信則必不可襲取於一時自公始侍潜藩聖皇非遽貴之地亦嘗身接之面訓之指受之親以細㣲觀其敬忽置之糾紛試其理解讋以雷霆察其變常納之汙濁驗其潔白既久而後知遇也十後三十三年之中或使或牧或從或留或相或傳或候王或將凡賞勲勞擾者舊可以勸人臣者公皆與為之至商論臣羣能不於公不曰清則曰剛或曰則欺不見有貶於聖訓用未盡年未耄人猶未足其悲受任於已試知遇於既久可與疇咨海内者將不知誰在也嗚呼悲哉後三年頍彚進遺事求狀公行燧亦荷公知且久遊其門又與頍嘗同受學義不得以不文為讓姑為論次如此牧庵集卷三十欽定四庫全書牧庵集卷三十一元姚燧撰經義地天交泰后以財成天地之遺輔相天地之宜造化之奠位必合兩而成其和聖人之成位必參兩以用其中葢和者致泰之極功中者致和之大本也徒知保合太和而氣化之流行者固所以通乎兩間之天地乃不知允執厥中而道化之運行者實有以位乎一身之天地吾恐道化之中有時而偏則氣化之和亦有時而息矣聖人之宗主是泰豈其然哉且天秉陽而居上確然其體也而氣則下交乎地地秉隂而居下隤然其形也而氣則上交乎天氣化交感絪緼磅礴至和流通在在無間造化之泰何其盛也其必有致此者矣曰有元后焉天地之道或太過也而元后則以此之中而財成之天地之宜有不及也而元后則以此之中而輔相之道化潜通無過不及一中懋建天地不悖聖人之泰不亦溥乎合兩以致化者造化之泰此泰之蟠際也參兩以賛化者聖人之泰此泰之宗主也有聖人以宗主是泰則成位乎上下者無非中而奠位乎上下者無非和矣泰之象云云其意如此嘗謂有致泰之實應有致泰之實感應者其騐感者其本也應者其流感者其源也應者其和感者其中也應者其在天地感者其在聖人也是故天地絪緼萬物化醇隂陽妙合萬物化生天地固以和應矣何應非感天地設位聖人成能皇極茂建雨暘時若聖人固以中感矣何感非應應者非先感者非後天地聖人葢相為因成爾或者昧之徃徃為髙明博厚天地之體也下降上騰天地之氣也體立而氣行交通而旁達則形和氣和而天地之和應矣於聖人奚賴焉吁是未知有感應之實理相為流通者矣天地之化而範圍者聖人也天地化育而參賛者聖人也聖人者擬天地而參諸身以一身而賛化育隂陽闥闢我轉其機寒暑推遷我總其運此精神之感召和氣之流通使之三光全而日月無薄蝕之虞五紀協而風雨無凄苦之變財之成之輔之相之而無過不及之偏何莫非大中之感者亦何莫非太和之應者嗚呼和在天地則天地一聖人之應也中在聖人則聖人一天地之感也要其所應則太和所播上際下蟠無彼此也無間㫁也天地之泰天地之氣化所由通也而位天地育萬物元后之於天地實有功焉太過其財成之不及其輔相以斯中也致斯和也氣化之和即道化之所由騐也原原其所感則大中一建萬物咸覩無偏黨也無反側也聖人之泰聖人之道化所由通也而亶聰明作父母天地之於元后實有賴焉寒暑其教化之日月其順動之以斯和也騐斯中也道化之中即氣化之所由基也然則中和無二致感應無二機在天地者非有餘在聖人者非不足渾渾乎一中和之盛此其所以為泰治之極歟今夫得氣之清穹然而髙天之位固奠於上矣得氣之濁隤然而卑地之位固奠於下矣上下不相紊也而有氣以行焉兩者交合二氣絪緼天稟陽之清而至陽赫赫必下交乎地地秉隂之濁而至隂肅肅必上交乎天其未交也則上下異位交焉則二氣薰蒸而成和其未交也則隂陽異質交焉則二氣流通而成泰交斯和矣和斯泰矣將見協氣嘉生薰為太平時和嵗豐百祥交致天地固和矣而萬物則咸和天地固泰矣而萬物則咸泰甘露降醴泉出溢而為和氣之祥也嘉禾生芝草植鬰而為和氣之應也由此和而推之其徃不窮其施生無方其嘘吸變化無非此和之升降飛揚也不然則和氣一乖天地否矣非大易有取於乾坤交泰之象也然成氣化之泰者在天地而開道化之泰者在聖人聖人者出父乾母坤而藐然中處則成位乎天地矣大生廣生而大寶曰位則成能乎天地矣聰明作元后也而有道以運焉兩儀同流一中不踰隂慘而陽舒天地之道也過則不能和春生而秋斂天地之宜也不及不能和一喜怒有間乎隂陽之慘舒惟皇作極而財成之則無愆陽無伏隂而天地之道所由泰一賞罰有同乎乎秋之生殺惟皇作極而輔相之則無暑雨無祁寒而天地之宜所由泰協斯中矣中斯泰矣將見王道正直蕩蕩平平㑹其有極是行是訓吾之道無非天地之道吾之宜無非天地之宜鼓元氣雷域中天地之豫也即聖人之中也騰百川雨天下天地之解也即聖人之中也由此中而推之其平秋平在寅餞寅賓其在璿璣玉衡無非此中之彌綸曲成也不然則中道不立天地否矣非大易有取於財成輔相之義也大抵有氣化之泰有道化之泰氣化之泰一天地之和也道化之泰一聖人之中也若不相關也而實相因若不相與也而實相為用其殆一道氣之相為貫通者乎何者有道斯有氣降而而氣其在天地則為隂陽之運其在聖人則為中節之和氣統於道其在天地則為隂陽之粹其在聖人則為未發之中天地以氣運則有上下交通之妙氣即道之流行焉耳聖人以道運則有財成輔相之功道氣氣之主宰焉耳融道氣致中和天地大造化也聖人權造化也天地聖人同一中和之泰也使天地徒以氣化之泰奠位乎上下而不有聖人以道化之泰成位乎其中則隂陽失其道寒暑失其宜日月失其經和者流矣其何泰也哉抑嘗考泰之為卦而有疑焉天尊地卑而乾坤以定皇極建中而彞倫以叙今而象泰之卦則有取於乾下而坤上元后之任則有及於天地之道與宜何也葢天地以形言乾坤以氣言天地奠位而乾下坤上者氣也天地之交以氣而交是謂之泰乾坤其父母也元后其宗子也乾坤以氣化而賦形賦色於元后元后其可不存吾順事而財成輔相之以盡其宗子之職哉是知乾下坤上氣化以交而成和矣而乾坤以定則和者未有不中曰道曰宜元后財成輔相之以中矣而彞倫攸叙則中者未有不和此其所以有取於泰之象歟雖然聖人之用中其應在天地其感在民心民心罔中惟爾之中則人和而天時地利無不應矣古之聖人端居乎宥密之中而尸財成輔相之職豈必曰夏則致天地之陽氣而導行之冬則閉藏之歟又豈必曰秋則取天地之隂氣而施用之春則閉止之歟夫乖氣致異和之反也和氣致祥泰之極也禮樂所以合天地之化中和所以致萬物之育吾之於民苟能以禮樂導其中和之教以中和行其左右之道則吾民之中即天地之中也吾民之和即天地之和也聖人象泰以財成輔相之任屬之聖人而必以左右民繼言之厥有㫖矣昔之言泰和者必曰唐虞則唐虞之時地天交泰之時也以言其治則地平天成也以言其道則精一執中也以言其化則黎民於變也中和之應未有盛於此時也然要其所以致中和無非用中於民始之作訛成易有其時析因夷隩有其序六府則孔修三事則允治彼其潜通天地之和黙制造化之機固有左右爾民之治存焉如曰舎斯民而他有所謂財成輔相之事特隂陽固閉之學聾巫瞽史之為堯舜其然乎不然也春秋以來日蝕有書地震有書不雨又有書是何隂陽繆戾如是耶得非治不唐虞世則春秋大中之治不建而太和之治不復乎吁是必有寤寐堯舜於千百載之上而為天地立極為萬世開太平者名字説李綸字説李明之以其子讓來見曰願易名而字之予思古之人生子三月而父名之避其在常語而難為諱者所以為他日為父計也故曲禮曰不以國不以日月不以山川不以隠疾而春秋傳亦曰不以官不以畜牲不以器幣讓也已久矣雖其名無國官日月山川隠疾畜牲器幣之犯而犯舉世人之常語使其子宜如何而諱於今哉亦觀夫治絲乎其緒之弱不大於秋毫之末力引銖錙則紛然而絶苟治而繩之則可以轉百鈞故曰王言如絲其出如綸言綸者比其類而合之也或曰青絲綬亦為綸為訓雖異其組織為服亦垂首千百而比其類為之也反而求之葢人心之善惻隠羞惡辭讓是非四者之端其始甚微其絲之緒乎學者為能體騐擴充之使可以放四海塞兩間其比其類之綸乎邵子曰人於心上起經綸士而知此始可語自治治人之道矣名以綸字曰治夫梁氏三子名説梁宣慰君三子其伯也既名矣由犯先諱求予避之嘗聞誦簡約而嗜静重遲而可久然先民以湛静安舒者戒於後時予懼其流或後事也惟力於果敏斯可正其失質諸字訓有以疾為适者古之人有伯适南宫容亦名适然司馬長卿以慕藺相如趙相國鄧髙密名不避堯禹士而希賢固其志也伯适南容奚避焉故名曰适而字亦不能即其舊又易曰子容焉嗚呼伯适同名南容一字吾固以先賢望子适曷知自勉哉其下二人仲曰迪叔曰述有父兄者迪以蹈之述以繼之無所自遂焉亦孝子悌弟之一事也然古人之名有非徒義意之是擇如伯達伯适仲突仲忽叔夜叔夏季隨季騧必二人相從而諧其韻焉可謂言無所苟出而有章者矣故予於适迪述亦三人諧韻其古之遺意哉迪述未冠不字髙氏諸子名説袁之尚佐洛人髙直夫以予少與其先子游拜於洪都請為其子姪十二人製名為訓長曰統次經績繹緝約維絢紘紱絇絅且字而序之曰家政統於尊其傳者大小宗之子傳必立法法立而家道用成統宜曰元宗經元立績元用然非本學亦烏乎成學則始思思而成輟則怠而不能文又有要焉必由博而趨約固以守之而後徳業積中輝光發越而不可掩譬設色然必先資夫可受之質繹曰元思緝元文約元博維元固絢元質絇之所以華身者莫服若首紘膝紱足絇曰元瞻元粲元履衣之丈備矣又惡其著絅以尚之故絅曰元著其意義相仍皆有徵於書然字者名之副也有是徳則為稱情無之而弗自勉亦非予鄉先生所期於後來者題跋跋雪堂雅集後釋統仁公見示雪堂雅集二帙因最其目序四詩十有九跋一真賛十七送豐州行詩九凡五十篇有一人再三作者去其繁複得二十有七人副樞左山商公諱挺中書則平章張九思右丞馬紹燕公楠左丞楊鎮參政張思立翰林承㫖則麓菴王公諱磐董文用徐琰李謙閻復王構學士則東軒徐公諱世隆李槃王惲集賢學士則苦齋雷君膺周砥宋渤張孔孫趙孟頫御史中丞王博文劉宣吏曹尚書則谷之竒劉好禮郎中張之翰太子賓客宋道提刑使胡祗遹亷訪使崔瑄皆詠歌其所志喜與縉紳遊者求古人之近似惟唐文暢故栁送其行曰晉宋以來桑門上首道林道安慧逺慧休其所與遊謝安石王逸少習鑿齒謝靈運鮑照皆時之選夷考其言有失有得其失者以天官顧少連夏官韓睪之徒為有安石之徳逸少之髙鑿齒之才其不倫何啻相去千百而十一又且近諛其得者文暢亦桑門上首時不相及方以林安逺休夫誰曰不然與以靈運明逺之文自居皆無愧徳斯自唐視晉宋者也自今而視唐獨不可為之比乎栁之頌文暢曰道源生知善根宿植脱棄穢累宣滌凝滯施之仁公亦聲聞稱情而不過者然求如靈澈澄觀重巽浩初元暠文郁希操深濬之流與文暢生同其時若是之多則仁公為獨行而無徒矣又彼少連睪者豈足躅二十有七人之遺塵而求安石逸少鑿齒之徳之髙之才吾亦不能必其當者何人况文乎哉其敢以靈運明逺自居如栁州者葢不知其誰也然此中予未有識四人鎮琰好禮瑄然已皆物故其存者閰季兩承㫖而已可為人物眇然之歎至大庚戌秋八月下弦日跋跋張夢卿所藏紫陽楊先生墨蹟此先婦翁紫陽辭翰也嘗聞自幼孩時文已竒由歌白水滿長於紫陽閣底清風細後遂號紫陽初名煥後由上金季主河朔中興頌季主壯之置紅篋中黄龍戰北紅篋為我元所獲恐蹤跡物色姓名獲戾有避更為奐及後受我太宗簡文制誤奐為英遂不敢私更始就名英其平生於書差喜米南官故筆法時時似之其卒以乙夘時燧已聞公遺命託二事於我光世父一遺文二以先妻見配時燧未婚也其嵗上距今二十四年當至元戊子張總管夢卿持來求題夢卿嗜古博雅該洽之士慮其未得平生之槩故斂襟書此其年二月子婿姚燧觀於穰城寓舎師濓堂跋周君宣仲以師濓名其堂濓溪萬世師也天下師也而况派其宗者哉夫子為我朝正學之祖師夫子取水初源也侯師聖見程先生語未徹徃見夫子語三日自謂如見天之廣大再見程子程子曰是必從濓溪來師濓之功如此夫雖然侯生之言止可隔壁聴程先生終未深與之何也受學之初每思求仲尼顔子樂處既得矣吟風弄月以歸有吾與㸃也之意嗚呼是真師濓者乎故師濓者當如程子寶祐五年夏閏之晦姚燧書書觀臺劉氏嘉蓮卷後徃年燧在翰林使有持憲節干山之南曰馬公煦者馳書來言吾邢之觀臺劉氏所自出先夫人之兄軌字子範蕃字子榮皆金文臣其官所止舅範京兆轉運判官榮汶上令方範決科之年池蓮一茄數花十三亦祥之不世有者雖見之夷堅續志而略願持筆之時以史事己修而未之進也無遑致思今年以𦵏告還郢郢適公所督刺郡再書促之乃求續志以較謂範易轉運為按察又不載榮登第嗚呼志所傳聞不若其甥之可信惟十三花者為同因思草木之祥或以二而合或由一而分二焉而已耳甘泉之芝九莖同葉河中之木殘本連理此以二而合者也漁陽之麥兩岐李翕之禾九穗此由一而分者也然未若是十有三花之分之多豈天鍾祥不以言喻惟假草木得氣之先者異其花實而示人耶其既應範榮一世而遂冺冺己耶無亦猶有遺嗣蒙其未斬之澤也然是氣也所以父母萬物者也和之盛或溢而旁暢他達如人子於其父母貌必有一肖也何也隨其氣之盛者也夫天鍾祥於劉如是同不專範榮兄弟之身亦必及先夫人移其盛於所家者理容有也故公兄弟蟬嫣簮紱列居臺閣他曰載勲旂常勒銘景鐘未可知也夫然後可當宅相十三花之祥跋西溪珍翰中執法之書計今在人間者無慮數萬番而諸賢獨感泣此軸者由張君式者不忘知與求評賞之也嗚呼古之人所重乎門生故吏者豈不以是夫使其遺嗣人人持是手澤求光前烈其為先友者操筆之情又何如也至元蒼龍壬辰暮春姚燧跋書米元暉畫山水米敷文之畫全法其父山水樹石不事工細多以雲烟映帶只喜作横掛長不三尺自題曰墨戲今此獨雙幅鉅軸豈當時奉詔與米敦儒輩對畫禁中者耶真曠代希有物也張肖齋夢卿以至元戊子夏四十千購得之姚燧寓目焉為識末幅銘簡儀銘舊儀昆侖六合包外經緯縱横天常斜帶三辰内旋黄赤道交其中四游俯仰鈞簫凡今改為皆析而異取其案元文類作由能疏明無室於眎四游兩軸二極是當南軸下貫赤道天常案此二句元文類作南軸攸沓下乃天常天常不搖則乾安静案此二句元文類作惟北敧傾取軸榘應上鏤案元文類作鏤以百刻及時初正赤道上載周列經星三百六十五度竒贏紫微安加北極攸戴穹然哭出狀同倚葢别置立運下履平地錯勒于隅十二子名五環挈周文有八尺紫微等之三旋在一六環之安三負衡旋衡綴闚距隨捩流遷案紫微以下十六句元文類止八句其文曰地平安加立運所履錯勒于隅若十二子五環三旋四衡絜馬雨綴闚距隨捩留遷欲知出地究兹立運去極幾何即游是問赤道重衡四弦末案中州文表作牙張上弦案元文類作結北軸移影相望筴案元文類作測日用一推星兼二定距入宿兩侯齊眎巍巍其髙漠漠其遙蕩蕩其大赫赫其昭孰曰無形而兼頥考案此二句元文類作步仞之間肆所頥考明乎制器運掌有道法簡而中用密不窮厯較古陳未與侔工猗歟皇元發帝之藴畀厥羲和萬世其訓釡儀銘案釡元文類作仰不可體形莫天大也無競維人仰釡載也六尺為深廣自倍也兼深廣倍挈釡兑也環鑿為沼準以溉也案此二句元丈類作振溉不洩潦以澮也辨方正位日子卦也衡縮度中平斜再案元文類作載也斜起南極平釡鐓也小大必周入地畫也始周寖㫁寖極外也極入地深四十太也北九十一赤道齘也列刻五十六時配也衡竿加卦巽坤内也以負縮竿子午對也首旋機板案此句元文類作末旋機杖窽納芥也上下懸直與鐓㑹也視日漏光何度在也暘谷朝賓夕餞昧也寒暑發斂騐進退也薄蝕終起鑒生殺也以避赫曦奪目害也南北之偏亦可槩也極淺十七林邑介也黄道夏髙人所戴也夏永冬短猶小差也深五十竒鐵勒塞也黄道寖平冬晝晦也夏則不暮永短最也案元文類林邑介也下即接深五二句竒作二黄道夏髙作淺赤道髙戴作載夏永冬短作夏短冬永小作少黄道寖平作深故赤平暮作沒安渾宣夜昕穹葢也六天之書言殊話也案四句元文類止作二句曰二天之書曰渾葢也一儀之揆孰善悖也案之元文類作即孰善作何不以指為告無煩喙也闇資以明疑者沛也智者是之膠者怪也古今案元丈類作過者巧厯不億輩也非讓不為思不逮也將闚天眹造物愛也其有俟然昭聖代也泰山礪兮河如帶也黄金不磨悠久賴也鬼神禁訶勿銘案元丈類作庶勿壊也太史院靈臺鐘銘靈臺設􅒶嵬以尊元間大吕非其晜摰曠善鼓手自煩官商良諧等釡盆請勿以以聲以功論一日之中兩昕昬二十四鳴有度存九圍一圃折栁樊黔首時作時饔飱日月如是相告敦三辰聴命循軌垣四序不忒迭寒暄萬物生翕盈乾坤何獨治厯遉此源凝熙帝績髙羲軒積世而運㑹而元吉金之舌慎莫捫輟響誰其代天言大朝元宫鐘銘吾聞儲祥千石之鐘離世蕩訌不脛而趨朝兀之宫器碩而聲洪震百里而干層穹千柱之下侯叟侯童萬指攸藂旦旭而昬蒙其出其作其偃其饛必告而使之齊同尚其微功從可卜斯道之汙隆方昔汙也金函索索以灰滅故噎希聲而為聾及其隆也玉書幡幡而天出則播大音而為聰矧善藏用乎中不擇棄人皂𨽻王公手以問之喙應無窮如槖之鼓風我書魚蟲畀之鏤工期萬斯年與之宫兮相終宣慰都司郭君實持眉歙研相壽僕以端研報之渠後遺姬令伯陽端為州濱海浦孕竒石研資取雖器也視為主彼其子腹枵窶求一辭瘖不吐第塵棄瓦甓伍中道歸伯陽父遷喬木鶯其羽之賢胷蟠三五出言章氣風雨述聖哲誅姦窳其為價琮琛琥資山石非逺腐後視今後猶古讀吾銘孰敢侮劉無競歙石研銘黟歙之産石則實黄金為聲蒼璧質徳先如是疇可匹無競惟人士之吉銘以發幽友燧述贊無名人真贊古之遺直今見髣髴何其百年凛有生意緬懐用世愈益可畏宜使羣公笑言寛味烜赫大名其所被衣世百年千其有可既也耶太傅楚公像贊盈常之躬碩大而豐氣肅而神充自非降嵩與三光之鍾豈能生上材之偉雄牧庵集卷三十一欽定四庫全書牧庵集卷三十三元姚燧撰賦烏木杖賦去年史仲威得烏木杖大經尺髙可過顙嘗析一杖遺余許為賦報之其秋仲威疾歴三時未勿藥也今年余生朝使人肩木之半相夀且促曰吾疾於以嬰綿者豈思不償賦致耶不佞誠得一誦其辭或可釋杖而起矣余動其言而賦曰或曰炎海之山珍木産焉金為之聲石與其堅魋結伐荷投諸瀧淵依居蛟蜃潄沫濡坎嵗月俟之化而為𤣥要出人為非得自天此島夷假以售利於中土之微權也抑齋聞而笑之曰昔賈鬻鞭梔蠟其膚市者一濯已呈倉枯胥是黝材裏表一如從可占知廼受形其本初者也胡子以由彼而然乎今夫中土之山有衆其植斧取觀之内各異色樟作稠文杜棗栵赤檀柏柘黄蒲檭棫白與爾高里遐裔絶域瀘嶲杉紫儋黎沉褐罽賓雞舌相半白黑一隅斯舉三可反頤敷度品之爛爛果熟深淺濃淡萬不齊同令人感之欣心悦瞳問誰為之能然皆著妙於化工夫其見諸荷葉之外者如此又何惑理質於其中㦲且水火之赤黑不一其色者雖童子猶能知之至語其相賊而為用有戴白之老所未思維勇能知之至語其相賊而為用有戴白之老所未思維男丁之婦壬實雄黑而赤雌始若離而難馭終為夫之所移今其色之幽幽廼昔赤之由基是何資於逺臂只煬竈亦可闚彼炎絶而烈者熖也其烟液為煤必黔而緇因以曉夫巧繪之棄鉛朱亦懼其既乆漫漶而為黟又以信道書坎盛之侵離也不然南服之􅀈祝融之宅也敵金石而焦流蓋火熾之已極非盛其水以滅之則物將不能以生活故伊人之睟面不渥赭而深黑亦火色索藏惟獨見夫水而已矣其木理之如漆者又足惑乎哉史鰌之孫其畏可象析而杖之奔走相餉輟矛廬於猛士配几屨於席上試扶衰以其䇿觸𤓰甲而鏗響以卷鐵而含簧陋栁侯之為匠必求同於所異纔黑蛇之彿彷噫物之變化不可期兮猶足以乗雷而騰往也五言古詩寄王憲使立夫庭樹生秋風炎熾奪如失小蟲鳴喓喓髙隼飛鴥􅀈緬懐素心人若髮未忘擲百年能㡬見過眼徂電疾而君有官事出言千里律何暇喜蛩音情與逃空一昨因趙卿至戒遣書新述篇軸不害多無憚費紙筆且約來此州罇酒留十日晴天逼佳夕共看華月出非不思餘論門無一新即吾私如汲車已脱復榮繘晚菘生待種早稻行可銍少湏黄花發秋風亦蕭瑟倒冠獨山巔兹遊或能必次韻閻子濟二首我友宋僉憲頗風思湘中每云所遇奇未易言説窮崇蘭春風花巖桂秋露叢三年一官内身在香國東朝航汨羅波翻動海日紅暮揖嶽麓寺蒼烟樓觀霳喧喧名都邑百貨聚商工何時訪君遊盡歴西南雄霜水收風濤江船穏歸路惟應江間月照汝來往屡長沙隔南雲尚飽艱險􅃐天涯念棊錯暌闊皆舊故新知苟㑹心何必歡有素黄鍾未懸業衆目齊瓦缶大音故希聲欲説難至户况我言毛輶誰復聴其句所恃君盛年學仕猶未暮丈夫重道義自足輕外鶩觀今紛華儔愠喜隨一茅愿終藏山書榮於鹿鳴賦寄徐中丞容齋李侯安慶來遭君江間柂問云歸湍水示聲偶及我自揆哀鈍質舊學日兼墮百事於大賢資取無一頗始疑逢䝉弓亦有虚發笴終知匠石材斧不捐瑣瑣増慚失喜餘覺得觀藻火况聞閑世故盤走夜光顆仰止親友間屡得觀藻火况閑世故以盤走夜光顆仰止髙山思願並餘子夥歴推天日行蟻右風輪左吾徒不相值其故正此坐何時廣陵遊傾葢愿終果寄岳教吳忠畝我友右轄公人物慎臧否獨于甌閩士推心一忠畝勝國已太傳椽筆入其手用之敵千將可㫁姦窳首一軓名始北上徹宸纊黈蒲車嘗及門竟以疾自守不使橋門觀執醬餽黄耉余聞敢藐視日月藏心乆秋風歸天岳有綰州學綬堆盤青青橘求薦傾葢酒何人天壤間亦數牛馬走問知為髙賢重壓丘山負行年滿卦數不見顔狀叟翻比少九齡衰悴先衰栁只看形諸外已卜内所有如何辭萬鍾反就禄升斗無乃仁人心終結一善誘非有金鏞徳安應小大叩且温右轄語通誦或盈口因知人有媒言出隨好誘豈但資娶妻亦賴用擇友不期一日中三接杖履後甚欲進所業一嘗恐輒嘔至今貧賈肆深櫝千金帚溮泉聞悉心亦誤見私厚諷讀登阿篇明璣照軒牖其稱媚天子例必登拜受鄙言何足道魚目辱兼取敢不先木桃旋期報瓊玖挽孟商州元亨六里商於山而子往倅之人嘗隘其色霜蹄跼權奇所欣多曠暇得以放瓊辭城闉四皓墳下有餘紫芝長吟薄采采薦以松醪巵娛樂豈不仙久此夀奚疑如何奪善地調降華判卑方聞有力儔揚譽於雲逵佳城鬰厚夜白日見無期因傷先待制抱業既未施積燾冝及躬年位亦如斯覧古事每爾為昌來者基秦藩官聨曹生别且長思雖余後聞訃宿草寧不悲春水清漣漪營魄今何為挽甥壻趙商來扣門袖出史侯書開緘愴惻知汝已𤣥是閭是侯太尉子兩嘗妹壻汝汝視則婦翁見訃語豈虚有疑讀反覆不見日月初汝昔似猶子嗣業文貞餘文貞今留侯乏世理可嘘吾甥顔蕣豔令譽由閨居及婦劉氏門帨紛結華裾其姑况難事厲色嵗一舒前來已子生在亡未知渠兹焉抱􅑏嫠茹苦何日除南州穰侯國臨湍上髙虚東望酹一觴老涙血漣如呼魂逺致否已矣何言歟京師病中六首埏土以為桮小大不異形尺箠以叩之千百不同聲耳去囙能㡬同異乃爾争二物于吾身受形與俱生云何一易地聞見皆聾盲况于六合間擾擾羣黎行妍醜既殊狀賢徳豈齊情區區豈門交心曲安可明膴仕初足華終竟外侮嬰人云禦之䇿惟有要歸耕古人不若意得酒以自歡而我不能飲安敵憂患干卧病两月周日夜防庳殘神州桂玉地富室居猶難三千里外身驅率就一官吹灰終不然豈但枳棘寒囊空到稱假豈能乆盤桓又顧穰城家新立四璧單小兒雖善步神骨尚未完吾家三族中慰意獨此看思之腸九廻何以生羽輪少年厭治生但慕官爵好騎馬雜高葢奔走長安道雖有良田園廢没但蕪草及為荆楚憲盡室辭豐鎬登山復涉水往費尤浩浩黄金火消氷質賣無一保豈無升斗入喪失兵山倒滄海去悠悠白日行杲杲朱顔化顦顇素髪辭蓬葆今年四十九知非殊不早稔嚼世味薄滿口木膚槁入云豐城後接武瀛州鳥安知走朱門惟去是求禱朝允暮載途南土甘投老買完亦已得求田不多寶此邦衣食易宜稻及桑棗時節勞農苦對酒槃一考與汝車上妻從人喚翁媪束髪慕𤣥理佩服三皇篇千周粲可覩不受天老傳得此西南朋飛龍亦潛淵神哉中夜氣使我沉疴痊如何負道徳亹亹區中縁誓將脱塵鞅庻永桑榆年寒風振虚幌蘭膏淡無姿披衣復撫枕傾耳候晨雞夙昔不成夢撫然嘆吾衰盛年苟無聞光景忽若馳欲為流水吟朱絃為誰揮恥從季主卜將與陵陽期古來方術士越人與長桑採芝鍊五台繋肘皆神方伊余抱微病湯液已徧嘗斯人不可見反側心煩傷倐悟養生理静極神明康致物以却老嗤此竟渺茫平章亷公挽章嗚呼平章公懿質天所性氣鍾三光粹量包九澤净加以資閣學寸晷如與競不有斯人徒孰佐天子聖山立當軒陛侃侃言議正蒐賢及耕釣巖藪沾幣聘十年泰階平四海弓不㯳奇才􅃹簫疋餘子非季孟事隨乃來毁輦轂奉朝請名園平泉比若石不可性門前施行馬外物軒冕盛相過盡慈伯聞至倒屣迎清風佳月夕劇談雜觴咏絶口温室樹肯干蘭省政屢典千金裘好客逺慕鄭焉如靈䑓上憂世常炳炳天下尚可為惜哉司馬病何期龍蛇嵗夀僅滿知命憶昨訃下初逺近聲涙併胡夭陋巷仁反福東陵獷巫陽不可作百載生不更豈其黔嬴遊黙運元化柄其栖景星鳳出為斯世慶將遂為明神山川主雩榮蒼蒼髙在上此理幽莫鏡優孟效叔敖猷足楚人敬况公自有子毓徳宜爾令不見提刑君氣岸殊毫勁秋風鷹隼厲肝膽裂裊獍他日霜瀾平動業未可竟一門周司徒竹帛看輝映時苗留犢圖君子中庸貴不行專怪高嘗讀禆官書抵掌嗤時苗生犢當去縣還汝故主牢得妾以其子冝往何所㽞理在不可推如瑟柱傅膠畫師㫁章耳意取警貪饕貌為盈尺軸丹青爛生綃二十餘七人妍醜兼耆髦目既殊盻睞手亦異持操或戴爐炷香或捧巵薦醪或擁扳㐲揖或撫手逍遥或結領竚思或左顧有求或岸巾爪額或拳拱倭腰或賞彈指嗟或戚反䄃號或向緇黄列致辭前不休或含春風姿鬢髪雲為翹仍攜兩童女芳年未蘭苕婆婆輟緝麻倚巾顔弗妖或荷槖鞭犢或弛擔挾輈可傷轅下牸滿脰黄鍾牟忍割䑛子愛如彪念楊修凡此舉隅耳曲折態豈周名不著為誰代可必前朝位置内供奉無乃王雲曹憶與三害圖髙下不相超所恨百里侯骨相尋常流不見操介介盎睟容昭昭以是方古作如武羞箭韶余評法魯史功罪不少饒詩拾畫記唾僵走追韓豪已架屋下屋他日從人嘲萑葦嘆瀕江不可禾嵗惟蒹葦茁青林無端俔永與江水匹由為薪蒸恃責以租賦出國人誠貪天苞苴黄金鎰暮夜鑚權倖入牒妻子質輸課或未償没之良不恤他家豈辦為得者皆富室秋風霜霰落百穀時已實處處傭干夫豚酒健力銍稇載向城市官外私羡溢遺滯狼籍陳入者必見叱或因取束藴隨以盜采律春風將新萌剪伐未十七下䇿付一炬災火赤天日坐視煨燼空不丐氏貧疾因推是為心可見無仁術周官行虞禁為法未爾疾亦已開利源千年誰能窒舟中落梅折梅天門山含白未舒蕚東風登艫去一笑破􅋃酌嗟汝如佳人賦命所向薄縱抜榛營蒙還持媚蓬弱方彞縮頸脰借潤江以勺固乏水月奇復避霜雪虐曉芳惟衣襲夜影燈與約相攜千里行十日春有脚開敷既爛漫理亦冝飃落正愁鄰穡姝横玉裂纎弱遥應故山樹縞袂已寂寞紛然委泥塵無此藉茵幕却有和羮湏勞求到巖壑幸否相倚㐲世事安可度益感先民言貴賤隨所託書懐二首南州仲冬月天氣如春暄旅貧無衣褐差使卒嵗温矧又稻麥價倍屣賤都門不待付千錢翠濤㶑盈罇瀏瀏水泮氷舉網嘗鯉繁蔬茹不塩酢旋結青青園謀腹易為飽足頥道義尊地偏席門外時有駐髙軒華簮惠以句欣賞難具言已可慰離索適我從弟晜五馬近守格思往三日暾考槃在兹録吾駕無回轅麴生素狂士濡首相禍責誓言逺絶之麴生愠見色前陳君處世簮笏已雞筋貧賤交熊薄獨我時在側既通知舊好亦復文章力衰顔借渥丹愁壘助攻墨論功尤小小况有大此徳君看無何鄉與彼華胥國百年㤀樟夭萬事齊失得是邦去人間奚趐路千億非我導之往君安有羽異不知何所負而乃見猜愎君誠中道棄以無他人迹聞之始自由前語吾其食愿終平生歡相對怡朝夕送朱教授野翁赴都下江東窮秋月風露已凄清侯蠱息沸響朔鴻喧哀鳴壯哉騶人子裏糧事北行都門于兹時飛雪九衢平市求一􅈢腋委擲黄金輕廣文先冷官未愁與寒争况恃身上衣手線留縱横不湞更挾纊襲可春暉生但愁觀國光牛後羞羣英長安足故舊朱輪照華英蒐才佐昭代不遺一藝名譬彼求玉人路無棄連城夙料身未至薦剡有飛聲藉此一簣基旋觀臺九成相摰或見問為言親􅒱榜晨夕几間書從促衡石程無庸移文至始反北山料題姚嗣輝南榿堂彼榿有土性生植惟峩岷欒欒干雲姿才與樗㪚鄰匠石過不睨煬夫取蒸薪所貴故山樹寧知世莫珍一别十畝陰清溪俄㡬春華名堂楣上如對故鄉親請事小弁詩桑梓亦惟寅盛徳古自卑木惡何闗人不見樗里疾智衣終相秦君才負棟柱未許溝㫁均無以榿自期上孤明堂晨送梁貢父尚書使安南詩并引貢父吏部交予最宻以年偶先嘗兄之較其逸兄絶塵予輩皆瞠目乎後今使絶域賦長韻以送之茫茫今皇輿歴古彊理褊溟海無波洪喬岳絶巘萬方方争率職象胥不能件如何南交宅琛貢走藩衍中塗俄負固至爾勞率遣崛强尚于争為職無已淺聖量終含𢎞恐彼宗社殄前迷許新之未忍再禽獮新閲庭臣中誰可銜命選曰汝曹吏書是境嘗入踐更往喻斯㫖首鼠疑必免君聞拜詔臣技等鷹犬惟所縱使之以綿力猶思勉仍命百僚右相率華飲餞鞭馬辭神州遭我乎漢沔鼓榜壯于役未兒暇女泫以聞陳王氏學以䆒墳典欠物知慕華舉格已解辮因失事大禮無媒自求戬君至敷利害亹亹專對害正如沈如人發藥得和扁必感丹扆衷偕來覲旒冕白雉隨以入黄屋亦席卷何減陸太中儒生服鄒兖璽書入南越坐屈尉佗辯但之槖中装歸路千金輦功成貌麟閣行帛日星顯多少前便儔垂頭視人靦雲東樓君家雲東樓未暢昔所題問言雲之東下有吾東溪翩翩多諸黄玉槊華簮齊無因我其舍屡容躡丹梯于時十月半風雨號䨇凄八荒同一雲豈辨東所倪平生東至地愈望溪愈迷但爱樓中兒鴻序參差低大兒行酒觴小兒盤粟齋婉孌膚玉雪嶢嶢頭揷犀門楣已可占奚由墜塗泥且歡盡今夕明日當分携歸舟何所逐逐泛並鳬鷖雲東樓中林竹裏䨇鴉啼雲東樓下花移芳滿城畦雨皆思君物凝望雲東悽每壮高意氣門馬常滿蹄誦我雲東詩囬首還雲西田氏樂門堂憂樂惟聖人萬古無小蔽所樂乃樂天其憂在憂世不悖可並行譬彼巫醫藝巫云疾當元無日中野瘞為子猶拜醫懇悃求投劑巫者由命言醫則以義制萬事天人雜略不相鑿枘後人昧樂天顧託門永誓揆道良不可忘君自為計一塗或庻㡬奔競差可礪田候非楚産今卜宅三澨良駟滿千蹄連阡未稻翳考槃願止此暇食誰之惠豈惟憂世忘其樂亦已細南風随華教堂扁託書𨽻已有雪崖筆妍壮安敢儷翻思漢諸田實出重華裔吾姚源為汭循本皆同系平生未傾盖深言應速戾要為兄弟警慎莫輕裂眥作詩至元年十月戊子嵗題肖齋覆瓿藳至元戊子十月上澣余啜茗肖齋偶見覆瓿藳漫不知何人之詩質諸夣卿始得為渠作持下帙歸再日反復䆒觀古意踈暢洞逹近體清㧞竒警有作者風實足起余為次首章岳祠韻以見推服之私其詞曰將種張用道六籍窮軻丘矧於前人光克對實無差清名海嶽著亷潔氷露修惜也藴未伸封猶千户候興移登石廩萬象供𠖇接東睞扶桑波北瞰洞庭流一杯英皇弔為洗蒼梧憂重華老南征其故難詢諏復思靈均降攝提貞孟陬真堪書出咄已矣賦休休至元辛卯再過呉城王祠師雲谷示東坡所藏石砮留詩贈之别來四周星髙爾䨇鬢縁且秢氣彌厲能新火餘屋因知道氣深舉羸當時屈我髪已霜草衰薄不禁沐豈但形容然志亦忘石鏃今年雨何甚湖漲冬未伏白浪如銀山行舟避騰蹙倚欄乘雲閣聊以寓歸目非君誰能來寛此氷炭腹夕佳亭甲午冬十月洪都雨潺三旬乃一霽羈思忽若刪驅馬柴君居灾兀㧞市闤炎州清霜晚林葉恰半殷已有有朱茶花照耀菊斑斑亭依湖束岸坐對江西山西山兩舍外如立歩軔間鮮鮮沐濯餘翠葆萬煙鬟夕陽借佳景盡發天所慳只知柴桑翁芳躅人無攀馬知此凝睇亦與飛鳥逺主人退自公時得兼爾間明朝駕君去依稀動心顔呉君澹軒以大徳甲辰冬自潭移録道教於洪示内相踈齊前為潭憲曰贈别之什燧賦䟦之誤書澹軒為鶴臞亦道流善詩者還欲余改改書以無暇并前書失之而來求數數不置為别賦此詩僊石崖殞繼作惟澹軒嘗示余三藁披閲再朝昏盡卷長太息造語清而數豈於三百篇口吟瓶水翻非然學猶龍寄身道紀尊理洞萬物母氣完中夜存所以兼儒能由心徴其原洪都一傾盖以受儀恭温旋出踈齊叟湘東贈行言寶唾楚臣拾貽皆荃蓀既為大夫譽月旦窮疵論因羡靈奇賦偏爾鍾斯門閒閒隔神州聫璧難弟晜何時聚伯仲貫如吹篪壎當今載賡輩噤舌無庸捫題趙平江今清溪昔我行簡池齒經戰伐蕭條煙火稀路紆豺豺虎窟是時霜火後黄葉隕林樾彌望皆青山巖岫髙元兀下有清溪流未審何源發濺濺寒碧響爽欲徹毛骨朝潄巫峽雲夜泛峨眉月主人已避地何所猶奔突安知即今君膴仕方呉越且恐清溪名寂人不曰身縱縱不果歸取名自表揭而我豈善文詠詩慚求謁知君桑梓志未忘西車軏何時真脂韋一弔故城闕還訪清溪水獨喜存不沒但慮彼淪漪反不識華髪開樽磐石上坐歗遺簮笏莫使猿鶴儔相嗔涴塵韈落照落照在東璧倒影西墻紅我身恍自失如坐虹蜺中問誰為此㓜無乃由天公故出新巧竒欲試詩律工彼哉誠善戱拙技恐昜窮斯須忽變㓕寒雲翳蒼穹右丞索賦復有此作南地秋冬際五月無雲陰上帝遣心膂用汝作傅霖新苗飽新澤布地勝布金吾民未乘髙示爾風雲侵世事祗如此憂樂長相尋皇天老眼在一如父母臨人心惟順受天意良自斟助爾耕墾力實我豐穰心無非聖所共戴君恩深和溮泉二詩老成稀何如月數螢爝一粲見典刑誠想優孟孟謔三年東呉走望敬縫掖綽歸塗得失夫欲灌四鄰瀹餘事乃文字嘘動如囊籥愈出愈益竒險韻安足縛又凛如干將脱鞘爛霜鍔勿云乏鏤氷㓕迹郢斤堊問渠筆何力砥柱幹不弱可方騶雕龍不下韓逐鰐僕僕雖亟拜未酬嘉意酢由兹一厭飫噎噦屠門嚼自許宜何施庻㡬晨門拆遽以安石輩月旦無太錯視君千仭鳯巧弋避繒􅗤何時鳴朝陽免䀨鵂鶹虐夀人百年耳過眼犇電灼難聚真搏沙昜㪚劇飄蘀相逢一觴詠豈不賢棊博由淵爾何人願學言志各草木凡根荄託土乃恒性獨暢弔蘭生無籍地氣應懸叢危簷上朽索以為命青青雖弱質不挫霜雪勁敷花况妍好妝陋桃李靚依依光風汛皜皜華月暎香疑非人間恍若來空逈詩枤其下清芬誰汝競兒女女奚自攀安辱寶釵並但愁姑射僊綽約玉顔頸一朝秉龍過袖去逐無逕我來昌邑山豪欲分廟令必云付杯珓與奪神所柄不如且止之俟旋滄江艇殷勤先杯酒隨以竒貨聘歸託石城人管且化工盛楊補之墨梅原註肖齋家藏古之賢逹士名託技以傳由來含來人不及縑楮年雖求異世知存一遺百千偉也清富君縁髪金印懸脱落貴介習博雅嗜竒偏鉅唐鄴候架寶晉滄江船墨梅取無咎軸首珠犀填使有透綉詩詎讓花光前䖏堂清風夕斂襟泛爐煙對此氷雪姿若失炎燠然令人起幽思枚屡西湖泉武昌寄劉時中思君誦君詩賢於對君顔昔也坐我側守口如閉闗今兹言盡懐翻宜隔湖山文章靈奇氣賦與天所慳古人遊已遥古風力孤攀及肩曹劉壘窺奥長信班不取為貧仕傷和霣濽仲尼且委吏重耳嘗險艱犬夫夫無不為大弨况能彎入于無眼箭安識邕客彎歸來弄縁綺九霄鳴佩環挾是文武資未憂身恫瘝大路横至寶誰不收裏還報章因南鴻滅影秋色間轉令感白髪羈思無由刪過開先寺天人喜遊戱試劒當層蠻截落萬丈崖㵼出千丈湍隠如白瓊瓊藴此青琅玕仰睐轉飛動有物相控搏㪚空摩尼珠受以頗黎盤龍公曰夜汲暘旱不敢乾纔足供騷人萬古詭異觀我來過中嵗素髪紛垂冠窮源厯絶戱自懼身不完但能至其麓䕃翳松欒欒嘉與萬上人枵然坐蒼磐揮杯吸㣲夜已足當朝餐明發入黄塵復爾俗務干未期江山㑹石城清夣寒過大孤山左山如騰龍右山如伏獫約束彭蠡湖秋夏傍泛㶑我行正窮臘豪浪殊未歉危穡蒲㠶舞日出風力贍大孤水中央千尺入驚覘何人揷雲根上兩餘折劔留示爾後人萬古㫁鼇驗至今鋒鍔赤酒带膏血染昔當南北裂夣寐嘗在念一朝獲身厯償盡平生欠山靈必知詩投畀未為僣小孤山彭磯擁千山布陣如劉沛小孤乃窮羽獨戰氣彌倍灔澦僕命之砥柱非其對層顛摩晴穹雲木摇斾斾大江中貫流萬頃納一嘬東溟供朝夕日夜至一再去㠶天馬奔囬首蒼靄外已愁風蠲還進尺亦尋退不及躡􅀈岏一覧淮甸槩牧庵集卷三十二欽定四庫全書牧庵集卷三十三元姚燧撰七言古詩題甘河遇仙宫并引李天樂真人自余去年客秦日求賦甘河遇仙宫其地盖重陽真君遇異人酌甘水為酒相酢之所由是名甘而不知甘即夏帝啓與有扈戰此今其縣猶曰鄠其名舊矣天樂託石子玉遣其弟子自秦入鄧千里求詩為之詠此鄠即古扈字也終南下甘河水我絜瓶嘗作泉比如何仙翁酌飲人一唾世上無醪醴是何濡軌不成川北流赴渭朝宗然東海相絶㡬千里餘波開此黄金蓮河之源委且不見味更幽渺人豈辨詩翁乗雲能再來醉擲餘盃須一吮題西鄰王景韓茅亭次韻朝陽洞深纔尋丈欠身舉手已捫上誰識中有盤谷客黜陟不聞時得喪夸夫鐵甲薄于顋有手不解持螯盃時許雪曉穿蠟屐踏破瓊瑶來看梅人家買宅得鄰㡬墻東避世渠妄比可憐過愛醉後書未見來禽與青李猶嫌洞逺如隔波茅亭别構髙客駝兩僮日聞語音熟呼門不復相誰何題張肖齋所藏雙鶉圗日躔鶉首在天未午為鶉火已鶉尾十有二次分四方彼鶉居南獨三次是鳥尾短不復軀翼花斑斑鷓鴣如首雖善鬭易馴狎握粟已逐兒童呼豈無鸞鳯為月紀未必星翁曉何以冩生亦箋爾雅徒耗墨晴窗費縑紙天寒江非烟如雲車馬輸充鼎俎珍今日此邦惟罕汝畫師應不是穰人謝馬希聲甆香鼎吳侯建盌侔紫鐵表裏㕙毫瑩鋪雪每愁射日動精采倒㬌過目晴電掣人云煮茗何足道黄金百鍊終不裂惠然持餉耽詩兄供啜幽齋真一絶馬家處鼎同青瑤左右梁耳圓索綯預憂凝塵助脆滑失聲脱腕春冰抛我思焚香固其物丹砂九轉疑可燒何當去求善畫史取並清玩誰相髙盛荷不慳随所欲攜歸僮輩笑偃伏白頭主人好惡異乃寳瓦磔賤金玉前年禁林辭千鍾今乃貪此盈一匊但知焚香煮茗趣亦念饑僮隠雷腹先生一笑呼來前吾意汝豈知其然出門仕徑方爾率陽在隂中陽逆旅人來正可飲醇酒孔方交絶今㡬年聊将二物代飽徳試問孰與空歸賢適有江南墨光紙一掃新詩三百字為余走送藝聖軒足與渠濃作囘施趙温甫自汴託人求詩傳君家今汴水在博雅外無他嗜愛牙籖架揷鄴侯書玉軸壁藏永存盡伊人何状不及知與世異尚有此竒楮縑且寶况彞鼎勃磎一室應累累我於朽銅如二豎百藥膏盲攻不去劇青拂紫可瘠饑每被人嘲友康匏白頭留滯周南村怫鬰襟期無與論天寒塵生筆水硯日暮雪落蒼山樽㡬時月明虹貫夜相遭傾續千金價定将餘有易所無莫畏先聲避三舍爰裔堂牡丹宣相家牡丹雖多然止三種玉板白葉底紫淺紅惟二十一日最研盛邵子所謂看花須及未開時今已凋落矣録呈時中繋􅀈盡室遊長沙假舘適許鄰宣衙千紅萬紫紛爛漫獨餘牡丹纔蘗芽苦遭夾旬風雨惡手自揷架扶横斜天香國艶付寂寞已分抱恨歸舟拏今晨青陽劃研暖一日盡開三䦨花左䦨後䦨鬭鉛華綽約仙臉粲朝霞重趺單萼異肥瘠玉環飛燕無敢瑕西闌兩株玉板白虢姨色羞脂粉加中叢昭容垂紫袖朝儀雙引肩相肩非縁門前行馬設已有遊女填闉闍我昔縁髪洛浦涯繡韉慣逐遺簮車老來自信此夢絶何意猶眩東皇奢夜䦨秉燭清味薄晝短常畏啼棲鴉學詩未知正而葩學書劣能綰秋蛇酬春烏可不一醉二豪笑口人誰逼明朝芳蹊縱百遶彩雲墜何及嗟坐無徐黄冩冩生手不拂東絹圗還家大農椽樂子英求詩吾友秋澗兼髙廬詩稱子英發菆塗履霜兩楹草已宿顔色不少平生殊先軫歸元如生面處父死敵固堪羡慙徳參乎啓手足淵冰要見兢兢戰卒絶欒盈遙遙孫傳芳簮居終懿門尚期千古骨不腐血肉未敗何須論三君将成孝子志皆借毛頴傳其事泉臺長卧誠有知洛誦雄篇凜生意張肖齋蠟梅為黄雀啄食余家牡丹芽為浴鷄所壊趙家堂前蠟梅樹叢枝已綴薔薇露醉歸紅袖折簮㡌似與華髪慰遲暮遙應此日開更妍萬斛清香撲軒戸欲破已為黄簷角寂寞春風殊未覺君云落英地如蠟欲破已為黄雀啄可憐終是主人仁不把金九散飛雹我庭秋培牡丹芽屢灌期以開嵗花曽覆一簣䕶霜雪忽遭鷄浴騰塵沙翠枚紫荔蕩無有枯枿齊試快莫耶翰音無知無可垢汝口平日差牛後豈無糞土振蚤蟲非有黍粟充饑脰投畀湯火諒不難議功姑以能鳴宥梅花啄殘開疎遲牡丹今同抱蔓歸静求二蟲相惱故無乃㝠有教使之坐因吾儕對花飲歌舞不避傍人嗤不如無花無酒過嘲謔狂詩為誰作果如造物意在爾玉汝於人私㡬大墨卿明白莫司箴只取二蟲圗置坐次齊彦提刑和余肖齋蠟梅詩韻聞辭湘中巖桂樹盡㦸凝香正風露此時清趣肝膈横遙應半嵗猶朝暮移節南陽但茅屋低雜邑人三百戸冠雖觸邪心麟角公論非我出先覺化行仁厚到生蟲踐之未忍那肯啄定國治獄民不寃安有六月飛霜雹萋萋碧草春風芽相逢官路黄栁花繡衣驄馬未出宿先聲已過河干沙東西百里不易見况使南北千里耶又聞不避南陽詬官舍盡室無一後已遣魚軒還潞水但畏兒童癭生脰久知是邦多此疾賢如元凱終不宥蹇我白頭學詩遲佳句求法将軍歸伻來一月再惠寄無乃有意幸教之我雖不作能知詩評君一語君莫嗤古人復生不是過百泉梅花更竒作篇終用意愈精神餘子工夫無許大束鄰好事有肖齋併取歸家玩行坐招貢夫探梅去年南陽雪積丈苦寒更在燕山上荒園栢樹舊冬青一夜生意随凋喪今年半冬汗浹顋馬蹄誰是散銀盃愆陽騰威蟲出蟄到處盡芳年後梅城中知春能有㡬千樹西園雪羞比不復乗雲過玉川但看明月揮桃李願分伏瓮新金波我烹封麏如稚駝相擕吾黨二三子白頭一醉君如何次探梅韻明日余醉先歸貢父與史鄧州令妓歌飲至城次韻山頭落日髙三丈我醉思歸馬先上來及城門市已燈纔下雕鞍路迷喪行人笑指駢肩顋不見使君荒郊盃百步一止歌吹發清切驚落千林海是邦能詩輪指㡬横槊吾猶驍健比夜深却相醉尉逢不識将軍隴西李近聞北涉漢江波千錢糴穀載一駝吾儕寄公不喜樂其如負此時平何楊丞彦先見和復次韻二首短兵最長不見家善用逺在威弧上惟君詩筆可配之未信於今士風喪無錫如花越女顋人云無此不持盃解組歸來卧衡宇寂寞巡簷空嗅梅出門欵段朋儔㡬我䇿駑頑時竊比不繙異書友蔡楊且玩竒古傲牛李一日不見古井波相逢莫話襄銅駝白沙翠竹江路好蒼生安石如卿何猶仁巾冠蒙在上縱齒衆中人不咍直饒白髪三千丈猶賴巾冠蒙在上縱齒衆中人不咍年少風流氣先喪最恨白髪顑顑顋􅆴􅆴未飲先垂盃顔壮自羞追勝集不是有詩真負梅兩疏黄金在餘㡬入手把玩春冰比莫從車上貢餘桃分棄路旁齊苦李萊田茅屋臨湍波持家惟有書數駝欲教兒癡未解讀及此正可遊無何八景樓公乎何年謝鈞軸卧樓臨此湘一曲太行山色髙入雲千里空青照沙麓胡為捨之不命駕無乃風土西南熟丹梯不樹三丈旗已使元龍卧牀足世誇入景何足道自有萬象供遊瞩因之不遣别製名可見靈臺不違俗樓中楮書三萬卷時與多聞來勘讀每讀北海空樽罍差此東山廢縣竹却思十年帥邕管日夜不解衣三屬至今起跪必依人半足左江炎瘴毒㡬時按圖數包貢尚恨未縛交州牧區區與公晚傾盖握手論心如昔夙歸檣相煩就屢别濡滯憐儂晝三宿莫言處隂影可休安坐晚食能當肉九重方務老成人㑹見鳯書來起復江溆漁舟圗漁人無田鈎為耒生長水中安於水解維一葉信所如朝發荆江暮沅澧湍施梁笥淵罾窊謀食日掇獱獺餘無産可乏佐軍策作俑什伍官征租年年冬月寒潭碧鳴榔驚起蛟龍蟄縱横沉網深刮泥鼓鬛潜逃萬無一小魚大魚盈千舠刀腸斧首砧脂膏然薪夜照作鹽腊百步未至聞腥臊越商巴賈持陼堵接艣連檣争售取解道困魚魚有神豈惜羣分命如縷杜陵實獲我心人解道困魚魚有神縣官丁中連四海計口筭賦何虞貧問誰晝此非無意尺楮無褒惟有刺前年下詔蠲此租咸若君恩小天地留别奉御李侯李侯吾取何所似騏􅂹絶塵日千里人生一朝緩急間凡馬焉能託生死觀其平時善赴義竭出問門常倒屣千金傾槖報一餐片言杯酒忘百恥靈臺雖負横水鏡月旦絶口不臧否果如形勢心所非壁喙教謏無一唯族胄貴挾北方强是性受得由母氏乃知衆善出天賦齊變而魯非學使拱壁李云曠代珍小小瑕疲何足指適吾有覽吳㑹興握手不謂遭南紀鸚鵡洲邉月再盈朝出暮歸月轡箠日復一日無怠色骨肉未必真能爾古人亦貴意氣豁􅀈交何必同調止况今卜居尚悠悠白髪相捨誰鄰里非來漢陽即漢隂斯言或食如江水清明日陪詩僧悟栁山登落星寺詩扺掌女媧前功捐鍊石力盡還霣天怒飛十有八萬里擲陷彭蠡三重淵藏山於澤信所力愚公欲移重莫肩州民譌謂恒山路漫向麟史求何年安知自爾牛斗躔天穴山當匡廬巔銀河一決不復塞至今飛流掛長川我來正逄槐火莭艤磯蹔繫東呉船相㩦詩僧上佛閣箕踞對酒談其然渠聞舌橋若自夫子辯乃出鄒衍前何書太古何所得為言烏有先生傅檣烏吳城山頭尾畢通飛來行舟檣上呼舟中主人適中欲委肉投飯供朝晡云是巡湖王使者從卜禍福知前途家人化之亦信向恐我偶忘或誤謳絶嫌魚網戒張設見彈必毁仍藏弧因思神林鳥亦黠怙勢不必専城狐過龍興昌邑山望海亭去年憶登望湖亭空雲凝空雨雪零撫碑三復石砮記賜觀欲藉王威靈廟令老人曰嘗有烟塵失自兵初經南昌歸來舟復停亭邉楊栁春風青纔思㑹稽探禹穴湖海濤瀨達東溟牽牲榼酒來炷馨再拜卜吉王之庭洋洋在上孰敢侮正虞白日飛雷霆廟中道流師雲谷顔色憔悴如獨醒率然一物置我所五采十之再咸扃槊鋒劍脊握有半鉈刀鑱若新發硏一砭疑為扁鵲石三嗅尚帶陳隼腥惜無矢人與羽筈之弓試矢而㝠冥重為雲谷語丁寕英之新之君其聴平生記古此第一過日若忘心已銘商夷周目搃後出逆推已自三千也百年天門孰曰夀嗟我與子其秋螢牧庵集卷三十三欽定四庫全書牧庵集卷三十四元姚燧撰五言律詩感事致位丞凝地夔龍伯仲間星當朝北斗日已薄西山取謗因讐惡貪權失丐間此行雖鐡甲未足比慙顔輿病髙崖道中作役役乾坤逺栖栖道路頻五年三入蜀十夢九歸秦塵病偏凌客山英定笑人無勞問前渡祗覺白頭新發舟青神縣青神開百丈江岸轉荒凉薛荔縁松起蒹葭並竹長深披豺虎徑毒犯虺蛇鄉何莫非王事農夫可惋傷舟達黄溪草木随寒暑殊方榮悴同葦華兼露白檉葉未霜紅日月􅀟飛鳥江湖一病翁晚來沙嶼上愁坐獨書空五言排律詩贈幼醫栁君滿秩兆新識髙名實久聞吾家從鞠幼醫業必求君投劑均調鼎施鍼捷運斤功堪齊一相懼若用三軍簿酒留窮日峩纓戴切雲世知追藥聖渠負善爲文俗眼鸞棲枳長身鶴出羣素絲頭轉白碧草手將分拱璧光猶寡兼金贐反勤縣官如訪逸全十定旌勳七言律詩大都寄盧處道家弟去冬温室見玉音問汝死耶非因知洛卞思常切雖樂江南告已達一旦去妻鄰舍棗三年遊子溧陽衣無遵君父無親母有底牽留未即歸元日昨夜中星仰看昏攝提驚轉帝車轅三千單紒苦寒盡五十二年今日元與宴記霑魚在藻退歸甘免鶴乗軒膝當木榻穿皆穴髪比霜蓬不㫁根四年甲午再過龍興訪雲谷玩石砮留一月而還贈之石砮射隼中應􅀟一集陳庭一此鄉楛笴乆隨毛血化石稜猶作劍鋒剛知音道適逄坡老得寳神隂相豫章廟令收藏要知法謂看垂矢在東房感白髪霜鬢休輕比素絲素絲輕染一為緇參同知白意端是始終守黒更無移不似鬢毛難上色百方無有再𤣥時㸃檢形骸無一可醒尋泉石醉吟詩寄題陳肩䕫兄弟夢草堂謝池草句本無奇千古流傳五字詩祗是可人醒枕席許多生意在壎箎信渠風雨聽眠處快甚江山得助時顧我此懐今已矣羡君兄弟撚霜髭寄題武安節推同年萬君定翁露香齋取趙清獻夜則以日所為告之天也是官也葢清獻初仕云盡將心事冩成碑大要操修在不欺此一瓣香前輩似只三箇字老天知素瓶貯豆應先滿匹馬欈琴料自隨吾榜得人今又盛㑹排介甫擊升之道中即事十九首半生奔走路塵紅老合投間向此中炙背可親冬日叟脅肩休笑夏畦翁前除梧檟皆黄葉别院橙柑尚緑叢榮悴不齊誰使爾欲將斯理問髙空㸃檢荒園新植物長身君子不居中花惟名牡可為牝竹既曰孫元有翁九月未霜先挺荔㡬時因雨試移叢欲為竒品少遮日早願新梢髙拂空間人闊畧俗能容胥青區區禮法中泥酒有時遭郡守借書嘗夜過鄰翁江珧荔子幸同味玉樹蒹葭何敢叢文比盧全儘平易猶騎騄駬上虚空月出瀼瀼秋露濃舉頭天運定方中休官止酒愛陶令對客賦詩輸杜翁燈燼不挑垂暗橤葉聲閒聼墜枯叢馳心㺯墨誠餘事度日悠悠逺勝空買犢賣刀方課僮躬耕來此近隆中䕶堤纔置木龍子穫稻已輸秧馬翁林逺薪䒱難似桂庭荒藜藿茂如叢金穣已應田家卜儲粟瓶知不告空人家山郭蕭條裏客子秋光荏苒中川逝無情将老汝土非何物不悲翁鴈書終日度遙漢螢火經霖生腐叢只有文窮能作崇一時祛送若為空富貴賤貧交態一何人耐乆伴間中書繁揷架儘良友筆老免冠真秃翁睡起蟫魚沿敗禇吟來蚯蚓發寒叢忘君畎畝吾何敢正賀三邉候燧空却比周郎似不聾回頭曲誤妓圍中樽前客豈可無我詩裏人多非自翁落落既為喬木世翹翹宜㧞錯薪叢或云尚續樊川叟未要風流掃地空俗自窮余余不窮無羞俯仰兩間中叩門聾㒒強迎客索飯嬌兒能呌翁葦縱聼浮身一粟蓬飛未甚鬢􅀟叢爾來毎為家人笑煮茗哦詩夢亦空徃古來今無限士何人不在好名中窪樽牛飲笑聱叟絶筆漁歌竒放翁闗内舊詩傳菊帚穰間新事縛蓍叢至将大衍供除掃烹鶴燒琴不是空衞生道至東坡簡坐驗朝帋視息中解使水男親火女即為木母嫁金翁聖人愛嗇文多祕方士支離語漫叢只夀百年身健死不須白日上凌空年少諸賢莫笑儂人逾五十日過中白頭特未到君耳造化豈私令我翁南國香橙難似橘西川慈竹本名叢世間貴耳多如此磈磊孤懐王要空僻性知難與俗同舊交新識徃還中嫌為厚貎重闗相愛不機心抱瓮翁梧䑕躍林窮五技橘奴輸絹止三叢遙應世母神州説孤姪生涯尚鑿空時才位地難齊同過猶不及非是中禦人潄石信辯士為子移山真拙翁鵬翻溟渤扶搖水鷃搶榆枋樸􅈪􅓜萬物自人惟是我為君髙視九圍空憂國惟求一嵗豐商歌遙夜幾時中長懸謗木古來主欲獻食芹何處翁虚應蒼麟纔一角瑞時朱草必孤叢傷心千載懐沙賦日月何嘗不在空老困撥書非自慵徒令憂喜塞胸中費桃一日殺三士剖橘何時見四翁單極綆多能㫁榦千章木穉已超叢子魚未是忘筌者回首遼東半席空無補明時出處同一毛得失九牛中雲山不是世争物田舍正宜吾作翁文或問津牛馬走才難入網鳳麟叢燈前百萬呼盧擲未問家儲甔石空駟馬難追言數窮猶龍自守不如中口知余媿三緘士臂亦難為九折翁流水必趨恒下地狂風多折最為叢若人有問安身䇿拙學區區過此空未曽齒豁與頭童年少應無日再中四海固多知已士一門惟失譽兒翁蕭蕭霜葉紛辭樹粒粒燈花細妥叢遙夜誰家發砧杵月明如􅀈半横空次曹訓導韻詩筆髙冠無此流雄音壯節得前修清明雨過桃花浪上已風連桑落洲江路帆檣容少住鐘山杖履遂竒遊獨來乗興闌還去千古何人識子猷原注此詩石刻在今湖口縣學敘云前翰林直學士奉政大夫知制誥兼修國史姚燧以青龍辛夘春三月四日獨來縣學諸君適兼一人知者偶縣教訓導曹君餉余詩為和之所謂鐘山葢石鐘山也挽王敬夫憲僉素韠孤兒拜屨前令人未問已凄然同官南郡纔三日隔世東州忽一年夜月誰家虚燕席春風客路負雞綿玉碑老子埋銘在潜徳何憂世不傳别駕劉之問邀燧同府倅余叔器田别乗顯卿姬府教伯陽以癸巳九日飲郢判席上言懐去嵗君山孤櫂逺如今盡室石城州明年白髪桑榆日何地青山蓃菊秋客氣已為彊弩末宦情空繞大刀頭果成問舍求田策未讓元龍百尺樓次劉時中反和杜紫微韻贈李若水并序至大始元二月舟過髙郵有李若水者為屋數百楹以祠東嶽自號睡著余竊笑之豈是舉贏皆夢中為耶因其求詩取水驛璧間士子劉時中反和杜紫微齊山登髙韻以贈其人幼年自閹云何事仙人亦毳衣䝉茸如菼曜朱暉潔身自説年華盛睟面誰傅夜氣歸能爾用師三晝返不知去俗幾塵㣲睡嬰外務何曽著常恐金烏出海飛次時中留别反和杜紫㣲韻身世支離似敗衣有戈誰却魯陽暉不知次日公車召又時何時野服歸花信正愁風駘蕩麥苖還喜雨霏微分攜江上休回首恐見檣烏作背飛次時中參錯和前韻留别且勉其進徳無怠二首啼鵑休訴不如歸我亦從來賦式微竹塢且宜鳩杖立柴門不謂鶴書飛舟行逺後忘經驛酒禁嚴來徃典衣為問石城鷗與鷺幾時相對㺯晴暉多君聞道粗知歸雲霧何人識少微爾後驊騮終獨歩自前鷙鳥不羣飛准南數日將寒食客裏三春尚臘衣安得鑾坡同給札不妨苜蓿對朝暉次劉時中和牧之齊山詩韻有足斯奔有翼飛静常觀物入希微名慚窺管文章竊跡喜收身劍履歸影與金樽邀夜月夢無玉斧照晨暉白頭坐取移文誚又為前星一倒衣次韻時中再和簡吕正字登淮安城樓乆知戎服笑儒衣終尚晴􅆤惜寸暉上馬人扶甘伏老攜家旅食亦安歸嗟君無事乗清興尚友新詩和紫微相勉殷勤養鱗翼會能川泳與雲飛喜雪鄙句奉子英提學天上雲絞漾水波人間山色映兜羅東風盡日楊花落南畝今年楚澤多稼穡生成知帝力􅂌平消息聼民歌漢家始建營田計未厭牙籖没馬過七言絶句賞花吟十首常嵗花開必禁煙今年開在禁煙前坐令姚魏皆牛後伹媚殘春榖雨天嘗並牡丹為妬婦一枝惟許一花開從今記取花前飲莫遣猶特媵爵來隂翕陽施草木知牡丹烘日已離披明晨浥露還收合恰比芳苞欲吐時少年騎馬縱春遊紫禁名園訪欲周今日病中扶杖看白頭先已為花羞出門京國事無涯虚擲東風五物華却謝病歸催不起故園今見碧桃花手裁修竹直檀欒十畝清隂六月寒西掖歸來但篁篠被人皆斫上林竿酴醿寳相海金沙條蔓縈籬四面花莫道詩人例窮苦繡屏圍坐是誰家大葢青油一丈隂未須特入海棠林好乗麗日光風看猶勝銀釭照夜深佛桑艶艶欲燒空猶愧山茶鶴頂紅更是並他凡卉異謝時連蒂綴東風東風試手送韶華落盡梅花落杏花留得西園桃李在尚能十日媚山家張總􅃹清富軒米船明月白紅光未半王詵寳繪堂今日又添清富出兩家遺物滿筐箱許道寧幽人曵杖圖噴壑飛流雷怒鳴切雲老幹凛將傾深山窟宅皆豺虎説與幽人莫獨行題米元暉楚岫蒸雲圖得法君家海嶽翁青林翠岫白雲中夜牕不是瀟湘雨定有當時月貫虹剔耳曲意小誤已回頭得此人生莫過求堪笑殷君太聰聽却防聞蟻鬭如牛節婦䝉氏眷三首死别哀思盡有期最無窮已是生離如今筐篋同州吏誰肯分攜襁負兒今年西北静氛埃前日跳梁欵附來早晚君王罷邊戍良人應逐踐更廻能為聖代立綱常何獨雷門爛有光太史諸人争淬筆流芳直與漆沮長張仲牧牛圖牛刀農家惜百金畵師真得老農心釋耕不忍還騎去乍可牽牛歩逺林王氏祖塋詩卷讀渠滎澤墓田詩太息師垣尚未碑從此南歸得終願衞人應有賦蟬緌題孫大方真人秋聲軒五首牕竹蕭蕭夜撼風秋聲何䖏不相同却休八表神遊客認作匡山紫極宫醉翁詩法似長庚序集東坡有此評不和蕭蕭動牕竹却從庭樹賦秋聲畫竹今推兩李魁魚牋鵝絹訴為災試披風葉霜枝看似覺秋聲入耳來晉賢長歗只孫登君是遺苖必也能肯聼秋聲成一笑攬衣燒酒對宵興心許神交羽服流續書惟此一天㳺幾時却向秋聲夜醉卧朝元百尺樓黄華墨竹湖州再變到黄華兩竹離披自一家萬斛顛風掣旗脚軍民吹屈最髙牙樂山卷老思吟詠恐傷神多少求題委案塵展卷樂山殊喜作自縁自是愛山人巫山圖神女行雲安在哉當年魂夢費蘭臺絶癡更有杜陵叟尚想空山幽佩哀題歩隲奉𤓰圖二首從來道屈不伸身特傳吾嘗笑史臣簞食豆􅅅情最見征羌還却善觀人世有淳于定倒冠祝田求狹責奢難若從今日論𤓰直未必嘗渠飯一盤題曽子耘𤓰圖誤㫁𤓰根罪甚微未消狂晳奮餘威鳴琴不怨參真孝尚學風雩鼓瑟希書琴工萬古音卷後聞道為琴獨苦心新琴能發古時音百年却視今為昔不説雷琴説萬琴寄耕鋤隠者倪元鎮谷口青松夾徑生鶴巢松頂雪初晴此時知有經鋤者獨抱長鑱嶺上行檢校傳伯賢求挽其父憲使五首憲節﨑嶇瘴嶺持歸輿多少引丹旗東甌除却今尸祀别道誰家有立祠公雖歸𦵏汶陽莊留得閩中像在堂好記儂言看他日遺苖終有視為鄉􅀈舌將何嵗奉嘗荔丹橘粲與焦黄蓬萊日落天風急營魄時應一望洋累帙百篇先在吟鑑然一事敵南金向人求請尤無已足見終天孝子心知生知死弔傷俱紀徳於詩事不誣我僅知生不知死弔章魚目混驪珠三老圖三首宋人金季反兵時徒遣荆州徃乞師撫劍歸來天歩改無因死病怨良醫從卧封龍十頃雲閎中肆外溢為文若非用事多排比党蔡諸公不足羣勃磎姑婦入龍庭得意攜毫雪佾亭向使遺文盡收此後生尊作吐辭經陳雲心求題君近昌江山已深更依天岳最髙岑月明清夜援琴鼓惟有白雲知汝心挽雲南參政張顯卿四首原注其祠在碧雞山誰昔新知紫鳳山正當特節日南還曾談不足能專對不得深輪九虎闗萬里橋西逺寄詩伹知相見可重期如今繙閲傷垂老却是幽冥永訣辭自非威信結夷蠻祠廟誰修爨僰間從此旃裘具牲酒不來徼福碧雞山人臣用世熟無能由子非才不見稱觀此移忠與純孝是家台席有重登趙信庵墨梅廣平援筆賦梅時鐡石心腸吐媚辭千載信庵湔此恨却將鐡石作梅枝楊補之墨梅枯枿殘枝三數花似臨清淺照横斜草𤣥善學營丘筆水木齊行自一家題剡溪回舟圖戴逵失䇿遣人哀禮也元無往不來明日相過莫相見扁舟却與到門廻牧庵集卷三十四欽定四庫全書牧庵集卷三十五元姚燧撰詩餘浣溪沙舟中紀事白髪年來自笑余孔方從有絶交書誰憐多病麴生疎兩岸行人争抵掌誰家舟上載籃輿江南休問看山無菩薩蠻皇慶癸丑春賞花詞兩間日月同悠乆算來無比東君夀一嵗一歸來光風吹九垓花枝依舊好只自傷埀老七十六年人見花能幾春中秋雨素娥會把詩人調衰顔不直圓蟾照特地變雲陰江城三日霖今宵佳節過天上氷輪破纔却放餘輝要看清興違清平樂失題二首水色裝束風致清逾淑春竟枝頭添蕚緑要與梅花仲叔生紅從此羞顔甘同桃李漫山不是𠖇鴻過盡情教銜子荆蠻菲菲香雪更照溶溶月管被司花嫌太潔故遣啼鵑濺血方舒笑臉迎丹雨聲深院珊珊有底春愁未訴向人紅淚䦨干聞鴈春方北度又送秋南去萬里長空風雨路誰汝𠖇鴻知處朝朝舊所窺魚由渠水宿林居為問江湖苦樂汝於白鷺何如大徳改元之明年辰在戊戌春三月十有一日宣慰􅅢堂邀飲怪坐客無吾肖齋或云逃生朝矣即席賦清平樂以夀之南陽昔嵗此日懸弧記不料長沙今欵避紅袖青軒負醉横檻直楯西東飄殘萬紫千紅不是荼䕷噴雪争些閒殺春風浪淘沙為柴氏題河水發崑崙浩浩泉源餘波九里潤猶存若問是誰家胄出顯徳諸孫今日在清門玉季金昆能時夏凊與冬温直待鑾坡褒一字華衮休論競渡楚俗至今朝服艾盈腰喧江饒鼓節蘭橈士女踏歌巫覡舞魚腹魂招去古既云遥讒毁言削修名立與日昭昭免向重華敷衽跪來直蘭􅆏余年十七洪山僧相過言别公十餘年面頰紅潤益加於昔有道然耶因為一莞賦此曉之七十鬢雙蓬已分衰翁煩君休譽面如童只此正為吾老騐物理曽窮天地一微躬草木還同桃花初也笑春風及到離披將謝去顔色逾紅大徳丙午端月十四日立春巧連燈夕求西野澹齋月澗同賦春燕玉釵騰又試初燈天公節序巧相同纎手青絲盤出看寶燄騰層鞭絶土牛繩已送嚴凝牙旗鐵馬向春冰六十九年余治學老病宵興送貢應奉仲章歸覲宣城明月萬家砧蟋蟀哀音何人不起故園心一語最難留斷袖説覲雲林回首玉堂深誰悖綸音都門無酒與君斟只賦新招當贈别如玉如金贈重陽奴初度菊花秋霜水㾗收可知不離是荆州元就龍山風力軟破㡌颼颼今夕定開舟漲水磯頭淵明觧印去來休夢遶橘齋新草濶檀板輕謳鷓鴣天遐觀堂暮飲誰進䕫龍不致君白頭離亂不曽聞三秦碧樹生春色千里青山入暮雲何事業底功勲百年五十已中分從今萬八千塲醉莫酹劉伶荷鍤墳虞美人牧庵即事為李元素作竹風吹落疎疎雨紈扇收殘暑小軒驀地細香來莫是鄰家早有木犀開玉環穿耳誰家女自獻歌金縷新聲和徹紫檀槽袖出烏絲纔説要揮毫玉梳贈内子相輝瑜珥瑶􅁫鳳寶翼蜻蛉動新妝又得水蒼梳人道秋風何物不瓊琚人無玉質容何害玉徳斯堪愛尚慙猶未十分全聴取明年環佩戛璆然减字木蘭花劉子善得常徳夀梅圖持歸鎮江夀其父梅軒夀梅紙本傳常武逺夀梅軒歸北固愛梅無有似君貪東極吳中西盡楚黄昏清淺孤山路能對春風旬日許不如歸去畫中看冷蘂疎枝常照户南鄉子遊洪山寺良月大洪山楓葉青青柏葉殷一樹桃花修竹裏天慳連見春風一嵗間争挽揷雲鬟日暮金鞍未擬還偏與歌姝相映照朱顔應笑詩人兩鬢斑次馮雪崖韻二首荆憲品皆加纔罷還除世共華恨殺峴山山下路梅花誰醉雙瓶玉照沙涂水聴宣麻行脚陽春起未涯君去莫嗟風土異堪誇君祖鄉鄰我祖家日覺鬢霜加欲對青罇戀物華離别紛紛長眩眼生花易㪚難摶掌上沙蓬意不依麻未必移居漢水涯前日曽與遺集序張誇素範清風有㡬家小重山㽔女歸寧還襄陽江渚蒹葭白露稀雲間渾未有蚤鴻鴻人情離在别庭闈㩗諸幼孤艇溯流歸七十古來稀乃翁筋力尚未衰微峴山不是逺相違猶能往清涙莫沾衣風雨折枝詞早是清明應候風勢如滄海浪怒號空更兼潑火雨𠖇濛如何得枝上載殘紅最惜牡丹叢曉來吹盡折教兒童且為支拄曲欄中還堪否留客一樽同定風波南州以菌生竹間為覃并樹雞瘦薄而赭雖日乾猶可煮魚此筆竹絲為之蕈葢得竹餘氣而生然以世多未見故祥之余以理推如此唐古憲僉筆生菌繪為圖因有是作五馬雙旌出郡堂歸來椽筆對凝香只為好書天作意相戯故生三秀在毫鋩不是畫師生手觸拳曲層雲連葉㡬何長我有一占君試記何事已開他日判花祥題軸軒左右埋二石檻植荷其中旋汲清泉石斛方便疑身已置江鄉八江呑胸雲夢小應笑白頭兒嬉未曽㤀荷葉且看張翠葢此外芙蓉誰望集朱裳還有不如人意處遮去碧天明月照泱泱洞仙歌石山伊誰斧鑿此玲瓏巖岫至巧先天化工手又不知何地夜壑深藏今留待白髪詩人攜定向宣和廢苑睥睨髙株欲轉愁回萬牛首期出處與君偕立則參前卷宻可收之襟袖尚未敢云能此私從怕雷雨𠖇𠖇六丁來取對梅疎枝冷橤臘前時初破年後纔多玉妃墮問梅軒白髪寂對空株期三百六十誰同幽坐孔方兄善幻半副溪藤貎出緇塵素衣涴當盛暑展圖看遽失炎蒸甚欲摘傾筐三箇又却被旁人勸休休怕他日鹽羮鳳毛無和江梅引謝王子勉提刑送江梅二首西湖不近上林隈問江梅定誰栽莫是𠖇鴻銜子逺飛來紫陌遊人多不識但驚看青天霽一齊開獨有使君憐寂寞為持盃能㡬回玉纎横管東風外落日樓䑓不悵明朝飛雪滿蒼苔恨殺南溪調鼎手恐遲暮到而今霜鬢摧年年江上見寒梅㡬枝開暗香來疑是月宫仙子下瑶臺冷艶一枝持入手斷魂逺相思切寄與誰怨極恨極嗅玉蘂念此情家萬里暮霞㪚綺楚天外㡬片輕飛為我多愁特地㸃征衣我又飄零君又老正心碎那堪聞塞管吹牧庵集卷三十五欽定四庫全書牧庵集卷三十六元姚燧撰詩餘玉漏遲與暢純父學士同舟過鹿門山遡丹青未了森然玉立相迎雲衣勞苦詩人鄭重鹿門清曉耆舊猶今好在筭竊比山靈年少青盖照宜余翆荷蕭蕭華皎𣺌𣺌漢水滄波問流盡人間㡬多悲嘯對羊公片石一尊相弔喚水長庚小妾試看坐金鞍歌笑飛蚋小澹澹長空孤鳥滿江紅亷野雲左揆求賦南園案慶雲都城善謳者面勢林塘𦂳横􅊿稜如削還更比城南韋杜去天天盈握使有名園能甲乙他山峛崺先尊岳甚一花一石總都将平泉學雖鬢髪流光覺渾未厭朋來數有慶雲善譜新聲天樂正爾關弓鴻鵠至可知棄屣麟麟閣只北山逋客負塵纓滄浪濯送李景山使交趾六詔江山十年厭拏舟還轍但只有日南遐域未嘗持節八月秋風來朔漢燕然已没鞍韉雪料此時銅柱瘴雲収無炎熱御尺一行宜决煩重為雕題説道望元威徳萬方臣安直以越裳聲聞阻千金裝渠渠誰屑要降王明日共輶軒來金闕送張子正廣西宣慰司都事瘴海育風更誰避樓船檣折長記得鐃歌歸路獲嘉時節日夜丹青麟閣夢論功􅅻補朱衣缺問世問求寵有門無終迷轍為此錯平生鐡踰嶺嶠皆炎熱獨梅花萬里桂林氷雪躍馬十年銷髀肉遠遊一債償難徹笑悠悠造物戯人哉冠纓絶滿庭芳寄趙宣慰平遠有北先寒來時鴻雁記經何地初霜問渠鵝鸛何苦上顔行浩蕩烟波萬頃怕誰去爭許三湘聊容與誰求繫帛傳語寄炎荒丹山如鳯鳥相逄定是問我行藏説於今華髪為汝増傷晚笑巢阿覧徳莫貪快千仞翺翔和鳴擬從吹嶰管終不是朝陽水調歌頭幽居開軒對朝爽吾亦爱吾盧君亭有笏堪拄人道富於余尚恐軒裳念在前日朱門故熊消釋未全除反覆看如此儂豈遽漸渠最同是烟滅竈釡生魚年年客裏相值住興負當初縱使軒亭無恙亦取山靈抵掌猿鶴怨移書樽酒酹江月何日賦歸歟買田天生門外買地近隍壑十頃展平闌相如漫説雲夢八九可胷蟠已具扁舟放鶴又且觀魚如樂何忍利投筆却恐避地下鷗鷺怨盟寒屋茨茅蹊種竹畹滋蘭天惟此所宜看素髪颯垂冠手苦彎弓難合惟有招麾毛頴筋力尚桓桓携我二三子日徃將詩壇送徐大山崇仁送行役回首十周星因今常武丞去衣繡記曽經西北桃源山峻東北河庭春盡浩浩際滄溟鄂渚玉薪米連月雨冥冥天氣佳殊未暮莫揚舲便今綰印遲上誰奪老槐聴一語嗟卑烏用覧鏡還宜自重如此鬢毛青軒冕暮塗看馭日與鞭霆岳陽寄定庵王萬户兹遊太竒絶我亦壯君侯春風殷地悲歗笳鼓萬貎貅平昔心胷吞看八九江南雲夢今上岳陽樓尊酒浣塵土山雨戰青油竟陵客又挾病入西州惟余與汝湍水東决則東流遥想凝香畵㦸談兠鍪畫息息莫賦大刀頭麟閣看他日居右有人不守嵗六十一年似窻隙白駒馳人家守嵗癡計明日怕容辭萬事􅅻堪一笑何必朱顔年少誰不侮吾衰只看屠酥酒先酌襁中兒無以為閒櫽括謫仙人人生日日渾醉百嵗以為期三萬六千塲耳一日盃傾三百巧厯算能推試問自今去餘有㡬何危燭影搖紅新齋肅政李元譲座間任氏婦歌海棠開後之語非專為海棠設故别賦二首録呈太初宣相時中天寳三郎爱環睡起紅妝嬾背渠素手洗朱鉛吹􅀢寕王管羯鼓嵬坡塵散記紅水􅁋􅁋涙㫁際天長恨蜀棧青螺錦江難浣千古驚魂泛蘭轉蕙光風暖嫣然一笑尚傾城桃李空繁滿銀燭春宵苦短願青軒流光緩緩借諸任䄂回施新齋捧案原闕三字嫋嫋東風碧湘左畔羣山囿海棠無語不成蹊桃李羞牛後生臉朱脣暈酒間坡仙肝腸錦繡未容花睡銀燭高燒何如晴畫十事之中不隨人意長居九結貽顦顇笑靈均蘭茞盈襟䄂今代巫陽恐有劔南呼樵人晝手向青軒底貎取妖奸為司花壽木蘭花慢清明上巳同日亦吾生少遇賦樂府奉呈判縣伯陽志友兼寄髙侍讀暢先風嫋嫋轉幽意泛崇蘭最上巳清明相期一日百嵗逄難鞦韆自兒女事快憐翁覆手羽觴乾莫道韶華一月從今已屬春殘故人回首隔長安輪直下金鑾對賜火新烟應思祓禊何地江千依然齒牙牢在並年時花似霧中看獨頼中書未老言時髪尚衝冠石州慢失題高與雙崖馮雪魏青三子皆入傑當年慣見中宵天外徳星難拆華觴雕爼清辭細切琅玕定應䄂有錕鋙鐡而我獨離羣卧南陽甘節書絶故人石影新翻欲譜調踈聲拙誰道巫陽喚起滕王長别珠簾畫棟縈飛南浦朝雲當時此句雖清切何似倚危欄滿西山晴雪賀新郎失題杜宇為謀拙只當時西山已報鼈靈功烈何事為心輕傳禅坐取名隳身滅化怨烏春山啼血試聼不如歸去語怕君還未晚吾能説寃憤在失金闕胡為不叩天閽裂柱人間丁寕控訴欲求誰雪蜀道思歸誠何有便隔雲山千疊一再舉猶堪横絶苦趣東君行不早到干紅萬紫飛時節呼謝豹慎捫舌摸魚子賦玉簮録呈趙太初兼與時中茂異更休尋玉山瑶草蓬萊知在何處司花嫌被春風妬留待九秋清露還觧語試問看當時月夜乗鸞女何年遺汝甚不怕高寒青雲萬里鬟鬢亂風霧人問世無物有香如許靈圴遺恨千古芙蓉杜若何堪佩顦顇行吟沅浦空自苦誚教得揚雄不信離騷賦雲牕月户恨白髪詩翁年來多病不識酔鄉路蘭陵王昨日奉候知玉體已不恙軒從可北矣其戒行何時作蘭陵王曲問之上雪崖使君雪崖雪玉疊浮雲變滅蓬婆外青白界天西忩窻涵古今絶㤗山置下烈類媵姬姜婦姪望太白三百去天六月人猶失炎熱緇塵苦為涅間誰可配兹千仭高潔惟君雅號相優劣有北正寒冽傳將移節及門再命益罄折未聞賜環玦我拙誤名竊甚此日徴書不到巖穴何人轣轆同車轍華省最相悦忍為輕别定成行不乞為汝負羈絏緑頭鴨贈辛尚書家琵琶妾何氏錦堂深獸爐香噴沉烟紫檀槽金泥花靣羙人斜抱當筵輕羅綬素肌瑩玉近鸞翅雲鬢梳蝉玉筍輕抛魚文細撥鳯凰飛上四條絃碎牙板煩襟消盡秋氣滿庭軒今宵月依稀向人欲鬬嬋娟變新聲能翻舊曲眼前風物凄然路漫漫漢妃出塞夜悄悄商婦移船馬上愁思江邉怨威分明都向曲中傳困無力勸人金盞須要倒垂蓮􅂸花醉紅塵惝恍一夢逰仙六州歌頭賦木蓮花靈均不信木末塞芙蓉徒自潔好竒服芰荷縫看心胷霽月光風似爱蓮叟云難狎應亦未觀林下澹丰容坐䕃高花十文身疑在玉井三峰甚東皇遣與桃李鬭春濃男色昌宗失昌丰於平泉記竒草木惟赤栢與金松岷嶺導江浩浩發臨卭進吴儂萬里江南北行欲遍未曽逄堪帳恨風與雨苦相攻怕學瓊花不墜潛飛去地上無蹤奈明朝酒醒空對夕陽㫪流水溶溶牧庵集卷三十六欽定四庫全書牧庵集附録年譜案先生撰其先世父魯國文獻公神道碑叙姚氏神明之後歴夏商周秦漢魏晉宋齊其間傳次或絶或續與梁陳隋唐有可以譜䆒者别載世録中惟本梁唐六鎮節度使勍勍生金吾將軍漢英漢英周廣順初太祖遣之使遼見留事世景聖三宗加安時制節𢎞化翊亮功臣開府儀同三司樞宻使檢校太師兼政事令上柱國東陽郡公生中書門下平章事居政居政生太師左金吾衞上将軍䖍州節度使景祥生太子洗馬去華去華生金東上閣門使金州團練使玠玠生閣門祗候武徳將軍佺佺生武徳將軍獲嘉令錡錡生安逺}
