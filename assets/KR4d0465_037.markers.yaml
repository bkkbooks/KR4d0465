  - {type: variant, offset: 223, length: 0, content: '', WYG: 逺大將軍慶陽安化丞淵後更名仲宏生公及弟楨格公自稚弱一力于學晝則經紀其家嚮晦則讀書夜分不輟魯國夫人恐傷耽苦每止之乃塞牕不使見燭就枕必盡三鼓聞將遷闗中康懿公録事判官于許俾取師氏姑及姑之夫子昌以來公徒行懐書困休于樹宿止于邸亦出以誦自期甚髙宋内翰九嘉少登科甲時有重名方聞居許幕折行位與之遊一日賓㑹録事名召内内翰怒曰公茂負佐王之畧豈可若是易之先祖曰同僚呼兒輩宜然猶竟席不樂其為前輩見推如此壬辰許城被圍州判公軍資庫使與副夜直四鼓聞牕外嘆曰人獻東門出索之無得副曰吾嘗遭兵河朔鬼物云然宜捄吾家乃相與歸街陌横鈴索斷行見其懐印若赴州計事者至家乃盡出金銀酒具奩飾裹餱糧為逃死謀日出而東門果破邀軍將蕭姓者入家盡付所出蕭曰吾嘗受丘真人教汝軍中惟救人無殺吾捄乃死公聞太宗詔學士十八人即長春宫教之俾楊中書惟中監督則往依焉中書少公六年兄稱之與偕北覲時龍庭無漢人士夫帝喜其來甚重之乙未詔二太子南征俾公從楊中書即軍中求儒道釋醫卜酒工樂人㑹破棗陽併公所招將盡坑之大將幕竹林間公前辯折明詔如此他日將何以復命乃蹙數人逃入竹中潜歸其營匿嚴侯軍中纔脱死數十人繼㧞徳安得江漢先生趙復仁甫見公公戎服而髯不以漢人遇人至帳中見陳琴書駭曰西域人知事此乎公為一筦與之言信竒士所為文數十篇以九族殫殘不欲北與公訣蘄死公留宿帳中既覺月皓而盈惟寢衣存乃鞍馬號積尸間求至水裔脱履被髪仰天而號欲投溺而未入也公曉以徒死無益汝存則子孫或可傳緒百世吾保而北無他也遂還盡出程朱二子性理之書付公江漢至燕學徒從者百人北方經學自兹始歲辛丑賜衣金符以郎中伊嚕斡齊行臺于燕時惟事貨賂天下諸侯競以掊克入媚以公幕長必分及之乃一切拒絶又有以銀二笏來見既謝却乃出置氊簾間遣人追及與之遂携家來輝墾荒蘇門糞田數百畆修二水輪誅茅為堂城中置私廟奉祀四世堂龕魯司寇容傍􅂷周兩程張邵司馬六君子像讀書其間衣冠莊肅以道學自鳴佳時則鳴琴百泉之上遯世而樂天若將終身後生薄夫或造庭除出語人曰幾褫吾魄又汲汲以化民成俗為心自版小學書語孟或問家禮俾楊中書版四書田和卿版尚書聲詩折衷易程傳書蔡傳春秋胡傳皆于燕又以小學書流布未廣教弟子楊古為沈氏恬版與近思録東萊經史說諸書散之四方時先師許魏國文正公魯齋在魏出入經傳子史泛濫釋老下至醫卜筮兵刑貨殖水利算數靡所不究公過魏與竇漢卿相聚茅齋聽公言義正粹先師遂造蘇門盡録是數書以歸謂其徒曰曩所授受皆非今始聞進學之序若必欲相從當盡棄前習以從事于小學四書為進徳墓不然當求他師衆皆曰惟先生命則魏國公由窮理致知反躬踐實為世大儒者又公所梯接云歲庚戌盡室來輝相依以居㑹上在潜邸遣托克托故平章趙璧驛至彰徳恐公避托克托留璧獨至輝以過客見審其為公始致見徵之旨公曰天下之人同是姓名何限恐使者誤徵不敢妄應璧曰汝非棄伊魯斡齋隱此者乎公曰是則然矣璧曰良是乃偕往彰徳受命遂行既至上大喜曰客遇之俾居衛從後列惟不直宿時召與語隨問而言久之詢及治道公見上聰明神聖才不世出虚已受言可大有為感以一介見信之深見問之切乃許捐身馳驅宣力盡其平生所學敷心瀝膽為書數千百言首以二帝三王為學之本為治之序與治國平天下之大經彚為八目曰修身力學尊賢親親畏天愛民好善}
