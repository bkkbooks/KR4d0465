  - {type: variant, offset: 17, length: 1, content: 叙, WYG: 公諱樞字公茂事世祖潜邸十年左右宸極十有九年居近宻之地受尊寵之任可謂必世之久惟其不固富貴進退禮敬窮達一節不易寒士故不取耻當時明哲保身以薨帝為震悼賻楮泉為千百千五百閔惟子煒生十五年未授之室賜聘財如所賻明年官以禮部郎中皆異數也既沒世而名聲日延後十九年當元貞二年裕聖太后以嘗侍講裕宗言之成宗贈諡榮禄大夫少師文獻公至大三年武宗追號嘉猷程世舊學功臣太師開府儀同三司魯國公諡仍其舊又推恩再世考仲宏贈太保儀同三司魯國康懿公祖騎銀青榮禄大夫大司徒魯國惠靖公妣張氏祖妣李氏皆魯國夫人惟}
