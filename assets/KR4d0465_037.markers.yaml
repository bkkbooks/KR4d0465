  - {type: variant, offset: 11, length: 0, content: '', WYG: 子民細而米鹽甲兵于盡得夫人之情而熟知夫事之勢増益其所不能者不既多乎今之老于力筆筐篋以致逹官貴人皆下視之吾逄掖以為言闊事情而不適為用者恃其能此焉爾君既能之是行也以軍國公相知之素無曰峻擢惟循所宜資亦卑善之昔也人吏之今焉吏人其留中其居外主乎聞司徒平生六經仁義之言而濟以今所能古所謂以儒術餙吏事者非君其誰哉大徳己亥秋八月上弦日書送姚嗣輝序取士以文始于隋而盛于唐其法有司擇學修其家名聞其鄉者歌鹿鳴而進之朝謂之貢至則試之以聲律之文中程度者謂之選猶未即得仕必待有位者之舉猶視舉主何人或衆且賢以㫁其人之材否始授之官勝國因之而小變焉選即官之惟不使得為令必制置提刑轉運諸司五人舉始用為令令而上郡牧侍從五府之官無不能至者則自貢而選為舉千百人不一得焉亦磽乎其艱哉吾宗嗣輝勝國選士也赫奕其時瞠後塵者千百人烏可少跋迨今改止聲名昭晰不可絡闋猶官洪校滿秋而觀光天朝求通刺秉政之臣盧公吳公門者千里人未有一得獨于嗣輝傾身接之迎譽諸公閭文云乎哉有間于道徳之實耳士而得此亦曰逢矣逢而至於逹也奚惑然終不能増多其舊尺寸復調武岡益逺於洪豈兩公面是而中不力耶曰非也囿于法制之宻先得之多兩公拱視不可躐其級也以故南榿汝意而往既軑燧告之曰凡今仕者聞職乎民以有治賦聴訟之事為莫不色喜聞職乎士則以無有貢選利禄之望人怠于學虚師席而夏楚不試卒不懌乎其中嗣輝将亦若是乎盍亦思之官風化俗之原治忽所寄也無逺稽古而監之今司徒文正許公微時于大名于輝于秦于河内以倡鳴斯道為己任諄諄私淑少長不一其年也鋭純不齊其材也積多至數百人聞之天聰徴為成均俄拜左相嵗餘辭免復求成均後其弟子繼司鼎鉉者将十人卿曹風紀二千石使棊錯中外者又十此焉其於隆平之治豈不少賛乎嗣輝苟以是為心規矩薰陶是邦之多士得其逹才一二以用斯世使海内之人指而誦曰是大夫所梯接者于以亞匹吾司徒公其獲將多行矣勉事乎此嗣輝蜀人以蜀多榿木雖寓荆吳不忘其鄉號南榿云李平章畫像序陛下之未出閣由李道復日侍講讀親而敬之嘗召繪工惟肖其形賜號秋谷命集賢大學士王顒大書之手刻為扁而署其上又側注曰大徳三年四月吉日為山人李道復製至大四年辛亥春正位宸極制授道復光禄大夫中書平章致事以盡學焉後臣之義装演是圗填金刻扁而摹賜號與御署卷加標軸寵耀至矣人孰與儔敕臣燧序之將俾詞臣頌歌其中而親覽焉臣聞命屏營反覆究思在昔帝王圗其臣者商髙宗之傅嚴漢中宗之麒麟閣世祖之雲臺唐太宗之凌烟閣四焉耳麟閣而下皆將相之開國家承平亂亡以賛彌綸資訏謨以致陰平者傅巖不然初未有是赫赫顯烈肖其夢形求得諸野爰止作相以道復肖形可同乎説髙宗圖于既王三年之後陛下則圖於未帝一紀之先其時繪工運思有所未至手設為色髙宗於説有是乎哉斷所無者李泌從肅宗于途人指目曰黄衣者聖人也白衣者山人也已乃為相而道復姓偶同乎泌亦曰其衣余亦已相謂道復山人可同泌乎為之賜號刻扁肅宗于泌有是乎㦲亦斷所無者泌雖賢者而言涉神仙迂怪以故史氏短之惟説則無間然嘗攷觀之古今之世相去若異帝王為治道罔不同何則陛下所居則列聖之位也列聖君臨之中土堯舜昔嘗有也乃若高宗亦商聖賢之君耻其不為堯舜故命説曰若金用汝作礪若濟巨川作舟楫嵗大旱作霖雨作酒醴惟麴孽作和􅃵惟鹽梅取喻再三求其交修者皆陛下有虞道復之心今謂道復其才有足方説孰敢犯是不韙然其所處則説地也如較其學焉後臣顧説所無能求多聞以建事學古訓以道積厥躬招俊人以列庶位對揚天子之命亦足襲説遺芳餘烈報陛下矣然非舊學之臣世不以是責報俟夫治定而功成徳尊而年及或遂懸車于秋月釣雲月以弄泉石朝堂有疑馳使諮之猶不得専為山人世則目曰山中宰相者所不免也是年夏五月序馮雪崖二孫名字序余以漢刻瑞碑筆意深古嘗模麟麒二字促而小之刻瑜玉珮為私章故人馮雪崖憲副見而求之曰將賜吾孫以為名也故長曰麒次曰麟後十年主長林簿者謂余兒麒輩元服矣盍字之因思漢孝明圖功臣于南宫雲臺實本孝宣之麒麟閣而征西大将軍陽夏侯與居其間當諸将論功侯獨避而休息大樹之陰世多其不伐目為大樹将軍而麒其遺苗宜字曰漢功周穆馳八駿以升崑崙之墟後好事者圖其褰翔若麟鳳栁子厚誕之余觀天閑馬其名而麟其形者奚少况瑞刻所圖延首而長鳴振尾而髙驤孔阜以碩如馬而角則駿之去麟有不大相逺者麟字曰周駿如是命之以必難犯則新而不奇也以求義意則係而不離也且各即其人性情之近似漢功循循歛宻王母嘗稱其克孝如父夫能守家法于今不能逺而言念追鼻祖之踵于古乎其出而仕見之事功可期以不伐者周駿翹翹發達類疆有力者則夫道逺千里可一日而致焉者亦或可幸以焉大徳庚子閠月中休日序序牡丹余于牡丹始于中統之元見夀安紅洛西劉氏園三年見左紫洛陽故趙相南園兩花皆千葉株皆四尺夀安二十萼廣經七寸髙與之等左紫四萼八寸髙等又三年見千秋状元紅燕都故相楊大參宅株五尺四十萼七寸髙等後二十年見之長安毛氏園最多將百株株二尺少然皆單葉小大參差不齊無絶奇者後二十年玉板白洛陽楊氏欄株亦二尺少多葉千萼七寸少鄧州見三日張氏肖齋之衡山紫陳氏終慕堂之淺紅色兩花皆千五葉衡紫株二尺少将二十萼五寸少淺株三尺少將五十蕚六寸少惟蕭仁卿之承顔亭白花天株三尺大可六七十萼七寸少葉最盛又有色緋紫碧相錯株尺少尺可四五十萼盛亞白花七尺大復有緋花株單十萼八寸二花皆多葉而緋花獨奇故為佳品今失其名者别有鶴翎紅為千葉小株獨萼五寸大高等他日株大花則故大矣是為鄧花之冠仁卿舊云此落陽夀安福孫自余觀之大非夀安則淺紅而今名余所命之葢即其形色近似為言也長安洛陽諸花余忘其香孰勝萃鄧花而校噴勃穠綿可喜如紫薇者衡紫為第一此余生五十一年所見者然自元年至今為二十九年其見六年六見自燕長安洛陽而至此㡬數千里中元及三年與至元二十年三見洛陽為同地至元六年十八年二十五年各見之燕秦鄧為異地亡慮百十株而千葉名品纔四見則千葉名難遇亦猶千人為英萬人為傑尤世不恒有者矧賞酬有數耶劉趙二圓雖皆有酒年甚少不善飲楊參時與先世父中書左丞同朝為父執與之酒不敢飲毛園時為秦憲毛氏方業市酒纔下馬行觀擇剪數萼不同飲而去楊氏欄時滿秦憲將走荆憲借居其廬客懐牢寂無誰與為飲張齊陳堂纔持一二觴各箭一二萼歸不名為飲其盡醉相歡者惟承顔亭一焉而已嗚呼似齒五十一年之老行數千里之逺始觀至今廿九年之久六年六見之希而無負可當賞酬者醉明日仁卿求記其事余口未拒而心勿是之以為樽爼之樂屑屑者奚足筆其夏白花忽槁死其秋又固求記之余始思昔者之坐斯定也孰逆知是花旋踵不可復見亦可謂異事也又思左紫止一株已移植嵩山廟中洛陽余亦絶聞夀安固在其玉板白及毛園百株將如左紫余植他人耶無亦若是花之已槁死也嗚呼徃者既然况來者之不可必耶細者且然况大此之倍蓰十百者耶則吾平生所當勉吾身而因循弗力以去不可追者已多也誠可為老將至之一慨而植物之死生又不足怪也仁卿惟喜余文已記其承顔而求之屢如老父取張長史判吾特賢其能以是心至而已然又益思六年之間不善飲不敢飲不可飲無誰與為飲與不名為飲非他葢無詩人同臭味者發其極意焉耳而承顔是日者則梁宣慰貢父張總管孟卿王工部景韓是皆善詩安知不可為他日故實亦未易以復得者據蘭亭例為序惜其時無唱酬未嘗罰依金谷酒斗數也牧庵集卷四欽定四庫全書牧庵集卷五元姚燧撰記武陵縣重修虞帝廟記昔司馬遷由病孔子所傳宰予五帝徳帝系姓儒者或不傳故于唐虞夏記曰帝嚳之子帝摯立而弗善崩帝放勲立舜名重華禹名文命既弗深攷二典三謨之書曰放勲曰重華恊于帝曰文命敦于四海曰允廸厥徳皆虞史賛堯舜禹臯陶三聖一賢之辭且以天下相傳事孰大是堯不曰重華曰汝舜舜不曰文命曰汝禹則舜禹之為名章矣後千有餘年孔子稱徳三聖止曰堯者禹又况紀自戾其言乎前乎堯者帝嚳帝摯後乎禹者帝啟帝仲康中獨堯舜為非名豈坐信五帝徳帝系文取二篇見大戴記孔安國家語無帝系其五帝徳雖小異文亦止曰堯舜禹故後儒辨之以文命為禹名則敦四海為何事而臯陶不名允廸鏡是則紀所名之非名又章矣或曰孟子放勲殂落屈原陳詞重華者皆非歟曰不若是也今之君子于大賢之不可字者猶以鄉邑齋居命之况三聖乎其逺而不斥擇賛辭而號之亦厚徳之至也如必其信百世而不惑舍孔子焉折衷奚以惟帝舜崩𦵏與二妃事他經于書鑿枘者多虞書曰舜生三十徴庸三十在位五十載陟方乃死崩未知地也至孟子始曰舜卒於鳴條鳴條在安邑甚邇蒲坂以避堯子南河之南例之帝固未嘗逺所都也然最虞書實百一十年孔安國以為百一十二年自今積之詢考底績三載陟帝位二十八載䘮堯三載在位三十三載薦禹于天十七年而崩所謂三載皆再期耳由置底績在徴庸在位之間故多書二年猶未大逺紀以為二十以孝聞三十堯舉之五十攝行天子事五十八堯崩六十一代堯三十九年南廵狩崩于蒼梧之野𦵏于江南九疑是為零陵總之纔百年鄭𤣥則徴庸二十為句攝位至崩共五十年總之亦百年與紀皆不足十年如紀則舉之十九年無所事攝位九年䘮堯三年為天子四十年𤣥則登庸二十無所事攝位䘮堯三十年為天子二十年宜唐孔頴逹皆排而謬之又大載止言𦵏蒼梧之野家語則以為陟方岳死蒼梧之野而𦵏故紀遂曰南廵狩不知薦禹十七年之中當三廵狩帝皆親之耶獨崩年往也如皆親之禹何為哉崩年往也于時百一十年矣必将以嵗二月柴岱宗岱宗之去南岳何啻踰五千里吉行五十車埃風而舟濤瀬者不曠一日百日而始至焉是獨勤身于数千里不勤心于萬幾倦于九十三而不倦于百一十年也檀弓亦云舜𦵏于蒼梧之野盖三妃未之從也𤣥以為帝嚳帝堯皆四妃舜無正妃奴止三妃三天子之女不為正妃則正妃將待何人為哉屈原九歌謂娥皇湘君女英湘夫人君與夫人固有别矣君非正妃矣頴逹乃傍牽晉皇甫謐帝王世紀以實之曰我皇無子女英生商均次妃癸比生二女霄明燭光癸比山海經作登比皆不知為何説也秦皇南浮江至湘山祠而風問博士湘山何神對曰堯女舜妻𦵏此大怒發刑徒三千人赭其山而謐云塟衡山雖不同地可徴于帝𦵏而未之從王逸不詳未之從為不祔合而曰帝征有苗二女從之不及道死沅湘之中又曰墜于湘水之渚固已自二其説且有苗已來格分北而竄之三危矣豈侮帝老復逆命耶其煩六師投帝以艱禹何為哉又二女者在釐降時或上下少帝十歳方幼艾也至是崩年皆嫗然而聃矣中原無急變帝何為不及將二妃二妃何為不及從必追之而取道死水乎由遷則祀由逸則戎暈翟簉之非盛舉也觀後世匹帝者雖甚幼艾率土之臣莫敢不母未聞既母率土之臣入十餘年而後世猶女之又帝系曰舜娶堯子謂之女匽氏然堯伊耆姓陶唐氏子而不係其父而别氏焉皆不可以理究者也二妃之祠湘中原世云然亦尚矣哉惟沅洞莫知所始嘗火于宋民雷立倡郡人復字之宋徳夫為郡病其專祠二妃而遺帝始大其宫而合食焉皇元大徳之元僉江南湖兆道肅政亷訪司事李僕庭詠按部常徳夏六月一夕洪水驟至平地尋丈幾冐城郭乃率曹收諸君日夜行水戒民具畚築登陴以捍之發義倉積下其佑以廩餓人不足則勸富民出榖以繼水去今左丞相方平章湖廣省侯請曰常徳為郡岸沅之東古人虞水齧城當其衝波西南為二石埽延袤里所尾入江中順導其勢以遏東潰罹此暴漲盡根株去大浸稽天四縣槩及其實土為防者宜盪而無有遺餘也可乘農休急務修復以倉粟傭役人則民必舒困于今而功亦頼垂于後也丞相是之民利得食争日赴程工不踰時衆作㫁手乃謁帝祠而告成功見其榱楝庭墀傾落蕪穢詰牧守曰明詔有曰聖帝明王其令有司歳時致祭今乃若此甚非陛下欽崇禋祀之㫖宜帝不顧享而降此大沴也其議完之五通為鬼經禮無文祠顧宏麗妍縟其撤而資其材為門五楹殿三楹三宇五楹寝三楹两序八楹為老子法者李道昌主諸鍠鑰旦望祝釐别為宫以居其徒三清殿三楹兩序六楹歳徳真官殿皆一楹民之聳觀十其舊矣後三年其郡官民多侯奉詔之恪恤民之勤而禮神之虔也求所所由鳴呼惟帝之名載諸六籍而不泯泯日月在天未加其明岱華在地未儕其髙與窮壤相終窮者世則知之前帝諸皇功斯人者大昊帝春炎帝帝夏黄帝帝土少昊帝秋顓現帝冬既分五辰而司之與穹壤相終窮者世亦知之以帝之功何斯皇之弗若而况乎過之其為明神左右上帝幹元化以順行四時或乘雲御風省方下土福善癉惡于斯宫與穹壤相終窮者理所固然也烏乎知哉故燧惟列夙疑而未瑩者首之未敢少及法程萬世人倫之至者之徳之如何也汴梁廟學記自魯哀公十六年當周敬王四十一年壬戌孔子卒歴六國秦漢至孝武即位之年辛丑為三百四十年其聞而知者纔司馬遷一人而止耳既編其年與夫言行出處之槩為世家又為弟子傳載其居里問對與夫經事何君又攷知其少孔子幾何嵗是書皆孔門弟子與孟氏所未著其有功聖門真非淺淺哉然猶病夫時有不一其説不可参伍者也世家弟子蓋三千焉身通六藝者七十二人而弟子傳則曰孔子曰受業身通者七十有七人皆異能之士也夫既曰身通六藝矣雖未盡合聖人為教之本然而猶有所指名也其曰受業身通竟不發為所通何業亦晦焉而已耳又曰皆異能之士聖人為教于以修叙彛倫而容異能者于其間孔子自言七十有七人則七十二人者誰後是五人耶其為傳亦多淆雜而無次先顔回曽参而後無繇蒧固己戾于明人倫其甚誤至以闞止子我為宰予又曰孔子之所嚴事者于周則老子于衛蘧伯玊于楚老萊子于鄭子産于齊晏平仲于魯孟公綽孔子于公綽止稱其不欲與優為趙魏老子産有君子之道四其他不足孔子者亦多也老萊子書今存其為道術尚黄帝老子為聖人所與者不經見子入太廟毎事問况老子周守藏室之史問禮則有子使及見其書曰失道而後德失徳而後仁失仁而後義失義而後禮已不知道徳仁義禮根于人心之固有而視為世降之不同未必不見黜于孔子況為其道乎哉惟蘧伯玊寡過未能為不悖于聖學故與之特深至漢文翁圖石室列之七十二人中亦可灼其非師而寔弟子云晏平仲者如遷之言足以暴其人賊賢之罪何也夫人既嚴事乎巳苟于學術之僻歸宿之差何害于明告告不為止則随以不屑之誨始盡夫師子弟之義焉當欲封孔子尼谿之田乃説其君景公曰儒者滑稽不可軌法倨傲自順不可為下崇䘮遂不破産厚葬不可為俗游説乞貸不可為國盛容飾繁登降累世不能殫其學當年不能究其禮非所以移齊俗而先細民也若預憂一旦代有齊政惟懼醜詆之不力焉夫善交久敬報人嚴事之道者固如是乎哉先儒嘗疑晏子尚儉墨子欲貴其道取必于晏子之言不然何為亦見墨子之書而遷辦之不明也又自叙曰儒者累世不能通其學當年不能究其禮博而寡要勞而少功由是知二語者非必一出晏子乃遷薄儒素定於胷中不易者也遷嘗適魯徒觀諸生以時鄉飲大射其家述眩於規規節文之細彽徊不去以為是足盡聖人之道期正經生博士之汨汨以皓首者也豈聖學為已之切致哉故燧有功于遷而亦有是数者之恨况又甚惑未盡祛于今者也孔子卒哀公誄子子貢以為非禮至漢平帝始封諡褒成候宜尼公蓋王莾假善以收譽将遂其姦謀也後魏孝文法之諡文宣尼父後周宣帝封鄒國公唐髙宗贈太師偽周武氏封道公至𤣥宗諡爵文宣王宋真宗加𤣥聖後昜為至至今遵之焉有若以自生民以來未有盛於孔子誠是言也雖極天下之美諡猶不足萬分一盛之刑容期燧發其目而不深言者一也杜預春秋傳叙曰子路欲使門人為臣孔子以為欺天而云仲尼素王丘明素臣又非通論也期言為獲聖人之心而後世王之堯舜二帝也帝我以夫子遠賢堯舜何王之不可居然後世天下之子有功之臣皆曰王以孔子之聖卒下比爵於其子臣誠不知其可也期燧發其目而不深言者二也其享䣥諸位善乎栁宗元序道州廟碑曰從于陳蔡亦各有號言出一時非盡其徒也于後失厥所謂妄異科等坐祀十人以哲豈夫子之志哉後之時進顔孟並孔子南面别躋曽子以足是十人于非夫子志中之又非者而江之左又進曽子子思並顔孟别躋子張于曽子之舊由孟子而視子思師也由子思而視曽子又師也子思孔子孫也弟子于師孫于祖坐而語道者有之非可並南面燧知四子己避讓于冥冥中不能一日自安其身一堂之上况又祀無繇蒧鯉于庭其失至于崇子而抑父非遷之為傳矣夫為是學官将以明人倫于天下而倒施錯置于数筵之地如此奚以為訓又在在之廟皆泥像其中北史敢有造泥人銅人者門誅則泥人固非中土為主以祀聖人法也後世莫覺其非亦化其道而為之郡異縣殊不一其状短長豐瘠老少美惡惟其工之巧拙是随就使盡善亦豈其生盛徳之容甚非神而明之無聲無臭之道也曩長安新廟成繪六十一人與二十四儒廡畫工病其為靣之同縱人觀之而擇貴臣圖其上蓋肖今人之貎而冠以先賢之名使過而識者抵掌相語曰是某也是某也未見其起敬于他日顧先足來不恭于一時是邦如是孰必其他邦之不為是一嵗再祀第借位于先賢以爼豆夫今之人也其可哉曰是溺習之己然若何而變曰人臣有見上布是區區則可若夫議禮也制度考文也天子司之亦幸一旦遑于稽古之事學禮之臣必有能䇿其一二得所當議者矣至元庚寅汴梁新廟成學録劉元佐為状以其府諸公之意求記其由故燧首之以此其状曰宋建隆中南宫城数里立太學後為國子監金貞祐都汴國日益蹙大城少兵難守度中宫垣大城再城之監當城所經弗便也壞而徙之東南大城之下不及屋而亡皇元受多方始為殿七楹亦廢宫屋也其制度宏麗為天下甲壬子楊中書忠肅公來董括舟役又壞宫取財以其餘為門廡至元癸酉故同知宣慰使袁裕時為是府判官始構講堂于廟西神庖于堂東鑿池其南勢如半璧瀹汴注之擬魯頖水殆足觀矣嵗月滋乆風雨騫屋困于撑拄自總管提刑悉捐金割俸起新之經管則權輿于成某斷乎于杜思敬其同力者同知胡某治中益祖判官完顔某推官姜某提刑使則闍闍都髙某副使王忱僉事劉某始終五十餘年凡資畫十二官而後完富民佐則力以就功者又多也燧曰嗚呼不易乎哉自今師生之講肄于期其移學文之力而篤志于切問近思責其躬以成徳逹才而收夫化民成俗之功于他日斯不孤縣官待多士志矣是歳夏四月記澧州廟學記至元十有四年肇置諸道提刑按察司而澧在山南湖北道所紏郡二十年燧副使是道明年按部至焉拜瞻廟庭未嘗不病其為制之隘陋也殿南閣日六經因語校官張公綬曰易書詩春秋其繫定刪作實出夫子之手周官雖云周公之書冬官篇亡當以考工記與小戴記禮者皆漢儒豈可與是四經班而為六且今四海禮殿皆名大成為改書曰金聲玉振之閣後時議不欲諸道紏郡者錯壤江北南改為肅政亷訪澧遂割入江江南湖北元貞乙未居民不戒于火廟為延燒總管是道者故鄂屯實魯将復之俾計吏最其學租直纔五千餘緍曰是所謂時詘而舉嬴者也乃下令郡士在籍多由者勸之佐為凡又得萬緡委材集工責校官李寓學正張子仁身敦其役而紏郡諸公如副使賈仁僉事蔣某姚某李庭誅郭貫凡至者必促其成功五年而落之其撫構則稽椊人之書為四柱屋古者王居之制也惟太行一山似之故曰王屋重門周序講肄之堂合食之舍庖廪之室燕遊之享秩秩馮馮靡一或遺凡百有三楹周以繚垣百三十餘丈雖未嘗身見然聞之談者舉以為可甲湖之北南諸州豈天者厭昔隘陋火之使改為耶亦偶然也又範金為祭噐二百七十有二竹木髹漆之具三百有四嗚呼備乎哉然嘗思夫子之道之在両間無間治亂古今如饑食而混飲夫婦之愚莫不由之不可一日而離焉固不以廟之存毁而加汚隆國家必聚者英俊髦教育乎是盖須其成徳逹才舉而庸之以立化民成俗之本也則廟學豈不甚有所闗哉以以求之衡之為州南澧千有餘里南嶽在焉舜五載一廵狩所也及誅四凶放驩兠于崇山實今澧之屬縣慈利則放流之人顧居廵狩之境之内戰國時楚都南郢在漢則南郡江陵澧去西鳥鳥逕不二百里屈原之逐常行吟者故九歌曰澧浦澧蘭則放流之所近薄修門是皆不可曉知者澧于其時為黔中秦欲以武関之外易之楚方怒張儀謂曰願得張儀而獻黔中夫以甘心一人寜棄也而不恤固以要荒鄙之也而今也料次户口之繁庻貢賊之征入澧則亞于長河而近湖廣省治岳鄂諸州不能半之豈天時風土有古今之變而人事亦随以遷而異耶士四民一也民庶而士必衆洙泗夫子之居也士為洙泗之言者也澧去洙泗西南將三千里非蜜邇也頼皇上仁不忘逺守土之臣視要荒與洙泗鈞然洙泗也燧嘗至其地焉户不能當澧四之一户損則士不多亦理勢然不知自今澧民沐士之化要荒而洙泗乎士不能㧞民之溺洙泗而要荒乎要荒而洙泗正國家所頼以化民成俗者洙泗而要荒其身之不能成徳逹才何有乎推之人士是之思則居縣官所築之室食縣官所樹之粟必知黽勉其躬圖報稱矣庭詠俾子仁求記所由興作于翰林學士朝請夫夫知制誥同修國史姚燧大徳己亥冬十有一月日短至書于鄂之南陽書院楚椊堂崇陽學記世祖御極之十有七年當至元十有三年宋平凡江之南財之儲府庫賦之産山澤者悉輸京師獨遺貢荘學田仍卑之學俾資教育後尚書用非人大網羅天下之利奪歸之官在庭之士子媒進取而不得者乃希其意求分道鈎覈素所出入于職學之官責償其負而促為期有闗木而嬰笞者士窮士堪至圖其惨以上之帝聞不善也其人罪誅希意者亦竄廢詔還所奪至仁也皇上嗣聖申詃若曰聖人道埀憲萬世其還正貢貢荘學田以為釋奠完廟飬老師生之廪之須至明也為良有司昭都両聖崇植期文之盛在在莫不作新廟學求稱宣化將仕郎主鄂之崇仁簿夏承祖書來諗曰是縣學官二十五年陳或為尹一既完之于今七年可曰未乆迨承祖始治事而入謁也上棟旁楹穿漏傾撓己窘風雨承祖傷之乃割己俸為邑士先萃其附而應者俾龔應旗葛公亮敦匠再完之稱役傭二萬六千錢米不計也願鑱之石為佐則著勞者勸曰夫究心此者狃國人習雅不識書忽不知為也囿文法吏急赴事功迂不知為也非知學孔子如承祖者為之責將誰在哉雖然簿在一邑惟筆朱墨鈎校出入其職其上有監丞焉壓抑者非一人也比其道行乎百里言信乎羣士越而出為為之而成功不制于同官其彊有力歟戞戞其難有倍乎昔尹之為者嗚呼賢者也然以張山翁所記参伍今書而惑焉始為陳尹敦匠者應旗公亮也今而主簿敦匠者亦應旗公亮也以两君善于作室歟亦烏有苟于為心而不固俾旋踵有今之􅀢不善作室歟于何舉所既敗者復使為之而不固于後豈邑士為才無兩君比歟将懲其不固于今奮思改自必異前可不􅀢于後歟皆未足為信也要也非作者之罪也守之者之不獲其力也夫人極其思而創之劬其躬而樂之羙矣完矣舉以卑之職學之官而守之且屋以待風雨者也而風雨亦所以賊屋者也諒非一日可遽隳也亦必有其漸焉雨罅而入㣲而視之曰未害也今日而不加覆焉風有隙而乘徐而安之曰未害也明日而不加塞焉月弛慢而歳因仍以及于隳乃咎夫敦匠者始苟于其事之致也嗚呼果苟于其事歟當佐陳尹之時最其自捐凡為楮緡二千一百可獨當學廪邑士之半曷若靳是而不捐不知于今峽教龔必勝漢陽尉葉桂發徳安尉黄朝英壽昌山長徐逄午教諭趙泰來徐應竒葉常春與煥彭黄裳熊萃老十子者之中其捐有多寡也予誠嘉其始終忠是學也非有故而私夫人曰非作者之罪也守之者之不獲其力也嗚呼守者之不獲其力特不職爾其小者也甚者為罪其間盖江南學田宋故有籍守者利之私櫝其家或投水火以滅其迹使他日無所稽曰城下之日學吏持而失之也或曰其人死不知何歸也以幸述誤乆而為巳産一聞有司將加覈正反肆為謗語訐揚其短恐之使不得竟又有身為教官自詭佃民一莊之田連亘阡陌名歳入租學得其一己取其九又有以已磽确易所上腴曰故簿惟是至與學吏為訟詆譸囂租入庾矣猶掊諸生之堂餽留耆儒之廪俸而虚為之名以徴逐府縣而歸餘其室提學之司又繁為文魚鱗而取之惟與求薦教職入賄為市罪而去者相踵也嗚呼守以是曹譬如以狼牧羊不盡不止也或曰人之言曰髪有疾幘則冒之手有疾袂則蔽之子而記學不諄諄乎教飬之道而惟歴發職學之慝非長者也曰上之膏澤斯士也如何而不善其職者屯之事有急此乎且始疾者猶先其標何也苛痛呻苦之所在也教飬之道如三代以徳行六藝賓興賢能漢舉孝亷經術而庭䇿之魏晉尚文辭猶不遺乎經術隋煬始專賦詩唐因之雖置科明經而止乎記誦又有投牒自售之賤貢舉法法熄楊綰李徳裕極言其非宋神宗始罷之治五經語孟哲宗復賦詩遼金不華者有我世父太子太師公故竇太子太傳公故楊昭父君議貢舉之法在皆朝廷制度考文之事非州縣所得擅擇歴古所宜于今而為者惟得是説而為鍼石庶已罪而未敢者聞之懼其掩剽于㝠㝠而庭臣亦有灼見其然者知所悛也是亦救失之一道也牧庵集卷五欽定四庫全書牧庵集卷六元姚燧撰記聖元寕國路總管府興造記至元丙子宋亡詔列諸道憲司于江之南建行臺揚州以統之後由徙臺建康復徙江東之治建康道者于寕國居有其府徙府于南倅㕔二十有七年燧思士生文軌混同之時亦千載之曠遇江山之形勢風土之㣲惡民俗之澆淳必一求觀遂浮洞庭亂彭蠡而東極海門南折而至乎餘杭于之數者若盡得焉大率宮室園苑土木工麗者皆將相侍從私居而公署皆苟簡取足朝聽夕視而巳大徳辛丑余持憲節使江之東病其堂室門廡凌萃風雨凛乎其將壓也既一改為憲司且然則府于倅㕔者其牧皆取過目前以幸滿秩而去孰有為善後之謀一加繕完哉斯余所目擊者皇慶改元之冬故平章政事子陳侯杞來牧是邦􅊩芝之初因嘅歎曰杞受明命以守此土統屬縣六户二十萬地周千里可十古公侯之國坐視府署老弊不治則為誤㤙乃倡府僚捐俸為的厚直市取府北民居通㑹同塲以廣隘陋圖其樵樓儀門㕔以聼政堂以燕處㕔翼兩室右居府推左居幕府吏列兩廡架閣文鈔軍資庫房與夫庖廐各自為所集郡豪傑受其成俾分為之民用歡趨經始明年之春役不三時如圖告成位置之序輪奐之羙翦然一新大饗落之闔郡之氓稱咨嘖嘖服其神速又闢金光塞門經府前東直青陽門青陽之外雙溪夏秋暴漲泛入民舍南橋植柱中流載板其上朔望謁廟踰此千歩始至余畏湍悍舍馬徒過一府僚乗馬示勇板陷墜抱柱而死北橋之叠石為之水後齧去侯皆為舟為梁又新廟學百楹状其事遣屬吏江杓元盛天佑三千里走郢求記其興作嵗月将告來者因懸度之鈞大役也廟易而府難盖學校之設明詔每飭有司勉勵廟有學田供荘歩泊嵗入錢榖資廪師生猶有羡焉又且士籍不雜民版無有賦役凡厥修營責使佐力夫誰敢違府則不然雖牧欲舉有為其連署則監郡焉同知治中焉判與通焉下乃幕僚属史上下相司槯分而不専動必詢衆烏可一遺一或有言府無公須山虞澤衡皆有例禁財無所于取也民不可擅征而役也是非叢前利害相傾又有以事不巳出媢其成功歸羙他人隂計挽之以幸猶未敢率作上于風紀司風紀者亦非一人必先以不可安居合府諸官閫以改為者口陳于堂足及其家辯告往來懇切悃欵少或旬時不得要領伺其肯曰将審計而徐思之情有見從而始入牒侯其報可未􅅻及民民小人也未知學道夫豈易使于出貢賦佐天子邦經徵劍有期後則刑以随之猶有頑鷔不時入者矧出話言告之正所謂築室道謀者其怠忽前却又不可束之以威非禮致而誠格之使􅇶然有孚于中知義為如子之幹父蠱能是乎哉兊彖傳也説以使民民忘其勞其不信然若是之難其强志一力特立而獨行者事状覓有余以意求而知其勢必至理故然也繼侯至者無徒樂其成盍亦知所自哉侯雖殊其生平而先正則及識之于朝觀其子之能事又可得其教忠于趨庭云不可曉者宣在勝國升州為府及下取属縣寕國為名不嫌于重又金光則唐長安都城西門今猶仍不變焉不知何取取稱于此故俾及之千户所㕔壁記我元駐戎之兵皆錯居民間以故王夫百夫千夫之長無廨城邑者其有統齊徴發之政無丈移惟遣伻銜言至受命大帥或依髙丘曠野為律以行此近代之故事也克哷蘇卜實君長千夫洛陽鳴臯山下由祖暨身三世矣舊集其屬恒即佛宇神祠不然于其私居聖皇中統以來制度寖偹官始有品禄始有秩統齊徴發之政一信于書故軍得以歛是一軍之資買田為廨門以表堂堂以聴事廡以居吏儲身有庫閲射有亭數十年苟簡之弊一朝而新又思居乎此者必有所行警始不敢弛然而怠故書堂曰居敬亭曰觀徳由未識余千里走書于鄧以其友乃滿子先先求記其然余向聞其知學周公仲尼之道者為告之曰今夫人過祠廟必聳肅起敬如有精神魂魄在其上而立其傍者何哉由夫平居無事之時未嘗敬也使平居無事之時恒有上帝臨汝之心則兩間而神其尊且大孰有加于上帝雖日過祠百千而以與敬心一不待有所起而無不聳肅矣敬實人傳心之至言而學者尤狂入聖入基豈惟五典賴是而惇以及應事接物無有此而能中道者况軍旅之之事尤在敬能孔子所慎齋戰疾與夫敬事而懼者也敬乎敬乎其可斯須離而弗居乎或曰射于何而觀徳曰若知夫鑑也明足以燭鬚髪塵弁之久或歩仭而不見丘山此無他見不見之分乎惟兵亦然五兵之長莫長弓矢至不仁之器之王者用以威天下則足以芟暴亂而仁元元功成治定而無所試必世之間至老将宿兵日益耗亡膏粱紈袴之子制外閫焉無賴惰窳之人偹前驅焉不幸卒有狗伏之警使其曹出而禦之而能必其康靖乎古人見其人故嵗訓而時講之于鄊射盖東是不仁之器修之于俎豆之中雖有頑鷔弗率之人相漸以禮而相摩以樂不敢萌唘邪心知尊君親上而易使于一旦此先王維持世綱之宏綱大經也其法主賓有逆迎之拜耦繼有上中之比弓有横郤兼附弛張𢎞度矢有搢投順語拾取之儀行有鈎楹相左之章揖有當階及階當物及物當福及福取矢卒取矢之數衣有袒襲浹拾有説翺有舉偃籌有侯鈞而侯有去負司正有請誘作命之目燕享有獻酬酢旅之莭奠䚜有豐紏過有扑日出即事窮日而休必强志勉力之士能無衰堕以有終否者或取恥一庭也故曰可以觀徳行惟志乎復古者可以言此而君以國人不在禁挾弓矢之科宜于貫革尚武之射何待夫試閲始閑其技其名是亭欲納是身于禮樂以觀徳一方其有見于維持太平者在此而不在彼也於戯其知所務哉然天下萬事皆出吾心而有本有文居敬本也觀徳文也合堂與亭記之夫豈二道歟忠勤堂記皇上立極曽未踰月詔建儲宫位其下者院因裕廟之舊惟詹事肇置宮師府首以六傅統中允洗馬庶子文學舍人學率更司經合掾屬将百人由無廨舍惟㑹佛宇後以不足聳民具瞻下令發官帑為緍二十餘萬有竒市人私第為府君無㡬時病其事少而員冗也罷黜之六府之開府者聴于其家令舊隸詹事徙家者治是府令丞文者将侈其羙名堂忠勤李昭文溥光書扁楣間賜酒燕樂之下令俾集賢大學士姚燧為記燧曰大哉為名臣之居其職而職修授以事而事治為忠以盡其心勤以致其力耳然二者相須忠内也非盡其心則不能本以為勤勤外也非致具力則無以見諸行事而實其忠禹湯聖人禹臣與克勤于邦舜賢之湯臣夏為下克忠伊尹明之然非忠之至勤之極也不可曰克兩聖則然下兩聖者宜如何哉先民不曰賢希聖君之職臣未嘗不以賢官之職其官者亦未嘗不以賢自居不聖焉希烏可冀其克萬有一稽唐六典家令出入承軺車具禮儀先諸官以導祭祀賓客供酒食以為獻主今則増劇領隸民之民與捕獵鷹師綿户稻田自安西河南逺及國都抶登三品搃管者五府與典樂一司降一品者嘉醖一司又降一品者與膳典設典幄三署與供用一庫七品者兩都柴塲在他司則聴于朝而視于夕其㑹與歸猶有恒時是師則不然由供奉之近也出納之富也呼召之煩也需索之星火其急也故傅餐于畫更夜更置始不失其應焉且時有歸㓛酒食嵗上旬逺近味色變者徒勞生重焉啓止勿進亦可謂居職而修授事而治盡其心而致其力其于克也亦庶乎哉抑又間前事之不忘後事之師為今令丞夫既若是将必乆是必階而升後之來者或曹随蕭規則為無負于居斯堂苟或劣焉非獨見貶于月評必旦速戾于官箴矣且為記令六人庫克岱穆爾圖老哈特穆爾張君譲三閭薛處敬惟庫克岱官通奉君譲三閭正奉三人皆中奉丞二人科爾羅尉遲徳誠朝厯經厯完者都從仕都事法哈魯克都閻仕芳皆将仕其年至大三年其嵗上章閹茂其月餘月其日下弦乙酉云舊徳堂記初太師淮安忠武王戡炎趙于江南也詔濟衛士萬人為突騎以盛軍容而撓敵敕㳺江陵澧州之郊及南紀平即割二境萬家之民江陵纔十之二澧獨居八置府松滋不闗中書惟領宥宻嵗集其賦待以分賜衛士而毛君巨源實為搃管李君徳隆經厯宥宻大徳乙巳制以君子易地為之巨源既入而徳隆出或疑徳隆舍是要淮而甘為人制聴命于外㑹燧歸自西江相遭于鄂從而問焉則曰吾家自遼世居縉山距先塋木蘭山甚邇為堂吾鄉将時温凊奉晨夕于滕下大人以嘗主澧陽簿有田車渚顧慕忘歸今則不能留家弟守舍而來便養願名斯堂威夙志焉且示其先太保忠憫公祔葬與太師功徳二石幢記前記作于乾統壬午載太保諱傑以言斥死忠憫其追襲具未三茅官西京馬軍都虞侯銀青榮禄大夫檢校刑部尚書行左千牛衛大将軍開國男佺洺州刺史銀青榮禄大夫檢校左馳騎常侍隴西縣開國男儆散秩大夫守少府監知儒州軍事騎都尉赐金魚袋開國伯偓後紀則乾統丙戌不載太師何諱其文有曰自保寕統和迭承重任徽太師由食舊徳益部時為貴州營内觀察留後檢校司徒兼侍御史騎都尉開國伯惟易将部銀青自若也儒州則保信軍莭度使廬州觀察處置等使金紫光禄大夫檢校太傅御史中丞騎都尉開國侯嗚呼世有以金石刻辭為溢羙無刺或失其事實忽不知信曽未究孟子雖無武成之血流飄杵然亦不遺失二三䇿而取之則于金石豈不可以若是觀矧由以得何代何地何嵗何人何為者匪細故也稽之以史乾統海濱王之始元十年為天嘉又十年為保大五年遼亡保寕景宗之始元統和聖宗之始元推後記上之至保寕巳巳實百三十有六年可考而知太師暨孫三世四為公卿者非金石為賴耶則保寕而下奕葉垂芳珪衮蝉嫣失為何人者豈不益可慨也其曰桂曰洺曰廬皆中夏之州遼非其有必是取名因見其不㤀南噬者儒近幽州唐末所置然名之不可常者惟郡國而山川或終古有不變夫既曰居邇木蘭則縉山豈故治取可大感者其地當居庸交衝經遼金皇元三易代之兵子孫不去其郷尤曠今無有者古之人曰爾祖爾思以取法于人不若本其家之功也扁顔舊徳奚以尚之君復請記余曰君為憲山南按部歸也余叙其行矣作孔子廟于灃新虞帝廟于鼎也余竭其成既三矣其于顯親之孝勵學之力䋲愆之嚴恤民之隠禮神之處亦既言之不逺矣人又記兹人所謂獨私君善諛者君曰昔人有爱呉張旭書者虞得無後寕受健兹之名每于其判状僕其公言區區瀆求豈不一若是乎遂相視一筦而書遐觀堂記長安城西二途西北通威陽王公之開府于此與西南北三陲之使冠盖之去來樽俎之候餞者所出行旅之夥不列也西南入鄠抵山無所適貲乃今承餘則田夫樵婦與城居有墅于郊者所出斯固巳可為倦逰而休仕者所託盧矣二塗同出其逺近無㡬何而喧寂異然亦可見利勢之在與所無也鄠塗之北距城不數里則宣尉張公之别業規園其中築臺為堂崇衺尋大縱廣十轍清風之朝長日之夕四方勝槩極目千里凡秦漢隋唐之陵廟池籞由人力以廢興可弔而逰可登而覧者在所不取其髙上如華陽終南太白嵯峨吴嶽岐梁之竒峰絶獻為三輔之鎮窮日而有者皆環列乎軒户之外而卧對之几席之上余曰遐乎觀哉古人堂者多矣其壮有加于此乎使誠有耶雖風摧雨剥于千載之上亦宜畧存阤然之迹可存于今今則束板以載之負畚以興之以是知無因于前而獨始于公也今我與公属觴乎此夫豈苟然哉百年之身其有㡬何是及賞其成而不及憂其敗也及樂其完而不及悲其毁也後之時或風摧雨剥于千載之下有登吾弛然之迹者曰嘻斯何世何人之為公名不既夀矣乎公笑曰吾何期之何是之久哉苐擇君言與吾堂稱者即名曰遐觀盍記諸余曰公通介貴臣也請與之言臣可乎古之人惟見危受命者故得守莭仗義殺身成仁之名乎可見無死而死猶為徒使而傷勇然則出處之際死生之所闗死生之所闗善惡文攸歸者莫大于為人臣使不遇存亡危急之㑹亦未嘗不以明哲保身保身斯揆道歸義之臣所為也嘗聞之望諸君善作者不必善成善始者不必善終九原作之将無謂秦無人也今之仕者吾不知孰為道義之臣能志功名者亦鮮矣志富貴私身以毒世卒離尤而蹈禍者駢首接踵也是于計功謀利之間且有不能况揆道歸義乎哉究公平生嘗吏民矣又嘗治兵矣亦嘗持憲矣忠炳日星而難不辭于湯火氣呑湖海而信不移于丘山視竹帛之書鼎鍾之勒恒有晚古人薄前世不足為之心以故在宇之百辟山東數州秦俗九路之氓瀘巂荷㫋方三千里之獠孰不聞其名而竒其才沐其愛而怛其威年五十二竟以許國盡瘁而歸鼓舞僮奴干指而食其力甘自儕于匹夫讀書以教子飲酒以樂賓将終其身非熟爛世故遐觀一代之表者能是乎哉盖天下之事遐觀則先識先識則㡬矣雉兎之不能搏人誰不知之突起道左或失色辟易而䘮其常守以其卒然遇之也使前見于數百歩之外雖曰雉兎雖虎兕之暴人得以為偹将不患矣斯不亦吾堂言外之微意乎未易以語他人将惟公可公名庭瑞字天表至元癸未以太中大夫諸蠻夷部宣尉使致仕云又四年丁亥六月下澣日記清風堂記榮禄大夫湖廣行中書省平章政事劉公齊人也由左右丞與副樞與今平章皆在于鄂視齊固為寓舍鄂其家焉肇基斯堂深廣崇庳題莭繪飾勢與省夷嗚呼位不極臣而為斯則妄功不蓋代而居斯則僭有位以功人則宜之求扁于太史公牛馬走為賦尹吉甫頌仲山甫蒸民之卒章穆如清風者書曰清風世喜曰今之人或不如于古使誠不如古人引與之匹固知所譏誠如古人則引者非諛而匹者亦奚憾而多為辭譲今枚觀公其式是百辟者仲山甫也好是懿徳小小翼翼者亦山甫也不侮鱞寘不畏强禦既明且哲以保其身者亦山甫也然是所同若夫補衮職闕于内出納王命而又為之喉舌以賦政于外與四壯八鸞出祖而徂齊者則公無也援桅鼓以先三軍北戍于龍庭西踐于庸髣而南鋤乎交之兩江百戰餘軀鋒職所創發作無莭與令制地廣隕數千里敷施天子徳澤使海宇蒼生無怨􅀈于飢寒悉獲我所者復仲山甫所無也若是究思孰大而多孰細而孰賢豈不易判乎哉然是堂也雖于公獨居非是清風蓬蓬然户至于南荒吹滌瘴癘使民之不罹薦瘥視徒穆如為賜如何也或曰子賦尹吉甫誦仲山甫者誦公其以尹吉甫自况歟走則曰尹吉甫之賢走何跂及然以後妻掇蜂之􅅻逐伯竒而使履霜中野世今懲之九原可作或聞斯言當一筦也大徳辰在庚子二月初吉董氏立本堂記立者顛之反也本者末之負也天下無無本之物亦無不大之本其觀植于乎下鐓則立刄刄則顛鐓大而刄小大為之本而小其末也語學則不然大顧其本而小為之本故天下本國國本家而家本身至于身則居億兆人之一若是小矣要其歸也乃為天下安危治亂之闗則身非獨本一家實為本于天下故曰小者本之故者末之然立本有道而非他立吾身焉耳矣孔子語孝子之終莭苐立身于事親事君之後則立身者惟忠孝之家為克對而無著聞今評董氏者曰世将如漢綘侯世相如韋賢家法則石奮以故十七年故商大参公為今中書左承公時以翊衛指揮使書先正平章忠獻公碑因扁堂曰立本嗚呼非知道者孰能名斯堂非篤道者孰可居斯堂哉後十餘年上以江浙省臣處非其據詔公來換之燧以士生皇輿一軌之時誠千載之曠遇浮逰江海求觀南紀禹跡疆理之槩相遭東呉見其圗畵之叙措注之宜潔白之守任負之力有非喬木故家漸涵庭訓上結主知者不能詩曰雖無老成人尚有典刑孫叔子劣甚叔敖楚王思其先烈猶封之况託忠獻遺體式榖似之者宜聖皇擢䋲父武爰立作相也暇則相語曰昔者商公特書扁耳時未堂也去矣始落矣其諸逐思藁公鄊堂此以告苗胄可以今是堂吴忠獻以大参左相兩嘗開府既薧公季父今承㫖公又大参乎扵去位而公繼至一門再世之間三相而四開府矣豈國家惓惓忠獻徇地是邦撫綏有勞非弟若子不命出鎮不足以繫其民情然歟又益思夫董氏之大立本忠獻忠獻之相立本東吴公不可不原為堂于此也仁智堂記金溪危侯季梁舊家于邑闤闠之南湫焉得聞壌距其居百歩前有溪溪上有池而魚有園可花竹且宅于山水之要有曰翠雲嶺者有曰卓筆峯者有曰僊山者嶒􅗆崷崒竒踴秀躍則山之峙乎前者也有自翠雲闗而發者有自石眼泉而溢者有自白靣摀合流而來者逶迤委折自逺凑近則水之滙于前者也危侯自紏廬陵歸始得以其俸之贏築堂以為讀書之地左竹右木嚮池偭溪春則芳色蘢葱練光繚繞夏則濃陰四合陂澤如秋利則水瘐潦净月焉而益清冬則水落石出雪焉而愈絶殆人間希有之境也堂以仁智名雖取選詩卜此仁智居之語而究其本殆則亦自孔聖知者樂水仁者樂山之訓發之夫動而無窮者水也智之達于事理周流無滯者實似之静而有常者山也仁之安于義理厚重不遷者實似之夫智者豈必不山之樂仁者豈必不水之樂哉本無所輕重其生質則有近于仁者有近人所同有本無所輕重然其生質則有近于仁者有近于智者故其成也氣象似分焉如夫子則元氣不可名也顔子則可以仁言矣孟子則可以知言仁矣雖然仁者必智智者必仁不仁不足以為智不智不足以為仁非智者不必有仁仁者不必有智也苟扃于一不得謂兼體用矣紫陽夫子作精舍于武夷其堂亦名仁智其詩曰雖無仁智心偶自愛山水蒼崖無古今碧澗日千里夫無古今者體也日千里者用也危侯其亦有得于此乎性之仁其情之發為惻隠性之智其情之發為是非充之則達徳也危侯尹髙安其治盗議獄緩刑或以不快人意譏之侯曰吾非不能㫁撃特非辜而誤則不可耳此心也其是非之正惻隠之真乎充乎此言則智仁之達徳㡬矣顔之仁孟之智可希矣紫陽之仁智堂講道之堂也危侯之仁智堂亦讀書之所也必有得乎此矣故記之牧庵集卷六欽定四庫全書牧庵集卷七元姚燧撰記江漢堂記江漢南北之限也三王之徳之封建嬴秦之力之郡縣漢氏則曰吾王霸雜兼封建郡縣而犬牙之是時無有裂幅員而自帝者殆漢始有之徳不能以相髙力不能以相卑雖皆畫是為守而帝南者直不能北有尺地藉以一天下能一之者皆自北而南也故呉自帝晉平之宋齊梁迭自帝迄之于陳隋平之宋自帝我元又平之豈江漢能限世道之否不能限天運之通與嘗合二代而觀之以皇上之冠古無倫晉武隋文何人斯哉然非有君無以開其功非有臣孰能成是功古今人不相及而謀或一揆隋臣不道也晉羊祜首䇿平呉呉平而身不及見武帝追念其功封其夫人萬嵗鄊君于太尉忠武史公其事差似盖公自事潛藩嘗使經畧于汴縂兵十萬屯田千里不専强武而恵信是敦耕商之民錯行其疆不相賊殺有獲俘亡皆生還之雖隣國臣亦許其自負羊公者無慚徳焉于是當曰江漢固已張吾雄噬南紀之本皇上踐阼又以四聖元臣丞相忠書燮和雍熈者十有六年方將百萬之衆南伐至郢而疾詔他將専制而還公于軍其詞若曰畫翦宋䇿汝也成功而疾汝俟何言誠有不諱俾汝之勲班汝之爵予不可必死者之知能知之者非人與汝子孫耶四海聞之以皇上歸平宋公于公之生已賢乎思祜于死及薨有今贈諡又詔其元子格以􅊭章政事行省湖廣季子彬宅端揆于中皆相繼薨又詔中子杠為中書左丞行省湖廣孫燿以平章政事行省江西視封祜妻萬嵗郷又何以如也左丞今至無第于鄴完官屋于居謀名其堂燧應曰曰新堂也非專晝訪而夕修必将嵗時奉嘗太尉其鋪張勞庸揚侈蝉冕報皇上而歸美必文為聲歸之笙鐘侑其利成為詩之名舍曰續江漢者他宜無稱于以格其精神魂魄乗雲御風陟降在庭必懌然曰始為吾室比此千里于時未踰江漢也後數十年吾子乃能尸祝吾於江漢庶其善承先志哉漢祖之誓功臣曰黄河如帶泰山如礪國以永寕爰及苖裔今由河而視江漢曽不得其三一河誠可帶江海猶當為襟計将來及吾苗裔者或終古而無究也必容與依歸不是去焉公曰記之吾思不及者公字柔明以至元壬辰下車人見其不儉不及不豐過中恢乎有容屬屬乎敬坦以明也相與以為託太尉遺體而得其遺風詩曰雖無老成人尚有典刑其嵗嘉平庚寅胐記奎章閣記臣嘗官外每聞詔下惟諭行省院臺行慰亷訪轉達三司與司軍民之官讀已則還之中書或掌于行省院使亷訪轉運而宣慰與職民者省治之職軍者院􅎔之故惟受其成文以行無有所掌三司中宣慰班最髙諭所及者猶無所掌况提舉學校五品居職軍民官下其受成文以行無惑也然其治必居宣慰亷訪所治府州教官聴其約束者其地與二司等此實世祖建元後故事也二十五年始方降詔復江淮多士力役俾一提學自掌其一由是師生鼓舞相語以為平日諭所不及一旦與行省院䑓亷訪轉運者同有是掌卑于名而尊其實其勢反若居宣慰職軍民者上自十三年􅊭宋後所無北方人士聞之曰是豈獨無平宋之後列聖兹降所無實興起斯文萬世之成規也今上皇帝當宁首致意扵學校為分降訪如世祖又加宻焉其宏綱曰聖人之道垂教萬世其目則還正貢荘學田為釋奠養老完廟與師生之廩俾有司舉其才徳亦一提學自掌其一江西提學臣王謙亨龍興教授臣葉聖明相與謀曰至矣聖祖賢孫之恵逢掖也復其力役既富之還正學田以廩其師生又教之俾有司抜其才徳又庸之士生斯時何其幸哉觀今掌詔者多随印所歸秘之私家其完是六經閣表曰奎章鏤櫝而丹髹之錦韜而金鐍之職教之官日夕番直其下庻以逺䙝而少致崇敬亦小臣報上區區萬分一也請諸省臣省臣曰宜俾臣為記臣聞虞夏商周四代之書曰典也謨也訓誥與誓命也其為體者六詔有其五焉曰尚書所請近于謨誕播多方鈞乎誥為法将來則訓俾職教臣恪以持則命先儒謂二典者册在丌上尊閣也今是重屋上以除風雨下以逺塵濕既翼矣金匱其上豈不加盛于丌孰曰非典也耶表曰奎章敬以侈二聖作之君師之錫且風厲是道方千里之士使人人自飭責成徳達才于躬云南平樓記天下有形便之地如衣之領身之項也在戰國時秦函谷齊即墨韓宜陽魏馬陵趙井陘燕易水我守之足以為國敵有之踵不旋國随以亡方地千里且然况楚之襄漢為南土六千里東南兩際海可出戰以入守之領項乎晉羊祜之規以平吴梁蕭野之資以襲齊無不由此者也其甚惜者當顧成廟襄陽下矣守臣百人歌謳思歸棄而弗戍使宋竊築闢荆制圍因唐莭度牙城南門為雄樓扁曰山南東道恃為北鄙以扞天刑豈彼炎趙九鼎時未淪泗耶世祖潛藩嵗壬子炭置屯田千户府于鄧後易為都督府又易為統軍司戍兵積榖與襄掎角凡十五年廼大集天下之兵又長圍六年而下之其明年詔故太傅巴延公莭度圍襄諸軍而濟以新師南伐比其啟行尚下申令斯樓旬月亂漢而南浮江而東瀕岸之城迎下恐後雖驚風之槁葉若瓴水之建髙屋有未易以踰其速者宋社既墟循本以求髙觀而思則斯樓其南平之基乎後為戍守故萬户楊侯珪奉之治事其上嵗久檐傾榱腐人之過之必仰視鞭馬疾馳惴惴然瓦木之擊軋嗣侯萬户顯侯謀新之賦竹石木瓦一軍或勸其聼省命或以為役大作衆非盡嵗成功不能或教小易故敗無大擿修則應之曰事所義為奚省之白吾一軍三抽其一可不再月而落且材已集為苟完計贏将安施分有之乎就省罪其擅興吾不能為請身任之不以累諸君也副萬户張侯塔塔尔岱亦以為然從而鼔舞之不盈一月而㫁手嗚呼果哉大徳蒼龍辛丑端月丙午兩萬户侯觴賓其上酒酣余起謂侯曰是扁山南東道者勝國之臣所書豈堂皇巍煥之吾元可仍夫人之舊稱乎其易為南􅊭樓兩萬户侯跽受曰甚善遂酌酬而椘歌曰翳南土之幅員兮實三甲子焉于兹世祖自其龍潛兮肇豐屯于漢之湄夜火鼓之千里兮晝萬耦其耘耔蓄威武以積嵗兮乃大濟以天下之師三進夾寨而薄隍兮踰五稔乃下之制曰乘勢可逞志兮亦猶鎡基之待時前太傅假以黄鉞兮即襄陽其禡旗将師景從紛若雲兮矕龍虎之陸離曰受誓于斯樓兮義聲先路而交馳齊千萬艘以鼔棹兮江永之不可方思彼孱主知不能國兮組靣縛而頸縻思就是振古之功兮太傳固命世之雄竒匪世祖之祖明兮混庭臣黽勉其疇知緬今在天之靈兮猶臣都而君咨曰授坤輿于今皇兮克玉執而盈持來萬方而臻百瑞兮如舜恭已而衣垂誶曰太史生斯昭代兮亦井坐而天闋乏求金馬碧雞之才兮歌樂職其或宜南書平碣之翬楹兮頌寳厯于無期兩萬户侯無他言惟北向瞻跂曰鼓鼙之臣知捐身報國而已滕王閣記龍興即唐之洪宋之龍興世祖賜今名以封裕皇者也故闢省乎是其治所及北始江而南際之西澨而北盡乎人跡所不可踐者􅅻三分有一地不足並也滕王髙祖支子而視裕皇為世祖元嫡今天子皇考其位與聖又不足並也觀察非有是省之尊所觀察地已于八州亦無是廿有八城之逺之衆葺者支傾補敝故易敗非若今出錢隆福宫一瓦一木不階其舊悉秌而新之如是不變其名猶曰滕王閣盖不欲求勝前人又以見太后之仁也鳴呼得恭記之其侈盛羙當何如㢤當何如㢤今記者之遇閣之不遇也雖然事由可知不可知由可知言龍興距兩都數千里塗非乗輿所出尹府之臣圖閣上之亦必經聖覧或者裕皇在天從二先王風馬雲車遐狩八極過之而一息者人則不得而知也三賢堂記奉訓大夫知輝州司侯仁以至元三十年下車奠謁孔廟已乃謂曰是州學官堂而不陛簡漏至矣薦盥春秋何以稱百事之奔走籩豆捐奉為勸鼓舞士民撤而改為凡再閲嵗殿廡門垣崇卑適宜豐儉居中既嚴以翼人之改觀可十百于千昔矣又舉我先世父太子太師公故翰林學士承㫖王公故中書左揆許公語州人曰之三賢者比股肱元首為今聞曽毓徳含休實在乎此白叟及見而談黄童所聞而知其可不祠乃以羨材為堂三楹于殿之東像而事之元貞蒼龍丙申夏五燧以得告㑹燧葬先公之于輝侯求記之燧曰古之人必其生也世之相繼情洽而道符功夷而徳齊而後死可合食一堂也近世祀唐白居易宋蘇軾林逋三賢一堂而不揆其世不相及貴賤勢殊文章非倫孰與四皓之同不臣秦同避漢之髙帝而同應恵之招成功而同歸死而為墓相邇同廟商於情洽而道符功夷而徳齊也今以三公方之固不如是出處齊同若其􅊭生之相與微顯之相後先同其大者有不得而讓焉矧成功反有過之者合而祀之誰曰不然哉然燧于先公也左揆也承也則為猶子為弟子為故人子親而尊之者也智慮未嘗少及乎是由侯發之使人終死以觀反覆以思損其一則後其相與而失于遺也加其一則所志不相如而難為輩也雖有善權人物者終亦不能推移其間盖以語友也先公生以辛酉承㫖少一嵗左揆少八嵗齒固不大相絶吾姚氏營人先公生于汾承㫖永年左揆河内于輝非絻一旦聚居而為寓公其處同也先公以癸夘來此而承㫖已師是方後将以事趋燕盡前其徒假先公以函文俾師之以無廢受業迨庚戌左揆徙家自魏方先公為相即其年無㡬時先公出應世祖之招左揆獨留師是方其道同也先公中統建元之明年由常侍讀裕皇以東􅊭宣撫使拜太子太師四年拜中書左丞官而翰林學士承㫖詳定禮儀事左揆之聘則在癸丑惟居長安中統之元始召入對至元七年拜中書左丞以昭文館大學士領太史院事去位承㫖則由中統三年燭璮亂徴自海濵輦妻妾逃回濟南世祖忠之始兆入對自講讀為學士為承㫖去位一官翰林三十二年則左揆之相雖後先公而同賛元承㫖之長禁林亦後先公而同為代言其出又同也以語其學得聖徳濟人利物于干戈之際上説而下教贊神武以不殺開文物之先肇太平之基已裨巍巍之化進寸退尺拱而讓人與夫建大義决大疑不瘖結舌視身如捐觸試雷霆與道徳仁義化服一世扶植人極為儒臣宗而不少詭其守于正致君謀國不同為道而同為心其事載諸今史燧與有聞不敢漏于為言以告人者嗚呼君子用世譬則治田不難于耰播而勞于齦根枿于荒世有以是為知言者然後可語三公之易地也先公以十五年卒年七十八左揆十八年年七十三承㫖三十年年九十三其卒若以顯之先後為次與兩公遂其去位先公獨卒官京師盖由于久故請而不釋也與承㫖不後者此為異焉爾今惟左揆葬其郷承㫖雖𦵏天下必時魂逰永年是州東北望永年西南望河南實道里均嵗時合食雖主輝人則先公有田有私廟與墓此者又非兩公之專于賔也又嘗思古者大臣死為明神配食廟庭于以左右先王隂隲下民者也或三公者将終古廟食止一州乎亦從祀有時此起本也嗚呼二家子孫其無㤀司侯始之志焉先公諱樞字公茂號雪齋承㫖諱磐字文炳號虎庵左揆諱衡字仲平號魯齋侯字毅夫觀所事不濫而宜則守土吏民善于其職從可知也原註後是記一年而三公同受贈諡先公少師文獻公左揆司徒文正公承㫖少保文忠公則記所謂有時者豈非不亦億則一中乎大徳辛丑嘉平月戊辰朏謹識牧庵集卷七欽定四庫全書牧庵集卷八元姚燧撰記喬木堂記余讀孟氏書至所謂故國者非謂喬木而謂世臣者歎漢之通侯其鼻祖頭蓬葆而手胼胝百戰以得之子孫恃其有王與民相師非度傳纔一再罪以國除其善失者坐酧金巵惡而免耳幸復念功徳世續之無㡬何時已後效前嗚呼尚何有于故國世臣者今兼有者纔汪氏盖義武公以金亡明年乙未開壁天門山來歸而有隴西廿有四州之地介于羌渾氐凉之間将其衆首殘全蜀諸子顯者忠讓忠烈忠恵忠烈子忠肅三世五公忠讓推節其弟忠烈從憲廟伐蜀盡瘁死綏忠恵斬叛将燉煌忠肅擒叛王略畔國家皆恃為西陲長城自外将相使牧猶廿有餘人名以世世通侯而豈慚焉中統之未詔奪强諸侯之世其土者俾不得而有轉使牧州獨是一門父死而子以繼兄終而弟可及旄鉞相後先圭衮相焜煌自乙未至庚戌七十有六年襲守其土而不變非列聖私之亦克終為下有以致也嗚呼不曰故國謂之何哉校今名臣無亞匹者忠讓之孫懐逺大将軍荘浪路總管安昌求名其堂為喬木且語其故曰國固不賴乎喬木以為故然無是亦以之知為故國何則其始也世臣樹之自夫甲拆而蘖培而溉之而拱把不枉斧斤使得全其天年而後至于喬其極者可表以百尋不然世臣去之故國遷焉則亦何顔而存為匠石所尋資矩矱矣雖有條枚萌蘖之生樵蘇利之牛羊牧焉㡬何不為牛山之濯哉則人所樹也南北異宜南方氣燠葉斾斾然凌冬不改必春而新葉挺出而始隕籜其喬也易故厥木維喬書載惟揚南有新木漢廣詩歌北方氣寒木生于春而夏以長秋而零冬藏之根生纔半年隴西得金氣之先而寒逾早其遲于喬也逾倍他方而史遷曰十年種木百年種徳觀今十年纔拱把耳雖乃鼻祖樹于種徳之初至今七十六年未必能百尋其百尋者非貫千嵗不能以至君能知乃祖種徳之難亦邁種之自身而子而孫而雲仍期百尋乎千載之後則為國益固而臣之世數益多則喬木者豈不與故國世臣相始而相終歟是為記其年二月清明書于神州客舍遺安堂記故上懐㤙監州唐古君齊年友也以燧之生偶先兄命之其不恙時嘗謂記其遺安堂疾革猶促為将啟手足顧言其子師臯曰記成當奠几筵以告嗚呼君欲鄙文忍死以俟而吾遲忽于操牘其真負君哉追記之曰時有治亂故士有顯晦炎漢末世何時哉中原板蕩曹操託故討賊挾天子令諸侯孫䇿再戰而有江東以故龎公荆州焉依劉表葢幸是方無有日尋干戈之大伐事為避地謀耳及表即隴上來候發不官無以遺子孫之問故對以遺安表終其白其心之不欲已臣徒髙其事而去自今思之畎畆果可以盡天下之安乎是有二焉在定在之安有無定在之安有定在則道無定在則義猶權衡也加銖于兩則不安而仰徙石于鈞則不安而頫且錯置輕重于尺寸之間而不安有是焉况大此者乎三仁同事殷矣微子安去箕子安囚比干安死二老同歸周矣太公安為伐紂之師而鷹揚伯夷恥不聼其扣馬安亦不可必人之安伊尹又異是焉方耕莘畆非不安已及湯三聘遂任天下之重一人之身始終之安自不能同者非易所謂時義者乎義之安可推移于一時道猶規矩也哲匠亦此守此有不能捨以為方圎如君止仁臣止敬子止孝父止慈交國人止信非書所謂安汝止者乎道之安可不易于萬世以君生平一官裔夷呼嘘毒癘不難為往既時其出至郡逾年而求終養其親以歸歸有道俾師其子篤其成材與自汴而鄂安而能徙又時其處臣責塞子責供而父道周矣其安于道義者何如君其深思乎故于先民歌哭聚族之地揭以是名其意以為取之古未若師之今與其法之人未若本之今然遺必有受師臯其受者也年方壮矣好學有譽其行于家既如君之孝其家者孝其親其聞諸郷又如君之信之友者信于友推是移忠他日有不能如君事其上者事其君乎君見龎公之䇿可施其時未可施是家于休明之世也大徳龍集辛丑十月記夀萱堂記至元十一年既詔大軍南伐别遣宿衛之臣将􅊳騎萬人出荆州為之聲威大将下鄂東岳湖廣諸軍謀方江陵沙市是軍已翺翔峡澧江陵之郊入聞曰三郡某縣吾所下也封之萬家領以一府俾嵗傳置其賦京師待以分賚衛士毛君巨源由副縂管而縂管踰二十年自燧二憲山南分刺其守寄治松滋也聞唱邑士舉司焉温公真率㑹約而月修之使民知長長于鄊因惟曰弟實孝之推也非善老老其家不知篤此遂友之亦十五年矣大徳之元請記其夀萱堂為賦伯兮之卒章曰焉得萱草言樹之背竊怪漢儒鄭𤣥許慎同其釋而異其文箋者曰諠草令人㤀憂説文者引以為藼曰諼萱同物後本草者亦第言忘憂不及所㤀之方将枵然徒對之耶之耶餌之耶至唐孔頴逹疏之専訓諼為忘盖欲得今人善㤀憂之草不謂萱為草名始與諸説判不相契矣斯堂製名其在于忘憂乎夫曰忘者猶始有憂有待于排解消拂之也使初無憂烏乎施忘燧未嘗及識夫人之几杖以君白髮占之則夫人之黄髪而者其年者從可知也夫以黄髪之親頫而俯其上白髪之子仰而承其下四表之内兩間之中得是㡬家雖啜菽飲水猶胥與樂况宅是光顯而奉以華堂定省以侯晨夕也温凊以莭寒暑也悦其口體有甘㫖之充也伺其色言有使令之偹也是府乆其官而不調無三嵗一徙陸走水浮資車與舟衘橜維節之戒也為之鍳者人嵗訟之至以罪去而獨無絲毫汙盖善慎身羞親之所不蹈顯親之事必立憂情以忘用是道也萱何為哉不然彼閭閻之子力為可憂譴于有司詬于鄉鄰無理之聲日盈親問而富樹萱求以㤀之雖甚昧者皆知其不可也故萱能忘不憂之憂而不能忘有憂之憂疏者未深信之盖亦若愚推類而不得説者也雖然凡耆年之人方歡而歎不疾而呻者情所同然同乎憂乎求易于愉心而快目者莫草木敷華之若或當其時君服命服為夀而前萬室之人其戚且故從而母之得其一莞而忘之者誰曰非萱之徳哉承顔亭記嘗謂人子之事親不難于燠寒其衣㫖甘其味以適其口體之奉而難于承顔以得其歡心斯正孔子語子夏以色難者也又嘗思之夫人之心變動于中千百不動而㡬微必形于顔靣塗人過前其安而色舒志而色厲荘而色専有懐者其色鬰而肆滿者其色揚揚也吾皆得以識之况人子者日侍親側乆接熟伺而不去者乎其承顔也亦易焉而已耳雖然天之厚薄于人者不齊有役是心履霜踐露不及承顔者斯固非人力所為末如之何也已又有生而不學倫理不明㤙爱不篤不知承顔者亦有墮四支束于貧而力不能自㧞不足于􅎵瀡之其不能承顔者力至矣或牽于禄仕仁逰逺適委親而不遑将反曰吾能公爾忘私不得承顔者是數者皆五典之罪人曰仁卿嘗侍矣行年五十而母氏八襄猶康强咸禁不就其色養而仁卿思以終身寕燕休心娱目乃作亭中園周植嘉樹竒石名卉叢篠綺張繡錯麝芬雲蓊者亡慮百品風雪之朝花月之夕稱一觴為夀其間其善承顔者哉詩曰孝子不匱永錫爾類客之登斯亭者内顧其家而及承顔者将同是樂其内顧非家無有承顔者将有不勝履霜踐露之悲則亦斯亭之感之為者矣亭舊其名余病其不關子職也故以易之仁恕名恕遼氏遺裔也由金人惡耶律為字有父嫌譌為移喇後逃亂奔宋再譌為蕭云朋簮堂記天下之道有二君子小人而已矣然各視其為執孰主而孰賓之主而人賓則人從己巳賓而人主則已從人無有無其朋者易之為書本為君子謀不為小人設于小人則懼其為朋故泰之六四曰翩翩不富以其鄰不戒以孚于君子則恐其不朋故豫之九四曰由豫大有得勿疑朋合簮盖豫之為卦五隂一陽九四以才幹之臣上見信于六五柔中之君而無多忌之嫌是以若是易為成功也大傳曰崇髙莫大乎富貴然使爻位之貴孰加于四臣而五君貴之所在富不必言矣而卦亦有専言富者不于他爻而亦恒在四五故泰六四與謙六五皆言不富以其鄰家人六四亭曰富家大吉苟無位之士而富其勢亦與崇髙之一故亦由我和順得志開誠而朋從之則富者又為兼善之資而有朋從之來耶然又思朋從則羣居羣居則必有事為而言及義必也如兊大彖之講習乃有互長相滋之益有必粹也而得其要如乾爻言學聚問辨寛居仁行以行其徳斯盡善矣聞者其然余斯言乎非歟非踐行有素乎驟歟史君生洛渉穰竒士也名儀客仲威其封殖若可比封君素侯力善而泛爱赴急而施積寒士之來歸者争效之浥泉流隨其小大而斟酌飽滿之不虚其往而遂所願欲言其處易時位可當豫九四適余讀易求名詩堂為書朋簮俾揭之楣間盖仲咸與余同邑以年偶先嘗兄之禮意甚至言其可諛况濟齊先生之弟子猶懼其盍簮與燕逰好也故又舉兊象乾文言者申告亦庶㡬輔仁之一道也至元戊子日次實沉歸來園記嵗壬子余與令今醴泉雷君損之交至至元丁亥最之三十六年為故人始余從先世父中書左轄公爱讀四書君與横經几席為同業交不為淺年不為淺故凡見其小不足余意者必為之盡言盖君自踐仕至今三十年位止一令所至與去人稱其賢今老矣不厭不已猶為之将行道耶縣之上莅而壓之者數十府寺守成法而遵之幸且無事苟鬻之其能自用其情折摇手觸禁而罪隨之是其道非易行也将為貧耶諸子孝且克家有脂田十頃終南堂室髙麗固其墅植榆楊雜果數千小者圍桮椀大則合抱充棟梁嵗入絹多于江陵李衡木奴其本富已埒封君素侯矣嗚呼豈余蒙闇之甚未真甞宦味之甘便者耶余嘗激之使委印而去君以故人同業之故受其説而不愠焉此可見其寛有容也然復有優㳺牽制未㫁之言焉曰今遽不可吾必以開嵗某月而行嗚呼君子進三揖退一揖所以礪難進易退于平居也如君所言正如東萊譏魯隠當授即授何謂将授當營即營何謂将營之説也君又不以余為躁而斥已肯服其非是又見其善從人也徐曰吾家有園鑿池其中中池為堂外為四亭東亭藝蘭蘭則春芳取楚屈原之辭曰紉蘭南亭北軒闞池種蓮蓮則夏敷取周子之説曰爱蓮西亭植菊菊則秋榮取陶潛之詩曰采菊北亭樹梅梅則冬花取林逋之句曰疎影順四時草木秀發循環流居四亭期没吾亭獨中池之堂與園未名子為製之余曰屈原之愛君周子之鳴道陶潛之明逹林逋之隘狷能發四賢足矣又可他求為耶詩曰髙山仰止景行行止宜名之曰景山雖然周子為人鄒孟氏之亞其言亦六經洙泗之遺餘固不在淺學之妄論餘三子則皆有説屈原之不忘君其失未免怨懟激發而不􅊭林逋終身遁棄而㤀君又類潔身亂倫其吟嘯多賦近體句律清快可誦者有數陶潛既仕矣則其心為不㤀君知其不可以恥束帶見督郵為目以去正得孔子燔肉不至微罪行之遺意又其言和􅊭微婉猶𤣥酒希聲後世雖有效而和之終不能一造其堂奥三子之中古所謂吾無間然者也園宜以歸來名君試誦其辭将不待人之勸激懼窮日力而歸矣以是為記是嵗十月晦書楚山山房記孟徳麟作楚山山房或疑而問曰古人之樂山者皆有所指名晉謝傳之東山唐白傅之香山宋王舒公之半山雖枚舉之将不能一而盡未有若徳麟之槩而名椘山者因而思之盡禹貢荆州之域皆曰椘宋火維衡嶽崇其髙大與細而丘垤皆則椘之為地大抵人亡慮周數千里之逺也山之為名雖布斗粟為算有不能以殚之之名也而自命之無乃鮮亷而已貪乎使止曰楚山猶曰隨吾厯覧之所至何所非椘何地無山猶足禦人而綴以山房之名乎孟子之言堂髙數仭盖人臣之居其極不過乎是是房也崇不踰于尋文深不出乎數轍今将舉是名是盡禹貢荆州之域周數千里之逺者之椘與火維衡嶽巍大細而丘垤雖布斗粟為算有不可殚其名之多之山曰吾将納之一房則並蔵山于澤者為尤誕也良不信之燧聞而笑曰子辯辯余真能納辯天壌之間二者而已曰同耳曰獨耳同則與人共之獨則我其知之今一世一人鼎鼎所趨逐者意亦曷甞在山意不在山是人之所棄也太史公曰人棄我取余所獨得者也烏乎貪然之山也人有廬其麓者梁其澤者車來其川者舟其川者材其林者藪其藪者曷嘗不與世共之是人之所取也太史公曰人取我與是人所同得者也烏乎亷且以跡求之房誠不足以納楚之山由理言之徳麟生平厯覧之熟或時讀書之休飲酒之醒作詩之暇看雲白畫而眠聼雪清夜以思則夫崔然崒然嶻然岌然藂而離離峭矗而坡陀千變萬殊不易状名者莫不呈露彷彿于眉睫今見納之一枕之上而有餘豈崇以尋丈深以数轍之房有容而不足者耶㦯者舌撟不下惴聾而退噫余由愛椘山買田郊郢以分是風煙泉水之勝而南郢實楚都去郊郢纔數舍亦将名楚山君能視同廬者梁者車者舟者材者蒐者來即共之則已或校其君先将謂余後則余将以郢去楚都踰千里未免以逺近為訟上勞山林聼其直之誰在也徳麟名之紱在勝國為少保佳公子明時在令潭之湘鄊今辭仕而休居焉牧庵集卷八欽定四庫全書牧庵集卷九元姚燧撰記暖翠亭記九江為州居廬山之隂城有二阜焉其一在州治東南一射上故有亭邇南門則都漕公宇距堂西北無有三十歩軔其阜南北延而東西狭巋然獨荒丘辛君持使節来之明年當大徳乙巳而茗産諸河南湖廣江西江淛四省之地廣周且萬里之賦為緡幾九百萬半嵗而集人誦以為前政未有君以事治思有自娛其秋八月作亭三楹八日而成中楹東西為門相直北其墉而南其牖可洞闢以納廬山勝概余由洪江告老而歸首塗疾作艤舟九江五旬而始少間君集同官觴余其上由扁未名求以命之為賦歐公廬山髙辭而慨曰東坡公門下士也其賞公詩則稱滄波萬古流不盡白鳥孤飛意自閒萬馬不嘶聴號令諸蕃無事樂耕耘未嘗一言及是辭山谷坡友也獨甚愛之大書而鑱諸石已一異也其甚異者在漢甄鸞之測海島一立重表累矩無有逺邇而髙深廣袤皆可坐致其前無所遁形于芒忽韓公南山之詩亦復如是且其強韻險語實則歩驟北征然山谷又謂方之北征雖不作可歐之與韓特變其音節爾山谷親為書無乃譏其始作而媚夫繼為乎自後世推歐亦一代文宗是辭固瞠南山後鹿至叙巖岫出縮泉石窈深雲烟變滅之得于天禽魚飛沈草木蕃暢之遂為物道流釋子依居其下大為室屋以侈靡相軋由人力益致夫其秀者非巨筆如杠孰彷彿其全體能爾之盡兹亭取名苟外是焉将奚以今余與君属觴乎此為何時哉當建子月水火地坼而衰日暄融助為明妍浮嵐佳氣綿亘百里容容勃勃泛溢簷户之外豈兹山之英顯幽發微于賢主乎抑為病客而然也平昔之逰熟秦與蜀天宇之濃緑石壁之空青皆身至其所而日接焉角之以是無少退讓于時且然則夫春風方永之晝秋露暑雨晞霽之朝其位簁什伯不啻焉者可意知也其以暖翠名之何如君則曰善君名仲實字仲和號松隠其年日短至書於廬山太平宫易安齋記醫之為業有相道焉伊尹耕莘説築傅巖之野太公釣渭諸葛亮耕南陽之数子者其始豈有心求商湯髙宗周文與漢昭烈之知己乎哉彼四君者知有命世之才可與共天位故或三聘或俾以形旁求天下或見于卜兆或聞之水鏡三顧草廬之中身先求之深拒固閉弗得弗已彼数臣者由禮至情篤始起而應之是與夫醫者不求疾家而疾家懇懇夫我奚以異哉是一也與夫相者見時君任已貳而不專則解冠納履而去是與夫醫之為彼疾家不專主已參以他醫則卷其術不發藥而委去亦奚以異哉是二也其甚不異者古賢相之為治也必當天下阽危之際其君任之信之成焉由汝圮焉由汝而後為相者始自任天下之重展其所藴措幅貟于天下四維之安天下後世誦之曰彼相之才能易危而安者也夫人誰不有疾非必委頓之劣而後為危凡小不康失治于蚤者皆危漸也為醫者惟疾家知之仗之生焉惟汝死焉惟汝而後始敢盡其搦髄擢胄剔蛇斃丈之枝如扁鵲華佗之為而易危為安范文正公之言曰得志願為賢宰相不得志願為良醫其真知言哉醫師趙君濟和鄧之良醫也秦和古之良醫趙君字和其尊其名者已與秦和者符况其讀書多以以濟其術乎其君有亭故扁以易安盖取晋陶淵明歸去来辭也或嫌與婦人李易安名同謂余可更余曰更不必也變去為入聲讀則義意自異矣余思醫與相皆易危為安者故以是諶之然又思余不難于徒居而難于其居之學無師友而疾無良醫焉今穰城有濟和求吾身之危将託以易而安者舍之其誰賴于二者之中先有其一矣朝陽洞記穰秦魏冉候國也余所寓西隣王工部景韓園邇于城西墉因鑿窟室樹桐其東暎蔽朝陽余嘗過而逰憩其中為賦大雅卷阿之辭曰鳯凰鳴矣于彼髙岡梧桐生矣于彼朝陽又聞鳯鳥見濁世之險微無徳輝之可覧翺翔千仞而不下此賈誼所以重歎夫屈原之無時也然由書契而来至于今唐虞夏商周五代略而不道視秦漢晋隋唐宋六代之一家天下者若皆慚徳于吾元亦人生曠世所難遇者而我與子沐洛太平斯洞之中則所際為何時也且漢之中宗未為盛治其時猶致五鳯之集顧于今有不可得見者耶然鳯凰棲必梧桐黄帝之時蔽日而至嘗止東園不去則固致鳯物也其後重華臣禹翦嶧陽孤桐張而絲之為琴瑟及八音倫諧而簫詔几成鳯凰来儀若然則翦桐為樂猶足以致鳯其封溉是桐以待其止或不能致其翦桐為樂以待来儀二者或有一焉是二吾君于黄帝重華也誠及見之余雖老尚能掦厲天休播之金石詠歌率舞以沒餘齒斯區區之幸願也如終不可致天其或者使景韓出而遇能一言而傾四海之聴如古人之鳯鳴朝陽逾美矣奚必飛鳥之出類者始名鳯也耶康瓠亭記金石為物至夀者也夀之極上止三代九鼎淪泗而夏金絶石則無先岐陽之鼓故金始商而石始周則金又夀于石所曰三代者實二代耳余晚無所嗜惟得二代彛器則喜而忘寐行隨而坐皆與之接若多聞為益之師友焉若至親甚宻之晜弟焉其置也褥以文錦櫝以髹漆一不役人而惟身之猶以為䙝也嘗建一亭名曰康瓠而特居之于商則殳丁卣父辛爵禾目鬲周則屈生敦台夫鼎麟鳯罍惟罍無銘以飾命之猶恨厪辨其世不知為臣何王何人先之也漢之鼎壺洗鑑鐎斗鐙鑊方之六物猶王公之皂𨽻故亦班之下陳或曰賈誼所謂幹棄周鼎寳康瓠者譏賢否易處賤尚貴也君之商彜光輝出周鼎上寳之乂極其道所以使君怫鬱斬冤而清寂山林者職此孰曰玩物者非君為道之賢乎何至誣一世之人而詬二代之器矯曰康瓠余聞而笑之子必以陶器為康瓠故宜其言之膠膠余有感而云而古者製銘如卣曰敦作殳丁寳尊彛首字未詳盖殳丁子之名也敦曰屈生始作寳敦子子孫孫其萬有年用享如在或以継上或以埀下類非賊國之臣覆宗之子所能為也必世家鉅室有民與廟諸候卿士之賢哲二代諸侯卿士之賢哲有民與廟為世家詎室者何啻千萬人求其豊祀而儀享者将不人作一器而止于宜乾瀋生熟殊用而異施者莫不畢借而悉陳之有其副焉則世雖有二三鉅萬為数不足夥也秦惟務除先王之道其禍豈專于燔書銷兵為金人鐘鐻者未必無此吾何以知之宋景祐作樂銅不足充以寳龢鐘則世之發諸荒祠敗塚之間售之窮鄉賤肆之下而毁于野人鼓于冶工者又可既也耶今名賞鍳若余篤者世無百人惟嘗柄政一二家積多至数十餘皆一二有亦有一無者以吾所有六物均之世無数百其盪而無迹者曽不如康瓠之百礫焉然則今所存皆康瓠之遺餘也矧是六物㔽梁㫁而爵折戈鬲項穿而罍腐臂鼎盖亦缺康瓠之兆形矣惟敦完然而猶重衰夫屈生而子而孫用享何人如在安在自夏至今三千餘年而九鼎淪泗者千六百年使後是之年如夏至今則商周之金悉為九鼎能獨俟夫萬有年耶余感如此以理要歸而命之何誣乎人而何詬于噐其曰職此而怫􅉱軒冕清寂山林以玩物資為道者真若髙識所燭焉赫羲亭記人莫不有嗜其甚有志者能克純于暫或不能必終身之不蹈焉雖大賢如程子之好獵既嘗庸自克絶自謂已忘之何終吾身又質之其師以鬻學道之進周子甚不然其説及後遇獵雖不與馳逐其心猶躍然喜者存以以周子為知言自今思之獵之事如影之于日聲之于耳既遏而無可尋之迹猶克絶難忘如是况金玉珠璣為物目視之而有形手觸之而有質可以貧人可以富人其利者大前乎吾身而存後乎吾身而不忘其夀也久人既已嗜矣一旦驟然欲克絶而不有之誠難故嗜而積積而至于詎有而人嫉者衆以及于及于禍法書名畫亦物也嵗久則為敗縑壊楮不得不足以為貧得之不足以為冨嗜金玉珠璣者弗顧也雖賞鍳之家求之得以彷彿古人遺意于千載之下雖聚有之而人不争且無禍焉斯非嗜之可為之一道耶余白首来亦痛自戛去此習故于已之甚愛者人或欲之略不留吝箧笥中無十年物可謂不積矣然見人尤物猶時有覬得之心或發口以求嗚呼嗜之賊人也如是乎哉是可謂終吾身不善克絶者之戒也余故有右軍三帖皆出宣和中秘以姊告安和者畀馮憲副夀卿今又又以遺書者畀張縂管夢卿其所存者子鸞而已嗚呼是書也姑率蘭亭永和癸丑退数之以及至元戊子為九百三十六年如曰非真皆出唐􅎔亦五百餘年物也俱可為兩公家法書第一夢卿儒将也其用世才有聞于時年甚盛其事業方水湧而山出非宦成退居託物以怡老玩必敗嫌壊楮之間者也去年自湖湘行營得告歸展先墓即其第省齋為亭東偏求名余思晦庵嘗書湘西嶽麓之頂曰赫羲䑓後至彼為不足以當之将移之雲谷然赫羲之文實原屈子騷經余爱其雄偉嘗名余長安賜第之楼又思彼嶽麓猶不足當易為祗芳今輟以名斯亭而義意思焉為疏之曰羲之右軍名也赫者草明較著之也将章明較著右軍之書于斯亭固可名赫羲由右軍之書而斯亭之名益章明較著亦可名赫羲是亦蕭齋寳晉之例斯得齋記南陽醫師劉君大亨有齋如舟来求扁顔書斯得歸之懼未逹其㫖也又記之曰舊疑叔向譏子産之鑄刑書為非夫作士如臯陶可謂曰能而虞書不曰象以典刑典即刑書也不有所垂示何以使人知避其犯後聞先師談筮謂昔子師可嘗疾診證宜餌峻劑而心猶豫拂蓍扣之遇噬嗑之上九曰何校滅耳凶或者曰弗善也我則曰此罪人斯得之徴飲是而愈燧曰嗚呼世亦有悲有師以疾為罪人方為刑書用獄如醫者乎醫乃生民司命弱者恃以強脆者恃以堅危者恃以安而天者恃以為夀也惟施治神巧使疾不測所禦故能如罪人斯得而昧者為之顧使疾先得其為疾之淺疎肆而侮之遁刑為罪于所攻不及之地以不可必得故先師之詩曰醫能宛轉深求病病亦間闗巧避醫夫為病求愈而卒不愈職誰之由此古人所以有藥石入喉甚于莫耶之歎也且莫耶為物非能自躍而前以殺人必有手之者後世以春秋為仲尼刑書誠律以是為㫁則為法受惡而手莫即者誰耶鳴呼可畏哉然又聞斯語辭也風雅頌咸多作思則思者亦可同斯乎盖天下之事其理則具于吾心弗思則弗得矧醫于疾尤欲致思則思得者斯得之基而斯得者又思得之搆也今醫之居藥市惟知招徕求已者之衆貪得而泛應以幸為利率未暇深致夫思安求能斯得乎大亨非其術可服輩流孰能推而先之以師是州人者服而推而先是州必其為術之宻而善為思者古語有曰官怠于宦成弗思然也醫至于業進而名著亦宦成矣其怠而弗思人情同然大亨以余年先而来有言余可為佞惟稱其所長不進其未至乎故是以警之大亨于醫言将藥石之歟莫耶之歟又在夫思之斯得也學稼亭記孔子之言不可執一求學者由之不可執一居樊遲諸學稼出則曰小人哉樊湏也南宫适問禹稷躬稼而有天下出則曰君子哉若人夫君子小人所以概終身沒世善惡義利極致為言或曰小人細人也其不相及亦不啻什百而千萬而乃進适退湏如此進而君子亦可已矣猶以為未然繼又曰尚徳哉若人豈于稼也學于今者為非而躬于古者為是乎豈湏之問也以已小而私适之問也以聖人大而公乎嗚呼聖人之生徳天也知不知之人也盖當其時雖不尤桓魋匡人之莫我知亦未嘗不與儀封人太宰之知我况湏适日親而月炙宜時化而嵗遷者其知我益非儀封人太宰之可與其莫我知又益非桓魋匡人之漠然不足尤也使湏聞吾不如老農之拒有禹稷躬稼之對意在于知聖人亦可得君子尚徳之稱顧請學圃為問愈下殆于适什百千萬而不啻矣雖然湏事聖人猶子之事父母無隠苟其心所未安必将辯而求義理之真是不憚見拒于聲音顔色而止故能自拔于三千之徒終厠七十二子之列與适也並其困知勉行而後有至者歟吾故曰言不可執一求其學者由之不可執一居者官使然也且官以農為名而曰吾學稼之是羞教督之不先也藝樹之不勤也銍穫之失有秋也使千耦之夫環視其授法如此曠怠而窳豈惟大農他日隨以不恪之殿就曰無之亦非臣職可一朝安也盖君仲修為丞屯田南陽之東穰明年市牛課僮墾莱疇盈数百畆視日晨昕以作止止候時寒暑以趣發歛以一身為千耦之倡故嵗入増多諸屯即墅為亭余榜以學稼所以著夫善其職也雖然視有若可易而事實闗世道之大盖天下之民去南畆逰食擇金玉之易特逐逐於販夫販婦之末岡利相穰于市路而較錐力者為日已久是以錢益輕物益重廊廟恒低估改幣以救之其勢莫之能止也今守令之近民者孰不兼官訓農使聞其風者人人如斯人之善其職亦不可以少復本冨而衰澆風乎仲修由嘗受學今太子賛善劉君夢吉是以始政知所先務天寳壇記壇之名肇于書而詳見于周官書止曰為三壇同墠周官則曰為壇三成疏者曰一成敦丘再成陶丘三成崑崙丘至太史公封禪書曰三坎釋者曰三坎豈三成自趾而升三坎者自顛降即後世為壇必皆三成其取法此又病夫藏祠之時或風雨害其行事也為屋覆之天寳之壇恵慈利物至徳真人作于金亡其時汴南倍百里與宋錯壤小大城皆戍守諸将争撤汴宫資材為楼柵故恵慈得摭其所遺而汴之守臣捍者不彼之禁專視是宫委積在目捷間利将奪而有之適道流族居者且数百人彼憚與闘而止為道流者猶心且覬之未止也益急其夜則燃火構之與通明閣作于一時故故閣上下四周未門壇礱石為之上清宫故物徙置乎此門楹皆未丹盖牽于他營而勢有不至者餘六十年矣資徳大夫參知政事朱公清行省于汴謁而太息謂崇𤣥誠徳洞陽真人曰大哉役乎不因于前也不取材于國也不藉力于民也皆方外之士親寒暑于其肌膚撙衣食于其口體月積嵗進而自為之良不易哉凡今壇閣之未竟役者吾思佐之乃戒其家髹沐之工市永錬朱即儀其門将百闔盡丹壇楹閣門惟丹其陽他方皆墨最其直可萬五千緍提點孫履道由徴朝元宫銘于郢為燧言此且曰公之言曰吾故貧賤宋平而始官賴先聖今聖之徳致位将相吾亦不知吾嘗所由以来義不可為不可得吾銖兩于所宜為丘山之失不爱焉自我得者自我盡之不猶愈于鄙出而力守甚爱而厚蔵一日子孫不能有皆歸之官耶燧曰嗚呼是皆熟于世故明理之言可謂積而能散者也然自惠慈之逝經文醇徳懿知常與虚𤣥應物通和兩真人而至乎崇𤣥凡四人經一甲子以待公豈㫁手有数耶使公初無是志而有求之言出于崇𤣥之先公亦未必滿其應崇𤣥無有自言出公之誠非崇𤣥之徳足以動人亦不可得其所捐若是之多目擊心傳其相知與為何如也又聞周廡尚有缺所公面促其基之豈佐竟之志不已是耶可筆也太平宫新荘記真君殿碑盖龍興據其所見而作及以疾歸留宫踰月與身見而言傳者或異遂更訂而丹書之既入石矣猶有一遺其曰始田履畆纔及三千金萬有竒若合其舊為一而言今則不然由沖静真常凝妙法師湯君提㸃之宫録江州路道教之後之致者獨萬有一千其道有三曰貸取曰施入曰力作余歎其用志之確親勞之多無文以彰之世烏乎知為目其諸荘與地在所及其施入之主之名自多衰之以及其寡今最貸取三千六百五十惟石門千三百八十為多其不足是者啟石二百八十錦溪七百五十石塘九百一十龍岡九百六十上龍溪千一百三十惟啟石居興國大冶餘皆江之徳化最施入者五千三百五十惟翠麓二千二百為多髙岸半之元山千二百萬安千七百福興千七百四十趙陳二千一十惟髙岸居興國之永興山元居蘄之黄梅其故主則厲堅孫項至大餘皆江之属縣翠麓湖口萬安徳安福興彭澤趙陳瑞昌其主周恕胡榮吕師山則福州路同知者與齊永年云力作者創茶磨四所凡四十二盤于徳化荘曰義興又墾田二千肇為五庵宫之前三曰東西太平與紫元宫之後二曰湧翠􅀈峰其始皆菅茅樸􅈪衆所薪牧之囿皆募人錢鎛銍斧而出髙蒔松杉栢茗皆摘實桵子畦而苖之移置其地下種薑芋藷茜與水可勝稻者皆令募人有之其利不入公宫以勸夫未至者余聞之肩輿歴至其所而覠焉經始久者方五年近者一嵗而木之布列岡阜新者雖沒草間而生意茁然久者已離立如人将数萬本其畦而未分猶盈畝焉篁篠則斬梢而不傷其鞭畚故土取諸他山為箇不可計意者倍蓰乎木筍已叢出其下特未林耳君登髙丘指宫林以相語曰聞之故老之山始亦榛莽如是吾所材而用者皆基先民今荒山可芟治者猶或数里天假吾年而為之不置可使盡闢百年木皆連抱後人以資治宫亦吾于世生不虚也余曰嗚呼君之所言正古人所謂人棄我取本富之要也迹是為心何事不可為何功不可集宜人之動盪鼓舞割所爱惟懼施入之後不然彼其家田民賴以食其力者也将以尺帛斗米遺之猶戀嫪移時呴呴然收恩而後以授况是連阡亘陌非有動其心者能然耶余惟久此又聞其将大衆之法道流非有故不入田民家民之入錢取薪炭山者皆給之劵恒遣力人持挺行邏林間盗采者有罰錢穀出入井井有稽㫪磨之細不遺糠籺公宫大庖日炊米十斛可食千人其徒皆就食公堂求必道服以示不䙝職宫事者各有子院有釡鬲不作飲食待翥茗頮水之湏其僮奴之守舍與諸庵逺在数里者為飲食皆日賦之子院不得設塑像旦夕惟即瞻禮于余余問其然則曰子院強則公宫弱強日益富則公宫日益不足不足勢必下求子院一則應再而緩三則柔者徳之以色剛者拒之以言上下之情寖矣不若同甘共苦以公宫宫宫所􅅒養之為可恒也嗚呼他道流能逺計若是乎嘗與一二知己私竊評之白鬚蝟磔有熊豹之姿已見其力足任事加以深沈有謀寡言而信威而和誠而恪視数百人王童白叟約束如一使不為老之法用世而為将帥可以進退三軍立勲萬里今顧為九江黄冠師枯槁山林已是也耶因叙田及此君名徳潤字季玉號香澗其左右君靡朝以夕盡其勞勩忠于其宫同成功者中外四十九人絶諸殿俾可考而知嘗觀漢費鳯韓仁諸碑書多不滿石或三之一或半焉而空其後豈待夫嗣有所書耶故余例之亦法古之一也儲宫賜龍興寺永業田記史稱後漢孝明永平中由夢金大遣博士遵自乾竺求迎其法至函夏或又曰在先漢孝武世驃騎将軍霍去病過焉祁山得休屠王祭天金人則後世範金像佛者實其遺法至唐藩鎮趙王鎔為大悲像于龍興寺具千手目髙七丈三尺以語其大九圍之間無有與京為閣三重五雷覆之厯宋而金補壊為完易舊而新者四百年元貞始元端月八日午時儲皇猶未出閣金岡上師丹巴開長生講修畨漢二疏領講主明公住公僧判迭凡巴求主寺之功徳皇上立極既正元良明年至大之元辰在戊申四月十有五日乃為下令割真定属縣獲鹿𨽻震宫石同北魏劉三邨與官院營之田五千畝賜為永業資開講席又舉太祖太宗世祖成宗四聖成訓凡僧道伊囉勒琨以名與國祈天永命門徭田稅既屡蠲復申飾兵民之官驛傳之使諸郡之臣自今水輪廐馬在野之墅在城之肆是所業無敢千騷祝髪之徒或恃有此肆為不度岡知所畏者則入畏矣明年三月俾翰林學士承㫖姚燧為文刻之石燧亦嘗思惟昔儒臣于弗氏書臻藴奥凡為寺碑必能概舉備言不法燧性顓蒙于周孔書童而習之白首不知其源矧于佛書未嘗一望其塗涯豈敢妄謂曰知然以壓于儲皇之命不敢禮辭故惟即夫賜田以言盖民恃粒食以生彼學佛者苟無田自業勢必見求之人積日而月月而嵗民自有仰事俯畜其家且嵗或豊凶亦安能衰其所有久應其無已之求此諸山無田之衆所由以聚散不恒也今有賜田盈五千畆率以夏秋入止一石當為穀五千姑大其耗糠粃四之猶得精鑿三千日人賦升可食八百人以一宫居而八百人者交無身口之累夫誰力哉其不開講席演法言與國祈天永命者又将何為雖然猶有穽民者存不可不預言之盖由溝洫畎澮之制廢天下無有畔之田必與民犬牙相錯末世衰風讓畔其誰古之人防其訟也既明劵契且書所有質劑于宫以待異日可恃為徴如是又私于界表石以識又虞可轉或十百歩椓􅍻地中穴實石粉計亦周矣而猶不能弭人之争矧是賜也東西南北必畔民田祝髪之徒将奔走服勞錢鏄未耨務盡地力以供嵗事或如弈人布施于局稍蠶食之利其寸尺之畔而資侵以耕挑釁交惡怙勢力取則民将奮起而致死以訟矣今文之終戒者豈在是歟其年夏五牧庵集卷九欽定四庫全書牧庵集卷十元姚燧撰廟碑重脩中太一宫碑勝國昔中土也作三太一宮太平興國于東南郊慶厯于西郊元豐于汴都故隨其方東西中為名中後火于崇寜政和復之其東西見毁者豈在金垂亡恐資敵用為攻具耶何以知之若熈春閣亦傑構也嘗賦一軍令薪之以艱于撤欲火傾之取其餘材束藴已然或惜而撲以滅予于中統辛酉屢躋覽焉及觀黔迹故曉中太一惟半存者豈異然耶嘗求太一所由楚辭九歌首以東皇太一居楚東以配東帝故曰東皇其後漢武感神仙毫人繆忌奏祠太一方曰天神責者太一其佐曰五帝中宫天極星其一明者太一常居也古者天子以春秋祠之東南郊後遣祀官寛舒具太一壇壇三垓五帝壇居其下各如其方祭亦曰郊與天地同太牢祝宰祠太一衣紫及繡五帝各如其方色今不知五帝謂太皥炎帝黄帝少皥顓頊耶抑他有是神也淮南子又曰太㣲者太一之庭紫宫者太一之居至宋太平興國作東南郊猶守其舊惟覆壇以屋慶厯元豐作于西中至以道流易郊為醮祠而不殺牲皆異乎古始者近世陰陽之流以太一與六壬遁甲為三式有司設科試之以驗其學之精疎即書以求壬最先出吳王囚越王石室將赦之越王心獨喜之又恐其不卒也以告范蠡以為十二月戊寅日時加日出戊囚日也寅陰後之辰合庚辰嵗後㑹也夫以戊寅日聞喜不以其罪罰日也時加邜而賊戊功曹為騰蛇而臨戊謀利事在青龍青龍在勝光而臨酉死氣也而尅寅是時尅其日月又助之所求之事上下有憂豈非天網四張萬物盡傷者乎迹此則壬在春秋世已有其説後讀獨孤及八陣記門其將發然後合戰澷不知其如何因問厯翁孫氏子渠云韜鈐之家惟視三門其不其五將發不發蓋三門謂遁甲之客大主小開休生五將謂監本與主因攷沈括筆談太一之外其九太一各自為目曰五福天一地一君基臣基民基大遊九氣十神惟太一最尊不可别名止謂之太一三年一移後人遂對大遊而為之小遊實出誤加京師東西太一宫正殿祠五福而顧居太一于廡甚為失序熈寜中初營中太一宫下太史考定神位余時領太史與議為二殿前祠五福後祠太一各全其尊惟謂三基謂綦者由避唐明皇諱而改不能正之仍襲舊云嘗考其制為殿三重前傍其室中膺慶後太嵗今疑真室為九太一所共膺慶則太一專之如應沈議共以前祠三清事萃九太一于膺慶者豈改于金源氏耶不然天下三清殿榜或直曰三清或曰金闕寥陽無有名真室者亦足證也後陰陽家無太一九氣十神于五福天地一君臣民三基大遊之外别加文昌飛符始擊計神主客參為十六神蓋變遁之小者為參耳又壬用天一貴神者實太一神之一或曰若然是三式相為用者皆出人為何以推人事吉凶得失無不巧發而竒中皇元祝金厯于甲午之嵗宫由凋于兵榱棟傾落牆戺崩弛風雨震凌牛羊陟降知開封府富察君哀之謂非藉名徳之師疇能以興乃書遣警副董徳輝香幣迎致恵慈利物至徳真人于河朔請主上清及是宫上清由規南征撤以造舟真人求得重陽開化真君為道所廬作新朝元宫他不暇為署其徒提㸃張志夷知宫田志淨責使營葺若有緒矣而志夷逝後惟志淨與知宫王志實吳志超提㸃劉道資朱道輝為之積七十餘年而三清殿真室嵗君殿周廡庖廩既美既完泰定虗白文逸真人孫君履道實四傳而嗣其師恵慈之位以有國者作之于全盛之時而數子者修之于已壊之後度力校財不能萬一其舉贏于時詘瘁盡而智輝久其年而勤不少懈迄用有成與國妥神祈天永命惓惓為心其如何也請其友燧宜文諸石遂詩之曰古有國惟上帝祇羣祀禮秩疇與夷太一名肇見楚辭武帝耽惑偓佺思為壇三垓太一祠大牲一以郊為儀千載勝國乃取師去壇而屋凡三為兵惟中存東西隳存者罅漏風雨闕伊誰哀之曰恵慈來前其徒責繕治匹夫位微而功遲甲子一周一紀竒六子迭守成其虧于焉安神神安怡何必三年始推移願于皇輿嵗周馳上錫吾君夀無期左右相協帝績熈中為百辟登稷夔癉共殛吺絶姦欺下與萬方澤羣黎奮張百榖不廩饑凡是厥職神所司廼今國家嵗禳祈峙焉嶽靈流州示與夫無文亦秩之非于天神獨見遺由彼無廟禋安施自爾豐報當有時延釐寺碑大徳八年蒼龍甲辰之秋制移江東憲使臣燧于江之西參行省政十月而至裁再閲月嘉平上弦王相塔齊自軍中啓遣開成路總管府判官常謙數千里驛致安西王教于燧曰吾由不忘世祖聖徳神功文武皇帝順聖皇后深恩大恵常請于帝求即六盤興隆池園為寺用資兩皇㝠福以永帝之億萬惟年制可加賜黄金兩計者二百五十楮幣貫計者五萬米石計者千四百五十規制一以都城敕建諸寺為師而小之又虞衆設顓俾有司緩則後功急將罷力命王相阿嚕威身網維之而時其饔勞節其休作經始于元貞丙申者成于大徳癸夘非託金石將無以白始此者吾之心成此者帝之力也汝制寺名而文之碑其令集賢學士劉懸書徴士蕭􅆽篆刻燧敬受而伏思之今焉詞垣之臣雲蒸林立教不是徴而燧之命實由燧者嘗以文學及侍先王嗚呼可辭敢上本所自面言曰在昔憲廟大封宗室以世祖母弟國之闗中于後立極之十三年當至元九年詔立皇子為安西王以淵龍所國國之明年至長安營于素滻之西毳殿中峙衛士環列車間容車帳間容帳包原絡野周四十里中為牙門譏其入出故老望之眙目怵心齎咨嘖嘖以為有國而來名王雄藩無有若是吾君之子威儀盛者其時犍河之外秦固内地教令之加于隴于凉于蜀于羗諸侯王郡牧蕃酋星羅碁錯於是間者靡不輿金筐帛效馬獻琛輻輳庭下勃磎竭蹷知恐或後其大如軍旅之振治爵賞之予奪威刑之寛猛承制行之自餘啇賈之征農畆之賦山澤之産鹽鐵之利不入王府悉邸自有又明年詔益封秦王綰二金印易府在安西者為安西六盤者為開成皆聴為宫邸用不足取之朝廷嵗或多至楮幣貫計者百三十萬嵗七年而棄其國明年詔遣今王嗣國之四年當十九年益封江西吉州實食之户六萬五千嵗食楮幣貫計者十萬三千春秋之服紵縑為匹各千嗚呼斯又厯古展親之未聞者于吉王未始至嵗惟闗中夏則樂其髙寒即六盤者稽古地者實漢北地郡之略畔道道下于縣其吏長而不令後廢隋義寜中置樂蟠縣既譌略畔矣六盤又樂蟠之譌然以其地介乎凉隴羌渾之交時平則列置盤牧攻駒而蕃息之有警則命將出禦無有常制四海無所為而至者惟世祖淵龍之加兵大理也既嘗禡牙于兹及平而歸又至飲馬最其駐驛三易寒暑夫既久此必遺澤餘波深浹他邦而王父子再世受之古稱河潤九里海濶百里信如憂者又不百世而止也亦竊思之王之有國二十有六年克自卑抑恒逺之宫而弗遑處為天子援枹鼓進退諸軍于外以捍侮西北其忠勤何如于此之地心焉慺慺求祈年今聖于昭昭追福往聖于㝠㝠亦考妣亦與薦焉為宇事佛猶不率作得可而行其孝恭如何枚是數者善美孰與大書之言曰天道福善而曰作善降之百祥易又曰積善之家必有餘慶燧學儒者未嘗知為佛氏之言如佛亦視是忠勤而孝恭者為善而福之則其教與儒可殊塗而同歸也禮諸侯祭其封内山川華之為嶽實王封内嶽之祠門掲而宣釐則表寺之名莫延釐為宜也銘曰於昭列聖事佛盡敬爰質之書古無有並土木之工雕楹繪墉朱塵綺疏匹帝之宫金莖一氣頡頑上下静供之脩乘輿必駕佛遊悠久其言斯存孰為其言百世梵孫帝度其孫而教善治無間邇逺京師必致匪徒致之曰時予師坐而袵連出轡並馳有如今王于親則懿制地千里規為時寺頣指其相展若易然矧錫金粟帝開其先面勢略畔八稔成績巋然都城敕建遺則帝師帝師時是門楣以長以雄匪弟子誰鼓鐘之音梵唄之力釐帝之餘必王見及帝億萬年王年斯千為盤石宗以固以綿燧作是詩刻時樂石尚慿佛乘垂示無極崇恩福元寺碑大徳十有一年先帝立極親裸太室乃慨然曰予曾予祖世祖聖徳神功文武皇帝裕宗文恵明孝皇帝至元三十有一年成宗既祔廟矣而惟皇考實誕眇躬未大尊顯肆類上帝誄行定諡曰順宗昭聖衍孝皇帝琢玉寳冊納諸廟中尊皇太后以儀天興聖慈仁昭懿夀元之號邇之為子逺之為孫其孝以慈可為致極而于宸心猶若未然明年至大之元詔羣臣曰昔朕萬里撫軍北荒險阻踐踰躬擐甲胄北冦底平實艱實棘時有願言皇曽考妣皇祖考妣之豐功茂徳皇考太后之厚澤深仁圖以報塞必俟他日振旅而南大建寶刹慿依佛乘上為往聖薦福㝠㝠慈闈視釐昭昭下而億兆臣民休祥䝉賴初匪有永年千百世專利一已卿曹其灼是懐惟以其日鑾輅親巡胥地所宜于都城南不雜闤闠得是吉卜敕行工曹甓其外垣為屋再重踰五百礎門其前而殿于後左右為閣樓其四隅大殿孤峙為制五方四出翼室文石席之玉石為臺黄金為趺塑三世佛後殿五佛皆範金為席臺及趺與前殿一諸天之神列塑諸廡皆作梵像變相詭形怵心駭目使人勸以趨善懲其為惡而不待繙誦其書已悠然而生者矣至其榱題稅桷藻繪丹碧縁飾皆金不可貲算楯檻衡縱捍陛承宇一惟玉石皆前名刹所未曾有榜其名曰大崇恩福元寺用實願言外為僧居方丈之南延為行宇屬之後殿厩庫庖湢井井有條所置隆禧院比秩二品守以相臣割田外郡收其租入以給祝髮日廩月餼坤維為殿乘輿時臨留必信宿久或旬浹其急其成為何如哉功垂什八期以四年正月八日大慶賛將徧賚工官下及役夫何意其日奄以奉諱羣臣進勸宜如故事即踐天位皇帝未忍宅恤經時而始受朝稱天誄曰武宗仁恵宣孝皇帝恭抑之道亦云至矣又哀先志之弗竟懼成功之將墜飾敦匠臣益䖍乃職罷行工曹入于留鑰曰凡脩營木石陶繪百工衆技汝實司之與煩文移入取汝所何若從汝自為則易為力而程蚤集矣且敕臣還汝文之碑臣管以闕天子以四海為家何適非鄉而獨不忘其生所者人情之同漢祖西都闗中若忘沛矣及平英布歸過其鄉賦大風使子弟歌之曰朕于秋萬嵗魂魄猶思沛太祖奮跡龍庭斯同其鄉由世祖都燕宫室池籞百官府庫根柢乎此一嵗乘輿留居者半以故武宗巡幸之還蒐田而歸必于是焉大饗飲至若鄉然矧建大刹位置行列棊錯星羅出其睿畫為往聖今聖薦福祝釐者尤所惓惓陟遐之日有未訖工在天之靈懐乎故都他日遇之睹是翦然而完粲然而新必甚懌曰畢吾願者真嗣皇為賴哉臣燧載拜稽首為之頌曰鈞之為地匪福不異其異維何由建而寺其地之有于開闢初何千萬年混為民廬何于其時曽不䝉福而至今也梵宮大築曰不難知譬人之身正氣周流隨日而新嗟若梵宫相方視址受其成規維昔天子冩材于江伐石于山言出風行草靡庻頑又假相臣汝匪敦匠易衣寒暑饑俟汝餉于兹三年大立細捐垂欲落之而陟配天皇帝曰噫朕兄所志有銜未究其在傳次乃敕攸司無替爾程其用則取邦賦之經佛宇敕為前古有是而其所無爾聖之治前聖徃矣于佛焉依今聖萬年與日齊輝濡軌長江拳石喬嶽善頌之存先頌攸記重建南泉山大慈化禪寺碑皇慶之元普蓮宗主明照慧覺大歸慈昱書遣弟子嗣瑞嗣泌叙南泉山大慈化寺為歸濟十三世孫普庵印肅所基以勝國乾道己丑示化既累諡矣至皇元大徳庚子實百三十一年昱再為之請諡于朝成廟制可即以其年大徳者加舊諡寂感妙濟真覺昭既之上其褒其徳無以侔大視昔八字猶爝火之當皎日黯不輝矣大叙寺火于至元壬辰之春主僧去之府縣其僚合諸山髙徳請南源山廣利萬安正叟禪師為中經理其廢四年乙未昱始繼席循復完矣當是加謚之嵗再火再繕治之踰紀乃成其録劉必大為國博應奉翰林文字翰林脩撰提舉湖廣省儒學所撰加贈大徳禪師萬佛寳閣圖堂普蓮堂普度橋袁士趙璧之橋敦吉士宋處仁之昭烈廟與立仰山太平興國寺佛鑑大師希陵之夀山慈化寺與主南康開先寺了萬之天竺圓通殿及昱自為髙麗金字經諸記丐燧曰以是為迹銘之寺碑為讀盡卷漫不知位置何地乃詢瑞輩俾圖示之而統其要寺蓋距刹百二十里蓮蕩横前三門之内對峙二塔儲金字經左右鼓鐘二樓中拱二殿相沓前曰普光明以事佛後曰定光以覆普庵塔次萬佛寳閣雨化堂蓮本堂圓堂樓下祠武安忠靖兩王武安之為漢闗羽者世則知之忠靖為五世漢周張翼佐南嶽者則世莫聞廡以周之門左右則東西藏殿儲經三藏自餘齋閣方丈香林書院月臺仍普庵之舊為人圓堂諸小殿僧寮賓館倉庫庖湢再廡周之凡三重中兩廡皆重屋凡千四百楹南泉之上四環其外盤盤如城天竺圓通與昭烈皆在寺北黄圃市夀山之間昭烈則忠靖原廟普蓮堂與橋則在州中堂有亭閣廊門橋當隆興古瑞鄂潭東西南北通塗石墩十四秀江中貫而梁其上有佛閣鐘鼓樓與普蓮各五十楹亦大役也役大財不屈已力之獨其攻金攻木攻石陶冶髹漆彩繪百工無一可後之又衣食其徒多至千人若是其衆也衆則用奢而寺無寸田以自業惟恃昱之言出化行鼓舞作興于江湖西南方三千里地之民最嵗施入多至中統楮泉干計者百萬有竒而佐力操畚鍤具薪爨者猶不與存何脩而臻此哉謂普庵澤歟何前乎此學佛之人不能振舉至昱為人心服而動趨于事者非直其才致然亦有道也且人之情能勉志竭力于一燬之後再燬則弛而怠焉昱不加退規制益侈輪奐益美易曰神而明之存乎其人其不信乎雖然猶當上求其所自西方之教行中土也漢唐而下政朔所及有逺踰海國若今者乎星羅棊錯小而鄉縣大而府州為佛宫者何啻萬區為其言祝除毛髮者其徒又無慮百有餘萬列聖為制不雜民版又屢降璽書禁人無侵覬其産驛傳不宿官物不儲飲食燕樂不聴肆筵囂雜于中其崇禮而保祐之已至矣皇上又以司是僧為正録者衣食有需取足諸山虞日繭絲使就困削為罷黜之嵗一再誦經五千四百八卷天下何啻千藏集祝髪之徒散幣餽食果茗膏燭之微一出公帑人又别加賜馬是舉天下為徒百有餘萬沾浹恩被無有一人或遺也嗚呼昱所以能就事功與人之風行草靡樂推與者豈不亦乘是機偶是時也余儒者也文乃儒之一事言之不文則行之不逺昱其有見乎此逺以求余自非警頴童而習之白首不知其原矧余平生未踐其域不嚌其味者苟剽而强為之知終亦膚近而多所謬失為自欺且欺人以速專門者所疵韓子嘗曰如欲聞浮屠之説當自就其師而問之何故謁吾徒而來請余知守此故不敢效必大之博恰為浮圖説探其懷以與之祇屢書其善興而教日夕祝釐上酬帝力下昭祖徳者而詩之其辭曰普庵肅公僧中之雄由篤其道為世所崇遇有潦熯為民祈禴曰雨曰暘罔不時若衆嚮其化為新攸居日月幾何雲屋渠渠尋復示寂其在勝國八言用褒節恵已極去世悠逺傳之昱孫猶以哀榮上敷帝閽於皇城廟閔其克孝不斥異代加諡有詔維兹大徳表厯紀年不僣誅之其仁立天肅由是名充塞普率雖昱于藍未敢曰出作室燼餘無由菑畬人以賄來如取寄諸伐材赭山鑱礎窮石百工鼎鼎孰後而職杵之騰騰斧之矜矜視址視方其直引䋲栭以負棟實千四百丹漆之塗如翬斯赫嘗觀有司鉅室責為有書以徴有罰以隨人將趨事憚貽已勩巧為避逃猶幸不至于河浮圖無罰與書視所欲為諾不待呼功成不有歸之其祖于橋殿堂必字以普倡其徒干釋言日宣于以祝釐天子萬年天子萬年期昱孫子有來源源世受其祉牧庵集卷十欽定四庫全書牧菴集卷十一元姚燧撰廟碑長春宫碑元貞之始年秋九月七日皇帝御香殿守司徒臣鄂爾根薩里集賢大學士臣布哷齊奏輔元履道𤣥逸真人臣張志僊言臣之曽師長春子丘處機為全真學於寧海之崑崙山太祖聖武皇帝當劗金之十年方事西域聞其有道自奈曼俾近臣劉仲禄持詔求之又急其見而遲其來繼伻以迓之抽兵以衛之與語雪山之陽帝之所問師之所對如敬天愛民以治國慈儉清静以修身帝大然之曰天遣僊翁以寤朕命左右書其言又以訓諸皇子者世祖聖徳神功文武皇帝以敕臣徐世隆載諸靈應之碑惟是太祖格天之年丁亥夏五詔因其號易所居太極為大長春宫由未有碑至是六十九年人已無知受命所自不及今焉陛下昭代曉之詞臣俾刻金石則益不白于將來也敢昧死請制曰可十月十日事下翰林臣燧實以其日直筆故得兢惕以奉明詔臣聞老子曰取天下者常以無事用是究觀厯古受命之君規規務取止乎禹迹之舊其所後服固非兵不能讋故萃衆智驅羣雄謀而鬭之櫛沐風雨露處暴衣審彼已效成敗或累嵗踰紀耘鋤未平可謂紛紛事至殷也矧我太祖天戈所直無敢傃刃視徹四海之土疆墟萬國之社祧與臣妾億兆蒼蒼以生之黔首不啻疾風之振林槁非囿夫祝􅕬蒙汜燭龍不照而馬足所及其勢猶不是止焉庸以較夫聲教不出禹迹者僅如耳之在面有不能居其十一可曰自有生民以來所無惟所有逺故後服益多惟為猷大故乆焉而成功其事之殷有百十于古先者于是之時乃遑旁求方外之士從容暇豫猶功成治定束干戈無所于試之世不知􅂷統之艱苦不待長春之告顧于老子取天下者常以無事之言已陰契其説而𡨕㑹其機嗚呼聖哉然考仲禄之行其年己夘長春承命絶宋金使幣從其徒十八人者以行明年馳表謝之猶宿留北山幸已㑹趣使再至始發軔撫州經數十國為地萬有餘里蹀血于戰塲避冦乎叛城絶糧于莽闃之沙漠自崑嵛四年而至雪山馬上舉䇿試之未及積雪之半觸寒慄裹皸瘃寧其身之不恤以憂軫斯世計是勞勩有不在開國諸勲之下故帝錫之虎符副以璽書不斥其名惟曰神仙凡為是學復其田租蠲其征商癸未至燕年七十六矣而河之北南已殘而首䑕未平鼎魚方急乃大辟𤣥門遣人招求俘殺于戰伐之際或一戴黄冠而持其署牒奴者必民死頼以生者無慮二三鉅萬人其推厚徳植深仁致吾君于羲軒者歴古外臣當受命之初能為是乎匹夫一言鄉人信之赴訟其門聼直其家為有司者猶罪以豪傑以武自斷而渙其羣以二三鉅萬之人散處九州統馭其手帝不疑之斯必有以豈屈子所謂名不可以虚作者耶有遇其時未必見隆于後世祖嘗語其嗣道者曰乃丘祖僊翁朕及識之加贈長春演道主教真人二祖之見而知者然已陛下以聞而知顧為碑以表所由則長春之名藉三聖以久􅂷者毋惑也臣又思之宫之與碑宜一其時太定憲三宗日不暇給嗣教真人尹志平李志常不請則宜以世祖之聖在位之乆其培樹擁衛斯學之力而張志敬王志坦祁志誠不一言焉及僊今請而輒報可豈天固存列聖未究以待陛下為終之耶矧即位踰月為壇夀寧宫凡日月列星風雨雷電百神之親上山川社稷林藪走飛諸祗之親下莫不奏假赤章以禋致之十一月與改元端月纔九閲月實三為壇其後壇之延春閣天步一再親以戾止其為國與民介祉導和受釐請命者文亦極矣又虞自經厄以還禁為醮祠今雖開之京師而外未白也乃下詔萬方其㫖若曰先皇帝令江之北南道流儒宿衆擇之凡金籙科範不渉釋言者在斯聽為若然先皇之開醮祠者有成命也為犯法臣所不愛竟柅而止自今其惟以先皇成命從事是世祖獨未究者陛下又終之也嗚呼事之開也有門而來也有塗其就也有時而成也有候方是詔下四海之人感激奮言始吾以為經厄之餘丘氏之學熄矣陛下嘘而然之俾屯者以亨塞者以通梗其道者除之取其業者還之叢是數美于僊之身又冠之以寶冠薦之以玉珪被之以錦衣皆前嗣教者所無嗚呼僊之求以報盛徳圖以酬至恩其子若孫與雲仍其來無極者為陛下祈永永萬年當如何也臣燧敢拜手稽首而詩之曰於赫我祖帝蹤其武俾肅将之劗平下土既奠南邦西陲未疆廼鼓廼桴龍旗載揚何水不亂無山不越萬國弱草剛風斯㧞踰十暑寒振凱未白六龍之騁确确其艱孰灼帝心休其益閒繼夕以朝黄昊尚友方詔外臣道徳資取崑嵛載舝于于其來及之雪山年已徂摧瀝厥腎膓為告悃悃莫匪至言身國之本維帝孚之曰天覺予飭無怠㤀子訓史書虎符寵綏璽書誕告凡為爾學其復無撓又曰長春而所宿號即名而宫歸主其教假以澤物宏帝之仁于死于俘必拯以全旋還其真子孫衆有一絶一繼孰世其守有惑其道而否臧之人曰不然太祖皇之矧我世祖封植益力曰爾長春朕幼及識太祖皇之維朕将之曽諡四言煥其唐之有嚴今皇乃聖乃哲身先孝治祖塗孫轍爰詔下臣伐石劘穹臣拜稽首二祖之功豈人不㤀維帝欽崇驅馬飛亷属車豐隆或從上帝陟降斯宫靡祥不臻奚祉弗屆於皇我皇萬禩攸頼普慶寺碑大承華普慶寺者皇帝為皇祖妣徽仁裕聖太后報徳作也裕聖以嵗戊午來嬪越三年大帝建極當至元乙酉方廿有八年裕祖陟天在疚㷀㷀茹荼與蓼上以慰安大帝于倦勤中以惠鞠晉邸順考成廟之不天皆俾不大盡傷乃心下為皇孫武宗聖上擇師取友督勸于學俾知先王禮樂刑政以為治國平天下之具若曰乃裕祖獲心九有者正由乎斯外接宗親之㑹見内飭宫臣之率職致孝極慈敦睦示嚴如是而善韜智晦明以藏其用大帝才之闗政于家則曰于婦是謀投大遺艱不言意喻廿有九年順考陟方又二年大帝登遐柱傾于天維絶于地急變秋也徐為圖囬未嘗大聲以色益示暇豫經時無君四表不聞枹鼓以鳴召至成廟于撫軍萬里之外授是神鼎易天下岌岌者為泰山之安俾聖子神孫得以乗承今億萬年大徳二年詔武宗復撫軍于北日侍慈闈者惟今皇上一人耳故情不分而愛彌篤怡言煦之摩手撫之食言而羮息言而廧又伺有無而増益之㑹太官塔納監龍興還由老無子自簿臧獲數千指牛羊馬駝蹄角亦數千田産貲貨猶不與存盡獻之隆福宫裕聖則曰吾何庸斯其賜今皇上四年裕聖上僊撤是獻屋為殿三楹事佛妥靈以盡孝思由前順考之國河内未至而還乃與今皇太后克成先志出居二年成廟登遐馳歸京師内難謀作兆緒滋章先事奪之殄殱大慝清宫以待武宗之至既踐天位惟以其月授皇太子寶中書令樞宻使誕告萬方明年至大之元視昔所作圖報弗稱乃慨嘆曰徳一也時則二焉始之報也吾未出閤惟其身今也登兹元良可不為天下報乃市民居倍售之估跨有數坊直其門為殿七楹後為二堂行宁屬之中是殿堂東偏仍故殿少西疊甓為塔又西再為塔殿與之角峙自門徂堂廡以周之為僧徒居中建二樓東廡通庖井西廡通海㑹市為列肆月收僦贏寺須是資大抵撫擬大帝所為聖夀萬安寺而加小其磐礎之安陛戺之崇題楶之鶱藻繪之輝巧不劣焉亦大役也未嘗發民一夫皆傭工為之其費一出宫帑既其落止浄供之修薦福㝠㝠或者裕聖乗雲御風陟降自天歆兹崇報必反而酬陰隲于下降福穰穰者理則有之何難灼見焉惟今皇握黄圖以負丹扆其大則天其威則雷霆其不測則神明惟是報徳而上之将不裕聖一世而止其孝思逺及烈祖者何窮已哉崇祥院臣請礱石以頌功徳敕命臣燧臣伏思之佛氏之言為書數千卷博大閎肆學佛之徒猶有白首不能遍觀儒生未嘗夙一經目雖勦為説終爾膚近不能深造其㣲故惟如敕所教惟詩報徳其辭曰有岑其宇有踐其廡有楹惟旅金鋪雕礎瞿瞿其瞻劌劌其亷秩秩其正於粲其嚴伊誰考斯帝宫亞匹則今皇帝覺皇氏即其即以圖薦福于幽於我裕聖報徳是求惟我裕聖為烈無競大帝遐征儲席虚正時我成廟撫軍龍荒惟朝委裘三月皇皇萬里召赴天位畀據其神而明孰測為度如是拱黙宫居深安陋昔后毋簾政僣干惟撫慈孫于學知勵又開太平大業今繼始為之小其報猶私今焉一人以天下為以天下為孰專裕聖嘉與慈闈實普其慶徃聖已矣慈闈萬年翼翼綿綿悠久如天皇上之心初豈以已覺皇貞之其錫繁祉江州廬山太平興國宫改為九天採訪應元保運妙化助順真君殿碑天下之人有安居不為其事者乎安居不為其事古曰閒民重其賦而刑隨之今也山林之間羽服之流幾何人哉苟安居不為其事人亦孰倡而致于其道庸心其教哉制授冲静真常凝妙法師提㸃廬山太平興國宫録江州路道教湯徳潤儲贏于儉蓄細為大者十年始田履畝纔及三千今萬有竒謀其徒曰之宫廬山名祠也九天採訪應元保運妙化助順真君明神也殿實勝國所為既㝠且卑妥靈弗稱其撤改為江西行省左丞吕公師䕫及其弟福州路同知師山行金玉局縂管師寛淮西江北僉憲師順江浙財賦縂管師謙與諸子姪發米于庾割田于郊捐幣于帑為鄉隣先故富室佐財貧者輸力如恐人後為殿七楹度髙百尺以祠真君夾為翼室右祠三官左祠四聖皆三楹前為拜殿合之衡廣為尺百有四十縮身不足于衡十八之四若其攻金攻木埏埴設色之工殫極其技無遺巧矣遣其弟子熊應松周祖清馳書龍興請燧曰斯宫之興五百餘嵗勝國盛時加號應元則皇元有天下之號已兆形於斯時迨今海㝢既一大帝至元二十有一年三十年今皇元貞改元之明年大徳八年凡四降詔一賜提㸃周得一餘皆以賜徳潤其于衛持斯宫使人不敢雜揉瀆侮略于其間禮亦優矣徳潤以是龍光洊至廬阜載躬重未云喻惟有奬率道流竭才新殿奉安元辰日夕祝釐祈永睿算維億萬年庻幾深山友木石者報上之智畢于如此願銘之碑謹併上圖經匡廬得名與真君事實惟擇筆焉燧諾而思真君靈貺數百年為有國欽崇章章傳記者無庸重述未問而當告與疑而未瑩者敢用陳之其引朱子傳書排以歴陵博陽山為敷淺原其山卑小惟廬阜在大江彭蠡之交最為髙大宜所當紀然考禹貢言原非一兾之太原徐之東原雍之原隰皆以髙平得名何獨岑絶如此廬阜可名原耶太抵是書載導河積石至碣石其間所經如龍門華陰底柱孟津洛汭大伾洚水大陸九河逆河入海又及其所㑹之水灃涇漆沮之入渭澗瀍伊之入洛亦何詳也至岷山導江東别為沱又東至澧已跨蜀而荆數千里矣又曰過九江至東陵東匯入海數語而止亦何略也故朱子論曰以事情理勢言之洪水之患惟河為甚時龍門九河事急民困勢重役繁禹親涖而身督之若江漢則地偏水急不待疏鑿或分遣官屬徃視况洞庭彭蠡之間三苖所居水澤山林深昧不測彼負險阻頑弗即功則官屬之徃者未必遽敢深入是以致誤者或多也因昔余昔拏舟成都至䕫門其所未至去秭歸三百里耳秭歸而下至江隂望海門而還長江萬里浮㳺殆遍然蜀荆之山條脉聫絡壯觀天險者如眉之峨眉嘉之離􅕞渝之瀛山涪之鐡櫃䕫之赤甲白鹽巫山及峽之黄牛危巖絶巘刺天入雲何啻千萬與三十六江水㑹夔門者皆所不書其見遺者豈獨廬阜哉要朱子之言千載不易者也其曰廬山始名南障由周桓王世匡績學仙所廬故名匡廬圖經已辨晉人紀者之誕所未問而當告者自周而上無為老子者何有乎今之祝釐時天子諸侯自求多福皆有禋祀禋祀多名合而言之天曰神地曰示人曰鬼神非直上帝也日月列星風雨雷電凡本天而親上者皆神也示非直后土也山林川澤丘陵墳衍凡本地而親下者皆示也人鬼則宗廟社稷凡有功生民死而廟食者也天子既祀天地圜丘方澤至于時巡則又燔柴四岳随其方山川皆望秩之不遺無文諸侯四時望祭其方五官五行山林川澤在封内者亦嵗徧之後王徳薄不能時巡既曠望秩于方岳諸侯復不世其國遷代無恒而嵗徧又廢其封内惟道流之宇名山川者由祀其師以及其土之示雖未有疈辜薶沉牲幣之備而潔齋以致忱者晨夕至焉國家以其依居嶄㧞竒峭幽深繚鬱當氣粹淑之㑹其神必靈賜宫觀名置官領之時大醮祠庸以奏假赤章上帝后土與本天而親上本地而親下凡曰神示可介祉導和斯世者莫不致之為位多至三千六百亦幾秩無文矣實于時巡不舉之典修之其宫顧為有國者之所頼焉嗚呼亦有功世教之大者也然惜其知神之神不知神之所以神何也由雜夫荒怪也其尊無對大無餘者皇天上帝一而已矣有曰上天神后者盖天言形體帝言主宰后君也與帝同出而異其名天子曰元后人臣匹天子者亦曰后春秋王與后之鞶鑑書伯夷禹稷為三后則后者又君臣同稱昧者不知上帝后土視之巍乎其無朕也聽之漠然其無聞也而造化之迹則體乎萬物而不可遺乃以形求肖人為之上帝則冕珪衮舄以為失耶詩刺衛夫人玊瑱象禘胡然而天而帝屈原亦曰龍駕帝服若真有是人被是服者其來亦尚矣哉甚于后土加笄珈䄖翟七政一也日木火土服殺上帝月金水殺后土山林川澤之為王為大人亦若斯者奚足殫紀夫誰與祛之勝國之謬尤在増號淫昏之鬼婺源祠山梓潼之屬皆帝之是則尊矣其如降上帝與之班何今事實所謂九天採訪應元保運妙化助順真君者九天之屬見於天問注以九為陽數之極固無大窒于理唐李玭碑止曰廬山使者廟南唐曰通元府勝國太平興國中易廟為觀以年命之神宗進號應元保運真君徽宗易觀為宫刋鏤玉冊臣而進之于時洪芻提㸃是宫奉安玉冊實為之記舉録異記開元十九年明皇夢神人金冠朱衣乘車而下曰我九天採訪使者當館我于廬山明日又降于庭命吳道𤣥圖其真建祠山隂明皇親書繆篆殿額以賜其文惟曰九天使者之廟無採訪之稱後世加焉其榜固在也然原以求之非必權輿有唐東晉之前方士輯五岳真形圖為書曰嵩岱華恒皆有佐命之山而衡岳孤峙無有夾輔黄帝請命上帝建潜霍二山為儲君青城山為丈人廬山為使者開元中天台司馬承禎請立五岳真君祠使者之廟當作其時其説詳而止據而不鑿謂可祛齊諧志怪之惑者真知言哉理宗又加妙化惟助順者無徴焉然使也銜君命以出者惟人也不能周知善惡之實彰之癉之故採以資人之見訪以勦人之聞神示何假人爵以為貴賤等威佐上帝行四時以運寒暑日月于上觸石而出膚寸而合天布大澤雲雨不終朝而施博大出百物而潤澤于下神變功能如是其聰明正直而一有不待夫視宜無不見不恃乎聽宜無不聞正老子所謂天網恢恢疎而不失者如必採以資見訪以勦聞而始福善禍淫斯人則不採不及知不訪不能通失將衆矣烏在夫為天網耶余故惜其知神之神不知神之所以神者此也盡辨之其説猶多姑是舉隅焉耳非獨使讀書以纉文造道而明理如徳潤者知之可以髣髴鬼神之情狀而不溺于所聞鬼神聞之亦懌豫于㝠㝠是燧斯言曰千載而下特見有如之人不可以非道誣也銘曰維大旴晧下土是冐羣望降釐衡岳如卑南服之山匡廬莫夷有􅏭其岑有育其麓衡虞材之烏用不足氣聚金寳騰輝中霄上與列星爛其昭昭倐噫而風隨以雲雨千里崇朝膏潤斯漙造化之迹不掩如斯皆本二氣良能之為維古哲王及始圖報由時岳狩羣望必告嗟哉後王曠不省方或事云亭侈愆舊章維方外臣竊取咸秩大為醮祠無文毎及盤盤之宫負聖治峯其師湯君言出衆從設格普天三千六百為位勃磎神示安宅撤搆斯宇髙廣異先鐡鷟金鋪尚副揭䖍爰奏赤章媚于上下不約而一萬福來迓資我元后山積川増維千億年萬方其承走為之詩俾爾羽服鼓鐘新宫步虚是續牧庵集卷十一欽定四庫全書牧庵集卷十二元姚燧撰廟碑報恩寺碑報恩寺者女僧妙徳之所創也徳金城韓氏子考諱誥任兵馬都元帥彰國軍節度使其先仕唐遼金大顯徳適晋陽王氏王氏佩金符為工正生三子而夫卒乆之子娶婦各能自立徳悉以王氏業歸之而繁畤之聶營元帥有别業昔以與徳徳将老于是既而聞有語其考方國初用兵際搜討所愾于山因燬諸佛廬事徳愴然深念父武徳為國闢地之功雖大亦多斬刈焚盪之惨曩同氣百人今存者獨我吾婦于人而又寡子既植王氏矣吾其事浮圖法庻得以資福韓宗乃削髪為比丘尼即聶營别業創殿像佛第建食堂厨庫前翼三門後敞丈室而贍衆有田如千頃及山林園圃水磑等利號曰報恩寺仍以沙門某見開山住持見即工正之弟而身别院以與尼居徳翊運勲臣之後趣向孤夐名達于徽仁裕聖皇后召見命坐賜之僧衣而元貞璽書及皇太后教两下以麻衛其寺是年裕聖幸五臺徳實從眷睞優渥及還駐華嚴嶺命今衛王阿穆格及親王妃主從官數百人以香幣至寺尋以寺為衛王集禧所今徳請紀其事于石余學周公孔子之道而于佛氏之書葢未暇也夫未學其道而為之言必將有戾徳又女僧也而志得吾文余辭之為宜然金城韓氏與吾先令公為姻戚而元帥公奮迹戎行克振世業武而不殘風誼藹然其後當著顧無聞焉而徳也出大室嬪貴族諸子有立乃割愛剷榮棲慕枯寂閔其父家中替求資福于浮圖而劬躬所事事集不居可慨也已况其寺復為家集禧之所而歸美報上臣職攸在揆諸義不得終辭雖然寺名報恩将孰恩之報耶若曰生我者父母也食我者大君也謂覺皇氏闢大法門儲福利崇其像設冀收善果延洪聖歴于億萬年而宗支同茂覃及其幽明濟度而有獲斯酬其志亦足書已遂次第其顛末而系之以銘文曰偉韓鼻祖穆于周武奕奕梁山變雅用取于後裔孫國以姓之不侯而民何千萬斯其千萬斯中絶不後漠乎無聞安所為究嗟維徳君生侯富驕移大盛門諸子翹翹三十而嫠介操勤志悼其考澤遽斬一世祝髪而僧曰韓吾承即其考田佛宇肇興期以報徳昊天罔極迹是為孝展婦之特且虞吾身而不永年僧子以孫斯宇頼傳俾爾歸離奉嘗宅相是其為言聞者惻愴我則譬之天與人殊嗟今諸韓胥彼桂如自根而幹而柯而葉為葉茂繁何啻千億其間豈門一蘀先零夫亦何害貫古青青在人視之侯之家索自天者視猶一隕蘀西銘有言民吾同胞矧爾同姓四海滔滔反覆始終理亦昭晰覺皇貞之韓氏未絶希真先生祠碑王氏自其大父義年四十生棄其父定定四十一亦生棄君與君凡再世為男官始李冲虚居丹陽菴後以奉金主元辰京官朝朔望祝釐隘陋縣官易殿廡為雄麗賜額丹陽觀君年十七從冲虚學者十九年師卒初即汴藁藏後遷之其鄉徳興龍陽觀塋居三年還汴再居丹陽觀汴人敬之如見其師四方賢士大夫假舘其廬無有虚月雖其徒厭譏不䘏也視其尤寒窘者或質衣為具歸之其施如此其入也殊有擇初汴受兵有富人将逃亂藏金二穴去後數年來訪張人觀聴即詐䘮服若發埋骨者兆緒将見謾諸役夫可市取祭物僅探得一穴恐禍已不暇及其餘也約公取之而歸我其半指藏所去去而其主死竟君死未嘗語人無有知其處者與之期事雖風雨寒暑未嘗爽言于孺子問以前朝勲戚大家事其言亹亹能傾究其隆赫衰摧之由聽者忘倦皆可筆之野史亦知為詩精于賞識装禠書畫盖與其師及從翰苑諸公逰故聞見獨不囿于道流之狹也年八十五至元十三年十二月十三日無疾而終前終二年為塋曹門外表之以碑凡夙與其師相友與非其師之友嘗名價重一時者皆具棺衾移𦵏其中又各傳其鄉里世次年夀為誌以别墓至是其同門友王道祐及其弟子張某者𦵏之新塋從顧言也後七年族姪埭自汴至長安無他營求惟誦君夙昔之賢曰是埭所善也且其為人亦公所詳宜銘其祠燧曰王君賢也王君方外人無形勢可藉以動人子徒以故舊而不忘之為計其乆逺子亦賢也君諱道清字正之河中臨晉人賜號希真純素大師銘曰謂為不夀耶年幾九十而人誰與夷謂為夀也耶享止其身而後者嗟誰由尊其所聞而不疑行之曰君所安我又何悲哉噫從享其師表祠有碑平昔之善載筆于斯尚俾來者可考而知有元故資善大夫中書左丞贈銀青榮禄大夫平章政事諡武愍公李公家廟碑燧嘗觀人臣私廟之祭易乎古而難于今三代不論也漢之時功臣侯者土地人民傳及子孫故嗣侯得以致隆數於其祖考世世無有所殺後封功臣皆虚邑無有土地人民子孫或官卑力微徃徃不能為廟與雖為廟以記曰父為大夫子為士𦵏以大夫祭以士祭既用生者之禄勢有必不能致隆者姑借先宋氏言之如文潞公作廟洛西其先未嘗將相顧受祭將相潞國嘗将相者其子及甫惟得祭以大夫禄是于不為将相者致隆其真為将相者復加殺也如斯者幾何人哉惟吕正獻恵穆于文靖范忠宣恭獻于文正世其將相者史冊二百年間纔一二見事亦曠世希有者也然自中元以來漢人父子繼相者故丞相史忠武公與今資善大夫中書左丞贈銀青榮禄大夫平章政事諡武愍公二家重輝襲芳震耀一時豈獨為之子者信敬于昭昭厥考亦足以慰靈于㝠㝠矣惟李氏家隴西成紀者實秦将信諸孫漢至六朝門閥世竣惟與崔盧鄭世姻不連他族唐季王西夏甚彊盛雖宋金嘗加兵終莫能服我太祖始平之其宗有守某城者獨戰死不下子惟忠尚少求從父死為今分土淄州諸侯王所得于公為考後以金符監淄州有子十三人公次居四王妃愛其頴異嘗子之在先朝故事凡諸侯王各以其府一官入參决尚書事公代其兄為之李璮為逆有迹淄州君獨從公馳聞璮繫闔門獄中璮誅得出上書賜償所亡失授公淄萊路奥魯總􅃹後改宣威将軍益都淄萊路新軍萬户與城夾寨圍吕文煥襄陽四年而下之加明威將軍虎符丞相巴延南征宋兵戍郢十萬城西郢鎻戰艦絶隘為陣我舟不可越乃渠黄灣拖舟泛藤湖以出唐港棄郢去畱公後拒敗其追兵行㧞新城沙洋下復破夏貴楊邏口下鄂漢陽從故丞相阿爾公時以左丞戰荆口擒髙世傑下岳進沅沙市下荆南傳檄歸峽辰沅靖澧常徳諸州皆下之又徙鎮常徳左丞狥地湖南丞相兵及淛泗以地逺援疎詔公與宋都統張茂實吕師䕫闢都元帥府江右公為左副都元帥破劉槃軍下隆興擒熊飛建昌撫瑞吉贑與廣閩諸州皆下㑹宋幼主出降其将相陳宜中張世傑挾益王昰衛王昺浮海趨福立益王元以景炎閩廣諸州應者十五郡縣豪傑亦争起兵公出定反地大破吳浚軍十萬南豐浚走如張文虎復合兵十萬又破之兜港伏尸三十里浚走合其相文天祥瑞金又大破之天祥走據汀别将孔遵窮追併破趙孟瀯軍復其州而還龍興守帥覬利鉅室罪以陰與賊連已誅夷百三十家公還白其非辜出其未盡誅者獄中帥府改宣尉司加昭勇大将軍同知江西宣慰司事尋加鎮國上将軍福建宣慰使又改江西宣慰使天祥復陷汀州收兵出興國又擊走之追四百里及之空坑散降其衆二十餘萬禽趙時賞以下文武将吏數百人拜參知政事行中書省江西益王殂廟以端宗世傑復立衛王元以祥興移柵海中崖山近去廣治四百里授蒙古漢軍都元帥經畧廣東進復梅循英徳與廣之清逺走王道夫擊凌震海上獲船三百艘禽将吏宋邁以下二百人又破其餘軍茭塘江淮省亦遣都元帥張𢎞範至自彰與共圍崖山勢計窮蹙度不能國資政陸秀夫抱衛王蹈海死獲其金璽其将吏死焚溺者十萬餘人翟國秀凌震皆降世傑遁去風壞舟死海陵港南海平朝京師上勞苦之賜宴其将佐之有功陞者千授資善大夫中書左丞移省荆湖凡虜民男女奴鬻之者皆罪而正之常徳辰澧沅靖五州大荒民至易子以糴為發廪賑之所活為口亡慮十萬計征占城詔使給糧仗造舟海南取得其宜黎儋之民勸趨之疾還詔從皇子鎮南王征交趾敗其兵天長府其王遂舉國航海将舟師追之敗諸洋中獲海艦三百始公䇿城天長儲榖待賊敓衆議不果盛夏軍士疾作漲潦冐營遽議旋軍賊躡敗吾後拒王以公殿賊閉永平闗傅藥弩矢射公貫􅂰負瘡敓闗出竞以毒發薨思明州年止五十最其平生小大百戰下城邑百有五十為户三百萬嗚呼其亦勤已後薨七年而贈官賜諡封公之命始下玊音仁煦恩重書棺人臣獲此褒榮極矣公雖不可作已安知其不骨肉九原耶公諱恒字徳卿自號長白篤孝純至淄州君卒方擊両王閩廣淄州君顧言我死必無訃吾兒使㑹喪縱敵南海平始克銜哀摧動屢絶且薨謂所從曰為我語晜弟妻子吾不得以時喪先公既抱恨以終天今復棄養太夫人而身先朝露于是遐夷吾目不瞑下泉矣其謹事之夫人王氏視分土諸侯王之妃姑也訃至夫人秘不敢聞之姑惟發哀私室公則再見夢太夫人曰兒今死戰日南矣太夫人泣言吾再夢如是豈誠然耶夫人始情告曰婦恐無以安姑氏心也覆是乆矣始位哭服䘮嗚呼死而精魄猶惓惓其親可哀也已可哀也已子二人世安以監廣州從朝京師授新軍萬户同知江西宣慰司事再嗣公益都淄萊本軍萬户後以正議大夫仍将本軍僉江西行中書省事再陞中奉大夫參知政事行尚書省江西尚書省罷今以上官參知政事行中書省仍江西嗚呼六官而三踐公武已可見其才之無羞子職者自其既相亦解兵其弟世雄以宣武将軍将之乃作河洪之詩使歌以祀公其辭曰李氏之在與水細大河洪姑臧有夏而王越三百年傳歴既長極崇而墮亦天之道日月作矣衆星匿曜王孫始卑徂東自西淄水幽幽束楚之流曰位不豐猶監一州有蟊吾民有梟吾土吾力不能天子肆汝從父奔告帝嘉為心寖向用公廼渉潛沉泱泱漢水南紀所恃為地襄陽金湯陛陛公将萬夫長圍四禩而竟下之岷江失藩沿流列城振落摧乾至莫難一文軌判裂萬里収功九重授䇿維是武庚狂志復殷爵人號年大蠢甌閩終兄弟及公膺奮擊與鬬四年崖山翦克血其䲔鯢南海無波廏馬笥衣其賚如何帝曰汝烈冝置左相授兵而子西護湖廣公拜稽首天子萬年帝徳聖神臣何力焉湖廣聽命壤三千里陰翕陽施賞刑自己及兵占城轉粟黎儋歸佐皇子致討日南不測風洋冐履而三由淄而漢由江而海其渉日深蜚聲日大蕞爾南夷曰尺箠笞狃勝者衆輕于出危賊䇿我師不能炎暑雕弓綿綿犀甲敗雨避來弗迎邀歸以争既奔先編左廣亦傾孰作士氣公殿奮武斬輻短兵援抱鼓鼓格鬬比死冠纓不顛裹轊馬革踐迹文淵維昔禡時皂纛有翩廼今旋歸粉篆丹旃兆寢悠悠魂魄遼逺致身移忠惟孝其本黼扆思之録其庸勞寵幽上公可謂曰公亡不亡公有良子亦秉國鈞實法實似有嚴作廟籩簋維時神容與耶去此奚之維淄維漢維江維海其流或枯廟主斯毁何以麗牲樂石峨峨太史詩之以侑以歌袁氏先廟碑嘗謂天下之人光顯其家者由二道焉一則曰積徳有漸二則曰成功有㑹之二者不相資以始則相須以終如升也有階而搆也有基開來有門而來也有塗無有無所乘依而徑得者且千金之子将運千金之資猶不輕以相畀必擇善賈可付而後授况造物者儲靈竒之氣賦經綸之才假光濟之具俾佐興太平之業非求夫修仁潔行善為燾後之謀没身百年窮躓不變未享其報者之家他子孫孰克當此哉葢袁氏由髙王父而下皆以諸生學修于其躬道行於其家化及於其鄉下吏禄而本富于田者四世一轍而公受之始克大施于今嗚呼積徳之難也如此夫而成功之難也又如此夫髙王父諱亨曽王父諱廸王父諱企京父諱鐸公諱湘字潤夫位至延安路兵馬都總管其功烈之備年夀之至子孫之麗燧已最而敘之墓碑其可以屢書者今申言之曰方天之訖金命也提王公佐一節度之師來歸吾元㧞之鋒鏑之下而卧之袵席之上脫民兵死狥地鄜延拓境千里凡負險羣聚資人為糧者莫不投甲相率而至去民盗死治延之初假之種牛而授以耒耜免民饑死自燕市藥負以百十馬牛即城為樓居之致醫司掌為劑其間有以疾來者視所宜藥與餌不求贏利去民疫死至今州民戴白者道舊相語猶泫然指城樓謂曰吾司命也昔漢朱邑為桐鄉嗇夫其惠止于未嘗笞辱人且死其子曰後世子孫奉嘗我不如桐鄉民必𦵏我桐鄉自今觀之一鄉之政非有夫千里之治也嗇夫之貴非有夫通侯之位也不笞辱人未嘗日拯民于死也奉嘗者民而非歆其子也然魂魄猶裵囬戀嫪不忘其土無惑乎公遂為明神以禍福斯民嵗時妥靈享黍稷之馨于其孝子之手也廟在今延安屬縣膚施之東川去府治十里外袁氏别墅取延民之助祭之來之易也其年至元十九年其歲庚午其子昭勇大将軍克忠前隴右河西道提刑按察使凡今廷臣之平章人物者必曰袁昭勇和而嚴不伐有功賢而有文章可倚以集事可謂能顯親無間言於子責者矣後之子若孫惟無他求其孝以是為師作迎送神樂章俾歌以祀公其辭曰延阪兮上下延山崯﨑兮其童如赭延水湍駛兮不可以溉田天早霜兮又不宜于多稼城巖邑兮無衍夷公何為兮安畱斯慕吾義兮懷吾仁曰我延民兮吾父母之公逝兮再紀民過其廟兮其敬益起延故老兮淪亡其存今者兮匪孫伊子生者逃亂兮奔公為依死者白骨兮魂魄公歸矧公後兮鼎昌子奉嘗兮孫尸華衣兮綷䌨金章兮玉帶總總兮林林來廟庭兮覲拜歌鐘兮舞鼓蘭烝兮桂糈舍登數兮偹儀公飽徳兮焉所公何為兮睨顰曰哀繭絲兮日窭吾民曩者五袴之家兮或今也無􅃭吾又何心兮獨樂乎余身公子孫兮聞聳羣民子孫兮感而繼泣謂公逝兮幾年猶闚有無兮于余一室公神明兮若兹苟有善兮将知我祖父兮且毋公欺我子孫兮可公鬼饑子越兮父令婦齟齬兮夫命俗斁兮紊常公不刃誅兮猶殺之以病稼我田兮蠶吾桑糗我腹兮完我衣裳輸賦孔時兮無復倉箱無重俾公兮一日増傷牧庵集卷十二欽定四庫全書牧庵集卷十三元姚燧撰神道碑宋太常少卿陳公神道碑大德戊戌燧舟遊湖湘而陳公元凱方持憲節使湖之南既求追撰妣夫人李氏埋銘為粗叙陳姚同為有虞遺裔矣後五年燧持憲節使江之東而公以總管來莅建康馳書請曰吾八世祖宋太常少卿公以治平二年卒塟洛陽其後子以官為家死不以返塟故于太常墓失其地所曽祖少中公訪而得之筆地之名與距城幾何里歩以詔後昆志亦勤哉㑹荐離大兵終無有能至者七十餘年矣元凱始成其志如所筆發墓驗之果得范公鎮所撰誌銘摹以蠟紙副以家乘願為銘樹石以表墓道燧受讀之其先頴川人唐遷于京兆廣明中違亂于蜀家眉之青神其可系者瓊生延禄延禄生贈兵部侍郎顯忠兵部生希亮即太常公太常生京東轉運使忱轉運生簡州司士參軍揮司士生金儒林郎灝儒林生國子監丞克基國子生耀州三白渠規措使仲謙規生皇東東平勸農使膺農使生嘉議大夫建康路總管兼管内勸農事則元凱也子敬立最之凡十二世聞者慨息以為非清風素望之名孰能完有家乘得其傳次如是之多哉燧曰是足為多乎哉苟推其世德而上之之十二世者又十二世而一耳嘗讀太史公書至其叙傳于司馬氏受姓所從上起顓頊子孫官居功烈文辭下及其身而止豈顯親者不嫌自明宜然耶故燧例之由譜姚氏亦逺本曰黄帝生昌意昌意生高陽是為顓頊顓頊生窮蟬窮蟬生敬康敬康生橋牛橋牛生瞽叟瞽叟妻握登見大虹意感而生舜姚墟故姚姓舜三妃堯二女娥皇無子女英生商均一妃癸比生二女宵明燭光禹受舜天下封商均虞城以奉先祀服其服禮樂如之以客見天子示不敢臣傳夏厯商三十二世書可見者虞思箕伯直柄虞遂伯戱五世耳至虞閼父為周陶正武王頼其利器用妻以元女太姫生滿賜媯姓而封諸陳以備三恪是為胡公胡公卒子申公犀立申公卒弟相公臯羊立臯羊卒申公子孝公突立孝公卒子慎公圉戎立慎公卒子幽公寧立寧公卒子僖公孝立僖公卒子武公靈立武公卒子夷公説立夷公卒弟平公爕立平公卒子文公圉立文公卒長子桓公鮑立桓公卒弟五父佗其母蔡女故蔡人殺太子免而立佗周太史過陳使以周易筮之遇觀之否是為觀國之光利用賔于王此其代陳有國乎不在此其在異國非此其身在其子孫若在異國必姜姓姜太岳之後山岳則配天物莫能兩大陳衰此其昌乎佗取蔡女數如蔡太子免之三弟躍林杵臼共令蔡人誘殺佗而立躍是為厲公厲公卒弟莊公林立莊公卒弟宣公杵臼立殺其太子禦冦完與禦冦相愛恐禍奔齊桓公使為工正齊懿仲欲妻完卜之占曰是為鳯凰于飛和鳴鏘鏘有媯之後將育于姜五世其昌並于正卿八世之後莫之與京卒妻完以陳氏為田氏聲之近也或曰食采田完諡敬仲生田穉孟夷生閔孟莊孟莊生文子須無文子生桓子無宇桓子生武子開與釐子乞釐子生成子恒及楚滅陳而恒得政于齊生襄子盤襄子生莊子白莊子生太公和遷齊康公貸于海上食一城太公㑹魏文侯于濁澤請天子求為諸侯天子命之是為田齊太公卒子桓公午立桓公卒子威公因齊立威王卒子宣王辟彊立宣王卒子湣王地立燕齊楚三晉合謀各出鋭師伐齊敗之濟西燕將樂毅盡取齊寶藏器湣王出亡及莒楚將淖齒殺之莒人立其子法章是為襄王田單大敗燕軍迎襄王入臨淄齊故地盡復為齊襄王卒子建立秦始皇帝兼天下滅齊虜王建遷之共自商均國虞至是千九百六十三年矣此吾姚與陳始同為虞中同為媯卒同為田之未分者後建三子桓稱王氏軫將陳氏而不及昇豈昇仍氏田耶自是田或多失傳次王莾自以桓裔追封完為敬王以田豐為世睦侯奉敬王後莾死豐子恢辟亂過江居吳興改姓媯五世孫敷復改姚姚惟陳可以世求軫生秦東陽令史嬰嬰生女成安君餘餘生軌軌生審審生安安生桓桓生願願生四子清察齊尚齊生源源三子寔崱䆳寔字仲弓後漢大將軍掾屬文範先生生六子紀䕫洽諶休光諶字季方獻文先生生青州刺史忠忠二子佐和佐二子凖徽凖字道基晉太尉黄陵元公生伯眕建興中渡江居曲阿新豐湖生匡匡二子赤松世達世達長城令徙居長城下若里生丞相椽康康生盱眙太守英英生尚書郎公弼公弼生歩兵校尉鼎鼎生散騎侍郎高高生懐安令詠詠生安成太守猛猛生太常卿道巨道巨生文讃文讃三子談先霸先休先談先梁東宫直閣將軍義興照列公霸先代梁猶以姓號國曰陳諡武談先子曇倩繼立諡文子伯宗繼立崩文弟曇頊繼立諡宣傳子叔寶亡陳凡五主三十二年叔寶四子莊𢎞徽某某㑹稽郡司馬司馬生某晉陵郡司功參軍司功生兼右補闕翰林學士翰林三子監察御史當大理評事萇秘書少監京少監以從子鹽官令褒繼鹽官生高安丞灌高安二子伯宣伯黨伯宣著作郎生旺旺生機伯黨生元史元史生徽温州司户參軍其自軫至機三十九世晜弟列者正書其傳然自廣明至治平實百八十七年以三十年一易世率之為六世太常而上四世其不可推知者二世耳嗚呼載籍以來不隕其世德者惟獨一門吾姚氏則自梁高平令可系而至今者二十有六世其上則或絶或續匹夫之家其可少覬哉嗚呼亦有甚可感者古人為誌納之壤下必載其世次官勲實用備或世變時遷人有竊發知為何代大賢君子揜之不忍及其匶焉初不預為裔孫克念其祖求徴而謀也今元凱悼陳氏入蜀中㣲太常公始震而耀之亦其家之鼻祖也故既發視𤣥石而得其真大封樹之碑表賁道刻石人獸如其始定于三易代八世之後亦古未聞者故燧感之且敬焉推吾逺本三千歲之上皆有稽于竹帛者詳次授之非足止慰元凱于生死而有知亦必有吾同姓表章及此其庶幾乎孝子不匱永錫爾類者耶因為楚人之辭歲時上冡使歌以祀其言曰峻南峙兮崧高阻西鶩兮函崤趾北邙兮坡陀壖洛水兮波㴞㴞堂封兮偃斧古為藏兮幾何所既夷兮已焉有不夷兮疇焉主將帝私兮之家俾鬼護兮神訶待裔孫兮為告頼𤣥石兮不磨維裔孫兮思慎其守不忍嘿兮求牛馬走曰先志兮其成庶階兹兮來嗣可䆒余亦虞兮遺苖匪妄胄兮華遥其統緒兮可尋具方册兮昭昭年數千兮世踰百生民祖兮或幾及豈伊神明之後兮不與他族而中絶于何孟氏一言遽必五世而斬君子之澤坐令自今讀其書兮亦取二三武成之䇿重曰往者兮垂芳來者兮自望勿替兮休聲與媯水兮濟悠長高昌忠惠王神道碑上畋桞林二月六日丞相臣大都平章臣扎蘭宣徽使臣拜逹實克御史中丞臣布延直侍行殿丞相臣托克托丞相臣圖沁特穆爾奏金紫光禄大夫遥授右丞相宣政使徽政使臣阿拉克布哈言臣伏自去年言念祖考往事列聖嘗著㣲勞妄干威顔請褒幽隧聖量含𢎞曲賜允俞為降誥命追贈臣祖考布爾噶推誠賛治化臣儀同三司太傳昌國莊愍公考銀青榮禄大夫平章軍國重事宣政使翰林學士承㫖領泉府司事逹實宻推忠益國輔治功臣開府儀同三司太師上柱國高昌忠惠王祖妣呼特呼訥完顔氏金源貴侯從封昌國夫人妣高昌王夫人臣雖糜軀補報無所惟有刻諸金石用章天休庶幾先烈託垂無窮敢昧死請制曰可太師臣托爾濟延丞相托克托又言昔盗殺大臣嘗求王文忠公褒揚其功文忠不可其碑故存請發兵士如千百人挽之制曰無庸其令十象輦致仍敕翰林學士承㫖臣燧集賢學士臣愻翰林學士承㫖臣仲夀撰書篆額臣燧稽首承命謹按王曽祖考伊喇克們實竒爾氏初以百夫長事王汗可汗之為大號自唐以然今惟曰汗王今所加故兼稱之曽祖妣夫人托琳齊諾生圖卜布哈齊哩克薩理斡罕哈喇斡罕四人太祖方以神武戡定朔漠王汗與之有間圖卜布哈率其屬二百户來歸徑永古特為其王所止居之蒙古勒地遣其子約蘇穆爾偽為商至帝所控宜然帝遣托掄薩理必塔台二人使永古特王阿勒呼木實克齊呼爾所召其弟與二百户者偕來帝問圖卜布哈在王汗所何官曰為質也俾仍為質宴享則賜班坐大臣位帝征西域盡率其屬以從㑹旌戰勞賜回鶻户五百四十有八在太宗世又從帝弟睿宗平金明年乙未詔定憲宗時以兩諸侯王與蘇布特再征西域又率其屬至有在行中明年至衮騰吉斯與諸侯王巴圖會征欽察俄羅斯至阿蘇齊黙斯城皆先登薩理斡罕夫人哈喇哈納生昌公蘇布特逹巴太宗分封功臣割順天屬縣束鹿𨽻昌公初掌睿宗奏記睿宗上征事莊聖太后領所部民千户歲辛亥憲宗立極從莊聖所求致之詔蒙克薩勒為丞相昌國位其亞天下庶務惟决二人又領諸王副徹辰道伊囉勒琨大食蠻朝覲貢獻敷奏宣發號令諸事明年因敕掌帑藏與祠祀醫卜諸臣于昌國原申前制後二年蒙克薩勒卒領中書省終憲廟世權寵不移四子長故湖廣行省丞相額森布次故御史中丞茂巴爾次王季四川行省平章布哈特穆爾王自㓜事世祖初與令太師淇陽王伊徹察喇同掌奏記後獨掌第一宿衛奏記兼監鄂拓克總管府持為國假貸權歲出入恒數十萬定緡月取子八釐實輕民間緡取三分者幾四分三與海舶市諸蕃者兼户部尚書内八府宰相如馬湩酹郊燔肉告神皆大祀也惟王司之又諸臣䘮疾可通籍入與否必是焉白詔凡祀釐金帛惟視其署有司始給十八年升總管府為泉府司丞相哈喇哈遜嘗奏罷之二十有五年王請復之其年東諸侯王納延叛帝自將往征王前茅而後殿之詔諸侯王而下生殺惟命亦既底平明年其黨一王哈坦又叛成宗時皇孫詔王將衛士千人從討之大破其軍獲輜重不可貲筭哈坦挺身走引分海隅歸奏衛士疾戰之勞請人賜白金為両五十制可及改制制為宣政院以王為使凡天下職僧之官何人宜為從所調奏祝髪之徒入罪罟者惟與是官同聽有司不得專决二十七年叛王罕都犯西北鄙帝又自将往征至杭愛王累戰皆㨗叛王逺遁撫安邉民與置驛傳而還明年拜榮禄大夫泉府大卿凡諸侯王副車贄壤奠至庭者王則傳臚受之成宗元貞之元罕都遣諸侯王額琳沁出兵犯西陲帝召王曰卿名素重非身往不可卿能行無對曰効死臣職惟陛下命加銀青平章軍國重事十月獲額琳沁與所部偕來大德三年兼翰林院學士承㫖領泉府司事最其賜賚珠衣寶帶清東青鶻白鷹及豹出中帑外坊者月異而歲新之不次計以大德八年七月二十有五日薨享年五十七葬狼山水峪二子丞相其長結桑衛皇太后實世王官掌傳臚都王副車凡贄壤奠初尚諸侯王葉卜肯公主布爾罕再尚諸侯王阿濟格之孫公主都掄呼都拉次布喇尼敦宿衛乗輿内八府宰相銀青榮禄大夫大司徒遥授左丞相使太府院翰林學士承㫖娶廣平忠武王女布哷齊女二人長特濟格為東平忠憲王子大司徒鄂都岱夫人次女姑姑為諸侯王瑪納斯妃孫女古濟格為諸侯王哈濟妃因嘗槩王自元甲子以及薨年迨事兩朝朝惟近清光一日未嘗居外實閲四十一寒暑世之知者纔是職守與從蹕討叛數事而止自餘朝夕訏謀左右彌縫入宿出衛所以奠枕九重者其功將多中禁深秘外不得聞惟帝知之故雖没世猶不能忘特崇其爵于百揆上王之高昌使臣隣無以復尚匪獨其身又貴其子兩皆入踐台衮矧其晜弟從子布列中書宥宻者猶衆有之嗚呼盛哉銘曰人臣之位等絶數異進爵及王為世極致嗟王生臣祖宗兩朝禁近身居蜚聲逺遥帝崇象教王使宣政九有祝髪竭蹙聽命王在泉府舶交諸蕃匪利貨還來逺志存疆埸雲擾王每從討險阻踐踰帝躬是保斯皆其外人所易知毗賛于中誰悉宻㣲其悉宻㣲獨今皇上哀其沒世大賁𤣥壤異姓而王胙之高昌潜德由斯爛其昭章猶若為未襲賁其胄丞相聨翩兄先弟後婦王之女女王之妃伊誰能方門閥巍巍龜負螭挐碑是賁道填金載銘天子之詔湖廣行省左丞相神道碑初公以中書右丞下江陵驛聞大帝為大燕三日曉近臣曰巴延東兵阿爾哈雅孤軍戍鄂朕嘗深憂或荆蜀連兵順流而東人心未牢必翻城為應根本斯蹶孰謂小北庭人能覆全荆江浙聞是肝膽落矣而吾東兵可無後虞朕喜以此御筆為北庭書昔魯爾罕希逹所生阿拉克實喇為大將有功信實聰明而安詳其加卿為阿里烏嚕諤齊徳濟伊克恰集賽安班平章求之億萬維臣之中降是宸翰昭乎雲漢之章藹如天語之温崇功襮德匪夸一時可華及子孫百世者纔公一家視古丹書鐵劵出臣子手者何足道也即江陵民封之千家始公㣲時侍燕惟席地坐後特置榻班諸侯王愛實布拉下賜之金罍曰竢至而省必合樂鼓其曲飲是他雜以青白縹色龍鳯御服御㡌金玉珠帶白貂裘西錦珠衣海東白鶻凡所以侈服貴近由娱其心者靡不及公嗚呼盛哉公北庭人妣夫人圖沁呼圖克化胞生剖而出公考額森和卓勿善也將棄之夫人未忍益謹鞠公㓜聰穎而辯長躬農耕喟然曰大丈夫當樹勲國家何至與細民勤本畎畆釋耒去求讀北庭書一月而盡其師學甚為舅氏實喇岱逹爾罕所異歎曰而家門户其由子大及從事大將布琳濟逹俾其子故中書右丞相呼嚕布哈從受北庭書又薦其忠謹得宿衛大帝潛藩已未從濟江帝射虎未殪公捨馬而徒挺矛舂殺之攻鄂先衆而登禽一人還流矢貫喉出項帝勇之賜銀為兩半百先是聞吐蕃有貯甘露寳函石室藏山穴者凡再使求之皆為大蛇竒獸所懼莫至最後遣至其所無所見竟與俱歸勸進之初諸侯王議未一惟一王塔齊爾嘗有書帝忘其誰在也顧左右問公曰臣所有之書出而決兩事皆甚合㫖中統三年制以為中書省郎中褒曰乆侍禁庭已著勞蹟至元改元加朝請大夫參議中書省事發言惟以當可事宜為心不憚伯相而阿其所志人有小疵必白帝前衆畏其口明年進嘉議大夫僉南京河南大名順德洺磁彰德孟等路行中書書省事始罷世侯而易置其地又明年轉亷訪使虎符領鷹坊凡鳥獸皮角筋羽悉征輸官尋領諸路鷹師獵户再兼中都路䦨遺又明年進中議大夫僉制國用使司使又明年故中書左丞劉武敏公拯為䇿襄陽吾故物由棄弗戍使宋得竊築為彊藩復此浮漢入江則宋可平帝大然之徴天下兵領以元帥府觀武襄陽城白河别開行中書省以我少師文獻公僉省公為同僉凡襄鄧唐申裕在太宗世所殘漢上諸州之民避荒汴洛間與下户賦寡者悉徙而南屯田給餉尋罷帥府又明年詔故平章哈坦開府儀同三司平章軍國重事贈太尉司忠勇公天澤來􅊩師宋遣人餛鹽茗襄陽乃築長圍起萬山包百犬楚山盡鹿門以絶之又城峴首開省其上兵興事劇星火公專入奏能日馳八百里敗宋殿帥今平章范文虎于灌灘又明年分中書省事尚書拜中奉大夫參知河南等路行尚書省事又明年兼漢軍都元帥分將新軍四千六十及廢尚書復以為河南等路行中書省事宋遣都統張貴張順將舟師從上游送袍甲犒師自萬山接戰二十里斬順殺溺過所當貴獨以餘衆入後水暴漲慮貴乘出下令軍中舟置燈篝岸積薪槱貴果結戰艦為陳宵遁盡然燈薪戰四十餘里斬之櫃門關又明年遂請以西域礮攻樊城㧞而屠之無噍類遺襄陽甚慘移攻具臨之且曉守臣吕文煥君以孤軍禦我數年今鳥飛路絶帝實嘉能忠而主信降必尊官重賜以勸方來終不仇汝置死所也文煥感而出降十年二月也詔公偕以入覲眞拜叅知政事明年授資德大夫中書右丞同忠武公行荆湖等路樞密院公䇿能籍民為兵十萬合舊軍或丞相安圖巴延一人將之南伐宋社必墟制皆從之故太傅巴延與忠武時皆以左丞相贈開府儀同三司太保并國武宣公阿珠以平章與公及故平章文煥以叅政行省將大軍發襄陽將至郢忠武疾還敵宿兵數萬築新郢夾江為城横鐡絙鎻戰艦武疾還敵宿兵遏我舟師郢北黄灣岸西去江三里所港通藤湖逹漢敵壁其上攻㧞之拖舟入港丞相惟以公數十騎覘新郢趙范兩都統鼓伏兵發葭林諸將倉卒有未甲者人人奮先殄其一軍兩將之首皆致公割趙腦膚撓酒飯之行克沙洋新城以臨復守臣翟貴逆降大軍去而復叛及漢陽故平章夏貴以制置舟師陳漢口水軍千户馬成為導由己未濟江沙武口塗入江㧞陽邏青山白湖諸壁走貴軍鄂守臣張晏然王該王勝以城下遂徇州民衣冠關㑹仍其服行鄉郭帖然漢有奪菜秉者民爭德吾元仁政義聲恨服化晚檄下漢陽夀昌信陽德安大兵既東分四萬人戍鄂咨公留後尋進官榮禄大夫自陽邏置驛以便行商至蔡方請移師江陵而荆閫安撫髙世傑將艨艟千六百艘卒二萬規襲鄂公分兵禦之大敗之荆江口降諸洞庭桃花灘下岳承制以守臣孟之紹為安撫使即西師至公安誓曰自今功者健兒陞長百夫百夫長千夫千夫長萬夫萬夫取進止因南風大沙市戰城上又戰城中屠之江陵精鋭於是馬盡制置使朱禩孫辭疾髙節度逹出降下令安集如鄂岳傳檄歸峽澧常德辰沅靖荆門隨郢復皆下之官其守臣如岳除宋苛法衣食惸嫠詔故平章亷希憲以右丞行省江陵以世傑窮而來歸棄江陵市禩孫徴至京師死猶没入其妻子還公于鄂移兵長沙行㧞湘隂潭守臣植滉柱江中自喬口至城凡十五所皆㫁之又㧞城西柵射書招其守帥李芾速下以活州民不然㧞城屠矣不答乃令諸將畫地分圍決隍水以樹梯衝礮鐡埧石心䑓百日公中流矢創甚責戰益急申命諸將凡所由乆頓兵者卒伍前驅諸將安行其後也自今萬夫千夫百夫之長皆居前列有退衂者定以軍興法從事三日而㧞謀諸將曰國家為制城㧞必屠是州生齒繁夥口數百萬悉魚肉之非大帝諭巴延以曹彬不殺㫖也其屈法生之發倉以賑餓人傳檄郴全道桂陽永衡武岡寳慶江西袁連皆下之㓜主面縛公入覲賀始庭拜平章政事還移兵靖江破嚴關敗馬都統臨川陳張兩總管小溶江諭經畧馬暨不下凡攻三十餘日而㧞公以靖江逺中土非長沙匹民性驁囂易叛難服不重典刑之廣西他州不可言以綏徠其坑之斬市暨傳檄下栁鬰林横邕亷象潯藤梧貴昭融賔宜賀化髙容欽雷為州二十廣東肇慶德慶特為州三特磨農土貴南丹牧莫大秀皆請内屬乃牐全之湘水三十六所以通逓舟承制以萬戸史格行宣慰司靖江還潭宋餘孽益衛兩王改元海中啗人以爵規復其舊全永諸州與潭屬縣之民文才喻周隆張虎羅飛之倫大或集衆數萬小方千數在在為群與江之北黄蘄相煽以動皆削平之偽將張世傑傳欲襲肇慶雷詔公討之且畧地海外無為賊巢過桞州鎮時暑軍士病渴所乘馬蹄地出泉人資沃飲至今名馬蹄泉而偽安撫趙與珞己戍海南白沙港公航海五百里不崇朝而至擊與珞并獲偽使冉安國黄之紀皆磔之諭降將南寜萬安吉陽聞偽王陷南恩公還襲走之降方經畧㑹衛王死崖山乃還復諭降八番以其酋龍文貌入覲置宣慰司從鎮南王伐交趾其君蹈海去得文􅀈昭國兩王以歸後二年入覲上都庭拜光禄大夫湖廣等處行中書省左丞相再月而疾敕尚醫四人診視求見登馬而劇歸即與夫人訣當廿有三年丙戌五月二十五日薨上都享年六十葬都城西髙梁河公元配特哩帝既才公敇陳亳潁元帥郝謙女為亞妃前卒敕復以其妹為繼自陳三召傳至京師順聖皇后為加幗服白金為兩二千五百男六人特哩生故資善大夫湖廣行中書省左丞和斯哈雅長郝生正奉大夫湖廣行中書省叅知政事虎符監兩淮軍格濟格繼郝生輔國上將軍湖南道宣慰使虎符監潭州軍賜玉帯一品冨華善如夫人者蕭生巴圖爾哈雅阿實克哈雅媵生圖嚕黙色哈雅女五人一適故嘉議大夫同知廣西道宣慰司事䇿喇實巴勒一適丞務郎大司農少卿僧嘉努一適中書省㫁事官埓爾錦一適昭勇大將軍監平陽太原軍巴延一適傳詔巴雅爾男孫三人蘇爾約蘇哈雅呼圖克哈雅噶逹爾哈雅女孫六人一適郝某一適平章庫爾濟蘇子博囉一適監平陽太原軍子逹實餘㓜後公薨十四年今正奉輔國以神道未碑出公凡受制書與御筆及公平生行實請燧曰徴是為銘嗚呼兄弟爭與昭揚先德于其子職責已塞矣嘗讀望諸君書善作者不必善成善始者不必善終未嘗不興慨歎于武敏開用兵端視南國為竒貨思圖形丹書埀譽竹帛于今日者後如取諸懐及襄陽下方戍淮西功已不出乎巳大師南伐復分兵淮東渡江㨗聞一失聲而死豈先福始禍者誠如道家所忌耶而公鼓其孤軍留戍所餘不能倍萬名城通都身至力取利盡海表圖地籍民半宋疆理其時將相雖瞠後塵猶不可望公少見最所下州荆之南十四淮西四湖南九江之西二廣西二十有一廣東河南各四凡五十八自餘洞夷山獠荷氊被毳大主小酋棊錯輻裂連數千里受縻聴令者猶不與存其依日月之末光張雷霆之餘威以㑹其成功者亦一世之䧺哉今列其由省幕戎麾與所受降登宰相者丞相二䝉古岱阿里罕平章十二敖拉齊呼圖克特穆爾阿里史格吕文煥特穆爾布哈李庭李順張𢎞範劉國傑程鵬飛史弼右丞四索多完顔諾海烏哲超爾雅爾鼐左丞四塔齊呼唐古岱劉深趙脩巳叅政十三賈文僃鄭伊克何瑋張鼎樊揖朱國寳張榮實嚢嘉特烏嗎喇博囉和塔拉髙逹馬應龍雲從龍都元帥宣慰使總管萬夫千夫之長又什伯是觀出其門衆多又足徴公善推勞人也初北上田租畞取三升户調歳惟四兩及定湖廣税法畞取三升盡除宋他名徴後征海南度不足于用始權宜抽户調三之一佐軍時以為虐今較江浙諸省槩增倍蓰獨西南賴以輕平其鏡館傳修潔亦甲他省生祠所在岳潭枊雷公安皆一而嚴關與全與獨二銘曰疇曰江漢南北之限天裂幅隕可恃為捍天混皇輿其險則那古以求之同軌不多秦漢兹降吳平于晉陳兼于隋矧趙遺燼曜靈生東有炎朱光爝火之㣲宜爾滅藏於皇大帝神武不世行所睿思效若龜筮由夫潛藩自將六師鵃䑠浮江亦既越之歸正丹扆群䇿明試加兵襄陽五稔克止公曰乘勝籍民授兵將以大臣南國用平帝曰俞哉惟爾協朕假爾以鉞誅彼干禁大師克鄂鼓行而東四萬其徒留後屬公公乃按圖吾與吾守待敵伺先孰與進取自鄂而岳自岳而荆長沙桂林皆􅗴以兵餘州數十雖定傳檄執讋言綏心亦孔棘又鋤武庚于海之南左右皇子交州是戡疇知公勞大帝簡在衣裘禽集靡有遺賚不事故常墮其奎章㨗㨗翩翩龍騰鳳翔又錫金罍合樂而飲臣鄰之家寵未有甚猶若未然丞相是崇與太傅公同元元功甲子二終𤣥閭是宅夀止名埀晰晰竹帛北方諸流所王維河九里漸濡尚其餘波宜公有子匪相伊使不專美虞實克延世其北居庸盧溝在西有碑斯豐流峙與齊牧庵集卷十三欽定四庫全書牧庵集卷十四元姚燧撰神道碑平章政事蒙古公神道碑燧持憲節使江之東三年當大徳癸卯光禄大夫上柱國江浙行省平章政事公之三子山東宣慰使罕都與江東建康道肅政㢘訪副使巴圗及行河南省參知政事額森特穆爾譜其系状其事以請曰先公三宿墳莽矣其忠以事國孝以䋲家光大而雄偉者不及今焉鑱之金石将日逺日㤀奚以示遺胄于無窮敢屬筆子燧以與憲副聨事此道義不可辭乃序之曰公蒙古氏諱博囉罕輝和爾公之曽孫扎木和拉公之孫扎固和托公之子始輝和爾與兄威伊特俱事太祖時岱酬盛彊威伊特謀往歸之輝和爾苦止曰帝何負汝而為是竟去追之不復雪泣而歸請獨宣力帝貳之曰汝兄與衆皆往獨留何為無以自明乃折矢誓曰所不終事帝者有如此矢帝感其誠易名希禪約為諳逹葢明炳幾先與友同死生之稱帝後與王汗陳于哈喇展彼衆我寡敕烏嚕一軍先發其將敏珠爾丹玩鞭馬鬛不應希禪請曰戰猶鑿也匪斧不入我先為鑿諸軍斧継顧帝訣曰臣萬一不還三黄頭兒将軫聖慮者辰入疾戰大敗其軍晡猶逐北敕使止之乃旋師免胄為殿腦中流矢帝傷之曰朕戒卿蚤休兵竟創而歸親為傅藥寝與同帳逾月而卒帝曰曩濟勒錦為敵将實禦希禅其以濟勒錦民百户属希禅子世世嵗賜勿絶其族散亾者收完之即封北方萬家太宗以其子蒙古為郡王又俾貴臣呼喇呼大料漢民分城邑以封功臣割泰安州民萬家封郡王歸奏帝問蒙古之民何如是少對曰臣今差次惟是太祖之舊舊多亦多舊少亦少帝曰不然舊民少而戰績則多其増為二萬户與十功臣同為諸侯者民異其編烏嚕争之蒙古舊兵不及臣半今封顧多于臣帝曰汝㤀而先玩鞭馬鬛事耶後諸侯王與十功臣既有土地人民凡事干其城者各遣断事官自司聴直于朝公年十六為㫁事官世祖正宸極以從攻叛王額勒布格功賜其軍騬馬四百匹金銀幣帛稱是尋詔入宿衛曉近臣曰是勲閥諸孫從其出入禁闥無輙誰何李璮反詔将蒙古一軍圍南鈔益都萊州賊平決獄燕南南人稱明允賜衣一襲雲南王呼格齊為其省臣巴哈丹輩毒殺事聞敕中書擇可治其獄者凡四奏人皆不當㫖丞相希札舉公且言敗事臣請從坐帝曰之人則可公曰臣不愛死第年少目不知書帝曰朕方恃卿求皇子死尚書拜特穆爾知書惟可使之簿責其事是否一委自卿明日慎無歸咎輔行也且聞卿不善飲彼地多瘴宜少飲敵之未至四五驛所巴哈丹遣人負金六籯來迓公曰雲南去朝廷遼邈省臣握兵不安其心将懼而變乃好為語遣之既至盡以金歸省而竟其獄得置毒情殺之而還奏可顧希札曰卿舉得人賜兼金為兩五十武備寺奏令入筋角惟蒙古以時夥于常嵗帝曰其報賜之自今凡蒙古事無大細如扎拉爾事統安圖者悉統于博囉罕八年授昭勇大将軍右衛親軍都指揮使虎符大都則專右衛上都則三衛兼總十一年授金吾衛上将軍中書右丞大師南伐分軍為兩制曰其右受巴延阿珠節度左悉委卿指一犯法臣曰如博和哩黙色朕不責也俄授兼淮東都元帥軍于下邳公策諸将曰清河居宋北鄙城小而固與泗州昭信淮安實相掎角當水陸衝未易卒拔可頓大兵為疑海州東海石秋違此數百里其守必懈吾将輕兵倍程而東其守臣可襲虜也師至海州丁安撫果下石秋東海隨下清河史安撫聞之亦下一月而下四城宋主既降而江淮東諸州猶城守故太傅巴延入覲還宻詔公進兵㧞淮安南堡戰白馬頭又戰寳應棄髙郵不攻由西小河達漕河據灣頭堡断通泰援竟拔揚州斬其制帥李庭芝淮東諸州悉下賜西域藥及蒲萄酒介胄弓矢鞍勒㑹分江南之州隸諸侯王及十功臣又益封公桂陽州十四年遣平叛王珠爾噶岱于應昌賜玉鞶帶幣帛與博囉罕同署樞宻院事未乆授北京右丞既至召還㑹南土多反者詔募民能從大軍進討者俾自為軍其百夫千夫惟聴其萬夫長節度不役他軍制命符節一與正同已行矣公疾不能自陳令董司徒文忠入言今有日所出入勝兵何啻百萬何假此曺無賴僥倖之徒以壮軍威臣恐一踐南土肆為貪虐斬伐平民妾其婦女槖其貨財民畏且仇反将滋衆非便召輿疾入帝視其色瘁然賜坐與語重陳董奏可之適常徳入朔唐古特一軍殘暴其境如公所策敇斬以徇諸是軍皆罷之十六年哈喇蘇博囉蘇烏拉罕蘓哷肯皆强宗也勢不相一求遣大臣來蒞詔令公往凡居是三年十八年以右丞行省甘肅時大軍駐西北仰哺省十數萬人自陜西隴右河湟皆不可舟惟車輦而畜負之塗費之夥十石不能致一米石至百緍公經畫得方供億不乏賊不敢窺邉者二年二十有一年授龍虎衛上将軍御史大夫江南諸道行御史臺事黄華反徴内地戍兵進討未能平賊多奴良民以歸公令監察御史提刑按察司隨在糾覈皆土還之以疾歸㑹諸侯王納延反帝欲自将征之公曰始太祖分封東諸侯王及矦其地與户臣始知之以二十率之彼得其九蒙古烏嚕札喇爾翁吉喇特伊竒喇􅀈五諸侯得其十一彼力滋多吾亦滋多吾有衰耗彼亦衰耗然要其歸五侯之力終多彼二惟責徴兵五侯自足當之何煩乘輿臣昔疾今愈請事東征制可賜甲胄弓矢鞍勒命公董是五諸侯兵以行與納延接戰屢摧其鋒再與其黨一王塔布岱戰淫雨不止軍以乏食求却公曰兩陣之間勿作事先已而彼軍先動公悉衆乘之逐北二日身中三矢禽塔布岱斬和掄輩後與伊囉勒太師合力始誅之賜銀為兩四百五十幣帛九不再月其黨一王哈坦復叛公再請往詔與諸侯王奈曼討之公狃于屢勝一日不虞賊以游兵卒至止從三騎返走有壑絶前廣二丈深加廣半追兵且及獨公策馬能越三人後者皆見殺人以為天相忠義後逐北極于東海之壖哈坦自引去獲其二妃斬其子拉塔于陣凡戰四年所俘金銀悉散将士以故人致死力賊平敕一妃賜奈曼岱一妃賜公陳金銀器延春閣召東征諸侯王及公至将分賜之問公汝家是器幾何鞶帶有無公曰以陛下威徳奉身之物亦畢備矣帝曰朕出此物本酬卿曺之勞在人則伐其能以幸多取朕問猶曰既有可謂謙挹不眩于貨者豈令其徒手歸姑賜是器五百兩二十八年改河南宣慰司為行中書省求可首是省平章者凡三奏皆不允末乃及公則可授榮禄大夫平章政事淮鹽為引嵗六十五萬前政多逋至公如額而集賜異幣一開封監縣特穆爾告廉訪使胡某不戢其民昏集曙散縣簿陳勣置廵屋器械于村又周劉光店為墻四其門扄鐍司亱出入詔公按之皆誣杖而徙戍南邉後詔天下括馬不當及公等之家公曰吾家有馬羣連郊坰不思佐國無以為方三千里官民之倡其入騬馬十有八匹河水遷流無常民訟退灘連嵗不絶或以其地投獻諸侯王求為佃民自蔽公奏正之仍著為令河後泛濫堤埽横潰歸徳睢州汴梁水及城下漭為巨浸公親行視督有司捍完之皇上元貞二年遷公平章陜西未行而改復為河南入覲奏蒙古一軍戍北嵗乆衣率故弊請以臣泰安州五户嵗入絲一斤積四千斤盡輸内帑易為匹帛分賚諸軍上以為善敕逓車送達軍中賜銀為兩百五十幣帛三陛辭之日上諭之曰卿今白鬚世祖徳言實足聴聞事更加慎中書平章喇勒智宣政院使大食蠻合奏始者伐宋世祖分軍為兩右則屬之巴延阿珠左屬之博囉罕今巴延阿珠皆有田民而博囉罕獨無可後上曰何乆不言豈彼耻自白耶其于淮東所嘗戰地髙郵已籍之民賜五百户以上中下率之上一而中下各二及圈背銀倚比再至汴踰年凡流外官乆滯不銓旅食道宫者旬月皆出之大徳之元叛王永和爾烏蘭布哈來歸公遣使驛聞始是諸王叛由其父是輩小弱若無與知今焉來歸𡨕棄前惡以勸未至上曰是奏深契朕衷改平章湖廣賜金鞍勒至汝寧合福建省于江浙授公光禄大夫上柱國江浙等處行中書省平章政事賜白玉帶夏旱隨禱而雨杭之豪民十家入賂于官大為醸務髙其估而專其利酒日醨惡公變其法張省四凴其富畜凌轢府縣肆為姦利自刻木牌與交鈔襍行民間實侵貨幣與國爭利又盜隄海之名墻其私居公欲斬之而中書刑曺當以杖然亦由是大姓始重足立矣以大徳庚子五月二十有二日薨于臨安寓舎年六十有五以其年七月八日葬于檀州西北太行山不封最其平生典兵則右衛都指揮使都元帥樞宻院風紀則御史大夫宰相則三為右丞四為平章與夫四十七年馬足所及西南雲南西北金山東北海隅東髙句驪東南呉閩再討叛臣四征叛王其間事平而疾聞變請行惟以有國艱虞為憂視轉鬬乎萬里之逺厯嵗之乆若堂奥之朝夕焉雖風雪皸瘃其膚鋒矢交集其躬飲食飢渇不時其口體皆不避恤必致宼首戲下歸報終事而止真凛凛有曽考風上尤眷重之若世祖身御櫜鞬弓矢皆百世傳寳不以賜臣下者惟以賜公海東青雜骨先朝多或十賜惟至白鶻觜𤓰玉如聖語曉曰是禽惟朕及鷹師所鞲以卿世臣諸孫宣力之多日桑榆矣無以娯心河南治地平衍而逺且多陂澤鵝鸛所集時出縱之使民得見昭代春秋蒐田之盛不敢萌啟邪心皆殊鍚也夫人某氏男四人宣尉憲副參政季博囉公于廷臣居家最名有法夜分不寐諸子列侍其前聴談祖宗故實母敢或歸私室宴奉樽爼迭歌舞以娯賓亦無有酒失者女六人長適國戚巴拜次適色徹肯平章子僉書樞宻院事諤勒哲次適國王弟布哷齊次適伊克徹爾太師弟克哷楚次適山東宣慰使璸匝雅幼在室銘曰皇矣太祖肇造方夏右之左之惟十臣者公之曽考展一其中矢矢瀝告帝視友同敵陳來加抵戈以出大崩其軍免胄而入五兵之長無矢不仁懋功是創由賊叩輪帝惻其心百俘償死顧成嘉止既王其子迨分茅土帝自等差國以泰安二萬其家公祖王季勤勣克類再傳而公世祖之事勲閥遺苗帝植以培而獨于公嘗譽其材聴于禁闈無止入出翼翼其心彌謹自律隨遇而公利患靡干承命即往奚逺奚難東北海隅西南六詔甌閩炎陬金山遐徼聞有難虞必請赴趨大獄叛藩無一漏誅人臣憲憲曰省臺院平章大夫宥宻鈞踐先聖今聖賚予優優良史天閑豪集御鞲櫜健介胄鞍帶衣裘黄白之金委家如丘皇矣太祖于疆于理惟公曽考實成其始遺厥大艱畀之神孫神孫世祖闢乾翕坤考其皇與南北猶判孰是浙右羸鬼歆祼大興師征嶻嶪百城罔不簞壺竭蹷義聲傳其國都孱主銜璧蕞爾淮東諸州猶壁詔公進攻盪殱渠兇九域攸同公焉成終将天之意悠悠或在成始之孫宜際斯㑹益封桂陽江嶺外内于乃先烈克光以大嘗聞古先誓侯功臣泰山如礪國以永存嗟公王孫國泰山下權輿礪如其自今也平章政事徐國公神道碑公揚珠濟逹氏諱徹爾曽祖塔齊爾初將突騎百夫宿衛從太祖戡定中夏又􅗴平宋彭義斌俶擾山東太宗分土功臣由徐邳再刳于兵户不足萬故國以兩州祖納呼憲宗伐宋師由蜀入從攻合之釣魚山戰疾力考竒嚕俱監其國以世祖建極中統之元庚申夏五月十有二日生公六嵗而孤母夫人富察君介介自持動以禮節親戚不敢干以非義教子讀書天貭粹美不勤外𫝊六經二氏悉涉源委以故聰明開益日多才畧兼人恒以匡君經國自期至元十有八年軀幹盈常襲其祖衣長不能勝則知其先益魁傑也其年入見帝賜之問而竒其對進侍帷幄湛露龍光汪濊涵濡絶其等夷時詢民情細微敷告無隠一諸侯王稱兵東北帝自将征入其地矣軍中夜驚公出撫遏人識言音喧咈一寂跳梁既平為奏兵餘之民艱窶剥膚不賑恤之将不生活敕賜穀帛牛馬脱寒飢者無慮數十萬人歸擢利用監古武庫也匪簡在帝心人者不以付之二十有三年詔求逸遺于江之南且省其俗時相方急治賦鬻民學田官有其直令既行矣公則止還諸學用為完廟養賢之資歸以事聞制甚嘉可明年僧格分中書庶務立尚書省初為平章後為丞相凡昔盜殺臣為領部為制國用使為尚書省所逋錢粟併歸中書舉誣為中書失徵殺其二相大為計局鉤考毫釐諸省承風鄂省已劇浙省尤酷延蔓以求失其主者逮及其親又失代輸其隣追繫收坐岸獄充牣榜掠百至或闗夫三木責妻市酒以償民不堪命自經裁與瘦死者已數百人虐熖熏天諸王貴戚亦莫誰何無不下之獨公奮然數其姦賍帝初未然益犯威顔言色俱厲帝以為醜詆大臣失幾諌禮怒遣左右批其頰辯不為止曰臣非有仇于彼而然直不忍其罔上自私敢因雷霆一擊遂爾結舌使明帝有不直言之名臣實憤恥帝意始解命将衛介百人控鶴倍之入籍其家得金寳衍溢棟宇他物可資計者将半内帑罪既彰白始鈐其人諸繫計局者皆出之又命籍黨惡浙省諸臣平章左右丞參政烏瑪喇黙哷實都王濟等家併僧格之姻鄂省約蘓穆爾皆醢以謝天下以成其獄凡四過徐不入其家為帝所忠怒御史臺臣不善瘅惡坐觀政紕其自當汝罪皆曰奪職追禄杖三者唯命江浙平章夙有怨于臺乘其慿怒自傍激之謂湖北廉使功臣諸孫盗燒鈔八百定堂帖二十下容姦數年贓終未入抱案帝前示曰稽是可也誤裂卷為兩縫留半印公曰縫用印者以杜罔欺汝為宰相持半印案以訟人餘半烏在其人言塞帝顧罵而起臺誣始釋明日拜御史中丞無幾時拜榮禄大夫平章政事行省福建賜為兩金五十銀五千令行禁止民便安之惟汀漳劇盜積嵗未平公身為諸戍之兵申明約束不貪勝不蹂禾稼不入民舍惟張皇武威過栅不攻示以整暇晝則合圍山中夜則税野偃旗仆鼓賊或偽降覘其何為乃豐酒肉飲食曉曰汝昔由不堪汙吏侵暴潛迯居此能棄險而還耕桑則平民矣吾安忍被汝反名而加誅夷寡人之妻孤人之子獨人父母而利其財悉縱歸之他柵聞者相率以出其渠鄂特新日戩南奔大兵隨之偷生隝中其黨縳致于軍血鋒刄者纔是一馘自是方三千里枹鼓不鳴正席其堂畫諾而已聞帝不豫馳歸京師嘗藥晨夕俄然賔天與諸侯王大臣定策禁中遣使逆成宗龍庭入踐天位大徳之元拜江南諸道行御史大夫一日召其都事賈鈞今參議中書者謂曰明詔責使肅清宣明風俗教化而刀筆流為御史者肆為苛虐惟急徴贓以多為功至廹子證父妻證夫弟證其兄奴告其主敗風教者我實行之汝宜以是出訓其屬帝聞之以為得職風紀大體㣲意柏臺七年改浙省平章政事其治如臺門無私謁以轉粟京師多資東南居天下什六七而松江填淤嵗久富民利之當水出塗築為圍田以故瀰漫浸灌沮洳廣逺民不可稻公發卒數萬浚決疊石堤之𨗳水入海使復其故凡身董役經時而成民得良田若干萬頃至今賴之九年召入平章中書贊右丞相専力一心燮和庶政希致隆平纔一暑寒責右丞相曰方帝不豫而乃阿中專政吾誠不忍汝見敗國以䘮元也遂疾不出以十月十八日薨年四十七立朝之士在野之民齎咨咸曰古人有言昊天不弔殱我良人矧鉅臣哉葢棺之日最其家楮緍不滿二百而債劵積多至十萬大臣清貧無公比倫足昭炳白樂施為仁不富之實官給轊車始克歸𦵏于徐邳岠山之陽前夕兹山列炬如晝人則以為公之營魄結為光耀以助臨照之祥既貴顕矣妣夫人杖之受不敢迯其孝又何如也後公薨之三年當至大之元制贈推忠守正佐理功臣太傅開府儀同三司上柱國徐國公諡忠肅嗚呼今聖不㤀哀而崇之所以為人臣下賁幽墟可謂竭盡而無餘矣銘曰維昔大帝立極之嵗人生是時不億其麗何獨于公光嶽氣鍾娠是元臣豈億所同加敦詩書聞見開益甫踰弱冠帷幄出入于狩于征無逺不從靡夕與朝勤不懈恭天寵之承其言易直衮闕可彌慿怒安卹大沃宸聰盡殱孔壬于福平章百其贈金汀漳夙盜知公來臨投其殳斨耕鑿謳吟成宗繼序曰秦漢下御史大夫丞相之亞俾行南臺不專䋲愆體仁德音風教是宣移平章杭先民所急浚通松江壞防巨室中書平章曽不嵗餘責右已相阿中速辜行馬施門用示不出憤疾以忠救時望失将窆徐方岠山之陽貧僅能歸其清益彰嗟兹九土奠自神禹岱宗巖巖北徐為襟其帶伊何淮流在南今其疆理蹙乎古始河齧彭城其水瀰瀰初公曽祖以佐運功雖國是徐猶爵未崇於皇今聖公德之令哀蚤隕祚上公是命既土既爵傳子而孫帶礪山河國以永存徽州路總管府達嚕噶齊兼管内勸農事虎公神道碑李氏國凉為宋金西北陲患三百年太祖徂征猶傃天戈以故多取殱夷烏訥城帥實與宋臣戰死惟戲下鈐部官穆蘇和拉由首出䧏獨全從帥子惟忠則贈銀青榮禄大夫平章政事諡武愍公恒之考𨽻分土淄州諸侯王王多其氣貌異倫精藝騎射能諭説他國言為漢言如周象胥氏教以為其國軍民總管從征淮南年七十二卒二子長則公諱益曰古人以王父字為姓我其法之我先人諱中其取一言姓遂虎姓未冠教參其國萬户府謀議李璮反盗據濟南詔徵諸道兵誅之公在王國軍中分城長圍㫁其遁塗七月而罪人投首以軍諮勞賜廐馬鞍勒衣服甲胄弓矢白金為兩五十後命于朝官以承事郎知萬户府事用兵襄陽王國軍亦徴公在行中復城長圍不釋甲六年當至元十年其守帥文徳始下明年詔故太傅巴延以中書右丞相督圍襄諸軍濟以新籍之兵南伐既渡江分兵五之一留故中書左丞相阿爾哈雅時以右丞戍鄂大軍次浙西右丞相徇地湖南詔虞兩軍相距懸邈無以應急緩俾武愍公時以左副都元帥将是軍徇地江西公在行中從破劉槃熊飛呉浚張文虎文天祥諸軍下江西州七閩中州三廣東州十四䕶送纍臣入覲凡所詢軍旅事機陳對皆可官以中順大夫監龍興路是州為新造之邦而宋餘孽兩王改元海中遣問四出官誅故臣在在起應蜂屯蟻附左剪右攘數年未平獨公善威讋而信柔之一境肅謐及陞帥府為省滿秩省以其民安公聞制留再為凡監龍興五年移監撫州路始以日本之師繼以交趾之師供億百萬一令之下急踰星火動裁以失軍興法其事之集獨先隣路省喜利臣復大加鉤覈既徴于書又煩為條約使利自實有牟于民而冒出于官者皆責償之自以為功而媒貨其門鮮有不入罪罟者公獨完潔無絲毫得凡十年移監袁州路三年改監徽州路皆位總管上撫陞中議大夫徽陞少中夫夫袁徽州皆兼管内勸農事滿徽而歸連牧四州天訖宋命㑹其成功受任先朝洪撫袁徽連牧四州服三品服人臣願欲而不得者身享有之餘二十年可以止矣豈如他人上覬将相以致敗耶過汴慨息曰吾祖世官西河之壖吾考寓墳東海之濵是邦去洛而邇亦地之中于是為家可以西望吾祖東望吾考遂買田休居以大徳三年辰在己亥十有一月二十有八日卒年六十三夫人楊氏嚴于内治閨門截若男二人文煇文煥女三人長適武愍孫今湖廣行省左揆世安子利用監某次適池州總管府判官隋載子某幼姆始公之卒弟儀哭曰吾兄不滿年格果于遺榮期以自樂于日薄山西也曽未中夀而遽已是我可不念其拓境之艱成家之難以厚其死乎凡䘮𦵏須吾力能及不必出兄之家既墳請左揆曰乃曽考帥烏訥城我先人其鈐部官兄從戎淮漢江閩又惟乃考先正武愍是從今以男女故託姻里聞公有所善翰學嘗詩武愍麗甥碑者幸為吾丐銘于以掲今而訊後死而有知骨不腐矣故左揆走書見懇曰儀非直克弟加善植業同里有貸黄金二鎰者死曰吾可同俗訟其妻子與見知者必其歸耶裂劵火之又能以禮律至里門則捨馬而徒其為人槩是宜若不可拒者燧曰嗚呼世有兄夷牀未寒已利奪其財于嫂姪手遑恤夫葬與銘聞儀之風亦庶可少愧矣况兼是數美誠難能也故附書之儀由将東諸侯王射士制官承務郎提舉崇明州塩場今領天后位之民夫人四其亞趙三子文郁文燦文炳銘曰嗚呼維公少而即戎與齊長圍平賊内訌先皇賚之騕褭以乘雕弓貝胄華衣晝映繼兵㐮陽荷殳于中既下明年大伐是從分戍鄂省皇旋有命大師及呉江右靡定移武愍軍往徇于洪從收閩廣狼烟一空馳以入覲山川形勝軍民休戚隨問隨答言悃而忠沃星宸楓曰洪汝牧虎節以庸公既戾止嚴威信令植柔鋤强敦皇齊聖滿考再為隣盗如蜂獨其境敉郊農市工移無十年其事始盛倭征交征一食日併海艘督造陸水仰供彼婪婪徒私先後公涅入淄出官刑忘鏡紛紛觸禁如獸投穽噫哉維公克潔其躬移袁移徽一其初終六秩言歸時寵絶兢如車善柅撃節月評平馬夷山突如防封于阡表之有碑穹崇載銘其陽其烈足證其來後昆其賴其慶牧庵集卷十四欽定四庫全書牧庵集卷十五元姚燧撰神道碑中書左丞姚}
