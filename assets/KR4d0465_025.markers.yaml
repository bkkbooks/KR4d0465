  - {type: variant, offset: 4170, length: 363, content: 其志且生永寧去登封三百里均爲河南屬縣爲生同鄉少中宣慰荆湖某爲憲副爲同官義不可讓嘗究孫民先世由喪亂名字皆逸少中之祖伯季四人其伯也始徙登封者實生盧川君諱聚字某年八十五以至元丙戌冬十月十日卒葬先塋以元配程氏祔程有賢行以君四十無子爲娶姨母尹氏子而生明顯明讀書不仕男孫七人禎將仕郞峽州路知事復將仕郞主枝江簿亨謙豫節元咸幼女孫一人亦幼男曾孫六人未名女曾孫四人逾㓜嗚呼君夫婦惸然還登封及其屬纊三世子孫巳且二十人其婚姻葛藟之家猶不居是選固巳衍爲盛門巳微而昌始屯而亨天之福人亦易矣哉又少中涖民治軍遠跡嶺海蜚聲振績爲時聞臣子貴應銘法銘曰凡今受姓咸岀黃軒其自以氏實爲公孫後有王孫别胄王室文由便省去覆而隻有煜兩孫世緒咸遙欲一其初循本自條其居登封由管城徙鋒鏑逃歸子然一已胼胝手足克艱造家感迷先邱號求邇遐民欲天從爰昭其孝指所在藏假人以造乃安斯窆盧店之阡爲, WYG: ''}
