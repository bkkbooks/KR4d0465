  - {type: variant, offset: 3800, length: 0, content: '', WYG: 其志且生永寜去登封三百均為河南屬縣為生同里鄉少中宣慰荆湖某為憲為副官同義不可譲嘗究孫氏先世由䘮亂名字皆逸少中之祖伯季四人其作也始徙登封者實生盧川君諱聚字某年八十五以至元丙戍冬十月十日卒𦵏先塋以配元祖氏祔程有賢行以君四十無子為娶姨母尹氏子而生明顕明讀書不仕男孫七人頑將仕郎峽州路知事復將仕郎主枝江簿亨謙䂊節元咸㓜女孫一人亦㓜男曽孫六人未名女曽孫四人逾幼嗚呼君夫婦惸然還登封及其屬纊三世子孫已且二十人其婚姻葛藟之家猶不居是選固已衍為盛門已微而昌始屯而亨天之福人亦易矣哉人少中涖民治軍逺跡嶺海蜚聲振績為時聞臣子貴應銘法曰凡今受姓咸出黄軒其自以氏實為公孫後有王孫别胃王室文由便省去覆而隻有煜兩孫世緒咸遥欲一其初循本自條其居登封由管城徙鋒鏑逃歸孑然一已駢胝手足克艱造家感迷先丘號邇遐求民欲天從爰昭其孝指所在藏假人以造廼安斯窆盧店之阡為}
