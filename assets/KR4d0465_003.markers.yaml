  - {type: indent, offset: 4605, content: 　　, id: KR4d0465_krp_003-bkkind13}
  - {type: variant, offset: 4605, length: 528, content: 趙樊川集序樊川宥密公長安别業也其地得姓則由漢舞陽侯噲有墅乎此豈與葉邊舞陽封國攺爲樊國者同其時耶唐則韋杜二家專之皆宅北山之曲韋西而杜東以故中舍杜牧名其集爲樊川公居二曲之間余少之時屢至焉其地先甚荒棄由爲公有歲新而月盛之泉石巖洞池塘林木出沒窈窕魁奇繁薈凡可娛心而駭目者悉甲其隣人亦目公樊川中統之初京師諸貴詩其圖者惟大參楊公西菴爲絶倡云一賦阿房萬古傳而今還有趙樊川謝公墩上王公住異代風流各自賢公平生精練世故每自負其沉幾先識算無遺策國家亦以是期之初未知其文公沒十有八年中子饒揔管通議君訓始摭遺槀百數十首爲集而板之嘗因最公自予無幾何會予自中書舍人出牧杭州歲餘攺右庻子移疾東洛明年復刺蘇州四年間三換官往復奔命不啻萬里席不遑煖矧筆硯乎所託文久未果就及刺蘇州又劇郡治數月政方暇因發閱篋中袠睹居敬所著文其間與予唱和者數十首燭下諷讀憯惻久之怳然疑居敬在傍不知其一生一死也遂援筆草序序成復視涕與翰俱悲且吟曰黃壤詎知我白頭徒念君唯將老年淚一灑故人文重日遺文三十軸軸軸金玉聲龍門原上土埋骨不埋名嗚呼居敬若職業之恭愼居處之莊潔操行之貞端襟靈之曠淡骨肉之敦愛邱園之安樂山水風月之趣琴洒嘯詠之熊與人久要遇物多情皆布在章句中開卷而盡可知也故不序時寳歴元年冬十二月乙酉夕在吳郡西園壯齋東墉下作序, WYG: ''}
