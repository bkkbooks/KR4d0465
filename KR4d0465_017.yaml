body:
  text: 元姚燧撰神道碑潁州萬戸邸公神道碑公邸姓保定行唐人諱澤字潤之曾祖亨祖義生考府君諱琮金符總押眞定大名河間西京保定洺磁濱七州之兵戍雎州以卒公年十一世將是軍七年去城亳鹿邑避河流齧移戍潁州城久荒棄剪荆以茇隍塹樓堞官舍民廬皆所經始宋勍將夏貴夜悉銳東南壁公將射士當之大呼疾戰矢下雨注又虞士氣久用將奪戒司更促其漏丙夜伐五鼓敵以爲旦出奇騎擊不利客也騰藉崩潰積骸如京創此大治始不輕犯戍是十四年世祖卽位如故事盡收臣下先朝制書符節故公金符亦入之官明年制賜還之至元入覲賜錦衣弓矢鞍勒用兵襄陽將是七州兵半以行太保幷國武宣公時以都元帥鈔鴉山拔平塞砦功最幕府賚白金爲兩五十金衣一從城長圍襄陽六年當十年癸酉乃下明年從太傳巴延公時以中書右丞相督大軍南伐至郢初宋遣殿帥范文虎將兵援襄陽度不得進爲城郢備鎖戰艦江中列礟于岸遏我舟師下令盪舟黃灣進藤湖入漢越郢去從拔新城沙洋下復師由沙武口入江從戰靑山磯多所俘馘鄂隨下行省論功行賞賚白銀爲兩三百明年留故左丞相阿爾哈雅時以右丞分省守鄂大師其東從右丞分兵下荆南功進武德將軍管軍總管又從攻潭州流矢貫肘汰股裹創復戰城拔進顯武將軍明年從攻靜江礟礧傷首岑岑埀絶巳日乃蘇旣拔從省還湖南其年宋亡陳宜中挾益衞兩王浮海據閩爵人號年規爲興復倖利之徒在在起應而羅飛張虎周隆尤其梟傑屠殺長吏刦民爲兵動萬爲羣阻山爲砦以抗官軍衡永路絶公從􅗴平生致三渠褫皮以獻進懷遠大將軍萬戸虎符俾將其軍監郴州位總管上至則平郡賊蕭良弼刳兵之餘城中戸纔四百布檄招徠安集之內則基屋火餘外各復產其鄕期年將倍萬家孔廟尙茅屋擢進士左元龍爲校官佐其工材俾任興葺稍如平時州界韶酃遏韶冦不窺宜章而興寧之民效惡酃盗聞宣慰司將調兵萬人加誅未啓行公衝焉摯金帛卽說曰今盜始起而從徒未繁官軍遽入民懼俘殺必出逋逃無所適歸勢與盜合是驅使爲逆也請歸身任致討許之乃歸召父老豪傑曉曰吾止官軍不使得暴吾境汝佃民有從亂者不以相坐聽執送余自贖得五百人惟誅首事二十人餘悉縱還南畝連三大役始得占城之師人以深蹈死地忿怨無施所經城市肆行剽奪瀕道居民十室九空六耰絶種至郴亦然公捕得爲暴數十人械送軍中詰其部將威令不伸皆市杖之其徒一夕潛遁踰境再以日本之師責造海艦十五艘度費楮幣爲貫七十五萬取材有制戢吏侵牟用未能半事巳告集後以交趾之師賦餽米干石入桂公曰自是入桂陸行千里負擔之民人勝五斗而止巳二千人爲擔夫負裝糧者半是行未中道委負而逃可前知也乃集丁之家謀曰吾將出家貲責諸縣卽桂如數糴之上不失軍興而下可紓民力何如衆歡呼稱願他日比貸錢如子來歸公悉還其贏又請罷陶坑銀鐫戸賦酒醋歲荒發廩而後聞皆良政也又遷廬州蒙古漢軍萬戸郴民耄倪號呼遮留如去親戚未至改潁州萬戸戍無爲軍至是七路之兵全集戲下而軍容益盛盜起江東省以公威信著譽檄公以其軍討之饒信先譬以禍福皆不煩兵而從宣徽怙惡乃夷萬人于南陵旌德涇縣又鋤萬人于績溪績溪尤劻勷壁何秧塘山山周十里峻二百丈省臣以六萬衆攻之數月不能下者因畱戍徽兼拜都萬戸之一軍徽民方安之尋還無爲省議餘杭勝國故都非得如公老將一軍遏而閑之綏而安之不可故移戍杭以二十八年其歲辛卯夏六月二十有一日卒年六十三平生忠直沈毅讀書專經左氏春秋故能謀成而事立臨財不恡施予有積則均之昆弟姻戚其再至潁故人部曲捐金委帛致殷家及疾或在告計日辭祿後卒十三年子武德將軍潁州萬戸戍杭元謙紹介其友劉致持事狀爲書燧曰先公之匶藁藏潁濱今將舉歸先塋數宜有碑不得君銘恐勲勞不足以信來世敢泣血請故銘叙此嘗聞國初以二萬戸鎭撫中夏右則劉伯林軍秦左則納罕重山軍燕顧成則益太尉忠武史公天澤爲眞定河間濟南東平大名五路萬戸于中後強諸侯頗以力夷惡相下屬皆求名將其軍而千夫之長亦凱得焉由是萬戸布列天下其勢雖分然父死子繼兄終弟及相傳虎節一命三品世世不絶則未始變不若治民治賦之臣者死子孫以門功官自下而高如升階然所可儕比則國家責以捍侮四方勸忠而收其死力者豈不至且遠哉觀公造家譬則爲山嗣雎總押其覆簣也于時是官未必視長千夫何以言之從下荆南勞亦夥矣授以總管得以千夫之長同祿轉而西南勁敵是膺堅城是臨莫不賈勇奮其前殳顧以是身干鹵三軍入百死而一幸生遂長萬夫比德開國大藩諸侯殆成功九仞者其爲丈夫亦壯烈矣然非憑夫大帝赫怒有是南國用武之地技安施哉此太史公賛蕭曹輩爲依日月末光陰符所謂天人合發者也三夫人元配郄氏嚴于持家前卒二十一年繼配兩王氏姊娣也前卒十年姊顧爲繼後卒九年三男元謙以佳公子旣世虎節好學而文雖居平時營柵部署器械車馬凜如在敵又識世務省訟難惑多資平之次元泰元恒四女適㕁長官子璧閻令子齡鄭元帥子端仁萬戸賈榮祖三男孫長禥幼未名二女孫銘曰嗟若邸公初由羇童嗣秉父節雎及鹿邑凡戍十年強敵尙逖城潁而南地交壤鄰勍將未嘗時巳能軍寡謀輕襲大北其羣會帝考貢曰是南紀于何蕭茅矌入包匭乃卑丞相百萬烝徒江漢滔滔鼓枻以浮分狥坤隅置公前驅登陴長沙桂林入俘大惛小悖剪無稽逋從戰萬里清楚以吾歸撫其軀矢石遺餘嘗曰臣子居則有異移孝爲忠其道豈二當在父側子職焉恭寸膚之傷衋心􅘃恫及身而將三軍奬率鼓鼓以前顚首奚恤惟公懋功其賚何如虎節皇皇雄長萬夫上昭祖考下傳旄棨子孫其承世守無止匪直克忠孝疇大斯以語燾後幾何其慈宜爾有子踵武之踐四十巳聞愼保垂憲爰發潁匶歸從先邱列勲于碑胎久是謀袁公神道碑袁虞舜裔也舜生姚墟居嬀汭子孫以地姚姓以水嬀姓以有天下之號則虞姓及周武封胡公滿于陳以國陳姓以陳公諡胡姓袁則肇于陳大夫轅濤塗西京轅固生猶未省文至後漢太尉安而下始爲袁矣其家太原石之臨泉者不知始何世何人所可譜則在金有隱德農畝者諱亨生迪業儒博極羣書尚氣節不食然諾生企京有父風生鐸丰儀峻修克世其家學實生今延安路總管公諱湘字潤夫金之蹙國王公佐持節鎭葭蘆當吾元勁兵之衝殫力竭謀惴不自支一日集將佐使各推辟所知可與計事者或言公賢爲書致之三徃返始來用其䇿以守則完以戰則㨗衆論多之聞諸汴京官以忠顯校尉遙主延安之延長簿再以功超武節將軍令臨泉石與嵐之合河恃公爲藩援以安者五年後王公佐卒鎭人心離異不可復一公曰吾愛一死哉死而兵民完何害敵以不卽下蘊怨積憤于我者爲日已久吾死而捐兵民以甘其心吾寧忍哉遂乘夜載鴟夷濟河款我大將孛罕營降解所佩誓曰所有二于公者有如此劍將孛義之相與飮酒盡歡以便宜升臨爲州拔公爲帥遣將州兵略地鄜延悉下之移鎮延安臨民德之寧輕去其鄉不忍去公多携家來從朝廷定賞納土功授延安路兵馬總管時旣偃甲兵民方去危卽安公敦勸耕稼裁抑游惰使各食其力鄰境聞之逾河而西雖有良田美業不恤願託處深谷者不可勝計公符其守令居借之廬畊助之牛儒生之賢而文實聳人瞻聲動人聽者如侯邱嚴明焦舉華張王明畢美邵瑞張輔之流欲仕者則登之幕府以師羣吏不者則升之學宫以範多士由是悍俗消革而禮讓興行矣㑹大料民止籍主戸漏其僑家浮客者或咎以何獨損吾戸數公曰若欲肥版籍以衒庶耶一旦賦役下僑浮生心必計曰等賦役也與避人境而不免何如歸吾鄉之安焉客去而主孤實亡而名存祗益累也人服其能圖遠其後河東山西果徙其民公謀使者曰若所以必徙者豈以代吾賦役而汝無得哉吾所籍止主戸未嘗妄以僑浮爲土著版册具在可稽也何如勿徙使各奠其居卽是民推擇置吏歲集其賦入是以吾土育爾民奚必徙其以是歸語汝帥使者亦度民業巳安此雖徙之且道亡不達許之而還尋有詔令民隨在占籍公猶仁其浮僑爲輕其調庸同列害其能且位加吾上多行金帛貴倖以訟公徵使就辯公贄貴幸幣殊涼薄庭臣以訟者之言方騰能不以賄免顧歎重其忠儉歸益自刻勵四方行李至者相踵廩肉不足爲射獵鹿豕以繼贐勞之須皆出其家不足則從富人稱貸郡民之豪傑謀曰吾屬依公以生坐視寡乏莫之省恤人曰我何捐金餉之亦謝不取及大封宗室割所治爲公主湯沐邑有說公厚斂入謁可結主知且無令同列得先之也公曰吾豈剝下市寵者耶不行先朝時今上以太弟之重征南詔駐兵六盤山公見行府建言始延安之籍民爲兵皆懸賞募之人率授銀三十兩始行及遠戍久役津餽不如于前老稚日困于家則怯者挺身而孤亡勇者連伍而俱歸軍吏以法誅之莫之能止也非大選閱郡民厚業饒丁者更代以休其力盈其氣則兵帳不完上然其䇿讓隣道臣之在行府者曰若曹之來其所請求不過官資之崇庳符節之輕重便已私耳亦嘗有一白軍民利病如袁湘者乎聞者愧讋自是雖不自行遣官屬有所奏請上必曰若從袁湘所來耶言輙報可歲癸丑冬將適京兆未至病歸人來唁疾公安之言笑如平時夫人問焉一旦公疾小加于今日如吾母子寡幼何惟治命是聞公曰吾平生所爲無有不可語人者天將後余是外非若知也以十二月九日卒于正寢年五十有九以某年月日歸葬臨州某鄕某里先人之兆次凡再娶元配馬氏繼配梁氏子男三人馬出一人未名前公卒梁出二人克忠昭勇大將軍隴右河西道提刑按察使克良提舉太原採木司女二人馬出伯適定西州尹富察仲德仲適中部縣尹張欽用男孫四人長仕圭餘未名女孫八人在室十八年燧以陜西憲副錄囚延安昭勇君自隴右得告家居一際言色固以心推爲鉅人長者若不見毛髪比出紈袴習者古之人有云觀其子可以知其父矣明年克良持君書與公事狀謁銘墓碑因得究公爲人益自信昔者觀人之不失也蓋嘗論之人生紛綸尚武之時懦者固不能以自立惟強之依而强者或徑行而無謀亦旋取敗亡善謀矣其力不足以先衆則人亦莫之信而爲之使嗚呼公以此時克樹功業裂地而侯以傳諸子亦戛戛乎其艱哉是可以載行事于石而見白于後世也銘曰繄袁之先世繼顯賢由金百年力本乎田起培而行篤公之自逢時未靖實艱初試人求其生雌從雄鳴有距跳踉有翼奮翔臨泉葭蘆襟帶河山公居其間撻其悖頑智資我謀勇怛吾力我麾我招莫不順適國步未改効死我臣天命維新吾生斯人府葭延長綏丹鄜坊我旗樹降千里其疆朝爲逋亡夕則樂康人無我敵束爾矛㦸敏而耕桑督而蠶織而方瘡痏孰爾朘刻孰顰孰呻煦手摩撫隣曰時哉爰適樂土寵光不希鈞言不危說進可行丹扆肯頤不年永辭延民之思今三十年如在柩時黃髪齠子枚誦其美事上之忠繩下之嚴生民之仁與人之謙顯親之孝奉巳之廉人一二有公乎其兼延民之思日遠則忘我詩之碑百世昭章光祿大夫平章政事商議陜西等處行中書省事贈恭勤竭力功臣儀同三司太保封雍國公諡忠貞賀公神道碑大德九年榮祿大夫平章政事上都留守兼本路都總管開平府尹兼虎賁親軍都指揮使賀公以年七十有二丐老制進光祿大夫平章政事商議陜西等處行中書省事賜白金爲兩五百楮緡二萬五千錦衣玉帶旣遂養安其鄉又以其子參知政事勝襲上都留守虎賁十一年成宗格天儲皇削平內難夏五月念舊臣將有咨度俾中書遣使馳傳召之承命卽行而道疾皇帝嗣位下詔萬方其播告使遭諸樊橋以勝參知政事上都留守進拜平章政事爲慶公撫膺感極而薨七月九日也年七十四訃聞三宮迭爲惋悼遣勝馳十乘傳奔赴隨贈恭勤竭力功臣儀同三司太保封雍國公諡忠貞至大二年七月二十九日行在南坡以公墓碑未銘敕翰林學士承旨臣燧撰述之仍俾勝馳十五乘傳入秦身視鐫立嗚呼其榮生哀死始終于公爲何如公諱仁傑字寬甫其先河東隰州人居京兆則由祖選徙考惠賁特降金符京兆總管諸軍敖拉贈輸忠立義功臣銀靑榮祿大夫司徒雍國公諡貞獻初歲壬子憲宗國母弟世祖于秦受詔征雲南禡牙略畔之山明年將戒塗貞獻作室得夙藏以白金爲兩二千五百來上曰陛下封國所出臣何敢私願佐軍興又曰臣子生二十年矣力能荷祋請置顔行主將憤其不巳白而專爲也幽貞獻長安帝聞之怒縛主將至將中危法以開國世胄而釋公由是入備宿衞經吐蕃㬅沱涉大瀘水入不毛瘴喘沮澤之鄕深林盲壑絶崖狹蹊馬相縻以顚死萬里而至大理歸由來塗前行者雪深三尺後至及丈峻阪踏氷爲梯衞士多徒行有遠踰千里外者比飮至略畔最諸軍亡失馬幾四十萬匹後從濟江歸正宸極眷寵日加征伐蒐田無不從負御服物多至一二十事風雨霜雪暴衣露處飢渴皸瘃未嘗告勞他人滿直三日而更獨公與董文忠爲長上侍疾或一月不至家燕閒喜訪聞外事至元十有一年梅應春舉瀘州降制卽以爲其州安撫使明年大兵圍重慶又明年制使張珏遣王立潛師襲瀘取之醢應春殺戍將千戸熊耳而有其妻宗甚嬖之宗王相四川行院李忠宣之外妹立後移守合州行東川院者則憲宗帶玉器械哈丹庫哩濟蘇二人先朝陟方乎此㧞將甘心故合益負險不下宗說立遣張卲軰蠟書間行至成都請忠宣受降忠宣從五百人至立則開壁納之忠宣以王相罷置其吏而去東院械立奏殺之時安西王受詔征漢比未知合旣下也自軍中下敎長安遣燧乘傳招之下則許貸立死以爲安撫使而誅立敕使先至其日將醢之而教亦至東院以敕教違行死生異也破械出立而幽之别室相府東院各使再請宥密以帝有成命不以教聞會西院遣都事吕端善他事至京語公其然公卽入聞帝詰宥密臣曰卿輩以殺人爲嬉耶使立生至則己死則汝其從之驛致立爲合之安撫使虎符先師許左相多公力能囘天還而立見謝曰敎活臣于始賀某活臣于終惟死以報明年帝怒王府一相大治宮室凋弊秦民召至而不敢見公爲譽釋于中俾仍相秦以歸其年內出白金陳御榻前如所上數前公謂曰此卿父略畔佐軍興者卿母在此其以是供具爲養辭之不可歸請其母曰君賜也宜仁吾宗悉散之又明年授正議大夫上都留守兼本路都總管開平府尹又明年授資德大夫兼虎賁親軍都指揮使加佩三珠虎符十九年帝曰昔從太祖飮水黑河者至今澤及其子若孫其從征大理者亦朕之黑河也安可不錄其勞悉大賚之于公加恩數焉年旣及艾侍帷幄日久事益明習人以宻近天光丞相而下猶必咨託俾詗動靜而始入告如是而不怙威不矜寵不黷于貨克兢畏淸恪自持故有言必信晨夕彌縫滋多事祕外不聞其顯知者如擇童女實掖庭命旣下矣公曰宮妾不足于使令宜妙擇高門德望之家端嚴明淑者當之豈可槩行以駭天下聽聞使深山窮谷擁瘇麤惡之子不待其年而急相偶非昭代盛德舉也又古貢方物皆其土宜今者和市非產其土一切征之增直倍蓰無所于取吏責後期從而罪之實病民甚又永盈司倉任文通稅民不入粟而私給劵取直其外懼事覺顧先陳他吏之爲辨服其誣當誅公言罪許自陳得原者令也彼雖誣人事同自陳若重加罪則塞悔過之塗有言事者亦將創矣又煮海爲鹽由人力以出者也山後諸州漕司必遠餽與民而徴其利今瀕上都池泊皆鹽實天惠養斯人者無有課入禁不得食有盜食者罪當没產終不能止而冒犯滋衆是爲穽畿內也帝皆然之止童女勿擇物非其土所出勿和市免文通死重杖以懲鹽弛其禁民爭德公爲廟李老峪設像以祀二十有五年進階榮祿大夫中書右丞以子勝爲中書參知政事及僧格爲尚書省以威制天下大爲鉤考奏公爲留司上都錢粟損失頗多時其長則國人烏納呼及庭辨公曰臣漢人也是雖非臣盜取不能戢吏爲姦罪則在臣爲之長者則曰臣司留印事未有不白臣能出者惟當罪臣四十日中彼至七十餘奏而兩公爭自罪終不易辭帝曰受爵而推人者有矣罪至而爭引歸己者惟汝二人其罷勿竟則公見信于友而結知君者非有素可襲取耶然計始入臣以及丐老實五十四年掌留鑰者居半倉廩府庫一俟啓閉衞士衣食亦仰均賦乘輿歲至比其南也少乃數月頓舍宴享諸王百司送徃勞來細而米鹽燈燭大內之中奔走徵呼一日數至其所受委不怠不忘克當聖心未嘗取其逆怒以故資身百備皆出賜予最其多者楮緡五萬玉帶珠衣宴服貂裘華飾可等國人貴臣他珍玩不計人則置之曰不過受也斯其君臣之際交孚然也其家庭則數歲必一歸省于秦旣至不可以久一再月則必牽衣流涕而別前夫人劉卒宮中欲女以國人公以漢人不可偶是鉅族娶從聖武西征留使鄭公師眞之孫數年而喪明三十年終不以疾而失歡其初無媵侍在旁遇寡嫂嚴而有禮與諸弟雖篤其友必飭其過妺壻不謹宵直至撻之與人交坦白以誠藉位勢以暴人者不下也以其年九月二十有一日葬鄠縣太平鄉貞獻公姚夫人鄭兆次前夫人劉祔公二男四女勝踐公平章又請推恩上及祖考再世國雍其爲孝也大孰加兹與適上都兵馬使瓜爾佳哈布爾者劉出也最後公薨再月而卒與適河東山西道提刑按察使韓世英子慶今參知政事董士珍子守正虎賁親軍總管楊祺者爲鄭出男孫三慶寧興與女孫二皆幼是正系也其宗從則伯父貞不仕季父斌同知京兆敖拉總𬋩府事四弟義立令同之朝邑禮貴不仕智明管州判官信仲四川南道宣慰副使妹適王權省子貴子男十八人女半之男孫九銘曰大帝淵龍華臣之逢孰近而初孰久而終爲世所知同公流軰百十維人官出皆外凋喪相繼惟董文忠朝夕帷幄與公友從珥侍中貂廿有六載董先朝露乃眷公在生人于死引慝其躬民瘼之求悉其勞庸位亞人臣晚極其報又爵其子公武之蹈迨歸老秦制曰祿之俾其省臣事諏政咨曾不再稔方銜國恤震邸見招竭蹷力疾天不憖遺道薨樊橋五十六年始終兩朝今聖曰嘻奉常汝諡主爵玉署汝封行制凡厥哀死無後邦經乃陟保衡忠貞易名乃與乃考干雍再國若稽夏書九州有一餘受封家孰京與夷皇上猶以墳道未碑乃敕禁林臣燧次述公于佳城奚感不足胥是有扈左豐右甘名與不磨終南在南百夫長贈中大夫上輕車都尉曹南郡侯坤都岱公神道碑至大三年下詔萬方推恩中外一日官之先昉于五品由庳崇等而上之列爲五爵五品四品由男而子其封皆縣三品二品伯侯以郡一品則國公其世數男子惟考妣一世伯侯及祖妣再世國公及曾考妣三世而極用是中大夫尚書吏部侍郞桑烏遜職登從囊旣通以顯贈其考坤都岱中大夫上輕車都尉曹南郡侯祖庫春中大夫上騎都尉曹南伯祖妣額森特尼太君妣周太夫人妻馬夫人皆同郡曹南吏侍將侈天寵于碑請燧銘之故摭太常博士王天祐之狀以敘在太宗世欽察猶未附定宗憲宗時猶王也詔與大將河南王蘇布特討平之其部屬始至中土上騎則其酋諸孫􅊢河南王戲下長百夫以卒公嗣爲之從平河中下鳳翔殄敵軍鈞之三鋒山破汴蔡滅金後詔王戍河北公始家曹之定陶又從諸侯王扣肯巴哈及大將察韓伐宋寒出暑歸歲以爲常殘漢上之襄陽郢復德安援淮右諸州轉鬬干里登陴陷陣斬刈不可馘計幕府犒功居諸將先金實于櫝衣溢于笥馬連于櫪歸則課僮奴耕稼畜牧隨致豐潤性倜儻喜施時節擊鮮與閭里故舊爲樂其後戍光歲戊午宋兵犯郛率死士出禦斬獲過當中流矢輿疾至家卒年五十一葬新興東原夫人則周亞尹女也皆柔淑靖恭婦德母儀稱于婣族子二人長烏克岱尹出嗣長百夫從攻襄陽斬項老白都統濟江下鄂定淮浙由忠顯校尉蒙古軍總把錫金符監眞定河南曹州大名翼千戸解職子某次則吏侍從淮安王巴延河南王阿珠濟江元帥府知事升經歴以給西京河東蒙古軍衣糧鈞賜鞍勒弓矢鈔二千五百千入爲衞士出監武邑眞定兩縣眞定升州同知州事進官奉議宣政院斷事官進朝列院經歴驛徵西番負金爲五千鈔八萬五千丁妣夫人周憂依墓爲廬摧毁自致鄕里孝之尋起參議院事升西番宣慰使虎符入爲郞銓曹從平寧王亂大㑹供億不乏賜爵二級鈔二千五百干男孫七忠顯校尉某嗣長千夫買兒河西福興丑妮子巴哈錫都皆幼女孫八人五歸名門嘗反覆究觀自上騎至吏侍纔三世矣而歴事太定憲三宗世祖成廟前聖今聖七朝雖不可方開國諸臣亦善承其家者而吏侍尤敬愼寡過有才臣稱銘曰蓋嘗論刑其極斧鉞誅止有罪猶爲小罰大刑維何無慘甲兵幅員判裂爭地以城淵淵伐鼓陣于原野入死出生决食頃者嗟哉維公束髪卽戎進退金革奮不有躬于河于漢于淮之亂金滅戡宋勇必軍冠無眼維矢信不識人不殪懦夫而賊果臣其在兵志士而死轡庶于事君身曰能致雖死已久而名則延甲子垂周䘏章自天亦本孝子吏侍之籍其丁內艱卽墓而舍敕起院參使番西南佩之山節虎視眈眈入爲郞官銓曹是職日月爲斷當其陟黜矧又兄子方長千夫將久其傳黃金世符門閥之崇有耀閭里碑以表阡百世伊始南京兵馬使贈正議大夫上輕車都尉陳留郡侯布色君神道碑布色氏始由普爾普以佐命功位司空生司徒巴爾圖司徒生太尉和賚連姻帝室生世宗母宣獻皇后與金紫光祿大夫統軍巴勒統軍生世宗元妃與鎭國上將軍布展鎭國生昭勇大將軍守道昭勇生君諱長德年二十一頎軀偉觀精巧騎射以扈宣宗播南京功官安遠大將軍遙領濱州同知壬辰義宗播歸德不及從其明年㑹西面防城提控崔立舉城降盜發陳州南頓項城沈丘假公金符將二千五百人往平之而劇盜張進犯京陳橋門又殄之收盜積菽麥以拯飢民後從諸侯王伊克南征殘漢之襄樊棗陽郢復德安淮南黃蘄及安慶而還時未改汴梁拔南京兵馬使改令中牟原武太康三縣入爲南京警巡使再爲兵馬使至元九年養安其家以十五年四月三日卒年八十五夫人張氏前卒二十年合葬祥符縣之某鄕後三十五年當皇慶之元子荆湖北道宣慰使翰文走書燧曰吾先人仕太宗朝未大淸顯庭臣哀其驅馳與翦荆棘茇舍以招徠干戈餘民安集三縣警斥寇攘于河之南勞勩三十有六年與翰文自學仕畧其卑官惟疏九制王府郞中令倅開成路歴知松江漢陽二府入爲中書省左司郞中是職也凡陶冶四海之官與夫經國之賦議禮制者皆出乎手非其人有時譽者不授翰文得之其材可知出同知淮東宣慰使轉平陽總管與今宣慰荆湖父子相継七朝請如故事褒其元墟制可贈其考長德官正議大夫勳上輕車都尉爵陳留郡侯妣張陳留郡夫人祖考守道太中大夫輕車都尉陳留郡伯祖妣完顔陳留郡太君翰文故妻暢陳留郡夫人臣焉叨此昭融極矣今也有孫兩人伯珪季璋私廟時饗能執豆籩足免無後不孝之蹙求可筆是事國定家之槩者匪公其誰故卽汴士張孝友之狀以書且告所未知者曰金有天下諸部各以居地爲姓章廟病其書以華言爲文不同敕有司定著而一之凡百姓金源郡三十有六廣平郡三十皆白書隴西郡二十有八彭城郡十有六皆黑書其等而別者甚嚴布色氏于金源次居五其素爲華望之家不言可喻銘曰猗嗟之家其在盛時奕世三公男女結褵不于庶姓于帝之室大定哲君猶所自出金歴旣祝一氣之機無成不渝無顯不微存者遺胄伯千什一今由子貴推恩爵秩祖伯考侯輕車其勲郡于陳留覃及妣嬪勒詩豐碑光華孔煜名與河流瀰瀰無竭臣錢開仕恭校
