body:
  text: 元姚燧撰廟碑長春宫碑元貞之始年秋九月七日皇帝御香殿守司徒臣鄂爾根薩里集賢大學士臣布哷齊奏輔元履道元逸真人臣張志仙言臣之曾師長春子邱處機為全真學於寧海之崑崙山太祖聖武皇帝當劗金之十年方事西域聞其有道自奈蠻俾近臣劉仲祿持詔求之又急其見而遲其來繼伻以迓之抽兵以衛之與語雪山之陽帝之所問師之所對如敬天愛民以治國慈儉淸靜以修身帝大然之曰天遣仙翁以寤朕命左史書其言又以訓諸皇子者世祖聖德神功文武皇帝以敕臣徐世隆載諸靈應之碑惟是太祖格天之年丁亥夏五詔因其號易所居太極為大長春宫猶未有碑至是六十九年人巳無知受名所自不及今焉陛下昭代曉之詞臣俾刻金石則益不白于將來也敢昧死請制曰可十月十日事下翰林臣燧實以其日直筆故得兢惕以奉明詔臣聞老子曰取天下者常以無事用是究觀歷古受命之君規規務取止乎禹迹之舊其所後服固非兵不能讋故萃衆智驅羣雄謀而鬬之櫛沐風雨露處暴衣審彼巳效成敗或纍歲踰紀耘鋤未平可謂紛紛事至殷也矧我太祖天戈所直無敢傃刃視徹四海之土疆墟萬國之社祧與臣妾億兆蒼蒼以生之黔首不啻疾風之振林稿非囿夫祝栗蒙汜燭龍不照而馬足所及其勢猶不是止焉庸以較夫聲教不出禹迹者僅如耳之在面有不能居其十一可曰自有生民以來所無惟所有遠故後服益多惟為猷大故久焉而成功其事之殷有百十于古先者于是之時乃遑旁求方外之士從容暇豫猶功成治定束干戈無所于試之世不知垂統之艱苦不待長春之告顧于老子取天下者常以無事之言巳陰契其説而冥會其機嗚呼聖哉然考仲祿之行其年巳卯長春承命絶宋金使幣從其徒十八人者以行明年馳表謝之猶宿留山北辛巳會趣使再至始發軔撫州經數十國為地萬有餘里蹀血于戰場避寇乎叛城絶糧于莽闃之沙漠自崑崙四年而至雪山馬上舉策試之未及積雪之半觸寒栗裹皸瘃寧其身之不恤以憂軫斯世計是勞績有不在開國諸勳之下故帝錫之虎符副以璽書不斥其名惟曰神仙凡為是學復其田租蠲其征商癸未至燕年七十六矣而河之北南巳殘而首鼠未平鼎魚方急乃大辟元門遣人招求俘殺于戰伐之際或一戴黃冠而持其署牒奴者必民死賴以生者無慮二三巨萬人其推厚德植深仁致吾君于羲軒者歷古外臣當受命之初能為是乎匹夫一言鄉人信之赴訟其門聽直其家為有司者猶罪以豪傑以武自斷而渙其羣以二三巨萬之人散處九州統馭其手帝不疑之斯必有以豈屈子所謂名不可以虛作者耶有遇其時未必見隆于後世祖嘗語其嗣道者曰乃邱祖仙翁朕及識之加贈長春演道主教真人二祖之見而知者然巳陛下以聞而知顧為碑以表所由則長春之名藉三聖以久垂者母惑也臣又思之宮之與碑宜一其時太定憲三宗日不暇給嗣教真人尹志平李志常不請則宜以世祖之聖在位之久其培樹擁衛斯學之力而張志敬王志坦祁志誠不一言焉及仙今請而輒報可豈天固存列聖未究以待陛下為終之耶矧即位踰月為壇壽寧宮凡曰月列星風雨雷電百神之親上山川社稷林藪走飛諸祇之親下莫不奏假赤章以禋致之十一月與改元端月才九閲月實三為壇其後壇之延春閣天步一再親以戾止其為國與民介祉導和受釐請命者文亦極矣又虞自經厄以還禁為醮祠今雖開之京師而外未白也乃下詔萬方其旨若曰先皇帝令江之北南道流儒宿衆擇之凡金籙科範不涉釋言者在所聽為若然先皇之開醮祠者有成命也為犯法臣所不愛竟柅而止自今其惟以先皇成命從事是世祖獨未究者陛下又終之也嗚呼事之開也有門而來也有塗其就也有時而成也有候方是詔下四海之人感激奮言始吾以為經厄之餘邱氏之學熄矣陛下噓而然之俾屯者以亨塞者以通梗其道者除之取其業者還之叢是數美于仙之身又冠之以寶冠薦之以玉圭被之以錦衣皆前嗣教者所無嗚呼仙之求以報盛德圖以酬至恩其子若孫與雲礽其來無極者為陛下祈永永萬年當如何也臣燧敢拜手稽首而詩之曰於赫我祖帝蹤其武俾肅將之􅗴平下土既奠南邦西陲未疆乃鼓乃桴龍旗載楊何水不亂無山不越萬國弱草剛風斯拔踰十暑寒振凱未曰六飛之騁確確其艱孰灼帝心休其益間繼夕以朝黃昊尚友方詔外臣道德資取崑崙載牽于于其來及之雪山年已徂摧瀝厥腎腸為告悃悃莫匪至言身國之本維帝孚之曰天覺豫飭無怠忘子訓史書虎符寵綏璽書誕告凡為爾學其復無撓又曰長春而所宿號即名而宫歸主其教假以澤物宏帝之仁于死于俘必拯以全旋還其真子孫衆有一絶一繼孰世其守有惑其道而否臧之人曰不然太祖皇之矧我世祖封植益力曰爾長春朕幼及識太祖皇之維朕將之曾諡四言煥其唐之有嚴今皇乃聖乃哲身先孝治祖塗孫轍爰詔下臣伐石劘穹臣拜稽首二祖之功豈人不忘維帝欽崇驅馬飛廉屬車豐隆或從上帝陟降斯宮靡祥不臻奚祉弗屆於皇我皇萬祀攸賴普慶寺碑大承華普慶寺者皇帝為皇祖妣徽仁裕聖太后報德作也裕聖以歲戊午來嬪越三年大帝建極當至元乙酉方草有八年裕祖陟天在疚煢煢茹荼與蓼上以慰安大帝于倦勤中以惠鞠晉邸順考成廟之不天皆俾不大衋復乃心下為皇孫武宗聖上擇師取友督勸于學俾知先王禮樂刑政以為治國平天下之具若曰乃裕祖獲心九有者正由乎斯外接宗親之會見內飭宮臣之率職致孝極慈敦睦示嚴如是而善韜智晦明以藏其用大帝才之關政于家則曰于婦是謀投大遺艱不言意喻草有九年順考陟方又二年大帝登遐柱傾于天維絶于地急變秋也徐為圗回未嘗大聲以色益示暇豫經時無君四表不聞枹鼓一鳴召至成廟于撫軍萬里之外授是神鼎易天下岌岌者為泰山之安俾聖子神孫得以乘承今億萬年大德二年詔武宗復撫軍于北日侍慈闈者惟今皇上一人耳故情不分而愛彌篤怡言煦之摩手撫之食言而羮息言而牆又伺有無而增益之會太官達納監龍興還由老無子自簿藏獲數千指牛羊馬駝蹄角亦數千田屋資貨猶不與存盡獻之隆福宮裕聖則曰吾何庸斯其賜今皇上四年裕聖上仙撤是獻屋為殿三楹事佛妥靈以盡孝思由前順考之國河內未至而還乃與今皇太后克成先志出居二年成廟登遐馳歸京師內難謀作兆緒滋章先事奪之殄殱大慝淸宮以待武宗之至既踐天位惟以其月授皇太子寶中書令樞密使誕告萬方明年至大之元視昔所作圖報弗稱乃慨歎曰德一也時則二焉始之報也吾未出閣惟其身今也登兹元良可不為天下報乃市民居倍售之估跨有數坊直其門為殿七楹後為二堂行寧屬之中是殿堂東偏仍故殿少西疊甓為塔又西再為塔殿與之角峙自門徂堂廡以周之為僧徒居中建二樓東廡通庖井西廡通海會市為列肆月收僦贏寺須是資大扺橅擬大帝所為聖壽萬安寺而加小其磐礎之安陛戺之崇題楶之騫藻繪之輝巧不劣焉亦大役也未嘗發民一夫皆傭工為之其費一出宮帑既其落止淨供之修薦福冥冥或者裕聖乘雲御風陟降自天歆兹崇報必反而酬隂騭于下降福穰穰者理則有之何難灼見焉惟今皇握黃圖以負丹扆其大則天其威則雷霆其不測則神明推是報德而上之將不裕聖一世而止其孝思遠及烈祖者何窮已哉崇祥院臣請礱石以頌功德敕命臣燧臣伏思之佛氏之言為書數千卷博大閎肆學佛之徒猶有白首不能遍觀儒生未嘗夙一經目雖勦為説終爾膚近不能深造其微故惟如敕所教惟詩報德其辭曰有岑其宇有踐其廡有楹惟旅金鋪雕礎瞿瞿其瞻劌劌其廉秩秩其正於粲其嚴伊誰考斯帝宮亞匹則今皇帝覺皇氏即其即以圖薦福于幽於我裕聖報德是求惟我裕聖為烈無競大帝遐征儲席虛正時我成廟撫軍龍荒惟朝委裘三月皇皇萬里召赴天位卑據其神而明孰測為度如是拱默宮居深安陋昔后母簾政僣干惟撫慈孫于學知勵又開太平大業今繼始為之小其報猶私今焉一人以天下為以天下為誰專裕聖嘉與慈闈實普其慶往聖已矣慈闈萬年翼翼綿綿悠久如天皇上之心初豈以巳覺皇貞之其錫繁祉江州廬山太平興國宮改為九天採訪應元保運妙化助順真君殿碑天下之人有安居不為其事者乎安居不為其事古曰間民重其賦而刑隨之今也山林之間羽服之流幾何人哉苟安居不為其事人亦孰倡而致于其道庸心其教哉制授沖靜真常凝妙法師提點廬山太平興國宮録江州路道教湯德潤儲贏于儉蓄細為大者十年始田履畝才及三千今萬有奇謀其徒曰之宮廬山名祠也九天採訪應元保運妙化助順真君明神也殿實勝國所為既冥且卑妥靈弗稱其撤改為江西行省左丞呂公師夔及其弟福州路同知師山行金王局總管師寬淮西江北僉憲師順江浙財賦總管師謙與諸子姪發米于庾割田于郊捐幣于帑為鄉鄰先故富室佐財貧者輸力如恐人後為殿七楹度高百尺以祠真君夾為翼室右祠三官左祠四聖皆三楹前為拜殿合之衡廣為尺百有四十縮身不足于衡十八之四若其攻金攻木埏埴設色之工殫極其技無遺巧矣遣其弟子熊應松周祖淸馳書龍興請燧曰斯宮之興五百餘歲勝國盛時加號應元則皇元有天下之號巳兆形于斯時逮今海宇既一大帝至元二十有一年三十年今皇元貞改元之明年大德八年凡四降詔一賜提點周得一餘皆以賜德潤其于衛持斯宮使人不敢雜揉瀆侮略于其間禮亦優矣德潤以是龍光洊至廬阜載躬重未云喻惟有奬率道流竭才新殿奉安元辰日夕祝釐祈永睿算維億萬年庶幾深山友木石者報上之智畢于如此願銘之碑謹併上圖經匡廬得名與真君事實惟擇筆焉燧諾而思真君靈貺數百年為有國欽崇章章傳紀者無庸重述未問而當告與疑而未瑩者敢用陳之其引朱子傳書排以歷陵博陽山為敷淺原其山卑小惟廬阜在大江彭蠡之交最為高大宜所當紀然考禹貢言原非一冀之太原徐之東原雍之原隰皆以高平得名何獨岑絶如此廬阜可名原耶大抵是書載導河積石至碣石其間所經如龍門華陰底柱孟津洛汭大伾洚水大陸九河逆河入海又及其所會之水灃涇漆沮之入渭澗瀍伊之入洛亦何詳也至岷山導江東别為沱又東至澧巳跨蜀而荆數千里矣又曰過九江至東陵東匯入海數語而止亦何略也故朱子論曰以事情理勢言之洪水之患惟河為甚時龍門九河事急民困勢重役繁禹親涖而身督之若江漢則地偏水急不待疏鑿或分遣官屬往視况洞庭彭蠡之間三苗所居水澤山林深昧不測彼負險阻頑弗即功則官屬之往者未必遽敢深入是以致誤者或多也因思余昔拏舟成都至夔門其所未至去秭歸三百里耳秭歸而下至江陰望海門而還長江萬里浮遊逮遍然蜀荆之山條脈聯絡壯觀天險者如眉之峩眉嘉之離􅕞渝之瀛山涪之鐵匱夔之赤甲白鹽巫山及峽之黃牛危巖絶巘刺天入雲何啻千萬與三十六江水會夔門者皆所不書其見遺者豈獨廬阜哉要朱于之言千載不易者也其曰廬山始名南障由周桓王世匡績學仙所廬故名匡廬圖經己辨晉人紀者之誕所未問而當告者自周而上無為老子者何有乎今之祝釐時天子諸侯自求多福皆有禋祀禋祀多名合而言之天曰神地曰示人曰鬼神非直上帝也日月列星風雨雷電凡本天而親上者皆神也示非直后土也山林川澤邱陵墳衍凡本地而親下者皆示也人鬼則宗廟社稷凡有功生民死而廟食者也天子既祀天地圜邱方澤至于時巡則又燔柴四嶽隨其方山川皆望秩之不遺無文諸侯四時望祭其方五官五行山林川澤在封內者亦歲遍之後王德薄不能時巡既曠望秩于方嶽諸侯復不世其國遷代無恆而歲遍又廢其封內惟道流之宇名山川者由祀其師以及其土之示雖未有疈辜薶沉牲幣之備而潔齊以致忱者晨夕至焉國家以其依居嶄拔奇峭幽深繚鬱當地氣粹淑之會其神必靈賜宮觀名置官領之時大醮祠庸以奏假赤章七帝后土與本天而親上本地而親下凡曰神示可介祉導和斯世者莫不致之為位多至三千六百亦幾秩無文矣實于時巡不舉之典修之其宫顧為有國者之所賴焉嗚呼亦有功世教之大者也然惜其知神之神不知神之所以神何也由雜夫荒怪也其尊無對大無餘者皇天上帝一而巳矣有曰上天神后者蓋天言形體帝言主宰后君也與帝同出而異其名天子曰元后人臣匹天子者亦曰后春秋王與后之鞶鑑書伯夷禹稷為三后則后者又君臣同稱昧者不知上帝后土視之巍乎其無眹也聽之漠然其無聞也而造化之迹則體乎萬物而不可遺乃以形求肖人為之上帝則冕圭袞舄以為失耶詩刺衛夫人玉瑱象禘胡然而天而帝屈原亦曰龍駕帝服若真有是人被是服者其來亦尚矣哉甚于后士加筓珈褕翟七政一也日木火土服殺上帝月金水殺后土山林川澤之為王為大人亦若斯者奚足殫紀夫誰與袪之勝國之謬尤在增號淫昏之鬼婺源祠山梓潼之屬皆帝之是則尊矣其如降上帝與之班何今事實所謂九天採訪應元保運妙化助順真君者九天之屬見於天問注以九為陽數之極固無大窒于理唐李玭碑止曰廬山使者廟南唐曰通元府勝國太平興國中易廟為觀以年命之神宗進號應元保運真君徽宗易觀為宫刊鏤玉册臣而進之于時洪芻提點是宮奉安玉册實為之記舉録異記開元十九年明皇夢神人金冠朱衣乘車而下曰我九天採訪使者當館我于廬山明日又降于庭命吳道元圖其真建祠山陰明皇親書繆篆殿額以賜其文惟曰九天使者之廟無採訪之稱後世加焉其榜固在也然原以求之非必權輿有唐東晉之前方士輯五嶽真形圖為書曰嵩岱華恆皆有佐命之山而衡嶽孤峙無有夾輔黃帝請命上帝建潛霍二山為儲君靑城山為丈人廬山為使者開元中天台司馬承貞請立互嶽真君祠使者之廟當作其時其説詳而正據而不鑿謂可袪齊諧志怪之惑者真知言哉理宗又加妙化惟助順者無徵焉然使也銜君命以出者惟人也不能周知善惡之實彰之疸之故採以資人之見訪以勦人之聞神示何假人爵以為貴賤等威佐上帝行四時以運寒暑日月于上觸石而出膚寸而合天布大澤雲雨不終朝而施德博大出百物而潤澤于下神變功能如是其聰明正直而一有不待夫視宜無不見不恃乎聽宜無不聞正老子所謂天網恢恢疏而不失者如必採以資見訪以勦聞而始福善禍淫斯人則不採不及知不訪不能通失將衆矣烏在夫為天網耶余故惜其知神之神不知神之所以神者此也盡辨之其説猶多姑是舉隅焉耳非獨使讀書以纘文造道而明理如德潤者知之可以髣佛鬼神之情狀而不溺于所聞鬼神聞之亦懌豫于冥冥是燧斯言曰千載而下特見有如之人不可以非道誣也銘曰維天旴晧下士是冒羣望降釐衡嶽如卑南服之山匡廬莫夷有嶻其岑有育其麓衡虞材之烏用不足氣聚金寶騰輝中霄上與列星爛其昭昭倏噫而風隨以雲雨千里崇朝膏潤斯溥造化之迹不掩如斯皆本二氣良能之為維古哲王及始圖報由時嶽狩羣望必告嗟哉後王曠不省方或事云亭侈愆舊章維方外臣竊取咸秩大為醮祠無文每及盤盤之宫負聖治峯其師湯君言出衆從設格普天三千六百為位勃磎神示安宅撤搆斯宇高廣異先鐵鷟金鋪尚副揭虔爰奏赤章媚于上下不約而一萬福來迓資我元后山積川增維千億年萬方其承走為之詩俾爾羽服鼓鐘新宮步虛是續臣蔡共武恭校
