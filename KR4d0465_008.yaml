body:
  text: 元姚燧撰記喬木堂記余讀孟氏書至所謂故國非謂喬木而謂世臣者每歎漢之通侯其鼻祖頭蓬葆而手胼胝百戰以得之子孫恃其有土與民相師非度傳才一再罪巳國除其善失者坐酎金色惡而免耳幸後念功德世續之無幾何時巳復效前鳴呼尚何有于故國世臣哉今兼有者才汪氏蓋義武公以金亡明年乙未開壁天門山來歸而有隴西草有四州之地介于羌渾氐涼之間將其衆首殘全蜀諸子顯者忠讓忠烈忠惠忠烈子忠肅三世五公忠讓推節其弟忠烈從憲廟伐蜀盡瘁死綏忠惠斬叛將燉煌忠肅擒叛王略畔國家皆恃為西陲長城自外將相使牧猶草有餘人名以世臣通侯而豈慚焉中統之末詔奪強諸侯之世其土者俾不得而有轉使牧州獨是一門父死而子以繼兄終而弟可及旄鉞相後先圭袞相焜煌自乙未至庚戌七十有六年襲守其土而不變非列聖私之亦克終為下有以致也嗚呼不曰故國謂之何哉校今名臣無亞匹者忠讓之孫懷遠大將軍莊浪路總管安昌求名其堂為喬木且語其故曰國固不賴乎喬木以為故然無是亦無以知為故國何則其始也世臣樹之自夫甲坼而蘖培而溉之而拱把不枉斧斤使得全其天年而後至于喬其極者可表以百尋不然世臣去之故國遷焉則亦何顔而存為匠石所材資矩矱矣雖有條枚萌蘖之生樵蘇利之牛羊牧焉幾何不為牛山之濯濯哉又所樹也南北異宜南方氣燠葉斾斾然凌冬不解必春而新葉挺出而始隕蘀其喬也易故厥木惟喬書載惟揚南有喬木漢廣詩歌北方氣寒木榮于春而夏以長秋而零冬藏之根生才半年隴西得金氣之先而寒逾蚤其遲于喬也逾倍他方而史遷曰十年種木百年種德觀今十年才拱把耳雖乃鼻祖樹于種德之初至今七十六年未必能百尋其百尋者非貫千歲不能以至君能知乃祖種德之艱亦邁種之自身而子而孫而雲仍期百尋于千載之後則為國益故而臣之世數益多則喬木者豈不與故國世臣相始而相終歟是為記其年二月淸明書于神州客舍遺安堂記故上懷恩監州唐括君齊年友也以燧之生偶先兄命之其不恙時嘗請記其遺安堂疾革猶促為將啓手足顧言其子師臯曰記成當奠几筵以告嗚呼君欲鄙文忍死以待而吾遲忽于操牘其真負君哉追記之曰時有治亂故士有晦顯炎漢末世何時哉中原板蕩曹操託名討賊挾天子令諸侯孫策再戰而有江東以故龐公荆州焉依非依劉表蓋幸是方無有日尋干戈之事為避地謀耳及表即隴上來候發不官無以遺子孫之問故對以遺安表終不白其心之不欲臣已徒高其事而去自今思之畎畝果可以盡天下之安乎是有二焉有定在之安有無定在之安有定在則道無定在則義猶權衡也加銖于兩則不安而仰徙石于鈞則不安而俯且錯置輕重子尺寸之間而不安有是焉况大此者乎三仁同事殷矣微子安去箕子安囚比干安死二老同歸周矣太公安為伐紂之師而鷹揚伯夷恥不聽其扣馬安亦不可必人之安伊尹又異是焉方耕莘畝非不安也及湯三聘遂任天下之重一人之身始終之安自不能同者非易所謂時義者乎義之安可推移於一時道猶規矩也哲匠亦止守此有不能捨以為方圓如君止仁臣止敬子止孝父止慈交國人止信非書所謂安汝止者乎道之安可不易于萬世以君生平一官裔夷呼噓毒癘不難為往既時其出至郡踰年而求終養其親以歸擇有道俾師其子篤其成材與自汴而鄂安而能徙又時其處臣責塞子職供而父道周矣其安于道義者何如君嘗深思乎故于先民歌哭聚族之地揭以是名其意以為取之古未若師之今與其法之人未若本之家然遺必有受師臯其受者也年方壯矣好學有譽其行于家既如君之孝其親者孝其親其聞諸鄉又如君之信于友者信于友推是移忠他日有不能如君事其上者事其上乎君見龎公之䇿可施其時未可施是家於休明之世也大德龍集辛丑十月記壽萱堂記至元十一年既詔大軍南伐别遣宿衛之臣將突騎萬人出荆州為之聲威大將下鄂東嶽湖廣諸軍謀方江陵沙市是軍巳翺翔峽澧江陵之郊入聞曰三郡某縣吾所下也封之萬家領以一府俾歲傳致其賦京師待以分賚衛士毛君巨源由副總管而總管踰二十年自燧二憲山南分刺其府寄治松滋也聞唱邑士舉司馬溫公真率會約而月修之使民知長長于鄉因惟曰弟實孝之推也非善老老其家不知篤此遂友之亦十五年矣大德之元請記其壽萱堂為賦伯兮之卒章曰焉得萱草言樹之背竊怪漢儒鄭元許愼同其釋而異其文箋者曰諼草令人忘憂説文者引以為萱曰諼萱同物後本草者亦第言忘憂不及所忘之方將枵然徒對之耶佩之耶餌之耶至唐孔穎達疏之專訓諼為忘蓋欲得令人善忘憂之草不謂諼為草名始與諸説判不相契矣斯堂製名其在于忘憂乎夫曰忘者猶始有憂有待于排解消拂之也使初無憂烏乎施忘燧未嘗及識夫人之几杖以君白髮占之則夫人之黃髮而耆其年者從可知也夫以黃髮之親俯而撫其上白髮之子仰而承其下四表之內兩間之中得是幾家雖啜菽飮水猶胥與樂况宅是光顯而奉以華堂定省以候晨夕也溫凊以節寒暑也悅其口體有甘旨之充也伺其色言有使令之備也是府久其官而不調無三歲一徙陸走水浮資車與舟銜橛維節之戒焉為之鑒者人歲訟之至以罪去而獨無絲毫汙蓋善愼身羞親之所不蹈顯親之事必立憂情以忘用是道也萱何為哉不然彼閭閻之子力為可憂譴于有司詬于鄉鄰無俚之聲日盈親聞而富樹萱求以忘之雖甚昧者皆知其不可也故萱能忘不憂之憂而不能忘有憂之憂疏者未深信之蓋亦若愚推類而不得其説者也雖然耆年之人方歡而歎不疾而呻者情所同然同乎憂乎求易于愈心而快目者莫草木敷華之若或當其時君服命服為壽而前萬室之人其戚且故從而母之得其一莞而忘之者誰曰非萱之德哉承顔亭記嘗謂人子之事親不難于燠寒其衣旨甘其味以適其口體之奉而難于承顔以得其歡心斯政孔子語子夏以色難者也又嘗思之夫人之心變動于中千百不同而幾微必形于顔面塗人過前其安而色舒恚而色厲莊而色專有懷者其色鬱而肆滿者其色揚揚也吾皆得以識之况人子者日侍親側久接熟伺而不去者乎其承顔也亦易焉而巳耳雖然天之厚薄于人者不齊有役是心履霜踐露不及承顔者斯固非人力所為末如之何也已又有生而不學倫理不明恩愛不篤不知承顔者亦有墮四肢束于貧而力不能自拔不足于滫瀡之具不能承顏者力至矣或牽于祿仕遐遊遠適委親而不遑將反曰吾能公爾忘私不得承顔者是數者皆五典之罪人也仁卿嘗仕矣行年五十而母氏八帙猶康強咸棄不就其色養而仁卿思以終身寧燕休心娛目乃作亭中園周植嘉卉奇石名樹叢篠綺張繡錯麝芬雲蓊者亡慮百品風雪之朝花月之夕稱一觴為壽其間其善承顔者哉詩曰孝子不匱永錫爾類客之登斯亭者內顧其家而及承顔者將同是樂其內顧其家無有承顔者將有不勝履霜踐露之悲則亦斯亭之感之為者矣亭舊有名余病其不關于子職也故易之仁卿名恕遼氏遺裔也由金人惡耶律為字有父嫌訛為移喇後逃亂奔宋再訛為蕭云朋簪堂記天下之道二君子小人而已矣然各視其為勢孰主而孰賔之己主而人賓則人從已巳賓而人主則已從人無有無其朋者易之為書本為君子謀不為小人設于小人則懼其為朋故泰之六四曰翩翩不富以其鄰不戒以孚于君子則恐其不朋故豫之九四曰由豫大有得勿疑朋盍簪蓋豫之為卦五陰一陽九四以才幹之臣上見信于六五柔中之君而無多懼之嫌是以若是易為成功也大傳曰崇高莫大乎富貴然舉爻位之貴孰加于四臣而五君貴之所在富不必言矣而卦亦有專言富者不于他爻而亦恆在四五故泰六四與謙六五皆言不富以其鄰家人六四亦曰富家大吉苟無位之士而富其勢亦與崇高之一故亦由我和順得志開誠而朋從之則富者又為兼善之資而有朋從之樂耶然又思朋從則羣居羣居則必有事為而言及義必也如兌大象之講習乃有互長相滋之益有必粹焉而得其要如乾文言學聚問辨寬居仁行以行其德斯盡善矣聞者其然余斯言乎非歟其踐行有素乎驟歟史君生洛徙穰奇士也名儀字仲威其豐殖若可比封君素侯力善而泛愛赴急而施積寒士之來歸者如以器浥泉流隨其小大而斟酌飽滿之不虛其往而遂所願欲言其處易時位可當豫九四適余讀易求名新堂為書朋簪俾揭之楣間蓋仲威與余同邑以年偶先嘗兄之禮意甚至言其可諛况潛齋先生之弟子猶懼其盍簪于燕遊好也故又舉兌象乾文言者申告亦庶幾輔仁之一道也至元戊子日次實沈歸來園記歲壬子余與今令醴泉雷君損之交至至元丁亥最之三十六年為故人始余從先世父中書左轄公受讀四書君與橫經几席為同業交不為淺年不為少故凡見其小不足余意者必為之盡言蓋君自踐仕至今三十年位止一令所至與去人稱其賢今老矣不厭不巳猶為之將行道耶縣之上蒞而壓之者數十府寺守成法而遵之幸且無事苟自鬻其能自用其情則搖手觸禁而罪隨之是其道非易行也將為貧耶諸子孝且克家有脂田十頃終南堂室高麗周其墅植榆楊雜果數千小者圍杯碗大則合抱充棟梁歲入絹多于江陵李衡木奴其本富已埓封君素侯矣嗚呼豈余蒙暗之甚未真嘗宦味之甘便者耶余嘗激之使委印而去君以故人同業之故受其説而不愠焉此可見其寬有容也然復有優遊牽制未斷之言焉曰今遽不可吾必以開歲某月而行嗚呼君子進三揖退一揖所以礪難進易退于平居也如君所言正如東萊譏魯隱當授即授何謂將授當營即營何謂將營之説也君又不以余為躁而斥已肯服其非是又見其善從人也徐曰吾家有園鑿池其中中池為堂外為四亭東亭藝蘭蘭則春芳取屈原之辭曰紉蘭南亭北軒闞池種蓮蓮則夏敷取周子之説曰愛蓮西亭植菊菊則秋榮取陶潛之詩曰采菊北亭樹梅梅則冬花取林逋之句曰疏影順四時草木秀發循環流居四亭期沒吾齒獨中池之堂與園未名子為製之余曰屈原之愛君周子之鳴道陶潛之明達林逋之隘狷能法四賢足矣又何他求為耶詩曰高山仰止景行行止宜名堂曰景山雖然周子為人鄒孟氏之亞其言亦六經洙泗之遺餘固不在淺學之妄論餘三子則皆有説屈原之不忘君其失未免怨懟激發而不平林逋終身遁棄而忘君又類潔身亂倫其吟嘯多賦近體句律淸快可誦者有數陶潛既仕矣其則心為不忘君知其不可以恥束帶見督郵為目以去正得孔子燔肉不至微罪行之遺意又其言和平微婉猶元酒希聲後世雖有效而和之終不能一造其堂奧三子之中古所謂吾無間然者也園宜以歸來名君試誦其辭將不待人之勸激自窮日力而歸矣以是為記是歲十月晦書楚山山房記孟德麟作楚山山房或疑而問曰古人之樂山者皆有所指名晉謝傳之東山唐白傅之香山宋王舒公之半山雖枚舉之將不能一而盡未有若德麟之槩而名楚山者因嘗思之盡禹貢荆州之域皆曰楚宗火維衡嶽巍其高大與細而邱垤皆曰山是則楚之為地亡慮周數千里之遠也山之為名雖布斗粟為算有不能以殫之之名也而自命之無乃鮮廉而已貪乎使止曰楚山猶曰隨吾歷覽之至何所非楚何地無山猶足以禦人而綴以山房之名乎孟子之言堂高數仞蓋人臣之居其極不過乎是是房也崇不踰于尋丈深不出乎數轍今將舉是名是盡禹貢荆州之域周數千里之遠者之楚與火維衡嶽巍其高大細而邱垤雖布斗粟為算有不可殫其名之多之山曰吾將納之一房則並藏山于澤者為尤誕也良不信之燧聞而笑曰子辨辨余真能納辨天壤之間二者而已曰同耳曰獨耳同則與人共之獨則我其知之今一世之人鼎鼎所趨逐者意亦曷嘗在山意不在山是人之所棄也太史公曰人棄我取余所獨得者也烏乎貪然之山也人有廬其麓者梁其澤者車來其原者舟其川者材其林者搜其藪者曷嘗不與世共之是人之所取也太史公曰人取我與是人所同得者也烏乎廉且以迹求之房誠不足以納楚之山由理言之德麟生平歷覽之熟或時讀書之休飮酒之醒作詩之暇看雲白晝而眠聽雪淸夜以思則夫崔然嵬然嶻然岌然藂而離離峭矗而坡陀千變萬殊不易狀名者莫不呈露倣佛于眉睫余見納之一枕之上而有餘豈崇以尋丈深以數轍之房有容而不足者耶或者舌嬌不下惴讋而退噫余由愛楚山買田郊郢以分是風煙泉石之勝而南郢實楚都去郊郢才數舍亦將名楚山君能視同廬者梁者車者舟者材者搜者來即共之則已或校其君先將謂余後則余將以郢去楚都踰千里未免以遠近為訟上勞山靈聽其直之誰在也德麟名之紱在勝國為少保佳公子明時嘗令潭之湘鄉今辭仕而休居焉臣錢開仕恭校
