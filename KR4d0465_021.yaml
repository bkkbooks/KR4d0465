body:
  text: 元姚燧撰神道碑懷遠大將軍招撫使王公神道碑王彥弼方總管南康過燧舟中曰弼老矣將委印歸畢先人墓事出故人監察御史商琥所狀曰他日必求徐大參琰劉集賢因與燧三人一人銘之足矣劉集賢亦物故徐大參遠莫相及且弼嘗事汝先世父左揆公東平故惟君焉請又曰自弼及與君友二十二年别君者幾二十年不于是焉即求以待他日具禮備數而走三千里之石城恐弼暮塗雖倒行無及也燧曰昔司馬遷述漢傳皆搜訪舊聞與遺老之言為之蓋職史者宜然非必其時功臣子孫一一求見而始援翰也燧文劣下固不敢自方先賢而其職亦太史也今而曰先左揆門者其可讓為謹按王公諱興秀祖忠信考濟皆農蠡之博野宋村我太祖始加兵中原圍燕不攻而坑中山蹂山東河北諸名城皆碎巳策金不能國可必滅也自將征西而留太師國王穆呼哩徇河北未下城邑其年衛王弒宣宗立南踰河都大梁兵興民既困徵求之繁餽餫人畜雜死道路至不賴以生有遲我元兵者曰敵勢甕來耶亦有不白吾令特誅其後服望風畏之不敢至者公聞兵將至曰丈夫生三十年而勞苦耒耜屈壓極矣今已委身餌敵暴骨草野且吾君已棄民民尚誰死哉吾有自圖富貴耳乃以是撼三十餘村之民汝幸從我我能活汝乃將壯士數百輩出蠡疆迎兩大帥萬戶劉伯林御史大夫蕭公降帥善其來與之幟曰張汝之鄉我兵自斂戢不汝侵也大兵及城城方力完守具炮死蕭大夫兩軍憤厲一鼓屠其城無噍類遺而三十村無毫毛傷者兵去而艱食民死相藉公舊富粟地藏盡發以廪餓人又假為種責其力田作以繼糊口又築屋數十楹以居病俾醫煮藥其間時其衣食所活又甚多以從師王徇地大名東平益都功升新軍千戶又升萬戶從師王朝太祖京師漠北時恆山公武仙壁真定西山滄海公張福柵信安水中授懷遠大將軍招撫使賜金符令招之僅得兩公潰民令散居祁蠡深三州種紅花紫草以供尚方織局後由諸侯王及功臣家爭遣使十出括匠天下劉某以大丞相行尚書省于燕亦遣公括祁蠡深三州匠為局使公監之先是常祝天曰吾遭此大兵未嘗妄殺人死者活之飢者食之藥其疾而賙其不至未嘗不力于善也而天報施我者使五十無子何獨戾耶明年彥弼生至是告老以彥弼襲職彥弼能譯言嘗屢使憲宗朝少尚氣任俠其友不幸得禍彥弼願揕匕首仇人之胸幸自屠死不悔友止之中統建元我世父宣撫東平召至監米家倉變陳惡為白米八萬石授提領東平路鐵冶右丞相薦之平章塔爾禪公後姦人多竊馬私互市朝廷議其禁始置潼關大洋孟津中灤三汊等所以及徐邳八提舉俾司糾之凡乘馬南者必視其傳平章首薦彥弼可任我左揆亦譽曰吾知斯人有敗則咎余平章言是以奉直大夫提舉潼關十二年公亦從養關下以至元六年三月八日卒歸葬祖塋夫人張氏年七十三前公卒子男三人彥弼所至事治發姦人為起三百餘闕下得省參費正寅連謀宋書論誅如法關南禁溝高有支渠久堙其源公割俸瀹之至今蒙溉利者二十村再換中順大夫黃州路宣課都提舉民不苛擾而額亦溢再授知安豐府今以少中大夫總管南康治皆有迹仲彥柔季元柔早卒女一人適李信生子讓與一女二十而寡誓不失身為夫子羞子今亦宫于朝事聞廷臣節之聚土旌里門矣男孫三人元德忠顯校尉金符海道運糧千戶元慶忠顯校尉安慶軍總把幼元恭女孫五人長適榮祿大夫平章政事史弼次適江西同僉樞密院事陳柔次適滁之六合令董仲次適里人薛某幼在室男曾孫四人二早世二幼女曾孫四人亦幼評者謂史行部與公皆以鄉民迎降太祖史氏自太尉與諸子孫將相五人而公之子猶調常銓總管下路何其厚薄遼邈不相及而兩女孫之夫顧皆將相將天移報公德他門也耶誠然亦理之未瑩者燧取銘之銘曰觀先漢臣陳餘張耳耳終事漢餘中畔棄耳有趙王餘斬泜水天方與漢能與者昌天與仇之宜旋踵亡效于計數一軌千古今蠡為州中城外鄉城捍恃強噍類悉戕三十維鄉公樹降幟豈獨室家雞狗完遂人曰是謀王公為之孰是吾鄉司命寄兹既全而兵又廩而餓又勗而稼假種耰播有疾與貧我屋其居于父母邦惟愛何如止官懷遠惟富其壽年幾九十一世誰又而其再傳而子而孫金紫垂躬常銓一門兩女孫夫顧皆將相移報他門非天莫諒維天道遠人迹難知其張其門或在異時螭首之碑有光前兆琢銘昭昭來世為告鞏昌路同知總管府事李公神道碑公諱節字子忠考諱松金寧遠大將軍輕車都尉隴西郡開國伯食邑七百戶由鞏昌府僉事遷其府判官行亓帥府經歷妣夫人高氏從封隴西郡君祖圭以開國貴贈隴西伯妣夫人某氏太君曾祖槩氣服其鄉鄉人曲直不訴有司求聽其家高祖澤而上不可世也其李姓隴西人者或曰猶漢將廣之苗胄公生而剛明其尚氣俠得賦自家長知讀書曉習法律遭時艱棘以戰勞自敦武歷忠勇忠顯三校尉既官矣復慨然曰吾自求樹立如人曰吾薄門功何始即吏部取廕試律射皆入等出身奉班祗侯監華之渭南稅未上行省開閫平涼開國為奏差經歷鞏帥田瑞卻異圖乃閉壁錮人出入是日公乘夜縋出走平涼上變及官軍至故便宜都總帥隴西義武公汪世顯時為門將開壁納之縛瑞置法公以先事發膚功轉會州軍事判官超鞏昌元帥鎮撫都彈壓兼照磨加忠武校尉便宜都總帥府鎮撫軍民都彈壓天兵巳殘陜西完顔仲德行省于鞏招集熙河慶陽二十四城散亡將卒數萬移鞏治依險壁石門山知麾下元帥義武忠壯可倚時節至其家拜事其母無異生已金社將隳假義武以便宜都總帥身將三千人東援道敗之餘才三百人達汴金主已播不至家追及于行説令西駐石門因秦徑兵以圖巴蜀不聽走歸德走蔡自經死仲德赴汝水三百人皆從死惟十二人為謀勢今業然石門日夜望吾東音計今日即徒死無益必歸為報十至秦州為秦所止二人越去語鞏時秦帥鈕祜祿巳不受鞏命自為行省顧檄義武來計事開國謂義武無行請身往嘗從公既至彼以失乏軍興錮之己誅數人開國度不可得脫死呼公前曰吾書為賊誤語置枕下即自經其帥欲並除公賴賂珠其妻免始從喪歸葬之郡東原未卒窆聞敵且至衆悉散去公曰吾寧蹈死白刃不忍敞坎不掩暴吾先也竟卒窆去敵旁午馳終不至塋義武孝之俾襲開國帥府經歷蓋甲午正月金亡明年十月其府猶稱天興義武集將佐曰主今亡矣誰與為忠人以羣盜遇余率軍民萬家為口十萬來降皇子奎騰義其後服曰為臣能然何忍罪戮仍官以便宜都總帥凡其前所節度二十四城還受節度公亦仍便宜都總帥府經歷始去險就夷還各城居官舍民廬皆剪荆棘斬蓬茅為之使人父子兄弟得以休養生息至今西土種族殷繁誰之力耶尋升鞏昌府推官訟淸賦平再遷其府判官帥從大軍歲入伐蜀責使繼餽雖千里數石不能致一之地不匱功超僉兵馬都總管府事俄權同知兼便宜府經歷方年六十忽不仕而樂礫石山水為墅其間號蟄窟老人不踐城府絶口官事樹桑及他可材之木若干千章奇花珍果埓是惟樹松二十四不多益也疏泉列石幽蹊危榭人之至者瞻眺忘歸如在物表時與老佛之徒研思丹方奧典如不足日故舊或過必烹羊擊豕劇談縱飮厭醉而罷來者共席不賤耕樵年八十三聰明輕矯不衰壯時登樓上馬不藉扶掖几杖非不御不設也一日疾子孫問焉顧庭筠等言汝兄以喪來其以為言奴婢數十家吾食其力久其民之以至元甲戌冬十二月三日為詩而卒計始為墅實二十四年或曰二十四松蓋前計所止年也明年三月甲申祔之襄武郡東原先塋二夫人陳夫人前卒二十年繼夫人王前卒三年三子庭玉今資善大夫陜西等處行中書省左丞庭筠鞏昌路兵馬副都總管僉鞏昌府事兼便宜都總帥府經歷庭堅便宜都總帥府鞏昌路都總領二女一適鞏昌路都元帥兼權便宜總帥汪翰臣一適魚溫內外孫男女合八十九人曾孫男女四十六人平生篤于人倫妣夫人高卒事繼妣楊夫人不知為非其出及卒遺二女俾陳夫人子之笄未歸者厚其資賄嫁成州武亨在抱者撫至成長嫁帥掾南汝德又嫁弟忠孤女鞏昌元帥府參議都總領嚴孝忠弟賢府判卒官其子至鞏冒都總領庭某壻劉氏夫婦皆卒又撫其孤女嫁帥掾張圭後庭玉自蜀軍甲歲一再或一來覲公不善曰古人以戰陳無勇為非孝豈可以我故輕去而軍且吾所以甘伏田畝樂之終身而不悔者以汝及功名之會有搴取之才必張吾門于他日孝孰大是若晨夕侍傍不乏致養則汝弟責勉思吾言無以匹夫親親為心故庭玉一力邊陲最自質子至將相凡六十年崎嶇巴蜀甘涼之郊隳名城摧堅陳徠偽臣禽逆王與斬叛將小大之戰四十為時勞臣又善謀畫以世祖之聖能受盡言而不罪人至入告大計諸侯王猶苦于扞格自餘老成顧問之臣日月至前如承旨王公一咈其聽雷霆之威幾不可霽而鼓鼙之帥遠闕廷數千里數歲不一至焉從容片語回軫聖慮于十年之後而得開可由何道哉豈言適其時不泛不迂而切事情然耶亦素諒其忠也書之言曰啓乃心沃朕心尚其似之此二官之篤其眷者嗚呼有子哉銘曰善為塗行日昃而息所以再程不窘其力即小而喻公焉似之謝仕未衰豈年是期無稱平生日託巖穴徒與草木腐泯為匹思公荷戈逐逐羣雄四顧長嘯橫厲雲風事揆義為不罪于教語臣而忠子職已孝人紀立矣為榮斯多人爵崇庳我謂斯何爰樹礤山薈蔚阡陌匪利斧材惟以種德責報其子捷于鼓枹曾未卅年將相身都有不話言言而既續惟不授事授靡不力嗟今之人或難其全不難令終而難令傳公兩令之桓銘斯琢于礤之山式配吳嶽少中大夫靜江路總管王公神道碑敦武校尉衡之酃縣尹天錫手事狀拜而言曰先人少中大夫靜江路總管始從事故宣撫張子良公于歸德實先生族姑之夫後以掾事先少師公于汴則天錫今請匪直以先生銘賢公卿之墓之多而來以先人兩公故吏有好故也則昭誄墳道者捨先生奚託先生亦奚其辭燧諾之曰子言良是而先公及識之為序之曰維王之先天平人曾祖而上逸其諱祖鎬金泗之虹縣丞考瑀皇大將察韓署為睢州軍民長官初大將嘗徙淮南某州降民于睢以其家涼再西徙于涼而奴之為其總管李候訟之大帝潛藩為下教正之還民諸睢長官所領實是民也公諱均字閏夫幼而惟儒之師長學吏事流輩以為能性倜儻自許不凡每恨枳棘非鳯鳥所巢知者奇之惑者笑以為夸也歸德鄰睢金季宣撫公自范陽將其部曲奔泗州將楚姓者憚其驍傑與一軍多冒法難馭謀殱之宣撫覺一旦大閲戰士率其徒十三人突入斬楚併其軍徙泗民四萬歸德中統之元公始從事是府至元五年故左揆劉武敏公開用兵端于襄陽詔集天下兵臨之制寵武敏漢軍都元帥專將其軍其年又詔先少師開省于汴足其餽繼明年擢公掾省九年公策撼武敏中合機意為奏官以從仕郎其帥府經歷金符故丞相史忠武來蒞師明年襄陽下奏官以襄陽總管府判官十三年詔以湖南戍軍多疾恐坐不習食稻俾公舟粟若干萬斛如湖南故丞相阿爾哈雅所明年丞相奏官以奉議大夫行省左右司員外郎遙知慶遠府又明年升朝列大夫左右司郎中皆仍帥府金符十年升中議大夫永州路總管二十有四年升少中大夫靜江路總管二十有七年龍集庚寅夏五月二十有一日卒雷州官舍年六十四子天錫迎柩歸葬襄陽漢北古城後十一年始具碑墳道嗚呼慨公平生遷七官未嘗一遭暇豫掾省則當徙河南汴梁之民屯田唐鄧申裕嵩汝六州之郊經歷則晝夜介胄虞敵行壘判官當詔故太傅巴延公將數十萬衆南伐大集啓行襄陽公位府末屬軍旅百需朝出而夕責成其躬徵呼之煩有窮日不遑食者當西南五十餘州新下而宋餘孽兩王僣號海中逺則廣之東西瀕海諸州近而衡永全潭之屬縣江北黃信陽皆袒臂和應覬受偽命以自為名賊殺長吏平民據州縣壁山柵水負嶮騷亂者在所千萬為羣鉏鏟砥平公為員外置同正其安集之方諭信之言撫綏之使旁午于塗幕畫居夥功升左右司郎中之明年兩王死丞相加兵瓊崖儋萬海外四州留後造舟鍛刃饋糧一切供億靡不皆集為永則前政當周龍張虎剽殺之餘長吏利之根株深治以取賕售公繩興事者以法寧謐而休息之州民與儒爭蒙其德狀其治于省數百輩隨有日本之師賦造海艦皆取材于民而促其期艦發矣犯法臣平章省復核有司侵牟為計局責償之徵斂戶及為靜江始是郡由抗王師拔而坑之官寺民廬一炬盡燬惟婁鈐轄將所部二百五十人壁月城丞相小之而多其忠曰是何必加攻抽兵衛之視其終何為也逾旬婁奮身前行曰吾甚欲降如苦飢何苟惠賜之食惟命乃遺牛數頭米數斛壁下一部將開門取歸復闔吾兵自上瞰之其曹分米炊不待熟牛臠牛噉之立盡飭其曹人擁一火炮坐然之聲發如合數百疾雷為一城土震落煙焰蔽空吾兵有驚死者火滅骨盡無圭撮遺亦死事之奇哉迹是可灼其為新造之邦之民也又會再詔皇子鎮南王再征交趾民戀前困皆拾業而逃十室空半省檄公身至海北十九州督餽擔負遠向者無慮千萬夫軍不匱儲又持詔料民海外凡四涉鯨波得戶增多其舊十有六萬省乂為計局責償料民侵牟而徵斂滋酷凡是數者皆取民怨仇人循墻而走者及公為之不鷙其威而事功立馴難事之臣而使辱不逮巳其才長治劇將順何如也舒嚕氏遼之貴族世連姻帝室由金訛為舒穆嚕夫人舒穆嚕江漢萬戶老格之孫琿塔罕之女萬戶圖嚕之姊也婦王能顓家政公卒而門戶益樹立雖天錫一子與婦孫宣慰女甚愛之者嚴于教朂不少借以顔色俾以廕及天錫尹酃縣亦確確其艱哉內外姻戚皆服其寡而有操公元配楊氏續盧氏卒葬盧兆盧惟一女與今三女皆他夫人生子如巳生一適某餘幼銘曰惟兹下民陰隲者天或閼而貧或華以綿世之信之如寒與暑其未逆知不一方所而獨于公始終西南由宋而汴而襄而潭而永而桂極海之外一遠而宦一振以大古九其命今品反之九命無從九品則卑公品登三實古命七州牧侯伯其揆歸一澤俾及子吾元之仁七品官之酃尹發身何嗛于生何憾于死文以列功碑漢之涘平涼府長官元帥兼征行元帥王公神道碑王氏由宋敦武將軍嘗令鳯翔之岐山卒官子孫遂家其縣之薑村大父世昌業金進士舉父大用以材武為千夫長生公而卒公諱鈞以幼名戚七行為孤童子時鞠于季父大有所已犖然有立志長以俠聞自令而下一縣之豪無不與之遊甚為季父所知期以克大吾家會我元加兵關中其視大城堅陳不啻驚風怒電之摧枯振落覆之如此其易也幸大軍去而羣盜復起岐雍之郊百千為曹以剽發財粟為業及既殫亡無所得始掠人為糧于時行省開府長安纍調軍誅之不能平長安路絶而生齒益耗矣公倡集鄉兵萬人自將壁拙山後移壁三稜堡偵得賊巢窟縱奇擊之禽張嵩北山斬安和扶風遣辨士説降梁七晜弟乾州梟楊政馬超山磔線張汧陽併將其衆上功幕府遷都提控再授鳳翔安撫使行省棄關中而東乃移所部與邠涇乾恆數州流民復鳳翔繕城郭闢田野為戰耕具劉咬章自敵來歸麾下多謀殺而取其財者公壯其來發卒衛送入汴由是汴都方聞關中城邑猶有未盡沒敵者遣間使懷食符即拜鳳隴元帥壬辰大蝗飢移民就食秦州始與今左丞公之祖汪便宜義武公合力拒戰甲午金亡明年乃下我元義其後服釋不罪也俾將所部從伐蜀自效其年鈔沔州拔大安軍明年破成都入其郛其年入覲以功賜金符仍故官帥隴州明年陷遂寧明年襲萬州戰皆捷又明年由鳳隴元帥改平涼長官元帥兼征行當弭兵之初平涼之民披林莽茨屋以居者無百室食半蓬稗故部曲聞徙鎮皆扶攜老幼以從歲中得萬家明年再從伐蜀再破成都虜其將以歸先朝駐蹕六盤山平涼實近郡供億之須使者徵發旁午一日數輩皆取給其家後賦入粟沔陽率十而致一皆不忍征之民為代輸三千石故二年闔郡帖然復亦由此故比他諸侯家至今為甚貧凡在郡二十年請老于朝以子贇襲職又八年當至元丁卯春二月五日卒年若干其年四月歸葬岐山之先塋數百里間輀車所塗民哭之如失其親戚為位以祭者萬數問之則曰吾屬皆昔見活于公者也夫人李氏同郡著姓前卒子二人贇某官由知平涼府轉同知安西路總管府事方為之資授室而卒男孫二人未名公以不及養先公喪之終身四十年不御肉授官必推功二弟初為鳳翔安撫使拔圭招討使琳都總領後為平涼長官元帥兼征行又引圭代征行琳為副帥升郿為州復以圭兼知州事雅善岐山令進士劉繪相失兵間及開帥閫繪為民洛西宋自襄鄧並西山出兵為劫居者屢急公為具車馬踰三千里迎盡室以來敬事而歡奉之數年後聞定乞去固留不可厚幣歸之若是者皆生資篤于倫理不待學能者也大本既立其他聞人父子兄弟虜于人必捐金購之以全其天屬得蜀士則延致幕下俾有食以仁其妻孥又其稚也銘曰遭時之艱不武有力可以服人人則見役大兵之餘梟狼蝟生膾脯視人何忌不行公憤以歎高呼右袒義而從者旋踵盈萬梁氏弟晜嵩和政張凶叨幾時身膏斧斨大慝既殱黨儔謀我有以惠徠用烏不可汝飢然耶我汝糗粻寒切汝膚我有衣裳人人奮激昔迷不又恣公使之公令敢後滄海稽天精衛所仇誓銜木石以絶橫流金亡明年猶用其正元輿一軌來方請命從征庸蜀疾戰先登奏功軒墀稱之曰能金節命書擢長帥閫萬室通都棘茨起本使不授館至即我廬賦粟遠輸我牛我車種德在人淪浹皮骨年胡可長名則不沒矧子肯堂有文而才務昭乃先未艾其來于岐之陽于渭之涘琢詩穹碑終古之視臣戴聯奎恭校
