body:
  text: 元姚燧撰詔制楊爾昌贈壽國安惠公制人之祖其木之本培植既深曾之孫如幹之柯散分斯茂比切雲霄于千尺豈濡雨露之一朝具官某生際時艱役編氓籍雖迹沉浮于里社而名表襮于鄉閭德邁乃身盡力災畬其地澤流爾後聯芳侍從之臣矧侍前皇有聞今日苟不上推其所自爰進丞疑何以下詔夫將來用光冥漠妻富察氏贈壽國夫人制姆名門於遼右醮華望之弘農言必女針動循婦道篤生奕奕之令子實為洸洸之武夫觀其臨陳以捐軀于時蹈難可知卜鄰之提耳平昔教忠矧曾孫以宮臣為儲二之傅友上推德澤皆發慶源於戲朕之贈右揆而勳護軍疏恩巳極爾于穀異室而死同穴受祉不那告第以兹制綸欽若楊德崇贈夀國康懿公制羈于人而合于天徵書惟信非其身而任其子從古巳然源不浚則流豈長弓必徑而矢方剽取譬若近為理則同具官某自葉流根去華務實以名聞于裕廟遂驛致為邸臣不大其施以昌爾後膳祠主客郎官所職之殷繁嘉吉軍賓閣老相資而損益生而有光于門戶死者何憾于泉扃位亞師垣展矣三司之列寵加公衮巋然九命之尊伊爾明靈尚膺茂渥妻陳氏贈壽國夫人制以育薑敬仲之遺苗歸有周揚侯之餘裔合姓皆神明之後生子宜禮度之間進長儀曹近淸光之尤切動咨閣老率舊章而不忘因觀從橐之能然皆出斷機之所自秩上公以九命既疏大國之封開夀域于八荒宜正小君之號用資告第貞魄是承王守道贈壽國忠惠公制臣之邁德固將流慶于後昆王者念功必使被澤其先世肆即下地爰進大封具官王顯之父守道生值時艱出膺人傑屬金源之南播屹恆鎮而中居彼猶冀死灰之然而潛出代交之策誘同官以所部曲殲都師不遺稚孩佐太尉之孤軍奮雪讎恥復連城以千里盡返故常鴻集之氓遂其奠居梟悍之卒戢不為暴用輕典以刑新國克遠省以任舊人損戶薄征折劵恤匱故飲惠者相率而尸祝其聞風者或形之詠歌非獨專乎軍咨兼亦正夫侯度帝曰嘉止璽書爛雲漢之章民曰異諸金節等河山之誓於戲功豈一書而足爵宜九命之加矧有子嘗任其股肱尤可厚飾終之典雖若汝不復于骨肉必猶多用物之精其克欽承尚永無斁妻封壽國夫人制凡曰有官之君子克愼其終亦惟主饋之家人能勉以正典既所天之加恤義無同穴之見遺某官某之妻姆張懿徽婦主貞順令閨門之不出奠宗牖之必親齊國賢妃才警雞鳴于昧旦魯侯壽母未聞燕喜于期頥合斯異代以觀有不同年而語養以辨章之廩祿何報春暉服其裕聖之笥衣足華歲晏居勤纂組而無逸動釋几杖而不隨受祉之那比隆安有亦黃髮之良異者而素心之所慕焉於戲開豫壽域于八荒疏封先汝進夫上公以九命濟美後人耶律祭酒考贈淶水郡莊愼公制臣克厥艱而始明敏其德子焉能仕皆由父教之忠眷豫問義之人師實漢僕射之位長固求還笏難斷抗章是用追崇其先庶以垂裕乃後某官某中書猶子丞相從兄宗承遼室之遺苖禰祀金源而全節尚論其世孰踰爾家而又誨嗣續善詩禮之敦于以見平生戛紈袴之習自夫共工之謝晏然同俗之安爭饋肆乎五漿振衣岡於千仞奉先惟孝雖耆耋于禴祀也親焉接下以恭其臧獲之久故者民耳匪直入官而知止抑展在家而必聞惜棄世于九齡負為國之三老於戲神遊安往定徘徊乎故鄉袞寵即封用昭章于疑墓嘉誄以副殊渥罔遺王思廉之祖沂贈恆山郡莊惠侯制商容殷臣周武過閭而必式廉頗趙將漢文制敵而尚思至公因見夫古人褒善不嫌于異代某官某之祖沂言出無擇量深有容當天步未攺玉之時明刑書為亡金之用立人由已飾吏以儒始知法以佐州尋假令而為縣以不揚威于長吏斯免濫罰于平民不惡而嚴雖文無害伍符尺籍事專司六部之間駟焉高門報顧在百年之後有孫四紀及相兩朝晚年嘗作客夫靑宫時竟遂明農於緑野遺榮若此垂裕尚多於戲父為士而子大夫爾知守死生于葬祭考贈公而祖侯服朕誕敷隆殺之等威尚其光靈歆此明命祖妣贈恆山郡夫人制求世德于上古神明後者莫先于帝高陽屈原云然亦豈顧後之人哉惟自是屈節雖不可譜其次傳則汝為其遺苖從可知也然自佩繽紛于繁飾及夫曰黃昏以為期思公子于芷蘭不言而喻貽下女以杜若無忌可知溯厥芳聞宜兹象服於戲教爾孫導其先路既竭其力以事君恐王母懷乎故都俾從夫爵而啓宇降斯寵命賁彼幽扃贈焦德裕考制我國家禮御羣臣凡有位躋乎將相恩推上世必皆宇啓于公侯匪專勸忠用以光孝具官某之考某生當立武之日負其先衆之才既長千夫將經百戰每獲俘而不殺其久奴而必民化盜賊而為善良振餓羸使遂生活方亂離之靡定而仁惠之兼施自他人若是之有為而平日皆在所可紀由為子之束于貧賤故世德不能以昭明則爾後之熾昌亦式穀之教誨夫既一門各盡其道可于九原不顯其光焦德裕贈恆國忠肅公制事睿太憲以及世祖可謂圖任之舊人官趙蜀源而盡東甌亦既敉寧于新國于勞庸之是迹何甄録之可遺爰啓大封用昭幽壤具官某忠壯而信厚剛毅而純明皆得自天且資以學當王略經綸之際適金源逋播之秋覆巢太行遂武仙之首惡引翼開府雪史帥之血仇後從蹕董漕于川中尋持憲省風于隴右行役之遠聲名益延及太師之濟江乏才臣之謀閫自家而起乘傳以從既同輻裂之軌文又翦彚興之莨莠為勩之夥枚舉豈殫方分省政之參俄有邦光之殄於戲永辭白日佳城鬱三千年不及清風黃閣留一萬古納喇追封蜀國忠武公制朕聞率土之臣莫如同姓干城之將尤可異恩故逺稽于禮經用厚加乎愍册具官某其在弱冠嘗為選鋒迅與鷹楊號為萬人之敵虓如虎視隱然千里之威屬巨寇之反郊乏總戎之制閫來可居此孰有異然其為人心所歸不待君命之至推使秉鉞辭拒循墻即下令于轅門巳折衝于樽俎握機旗建四川之草木知名開璧鼓行三峽之星河動影勇頗牧之非匹策孫吳之可方入阽危則膺衆所不先分賜豫則如士之最下徑騎所蹙堅城每摧如斯宣力于兩朝何止出奇于百戰於戲降年弗永為烈則多雖狀不及識之亦心未嘗忘者置戶以守何樵牧可侵馬鬛之墟故壘即封或魂魄猶思蠶叢之國伊蘇德勒贈蜀國武襄公制遣戍以歌采薇命于天子者為將三世故國非謂喬木名曰世臣者即戎百年生而他人孰可方之沒則斯朕所甚愍者具官某川涵而嶽負玉裕而金相受鉞于成童之年交綏于大敵之陳觀其進退以坐作得於生長之見聞勇必冠軍功則推衆非有是為將之體其何以服人之心雖崎嶇殘蜀之餘久才五稔顧敉寧平宋之後艱巳百罹置郡縣于夷蠻斥邊疆于甘肅或分使節或秉政鈞自陜右而雲南躐辨章而丞相勳亦懋矣年則未焉何期立極之新而失圖任之舊於戲乃祖乃父既不異乎錦里之封爾子爾孫亦可同是蜜章為刻光靈如在明命用歆張弘略贈蔡國忠毅公制保塞承勳孰曰將門之無種陵川受學共推師道之有傳既不墜其冶弓而復敦以詩禮方資用世奄鬱佳城中奉大夫河南江北等處行中書省參知政事張弘略易武以文克忠由孝在憲廟巳頒其虎瑞故世皇洊致之龍光會盜發于東秦加兵助乎南紀援徐方之傳檄夙料如成當炎夏以交綏宵奔巳墮歸守衛士兼長儀司賜金扣之卮被錦粲之服以巾奉秉宣麾於淮浦仍前授移使節於洪都大憝既殱餘孽何賴超參南省之機政隨開北首而棺懸雖未陳夫襚衣猶及贈其褒袞於戲乃公既邦之蔡無庸攺封其家有廟於燕可從與享精爽不昧明命用歆秦國忠翊之弟巴克實巴追封古哩郡恭懿公制繄朕聞汝惟昔在軍謂人集菀而已集枯羡鳥烏之暇豫何寸有長而尺有短投龜策之卜居道理之安死生奚計某剛毅而明敏貞信而沈幾逃自叛王棄其盡室義定君王之分石可轉而心靡移思輕妻子之私裾雖牽而首不肯遄其歸以萬里始克覲于九重帝曰嘉哉世所難者故其賚賜之物俄然充牣其庭或為廷士于中或將邊兵于外居無常所至則有功月旦之評士咸高其一節春秋之筆史無待于他書不有褒章何發潛德於戲恩如爾家之奕葉能令名者幾人封依兄國于拂林兼位崇以二品靈而有識生氣凜然楊福贈夀國武莊公制所貴乎死丈夫橫尸于戰場其凜若生太史納書于幽隧人臣斯得天寵何加具官某方初入官于遠行役第知爭先而賈勇何有反顧而蓄疑將工炮之萬夫壯軍威于千里志恢王略恨衣帶不甘南紀之存魄毅國殤殉枹鼓以示北方之矯與馬革包棺以奚異詎蜜章納壤之未聞展也興哀為之賜諡爰加美號思期昭白于廣庭式慰門靈制許焚黃于神道馬實贈扶風郡莊惠侯制惟仁者為能愛人雖甚急賢才之得觀遠臣以其所主始可精淑慝之分故世皇大公其心致多士善用此道具官某棲身巖穴屛迹市朝既力穡資其讀書復懸榻愼于取友用先正魏公之薦得溫室省樹之觀問惟對以國言事見可于天聽賚衣在笥進秩題輿萬里之塗牽車共期到遠九仞之山止簣不願為高竟自遂以終身敢維憎兹多口傳家有子應宿為郎治膳祠主客之殷繁酌嘉吉軍賓而損益諸有疑二皆資老成於戲克對無羞皆汝教忠之自或靈有識欽豫追恤之褒蒙克特穆爾祖考伊蘇追封秦國康惠公制朕禮遇臣下將責其報上而效忠故先之惟親而立愛人曰豫知不力善烏得夫令名祖以孫尊必既貴乃推以哀典大夫尚書左丞蒙克特穆爾之祖考伊蘇繄我高后于爾先人聞為世之所賢奏遣伻而將致由渠既耄辭不能往以汝克肖代之而行非家學有自而來不父譽如是之力春秋方富初供奉乎東朝夙夜惟勤載徒征于西域託椒房之親以為傅父居畫室之館以鞠帝姬雖一話而一言可三薰而三沐即其時皆書之册視他日取用為模至今天府所藏尚存擇古地官爰加以贈於戲子兆民以敷五典生不及邦教之是司公九命而勳上階沒其與子封而為亞英靈不爽幽賁其承祖妣克哷氏呼實尼沙贈秦國夫人制婦人能動循禮度既宜室而且宜家王者之加錫號封不從夫則必從子存亡奚間古今所同贈光祿大夫大司徒上柱國秦國惠康公之妻大夫尚書左丞蒙克特穆爾之祖妣克哷氏呼實尼沙貞靜而幽間柔明而茂淑德實在巳貴不以夫由嬪椒房娶妻必食于河鯉爰從戎輅大人未造而淵龍由託子其王姬是用尊為傅母盛哉車服之出入蔚為門戶之光華生子則賢既間關功成于萬里有孫而相亦崇高位至于三公何爾身不及見之斯朕心所尤惜者於戲高后之明並日月生及依其末光夫人之行如山河沒可忘其幽賁大秦啓宇貞魄用歆考崇福使阿實克岱追封秦國忠翊公制贈以褒忠凡善無微而不録名取副實夫言有大而非夸惟遠藩之舊人及承事乎列聖匪封大國安賁下泉某考昔在憲宗未登宸極初因太子同生于其地故即在軍鈞錫以是名嘉與帝姬共其傅母臣求愛遇于當世人誰過諸女采撫鞠于內庭妻亦賜者逮六飛之巡蜀乘世傳而超燕世祖異觀宗臣不劣所欲則與之聚為猷而必其成屬叛王阻兵于北荒致懿親絶使于西海責從間途以往奚翅乎十萬里之遙竟懷重寶而歸已忽焉四三年之久最其勞勩無與比倫報宣其身顧後者天命田出舌在今其子補豈專乎袞闕用方賴其錢流設爾無是之雋功亦朕不遺其哀典位崇太傅何及鍾繇虎賁之共舁宇啓大秦足表造父馬迹之不至英靈不爽茂渥其承李道復曾祖考執贈韓國公制于傳有言至誠之道可以前知在易亦曰積善之家必有餘慶何天道之應若質劑而取償而人事之修如災畬而望穫具官某之曾祖考某尚論其世孰踰其家自後唐僅十五傳至今代實四百載秋闈戰藝嘗從退鷁以俱飛晚節考槃遂卷屠龍而弗試猶不失一鄉之善士矧其資上黨之素侯源濬也則其流長城高者由夫基厚宜爾來裔為我藎臣一乃心之是期百其身以奚恤與同休戚嘗憂杞國之天不大聲色再抱咸池之日將以圖報惟有疏榮故于三代之相承皆以上公而為贈於戲汝為其曾王父雖不及股肱于廟朝朕命以子大夫尚或可肉骨于泉壤光靈不泯恩綍用歆曾祖妣郭氏贈韓國夫人制內言不出于梱雖無事之可書大孝能顯其親凡有功而必報此古聖人勵忠之意亦士大夫反本之心某官某之曾祖母秉德淵純移天令淑正位乎內利家人在饋之貞以禮自防見君子釆薇之説遂衍曾孫之慶用疏列土之封精爽有知欽承惟永考贈韓國忠獻公制九仞為山覆簣其址百川學海濫觴是源因於已然而即觀莫不積始而至厚某官某之考某淵深而智山靜而仁當勝衣弱冠之年奮前驅執殳之役以從王事為馮忠靖周旋者勤不告勞能審敵情效余華明成敗者算無遺策後移漕幕與府佐所至事治而言行在乎他人自足為賢而推爾能猶未言善屬裕皇妙擇乎師友俾子孟入侍于皇孫凡太后之所如必耄年而不後輿疾河內道卒冀方其盡瘁以事為如何于無德不報之有待遭成廟違棄其萬國與先帝臨御于四年洪濟于艱嘉猷是賴兩扶靑天之紅日一新黃閣之淸風能蹈難而不辭實教忠之所自於戲觀子可知其父乃古人不同時而云然事君能致其身則今朕與偕行而見者生負為明堂之八柱沒宜享淸廟之六瑚爰啓茅封式光蓬顆母王氏贈韓國夫人制婦人能循禮度既宜室而宜家王者之加號封不從夫則從子死生莫間今古所同某官某之母溫恭而懿徽柔惠而貞順觀其儀之不􅑯宜爾子之曰賢會姦宄伺鼎湖之格天潛圖內難賴忠良辦虞淵之取日尋復重光如斯借筯之籌皆出斷機之教延登伊始追鍚維新爰循從爵之封庸示歸魚之寵尚斯冥漠少慰靈明妻贈韓國夫人制國家以名器之公盍深求于崇報夫婦乃人倫之本宜並著于顯榮爰考典章用敷寵數某官某之妻賦柔嘉之性凝婉靜之姿姆于名門素守女針之訓婦此良士峻居儲傅之嚴所期夙夜之相成不謂死生之有間慨駒隂之不待失同依日月之光緬象服之是宜尚足表河山之行進封大國正號小君庶其營魂歆此嘉命妻封韓國夫人制王政重于報功國風本于正始齊家有道內助臣忠賞爵惟公尚從夫貴以厚人倫之别以彰婦德之嚴某官某之妻懿敏柔明雍和專靜遴選蚤由于名閥篤恭密侍于慈闈嘉若令姿歸于重輔行學素足乎巳富貴尤虛其心義調琴瑟之和禮飾筓珈之盛俾爾壽俾爾昌熾豈惟偕老之榮在其身在其子孫孰愈兼全之美克膺寵渥茂介禎祥臣馬啓泰恭校
