body:
  text: 元姚燧撰記江漢堂記江漢南北之限也三王之德之封建嬴秦之力之郡縣漢氏則曰吾王霸雜兼封建郡縣而犬牙之是時無有裂幅員而自帝者繼漢始有之德不能以相高力不能以相卑雖皆畫是爲守而帝南者終不能北有尺地藉以一天下能一之者皆自北而南也故吳自帝晉平之宋齊梁迭自帝以迄于陳隋平之宋自帝我元又平之豈江漢能限世道之否不能限天運之通歟嘗合二代而觀之以皇上之冠古無倫晉武隋文何人斯哉然非有君無以開是功非有臣孰能成是功古今人不相及而謀或一揆隋臣不道也晉羊祜首策平吳吳平而身不及見武帝追念其功封其夫人萬歲鄕君于太尉忠武史公其事差似蓋公自事潛藩嘗使經畧于汴總兵十萬屯田千里不尃強武而惠信是敦耕商之民錯行其疆不相賊殺有獲俘亡皆生還之雖鄰國臣亦許其自負羊公者無慙德焉于時堂曰江漢固巳張吾雄噬南紀之本皇上踐阼又以四聖元臣丞相中書爕和雍熙者十有六年方將百萬之衆南伐至郢而疾詔他將專制而還公于軍其詞若曰畫翦宋䇿汝也成功而疾汝安何言誠有不諱碑汝之􅈴班汝之爵予不可必死者之知能知之者非人與汝子孫耶四海聞之以皇上歸平宋功于公之生巳賢乎思祜于死及薨有今贈諡又詔其元子格以平章政事行省湖廣季子彬宅端揆于中皆相繼薨又詔中子杠爲中書左丞行省湖廣孫燿以平章政事行省江西視封祜妻君萬歲鄕又何如也左丞今至無第于鄂完官屋以居謀名其堂燧應之曰斯堂也非專晝訪而夕脩必將歲時奉嘗太尉其鋪張勞庸揚侈蟬冕報皇上而歸美必文爲聲諧之笙鐘侑其利成爲詩之名捨曰續江漢者他宜無稱于以格其精神魂魄乗雲御風陟降在庭必懌然曰始爲吾堂北此千里于時未踰江漢也後數十年吾子乃能尸祝吾于江漢庶其善成先志哉漢祖之誓功臣曰黃河如帶泰山如礪國以永存爰及苗裔今由河而視江漢曾不得其三一河誠可帶江漢猶當爲襟計將來及吾苗裔者或終古而無究也必容與依歸不是去焉公曰記之吾思不及者公字柔明以至元壬辰下車人見其不儉不及不豐過中恢乎有容屬屬乎敬坦以明也相語以爲託太尉遺體而得其遺風詩曰雖無老成人尚有典刑其歲嘉平庚寅朏記奎章閣記臣嘗官外每聞詔下惟諭行省院臺宣慰亷訪轉運三司與職軍民之官讀巳則還之中書或掌于行省院臺廉訪轉運而宣慰與職民者省治之職軍者院臨之故惟受其成文以行無有所掌三司中宣慰班最高諭所及者猶無所掌况提舉學校五品居職軍民官下其受成文以行無惑也然其治必居宣慰廉訪所治府州教官聽其約束者其地與二司等此實世祖建元後故事也二十五年始分降詔復江淮多士力役俾一提學自掌其一由是師生鼓舞相語以爲平日諭所不及一旦與行省院臺亷訪轉運者同有是掌卑于名而尊其實其勢反若居宣慰職軍民者上自十三年平宋後所無北方人士聞之曰是豈獨無平宋之後列聖兹降所無實興起斯文萬世之成規也今上皇帝當宁首致意于學校爲分降詔如世祖又加密焉其宏綱曰聖人之道垂憲萬世其目則還正貢莊學田爲釋奠養老完廟與師生之廩俾有司舉其才德亦一提學自掌其一江西提學臣王謙亨龍興敎授臣葉聖時相與謀曰至矣聖祖神孫之惠逢掖也復其力役旣富之還正學田以廪其師生又敎之俾有司拔其才德又庸之士生斯時何其幸哉觀今學詔者多隨印所歸祕之私家其完是六經閣表曰奎章鏤櫝而丹髹之錦韜而金鐍之職教之官日夕番直其下庶以遠䙝而少致崇敬亦小臣報上區區萬分一也請諸省臣省臣曰宜俾臣爲記臣聞虞夏商周四代之書曰典也謨也訓誥與誓與命也爲體者六詔有其五焉曰尚書所請近于謨誕播多方鈞乎誥爲法將來則訓俾職敎臣恪以持則命先儒謂二典者冊在丌上尊閣也今是重屋上以除風雨下以遠塵濕旣翼矣金匱其上豈不加盛于丌孰曰非典也耶表曰奎章敬以侈兩聖作之君師之賜且風厲是道方千里之士使人人自飭責成德逹才于躬云南平樓記天下有形便之地如衣之領身之項也在戰國世秦函谷齊歴下韓宜陽魏馬陵趙井陘燕易水我守之足以爲固敵有之踵不旋國隨以亡方地千里且然况楚之襄漢爲南土六千里東南兩際海可出戰以入守之領項乎晉羊祜之規以平吳梁蕭衍之資以襲齊無不由此者也其甚惜者當顧成廟襄陽下矣守臣北人歌謳思歸棄而弗戌使宋竊築闢荆制閫因唐節度牙城南門爲雄樓扁曰山南東道恃爲北鄙以扞天刑豈彼炎趙九鼎時未淪泗耶世祖潛藩歲壬子嘗置屯田萬戸府于鄧後易爲都督府又易爲統軍司戍兵積穀與襄掎角凡十五年迺大集天下之兵又長圍六年而下之其明年詔故太傅巴延公節度圍襄諸軍而濟以新師南伐比其啟行實下申令斯樓旬月亂漢而南浮江而東瀕岸之城迎下恐後雖驚風之振槁葉瓴水之建高屋有未易以喻其速者宋社旣墟循本以求高觀而思則斯樓其南平之基乎後爲戌守故萬戸楊侯珪府之治事其上歲久檐傾榱腐人之過之必仰視鞭馬疾馳惴惴然恐瓦木之擊軋嗣侯萬戸顯祖謀新之賦竹木瓦一軍或勸其聽省命或以爲役大作衆非盡歲成功不能或教小易故敗無大擿修則應之曰事所義爲奚省之白吾一軍三抽其一可不再月而落且材巳集爲苟完計贏將安施分有之乎吾不能爲就省罪其擅興請身任之不以累諸君也副萬戸張侯塔塔爾岱亦以爲然從而鼓舞之不盈一月而斷手嗚呼果哉大德蒼龍辛丑端月丙午兩萬戸侯觴賓其上酒酣余起謂侯曰是扁山南東道者勝國之臣所書豈堂皇巍煥之吾元可仍夫人之舊稱乎其易爲南平樓兩萬戸侯跽受曰甚善遂酌酬而楚歌曰繄南土之幅裂兮實三甲子焉于兹世祖自其龍潛兮肇屯田于漢之湄夜火鼓之千里兮晝萬耦其耘耔蓄威武以積歲兮乃大濟以天下之師三進夾寨而薄隍兮踰五稔乃下之制曰乘勢可逞志兮亦猶鎡基之待時前太傅假以黃鉞兮卽襄陽其禡旗將師景從紛如雲兮矕龍虎之陸離曰受誓于斯樓兮義聲先路而交馳齊千萬艘以奮櫂兮江永之不可方思彼孱主度不能國兮組面縛而頸縻思就是振古之功兮太傅固命世之雄奇匪世祖之神明兮混庭臣偉論其疇知緬今在天之靈兮猶臣都而君咨曰授神輿于今皇兮克玉執而盈持來萬方而臻百瑞兮如舜恭巳而衣垂誶曰太史生斯昭代兮亦井坐而天闚乏求金馬碧雞之才兮歌樂職其或宜書南平揭之翬楹兮頌寳歴于無期兩萬戸侯無他言惟北向瞻跂曰鼓鼙之臣知捐身圖報而巳滕王閣記龍興卽唐之洪宋之隆興世祖賜今名以封𥙿皇者也故闢省乎是其治所及北始江而南際之西澨而北盡乎人跡所不可踐者纔三分有一地不足並也滕王高祖支子而視裕皇爲世祖元嫡今天子皇考其位與聖又不足並也觀察非有是省之尊所觀察地巳于八州亦無是廿有八城之遠之衆葺者支傾補敝故易辦非若今出錢隆福宫一瓦一木不階其舊悉毁而新之如是不變其名猶日滕玉閣蓋不欲求勝前人又以見太后之仁也嗚呼得恭記之其侈盛美當如何哉當如何哉今記者之遇閣之不遇也雖然事有可知不可知由可知言龍興距兩都數千里塗非乘輿所出尹府之臣圖閣上之亦必經聖覽或者裕皇在天從兩先王風馬雲車遐狩八極過之而一息者人則不得而知也三賢堂記奉訓大夫知輝州司侯仁以至元三十年下車奠謁孔廟己乃謂曰是州學宮堂而不陛簡陋至矣薦盥春秋何以稱百事之奔走籩豆捐奉爲勸鼓舞士民撤而改爲凡再閲歲殿廡門垣崇庳適宜豐儉居中旣嚴以翼人之改觀可什百于誰昔矣又舉我先世父太子太師公故翰林學士承㫖王公故中書左揆許公語州人曰之三賢者比股肱元首爲今聞臣毓德含休實在乎此白叟及見而談黃童所聞而知其可不祠乃以羨材爲堂三楹于殿之東像而事之元貞蒼龍丙申夏五燧以得告㑹燧徙葬先公于輝侯求記之燧曰古之人必其生也世之相繼情洽而道符功夷而德齊而後死可合食一堂也近世祀唐白居易宋蘇軾林逋三賢一堂而不揆其世不相及貴賤勢殊文章非倫孰與四皓之同不臣秦同避漢之高帝而同應惠之招成功而同歸死而爲墓相邇同廟商於情洽而道符功夷而德齊也今以三公方之固不如是出處齊同若其平生之相與微顯之相後先同其大者有不得而讓焉矧成功反有過之者合而祀之誰曰不然哉然燧于先公也左揆也承旨也爲猶子爲弟子爲故人子親而尊之者也智慮未嘗少及乎是由侯發之使人終始以觀反覆以思損其一則後其相與而失于遺也加其一則所志不相如而難爲輩也雖有善權人物者終亦不能推移其間蓋以語友也先公生以辛酉承旨少一歲左揆少八歲齒固不大相絶吾姚氏營人先公生于汾承旨永年左揆河內于輝非鄕一旦聚居而爲寓公其處同也先公以癸卯來此而承旨己師是方後將以事趨燕盡前其徒假先公以所函丈俾師之以無廢受業迨庚戌左揆徙家自魏方先公爲相卽其年無幾時先公出應世祖之招左揆獨留師是方其道同也先公中統建元之明年由嘗侍讀裕皇以東平宣撫使拜太子太師四年拜中書左丞卒官翰林學士承旨詳定禮儀事左揆之聘則在癸丑惟居長安中統之元始召入對至元七年拜中書左丞以昭文館大學士領太史院事去位承旨則由中統三年燭璮亂徵自海濱輦妻妾逃還濟南世祖忠之始召入對自講讀爲學士爲承旨去位一官翰林二十二年則左揆之相雖後先公而同贊元承旨之長禁林亦後先公而同爲代言其出又同也以語其學得聖傳濟人利物于干戈之際上說而下教贊神武以不殺開文物之先肇太平之基巳裨巍巍之化進寸退尺拱而讓人與夫建大議决大疑不瘖結舌視身如捐觸試雷霆與道德仁義化服一世扶植人極爲儒臣宗而不少詭其守于正致君謀國不同爲道而同爲心其事載諸國史燧與有聞不敢漏于爲言以告人者嗚呼君子用世譬則治田不難于耰播而勞于齦根枿于荒世有以是爲知言者然後可語三公之易地也先公以十五年卒年七十八左揆十八年年七十三承旨三十年年九十三其卒若以顯之先後爲次歟兩公遂其去位先公獨卒官京師蓋由于久故請而不釋也與承旨不後者此爲異焉爾今惟左揆葬其鄕承旨雖葬天平必時魂遊永年是州東北望永年西南望河南實道里均歲時合食雖主輝人則先公有田有私廟與墓此者又非兩公之專于賓也又嘗思古者大臣死爲明神配食廟庭于以左右先王陰隲下民者也或三公者將終古廟食止一州乎亦從祀有時此起本也嗚呼二家子孫其無忘司侯始之志焉先公諱樞字公茂號雪齋承旨諱磐字文炳號鹿庵左揆諱衡字仲平號魯齋侯字毅夫觀所事不濫而宜則守土吏民善于其職從可知也後是記一年而三公同受贈諡先公少師文獻公左揆司徒文正公承旨少保文忠公則記所謂從祀有時者豈不亦億則一中乎大德辛丑嘉平月戊辰朏謹識臣錢開仕恭校
