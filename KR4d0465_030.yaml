body:
  text: 元姚燧撰傳太華真隱褚君傳雲臺真隱褚君幼業儒長而遭時艱求所以託焉而逃者寄迹老子法中受學劉真常栖遲不在城邑多名山中如保之葛洪琅邪之七峰應之嶽神無常居焉後由真常主華陰之雲臺宮始從之西真常逝而徙上方留弟子主雲臺雲臺華嶽也為山益奇上方又天下之絶險自北望之石壁切雲霄峻峭正矗非恃鐵絙不得緣墜上下又不知鐵絙成於何代何人意者古能險之聖也將至其顚下臨壑谷深數里盲煙幕翳其中非神完氣徑鮮不視眩而魄震君負食上下自給如由室適奧嬉然不為艱薄寒則上下負食益勤為禦冬備一歲偶未集冰雪塞山門計廩才得當冬之半始服氣減食為胎息遠則數日一炊明年山門開弟子往哭求其尸見步履話言不衰他時方神其為非庸人同下山止之曰不可復有往也已設向師食不繼僵死冰雪弟子雖有喙何説自白其能孝於天下必勿復往也巳君難逆其請指牛心谷曰此漢太尉楊公震授徒之槐市也或聞而稽疑其傅止得公常教授胡不見其居華陰者不識君何據曰然谷南直中方入行二里許深林奇石泉濺濺鳴其下懇地盈畝構室延袤不足尋丈環蒔佳花美箭人之來者始則愛其蕭爽不自知置身塵埃之外居不昃晷既巳欠伸弛然而思去矣君又屏弟子獨居或勸宜留一人自佐曰吾居此樂彼居此戚所安先不同猶強而留之能施期月之外要終相棄去吾故與之為約非舂糧採薪不至絶而繼具而去亦古之君子以人望人不竭忠也其出山還雲臺必以水冰無所仰飮十月為候二月還谷性嗜讀書逾熟左氏博議日食數籥飮酒未醺而止不盡醉也人家得名酒爭攜餉之至則沉罌泉中時依林坐石引瓢獨酌日入則入室而休或坐罷寢覺起行庭中一夕如聞林間行聲戛戛君則曰獸也雖不得其名可試而知引石投之曰麋鹿哉將驚而奔或止而不去者虎耳果止聽不去明旦視樊垣外虎迹縱橫再夜起行如前夕不以自戒而止聞而談者神明之亦有他士樵人獵夫之適山初未聞君為孰何人責之具炊寢則假榻甚者易而詬之隨之益勤以安無難色忿言其外若職宜然者去或問姓名惟他語不告終問之則曰吾求人知耶必求人知而求若知耶吾居此在人所不問而吾所不告也人見其苦身不近人情如是然不違俗上自王公而下及臺皂爭以一際顔色為快燧亦嘗再造廬焉告以人間聲利泛如秋風之過耳噤不酬應叩之山間為樂何如必盡舉平生所見好石幽樹佳泉危棧亹亹忘罷若幸夫人之一往而我能先之者相送以出覺胸臆塵鄙如雪之見晛消釋無留餘者數日益信夫遊方之外有恬愈靜退之士如君者罕類例求也君名志通字伯達名聞天聰俾禱有應不為沴賜號佑德真人提點嶽祠灝靈宫又以嶽祠風雨將騫內出鈔萬八千繦為完葺費三千易敝而新飾漶為翬過者改觀始知有應務之才特韜之耳年八十得益深聞益彰聖皇思見益急當歲巳卯至元十六年詔中使起之北面受命稽首曰草莽之臣通也自知審矣疇昔壯也言不足以資廊廟擇力不足以強禦侮今老矣先狗馬填壑晨夕至蒙冒龍光力疾以行終不達恐傷陛下仁及草木之化是以昧死請中使竟虛車而返今李大參公號知君深且樂誦人善者戒燧傳之無俾不聞於今而泯於後焉公名德輝字仲實前北京等路行中書省今以中奉大夫出相安西府云行狀中書左丞李忠宣公行狀公諱德輝字仲實世居通之潞縣曾祖某祖全再世不仕考朴尚書吏部主事妣宗夫人三子長德英次德芬季公吏部君生三十九年且卒指公謂宗夫人曰吾為吏治獄不任悍􅋧刻削人蒙吾力脫罪罟齒平民者衆天或報施善人是兒其大吾門者勿憂貧且賤公方五歲哭之如成人家才儲五升菽夫人舂蓬稗為糧芼藜莧為葅活之荒歲既就外傅嗜讀書束於貧無以自資輟業十六監酒豐州祿食先足旨甘有餘則市筆札録書夜誦不休夫人以過耽苦慮傷其孱薄也為滅燭止之巳乃厭糟麴歎曰志士顧安此也耶仕不足以匡君福民隱不足以歡親善身兩間之間人壽幾何烏可無或有聞死同腐草木也絶少年輩不遊召其所親與率一時名公碩儒歲丁未用故太傅劉文貞公秉忠薦徵至潛藩俾侍今皇太子講讀薦故翰林待讀學士竇默故宣撫司參議智迂賢皆就徴癸丑先朝封周親割京兆􅊢潛藩擇庭臣可理賦者使調軍食實出公從宜使辟故真州總管高逸民自佐時汪忠烈公始宿兵利州扼四川襟喉規進取數萬之師仰哺於公乃募民入粟綿竹散幣集之或給鹽劵使歸京兆受直陸挽興元水漕嘉陵一年而錢粟充棟於軍中宋臣余玠議葉平土即雲頂運山大獲得漢白帝釣魚靑居苦竹築壘移成都蓬閬洋夔合順慶隆慶八府州治其上號為入柱不戰而自守矣蹙蜀之本實張於斯丁巳深峻用事臣大集關西河南諸臣入計局以中嘗為潛藩用者文致多方於公獨無絲髮得己未從南征至鄢留後行營庚申以為南京經略使再月又以為北京宣慰使其年皇帝即位中統改元五月又以為燕京宣撫使燕多劇賊造私幣雜真行民間陰結死友相誓復仇怨殺人公悉捕誅之雖中書開府在燕令行禁止多不上白由是忤時相意以誣去位從北征還守北山諸關三年惡己相反誅以為山西宣慰使罪權勢之籍民為奴免而良者將千人至元改元罷宣慰司授公嘉議大夫太原路總管兼府尹至是潛藩故臣相無有出為二千石吏者上以太原難治故留居此會我先左丞公當分省遷調山西湖東世職守令即遣諭旨公拜稽首曰陛下以臣堪一縣俾為令臣烏乎可擇況以千里寄治非材大懼任使不稱以傷陛下之明敢薄之耶自爾愈益勤勵崇學校以明人倫表孝節以敢風俗逐姦贓以剔民賊裁婚葬俾師簡儉敦耕桑以富生理之出立社倉以虞水旱之歉一權度以絶欺詐之攘嚴鼓柝以警奇邪之覬凡可與民漸摩仁義者無弛不張嘉禾瑞麥六出其境滿秩左部差功最天下右部考過惟草竊盜不獲一人五年徴入為右三部尚書人有由訟財而失其兄子者公曰何疑焉叔殺之也深竟其獄公所信厚及權貴言可撼公者莫不請求保為衣冠之族無有是也皆漫不為應懸已俸為賞購之其家人果上變告情狀呈露言者慙服叔竟以是病死俄轉戶部尚書事無大小必決之一日書判煩勞指為之繭七年會上以蝗旱為憂俾録山西河東囚行至懷仁民有魏氏發得木偶持告其妻挾左道厭勝謀殺已經數獄服詞皆具自以為不冤公燭其誣召鞫其妾搒掠一加服不移晷蓋妬其女君謂獨陷以是罪可殺之也即直其妻而杖其夫之溺愛受欺當妾死罪觀者神之或咨賞泣下八年授中奉大夫參知北京行尚書省事九年罷尚書省以故官參知北京行中書省事京南水歲泛溢至城下為患公築堤捍去皇子安西王有土關中之明年當十一年奏求公輔巳以故官改安西王相至則視瀕涇營牧故地可得數千頃起廬舍疏溝澮其中假牛種田具賦豫貧民二千家屯田最一歲入得粟麥石十萬芻稿束百萬公是來也貧不能從妻子留之京師事或上聞賜錢二千緡遣之明年詔以王相撫蜀其年重慶猶城守東西川各開樞府合兵數萬人圍之公至成都兩府爭遣使咨受兵食方略公危語動之曰宋今既亡重慶以巨擘之地不降何歸正以公輩利其剽殺不得有子女懼而不來耳不然他日兵未嘗戰及招討畢某偕中使奉璽書來赦最宜正言明告嚴備止攻以須其至反購得軍吏杖之為偽得罪懷之入降水陸之師雷鼓繼進實堅其不下也中使不喻詐計竟以不奉明詔反命如是者皆公輩玩寇疆場心迹之著白者况復軍政不一相訾紛紛朝夕敗矣豈能必成功為哉兩府多致金帛子女為謝曰戎捷與人法令所不禁也公讓不受出未至秦瀘州畔而重慶圍果潰再退守瀘州十三年秋也明年詔以巴哈與公代為西川副樞公兼王相大軍既發公留成都供億食才支半月賦粟繼之官船不足括商民船千艘日夜督運其年復瀘州十五年重慶之圍再合踰月即下紹興南平夔施思播諸山壁水柵隨之皆下而東樞府猶故將也懲前與西川相觀望致敗惡相屬願獨軍圍合州初公撫蜀徑東川歸以為重慶帥閫受圍必徵諸屬州兵盡鋭拒守合州宜虛誠使諜人持書曉之兵隨其後亦制合一奇也即出合俘繫順慶獄者縱之使歸語州將張珏以天子威德遠布宋室淪亡三宫皆北又頌聖量含宏録功忘過能早自歸必取將相與夏呂比又為書反覆禮義禍福譬解其言以為均為臣也不親於其子孫合之為州不大於宋之天下子孫舉天下而歸我其臣顧偃然負阻窮山而曰吾忠於所事不亦甚惑乎昔也此州人不自為謀求去就者以國有主寧死不欲身被不義之名故爾得制其死命主今亡猶欲以是行之則戲下以盜賊遇君竊若首以徼福一旦不難也其説纍數千百言又約書言為檄刊木於山浮板於江珏未及報而公還王邸至是合遣李興張郃十二人者詗事成都皆獲之當斬復為書縱歸使喻其將王立其言如喻珏者而益剴切興至立亦計夙與東府有深怨懼誅復興等導帥幹楊獬獲獵書間至成都降公從兵才數百人赴之東府害其來爭有言前歲公為書招珏誠亦極矣竟不見寤無功而還今立珏牙校也習狙詐不信人特以計致公來使與吾爭垂成之功延命晷刻耳未必定降定降公冒吾圍而來受何物視我必不汝進公曰前歲合以重慶存故力可以同惡今也孤絶窮而來歸亦其勢然吾非攘若功者誠懼汝憤其後服誣以嘗抗蹕先朝利其剽奪快心於屠城也吾為國活此民豈計汝嫌怒為哉即單舸濟江薄城下呼立出降安集其民而罷置其吏立德之輿金玉飾少艾為謝公曰若以吾為是來耶吾無事乎此其持往餽之東府合人自立而下家繪事之川蜀平復以王相還邸是年王薨公感其受知深而悼夫棄國之蚤也哭之幾不能生十七年詔公與南省參政程某即其地聽思播湖南所訟鎮遠王平田會西南夷羅氏鬼國叛别詔雲南湖南四川合兵三萬人誅之前茅及境矣公曰蠻夷無親為俗吝貪始由邊將撫之失策積怨以叛好事之臣請加兵誅旁諸小夷洶懼相擅繼叛者必衆恐非直三萬人能嵗月平也吾賴天子仁聖馳一介之使招之可坐俟其徠豈必煩兵不及以聞遣安圭止三道兵張孝思諭鬼國降其酋阿齊熟公名問曰是活合李公耶其人明信可恃即日受命身至播州降語且泣曰吾屬百萬人非公惠活寧鬬死不降事畢驛聞上為之開可改鬼國為順元路以其弟阿哩為宣撫使其年王相府罷十一月二十一日始至黃平是夜也星如斗霣館垣外公弗善也歎曰他日嘗夢主烏江今播水適名烏江與是星皆吾死徵也夫吾嘗誦馬伏波老當益壯之言而奇曹武惠為將不殺得今活羅鬼馬革裹尸歸何憾二十七日卒後七日資政大夫中書左丞安西行中書省之命下蠻夷望轊車為位祭且哭者動百千人塗所經男女空家咨嗟聚觀合之安撫使立衰絰率吏民迎哭傾振山谷為發百人護喪達興元上聞而悼之贈光祿大夫中書右丞諡忠宣公賜錢二千緡具葬先妃嗣王遣前僉書王相府事博囉賻錢五百緡具奠明年僉播州安撫司事何彥抗章請即州治之東為廟制曰可薨年六十二夫人胡氏前公卒今夫人某氏子一人嘉議大夫安西路總管兼府尹諸軍敖拉頍也女二人長適嘉議大夫禮部尚書劉秉恕幼在室嘗槩公平居以先夫人剛嚴其弟宗亨有小過對衆奮杖撻之不少惜公若何而歡奉使未嘗有厲色遽言其亦能子哉二兄既位不大耀於時每分吾有不至以寡乏見告其盡禮姊氏不以語人人知為姑若從母不以為兄弟也與人交誠易炳白不張城市機穽不面為許退與他人語必諄諄暴其人所長而韜其不及至繩檢姦慝奮發忿急不能容其過然亦不能留怨惡於胸中雖舊欲擠已入不測淵者事已輒忘之略無校言復意自奉甚薄有積則施之不為子孫他日計西川副樞上嘗賜以玉帶錦衣錢二千五百緡止留其服物餘悉分之親戚賓客一日而盡人問之則曰曩吾家多責劵縣官憐而賜償之無負矣吾貴而薄功又可富而厚享耶不思而兩有之神不福人幸以是人曰我貧吾利器也故自入官非素所往來有相答報者未嘗恃形勢取一錢直餽再為尚書權臣力能生殺人恥公共事纍年足迹獨不及吾門以薄祿用奢為言願奉母錢百金交歡令取子自益卻之亦不為謝王相七年及事先王五年言必切切臣職子道請聞斯行以絶事嫌簡約侍衛以裁浮費無急土木殫匱民力者中外所厭誦凡人賢而有聞滿調將東歸必薦汲之王升秩留之故關輔得士為多皆視為已職當然未嘗語人由我而然以期見德遇事謹敏好謀善問多不自用及其末路生人之心愈切取信蠻夷聞其諭招椎結荷旃竭蹶慕義三道之兵為之抑首思徼利於萬里羞成功於一介霣星烏江馬革包柩斬木通道舁歸要荒抑嘗觀今中統以來將相臣死率於其家天下之情稱其平生所為功高者惜德大者思不過如是而極然未有若公逢掖死事為世所壯者也嗚呼賢哉又嘗觀古君臣莫難于合尤莫難于信蓋合或可伺所欲以中而信則必不可襲取于一時自公始侍潛藩聖皇非遽貴之地亦嘗身接之面訓之指受之親以細微觀其敬忽置之糾紛試其理解讋以雷霆察其變常納之汙濁驗其潔白既久而後知遇也其後三十三年之中或使或牧或從或留或相或傅諸侯王或將凡賞勳勞優耆舊可以勸人臣者公皆與為之至商論羣臣能否于公不曰淸則曰剛或曰不欺不見有貶于聖訓用未盡年未耄人猶未足其悲受任于己試知遇于既久可與疇咨海內者將不知誰在也嗚呼悲哉後三年頍彚進遺事求狀公行燧亦荷公知且久遊其門又與頍嘗同受學義不得以不文為讓姑為論次如此臣謝墉恭校
