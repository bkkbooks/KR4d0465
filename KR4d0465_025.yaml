body:
  text: 元姚燧撰墳道碑少中大夫輕車都尉渤海郡侯解公墳道碑至元三年武宗若曰內外庶官五品而上既皆宣授于其子孫亦光顯矣而其祖考猶或布衣歲時廟享工祝致告無所稱謂非所以興孝天下也乃敕省臣列五爵三王加階勳而等威之五品子男從男正子者縣四品郡伯皆惟考一代三品郡侯父及祖二代一品國公祖而上遞衰之至曾為極焉惟褒詞用御前寶者以其名聞他如宣授用是少中大夫祕書監丞解節亨之考禧贈少中大夫輕車都尉渤海郡侯妣樊渤海郡太夫人祖政祥中順大夫上騎都尉渤海郡伯祖妣樊渤海郡太君節亨將昭聖代禮使臣下之美且侈吾家之美希闊之遇樹碑先瑩託筆于燧因惟前古不及三品者不以封諡揆今為制下及五命至德深仁為何如哉揚厲張皇史臣義為故為解氏略其遠紹惟始上世諱元家真定者有子十有二人高祖諱徹登金進土第五子曾祖其季諱信當金末世為真定綾錦院長官娶安氏實生中順安卒繼娶密氏國初徙所領織工將度漠道卒野馬川中順事繼妣以孝聞讀書力學強敏兼人淹貫經史尤邃易學傍及天文歷法靡不精究金棄河朔全趙巳為元有會武仙殺都元帥史天倪以成叛而臣金山太君為高苑金武義將軍女霖之女遂避地高苑歲戊戌太宗詔試多士中是選者復其家中順以易義登第卒年八十三肇塋殯之渤海安豐鄉之東原太君卒年九十四曾祖死遠役柩不得歸别製衣冠呼其魂合曾妣考妣兩世皆窆是焉二子祿及少中惟少中樊出誠篤而多學為軒岐言是邦疾者恃為司命擇師教子恬忽時榮歲荒則發庾贍飢凶喪急貧無待見告賻而周之則吾所儲如彼外府少不留吝稱貸遲歸火券罷償部使者經郡觀省民俗必以其事上聞其章不計堂帖有司大書其門旌曰義士詞垣之臣賦詩交詠凡是鄉閭無間嘗飮惠與否爭進饋賀其曰免織工取直末入綾餘五百匹至大之元冬十月二十有七日不病而卒年八十一妣郡太夫人亦樊氏金行部員外郎之女常從母受學故于經史及列女傳皆嘗誦習且善書歸解氏賢淑有聞舅姑姻戚稱其孝睦亦以至大之元冬十一月三十日卒二子節亨筮仕為工曹史出為濟南録事參軍杖其豪右使酒公所者于市由是惡少斂迹再轉德州判官大新廟學以振風教移獄疑囚凡有司積歲不能正其罪者皆檄讞之合前為録事聽審得情使誣詆者不得脫死無辜者賴以伸雪無慮引連數百人事有今太子少傅李謙德州學記郡文學所紀部使者之章可稽焉擢光祿寺主事集賢院都事祕書監著作郎今進而丞秩躋三品又降恤詔推恩二代下及墟墓其于孝子慈孫責巳塞矣撝謙提領濟寧益都屯田以親年下無兼侍辭不赴三女長適知和州萬宣次適同知膠州薑陽季適太常少卿王景元男孫六儼儀儼舍人儀國學生四未名女孫六長適般陽學正王麟餘姆銘曰生烜其名隨死而泯猶于柳車曾未旅軫一世鼎鼎幸趨者多思所致然夫豈在他由積無素功微德薄譬彼潢潦其盈易泄惟義士君詩禮青氈術巳惠人矧財善捐篤生孝子家學弗畔一為集賢兩踐東觀用是宸楓進官少中推恩其先俾貴與同又爵之侯土以渤海于祖少陀惟土未改中順伯之兩妣皆樊太君夫人賁及墓門平生侯伯精多用物安知斯時不巳肉骨矧兹祕丞膴仕日躋爾伯爾侯進爵會齊安定東原萬家可置戶以守之用華百世磁州滏陽高氏墳道碑有國之所以寵臣下者二曰爵曰錫爵自九品推而上之至一而極雖有策制敕授等威其歸皆億萬維臣之同若夫錫也億萬臣中無有百十之見及者人臣得之一己幸矣況于三乎在易師象以三錫命為懷萬邦今江浙行省郎中高謙昔都中書左司事錫象笏禮曹郎中錫貂袪袖狐裘中書左司員外置錫白金百兩金奇服三實三錫矣古所以懷萬邦者集其一身則天子之加禮以使者何如宜謙丐燧大書先桓上以嘉君命之辱下以起本父教之忠也維高氏自汾之孝義徙磁之滏陽則由其曾祖府君有官􅈴于金喪亂失之祖府君諱閏夫人張氏考府君諱澤字雲卿金既播汴太祖徇地北人能以州縣下者即以為守令僚屬聽自置罪得專殺磁守杜國用知府君吏能求以自佐推澤為孔目官俾司其州岸獄招求散亡之民大兵之餘市虎田萊驅而翦之以立公宇四境戶版僅及千數他州之民聞磁懷輯有譽多來居他州虞損戶數欲徙還之不得遣追胥即徵徭賦壬子天下大料民戶歲入銀四兩民巳無所于得州縣迫征不休回鶻利之為券出母錢代輸歲責倍償不足則易子為母不能十年闔郡委積數盈百萬令長逃債多委印去時開尚書省于燕府君頻歲以二者為控曰今天下一家無有此疆爾界民之錯居宜從土斷又百穀桑麻衣食之源歲鱗取之為利無窮古有天下者悉驅遊隋之民盡力南畝今釋是而戶賦之銀且産銀之所四海無幾必深山邃谷鑿隧篝火畚礦鼓冶而得焉可以盡給四海賦民之求哉若是不巳將日消月削窮益滋甚省雖是其説竟以法制立矣皆不得其要領而還中統詔下而負銀始革州遷滏陽令府君曰孔目州佐也他令由吾銓今乃與是班乎薄不欲為後朝廷誅東反虜懲世官弊守令之選收歸吏曹而易其地前為令者悉以今遷府君惟自州佐監武安衛輝單曹酒稅衛輝單曹加提領或咱昔不為令府君則曰命實使然我自棄之又將誰尤天今卑豫征商不剝下媚上道及民矣安為而不卑之及謙入官來前飭曰吾所以屑俯首者待汝用世也勗大吾宗吾不仕矣以至元甲申夏五二日卒年六十一葬某里夫人劉氏以賢淑聞二子長某早世謙始為彰德路總管府判官入為工部員外郎轉都左司事禮曹郎中左司員外郎出尹開州兼諸軍敖拉遷江浙行省郎中改淮東宣慰副使江西行省郎中再為浙江行省郎中固亦足顯其親況稽近古父位不充而子或通耀國家不欲子孫貴臨祖考故視子孫今何官勳生封而死贈之使貴與之夷興孝勸忠聖元既法行之加郡國公侯于某將相之家亦他日求推恩之凡也州佐比古上士道可謂未盡行其時矣而先有是仁民之䇿于廷臣欲紓其急其藴豈淺淺哉而天嗇是享于其生其留豐報諸其死俾哀榮及廟墓者匪資謙貴也從而銘曰覆一蕢以基崑崙之臺溉由蘖以須負棟之材此常人之情皆亦蹶蹶其艱哉孰曰昌厥後來為濟時之才辨冕崔嵬而非先德之階豈羈於人而天之諧歟必百世滏水隈有由斯銘而伊人之懷者矣靈山先生董君實墳道碑嘉議大夫臨江路總管兼管內勸農事董章將勒石甄表其考府君靈山之墓持太平郡文學姚和中事狀丐銘于燧因惟萬物本乎天人本乎祖稽漢金石惟祖始不可推采者則不本之苟可推采無泯泯而不本者故祝睦緒高辛火正祝融度尚與顓頊世掌位統國法度衡方唐扶之胄堯陳球袁良之苗舜孔耽殷烈蔡湛文葉諸君是後神眀者可殫紀耶然是推采雖精博之士遠據為説猶啓後人牽傅之惑若春秋傳蔡墨對魏獻子龍問曰飂叔安裔子實甚好龍能求其嗜欲飮食龍多歸之乃擾畜龍以服事帝舜錫姓曰董春秋外傳以蘇顧溫董為巳姓之族蓋黃帝二十五子姬酉祁巳滕葴任荀僖佶嬛伊惟青陽與夷鼓同巳姓則董父非止裔于飂叔安為黃帝裔孫者又較著也在夏殷世文獻無徵周則晉良史狐安于秦將翳漢江都王相仲舒實生廣川其地則今真定屬郡冀之棗強故是姓在趙者多宗之或曰今居真定天祿坊者猶其遺苗君諱圭字君實曾祖明善祖好義考信家真定屬縣靈壽其離析天祿固未大遠至君業儒以江都罷黜百家表章六經使道術有統為羣儒首嘗著玉杯繁露發春秋微曰吾家學也遂專經春秋當授室鄉先生宗訥奇其願立女焉事考府君妣夫人色養無違有純孝譽味道自腴恬忽勢利不苟上交所親與者才兩張公安撫藝大夫參鵬舉殊篤其敬使則過其廬違遠則書候其安又善植産積則散周其鄉歲荒為糜以全餓人加饋癃老以肉逮三子章奇彥奇生曰古以三人為衆吾家四世惟一其傳積德在余有是衆子延師私孰務知修巳治人之要以篤其成才不事記覽為詞章誇逐時好既其入官惟飭三事曰忠以事上淸以約巳仁以裕民古之人未有捨是而名昭于時者晚愛靈山暇與親友縱遊曰是荀卿子所謂秦剡趙有苓及松柏之塞者後與封龍無極三公白石其一則余忘之為六名山皆吾郡之望太常給圭幣祠其得法食者今其文曠墜吾與二三子屬觴乎此亦可為千古一慨者故人號之靈山先生以至元二十有三年丙戌春三月十有一日卒年至六十九其月十有六日葬某地以前卒宗夫人袝繼娶孫氏章由卑官積至太平路總管遷總管平江戶甲天下賦重而役繁民頑弗率前政往往以不職罪去及章來為出令化之不專威虐而政以成績最浙西為良二千石期克佩先訓之效也後移臨江至未再月以首疾去奇太原路交鈔庫使彥提領蘄州路稅課二女適百戶王某鄉人趙某自章而下皆宗出男孫五汝霖主嶽之臨湘簿汝枻提舉大益山屯田汝梅同知信州路事女孫五一適燕山劉氏男曽孫十二人仲玉仲珍餘未名玄孫二人嗚呼後靈山者四世己二十有四人入官不家食者四之一其遠而益蕃盛光大淸顯者可知也已銘曰維天于士不全其卑或厄窮家或顯庸世其顯庸世無澤民加雖烜其時淸議弗華其厄窮家肥遁自遂道集其躬令譽日致嗟之有苓伊爾廣川江都之宗實蔓以綿其存遺編玉杯繁露千載茫茫誰究其緒君曰家學吾舍焉師孝親之餘力振起之天爵篤修紛華若遺逮子之仕提耳三事曰忠事上淸以自治仁能裕民則古良吏章也持循恪愼其身官二千石厯郡必聞有後如斯亦既克述其來其思無替爾續神道碣孫府君神道碣少中大夫前同知荆湖北道宣慰使今福建行省郎中孫顯自福州使人持其考廬川事狀六千里走書京師謁銘神道于燧曰我孫氏故鄭管城力田人也族大且滋由兵興去平土即險而居始遷今河南之登封會歲荒先人分族五百指輦祖妣就饒唐之比陽先祖獨留祖妣卒其族以干戈未靖謀趨漢南先人死懷先塋生思先祖偕先妣挺身西北至則鄉邑蕭條先祖巳無可問其存殁矣寓食河之北數年復歸剪棘而田斬茅而堂日夜作苦十年而能家也復崎嶇唐鄭之郊即遺親故老哀號百至以求先祖之柩竟負窆盧川篤孝如是人有亡罪來歸寧抵冒法禁舍匿其家不忍聞知官也事去則衣粻而遣之後有子明顯益躬力穡不勞使之以奪從師如學為吏晚歲號盧川老人與紫雲雲嵓玉溪輩年相夷者七人相從泉石間方顯通貴力可以足旨甘適凊溫而嚴霜交墜嗚呼命耶孤顯逼以福省始罷今開傳持其印甫畢襄事不得終喪而南固不為昊天者弔矣重念先人為太平不遇之民行施于家而不昭一時言及其鄉而不聞百里之外功微而用薄道晦而居易所以亟勒石者非以溢美誣世是求庶幾吾宗遺苗知權輿斯家之易雖明韶嘗有追封之文猶以例未開不敢倡為之請以試不測之雷霆今幸賜銘非顯生拜公嘉我先人亦將肉骨于九原也敢泣血請燧哀子擇師蘄材育賢日薄西山釋勤自佚鬪蘭釀松踐嵩故實伊誰首之內翰馮公君誠未學異世樂同杖屨聯翩榼壺擕載傴傴耆耆白首七輩富田連疇壽垂九齡子孫官歸朱紫拜庭君可盡有人所願愛黃腸一棺無恨于蓋送終隆數孝子義為嵩高如拳始爛之碑奉訓大夫知龍陽州孝子梁公神道碣維梁氏世彰德安陽人金進士棟生皇府録事生圭忠濟為東平嚴侯力能生殺人彰德時為屬城招不能致足白自信不可威屈生君諱琮字文玉修幹美鬈好學篤古考府君卒廬于墓側晨夕悲號不異袒括手理垣木鄉鄰傷之衆佐其力終喪初事北安王再辟掾宥密後從濟江以平宋勞官承務郎尹湖之長興民俗生女則教琴築歌舞長利技色事人取貨歲滿則質他室生男謂無所于得率不鞠投棄諸水為檄曉曰若新國也未知吾元為律倚市門子猶不敢棄况茲天民長賴給上力役者不特傷汝父子之親亦乖聖世繁育生齒之旨敢復然者論以違制由讀木蘭院碑載宋寶應丁亥湖水大溢流死數萬聚葬於此若京觀然遂衋傷心罪其志且生永寧去登封三百里均為河南屬縣為生同鄉少中宣慰荆湖某為憲副為同官義不可讓嘗究孫民先世由喪亂名字皆逸少中之祖伯季四人其伯也始徙登封者實生盧川君諱聚字某年八十五以至元丙戌冬十月十日卒葬先塋以元配程氏祔程有賢行以君四十無子為娶姨母尹氏子而生明顯明讀書不仕男孫七人禎將仕郎峽州路知事復將仕郎主枝江簿亨謙豫節元咸幼女孫一人亦幼男曾孫六人未名女曾孫四人逾幼嗚呼君夫婦惸然還登封及其屬纊三世子孫巳且二十人其婚姻葛藟之家猶不居是選固巳衍為盛門巳微而昌始屯而亨天之福人亦易矣哉又少中涖民治軍遠迹嶺海蜚聲振績為時聞臣子貴應銘法銘曰凡今受姓咸出黃軒其自以氏實為公孫後有王孫别胄王室文由便省去覆而隻有煜兩孫世緒咸遙欲一其初循本自條其居登封由管城徙鋒鏑逃歸子然一已胼胝手足克艱造家感迷先邱號求邇遐民欲天從爰昭其孝指所在藏假人以造乃安斯窆盧店之阡為前為令罹是大厄猶不為虞安必異時湖水不再至耶發民築防延數十里高袤及丈日急其程如水朝夕至者悅以使之民不怨勞竟工種柳雜木其上以捍衝齧縣有李王祠百區皆非法食毀取瓦木用新縣治廟學尤麗高敞加什其舊即其羡材倉廩府庫病坊遞舍無不改為居民行旅為之改觀效命義軍故皆鹽夫羣行市中人無誰何一日椎釀甕眇酒翁目叱衙兵追捕或諫如是驟繩恐不利尹君曰吾奉天子命尹此土蒞此民安能坐視鼠子與尹爭長雄自為名哉盡收其黨二十餘輩杖之鄰死自爾鄉民效尤夙號難令小裂公牒大殺兵吏者皆側足斂手無敢肆暴嘗裹糧紱印行田老父為具食發槖償直父問所紱為何曰吾令也紱縣印耳父出告其鄉鄉民百數十人追及于行爭持酒炙遮留後至者觸器覆酒流地酒主憤云令去必刃汝觸者曰吾亦有刃報之君曰民以吾故相仇其咎在令衆惶駭罪其失言二人慚伏君為曉曰吾元禁挾弓矢刀槊嚴甚輕杖重死若曹何苦干禁挾此為耶且戍兵以索此為名得之則破汝産其皆納置令所乃得兵數千事而還後衙兵暮夜追呼民燭令署畫刻而至訟牒至前決以其日未嘗滯囚圜土屢空去之日士民號送填道擁馬既久猶思求頌其德刻石縣門後令不可民請不置者數年一監縣者曰梁令非有惠民何能致然從汝樹石公堂右方書今歲陽歲名以彰其賢且俾人灼吾不昧善也至元二十四年丁亥去寶應實一甲子湖大溢水不冒防才二尺民始歎曰微梁今葬魚腹矣雖求為魚得乎加承直福建勸農營田副使巡行建寧時羣盜聚浦城戍將方加兵君止之請身至其棚曉曰汝皆平民逃州縣重賦繁役出此甚不得巳之䇿汝曹自計甲兵堅利儲餽有繼訓練有素徵發日多敦與官軍而乃以就盡獸聚鳥散之人抗之不敵明矣能從吾言捨險即夷相率而歸小可以徼賞大可以得官孰與鬪官軍身膏草野妻子奴人乎因血指為盟民感泣投戈拜賜不煩兵而附順者若干千人後議事福建省會南劒俘賊妻孥三百餘人至公曰是多平民為賊驅脅宜旌别之縱歸者半尋遷福建都轉運副使丁妣夫人憂又廬墓終喪升奉訓大夫知常德龍陽州民聞有惠長興爭境逆而遲其來方大施張以變前習數月代至民復境送而速其去大德四年為子鎮畢婚南劒夏六月十一日卒歸葬其鄉先塋夫人同郡李氏二子伯也鈷有學行二女巳從同郡趙某許昌程某二孫浩浦至大巳酉有司上羣從共居族于亦能喪親如君詩曰教誨爾子式穀似之宜特旌異風勵四方庭臣用嘉揭諸大逵為孝義坊過者式焉鎮恐先德猶未白世聞燧舟應宮賓之招自淮安逆至儀真拜而請曰先君墓碑未敢遽言俟他日必即京師見懇今而果來為之詩曰聞古有訓孝子之至不于養生于喪自致敦古如君未忍其親玄宅長還曠野無鄰即邱築室僅蔽雨日呱􅈱三年忘盥與櫛家本之身克爾親親推以為國何有仁民長興孩乳脫不冤夭患防悍馴庶弊皆矯于福營田劭農是官往造賊巢舌柔暴殘雖生平為蓋棺乃定不有太史孰筆卓行瀰瀰淸漳源出太行有碣其壖流芳與長武略將軍知秦州史君神道碣至元十有六年其歲已卯五月二十有一日武略將軍知秦州史君卒後二十二年夫人亦卒又後是十有一年至大辛亥其子興平令誠三千里馳書京師于燧曰昔太傅魏國文正許公私淑于秦我先人時童子北面事之君年先立于下風今將舉是二喪别塋于長勝坊少陵原樹碣墳道昭示悠長銘捨先友其將誰託余勤其請之遠為序曰維史氏雲中人太祖加兵中國禡牙始此故考府君廣隸師王穆呼哩戲下以從殘河朔河東功戍鎮西州金蹙國播汴棄關輔徙其民于河之南乃偕田侯雄踰西河雄取京兆府君逐盜華州芟荆𣏌飯蓬稗以立官舍又歲從太師塔爾海伐蜀功授璽書金符即知華州有子八人君其嫡長諱克恭字子敬者皆先師所命年十有八府君丐老遂襲為州惟騎射精妙得其家學他皆戛去紈褲豪習遇其聯仕不以刺州自多而克下之華之父老故人咸語曰吾邦君有子能爾其所加禮不以年少而後其父會罷世侯遷刺同州同接壤華人信已素滿秩刺乾土廣而戶寡不虛旬浹以當甘涼諸侯王妃主吐蕃去來驛塗比供億不失幸未速戾實艱實棘勵志州校割俸為倡倉新廟學後刺葭州葭瀕西河方攝延安路事咱順寇成都盡發路民為兵以戍君汰貧弱惟抽富民産沃丁衆者籍之輿誦曰平俄秦藩肇建方冬發萬人築白海行邸君營五原寨沍寒甚于他州方是之時急其程作民必稿死君輟徵集須春赴功其不苛民媚事形勢如此移刺秦州未上而卒才三十有五嗚呼不年哉大帝淵龍自輝驛致先師至秦實歲甲寅君從學八寒暑先師嘗譽其厚重篤勤有入道資由巳未還鄉河內故不卒業而早宦所就巳此夫人瓜爾隹氏金遼東行省必喇珠之孫皇先鋒使色埒之女當君之卒年猶盛也三子誠弟謙以門功主同官簿讓不祿觀二子成立若是豈不為善持家學之徵歟女孫三姆銘曰繄君先公興龍之逢拔民于雲樹勳先攻初亦豈易奮殳顔行攻壘略地大河之陽由晉而西移軍弘農乃翦寇攘有華四封何以寵嘉有煒金節副之命書郡侯是列君襲為州猶小子侯會華世官循年轉流遷之馮翊與華壤錯吏習民安坐嘯畫諾于乾于葭乾難葭尤乾止倐還葭多隱憂隱憂如何籍兵戍蜀與彼秦藩行邸迫築乃恤民寒緩程須春年不三紀未上卒秦司月旦者評有二悼一不終業魏國去蚤一官止西雖曰邇家有施不幸神都去遐不峻其階終始州刺豈天嗇之將熾爾嗣少陵之原實古上林碣以表阡庸告來今太倉監趙君神道碣燧讀廣平府教張宏狀其弟子今奉議大夫僉嶺北湖南道肅政廉訪司事趙勵之考太倉監君之行而取其三焉曰學約而醇官久而卑操窮而確蓋書以乘治忽詩以正性情易以際人天而春秋以謹名分著懲勸其刪定繫作雖一出仲尼之手以諸賢弟之問聖師之對示萬世以操存涵養為傳心之要典者惟論語為然而君誦之終身不治他經雖不治他經以推治他經譬則破竹將無有迎刃而不解其節者豈若今務博者童子知誦六經白首猶迷其源委君亦漢氏諸儒專門一經顧多成才之亞歟故出而仕其卑則監倉夫積久而易粳腐者惟粟必贏其入而棓其出贏其入也則輸粟之家病棓其出也則受廩之家忮之或一有言皆觸禁者矧利所在覬得者衆臨制之吏鉤名綜實不于書則于庾鱗比取之月異而歲新焉幸有愼者巳不為盜人則迫使必盜故完往而敗歸潔入而汙出償産傭孥者武敏接也此監府縣倉者然也太倉則儲幅􅊷之粟于斯其粳腐尤夥尤夥則贏入而棓出者愈無紀極地由邇輦轂則病而忮者易訴易訴則完往而敗歸潔入而汙出愈速或一二歲為之不償産傭孥者有之必無二十年之久而不蹈者非不循俗嚴巳以拒人察察醇白者疇克爾然亦確確乎其艱故或疑是非德之大不曰鄭之國渠鑿涇注填閼者水也井亦水也以之溉也井之利纍日夜有不能終畝而鄭渠歲灌潟鹵四萬餘頃夫不計井之勞與所居之小之異而責其不為鄭渠世鮮不以為迂使日夜汲之積二十年之久冽而不竭亦佳井哉監倉古委吏比也仲尼之聖猶止于當會計讀論語而學仲尼者能是巳矣非德歟既其歸也有廬于城而無田于野無臧獲以服事朝夕供井曰之勞薪糧之須諸子身之衣惡食菲安不怨尤里之豪悍有恥其乏者曰使幸交我我則周之君曰吾受德鄙暴以捐吾介不可及子勵仕常從之官每飭之曰世固有羞賤貧而希富貴權幸以死無回者矣莫不一敗瓦裂汝惟義命之安祿入之外不可他營銖髮以賊其心能謹其事而忠于上則良子也年七十九卒猶以是為顧言實至元甲申四月十有一日也君諱圭字君璋世居盧龍范陽間四世祖通以材武得官于遼為千夫長祖達不仕考托監酒上蔡義宗播蔡死蔡亂君踰河僑家洺州為州將成侯兵曹後入監太倉洺今易為廣平升州為府元配河南胡氏前卒三十二年三子彧德安勵金無經學吾元徇地漢上得江漢先生趙復于雲夢至燕而經生始集彧從之遊有善學譽與耆宿友年二十四德安年四十皆前卒一女適肥鄉蓋氏再配東海盧氏前卒二十年男孫某年二十五而卒女孫一適同郡韓氏一適巴圖總管子毛頴孫曾孫一人未名勵自知淮東憲事入掾中臺又掾中書出同知晉州雲南行御史臺都事今為湖南至所治善恪其先訓者大德戊戌將改葬君與兩夫人于某鄉里求燧銘墓碣銘曰生煒有輝殁淹其升孰曰嗣人克善乘承幽光于生蓋棺益耀非子式顯歸以何道嗟太倉君恬養廉貧其志不越式是後人入循周行出而要荒繡衣所如梟狐遁藏期為良子可曰不負令甲聽為于親可後易桓為碣洺水之阡太史繫詩何永不傳臣汪滋畹恭校
