body:
  text: 元姚燧撰墓志銘南京路總管張公墓志銘公諱庭珍字國寶曾大考淵大考士明以武力再世為金千夫長家臨潢之全州考楫北京都轉運使故又家北京公于次為中子沉靜易直通毅辨強綜經緯史尤長左氏春秋筮仕已存愛民利物志事先帝以典內帑受知先是高句驪不請徙居海中江華島上遣使問何由且詗其二服親擇廷臣可者即命公時年二十三至其國王禮事之甚恭書言吾歲入幣大國未嘗不謹臣職非與未臣而敵己臣而叛者比而大軍歲入邊刈吾人民奴吾子女有吾貨財蹙吾土疆吾是以捨衍而完險誠出甚不得已之謀非首鼠他圖為也末疏黃金以兩計白金以鎰計各千百數為壽又言誠以是慺慺之言歸聞之上幸止邊軍無歲入願歲幣外別入如今相壽者數歲嵗為謝公勃然曰王以天子之使求貨來耶揮去歸具道王言且保其國無他避掠徙耳上亦悟曰人歲入幣事之又加兵罪之誠何以待不臣而敵巳臣而叛者詔令軍止戍邊無入掠自是完東夷室家父子無慮萬億計自將伐宋從至閬中留為安撫使治兵裏摩創殘外供仗糧不擾而集今上即位中統建元自將北伐以故先朝故臣熟西京入漠南路俾置傳驛兼給饋餉至元四年授同僉吐蕃經略使兵裁叛離仁革狼頑渠酋讋撓滋久安順六年授朝列大夫佩金符責貢安南時已徴天下兵數十萬圍襄陽實為蹶宋起本勳臣故相上與咨軍國謀不可一日離側者皆出行省董師公至其國王立受詔公詰曰王行非止違命干禮于利害且不熟知揆此邦人民土地不當天朝一總管治皇帝不欲郡縣王地版籍王民聽其稱藩遣使諭旨德至渥也且王以與宋輯睦緩急而援今百萬之師長圍襄陽鳥飛路絶朝夕將拔席卷渡江覆其國都易如振稿王猶倔岸海徼恃為唇齒自矜尊高事且上聞天威小震無煩遠召中國雲南十萬之師再月可至則丘墟王廟草棘王庭者將不難為其審䇿之王屈降拜益慚憤將以兵恐公使力士白刃環衛公乃示怠弛袒寢一室盡擲所懸箭弓刀槊付衛士聽汝何為暑渴甚每取江水以進皆溫惡不可飮食及索井汲不許曰吾俗不相悅者多投毒井中殺人公曰自所求毒死不恨終汲飮食自若安南君臣多畏公者八年會公以安南貢至襄陽猶未拔即授行省郎中承事勳貴巉絶不阿惟見之營衙足迹不及其門商較事宜言閎色厲或有以凌驁見短者故右丞相史忠武公天澤解之曰是其為心忠正侃侃人也久親其人必實吾言十年襄陽下改省為行樞密院以勞遷中順大夫遙知歸德府行行院經歷大軍南規渡江復行省公復郎中俄降虎符襄陽路總管陳府尹毁城樓以完廟學散契丹軍以惜月廪剗弊施宜當其先後明年改監郢復二州位安撫使上捐魚荻之賦使人厭腥食家給蒸薪月發食以贍餓乏視便輒行行事已劾聞十四年升嘉議大夫監平江路位總管上郢復民聞去遮馬號送萬數其治平江考績亦最他路十五年改同知浙東道宣慰使未行改大司農卿丁內艱時軍興法聞喪不得輒行乞奔赴不報公願還所受制書為民行省知不可奪歸之旋艫枵然金玉美色皆無有惟文書襆被而巳今中書省右丞相巴延夙嘗疑為凌驁者後顧為深知公嘗語人曰諸將渡江無有不荒貪獨豫與國寶淸愼自持聞者以為知言公家居四年又終外艱十九年以才起復仍故官嘉議大夫南京路總管兼開封府尹至治之初見星而出見星而歸凡前政積事留獄旬月剖摘皆出尤善發姦伏有控鶴十餘輩比公至僦大第聚居二年黃金橫帶出入飮食街陌縱橫人謂其真也公曰控鶴役在京師久此不行必劇賊也密喻有司以意期三日盡致其黨索賊以來得金帛寶玉服玩典質券契盈室鞫之皆欵服物則椎埋所獲妻妾僕使皆掠民子女或娼妓明日告曉市中皆杖死民駭其神捷闔境乏食巳聞未報輒止稅勿輸明年河北大旱民流徙就饒及河朔數萬人郡縣畏損戶罪謾以逃聞省部遣使分道邀之許發倉人給三月食還所籍民聚謀曰吾得食三月負難歸重難勝鬻將何噉且各賣質田廬而南至家何為愁歎無聊若出一喙公謂其使曰斯民非賊河南非別界皆聖上民社也非不知奉命不輒濟可以無罪誠不忍老稚頓踣吾治甘受禍以活此民則下令諸津急濟果有以專行上告者事下御史大夫即治廉之境民皆曰吾侯賢牧其為開封斷不阿可當今代包拯大夫察其無他薄責而歸奏寢不下秋雨潦河決原武泛𣏌灌太康自京北東漭為巨浸廣員千里冒垣敗屋人畜流死公括商人漁子船百十艘又編木為筏具糗糒載吏離散四出往取避水升邱巢樹者所全活以口計無慮百千水又齧京城入善利門波流市中晝夜董役土薪木石盡力以與水鬬不少殺乃崩城堰之城害既弭復大發數縣民增外堤防分直為三直役一月逃罰作倍起陽武黑石東盡陳留張弩河綿亘三十里如期三月隄防悉完以至元甲申七月二十二日卒官舍年五十六河南之民識與不識如喪其親戚家才餘俸半月將歸葬貧不能西開封市民雄財者戶賻之又遣子弟數百人持錢分程具奠越别治洛陽五百里凡千里及潼關以其年九月葬安西府咸寧縣洪同鄉少陵原都運公塋之左夫人何氏溫淑靜端男子三人嶽提舉郢復魚湖崇西蜀行省宣使嵤未仕女子三人一適太平州録事韓和一適紀德信一適鞏思齊後三年其季大中大夫諸蠻夷部宣慰使庭瑞以燧素知公求銘其墓辭曰年五十六固不云夭較齊耋耆孰謂壽考究其致之豈無以然國苟有利棄身若捐東北雞林拏舟以使西南雕題登馬己至視數萬里為步仭餘招麾兩王嗾臺指輿吐蕃獷黠化不犯令由積苦勞至不延命壽也無稱世不為臧死有可述短不害長襄陽軍謀郢復民效己實己著猶其小小開封蠲租舟民于河電擊霆馳懸躬禍羅下燭其忠由明后聖老幹經摧霜風踰徑大浸稽天陸舞龍蛇流死所餘邱木是家乃集舟航乃筏以繼乃求以濟取置平地穴陴摧防萬杵登登役不踰時隱其阜陵民流他疆我飫其食我疆沴傷皆手援溺顒顒公哉人之騶虞彼饞婪婪橫目虎貙雖古循吏列傳史册載筆今功孰怍為匹少陵之原有坊其邱銘石道周以暴諸幽中奉大夫荆湖北道宣慰使趙公墓志銘至元十七年授公陜西漢中道提刑按察使之命下燧時巳為副雖公未至實與聯銜遇凡狀聞臺吾曹代書使名者一年及中丞王博文來使乃有不得一際顔色之恨後燧轉副山南湖北憲治江陵二十三年入直翰林明年公以中奉大夫使持節宣慰荆湖北道亦治江陵終不能相遭以卒後四年當三十有一年燧如龍興始識公之季子大中江州總管兼管內勸農瓛愛其忠厚和粹薰然克世其家素範者常同郎中馬昫登廬嶽數多忘其為新識者歸復過之益相歡也出故李君槃所撰墓碑猶未有埋銘因思與公陜西未嘗同事而嘗同銜湖北未嘗同時而實同治其慕義區區雖所雅好有不如也今日燧直翰林視槃翰長為同事同階同時而同治者槃銘公于昭昭燧不能暴之于幽乎瓛曰固所志也乃敘之令事以類從積官以大中中順嘉議通議正議以及中奉受任凡十九歷中外四十八年蒞民則襲永安軍節度使丞真定之藁城尋為令會憲宗大料民公令藁人損其戶數得親戚同籍及後賦下戶歲百金四兩而藁果不困人己服有經遠謀民有崔進王成共飲成歸而進失其處其兄訟成殺之縣掠成服時州縣得專誅公疑不得其尸緩不即令償死踰月滹沱冰開而尸出驗核無他乃由醉墮水死成乃脫繫時年少而位卑人善其能用獄他日遷真定路總管判官東京西京大都南京四總管惟東京虎符西京南京兼尹大同開封府東京當高麗倭奴用兵之衝其間渤海女真契丹錯居俗各異宜他人得此率謝不往公居三年諸夷帖帖白燕巢堂士多祥而詩之西京大荒聞于朝得發倉儲以丐貧飢民賴全活不流徙聞令下采民女姿德宜者貢實掖庭公上言山西回遠京師且無大家民女貧陋無有可充椒房下陳徒生民心使育女嫁姻年不及幣徵不納惟幸有男無託殺禮戾古夭生紊俗甚非聖世之盛舉也同列危之避不連署公曰此出我獨竟上之事亦報罷南京未行裕宗在東京止之也治賦則銀符真定路宣課副使改課稅所長官升轉運使領東京路鐵冶考績皆最職兵則千夫長從征李璮濟南在東京南京兼諸軍敖拉總管持憲則山東東西山北遼西陜西漢中提刑按察惟山東為副按行部治獄無滯囚曹州屬縣禹城械至二賊曰嘗殺人者隨聽録之兩人之明非辜言色殊悻直乃移讞疑獄淸而真賊得二人者以出凡今條責以課農桑勵學校問民疾以肅風俗職無不舉者在庭則歷兵戶禮三部尚書建言省部任人率先其私非獨名器所由以濫且大啓仕者之爭其敢而無畏者至遮乘輿以訟此風豈可崇長而不思有以衰之乎及持使節宣慰荆湖受命湖省而犯法臣肆其凶叨恃有中援威福張甚欲惟以溢戶富財牢籠乃大料民兄弟籍者皆異之雖舟人田客僑遊不遺集吏計局不給紙燭又市紗羅小其時直又賦之民復為憑怒曰吏賦民得者皆官有之又大鉤考積歲稽逋立期送官搒掠號哭之聲相聞民至鬻田屋嫁妻女或赴水自戕死定無責責償親戚鄰里或嘗主何人家者又逼官吏令首嘗受所治民財及酒食饋遺督責之使日十餘輩燕犒送迎不少遑其恃勢須索者無敢少逆其言一都司貪與妾語宣副跽行酒移晷不持觴省顧總管有與吾姻者責令首償曰吾未嘗取民一錢不從乃摽草老婢令鬻得直輸之後反由是免嗚呼觀同列與所臨守土若此則公之有至難于吾胸者從可知也如是而難事牢不可剔之巨盜不見尤方數千里不遂生之民不疾怨而悅之其持身以間世故者何如也公諱椿齡字壽卿滿秩荆湖歸未十舍道卒樊城實二十七年十月十二日年七十三返葬藁縣其鄉武家里東原祖塋少從金翰林學士王若虛學年二十一中我元戊戌真定選性孝友高朗尚氣節或曰公豐頤後耳顔角炯然望知為富貴人也維趙受姓絶遠渺可譜究者兩世祖諱福有潛德祖妣靳考諱迪以材聞卒官節度永安軍妣崔故翰長李冶己敘之碑夫人王金吾衛上將軍知中山府善之女公卒十日亦卒壼儀劗然撫下有恩能升金陳高白四人者禮秩己夷不嫌庭臣賢文多序詩之子二人奉直大夫僉山南湖北道肅政廉訪司事瑗與瓛也六男孫執中守中居中行中安中柔中五女孫適崔恕劇宏董某皆名族某又中書左揆士選子逾通顯光著者餘幼銘曰胡天于公卑爾極備學善其師仕席其世言塞其責職舉其事卒遐其年生崇其位體良其敵述令其似伊誰無伉或一先棄十日偕老亦誠可異伊誰非傳聯翩伯季握符持節或守或使方古世德曰少無愧有不信焉珉石之視河東檢察李公墓志銘前集賢侍讀學士今臨江路總管李倜自為其祖河東宣撫檢察公事狀又譜其祖孫七世之系曰公曾祖顔祖彥升叔祖夏考溫叔考濟沂公及兩夫人張富察氏弟彬昌欎子昱煒燦姪炯炳耀輝女歸顔鈐梁某孫佐仔與倜也女孫歸郝天挺吳某梁某二在室曾孫墉杲埍墀均圯女曾孫五人合是七世凡四十四人求燧銘公神道燧思古人揭之石者上惟其統下惟其緒率不旁及宗從倜乃詳然豈傷喪亂以還其存今者巳此將俾來者有究所自耶亦親親篤厚之道也故不略而手筆之謹按公諱懋時字逸民太祖􅗴金之十年略地太原太原城守不即下屬縣榆次其令不敢仍居平土徙其民依險逃兵縣東北四十里韓村寨公為民與母夫人及其季皆在逃中聞拔太原令恐策無所出即説公曰金主棄河北與河東播汴者五年天方北顧如是馬足所及無不靡滅太原河東巨鎮猶不能支吾儕偃蹇此方因謂之固一日移兵勢如崩山之壓卵必無幸矣觀公美而長身膽膂拔類鄉里歸心有長者稱袒而一呼樹旗出降民無有不聽命者願公急赴是功雖吾亦恣公使之不敢越公令也公曰令自為之何至授人令曰吾力綿才薄圖生斯人狙黠之徒或忿曰金臣敢然以義罪余事未集而以蹈禍彼得以為名無益也吾所以急子者子而為是必不禍余當是人自為謀之時一為狙黠所先忌汝才而並除之如汝母氏二季何公感其言曰如教乃往見太師國王穆呼哩曰榆次小縣衆且萬人無柵自固王如加兵未必朝至而夕下必盡力以與王將吏鬪雖王將吏能保其不輿一死不扶一傷乎此勢之必至者比其拔也逞志而鬬殲之得倍百里莽曠無人之土王安利哉今不汗一馬得倍百里有萬其衆之名以下執事王何以待之王曰吾受降多矣無有如之人之壯者間其舉止而辨于為言吾得士矣且曰吾受詔太宗視事所便宜而行之即以公與太原帥攸興同議軍事後假其弟阿禪為王分兵徇地平陽輟公守太原俾從假王以行假王事動咨之下平陽戢剽殺而易置其吏課民墾田事舉令修治有續矣而真定同知總管武仙將兵襲下太原殺興傍縣皆附假王從公馳救皆復之坑其旅拒王師及為仙用者獨交城為吾守或讒覃帥雖閉壁實未嘗一出決戰意視勝負誰在以為歸也假王欲攻之公遣人語帥翼曰當悉力與賊角不然屠矣帥如所言出戰敗賊北山下假王乘高觀之公曰帥無他也遂全之將吏見北山石壁萬桂玉山三寺逃民男女紛綸白假王欲掠之公曰此戰士之家倉卒不及入城者且其夫為吾擊賊何罪而掠其家其緇服皆僧尼得是安施敢復言掠者論以軍律寺得不殘平生脫人于死者此類至今三寺像事之後甚為中書耶律公所才聞之太宗授以太原路宣課所大使公固辭孝養其親時年五十徜徉家居中書不能屈乃官其二季彬行省郎中昌鬱平陽路宣課所副使以便公事而二季益恪與其妻視公及兩夫人不啻子婦于父母舅姑兩夫人敬公如賓相安如晜弟其化行一家者又如此年六十一卒實某年二月六日葬太原城西井谷村東原昱用事能臣也事載他碑故商大參左山公嘗題其墓子孫官者燦太原路敖拉鎮撫佐麓川路教授仔東莞監司管勾倜通貴矣俶同知富州壻其家官者太原課稅所副使賈某敖拉千戶梁某千戶王某郝天挺四川行省參知政事張藻主秀容簿銘曰公生襮外美而頎大雖人所奇猶力未賴一朝榆次林林凋兵令身過之祈主下盟公歸師王萬衆是率吐策以撼言不撓直王曰之人天以贊豫俾守太原真師與俱移戡平陽王假弟節俾往為佐資用不乏太原俄反假王旋旗師不越旬翦以復之交城巳汙教與賊戰不待言雪讒誣隨辨維是河東既輯既平而還收身菟裘是營中書除書拒戶不視出焉何鋭去果亦至丈夫見世及物之功觀今所就為薄為豐六十一年不曰壽考有子有才銜未施報再世之澤濬發為川蕃爾後昆世文以賢異時何人補遺竹帛惟無他求正視是石唐州知州楊公墓志銘自盜殺阿哈瑪特後僧格使總制院結知世祖氣熖烜烜爍人幸進者入賄其家或藉其一言以為事從中下必中書官之者月無虛旬每為中奉大夫參知政事居寬所裁甚不得已如請乃簿所躐級于政者俟有問他日則引以為稽其人不利也一旦為尚書左丞相誣而殺之惟其子集賢直學士奉直大夫朂不孥自餘妻及子景奴婢凡資業皆籍入縣官僧格敗誅故奉直大夫知唐州君居簡始敢上疏列明其兄自部曹史王事省掾都左右司檢王中舍郎中知府憲副侍郎宣同典外郡尚書吏曹參議中書御史中丞參行省中省政與國宣勞為時才臣章章在人口耳今賊國臣不逭誅夷宜為死者雪其非辜庶彰聖代日月高懸之明參知政事梁德圭以聞敕有司償所籍入而朂尋卒無子又哀景雖二子一女而疾廢于莘而女年及笄自燕攜大參商公左山孫企伊入壻其家自莘而唐才一閲月而景卒意者景訃未至與至而未之知到官四十日當元貞乙未十月三十日而君亦卒年止五十七嗚呼何天之不福中奉之家耶身戮一室瓦裂二子繼死一不後一有而弱君訟還所籍又為求壻令恤廢姪之家處事變之極狃薄俗之囿少不失天理民彝之正為弟為從父從祖曰悌與慈雖古人復作有一尚之乎而天之報施者反如是也蓋君自筮仕試吏從萬夫長嚴忠濟從己末渡江後使交鈔庫曹州改南京轉運司知事以善其職從其司請升經歷俄授從仕郎大名路總管府經歷尹范縣同提舉信州宣課遷承務郎浙西宣慰司經歷換承直郎上都留守司經歷遭事難為身出任之官長有不相能必委曲調順如媒氏之合二姓始異而終同之凡此皆佐人出理者而非其所自為也惟范縣為近民又壓于郡守有不伸及今為唐若可以有為而遽巳此哀哉君字子敬姓楊氏漢宏農大尉震苗胄五世祖綯為宋儀曹易州死于金兵生邦基祕書監為金名士書畫兩絶人曰可與李公麟者埓以通奉大夫永定軍節度使致仕生郊社署令皓自儀曹而下皆家燕皓生監歸德酒庭直避金亂莘居生澧君之考也君交人誠和視親識如故知傾資歡樂之夫人梁氏二子二女翰林國史院檢閲官升一未名女長適同縣士族王文讓季在室皇上即位之年冬十一月詔修世祖三十五年實録院直檢閲官其究核故事職也而其末九年燧與侍讀高凝共總裁之升也實當筆至元二十七年之一年顧與修撰而下年分其事已可見其文賢無忝面命矣由同官相歡故介其考唐州君先摯會從史院諸賢還進史上都及與之别未數月訃至期升會葬莘絰杖言曰升惡逆不得見先人屬纊巳抱終天之恨不得公銘亦不可復食息人世矣敢泣血請乃銘之曰觀人之槩惟其在大大使可書其細巳蓋嗚呼唐州其大何如流風不移天理篤居惟天于人若薄而厚雖所薄今將昌爾後人之識狹其中安知昌厚之求視銘異時薊州甲局提舉劉府君墓志銘京山安陸屬縣也其永承事郎兼勸農事劉德源以邑士安某為先來言曰先生世名篤古善文者聞今賢公卿之胄或不遠數千里及門求表著其先烈者相踵也德源之治去先生之居四舍耳心竊覬之我先人之位固不大昭于時如得先生銘則沒而名庶延也因敘曰吾劉氏居龍興黑土坂者不知始何祖其諱與次又不可考質先人始以函工賜田通州後以鍛製精堅他工遷彰德縣院長尋官進義副尉徙平陽雜造局副使再官進義校尉為使又官敦武校尉薊州局使猶領于提舉司以勞深而資久也制以前官超為提舉俄病廢兄德淵嗣為降同提舉德源同知許州實侍而南以至元三十一年九月一日卒官舍年六十八顧言必葬通之樂村以其年十二月二十五日竁焉又曰嗚呼位有貴賤故功有顯微我先人始以函工一朝而賜服五品其功則止善于其職何顯之能為人子惟其考嘗愆于時者始不敢求以昭明否者其欲遠其聞者亦豈異賢公卿胄之心也惟哀而允之燧曰凡今為制天下歲程惟甲不領于工曹徑入太府縣官親考其苦良而黜陟之衛士必賜而藏之家弊則持故賜求易使卑之新他臣有私藏者罪死况私為者乃先人雖班雜職而縣官視以為要焉自常工而跂之亦曰遇矣君諱智晜弟四人其次居二娶楊氏前卒一年同穴樂村二男則同提舉與京山也女適太常寺管勾李某銘曰五兵皆賊人戰而恃以不殤惟函為扞焉爾如君二十始傳以及疾廢為之二十年始日千被被全一人亦千人矣其功亦豈微孟子曰函人惟恐傷人由術推心君亦仁哉此其藏廣州懷集令劉君墓志銘大德戊戌燧遊長沙太原寓士劉致手所為文若將取正焉者走何以荷之讀之盡卷賞其為辭淸拔宏艷為之不巳可進乎古人之域既又自狀其先人懷集令之出處丐銘幽墟感其心將昭明所生為敘之曰君諱彥文字子章年二十八筮仕當中統三年而知堂印乃出管勾北京行省承發省廢而歸授徒其家將十五年謂為無意于世之事會者耶當秦邸肇開與故丞相阿爾公之行省長沙也無不往于之會同知堂印者許楫為憲長沙言之丞相丞相自省郎中故熟君若晚君來便宜版為郴之録事羣盜竊發無時芟夷未靖也君不忍夷其俗而苟簡于治為之四年又三年始官進義校尉廣之懷集令羣盜恣張虔人民燔城郭以冒天誅者死無所忌官軍少不足為恃授鄉民兵雜而殲之格鬬屢衄徙民保東山前募民闢田入租私廪者為米八百石一盡于餉增戍之兵與遭寇之家崎嶇艱梗炎瘴者四年以至元二十六年四月三十日而竟卒是何宦之不達耶今卑官無要知堂印者去丞相尋丈儼立案前護守終日不食須去晨而出暮而歸日必再至丞相家丞相出畋入奏無不與偕裕廟為燕王日當朝廣寒殿君立庭下問盝中何有君則曰堂印也索而發封玩之其親接如何其榮如何遇也如何皆他人取將相之資也一旦管勾北京行省去丞相千里録事於郴西南北京又數千里終乃令懷集于南海之濱其不寖近而逾遠者世恐無君匹也豈讀書一過千百言不忘力兼人射命中皆文武器略足以表見一時者有是賢人巳不凌人人則忮之耶且求以剸物置干將鉛刀其前蒙稚猶知後鈍而用銛及論取士則以方者為徒足持已而圜者始周乎物故率棄明炳徑特者為不易馴使而顧録含荏弱而不自持者為善適俗而賢之君豈坐是也耶其邵子所謂陽在陰中陽逆行時之為也故平生之道刑家則多其功于政者僅此譬水在山束于溪壑崖谷之險不得奔放平衍為澮為川其溉潤不博者亦勢然哉君石州寧鄉人權殯長沙佛宇文有玉亭小稿祖開參元帥府軍謀考汝欽妣馮氏郡君李氏三子致某某二女歸李氏薛氏銘曰士久其窮觀守之篤吏極其遠試治之朂且中其年而卑其祿皆彼蒼者陰厚其蓄抑不信之以昌爾續臣謝墉恭校
