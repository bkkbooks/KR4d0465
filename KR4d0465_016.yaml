body:
  text: 元姚燧撰神道碑平章政事史公神道碑史氏自癸酉我太祖蹙金南播之歲尚書都元帥父子相繼轉鬬河北十年元帥死武仙亂故開府儀同三司平章軍國重事中書左丞相贈太尉諡忠武公收其兄兵轉鬬河北又十年拔相衛薄金北門金主奮鋭自將踰河衛實受其鋒太尉再戰再敗其兩帥之衆十有八萬金主度不能國走死蔡太宗大其勳以為萬戶俾將真定河間東平濟南大名五路之兵憲宗以戰迹著衛封以衛之汲胙城新鄉獲嘉蘇門五縣由是故榮祿大夫平章政事公以太尉元子得節度衛憲宗征蜀詔太尉以公從會其陟遐太尉還一王召公偕北絶漠留謙州依其儲氏姑居五年而歸先是李璮反誅太尉請裁強諸侯權自今兵民之家父死而子始繼兄終而弟可及其子弟同時並官者無以職掌小大皆罷之請由臣家以始併辭衛封制曰可太尉一門一日解虎符金銀符者十七人而太尉故所將兵自先朝巳解授兄子江漢大都督權戍鄧及是亦解􅊢他將公無以為者數年會故中書左丞劉武敏公拯請伐襄陽張平宋本大集天下兵于漢之南而太尉亦謝政公請立勞軍中朝議猶避鄧之舊軍俾與張蔡公子宏範易將始授懷遠大將軍亳州萬戶虎符太尉飭之曰戰無後人與築夾寨始猶回遠包山絡野綿亘百里三進薄城應中援外息耗一絶其將張貴突圍出公斬之盡有其舟仗攻樊城先登拔之襄陽隨下賜白金衣裘鞍馬弓矢從大軍南征越郢下復夏貴鎖戰艦絶漢為陳我舟不可越公戲下馬于戶嘗隸都督萬衆從上巳未渡江請為導柂舟出沙武口入湖達江故丞相阿珠公將二十五萬戶為前五萬戶擇一人帥公其一帥先諸軍濟江後繼未集與宋將今中書右丞程鵬飛遇殺傷相當公被三創鵬飛七創肩輿走鄂鄂隨下丞相請以輕進撓法罪公詔録其勞賜白金五百兩大軍既東從故丞相阿爾哈雅時以平章分兵圍潭州攻鐵壩百日炮激柵木傷肩流矢貫掌先登拔之以軍民安撫留戍招摩逋殘既集既安入覲加定遠大將軍以太尉玉帶賜物也人無敢復請上之制曰太尉所服汝服何嫌即賜之自是公班諸將獨一品服從攻靜江衆皆轒輼自蔽鑿城將穿公分地獨居炮礧所集轒輼不可嚮伺有怠隙樹鉤援攀堞議附而登拔之平章北還以公元勳貴胄威名非他將可輩留治靜江初城既兵當剽殺之餘官舍民屋盡于焚毁公賦戲下其視吾為師隙為居第市為列肆必完無苟學校祠廟大其故制猶不能實畫地募民又賦鄉縣之豪析族城居而所居第宏最靜江曰示吾久此不為去計亦制越一奇也民始勞之斷手則屋取傭鬻直巳相什百旋為通都民男女為人所奴從主北者或思鄉亡歸拘之有司可籍究者三千人省議欲一切徙來公曰至鄂必分為勢家有託以徙必道亡不達且生他變既止不徙以男女齒相偶皆籍民之乃無敢覬取者行徇定昭賀梧潯藤容象貴鬱林柳融賓雍橫廉欽高化廣西之州十八肇慶德慶封廣東之州三皆除三年田租發倉稻以丐貧民遣鄭何朱國寶劉五剛趙圭趙修已五萬戶戍賀昭梧融雍馬天麟宋景劉君進花禮完顔世英李宗張武鄒瑛閻國順托歡十千戶戍潯賓容象柳廉欽高化又以十千戶不兼職民則任分而令不專皆便宜假以軍民總管事聞制皆為真當靜江受兵溪洞諸夷既降雲南公曰雍容視左右兩江猶身之有手足今歸雲南度吾不能制必輕為寇入則吾禦歸則吾猶是吾不遑一日息兵其界也遣使諭曰爾捨朝發夕至之雍容乃逺託數千里經數夷地不至之雲南何以應緩急或他日爾越界為市諸戍必以入寇加誅爾矣且朝京師路迂皆非計之得者溪洞聞之翻雲南來者五十州後雲南爭之其省平章為書讓公曰吾與先太尉久共政汝不可有吾成功各驛以聞公使先至詔聽公節度升昭勇大將軍廣西宣撫使尋罷宣撫改鎮國上將軍廣南西道宣慰司宋既亡也其將相張世傑陳宜中挾益王是衛王昺浮海趨福州立益王傳􅊾海嶺之州曰余復廣之東西豪傑啖其爵賞爭起為應裂裳為旗荷矛為兵者動萬為羣公戒諸將盜至以時降斬不得使牢根窟能以衆來者官之盜去不敢求迹平民而深為延誅時方乏鹽發庾下令斬首來者以鹽為購諜言夏貴巳復瀕江諸州江路既絶不可復北諸將求還靜江計事實欲合勢公曉之曰君輩亦搖敵懼耶孰貴能復江不能踰嶺審不可北猶與諸君取塗雲南歸矣今無輒棄戍也省議棄肇慶德慶封並兵戍梧公曰委地徹備適示敵怯增兵戍之劇賊蘇仲集潭之潰軍萬人自王鎮龍山俟歲事作官軍毒暑不可入外肆為劫而植稼其內歲事畢聞將加誅則偽出降仍歲為是大為橫象賓貴四州之梗公令四州為堡其界守以土豪日嚴警斥官軍行前縱火廬柵隨以民夫具簷芟禾仲窮來歸猶官以賔之嶺方令走王新立古縣斬李應辰李福潯州由靜江北全永皆城守潭州路絶而永尤急羅飛圍之七月其府判官潘澤民間請濟師公又分步騎赴之大殄其衆永境遂謐後益王死衛王繼立趨廣州壁海中崖山曾淵子以參政開督府雷州公再諭降不可進兵逼之淵子奔碙川獲其兩都統驛送京師遣萬戶劉仲海戍雷世傑將萬衆至仲海出奇擊走後羞墮其詐計悉衆來圍城中絶食士皆煮草為糧公抽兵漕穀欽廉高化諸州再破走之用兵海南詔公親戍雷式遏西突會衛王蹈海死南海平廣東之戶十耗八九而廣西獨完不殘及戶賦酒酢算公以嶺南地險而民寡俗悍而産貧征之適急其為盜省是其説蠲之至今廣西並湖南不困後宏範入覲請復將亳州兵制可還公鄧之舊軍拜參知政事行廣南西道宣慰使入覲拜資德大夫中書右丞行省湖廣用兵日本詔督造戰艦六百仍送揚州用兵安南詔給糧仗廣西師還二十二年約蘇穆爾以中書左丞來而湖廣囂然多事民喪其遂生之心矣以公嘗督海艦費計巨萬大為鉤考毫推縷剔求可中公者無可得乃責償軍民三萬定明年移省江西仍中書右丞又明年拜中書左丞俄復右丞還之湖廣其人巳平章恃有援藉怒詈同列辨詐􅋧刻師心而行聲勢張甚以公結聖知固謙抑不報強禦者獨不忍以言色侵之凡與處四年拜榮祿大夫平章政事會大料民州縣賦紙為籍渠以戶率如干為十五萬定可官有之今州縣别方為籍集吏計局程督日嚴將有首償者而赦令下渠猶曰第可原裒求罪耳錢不可貰公以鴻恩之餘宜無深誅不從公則曰最今籍用當十萬定而悉徵之吏將重賦之民民益殫矣渠曰吾徵其餘責償五萬定其逆慿怒當大紛一言從容十救一二民丐其利者此類元惡伏辜可以得為而公亦薨實至元二十八年秋七月十有五日年止五十八性友愛喜施有積必分之諸父諸姑昆弟羣從空橐不愛焉甥姪男女孤者鞠之時其婚嫁力不足猶稱貸為之閨壼不敢干外事與人交襟懷曠達雖踈且賤不峻陛級不留門廡遊意絲竹尚友東山者老而不衰焉公諱格字晉明聚書萬卷鼎彞圖畫一室號曰裕齋其先大興永淸人曾祖成圭晦德其鄉生行六部尚書諱秉直實生太尉諱天澤妣夫人木年氏夫人劉氏儲氏兩張氏子七人耀榮餘未名女二人在室男女孫皆一人公先未有子子都督子即耀也篤其愛曰是他日可繼者以從戰廣西勞授靜江同知遷廣東宣慰副使換浙西宣慰副使前薨一年朝議不欲宰相兼將許其子弟世公纍請將耀未報會以其喪來明年命下授耀虎符鄧州舊軍萬戶即舉公柩與四夫人喪以其年十一月二十七日葬真定之真定縣太保莊太尉兆次甫封以榮入覲曰是臣所後父先臣格之子生十四年矣宜代臣將制可授榮仍故虎符昭勇大將軍萬戶別授耀虎符拜榮祿大夫平章政事行省福建歸過鄂人故公者感是二子一世平章一世長萬夫符節相煥麾蓋相逐至為隕泣嗚呼可稱良子巳客有李裕者嘗以理問官事公江西數千里畢公之葬又奔走京師營立二子其盡義故吏者如何燧亦故公者隧首之碑其可辭銘曰乾文言曰聖作物覩以類從親雲龍風虎乃今觀之匪古專然天于皇輿將卑其全亦匪一聖能同軌轍聖武我祖􅗴金河北而宋畫守猶江之南留大遺艱待帝之戡孰有有君無其臣者太尉父子佐一函夏父平河北子江之南佩訓其庭無後事慚故橫江流揚楫先濟鼓其孤軍嘗敵全鋭及從移兵潭桂兩州登陴兩先兩後戍留均之為勩而桂尤瘁基屋火餘以完府市走檄所下草有四州胡難而安旋化而仇鱷鯢騰海狐猘陸起威柔四年平始再底捐我庾儲復而田繇方戶廣東十才一凋湖廣再相元惡再友吾潔是求孰涅而黝一日霣首公屈宜伸天不憖遺一疾不振難偶者時難立之事難令之名難終之位時天之為餘非人耶易世之難匪哲曰何矧其惟孝不忝世德太尉既老平章軍國公世平章太尉之光爠復世公祖孫相望榮未成童亦矕龍虎歸偃斧邱奚憾之茹載烈兹碑石獸衛之與滹河流相永無期榮祿大夫福建等處行中書省平章政事大司農史公神道碑公諱耀字奐卿曾祖秉直當歲癸酉太祖加兵于金率焦岱鄉民萬人迎降燕郊官以行六部尚書祖天倪以從蹕劗河北山東功授金紫光祿大夫兵馬都元帥開閫真定武仙為倅尚書策仙其志蓄禍盍蚤為備都帥謂大人奈何教兒猜中而不信人尚書恚奪其二孫故真定總管攝江漢大都督權如北京曰吾不忍其並及難也後仙果戕都帥一家百口舉城臣金都帥季中書右丞相贈太尉忠武公方為質太師國王將覲漠北在燕市贄物聞變而南收都帥潰軍復真定逐仙出保西山仙再盜入再復之遂南踰河太宗以太尉為真定河間東平大名濟南五路萬戶世祖淵龍以憲宗母弟總天下兵起平宋本置屯田經略司于河之南以太尉為使都督為屯田萬戶將兵二萬戍鄧當荆閫衝歲丙辰是地生公幼為太尉所奇愛異他孫後罷世侯移都督牧東平至元六年方圍襄陽太尉以開府奉朝請制始以元子格為萬戶猶避鄧之舊軍將亳州兵時未有子屢求子公太尉許之凡圍襄下鄂無不與偕由是知兵甫及冠行省版長千夫從參政崔公斌逐趙宣機餘寇萬人公居顏行射殺數人賊氣為隳遂潰崔善其能曰將種也解佩刀以贈後阿爾哈雅平章拔靜江獨留戍亳兵或請其由則曰吾去而是土或叛戍將必誅史宣慰以太尉子朝廷終不重罪之宣慰聞之甚戚調其孤軍行徇定昭賀梧潯藤容象貴鬱林柳融賓雍橫廉欽高化廣西之州十八肇慶德慶封廣東之州三公後殿而前茅之功授承直郎同知潭州總管府事趙都軍盜據肇慶假公德慶總管討平之授奉訓大夫潭州路治中改廣東道宣慰副使平賊黎德獲蛋船千艘繼餽唆都南征事治而民安之改浙東宣慰副使從浙省臣破賊柳分司衆七千括蒼又破呂成婁蒙才衆十萬斬其尤猖獗建黃屋署官至平章者楊鎮龍及厲制置皆于東陽玉山摧俞高五百餘人紹興又斬詹老鷂林雄劉甲一潘正皆有衆萬餘自王于溫處間者後元帥張宏範平南海還求將亳軍還鄧舊史氏詔從之朝廷以南紀平諸將功至省臣者仍將其軍制許自擇欲將去相欲相罷將時公父己為右丞宥密請以張溫將鄧軍帝曰太尉一軍豈可代以他人宜問其子格可誰授者右丞遣伻入聞臣子耀可且召公來襲公不至辭以俟弟榮成長則授之明年右丞升平章俄薨顧言以真定諸産貽之公奔赴鄂既至明日制授朝列大夫鄧州舊軍萬戶公號誓柩前必以萬戶歸榮所親謂是虎節上瑞也可傳子孫無窮必且利之言未足信公乃究求貨財為親長覬取者多至萬緡皆奪歸之與田宅奴婢析其五弟而目不有舉平章及四夫人劉儲兩張氏之喪葬真定之真定縣太保莊太尉兆次甫封以榮入覬曰是臣所後父先臣某之子生十四年矣宜代臣將帝曰太尉以官授二兄子汝復欲解職汝弟真太尉苗胄可之方議征闍波大將未得制授公榮祿大夫福建等處行中書省平章政事辭以年少無功受寵太峻請回臣所受他人惟卑官以行或請以國人首相帝曰太尉可同漢人耶其孫非國人何公又請故平章政事某知海道平章高興今河南省丞相者知兵偕行亦可之別錫虎符鞍勒弓矢翭甲既行集兵矣會高平章請濟師帝曰彼國之人裸而懦多兵何為損其軍四之三且不欲太尉諸孫蹈海遂後公乃命今平章鄂國公史弼以行成宗元貞始年賜錦衣二襲拜資德大夫江浙行省右丞臨安自入版圖民居官屋入傭直震邸者四萬餘家火餘雖民自屋其基而傭直不除平章某者利之謂地及丈可鬻楮緡為錢五萬與民可免置官歲徵其逋鋭欲行之公曰是令一下貧民無資以取取率富室得不自居亦傭之民加直其先民等傭居與直富室何若仍歸震邸一定之直歲無所加之寬乎謀既不行乃以東南之民多田而租入少將履畝以征公緩之謂宜俟畢農功而議又禁官市惡鹽鐫損江東金額高麗王遣周侍郎浮海來商有司求比泉廣市舶十取其三公曰王于屬為副車且內附久豈可下同海外不臣之國惟如令三十稅一會人訟平章迎詔裼衣上香引公為徵制遣御史即問公言未見其裼但不帶耳當國者阿其人顧奏公敗事黜之大德之元遷江西左丞俄移湖廣左丞一年復江西左丞以屯田贑州軍兵多死瘴癘與廣東宣慰司加民丁糧于田租外者皆罪之召入為大司農公不攜家乘傳赴之既至核其公帑稽逋為緡數千萬率勢位家假出為商久未歸其子錢者悉徵入之人怨與請不恤也未幾抗章以太夫人楊年八十餘求辭歸養未報以大德九年乙巳二月壬辰薨年五十子今瑞州總管塤時為樞密院斷事官奉柩歸葬真定薑固祖山原都督公兆次嘗讀通鑑書間武事者則其家學故志功名至所有譽性剛狷不撓于人雖國人貴臣有不足吾意者不少下之亦由是恆齟齬而不少變其節始至元十有二年徇地廣之西東終二十有七年中間為宣副平羣盜海濱浙左歷紀有半使黷于貨子女玉帛將牣其家而無田于江之南無宅官所至傭屋以居積債在人亦開國苗嗣貴而能貧者雖五十不稱天亦不可謂之年云嗚呼其天乎哉夫人劉氏公祖姑之孫以賢淑聞姻里塤概其立政淸愼明敏世有史氏佳公子克世其家之目女適王少師子典寶少監師聖自餘男女一人公召至京始生而不及見者銘曰在昔都督于鄧秉鉞鼓其蒸徒與襄掎角策宋之平必基是邦會罷世侯成始未終大兵之南路由襄始未成之終與有者子從所後父後殿前茅下草列城盡廣際交宣副閩浙羣盜孔棘大刑以鋤卒底寧謐而父平章謝長萬夫授公而薨既降命書公曰臣季平章元嗣年今成童宜代臣世帝多其讓俾世平章往征闍波南洋是航而復中巳改命他將成宗繼序三省四相自右浙右左江之西俄左湖廣江西再為靡靈不施奚窳不除且繩上巳弗率于度常久勞外召大司農方艾之年而忽告凶人盡傷心即世之蚤胡卑其才而奪壽考司是者天生子則賢不永其躬而永其傳其兆安從從禰江漢載銘穹碑陵谷高岸便宜副總帥汪公神道碑便宜副都總帥忠讓公諱忠臣字漢輔便宜都總帥隴西義武公之冢嗣便宜都總帥忠烈公德臣中書左丞忠惠公良臣四川行樞密副使淸臣之兄故副都總帥惟益之考中書左丞忠肅公惟正今平章政事惟賢中書右丞惟孝參知政事惟勤宣慰使便宜都總帥惟和同知宣慰權總帥惟純屯田萬戶上萬戶惟簡惟允上千戶惟弼知階西和州惟敬惟恭之伯考今懷遠大將軍便宜都總帥安昌為資永昌王必昌之祖宣慰使元昌副萬戶朝昌便宜都總帥壽昌之伯祖也卒以至元丙寅四月五日受諡于元貞二年丙申推至義武卒年癸卯實五十四年祖孫一門三世五公又許連姻王室自餘將相使牧為質猶十八人此吾元有國而來所無者嗚呼不曰世臣之家謂之何哉公王姓由大父彥忠世汪骨族故汪姓金主以甲午正月死蔡義武時即險移鞏治石門山猶行以興正朔明年乙未始下太宗義為其主後來仍金官官以便宜都總帥俾從皇子奎騰征蜀公留質帝所忠烈質皇子所制後令公從征蜀以管軍總領從破文階州大安軍從攻成都入其郛義武陷伏中急公疾戰殺傷數十人竟衛翼而出壬寅以破土番疊州功賜銀符明年義武卒有子七人皇子擇宜世帥者意在忠烈謂公曰汝宜世吾欲帥汝弟而得無後其心乎公曰土未有言臣欲推授為之與兄有異耶王高其行以公鞏昌元帥知府事丙午以前茅忠南功換金符故事祖宗賓天所授符節悉取還之故公金符亦歸之官憲宗二年壬子償賜之俾權都總帥事明年癸丑世祖以太弟總天下兵既移忠烈一軍戍和州會將軍南詔禡牙臨洮公來趨覲俾督漕嘉陵繼利州公造舟棧塗水陸兼行足缺兵籍而恤乏民力始益昌不以飢告戊午憲宗自將討蜀忠烈集諸將問計樓上曰吾州凋傷之餘玉帛無所于得一旦乘輿至左右近貴之臣需求何以為資公則曰吾曹拔身健兒惟有能將率士衆效死前驅何至為是媚人定死前驅公惟恤吾妻子其責忠烈泫然灌酒地曰兄與諸將薰心誓是德臣何言所孤兄諸將託者有如此酒大駕至利巡所治樓壁橋隍歎曰使吾非戍此敵先之則四川領喉之地可必能歲月平哉遂移師西南攻劒關關之西隘曰苦竹隆慶府治其上西北東三面嶄絶深可千尺猿猱不能緣以上下者也其南一塗一人側足可登不可並行敵盡鋭禦者惟此而帝敕諸軍攻未至某地無張汝幟自伐鼓督之公前登帝望幟張倡為歌呼六軍和之聲動天地隘之兵民飛崖如蝶前是獲敵張都統仗為蜀導反紿帝曰吾能誘此柵令降遣入行則反為敵用且泄吾軍何地強弱何倉豐餒教使勿下帝為書繫筒箭三射入柵令必生致獲之磔以徇賚銀為兩四百五十潼川府治長寧山攻復先登賚銀如苦竹數加以金幣為匹二十七復移軍東即嘉陵為舟行計輿炮竿巨絙以從公奏無所事此此前塗所不乏者不若舟米數千石蓋此去多稻而求粟無有宜虞以廩病者時蓬州壁運山閬州壁大獲順慶壁淸居廣安壁大梁平破竹皆下東南抵合壁釣魚山渠江水會其下石邑入雲其帥王堅據不即下炮矢不可及也梯衝不可接也帝欲乘拉稿勢不棄去而必拔之故久蹕此時暑我師疫矣忠烈卒于軍公泣集將佐議曰吾季卒軍馬革裹尸與國責塞子惟正雖未弱冠宜世衆曰公言是公言是願奉以代為帥其秋帝崩中統之元制以公為副都總帥從所志二貞肅同戍淸居去順慶平土二十里西北東三面環江北江殊回遠不可為池南依山而壁平可馬上無大艱崎其南即合敵出入吾界無時于兵法為交池公又子身受之開屯田練軍實遙候斥詗強鄰入必摧壞其軍不令棄去後詔貞肅還鞏昌公獨保戍三年璽書褒大之又換金符三年秋抄夔府獲其團練使解恭知府張甲及路分二人斬刈千馘獲遺甲仗寶幣不可資計人覲賚以虎符銀章銀幣如長寧之數而加金為兩五十副以鞍勒弓矢褒其從者且以久勞于邊代以忠惠還之鞏昌俾副都總帥由行省受命還得疾秦亭歸至古漳故第而卒年止四十八其年六月從葬古漳先域為性安恬出言質直如其心事隴西郡夫人母包以孝聞友諸季終其身竭力竭才羽翼之人無可問總帥府屬郡一十四事至殷也身自為與從父副弟副猶子三世時得專殺未嘗妄笞殺一吏一人然至臨敵決戰上馬挺槍離陳先次巧捷若神當者紛披莫有我禦其弓矢奇中可方古人憲廟出畋遇虎命射之一發斷其吭帝喜至解所御金鞍為賜夫人故金蘭定西會德順五州帥張雲之女惟益才世副都總帥二年而卒一女適鎮撫帥府張文煥老將之從公者每曰公為人信厚安昌必昌復信厚可曰善世其家者由安昌求銘公碑燧思于公與貞肅所戍之地無不至焉淸居之不可恃為固者前所以言楊氏張氏蒲氏皆行帥府大獲運山大梁平故地與便宜其時目曰四帥府淸居南迫合獨受敵鋒為三帥扞蔽他日專劉帥戍移貞肅南九十里夾嘉陵東西築武勝軍母德章兩城距合為里亦然晝則出邏設伏嘗待進戰夜則畫地分守傳警鼓柝篝火照城達曙以防竊入一話一言敵盡知之況敢抽兵邀利他求為哉惟是軍當其堅重故三帥反得歲以拔敵柵壘掠敵府庫劉其人民逞志于忠涪夔黔萬施雲安之間上功朝廷用事之臣第知三帥立勞之多而是府獨寥寥也終未有能明其然者又貞肅去淸居敵夜大至火民居縛劉帥去鑒夫人之失如此則兩公戌而克完者功不大哉凡此或者貞肅碑所逸故發之此銘曰椒聊遠條求今之世方漢金張才有汪氏隴西開國義武肇之義武之為不怍倫彞忠讓忠烈忠惠貞肅遞芟川涼力脅謀一繼繼其來將相之多不符垂躬必斧手柯歸覲私廟庭笏駢羅公以其序大宗義武于弟以子宜不降俯乃推俊功潛不自張等翊吾家聞命即行安流洋洋如水就防所由不年其盡瘁致子而天閼歸以何戾彼蒼者穹監下而公惟我皇上心靡不同疇德未報未隆何功三紀後公一朝哀崇公有令孫人曰公似雖華其年己踐公位古者大宗合族恃之祭求其膰尊祖之思胥是冢旁可萬家邑表阡有碑車過者式興元行省瓜爾佳公神道碑元貞二年二月資善大夫河南江北等處行中書省右丞臣堅賢言往歲臣待罪于外伏奉明詔旁求勳舊臣僚封拜奏對各上其事以備纂修世祖皇帝實録資用刪取者臣喜伏思陛下先孝四海發揚前休皆使下臣依光日月誠曠代之希遇謹巳次寫臣祖常格臣考隆古岱出處始終為一帙上史館而臣之先汗馬微勞其槩已此何敢上比磐石宗臣勳舊自名惟與劉氏伯林黑馬再世父子來北之初義同一體今焉二臣已各受諡忠順忠惠增賁墟墓臣不援陳恐使聖澤獨漏臣家敢昧死請制曰可萬戶招討使常格贈龍虎衛二將軍封定襄郡公諡貞敏妻鄂屯氏從封定襄郡夫人興元行省隆古岱贈榮祿大夫封沔國公諡忠靖妻耶律氏從封沔國夫人制下山南之民聞者咨嗟泣下曰公卒明年興元屬縣及州若洋城固南鄭吏民伏進德荀德炎張自顯李顯輩若干人疏公平生立秦憲庭願一上聞許廟事之而竟未下豈天以是忠靖為賜額耶嗚呼有待哉公瓜爾佳氏女直人其地古肅愼氏之國訛為女真避遼興宗廟諱真改為直太祖之加兵金也歲壬申五月劉忠順公與定襄公將兵千二百人來降詔以其衆即守威寧十一月金主遣使啖以大官冀其或二可復失地定襄縛使以聞詔嘉之擢為萬戶招討使人有擾爾民殺之傍郡縣未至者諭使急下事有便宜不待立聞一以詔行之凡鎮威寧四年以歲丙子卒沔國公嗣萬戶金符生十四年矣戊子太宗詔從太師國王戰河東山東庚寅睿宗拔鳯翔明年從破宋大散關夾嘉陵漢水如鳳沔褒大安興元洋金東抵均諸城皆拔壬辰大破金兵均之三峯山不能國矣詔徙六州民留田威寧時天下荒飢獨山北為樂士四方之人其來如歸乙未詔從塔海甘布征蜀田事宜遣官屬何人攝治者以其名聞乃表今湖廣僉省高安之祖安塔哈代領明年凡四川府州數十殘其七八明年公上言興元形勢西控巴蜀東扼荆襄山南諸城無要此者自始取道滅金漢中無歲無兵其地與民吾棄不有敵不敢復城郭隳而弗完田野薉而輟耕民窘艱食時吾兵來扶戴白以負嬰黃偷暫生活竄栖太白窮谷之間吾歸則壯者出為盜賊肆相奪攘甚者仇而殺之而生齒益耗誠能留兵戍守招徠未降民見父子不分貨錢之得有也其至恐後為擇良腴便水之田授以耕耒假與種牛俟秋穀收什稅四三儲之于庾守之以吏征蜀之師朝至而夕廩焉校以資糧關中荷擔千里十石不能致一者勞費大省實制蜀一奇也制可詔都元帥量留漢軍其新至之民及田事可無時籍數具效以聞仍賜虎符是月制諭今安撫興元軍民制又以為安撫使一月之間三制併下定宗詔行省興元公至行之如所奏營城塹內治堡壘外增鼓柝烽煙得警日夜十里不絶市肆村舍民廬數萬區悉起于蕩焚之餘墾田數千頃灌以龍江之水收皆畝鍾敖庾盈衍矣官舍居第皆高榱巨棟重楶牡瓦宏壯奇麗可百承平舊宇之上亦志不苟然也其土豪傑如洋之趙再興成固張廣南鄭伏興褒城薛仕成西縣楊濟廉水韓仲炳小黃柳智德潘水薛閨皆割裂自霸昔為吾寇者也至是皆入所據所郡縣宋邊驍毅之將馬仲自閬張文貴自巴李繼之自廣王安斌自開達亦挺身歸公腹心仗之指臂使之或説曰反寇無親宜有以虞未可日置左右公曰彼哉人也未必狙詐或如爾言誠狙詐也吾仁結而義激禮接而信示何有于不可化宋害其來反時放兵動吾四境屢戰殲之辛亥四川制置使余玠輕我師寡身率兵入寇敗我利路元帥王進于金牛壁其軍中梁山兜鍪夜燭城為之赤潛遣裨將燒絶棧道遏我援繼自率大軍圍而攻之鉤炮梯衝環城數匝謂為孤危期日必拔新集之民還叛與敵公誓死拒守督戰益急殺傷過當城中將吏晝或荷甲傳食夜則畫地分守會都元帥圖思來援無從得塗值三人自軍所逃還許貰其死令導由他山利道出陳倉玠聞兵大至焚圍遁去公襲戰悉止還所俘亡故事祖宗賓天所授臣下制書符節悉收還之太宗嘗賜虎符已歸之官及是憲宗授以軍民萬戶再賜虎符詔敘平金戰勞蓋睿宗所聞太宗者今兹玠至汝共事臣皆避逃獨汝戰疾力斬敵十五勞苦至矣自是凡千夫長百夫長十夫長下及僚吏敢有違其節度者罪死丁巳詔與故劉忠惠公黑馬立成都七日而樓堞隍塹皆具戊午同故元帥納喇南征踰馬湖江戰皆捷蓋先是乙卯世祖以太弟總天下兵公奏漢中之田闢巳十七而稅入恆所逋懸其故惟在軍民之官豪有恃者率頑驁負而不輸顧臣力莫如何也下教若曰自今軍民之官田不稅者無廪糧是年下教若曰往者興元軍民俱受敏珠爾與汝節度今敏珠爾征蜀比其還也汝專節度之中統三年改受虎符制仍軍民萬戶四年請以今左丞堅賢嗣致仕家居十一年以至元壬申九月七日終于興元英第正寢春秋七十肇于南鄭味溪之白雲里為兆以其年十一月九日窆之壬舍男十人女十人男孫十一人女孫八人嘗聞太祖賜威寧之詔裂熟羊革而書之揆以漢氏功臣之誓曰使黃河如帶太山如礪國以永存爰及苗裔而巳無有事不上聞聽以其言為詔行者及定襄卒而公嗣克光前人轉鬬太山之左右濁河之南北崎嶇數千里間者十九年非睿宗奏是功太宗太宗不知非憲宗舉而揚之干克完漢中之詔則是奏天下不聞且他人樹勳于開國之際其棺銘私傳皆出一時史氏之手其間有善于紀述者後者猶掇其迹刪為一代之典況祖宗垂法萬世之顯謨乎則公父子身荷二祖三宗及今皇帝生榮死哀六朝之殊遇何如也夫漢氏功臣子孫冒守先列者惟一人侯獨長沙王支庶一門數侯然或先後受封非必昆弟並時今公諸子或拜亞相于中或列藩方于外或總戎旅于邊冠紳之蟬聯符鉞之焜煌則縣官覆護之俾流慶遺裔者又何如也銘曰維公早峙童子植植既失定襄荷其殳斨與老戎行右頡左頏于河之外于關之內突而前茅無少挫退金社墟矣庸蜀是劉掉鞅之遙九圍半周再鎮雄藩益暫梁久金穀穰穰斧質在手施陽翕陰舒慘自口為艱為勤列聖不忘報之貴富倍蓰其當大府如城雲屋邃邃朱塵綺疏歌鐘淸吹聯目脕顏頥使趣風良庖致餼胎豹跖熊酒酏介歡䔲荈雪滯紈衣四序為聲綷縩昧者安之耽不知還公時白曰未薄西山解兵其子時稅于野毳廬氊車勝地即舍維嶓之麓與沔之氷往往禽魚識其杖几乃知喬松可召與遊徜徉十年歸安兹邱評者異之于古未有紛華寂寞枘鑿不受公而兼之始愼終全由哲其身匪隲自天人之蓋棺旋踵朽息公有哀褒于沔開國生平之名煜其益昭矧子維翹丞弼兩朝無
