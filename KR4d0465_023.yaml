body:
  text: 元姚燧撰神道碑真定新軍萬戶張公神道碑公既卒於戍所衡州之明年而夫人亦卒其中子世其真定等路新軍萬戶懷遠大將軍塔喇齊者將歸葬其鄉先塋由是軍受湖廣省節度請告數數終以故事職兵之臣無聽喪葬之文不得命乃曰父子之有在君臣先其序則然未有責其能忠而禁其為孝者吾今何恤俟舟二喪畢葬小從而奪虎節大置於理一惟命竟窆而還凡聞者莫不稱咨其能拔流俗善於子職無少老一喙焉又曰公之遺烈今雖在人口耳不鑱之石久或遺忘來者或不聞託以計事至鄂持興國校官陳松年之狀來請銘燧思昔二荆憲由糾郡常德公時戍是暇則相過年已六十五修幹魁顔白鬚蝟張虎目虎吻大掌巨踵望之森然氣欲搏人談其平生蹈危奮先大小之戰數十嗚呼俾聞風飇鼓鼙闐闐矢石餘軀老而不懲者從可知哉則於公為知死今懷遠以佳公子侍傍又為知生在古人皆當傷與弔者乃三復是狀嘗善松年之能史惟末憾曰濟江將臣功者皆相而獨後公方人固然於及天之厚公者則若未也蓋列聖之制職兵民者死其子孫皆世之變自世祖奪職民者符節易其故所死其子孫廕而不世惟職兵之臣萬夫千夫百夫長者父死子繼世其符節雖漢祖侯功臣之誓曰黃河如帶泰山如礪國以永存爰及苗裔何以尚諸其有相而兼將萬夫者詔俾自擇為之欲將棄相欲相棄將故其時有寧棄相而專將者豈不以相能振耀一時未若既將可傳子孫繹繹無究乎幸公未相相而亦蹈是轍矧他人之家世才一人而懷遠元兄忠顯校尉管軍總把鑄由從公戰鄂之通城獲於敵死之及子回世特升千戶仲兄史閭亦懷遠大將軍戍瑞州等處萬戶獨一門三人金符虎節千里連州相煥以華則天獨厚公者豈不多且遐哉松年憾者恐復為公九原所幸也公諱興祖姓張氏中山無極人曾大父大父不仕父林趙州觀察使改節度判官丞相贈太尉史忠武公長萬夫日隸其戲下太宗賜金符千戶老以公世從大將察罕征淮南能以少兵擊破其軍虎頭關大將壯之賚銀為兩百聞功於廷賜人馬介胄裝具宋開山南東道制閫於襄陽反寇洛西殘盧氏永寧殺縳其守長憲宗詔以漢地兵專受命世祖潛藩始置經略司於汴屯田河南諸州以忠武為使忠武兄之子江漢大都督權為屯田總管萬戶宿重兵於鄧去襄不二百里兵信宿至城下鄧甓其城塞西南二門不闢吾袍甲車道屬縣新野西港盡鈔于敵府摘公將兵三百騎與步半追之及之栲栳潭令騎負一步敵奮殳斧謀折馬足推步下騎為陳以待分騎為左右翼合擊敵錯愕無所於應盡殱之完得所鈔戰次馬嬰橫尸而顚復騰而上不知左股之折巳戰流血滿鞾裹創輿歸府迎賚銀為兩百錦二端曰未足旌勞資市藥也後敵政新野又大破之白河口中統建元從史經略樞援東川假以總管戍東安虎嘯一年還鄧戍光化州漕安陽灘禽唐都統會中書左丞劉武敏公拯開用兵端大集天下兵圍襄陽從城鹿門江西諸壁戍焦山敗宋援將張順江中殺溺過所當攻樊城督造梯衝又戰江中火其戰艦斷襄陽援樊拔移攻襄陽城東南當至元十年凡圍六年襄陽下功升總管再官懷遠大將軍副萬戶明年詔故太傅巴延以左丞相贈開府儀同三司太保井國武宣公阿珠以平章左丞相阿爾哈雅以右丞將大軍南伐浮漢而下郢治漢東築新郢漢西鎖戰艦兩城下夾以炮弩橫鐵絙江中大軍擊拔郢北黃灣壁公實先登矢貫左股丞相手傅藥拖舟入藤湖達漢越郢去從攻沙洋新城拔而殱之皆負創先登矢又中額三捷功聞錫虎符從戰漢陽之沙武口陽邏堡生獲其將鄭信矢汰左臂漢鄂既下太傅將大師東右丞留後抽十六翼兵俾公帥戍漢陽公曰吾戰是求而顧責守誰不能守則無所施吾所為矣右丞則曰漢鄂乘輿所至視為衝地非材武足以先衆者不可使撫安之不得巳往戍聞荆閫遣安撫高世傑將兵規復鄂從右丞逆擊走之荆江口世傑窮降詔移軍江陵從攻沙市因南風縱火樓柵皆然前登戰城上又戰城中蹀血濡趺殱其軍江陵精鋭於是焉盡安撫高達以江陵降制置朱祀孫不出詔以世傑戰而後降非其始志斬江陵市祀孫死京師猶沒入妻子為官奴婢而籍其財右丞功拜平章政事移軍潭州公為鄂分省計事潭留使督攻西北凡三月破石心臺敵植木柵自蔽或曰火之可入公曰火易沃滅柵必復植且吾師暴處城下三月士咸仗兵立寐不如炮之使敵不能隊立得廣途期盡十日肉薄而登可以逞志平章是所策十日公果前登樹旗陴牆諸軍呼聲動天地平章抃賀謂諸將曰非用張某言而屬猶坐城下安撫李芾殺妻子火廨舍倉庫而死潰軍集城西陳江岸公涉淺方仰擊飛石出城傷煩墜水面血及足出戰益疾竟走其軍功聞進官安遠大將軍略地衡永全桂陽諸州撫其來歸而誅其弗率又從平章移軍靜江四十日拔之宋餘孽益王爵人號年海中曰余復海嶺諸州相煽以叛潭之羣盜在在蜂起平章謂公衡永全桂陽諸州與潭屬縣汝昔略定盜今復蔓汝其芟之殱文才諭七寨斬祁陽令羅飛主常寧簿黃必達磔周隆張虎新化降其黨蕭隆劉監軍凡馘受僞命二千九百七人縳賊百五十人安集劫脅二萬三千九百家常德路總管謀應僞先事亦縳斬功聞進昭勇大將軍招討使監歸州位總管上又移監常德仍招討位總管上西南夷為梗初詔征羅氏鬼國會其既降未至而還後征伊奇穆錫降之以其王阿里入覲賜衣服弓矢鞍勒公平生殺虎數十一日遇虎一發而踣語其友曰生虎之髭剔齒疾可以巳風拔之虎怒爪鞾裂賴其氣息垂盡不能傷足由是人名公者則加殺虎於姓上至是以國言賜名巴圖尋韶萬戶各解使職故公罷招討惟以萬戶將真定新軍省􅊾戍衡茶陵耒陽常寧兼督平永寶慶武岡盜馘其跳梁者二百四十五而伍其汙民責使屯田故來者不失業公尚氣重諾剛不可以威強屈平章始終相從西南者見其不可衆直之醉或腰刀行酒平章避人後閣曰公醉矣戒左右善扶出遇契巳者視意所欲與之不少愛焉其時諸將或集皆下之無有位其上者卒以元貞元年乙未冬十有二月七日年七十五夫人卒以明年夏四月十有七日年七十七葬以大德之元丁酉於其鄉宋村九男長忠顯次戍瑞州萬戶次鵬翼僉嶺北湖南道提刑按察司事次真定萬戶皆夫人李出餘皆幼一女適常某五男孫長武略將軍世千戶者金符餘幼六孫女亦幼銘曰詩歌虎臣闞如虓虎不聞拔鬚視等麀麈以之膽膂秉旄遐荒宣一西南百年未疆荆州之域連城數十襄陽武昌嶽及江陵長沙桂林取皆以兵餘郡傳檄反虜起伏介胄九年晝夜弗釋登危摧完戰必前列荊域底寧移兵夷洞來其降王槃瓠遺種矢石瘢躬元戎奏功大帝一聞一官以庸逮其入覲嘉名天訓乃省在笥華其衣裳又敕尚方叢矢象房魚服韔弓雕鞍金勒歸馬躚躚亦爛其飾雖古方伯得專征伐錫命之多將不是越憲憲其勞授報既多蓋棺龍光遺嗣尚荷二長萬夫一千夫長今代一門三將誰兩矧是萬夫一戌燉煌一殘闍波鯨海是航雖基公陛亦遐以勩無羞前人亦曰克世兩間之堅莫石惟年可磨不磷載銘以傳故從仕郎真州路總管府經歷吕君神道碑銘並序大德十有一年冬皇上淵龍遣正字呂洙以宮賓起燧於郢相與舟行浮漢而江明年至大之元始識從仕君於儀真傾蓋如素留止旬日禮甚恭情甚浹也又明年從仕卒洙自京師奔赴還持集賢待制趙忭之狀以銘墓為託嗚呼禮曰知生而不知死弔而不傷知死而不知生傷而不弔在余為知父於死知子於生可容讓為君諱郁字伯文姓呂氏相之安陽輔巖人葬地與宋相魏國韓公冢相邇世傳為蒙正文穆諸孫以遭宋靖康金貞祐河朔干戈弗靖者皆二十年生齒耗亡十七何譜牒之能存不可推采其次惟地江南今居襄陽者其系最完蓋文穆而上溫鎮頊韜夢奇龜圖六世下文穆者皆二名簡乃同伴希同夫問同之中同大與祖七世合之為十三世祖下一傳紊且微矣東萊諸孫必續系焉今固不得見文穆葬洛陽文靖公夷簡葬鄭蒙休居壽州大寧大防在藍田豈居相者亦以仕家焉至今鄉人以韓以二姓為是邦之望皆優裕以治時肇置江南諸道提刑鄂屯實魯為淮西憲副按行所部凡他路幕僚之不職者多被汰黜獨以儀真兵事既集學校修舉寇攘屏迹鄉師里胥推擇有倫特加賞異白之行巡省惟得斯人力為薦汲將加峻擢後以僧格領尚書丞相勢焰薰天懼抑其志貽悔後來歸養寡親築堂東湖之干名以致樂寧與細民逐利什一為甘脆資有純孝譽或勸復仕則搖首不對賓至則刲羊酤酒相與為樂以不足日為事計歲有饒惠及窮匱丙午江淮大饑乃捐中統楮泉為千者踰十萬州閭賴以不殍死者為口不可殫紀惟不置田於郊曰吾寓公也有是則使子孫嫪以為首忘歸吾鄉遣洙從張導江達善學蓋文公之壻黃勉齊饒雙峯師事焉導江則受學雙峯觀其必求文公正脉名子以洙沂汶皆取魯國諸川明所願則學孔子未為洹示不忘父母之邦皆可見其為心不苟操履之純也卒以八月二十日年六十七歸葬其鄉大考珍在金同知渾源州考忠登貞祐進士第監稅於衛金亡反其鄉晦德以卒妣夫人李亦儒家讀書知文於老佛學亦造其微監稅卒篤君於學太夫人力焉妻韓氏亦魏國裔孫克勤治內有惠及小星之譽前公一年卒洙克佩父師之訓夫豈無自而然哉故為詳此使有傍韓呂合族焉君賦資强敏而嗜學志為世用經史餘力周覽洽記刑書算數尤所精邃筮仕山東道提刑令史詰姦明允雖文無害宋平轉兩淮鹽漕令史是時江淮新國創為規制抽戶為工散幣為本商賈雲集舟楫溯江遠及長沙法簡政平取不剝下羡不罔上賦入其時上計於朝授從仕郎兩淮都漕經歷方數千里之事藂歸是幕力所得為若善御之得輕車熟路便施弊袪功倍曩昔會東征倭行省責治軍旅伐材造舟鍛刃餽粟與夫役民為篙師火長百需之來其急雷電以君才優治賦必善撥劇乃轉為真州路總管府經歷真州去征東行省最邇未下他州而先及者公以淵龍舊臣或踰分干時其乘雲雷以依日月不難也惟揆道循序表表中行亦時才之可虞者男孫一人女孫有歸與在室者如干人銘曰丞相之貴禮絶百寮平章拜之猶體不搖惟於命官不敢堂帖必謹貝階准敕以牒蓋尊名爵亦使其人知為王臣自重其身品雖從事居下之上所職則要淮漕幕長煮海為鹽立制禁姦通商惠民鹺利邱山控地之要亘數千里令速責成效於屈指隨以征倭改幕儀真蕞爾一州行省日親軍興百需自近而賦其集有方益爾暇豫餘力及州役均校修逋歸犴淸田無萊疇為部使者收其德美上功於臺將置風紀時秉國鈞虐焰爍天故棄休居明哲身全事親致樂讀書教子贏資州閭荒歲救死在官與去為惠則那矧子而才家聲克荷太行之東輔巖之里碣以表阡華爾桑梓皇元故懷遠大將軍同知廣東道宣慰司事王公神道碑銘並序三十一年將仕郎同知新州事王弼練服持一書過燧龍興客舍拜言曰此弼先人懷遠大將軍同知廣東道宣慰司事出處大凡與受代所由也中具歲上戰功自生二十五年世吾祖長千夫戍膠州以及至元三十年年五十六六月四日卒廣州凡在官三十二年膠州內地無事戰禦自四年用兵襄陽十三年宋亡與宋臣戰未嘗日釋介胄宋亡至十六年與兩王戰未嘗月釋介胄南海平矣與反虜劇賊戰未嘗歲釋介胄合是三者之戰凡二十七年中十八年三入廣嗚呼勞矣而官巳是年巳是命也今將以某歲月日還葬吾鄉霸之大城孟村先塋得善史者銘其碑我先人將不恨其無聞於地上且懷德地下也敢以哀嗚公大參龍州李公亦曰是公以鎮撫事先武愍公於帥府先公至地亦至焉者其事良然乃序之曰王氏其籍大城者不可世求曾若祖皆失其諱祖令大城考英故參政張公榮實所將水軍百夫長世祖録其從濟江功賜銀符升長千夫李璮反戰死濟南二子守信守祿公以死事臣子之長故世銀符長千夫戌膠州從築夾寨襄陽戰疾力功換金符登最樊之外郛省旌楮緡百戰江中斷橫江鐵絙菑楗獲船三十艘拔樊生致都統徐麟省又旌楮緡百從今太傅南伐戰最郢之柳林署省鎮撫攻新城沙洋獲船二艘戰夏貴鄂之陽邏獲船二艘首功三百錫白金二百兩再以都鎮撫從都元帥府定江西諸州授宣武將軍管軍總管於時宋亡其將相更立益衛兩王故廣東不下從破韶州又敗方安撫廣之石門授明威將軍從擊文天祥於贑之興國之空坑止其妻子散降其衆略盡禽前鋒趙時賞帥府改行省從右相至廣張經略集戰艦二千海珠寺擊大破之獲其艦百八十斬首不可級計再授明威將軍衛王死入覲授宣武將軍虎符還戍廣取葛洞崖石寨殱李梓發兵南安別降林桂芳昆弟新會蹙南海軍三千人生致其帥潘舍人歐將軍僞署置官自王淸遠遣馬帥陸帥徐相襲廣州皆擊破之斬是三人及其軍千平十數壁歐走如新會合黎德德巳集船至七千艘衆號二十萬其别將吳林以八百艘圍馮村先是公嘗抽工於軍伐材於山不資公帑為戰艦三百五十烏船五十載是戰艦德林衆大潰沈死海洋生致黎德歐王與僞都督丞相兵馬鈐轄二十四人皆磔之椎其僞符璽召入賜衣服弓矢鞍勒加懷遠大將軍同知廣東宣慰司事三敗東莞盜張強三千餘人首功三百歸所掠人畜其主廣盜少戢其使入覲恐公受代以歸預乞尚書宜留再授懷遠大將軍同知廣東道宣慰司事降循盜古尾郎長樂自宋亡十四年招不能至者版賴勝立興寧廢縣以宅流民又斬汀盜轉入梅循者鍾明亮官并吳禽三首而壞其羣最斬盜為起草九二百七十一人今著其尤魁驍者皆鄰省連兵頻年不能加誅公必取之廣之屬州皆山險不可馬至梯崖縋谷逐索水則乘烏船遊擊之不盡不巳其為什為伍殺人以剽財之倫皆削棄凡是諸盜名若可易而顧難成功至今有未靖者老將論者曰丈夫死登陴陷陳猶足為名澤及吾妻子今橫尸草竊手與經溝瀆不異亦足嗟哉此觀望不屑蔓盜所以也反究公心忠勞如阿廣之屬州若士與民及聞今代爭狀於宣慰廉訪兩司功其盜弭民安願留公使以殿南荒行省擬聞代踰一時而卒惜也夫人石氏子三人弼也知彰其親者非文不遠亦既克子矣餘未名男女孫皆一人幼甥有戴德仁者舟從至南康燧書以還可尚矣銘曰生北海濱卒堧魚溟萬里歸棺低昂絳旌維之南溟其險不測其北嶺嶠羣盜攸宅嶺嶠何如峻削劘空羣盜利之自王自公凡在勝國敢曰難令與今吾元跳踉豪徑公有砧斧腰領汝膏十八年中無有幸逃或曰公哉始勞襄漢終覆武庚椒洋無畔不是之書逐盜諄諄大棄録微奚示後人曰訖炎趙猶遺兩孽噓爾死灰乍然巳息公與樹功帥從相從貪人所同公羞有躬維祝融墟實漢南越大兵艱施小兵弗讋酇無賊良公功之私廣人戶知今思永悲白潛昭幽丞太史職載銘不亡有穹斯石有元故少中大夫淮安路總管兼府尹兼管內勸農事高公神道碑至大之元高氏子璉手其家乘中載教孔孟三族楊潛齊庸孫洧陽希獻太子諭德蕭勤齊㪺為其考少中公之序之行狀埋銘丐太史公牛馬走表其墳道所未識者獨孫洧陽若潛齊勤齊皆走所友其文自足昭今而信後而走綴言其末無乃顧為先德纍歟以故久未操觚後思共公都漕河南我先世父少師文獻公行省於汴公來受約束於下執事走嘗還贄焉再都漕關中走時秦邸文學相接之數數又非昔一還者矧聞璉也常師事同門人劉憲副存齊季偉曰善篤學力行者可虛其請耶遂序之公世平山人諱良弼字輔之祖俊民妣吳君二子進林進金鎮國大將軍守滑倅太宗大封同姓國母弟睿宗真定享國不延莊聖太后主是分邑置規運庫林為之使其歲上供子息蕃多而家亦殷昌妣門君三子公為之冢就傅讀書端重異羣兒會真定火延燒千家言之庫使君是灾幸不及吾家吾力粗可盍發財以賑君聞擊節曰及物之心是於髫稚他日大吾門者將由是而行如其言既冠宿衛世祖潛藩後正天位盡付全趙財賦聽其綱紀而歲登贏時天下困於鉤稽公以全趙獨遺入請亦置計局帝曰世所困者汝獨求之可灼其無有欺冒其間至元改元之明年官奉議大夫同知南京都漕錫之金符六年改使河南拘榷稅課所其年仍河南升都運使他道為使惟知徼寵專利賊下罔上以自私盈路怨咨莫之省恤獨公軫歲旱荒發庾下估市粟以濟其饑大為醮祠以禳蝗孽斯皆職民者宜為而治賦臣顧先之俄然天若悔禍雨澍蝗死人則詩而歌之冀采風謠者取上聞也又以用兵襄陽賦河北諸路之民轉漕人畜勞斃而粟至者亦絶續不時公請增直以糴則人趨利自至以賦民漕功將倍蓰省行其策由是軍中囷廪充溢或露積不垣滿秩官朝請知鳳翔府事治民安思永利之乃倡民導汧水起遙望盡閣底五十里再冬而成溉田三千畝水輪十七民之圃蔬園藥者又井井乎其濱岐人惠之姓為高渠僉憲劉仲修按行其地賦詩勒石紀功安西王開國之三年詔許凡官關中者職與不職聽其承制遷黜由是升中順同知陜西都漕其使郭琮恃其獲上且阿中盜殺臣雲巴勒肆為非法公與連署凡賊國病民賈禍者縮手避之琮敗獨無所汙朝廷恐其屬偶逃連坐遣使深􅋧者數輩鉤稽簿書於公無絲髮得遂家居教子樂賓或縱遊山水勝地以自適二十有四年制下其家起以少中大夫總管淮安是郡前以征倭責治海艦歲市材萬富商恆大其直通有司分入其利積材巳十三萬下車吏又發郡帑四十萬緡如歲例續市請署公曰巳市者足支一紀復市何為下吏於理飛書上列以為徒爾耗蠹縣官富商恐壞其姦夜持五萬緡以禱公曰若欲如他人貨取吾耶吾不能同汝為盜叱去無幾時行省報竟下如數收市公歎曰吾言不效於是商尸位何為一鬱發疾以卒實歲丁亥二月二十有一日也年六十有六公軀幹魁頎風度凝遠望之已知其不為人下者矧其秉德易直剛而不競柔而不撓友善日親惡不急去真善應世務者元配夫人邢君前公卒繼配夫人董君後公十年卒姻里皆師其婦道母儀五子琬璠圭璉瑾琬由任子尹宜陽後公三年卒璠中殤圭以海船總管戰沒交趾三女歸成都三務提領閻郁湖廣行省郎中郭孝華州判官魏餘慶孫男一思誠女三歸王秉餘幼曾孫男三女二皆益幼公初葬真定後十九年子璉以公生樂家秦沒而魂游遠也徙之長安縣華林鄉袝兩夫人而琬璠皆從窆新兆公弟良輔良佐輔三子璋㺾瑄居汴佐二子瓘玠居其鄉銘曰姜齊之苗食采於高地以姓之其來也遙其系其傳文字無紀今其可推才祖焉爾全趙金湯千里其疆誰之國之繄我睿皇考居其間斗食自晦入出金粟克當其會再傳而公世皇飛龍闕臣程嘉謨恭校
