body:
  text: 元姚燧撰神道碑參知政事賈公神道碑賈氏之顯在金叔世由大考銀青榮祿大夫上柱國尚書右丞河東郡襄獻公諱守謙相宣廟故曾大父衍金紫光祿大夫曾妣石其夫人焦皆從封河東郡夫人考頤武節將軍兵部主事蔡州觀察推官生公鄭州年十五汴亂巳失兵部奉妣夫人孫踰河依舅氏居天平甫及冠入官行臺于時法制寛簡凡受事者惟以賄先或餽黃金爲兩半百峻絶不取太宗聞之稱其淸愼特敕有司月給白金爲兩百世祖淵龍驛致諸邸與語合意俾董城上都竟工丁妣夫人憂去及踐天位首以爲中書左右司郞中不名惟官命之坐政事堂位宰相下他爲郞者莫之與班由善國言小大庶政不資舌人皆特入奏其冬帝自將討叛王漠北漢人惟丞相史忠武公及公二人者從歸賜西錦服賞其周旋莽閴皸瘃之鄉不懈益勤也帝問鄕郞俸幾何公如數對則曰何薄如是敕增之公曰品制宜然後太保劉文正公奏公參知政事公又曰他日必有由郞援例求執政者將何爲禦皆不許至元始元官朝請參議中書省事詔同燧先世父太師文獻公時以中書左丞行省河東山西罷世侯置牧守五年再爲左右司郞中者三年盜殺臣爲平章欲擅利權病其束手中書不得肆欲奏求分六曹繁務立尙書省授公中書給事中丞相惟署制敕而巳隨同兩丞相史公耶律公潤色國史翰林十年襄陽下詔令卽汰生熟券軍隨授知襄陽府府隨陞路官太中襄陽路總管虎符明年詔淮安忠武王巴延時以中書右丞相河南王阿珠以平章楚公阿爾哈雅以右丞行中書省將圍襄諸軍濟以新籍之兵合數十萬衆平宋授公宣撫使議行省事浮漢濟江下鄂大師其東留右丞及公戍鄂明年授僉行中書省事荆閫遣安撫使高世傑來襲右丞岀禦敗之降世傑乘銳下岳進㧞江陵又移軍圍潭獨公留戍士民求見者前其人而却其贄金帛一錢不入其門酒茗之微亦絶戢吏卒無入鄉敢縱暴者刑以重典發庾賑饑宋宗室仰食官者仍廩之不變其服而行其楮幣弛湖荻禁聽民漁樵東南未下之州商旅滯此者給繻歸之創舟百數十艘操以水軍免括啇民置藥局遣醫更視疾瘻婁安邦以信陽來歸從其子入覲矣裨將陳思聰屠其家逆端則見或議加兵公曰爲是益堅其叛惟可計致遣朱千戸從十人徃使戒無操兵好謂之曰汝與安邦同功有怨盍明之省何俟其出而屠其家或仇黨夙夜甘心于汝奈何宜身自省吿余以故余則直汝不然少猶豫則以叛加兵興誅矣思聰果來隨徵其妻子其徒至數以戕賊主帥家與未受使言迎射殺其從二人罪倂肆其子諸爲亂于市幼主旣降其相陳宜中文天祥挾益衛兩王逃之閩廣爵人號年東南大蠢覬倖之徒相煽以動大或數萬小或千數在在爲羣蘄宼起司空山剽黃及壽昌壽昌距鄂尤邇鄂屬縣傅高亦集衆跳梁爲應公多爲檄曉曰汝皆平民爲賊驅脇至此俘殺之獲子女貨財渠惡悉有汝何利焉捐父母妻子徒受叛逆之名以取族爲鄉里所醜今能投兵返其居者復齒平民不蹤迹其旣往有斬賊首至者以級多少受賞以渠首至者官之言中其情上下猜沮稍稍離渙壓以官軍遂盡株橛翦平無留高亡之江西武寧公又檄敢舍匿者誅及其鄰窮無所歸變姓名返家爲尉吏縛致磔死初遣萬戸某者討是賊其人顧以高爲辭請急盡殱鄂之豪傑大姓以絕禍本公曰應賊者高鼠子何爲旋就梟夷豪傑大姓初無與知奈何以高誣誅逆天欺君以禍民夫誰敢然汝第往吾能必其無他其人出留所善部將戒曰聞吾還軍汝舉烽城樓內外合發必盡殱是會其戰不利水死其始事彰鄂人大恐轉益德公恃爲司命時精兵盡于圍潭居守半老疾乃雜新民乘城民相誓曰設宼誠至吾曹二三千人必無四顧其家專擁衞賈相十四年官中奉湖北宣慰使明年授參知政事無幾時遷江西行省參知政事民素父母愛而神明敬之號送其去像事于學先聲至江西民有迎訴千里外者時其省收海隅僞命甚急有者坐以連賊無者謂爲靳匿將爲後用誅論巨室踰三百家猶有幽獄未斷者公至出其非辜下令凡宋吿身以城來者朝廷旣加其舊官之矣自餘蓄此無所叙復徒自取禍其悉投水火敢有以索兵仗爲名俠入民家罔爲收匿以起獄取貨與取妾人子女痛繩以法明年大水壞民廬室藏蓋者發粟以賙其逃登屋木者遣吏具舟載糜粥糗糒以食脫沈溺數萬家宰相岀入以甲士導從至省班立庭下其冬大雪墮地旋消移時不能滿寸右丞托爾楚􅈴貴胄也顧謂公曰南方並有北寒減三月公曰相公襲貂裘熾炭其前而張幄于後言是則宜彼庭立者必以爲加三月矣右丞屬觴于公謝其失言休士于廡由是知其爲心斯須不忘恤下也事必資决不敢友視而師之明年李梓發盜據南安公虞他將往則爲暴堅其不下請身往平纔從兵千營子城北爲檄推誠招懷梓發度其猖獗日久勢不敢歸以其徒知公有素或貳其操戰不爲用懼左右竊取其首爲功乃閉妻子一室自焚死衆皆散還其鄉不戮一人平南安歸江東饒之屬縣都昌杜萬一挾左道媚人有衆萬數狂僣置相公曰都昌與吾南康止限彭蠡此宼不馘將亂南康乃調兵戍遏彭蠡西瀕别遣方招討將其軍伏仗舟中僞爲商農徑造茇舍生禽萬一與其相曹者以歸磔龍興市其徒散駭復其民居後有列巨室姓名百數來上云與賊連公曰大慝誅矣延求何爲火之而江東宣慰使某者媢其成功遣使入䜛公不俟江東兵至惟遣南將往討私有其藏以八月屠禁日殺人會公亦遣使至制則江東使曰賈郎中爲者何有過差且是賊非羊豕人也雖殺以朔日猶可十七年詔再征日本賊江浙江西湖廣三省造海艦公極言如是將亂江南欲身任入聞陳其過舉他相以爲不可廢閣詔令異同之間其年七月二十日年六十三薨于豫章而始成戰艦遣宣慰某者總致于軍東征丞相憤失軍興將以是日斬使忽詔下旣江西海艦後期罷兵君子謂公薨猶利國如古尸諫以其冬十有二月歸葬威州井陘牛山先塋嘗最其平生家居事妣夫人曲極孝敬迨薨移是以養寡姊夫人李氏信氏雍睦無間言視政之休未嘗廢書從戎亦槖駝負書以行從討叛王度漠有暇猶爲世祖陳說資治通鑑納君于善延師私塾毓德諸子日或至其舍出門交友貎粹而言温侃侃易直無有城府機穽尤篤故舊故第邇太室歲常以十月剛日大享其日每風雪冱寒非執豆籩聞鐘鼓振發不敢安卧其室冠服庭立至乎已享積學其躬如是施諸用世事世祖二十有一年其居中當睿聖大有爲之時與二三元臣上以毗賛其經國下以燮熙其子民者十有三年出而經理南紀謀猷大軍于襄陽于湖廣于江西新造之邦嚮化未純安而集之喣而濡之如恐一夫不獲其所一有海隅之難盜賊附起禍譬而賞勸德綏而威撻徐革其面而浹其心俾方三數千里之氓一喙同辭稱其仁人求能推守大帝諭忠武王以曹彬取南唐不殺之訓者無公亞匹嗚呼後公之薨二十有九年今聖言念盡瘁大帝功加生民贈推忠輔義功臣銀靑榮祿大夫平章政事定國公諡曰文正哀襃之典無一遺者恩重書棺公而歆茲可作于九原矣五子鐸淮東宣慰使鈞中書省參知政事鉞不祿鏞令曹之禹城鍔知鹽官州二女適臨湘令劉彧僉山東道肅政廉訪司事王遂男孫五汝玉行臺監察御史汝立汝礪餘未名女孫五有從者三吉州校官許崇慶戍守眞揚萬戸劉遂壽武庫使劉復餘幼男曾孫五女曾孫一皆幼銘曰定公筮仕于顧成世弱齡卑官潔愼己至世祖淵龍謂治須賢蒐以自毗如渴繘泉公焉其時先後胥附及踐天位大正百度以公爲郞左右中書凡我庶政丞相共圖日月入吿天顔諟顧不恇于威不愉于豫垂十五年政治隆平維帝之明公猷是經將一文軌襄漢其始出公軍諮爲烈益偉旣下江夏人暴而仇公則緩之敷澤優優粟飢藥疾于賦于役勝國厲民靡不與黜大盜劻勷動萬爲曹以言爲兵訓枿其豪民視曰公予父予母胡不像之事以豆爼聞遷省洪出涕齎咨洪聞其來以抃以嬉旣釋岸獄載糗與粥舟取溺逃于彼登木南安勦狂不缺斧斨僭僞都昌生致用方惠懷其仁兩省千里聞其告凶號啼婦子疇非位相死而罵長伊疇若公没世不忘諡于太常傳以太史矧世其德衆多令子有毖巋山螭石劘穹神保焉依期古與終資德大夫雲南行中書省右丞贈秉忠執德威遠功臣開府儀同三司太師上柱國魏國公諡忠節李公神道碑皇上嗣歴之元年制特進中書平章政事教化開府儀同三司太子太保太尉平章軍國重事上柱國魏國公申敕有司夫旣子孫膺是顯庸共政中書疇咨㝢內而所光昭世德上及其遠者舊章未脩非移孝以勸忠也其訂以上翰林奉常禮曹之臣請贈諡其曾祖考達爾沙貝結爲効忠翊運保德功臣開府儀同三司太傅上柱國曰康懿祖色爾勒結爲推忠佐命宣力功臣開府儀同三司太師上柱國曰貞獻考資德大夫雲南行中書省右丞阿嚕爲秉忠執德威遠功臣開府儀同三司太師上柱國曰忠節自曾而下三世皆同封魏國公曾祖妣梁祖妣田妣王皆從封魏國夫人制曰可教化以爲四世死生胙以大國爵之上公人臣寵光至是焉極雖百其身報塞未能啟求儲皇匪刻金石將無以侈今而垂後敢以是請乃爲下令太子賓客姚燧太子諭德蕭㪺太子太保瀋陽王王璋其爲撰書篆額燧據翰林學士程鉅夫事狀與其家乘次曰康懿之先七世相夏同其王李姓以小大稱及貞獻生配姓與官名以色爾勅結太祖戡定天下夏氏旣臣會其西征復貳帝聞旋師入討勢如頽山之壓卵貞獻總兵游徼遇之遂來歸俾同呼圖克特穆爾招沙州州將僞出牛酒犒師發伏以襲首帥馬躓以已所乗易使先奔自乘所躓爲殿逆擊敗之他曰帝問卿臨死地易馬與人果何爲心對曰臣新至者陣死奚恤不可失帝器使宿將由是忠之遣兵圍肅州守者其伯氏鈐部謀以城下不克害及其家帝憤拔城皆殱之不遺齠稚惟聽求其親族臧獲就所得爲百戸有六又詔自今親族臧獲未盡收完及田業爲諸人有者亦悉歸之其永爲制歲乙未太宗詔定宗憲宗兩諸侯王與蘇布特征西域明年帥師戒塗貞獻在行中又明年至袞騰吉斯海尋與諸侯王巴圖征俄羅斯至葉爾羌城從憲宗先期至搏戰七日㧞之歲巳亥冬十一月至阿蘇穆爾齊蘇城憑堅攻不卽下明年春正月凡三閱月貞獻從死士十人躡梯登陴生拉十一人大呼曰城破矣衆蟻附而上遂㧞賜西馬西錦爲匹皆九名以巴圖表其戰烈又明年詔班師是役也六年而歸功長千夫禮秩與國人爲千戸侯者等加宴服四序異宜凡若干襲與大㑹者皆同其色又俾同伊瑪齊爲斷事官于朝歲丙午定宗卽位曰是大名昔朕分封卿往爲監至燕則同斷事官哈達署行臺後憲宗以布扎爾來涖行臺錄其舊勞又俾同署别錫虎符以監失名至歲已未凡爲監十四年當繼饋世祖南伐未踰淮輿疾歸薨其家七月二十有八日年六十九傳䕶轊車返塟肅州祔其先塋别封虛墓大名求便歲祠中統建元天下庶務悉歸中書故忠節公襲虎符惟監大名至元五年詔諸侯王和克齊開國雲南俾將衞士以從至則責治軍旅金齒弗率纔將射士五伯人殄其衆數千獲馴象七致貢京師敕用以駕輿自是蒐田征伐無不乘之實前古未有者始帝加兵雲南取道吐蕃甚回以曲十四年思播旣降改由蜀入命公開二塗陸由烏蠻水由馬湖烏蠻合都掌圈豕鵝夷諸種拒而不受累戰始服自時水陸郵傳皆達叙州又俾除左右兩江道達邕管平溪洞夷獠五十餘州十七年詔將雲南萬衆合湖廣四川兵討羅氏鬼國之叛十九年再征獲其酋送京師竄有北死二十有三年詔征緬緬瀕南溟大國戰始克之不及郡縣而還獲大象二十有七送達尚乘明年詔鎭南王再征交趾命將萬衆會之平三十八柵前大軍一月至王宫王及世子興道皆舶逃南溟禽一他王以歸明年師還衞鎭南至左右江界辭還歳戊子夏六月十有八日冒瘴癘道薨軍中年六十三最其履歴始爲金齒等國安撫使入覲改善闡安撫使陞雲南等處宣慰都元帥虎符拜雲南行省參知政事再遷左丞末拜資德大夫右丞加宴服四賜尚方鞍勒弓矢介胄實使相西南二十有一年地周萬里小大之戰無慮百數軍士有勞其出而家大而櫪馬細如槖衣金銀幣具不吝賞予故能得其死力毎捷無衂荷旃夷蠻讋其威名已臣之國撫而綏之爲定金賦以戸高下爲衰迨其薨年籍是一省輸金之家近二百萬訃聞帝悼之給五十乘傳還其柩葬大名贈銀靑榮祿大夫平章政事諡毅敏公後三十有一年加今封謚燧嘗合是三世以觀貞獻忠節父子逮事二祖三宗六十年間宣力樹勲西夏雲南勤亦至矣受是襃誄固其宜然而康懿則相夏氏實勝國臣由子孫貴亦與哀榮足昭皇元淵乎忠厚恢乎其仁盛德之至也間又求國魏所由貞獻卒監大名公嗣爲之去之雲南公弟又爲死而公冢嗣軍國與其姪鄂諾皆爲虎符今其爲者則公季子呼圖克岱爾若小大宗父子祖孫晜弟六人迭出爲者其與世侯奚以異諸亦今代臣鄰之鮮儷者公三子二不再見中子則今江西行省平章三女長適同知台州路事巴約特次適浙東右丞宣慰都元帥阿爾丹幼姆男孫六人庶長監中慶路餘未仕女孫二人銘曰卽戎有勩官及而世不絶其傳列聖之制由子旣貴推恩其先前聖靳之一二有焉於皇今聖德參載燾立愛自親教民以孝致位光顯必崇其親赤舄執珪私廟卑陳昔李七世下及康懿左右夏王貞獻則異聖武是忠入殿出鋒後服加殱必全乃宗當顧成廟詔從西伐城凡悖頑賈勇以㧞其干天誅曾莫稽逋六稔言還功長千夫定宗御極曰茲魏土分封在予而往其撫忠節世之九年于茲從諸侯王南詔往釐跳梁小夷尺箠以笞大如緬交南溟極浦悉將致討而竟死鼓自其去魏其來其誰則季父姪冢季子爲職民世侯前聖巳廢獨于之家疑若猶在胥今國魏四世靡他其與虛邑不地如何有繩維孫有煜其祖匪師伊公一是開府死者巳矣生則立朝爲民具贍席絶百僚維明天子啓宇于此咨爾後人思服其始侍衞親軍都指揮使李公神道碑開府儀同三司平章軍國重事中書右丞相贈太尉諡忠武史公中子今中書左丞闢閫江陵行荆湖北道宣慰使杠視今江陵總管李珏則故夫人之季也以其季今東昌總管𣏌兩嘗壻我先世父中書左丞贈少師文獻公與李氏皆太尉姻又珏友燧而齊年來言曰先太尉所由以致是勲名者先外舅氏指揮實始終左右之而玨亦曰先公出處使相旣狀願銘之碑遂參伍故翰林學士李冶敬齋之三韓李氏先德之碑而序曰系之遠者不究巳考諱福力穡致饒而施讀書能通其槩親親長長下儕輩無忤仁蟲豸不踐性由天出匪學也生公諱伯祐隷太尉兄金紫光祿大夫河北西路都元帥麾下十年其倅武仙殺元帥一家百口據眞定叛而事金完州中山皆應之先是元帥之考尚書嘗戒備仙元帥則曰大人柰何敎兒設嫌遇人尚書恚曰若必死之人手吾不忍二孫同禍乃攜故眞定總管楫故江漢大都督權如北京時太尉在燕市入覲禮幣公馳吿宜歸復讎太尉從而南潰軍巳須滿城之徐河公唱今集賢大學士王顒之考參謀某今參知政事王好禮之考大使縉推太尉嗣兄元帥凡失地皆復之仙走壁雙門公北見太師國王王馳使聞詔太尉眞嗣兄河北西路都元帥虎符公爲都提控仙復夜襲眞定取之太尉惟從公遵城走東北公告太尉吾先自投汝隨而下幸我藉汝使汝不傷吾死無害也己果兩全涉塹公又爲前水及其頸太尉惟及胷泥奪鞾襪旣岸跣走藁藁帥故中書左丞贈平章政事忠獻公董文炳之考某巳艤舟滹沱卽馬入藁收兵諸將有異謀者公手斬之再復眞定仙走壁抱犢旋走逾河轉鎭撫軍民都彈壓豪戢弱立從太尉破衞新諸州又從圍汴金主自將逾河破之黃龍岡走歸德濁河爲池主帥薩奇蘇巴哈薄北門而陳左右皆水公以爲絶地兵家所忌宜退保寛間不從會中書左丞相贈開府儀同三司太保諡封并國武宣公阿珠之祖蘇卜特召太尉入汴計事公與之偕旣走軍大殱藁帥董公完帥鄭公韓公十千戸皆在死列金亡移兵伐宋下徐州與其縣豊沛功授金符攝本路兵馬都總管緃征襄陽敵栅峭灘石舟師衞之帥下教太尉其必拔而歸乃將公等死士二十人公曰可計致之岀十艘爲挑皷旝而前俟敵逆戰輒退止巳復皷前敵拒又退止三皷敵以爲怯而懈也不拒遂疾趨敵舟太尉先登公繼之覆舟師平其柵從戍鄢陵又從㧞夀春功拜千夫長後太尉使經略于汴屯田河南立平宋基以公年先一紀無從留後眞定攝萬戸府給軍之須約相㛰姻憲宗自將征蜀太尉旣從世祖以太弟之重分趨荆湖復召公從濟江徇地多資其畫中統建元之明年太尉當國多勞公于上上亦念從濟江以爲侍衞親軍都指揮使虎符又明年李璮反盗據濟南徵兵諸道誅之衞士亦在遣中大軍􅗮老鶬口公與董忠獻公合請太尉涖軍報可太尉至築夾寨遏奔突以待三月璮窮而縳梟磔以徇公旣訖賞遂致事陳蒲槊一堂教童妾爲歌舞行觴娛留親賓而不自飮囂囂恐不足曰爲事以至元某年月卒年八十三葬某地爲人諒直而不剛愛爲言太尉家事亦斥不避在軍不乗喜怒殺人不事老佛再復眞定屋之列肆者半城闠有以無居室來丐者人賦一間數年而盡惟其弟存奴婢三千人歲晩皆民之平金殘宋爲元顯侯卒日貧不能葬三夫人赫氏游氏趙氏男十五人珣瑜珍琮瑄瑾公懋玨璇瑜璨珪琳瑀琦其官者珣眞定等路管軍千戸總管則寳慶路琦與珏也公懋沐陽令琳提舉越州人匠女十二人皆適名族官者則今參政好禮與今使相故秘書郞張行儉男孫四十一人未名女孫二十四人歸史氏者六人一使相中子官者眞定路總管王某濟寧鉅野尉哈斯托里男曾孫十七人女曾孫十三人公旣致事時禁網猶闊諸將多以僮奴代兵而歲取富人更直多者十人少亦四三會用兵襄陽覆實軍籍有此者罪死珣長千夫爲其下訐曰指揮所亦庇三人珣引罪不力事將及公珏時爲質代曰吾以吾爲質不足資用爲之吾父未之知下吏重錮御史交讞終不易辭柄臣三人奏置于理三畫可矣而柄臣三人亦終哀其志爲親臨刑不悔三奏前赦旣原不可者三行省臣奏軍官未受俸前罪宜無誅可之珏宜岀矣省院臣終以事宜特聞合而請之始可比出凡幽四年從大軍南征功宜别長萬夫聞兄珣卒子幼不可世恐人奪有之乃棄巳功求代兄子將曰長千夫吾父兄世官也吾宜世兄須其子壯而授之戰鄱陽湖眞定灣頭堡焦山皆捷攻常州先登拔其屬縣宜興從殄宋益衞兩王海中功授吉州總管滿換湖州而江陵斯其爲子弟臣槩之大者故表之公碑之末銘曰古觀逺臣以其所主賓于而家暫至與去以友賢者猶取盛譽烈烈忠武爲元元功求今將相人莫等崇公也主之同其始終其始則自推繼兄帥鬬不反兵逐仇再躓戰野無前登陴奮先滅金于殘戡宋于完于河之干于淮于漢靡往不皆鄰死奚算忠武報之爲好其家相世婚媾井里旣華終以從蹕未襮之國逮其丞相進置帝側疆場之臣禁旅是師宿入衞出肅而祁祁人之策之曰久其據而公委視翩如投羽其施不㩼不溢其持豈固嗇之多後裕垂茫昧其來匪言而告有碑載銘左是神道臣戴聯奎恭校
