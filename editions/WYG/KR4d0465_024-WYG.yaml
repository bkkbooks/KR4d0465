body:
  text: 牧庵集卷二十四元姚燧撰神道碑武略將軍知𢎞州程公神道碑由程氏世為太原初縣人燧考歐陽公表唐相系曰程出風姓顓頊生稱稱生老童老童生重黎其後世掌天地之官裔孫封程爵伯洛陽上程聚則其地也至周休父失其官守以諸侯入為王司馬及銘文簡公琳碑則云莫盛于唐宗分為七廣平中山濟陽靈洗其三則皆祖魏安鄉侯昱而系表皆無是言惟异上三四世而止豈今居太原初者或廣平中山分歟其可系則自其髙大父主祁簿政生曽大父禮武科取官忠翊郎至右武大夫守隆州冒陳金兵以殁宋愍節死賜錢百萬歸葬其鄉大父天祐醫以自業卒葬文水考達以太祖建龍旗九斿即位之年丙寅至戊寅兵金之年為十三年年二十餘與兄通弟進倡豪傑來歸完保其鄉為提控為監軍鎮撫軍民都彈壓管民總管銀符甲午金亡之明年還鄉民五百亦占屯籍詔易金符位總管上發平陽河中京兆民二千屯田鳳翔實僑客其地城中猶荒錯荊棘逐虎狼則田疇非立苃舍伐株橛芟蒿萊不可以入錢鏄以觀銍艾戛戛其囏哉矧西則秦鞏未臣行金正朔南大散闗距宗百里北山飢盗縱横日夕相㓂殺丙申又為征蜀所塗師旅去來館餽之須十以率之屯供億七鳳翔纔三後鳳翔民稍集資屯猶六焉為之七年當歲壬寅以終其賢其能其勤其勞有盧昭文摯墓碑言公諱介福字伯祥故事父嗣子得嗣為歲辛亥宋四川制使余玠潜遣偏禆火絶棧道木閣身將大軍攻圍興元城方孤圍公將屯兵五百從都元帥都爾蘓入援及絶無從得塗值三人自圍所亡歸許貫其死令導由他山刋木出陳倉玠以為自天而下焚圍宵遁其年憲宗即位凡中土列聖符節告身盡牧之官明年入覲還金符仍位總管上屯田鳳翔制許專殺有王姓民歐兄至死即就逮其親請鄉鄰善公者懐白金二鎰來貨曰死非他人吾長子也今又以季子償死吾誰與為養惟哀而全之公却金曉曰虎狼獸耳父子兄弟且不相噬人而賊殺同氣其不仁也暴甚虎狼此而不誅何以正是邦之斁敗天倫者竟尸之市尋岐雍民家奴皆蜀俘百十為曹相煽亡歸公悉之還朝廷聞之率以為反遣持齋齊來按事連其主將盡殱之公曰民奴羣逃主何與知惟當誰首亂者由是惟誅七人孟待制嘉之因扁其堂曰明恕戊午憲宗進討西川乗輿入由鳳翔多其津梁館餽廪餼修治豐潔賜金幣五白金為兩百五十世祖立極中統庚申收上符節告身如先朝以前屢入覲潜藩熟公還金符至元四年丁夘以平陽河中屯民為軍假公子松長千夫將戍成都其還鄉民五百人傳官公武略將軍知𢎞州下車渠桑乾水灌田五十里新州廨以示安榮一刮夙昔茍簡之弊歲饑封民所食木膚草實上之巾書得發廪以贍械素豪猾之于治以病民者于市懲衆擢曹徴君子汝弼教授以師是邦使士知學其古人所謂糾姦示惡流恩褒善者類歟十年四川上所戰功制問故符安在對以𢎞州仍佩制解傳松滿秩還岐二十有六年己丑年六十七冬雨木氷羣烏噪集庭樹三日公弗善之覽鑱入奩前諸子訓曰吾平生無他長人惟俯仰無怍愧天人耳若曹可篤學自脩則在家在邦不患無孝忠之聞也惟求善惡在已有無無以人過于毁譽而輕愠易善語訖而卒實十一月二十一日也踰月從葬于其考鳳翔之召亭鄉兆次兩夫人皆前卒謝君四十一年富察君二年四子長松次檜八蕃副都元帥虎符皆不禄悌彬業儒孫五人萬里秦山殤夀山業儒文演陜西萬户虎狼文饒未仕女十皆歸名族其天質仁厚剛方孝友明信哀孤敦宗民奴禮士者有陜西賈提學其墓誌言銘曰猗歟將軍賴基父勲田岐雍郊干耦其耘人初小之治寄是府勢若異然此客爾主後一歲中校其賦踰爾財四三此六七居無事而農我艾我銍警將一旅從㓂入出憲廟兵宋師由褒斜百須餽供應求咄嗟帝用嘉止幣金實匪其為龍光疇與儔比于後世皇詔其子松將屯千夫戊鄰莋卭其半屯民岐雍之界移公刺𢎞足乃騰驥乃渠桑乾膏潤孔多履道以仁越度用苛視民之飢猶巳紾臂亟請于朝發廩以食滿秩養安十五餘年靈烏告凶得氣之先觀古史臣為人紀善雖一行言亦取立傳志在行後尚鍳用勸子孝孫慈乃祖考思惟懼平昔有美棄遺託諸能言金石昭垂走非其人彬爾來即拜手過求先徳為述誄宛而章其言洋洋匪資礎龜疇逺闡揚譚公神道碑譚在周千七百國之一子爵幽王之譚大夫衛碩人之私譚公皆其遺苖後世子孫遂以國姓史代有人其居徳興之懐來髙祖而上不得其世曽祖信金鎮防夀州千夫長祖伯全家累千金父資榮以徇北功皇元帥左都監虎符寄治交城遂令其縣削平盗賊賢士逃亂者多往為依公生以歲戊寅髻年入學頴慧彊敏㧞異羣兒成人兆緒嶷嶷則見十五綜經緯史講貫精熟會課朔望毎魁諸生為交牧盧帥所竒以女妻焉軍中得書則馳送之故其家積多至萬卷國初為制皆世其官父死子繼兄終弟及或父兄存將傳子弟者亦惟命故考府君以元帥左郎監交城令推其弟資用卒公以嫡長嗣為十九年矣太宗之八年丙申州縣守令上皆置監動惟國言公不能也而受成説譯人盧其見欺乃私與善國言者遊目薫而月聒之滿歲而悉能精曉他日郡議不資用譯應務無滯人悉異其不學而至朝廷置斷事官于燕曰司瓊林園之臺人人則曰行臺府檄公往計事歸請省諸工料費横取民者府僚便之舊文谷水分溉交城為平牧郭帥所遏專利其縣民累訟之終不見直躬造大府爭之郭帥少公恃為父執至或師詬公不為報惟理譬折彼遂噤屈至今其水縣蒙其利杖部民持吏短長恣為非法者幾死民惠其威俄入覲因中書耶律公面陳初乙未料民州縣率以無産僑客入籍用示其庶及賦丁悉避逃徙責徴實存官無所取稱貸賈胡困不能償迫改立約以子為母譬以牸生牸牛十年千頭滋息日増帝為哀之制許貰其逋縣無鉤見民公私之負三年勿徴子母對止亡民能歸其復三年縣境大甦而鄰民曰吾獨不居交城耶州縣守令益害其能請督一府逺輸之糧于平陽及至又移輸京兆仍守其出比盡而返數年由是縣民困劇隣矣憲宗壬子復大料民公削其逃徙其兼貧弱雖損户數故是縣差不艱窘歲甲寅世祖淵龍平大理還始入見嘉其舉趾凝重出話慎詳留居藩府官而不名以其弟山阜代為縣遣邇臣出使必以公偕先是分封世祖以京兆由户寡益以懐孟且詔總天下之兵遂置經略司于河南宣慰司從宜所于闗西行部于秦州漕運司于衛安撫司于邢盡遣諸軍屯田戍邊首淮尾蜀以休秋收冬士馬往來之勞東西數千里道不拾遺中侯屯庶翕然歸心歲丁巳宗親間之遂解兵柄他王遣阿勒達爾至京兆大集汴蜀兵民之官下及管庫征商之吏皆入計局為條百四十二文致多方且曉衆曰惟劉萬户史萬户兩人罪請于朝蓋謂忠順公丞相忠武兩公也自餘我到專殺虗焰薫天多迫人于死世祖遣庫濟青左丞與公來臨無與鈎考而彌縫其間時通動息藩府㑹明年世皇身至帝所命下而事始緩猶杖兵民諸官凡昔所置諸司皆廢公歸丁妣郝太夫人艱藩府奪哀起之世祖始分兵南征俾公治懐歲旱復鑿唐温渠引沁水河南諸縣中統建元制褒其賦性寛和練習政事以為懐孟路總管明年入覲賜金符四年換虎符訟隨日决曽不留獄教民植業桑疇麥陂稻塍芡湖果圃苧區水輪步船無有遺利或用致饒民其藏獲侯克寛孫宥等家男女數十人引蕭讓為府史升知事積官運使按察使至元二年罷世侯省懐孟衛輝兩總管入彰徳以公為同知無幾時官嘉議遷河南路總管兼府尹明年奔元帥府君喪交城中書不聼終制迫懐涖職瀍水疊石為岸梁木其上歲易腐敗規為樓十二楹覆之慮其財擅取帑力輕用民得請户曹而始究工上下列肆月收傭直資府公須參政楊公紀績于碑官少中平灤路總管既至疾歸七年散階例降二等與職上下官奉議司農少卿尋進嘉議京兆總管兼府尹者一年改陜西四川道提刑按察使當按行四川以邊方軍政多所鬭略未可以内地文法遽繩脩舉大網而止州胥府史坐贓汚者以始犯罪皆輕平下令治事之餘使學官聚為講觧期通一經庶少變其筐篋刀筆之習漸摩禮義則恥貪凂而不或蹈時詔禁有妻娶妻乃建言不孝有三無後為大世徳下衰婦人以悍妬成俗既無子又以是許制其夫將遏絶苖嗣曽不省恤請自今男子四十無子聼其娶妾中書是之遍示天下十年中書左丞咎順時為宋帥嘉定入㓂大敗僉省嚴忠範于成都沙坎入其郛我師退保子成上械忠範至都俾公代為僉省至則瘞其暴骸完其焚屋賑其飢貧集其流亡撫定一年西南夷羅羅斯内附上以文武兼資可使鎮撫新國以為副都元帥同知宣慰使還京兆治装或説蠻夷無親不常叛服宜以老疾辭行公曰受國厚恩圖報無所以皇上之威徳逺被何往不可何私自幸其安乎就死其所懐人徳我馬革裹骨歸窆是焉志願畢矣遂行未至行槖盡為河西所刼事聞上慰安之再為降制及軍中所須至其境方輸皇元同仁不間逺邇持置大帥安集招懐以捍外侮非利徴求朘削汝也國人大悅而公以不能風土竟疾卒至元己亥九月二十有七日也年五十八門壻李某護其喪歸子克脩迎之中塗號慟屢絶懐路之民哭柩致奠者將三百里以明年某月日葬河内某地後踰三紀公之孫質拜而言曰君及知先祖且與先人同事許文正公求可銘先祖碑者含君焉將誰託筆燧曰鳴呼公奉命始至秦于時識之其後尹洛燧時家洛公遊處必見召嘗謂為忘年友雖辭而不敢居抑不可不謂之知己于其平生若可㮣焉子之言曰惟仁者能好人能惡人蓋先師以初入見潜藩之年驛召至秦後四年公使至見其道徳之容聞其仁義之言考其卓絶之行憂世之志樂天之心出謂人曰今顔子也先師還懐公為之收以求言焉則謂之曰學者或滯于形迹而不適用中理合而一之斯可謂善學者猶導公以用世之方身親接久而始示以性理之妙而操脩之又使克脩盡弃其學而事之其能好人也如何黙爾吉為監于懐以暴戻跋扈名聞一時同列少逆其意或詬詈侵辱不異僕隸公與處八年細故則讓事或害政則誠意馴導以理使孚信之能改而止惟逺以不惡而嚴又游顯代張左丞宣撫大名為諸路總管求金符秦已上公言之中書辭不受命曰聖上不識譚澄耶為顯所舉省為去之其能好人比類亦庶幾其仁者歟太師趙國劉文正公論天下仁牧得邢之張芸夫懐之譚彦清何憂不治哉先師亦言譚侯辭氣温雅雍容樂易達時識治足畏服人其為兩公推與華衮之褒何以尚之夫人盧氏勤儉惠和不侈既責能以身率不輟婦功故婢數千指約束如一壺範之言所至化之克脩事裕皇出為江南湖北河南北陜西漢中三道提刑按察使秉受懿美得之天問學脩為受之師忠信豈弟臨政與人皆踐其父武女九人適淮東宣慰使傅爽延川令李某湖南書史石某江南榷稅使賈時益汾州萬户子杜某杭州總管子楊某灃州總管子鄂屯某參政子盧某交城以次官子王某男孫三人忠尹大名之南樂質宿衛成廟己銓未除文庶未仕女孫七人適湖廣省員外郎表景韓知陵州杜明耶律太傳濮國公孫某東昌總管之孫宿衛成廟許諠宣慰使子傅蔓文某竇某銘曰有翼其恭有温其雍有訒其言有裕其容人有其一足曰善士矧公兼之宜克用世魯昭十九猶有童心公于其時帥政已臨視民之傷猶已致者奔走不皇説上教下事太定憲由邈皇居與率土臣衆以視諸入侍大帝藩府帷幄而日迺與俊義簉擢凡厥大猷亦與有聞權臣肆虐恃觧其紛大帝南征歸正天統于懐于洛于灤于雍于是有衆迭司牧之惠積寵嘉虎節陸離進之風紀詰姦秦蜀惟政以仁不一文律嘉帥縱兵入㓂成都劉吾入民火其外郛奪嚴諸侯于彼僉省以公代往責使撫定安鎮一年移師西戎皇威甫張而遄告凶最公之仕厯年四十其二十年為帝賞識矧其有子官風紀三其取于天而得已貪走賦是詩鑱石墳道期爾後昆百世是保轉運鹽使曹公神道碑維曹肇國則自文王子振鐸以武王弟故與唐康管蔡霍屬以别之鈞曰叔春秋十二國曹猶存其後子孫雖散之四方亦皆曰吾先人顯諸侯􅀈姬氏惟國姓至參以沛吏佐髙帝興漢功侯平陽國或絶或續魏文帝丕篡漢以有中土者凡四傳四十六年自是聞人史不絶書至金初曽祖儀貫籍睢之考城以明罰執法為郡功曹生蔚觧試魁開封生鵉以材武受知皇元帥劉公引為天下規運提舉妣夫人赫舎哩氏金源貴族生公諱世貴字仲明由翰林國史院書冩為元帥府提控初髙麗自太祖世納欵而國王穆呼哩方總兵歲東征不休䖍劉人民而臧獲其子女髙麗患之棄王城徙其民江華島世祖哀其首服為罷歲征諭使復王城今瀋王之祖惑其令功林演之説仍安其所不以時徙帝怒命嗣國王塔納格爾兵其界遣平章政事趙璧行政東省公為行省宣使入與演與同惡豎惟茂禮書宋訟禮侍郎洪紊陳兵以逆公叱責曰汝海邦小夷敢以威脅天子之使則反矣戮十餘人縳演致闕國王導之入覲帝嘉其忠敕授忠翊校尉曹之城武令有惠其民勒石頌之凡三遷皆同知劇郡吉州歲荒發庾以振餓羸隆興羣盗據華洞數調官軍討不能平遣公諭招之悉棄險來下皆齒平民建康去以母喪會庭議凡前峻官者例陁之改温之治中以未終祥禫辭明年官朝列福建閩海道提刑按察副使職乎民者進為風紀非聞望出常調者憲臺不輕以畀至則糺閩省平章黙勒賊民蠧政下詔誅之彼其同列大為震肅滿秩官中順遷興化路總管兼管内勸農事凡民為羣盗鍾明亮刼脅汚染進討將士取而奴者無慮千人皆汰之遷福建都轉運鹽使未上而卒實大徳六年六月二十有九日也年六十一葬太平之須城登賢鄉夫人趙氏南京提舉趙晉之女妻道母儀姻里範之五子定國尹江隂州兼勸農事靖國同武昌等處􅀈茶提舉皆夫人出次室葛正國安國輔國皆葛出方勵學女孫三人銘曰率土之逖將帥侯牧有没其齒天威不覿公一布衣從省東征問罪髙麗負羈以行檄行浮海徙江華島敢拒為亂魁脅縛討王孫導之入告為猷甚為帝嘉邑令用優既試牛刀易猛以惠尋峻其階告洪昇倅吉拯歲荒洪咨諭降持憲于閩渠兇斧亢為牧興化凡㓂滋蔓波汙平民悉頼以澣轉而閩漕鹺利是專甲子方周白日遽捐平昔履厯盡萃乎此在邦必聞可無愧已而所未白在家亦聞衰俗滔滔在官幸身親未卒哭期月已出王事是從笑言自若公則異諸昇護輴車改温又辭練服未除若是自致庶古少跂化民興行足禆至治須鄉登賢而祖有阡碑以表之庸信其傳少中大夫孫公神道碑至元二十有三年燧以直學士召至翰林孫公時為閩省郎中數千里狀其考盧川府君之行將託之石見求既為銘其墳道矣大徳四年為懐孟總管且卒顧言其子壻郭忠恕曰死必求姚翰學銘吾碑至大二年燧方承㫖翰林忠怒其時已為宗正府郎中始致是婦翁之命嗚呼何公區區不鄙余言若是之不忘也公諱顯字榮甫其鄉望遷徙考妣年葬兄姪名爵前述悉之公幼學既長以某家𨽻兵籍歲從大將南征世祖立極置江淮江漢兩大都督東則李璮開閫益都西則史權開閫鄧州與宋楊州襄陽兩制帥掎角及璮誅廢督府皆為統軍至元五年大集天下兵圍襄陽起本平宋八年敕統軍駐淮北實制下流西擾之兵明年改行樞宻院者二年改行中書省于淮之西十年襄陽下廢省復行院明年丞相巴延行中書省將大軍濟江又廢院與是省合公以從戎捍敵應變倉卒益示暇豫未嘗窘錯故由書吏至令史數年不調宋亡明年積是勞勤官中順大夫遥授知英徳府同知太平路總管府事又明年改江西行省郎中宋餘孽兩王盗據廣海遣將給餽凡其征需動咨幕畫隨亦殄平十八年官少中同知荆湖北道宣慰司事朝廷遣使鈎考錢穀及侵牟者遂大徴集諸道官吏無慮千數于鄂省責公主計局其使善煩其令為藁甫定則一易之傍求多塗約束計吏于行苞苴公衆辯曰冊已具矣何至衆多為是持久不絶之務乎有絲髪遺罪請身任使為之止其不屈威暴如此乃歸計吏二十三年廷議以平南􅀦升秩過峻例阤公為朝列遷福建行省郎中以犯法臣隂楮緍十三萬定能正而不阿卒無所染明年以僧格為丞相為尚書省中書六曹悉以歸之而鈎考尤酷省臣而下或杖辱而閩中獨輕平未嘗若浙省迫人于死者南雄械賊百餘人為草竊者當死公讞之惟刑三十人他悉縱遣安溪賊連十五砦為㓂公諭下之省議茍下惟罪首惡至是下者數千人衆欲盡屠壯士分有其子女公㧞劒止曰省議云何敢掠取者論如律惟磔首惡一人大徳二年復少中大夫懐孟路總管兼諸軍鄂囉兼管内勸農事民蒙其利者惟竹始竹之徴利財自戊戍宣課所惟在洛西懐與輝舊皆民産由馮徳用為河南漕長以兩郡之竹妨其課利請官有之制國用司為奏可而禁之法宻雖其故主輒取一箇亦坐以盗數其節為布罰園傍之田民耦耕侵犯而出亦指為罪民甚害之官復謁園伐取竹日益耗而課入不除公策千部請令故主興隣地護守無禁斬伐惟責輸賦是亦復民産之漸也符下從之今鬱為茂草譙楼廟學有老弊者無不經理新完諸王妃主輕郡賦民术席為屋絡綵周之晝食夜息各異為所或前期一月具而不至民又守視不去去又官吏規取其物無所于訴公至製卉布為大幕容倍百人可以離合卷舒既便以輕載以十車之力送往迎來無不至所皆前政未為者病革猶卧治事卒于郡治仰崧堂之别室是年秋九月九日也年六十一夫人程卒以至元十八年繼夫人楊卒以二十有三年今夫人李嘗刲股肉􅃵進覬已其疾斂則斷髪納柩中示與同穴子五二十有七年長某舟死江中次某以任子為單州判官餘未仕女四長程出郭宗正妻今寡次李出適智某餘㓜銘曰崧髙詩言峻極于天維嶽降神王不時廵而公之先世家其下其仕其隠譜無究者及公之生珥筆從戎志期振㧞以立事功周旋統軍行省行院雖屢易至為史不變以才見留謀資其優逮夫濟江勞力大酬英徳太平遙領知倅官之中順副以金端尋于江西長省幕僚進而少中其秧益超轉而荆南同知宣閫奔走聼命踰十名郡例阤始躋朝列稍卑于吳于閩省幕再為後移内地理問汴省復其少中總管懐孟平生履厯其止于斯治兵涖民何事不為為則事治有譽無刺其于為臣亦盡其義其所卒地郡堂仰崧何公于崧生彼此終豈人之為造物者意歸安崧丘後昆以利勸農使陳公夫夫李君神道碑少中大夫嶺北湖南道肅政亷訪使陳元覬語其妣夫人平生于其友姚燧曰河東李氏有開國于金為金吾衛上將軍者子孫雖世搢紳多顯人人不目之惟上本其先曰李金吾云夫人則其諸孫陜令欽若之女先君勸農使將授室祖考妣規措公潁川郡君審于采擇聞夫人淑姿懿行布幣聘之夫人既廟見吾陳氏世緒絶逺族大以蕃先君上有參議提學奉職三兄善于閨壺脩職謹事舅姑孝之娣姒友之姻戚睦之而僕妾恩之咸曰非漸涵姆訓有素不若是以履度循法也歲壬辰規措卒天兵􅗴金河南獨奉職以詔使死亂他族皆完自洛之西徙家觧梁夙所居積蕩無遺矣㑹歲大荒夫人擷穭為糧然火照積以事潁川雖流離造次其故家遺風不衰平時三年而潁川亦卒叅議與張夫人嫂也事之如規措潁川先君叅某軍中或自軍所來橐之一錢尺帛不有之私室必歸兄嫂先君求得奉職二孤女民間夫人子過所生歸諸令門元凱生有三年不為天所恤以歲丁未四月四日卒年三十四葬之嶷山先塋亦頼天之靈獲託其遺體者今白首矣每悼夫人棄世之早前先君二十四年先君後躋位光顯不及同其禄而元凱之士則濡先君休澤者禄養滋不及矣今惟有表章徳美于是金石以慰靈下泉開示子孫于方來者猶或及焉敢屬筆子燧曰吾姚氏與陳同姓也燧之曽祖妣亦李金吾諸孫不知于夫人姑歟又戚屬也此燧不敢以不文為譲者勸農使諱膺夫人二子元凱元英英殤孫坤女孫二人皆有歸矣銘曰良農于穡天勤其力或報之秋秩秩夫人來殯于陳百罹艱優君子中道弗偕其老年復不脩何天隂隲嗇施淑徳貽子是酬持斧繡裳風紀四方民瘼之瘳為時聞臣人賢其賑誰異其謀夀母之子名不世齒泯泯堪羞剡首之碣有美枚列以表阡丘牧庵集卷二十四
