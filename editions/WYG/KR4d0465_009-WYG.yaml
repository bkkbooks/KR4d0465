body:
  text: 牧庵集卷九元姚燧撰記暖翠亭記九江為州居廬山之隂城有二阜焉其一在州治東南一射上故有亭邇南門則都漕公宇距堂西北無有三十歩軔其阜南北延而東西狭巋然獨荒丘辛君持使節来之明年當大徳乙巳而茗産諸河南湖廣江西江淛四省之地廣周且萬里之賦為緡幾九百萬半嵗而集人誦以為前政未有君以事治思有自娛其秋八月作亭三楹八日而成中楹東西為門相直北其墉而南其牖可洞闢以納廬山勝概余由洪江告老而歸首塗疾作艤舟九江五旬而始少間君集同官觴余其上由扁未名求以命之為賦歐公廬山髙辭而慨曰東坡公門下士也其賞公詩則稱滄波萬古流不盡白鳥孤飛意自閒萬馬不嘶聴號令諸蕃無事樂耕耘未嘗一言及是辭山谷坡友也獨甚愛之大書而鑱諸石已一異也其甚異者在漢甄鸞之測海島一立重表累矩無有逺邇而髙深廣袤皆可坐致其前無所遁形于芒忽韓公南山之詩亦復如是且其強韻險語實則歩驟北征然山谷又謂方之北征雖不作可歐之與韓特變其音節爾山谷親為書無乃譏其始作而媚夫繼為乎自後世推歐亦一代文宗是辭固瞠南山後鹿至叙巖岫出縮泉石窈深雲烟變滅之得于天禽魚飛沈草木蕃暢之遂為物道流釋子依居其下大為室屋以侈靡相軋由人力益致夫其秀者非巨筆如杠孰彷彿其全體能爾之盡兹亭取名苟外是焉将奚以今余與君属觴乎此為何時哉當建子月水火地坼而衰日暄融助為明妍浮嵐佳氣綿亘百里容容勃勃泛溢簷户之外豈兹山之英顯幽發微于賢主乎抑為病客而然也平昔之逰熟秦與蜀天宇之濃緑石壁之空青皆身至其所而日接焉角之以是無少退讓于時且然則夫春風方永之晝秋露暑雨晞霽之朝其位簁什伯不啻焉者可意知也其以暖翠名之何如君則曰善君名仲實字仲和號松隠其年日短至書於廬山太平宫易安齋記醫之為業有相道焉伊尹耕莘説築傅巖之野太公釣渭諸葛亮耕南陽之数子者其始豈有心求商湯髙宗周文與漢昭烈之知己乎哉彼四君者知有命世之才可與共天位故或三聘或俾以形旁求天下或見于卜兆或聞之水鏡三顧草廬之中身先求之深拒固閉弗得弗已彼数臣者由禮至情篤始起而應之是與夫醫者不求疾家而疾家懇懇夫我奚以異哉是一也與夫相者見時君任已貳而不專則解冠納履而去是與夫醫之為彼疾家不專主已參以他醫則卷其術不發藥而委去亦奚以異哉是二也其甚不異者古賢相之為治也必當天下阽危之際其君任之信之成焉由汝圮焉由汝而後為相者始自任天下之重展其所藴措幅貟于天下四維之安天下後世誦之曰彼相之才能易危而安者也夫人誰不有疾非必委頓之劣而後為危凡小不康失治于蚤者皆危漸也為醫者惟疾家知之仗之生焉惟汝死焉惟汝而後始敢盡其搦髄擢胄剔蛇斃丈之枝如扁鵲華佗之為而易危為安范文正公之言曰得志願為賢宰相不得志願為良醫其真知言哉醫師趙君濟和鄧之良醫也秦和古之良醫趙君字和其尊其名者已與秦和者符况其讀書多以以濟其術乎其君有亭故扁以易安盖取晋陶淵明歸去来辭也或嫌與婦人李易安名同謂余可更余曰更不必也變去為入聲讀則義意自異矣余思醫與相皆易危為安者故以是諶之然又思余不難于徒居而難于其居之學無師友而疾無良醫焉今穰城有濟和求吾身之危将託以易而安者舍之其誰賴于二者之中先有其一矣朝陽洞記穰秦魏冉候國也余所寓西隣王工部景韓園邇于城西墉因鑿窟室樹桐其東暎蔽朝陽余嘗過而逰憩其中為賦大雅卷阿之辭曰鳯凰鳴矣于彼髙岡梧桐生矣于彼朝陽又聞鳯鳥見濁世之險微無徳輝之可覧翺翔千仞而不下此賈誼所以重歎夫屈原之無時也然由書契而来至于今唐虞夏商周五代略而不道視秦漢晋隋唐宋六代之一家天下者若皆慚徳于吾元亦人生曠世所難遇者而我與子沐洛太平斯洞之中則所際為何時也且漢之中宗未為盛治其時猶致五鳯之集顧于今有不可得見者耶然鳯凰棲必梧桐黄帝之時蔽日而至嘗止東園不去則固致鳯物也其後重華臣禹翦嶧陽孤桐張而絲之為琴瑟及八音倫諧而簫詔几成鳯凰来儀若然則翦桐為樂猶足以致鳯其封溉是桐以待其止或不能致其翦桐為樂以待来儀二者或有一焉是二吾君于黄帝重華也誠及見之余雖老尚能掦厲天休播之金石詠歌率舞以沒餘齒斯區區之幸願也如終不可致天其或者使景韓出而遇能一言而傾四海之聴如古人之鳯鳴朝陽逾美矣奚必飛鳥之出類者始名鳯也耶康瓠亭記金石為物至夀者也夀之極上止三代九鼎淪泗而夏金絶石則無先岐陽之鼓故金始商而石始周則金又夀于石所曰三代者實二代耳余晚無所嗜惟得二代彛器則喜而忘寐行隨而坐皆與之接若多聞為益之師友焉若至親甚宻之晜弟焉其置也褥以文錦櫝以髹漆一不役人而惟身之猶以為䙝也嘗建一亭名曰康瓠而特居之于商則殳丁卣父辛爵禾目鬲周則屈生敦台夫鼎麟鳯罍惟罍無銘以飾命之猶恨厪辨其世不知為臣何王何人先之也漢之鼎壺洗鑑鐎斗鐙鑊方之六物猶王公之皂𨽻故亦班之下陳或曰賈誼所謂幹棄周鼎寳康瓠者譏賢否易處賤尚貴也君之商彜光輝出周鼎上寳之乂極其道所以使君怫鬱斬冤而清寂山林者職此孰曰玩物者非君為道之賢乎何至誣一世之人而詬二代之器矯曰康瓠余聞而笑之子必以陶器為康瓠故宜其言之膠膠余有感而云而古者製銘如卣曰敦作殳丁寳尊彛首字未詳盖殳丁子之名也敦曰屈生始作寳敦子子孫孫其萬有年用享如在或以継上或以埀下類非賊國之臣覆宗之子所能為也必世家鉅室有民與廟諸候卿士之賢哲二代諸侯卿士之賢哲有民與廟為世家詎室者何啻千萬人求其豊祀而儀享者将不人作一器而止于宜乾瀋生熟殊用而異施者莫不畢借而悉陳之有其副焉則世雖有二三鉅萬為数不足夥也秦惟務除先王之道其禍豈專于燔書銷兵為金人鐘鐻者未必無此吾何以知之宋景祐作樂銅不足充以寳龢鐘則世之發諸荒祠敗塚之間售之窮鄉賤肆之下而毁于野人鼓于冶工者又可既也耶今名賞鍳若余篤者世無百人惟嘗柄政一二家積多至数十餘皆一二有亦有一無者以吾所有六物均之世無数百其盪而無迹者曽不如康瓠之百礫焉然則今所存皆康瓠之遺餘也矧是六物㔽梁㫁而爵折戈鬲項穿而罍腐臂鼎盖亦缺康瓠之兆形矣惟敦完然而猶重衰夫屈生而子而孫用享何人如在安在自夏至今三千餘年而九鼎淪泗者千六百年使後是之年如夏至今則商周之金悉為九鼎能獨俟夫萬有年耶余感如此以理要歸而命之何誣乎人而何詬于噐其曰職此而怫􅉱軒冕清寂山林以玩物資為道者真若髙識所燭焉赫羲亭記人莫不有嗜其甚有志者能克純于暫或不能必終身之不蹈焉雖大賢如程子之好獵既嘗庸自克絶自謂已忘之何終吾身又質之其師以鬻學道之進周子甚不然其説及後遇獵雖不與馳逐其心猶躍然喜者存以以周子為知言自今思之獵之事如影之于日聲之于耳既遏而無可尋之迹猶克絶難忘如是况金玉珠璣為物目視之而有形手觸之而有質可以貧人可以富人其利者大前乎吾身而存後乎吾身而不忘其夀也久人既已嗜矣一旦驟然欲克絶而不有之誠難故嗜而積積而至于詎有而人嫉者衆以及于及于禍法書名畫亦物也嵗久則為敗縑壊楮不得不足以為貧得之不足以為冨嗜金玉珠璣者弗顧也雖賞鍳之家求之得以彷彿古人遺意于千載之下雖聚有之而人不争且無禍焉斯非嗜之可為之一道耶余白首来亦痛自戛去此習故于已之甚愛者人或欲之略不留吝箧笥中無十年物可謂不積矣然見人尤物猶時有覬得之心或發口以求嗚呼嗜之賊人也如是乎哉是可謂終吾身不善克絶者之戒也余故有右軍三帖皆出宣和中秘以姊告安和者畀馮憲副夀卿今又又以遺書者畀張縂管夢卿其所存者子鸞而已嗚呼是書也姑率蘭亭永和癸丑退数之以及至元戊子為九百三十六年如曰非真皆出唐􅎔亦五百餘年物也俱可為兩公家法書第一夢卿儒将也其用世才有聞于時年甚盛其事業方水湧而山出非宦成退居託物以怡老玩必敗嫌壊楮之間者也去年自湖湘行營得告歸展先墓即其第省齋為亭東偏求名余思晦庵嘗書湘西嶽麓之頂曰赫羲䑓後至彼為不足以當之将移之雲谷然赫羲之文實原屈子騷經余爱其雄偉嘗名余長安賜第之楼又思彼嶽麓猶不足當易為祗芳今輟以名斯亭而義意思焉為疏之曰羲之右軍名也赫者草明較著之也将章明較著右軍之書于斯亭固可名赫羲由右軍之書而斯亭之名益章明較著亦可名赫羲是亦蕭齋寳晉之例斯得齋記南陽醫師劉君大亨有齋如舟来求扁顔書斯得歸之懼未逹其㫖也又記之曰舊疑叔向譏子産之鑄刑書為非夫作士如臯陶可謂曰能而虞書不曰象以典刑典即刑書也不有所垂示何以使人知避其犯後聞先師談筮謂昔子師可嘗疾診證宜餌峻劑而心猶豫拂蓍扣之遇噬嗑之上九曰何校滅耳凶或者曰弗善也我則曰此罪人斯得之徴飲是而愈燧曰嗚呼世亦有悲有師以疾為罪人方為刑書用獄如醫者乎醫乃生民司命弱者恃以強脆者恃以堅危者恃以安而天者恃以為夀也惟施治神巧使疾不測所禦故能如罪人斯得而昧者為之顧使疾先得其為疾之淺疎肆而侮之遁刑為罪于所攻不及之地以不可必得故先師之詩曰醫能宛轉深求病病亦間闗巧避醫夫為病求愈而卒不愈職誰之由此古人所以有藥石入喉甚于莫耶之歎也且莫耶為物非能自躍而前以殺人必有手之者後世以春秋為仲尼刑書誠律以是為㫁則為法受惡而手莫即者誰耶鳴呼可畏哉然又聞斯語辭也風雅頌咸多作思則思者亦可同斯乎盖天下之事其理則具于吾心弗思則弗得矧醫于疾尤欲致思則思得者斯得之基而斯得者又思得之搆也今醫之居藥市惟知招徕求已者之衆貪得而泛應以幸為利率未暇深致夫思安求能斯得乎大亨非其術可服輩流孰能推而先之以師是州人者服而推而先是州必其為術之宻而善為思者古語有曰官怠于宦成弗思然也醫至于業進而名著亦宦成矣其怠而弗思人情同然大亨以余年先而来有言余可為佞惟稱其所長不進其未至乎故是以警之大亨于醫言将藥石之歟莫耶之歟又在夫思之斯得也學稼亭記孔子之言不可執一求學者由之不可執一居樊遲諸學稼出則曰小人哉樊湏也南宫适問禹稷躬稼而有天下出則曰君子哉若人夫君子小人所以概終身沒世善惡義利極致為言或曰小人細人也其不相及亦不啻什百而千萬而乃進适退湏如此進而君子亦可已矣猶以為未然繼又曰尚徳哉若人豈于稼也學于今者為非而躬于古者為是乎豈湏之問也以已小而私适之問也以聖人大而公乎嗚呼聖人之生徳天也知不知之人也盖當其時雖不尤桓魋匡人之莫我知亦未嘗不與儀封人太宰之知我况湏适日親而月炙宜時化而嵗遷者其知我益非儀封人太宰之可與其莫我知又益非桓魋匡人之漠然不足尤也使湏聞吾不如老農之拒有禹稷躬稼之對意在于知聖人亦可得君子尚徳之稱顧請學圃為問愈下殆于适什百千萬而不啻矣雖然湏事聖人猶子之事父母無隠苟其心所未安必将辯而求義理之真是不憚見拒于聲音顔色而止故能自拔于三千之徒終厠七十二子之列與适也並其困知勉行而後有至者歟吾故曰言不可執一求其學者由之不可執一居者官使然也且官以農為名而曰吾學稼之是羞教督之不先也藝樹之不勤也銍穫之失有秋也使千耦之夫環視其授法如此曠怠而窳豈惟大農他日隨以不恪之殿就曰無之亦非臣職可一朝安也盖君仲修為丞屯田南陽之東穰明年市牛課僮墾莱疇盈数百畆視日晨昕以作止止候時寒暑以趣發歛以一身為千耦之倡故嵗入増多諸屯即墅為亭余榜以學稼所以著夫善其職也雖然視有若可易而事實闗世道之大盖天下之民去南畆逰食擇金玉之易特逐逐於販夫販婦之末岡利相穰于市路而較錐力者為日已久是以錢益輕物益重廊廟恒低估改幣以救之其勢莫之能止也今守令之近民者孰不兼官訓農使聞其風者人人如斯人之善其職亦不可以少復本冨而衰澆風乎仲修由嘗受學今太子賛善劉君夢吉是以始政知所先務天寳壇記壇之名肇于書而詳見于周官書止曰為三壇同墠周官則曰為壇三成疏者曰一成敦丘再成陶丘三成崑崙丘至太史公封禪書曰三坎釋者曰三坎豈三成自趾而升三坎者自顛降即後世為壇必皆三成其取法此又病夫藏祠之時或風雨害其行事也為屋覆之天寳之壇恵慈利物至徳真人作于金亡其時汴南倍百里與宋錯壤小大城皆戍守諸将争撤汴宫資材為楼柵故恵慈得摭其所遺而汴之守臣捍者不彼之禁專視是宫委積在目捷間利将奪而有之適道流族居者且数百人彼憚與闘而止為道流者猶心且覬之未止也益急其夜則燃火構之與通明閣作于一時故故閣上下四周未門壇礱石為之上清宫故物徙置乎此門楹皆未丹盖牽于他營而勢有不至者餘六十年矣資徳大夫參知政事朱公清行省于汴謁而太息謂崇𤣥誠徳洞陽真人曰大哉役乎不因于前也不取材于國也不藉力于民也皆方外之士親寒暑于其肌膚撙衣食于其口體月積嵗進而自為之良不易哉凡今壇閣之未竟役者吾思佐之乃戒其家髹沐之工市永錬朱即儀其門将百闔盡丹壇楹閣門惟丹其陽他方皆墨最其直可萬五千緍提點孫履道由徴朝元宫銘于郢為燧言此且曰公之言曰吾故貧賤宋平而始官賴先聖今聖之徳致位将相吾亦不知吾嘗所由以来義不可為不可得吾銖兩于所宜為丘山之失不爱焉自我得者自我盡之不猶愈于鄙出而力守甚爱而厚蔵一日子孫不能有皆歸之官耶燧曰嗚呼是皆熟于世故明理之言可謂積而能散者也然自惠慈之逝經文醇徳懿知常與虚𤣥應物通和兩真人而至乎崇𤣥凡四人經一甲子以待公豈㫁手有数耶使公初無是志而有求之言出于崇𤣥之先公亦未必滿其應崇𤣥無有自言出公之誠非崇𤣥之徳足以動人亦不可得其所捐若是之多目擊心傳其相知與為何如也又聞周廡尚有缺所公面促其基之豈佐竟之志不已是耶可筆也太平宫新荘記真君殿碑盖龍興據其所見而作及以疾歸留宫踰月與身見而言傳者或異遂更訂而丹書之既入石矣猶有一遺其曰始田履畆纔及三千金萬有竒若合其舊為一而言今則不然由沖静真常凝妙法師湯君提㸃之宫録江州路道教之後之致者獨萬有一千其道有三曰貸取曰施入曰力作余歎其用志之確親勞之多無文以彰之世烏乎知為目其諸荘與地在所及其施入之主之名自多衰之以及其寡今最貸取三千六百五十惟石門千三百八十為多其不足是者啟石二百八十錦溪七百五十石塘九百一十龍岡九百六十上龍溪千一百三十惟啟石居興國大冶餘皆江之徳化最施入者五千三百五十惟翠麓二千二百為多髙岸半之元山千二百萬安千七百福興千七百四十趙陳二千一十惟髙岸居興國之永興山元居蘄之黄梅其故主則厲堅孫項至大餘皆江之属縣翠麓湖口萬安徳安福興彭澤趙陳瑞昌其主周恕胡榮吕師山則福州路同知者與齊永年云力作者創茶磨四所凡四十二盤于徳化荘曰義興又墾田二千肇為五庵宫之前三曰東西太平與紫元宫之後二曰湧翠􅀈峰其始皆菅茅樸􅈪衆所薪牧之囿皆募人錢鎛銍斧而出髙蒔松杉栢茗皆摘實桵子畦而苖之移置其地下種薑芋藷茜與水可勝稻者皆令募人有之其利不入公宫以勸夫未至者余聞之肩輿歴至其所而覠焉經始久者方五年近者一嵗而木之布列岡阜新者雖沒草間而生意茁然久者已離立如人将数萬本其畦而未分猶盈畝焉篁篠則斬梢而不傷其鞭畚故土取諸他山為箇不可計意者倍蓰乎木筍已叢出其下特未林耳君登髙丘指宫林以相語曰聞之故老之山始亦榛莽如是吾所材而用者皆基先民今荒山可芟治者猶或数里天假吾年而為之不置可使盡闢百年木皆連抱後人以資治宫亦吾于世生不虚也余曰嗚呼君之所言正古人所謂人棄我取本富之要也迹是為心何事不可為何功不可集宜人之動盪鼓舞割所爱惟懼施入之後不然彼其家田民賴以食其力者也将以尺帛斗米遺之猶戀嫪移時呴呴然收恩而後以授况是連阡亘陌非有動其心者能然耶余惟久此又聞其将大衆之法道流非有故不入田民家民之入錢取薪炭山者皆給之劵恒遣力人持挺行邏林間盗采者有罰錢穀出入井井有稽㫪磨之細不遺糠籺公宫大庖日炊米十斛可食千人其徒皆就食公堂求必道服以示不䙝職宫事者各有子院有釡鬲不作飲食待翥茗頮水之湏其僮奴之守舍與諸庵逺在数里者為飲食皆日賦之子院不得設塑像旦夕惟即瞻禮于余余問其然則曰子院強則公宫弱強日益富則公宫日益不足不足勢必下求子院一則應再而緩三則柔者徳之以色剛者拒之以言上下之情寖矣不若同甘共苦以公宫宫宫所􅅒養之為可恒也嗚呼他道流能逺計若是乎嘗與一二知己私竊評之白鬚蝟磔有熊豹之姿已見其力足任事加以深沈有謀寡言而信威而和誠而恪視数百人王童白叟約束如一使不為老之法用世而為将帥可以進退三軍立勲萬里今顧為九江黄冠師枯槁山林已是也耶因叙田及此君名徳潤字季玉號香澗其左右君靡朝以夕盡其勞勩忠于其宫同成功者中外四十九人絶諸殿俾可考而知嘗觀漢費鳯韓仁諸碑書多不滿石或三之一或半焉而空其後豈待夫嗣有所書耶故余例之亦法古之一也儲宫賜龍興寺永業田記史稱後漢孝明永平中由夢金大遣博士遵自乾竺求迎其法至函夏或又曰在先漢孝武世驃騎将軍霍去病過焉祁山得休屠王祭天金人則後世範金像佛者實其遺法至唐藩鎮趙王鎔為大悲像于龍興寺具千手目髙七丈三尺以語其大九圍之間無有與京為閣三重五雷覆之厯宋而金補壊為完易舊而新者四百年元貞始元端月八日午時儲皇猶未出閣金岡上師丹巴開長生講修畨漢二疏領講主明公住公僧判迭凡巴求主寺之功徳皇上立極既正元良明年至大之元辰在戊申四月十有五日乃為下令割真定属縣獲鹿𨽻震宫石同北魏劉三邨與官院營之田五千畝賜為永業資開講席又舉太祖太宗世祖成宗四聖成訓凡僧道伊囉勒琨以名與國祈天永命門徭田稅既屡蠲復申飾兵民之官驛傳之使諸郡之臣自今水輪廐馬在野之墅在城之肆是所業無敢千騷祝髪之徒或恃有此肆為不度岡知所畏者則入畏矣明年三月俾翰林學士承㫖姚燧為文刻之石燧亦嘗思惟昔儒臣于弗氏書臻藴奥凡為寺碑必能概舉備言不法燧性顓蒙于周孔書童而習之白首不知其源矧于佛書未嘗一望其塗涯豈敢妄謂曰知然以壓于儲皇之命不敢禮辭故惟即夫賜田以言盖民恃粒食以生彼學佛者苟無田自業勢必見求之人積日而月月而嵗民自有仰事俯畜其家且嵗或豊凶亦安能衰其所有久應其無已之求此諸山無田之衆所由以聚散不恒也今有賜田盈五千畆率以夏秋入止一石當為穀五千姑大其耗糠粃四之猶得精鑿三千日人賦升可食八百人以一宫居而八百人者交無身口之累夫誰力哉其不開講席演法言與國祈天永命者又将何為雖然猶有穽民者存不可不預言之盖由溝洫畎澮之制廢天下無有畔之田必與民犬牙相錯末世衰風讓畔其誰古之人防其訟也既明劵契且書所有質劑于宫以待異日可恃為徴如是又私于界表石以識又虞可轉或十百歩椓􅍻地中穴實石粉計亦周矣而猶不能弭人之争矧是賜也東西南北必畔民田祝髪之徒将奔走服勞錢鏄未耨務盡地力以供嵗事或如弈人布施于局稍蠶食之利其寸尺之畔而資侵以耕挑釁交惡怙勢力取則民将奮起而致死以訟矣今文之終戒者豈在是歟其年夏五牧庵集卷九
