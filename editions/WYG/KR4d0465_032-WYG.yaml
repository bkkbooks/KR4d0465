body:
  text: 牧庵集卷三十三元姚燧撰賦烏木杖賦去年史仲威得烏木杖大經尺髙可過顙嘗析一杖遺余許為賦報之其秋仲威疾歴三時未勿藥也今年余生朝使人肩木之半相夀且促曰吾疾於以嬰綿者豈思不償賦致耶不佞誠得一誦其辭或可釋杖而起矣余動其言而賦曰或曰炎海之山珍木産焉金為之聲石與其堅魋結伐荷投諸瀧淵依居蛟蜃潄沫濡坎嵗月俟之化而為𤣥要出人為非得自天此島夷假以售利於中土之微權也抑齋聞而笑之曰昔賈鬻鞭梔蠟其膚市者一濯已呈倉枯胥是黝材裏表一如從可占知廼受形其本初者也胡子以由彼而然乎今夫中土之山有衆其植斧取觀之内各異色樟作稠文杜棗栵赤檀柏柘黄蒲檭棫白與爾高里遐裔絶域瀘嶲杉紫儋黎沉褐罽賓雞舌相半白黑一隅斯舉三可反頤敷度品之爛爛果熟深淺濃淡萬不齊同令人感之欣心悦瞳問誰為之能然皆著妙於化工夫其見諸荷葉之外者如此又何惑理質於其中㦲且水火之赤黑不一其色者雖童子猶能知之至語其相賊而為用有戴白之老所未思維勇能知之至語其相賊而為用有戴白之老所未思維男丁之婦壬實雄黑而赤雌始若離而難馭終為夫之所移今其色之幽幽廼昔赤之由基是何資於逺臂只煬竈亦可闚彼炎絶而烈者熖也其烟液為煤必黔而緇因以曉夫巧繪之棄鉛朱亦懼其既乆漫漶而為黟又以信道書坎盛之侵離也不然南服之􅀈祝融之宅也敵金石而焦流蓋火熾之已極非盛其水以滅之則物將不能以生活故伊人之睟面不渥赭而深黑亦火色索藏惟獨見夫水而已矣其木理之如漆者又足惑乎哉史鰌之孫其畏可象析而杖之奔走相餉輟矛廬於猛士配几屨於席上試扶衰以其䇿觸𤓰甲而鏗響以卷鐵而含簧陋栁侯之為匠必求同於所異纔黑蛇之彿彷噫物之變化不可期兮猶足以乗雷而騰往也五言古詩寄王憲使立夫庭樹生秋風炎熾奪如失小蟲鳴喓喓髙隼飛鴥􅀈緬懐素心人若髮未忘擲百年能㡬見過眼徂電疾而君有官事出言千里律何暇喜蛩音情與逃空一昨因趙卿至戒遣書新述篇軸不害多無憚費紙筆且約來此州罇酒留十日晴天逼佳夕共看華月出非不思餘論門無一新即吾私如汲車已脱復榮繘晚菘生待種早稻行可銍少湏黄花發秋風亦蕭瑟倒冠獨山巔兹遊或能必次韻閻子濟二首我友宋僉憲頗風思湘中每云所遇奇未易言説窮崇蘭春風花巖桂秋露叢三年一官内身在香國東朝航汨羅波翻動海日紅暮揖嶽麓寺蒼烟樓觀霳喧喧名都邑百貨聚商工何時訪君遊盡歴西南雄霜水收風濤江船穏歸路惟應江間月照汝來往屡長沙隔南雲尚飽艱險􅃐天涯念棊錯暌闊皆舊故新知苟㑹心何必歡有素黄鍾未懸業衆目齊瓦缶大音故希聲欲説難至户况我言毛輶誰復聴其句所恃君盛年學仕猶未暮丈夫重道義自足輕外鶩觀今紛華儔愠喜隨一茅愿終藏山書榮於鹿鳴賦寄徐中丞容齋李侯安慶來遭君江間柂問云歸湍水示聲偶及我自揆哀鈍質舊學日兼墮百事於大賢資取無一頗始疑逢䝉弓亦有虚發笴終知匠石材斧不捐瑣瑣増慚失喜餘覺得觀藻火况聞閑世故盤走夜光顆仰止親友間屡得觀藻火况閑世故以盤走夜光顆仰止髙山思願並餘子夥歴推天日行蟻右風輪左吾徒不相值其故正此坐何時廣陵遊傾葢愿終果寄岳教吳忠畝我友右轄公人物慎臧否獨于甌閩士推心一忠畝勝國已太傳椽筆入其手用之敵千將可㫁姦窳首一軓名始北上徹宸纊黈蒲車嘗及門竟以疾自守不使橋門觀執醬餽黄耉余聞敢藐視日月藏心乆秋風歸天岳有綰州學綬堆盤青青橘求薦傾葢酒何人天壤間亦數牛馬走問知為髙賢重壓丘山負行年滿卦數不見顔狀叟翻比少九齡衰悴先衰栁只看形諸外已卜内所有如何辭萬鍾反就禄升斗無乃仁人心終結一善誘非有金鏞徳安應小大叩且温右轄語通誦或盈口因知人有媒言出隨好誘豈但資娶妻亦賴用擇友不期一日中三接杖履後甚欲進所業一嘗恐輒嘔至今貧賈肆深櫝千金帚溮泉聞悉心亦誤見私厚諷讀登阿篇明璣照軒牖其稱媚天子例必登拜受鄙言何足道魚目辱兼取敢不先木桃旋期報瓊玖挽孟商州元亨六里商於山而子往倅之人嘗隘其色霜蹄跼權奇所欣多曠暇得以放瓊辭城闉四皓墳下有餘紫芝長吟薄采采薦以松醪巵娛樂豈不仙久此夀奚疑如何奪善地調降華判卑方聞有力儔揚譽於雲逵佳城鬰厚夜白日見無期因傷先待制抱業既未施積燾冝及躬年位亦如斯覧古事每爾為昌來者基秦藩官聨曹生别且長思雖余後聞訃宿草寧不悲春水清漣漪營魄今何為挽甥壻趙商來扣門袖出史侯書開緘愴惻知汝已𤣥是閭是侯太尉子兩嘗妹壻汝汝視則婦翁見訃語豈虚有疑讀反覆不見日月初汝昔似猶子嗣業文貞餘文貞今留侯乏世理可嘘吾甥顔蕣豔令譽由閨居及婦劉氏門帨紛結華裾其姑况難事厲色嵗一舒前來已子生在亡未知渠兹焉抱􅑏嫠茹苦何日除南州穰侯國臨湍上髙虚東望酹一觴老涙血漣如呼魂逺致否已矣何言歟京師病中六首埏土以為桮小大不異形尺箠以叩之千百不同聲耳去囙能㡬同異乃爾争二物于吾身受形與俱生云何一易地聞見皆聾盲况于六合間擾擾羣黎行妍醜既殊狀賢徳豈齊情區區豈門交心曲安可明膴仕初足華終竟外侮嬰人云禦之䇿惟有要歸耕古人不若意得酒以自歡而我不能飲安敵憂患干卧病两月周日夜防庳殘神州桂玉地富室居猶難三千里外身驅率就一官吹灰終不然豈但枳棘寒囊空到稱假豈能乆盤桓又顧穰城家新立四璧單小兒雖善步神骨尚未完吾家三族中慰意獨此看思之腸九廻何以生羽輪少年厭治生但慕官爵好騎馬雜高葢奔走長安道雖有良田園廢没但蕪草及為荆楚憲盡室辭豐鎬登山復涉水往費尤浩浩黄金火消氷質賣無一保豈無升斗入喪失兵山倒滄海去悠悠白日行杲杲朱顔化顦顇素髪辭蓬葆今年四十九知非殊不早稔嚼世味薄滿口木膚槁入云豐城後接武瀛州鳥安知走朱門惟去是求禱朝允暮載途南土甘投老買完亦已得求田不多寶此邦衣食易宜稻及桑棗時節勞農苦對酒槃一考與汝車上妻從人喚翁媪束髪慕𤣥理佩服三皇篇千周粲可覩不受天老傳得此西南朋飛龍亦潛淵神哉中夜氣使我沉疴痊如何負道徳亹亹區中縁誓將脱塵鞅庻永桑榆年寒風振虚幌蘭膏淡無姿披衣復撫枕傾耳候晨雞夙昔不成夢撫然嘆吾衰盛年苟無聞光景忽若馳欲為流水吟朱絃為誰揮恥從季主卜將與陵陽期古來方術士越人與長桑採芝鍊五台繋肘皆神方伊余抱微病湯液已徧嘗斯人不可見反側心煩傷倐悟養生理静極神明康致物以却老嗤此竟渺茫平章亷公挽章嗚呼平章公懿質天所性氣鍾三光粹量包九澤净加以資閣學寸晷如與競不有斯人徒孰佐天子聖山立當軒陛侃侃言議正蒐賢及耕釣巖藪沾幣聘十年泰階平四海弓不㯳奇才􅃹簫疋餘子非季孟事隨乃來毁輦轂奉朝請名園平泉比若石不可性門前施行馬外物軒冕盛相過盡慈伯聞至倒屣迎清風佳月夕劇談雜觴咏絶口温室樹肯干蘭省政屢典千金裘好客逺慕鄭焉如靈䑓上憂世常炳炳天下尚可為惜哉司馬病何期龍蛇嵗夀僅滿知命憶昨訃下初逺近聲涙併胡夭陋巷仁反福東陵獷巫陽不可作百載生不更豈其黔嬴遊黙運元化柄其栖景星鳳出為斯世慶將遂為明神山川主雩榮蒼蒼髙在上此理幽莫鏡優孟效叔敖猷足楚人敬况公自有子毓徳宜爾令不見提刑君氣岸殊毫勁秋風鷹隼厲肝膽裂裊獍他日霜瀾平動業未可竟一門周司徒竹帛看輝映時苗留犢圖君子中庸貴不行專怪高嘗讀禆官書抵掌嗤時苗生犢當去縣還汝故主牢得妾以其子冝往何所㽞理在不可推如瑟柱傅膠畫師㫁章耳意取警貪饕貌為盈尺軸丹青爛生綃二十餘七人妍醜兼耆髦目既殊盻睞手亦異持操或戴爐炷香或捧巵薦醪或擁扳㐲揖或撫手逍遥或結領竚思或左顧有求或岸巾爪額或拳拱倭腰或賞彈指嗟或戚反䄃號或向緇黄列致辭前不休或含春風姿鬢髪雲為翹仍攜兩童女芳年未蘭苕婆婆輟緝麻倚巾顔弗妖或荷槖鞭犢或弛擔挾輈可傷轅下牸滿脰黄鍾牟忍割䑛子愛如彪念楊修凡此舉隅耳曲折態豈周名不著為誰代可必前朝位置内供奉無乃王雲曹憶與三害圖髙下不相超所恨百里侯骨相尋常流不見操介介盎睟容昭昭以是方古作如武羞箭韶余評法魯史功罪不少饒詩拾畫記唾僵走追韓豪已架屋下屋他日從人嘲萑葦嘆瀕江不可禾嵗惟蒹葦茁青林無端俔永與江水匹由為薪蒸恃責以租賦出國人誠貪天苞苴黄金鎰暮夜鑚權倖入牒妻子質輸課或未償没之良不恤他家豈辦為得者皆富室秋風霜霰落百穀時已實處處傭干夫豚酒健力銍稇載向城市官外私羡溢遺滯狼籍陳入者必見叱或因取束藴隨以盜采律春風將新萌剪伐未十七下䇿付一炬災火赤天日坐視煨燼空不丐氏貧疾因推是為心可見無仁術周官行虞禁為法未爾疾亦已開利源千年誰能窒舟中落梅折梅天門山含白未舒蕚東風登艫去一笑破􅋃酌嗟汝如佳人賦命所向薄縱抜榛營蒙還持媚蓬弱方彞縮頸脰借潤江以勺固乏水月奇復避霜雪虐曉芳惟衣襲夜影燈與約相攜千里行十日春有脚開敷既爛漫理亦冝飃落正愁鄰穡姝横玉裂纎弱遥應故山樹縞袂已寂寞紛然委泥塵無此藉茵幕却有和羮湏勞求到巖壑幸否相倚㐲世事安可度益感先民言貴賤隨所託書懐二首南州仲冬月天氣如春暄旅貧無衣褐差使卒嵗温矧又稻麥價倍屣賤都門不待付千錢翠濤㶑盈罇瀏瀏水泮氷舉網嘗鯉繁蔬茹不塩酢旋結青青園謀腹易為飽足頥道義尊地偏席門外時有駐髙軒華簮惠以句欣賞難具言已可慰離索適我從弟晜五馬近守格思往三日暾考槃在兹録吾駕無回轅麴生素狂士濡首相禍責誓言逺絶之麴生愠見色前陳君處世簮笏已雞筋貧賤交熊薄獨我時在側既通知舊好亦復文章力衰顔借渥丹愁壘助攻墨論功尤小小况有大此徳君看無何鄉與彼華胥國百年㤀樟夭萬事齊失得是邦去人間奚趐路千億非我導之往君安有羽異不知何所負而乃見猜愎君誠中道棄以無他人迹聞之始自由前語吾其食愿終平生歡相對怡朝夕送朱教授野翁赴都下江東窮秋月風露已凄清侯蠱息沸響朔鴻喧哀鳴壯哉騶人子裏糧事北行都門于兹時飛雪九衢平市求一􅈢腋委擲黄金輕廣文先冷官未愁與寒争况恃身上衣手線留縱横不湞更挾纊襲可春暉生但愁觀國光牛後羞羣英長安足故舊朱輪照華英蒐才佐昭代不遺一藝名譬彼求玉人路無棄連城夙料身未至薦剡有飛聲藉此一簣基旋觀臺九成相摰或見問為言親􅒱榜晨夕几間書從促衡石程無庸移文至始反北山料題姚嗣輝南榿堂彼榿有土性生植惟峩岷欒欒干雲姿才與樗㪚鄰匠石過不睨煬夫取蒸薪所貴故山樹寧知世莫珍一别十畝陰清溪俄㡬春華名堂楣上如對故鄉親請事小弁詩桑梓亦惟寅盛徳古自卑木惡何闗人不見樗里疾智衣終相秦君才負棟柱未許溝㫁均無以榿自期上孤明堂晨送梁貢父尚書使安南詩并引貢父吏部交予最宻以年偶先嘗兄之較其逸兄絶塵予輩皆瞠目乎後今使絶域賦長韻以送之茫茫今皇輿歴古彊理褊溟海無波洪喬岳絶巘萬方方争率職象胥不能件如何南交宅琛貢走藩衍中塗俄負固至爾勞率遣崛强尚于争為職無已淺聖量終含𢎞恐彼宗社殄前迷許新之未忍再禽獮新閲庭臣中誰可銜命選曰汝曹吏書是境嘗入踐更往喻斯㫖首鼠疑必免君聞拜詔臣技等鷹犬惟所縱使之以綿力猶思勉仍命百僚右相率華飲餞鞭馬辭神州遭我乎漢沔鼓榜壯于役未兒暇女泫以聞陳王氏學以䆒墳典欠物知慕華舉格已解辮因失事大禮無媒自求戬君至敷利害亹亹專對害正如沈如人發藥得和扁必感丹扆衷偕來覲旒冕白雉隨以入黄屋亦席卷何減陸太中儒生服鄒兖璽書入南越坐屈尉佗辯但之槖中装歸路千金輦功成貌麟閣行帛日星顯多少前便儔垂頭視人靦雲東樓君家雲東樓未暢昔所題問言雲之東下有吾東溪翩翩多諸黄玉槊華簮齊無因我其舍屡容躡丹梯于時十月半風雨號䨇凄八荒同一雲豈辨東所倪平生東至地愈望溪愈迷但爱樓中兒鴻序參差低大兒行酒觴小兒盤粟齋婉孌膚玉雪嶢嶢頭揷犀門楣已可占奚由墜塗泥且歡盡今夕明日當分携歸舟何所逐逐泛並鳬鷖雲東樓中林竹裏䨇鴉啼雲東樓下花移芳滿城畦雨皆思君物凝望雲東悽每壮高意氣門馬常滿蹄誦我雲東詩囬首還雲西田氏樂門堂憂樂惟聖人萬古無小蔽所樂乃樂天其憂在憂世不悖可並行譬彼巫醫藝巫云疾當元無日中野瘞為子猶拜醫懇悃求投劑巫者由命言醫則以義制萬事天人雜略不相鑿枘後人昧樂天顧託門永誓揆道良不可忘君自為計一塗或庻㡬奔競差可礪田候非楚産今卜宅三澨良駟滿千蹄連阡未稻翳考槃願止此暇食誰之惠豈惟憂世忘其樂亦已細南風随華教堂扁託書𨽻已有雪崖筆妍壮安敢儷翻思漢諸田實出重華裔吾姚源為汭循本皆同系平生未傾盖深言應速戾要為兄弟警慎莫輕裂眥作詩至元年十月戊子嵗題肖齋覆瓿藳至元戊子十月上澣余啜茗肖齋偶見覆瓿藳漫不知何人之詩質諸夣卿始得為渠作持下帙歸再日反復䆒觀古意踈暢洞逹近體清㧞竒警有作者風實足起余為次首章岳祠韻以見推服之私其詞曰將種張用道六籍窮軻丘矧於前人光克對實無差清名海嶽著亷潔氷露修惜也藴未伸封猶千户候興移登石廩萬象供𠖇接東睞扶桑波北瞰洞庭流一杯英皇弔為洗蒼梧憂重華老南征其故難詢諏復思靈均降攝提貞孟陬真堪書出咄已矣賦休休至元辛卯再過呉城王祠師雲谷示東坡所藏石砮留詩贈之别來四周星髙爾䨇鬢縁且秢氣彌厲能新火餘屋因知道氣深舉羸當時屈我髪已霜草衰薄不禁沐豈但形容然志亦忘石鏃今年雨何甚湖漲冬未伏白浪如銀山行舟避騰蹙倚欄乘雲閣聊以寓歸目非君誰能來寛此氷炭腹夕佳亭甲午冬十月洪都雨潺三旬乃一霽羈思忽若刪驅馬柴君居灾兀㧞市闤炎州清霜晚林葉恰半殷已有有朱茶花照耀菊斑斑亭依湖束岸坐對江西山西山兩舍外如立歩軔間鮮鮮沐濯餘翠葆萬煙鬟夕陽借佳景盡發天所慳只知柴桑翁芳躅人無攀馬知此凝睇亦與飛鳥逺主人退自公時得兼爾間明朝駕君去依稀動心顔呉君澹軒以大徳甲辰冬自潭移録道教於洪示内相踈齊前為潭憲曰贈别之什燧賦䟦之誤書澹軒為鶴臞亦道流善詩者還欲余改改書以無暇并前書失之而來求數數不置為别賦此詩僊石崖殞繼作惟澹軒嘗示余三藁披閲再朝昏盡卷長太息造語清而數豈於三百篇口吟瓶水翻非然學猶龍寄身道紀尊理洞萬物母氣完中夜存所以兼儒能由心徴其原洪都一傾盖以受儀恭温旋出踈齊叟湘東贈行言寶唾楚臣拾貽皆荃蓀既為大夫譽月旦窮疵論因羡靈奇賦偏爾鍾斯門閒閒隔神州聫璧難弟晜何時聚伯仲貫如吹篪壎當今載賡輩噤舌無庸捫題趙平江今清溪昔我行簡池齒經戰伐蕭條煙火稀路紆豺豺虎窟是時霜火後黄葉隕林樾彌望皆青山巖岫髙元兀下有清溪流未審何源發濺濺寒碧響爽欲徹毛骨朝潄巫峽雲夜泛峨眉月主人已避地何所猶奔突安知即今君膴仕方呉越且恐清溪名寂人不曰身縱縱不果歸取名自表揭而我豈善文詠詩慚求謁知君桑梓志未忘西車軏何時真脂韋一弔故城闕還訪清溪水獨喜存不沒但慮彼淪漪反不識華髪開樽磐石上坐歗遺簮笏莫使猿鶴儔相嗔涴塵韈落照落照在東璧倒影西墻紅我身恍自失如坐虹蜺中問誰為此㓜無乃由天公故出新巧竒欲試詩律工彼哉誠善戱拙技恐昜窮斯須忽變㓕寒雲翳蒼穹右丞索賦復有此作南地秋冬際五月無雲陰上帝遣心膂用汝作傅霖新苗飽新澤布地勝布金吾民未乘髙示爾風雲侵世事祗如此憂樂長相尋皇天老眼在一如父母臨人心惟順受天意良自斟助爾耕墾力實我豐穰心無非聖所共戴君恩深和溮泉二詩老成稀何如月數螢爝一粲見典刑誠想優孟孟謔三年東呉走望敬縫掖綽歸塗得失夫欲灌四鄰瀹餘事乃文字嘘動如囊籥愈出愈益竒險韻安足縛又凛如干將脱鞘爛霜鍔勿云乏鏤氷㓕迹郢斤堊問渠筆何力砥柱幹不弱可方騶雕龍不下韓逐鰐僕僕雖亟拜未酬嘉意酢由兹一厭飫噎噦屠門嚼自許宜何施庻㡬晨門拆遽以安石輩月旦無太錯視君千仭鳯巧弋避繒􅗤何時鳴朝陽免䀨鵂鶹虐夀人百年耳過眼犇電灼難聚真搏沙昜㪚劇飄蘀相逢一觴詠豈不賢棊博由淵爾何人願學言志各草木凡根荄託土乃恒性獨暢弔蘭生無籍地氣應懸叢危簷上朽索以為命青青雖弱質不挫霜雪勁敷花况妍好妝陋桃李靚依依光風汛皜皜華月暎香疑非人間恍若來空逈詩枤其下清芬誰汝競兒女女奚自攀安辱寶釵並但愁姑射僊綽約玉顔頸一朝秉龍過袖去逐無逕我來昌邑山豪欲分廟令必云付杯珓與奪神所柄不如且止之俟旋滄江艇殷勤先杯酒隨以竒貨聘歸託石城人管且化工盛楊補之墨梅原註肖齋家藏古之賢逹士名託技以傳由來含來人不及縑楮年雖求異世知存一遺百千偉也清富君縁髪金印懸脱落貴介習博雅嗜竒偏鉅唐鄴候架寶晉滄江船墨梅取無咎軸首珠犀填使有透綉詩詎讓花光前䖏堂清風夕斂襟泛爐煙對此氷雪姿若失炎燠然令人起幽思枚屡西湖泉武昌寄劉時中思君誦君詩賢於對君顔昔也坐我側守口如閉闗今兹言盡懐翻宜隔湖山文章靈奇氣賦與天所慳古人遊已遥古風力孤攀及肩曹劉壘窺奥長信班不取為貧仕傷和霣濽仲尼且委吏重耳嘗險艱犬夫夫無不為大弨况能彎入于無眼箭安識邕客彎歸來弄縁綺九霄鳴佩環挾是文武資未憂身恫瘝大路横至寶誰不收裏還報章因南鴻滅影秋色間轉令感白髪羈思無由刪過開先寺天人喜遊戱試劒當層蠻截落萬丈崖㵼出千丈湍隠如白瓊瓊藴此青琅玕仰睐轉飛動有物相控搏㪚空摩尼珠受以頗黎盤龍公曰夜汲暘旱不敢乾纔足供騷人萬古詭異觀我來過中嵗素髪紛垂冠窮源厯絶戱自懼身不完但能至其麓䕃翳松欒欒嘉與萬上人枵然坐蒼磐揮杯吸㣲夜已足當朝餐明發入黄塵復爾俗務干未期江山㑹石城清夣寒過大孤山左山如騰龍右山如伏獫約束彭蠡湖秋夏傍泛㶑我行正窮臘豪浪殊未歉危穡蒲㠶舞日出風力贍大孤水中央千尺入驚覘何人揷雲根上兩餘折劔留示爾後人萬古㫁鼇驗至今鋒鍔赤酒带膏血染昔當南北裂夣寐嘗在念一朝獲身厯償盡平生欠山靈必知詩投畀未為僣小孤山彭磯擁千山布陣如劉沛小孤乃窮羽獨戰氣彌倍灔澦僕命之砥柱非其對層顛摩晴穹雲木摇斾斾大江中貫流萬頃納一嘬東溟供朝夕日夜至一再去㠶天馬奔囬首蒼靄外已愁風蠲還進尺亦尋退不及躡􅀈岏一覧淮甸槩牧庵集卷三十二
