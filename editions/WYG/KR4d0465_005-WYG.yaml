body:
  text: 牧庵集卷五元姚燧撰記武陵縣重修虞帝廟記昔司馬遷由病孔子所傳宰予五帝徳帝系姓儒者或不傳故于唐虞夏記曰帝嚳之子帝摯立而弗善崩帝放勲立舜名重華禹名文命既弗深攷二典三謨之書曰放勲曰重華恊于帝曰文命敦于四海曰允廸厥徳皆虞史賛堯舜禹臯陶三聖一賢之辭且以天下相傳事孰大是堯不曰重華曰汝舜舜不曰文命曰汝禹則舜禹之為名章矣後千有餘年孔子稱徳三聖止曰堯者禹又况紀自戾其言乎前乎堯者帝嚳帝摯後乎禹者帝啟帝仲康中獨堯舜為非名豈坐信五帝徳帝系文取二篇見大戴記孔安國家語無帝系其五帝徳雖小異文亦止曰堯舜禹故後儒辨之以文命為禹名則敦四海為何事而臯陶不名允廸鏡是則紀所名之非名又章矣或曰孟子放勲殂落屈原陳詞重華者皆非歟曰不若是也今之君子于大賢之不可字者猶以鄉邑齋居命之况三聖乎其逺而不斥擇賛辭而號之亦厚徳之至也如必其信百世而不惑舍孔子焉折衷奚以惟帝舜崩𦵏與二妃事他經于書鑿枘者多虞書曰舜生三十徴庸三十在位五十載陟方乃死崩未知地也至孟子始曰舜卒於鳴條鳴條在安邑甚邇蒲坂以避堯子南河之南例之帝固未嘗逺所都也然最虞書實百一十年孔安國以為百一十二年自今積之詢考底績三載陟帝位二十八載䘮堯三載在位三十三載薦禹于天十七年而崩所謂三載皆再期耳由置底績在徴庸在位之間故多書二年猶未大逺紀以為二十以孝聞三十堯舉之五十攝行天子事五十八堯崩六十一代堯三十九年南廵狩崩于蒼梧之野𦵏于江南九疑是為零陵總之纔百年鄭𤣥則徴庸二十為句攝位至崩共五十年總之亦百年與紀皆不足十年如紀則舉之十九年無所事攝位九年䘮堯三年為天子四十年𤣥則登庸二十無所事攝位䘮堯三十年為天子二十年宜唐孔頴逹皆排而謬之又大載止言𦵏蒼梧之野家語則以為陟方岳死蒼梧之野而𦵏故紀遂曰南廵狩不知薦禹十七年之中當三廵狩帝皆親之耶獨崩年往也如皆親之禹何為哉崩年往也于時百一十年矣必将以嵗二月柴岱宗岱宗之去南岳何啻踰五千里吉行五十車埃風而舟濤瀬者不曠一日百日而始至焉是獨勤身于数千里不勤心于萬幾倦于九十三而不倦于百一十年也檀弓亦云舜𦵏于蒼梧之野盖三妃未之從也𤣥以為帝嚳帝堯皆四妃舜無正妃奴止三妃三天子之女不為正妃則正妃將待何人為哉屈原九歌謂娥皇湘君女英湘夫人君與夫人固有别矣君非正妃矣頴逹乃傍牽晉皇甫謐帝王世紀以實之曰我皇無子女英生商均次妃癸比生二女霄明燭光癸比山海經作登比皆不知為何説也秦皇南浮江至湘山祠而風問博士湘山何神對曰堯女舜妻𦵏此大怒發刑徒三千人赭其山而謐云塟衡山雖不同地可徴于帝𦵏而未之從王逸不詳未之從為不祔合而曰帝征有苗二女從之不及道死沅湘之中又曰墜于湘水之渚固已自二其説且有苗已來格分北而竄之三危矣豈侮帝老復逆命耶其煩六師投帝以艱禹何為哉又二女者在釐降時或上下少帝十歳方幼艾也至是崩年皆嫗然而聃矣中原無急變帝何為不及將二妃二妃何為不及從必追之而取道死水乎由遷則祀由逸則戎暈翟簉之非盛舉也觀後世匹帝者雖甚幼艾率土之臣莫敢不母未聞既母率土之臣入十餘年而後世猶女之又帝系曰舜娶堯子謂之女匽氏然堯伊耆姓陶唐氏子而不係其父而别氏焉皆不可以理究者也二妃之祠湘中原世云然亦尚矣哉惟沅洞莫知所始嘗火于宋民雷立倡郡人復字之宋徳夫為郡病其專祠二妃而遺帝始大其宫而合食焉皇元大徳之元僉江南湖兆道肅政亷訪司事李僕庭詠按部常徳夏六月一夕洪水驟至平地尋丈幾冐城郭乃率曹收諸君日夜行水戒民具畚築登陴以捍之發義倉積下其佑以廩餓人不足則勸富民出榖以繼水去今左丞相方平章湖廣省侯請曰常徳為郡岸沅之東古人虞水齧城當其衝波西南為二石埽延袤里所尾入江中順導其勢以遏東潰罹此暴漲盡根株去大浸稽天四縣槩及其實土為防者宜盪而無有遺餘也可乘農休急務修復以倉粟傭役人則民必舒困于今而功亦頼垂于後也丞相是之民利得食争日赴程工不踰時衆作㫁手乃謁帝祠而告成功見其榱楝庭墀傾落蕪穢詰牧守曰明詔有曰聖帝明王其令有司歳時致祭今乃若此甚非陛下欽崇禋祀之㫖宜帝不顧享而降此大沴也其議完之五通為鬼經禮無文祠顧宏麗妍縟其撤而資其材為門五楹殿三楹三宇五楹寝三楹两序八楹為老子法者李道昌主諸鍠鑰旦望祝釐别為宫以居其徒三清殿三楹兩序六楹歳徳真官殿皆一楹民之聳觀十其舊矣後三年其郡官民多侯奉詔之恪恤民之勤而禮神之虔也求所所由鳴呼惟帝之名載諸六籍而不泯泯日月在天未加其明岱華在地未儕其髙與窮壤相終窮者世則知之前帝諸皇功斯人者大昊帝春炎帝帝夏黄帝帝土少昊帝秋顓現帝冬既分五辰而司之與穹壤相終窮者世亦知之以帝之功何斯皇之弗若而况乎過之其為明神左右上帝幹元化以順行四時或乘雲御風省方下土福善癉惡于斯宫與穹壤相終窮者理所固然也烏乎知哉故燧惟列夙疑而未瑩者首之未敢少及法程萬世人倫之至者之徳之如何也汴梁廟學記自魯哀公十六年當周敬王四十一年壬戌孔子卒歴六國秦漢至孝武即位之年辛丑為三百四十年其聞而知者纔司馬遷一人而止耳既編其年與夫言行出處之槩為世家又為弟子傳載其居里問對與夫經事何君又攷知其少孔子幾何嵗是書皆孔門弟子與孟氏所未著其有功聖門真非淺淺哉然猶病夫時有不一其説不可参伍者也世家弟子蓋三千焉身通六藝者七十二人而弟子傳則曰孔子曰受業身通者七十有七人皆異能之士也夫既曰身通六藝矣雖未盡合聖人為教之本然而猶有所指名也其曰受業身通竟不發為所通何業亦晦焉而已耳又曰皆異能之士聖人為教于以修叙彛倫而容異能者于其間孔子自言七十有七人則七十二人者誰後是五人耶其為傳亦多淆雜而無次先顔回曽参而後無繇蒧固己戾于明人倫其甚誤至以闞止子我為宰予又曰孔子之所嚴事者于周則老子于衛蘧伯玊于楚老萊子于鄭子産于齊晏平仲于魯孟公綽孔子于公綽止稱其不欲與優為趙魏老子産有君子之道四其他不足孔子者亦多也老萊子書今存其為道術尚黄帝老子為聖人所與者不經見子入太廟毎事問况老子周守藏室之史問禮則有子使及見其書曰失道而後德失徳而後仁失仁而後義失義而後禮已不知道徳仁義禮根于人心之固有而視為世降之不同未必不見黜于孔子況為其道乎哉惟蘧伯玊寡過未能為不悖于聖學故與之特深至漢文翁圖石室列之七十二人中亦可灼其非師而寔弟子云晏平仲者如遷之言足以暴其人賊賢之罪何也夫人既嚴事乎巳苟于學術之僻歸宿之差何害于明告告不為止則随以不屑之誨始盡夫師子弟之義焉當欲封孔子尼谿之田乃説其君景公曰儒者滑稽不可軌法倨傲自順不可為下崇䘮遂不破産厚葬不可為俗游説乞貸不可為國盛容飾繁登降累世不能殫其學當年不能究其禮非所以移齊俗而先細民也若預憂一旦代有齊政惟懼醜詆之不力焉夫善交久敬報人嚴事之道者固如是乎哉先儒嘗疑晏子尚儉墨子欲貴其道取必于晏子之言不然何為亦見墨子之書而遷辦之不明也又自叙曰儒者累世不能通其學當年不能究其禮博而寡要勞而少功由是知二語者非必一出晏子乃遷薄儒素定於胷中不易者也遷嘗適魯徒觀諸生以時鄉飲大射其家述眩於規規節文之細彽徊不去以為是足盡聖人之道期正經生博士之汨汨以皓首者也豈聖學為已之切致哉故燧有功于遷而亦有是数者之恨况又甚惑未盡祛于今者也孔子卒哀公誄子子貢以為非禮至漢平帝始封諡褒成候宜尼公蓋王莾假善以收譽将遂其姦謀也後魏孝文法之諡文宣尼父後周宣帝封鄒國公唐髙宗贈太師偽周武氏封道公至𤣥宗諡爵文宣王宋真宗加𤣥聖後昜為至至今遵之焉有若以自生民以來未有盛於孔子誠是言也雖極天下之美諡猶不足萬分一盛之刑容期燧發其目而不深言者一也杜預春秋傳叙曰子路欲使門人為臣孔子以為欺天而云仲尼素王丘明素臣又非通論也期言為獲聖人之心而後世王之堯舜二帝也帝我以夫子遠賢堯舜何王之不可居然後世天下之子有功之臣皆曰王以孔子之聖卒下比爵於其子臣誠不知其可也期燧發其目而不深言者二也其享䣥諸位善乎栁宗元序道州廟碑曰從于陳蔡亦各有號言出一時非盡其徒也于後失厥所謂妄異科等坐祀十人以哲豈夫子之志哉後之時進顔孟並孔子南面别躋曽子以足是十人于非夫子志中之又非者而江之左又進曽子子思並顔孟别躋子張于曽子之舊由孟子而視子思師也由子思而視曽子又師也子思孔子孫也弟子于師孫于祖坐而語道者有之非可並南面燧知四子己避讓于冥冥中不能一日自安其身一堂之上况又祀無繇蒧鯉于庭其失至于崇子而抑父非遷之為傳矣夫為是學官将以明人倫于天下而倒施錯置于数筵之地如此奚以為訓又在在之廟皆泥像其中北史敢有造泥人銅人者門誅則泥人固非中土為主以祀聖人法也後世莫覺其非亦化其道而為之郡異縣殊不一其状短長豐瘠老少美惡惟其工之巧拙是随就使盡善亦豈其生盛徳之容甚非神而明之無聲無臭之道也曩長安新廟成繪六十一人與二十四儒廡畫工病其為靣之同縱人觀之而擇貴臣圖其上蓋肖今人之貎而冠以先賢之名使過而識者抵掌相語曰是某也是某也未見其起敬于他日顧先足來不恭于一時是邦如是孰必其他邦之不為是一嵗再祀第借位于先賢以爼豆夫今之人也其可哉曰是溺習之己然若何而變曰人臣有見上布是區區則可若夫議禮也制度考文也天子司之亦幸一旦遑于稽古之事學禮之臣必有能䇿其一二得所當議者矣至元庚寅汴梁新廟成學録劉元佐為状以其府諸公之意求記其由故燧首之以此其状曰宋建隆中南宫城数里立太學後為國子監金貞祐都汴國日益蹙大城少兵難守度中宫垣大城再城之監當城所經弗便也壞而徙之東南大城之下不及屋而亡皇元受多方始為殿七楹亦廢宫屋也其制度宏麗為天下甲壬子楊中書忠肅公來董括舟役又壞宫取財以其餘為門廡至元癸酉故同知宣慰使袁裕時為是府判官始構講堂于廟西神庖于堂東鑿池其南勢如半璧瀹汴注之擬魯頖水殆足觀矣嵗月滋乆風雨騫屋困于撑拄自總管提刑悉捐金割俸起新之經管則權輿于成某斷乎于杜思敬其同力者同知胡某治中益祖判官完顔某推官姜某提刑使則闍闍都髙某副使王忱僉事劉某始終五十餘年凡資畫十二官而後完富民佐則力以就功者又多也燧曰嗚呼不易乎哉自今師生之講肄于期其移學文之力而篤志于切問近思責其躬以成徳逹才而收夫化民成俗之功于他日斯不孤縣官待多士志矣是歳夏四月記澧州廟學記至元十有四年肇置諸道提刑按察司而澧在山南湖北道所紏郡二十年燧副使是道明年按部至焉拜瞻廟庭未嘗不病其為制之隘陋也殿南閣日六經因語校官張公綬曰易書詩春秋其繫定刪作實出夫子之手周官雖云周公之書冬官篇亡當以考工記與小戴記禮者皆漢儒豈可與是四經班而為六且今四海禮殿皆名大成為改書曰金聲玉振之閣後時議不欲諸道紏郡者錯壤江北南改為肅政亷訪澧遂割入江江南湖北元貞乙未居民不戒于火廟為延燒總管是道者故鄂屯實魯将復之俾計吏最其學租直纔五千餘緍曰是所謂時詘而舉嬴者也乃下令郡士在籍多由者勸之佐為凡又得萬緡委材集工責校官李寓學正張子仁身敦其役而紏郡諸公如副使賈仁僉事蔣某姚某李庭誅郭貫凡至者必促其成功五年而落之其撫構則稽椊人之書為四柱屋古者王居之制也惟太行一山似之故曰王屋重門周序講肄之堂合食之舍庖廪之室燕遊之享秩秩馮馮靡一或遺凡百有三楹周以繚垣百三十餘丈雖未嘗身見然聞之談者舉以為可甲湖之北南諸州豈天者厭昔隘陋火之使改為耶亦偶然也又範金為祭噐二百七十有二竹木髹漆之具三百有四嗚呼備乎哉然嘗思夫子之道之在両間無間治亂古今如饑食而混飲夫婦之愚莫不由之不可一日而離焉固不以廟之存毁而加汚隆國家必聚者英俊髦教育乎是盖須其成徳逹才舉而庸之以立化民成俗之本也則廟學豈不甚有所闗哉以以求之衡之為州南澧千有餘里南嶽在焉舜五載一廵狩所也及誅四凶放驩兠于崇山實今澧之屬縣慈利則放流之人顧居廵狩之境之内戰國時楚都南郢在漢則南郡江陵澧去西鳥鳥逕不二百里屈原之逐常行吟者故九歌曰澧浦澧蘭則放流之所近薄修門是皆不可曉知者澧于其時為黔中秦欲以武関之外易之楚方怒張儀謂曰願得張儀而獻黔中夫以甘心一人寜棄也而不恤固以要荒鄙之也而今也料次户口之繁庻貢賊之征入澧則亞于長河而近湖廣省治岳鄂諸州不能半之豈天時風土有古今之變而人事亦随以遷而異耶士四民一也民庶而士必衆洙泗夫子之居也士為洙泗之言者也澧去洙泗西南將三千里非蜜邇也頼皇上仁不忘逺守土之臣視要荒與洙泗鈞然洙泗也燧嘗至其地焉户不能當澧四之一户損則士不多亦理勢然不知自今澧民沐士之化要荒而洙泗乎士不能㧞民之溺洙泗而要荒乎要荒而洙泗正國家所頼以化民成俗者洙泗而要荒其身之不能成徳逹才何有乎推之人士是之思則居縣官所築之室食縣官所樹之粟必知黽勉其躬圖報稱矣庭詠俾子仁求記所由興作于翰林學士朝請夫夫知制誥同修國史姚燧大徳己亥冬十有一月日短至書于鄂之南陽書院楚椊堂崇陽學記世祖御極之十有七年當至元十有三年宋平凡江之南財之儲府庫賦之産山澤者悉輸京師獨遺貢荘學田仍卑之學俾資教育後尚書用非人大網羅天下之利奪歸之官在庭之士子媒進取而不得者乃希其意求分道鈎覈素所出入于職學之官責償其負而促為期有闗木而嬰笞者士窮士堪至圖其惨以上之帝聞不善也其人罪誅希意者亦竄廢詔還所奪至仁也皇上嗣聖申詃若曰聖人道埀憲萬世其還正貢貢荘學田以為釋奠完廟飬老師生之廪之須至明也為良有司昭都両聖崇植期文之盛在在莫不作新廟學求稱宣化將仕郎主鄂之崇仁簿夏承祖書來諗曰是縣學官二十五年陳或為尹一既完之于今七年可曰未乆迨承祖始治事而入謁也上棟旁楹穿漏傾撓己窘風雨承祖傷之乃割己俸為邑士先萃其附而應者俾龔應旗葛公亮敦匠再完之稱役傭二萬六千錢米不計也願鑱之石為佐則著勞者勸曰夫究心此者狃國人習雅不識書忽不知為也囿文法吏急赴事功迂不知為也非知學孔子如承祖者為之責將誰在哉雖然簿在一邑惟筆朱墨鈎校出入其職其上有監丞焉壓抑者非一人也比其道行乎百里言信乎羣士越而出為為之而成功不制于同官其彊有力歟戞戞其難有倍乎昔尹之為者嗚呼賢者也然以張山翁所記参伍今書而惑焉始為陳尹敦匠者應旗公亮也今而主簿敦匠者亦應旗公亮也以两君善于作室歟亦烏有苟于為心而不固俾旋踵有今之􅀢不善作室歟于何舉所既敗者復使為之而不固于後豈邑士為才無兩君比歟将懲其不固于今奮思改自必異前可不􅀢于後歟皆未足為信也要也非作者之罪也守之者之不獲其力也夫人極其思而創之劬其躬而樂之羙矣完矣舉以卑之職學之官而守之且屋以待風雨者也而風雨亦所以賊屋者也諒非一日可遽隳也亦必有其漸焉雨罅而入㣲而視之曰未害也今日而不加覆焉風有隙而乘徐而安之曰未害也明日而不加塞焉月弛慢而歳因仍以及于隳乃咎夫敦匠者始苟于其事之致也嗚呼果苟于其事歟當佐陳尹之時最其自捐凡為楮緡二千一百可獨當學廪邑士之半曷若靳是而不捐不知于今峽教龔必勝漢陽尉葉桂發徳安尉黄朝英壽昌山長徐逄午教諭趙泰來徐應竒葉常春與煥彭黄裳熊萃老十子者之中其捐有多寡也予誠嘉其始終忠是學也非有故而私夫人曰非作者之罪也守之者之不獲其力也嗚呼守者之不獲其力特不職爾其小者也甚者為罪其間盖江南學田宋故有籍守者利之私櫝其家或投水火以滅其迹使他日無所稽曰城下之日學吏持而失之也或曰其人死不知何歸也以幸述誤乆而為巳産一聞有司將加覈正反肆為謗語訐揚其短恐之使不得竟又有身為教官自詭佃民一莊之田連亘阡陌名歳入租學得其一己取其九又有以已磽确易所上腴曰故簿惟是至與學吏為訟詆譸囂租入庾矣猶掊諸生之堂餽留耆儒之廪俸而虚為之名以徴逐府縣而歸餘其室提學之司又繁為文魚鱗而取之惟與求薦教職入賄為市罪而去者相踵也嗚呼守以是曹譬如以狼牧羊不盡不止也或曰人之言曰髪有疾幘則冒之手有疾袂則蔽之子而記學不諄諄乎教飬之道而惟歴發職學之慝非長者也曰上之膏澤斯士也如何而不善其職者屯之事有急此乎且始疾者猶先其標何也苛痛呻苦之所在也教飬之道如三代以徳行六藝賓興賢能漢舉孝亷經術而庭䇿之魏晉尚文辭猶不遺乎經術隋煬始專賦詩唐因之雖置科明經而止乎記誦又有投牒自售之賤貢舉法法熄楊綰李徳裕極言其非宋神宗始罷之治五經語孟哲宗復賦詩遼金不華者有我世父太子太師公故竇太子太傳公故楊昭父君議貢舉之法在皆朝廷制度考文之事非州縣所得擅擇歴古所宜于今而為者惟得是説而為鍼石庶已罪而未敢者聞之懼其掩剽于㝠㝠而庭臣亦有灼見其然者知所悛也是亦救失之一道也牧庵集卷五
