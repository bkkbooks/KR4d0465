body:
  text: 牧庵集卷二十二元姚燧撰神道碑榮禄大夫江淮等處行中書省平章政事游公神道碑公諱顯字子明以至元十有九年拜榮禄大夫江淮等處行中書省平章政事明年夏四月二十有一日薨于位享年七十有四明年十月二十有八日葬汴梁祥符縣之西鄉後是二十有三年當大徳丁未其元子海北廣東道亷訪使永錫俾其猶子偃自汴而郢持故翰林侍讀學士高凝所次事狀以墓碑見託燧徴而叙之游世不可逺本考逸其諱妣吕代之崞縣鉅姓嵗為羊裘三千以衣寒者傭工鑱平太和嶺石路艱崎步軔售直白金為兩五十又伐石橋崞水以通夏冬閡漲病涉鄉民惠之目為崇善老人天馬南牧金宣宗播汴徙君許之臨潁東臯卒𦵏其地嵗壬辰㧞許公𨽻大帥巴爾斯布哈帳下由是善國言俾經厯其府事後同千户阿爾烏蘭從諸侯王南征破金商鈔房禽何太尉襄陽下帥府版為副逹嚕噶齊軍將劉儀段哈雅實克叛執公送建康太尉劉石河言其材武于制置孟珙㑹珙移節于鄂遣石河防秋淮漢公説珙求為前茅遂得俱北將及隨與田僧住二騎夜遁豺虎縱横出入林莽瀕死數數及鄧之新野適阿爾烏蘭巡徼相顧悲喜偕至大將察罕所為驛致龍廷嵗庚子入見具陳恩主棄妻子挺身來歸及自建康抵鄂州軍鎮戊形便兵食虚實我加兵誅可以必舉太宗喜顧邇臣曰若軰曾㣲一言及此因嘉歎公昔太祖由一回鶻迎降賜以羊馬授之璽書從其所為人無誰何卿自脱敵死間闗以來又非其所欲賜白金五萬其兩用之有竭其封襄陽新民二百家世為佃民加錫銀符錦衣二襲亦授之璽書從其所為人無誰何歸率是民復堰鐡拘壅湍水為渠溉稻田千數百頃人頼其利後宿衛憲宗制授之璽書從其所為拉吉爾廸幕長且行賜之酒辭帝曰卿辭朕前將飲無人所耶公曰臣何敢面欺今既効死軍前請從此十年不御歸至鄧大帥軍漢北敵壁間寂無人開門㧞幟招諸軍進及帝自將伐宋謀由蜀入兵及散闗公諫巴蜀水則江流悍急陸則陟降山巘舟車皆不可施利餽繼甚艱六軍出此恐非萬全之策不若取道闗東夷塗直臨江漢世祖時方淵龍帝曰左方之師朕已付之業已至此其有時宜即彼言之嵗戊午也明年世祖已禡而南追覲于蕩隂教自今凡所欲言指故平章政事亷公時以宣撫從征偕以入告大軍至黄陂責中書納罕資取敵舟公言斯人傲忽于事恐既集者不嚴守警將復散走而果然俾公治别帖萬户戰舟而篙師不足公曰江南之民居多瀕水無不能操舟者盡前俘壯士立兩幟下令能右否左得九百人遂濟江授之銀章行宣撫使世祖正位宸極中統之元制位中書左丞大名宣撫使張公仲謙下明年代張公為使其褒辭曰割愛就義遇敵有功處已端方臨事敏給又明年李璮反盗據濟南張公撫訟公嘗通書璮帝謂近習㳺某豈為是者鷙禽為狐所憎然耳及籍璮家而書無有勅以訟者付公聽其甘心其人亡命踰年公召至其妻子曉之令出保無他也其人膝行于庭祈死曰曰吾誠為是汝言而可吾所無有而汝言然汝為妄人敕聽吾甘心則生死惟吾吾其忍汝殺如昔遇之公以平賊入賀進宴故事非宗臣國人胡牀不入宫門殿坐皆席地不為設榻侍宴不稱觴至是公請稱觴制可之後賜黄金盈斤他日帝燕坐虎帳方止人入宫至為衛士所訶爭呼于庭帝曰是非㳺某聲耶召入詰曰何為而然公對臣將有請為衛士所邁不知疾言上徹宸聰罪滅死帝黙久而出之裕宗時為為中書令樞宻使適至復召之人令盡所言對以臣聞將改宣撫司為宣慰司且司者官之名也使而下官之人也由所官之人非才事故弛而不治何闗乎官之名今雖變名宣慰不求惟賢惟能任之仍夫宣撫之人猶惡夫鼔不鳴而新其枹聲豈加大哉因厯短諸臣無少借隐帝顧裕宗曰汝他日求可眷倚者須此輩人至元二年進嘉議大夫益都路總管兼府尹未幾改南京路總管兼府尹四年改大都總管兼府尹公因以乘輿嵗來居冬其儲峙穀食馬藁秸諸物和市之民直多不給為所司盗有豪宗鉅室田疇連阡有恃不輸中下之家率反户及公則以物力多寡差賦之直已無所漁牟敢有為舊驁猾者悉論如律民力紓息其半賜楮幣五千緡入言左右兩丞相安圖巴延二大臣者一居中書其事足治宜分命左丞相為樞宻則六軍之政将日齊肅于前制可以巴延同知院事六年授河北河南道提刑按察使八年㐮陽用兵之四年改總管水軍萬户創石囷七于漢中流以絶敵舟馘圍之兵千改陜西四川道提刑按察使皇子安西王國秦未至公見之六盤順聖皇后賜金帳載數十車用事臣欲置憲府奎鈞慶賜之閣憲副張庭瑞不受曰汝總管自有府其即彼以置留車一夕用事臣纔其不恭銳欲深治力陳辯且責其人霰珍罷右丞相入為大官人有事干者斥曰吾守大釜鬲者他非所知汝王食官不師此而行乃越職沮撓風紀或帝聞之謂王弗戢左右也王雖不善以受知列聖身見其摧大臣于庭且聞帝託裕皇于他日者庭瑞由以得受輕罰二巴延濟江下鄂帝曰㳺某曩者曾事列聖于朕前策取江南熟矣非直能言亦能為者今聞濟江而獨不與意必熱中其召以來授前軍宣撫使大軍臨蘇公從七騎薄城呼曰我㳺宣撫也來曉告爾州州將丞相奉詔諾諸軍以平江南誅賞精明其早自來歸取富比他州將不然梯衝一樹則加誅後服為屠屠常州續耳無殃生齒數百萬也王安撫即以城下公身至坊市集吏民諭以天子仁聖威徳軍律降城不誅其安爾室家無恐或持金為謝曰吾非利貨為者授蘇州宣撫使遣人四出招來逋民凡得十三萬家貸倉穀為石百三十萬為種于民約秋熟償官民歡輸之無少折閲十四年授中奉大夫浙西道宣慰使杭民聞來相語曰吾屬幸哉善撫安蘇州者㳺公至矣明年入覲布幣蕭墻俄帝輦至顧謂之曰卿老人宣力良多一日俾坐胡牀持枤指使宫門何事不集其日入宴坐賜之榻輟大官所上飲食之後疾遣使醫持藥衣白貂裘皆殊恩也疾已入謝言江南頼陛下神武文軌一矣惜往敷宣聖化者不稱任使勅語之中書其年國人為浙西宣慰使者死省奏以國人嗣為上曰㳺某非國人何且指盗殺臣為平章者曰是不可居汝下者豈可久使亞人明年授中書大夫中書右丞行浙西宣慰使又明年用兵日本江淮福建湖廣之兵將十萬衆皆齊集資食于杭凡廪米八十餘萬為石又造海艦若干百艘材不足于足勸富民佐木皆酬其直又鍛治甲仗一令之下星火不喻其急動以失軍興緩制敕從事其堂帖無如瓢木弩莝刀皆預為千事盗殺臣益忌乃好言入聞㳺某髙年當以某人為使少分其勞實欲遣位公右上召其人至曰㳺某老人汝可父事其欲位汝其下三四何所惟其言從十九年是臣見殺于盗其姻黨貪墨姦窳上盗公帑下厲齊民者諸不法皆露而東南新國尤罹其毒公為鉤考惟是一省徴贓四百餘萬為緡明年明州民饑貸米石五萬餘約償如杭及再用兵日本詔軍與百需責使供億其時已疾猶支持視事尋薨于楊州官舍斯其所履厯措注寵數大者自餘其敏政如尹京日必待命于庭秉令中書乃歸治府雖事叢至其前必决一或然火達曙不得家食則必取之市霜雪寒慓至宿于野與造海艦于杭役塲達城二十里比曉已至督視竟則聽政于司夜必二鼓方息其恤孤獨或為人所抑則不大聲色呴呴導使盡言事雖無迹計數以求必得其情其推誠感物如南京盗數人竊戍軍之馬于律當倍其償軍迫南征為先假諸公帑同署者難之公則曰過則在余不及諸君與之期日縱盗歸取之家如言而反悉輸之官受罰不訢為杭生獲荷葉浦賊周先鋒輩四人公曰堂堂宋室國家取猶覆掌鼠子何為皆官以廵檢給衣服貨財遣之曰能與而餘黨舍賊為平民惟汝反靣叛歸亦惟汝旬月招其黨傾其巢窟牛天王據海島官軍加誅積嵗不能平公惟遣象山僧往説之乃與之偕來凡此皆事動天聽者也三夫人張氏趙氏完顔氏子男四人永錫永禄天祥永弼永禄知延安之綏徳州天祥入侍裕廟于東宫與永弼皆不禄女六人長適陜西行省男趙某次適提舉男路構次適襄陽路總管馬國璧次適蘄黄等路副宣慰呼圖克岱次笄而夭季適史太尉忠武公孫知安陸府史熾男孫四人偃億倫僎女孫二人長適提㸃奉宸庫𤓰爾佳思政幼在室男曾孫三人元嗣元偉元暉女曾孫八人銘曰在昔英文名城剖分為開國臣賚其庸勲公時還南首策平宋克沃帝心顧曰禁從咨汝如林孰為斯言斯猶宜同功勞位尊其封襄民為家二百其世有之尚力是獲定憲二廟守而不渝嵗賦名城天府尚輸獨復公家盡私其有雖儲千金富無此厚英文富之世祖貴之在笥衣之玉食饋之位亞人臣龍光匪夷自夫壬辰迄于乙巳五十年中髙明及此謂非人豪謂之曰何槩其平生庻善則多維列聖知無是為大爰筆之碑永白隧外金故昭勇大將軍行都統萬户事榮公神道碑大徳辛丑燧持憲節使江之東其明年袁之總公榮顯祖書遣屬吏聶復禮主政致父都漕君之與其同官題與别駕喬簣成李仲和及江西憲僉郭貫行省檢校閻宏之書為先以龎太史詠所状曾大父金都統萬户公之行拏舟三千里來宣求墳道之碑嗚呼逖矣勤哉是有比焉昔腹勝軍節度趙慤死于金及其子故同僉書樞宻院事良弼使倭哀鳴先朝願詔詞臣賜銘于石制可則異代之臣能忠所事者舉宜得誄乃序之曰孔子遊太山見榮枯期年九十五鹿裘帶索鼓琴而歌于郕之野曰貧士之常死人之終孔子以為能自寛今榮氏家横梅之清池違郕不大逺豈其遺苗歟公諱祐在金叔世宣宗蹙國播汴河朔豪傑所在爭起倡糺義兵完保其鄉金訹以官兾頼其力復所失地聞公有衆踰萬以為昭勇大將軍行都統萬户府事故竒其服别異他軍俾戱下皆華㡌人望空杠孑旄束斾知為公軍遇士大夫長于綏懐衣食皆資其家故戰人致死力所當必摧有效蹠蹻膾人肝者立磔為徇以故其軍生齒並隣不耗焉卒葬清池讃善鄉王强原夫人王氏子男四人興既嗣將將是軍曰吾于申令之際不得不建是都統旗鼔然戱下千户皆父之執不可一旦偃肆居上宜貶吾名止曰千户一軍益躍趯用命其戰必前列以身當當敵有所克獲惟衆取之少不覬見與夫能寛且惠皆聞見之得其家者河朔平太宗即位三年辛卯肇置徴收課稅所河北東西道辟為滄鹽辦課官時理財臣爭以苛剥相高獨能恪其素守人以善譽卒四十五五隆昌堝官堝積鹽而席其鈞石之所次顯與貴女子二適李氏孫男九人當早卒淮都轉運副使自滄鹽利民場為司判副使清鹽使至以承務郎為今官終始鹽官故悉其弊蓋是司惟榷鹺利煮海為之竈則不一其所賦車州縣發軔自竈逺或數百里纔先與直三分一至堝盡售之一遇霖潦留陷濘淖斃牛敗車蹄輪填道策于中書願募商旅納估于官持劵即取諸竈嵗省車直為緡三十餘萬今著為令年饑人噉草根木皮預虞竈民散亡稱貸鉅家米為石千布為端萬分賚之約償樂嵗又大雨水溢竈多冐沒煑不盈數嵗賦用逋度支責徴繫吏牣獄再至京師求遣御史按覆得實復捐七千緡皆惠政也及顯祖同僉宣政院事曰吾子三品榮耀矣遂解組課童耕桑野服徜徉其鄉嗚呼其老子所云知止不殆者耶成漕司廵鹽官次昌珪斌珍得孫都女子女十人適徐李趙某族曾孫男五人欽祖管勾厚財塲繼祖大用庫副次顯祖也今以中憲大夫袁州路總管兼管内勸農事提調造茶勾當袁𨽻行江西省而舉刺則湖東憲府宏貫皆言榮袁州糧二千石治最江西貫燧所畏宏嘗同太史氏言皆可信有是能子為臣明時宜都漕君輕去袖手一堂坐視其猷為也紹祖以國言教授長蘆慶祖禮部奏差女子六人適齊范王楊李嚴六族𤣥孫男五人滋安源溥溢女子子二人銘曰屯難之時弱不自濟其依于强亦勢必至金徳自宣既厭于天接淅而南河朔棄捐倀倀遺黎既安舊土匪連為羣有侮孰禦維兹清池海浦在東桓桓榮公萬夫所雄如鳥之歸有菀彼林約束不待來比烏在無他求為全生是頼譬衆同舟風濤中流莫不奮檝攸濟之求為將是軍善作士氣人華其㡌表襮自異昔魯烝徒貝曺朱綅何是肅暇千載有今萬夫洸洸不一其面而一其心阻海之甸非一公威而一其仁寒饑在人如切吾身孰有不裳吾解以衣未飱孰有我庾其饎猶惠小小有甚大斯匪曰禁殘寡婦孤兒人魚肉之溉鬵已久天懋其功宜熾厥後子長千夫年艾不遥豈俟曾孫畀其光昭嗟惟令孫才優治賦何便不張無􅗜不去迨曾孫貴考槃遽歌子仕父休止足如何曾孫袁州良二千石登古七命其進未極凡之有家孰造孰承詩之金石垂示雲仍浙西亷訪副使潘公神道碑公潘姓諱澤字澤民宣徳府人府在金惟州曾祖嘗為州孔目而逸其諱祖禄考得用生行軍萬户府提控渙及濤與公伯仲氏皆善厚殖其家資公讀書壯而逰先師魯齋左丞許公之門盡戛故習而氣大變飬親不違其志事兄愛以敬閨闥有閑及出門庭卑以下人語恐惴之遇夙無所厚薄者于塗必謙謹戀嫪令盡所言不峻謝别用太保劉文貞公薦由從事太府監擢監知事轉贰左藏庫使出再提舉織染局金符在順天路官承直郎宣徳府則奉訓大夫課皆最陞奉議大夫知𢎞州兼諸軍鄂囉始有土民以行所學郡旱遍禱其境百神已乃詣郭西泉投文祝曰山川之神其所司者惟在能興雲雨以水下土耳今旱暵如是不能膏澤之神固已不得其職使州刺有罪幸漏譴于明天子必將殃之宜止其身吾民何辜横罹斯毒則爾神又佚罰矣敢恐恐退俟終不得命當自劾去其夜有光如星騰泉明日大雨為屋祠龍泉上自公未至州之南並山風為灾又為文禱曰風者天之號令順四時温燠凄凛之氣發逹遂成萬物者也時自為惠反之而已灾况暴厲無節穴涌谷起飄翔塵沙偃揠禾稼以病民哉禾民恃以生上以出縣官租賦下乃仰以粢盛報事乎神明今使之貧窘無所于食目其顰苦之顔耳乎愁嘆之聲神亦安所利之必州刺之是矜其收是􅑀怒自爾風灾衰息民頼至今尤究心用獄前政繫疑盗八人榜掠百至求迹無所公明其非辜皆出之刼家訟公故縱無幾時而盗果得西京械成獄令待命他郡過治囚號市曰此州之人神明公以為包拯復生獨不能相活耶公將召問同列謂宜發卒衛出吾界而已讞非吾事也公曰人求直其枉烏可陽為充耳不聞卒問之葢太原民輸既如約矣倉吏不以時受入鈔貴家奴令代其輸既如約矣奴與偽為鈔者友陽悔之有我善鈔而歸所偽為我急其得不詳視也出而用之而事始露有司鍜成之謂利利賤而買之偽為首當以見知法公列上之竟雪其誣而抵奴與偽為者法賦州市牛公懲他郡驅牛至官擇可受直聽命旬浹奔走煩勞廢其穯事令持價即鄉民自為市吏無所姦利駔儈亦不得上下其直轉知興中州入為監察御史刑部主事恃當國臣知多行不法察院召按不能致公從卒至部捕之一訊而貪墨皆出論如律轉僉山北遼東道提刑按察司事治有田民殺其主者獄已結矣公詳讞之則其妻與所私夫為之乃昭田民當二人法又有訟為豪室奴其一家十七人有司觀顧数年不能正公以凡今鬻人皆畫男女左右食指横理于劵為信以其疎宻判人短長壯少與獄詞同其索劵視中有年十三兒指理如成人公曰偽敗在此為召郡兒年十三十人以符其指皆宻不合豪室遂屈毁劵民之或言髙麗王有逆意集將吏將徙故都詔近臣偕公即治公以王今尚主王設舉事主安不知知安不上變聞而噎嘿以從他臣治獄希意深鷙求竟公獨輕平主果馳使明王無有事從中變制使多得罪獨還公憲尋入都事御史臺剖白羣疑商訂時才自其口出人所畏縮皆身任為無少顧讓然不專已博咨之人嘗曰君子小人喜以朋從觀受薦何人得過半矣又致察其間有失而不中哉今曰必吾所識則識有盡不足列職中外况未必盡賢人曰可者審可不必囿以資格故評臺臣者皆曰自公都事察院監司一時翕翕勝職最衆出為江北淮西道提刑按察使按宣慰家兒怙勢抑買民物不償直與償而不滿者皆比贓論後改提刑按察為肅政亷訪轉江南浙西道肅政亷訪副使方分杭州州以至元壬辰秋七月一日卒年五十五仲氏子希善希逹五千里與柩歸鄉明年八月始葬先域夫人任也三男希大希成希安大成皆前卒希永他室李出三女適任徐張氏皆士族公既貴矣進伯氏子希明事裕宗于東宫今出知隰州後葬二年伯氏懼公平昔之善泯其不聞乃身入山敦工伐石求其同門友祕書少監楊桓狀其事俾燧銘之碑燧曰公之為人桓為行實文何尚焉念今之世子弟為父兄求託金石為傳者或多有之如提控以兄能反復致意其季者纔獨一人鳴呼豈不若是不足為愛敬報歟銘曰維公生資粹其民彞加及先師北面事之仁義㣲辭道徳盛儀日耳以闚如垣厚基增崇其卑如田有鎡多稼離離尊聞行知始由家推慈孝㓜耆閨闥枲絲秩秩其宜出焉郡治視民如兒調均賦夷仁柔膚肌何有創罷其禳其祈山川百祗如指以頥而渥風衰誠之格思罪入髠耏有少枉疑猶已渇饑不身之私竭蹷觧纍必出是期發摘吏欺大治小笞戢威顔眉衣繡斧持遼浙江涯皆所往釐在在歌思曰到逺而如何數奇中塗其萎識不識悲中郎諸碑泰無媿為斯銘如斯琢石以垂信夫他時牧庵集卷二十二
