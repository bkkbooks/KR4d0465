  - {type: page-break, offset: 0, content: '', id: KR4d0465_WYG_000-1a, image: WYG1201/WYG1201-0401a.png}
body:
  text: 牧庵集别集類四元提要臣等謹案牧庵集三十六卷元姚燧撰燧字端甫號牧庵河南人姚樞從子也案元史稱樞為柳城人元無柳城當是據誌狀之文著其祖貫耳初以薦為秦王府文學後歴官至翰林學士承㫖集賢大學士謚曰文事蹟具元史本傳燧雖受學於許衡而文章則過衡逺甚張養浩作是集序稱其才驅氣駕縱横開闔紀律惟意如古勁將率市人戰鼓行六合無敵不北柳貫作燧謚議稱其典冊之雅奥詔令之深醇抉其浮靡一返古轍而銘誌箴頌雄偉光潔家傳人誦莫得而掩雖不免同時推奬之詞然宋濂撰元史稱其文閎肆該洽豪而不宕剛而不厲舂容盛大有西漢風宋末弊習為之一變國初黄宗羲選明文案其序亦云唐之韓柳宋之歐曽金之元好問元之虞集姚燧其文皆非有明一代作者所能及則皆異代論定其語如出一轍燧之文品亦可概見矣其集久佚不傳明文淵閣書目有牧庵集二十冊而諸家著録皆未之及劉昌輯中州文表所選燧詩較元文類僅多數首文則無出文類之外者昌跋稱牧庵集五十首聞松江士人家有刻本南北奔走竟莫能致今所得乃録本多殘缺視刻本僅十之二黄宗羲序天一閣書目云嘗聞胡震亨家有牧庵集後求之不得葢已久佚惟永樂大典所收頗夥校以劉致年譜中所載文目雖少十之二三而較之文類所選則多十之五六矣詩詞更多出諸家選本之外謹排比編次釐為三十六卷以存其概劉致年譜一卷亦附于後集中諸體皆工而碑誌諸篇叙述詳贍尤多足補元史之闕又不僅以詞采重焉乾隆四十九年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀牧庵集原序皇元宅天下百許年倡明古文纔姚公牧菴一人而已盖常人之文多剽陳襲故弗克振㧞惟牧菴公才驅氣駕縱横開閣紀律惟意其大畧如古勁將率市人戰彼雖數不我習一號令之則鼓行六合所向風從無敵不北雖路絶海嶽亦莫不迎鋭而開猶度平衍視彼選兵而陣擇地而途纔一再敵輙衰然且老者相萬矣走年二十四見公于京師時公直學士院每有所述于燕酣後岸然瞑坐詞致砰隠書者或不能供章成則雄剛古邃讀者或不能句尤能約要于繁出竒于腐江海駛而蛟龍拏風霆薄而元氣溢森乎其芒寒熇乎其輝煜一時名勝靡不鰓鰓焉盡閟所有伏避其路而将相鼎族輦金篚幣託銘先世勲徳者路謁門趨如水赴壑厥問之崇學者仰之山斗矣每往來江湖間贐餞燕勞月無虚朝二千石趨翼下風吟嘯自若巷陌之者謂君神仙人嘗謂唐三百年其文為世所珍者李邕韓愈二人或所蔇若市或酬金牣門最其凡論之公盖兼有至其外榮達喜施與宏逸髙朗中表惟一年愈艾而氣莭愈隆顧有前人所未備者然則公之竒侅瑰異者獨文乎哉公没之十一年當泰定改元江西省臣求所述于文凡如干篇将板行世郎中蔣煥華甫走書濟南以文序請竊惟韓昌黎文李漢氏序歐陽公文蘇軾氏序公與二子代雖不同要皆間氣所鍾斯文宗匠振古之人豪也走何人敢于焉置喙辭不獲因紀平昔所嘗得諸心目者姑副所懇公諱燧字端甫仕至翰林學士承㫖榮禄大夫集賢大學士太子賔客牧庵其自號云濟南張養浩撰文章有一代之宗工其出也秉山川之靈闗天地之運所謂百年㡬見者也漢四百年惟司馬遷父子揚雄班固四人兩晉魏隋之間則無聞矣唐三百年惟韓愈栁宗元二人宋三百年惟歐陽修蘇軾二人當是時非無作者雜出其間與三四君子相與度長而絜大並駕而齊驅焉然皆掇拾剽竊不能成一家之言負當代宗工之任此山川之氣天地之運誠有時而或息即我朝國初最號多賢而文章衆稱一代之宗工者惟牧庵姚公一人耳公營州栁城人營州之族好馳馬試劍遊畋為樂公獨嗜學績文早負竒氣非所謂秉山川之靈闗天地之運者乎至大戊申公為翰林承㫖予忝末屬始拜公于翰林是年冬詔修成宗皇帝實錄日侍公筆硯間遂得手鈔公文數十篇玩誦日夜不置其後實録成進方将求公全帙編次而公謁告南來矣曩得寕國所刋本校之既非全校帙譌舛尤多每為悵然也至順壬申之門人翰林待衛劉公時中始以公全集自中書移命江浙以郡縣贍學餘錢命公駸木大恵後學予時承乏提學江浙儒學因獲董領其事私竊欣幸乃與錢塘學者業景修従加校讐分門别類得古賦三篇詩二百二十二篇序二十八篇記五十三篇碑銘墓誌一百四十篇制誥五十八篇傳二篇贊十五篇説十一篇祝冊十篇雜著十三篇樂府百二十四篇縂六百八十九篇案牧庵集今無全本即此序及年譜猶可見其各體文之原數凡五十卷竊惟公之文雄深雅健世罕有知焉譬如太羮𤣥酒食而無味然足以享天嗚呼草𤣥者之有望于後世之子雲也宜哉至順昭陽作噩之嵗季春之閠儒林郎江浙等處儒學提舉鄱陽呉善序欽定四庫全書
