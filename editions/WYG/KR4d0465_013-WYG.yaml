body:
  text: 牧庵集卷十三元姚燧撰神道碑宋太常少卿陳公神道碑大德戊戌燧舟遊湖湘而陳公元凱方持憲節使湖之南既求追撰妣夫人李氏埋銘為粗叙陳姚同為有虞遺裔矣後五年燧持憲節使江之東而公以總管來莅建康馳書請曰吾八世祖宋太常少卿公以治平二年卒塟洛陽其後子以官為家死不以返塟故于太常墓失其地所曽祖少中公訪而得之筆地之名與距城幾何里歩以詔後昆志亦勤哉㑹荐離大兵終無有能至者七十餘年矣元凱始成其志如所筆發墓驗之果得范公鎮所撰誌銘摹以蠟紙副以家乘願為銘樹石以表墓道燧受讀之其先頴川人唐遷于京兆廣明中違亂于蜀家眉之青神其可系者瓊生延禄延禄生贈兵部侍郎顯忠兵部生希亮即太常公太常生京東轉運使忱轉運生簡州司士參軍揮司士生金儒林郎灝儒林生國子監丞克基國子生耀州三白渠規措使仲謙規生皇東東平勸農使膺農使生嘉議大夫建康路總管兼管内勸農事則元凱也子敬立最之凡十二世聞者慨息以為非清風素望之名孰能完有家乘得其傳次如是之多哉燧曰是足為多乎哉苟推其世德而上之之十二世者又十二世而一耳嘗讀太史公書至其叙傳于司馬氏受姓所從上起顓頊子孫官居功烈文辭下及其身而止豈顯親者不嫌自明宜然耶故燧例之由譜姚氏亦逺本曰黄帝生昌意昌意生高陽是為顓頊顓頊生窮蟬窮蟬生敬康敬康生橋牛橋牛生瞽叟瞽叟妻握登見大虹意感而生舜姚墟故姚姓舜三妃堯二女娥皇無子女英生商均一妃癸比生二女宵明燭光禹受舜天下封商均虞城以奉先祀服其服禮樂如之以客見天子示不敢臣傳夏厯商三十二世書可見者虞思箕伯直柄虞遂伯戱五世耳至虞閼父為周陶正武王頼其利器用妻以元女太姫生滿賜媯姓而封諸陳以備三恪是為胡公胡公卒子申公犀立申公卒弟相公臯羊立臯羊卒申公子孝公突立孝公卒子慎公圉戎立慎公卒子幽公寧立寧公卒子僖公孝立僖公卒子武公靈立武公卒子夷公説立夷公卒弟平公爕立平公卒子文公圉立文公卒長子桓公鮑立桓公卒弟五父佗其母蔡女故蔡人殺太子免而立佗周太史過陳使以周易筮之遇觀之否是為觀國之光利用賔于王此其代陳有國乎不在此其在異國非此其身在其子孫若在異國必姜姓姜太岳之後山岳則配天物莫能兩大陳衰此其昌乎佗取蔡女數如蔡太子免之三弟躍林杵臼共令蔡人誘殺佗而立躍是為厲公厲公卒弟莊公林立莊公卒弟宣公杵臼立殺其太子禦冦完與禦冦相愛恐禍奔齊桓公使為工正齊懿仲欲妻完卜之占曰是為鳯凰于飛和鳴鏘鏘有媯之後將育于姜五世其昌並于正卿八世之後莫之與京卒妻完以陳氏為田氏聲之近也或曰食采田完諡敬仲生田穉孟夷生閔孟莊孟莊生文子須無文子生桓子無宇桓子生武子開與釐子乞釐子生成子恒及楚滅陳而恒得政于齊生襄子盤襄子生莊子白莊子生太公和遷齊康公貸于海上食一城太公㑹魏文侯于濁澤請天子求為諸侯天子命之是為田齊太公卒子桓公午立桓公卒子威公因齊立威王卒子宣王辟彊立宣王卒子湣王地立燕齊楚三晉合謀各出鋭師伐齊敗之濟西燕將樂毅盡取齊寶藏器湣王出亡及莒楚將淖齒殺之莒人立其子法章是為襄王田單大敗燕軍迎襄王入臨淄齊故地盡復為齊襄王卒子建立秦始皇帝兼天下滅齊虜王建遷之共自商均國虞至是千九百六十三年矣此吾姚與陳始同為虞中同為媯卒同為田之未分者後建三子桓稱王氏軫將陳氏而不及昇豈昇仍氏田耶自是田或多失傳次王莾自以桓裔追封完為敬王以田豐為世睦侯奉敬王後莾死豐子恢辟亂過江居吳興改姓媯五世孫敷復改姚姚惟陳可以世求軫生秦東陽令史嬰嬰生女成安君餘餘生軌軌生審審生安安生桓桓生願願生四子清察齊尚齊生源源三子寔崱䆳寔字仲弓後漢大將軍掾屬文範先生生六子紀䕫洽諶休光諶字季方獻文先生生青州刺史忠忠二子佐和佐二子凖徽凖字道基晉太尉黄陵元公生伯眕建興中渡江居曲阿新豐湖生匡匡二子赤松世達世達長城令徙居長城下若里生丞相椽康康生盱眙太守英英生尚書郎公弼公弼生歩兵校尉鼎鼎生散騎侍郎高高生懐安令詠詠生安成太守猛猛生太常卿道巨道巨生文讃文讃三子談先霸先休先談先梁東宫直閣將軍義興照列公霸先代梁猶以姓號國曰陳諡武談先子曇倩繼立諡文子伯宗繼立崩文弟曇頊繼立諡宣傳子叔寶亡陳凡五主三十二年叔寶四子莊𢎞徽某某㑹稽郡司馬司馬生某晉陵郡司功參軍司功生兼右補闕翰林學士翰林三子監察御史當大理評事萇秘書少監京少監以從子鹽官令褒繼鹽官生高安丞灌高安二子伯宣伯黨伯宣著作郎生旺旺生機伯黨生元史元史生徽温州司户參軍其自軫至機三十九世晜弟列者正書其傳然自廣明至治平實百八十七年以三十年一易世率之為六世太常而上四世其不可推知者二世耳嗚呼載籍以來不隕其世德者惟獨一門吾姚氏則自梁高平令可系而至今者二十有六世其上則或絶或續匹夫之家其可少覬哉嗚呼亦有甚可感者古人為誌納之壤下必載其世次官勲實用備或世變時遷人有竊發知為何代大賢君子揜之不忍及其匶焉初不預為裔孫克念其祖求徴而謀也今元凱悼陳氏入蜀中㣲太常公始震而耀之亦其家之鼻祖也故既發視𤣥石而得其真大封樹之碑表賁道刻石人獸如其始定于三易代八世之後亦古未聞者故燧感之且敬焉推吾逺本三千歲之上皆有稽于竹帛者詳次授之非足止慰元凱于生死而有知亦必有吾同姓表章及此其庶幾乎孝子不匱永錫爾類者耶因為楚人之辭歲時上冡使歌以祀其言曰峻南峙兮崧高阻西鶩兮函崤趾北邙兮坡陀壖洛水兮波㴞㴞堂封兮偃斧古為藏兮幾何所既夷兮已焉有不夷兮疇焉主將帝私兮之家俾鬼護兮神訶待裔孫兮為告頼𤣥石兮不磨維裔孫兮思慎其守不忍嘿兮求牛馬走曰先志兮其成庶階兹兮來嗣可䆒余亦虞兮遺苖匪妄胄兮華遥其統緒兮可尋具方册兮昭昭年數千兮世踰百生民祖兮或幾及豈伊神明之後兮不與他族而中絶于何孟氏一言遽必五世而斬君子之澤坐令自今讀其書兮亦取二三武成之䇿重曰往者兮垂芳來者兮自望勿替兮休聲與媯水兮濟悠長高昌忠惠王神道碑上畋桞林二月六日丞相臣大都平章臣扎蘭宣徽使臣拜逹實克御史中丞臣布延直侍行殿丞相臣托克托丞相臣圖沁特穆爾奏金紫光禄大夫遥授右丞相宣政使徽政使臣阿拉克布哈言臣伏自去年言念祖考往事列聖嘗著㣲勞妄干威顔請褒幽隧聖量含𢎞曲賜允俞為降誥命追贈臣祖考布爾噶推誠賛治化臣儀同三司太傳昌國莊愍公考銀青榮禄大夫平章軍國重事宣政使翰林學士承㫖領泉府司事逹實宻推忠益國輔治功臣開府儀同三司太師上柱國高昌忠惠王祖妣呼特呼訥完顔氏金源貴侯從封昌國夫人妣高昌王夫人臣雖糜軀補報無所惟有刻諸金石用章天休庶幾先烈託垂無窮敢昧死請制曰可太師臣托爾濟延丞相托克托又言昔盗殺大臣嘗求王文忠公褒揚其功文忠不可其碑故存請發兵士如千百人挽之制曰無庸其令十象輦致仍敕翰林學士承㫖臣燧集賢學士臣愻翰林學士承㫖臣仲夀撰書篆額臣燧稽首承命謹按王曽祖考伊喇克們實竒爾氏初以百夫長事王汗可汗之為大號自唐以然今惟曰汗王今所加故兼稱之曽祖妣夫人托琳齊諾生圖卜布哈齊哩克薩理斡罕哈喇斡罕四人太祖方以神武戡定朔漠王汗與之有間圖卜布哈率其屬二百户來歸徑永古特為其王所止居之蒙古勒地遣其子約蘇穆爾偽為商至帝所控宜然帝遣托掄薩理必塔台二人使永古特王阿勒呼木實克齊呼爾所召其弟與二百户者偕來帝問圖卜布哈在王汗所何官曰為質也俾仍為質宴享則賜班坐大臣位帝征西域盡率其屬以從㑹旌戰勞賜回鶻户五百四十有八在太宗世又從帝弟睿宗平金明年乙未詔定憲宗時以兩諸侯王與蘇布特再征西域又率其屬至有在行中明年至衮騰吉斯與諸侯王巴圖會征欽察俄羅斯至阿蘇齊黙斯城皆先登薩理斡罕夫人哈喇哈納生昌公蘇布特逹巴太宗分封功臣割順天屬縣束鹿𨽻昌公初掌睿宗奏記睿宗上征事莊聖太后領所部民千户歲辛亥憲宗立極從莊聖所求致之詔蒙克薩勒為丞相昌國位其亞天下庶務惟决二人又領諸王副徹辰道伊囉勒琨大食蠻朝覲貢獻敷奏宣發號令諸事明年因敕掌帑藏與祠祀醫卜諸臣于昌國原申前制後二年蒙克薩勒卒領中書省終憲廟世權寵不移四子長故湖廣行省丞相額森布次故御史中丞茂巴爾次王季四川行省平章布哈特穆爾王自㓜事世祖初與令太師淇陽王伊徹察喇同掌奏記後獨掌第一宿衛奏記兼監鄂拓克總管府持為國假貸權歲出入恒數十萬定緡月取子八釐實輕民間緡取三分者幾四分三與海舶市諸蕃者兼户部尚書内八府宰相如馬湩酹郊燔肉告神皆大祀也惟王司之又諸臣䘮疾可通籍入與否必是焉白詔凡祀釐金帛惟視其署有司始給十八年升總管府為泉府司丞相哈喇哈遜嘗奏罷之二十有五年王請復之其年東諸侯王納延叛帝自將往征王前茅而後殿之詔諸侯王而下生殺惟命亦既底平明年其黨一王哈坦又叛成宗時皇孫詔王將衛士千人從討之大破其軍獲輜重不可貲筭哈坦挺身走引分海隅歸奏衛士疾戰之勞請人賜白金為両五十制可及改制制為宣政院以王為使凡天下職僧之官何人宜為從所調奏祝髪之徒入罪罟者惟與是官同聽有司不得專决二十七年叛王罕都犯西北鄙帝又自将往征至杭愛王累戰皆㨗叛王逺遁撫安邉民與置驛傳而還明年拜榮禄大夫泉府大卿凡諸侯王副車贄壤奠至庭者王則傳臚受之成宗元貞之元罕都遣諸侯王額琳沁出兵犯西陲帝召王曰卿名素重非身往不可卿能行無對曰効死臣職惟陛下命加銀青平章軍國重事十月獲額琳沁與所部偕來大德三年兼翰林院學士承㫖領泉府司事最其賜賚珠衣寶帶清東青鶻白鷹及豹出中帑外坊者月異而歲新之不次計以大德八年七月二十有五日薨享年五十七葬狼山水峪二子丞相其長結桑衛皇太后實世王官掌傳臚都王副車凡贄壤奠初尚諸侯王葉卜肯公主布爾罕再尚諸侯王阿濟格之孫公主都掄呼都拉次布喇尼敦宿衛乗輿内八府宰相銀青榮禄大夫大司徒遥授左丞相使太府院翰林學士承㫖娶廣平忠武王女布哷齊女二人長特濟格為東平忠憲王子大司徒鄂都岱夫人次女姑姑為諸侯王瑪納斯妃孫女古濟格為諸侯王哈濟妃因嘗槩王自元甲子以及薨年迨事兩朝朝惟近清光一日未嘗居外實閲四十一寒暑世之知者纔是職守與從蹕討叛數事而止自餘朝夕訏謀左右彌縫入宿出衛所以奠枕九重者其功將多中禁深秘外不得聞惟帝知之故雖没世猶不能忘特崇其爵于百揆上王之高昌使臣隣無以復尚匪獨其身又貴其子兩皆入踐台衮矧其晜弟從子布列中書宥宻者猶衆有之嗚呼盛哉銘曰人臣之位等絶數異進爵及王為世極致嗟王生臣祖宗兩朝禁近身居蜚聲逺遥帝崇象教王使宣政九有祝髪竭蹙聽命王在泉府舶交諸蕃匪利貨還來逺志存疆埸雲擾王每從討險阻踐踰帝躬是保斯皆其外人所易知毗賛于中誰悉宻㣲其悉宻㣲獨今皇上哀其沒世大賁𤣥壤異姓而王胙之高昌潜德由斯爛其昭章猶若為未襲賁其胄丞相聨翩兄先弟後婦王之女女王之妃伊誰能方門閥巍巍龜負螭挐碑是賁道填金載銘天子之詔湖廣行省左丞相神道碑初公以中書右丞下江陵驛聞大帝為大燕三日曉近臣曰巴延東兵阿爾哈雅孤軍戍鄂朕嘗深憂或荆蜀連兵順流而東人心未牢必翻城為應根本斯蹶孰謂小北庭人能覆全荆江浙聞是肝膽落矣而吾東兵可無後虞朕喜以此御筆為北庭書昔魯爾罕希逹所生阿拉克實喇為大將有功信實聰明而安詳其加卿為阿里烏嚕諤齊徳濟伊克恰集賽安班平章求之億萬維臣之中降是宸翰昭乎雲漢之章藹如天語之温崇功襮德匪夸一時可華及子孫百世者纔公一家視古丹書鐵劵出臣子手者何足道也即江陵民封之千家始公㣲時侍燕惟席地坐後特置榻班諸侯王愛實布拉下賜之金罍曰竢至而省必合樂鼓其曲飲是他雜以青白縹色龍鳯御服御㡌金玉珠帶白貂裘西錦珠衣海東白鶻凡所以侈服貴近由娱其心者靡不及公嗚呼盛哉公北庭人妣夫人圖沁呼圖克化胞生剖而出公考額森和卓勿善也將棄之夫人未忍益謹鞠公㓜聰穎而辯長躬農耕喟然曰大丈夫當樹勲國家何至與細民勤本畎畆釋耒去求讀北庭書一月而盡其師學甚為舅氏實喇岱逹爾罕所異歎曰而家門户其由子大及從事大將布琳濟逹俾其子故中書右丞相呼嚕布哈從受北庭書又薦其忠謹得宿衛大帝潛藩已未從濟江帝射虎未殪公捨馬而徒挺矛舂殺之攻鄂先衆而登禽一人還流矢貫喉出項帝勇之賜銀為兩半百先是聞吐蕃有貯甘露寳函石室藏山穴者凡再使求之皆為大蛇竒獸所懼莫至最後遣至其所無所見竟與俱歸勸進之初諸侯王議未一惟一王塔齊爾嘗有書帝忘其誰在也顧左右問公曰臣所有之書出而決兩事皆甚合㫖中統三年制以為中書省郎中褒曰乆侍禁庭已著勞蹟至元改元加朝請大夫參議中書省事發言惟以當可事宜為心不憚伯相而阿其所志人有小疵必白帝前衆畏其口明年進嘉議大夫僉南京河南大名順德洺磁彰德孟等路行中書書省事始罷世侯而易置其地又明年轉亷訪使虎符領鷹坊凡鳥獸皮角筋羽悉征輸官尋領諸路鷹師獵户再兼中都路䦨遺又明年進中議大夫僉制國用使司使又明年故中書左丞劉武敏公拯為䇿襄陽吾故物由棄弗戍使宋得竊築為彊藩復此浮漢入江則宋可平帝大然之徴天下兵領以元帥府觀武襄陽城白河别開行中書省以我少師文獻公僉省公為同僉凡襄鄧唐申裕在太宗世所殘漢上諸州之民避荒汴洛間與下户賦寡者悉徙而南屯田給餉尋罷帥府又明年詔故平章哈坦開府儀同三司平章軍國重事贈太尉司忠勇公天澤來􅊩師宋遣人餛鹽茗襄陽乃築長圍起萬山包百犬楚山盡鹿門以絶之又城峴首開省其上兵興事劇星火公專入奏能日馳八百里敗宋殿帥今平章范文虎于灌灘又明年分中書省事尚書拜中奉大夫參知河南等路行尚書省事又明年兼漢軍都元帥分將新軍四千六十及廢尚書復以為河南等路行中書省事宋遣都統張貴張順將舟師從上游送袍甲犒師自萬山接戰二十里斬順殺溺過所當貴獨以餘衆入後水暴漲慮貴乘出下令軍中舟置燈篝岸積薪槱貴果結戰艦為陳宵遁盡然燈薪戰四十餘里斬之櫃門關又明年遂請以西域礮攻樊城㧞而屠之無噍類遺襄陽甚慘移攻具臨之且曉守臣吕文煥君以孤軍禦我數年今鳥飛路絶帝實嘉能忠而主信降必尊官重賜以勸方來終不仇汝置死所也文煥感而出降十年二月也詔公偕以入覲眞拜叅知政事明年授資德大夫中書右丞同忠武公行荆湖等路樞密院公䇿能籍民為兵十萬合舊軍或丞相安圖巴延一人將之南伐宋社必墟制皆從之故太傅巴延與忠武時皆以左丞相贈開府儀同三司太保并國武宣公阿珠以平章與公及故平章文煥以叅政行省將大軍發襄陽將至郢忠武疾還敵宿兵數萬築新郢夾江為城横鐡絙鎻戰艦武疾還敵宿兵遏我舟師郢北黄灣岸西去江三里所港通藤湖逹漢敵壁其上攻㧞之拖舟入港丞相惟以公數十騎覘新郢趙范兩都統鼓伏兵發葭林諸將倉卒有未甲者人人奮先殄其一軍兩將之首皆致公割趙腦膚撓酒飯之行克沙洋新城以臨復守臣翟貴逆降大軍去而復叛及漢陽故平章夏貴以制置舟師陳漢口水軍千户馬成為導由己未濟江沙武口塗入江㧞陽邏青山白湖諸壁走貴軍鄂守臣張晏然王該王勝以城下遂徇州民衣冠關㑹仍其服行鄉郭帖然漢有奪菜秉者民爭德吾元仁政義聲恨服化晚檄下漢陽夀昌信陽德安大兵既東分四萬人戍鄂咨公留後尋進官榮禄大夫自陽邏置驛以便行商至蔡方請移師江陵而荆閫安撫髙世傑將艨艟千六百艘卒二萬規襲鄂公分兵禦之大敗之荆江口降諸洞庭桃花灘下岳承制以守臣孟之紹為安撫使即西師至公安誓曰自今功者健兒陞長百夫百夫長千夫千夫長萬夫萬夫取進止因南風大沙市戰城上又戰城中屠之江陵精鋭於是馬盡制置使朱禩孫辭疾髙節度逹出降下令安集如鄂岳傳檄歸峽澧常德辰沅靖荆門隨郢復皆下之官其守臣如岳除宋苛法衣食惸嫠詔故平章亷希憲以右丞行省江陵以世傑窮而來歸棄江陵市禩孫徴至京師死猶没入其妻子還公于鄂移兵長沙行㧞湘隂潭守臣植滉柱江中自喬口至城凡十五所皆㫁之又㧞城西柵射書招其守帥李芾速下以活州民不然㧞城屠矣不答乃令諸將畫地分圍決隍水以樹梯衝礮鐡埧石心䑓百日公中流矢創甚責戰益急申命諸將凡所由乆頓兵者卒伍前驅諸將安行其後也自今萬夫千夫百夫之長皆居前列有退衂者定以軍興法從事三日而㧞謀諸將曰國家為制城㧞必屠是州生齒繁夥口數百萬悉魚肉之非大帝諭巴延以曹彬不殺㫖也其屈法生之發倉以賑餓人傳檄郴全道桂陽永衡武岡寳慶江西袁連皆下之㓜主面縛公入覲賀始庭拜平章政事還移兵靖江破嚴關敗馬都統臨川陳張兩總管小溶江諭經畧馬暨不下凡攻三十餘日而㧞公以靖江逺中土非長沙匹民性驁囂易叛難服不重典刑之廣西他州不可言以綏徠其坑之斬市暨傳檄下栁鬰林横邕亷象潯藤梧貴昭融賔宜賀化髙容欽雷為州二十廣東肇慶德慶特為州三特磨農土貴南丹牧莫大秀皆請内屬乃牐全之湘水三十六所以通逓舟承制以萬戸史格行宣慰司靖江還潭宋餘孽益衛兩王改元海中啗人以爵規復其舊全永諸州與潭屬縣之民文才喻周隆張虎羅飛之倫大或集衆數萬小方千數在在為群與江之北黄蘄相煽以動皆削平之偽將張世傑傳欲襲肇慶雷詔公討之且畧地海外無為賊巢過桞州鎮時暑軍士病渴所乘馬蹄地出泉人資沃飲至今名馬蹄泉而偽安撫趙與珞己戍海南白沙港公航海五百里不崇朝而至擊與珞并獲偽使冉安國黄之紀皆磔之諭降將南寜萬安吉陽聞偽王陷南恩公還襲走之降方經畧㑹衛王死崖山乃還復諭降八番以其酋龍文貌入覲置宣慰司從鎮南王伐交趾其君蹈海去得文􅀈昭國兩王以歸後二年入覲上都庭拜光禄大夫湖廣等處行中書省左丞相再月而疾敕尚醫四人診視求見登馬而劇歸即與夫人訣當廿有三年丙戌五月二十五日薨上都享年六十葬都城西髙梁河公元配特哩帝既才公敇陳亳潁元帥郝謙女為亞妃前卒敕復以其妹為繼自陳三召傳至京師順聖皇后為加幗服白金為兩二千五百男六人特哩生故資善大夫湖廣行中書省左丞和斯哈雅長郝生正奉大夫湖廣行中書省叅知政事虎符監兩淮軍格濟格繼郝生輔國上將軍湖南道宣慰使虎符監潭州軍賜玉帯一品冨華善如夫人者蕭生巴圖爾哈雅阿實克哈雅媵生圖嚕黙色哈雅女五人一適故嘉議大夫同知廣西道宣慰司事䇿喇實巴勒一適丞務郎大司農少卿僧嘉努一適中書省㫁事官埓爾錦一適昭勇大將軍監平陽太原軍巴延一適傳詔巴雅爾男孫三人蘇爾約蘇哈雅呼圖克哈雅噶逹爾哈雅女孫六人一適郝某一適平章庫爾濟蘇子博囉一適監平陽太原軍子逹實餘㓜後公薨十四年今正奉輔國以神道未碑出公凡受制書與御筆及公平生行實請燧曰徴是為銘嗚呼兄弟爭與昭揚先德于其子職責已塞矣嘗讀望諸君書善作者不必善成善始者不必善終未嘗不興慨歎于武敏開用兵端視南國為竒貨思圖形丹書埀譽竹帛于今日者後如取諸懐及襄陽下方戍淮西功已不出乎巳大師南伐復分兵淮東渡江㨗聞一失聲而死豈先福始禍者誠如道家所忌耶而公鼓其孤軍留戍所餘不能倍萬名城通都身至力取利盡海表圖地籍民半宋疆理其時將相雖瞠後塵猶不可望公少見最所下州荆之南十四淮西四湖南九江之西二廣西二十有一廣東河南各四凡五十八自餘洞夷山獠荷氊被毳大主小酋棊錯輻裂連數千里受縻聴令者猶不與存其依日月之末光張雷霆之餘威以㑹其成功者亦一世之䧺哉今列其由省幕戎麾與所受降登宰相者丞相二䝉古岱阿里罕平章十二敖拉齊呼圖克特穆爾阿里史格吕文煥特穆爾布哈李庭李順張𢎞範劉國傑程鵬飛史弼右丞四索多完顔諾海烏哲超爾雅爾鼐左丞四塔齊呼唐古岱劉深趙脩巳叅政十三賈文僃鄭伊克何瑋張鼎樊揖朱國寳張榮實嚢嘉特烏嗎喇博囉和塔拉髙逹馬應龍雲從龍都元帥宣慰使總管萬夫千夫之長又什伯是觀出其門衆多又足徴公善推勞人也初北上田租畞取三升户調歳惟四兩及定湖廣税法畞取三升盡除宋他名徴後征海南度不足于用始權宜抽户調三之一佐軍時以為虐今較江浙諸省槩增倍蓰獨西南賴以輕平其鏡館傳修潔亦甲他省生祠所在岳潭枊雷公安皆一而嚴關與全與獨二銘曰疇曰江漢南北之限天裂幅隕可恃為捍天混皇輿其險則那古以求之同軌不多秦漢兹降吳平于晉陳兼于隋矧趙遺燼曜靈生東有炎朱光爝火之㣲宜爾滅藏於皇大帝神武不世行所睿思效若龜筮由夫潛藩自將六師鵃䑠浮江亦既越之歸正丹扆群䇿明試加兵襄陽五稔克止公曰乘勝籍民授兵將以大臣南國用平帝曰俞哉惟爾協朕假爾以鉞誅彼干禁大師克鄂鼓行而東四萬其徒留後屬公公乃按圖吾與吾守待敵伺先孰與進取自鄂而岳自岳而荆長沙桂林皆􅗴以兵餘州數十雖定傳檄執讋言綏心亦孔棘又鋤武庚于海之南左右皇子交州是戡疇知公勞大帝簡在衣裘禽集靡有遺賚不事故常墮其奎章㨗㨗翩翩龍騰鳳翔又錫金罍合樂而飲臣鄰之家寵未有甚猶若未然丞相是崇與太傅公同元元功甲子二終𤣥閭是宅夀止名埀晰晰竹帛北方諸流所王維河九里漸濡尚其餘波宜公有子匪相伊使不專美虞實克延世其北居庸盧溝在西有碑斯豐流峙與齊牧庵集卷十三
