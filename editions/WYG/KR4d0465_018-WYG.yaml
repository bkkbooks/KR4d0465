body:
  text: 牧庵集卷十八元姚燧撰神道碑領太史院事楊公神道碑嗚呼有秦君子楊公諱恭懿字元甫其先始鄉耀之同官中避宋亂徙美原五世祖儀徙今京兆之髙陵與髙祖亨再世力田曾祖植祖禮再世仕縣吏考天徳擢金興定進士第由博之聊城丞掾陜西行臺權大理寺丞主今兆長安慶陽安化簿辟令順徳之隆徳及安化而安化兼録事州之判官三職其脩積官中大夫其徳其烈有先師司徒許文正公墓誌言章宗南郊為太常臣授幣而立御史將劾不恭其友曰大夫習于禮者名行祕言盍從而問曰授坐不立御史慚縮而止太常則孫公通祥實公外王父公以正大乙酉生于其居京兆之雙桂坊童而讀書記識强敏日數千言時艱從中大夫逃亂而東不恒其居于汴于歸徳于天平雖間闗險阻未嘗怠弛其業年十七侍中大夫西歸無田于郊假室以居鄉鄰或繼其匱皆謝不取惟服勞以為養暇則力學綜博于書無不經目而究其心者樞衣之徒户外滿履横經入問為析疑義源源其辭若決江河而下之名聲日延海内縉紳友太中者馳書交譽知之膚者求觀其文侈其肆者以為鱣堂之席有繼與其極者直期以宗盟斯道于將來時已邃易禮春秋思有纂述耻為章句儒而止志于用世反覆史學以監觀廢興存亡理亂得失于千數百年之中曰輔世之具禮樂兵刑禮樂非王者果為不可興行于天下兵恃以芟暴亂而安元元刑取其弼教循本以求皆仁義之資也不講之有素或一旦帥三軍為士師貿貿焉不知其方反受成教武人俗臾乎事雖未試從可㮣見其佐王之略年二十四始得朱子集句章句四經太極圖小學近思錄諸書誦其言而推其意嘆曰人倫日用之常天道性命之妙皆萃此書今入徳有其門矣進道有其塗矣吾何獨不可及前修踵武哉窮理以致其知反躬以踐其實動静云為一乎持敬行之以剛健居之以悠久日就月將俟其成功于􅅗齋之下自任益重前習盡變不事浮末矣嵗甲寅司徒奉潜藩教來秦公往見之際其道徳之光聞其仁義之言于傾葢頃心歸服曰世烏有斯人之倫敬事猶師而司徒友之亦至分庭而行抗席而坐一遇講貫動窮日力而所造益深平居訒于為言䘮中大夫絶口水漿五日䘮𦵏用牲盡袪䘮門惑世之法為具不足稱貸益之棺槨皆黄腸衣衾必縟疏衰􅊡粥悲憂為疾杖始能興司徒㑹𦵏歸語學者曰小子志之曠世墮典夫夫特立而獨行之其功可當肇脩人紀聚居六年司徒東歸𦵏夫人猶中大夫其疾益阽三輔士夫而知由禮制自致其親者皆本之公先是宣撫使行省欲以掌書記共議事祿之皆不能屈至元七年詔司徒由國子祭酒拜中書左丞始與右丞相安圖共政日譽公賢丞相以聞十年上遣協律郎申敬來召疾不能行十一年儲皇下教中書汝如漢恵聘四皓者其聘以來故丞相遣郎中張元智書致是命其冬下車京師上遣大臣勞其逺來他日入見上問何鄉先徳為誰從何師學子今有幾無不周悉其夕嘔血上遣尚醫來候且賜之藥少間明年元月元日之翼日上御香殿以太師南伐使久不至方念之深欲筮之時以日者待詔公車百十為輩獨以命公蓋以其道徳素著可交神明者其言頗秘侍講徒單公履請設取士之科詔先少師文獻公司徒竇文正公與公雜議公上奏曰三代以徳行六藝賓興賢能漢舉孝亷兼䇿經術魏晉尚文辭而經術猶未之遺隋煬始専賦詩唐因之使自投牒貢舉之法遂息雖有明經止于記誦宋仁宗始試經義亦令典矣哲宗復賦詩遼金循習將救斯弊惟如明詔嘗曰士不治經學孔孟之道日為賦詩空文斯言足立萬世治安之本今欲取士宜敕有司舉有行檢通經史之士使無投牒自薦試以五經四書大小義史論時務䇿夫既從事實學則士風還淳民俗趨厚國家得識治之才矣奏入上善之丞相每咨世務倚以自毗㑹其北征公遂請畢男婚而歸十三年詔改厯太史王恂總算同知郭守敬推側司徒明厯理或言公嘗推厯終一甲子而得日月簿食者七十有竒曰日月之𤯝古無是之多也十六年召公著厯義十七年詔時厯成奏曰黄帝迎日推䇿􅀢頊載時象天堯之欽若舜在璣衡周太史正嵗年以序事皆日官世守其業隨時占考以與天合暴秦焚書廢古偽作置閏嵗終兩漢因之建厯之本必先立元元立然後定日法法定然後度周天以定分至賈逵譏其守一元不與天消息杜預謂當順天以求合非謂合以驗天者皆確論也臣今治厯廢厯元日法析舊儀六合三辰四遊而異之省天經黄道惟用四遊移天常赤道遊于南軸之下以取候視之無窒倍八尺之表而五之以影符進退其晷使不失於芒忽日日測考積月為嵗積嵗為世必于厯法益精益宻非但正數十年一改之弊且可上追黄虞三代之舊矣又曰一月之始日月相合謂之合朔漢太初厯用平朔法小大相間或有二大以故日食或不在朔先後一日時亦鮮中宋何承天䇿四十年得三大三小以正朔望使食必在朔隋劉孝孫劉焯為定朔唐博仁均取以造戌寅厯貞觀竟改從平朔李淳風造麟徳厯得四大三小求避人疑間以平朔又為進朔使食避元日一行造大衍厯以為四大三小何害今授時歴後是二年當十九年自八月後四月併大實日月合朔之數皆改從實方奏太史臣皆列跪詔獨起司徒及公曰二老自安是年少皆授學汝者故終奏皆坐畢其説亦異禮也授集賢館學士太中大夫兼太史院事明年以徙家得請歸又明年儲皇俾靈臺郎岳鉉召後中書議相承㫖李濤儲皇不可以公為識治再召又明年詔詡儲皇以為太子賓客二十二年召明年以昭文館大學士正議大夫領太史院事召二十九年以耆艾議事中書召皆辭疾不行三十一年亟疾親賓問之忽長息曰有是哉國哀也聞者危之亂以他言徐又曰誠哉後三日顧言子寅曰敬慎小心以卒實正月二十有五日也後嗣位詔下則賓天果以其日人以為平生與國至誠所格嗚呼使入哭者有如温公則公當亦如吕誨起言天下事矣徴士蕭􅆽誌其墓曰朱文公集周程夫子之大成其學盛于江左北方之士聞而知者固有其人求能究聖賢精微之藴篤志于學真知實踐主乎敬義表裏一致以躬行心得之餘私淑諸人繼前脩而開後覺粹然一出乎正者維司徒暨公嗚呼誠知徳不易之言哉後十年寅以江南行臺監察御史疾得告去自金陵過宣以燧少受知公而耳其雅言求銘墳道然所貴乎君子三焉耳得于位耳道耳得于心之謂徳用于時之謂位行其學之謂道如􅆽之言同其徳矣未及位也以年考之司徒之生前公十有六年入見前十有四其卒也前十有三而卒官皆昭文舘大學士領太史院事同其位矣然是位也皆極人臣之亞為古八命位實行道之鎡謂不得君知名而召既至則溫其玉音以勞疾則尚醫交候饋藥大官繼膳疑政賜問入見坐語聞辭則留留而不可暫聴其去去而思之復召司徒十召公八品其體貌之亦至是哉如是而兩公迭為循牆不可謂道之行亦天也雖然天道逺遥不可以已事而知必來者始見猶農夫焉未有播粒于土而不苗者今也四海匪獨士子凡筐篋之吏求售于時其誦而習亦先四書蓋天理同根人心誦其言而衆則為其道者將多非兩公肇是太平之基其誰力歟斯古之人所以重歎其善作而不必善成者也公以卒年三月從𦵏中大夫之昭文有潜齋遺稿髙祖姚齊氏曾祖祖妣皆紀氏妣寇氏孫氏夫人李氏以柔嘉作配君子姻里徳焉三子寅其胄也寅令令京兆蒲城㝐方學女子子四人適主京兆長安簿席貽士子馮嘉鳯翔提控按牘王繼述樞審院椽傳昱男孫僖女子子二人長適吕曾幼姆銘曰維天生賢匪使自有俾拯烝民為責已厚公于明命實肩實負乾乾其行艮艮其守師古䘮祭如禮不茍三綱之淪我條自手推得其類無倦誨誘學者宗之西土山斗鳶飛魚躍潜齋自蔀令聞之延已徹宸黈束帛戔戔賁及林藪丹扆曰來何暮汝叟大師之南伻斷已久其宜進退汝蓍以叩又曰多士文字儷偶求得碩才奚䇿以取又曰厯義羣啄紛糾汝折衷之其從誰某凡是大政無不可否公拜稽首澹膽悉剖丹扆曰噫惟兹儲后端本萬邦汝賓以友儲后曰今識治黄耉惟汝為可股肱元首公益抗章臣早衰朽養安踰紀僅止中夀歸從先藏奉政之阜止阡有碑無我樵槱垂詩千齡以告爾後鄧州長官趙公神道碑有虞臣伯翳佐舜調馴鳥獸賜嬴姓其後費昌去夏歸商為湯御孟戲中衍為太戌御至周造夫為穆王御服盜驪驊騮騄耳之驥西廵樂而忘歸徐偃王反復御日馳千里破徐賜趙城為趙氏其子孫㪚居何望傳次幾何至公者不可記然由所記憶其先家代之繁畤金亡去其鄉凡再徙始為冀之衡水人又為蔡之平輿人天興癸巳之棄汳播蔡也公以善射足力材兼衆難倡義兵數千為帥聞天兵圍蔡急城中糧絶乃率部曲發平輿富室藏粟負擔疾戰百死奪圍上餽召見行闕嘉其忠勞敕銀符提控復潰圍還保平輿明年甲午金亡將戲下步騎數千下宋時襄陽制開閫改信効左軍統制制閫後厭降將多恐聚此叵測漫為受犒欲致盡阬之大尉江海䇿曰且人窮而來歸誅之不義又吾閫所節度四十五軍半北人令此加誅則吾軍北人各有心矣徒足啟猜長亂漢北之州獨鄧近去吾閫程再日耳北與敵隣乘彼虚棄未戌盍遣是衆先之在彼有生降之徳在我有復地之利一舉而得兩者也閫然之别遣路鈴哈雅實克將若干千人為監來戍至則與實不相善益聞前吾所好相下而顧不容將以計誅又一軍譁譟皆言制閫不足為盡力㑹明年乙未十月天兵略地漢上集將佐南門商戰守宜公扼劍前衆曰始吾下宋正求活我戲下數千人與若妻孥而制閫欲一切以計殱之情露而事廹者數矣今幸出戍不獨任吾别將監之一旦誣以他罪盡無吾噍類反掌不難為也誠不忍若泯泯膾脯冦手必歸皇元後應者斬統領徐海獨辯不可立斷其首以狥一軍皆呼抃受命馳造實營執以出盟令呼宋兵投伏脱甲不吾犯若一人盡歸之襄陽如輙肆動皆誅死實駭汗異常目眙瞠舌橋然不能下頃不得已乃親呼其軍如所教者于是皆受命復與將佐為約是州生齒十萬今日之事將求生之非固苦之將思完之非固離之衆曰生完之耳離苦何為公曰若既相思矣其無殺人父兄而臣妾其子女以利貨財與懐復許矣衆又曰不越公命也乃開門納吾元兵事成終朝肆不變市為具車馬遣實令將其軍盡還之襄陽少不怨制閫昔者圖已而甘心此軍也居再月太宗為太子南征過教以是城甚近襄陽虞力孤不能以自完且嵗荒與均唐三州民徙洛陽之西三縣鄧治長水均治永寜唐治福昌許公權宜行省事乃先勞分苦佐乏藥疾剪棘墾萊府寺田廬於粲一始明年丙申襄樊亦徙洛陽其年公入覲特賜金符錦衣許出戰督軍入守字民别降銀符八十金符八以酬從公將佐同力者奏洛西嵗又荒乞嵗得大名軍儲米為石四萬五千陜州鹽為斤若干萬以廩餓人制可如是資食二州三年後嵗登乃止辛丑授鄧州奏以弟將州兵州兵亦可而是州兵民始分後十二年癸丑大先朝今上以太弟之重命故丞相史忠武公經略河南始屯田漢上張平宋本盡還為徙五軍唐襄樊五州民實南公始復鄧時宋已築襄樊均皆宿重兵徙民各歸其州惟是三州之民無所于歸襄樊僑治州北均僑治西皆倚公為援南州數十里淪為盜區戰外耕内四年之間積榖石七十餘萬丙辰乞骸骨不報明年疾卒實丁巳春三月十有四日年六十有一其月二十有四日肇塋州東南之曲専里以𦵏自䘮及窆祭哭聲振城野數萬人昔受公生之死地者公諱祥字天麟魁貌碩躬望之威如孝親友弟及有地方數百里秉鉞垂符常布衣韋帶粗冠敝鞍江漢大都督為言衣冠貴賤章也何乃為自過儉下自同庶服耶不恤也與將佐言公府則吾節度汝不可不嚴名分之守私處則汝皆少所從起相習者豈可遽脩邊幅改度平日也必齒坐序飲其疏簡目節直坦與人不疑和此考贇妣李生子二人長公弟彦即將州兵者大考仔曾大考康三世連不仕饒資樂施夫人霍以賢聞子一人昭勇大將軍保甲萬户侃今鎮衢州男孫三人伯元仲亨叔利女孫四人適耶律弼李友端劉仲溫季幼槩公之始遭金季年出無授知託援之臣入無素勲可籍于家奮其孤身百戰前驅積勞而加數千徤武之上亦何壯也且人之才相為十百千萬不能齊同以一人當一人為衆人以一人絶出千萬人之上是曰傑俊方天定命昭昭而昧者疑所適歸彼千若萬人奔走為依求以自全其受是依者内揆無可出險反正之才豈以一身貿貿先衆徒死則依人者猶不難于為人依而受者也金既隕祚而後將十餘旅之衆下宋其志仁此人也及宋不察將快其肆毒已乃北戍鄧州為置監將防虞而戎偹之其伺􅀈竊發不保其終何如也非公謀斷灼知改玉安能轉禍為福侯食此州哉然由公而上不仕三世潔實儉勤積累悠長能㪚宿居芘後之功既碩既豐而始大興此勢之必至理之固然者今侃也即基堂之龍盾虎符列名平宋功臣非公作則之報而誰諸孫繼繼脩偉則是澤也夫豈一再傳而遽可艾之耶後𦵏三十有二年至元二十有五年戌子侃自衢遣叔利五千里持衢學官鄭怡所撰行狀走鄧請述墓碑燧哀其在揚厲先烈嘗家洛西與我光人居相宻邇而遊相好也故不終辭銘曰穰之東南有堂其封下為平輿趙公幽宫返是之年周甲子一束髪樹名古人自必翊將衰祈偶方興時如鬬孺子賁獲自支金鼎沉淪提是窮旅曰奔與國涉漢南騖來戍是州始脱危阽乃棄是星日月再瞻甫少庸蘇熯螽薦沴徙北就豐于洛之汭洛凶亦然移粟大名以及還南保甲戰耕與是州民耄穉十萬形影相祔千里往返厚深之仁崇阜增川宜是州民戴為二天朱邑桐鄉古弗是過卜置冡傍萬家且夥有子將軍方耿烈光虎節斯皇孰云公亡匪銘伊白匪石安邈我筆載兹後來者頥提舉太原鹽使司徐君神道碑至大三年中奉大夫僉樞宻院事徐毅慼言于燧先人人以雅善故御史中丞王博文當其為山東河西提刑丐銘先祖提舉府君墓碣中丞不讓而援翰昔毅與子嘗授嘗太傅許文正公于胄學為同門今子長翰林毅僉宥宻為同朝為先人于中丞無是也又子亦識吾先人古所謂知死知生者兼有之其遺善可筆以示雲仍者非子誰賴哉乃序之曰君諱徳舉字進之曾祖澤姚郭祖閏妣郅世農平陽趙城以本富聞石明里考玉材武為皇帥府提控提領崞縣岢嵐州長官後馬公行刑部奏提舉河東南路常平倉妣夫人髙以嵗丙戌生公數嵗撫而謂曰是吾父登金詞科令岐山出也身教之書及長又資使學仕俾嵗偕計㬰趨龍庭甚為參尚書省議樂齊賢馬文玉二人者知擢以為掾巳未遣迎世祖于江北陽邏且徴兵山之東山中統壬戌省調平陽路轉運司經厯以妣夫人憂去官後六年又居考提舉府君憂安西王國㤗凡河東河南山之南與陜西食解池鹽地皆置使督其賦入悉輸王府以君為太原舊由其地炙鹵民盗煮食有司雖宻其禁犯者終不衰止而賦日益不登遂弛其禁聴民煮食惟户責輸賦漕司行習久矣至于都漕欲變其法復轉鹽鬻民君以為若然是驅是邦人納罪罟也仍乃弛其晚惟衆遣吏巡迾不使賤估盜販出境而加賦其舊三之一也民便安之不績亦最陞提舉棄而不仕其平生履厯已此不可謂達而名傍聞四方士夫從之遊公侯用其言而人亦樂以急難見求者在夫重諾而趨利負氣而尚俠其事如李璮將為亂自益都傳檄求臣叛王而平陽總筦李毅不思移文太原為忻之監州恩巴楚所發故兩總管皆誅論毅子青童尚孩坐徙遼海君哀之帥毅家童訟之宥宻以為祖宗之法父子罪不相及且昔檄事青僮何知與禍至兹非昭代罪人不孥之㫖宥宻遂奏而還之今戍四川長萬夫襄陽既下之明年將平宋詔籍中户為兵民甚駭愕至有自􅀈求脱者總管烏塔患之廹君詣宥宻受其成法得于三户抽一遂懐檄歸虞吏為奸教侯取籍閉府幕道院身自差第三户優劣優者為兵劣資其力令出人稱為平有泣謝者初世祖征雲南師未及境書遣三使諭招三人者言祖宗之法殺詔使者城㧞必屠萬一蠻夷怙惡或賊殺臣願無以臣而使是城噍無遺類至則彼以為誕皆殺之懸尸于樹大師既至求其首或謂投洱水中遣漁人網取無所得火其骨函送其家復其門徭田租中一人秦州士子王姓分蠻口數十于州俟其子壯付之後三十年當嵗丙戌詔西省臣訪求三家在亡蠻口已為郡豪張某者冐有王氏子顧受其人傭直君言之憲府坐郡豪以罔受上思官吏見知蔽匿者皆罪黜而還正其口王氏子民奴有嚴姓者主利多直鬻其六七男子于商胡君憤然曰奴有男女若是衆多則知頼其為力也久忍重奴商胡分鬻他地哉白其府曰主郡既有名郡籍則奴亦郡民烏可不告所由而輙鬻之總不損吾户數實損户口府是其言行已數舍遂追還之代贖為民猶其外者至語其家衣止大布大帛食無兼味飲酒不數龠事繼妣石有孝譽分田以恤女弟孀居為子擇師俾齒胄學其知親賢又如何也恒言以飭諸子曰立身本學治生本力穡儉勤羡以周匱急無多積以自灾取友不可茍合勢利臧獲久故既火其劵多至千指自今事汝久者其縱遣之當不恙時伐石為槨穴地倍常有半曰他曰無厚藏明器用陶無法流俗侈靡崇事浮屠以大徳癸夘八月六日卒年七十有八九月二十有八日𦵏石明里先塋以前卒二十有一年元配同里毅母盧夫人祔置毅為治書亷使風紀中外刑曹惟觀今為内總六師外置諸軍逺及為贈祖玉嘉議大夫上輕車都尉平陽郡侯妣髙侯太夫人考徳舉太原鹽使司提舉贈中奉大夫䕶軍平陽郡公妣盧妣邢皆公太夫人非文賢而能之乎繼妣邢夫人生投轂轂濟投宿衛成廟轂掾河東憲司榖大郡永濟倉使與濟皆不祿女歸江南諸道行御史臺治書裴居安男孫四人女孫四人銘曰嗟古君子許友以死非父母存曾不有已後世不然輕合權輿橈酒以金矢死大渝小棘見問聞已掩耳大而去之逺若讐恥允義徐君閔其故侯世業塗地而身亦劉童子何知亦遐以置曰是聖代開伐及嗣教訟于庭萬里還之俾克再家虔秉將戲民有不幸為勢壓仰無待籲求我則往直謂為非俠刀善砥名謂之為俠不蹈難行其居而家井有條理施以裕人自奉則菲伊誰無子無不欲賢師匪其人學則滯偏遣毅齒胄從許文正耳其嘉言目其善行故出用世尊聞行知為民所望宥宻賛毗不昌其身而昌爾後逾信百年種徳始茂子貴而碑令甲得為可恃以傳太師友辭戍守鄧州千户楊公神道碑楊公諱彦珍世汴之杞人曾祖考某祖考某考直皆不仕金垂亡也鄉里及旁縣豪傑以公質而義沈而信脩幹有力馳馬引强奔走服屬之至有二萬衆將之來歸授萬户徙河内定興思立戎勞不樂民治宋將彭義斌侵山東東方諸侯皆避不出犯其鋒或聞風景附始將百人從故張蔡公戰淮北復徐邳兩州勞陞將千夫戰淮南破光廬兩州及安豐軍戰漢上㧞光化棗陽先登又破信陽軍戰襄陽走王總管牛首山斬張太尉鹿門破荆南沙市初鄧既降以嵗荒盡遷其民就食洛西留軍戍守㑹故中書左丞劉公來襲戰塔橋古邨黔陂屢北之其後山西逋民由雕磵故宅岡將趨襄陽率步騎遮止之假種牛曰吾在此汝可去父母邦而南耶與故中書平章游公築楚鐡狗兩堰以灌屯田嵗收粟為石無慮若干萬沾饑羸為口亦無慮若干萬嵗甲寅以平生小大數十戰身被三鎗老厭苦兵子珪能荷芟矣諸憲宗朝求嗣已授副千户得休居十三年以至元乙丑春正月十有八日卒年七十其月二十有九日𦵏州西北十二都之靈徳鄉蒼龍潭壖夫夫同縣盧氏後公卒之二十五年當至元之二十六年嵗辛丑年九十不恙珪及其三秀秀成玉與男孫十有六人與祖世榮欽祖光祖述祖崇祖儀祖遵祖協祖繼祖孚祖襲祖康祖㳟祖由祖亨祖女孫十有八人男曾孫五人儼伃侃偁僎女曽孫八人最三世子孫曾孫男女已五十人男婦女夫甥孫猶不列也朝夕若嵗時問安為夀其前堂宇隘不能容班之庭下之人望之蔚為盛門非天章公潜徳昌熾後裔而何况珪克對前脩有光乃爾耶始有副千户江漢督府版令將突騎干時宋宿兵襄陽與君掎角臨鄧督府度房有恃而虚别遣將以萬襲人之反為均兵遏絶令將所突騎為援戰分道口斬其副將杜胡又戰馬嘶山通道出之從史經略援蜀之開達兩州戰李義聖耳諸山又戰同波訾萬石壩晉城寺獲生口五百城母徳章以拒合州又城大軍平以闞廣安軍歸從故中書左丞相阿珠公圍襄陽戰小堰堡南漳鴉及八瓣凌三山禽解都統樊提轄湖城砦馬軍趙總管野鵝池劉都管肨山問採司王總管狢子川禽無名將樊城斬六年襄陽廼下勞授敦武校尉從中書右丞相巴延公越安陸戰新城降黄宣慰坑沙洋邊都統火死下沔陽攻漢陽先登㧞之戰鄂之陽羅步獲船五十五艘遂濟江下鄂又從中書故左丞相阿爾公分兵而西戰荆口降髙安撫下鄂攻荆南沙市先登坑之徇地峽州下之鄉民多趨險奔施擇峽屬縣宜都富民言動衆聴者駱升署為邑令追還五千户從圍潭州戰西門鉄壩三先登進武略將軍千户金符從下衡永全道四川㧞静江進宣武將軍總管虎符下栁西融州徇地海外未至召還進明威將軍副萬户再遷廣威將軍真為萬户戍襄陽最其受仕至今三十三年所援㧞破坑下名城三十而縣不與禽都統一人總管三人斬州副將一人降安撫都統各一人討湖南叛冦生降渠首四十五人皆全脅從及城㧞而當殱言之大將而脱者不可以鉅萬計小大之戰七十餘身被者五創矢分右巨擘洞肩汰股貫踵先登壓陴而顛血嘗出口積是勞勩位踐三品力有可至數所得為伐石人獸樹列神道又悼公平生與國立家之多艱也石銘之碑無以白悠久自襄走鄧託筆于燧嗚呼臣之事君猶子事父雖出蘇武告李陵之言而千載以為得然事父敬身事君致身道固有不悖並行者曽參將死召門弟子啟手足以示全歸其平居則又以戰陣無勇為非孝夫小而殘形大而隕元至不旋晷孰速戰陳茍于是而曰吾全歸吾全歸則天下無授命之臣君何賴以守邦人子惟無事戎行不善將身以死者是成不孝而執綏援抱以死固其所也况戰不必創創不必死與雖死而名日延哉嘗讀史氏書見鬬將之登陴䧟陳折馘搴旗大者百戰小者數十其身所存鋒鏑遺餘必慷慨感發思有若人者生今之世得奮筆大叙其雋功亦志千古之一快也觀公父子踴躍于金革視身外物再世一轍庻其人焉惜吾文之未稱副也銘曰世曰文士武弁之易謂勇無謀似而非是讀人物志論第英雄英之精秀草木華同雄譬徤獸逸羣振迅天於恒人此與彼吝或畀其全萬邦表貞英故明智雄則勇能人才文武異同胥附武遏亂略文太平具亦既太平忘戰必危猛士赴敵生死斯湏彼文維臣何有是戚執簡之評其可輕出於鑠維公鄉豪始宗無基于前造大金躬金厯祝㫁有衆二萬來歸太宗獨何是亂棄民而戎轉鬬漢淮戍鄧空郛招逋立閈鄧人病饑我徃耕之鄧人聞戒我往戰夷丐老而休年宜延夥而止七十𤣥宅長卧生子如公亦毅能兵克越蜀荆三十名城金石所創凡十五嬰虎符以庸鉄鉞専征曰是徵效先人之教五鼎三牲不享榮報發其幽光𦵏令存章庻幾子心少慰䀌傷切雲之碑蚊奴龜負史臣是銘滋久無斁牧庵集卷十八
