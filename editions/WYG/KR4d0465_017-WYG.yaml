body:
  text: 牧庵集卷十七元姚燧撰神道碑潁州萬户邸公神道碑公邸姓保定行唐人諱澤字潤之曽祖亨祖義生考府君諱琮金符總押真定大名河間西京保定洺磁濵七州之兵戍睢州以卒公年十一世將是軍七年去城亳鹿邑避河流齧移戍潁州城久荒棄剪荆以苃隍塹樓堞官舍民廬皆所經始宋勍將夏貴夜悉銳東南壁公將射士當之大呼疾戰矢下雨注又虞士氣久用將奪戒司史促其漏丙夜伐五鼓敵以為旦出竒騎撃不利客也騰藉崩潰積骸如京創此大治始不輕犯戍是十四年世祖即位如故事盡收臣下先朝制書符節故公金符亦入之官明年制賜還之至元入觀賜錦衣弓矢鞍勒用兵裹陽將是七川兵半以行大保并國武宣公時以都元帥鈔鴉山㧞平塞砦功最幕府賚白金為兩五十金衣一從城長圍襄陽六年當十年癸酉乃下明年從太傅巴延公時以中書右丞相督大軍南伐至郢初宋遣殿帥范文虎將兵援襄陽度不得進為城郢偹鎻戰艦江中列礟于㟁遏我舟帥下今盪舟黄灣進藤湖入漢越郢去從㧞新城沙洋下復師由沙武口入江從戰青山磯多所俘馘鄂隨下行省論功行賞賚曰銀為兩三百明年留故左丞相阿爾哈雅時以右丞分省守鄂大師其東從右丞分兵下荆南功進武德將軍管軍總管又從攻潭州流矢貫肘汰股裹創復戰城㧞進顯武將軍明年從攻静江礟􅀈傷首岑岑垂絶已日乃蘇既㧞從省還湖南其年宋亾陳宜中挾益衛兩王浮海據門爵人號年規為興復倖利之徒在在起應而羅飛張虎周隆尤其梟傑屠殺長吏刼民為兵動萬為羣阻山為砦以抗官軍衡永路絶公從􅗴平生致三渠裭皮以獻進懷逺大將軍萬户虎符俾將其軍監郴州位總管上至則平郡賊蕭良弼刳兵之餘城中户纔四百布檄招徠安集之内則基屋火餘外各復産其鄉期年將倍萬家孔廟尚茅屋擢進士左元龍為校官佐其工材俾任興葺稍如平時州界韶酃遏韶㓂不窺冝章而興寜之民效惡酃盗聞宣慰司將調兵萬人加誅未啓行公衝焉摯金帛即說曰今盗始起而從徒未繁官軍遽入民懼俘殺必出逋逃無所適歸勢與盗合是驅使為逆也請歸身任致討許之乃歸召父老豪傑曉曰吾止官軍不使得暴吾境汝佃民有從亂者不以相坐聼執送余自贖得五百人惟誅首事二十人餘悉縱還南畝連三大役始得占城之師入以深蹈死地忿怨無施所經城市肆行剽奪瀕道居民十室九空六耰絶種至郴亦然公捕得為暴數十人械送軍中詰其部將威公不伸皆市杖之其徒一夕潜遁踰境再以日夲之師貴造海艦十五艘度費楮幣為貫七十五萬取材有制戢吏侵牟用未能半事已告集後以交趾之師賦餽来千石入桂公曰自是入桂陸行千里負擔之民人勝五斗而止已二千人為擔夫負裝糧者半是行未中道委負而逃可前知也乃集丁之家謀曰吾將出家貲貴諸縣即桂如數䊮之上不失軍興而下可紓民力何如衆歡吹稱願他日比貸錢如子來歸公悉選其嬴又請罷陶坑銀鎸户賦酒醋嵗荒發廪而後聞皆良政也又遷廬州䝉古漢軍萬户郴民耄倪號呼遮留如去親戚未至改潁州萬户戍無為軍至是七路之兵全集戲下而軍容益盛盗起江東省以公威信著譽檄公以其軍討之饒信先譬以禍福皆不煩兵而從宣徽怙惡乃夷萬人于南陵旌徳涇縣又鋤萬人于績溪尤劻勷劻勷璧何秧塘山山周十里峻二百犬省臣以六萬衆攻之數月不能下者因留戍徽蒹拜都萬户之一軍徽民方安之尋還無為省議餘杭勝國故都非得如公老將一軍遏而閑之綏而安之不可故移戍杭以二十有八年其嵗辛邜夏六月二十有一日卒年六十三平生忠直沉毅讀書專經左氏春秋故能謀成而事立臨財不恡施予有積則均之昆弟姻戚其再至潁故人部曲捐金委帛致殷家及疾或在告計日辭禄後卒十三年子武徳將軍潁州萬户戍杭元謙紹介其友劉致持事狀為書燧曰先公之匶藁藏潁濵今將舉歸先塋数宜有碑不得君銘恐勲勞不足以信來世敢泣血請故銘叙此嘗聞國初以二萬户鎮撫中夏右則劉伯林軍秦左則納罕重山軍燕顧成則益大尉忠武史公天澤為真定河間濟南東平大名五路萬户于中後强諸侯頗以力夷惡相下屬皆求名將其軍而千夫之長亦凱得焉由是萬户布列天下其勢雖分然父死子繼兄終弟及相傳虎節一命三品世世不絶則未始變不若治民治賦之臣者死子孫以門功官自下而髙如升階然所可儕比則國家貴以捍侮四方勸忠而收其死力者豈不至且逺哉觀公造家譬則為山嗣睢總押其覆簣也于時是官未必視長于夫何以言之從下荆南勞亦􅀈矣授以總管得以千夫之長同禄轉而西南勁敵是膺堅城是臨莫不賈勇奮其前殳顧以是身于鹵三軍入百死而一幸生遂長萬夫比德開國大藩諸侯殆成功九仭者其為大夫亦壯烈矣然非凴夫大帝赫恕有是南國用武之地技安施哉此夫史公賛蕭曹輩為依日月末光隂符所謂天人合發者也三夫人元配郄氏嚴于持家前卒二十一年繼配兩王氏姊娣也前卒十年姊顧為繼後卒九年三男元謙以佳公子既世虎節好學而文雖居平時營栅部署器械車馬凛如在敵又識世務省訟難惑多資平之次元恒四女適郄長官子璧閻令子齡齡鄭元帥子端仁萬户賈榮祖三男孫長禥㓜未名二女孫銘曰嗟若邸公初由羇童嗣秉父節睢及鹿邑凡戎十年旌敵尚逖城潁而南地交壌隣勍將未嘗時已能軍寡謀輕襲大北其羣㑹帝考貢曰是南紀于何蕭茅曠入包匭乃畀丞相百萬烝徒江漢㴞㴞鼓枻以浮分狥坤隅置公前驅登陴長沙桂林入俘大惽小悖剪無稽逋從戰萬里清楚以吾歸撫其軀矢石遺餘嘗曰臣子居則有異移孝為忠其道豈二當在父側子職焉㳟寸膚之傷䀌心瘝恫及身而將三軍奬率鼓鼓以前顛首奚恤惟公懋功其賚何如虎節皇皇雄長萬夫上昭祖考下傳旄棨子孫其承世守無止匪直克忠孝疇大斯以語燾後幾何其慈冝爾有子踵武之踐四十已聞慎保垂憲爰發潁匶歸從殳丘列勲子碑貽久是謀袁公神道碑袁虞舜裔也舜生姚墟居媯汭子孫以地姚姓以水媯姓以有天下之號則虞姓及周武封胡公滿于陳以國陳姓以陳公謚胡姓袁則肇于陳大夫轅濤塗西京轅固生猶未省文至後漢太尉安而下始為袁矣其家太原石之臨泉者不知始何世何人所可譜則在金有隠德農畆者諱亨生廸業儒愽極羣書尚氣節不食然諾生企京有父風生鐸丰儀煖􅁱克世其家學實生今延安路總管公諱湘字潤夫金之蹙國王公佐持節鎮葭蘆當吾元勁兵之衝殫力竭謀惴不自支一日集將佐使各推辟所知可與計事者或言公賢為書致之三往返始來用其䇿以守則完以戰則㨗衆論多之聞諸汴京官以忠顯校尉遥主延安之延長簿再以功超武節將軍令臨泉石與嵐之合河恃公為藩援以安者五年後王公佐卒鎮人心離異不可復一公曰吾愛一死哉死而兵民完何害敵以不即下藴怨積憤于我者為日已久吾死而捐兵民以甘其心吾寧忍哉遂乘夜載鴟夷濟河欵我大將孛罕營降解所佩誓曰所有二于公者有如此劔將孛義之相與飲酒盡歡以便冝升臨為州版公為帥遣將州兵略地鄜延悉下之移鎮延安臨民徳之寧輕去其鄉不忍去公多携家來從朝廷定賞納上功授延安路兵馬總管時既偃甲兵民方去危即安公敦勸畊稼裁抑㳺隋使各食其力隣境聞之逾河而西雖有良田美業不恤願記處深谷者不可勝計公符其守令居借之廬畊助之牛儒生之賢而文實聳人曕聲動人聼者如侯丘嚴明焦舉張華王明畢美邵瑞張輔之流欲仕者則登之幕府以師羣吏不者則升之學宮以範多士由是悍俗消草而禮讓興行矣㑹大料民止籍主户漏其僑家浮客者或咎以何獨損吾户數公曰若欲肥版籍以衒庻耶一旦賦役下僑浮生心必計曰等賦役也與避人境而不免何如歸吾鄉之安焉客去而主孤實亡而名存祗益累也人服其能圖逺其後河東山西果徒其民公謀使者曰若所以必徙者豈以代吾賦役而汝無得哉吾所籍止主户未嘗妄以僑浮為土著版冊具在可稽也何如勿徙使各奠其居即是民推擇置吏嵗集其職入是以吾土育爾民奚必徙其以是歸語汝帥使者亦度民業已安此雖徙之且道亾不逹許之而還尋有詔令民隨在占籍公猶仁其浮僑為輕其調庸同列害其能且位加吾上多行金帛貴倖以訟公徴使就辯公䞇貴幸幣殊涼薄庭臣以訟者之言方騰能不以賄免顧歎重其忠儉歸益自刻勵四方行李至者相踵廪肉不足為射獵鹿豕以繼贐勞之須皆出其家不足則從富人稱貸郡民之豪傑謀曰吾屬依公以生坐視寡乏莫之省恤人曰我何捐金餉之亦謝不取及大封宗室割所治為公主湯沐邑有説公厚斂入謁可結主知且無令同列得先之也公曰吾豈利下市寵者耶不行先朝時今上以大弟之重徴南詔駐兵六盤山公見行府建言始延安之籍民為兵皆懸賞募之人率收銀三十両始行及逺戍久役津餽不如子前老稚日困于家則怯者挺身而孤亾勇者連伍而俱歸軍吏以法誅之莫之能止也非大選閲郡民厚業饒丁者更代以休其力盈其氣則兵帳不完上然其策讓隣道臣之在行府者曰若曹之來其所請求不過官資之崇􅋻符篩之輕重便已私耳亦嘗有一白軍民利始袁湘者乎聞者愧讋自是雖不自行遣官屬有所奏請上必曰若從袁湘所來耶言輙報可嵗癸丑冬將適京兆未至病歸人來唁疾公安之言笑如平時夫人問焉一旦公疾小加于今日如吾母子寡㓜何惟治命是聞公曰吾平生所為無有不可語人者天將後余是外非若知也以十二月九日卒于正寢年五十有九以某年月日歸𦵏臨川某郷里先人之兆次凡再娶死配焉氏繼配梁氏子男三人馬出一人未名前公卒梁出二人克忠昭勇大將軍隴右河西道提刑按察使克良捉舉太原採木司女二人馬出伯適定西州尹富察仲徳仲適中部縣尹張欽用男孫四人長仕圭餘未名女孫八人在室十八年燧以陜西憲副録囚延安昭勇居自隴右得告家居二際言色固以心推為鉅人長者若不見毛髪比出紈袴習者古之人有云觀其子可知以有父矣明年克良持君書與公事状謁銘墓碑因得究公為人益自信昔者觀人之不大也盖嘗論人之生紛綸尚武之時懦者固不能以自立惟强之依而強者或徑行面無謀亦旋取效亾善謀矣其力不足以先衆則人亦莫之信而為之使嗚呼公以此時克樹功業裂地而侯以傳諸子亦戞戞乎其艱哉是可以載行事于石而見白子後世也繄袁之先世繼顯賢由金百年力本乎田起培而行篤公之自逢時未靖實艱初試人求其生雌從雄鳴有距跳跟有翼奮翔臨泉葭蘆襟帯河山公居其間撻其悖頑智資我謀勇但吾力我麾我招莫不順適國歩未改效死我臣天命維新吾生斯人府葭延長綏舟鄜坊我旗樹降千里其疆朝為逋亡夕則樂康人無我敵束爾矛㦸敏而耕桑督而蠶織而方瘡痏孰爾朘刻孰顰孰呻喣手摩撫隣曰時哉爰適樂上寵光不希鈞言不危説進可行舟扆肯頥不年承辭延民之思今三二年如在柩時黄髪齠子枚誦其美事上之忠繩下之嚴生民之仁與人之謙顯親之孝奉已之廉人一二有公乎其兼延民之恩日逺則㤀我詩之碑百世昭章光禄大夫平章政事啇議陜西等處行中書省事贈恭勤竭力功臣儀同三司太保封雍國公諡忠貞賀公神道碑大徳九年榮禄大夫平章政事上都留守兼本路都總管間平府尹兼虎賁親軍都指揮使賀公以年七十有二丐老制進光禄大夫平章政事啇議陜西等處行中書省事賜白金為兩五百楮緍三萬五千錦衣玉帶既遂養安其卿又以其子參知政事勝襲上都留守虎賁十一年成宗格天儲皇削平内難夏五月念舊臣將有咨度俾中書遣使馳傳召之承命即行而道疾皇帝嗣位下詔萬方其播告使遭諸樊橋以勝參知政事上都留守進拜平章政事為慶公撫膺感極而薨七月九目也年七十四訃聞三宫迭為惋悼遣騰馳十乘傳奔赴隨贈恭勤竭力功臣儀同三司太保封雍國公謚忠貞至人二年七月二十九日行在南坡以公墓碑未銘敕翰林學士承㫖臣燧撰述之仍俾勝馳十五乘傳入秦身視鐫丘嗚呼其榮生哀死始終于公為何如公諱仁傑字寛南其先河東隰州人居京兆則曰祖送徒考惠賁特降金符京兆總管諸軍敖拉贈輸忠立義功臣銀青榮禄大夫司徙雍國公謚貞獻初嵗壬子憲宗國母弟世祖于秦受詔征雲南榪牙略畔之山明年將戒塗貞獻作室得夙藏以白金為兩二千五百來上曰陛下封國所出臣何敢私願佐軍興又曰臣子生一十年矣力能荷祋請置顔符王將備其不已白而専為也幽貞獻長安帝聞之怒縳王將至將中危法以開國世胃而釋公由是入偹􅀫衛經吐蕃㬅沱渉大瀘水入不毛瘴喘沮澤之郷深林有壑絶崖狹蹊馬相縻以顛死萬里而至大理歸由來塗前行者雪深三尺後至及丈峻阪蹄氷為梯衛士多徒行有逺踰千里外者比飲至略畔最請軍亡失馬幾四十萬匹後從濟江歸正宸極眷寵日加征伐蒐田無不從負御服物多至一二十事風雨霜雪寒衣露處饑竭皸􅏿未嘗告勞他人滿直三日而更獨公輿董文忠為長上侍疾或一月不至家燕聞喜訪聞外事至元十有一年梅應春舉瀘州降制即以為其州安撫使明年大兵圍重慶人明年制使張玨遣王立潛師襲瀘取之臨應春殺戍將千户熊耳而有其妻宗甚嬖之宗王相四川行院李忠宣之外妹立後移守合州行東川院者則憲宗李玉器械哈丹庫哩濟蘇二人先朝陟方乎此㧞將甘心故合益負險不下宗説立遣張邰軰蠟書問行至成都請忠宣受降忠宣從五百人至立則開壁納之忠宣以王相罷置其吏而去東院械立奏殺之時安西王受詔征莫比未知合既下也自軍中下教長安遣燧乘傳招之下則許貸立死以為安撫使而誅立敕使先至其日將醢之而教亦至東院以敕教逹行死生異也破械出立而幽之别室相符東院各使再請宥宻以帝有成命不以教聞會西院遣都事吕端善他事至京語公其然公即入聞帝詰宥宻臣曰卿軰以殺人為嬉耶使立生至則已死則汝其從之驛致立為合之安撫使虎符先師許左相多公力能囘天還而立見謝曰教治臣于始賀某活臣于終惟死以報明年帝怒王府一相大治宫室凋弊秦民召至而不敢見公為譽釋于中俾仍相秦以歸其年内出白金陳御榻前如所上數前公謂曰此卿父略畔佐軍興者卿母在此其以是供具為養辭之不可歸請其母曰君賜也冝仁吾宗悉㪚之又明年授正議大夫上都留守兼夲路都總管開平府尹又明年授資徳大夫兼虎賁親軍都指揮使加佩三珠虎符十九年帝曰昔從太祖飲水黒河者至今澤及其子若孫其從征大理者亦朕之黒河也安可不録其勞悉大賚之于公加恩數焉年既及艾侍唯幄日久事益明習人以宻近夭光丞相而下猶必咨託俾詞動静而始入告如是而不怙威不矜寵不黯于貨克兢畏清恪自恃故有言必信晨夕彌縫滋多事祕外不聞其顯知者知擇童女實掖庭命既下矣公曰宫妾不足于使令宜妙擇高門徳望之家端嚴明淑者當之豈可槩行以駭天下聼聞使深山窮谷擁瘇麤惡之子不待其年而急相遇非昭代盛徳舉也又古貢方物皆其上冝今者和市非産其土一切征之増直倍蓰無所于取吏責後期從而罪之實病民甚又水盈司倉任文通稅民不入粟而私給劵取直其外檀事覺顧先陳他吏之為辨服其誣當誅公言罪許自陳得原者令也彼雖誣人事同自陳若重加罪則塞悔遏之塗有言事者亦將創矣又煮海為鹽由人力以出者也山後諸州漕司必逺餽與民而徴其利今頻上都池泊皆鹽實天惠養則人者無有課人禁不得食有盗食者罪當沒歴終不能止而冐犯滋衆是為􅀢畿内也帝皆然之止童女勿擇物非其丄所出勿和市免文通死重杖以懲鹽弛其禁民争徳公為廟李老峪設像以祀三十有五年進階榮禄大夫中書右丞以于勝為中書參知政事及僧格為尚書省以威制天下大為鈎考奏公為留司上都錢粟損失頗多時其長則國人烏納呼及庭辯公曰臣漢人也是雖非臣盗取不能戢吏為姦罪則在臣為之長者則曰臣司留邵事未有不白臣能出者惟當罪臣四十日中彼至七十餘奏而爾公争自罪終不易辭帝曰受爵而推人者有矣罪至而争引歸已者惟汝二人其罷勿竟則公見信于友而結知君者非有素可襲取耶然計始入臣以及丐老實五十四年掌留鑰者居半倉廪府庫一俟啓閉衢去衣食亦仰均賦乗輿嵗至比其南也少乃數月頓舍宴享諸生百司送徃勞來細而米鹽燈燭大内之中奔走徴呼一日數至其所受委不怠下㤀克當聖心未嘗取其逆怒以故資身百備皆出賜予最其多者楮緡五萬玉帶珠衣宴服貂裘華飾可等國人貴臣他珍玩不計人則置之曰不過受也斯其君臣之際交孚然也其家庭則數嵗必一歸省于秦既至不可以久一再月則必牽衣流涕而别前夫人劉卒宫中欲女以國人公以漢人不可偶是鉅族娶從聖武西征留使鄭公師真之孫數年而䘮明三十年終不以疾而失歡其初無媵侍在旁遇寡嫂嚴而有禮與諸弟雖篤其友必飭其過妹夫不謹宵直至撻之與人交坦白以誠藉位勢以暴人者不下也以其年九月二十有一日葬鄠縣太平郷貞獻公姚夫人鄭兆次前夫人劉祔公二男四女勝踐公平章又請推恩上及祖考再世國雍其為孝也大孰加兹與過二都兵馬使𤓰爾佳哈布爾者劉出也最後公薨再月而卒與適河東山西道提刑按察使韓世英子慶今參知政事董士珍子守正虎賁親軍總管楊祺者為鄭出男孫三慶寧興與女孫二皆㓜是正系也其宗從則伯父貞不仕季父斌同知京兆敖拉總管府事四弟義立今同之朝邑禮貴不仕智明營州判官信仲四川南道宣慰副使妹適王權省子貴子男十八人女半之男孫九銘曰大帝淵龍華臣之逄孰近而初孰久而終為世所知同公流輩百十維人官出皆外凋䘮相繼惟董文忠朝夕帷幄與公友從珥侍中貂廿有六載董先朝露乃眷公在生人于死引慝其躬民瘼之求悉其勞庸位亞人臣晚極其報乂爵其子公武之蹈迨歸老秦制曰禄之俾其省臣事諏政咨曽不再稔方銜國恤震邸見招竭蹷力疾天不愁遺道薨樊橋五十六年始終兩朝今聖曰嘻奉常汝諡主爵玉署汝封行制凢厥哀死無後邦經乃陟保衡忠貞易名乃與乃考于雍再國若稽夏書九州有一餘受封家孰京與夷皇上猶以墳道未碑乃敕禁林臣燧次述公于佳城奚憾不足胥是有扈左豐右甘名與不磨終南在南百夫長贈中大夫上輕車都尉曹南郡侯昆都岱公神道碑至大三年下詔萬方推恩中外一日官之先昉于五品由庫崇等而上之列為五爵五品四品由男而子其封皆縣三品二品伯侯以郡一品則國公其世數男子惟考妣一世伯侯及祖妣再世國公及曽考妣三世而極用是中大夫尚書吏部侍郎桑烏遜職登從橐既通以顯贈其考昆都岱中大夫上輕車都尉曹南郡侯祖庫春中大夫上騎都尉曹南伯祖妣額布勒特哩太君妣周太夫人妻馬夫人皆同郡曹南吏侍將侈天寵于碑請燧銘之故摭太常愽士王天祐之狀以叙在太宗世欽察猶未附定宗憲宗時猶王也詔與大將河南王蘇布特討平之其部屬始至中土上騎則其前諸孫頴河南王戯下長百夫以卒公嗣為之從平河中下鳯翔殄敵軍鈞之三銘山破汴蔡滅金後詔王戍河北公始家曹之定陶又從諸侯王扣肯布哈及大將察韓伐宋寒出暑歸嵗以為常殘漢上之襄陽郢復徳安援淮右諸州轉闗千里登陣䧟陳斬刈不可馘計幕府犒功居諸將先金實于櫝衣溢于笥馬連于櫪歸則課僮奴耕稼畜牧隨致豐潤性倜儻嘉施時節撃鮮與閭里故舊為樂其後戍光嵗戊午宋兵犯郛率死士出禦斬獲過當中流矢輿疾至家卒年五十一葬新興東原夫人則周亞尹女也皆柔淑清恭婦德母儀稱于婣族子二人長烏格岱尹出嗣長百夫從攻襄陽新項老白都統濟江下鄂定淮浙由忠顯校尉䝉古軍總把錫金符監真定河南曹州大名翼千户觧職子某次則吏侍從淮安王巴延河南王阿珠濟江元帥府知事升經歴以給西京河東䝉古軍衣糧鈞賜鞍勒弓矢鈔二千五百千入為衛士出監武邑真定兩縣真定升州同知州事進官奉議宣政院斷事官進朝列院經歴驛徴西畨負金為五千鈔八萬五千丁妣夫人周憂依墓為廬摧毁自致鄉里孝之尋起參議院事升西畨宣慰使虎符入為郎銓曹從平寧王亂大㑹供億不乏賜爵二級鈔二千五百千男孫七忠顯校尉某嗣長千夫瑪爾河西福興酬尼資布哈實都皆㓜女孫八人五歸名門嘗反覆䆒觀自上騎至吏侍纔三世矣而歴事太定憲三宗世祖成廟前聖今聖七朝雖不可方開國諸臣亦善承其家者而吏侍􅀹敬慎寡過有才臣稱銘曰盖嘗論刑其極斧鉞誅止有罪猶有小罰大刑維何無慘甲兵幅員判裂争地以城淵淵伐鼓陣子原野入死出生决食頃者嗟哉維公束髪即戎進退金草奮不用躬于河于漢于淮之亂金㓕戡宋勇必軍冠無眼維矢信不識人不殪懦大而賊果臣其在兵志士而死轡庻于事君身曰能致雖死已久而名則延中子垂周卹章自天亦本孝子吏侍之籍其丁内艱即墓而舍敕起院參使畨西南佩之山節虎視眈眈入為郎官銓曹是賊日月為斷當其陟黜矧又兄子方長千夫將久其傳黄金世行門閥之崇有耀閭里碑以表阡百世伊始南京兵馬使贈正議大夫上輕車都尉陳留郡侯布色君神道碑布色氏始由普爾普以佐命功位司空生司徒巴爾圖司徒生太尉哈喇連姻帝室生世宗母宣獻皇后與金紫光禄大夫統軍巴勒統軍生世宗元妃與鎮國上將軍布展鎮國生昭勇大將軍守道昭勇生君諱長德年二十一頎軀偉觀精巧騎射以扈宣宗播南京功官安逺大將軍遥領濵州同知壬辰義宗播歸徳不及從其明年㑹西靣防城提控崔立舉城降盗發陳州南頓項城沈丘假公金符將二千五百人徃平之而劇盗張進犯京陳橋門又殄之收盗積蔽賚以極饑民後從諸侯王伊克南征殘漢之襄樊棗陽郢復徳安淮南黄蘄及安慶而還時未改汴梁版南京兵馬使改令中牟原武太康三縣入為南京警廵使再為兵馬使至元凢年養安其家以十五年四月三日卒年八十五夫人張氏前卒二十年合葬祥符縣之某鄉後三十五年當皇慶之元子荆湖北道宣慰使翰文走書燧曰吾先人仕太宗朝未大清顯庭臣哀其驅馳與剪荆棘茇舍以招徠于戈餘民安集三縣警斥㓂攘于河之南勞勩三十有六年與翰文自學仕略其卑官惟疏九制王府郎中令倅開成路歴知松江漢陽二府入為中書考左司郎中是職也凢陶冶四海之官學夫經國之賦議禮制者皆出乎手非其人有時譽者不授翰文得之其材可知出同知淮東宣慰使轉平陽總響與今宣慰荆湖父子相繼七朝請如故事褒其𤣥墟制可即其考長徳官且議大夫勲上輕車都尉爵陳留郡侯妣張陳留郡夫人祖考守道太中大夫輕車都尉陳留郡伯祖妣完顔陳尹郡太君翰文故妻暢陳留郡夫人臣焉叨此昭融極矣今也有孫兩人伯珪季璋私廟時饗能執豆籩足免無後不孝之蹙求可筆是事國家家之槩者匪公其誰故即汴士張孝友之狀以書且告所未知者曰金有天下諸部各以居地為姓章廟病其書以華言為文不同敕有司定著而一之凢百姓金源郡三十有六廣平郡三十皆白書隴西郡二十有八彭城郡十有六皆黒書其等而别者甚嚴布色氏于金源次居五其素為華望之家不言吁喻銘曰猗嗟之家其在盛時奕世三公男女結褵不于庻姓于帝之室大定哲君猶所自出金厯既祝一氣之機無成不渝無顯不㣲存者遺胃伯千􅀈一今由子貴推恩爵秋祖伯考祖輕車某勲郡子陳留覃及妣嬪勒詩豐碑光華孔煜名與沔流瀰瀰無竭牧庵集卷十七
