body:
  text: 牧庵集卷二十元姚燧撰神道碑資政大夫同知行宣政院事張公神道碑維張氏汴之浚儀鉅姓金由嵗甲戌宣宗播汴河朔逃兵之民皆扶攜婦子從之而南蕞爾之土其出惟是一夫之耕不足以食百人有司又括粟餉軍以就近之運抗方興之師徭賦百至猶不能支故人心日離望望焉而思大兵之至以紓其急嵗壬辰睿宗大殄其軍鈞之三峯山義宗播歸徳大河失守故其祖得棄鄉北渡樂而家燕會燕薦饑嘗㪚居積以振之祖考之諱皆逸惟知其考字善甫三妣戴李南李實生公諱天祐字吉甫就傅讀書聰頴絶羣兒筮仕經歴工匠總管府以儒術飾吏事至元十四之年轉尹歴城未赴改同知棣州十八年詔發濟南傍近十路民五萬人濬交何以通海漕責公董役丞相哈必齊臨治其上自春徂冬方十一月天寒水氷數言宜休役待春徵集不待臨治所可及行堤見僵死暴棄則䀌傷曰吾曹媚上急公使民凍夭如是悉縱遣之民歡躍歸因彰言曰脱上見尤吾請身坐不以相及事聞帝大嘉異裕宗時為儲皇下令升經厯功徳使司尋改總判院官奉訓仍經歴二十三年官太中太原路總管為纔一年有徳邦民刻石頌之明年官中議參議尚書省參議要官非其才可以彌綸宰相圖回天下者不足舉其職又二年官中奉拜中書參知政事大徳四年僉宣政院七年官資善同知江南行宣政院以三官釋門故於佛氏為教信奉而篤守之慈祥惠愛多所及物有司政或病民如徙江浙巧工入将作亦為之授方使吏不得為姦利居刺樂業而行輕去其鄉不怨焉宣政五年祝髪之徒安之以為不繋出令以重斂諸山者惟公一人拜疏于朝請留者数十上至大已酉卒年六十三越十七日從葬西山其祖始卜之宅嘗稽後世官制貴賤與古反易古自一命至九命上公而極今則九品而進乎一公起布衣積官報政與知院致位二品實古八命侯國之君非獨嵗時有以加數偹儀奉嘗其先為子孫者亦得衣被休光以紓朱紫真善大其門者一女弟同李出適士族夫人耶律氏次王氏劉氏范氏索氏七男志惠忠懇慧恕億五出夫人惟恕王出億劉出六女四出夫人長適實喇布哈三為監州一王出一范出王劉范索卒皆前公夫人子其男女恩過所生至大庚戍翰林學士承㫖耶律希亮曰夫人吾從祖妹也持其從祖兄戩鄂特之狀求銘公碑其辭曰因陵其高力半功倍孰與平地進覆一簣繄張之先發我庾餘責報于天如持左符實生令公始學自力迨其筮仕共工是歴後銓尹縣薄而不為改倅棣令州用事治浚交漕海五十萬指自春徂冬急役未弛公憫凍殤丞相不謀下令縱之擅吾受尤事畫上聞帝嘉曰果遷牧于并頌石璨瑳尚書中書機務兩參事輒背馳資言指南出知宣政實司祝髮故于釋典得其津筏昔人之為箕斂諸山今公之來退食閉闗僧徒安之聞諸滿秩留者抗章上凡數十可因灼見舉職之宜鼎鼎宜其名與位升卒從其先西山之兆勒銘隧首千祀有耀少中大夫敘州等處諸部蠻夷宣撫使張公神道碑公諱庭瑞字天表姓張氏其先臨横州人其曽祖淵祖士明以有功金初再世千夫長考楫皇北京都轉運使徙家自霫三子公其季也㓜志不凡巳以功名自許讀書力學經史之餘兵法地志風卜筮靡所不闚至既冠宿衛憲宗俾從征蜀佐軍前鋒帥如所䇿戰皆㨗會其陟方帥其兩端世祖斬之軍中獨忠謹公仍佐前鋒軍中統始元之明年詔元帥府全師戍清居賜金符俾參其府幕議合時未下直清居南百餘里虚實動静皆可相聞日夜戒備袽漏塞罅敵無得勝加善綏懐所獲詗俘不誅全之小物利人慮亦必及中土艱蜀藥其地饒橘課軍士之休役者曰袖手何為其仁日入皮㡬何升皆庫貯之莫曉為何以也視商旅有貧䘮其資滯不能東者召以其所有畜來無問㡬何蹄畜給一石皆感泣歸語父母妻子曰三相救我自爾相之名籍籍行路用兵開達以虎嘯山闞渠江可絶二州漕塗詔公為帥府先鋒使將五千人城之旬日而營壘儲侍皆完以充制使夏貴集四川兵數萬圍之諸將勉宜速戰公曰無庸彼衆十我往則殱矣可遣間取援帥府湏至為圖今惟有分地死守以老之吾不為主而為客耶敵礮吾壁當所皆穿築柵捍之柵連壊乃離柵為堵虚本不築裂牛馬革衣大樹縻之令可去來礮至則偃已乃復植敵以城不可井必資澗飲泉出甚微下薪土實之公沸人畜溲溺釡中入土以泄其臭人日數合吻皆創裂終夜行壘至於立寐如是踰月援至不敢前公下令曰敵䇿吾怯不出必嚴外而懈内今與之角可必逞志分千五百人為三夜擣貴營果大崩潰禽斬都統欒俊雍貴胡世榮等五人馘首千遺委資械萬計以遁公亦身負數創功聞加賚之澤舉軍覃焉授奉議大夫守髙唐州濟師襄陽始抽中民之家為兵賦州若干百人恐吏出入為市身按籍取其壯者與借衣仗衛兵權冝卑之編諸行伍教以進退不相干越或曰足是抽數州責止矣教之何為公曰吾所抽兵比其啟行縣官或遣使或覆閲耒耜之衣不掩肘骭雖材賁育誰則信之其時留甲退乙更逐紛紛徒自後期衣之兵衣鞬弓手㦸自足觀矣閲使至果惟曰髙唐之兵精良教民力穡野無萊田暇則使修孝悌于鄉校豪梗戢縮盗去其疆鄰獄疑留率咨平直大司農考績以治最聞遷朝列大夫濮州尹詔布多方仍黜其殿者一人為長吏勸辭之省曰如司農言正守職也豈敢為勞且州非守獨為上監下貳功則均功獨旌何為不敢奉詔省奏併升監貳廼尹濮御史臺賢之奏遷中順大夫陜西四川道提刑按察副使風紀峻肅吏重足立為京兆者弗便也中之奉藩都漕公及夫人皆不恙入謝奉教不謹都漕曰吾黨憂汝兄弟蒞官庸懦不足受任今居鷹鸇以撃摶見傷誠克舉之良子酌酒夀之庭臣閔其誣也為避之奏徙四川屯田經畧副使踰年以東西兩川各開樞府大徵兵圍重慶其舟楫兵仗糧儲資取成都者十八換成都路總管而四川中書左丞李忠宣公徳輝以王相理賦四川凡屯田征商與鹽茗竹木山澤之産民已輸而算未入官者皆蒐剔之事倚之公以集一嵗而羡衍彌倍以繼餽漕自餘學校農桒津梁陂渠府寺館傅先政廢弛者莫不興張蜀平升少中大夫諸蠻夷部宣慰使雜獠犬牙綿絡盧叙思播施䕫之瓖者五十餘種椎結荷旃將數千里行御羈縻枿其州縣繩削而碉門𦍑有偕婦女老稚入市者争直殺人為宣直碉門魚通司繋于理其酋斷繩橋止蜀商于徼謀大動兵入㓂篡之其司馳告汪忠肅公惟正以中書左丞行省成都問進討謀公曰𦍑俗悍獷喜馴怒逆其所性然由殺一人而遽待以門墻之㓂小兵不能威大兵不煩興惟可遣使開諭彼雖凌信而昧理至撼以禍福亦豈有不回者耶忠肅曰無踰公者遂從數騎就途前遣入曰吾至矣其相傒而界𦍑盛陳兵來公曰吾從數人而猜備如是何為𦍑人蜀人舉天子民殺人償死一律治之今有司逮所偕來特使辭其見知情之所由來援質耳非併盡誅之也而汝為是跳梁行省如以狀聞萬一赫怒徴近郡加誅而汝噍有遺類乎亦奚不薛之盡劉可鍳也何乃負叛名為之續使壮士推首白刃妻奴人乎此宣慰魚通司碉門者宜言吾懼汝之妄舉而自孽也故越吾司而曉汝其酋率種屬羅拜曰吾昔者取羊生磔其碑卜之視食理何食曰吉白馬将來可不煩兵公乗果白馬神語昭昭敢不惟命乃論殺𦍑賊而出所偕即日復繩橋還蜀商通市遂與約自今市者如故事無入碉門惟集郊闗日昃而歸其酋等曰亦惟命又以民嵗摘茗官収糴之為局自鬻公變其法聴民入劵自與𦍑市令黎雅戍兵屯田自廪罷沂楊山江漕榖以免嘉定州民覆溺都掌蠻反詔公以行省兵誅之公請罪止首惡無及非辜可之其俗惟善挾槍擲人而以過顙厚握松板為盾自蔽已陳公馳馬射之矢出盾背半笴其種駭怛曰何物弓矢如是其力也遂捐兵屈服惟斬其酋達蘭雲軰十人再授敘州等處諸部蠻夷宣撫使後仍故官轉潭州總管浮舟出峽過南郡燧時貳荆憲相語曰吾聞是州户滿百萬良足為治而湖廣省臣方事竣剥禍賊變詐月異嵗新吾不呵之祇益罪耳不能為也遂去之秦其前植業在樊柱者上田五千畝渠義谷水灌之雜蒔桑里可材之木萬根奴婢千指既卑兩兄田賦嵗下不以及兄糴谷入之其自取者惟城中一第與西郊之園百畝耳今歸每不城居徜徜輞川泉石間南直聖燈巖為堂罟魚于淵穽鹿于山賓客過山留飲彌日頗知為詩嘯歌自娛凡居三年忽曰吾樂吾成都竹溪秦父老遮不能止時已疾矣後是三年當至元二十七年四月十四日卒夫人劉氏淑質懿行公所敬友及是偕其三子巘岒岷扶柩還葬安西之咸寧少陵原都漕公之闕且為書託山南江北道肅政暢師文以今集賢盧摯誌銘求銘墓銘摯之言曰公與仲氏俱名良二千石為時所器期以公輔年位未䆒者豈以公年僅過其兄一年止五十七耶惜哉公考悌忠厚深沈明炳朋友孤嫠有不能家必周之使可安以終身有妾慧艶若僻之或告與人語屏所問之則曰吾父也召諸逆旅貌若甚肖叩其離兵失家嵗月與曩聞同隠痣且是公曰而民耶人役也父曰民爾曰欲得之乎對曰鄙人之來直以兒在公所不訪而識之非人父情豈求俱歸公曰而女居吾家終不能抜列羣婢令夫人盡取其奩飾衣服署良券歸其父曰資是嫁之父子泣曰何以報公惟有繪像事之蘄其夀考耳吾友勸農使韓世英歎曰以義斷愛人所難能其力于為善率此類三子惟岒為嫡二女長適李鵬翼次適某銘曰維公自少期我振耀薄宦入官入衛憲廟憲廟受臣其審其難一簡在心誠推六彈六飛之巡前茅劍外大斾攸經有順無悖方號賓天遭顧世皇佐戎清居屢摧斧斨虎嘯孤軍保新立壁飲血勸忠一逐㓂十帝曰歸哉乆勞汝西其守髙唐字我東黎鼓鼙之臣孰手威忍或于元元未善憂軫考績多方治獨最之誕誥尹濮俾長吏師俄爾秦憲旋蜀經畧輟士茅弧授以錢鏄邊榖用豐就牧成都大兵圍渝十萬仰餔需急應繁無少豫暇朝聴之殷恒燭繼夜庸蜀平矣帝曰僰夷厥俗荷旃惟汝使宜其慰其撫節以華汝大狂兵之小頑訓語始猶革面乆浚其心陸馬水舟相望獻琛晚移長沙羞姦窳輩以完吾前惟駕早税凡蜀齊秦長民總戎三十維年四稔居東人逺遥之在庭使簉其收為庸寜已是茂我銘豐碑匪伊桓盈英風百世凛凛猶生山南亷訪副使馮公道碑公以至元二十八年年五十九九月六日卒官朝請大夫山南江北道肅政亷訪副使于襄陽燧逰吳會還過行臺廣陵得訃于故御史中丞魏初所遂出涕相弔後後三年始拜其墓指桓楹誓曰公平生交友間文我怡者他日當銘是為報子休復亦已叙所履厯見求因記前卒六年嘗叙馮氏三世遺文有曰以中議年五十九卒官同知山東西路轉運使故中順方年六十以同知臨海軍節度使致事至通議亦以同知集慶軍節度使六十致仕三世皆止同知亦理之不偶然事之可異者公扺掌曰若是同知不善吾家耶吾他日有避而不為耳今公之夀僅齊中議校所卒官亷副班序正與轉運節度同知者等六命四世卒致皆不逾六十嗚呼造物之迹人果可以意㫖見也中議中順通議為髙曽祖諱仲尹子翼壁考中書右部郎中諱緯世稱馮孝子公之先諱由通議築松庵崧山曰崧後更岵字夀卿童子聰警于書博以疆識賞于中書忠肅公許妻以季之子闕幘由貧試史征商屹屹自飾不盪華惰中統建元時年未壯入掾中書職奏事曹䇿識沉明得失先事日從丞相造膝清光右部為郎自丞相辨章而下皆友諮之父子並政法制未苛不嫌也人榮耀焉或纔禁中省曹多徒顓庸在列庭加汰擢公以風度修凝敷對有次留後一故相長左右幕喜氣排人諸曹讋縮公不下之故事諸曹出皆總管判官獨抑公真定轉運經歴換衛輝總管經歴官承事郎令真定之無極事治考最換令洺之曲周狀其薄貪懦黜之圍㐮陽急發民益兵河之北公惟視地丁入中甲者戸抽一人籍之請託不行苞苴不入形勢富室施計無所凡竄名他役者皆出僚吏無所姦利其間江南既一陞議政大夫僉山南湖北道提刑按察司事換僉嶺北湖南道提刑按察司事二境皆錯壤夷蠻人所憚行公冐阻凌歊瘴鄉蠱俗上下山谷至不可馬或轎以杖殆數千里刺舉周治簡削冗長官吏數百臺臣勞之移近畿甸換河北河南道提刑按察司僉事官市民物不輒與直責悉還之罪去官吏三百籍没賂賕且三千定霜摧電掣蠧朽皆折唐之監州諱發其伏逃訟于朝顧列公實田湖陽三十頃禁殺日殺紆塗乗傳多燒驛薪不法十餘事詔御史問之無絲髪得抵其誣罪陞朝請大夫江西湖北道提刑按察副使未代棄歸尋仍前官換山北遼西道提刑按察副使以疾辭行臺臣終日舉職風紀求歸者其私不可去也擇其去家近在十舍外者以便之再換山南江北道肅政亷訪副使命下數日卒僑葬檀溪之東筮仕至是三十餘年恬忽時榮退易進難數命皆家受之臨繁處劇暇豫而集遭佳林泉野服佩寶璐鳴琴賦詩忘反移日觀所號雪崖亦可得其嗜尚已俸入盡于給故家之孤嫠與娛賓購鼎彞書畫故遺業不盈十金所標襮其閥甚髙跬步恒以羞親為心迨氣息奄奄猶大書松庵墓馮孝子墓雪崖墓賜休復曰各伐石表之阡亦自喜其善全歸也遺文千篇晚而筆力逾進辭多雄剛深古畀于文者不能句求凡再配前夫人楊氏即忠肅公妻者今夫人王氏其母休復與休復母之兩致其道不知者不以為前夫人之生觀行有家為徳如何女温香幼三男孫鶴齡龜齡彪齡二孫女皆下殤銘曰公生自孱見靈奇也葱衡鏘然妙為辭也人一善偏已兼之也其藴淵淵介介持也其履平平循循施也入司奏牋出縣為也同不俗牽異不離也責言言宣責事治也憲府所纒吏不欺也風行嶺壖江之湄也㡬耳順年不云耆也厚夜長眠寤何時也聞之􅀈隕多舊悲也曰良弓傳子為箕也柔木不弦世業悲也獨公青氊守不移也世徳陶甄不外師也子于父田播其菑也父材楠楩子構基也有華蟬嫣冠雙綏也與乃祖背官醜夷也皆不持銓衮職裨也豈天為懸座右巵也不盈其泉斯不攲也信彼微權馮氏私也滹沱之川浩瀰瀰也苗胄必賢餘波滋也母折楚篿以筮疑也麗牲有穿徴銘詩也中書右三部郎中馮公神道碑中統之元肇分天下為十道道置使以宣撫之我先世父中書左丞公受任天平僚列聴自辟傳我真定将以公偕懼不能致乃踵門自起之曰天平地方千里戸版賦出将半諸道而寄至庸淺非得清厚和慎舊徳雅望如先生者孰與匡政令之不逮而抑其過先生負用世才不及見之太平有兆之時陰拱何時敢再拜以參議相屈公荅拜曰某學不切時無有可資吾相取者然不敢虚盛招遂就車行參議無㡬時中書省召入為右三部郎中我先世父以奪吾賢佐吾惟頼以為理居無㡬時亦去公在右部故相贈太尉史忠武公贈太傅文貞劉公平章趙公宋公張公我先世父及左丞張公大参楊公賈公尚書劉公稽古議制動見咨諏又其始至宻院未闢憲臺未建尚書未分兵刑工三曹之事叢坍繁會決門開裕于刑尤慎恤禁天下諸侯不得專殺罪人死者奏可乃論輯要令條付之法吏俾有持循獄成不輒置辟必疏其情文疑闕讞下有司緩湏臾無死以冀萬分一朝或生之也遇于倫敗常者必峻治竟之羇縻之國臣或失對都堂欲詰其謾公言冝示有期不可苛明以怛向化以故于今之治文物燦然非夫人與有佐理中元力耶公諱渭字清父姓馮氏其先居定之中山嘗臣五代晉由齊王虜于遼從徒北京家長興遼滅來南系緒則自公六世祖可譜葢昱生道以再世不譲仕生金承務郎居泗承務生中議大夫同知山東西路轉運使事仲尹中議生中順大夫同知臨海軍節度使事子翼生中順大夫大夫同知集慶軍節度使事壁公之考也自中議而下三世比及進士第獨公由任子仕人疑其為問則曰延賞及世自有虞已然厯古不判如曰假以為忠勞之勸是後世訹廹以利之術非聖人大公至正遇下以誠不忘先烈之義故其子孫不敢以能自致富貴為賢而以獲繩祖父踵武為光也自後世科選之法興風聲之相盪波流之相軋鼓舞奔走一世之人使子孫恒有不籍基祖父可得自我之心甚失興孝天下之道近世惟程夫子仕由先妣我法行之上有稽先王之經下不絶先人之澤初掾尚書刑曹移掌機務後掾尚書省知選除金已蹙國一闕守者無慮數人懐告身致曠數考無所于任吏是職者人恒聚詬其短有見讐轢者公覈精宻而先後黜陞動有比依號為允平出佐靈壁帥府李全聚兵楚州觀望前却不一其操于金于宋皆未有屬帥遺公馳説之欲届而軍受命即行不為吾身叵測毛髪計至則撼以大義陳譬懇悃其㫖惟在不可遺棄故君一言全未即從亦壯其能使不侵辱善還之守均州軍事判官改南京右廂機察初金還汴通議将逾河追及行在失公妣夫人趙嬴博間公亦竄避梗棘茹苦徒行勤以事存哀以求亡通議感其志曰禮父在為母齊衰期父必三年然後娶達子之志也曽參以孝已殺伯奇放皆自後妻為曽元不娶終身吾年今五十其達汝志亦不娶終身金亡侍通議北渡河崎嶇齊魯郊以還真定出則親僕御入則操井臼求擇孤臣亡國之戚不失故家素宦之習可㫖甘其口體而夷懌其心思者皆邭躬為之日夕不去側立而坐休而出一命之湏畧不自遂積嵗為世不異一日戴白紛如猶為孺子時也執䘮奉祭哀敬兩致世多不字惟曰馮孝子化行閨門夫人事之嚴師也出與人交賢愚貴賤一接以敬别置白黑胸中故與學士魏玉峯内翰元遺山學士李欒城故承㫖王慎獨今承㫖王鹿庵最相欵習讀書為文不廢風雨寒暑節録經史細及箋訓又蒐輯金代文章凡積若干百卷専經左氏春秋為右部年七十日吾家由轉運卒官年五十九故臨海集慶再世皆六十致仕獨吾貪榮滿年格歸若後矣會子今朝列大夫江西湖東道提刑按察副使岵自省郎出令無極曰吾祖臨海為是吾獲從養于是天之私我多也平生曉行衛生法年八十二猶形神精彩動人以至元庚午閏十一月十九日卒無極寓舍還葬真定三橋里之東南原通議之兆文有常山集行世凡再娶前夫人王後夫人師金尚書右丞安石其從祖父岵母也孫休復男曽孫鶴齡龜齡二人方童女曽孫一人尚穉後葬之十九年當二十五年戊子岵以公未碑棄江西憲副舟達襄陽六月又䝉暑入鄧示燧所自理埋辭白以先人與而先公相好為故人今繼室汝姚氏甥為􅀈銘先墓碑非子誰義為葢朝請先夫人楊今夫人王其父詳議諱徳溶我姚氏所自出之離孫先世父昆弟叔視之夫人燧姑道也用是不辭銘曰維斧鉞威君之所司奚取于臣人牧專持用誠允明猶屬僭弄矧肆師心刑典不奉中元乾綱既收既張有罪我在敢越奏當公時用獄上體帝徳疑昭枉書情狀巳襮宜刑于辟宜亟徐之恩澤涵柔或幸庶㡬輕平匪寛猛匪深害今三十年作則攸賴古曰仁人利溥一言矧士弼教出治原所又曰仁人立本孝子反覆揆公終始良是公孝越俗格父之慈弊齒寜鰥矢不再妻曽元以還兼公而兩清風在碑無期將卬
