body:
  text: 牧庵集卷三十一元姚燧撰經義地天交泰后以財成天地之遺輔相天地之宜造化之奠位必合兩而成其和聖人之成位必參兩以用其中葢和者致泰之極功中者致和之大本也徒知保合太和而氣化之流行者固所以通乎兩間之天地乃不知允執厥中而道化之運行者實有以位乎一身之天地吾恐道化之中有時而偏則氣化之和亦有時而息矣聖人之宗主是泰豈其然哉且天秉陽而居上確然其體也而氣則下交乎地地秉隂而居下隤然其形也而氣則上交乎天氣化交感絪緼磅礴至和流通在在無間造化之泰何其盛也其必有致此者矣曰有元后焉天地之道或太過也而元后則以此之中而財成之天地之宜有不及也而元后則以此之中而輔相之道化潜通無過不及一中懋建天地不悖聖人之泰不亦溥乎合兩以致化者造化之泰此泰之蟠際也參兩以賛化者聖人之泰此泰之宗主也有聖人以宗主是泰則成位乎上下者無非中而奠位乎上下者無非和矣泰之象云云其意如此嘗謂有致泰之實應有致泰之實感應者其騐感者其本也應者其流感者其源也應者其和感者其中也應者其在天地感者其在聖人也是故天地絪緼萬物化醇隂陽妙合萬物化生天地固以和應矣何應非感天地設位聖人成能皇極茂建雨暘時若聖人固以中感矣何感非應應者非先感者非後天地聖人葢相為因成爾或者昧之徃徃為髙明博厚天地之體也下降上騰天地之氣也體立而氣行交通而旁達則形和氣和而天地之和應矣於聖人奚賴焉吁是未知有感應之實理相為流通者矣天地之化而範圍者聖人也天地化育而參賛者聖人也聖人者擬天地而參諸身以一身而賛化育隂陽闥闢我轉其機寒暑推遷我總其運此精神之感召和氣之流通使之三光全而日月無薄蝕之虞五紀協而風雨無凄苦之變財之成之輔之相之而無過不及之偏何莫非大中之感者亦何莫非太和之應者嗚呼和在天地則天地一聖人之應也中在聖人則聖人一天地之感也要其所應則太和所播上際下蟠無彼此也無間㫁也天地之泰天地之氣化所由通也而位天地育萬物元后之於天地實有功焉太過其財成之不及其輔相以斯中也致斯和也氣化之和即道化之所由騐也原原其所感則大中一建萬物咸覩無偏黨也無反側也聖人之泰聖人之道化所由通也而亶聰明作父母天地之於元后實有賴焉寒暑其教化之日月其順動之以斯和也騐斯中也道化之中即氣化之所由基也然則中和無二致感應無二機在天地者非有餘在聖人者非不足渾渾乎一中和之盛此其所以為泰治之極歟今夫得氣之清穹然而髙天之位固奠於上矣得氣之濁隤然而卑地之位固奠於下矣上下不相紊也而有氣以行焉兩者交合二氣絪緼天稟陽之清而至陽赫赫必下交乎地地秉隂之濁而至隂肅肅必上交乎天其未交也則上下異位交焉則二氣薰蒸而成和其未交也則隂陽異質交焉則二氣流通而成泰交斯和矣和斯泰矣將見協氣嘉生薰為太平時和嵗豐百祥交致天地固和矣而萬物則咸和天地固泰矣而萬物則咸泰甘露降醴泉出溢而為和氣之祥也嘉禾生芝草植鬰而為和氣之應也由此和而推之其徃不窮其施生無方其嘘吸變化無非此和之升降飛揚也不然則和氣一乖天地否矣非大易有取於乾坤交泰之象也然成氣化之泰者在天地而開道化之泰者在聖人聖人者出父乾母坤而藐然中處則成位乎天地矣大生廣生而大寶曰位則成能乎天地矣聰明作元后也而有道以運焉兩儀同流一中不踰隂慘而陽舒天地之道也過則不能和春生而秋斂天地之宜也不及不能和一喜怒有間乎隂陽之慘舒惟皇作極而財成之則無愆陽無伏隂而天地之道所由泰一賞罰有同乎乎秋之生殺惟皇作極而輔相之則無暑雨無祁寒而天地之宜所由泰協斯中矣中斯泰矣將見王道正直蕩蕩平平㑹其有極是行是訓吾之道無非天地之道吾之宜無非天地之宜鼓元氣雷域中天地之豫也即聖人之中也騰百川雨天下天地之解也即聖人之中也由此中而推之其平秋平在寅餞寅賓其在璿璣玉衡無非此中之彌綸曲成也不然則中道不立天地否矣非大易有取於財成輔相之義也大抵有氣化之泰有道化之泰氣化之泰一天地之和也道化之泰一聖人之中也若不相關也而實相因若不相與也而實相為用其殆一道氣之相為貫通者乎何者有道斯有氣降而而氣其在天地則為隂陽之運其在聖人則為中節之和氣統於道其在天地則為隂陽之粹其在聖人則為未發之中天地以氣運則有上下交通之妙氣即道之流行焉耳聖人以道運則有財成輔相之功道氣氣之主宰焉耳融道氣致中和天地大造化也聖人權造化也天地聖人同一中和之泰也使天地徒以氣化之泰奠位乎上下而不有聖人以道化之泰成位乎其中則隂陽失其道寒暑失其宜日月失其經和者流矣其何泰也哉抑嘗考泰之為卦而有疑焉天尊地卑而乾坤以定皇極建中而彞倫以叙今而象泰之卦則有取於乾下而坤上元后之任則有及於天地之道與宜何也葢天地以形言乾坤以氣言天地奠位而乾下坤上者氣也天地之交以氣而交是謂之泰乾坤其父母也元后其宗子也乾坤以氣化而賦形賦色於元后元后其可不存吾順事而財成輔相之以盡其宗子之職哉是知乾下坤上氣化以交而成和矣而乾坤以定則和者未有不中曰道曰宜元后財成輔相之以中矣而彞倫攸叙則中者未有不和此其所以有取於泰之象歟雖然聖人之用中其應在天地其感在民心民心罔中惟爾之中則人和而天時地利無不應矣古之聖人端居乎宥密之中而尸財成輔相之職豈必曰夏則致天地之陽氣而導行之冬則閉藏之歟又豈必曰秋則取天地之隂氣而施用之春則閉止之歟夫乖氣致異和之反也和氣致祥泰之極也禮樂所以合天地之化中和所以致萬物之育吾之於民苟能以禮樂導其中和之教以中和行其左右之道則吾民之中即天地之中也吾民之和即天地之和也聖人象泰以財成輔相之任屬之聖人而必以左右民繼言之厥有㫖矣昔之言泰和者必曰唐虞則唐虞之時地天交泰之時也以言其治則地平天成也以言其道則精一執中也以言其化則黎民於變也中和之應未有盛於此時也然要其所以致中和無非用中於民始之作訛成易有其時析因夷隩有其序六府則孔修三事則允治彼其潜通天地之和黙制造化之機固有左右爾民之治存焉如曰舎斯民而他有所謂財成輔相之事特隂陽固閉之學聾巫瞽史之為堯舜其然乎不然也春秋以來日蝕有書地震有書不雨又有書是何隂陽繆戾如是耶得非治不唐虞世則春秋大中之治不建而太和之治不復乎吁是必有寤寐堯舜於千百載之上而為天地立極為萬世開太平者名字説李綸字説李明之以其子讓來見曰願易名而字之予思古之人生子三月而父名之避其在常語而難為諱者所以為他日為父計也故曲禮曰不以國不以日月不以山川不以隠疾而春秋傳亦曰不以官不以畜牲不以器幣讓也已久矣雖其名無國官日月山川隠疾畜牲器幣之犯而犯舉世人之常語使其子宜如何而諱於今哉亦觀夫治絲乎其緒之弱不大於秋毫之末力引銖錙則紛然而絶苟治而繩之則可以轉百鈞故曰王言如絲其出如綸言綸者比其類而合之也或曰青絲綬亦為綸為訓雖異其組織為服亦垂首千百而比其類為之也反而求之葢人心之善惻隠羞惡辭讓是非四者之端其始甚微其絲之緒乎學者為能體騐擴充之使可以放四海塞兩間其比其類之綸乎邵子曰人於心上起經綸士而知此始可語自治治人之道矣名以綸字曰治夫梁氏三子名説梁宣慰君三子其伯也既名矣由犯先諱求予避之嘗聞誦簡約而嗜静重遲而可久然先民以湛静安舒者戒於後時予懼其流或後事也惟力於果敏斯可正其失質諸字訓有以疾為适者古之人有伯适南宫容亦名适然司馬長卿以慕藺相如趙相國鄧髙密名不避堯禹士而希賢固其志也伯适南容奚避焉故名曰适而字亦不能即其舊又易曰子容焉嗚呼伯适同名南容一字吾固以先賢望子适曷知自勉哉其下二人仲曰迪叔曰述有父兄者迪以蹈之述以繼之無所自遂焉亦孝子悌弟之一事也然古人之名有非徒義意之是擇如伯達伯适仲突仲忽叔夜叔夏季隨季騧必二人相從而諧其韻焉可謂言無所苟出而有章者矣故予於适迪述亦三人諧韻其古之遺意哉迪述未冠不字髙氏諸子名説袁之尚佐洛人髙直夫以予少與其先子游拜於洪都請為其子姪十二人製名為訓長曰統次經績繹緝約維絢紘紱絇絅且字而序之曰家政統於尊其傳者大小宗之子傳必立法法立而家道用成統宜曰元宗經元立績元用然非本學亦烏乎成學則始思思而成輟則怠而不能文又有要焉必由博而趨約固以守之而後徳業積中輝光發越而不可掩譬設色然必先資夫可受之質繹曰元思緝元文約元博維元固絢元質絇之所以華身者莫服若首紘膝紱足絇曰元瞻元粲元履衣之丈備矣又惡其著絅以尚之故絅曰元著其意義相仍皆有徵於書然字者名之副也有是徳則為稱情無之而弗自勉亦非予鄉先生所期於後來者題跋跋雪堂雅集後釋統仁公見示雪堂雅集二帙因最其目序四詩十有九跋一真賛十七送豐州行詩九凡五十篇有一人再三作者去其繁複得二十有七人副樞左山商公諱挺中書則平章張九思右丞馬紹燕公楠左丞楊鎮參政張思立翰林承㫖則麓菴王公諱磐董文用徐琰李謙閻復王構學士則東軒徐公諱世隆李槃王惲集賢學士則苦齋雷君膺周砥宋渤張孔孫趙孟頫御史中丞王博文劉宣吏曹尚書則谷之竒劉好禮郎中張之翰太子賓客宋道提刑使胡祗遹亷訪使崔瑄皆詠歌其所志喜與縉紳遊者求古人之近似惟唐文暢故栁送其行曰晉宋以來桑門上首道林道安慧逺慧休其所與遊謝安石王逸少習鑿齒謝靈運鮑照皆時之選夷考其言有失有得其失者以天官顧少連夏官韓睪之徒為有安石之徳逸少之髙鑿齒之才其不倫何啻相去千百而十一又且近諛其得者文暢亦桑門上首時不相及方以林安逺休夫誰曰不然與以靈運明逺之文自居皆無愧徳斯自唐視晉宋者也自今而視唐獨不可為之比乎栁之頌文暢曰道源生知善根宿植脱棄穢累宣滌凝滯施之仁公亦聲聞稱情而不過者然求如靈澈澄觀重巽浩初元暠文郁希操深濬之流與文暢生同其時若是之多則仁公為獨行而無徒矣又彼少連睪者豈足躅二十有七人之遺塵而求安石逸少鑿齒之徳之髙之才吾亦不能必其當者何人况文乎哉其敢以靈運明逺自居如栁州者葢不知其誰也然此中予未有識四人鎮琰好禮瑄然已皆物故其存者閰季兩承㫖而已可為人物眇然之歎至大庚戌秋八月下弦日跋跋張夢卿所藏紫陽楊先生墨蹟此先婦翁紫陽辭翰也嘗聞自幼孩時文已竒由歌白水滿長於紫陽閣底清風細後遂號紫陽初名煥後由上金季主河朔中興頌季主壯之置紅篋中黄龍戰北紅篋為我元所獲恐蹤跡物色姓名獲戾有避更為奐及後受我太宗簡文制誤奐為英遂不敢私更始就名英其平生於書差喜米南官故筆法時時似之其卒以乙夘時燧已聞公遺命託二事於我光世父一遺文二以先妻見配時燧未婚也其嵗上距今二十四年當至元戊子張總管夢卿持來求題夢卿嗜古博雅該洽之士慮其未得平生之槩故斂襟書此其年二月子婿姚燧觀於穰城寓舎師濓堂跋周君宣仲以師濓名其堂濓溪萬世師也天下師也而况派其宗者哉夫子為我朝正學之祖師夫子取水初源也侯師聖見程先生語未徹徃見夫子語三日自謂如見天之廣大再見程子程子曰是必從濓溪來師濓之功如此夫雖然侯生之言止可隔壁聴程先生終未深與之何也受學之初每思求仲尼顔子樂處既得矣吟風弄月以歸有吾與㸃也之意嗚呼是真師濓者乎故師濓者當如程子寶祐五年夏閏之晦姚燧書書觀臺劉氏嘉蓮卷後徃年燧在翰林使有持憲節干山之南曰馬公煦者馳書來言吾邢之觀臺劉氏所自出先夫人之兄軌字子範蕃字子榮皆金文臣其官所止舅範京兆轉運判官榮汶上令方範決科之年池蓮一茄數花十三亦祥之不世有者雖見之夷堅續志而略願持筆之時以史事己修而未之進也無遑致思今年以𦵏告還郢郢適公所督刺郡再書促之乃求續志以較謂範易轉運為按察又不載榮登第嗚呼志所傳聞不若其甥之可信惟十三花者為同因思草木之祥或以二而合或由一而分二焉而已耳甘泉之芝九莖同葉河中之木殘本連理此以二而合者也漁陽之麥兩岐李翕之禾九穗此由一而分者也然未若是十有三花之分之多豈天鍾祥不以言喻惟假草木得氣之先者異其花實而示人耶其既應範榮一世而遂冺冺己耶無亦猶有遺嗣蒙其未斬之澤也然是氣也所以父母萬物者也和之盛或溢而旁暢他達如人子於其父母貌必有一肖也何也隨其氣之盛者也夫天鍾祥於劉如是同不專範榮兄弟之身亦必及先夫人移其盛於所家者理容有也故公兄弟蟬嫣簮紱列居臺閣他曰載勲旂常勒銘景鐘未可知也夫然後可當宅相十三花之祥跋西溪珍翰中執法之書計今在人間者無慮數萬番而諸賢獨感泣此軸者由張君式者不忘知與求評賞之也嗚呼古之人所重乎門生故吏者豈不以是夫使其遺嗣人人持是手澤求光前烈其為先友者操筆之情又何如也至元蒼龍壬辰暮春姚燧跋書米元暉畫山水米敷文之畫全法其父山水樹石不事工細多以雲烟映帶只喜作横掛長不三尺自題曰墨戲今此獨雙幅鉅軸豈當時奉詔與米敦儒輩對畫禁中者耶真曠代希有物也張肖齋夢卿以至元戊子夏四十千購得之姚燧寓目焉為識末幅銘簡儀銘舊儀昆侖六合包外經緯縱横天常斜帶三辰内旋黄赤道交其中四游俯仰鈞簫凡今改為皆析而異取其案元文類作由能疏明無室於眎四游兩軸二極是當南軸下貫赤道天常案此二句元文類作南軸攸沓下乃天常天常不搖則乾安静案此二句元文類作惟北敧傾取軸榘應上鏤案元文類作鏤以百刻及時初正赤道上載周列經星三百六十五度竒贏紫微安加北極攸戴穹然哭出狀同倚葢别置立運下履平地錯勒于隅十二子名五環挈周文有八尺紫微等之三旋在一六環之安三負衡旋衡綴闚距隨捩流遷案紫微以下十六句元文類止八句其文曰地平安加立運所履錯勒于隅若十二子五環三旋四衡絜馬雨綴闚距隨捩留遷欲知出地究兹立運去極幾何即游是問赤道重衡四弦末案中州文表作牙張上弦案元文類作結北軸移影相望筴案元文類作測日用一推星兼二定距入宿兩侯齊眎巍巍其髙漠漠其遙蕩蕩其大赫赫其昭孰曰無形而兼頥考案此二句元文類作步仞之間肆所頥考明乎制器運掌有道法簡而中用密不窮厯較古陳未與侔工猗歟皇元發帝之藴畀厥羲和萬世其訓釡儀銘案釡元文類作仰不可體形莫天大也無競維人仰釡載也六尺為深廣自倍也兼深廣倍挈釡兑也環鑿為沼準以溉也案此二句元丈類作振溉不洩潦以澮也辨方正位日子卦也衡縮度中平斜再案元文類作載也斜起南極平釡鐓也小大必周入地畫也始周寖㫁寖極外也極入地深四十太也北九十一赤道齘也列刻五十六時配也衡竿加卦巽坤内也以負縮竿子午對也首旋機板案此句元文類作末旋機杖窽納芥也上下懸直與鐓㑹也視日漏光何度在也暘谷朝賓夕餞昧也寒暑發斂騐進退也薄蝕終起鑒生殺也以避赫曦奪目害也南北之偏亦可槩也極淺十七林邑介也黄道夏髙人所戴也夏永冬短猶小差也深五十竒鐵勒塞也黄道寖平冬晝晦也夏則不暮永短最也案元文類林邑介也下即接深五二句竒作二黄道夏髙作淺赤道髙戴作載夏永冬短作夏短冬永小作少黄道寖平作深故赤平暮作沒安渾宣夜昕穹葢也六天之書言殊話也案四句元文類止作二句曰二天之書曰渾葢也一儀之揆孰善悖也案之元文類作即孰善作何不以指為告無煩喙也闇資以明疑者沛也智者是之膠者怪也古今案元丈類作過者巧厯不億輩也非讓不為思不逮也將闚天眹造物愛也其有俟然昭聖代也泰山礪兮河如帶也黄金不磨悠久賴也鬼神禁訶勿銘案元丈類作庶勿壊也太史院靈臺鐘銘靈臺設􅒶嵬以尊元間大吕非其晜摰曠善鼓手自煩官商良諧等釡盆請勿以以聲以功論一日之中兩昕昬二十四鳴有度存九圍一圃折栁樊黔首時作時饔飱日月如是相告敦三辰聴命循軌垣四序不忒迭寒暄萬物生翕盈乾坤何獨治厯遉此源凝熙帝績髙羲軒積世而運㑹而元吉金之舌慎莫捫輟響誰其代天言大朝元宫鐘銘吾聞儲祥千石之鐘離世蕩訌不脛而趨朝兀之宫器碩而聲洪震百里而干層穹千柱之下侯叟侯童萬指攸藂旦旭而昬蒙其出其作其偃其饛必告而使之齊同尚其微功從可卜斯道之汙隆方昔汙也金函索索以灰滅故噎希聲而為聾及其隆也玉書幡幡而天出則播大音而為聰矧善藏用乎中不擇棄人皂𨽻王公手以問之喙應無窮如槖之鼓風我書魚蟲畀之鏤工期萬斯年與之宫兮相終宣慰都司郭君實持眉歙研相壽僕以端研報之渠後遺姬令伯陽端為州濱海浦孕竒石研資取雖器也視為主彼其子腹枵窶求一辭瘖不吐第塵棄瓦甓伍中道歸伯陽父遷喬木鶯其羽之賢胷蟠三五出言章氣風雨述聖哲誅姦窳其為價琮琛琥資山石非逺腐後視今後猶古讀吾銘孰敢侮劉無競歙石研銘黟歙之産石則實黄金為聲蒼璧質徳先如是疇可匹無競惟人士之吉銘以發幽友燧述贊無名人真贊古之遺直今見髣髴何其百年凛有生意緬懐用世愈益可畏宜使羣公笑言寛味烜赫大名其所被衣世百年千其有可既也耶太傅楚公像贊盈常之躬碩大而豐氣肅而神充自非降嵩與三光之鍾豈能生上材之偉雄
