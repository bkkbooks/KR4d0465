body:
  text: 牧庵集卷三十四元姚燧撰五言律詩感事致位丞凝地夔龍伯仲間星當朝北斗日已薄西山取謗因讐惡貪權失丐間此行雖鐡甲未足比慙顔輿病髙崖道中作役役乾坤逺栖栖道路頻五年三入蜀十夢九歸秦塵病偏凌客山英定笑人無勞問前渡祗覺白頭新發舟青神縣青神開百丈江岸轉荒凉薛荔縁松起蒹葭並竹長深披豺虎徑毒犯虺蛇鄉何莫非王事農夫可惋傷舟達黄溪草木随寒暑殊方榮悴同葦華兼露白檉葉未霜紅日月􅀟飛鳥江湖一病翁晚來沙嶼上愁坐獨書空五言排律詩贈幼醫栁君滿秩兆新識髙名實久聞吾家從鞠幼醫業必求君投劑均調鼎施鍼捷運斤功堪齊一相懼若用三軍簿酒留窮日峩纓戴切雲世知追藥聖渠負善爲文俗眼鸞棲枳長身鶴出羣素絲頭轉白碧草手將分拱璧光猶寡兼金贐反勤縣官如訪逸全十定旌勳七言律詩大都寄盧處道家弟去冬温室見玉音問汝死耶非因知洛卞思常切雖樂江南告已達一旦去妻鄰舍棗三年遊子溧陽衣無遵君父無親母有底牽留未即歸元日昨夜中星仰看昏攝提驚轉帝車轅三千單紒苦寒盡五十二年今日元與宴記霑魚在藻退歸甘免鶴乗軒膝當木榻穿皆穴髪比霜蓬不㫁根四年甲午再過龍興訪雲谷玩石砮留一月而還贈之石砮射隼中應􅀟一集陳庭一此鄉楛笴乆隨毛血化石稜猶作劍鋒剛知音道適逄坡老得寳神隂相豫章廟令收藏要知法謂看垂矢在東房感白髪霜鬢休輕比素絲素絲輕染一為緇參同知白意端是始終守黒更無移不似鬢毛難上色百方無有再𤣥時㸃檢形骸無一可醒尋泉石醉吟詩寄題陳肩䕫兄弟夢草堂謝池草句本無奇千古流傳五字詩祗是可人醒枕席許多生意在壎箎信渠風雨聽眠處快甚江山得助時顧我此懐今已矣羡君兄弟撚霜髭寄題武安節推同年萬君定翁露香齋取趙清獻夜則以日所為告之天也是官也葢清獻初仕云盡將心事冩成碑大要操修在不欺此一瓣香前輩似只三箇字老天知素瓶貯豆應先滿匹馬欈琴料自隨吾榜得人今又盛㑹排介甫擊升之道中即事十九首半生奔走路塵紅老合投間向此中炙背可親冬日叟脅肩休笑夏畦翁前除梧檟皆黄葉别院橙柑尚緑叢榮悴不齊誰使爾欲將斯理問髙空㸃檢荒園新植物長身君子不居中花惟名牡可為牝竹既曰孫元有翁九月未霜先挺荔㡬時因雨試移叢欲為竒品少遮日早願新梢髙拂空間人闊畧俗能容胥青區區禮法中泥酒有時遭郡守借書嘗夜過鄰翁江珧荔子幸同味玉樹蒹葭何敢叢文比盧全儘平易猶騎騄駬上虚空月出瀼瀼秋露濃舉頭天運定方中休官止酒愛陶令對客賦詩輸杜翁燈燼不挑垂暗橤葉聲閒聼墜枯叢馳心㺯墨誠餘事度日悠悠逺勝空買犢賣刀方課僮躬耕來此近隆中䕶堤纔置木龍子穫稻已輸秧馬翁林逺薪䒱難似桂庭荒藜藿茂如叢金穣已應田家卜儲粟瓶知不告空人家山郭蕭條裏客子秋光荏苒中川逝無情将老汝土非何物不悲翁鴈書終日度遙漢螢火經霖生腐叢只有文窮能作崇一時祛送若為空富貴賤貧交態一何人耐乆伴間中書繁揷架儘良友筆老免冠真秃翁睡起蟫魚沿敗禇吟來蚯蚓發寒叢忘君畎畝吾何敢正賀三邉候燧空却比周郎似不聾回頭曲誤妓圍中樽前客豈可無我詩裏人多非自翁落落既為喬木世翹翹宜㧞錯薪叢或云尚續樊川叟未要風流掃地空俗自窮余余不窮無羞俯仰兩間中叩門聾㒒強迎客索飯嬌兒能呌翁葦縱聼浮身一粟蓬飛未甚鬢􅀟叢爾來毎為家人笑煮茗哦詩夢亦空徃古來今無限士何人不在好名中窪樽牛飲笑聱叟絶筆漁歌竒放翁闗内舊詩傳菊帚穰間新事縛蓍叢至将大衍供除掃烹鶴燒琴不是空衞生道至東坡簡坐驗朝帋視息中解使水男親火女即為木母嫁金翁聖人愛嗇文多祕方士支離語漫叢只夀百年身健死不須白日上凌空年少諸賢莫笑儂人逾五十日過中白頭特未到君耳造化豈私令我翁南國香橙難似橘西川慈竹本名叢世間貴耳多如此磈磊孤懐王要空僻性知難與俗同舊交新識徃還中嫌為厚貎重闗相愛不機心抱瓮翁梧䑕躍林窮五技橘奴輸絹止三叢遙應世母神州説孤姪生涯尚鑿空時才位地難齊同過猶不及非是中禦人潄石信辯士為子移山真拙翁鵬翻溟渤扶搖水鷃搶榆枋樸􅈪􅓜萬物自人惟是我為君髙視九圍空憂國惟求一嵗豐商歌遙夜幾時中長懸謗木古來主欲獻食芹何處翁虚應蒼麟纔一角瑞時朱草必孤叢傷心千載懐沙賦日月何嘗不在空老困撥書非自慵徒令憂喜塞胸中費桃一日殺三士剖橘何時見四翁單極綆多能㫁榦千章木穉已超叢子魚未是忘筌者回首遼東半席空無補明時出處同一毛得失九牛中雲山不是世争物田舍正宜吾作翁文或問津牛馬走才難入網鳳麟叢燈前百萬呼盧擲未問家儲甔石空駟馬難追言數窮猶龍自守不如中口知余媿三緘士臂亦難為九折翁流水必趨恒下地狂風多折最為叢若人有問安身䇿拙學區區過此空未曽齒豁與頭童年少應無日再中四海固多知已士一門惟失譽兒翁蕭蕭霜葉紛辭樹粒粒燈花細妥叢遙夜誰家發砧杵月明如􅀈半横空次曹訓導韻詩筆髙冠無此流雄音壯節得前修清明雨過桃花浪上已風連桑落洲江路帆檣容少住鐘山杖履遂竒遊獨來乗興闌還去千古何人識子猷原注此詩石刻在今湖口縣學敘云前翰林直學士奉政大夫知制誥兼修國史姚燧以青龍辛夘春三月四日獨來縣學諸君適兼一人知者偶縣教訓導曹君餉余詩為和之所謂鐘山葢石鐘山也挽王敬夫憲僉素韠孤兒拜屨前令人未問已凄然同官南郡纔三日隔世東州忽一年夜月誰家虚燕席春風客路負雞綿玉碑老子埋銘在潜徳何憂世不傳别駕劉之問邀燧同府倅余叔器田别乗顯卿姬府教伯陽以癸巳九日飲郢判席上言懐去嵗君山孤櫂逺如今盡室石城州明年白髪桑榆日何地青山蓃菊秋客氣已為彊弩末宦情空繞大刀頭果成問舍求田策未讓元龍百尺樓次劉時中反和杜紫微韻贈李若水并序至大始元二月舟過髙郵有李若水者為屋數百楹以祠東嶽自號睡著余竊笑之豈是舉贏皆夢中為耶因其求詩取水驛璧間士子劉時中反和杜紫微齊山登髙韻以贈其人幼年自閹云何事仙人亦毳衣䝉茸如菼曜朱暉潔身自説年華盛睟面誰傅夜氣歸能爾用師三晝返不知去俗幾塵㣲睡嬰外務何曽著常恐金烏出海飛次時中留别反和杜紫㣲韻身世支離似敗衣有戈誰却魯陽暉不知次日公車召又時何時野服歸花信正愁風駘蕩麥苖還喜雨霏微分攜江上休回首恐見檣烏作背飛次時中參錯和前韻留别且勉其進徳無怠二首啼鵑休訴不如歸我亦從來賦式微竹塢且宜鳩杖立柴門不謂鶴書飛舟行逺後忘經驛酒禁嚴來徃典衣為問石城鷗與鷺幾時相對㺯晴暉多君聞道粗知歸雲霧何人識少微爾後驊騮終獨歩自前鷙鳥不羣飛准南數日將寒食客裏三春尚臘衣安得鑾坡同給札不妨苜蓿對朝暉次劉時中和牧之齊山詩韻有足斯奔有翼飛静常觀物入希微名慚窺管文章竊跡喜收身劍履歸影與金樽邀夜月夢無玉斧照晨暉白頭坐取移文誚又為前星一倒衣次韻時中再和簡吕正字登淮安城樓乆知戎服笑儒衣終尚晴􅆤惜寸暉上馬人扶甘伏老攜家旅食亦安歸嗟君無事乗清興尚友新詩和紫微相勉殷勤養鱗翼會能川泳與雲飛喜雪鄙句奉子英提學天上雲絞漾水波人間山色映兜羅東風盡日楊花落南畝今年楚澤多稼穡生成知帝力􅂌平消息聼民歌漢家始建營田計未厭牙籖没馬過七言絶句賞花吟十首常嵗花開必禁煙今年開在禁煙前坐令姚魏皆牛後伹媚殘春榖雨天嘗並牡丹為妬婦一枝惟許一花開從今記取花前飲莫遣猶特媵爵來隂翕陽施草木知牡丹烘日已離披明晨浥露還收合恰比芳苞欲吐時少年騎馬縱春遊紫禁名園訪欲周今日病中扶杖看白頭先已為花羞出門京國事無涯虚擲東風五物華却謝病歸催不起故園今見碧桃花手裁修竹直檀欒十畝清隂六月寒西掖歸來但篁篠被人皆斫上林竿酴醿寳相海金沙條蔓縈籬四面花莫道詩人例窮苦繡屏圍坐是誰家大葢青油一丈隂未須特入海棠林好乗麗日光風看猶勝銀釭照夜深佛桑艶艶欲燒空猶愧山茶鶴頂紅更是並他凡卉異謝時連蒂綴東風東風試手送韶華落盡梅花落杏花留得西園桃李在尚能十日媚山家張總􅃹清富軒米船明月白紅光未半王詵寳繪堂今日又添清富出兩家遺物滿筐箱許道寧幽人曵杖圖噴壑飛流雷怒鳴切雲老幹凛將傾深山窟宅皆豺虎説與幽人莫獨行題米元暉楚岫蒸雲圖得法君家海嶽翁青林翠岫白雲中夜牕不是瀟湘雨定有當時月貫虹剔耳曲意小誤已回頭得此人生莫過求堪笑殷君太聰聽却防聞蟻鬭如牛節婦䝉氏眷三首死别哀思盡有期最無窮已是生離如今筐篋同州吏誰肯分攜襁負兒今年西北静氛埃前日跳梁欵附來早晚君王罷邊戍良人應逐踐更廻能為聖代立綱常何獨雷門爛有光太史諸人争淬筆流芳直與漆沮長張仲牧牛圖牛刀農家惜百金畵師真得老農心釋耕不忍還騎去乍可牽牛歩逺林王氏祖塋詩卷讀渠滎澤墓田詩太息師垣尚未碑從此南歸得終願衞人應有賦蟬緌題孫大方真人秋聲軒五首牕竹蕭蕭夜撼風秋聲何䖏不相同却休八表神遊客認作匡山紫極宫醉翁詩法似長庚序集東坡有此評不和蕭蕭動牕竹却從庭樹賦秋聲畫竹今推兩李魁魚牋鵝絹訴為災試披風葉霜枝看似覺秋聲入耳來晉賢長歗只孫登君是遺苖必也能肯聼秋聲成一笑攬衣燒酒對宵興心許神交羽服流續書惟此一天㳺幾時却向秋聲夜醉卧朝元百尺樓黄華墨竹湖州再變到黄華兩竹離披自一家萬斛顛風掣旗脚軍民吹屈最髙牙樂山卷老思吟詠恐傷神多少求題委案塵展卷樂山殊喜作自縁自是愛山人巫山圖神女行雲安在哉當年魂夢費蘭臺絶癡更有杜陵叟尚想空山幽佩哀題歩隲奉𤓰圖二首從來道屈不伸身特傳吾嘗笑史臣簞食豆􅅅情最見征羌還却善觀人世有淳于定倒冠祝田求狹責奢難若從今日論𤓰直未必嘗渠飯一盤題曽子耘𤓰圖誤㫁𤓰根罪甚微未消狂晳奮餘威鳴琴不怨參真孝尚學風雩鼓瑟希書琴工萬古音卷後聞道為琴獨苦心新琴能發古時音百年却視今為昔不説雷琴説萬琴寄耕鋤隠者倪元鎮谷口青松夾徑生鶴巢松頂雪初晴此時知有經鋤者獨抱長鑱嶺上行檢校傳伯賢求挽其父憲使五首憲節﨑嶇瘴嶺持歸輿多少引丹旗東甌除却今尸祀别道誰家有立祠公雖歸𦵏汶陽莊留得閩中像在堂好記儂言看他日遺苖終有視為鄉􅀈舌將何嵗奉嘗荔丹橘粲與焦黄蓬萊日落天風急營魄時應一望洋累帙百篇先在吟鑑然一事敵南金向人求請尤無已足見終天孝子心知生知死弔傷俱紀徳於詩事不誣我僅知生不知死弔章魚目混驪珠三老圖三首宋人金季反兵時徒遣荆州徃乞師撫劍歸來天歩改無因死病怨良醫從卧封龍十頃雲閎中肆外溢為文若非用事多排比党蔡諸公不足羣勃磎姑婦入龍庭得意攜毫雪佾亭向使遺文盡收此後生尊作吐辭經陳雲心求題君近昌江山已深更依天岳最髙岑月明清夜援琴鼓惟有白雲知汝心挽雲南參政張顯卿四首原注其祠在碧雞山誰昔新知紫鳳山正當特節日南還曾談不足能專對不得深輪九虎闗萬里橋西逺寄詩伹知相見可重期如今繙閲傷垂老却是幽冥永訣辭自非威信結夷蠻祠廟誰修爨僰間從此旃裘具牲酒不來徼福碧雞山人臣用世熟無能由子非才不見稱觀此移忠與純孝是家台席有重登趙信庵墨梅廣平援筆賦梅時鐡石心腸吐媚辭千載信庵湔此恨却將鐡石作梅枝楊補之墨梅枯枿殘枝三數花似臨清淺照横斜草𤣥善學營丘筆水木齊行自一家題剡溪回舟圖戴逵失䇿遣人哀禮也元無往不來明日相過莫相見扁舟却與到門廻牧庵集卷三十四
