body:
  text: 牧庵集卷三欽定四庫全書牧庵集卷三元姚燧撰序讀史管見序宋社既墟詔令湖南憲使盧摯以内翰籍江南諸郡在官四庫精善書板舟致京師付興文署以故宣之致堂讀史管見亦歸興文自是庠後學之士廢讀是書大徳辛丑燧持憲節使江之東物色乆之明年得本旌徳吕氏之塾而劉安官校是邦㑹其月廩師生之餘榖充于庾而錢羡于帑足以傭工俾翻刋焉因憶曩遊江西閻編修宏方掾此省出管見藁數紙曰斯公遺墨俞秋山故物也嘗貽其子壻黄有開有開貽宏宏敢以上之先生遂受寶之踰十年矣併摹卷首每笑鍾繇求蔡邕書于韋誕而不得誕死至發冢以取其癖如是觀公今書于用筆精未必逮邕求邕書之存今者止于獨断惟箋漢氏名物豈若公于千二百六十二年之事千状萬彚叢臻其前一揆義禮之正褒以勸善貶以誅惡使地下之人寵受華衮恥䝉市撻其效法春秋扶植人極之功何邕所敢跌及復哀其時邕死孔融思之以虎賁之貌惟肖飲必引與之同賦蕩之七章曰雖無老成人尚有典刑然非是藁世烏乎知其􅇡削之勤已精求精已密加密埀後之不茍哉足使學者不煩發冢可少槩見公書于今移融之慨歎夫尚有典刑者不在虎賁而在此也其書已貽之同門友許約安求為序既喜是板為興文之始兼䟽其得藁之由與今所歸以諗觀者國統離合表序走未壮時讀通鑑綱目書于蘇門山嘗病國統散于逐年事首不能一覽而得其離合之概焉因年經而國緯之如史記諸表私藏諸簏遇有疑忘即是而叩無異多聞博識之見告者四十年矣是嵗之秋同門友許君得卿自金陵過宣留語冄月間以示之得卿善其非出己意而新竒為説特抽綱目所有彚而為編雖刋置凡例之後猶不謂僭而校官劉君恭方刋胡公讀史管見于宣庠聞之謂因是工可㫁手于旬浹遂取徽建二本重勘校之得三誤焉其一建安二十五年徽作延康元年凡例曰中嵗改元無事義者以後為正其在興廢存亾之間闗義理得失者以前為正其下注云建安二十五年改元延康考之范史及陳志注文是漢號通鑑所書乃若曹丕稱王時所改者今不能悉見例云然則為漢為丕疑猶未決矧其時正在興廢存亾之間今以前為正從建注二十五年其一章武三年徽大書三年後主禅建興元年建無三年餘與徽一凡例則曰章武三年五月後生即位改元建興而通鑑目録舉要自是年之首即稱建興非惟失其事實而於君臣父子之教所害甚大故今正之即是觀無三年者則昭烈為無終獨建之失曰後主者徽建皆非嘗求其原由陳壽晋臣晋受魏禅不敢帝漢而臣魏故不曰漢曰蜀謂昭烈父子為先主後主通鑑因之反帝魏而主蜀後為目録事皆書漢豈晚知其非欲正之而未及歟至綱目書出始曰漢中王即皇帝位統斯正矣而于其子獨曰後主何哉且自建興以及炎興用天子制以臨四方者實四十年鄧艾至成都書帝出降明年又書魏封故漢帝禅為安樂公亾國之餘且然豈于即位正始之年不帝反曰後主乎是與十四十五十六卷之起盡反凡例諸曰後主者皆溺於熟口順耳不思而失於刋正者也凡例又曰有被廢無謚者但曰帝某而不用後人所貶之爵建興之帝未嘗被廢亦均於無諡者故曰取晋帝奕與唐睿宗景雲二年注𤣥宗皇帝先天元年明年始大書𤣥宗明皇帝開元元年者例大書三年注帝禅建興元年明年大書帝禅建興二年庶前後參稽可皆脗合無齟齬也又其一天寶十五載注肅宗皇帝至徳元載明年惟曰二載未嘗大書肅宗皇帝至徳為無始故今于二載上加肅宗皇帝至徳使得上同于開元嗚呼三者均失而延康之取至徳之去猶皆小小何也統固在也若章武之距建興纔三年耳遽有帝父主子之異豈不于統大有闗乎故特書曰帝禅有罪走為不韙者度不可以户説雖面受之心不然焉或以為知言非獨走也有見可一時之快而建興之帝亦将雪其比徳失統主稱千載之恥於九原矣唐詩鼓吹注序鼓吹軍樂也大駕前後部設之􅃥數百人具器惟鉦皷長鳴中鳴觱篥皆金革竹無絲惟取便於騎作大朝會則置案於宫縣間雜而奏之最聲之宏壮而震厲者也或以旌武功而殺其數取以名書則由髙宗退居徳夀嘗纂唐宋遺事為幽閒皷吹故遺山本之選唐詩近體六百餘篇亦以是名豈永歌之其聲亦可齒是歟嘗疑遺山論詩于西崐有無人作鄭箋之恨漫不知何説心竊異之後聞髙吏部談遺山誦義山錦瑟中四偶句以為㝢意于適怨清和始知謂鄭箋者殆是事也遺山代人雲南參政郝公新齋視為鄉先生自童子時嘗親几杖得其去取之指歸恐其遺㤀以易數寒暑之勤既輯所聞與竒文隠事之雜見他書者悉附章下則公可當元門忠臣其又鄭箋之孔疏歟公将種也父兄再世數人皆長萬夫于皷吹之賠犦矟而導繡㦥者似已飫聞晚乃同文人詞士以是選為後部寂寂而自隨無亦太希聲乎其亦宏壮而震厲者亦有時乎為用也兵志有之不恃敵之不我攻走聞江南詩學壘有元戎壇有精騎假有詩敵挑戰而前公以元戎握機於中無有精騎孰與出禦走頗知詩或少數年使得備精騎之一曲橫槊于筆陣間必能劘壘得儁而還惜今白首不得公一振凱也公由陜西憲長以宣撫使巡行郡國河淮之南欲序故燧書此馮氏三世遺文序古之人道徳積躬而孝弟行于家風教及于鄉而勲名流于天下後世父基而子構祖塗而孫轍存乎當時簪紳榮之埀之于今竹帛煥焉是之謂世徳之家如楊震袁安四五世迭為三公桓氏世為帝者師與後漢祚相終始下乃唐之韋杜八葉蕭氏其間彰明較著者尚多由是以來有志樹立門户者夫豈無其人哉然不一再傳子或不才孫復不令仁義之不修詩禮之日捐徙業下逐百工衆技之利自混於齊氓能不觸刑辟以及其宗祀者又於不才不令之中有絶俗之識者也嗚呼世徳之易霣而難傳如是者果天歟天未嘗禍善人有開于始而無聞于終有先于前而見羞于後者必自夫人焉必人也耶簞食豆羮為物亦薄矣吾之與人猶必揆之于義以裁其當否况如天者将畀人以世徳寜不靳吝愛嫪誘之于冥㝠相之于昭昭俾繼繼生賢不墜其世者未必人力能致然也馮氏由中義擢金天眷已未第中順通議右部以及今奉議凡五世儒仕鬱為清風素望之家者百四十有八年亦庶幾古之世徳人哉子休復進學方力諸孫蓁蓁紅蕖碧蕙穎發庭下又如是來者之未艾也求今喬木故家可申乙者輪指不滿四三嗚呼亦有非天之為者中順以中議卒官同知山東轉運時年五十有九故甫年六十以同知横海節度致仕通議以同知集慶節度亦六十致仕率不滿年格而止不盡享有之留為裕後之謀若良農之休其地力而不竭其出也然三世皆止同知亦理之不偶然事之可異者中議之文逸不可蒐輯中順白雲集通義松庵集右部常山集奉議皆板之行世矣目曰馮氏三世遺文俾燧為序曰夫人之言為聲聲原於氣中順之氣勁故其辭簡潔而峻清右部之氣和故其辭温厚而優柔通議之氣粹以正其學綜博而趨約故其言之見于誕布除拜吟情託物誅姦彰善者剗戞陳言一以經史為師淡麗而不諛奥雅而雄深多體而不窮視金諸作􅆟為髙古信一代文章之宗也嘗致仕居嵩山之松庵以故人多不敢官公第曰松庵猶魯人於石守道曰徂徠然奉議名岵僉河南北憲事紫陽先生文集序紫陽先生長先世父少師文獻公十有五年交友間少師獨畏而不敢字者言必稱先生由其為河南徴收課税所長官兼亷訪使按部洛西識燧于㓜稚迨少師棄長尚書幕隠居蘇門輦致子之以不力于學數加困楚先生聞而馳書止曰某令器也姑無為是急其蚤成長自不爾先生四子保垣萬駒緱山嵩山皆中下殤既俾弟之子元楨嗣其職世祖以王教起為京兆宣撫司叅議年七十其嵗乙夘卒乾州四女長適張箎者相失兵間次王亨皆前夫人劉出且卒執亾妻手語夫人吳曰他日無醮他門必歸姚氏後是四年燧壻其家得觀還山集者于夫人所夫人襲先生還集寶有甚至不以付三壻夫人卒亾室在蘇門其書歸王氏亨亦不得而有次姨自櫝之後燧為秦邸文學亾室求之百至不可恚而與其姊絶尋卒刺膠州子子監江州路位總管上者晦求板之亦不可季姨適任良及主荆門長林簿求先生書與俱十一帙中止校某四時晦已卒弟曙也自江州來長林省其姑録四帙歸後亨子某壻昭文館大學士楊元父其母亦卒得疾䘮心燧持憲節使江之東之三年當大徳癸夘昭文子寅由為南䑓監察御史過華陰于王氏敗笥故書間得其七帙寅槖以遺燧思四帙在季姨所者他日必合而一㑹季姨終良䘮携其子某親迎吾家舟及齊安亦卒燧傷之曰嗚呼何是書之多艱哉今年四月曙滿秩南劒録事将西入秦求七帙板之建寜書坊過宣燧以寅所授授之因慨晦始受學先生常面命之曙後先生卒一年而生顧能成其兄志而文其祖書行今與後先生弟而慈孫哉若先生酅國世家傳次及平生嗜學述作之富與一世之士服為闗西夫子者有遺山江漢西庵三先生之碑銘之集序言故燧著是五十年間幽鬱于昔将昭章于今者于篇終云郭野齊詩集序古之人武以戡亂文以守成顧時義焉何如遇斯為之今為士者事㑹之來縮項惴讋不敢一出而用其學自班乎武人成功之間無已太固而拘乎嘗聞郭野齊公自其未冠而為士子時喜闗弓馳馬讀韜鈐書其先公禁切之毎不為止交逰或近狂之而弗善焉迨筮仕也連三佐戎幕用其畫軍旅率輙效而先公始信其他日果繇武立勞者㑹至元丁夘大集諸道兵襄陽張平宋本一時材武智計之士莫不䋲聮輻凑各試其能長圍之下凡六年而拔之乘破竹鋭浮馬箠渡江乃得專一旅之衆踐蛇茹蟲﨑嶇楚越之徼以蠻獠之鷔岸詐諼曽不敢少傃其鋒既懐柔者必仁存而信撫之使人不知有易代之懼又握虎節以卒于軍今縣官故事職乎民者子孫或不必世能世之者率職乎軍父死而子繼之兄終而弟及之如漢之徹侯以故其子嗣長萬夫而始弗善之者自妄其言之迂狂柔頥瞠目若不可少望其遺塵嗚呼亦諸生之壮偉哉燧逰餘杭都漕冠公理賦兩淛曰余野齋相好者子亦有雅一日焉今嗣詹戍是求序其遺集子容讓為因得讀之盡卷為詩六百餘首曰嗚呼子曰詩可興可怨今之詩雖不得方三百篇可攷以知國風與王政之小大要亦繇于吟咏性情有闗羙惡風刺而發非徒作也矧其善為形容所遇如函夏蠻裔之山川習尚諷之如人身履其地史氏㫁章取之亦奚異于觀之風其有咈吾心感吾心而出吾口者直至而激烈不自知其言之不可為誅姦之屬鏤也今也同時援蹟襄陽材武智計之士功與公等位與公夷與或過之者将千輩而有一言若是幾于道者乎則公兼衆人之能在衆人則不敢覬公之至也公諱昂字彦髙始知山東統軍司事改經厯官再經厯襄陽統軍司擢副沅州路安撫使同知沅州再副招討沿邉溪峒使俄陞為真改虎莭長萬夫戍撫州遷廣東宣慰使仍虎莭将本軍以卒嗣侯震也輯其遺文板之播曉一世日吾先人非獨功如是有言又如是其能子哉樗庵集序余讀陳杞世家叙舜禹契稷伯夷伯翳之裔于帝王與顯諸侯曰有本紀言有世家言獨于臯陶封英六曰無譜嘗為之廢卷曰嗚呼英六建國也厯虞夏商周四代之間将二千年由無譜雖以太史公之綜博猶不能推采其世竟與滕薛騶小不足齒列者同歸于弗論則清風素望之家子孫能完有其譜不隕世徳者豈不難其人焉此歐公取以表宰相世系于唐書也然惟世事搢紳者知尚乎此其或徙業不儒纔四三傳于所宗親猶不能舉名曽高况族從之遠而蕃乎千嵗之緒一朝而㣲絶其發太史之歎而見比英六者不知他日幾何人也近世惟吳氏從五代晋少帝降遼為名臣之三世三相國陳秦燕秦燕皆中令中令而下官少異矣然繼繼搢紳至提舉鄧州學校君八世宗從百數十人非君死生一譜于板蕩之中不使其遺裔得見先徳之盛于今曰嗚呼其善為子職者後君沒之十九年至元庚寅子京出其譜而見其然且求叙君樗菴集因伏讀終帙得古賦三古詩八十四律詩九百八十七樂章三百二十表書啓五十四序引三碑誌事状十三祭誺一青詞祝文九十二榜疏十一凡千五百七十篇非其中閎肆該蓄能是富多乎哉聞君在全季也年猶甚盛已受海内聞臣譽士之知書候其門必曰内翰葢已與其不蹈是地不足以盡其學能今斯人者復皆淪亾頋求君故人子及識之垂鬌中若燧者耶亦足為斯集之悲也竊嘗泛觀大率古人之書不行其時而傳諸後故其時之人及見其槩有不若後人之盡其完則斯集之所悲豈非適為燧所幸歟夫讀其書必知其人質者拘窘掞者㳺誇近者膚卑豪者峻宕剛者麤厲而弱者氣乏與夫徇今者陳茶戾古者無法葩艶者遠實喜異者艱﨑失志者詆訕躁淺者迫切而挾數者詖傾其失非盡乎此也惟所性中正宏厚者故能優柔而明炳洞暢而温醇斯大雅君子言符其徳者也斯集有之然不茍作尤致意于朋舊患難死生之際亦足為後學篤倫理之師瞽見如此異時者出将以余為知言云其出處詳見故河南府提舉學校李君竹齋所撰埋辭又聞平生于遼金右族字名官勲世數子弟及其外氏何人皆能黙疏而備言我外舅紫陽翁嘗勸其為書豈将資筆近鑑耶惜不果成也京今嗣為州教偘偘自持操置門第甚髙其姻與友必求其類真不隕世徳者其喜譚遼金世族葢習聞餘論庻其能成書乎盧威仲文集序一元之氣不能皆陽故陰時出而乗之然而制陰者必陽也世道不能常泰于君子故小人迭出而否之然制小人者必君子也古之人往往於和光同俗之中寓其扶陽抑陰之意聖人何心哉順天道也一小人生而君子必與之並生焉生此者所以制彼也仲舒汲黯並𢎞湯而生張猛周堪並㳟顯而生朱雲梅福並光禹而生天意可知矣是以鳯憚王章賢惮王嘉覽惮陳蕃冀惮李固操惮孔融諸武惮仁傑仙客禄山惮九齡守澄惮劉蕡异鏄惮韓愈惮之者人也所以使之惮者非天乎吾友威仲之生其将使世之有所惮乎其天以傾世道之陰乎其文吾不得而多見其大者矣甲辰一疏奪權人之分而其立可使蟹匡范冠而蝉緌夸者知位之不可恃悖者知禮之不可失其有功于名誼如此埀紳學館之際是非必陳邪正必辦闕政無能言而言之者必威仲也巨憸無能拒而拒之者必威仲也射精而猿號鑑明而塵至威仲於是不見容於表著之底矣湛浮田里嘯傲江湖此自古忠臣志士所不免威仲身詘而道不詘矣余嘗熟玩其文之一二大抵體根于氣氣根于識識正而氣正氣正而體正故勁特而偉健明白而洞逹激烈而懇到望而知其為威仲之文葢君子之文也抑余有聞年有少壮老之不侔氣有明昏憊之殊致故為善于少壮之日則易而自立于衰暮之節則難惟學則一而已矣孟子曰我善飬吾浩然之氣又曰以直養而無害又曰是集義所生者夫如是謂之學此威仲所素講者余復誦而勉之髙麗瀋王詩序天下之事以古方今不異則同異乎古則同乎今異乎今則同乎古異必一居無有若髙麗氏之古今兩異者姑即已事而觀之始晋惠之永興盡宋文之元嘉偏方立國若成李雄代什翼犍凉張寔吕光南凉秃髪烏孤西凉段業李暠北凉沮渠䝉遜夏赫連勃勃後秦姚萇西秦乞伏國仁燕慕容皝垂南燕慕容徳西燕慕容冲合是數國之年取其兩端冲少不能踰紀沮渠不及四十年一何促促若是耶庸以較夫髙麗氏王建立國于唐明宗長興壬辰厯晋漢周金宋以及至大庚戌傳二十八厯三百七十九年垂統之遥繼序之遥昭昭况頼聖世億萬維年其來猶未艾者獨何修而臻此哉豈負固海隅中土之兵不能以至歟将善于事大不失其貢職歟将修明治具禮樂刑政維持之效歟抑箕子之澤百世而不斬也吾所謂異古者此焉耳其異于今均之曰王異姓之于天宗有間也然宗王􅢖受封大國同升虚邑何也未嘗祖别子于廟人民則天子使吏治之其府雖得置監郡與府属皆請而命諸朝而刑人殺人動兵何敢越律其民五家賦詩為斤纔一猶不聼下令擅徴發其地皆輪之天府嵗終頒之其網亦宻矣遇髙麗氏則不然有宗廟烝嘗以奉其先也有百官布列以率其職也其刑賞號令專行其國征賦則盡是所轄之境惟所用之不入天府若是而曰異乎今者然乎非歟最二祖之所併苞何翅萬國其苖胃有世其土而王者乎雖牽塗人之裾以問之亦皆曰無有萬國獨一焉世祖又為乃先生降以安平帝姫追封秦國實生今王于屬為甥而妃又裕皇元子晋王公主父子先後連姻帝室當儲皇之敉寜内訌也王與定策故皇上報之加開府儀同三司太子太師上柱國瀋陽王駙馬都尉征東行中書省左丞相髙䴡國王後以宗王封大國者惟一字遂與同之又原降制惟曰瀋王進尚書右丞相加推忠揆義協謀佐運功臣湛露㤙光可謂無以尚者其相與參軍踵門謂燧曰詞垣之臣不可不有詩也君為序之翰長乃帥其屬共為賦頌褒揚揄拂歸美聖徳歌功台階其聲鑑鍧若金鐘大鏞之戞乎虞業焉其文焜煌若山龍藻火之摛乎繪絺焉既不遺于一善燧序先之則為箕舌之粃糠有譏其贅者矣遐觀䑓唱和詩序遐觀䑓者今常之無錫丞前南陽府教梅谿楊蔚彦亨之别業也其扁則致仕翰林承㫖王公鹿菴所作用筆髙古神間韻逺真天下之竒書哉彦亨自賦之外詩若歌者十有三人余識五人曰樂吏部梁兵部李庭賔王繼明張毅也其八人未之傾葢焉捧玩披今名篇俊發諧互鏗鍠皦繹通暢金石之音未足以喻其正而䴡也摛藻煥輝絢爛奪睞黼黻之繡未足以方其實而章也二十五年余罷直玉堂之明年彦亨亦秩滿無鍚聚居穣侯之國余忘為詩君先挑嘗焉日夕和賡浸淫卷軸顧余豈敢追配大雅然騏骥千里駑馬程以十日或猶及之是以竭力蹷倒景之後而不辭也于是之時彦亨求序梅谿唱和余莞然笑之非求序也特詫彼十三人者之能言相媿焉耳雖然子見夫善奕之與拙奕乎拙奕獲偶善奕則其智日增善奕之避拙奕則懼其術之退也君懼退術耶余智烏乎增将曰負博局而惟夫子之是從也壽龎禮部母夫人詩序古之人曰觀其子可以知其父父丈夫也我丈夫也身以接之何嫌宜若不待由子而知若夫母也則非有親好於平日有不得一躋堂陛而跂其几杖非由子以觀其知有無從者葢迹其己事也天下之人惟善其常而變故欣戚一發乎情必善常其變而變其常而後欣戚不千一揆以義方龎詠之銓官海南也去京師萬里䝉犯炎瘴蒸如毒厲而至于海舶渉洋矣蕩以㫪雲之濤引以排山之風幸其既岸始礪兵負甲以鬭未服之獠出萬有一生之塗滿嵗不可必其來歸亦至戚也使母夫人如他人去其子百里期盡旬月而反煦煦以節早夜時饑渴為戒繼以牽衣相泣者則詠雖勇于功名亦安能㫁襟以去乎哉其果為行由夫人之能勉以君命之不可反汗臣職之宜于賢勞也故曰常其變然詠嘗御史裏行嘗修撰翰林今為小宗伯皆清列也鄉距京師可冄曰而至其養則膳服足以華悦其口體其逰則貴家姻里願頼其儀法亦至欣也而夫人猶不輕去先人墳墓以安享有寜家扵淶水之濵視榮耀若無與已然者故曰變其常諺曰不啼之兒誰不能持嗚呼如是求之其情與義有遯而不得者乎至元二十有三年燧始識詠于燕後是七年相遭武昌是年如海南皆數夕而别元貞始年始同官翰林入同事而出同適驩浹而閒暇計始至是踰一紀矣可訪親好以縻官于庭無所為而至于淶故于躋堂陛而跂几杖且不得而遂焉矧齒其年乎哉惟知生以四月一日詠自善為文凡庭臣之文者率作歌詩為壽燧欲序之前年妨以史事去年廹南歸令閒退于郢無掣乎中故書所由為序示詠以致三千里之賀王憲副母夫人九十詩後序常讀詩禮之言而知其祝壽考者恒在于有官君子也聖人之心非不欲四海之民盡然頋其勢有不可必得而其仁止于不饑不寒無金革以沒其齒而已矣君子則不然責以其治代天工也效以其澤及斯民也縻之以好爵酬之以重禄王者既崇髙富貴之故人之䝉其賴者其報惟有壽考之一言曰庶幾乎由吾是祝而永年可悠長父母吾也嗚呼君子之于民有父母之道者也非生而出之者也而民猶忠厚若是况君子于親託其遺體乎則其祝壽考者将什百千萬于斯民之于吾也匪徒祝之又以其禄養之卿士有家者也以家養諸侯有國者也以國養或曰民之無國家而壽考者若何而為養曰漢民之長吏存問嵗時致帛絮牛酒者猶其遺意也允中方為河南北憲副有官君子也母氏夫人年今九十壽考者也食四品禄家養者也養有禄故能備儀物備儀物則可愉裕而無憂愉裕而無憂則壽考者益昌延而無期矣允中以黄髪之子奉白髪之親䔍其孝者為何然然未嘗觀木之稚也氣鋭皆上聳而挺直無求依其旁其老也勢竭皆下樛而婆娑有求質于下亦理之曰自然而人亦或有不是異者也則夫以髪之親撫黄髪之子益隆其愛者又如何是皆足為吾身昊天不弔者之深悲矣余識允中十年于今未嘗言及其親己丑秋遣其子銘持諸賢為夫人序詩八十者二十人二十五篇詩序其九十者二十六人三十三篇編為兩軸最之為四十三人五十八篇葢有同是一人先後兩賦之者或累篇者其孫錫於其王母不得比之他人宜别之嗚呼多乎哉大而庭臣之賢下而髦士之良稚髦之不必齊其年也戚疏之不必一其好也亦容有不得升堂以企望夫彤管之儀者焉而洋洋誦歌若是于以見凡允中交者皆母之訓也然反扳而覆誦之猶病其言有矛盾者既稱夫人婦王婉順矣當節度君守趙将以城活斯民而夫人一言制之是越壼内而出干戎律也顧以節度君之雄烈識度其揆義委質取必夫人之一言是舉閫外而入禀牆帷也兩戾其道恐君夫人之賢兩不為是筆斯言者将以是而信來世非誣人耶且今之巧于術智者人猶莫忖其心之何在况蒼蒼之髙天幽邈卑人以年而曰吾得之必之何在而致非誣天耶余之斯言雖足取愠一世而世之人以為知言者多矣詩中或有贊夫人能誦浮屠書者抑不知為是者将報徳在今歟其徼福未來乎以為在今外宰物而歸之浮屠之鬼迷孰大焉以其未來乎既享有于昭昭又求不可必得于𡨕𡨕覬孰甚焉彼為浮屠法者必信其書而崇其道者也懐之西堂徳公亦僧之巨擘焉年百十一方年百有三時尼有白姓同齒者曰夕誦浮屠言徳止之曰人恃氣以生者也今老而衰已不能充乎五内而暢之四末汝猶忍耗之故楮上耶白為之止彼為浮屠法者猶戒其徒以老無讀其書而夫人不為浮屠法者顧誦之不置允中其以是幸諫之曰某之友姚燧者實云然誠由是能止誦則夫人當氣實而神深多蓄而少出不伐而益完自今保壽考益昌延於無期者皆由燧得之敢以是祝鄭龍岡先生挽詩序觀人之道當概其心所存與身所履如何而論之夫然後中而無失今也名卿賢士之物故莫不有詩人挽悼之髣髴其平生或以徳書或以交言或以遇榮或以御恤或以名而慕或年而仰二或以政而思或以文而揚往往各得其一事一言而未概心所存身所履始終何如也譬之繪工始學畫人耳目鼻口顴頥顔角理髪須各自為處終未嘗集而為面使真見夫妍醜善人惡壽夭貴賤為誰某之全燧少時聞鄭龍岡公第知家富清玩可與古李鄴侯王副車者敵薰然承平故家習也後國學生始與其孫有節有文二人者友于時公即世已乆而二友年尤少亦未嘗詢及先徳何如今年來關中有文以安西行省員外郎示吾友江西行省郎中髙道凝所撰埋銘而得見公大節有三一曰亷太宗賜銀五萬兩辭今上賜鈔二千緡償責辭二曰讓太宗再富以地比諸侯王封冄辭貴以上相位两中書右又辭三曰仁金以蹙國汴都尚城守大宗怒其後服拔将甘心公怫逆曲折陳觧城賴不屠所全無慮數十萬人世之知公淺淺者惟曰尚醫夫善鍼艾藥石者孰與和扁意佗稽之書傳所起死惟各数人使四子者存盡鍼艾藥石一世之技能起数十萬人之死于膏血横流之下乎嗚呼四子之所能者公或能公不公之所能不惟四子之必不能雖一時四海勲戚将相結主知未固者皆不能也古稱仁人之言其利博哉其不信然乎然自公之霣謝凡在廷將相善言經為通儒文為名家詩誺以之集將百篇煥乎其黼絺鏘乎其璜珩所以髣髴平生者将無一善之遺餘矣吾猶病夫各得一事一言未概其全也故著三大節而叙之俾觀者未及其詳而先領其要焉馮松庵挽詩序二十有三年夏燧以湖北副憲奉檄趨京師以疾留襄陽僉河南憲馮君岵亦以疾得告來襄陽便醫予與之姻友相好也故得與讀遺山敬齋所撰君祖松庵之碑誌焉以兩公之文形容大君子之盛烈可謂不遺餘力曲極為言矣然論出處要歸之際不過反覆用違其長而徳有銜若哀其不遇然者私竊惑也且諧于時之為遇未若不乖于義為遇之善者也自今以觀亦嘗思金之叔世為何時哉譬如病阽脉絶息困之人為良醫計帷有如秦和之于晋侯不發藥而委去自免誤人之名一策焉耳彼大君子者頋豈不醫若而強起自試于必亡之國乎雖然有義焉使先生已為將相國命民心休戚存亡視吾一身故死生有不恤焉耳幸其時無是位浮沉于常官于時不可為于義無必死膏車而歸搴裳以行徜徉于泉石肆志于文酒間此正大君子用世全名之先識髙致兹可謂大遇尚奚不遇之云為哉當時之人年位居前者猶俯而友之其敵也皆跂而師之下焉者恨望履絇而未見者未必不由乎此惜兩公畧不及之也嗚呼燧言為妄後生之論立崖而求異斯其恒態果有取乎先生未必不以燧為獲我心一興慨于九原也又先婦翁紫陽之詩髯雷短宋是門生而元碑止載雷李王冀及渠五人宋不與焉然兩峰亦人豪也遊先生之門若不玷焉遺山何為獨見黜此又惑也先生之殁距今四十有七年自當其時及身接之殁而哀之以文者亦遠而忘焉况如燧者生長去先生千有餘里地如彼其遠也年甫三嵗齒如此其穉也目未嘗接其輝光耳不及聞夫謦欬殁不知所謂哀乆不知所謂忘亦人之情宜然也而燧之不忘先生者異甚葢先生殁以庚子嵗七月十有四日我先人之棄其孤亦同以是嵗月日燧雖惡逆非忘先忌者是日収淚之餘必思吾先人維時于先生及識不及識不可知而得與海内重名之士葢棺同以是嵗月日亦可少無憾于𡨕𡨕而燧思先人必及先生者盡此身而後止也牧庵集卷三
