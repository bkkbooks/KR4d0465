body:
  text: 牧庵集卷二十六元姚燧撰先徳碑開府儀同三司太尉太保太子太師中書右丞相史公先徳碑至大之元秋七月二十有八日制日丞相慶公之先及事列聖繼世忠謹者既敕有司既諡既封非刻金石終恐不能垂示悠久其令翰林學士承㫖臣燧為撰次之臣聞命競惕誠以不文不能鋪張大君子盛烈上負明詔其冬而其家乘始至自夏故得反復究觀公夏人史姓曽祖考塔塔喇威夏臣贈同徳濟難功臣諡康穆祖考喇勒智喇斡衛太祖贈服勤翊衛功臣謚簡敬考索勒濟爾威闗弓馳馬拳勇絶人入侍世祖潜藩嵗癸丑從平雲南諸國以驍果聞及歸行賞賜馬五匹鈔二千五百兩價與銀埒已未又從濟江攻鄂戰疾力明年帝正天位從征叛三漢北小大之戰十五賜白金幣錦以為䝉古唐古軍民達嚕噶齊年七十八終贈推誠翊運功臣謚忠宣三世皆太師儀同三司上柱國公祖考加開府曽祖妣伊拉齊氏祖妣蔡氏妣鳥納氏夏王外孫皆從封夏國夫人七子同出五人公次居二以竒塔特布濟克名行自童幼從忠宣出入世祖帷握天監灼其已克恭勤至元丙寅選侍裕宗于東宫將二十年敬畏益加無少僣忒遣順考生皇上儲皇詔公保育鞠視之每帝召見則必左右兼抱之至前方幼而學詔教之經以其嫡子額爾吉納侍讀俟其遨嬉廢誦輙撻其子以警之故能終業以㑹將畢聚諸侯王讀太祖大訓加丁寜告戒之始遣就國或皇上儲皇不在列必邀致之使與有聞出申飭曰是汝他日所宜為者其謹識之必舉其辭毋庸怠忘徽仁裕聖皇后以善于薰陶翊賛也責其四衛畨直諸臣事皆咨聞大徳二年成宗詔皇上撫軍漠北曰是昔大帝授朕者今以付汝且以輔導巵從壹是軍務悉聼于公宿衛諸將皆父事之至則訓練六軍總裁法令胥地所宜可屯田者必分耕之以佐軍實屠羊不湯其毛而皮之與餫餽棄訓諸物皆集以市諸部易皮為裘禦戰士冬四年以文移無印難杜問欺又身入聞得裕宗信寶以歸明年八月冦大至公教吾軍衣紅衣于甲以自别俾閧不迷大崩其羣自是冦望紅衣軍則退不戰九年皇上踰金山公視軍士失馬徒者空其羣散之死則不責其償十一年成宗賓天使至皇上欲棄大軍入主居憂公日是使之來惟以告哀且彼事宜難以遥度湏召赴使皇太后儲皇隨以削平内難見告且促其來即自假公平章政事驛至大都軍致金帛于北為朝集備五月皇上立極真授榮禄大夫中書平章政事蓋公雖厯事世祖裕順成三宗其貴有極則始乎今餘月儲皇入陳疇昔調䕶之勞制亦曰非夫人之力安及此加銀青封慶國公妻庫庫楞同封慶國夫人七月進儀同三司太子太保九月加開府太子太傅明年至大之元二月拜中書左丞相復以為太子太保加上柱國四月拜太保六月進太子太傅再進太子太師七月加録軍國重事十一月中書右丞相十九易朔之間凡九降制大臣之位至是極焉又以其兄阿拉克布濟克弟昂吉爾皆榮禄大夫司徒兄兼都元帥弟遥授平章政事弟實喇薩喇榮禄大夫使宣政院寜夏甘肅釋都總統托羅岱管軍千户蚤卒他母亦烏納氏二子烏頁爾威珠格爾威孫男十有七人達實和哩布管軍萬户虎符婁都哩威塔海諾海圗徳勒威伊齊特穆爾額爾吉納年二十二至漠北之明年冦出金山南布庫哩額爾吉納將左衛射士唐顔行當冦驍將既接戰刃槊兩不能施手搏墮馬斬其首明日皇上解御衣所乘馬鞍勒為賜仍偶一良家女冦夜襲他部輜重以遁又將數百騎追敗而止還之四年又殄冦于昻吉爾圖獲人畜財貨不可口匹貲算又明年冦舉國至又戰于哈喇台以數十騎出入其陣數四所當披靡莫之與敵冦大駭却皇上乘之遂大潰斬馘不可級計十年踰金山前茅獲俘萬餘人斯皆効死於乘輿前天目昭覩者明年冦平第諸將功膽略材武推為冠軍立極之日授資徳大夫同知樞宻院事六月賜虎符使大府院事唐古親軍都指揮使七月加特進遥授中書左丞相又進知樞宻院事又兼使典瑞院至大之元五月兼使仁虞院十一月拜御史大夫哩日初事晉王有謹敏稱皇上至軍之明年大戰布庫哩雖勝而冦退未逺與晉軍合而大官廩肉不足則日餽二羊又繼諸軍糧其賦又盡則賦他部供億後多其忠從晉王未致右右立極再月授資善大夫翰林學士承㫖十月進榮禄大夫遥授平章政事行大宗正府伊克札爾固齊十二月授卿典牧至大之元二月賜尚服五月拜光禄大夫遥授中書左丞相七月兼使將作院額哷幼為沙門十一年至軍中賜御服㡌帶俾不祝髪其年官以正議大夫僉宣政院事女孫十八人有從者十曰戩伊特楚曰安巴曰哈達遜曰旺温曰聶辰曰世兼千户曰聶爾巴曰吉逹布曰沙津曰善布男曽孫六人額爾吉納威穆齊爾威布都訥威宿衛乘輿綽爾齊阿哩衮薩里扎拉爾威女曾孫二人臣嘗槩公父子有四徳焉一則曰保育聖躬再則曰舊學三則曰周旋軍中十易寒暑脩扞于艱終則曰扶植皇極𢎞濟登兹其髙明一門之間三為丞相無極無儔人奚間然敢再拜稽首而銘之曰維史胄出書焉有質伊誰云從則周史佚踰二千嵗餘慶茂蕃推而上之實一其原嗟公之家中土亦始其來姑臧不紀其紀可系而名則由其曽奕奕其䋲陛陛其登祖衛聖武左右興祚龍咆虎號風雲胥附考事世皇荷祋與戈昉于南詔爨僰壘摩再從濟江攻鄂東北舞干梯衝執訊雲壁又偕度漠氷雪峨峨手瘃足皸拳勇維何固叛是求凡十五戰不摇疾飈勁草乃見歸以夀終生子如公帝灼其心惟一効忠式昭徳音選臣裕廟其盡其職其徳其要洞洞其信屬屬其恭介介其守廓廓其容皇上儲皇既生順考詔輔翼之俾躬是保及隋授經撻子示懲止其邀嬉大訓服膺其彌為善若是非一臣鄰徳將儔與為匹成廟降制俾從撫軍朔方十年日伺冠氛晝横雕戈夜袵龍盾惟彼不至至戰必遁末踰金山危巢是傾竟令飛揚不逭大刑惟皇作極言念大徳既贈祖考公以夏國美諡崇階罔一或遺父子丞相百辟用師尚服其衣尚乘其馬門户輝光世無二者爰詔史臣樂石特書賀蘭可磨而銘始渝先徳碣河内李氏先徳銘至大庚戍鄃王府長史兼經厯典食司與所部人匠都府官李惟恭持其鄉士席雲漢狀其祖潤文玉使懐之利用庫日民調商征之入吏祿公湏之出不遺于受不僣于發如他人侵蠧以益其家負而債償罪沒産者皆無之與人交以誠御下以寛禮賢樂善者求表其阡燧曰管庫之官則古委史亦下士也豈可筆者豈專由孫貴耶蓋鄃王之考初尚主世祖再尚主裕宗自稱晉王克用裔孫為置守冢數十户於雁門禁民樵牧由分地在髙唐即是進爵為王世居静安黑水之陽為廟以祀孔子元貞始年表賀聖節獨書漢字庻其尊禮斯文者惟恭今臣其子觀其所事者賢若不可辭矧有此大者懷之為州憲宗大封同姓初國世祖于秦以户寡益封之至元之末以封其孫順宗既之國未至疾返賜名懐寜以王今聖時方撫軍于北皇太后儲皇往居者二年則懐為三聖龍潜之地傳曰小國之君當大國之卿為下士是邦者當宜何哉則君善職管庫者有不必言矣卒以大徳乙巳三月十有八日年六十七垂疾猶念惟恭不置曰吾平昔鍾愛是孫今逺宦數千里不及聞吾顧言可憾也哉妣王後二年亦卒二子從鼎從信孫則惟恭其長初由王府郎中羅忠國使懐聞其好學慤有立志遂與偕北即婿其家進之于王王甚禮之言無不從事必見咨妻卒賜楮緡二千五百為取元氏子季惟寅銘曰荀卿子言臂非長封髙而招所見彰斯若可用為君方惟懐為州河之陽實為三聖淵龍鄉其間下士雖守藏或小大國君卿當其貴可參攀鱗翔况復有孫翼賢王逺塞而近孔子堂仕優學以能自疆何畏潜徳無輝光墓碣朝列大夫飛騎尉清河郡伯張君先墓碣章丘為濟南屬邑士子張養浩年少而志厲積學而善文授知平章魯國康利公曰汝學仕耶今之仕者莫不由吏發軔遂用為儀曹史超擢中書滿其年考出令堂邑一守敕約便行弊祛形勢不撓惸鰥不悔民恵之懐咸稱曰自停年之制行令吾縣者前十餘輩無右吾令求紀于石走未遑為今聖淵龍召為宫師府文學進司經宫府随拜監察御史轉翰林待制今都中書右司事由武宗詔内升臣五品而上列五爵三土階勲而等威之封生贈死其先五品則縣子男從而正之與四品郡伯皆止父一世三品二品皆郡三侯二公上及其祖再世一品國公逮其曾三世矣故官父郁朝列大夫勲飛騎尉爵土清河郡伯養浩思異斯寵碣諸墳道且自為狀受姓之逺與家章丘世數可知者則自其髙曾然猶兩世皆逸其諱惟知曽常官武畧將軍監陽丘之燕鎮酒其致斯者任子耶入粟耶武功耶皆見無所武畧四子伯不年而仲不後叔萬季山叔娶郭氏六子澤職管庫于蜀彬徳正徳林秀敏孫十有五思敬思忠四川行省宣使思誠居郵耐榪稱崇興特綬裳履繼季娶苗氏二子一失兵間次朝列則今清河郡君生子英塞皆夭顯今惟養浩祖及諸父振粟於鄉遇盜於家脱人以刃縋井取飲活友於死者有家乘詳惟夫不大振顯數世而發是一旦者可不為明之且人持衡猶必稱物而使之平矧天所司惟一福善而禍滛視其力行非度盛而著者故有不終嵗㢮為衰微而安行所遇必數世而始進于盛者譬之鉅室徹則一日可必平土構且累嵗不能以落其成古人監此所以垂從惡如崩從善如登之戒也夫如是則章丘之藴美含章雖武畧之僅官𣙜酤而猶不能頡頑時榮其上之晦迹又不知其為世幾何亦庻安行所遇者䝉莊有言今夫水其積也不厚則其負大舟也無力朝列之先厚水者也資其後以負大舟也佐五命而所生享報如是未艾其年子之位日髙而所生又隨之而加非若陳省華與三堯共躋台衮者不止也雖然是猶以子貴推言使當時也朝列責其子為農為技則亦不儒而已矣又何自開廣聰明漸涵道徳工其言語流其聲譽居兹清列哉然朝列又為子擇術之精者銘曰嗟今士子人孰不期煜其華辭振擢一時惟其才資得天者薄雖竭爾力而竟落莫矧古有作如車司南能不背馳千百兩三孰興靈竒章丘君子名疇與昭魯國振起引以試吏㧞其俗常令諸近畿佳政用張文學司經寄帝耳目轉而待制典國竿牘進而顯矣推恩所生勲伯土之清河郡城人曰子學其父所詔有赫今隆則為子報子明能然由居止仁維以勸忠示禮使臣圭首方趺碣其墓隧孫熾仍昌其來無止河南勸農道副使白公墓碣彦隆始由太原徒行至河内致其父書魯齊先生願遊其門未有介也乃因吾友翰林侍讀髙凝得操几杖主疑家二年而歸侍其親而先生亦召北矣尋由避宅右揆以集賢館大學士祭酒國學教貴胄乃奏召舊弟子㪚居四方者以故王梓自汴韓思永蘇郁有大名耶律有尚自東平孫安與凝燧燉自河内劉季偉吕端善劉安中自秦獨公自太原十二人者皆驛致館下三年吾儕或病告官去而先生亦浩乎其歸乃奏有尚與公從仕郎國子助教昔者貴胄友也一旦能横經下心事之為師屬非其道聳是曹不可得其馴然北面俄侍裕廟東宫公為講鄭伯克段于鄢已講而出裕廟語人曰是非空言意固有在也以國史院編脩從仕郎仍助教擢奉訓大夫監察御史發阿哈瑪特賊國諸不法彼顧誣公糾摘非實捕送刑部獄引鄰婦有色者教誣公嘗竊往來而鄰婦力明其無有鞠之墮孕而事始白又糾膺帥西京宣慰使道拉實以已憾殺其幕寮凡是皆庸懦縮首危者而峻風節者咸偉之出僉陜西漢中道提刑按察司事燧亦為其道副故得詳西上所為其按厯皆分險僻荒寒諸州南而褒鳳金洋北而綏麟葭丹塗經龍門西河絶崖髙可去水百尺止通一騎必遣導者先之有來騎使駐之寛使卒至則兩不可班視燒棧猶車衢也如是之地皆周焉制度卒有反者不即覺捕惟罪社長監郡與憲司麟州人告陰濟民乘馬疾馳其識仇也問曰所懐書濟民紿以反書仇上變延安延安移文吾憲公又請往治之所牽連二百許人繼燭治之再旬是州小僻無紙至覆舊案以書適近侍臣刮馬其州館隣牆也聞獄吏苛問終曉得公姓名歎曰世有克勉其職如斯人者使人勞告之曰吾見陛下當首聞公竟白濟民無他特杖其紿仇非宜言者公位憲諸君下㑹王相府拜布哈右丞勲臣子開省京兆特異禮公其按問諸司皆拱聴者改僉河南河北提刑按察司事臺檄檢覈中興鈔庫中興改李夏都𨽻隴右河西道憲令竟事始聴東任公又走沙莽往復近萬里半嵗而歸與其副使程思亷發數縣民完堤以捍河水罷當暑賦民牛車轉粟入淇又改僉燕南河北道提刑按察使事趣裝其考已疾行至衛而卒公與兄楹即藏衛西輝之蘇門周卜村南原而其妣亦疾乃朝夕哀死事生即教授于輝明年燧召直翰林感其毁瘁骨見衣表弔哭之餘其徒數十人拜庭進退朋讓賓敬之道囂囂然先生成法也為歎曰嗚呼燧亦先生弟子者何嘗有一善及人如是明年燧疾满告歸鄧而故司農卿侯爵託語彦隆或河南北農副制下必墨縗以出世議隘薄自便非時燧傭車過衛不可留不得身見為書語其然聞方督課有績其妣亦卒附其考墓竟以是謝所事以至元已丑秋八月三日年四十六卒苫廬嗚呼學可以範世行可以礪俗而已是哉夫人賈也以燧平昔善公録河南北道勤農副使苟宗道埋辭求銘神道每一讀之一收淚擲筆數年終不能叙其事去冬以史事又召入翰林過輝夫人祈世母夫人為言持幣泣請且使其子安禮與遊其門者庭拜燧還其幣曰吾無答吾亡友者以是佐刻石湏嗚呼非公仁義行家能使婦人切切者乎惟恐没其夫子一善可曰賢已公諱棟考天禄雖官而不顯居頥樂堂號頥樂先生唐白居易家狀云白姓家太原者楚熊君孫勝白公見殺于楚其子奔秦孫乙丙與裔孫起為武將封武安君賜死杜郵始皇思其功封其子仲太原公豈其苗裔耶銘曰聞古五十年不稱天公是不盈天道未曉學不篤耶得譽先師道不行耶裕廟嘗知職不舉耶三憲著効力不本耶耕播之教况冠獬角敢言人難彈射柄臣聼者毛寒猶枚其外未及其内視親于䘮觀婦于介靡一匪善靡一可凉非我私友月旦章章嗚呼白公耳孫猶令其貫古松嵗逺滋勁士不盛位而盛吾賢盛位者衰盛賢日延有方其趺有剡其首碣石阡隅千祀無朽國子司業滕君墓碣觀漢諸碑凡門生為師作者其文多稱在三之義蓋本欒恭子民生于三父生師教君食惟其所在為言又列郡邑姓名氏官人出幾何錢于碑陰多至百人或倍之令人每興今無古者篤于其師之概至大已酉燧長翰林之明年國史院編脩官東平蔡文淵狀其師國子司業滕君之行與門生許質求表其阡與君之再入成均横經文席者嘗數百人而礱石所資一不偕人出二子獨加異乎古豈不于在三足浮俗斯時耶君諱安上字仲禮其先自洛徙中山不可推采其世考府君某隠徳委吏斗食自捐生君八年而不禄妣李夫人撫君誨曰而性質開朗記識兼人且金名士趙燦離孫不可以貧廢學感聖善言師西巖君克自砥礪勤心聖學暨其長也尊聞行知如不足日私居自持衣冠齊遫及出接物一誠以和郡無少長相謂不字咸稱先生學積其躬道行其家化及其鄉府臣歸髙薦名于朝敕教中山是府多士觀親輝光謦欬欲聞鼎鼎其來服縫掖者將半齊魯庭臣善其職事有聞用以職民主以城簿壓于為監為令與丞刑或過中必揆以義馴馴上説不使黥湼妄加疑盗廢棄永世仁譽既章宣司所臨若縣與州事有未竟必邀往治裁中情法守令憚之出將入迎若事大吏徴為國子博士以其平昔自律有先蚤作晏脩誨誘諄諄發䝉疏疑立懦克剛各因其才矯拂于善黨坐羣行齒而序之其極弗率有黜與朴成均作則井然有條即升監丞再丞太常世祖賓天成宗繼序圓丘請謚大室升祔凡厥禮文酌古損今皆所訂稽元貞之元拜監察御史京師地震上疏曰君失其道謫見於天其咎在内庭竊干外政小人顯厠君子名實混淆刑賞僣差陽為隂乘致静者動宜兢兢祗畏側身脩行及昔所為以盡弭之之道其説累數千百言反覆深切有司不敢以聞君則曰吾不得于言者遂委印去反闗其家著書自怡尋起為國子司業時已疾矣顧言其子治䘮無用二氏以其年乙未夏六月二十有五日卒年五十四𦵏府城東南崔丘里為文一本理義辭㫖暢逹不為險譎非有禆世教者不言有東庵類稿十五卷故江西亷訪使趙秉政板之行世矣又有易解洗心管見藏之家亦多乎哉其不年者世同哀之而文淵猶以不待經筵職絲綸謀廟堂為恨嗚呼夫既師成均官奉常厯臺諌而又有徳有言足矣奚必兼彼數者始為至耶夫人李氏貞順柔嘉婣里範焉後君八年卒子翊去尉東明自致終䘮亦足以君刑家之自今尉元氏兄羽有文行於世銘曰孰不曰士于學始志迄用有成千百一二允矣滕君敏脩篤行鐘鼓衡門益大其聲敕起布衣于定敦教祈祈縫掖來則來效再主禹城簿領勾稽不枉刑墨仁聞日躋满秩而召入為胄監由博而丞俊髦是範轉而奉常禮文斯綱或革而因酌捐用章遷拜御史為帝耳目言責塞求龍鱗逆觸一不見入納履而行反闗立言行後是程方徴司業年過知命遽啓手足理也莫竟短者已而其長斯存何以貞之石有誄言金故甄官署令魏府君墓碣燧還吳中過廣陵日今嘉議大夫行臺御史中丞初請曰吾祖靖肅公顧言以吾曾祖甄官署令即死所藏亂離失其處他日必虚為丘先塋者載其事無使吾先人魂遊徬徉無所于歸而一善故或遺也子義為銘隨又遣其少子可亨挐舟廣陵五千里追之襄陽不及返而及之鄂授其考所輯家塾記曰掇是事銘嗚呼確哉逺而勞焉廼本之曰魏氏由唐相知古子林刺朔州子孫居桑乾桑乾為今𢎞之順聖遼有延恕者生中奉夫夫守成中奉生通奉大夫餘慶通奉生登多爾館酒使子貞登多爾實生甄官署令君諱允元改徳元字信之甄官生進士特賜及第笏特賜生思亷即記家塾者思亷生初初生翰休脩撰必復可系者是九世其大于金由登多爾弟資徳大夫參知政事柱國郡鹿郡開國公子平相世宗致治隆平祖考中奉通奉再世官皆以公貴贈登多爾及子隴右令景元甄官與逸其偉一人再世官皆以公貴廕君始監順聖酒改𢎞洲酒使鄧州槯使抽税設防有方與宜平不增歛姦無走匿額有贏籌民不苛之入副堂厨庫又為使改文繡上林兩署今同知易州入令裁縫署改令甄官署以卒年六十三官止廣威將軍夫人髙氏七男笏珫瑜琦玠璠玉琦太中大夫刑部侍郎玠朝列大夫延安司獄璠翰林脩撰今益靖肅公與特賜皆以明經進士官珫懐逺大將軍耀州庫使瑜監豐利酒皆廕官玉進士未禄卒二女一歸同知荆州節度使事秦徳美一歸其鄉右孫姓氏君究心本富計田疇第舍牛馬雜樹直可為錢千者五萬嵗入粟為石者三萬嵗抽五十一為七子求師取友湏令節休旬大集衣冠令枚誦所業覈其進隋已則䧹序立前侍飲則脩聲輝耳目漸涵化淪其心由是成徳達才多萃其門章宗甚嬖李妃夫人視妃母王姑也數召通籍禁中不可復後秋獵易州君方降道橋諸水復召曰吾思與若晜弟語久矣終不能一致今行之所是在而夫子倅是便宜時也無終見避之深夫人以君出不敢専行俾子瑜諸之亦不可曰是家膏也親將汚人人有為不善者不憚取戻府縣惟憚君知兵興下令甚急敢有舍奴婢亡命不告者罪及其隣人猶利其傭輕私役之覺則殺以滅迹或致大獄君時鄉居聞有出入非常者召問得情嚴其錮防書致其主歸之約示薄威以懲其再無殘其生終不語其主以獲之誰舍所也比卒免家僮久故者民之作詩與新世訣沐浴冠衣揆日而逝君之孝友天得非學其使堂厨以鉅鹿公子叔元未仕曰大臣子故屯其膏澤不見及耶三求推所居官縣官以故事無有不可又恤其無子以靖肅後之靖肅又無子顧言後初則甄官子孫世世圖報鉅鹿者何如也其家塾自序曰由吾季曺鉅鹿輔政兹降脩仁潔義可謂曰久仕之達者列品而九不過中中天嗇為報將待夫後之人取最初之仕外僉提刑司事為副為使入為監察御史治書侍御史侍御史御史中丞三十年間風憲之官無不揚厯司清議者猶大有期曰將不已是于今嗚呼自序君其知子哉矧必復於靖肅公先世其官可大可久與亨學行嶷嶷可述銘曰反覆觀先民吁可哀積元報銜身期後來門令容駟馬堂三槐必責於天者如取懐惟中奉亦然詳用獄至鉅鹿再傳既鈞軸官不私其子甄官承承三遜其季叩莫譍又仁厥乏祀脩撰䋲官以祀比言祀則大以今脩撰孫後者再小宗既顛蕃大宗頼藏偶失故所魂依依招之從先墓來如歸膴膴桑乾原終天地碣孰華其文太史燧牧庵集卷二十六
