body:
  text: 牧庵集卷三十元姚燧撰傳太華真隠褚君傳雲臺真隠褚君㓜業儒長而遭時艱求所以託焉而逃者寄跡老子法中受學劉真常栖遲不在城邑多名山中保保之葛琅邪之七峰應之嶽神無常居焉洪後由真常主華陰之雲臺宫始從之西真常居焉徙上方焉弟子主雲臺雲臺華獄也為山益竒上方又天下之絶險自北望之石壁切雲霄峻峭正矗非恃鐵絙不得縁墜上下又不知鐵絙成于何代何人意者古能險之聖也將至其顛下臨壑谷深數里肓煙幕翳其中非神完氣勁鮮不視眩而魄震君負食上下自給如由室適奥嬉然不為艱薄寒則上下負食益勤為禦冬備一歳偶未集雪塞山門計廩纔得當冬之半始服氣氣减食為胎息逺則數日一炊明年山門開弟子徃哭求其尺見歩履話言衰衰他時方神其為非庸人同下山止之曰不可復有徃也已設向師食不繼僵死冰雪弟子雖有喙何説自白其能孝於天下必勿復徃也已君難逆其請指牛心谷曰此漢太尉楊公震授徒之槐市也或聞而稽疑其傳止得公常教授胡不見其居華隂者不識君何據曰然谷南直中方人行二里許深林竒石泉濺濺鳴其下墾地盈畆構室延袤不足尋丈環蒔佳花美箭人之來者始則愛其蕭爽不自知置身塵埃之外居不是晷既已欠伸弛然而思去矣君又屏弟子獨居或勸宜留一人自佐曰吾居此樂彼居此戚所安先不同猶彊而留之能施期月之外要終相棄去吾故與之為約非舂糧採薪不至絶而繼具而去亦古之君子以人望人不竭忠也其出山還雲䑓必以水冰無所仰飲十月為候二月還谷性嗜讀書逾熟左氏博議日食數龠飲酒未醺而止不盡醉也人家得名酒爭攜餉之至則沉罌泉中時依林坐石引瓢獨酌日入則入室而休或坐罷寢覺起行庭中一夕如聞林間行聲戞戛君則曰獸也雖不得其名可試而知引石投之曰麋鹿哉將驚而奔或止而不去者虎耳果止聼不去明旦視樊垣外虎跡縱横再夜起行如前夕不以自戒而止聞而談者神明之亦有他士樵人獵夫之適山初未聞君為熟何人責之具炊寢則假榻甚者易而詬之隨之益勤以安無難色忿言其外若職宜然者去或聞姓名惟他語不告終問之則曰吾求人知耶必求人知而求若知耶吾居此在人所不問而吾所不告也人見其苦人不近人情如是然不違俗上自王公而下及䑓皁争以一際顔色為快燧亦嘗再造廬焉告以人間聲利泛如秋風之過耳噤不酬應叩之山間為樂何如必盡舉平生所見好石幽樹佳泉危棧亹亹忘罷若幸夫人之一徃而我能先之者相送以出覺胸臆塵鄙如雪之見晛消釋無留餘者數目益信夫遊方之外有恬愉静退之士如君者罕類例求也君名志通字伯達名聞天聰俾禱有應不為沴賜號佑徳真人提㸃嶽祠灝靈宫又以嶽祠風雨將騫内出鈔萬八千繦為皃葺費三千易敝而新餙漶為翬過者改觀始知有應務之才特韜之耳年八十得益深聞益彰聖皇始見益急當嵗已夘至元十六年詔中使起之北面命命稽首草莽之臣通也自自知審矣疇昔壯也言不足以資廊廟擇力不足以彊禦侮今老先狗馬填壑晨夕至䝉冐龍光力疾以行行終不達恐傷陛下仁及草木之化是以昧死請中使竟虚車而返今李大參公號知君深且樂誦人善者戒燧傳之無俾不聞於今而冺於後焉公名徳輝字仲實前北京等路行中書省今以中奉大夫出相安西府云行狀中書左丞李忠宣公行狀公諱徳輝字仲實世居通之潞縣曾祖某祖金再世不仕考朴尚書吏部主事妣宗夫人三子長徳英徳芬季公吏部君生三十九年且卒指公謂宗夫人曰吾為吏治獄不任悍鷙刻削人䝉吾力脱罪罟齒平民者衆天或報施善人是兒其大吾門者勿憂貧且賤公方五歲哭之如成人家􅅻儲五升菽夫人舂蓬稗為糧芼藜莧為􅉁活之荒嵗既就外傅嗜讀書束於貧無以自資輟業十大監酒豐州禄食先足㫖甘有餘則市筆札録書夜誦不休夫人以過耽苦慮傷其孱薄也為滅燭止之已乃厭糟鞠歎曰志士顧安比也耶仕不足以匡君福民隠不足以歡親善身雨間之間人夀幾何烏可無或有聞死同腐草木也絶少年輩不游召其所親與率一時名公碩儒嵗丁未用故太傅劉文貞公秉忠薦徵至濳藩俾侍今皇太子講講薦故翰林侍讀學士竇黙故宣撫司參議智迂賢皆就徴癸丑先朝封用親割京兆𨽻潜藩擇庭臣可理賦者使調軍食實出公從宜㑛辟故真州總管髙逸民自佐時汪忠烈公始宿兵利州扼四州衿喉規進取數萬之師仰哺於公乃幕民入粟綿竹散幣集之或給鹽券使歸京兆受直陸輓興元水漕嘉陵一年而錢粟充棟於軍中宋臣介玠議棄平土即雲頂運山大獲得漢白帝釣魚青居苦竹築壘移成都蓬閬洋夔合順慶隆慶八府州治其上號為八柱不戰而自守矣蹙蜀之本實張於斯丁已深峻用事臣大集闗西河南諸臣入計局以中嘗為潜藩用者文致多方於公獨無絲髪得已未從南征至鄢留後行營庚申以為南京經畧使再月又以上北京宣慰使其年皇帝即位中統改元五月又以為燕京宣撫使燕多劇賊造私幣􅄂真行民間陰結死友相誓復仇怨殺人公悉捕誅之雖中書開府在燕令行禁止多不上白是是忤時相意以誣去位從北征還守北山諸關三年惡已相反誅以為山西宣慰使罪權勢之籍以為奴免而良者将千人至元改元罷宣慰使授公嘉議大夫太原路總管兼府尹至是潜藩故臣相無有出為二千石吏者上以太原難治故留居此㑹我先左丞公當分省􅁶調山西湖東世職守令即遣諭㫖公拜稽首曰陛下以臣堪一縣俾為令臣烏乎可擇况以千里寄治非材大懼任使不稱以傷陛下之明敢簿之耶自爾愈益勤勵崇學教以明人倫表孝節以善風俗逐姦贓以剔民賊裁婚𦵏俾師簡儉敦耕桑以富生理之出立社倉以虞水旱之歉一權度以絶斯詐之攘嚴鼓折以驚竒衺之覬凡可與民漸摩仁義者無所不張嘉禾瑞麥六出其境滿秩左部差功最天下右部考過惟草竊盗不獲一人五年㣲入為右三部尚書人有由訟財而失其兄子者公曰何疑焉叔殺之也深竟其獄公所信厚及權貴言可撼公者莫不績求保為衣冠之族無有是焉皆漫不為應懸己奉為賞購之其家人果止變告情狀呈露言者慙服叔竟以是病死我轉户部尚書事無大小必决之一日書判煩勞指為之蠒七年㑹上以皇旱為憂俾録山西河東囚行至懐仁民有魏氏發得木偶特告其妻挾左道厭勝謀殺已經數獄服詞皆具自以為不寃公燭其誣召鞠其妾榜掠一加服不移晷葢妬其女君謂獨陷以是罪可殺之也即直其妻而杖其夫之溺愛受欺當妾死罪觀者神之或咨賞泣下八年授中奉大夫參知北行尚書省事九年罷尚書省以故官參參知北京行行書省事京南徒水嵗泛溢至地下為患公築提竿去皇子安西王有土闗中之明年當十一年奏求公輔已以故官改安西王相至則視瀕涇營牧故地可得數千頃起廬舍疏溝澮其中假牛種田具賦予貧民二千家屯田最一歲入得粟麥石十萬芻槀束百萬公是來也貧不能從妻子留其京師事或上聞賜錢二千緡遣之明年詔以王相撫蜀其年重􅂟猶城守束西川各開樞府合兵數萬人圍之公至成都兩府爭遣使咨受受食方畧公危語動之曰宋今既亡重慶以巨擘之地不降何歸正以公輩利其剽殺不得有子女懼而來耳不然他曰兵未嘗戰及招討畢某偕中使奉璽書來赥最宜正言明告嚴備止攻以須其正反購得軍吏杖之為偽得罪懐之入降水陸之師雷鼓繼進實堅其不下也中使不喻詐計竟以不奉明詔反命如是者皆公輩玩㓂彊場心迹之著白者况復軍政不一相訾紛紛朝夕敗矣豈能必成功為哉兩府多致金帛子女為謝曰戎捷與人法令所不禁也公譲不受出未至秦瀘州畔而重慶圍果潰再退守瀘州十三年秋也明年詔以巴哈與公代為西川副樞公兼王相大軍即發公留成都供億食􅅻支半月賦粟繼之官船不足括商民船千艘日夜督運其年復濾州十五年重慶之圍再合踰月即下紹興南平䕫施思播諸山壁水栅隨之皆下而東樞府猶故將也懲前與西川相觀望致敗惡相屬願獨軍圍合州初公撫蜀徑東川歸以為重慶師閫受圍必徵諸屬州兵盡鋭拒守合州宜虚誠虚諜人持書曉之兵随其後亦制合一竒也即出合俘繋順􅂟獄者縱之使歸語州將張珏以天子威徳逺有宋室淪亡三宫皆北又頌聖量舍宏録功忘過能早自歸必取將相與夏吕北又為書反覆禮義禍福譬解其言以為均為臣也不親於其子孫合之為州不大于宋之天下子孫舉天下而歸我其臣顧偃然負阻窮山而曰吾忠於所事不亦甚惑乎昔也此州人不負於謀求去就者以國有主寕死不欲身被不義之君故爾得制其死命主今亡猶欲以是行之則戲下以盗賦遇君竊若首以徼福一旦不難也其說累數千百言又約書言為檄刋木於山浮板於江江珏未及報而公還王邸至是合遣李興張郃十二人詞事成都皆獲之當斬復為書從歸使喻其將王立其言如喻珏者而豈剴切興至立亦計夙與東府有深怨懼誅復興等導帥幹楊獬獲獵書間至成都降公從兵􅅻數百人赴之東府害之來争有言前嵗公為書招珏誠亦極矣竟不見寤無功而還今立珏牙校也習狙詐不信人特以計致公來使與吾争垂成之功延命晷刻耳未必定降定降公冐吾圍而來受何物視我必不汝進公曰前嵗合以重慶存故力可以同惡今孫孤絶窮而來歸亦其勢然吾非攘若功者誠懼汝憤其後服誣以嘗杭蹕先朝利其剽奪怢心於屠地也吾為國治此民豈計汝嫌怒為哉即單舸濟江薄城下呼立出降安集其民而罷罷置吏立徳之輿金玉餙少艾為謝公曰若以吾為是來耶吾無事乎此其特徃餽之東府合人自立而下家繪事之川蜀平復以王相還邸是年王薨公感其受知深而悼夫棄因之蚤也哭之幾不能生十七年詔公與南省參政程某即其地聼思幡湖南所訟鎮逺王平田㑹西南夷羅氏鬼國叛别詔雲南湖南四川合兵三萬人誅之前茅及境矣公曰蠻夷無親為俗吝貪始由邊將撫之失策積怨以叛好事之臣請加兵誅旁諸小夷洶懼相擅繼叛者必衆恐非直三萬人能歳月平也吾􅀈天子仁聖馳一介之使招之可坐俟其倈豈必煩兵不及以聞遣安珪止三道兵張孝思諭鬼國降其酋阿齊熱公名問曰是活合李公耶其人明信可恃即日受命身至播身降語且泣曰吾屬百萬人非公惠活寕鬭死不降事畢驛聞上為之開可改鬼國為順元路以其弟阿里為宣撫使其年王相府罷十一月二十一日始至黄平是夜也星如斗霣館垣外公弗善也歎曰他日嘗夢主烏江今播水適名烏江與是星皆吾死徵也夫吾嘗誦馬伏波老當益壯之言而竒曹武惠為將不殺得今活羅鬼馬革裹尸歸何憾二十七日卒後七日資政大夫中書左丞安西行中書省之命下蠻夷望轊車為位祭且哭者動百千人塗所􅀴男女空家咨嗟聚觀合之安撫使立衰􅀴卒吏民迎哭傾振山谷為發百人獲喪達興元上聞而悼之贈光禄大夫中書右丞諡忠宣公賜錢二千緡具𦵏先妃詞王遺前僉書王相府事博囉賻錢五百緡具奠明年僉播州安撫司事何彦杭章請即州治之柬為廟制曰可薨年六十二夫人胡氏前公卒今夫人某氏子一人嘉議大夫安西路總管兼府尹諸軍敖拉頍也女二人長適嘉議大夫禮部尚書劉秉恕幼在室嘗㮣公平居以先夫人剛嚴其弟宗亨有小過對衆奮杖撻之不少惜公若何而歡奉使未嘗有厲色遽言其亦能哉哉二兄既位不大耀於時每分吾有不至以寡乏見告其盡禮姊氏不以語人人知為姑若從母不以為兄弟也與人交誠易炳白不張城市機穽不面為許退與他人語以諄諄暴其人所長而韜其不及至䋲檢姦慝奮發忿急不能留怨過然亦不能留怨惡於胷中雖舊欲擠己入不測淵者事己輙忘之畧無校言復意自奉甚薄有積則施之不為子孫他日計西川副樞上嘗賜以玉帯錦衣錢二千五百緡止留其服物餘悉分之親戚賔客一日而盡人問之則曰曩吾家多責券縣官憐而賜償之無負矣吾貴而薄功又可富而厚享耶不思而兩有之神不福人幸以是人曰我貧吾利器也故自入官非素所徃來有相答報者未嘗恃刑勢取一錢直餽再為尚書權臣力能生殺人恥公共事累年足跡獨不及吾門以禄薄用奮為言願奉母錢百人交懽今取子自益郤之亦不為謝王相七年及事先王五年言必切切臣職子道請聞斯行以絶事嫌簡約侍衛以裁浮費無急土木殫匱民力者中外所厭誦凡人賢而有聞滿調將東歸必薦汲之王陞秩留之故關輔得士為多皆視為己職當然未嘗語人由我而然以期見徳遇事謹敏好謀善問多不自用及其未露生人之心愈切取信蠻夷問其諭招椎結荷旃竭蹷慕義三道之兵為之仰首思微利於萬里羞成功於一介霣星烏江馬革包柩斬木通道舁歸要荒抑嘗觀今中統以來將相臣死率於其天天下之情稱其平生所為功髙者惜徳大者思不過如是而極然未有若公逢掖死事為世所壯者也嗚呼賢哉又嘗觀古君臣莫難於合莫尤難于君盖合或可伺所欲以中而信則必不可襲取於一時自公始侍潜藩聖皇非遽貴之地亦嘗身接之面訓之指受之親以細㣲觀其敬忽置之糾紛試其理解讋以雷霆察其變常納之汙濁驗其潔白既久而後知遇也十後三十三年之中或使或牧或從或留或相或傳或候王或將凡賞勲勞擾者舊可以勸人臣者公皆與為之至商論臣羣能不於公不曰清則曰剛或曰則欺不見有貶於聖訓用未盡年未耄人猶未足其悲受任於已試知遇於既久可與疇咨海内者將不知誰在也嗚呼悲哉後三年頍彚進遺事求狀公行燧亦荷公知且久遊其門又與頍嘗同受學義不得以不文為讓姑為論次如此牧庵集卷三十
