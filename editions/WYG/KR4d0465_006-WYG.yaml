body:
  text: 牧庵集卷六元姚燧撰記聖元寕國路總管府興造記至元丙子宋亡詔列諸道憲司于江之南建行臺揚州以統之後由徙臺建康復徙江東之治建康道者于寕國居有其府徙府于南倅㕔二十有七年燧思士生文軌混同之時亦千載之曠遇江山之形勢風土之㣲惡民俗之澆淳必一求觀遂浮洞庭亂彭蠡而東極海門南折而至乎餘杭于之數者若盡得焉大率宮室園苑土木工麗者皆將相侍從私居而公署皆苟簡取足朝聽夕視而巳大徳辛丑余持憲節使江之東病其堂室門廡凌萃風雨凛乎其將壓也既一改為憲司且然則府于倅㕔者其牧皆取過目前以幸滿秩而去孰有為善後之謀一加繕完哉斯余所目擊者皇慶改元之冬故平章政事子陳侯杞來牧是邦􅊩芝之初因嘅歎曰杞受明命以守此土統屬縣六户二十萬地周千里可十古公侯之國坐視府署老弊不治則為誤㤙乃倡府僚捐俸為的厚直市取府北民居通㑹同塲以廣隘陋圖其樵樓儀門㕔以聼政堂以燕處㕔翼兩室右居府推左居幕府吏列兩廡架閣文鈔軍資庫房與夫庖廐各自為所集郡豪傑受其成俾分為之民用歡趨經始明年之春役不三時如圖告成位置之序輪奐之羙翦然一新大饗落之闔郡之氓稱咨嘖嘖服其神速又闢金光塞門經府前東直青陽門青陽之外雙溪夏秋暴漲泛入民舍南橋植柱中流載板其上朔望謁廟踰此千歩始至余畏湍悍舍馬徒過一府僚乗馬示勇板陷墜抱柱而死北橋之叠石為之水後齧去侯皆為舟為梁又新廟學百楹状其事遣屬吏江杓元盛天佑三千里走郢求記其興作嵗月将告來者因懸度之鈞大役也廟易而府難盖學校之設明詔每飭有司勉勵廟有學田供荘歩泊嵗入錢榖資廪師生猶有羡焉又且士籍不雜民版無有賦役凡厥修營責使佐力夫誰敢違府則不然雖牧欲舉有為其連署則監郡焉同知治中焉判與通焉下乃幕僚属史上下相司槯分而不専動必詢衆烏可一遺一或有言府無公須山虞澤衡皆有例禁財無所于取也民不可擅征而役也是非叢前利害相傾又有以事不巳出媢其成功歸羙他人隂計挽之以幸猶未敢率作上于風紀司風紀者亦非一人必先以不可安居合府諸官閫以改為者口陳于堂足及其家辯告往來懇切悃欵少或旬時不得要領伺其肯曰将審計而徐思之情有見從而始入牒侯其報可未􅅻及民民小人也未知學道夫豈易使于出貢賦佐天子邦經徵劍有期後則刑以随之猶有頑鷔不時入者矧出話言告之正所謂築室道謀者其怠忽前却又不可束之以威非禮致而誠格之使􅇶然有孚于中知義為如子之幹父蠱能是乎哉兊彖傳也説以使民民忘其勞其不信然若是之難其强志一力特立而獨行者事状覓有余以意求而知其勢必至理故然也繼侯至者無徒樂其成盍亦知所自哉侯雖殊其生平而先正則及識之于朝觀其子之能事又可得其教忠于趨庭云不可曉者宣在勝國升州為府及下取属縣寕國為名不嫌于重又金光則唐長安都城西門今猶仍不變焉不知何取取稱于此故俾及之千户所㕔壁記我元駐戎之兵皆錯居民間以故王夫百夫千夫之長無廨城邑者其有統齊徴發之政無丈移惟遣伻銜言至受命大帥或依髙丘曠野為律以行此近代之故事也克哷蘇卜實君長千夫洛陽鳴臯山下由祖暨身三世矣舊集其屬恒即佛宇神祠不然于其私居聖皇中統以來制度寖偹官始有品禄始有秩統齊徴發之政一信于書故軍得以歛是一軍之資買田為廨門以表堂堂以聴事廡以居吏儲身有庫閲射有亭數十年苟簡之弊一朝而新又思居乎此者必有所行警始不敢弛然而怠故書堂曰居敬亭曰觀徳由未識余千里走書于鄧以其友乃滿子先先求記其然余向聞其知學周公仲尼之道者為告之曰今夫人過祠廟必聳肅起敬如有精神魂魄在其上而立其傍者何哉由夫平居無事之時未嘗敬也使平居無事之時恒有上帝臨汝之心則兩間而神其尊且大孰有加于上帝雖日過祠百千而以與敬心一不待有所起而無不聳肅矣敬實人傳心之至言而學者尤狂入聖入基豈惟五典賴是而惇以及應事接物無有此而能中道者况軍旅之之事尤在敬能孔子所慎齋戰疾與夫敬事而懼者也敬乎敬乎其可斯須離而弗居乎或曰射于何而觀徳曰若知夫鑑也明足以燭鬚髪塵弁之久或歩仭而不見丘山此無他見不見之分乎惟兵亦然五兵之長莫長弓矢至不仁之器之王者用以威天下則足以芟暴亂而仁元元功成治定而無所試必世之間至老将宿兵日益耗亡膏粱紈袴之子制外閫焉無賴惰窳之人偹前驅焉不幸卒有狗伏之警使其曹出而禦之而能必其康靖乎古人見其人故嵗訓而時講之于鄊射盖東是不仁之器修之于俎豆之中雖有頑鷔弗率之人相漸以禮而相摩以樂不敢萌唘邪心知尊君親上而易使于一旦此先王維持世綱之宏綱大經也其法主賓有逆迎之拜耦繼有上中之比弓有横郤兼附弛張𢎞度矢有搢投順語拾取之儀行有鈎楹相左之章揖有當階及階當物及物當福及福取矢卒取矢之數衣有袒襲浹拾有説翺有舉偃籌有侯鈞而侯有去負司正有請誘作命之目燕享有獻酬酢旅之莭奠䚜有豐紏過有扑日出即事窮日而休必强志勉力之士能無衰堕以有終否者或取恥一庭也故曰可以觀徳行惟志乎復古者可以言此而君以國人不在禁挾弓矢之科宜于貫革尚武之射何待夫試閲始閑其技其名是亭欲納是身于禮樂以觀徳一方其有見于維持太平者在此而不在彼也於戯其知所務哉然天下萬事皆出吾心而有本有文居敬本也觀徳文也合堂與亭記之夫豈二道歟忠勤堂記皇上立極曽未踰月詔建儲宫位其下者院因裕廟之舊惟詹事肇置宮師府首以六傅統中允洗馬庶子文學舍人學率更司經合掾屬将百人由無廨舍惟㑹佛宇後以不足聳民具瞻下令發官帑為緍二十餘萬有竒市人私第為府君無㡬時病其事少而員冗也罷黜之六府之開府者聴于其家令舊隸詹事徙家者治是府令丞文者将侈其羙名堂忠勤李昭文溥光書扁楣間賜酒燕樂之下令俾集賢大學士姚燧為記燧曰大哉為名臣之居其職而職修授以事而事治為忠以盡其心勤以致其力耳然二者相須忠内也非盡其心則不能本以為勤勤外也非致具力則無以見諸行事而實其忠禹湯聖人禹臣與克勤于邦舜賢之湯臣夏為下克忠伊尹明之然非忠之至勤之極也不可曰克兩聖則然下兩聖者宜如何哉先民不曰賢希聖君之職臣未嘗不以賢官之職其官者亦未嘗不以賢自居不聖焉希烏可冀其克萬有一稽唐六典家令出入承軺車具禮儀先諸官以導祭祀賓客供酒食以為獻主今則増劇領隸民之民與捕獵鷹師綿户稻田自安西河南逺及國都抶登三品搃管者五府與典樂一司降一品者嘉醖一司又降一品者與膳典設典幄三署與供用一庫七品者兩都柴塲在他司則聴于朝而視于夕其㑹與歸猶有恒時是師則不然由供奉之近也出納之富也呼召之煩也需索之星火其急也故傅餐于畫更夜更置始不失其應焉且時有歸㓛酒食嵗上旬逺近味色變者徒勞生重焉啓止勿進亦可謂居職而修授事而治盡其心而致其力其于克也亦庶乎哉抑又間前事之不忘後事之師為今令丞夫既若是将必乆是必階而升後之來者或曹随蕭規則為無負于居斯堂苟或劣焉非獨見貶于月評必旦速戾于官箴矣且為記令六人庫克岱穆爾圖老哈特穆爾張君譲三閭薛處敬惟庫克岱官通奉君譲三閭正奉三人皆中奉丞二人科爾羅尉遲徳誠朝厯經厯完者都從仕都事法哈魯克都閻仕芳皆将仕其年至大三年其嵗上章閹茂其月餘月其日下弦乙酉云舊徳堂記初太師淮安忠武王戡炎趙于江南也詔濟衛士萬人為突騎以盛軍容而撓敵敕㳺江陵澧州之郊及南紀平即割二境萬家之民江陵纔十之二澧獨居八置府松滋不闗中書惟領宥宻嵗集其賦待以分賜衛士而毛君巨源實為搃管李君徳隆經厯宥宻大徳乙巳制以君子易地為之巨源既入而徳隆出或疑徳隆舍是要淮而甘為人制聴命于外㑹燧歸自西江相遭于鄂從而問焉則曰吾家自遼世居縉山距先塋木蘭山甚邇為堂吾鄉将時温凊奉晨夕于滕下大人以嘗主澧陽簿有田車渚顧慕忘歸今則不能留家弟守舍而來便養願名斯堂威夙志焉且示其先太保忠憫公祔葬與太師功徳二石幢記前記作于乾統壬午載太保諱傑以言斥死忠憫其追襲具未三茅官西京馬軍都虞侯銀青榮禄大夫檢校刑部尚書行左千牛衛大将軍開國男佺洺州刺史銀青榮禄大夫檢校左馳騎常侍隴西縣開國男儆散秩大夫守少府監知儒州軍事騎都尉赐金魚袋開國伯偓後紀則乾統丙戌不載太師何諱其文有曰自保寕統和迭承重任徽太師由食舊徳益部時為貴州營内觀察留後檢校司徒兼侍御史騎都尉開國伯惟易将部銀青自若也儒州則保信軍莭度使廬州觀察處置等使金紫光禄大夫檢校太傅御史中丞騎都尉開國侯嗚呼世有以金石刻辭為溢羙無刺或失其事實忽不知信曽未究孟子雖無武成之血流飄杵然亦不遺失二三䇿而取之則于金石豈不可以若是觀矧由以得何代何地何嵗何人何為者匪細故也稽之以史乾統海濱王之始元十年為天嘉又十年為保大五年遼亡保寕景宗之始元統和聖宗之始元推後記上之至保寕巳巳實百三十有六年可考而知太師暨孫三世四為公卿者非金石為賴耶則保寕而下奕葉垂芳珪衮蝉嫣失為何人者豈不益可慨也其曰桂曰洺曰廬皆中夏之州遼非其有必是取名因見其不㤀南噬者儒近幽州唐末所置然名之不可常者惟郡國而山川或終古有不變夫既曰居邇木蘭則縉山豈故治取可大感者其地當居庸交衝經遼金皇元三易代之兵子孫不去其郷尤曠今無有者古之人曰爾祖爾思以取法于人不若本其家之功也扁顔舊徳奚以尚之君復請記余曰君為憲山南按部歸也余叙其行矣作孔子廟于灃新虞帝廟于鼎也余竭其成既三矣其于顯親之孝勵學之力䋲愆之嚴恤民之隠禮神之處亦既言之不逺矣人又記兹人所謂獨私君善諛者君曰昔人有爱呉張旭書者虞得無後寕受健兹之名每于其判状僕其公言區區瀆求豈不一若是乎遂相視一筦而書遐觀堂記長安城西二途西北通威陽王公之開府于此與西南北三陲之使冠盖之去來樽俎之候餞者所出行旅之夥不列也西南入鄠抵山無所適貲乃今承餘則田夫樵婦與城居有墅于郊者所出斯固巳可為倦逰而休仕者所託盧矣二塗同出其逺近無㡬何而喧寂異然亦可見利勢之在與所無也鄠塗之北距城不數里則宣尉張公之别業規園其中築臺為堂崇衺尋大縱廣十轍清風之朝長日之夕四方勝槩極目千里凡秦漢隋唐之陵廟池籞由人力以廢興可弔而逰可登而覧者在所不取其髙上如華陽終南太白嵯峨吴嶽岐梁之竒峰絶獻為三輔之鎮窮日而有者皆環列乎軒户之外而卧對之几席之上余曰遐乎觀哉古人堂者多矣其壮有加于此乎使誠有耶雖風摧雨剥于千載之上亦宜畧存阤然之迹可存于今今則束板以載之負畚以興之以是知無因于前而獨始于公也今我與公属觴乎此夫豈苟然哉百年之身其有㡬何是及賞其成而不及憂其敗也及樂其完而不及悲其毁也後之時或風摧雨剥于千載之下有登吾弛然之迹者曰嘻斯何世何人之為公名不既夀矣乎公笑曰吾何期之何是之久哉苐擇君言與吾堂稱者即名曰遐觀盍記諸余曰公通介貴臣也請與之言臣可乎古之人惟見危受命者故得守莭仗義殺身成仁之名乎可見無死而死猶為徒使而傷勇然則出處之際死生之所闗死生之所闗善惡文攸歸者莫大于為人臣使不遇存亡危急之㑹亦未嘗不以明哲保身保身斯揆道歸義之臣所為也嘗聞之望諸君善作者不必善成善始者不必善終九原作之将無謂秦無人也今之仕者吾不知孰為道義之臣能志功名者亦鮮矣志富貴私身以毒世卒離尤而蹈禍者駢首接踵也是于計功謀利之間且有不能况揆道歸義乎哉究公平生嘗吏民矣又嘗治兵矣亦嘗持憲矣忠炳日星而難不辭于湯火氣呑湖海而信不移于丘山視竹帛之書鼎鍾之勒恒有晚古人薄前世不足為之心以故在宇之百辟山東數州秦俗九路之氓瀘巂荷㫋方三千里之獠孰不聞其名而竒其才沐其愛而怛其威年五十二竟以許國盡瘁而歸鼓舞僮奴干指而食其力甘自儕于匹夫讀書以教子飲酒以樂賓将終其身非熟爛世故遐觀一代之表者能是乎哉盖天下之事遐觀則先識先識則㡬矣雉兎之不能搏人誰不知之突起道左或失色辟易而䘮其常守以其卒然遇之也使前見于數百歩之外雖曰雉兎雖虎兕之暴人得以為偹将不患矣斯不亦吾堂言外之微意乎未易以語他人将惟公可公名庭瑞字天表至元癸未以太中大夫諸蠻夷部宣尉使致仕云又四年丁亥六月下澣日記清風堂記榮禄大夫湖廣行中書省平章政事劉公齊人也由左右丞與副樞與今平章皆在于鄂視齊固為寓舍鄂其家焉肇基斯堂深廣崇庳題莭繪飾勢與省夷嗚呼位不極臣而為斯則妄功不蓋代而居斯則僭有位以功人則宜之求扁于太史公牛馬走為賦尹吉甫頌仲山甫蒸民之卒章穆如清風者書曰清風世喜曰今之人或不如于古使誠不如古人引與之匹固知所譏誠如古人則引者非諛而匹者亦奚憾而多為辭譲今枚觀公其式是百辟者仲山甫也好是懿徳小小翼翼者亦山甫也不侮鱞寘不畏强禦既明且哲以保其身者亦山甫也然是所同若夫補衮職闕于内出納王命而又為之喉舌以賦政于外與四壯八鸞出祖而徂齊者則公無也援桅鼓以先三軍北戍于龍庭西踐于庸髣而南鋤乎交之兩江百戰餘軀鋒職所創發作無莭與令制地廣隕數千里敷施天子徳澤使海宇蒼生無怨􅀈于飢寒悉獲我所者復仲山甫所無也若是究思孰大而多孰細而孰賢豈不易判乎哉然是堂也雖于公獨居非是清風蓬蓬然户至于南荒吹滌瘴癘使民之不罹薦瘥視徒穆如為賜如何也或曰子賦尹吉甫誦仲山甫者誦公其以尹吉甫自况歟走則曰尹吉甫之賢走何跂及然以後妻掇蜂之􅅻逐伯竒而使履霜中野世今懲之九原可作或聞斯言當一筦也大徳辰在庚子二月初吉董氏立本堂記立者顛之反也本者末之負也天下無無本之物亦無不大之本其觀植于乎下鐓則立刄刄則顛鐓大而刄小大為之本而小其末也語學則不然大顧其本而小為之本故天下本國國本家而家本身至于身則居億兆人之一若是小矣要其歸也乃為天下安危治亂之闗則身非獨本一家實為本于天下故曰小者本之故者末之然立本有道而非他立吾身焉耳矣孔子語孝子之終莭苐立身于事親事君之後則立身者惟忠孝之家為克對而無著聞今評董氏者曰世将如漢綘侯世相如韋賢家法則石奮以故十七年故商大参公為今中書左承公時以翊衛指揮使書先正平章忠獻公碑因扁堂曰立本嗚呼非知道者孰能名斯堂非篤道者孰可居斯堂哉後十餘年上以江浙省臣處非其據詔公來換之燧以士生皇輿一軌之時誠千載之曠遇浮逰江海求觀南紀禹跡疆理之槩相遭東呉見其圗畵之叙措注之宜潔白之守任負之力有非喬木故家漸涵庭訓上結主知者不能詩曰雖無老成人尚有典刑孫叔子劣甚叔敖楚王思其先烈猶封之况託忠獻遺體式榖似之者宜聖皇擢䋲父武爰立作相也暇則相語曰昔者商公特書扁耳時未堂也去矣始落矣其諸逐思藁公鄊堂此以告苗胄可以今是堂吴忠獻以大参左相兩嘗開府既薧公季父今承㫖公又大参乎扵去位而公繼至一門再世之間三相而四開府矣豈國家惓惓忠獻徇地是邦撫綏有勞非弟若子不命出鎮不足以繫其民情然歟又益思夫董氏之大立本忠獻忠獻之相立本東吴公不可不原為堂于此也仁智堂記金溪危侯季梁舊家于邑闤闠之南湫焉得聞壌距其居百歩前有溪溪上有池而魚有園可花竹且宅于山水之要有曰翠雲嶺者有曰卓筆峯者有曰僊山者嶒􅗆崷崒竒踴秀躍則山之峙乎前者也有自翠雲闗而發者有自石眼泉而溢者有自白靣摀合流而來者逶迤委折自逺凑近則水之滙于前者也危侯自紏廬陵歸始得以其俸之贏築堂以為讀書之地左竹右木嚮池偭溪春則芳色蘢葱練光繚繞夏則濃陰四合陂澤如秋利則水瘐潦净月焉而益清冬則水落石出雪焉而愈絶殆人間希有之境也堂以仁智名雖取選詩卜此仁智居之語而究其本殆則亦自孔聖知者樂水仁者樂山之訓發之夫動而無窮者水也智之達于事理周流無滯者實似之静而有常者山也仁之安于義理厚重不遷者實似之夫智者豈必不山之樂仁者豈必不水之樂哉本無所輕重其生質則有近于仁者有近人所同有本無所輕重然其生質則有近于仁者有近于智者故其成也氣象似分焉如夫子則元氣不可名也顔子則可以仁言矣孟子則可以知言仁矣雖然仁者必智智者必仁不仁不足以為智不智不足以為仁非智者不必有仁仁者不必有智也苟扃于一不得謂兼體用矣紫陽夫子作精舍于武夷其堂亦名仁智其詩曰雖無仁智心偶自愛山水蒼崖無古今碧澗日千里夫無古今者體也日千里者用也危侯其亦有得于此乎性之仁其情之發為惻隠性之智其情之發為是非充之則達徳也危侯尹髙安其治盗議獄緩刑或以不快人意譏之侯曰吾非不能㫁撃特非辜而誤則不可耳此心也其是非之正惻隠之真乎充乎此言則智仁之達徳㡬矣顔之仁孟之智可希矣紫陽之仁智堂講道之堂也危侯之仁智堂亦讀書之所也必有得乎此矣故記之牧庵集卷六
