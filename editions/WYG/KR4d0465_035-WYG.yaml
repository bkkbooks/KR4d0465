  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0465_WYG_035-1a, image: WYG1201/WYG1201-0761a.png}
body:
  text: 牧庵集卷三十五元姚燧撰詩餘浣溪沙舟中紀事白髪年來自笑余孔方從有絶交書誰憐多病麴生疎兩岸行人争抵掌誰家舟上載籃輿江南休問看山無菩薩蠻皇慶癸丑春賞花詞兩間日月同悠乆算來無比東君夀一嵗一歸來光風吹九垓花枝依舊好只自傷埀老七十六年人見花能幾春中秋雨素娥會把詩人調衰顔不直圓蟾照特地變雲陰江城三日霖今宵佳節過天上氷輪破纔却放餘輝要看清興違清平樂失題二首水色裝束風致清逾淑春竟枝頭添蕚緑要與梅花仲叔生紅從此羞顔甘同桃李漫山不是𠖇鴻過盡情教銜子荆蠻菲菲香雪更照溶溶月管被司花嫌太潔故遣啼鵑濺血方舒笑臉迎丹雨聲深院珊珊有底春愁未訴向人紅淚䦨干聞鴈春方北度又送秋南去萬里長空風雨路誰汝𠖇鴻知處朝朝舊所窺魚由渠水宿林居為問江湖苦樂汝於白鷺何如大徳改元之明年辰在戊戌春三月十有一日宣慰􅅢堂邀飲怪坐客無吾肖齋或云逃生朝矣即席賦清平樂以夀之南陽昔嵗此日懸弧記不料長沙今欵避紅袖青軒負醉横檻直楯西東飄殘萬紫千紅不是荼䕷噴雪争些閒殺春風浪淘沙為柴氏題河水發崑崙浩浩泉源餘波九里潤猶存若問是誰家胄出顯徳諸孫今日在清門玉季金昆能時夏凊與冬温直待鑾坡褒一字華衮休論競渡楚俗至今朝服艾盈腰喧江饒鼓節蘭橈士女踏歌巫覡舞魚腹魂招去古既云遥讒毁言削修名立與日昭昭免向重華敷衽跪來直蘭􅆏余年十七洪山僧相過言别公十餘年面頰紅潤益加於昔有道然耶因為一莞賦此曉之七十鬢雙蓬已分衰翁煩君休譽面如童只此正為吾老騐物理曽窮天地一微躬草木還同桃花初也笑春風及到離披將謝去顔色逾紅大徳丙午端月十四日立春巧連燈夕求西野澹齋月澗同賦春燕玉釵騰又試初燈天公節序巧相同纎手青絲盤出看寶燄騰層鞭絶土牛繩已送嚴凝牙旗鐵馬向春冰六十九年余治學老病宵興送貢應奉仲章歸覲宣城明月萬家砧蟋蟀哀音何人不起故園心一語最難留斷袖説覲雲林回首玉堂深誰悖綸音都門無酒與君斟只賦新招當贈别如玉如金贈重陽奴初度菊花秋霜水㾗收可知不離是荆州元就龍山風力軟破㡌颼颼今夕定開舟漲水磯頭淵明觧印去來休夢遶橘齋新草濶檀板輕謳鷓鴣天遐觀堂暮飲誰進䕫龍不致君白頭離亂不曽聞三秦碧樹生春色千里青山入暮雲何事業底功勲百年五十已中分從今萬八千塲醉莫酹劉伶荷鍤墳虞美人牧庵即事為李元素作竹風吹落疎疎雨紈扇收殘暑小軒驀地細香來莫是鄰家早有木犀開玉環穿耳誰家女自獻歌金縷新聲和徹紫檀槽袖出烏絲纔説要揮毫玉梳贈内子相輝瑜珥瑶􅁫鳳寶翼蜻蛉動新妝又得水蒼梳人道秋風何物不瓊琚人無玉質容何害玉徳斯堪愛尚慙猶未十分全聴取明年環佩戛璆然减字木蘭花劉子善得常徳夀梅圖持歸鎮江夀其父梅軒夀梅紙本傳常武逺夀梅軒歸北固愛梅無有似君貪東極吳中西盡楚黄昏清淺孤山路能對春風旬日許不如歸去畫中看冷蘂疎枝常照户南鄉子遊洪山寺良月大洪山楓葉青青柏葉殷一樹桃花修竹裏天慳連見春風一嵗間争挽揷雲鬟日暮金鞍未擬還偏與歌姝相映照朱顔應笑詩人兩鬢斑次馮雪崖韻二首荆憲品皆加纔罷還除世共華恨殺峴山山下路梅花誰醉雙瓶玉照沙涂水聴宣麻行脚陽春起未涯君去莫嗟風土異堪誇君祖鄉鄰我祖家日覺鬢霜加欲對青罇戀物華離别紛紛長眩眼生花易㪚難摶掌上沙蓬意不依麻未必移居漢水涯前日曽與遺集序張誇素範清風有㡬家小重山㽔女歸寧還襄陽江渚蒹葭白露稀雲間渾未有蚤鴻鴻人情離在别庭闈㩗諸幼孤艇溯流歸七十古來稀乃翁筋力尚未衰微峴山不是逺相違猶能往清涙莫沾衣風雨折枝詞早是清明應候風勢如滄海浪怒號空更兼潑火雨𠖇濛如何得枝上載殘紅最惜牡丹叢曉來吹盡折教兒童且為支拄曲欄中還堪否留客一樽同定風波南州以菌生竹間為覃并樹雞瘦薄而赭雖日乾猶可煮魚此筆竹絲為之蕈葢得竹餘氣而生然以世多未見故祥之余以理推如此唐古憲僉筆生菌繪為圖因有是作五馬雙旌出郡堂歸來椽筆對凝香只為好書天作意相戯故生三秀在毫鋩不是畫師生手觸拳曲層雲連葉㡬何長我有一占君試記何事已開他日判花祥題軸軒左右埋二石檻植荷其中旋汲清泉石斛方便疑身已置江鄉八江呑胸雲夢小應笑白頭兒嬉未曽㤀荷葉且看張翠葢此外芙蓉誰望集朱裳還有不如人意處遮去碧天明月照泱泱洞仙歌石山伊誰斧鑿此玲瓏巖岫至巧先天化工手又不知何地夜壑深藏今留待白髪詩人攜定向宣和廢苑睥睨髙株欲轉愁回萬牛首期出處與君偕立則參前卷宻可收之襟袖尚未敢云能此私從怕雷雨𠖇𠖇六丁來取對梅疎枝冷橤臘前時初破年後纔多玉妃墮問梅軒白髪寂對空株期三百六十誰同幽坐孔方兄善幻半副溪藤貎出緇塵素衣涴當盛暑展圖看遽失炎蒸甚欲摘傾筐三箇又却被旁人勸休休怕他日鹽羮鳳毛無和江梅引謝王子勉提刑送江梅二首西湖不近上林隈問江梅定誰栽莫是𠖇鴻銜子逺飛來紫陌遊人多不識但驚看青天霽一齊開獨有使君憐寂寞為持盃能㡬回玉纎横管東風外落日樓䑓不悵明朝飛雪滿蒼苔恨殺南溪調鼎手恐遲暮到而今霜鬢摧年年江上見寒梅㡬枝開暗香來疑是月宫仙子下瑶臺冷艶一枝持入手斷魂逺相思切寄與誰怨極恨極嗅玉蘂念此情家萬里暮霞㪚綺楚天外㡬片輕飛為我多愁特地㸃征衣我又飄零君又老正心碎那堪聞塞管吹牧庵集卷三十五
