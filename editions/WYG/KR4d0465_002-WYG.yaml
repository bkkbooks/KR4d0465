body:
  text: 牧庵集卷二元姚燧撰詔制楊爾昌贈夀國安惠公制人之祖其木之本培植既深曽之孫如榦之柯㪚分斯茂比切雲霄于千尺豈濡兩露之一朝具官某生際時艱役編氓籍雖迹沉浮于里社而名表襮于鄉閭徳邁乃身盡力菑畬其地澤流爾後聨芳侍從之臣矧侍前皇有聞今日茍不上推其所自爰進丞疑何以下詔夫將來用光㝠漠可妻富察氏贈夀國夫人制姆名門於遼右醮華望之𢎞農言必女箴動循婦道篤生奕奕之令子實為洸洸之武夫觀其臨陳以捐軀于時蹈難可知卜鄰之提耳平昔教忠矧曽孫以宫臣為儲貳之傅友上推徳澤皆發慶源於􅃧朕之贈右揆而勲䕶軍疏恩已極爾于榖異室而死同穴受祉不那告第以兹制綸欽若楊徳崇贈夀國康懿公制羇于人而合于天徴書惟信非其身而在其子從古已然源不浚則流豈長弓必勁而矢方剽取譬若近為理則同具官某自葉流根去華務實以名聞于裕廟遂驛致為邸臣不大其施以昌爾後膳祠主客郎官所職之殷繁嘉吉軍賔閣老相資而損益生而有光于門户死者何憾于泉扃位亞師垣展矣三司之列寵加公衮巋然九命之尊伊爾明靈尚膺茂渥可妻陳氏贈夀國夫人制以育姜敬仲之遺苗歸有周揚侯之餘裔合姓皆神明之後生子宜禮度之閑進長儀曹近清光之尤切動咨閣老率舊章而不忘因觀從槖之能然皆出斷機之所自秩上公以九命既疏大國之封開夀域于八荒宜正小君之號用資告第貞魄是承可王守道贈夀國忠惠公制臣之邁徳固將流慶于後昆王者念功必使被澤其先世肆即下地爰進大封具官王顯之父守道生值時艱出膺人傑屬金源之南播屹恒鎮而中居彼猶冀死灰之然而潛出代交之䇿誘同官以所部曲殱都師不遺稚孩佐太尉之孤軍奮雪讐恥復連城以千里盡返故常鴻集之氓遂其奠居梟悍之卒戢不為暴用輕典以刑新國克逺省以任舊人損户簿征折劵恤匱故飲惠者相率而尸祝其聞風者或形之詠歌非獨專乎軍諮兼亦正夫侯度帝曰嘉止璽書爛雲漢之章民曰異諸金節等河山之誓於􅃧功豈一書而足爵宜九命之加矧有子嘗任其股肱尤可厚飾終之典雖若汝不復于骨肉必猶多用物之精其克欽承尚永無斁可妻封夀國夫人制凡曰有官之君子克慎其終亦惟主饋之家人能勉以正典既所天之加恤義無同穴之見遺某官某之妻姆張懿徽婦主貞順令閨門之不出奠宗牖之必親齊國賢妃纔警雞鳴于昧旦魯侯夀母未聞燕喜于期頥合斯異代以觀有不同年而語飬以辨章之廩禄何報春暉服其裕聖之笥衣足華嵗晏居勤纂組而無逸動釋几杖而不隨受祉之那比隆安有亦黄髪之良異者而素心之所慕焉於􅃧開予夀域于八荒毓封先汝進夫上公以九命濟美後人可耶律祭酒考贈淶水郡莊慎公制臣克厥艱而始明敏其徳子焉能仕皆由父教之忠眷予問義之人師實漢僕射之位長固求還笏難斷抗章是用追崇其先庻以垂裕乃後具官某中書猶子丞相從兄宗承遼室之遺苗禰祀金源而全節尚論其世孰踰爾家而又誨嗣續善詩禮之敦于以見平生戛紈袴之習自夫共工之謝晏然同俗之安爭饋肆乎五漿振衣岡於千仞奉先惟孝雖耆耋于禴祀也親焉接下以恭其臧獲之乆故者民耳匪直八官而知止抑展在家而必聞惜棄世于九齡負為國之三老於􅃧神遊安徃定徘徊乎故鄉衮寵即封用昭章于疑墓嘉誄以副殊渥罔遺可王思亷之祖沂贈恒山郡莊惠侯制商容殷臣周武過閭而必式亷頗趙將漢文制敵而尚思至公因見夫古人褒善不嫌于異代某官某之祖沂言出無擇量深有容當天歩未改玉之時明刑書為亡金之用立人由己飾吏以儒始知法以佐州尋假令而為縣以不揚威子長吏斯免濫罰于平民不惡而嚴雖文無害伍符尺籍事専司六部之間駟焉高門報顧在百年之後有孫四紀及相兩朝晚年嘗作客夫青宫時竟遂明農於緑野遺榮若此埀裕尚多於􅃧父為士而子大夫爾知守死生于𦵏祭考贈公而祖侯服朕誕敷隆殺之等威尚其光靈歆此明命可祖妣贈恒山郡夫人制求世徳于上古神明後者莫先于帝高陽屈原云然亦豈顧後之人哉惟自是屈節雖不可譜其次傳則汝為其遺苗從可知也然自佩繽紛于繁飾及夫曰黄昏以為期思公子于芷蘭不言而喻貽下女以杜若無忌可知溯厥芳聞宜兹象服於戯教爾孫導其先路既竭其力以事君恐王毋懷乎故都俾從夫爵而啟宇降斯寵命賁彼幽扃可贈焦徳裕考制我國家禮御羣臣凡有位躋乎將相恩推上世必皆宇啟于公侯匪專勸忠用以光孝具官某之考某生當立武之日負其先衆之才既長千夫將經百戰毎獲俘而不殺其乆奴而必民化盜賊而為善良振餓羸使遂生活方亂離之靡定而仁惠之兼施自他人若是之有為而平日皆在所可紀由為子之束于貧賤故世徳不能以昭明則爾後之熾昌亦式榖之教誨夫既一門各盡其道可于九原不顯其光可焦徳裕贈恒國忠肅公制事睿太憲以及世祖可謂圖任之舊人官趙蜀源而盡東甌亦既敉寧于新國于勞庸之是迹何甄録之可遺爰啟大封用昭幽壌具官某忠壯而信厚剛毅而純明皆得自天且資以學當王略經綸之際適金源逋播之秋覆巢太行遂武仙之首惡引翼開府雪史帥之血仇從後蹕董漕于川中尋持憲省風于隴右行役之逺聲名益延及太師之濟江乏才臣之謀閫自家而起乗傳以從既同輻裂之􅁤文又翦彚興之莨莠為勩之夥枚舉豈殫方分省政之參俄有邦光之殄於􅃧永辭白日佳城鬱三千年不及清風黄閣留一萬古可納喇追封蜀國忠武公制朕聞率土之臣莫如同姓干城之將尤可異恩故逺稽于禮經用厚加乎愍册具官某其在弱冠嘗為選鋒迅與鷹揚號為萬人之敵虓如虎視隱然千里之威屬鉅冦之反郊乏總戎之制閫來可居此孰有異然其為人心所歸不待君命之至推使秉鉞辭拒循墻即下令于轅門已折衝于樽爼握機旗建四川之草木知名開壁鼓行三峽之星河動影勇頗牧之非匹䇿孫呉之可方八阽危則膺衆所不先分賜予則如士之最下勁騎所蹙堅城毎摧如斯宣力于兩朝何止出竒于百戰於􅃧降年弗永為烈則多雖狀不及識之亦心未嘗忘者置户以守何樵牧可侵馬鬛之􅇕故壘即封或魂魄猶思蠶叢之國可伊蘇徳勒贈蜀國武㐮公制遣戍以歌采薇命于天子者為將三世故國非謂喬木名曰世臣者即戎百年生而他人孰可方之没則斯朕所甚愍者具官某川涵而岳負玉裕而金相受鉞于成童之年交綏于大敵之陣觀其進退以坐作得於生長之見聞勇必冠軍功則推衆非有是為將之體其何以服人之心雖﨑嶇殘蜀之餘乆纔五稔顧敉寧平宋之後艱已百罹置郡縣于夷蠻斥邉疆于甘肅或分使節或秉政鈞自陜右而雲南躐辨章而丞相勲亦懋矣年則未焉何期立極之新而失圖任之舊於􅃧乃祖乃父既不異乎錦里之封爾子爾孫亦可同是蜜章為刻光靈如在明命用歆可張𢎞略贈蔡國忠毅公制保塞承勲孰曰將門之無種陵川受學兵推師道之有傳既不墜其冶弓而復敦以詩禮方資用世奄鬱佳城中奉大夫河南江北等處行中書省參知政事張𢎞略易武以文克忠由孝在憲廟已頒其虎瑞故世皇洊致之龍光㑹盜發於東秦加兵助乎南紀援徐方之傳檄夙料如成當炎夏以交綏宵奔已墮歸守衞士兼長儀司賜金釦之巵被錦粲之服以中奉秉宣麾於淮浦仍前授移使節於洪都大憝既殱餘孽何頼超參南省之機政隨開北首而棺懸雖未陳夫襚衣猶及贈其褒衮於􅃧乃公既邦之蔡無庸改封其家有廟於燕可從與享精爽不昧明命用歆可秦國忠翊之弟巴克實巴追封古哩郡㳟懿公制繄朕聞汝惟昔在軍謂人集菀而已集枯羨鳥烏之暇豫何寸有長而尺有短投龜䇿之卜居道理之安死生奚計某剛毅而明敏貞信而沈幾逃自叛王棄其盡室義定君王之分石可轉而心靡移恩輕妻子之私裾雖牽而首不肯遄其歸以萬里始克覲于九重帝曰嘉哉世所難者故其賚賜之物俄然充牣其庭或為廷士于中或將邉兵于外居無常所至則有功月旦之評士咸髙其一節春秋之筆史無待于他書不有褒章何發潛徳於􅃧恩如爾家之奕葉能令名者幾人封依兄國于拂林兼位崇以二品靈而有識生氣凜然可楊福贈夀國武莊公制所遺乎死丈夫横尸于戰場其凜若生太史納書于幽隧人臣斯得天寵何加具官某方初入官于逺行役第知爭先而賈勇何有反顧而蓄疑將工礮之萬夫壯軍威于千里志恢王畧恨衣帯不甘南紀之存魄毅國殤殉枹鼓以示北方之矯與馬革包棺以奚異詎蜜章納壌之未聞展也興哀為之賜諡爰加美號忠期昭白于廣庭式慰明靈制許焚黄于神道可馬實贈扶風郡莊惠侯制惟仁者為能愛人雖甚急賢才之得觀逺臣以其所主始可精淑慝之分故世皇大公其心致多士善用此道具官某栖身巖穴屏跡市朝既力穡資其讀書復懸榻慎于取友用先正魏公之薦得温室省樹之觀問惟對以國言事見可于天聴賚衣在笥進秩題輿萬里之塗牽車共期到逺九仭之山止簣不願為髙竟自遂以終身敢維憎兹多口傳家有子應宿為郎治膳司主客之殷繁酌嘉吉軍賔而損益諸有疑貳皆資老成於􅃧克對無羞皆汝教忠之自或靈有識欽予追恤之褒可䝉克特穆爾祖考伊蘓追封秦國康惠公制朕禮遇臣下將責其報上而効忠故先之惟親而立愛人曰予知不力善烏得夫令名祖以孫尊必既貴乃推以哀典尚書左丞䝉克特穆爾之祖考伊蘇繄我髙后于爾先人聞為世之所賢奏遣伻而將致由渠既耄辭不能徃以汝克肖代之而行非家學有自而來不父譽如是之力春秋方富初供奉乎東朝夙夜惟勤載徒征于西域託椒房之親以為傅父居畫室之館以鞠帝姬雖一話而一言可三薰而三沐即其時皆書之册視他日取用為模至今天府所藏尚存擇古地官爰加以贈於􅃧子兆民以敷五典生不及邦教之是司公九命而勲上階没其與子封而為亞英靈不爽幽賁其承可祖妣克哷氏和斯納蘇贈秦國夫人制婦人能動循禮度既宜室而且宜家王者之加鍚號封不從夫則必從子存亡奚間古今所同贈光禄大夫大司徒上柱國秦國惠康公之妻尚書左丞䝉克特穆爾之祖妣克哷氏和斯納蘇貞静而幽閒柔明而茂淑徳實在已貴不以夫由嬪椒房娶妻必食于河鯉爰從戎輅大人未造而淵龍由託子其王姫是用尊為傅毋盛哉車服之出入蔚為門户之光華生子則賢既間闗功成于萬里有孫而相亦崇髙位至于三公何爾身不及見之斯朕心所尤惜者於􅃧髙后之明並日月生及依其末光夫人之行如山河没可忘其幽賁大秦啟宇貞魄用歆可考崇福使阿實克岱追封秦國忠翊公制贈以褒忠凡善無㣲而不録名取副實夫言有大而非夸惟逺藩之舊人及承事乎列聖匪封大國安賁下泉某考昔在憲宗未登宸極初因太子同生于其地故即在軍鈞鍚以是名嘉與帝姫共其傅毋臣求愛遇于當世人誰過諸女采撫鞠於内庭妻亦賜者逮六飛之廵蜀乗世傳而超燕世祖異觀宗臣不劣所欲則與之聚為猷而必其成屬叛王阻兵于北荒致懿親絶使于西海責從間途以徃奚翅乎十萬里之遥竟懷重寳而歸已忽焉四三年之久最其勞勩無與比倫報宜其身顧後者天命田出舌在今其子補豈專乎衮闕用方頼其錢流設爾無是之雋功亦朕不遺其哀典位崇太傅何及鍾繇虎賁之共舁宇啟大秦足表造父馬迹之不至英靈不爽茂渥其承可李道復曽祖考執贈韓國公制於傳有言至誠之道可以前知在易亦曰積善之家必有餘慶何天道之應若質劑而取償而人事之脩如菑畬而望穫具官某之曽祖考某尚論其世孰踰其家自後唐僅十五傳至今代實四百載秋闈戰藝嘗從退鷁以俱飛晚節考槃遂卷屠龍而弗試猶不失一鄉之善士矧其資上黨之素侯源濬也則其流長城髙者由夫基厚冝爾來裔為我藎臣一乃心之是期百其身以奚恤與同休戚嘗憂杞國之天不大聲色再抱咸池之日将以圖報惟有疏榮故于三代之相承皆以上公而為贈於􅃧汝為其曽王父雖不及股肱于廟朝朕命以子大夫尚或可肉骨于泉壌光靈不泯恩綍用歆可曽祖妣郭氏贈韓國夫人制内言不出于梱雖無事之可書大孝能顯其親凡有功而必報此古聖人勵忠之意亦士大夫反本之心某官某之曽祖母秉徳淵純移天令淑正位乎内利家人在饋之貞以禮自防見君子采薇之説遂衍曽孫之慶用疏列土之封精爽有知欽承惟永可考贈韓國忠獻公制九仭為山覆簣其址百川學海濫觴是源因於已然而即觀莫不積始而至厚某官某之考某淵深而智山静而仁當勝衣弱冠之年奮前驅執殳之役以從王事為馮忠靖周旋者勤不告勞能審敵情效余華明成敗者算無遺䇿後移漕幕與府佐所至事治而言行在乎他人自足為賢而推爾能猶未言善屬裕皇妙擇乎師友俾子孟入侍于皇孫凡太后之所如必耄年而不後輿疾河内道卒冀方其盡瘁以事為如何于無徳不報之有待遭成廟違棄其萬國與先帝臨御于四年洪濟于艱嘉猷是頼兩扶青天之紅日一新黄閣之清風能蹈難而不辭實教忠之所自於戯觀子可知其父乃古人不同時而云然事君能致其身則今朕與偕行而見者生負為明堂之八柱没冝享清廟之六瑚爰啟茅封式光蓬顆可母王氏贈韓國夫人制婦人能循禮度既冝室而冝家王者之加號封不從夫則從子死生莫間今古所同某官某之母温㳟而懿徽柔惠而貞順觀其儀之不􅑯冝爾子之曰賢㑹姦宄何鼎湖之格天潛圖内難頼忠良辨虞淵之取日尋復重光如斯借筯之籌皆出斷機之教延登伊始追鍚維新爰循從爵之封庸示歸魚之寵尚斯冥漠少慰靈明可妻贈韓國夫人制國家以名器之公盍深求于崇報夫婦乃人倫之本冝並著于顯榮爰考典章用敷寵數某官某之妻賦柔嘉之性凝婉静之姿姆于名門素守女箴之訓婦此良士峻居儲傳之嚴所期夙夜之相成不謂死生之有間慨駒隂之不待失同依日月之光緬象服之是宜尚足表河山之行進封大國正號小君庻其營魂歆此嘉命可妻封韓國夫人制王政重于報功國風本于正始齊家有道内助臣忠賞爵惟公尚從夫貴以厚人倫之别以彰婦徳之嚴某官某之妻懿敏柔明雍和專静遴選蚤由于名閥篤恭宻侍于慈闈嘉若令姿歸于重輔行學素足乎已富貴尤虗其心義調琴瑟之和禮飭笄珈之盛俾爾夀俾爾昌熾豈惟偕老之榮在其身在其子孫孰愈兼全之羙克膺寵渥茂介禎祥可
