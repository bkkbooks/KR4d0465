body:
  text: 牧庵集卷二十七元姚燧撰阡表招撫使李君阡表君諱聚單之碭山三章人以材武善射昏暮命中中鳥金之南播應募為兵積勞為提控河北俶擾嘗經大澤與友相失獨行葭葦間與數賊迕戈汰其股拔以逐而盡殺之然非若是戕已與敵閧未嘗以人血刃挺身踰河至儀封萬夫長孟公熟其父訪名而客之署其軍彈壓尋陞長千夫與總帥李成同戍皇陵岡癸已正月義宗由此渡河播歸徳始從成來歸𨽻大將阿咱爾麾下仍將千夫從攻歸徳亳州考縣金平大帥版軍民招撫使與成將皇陵降民百家徙東明實田黄頭原踰萬畝與佃民及嘗所惠活者數十人分苦均勞闢草萊伐株橜而耰之復積榖多至多至千鍾􅀈宗戚族與四方民醫巫扶攜婦子皆往焉依視其寡乏嵗時衣褐日月廩餽婚姻男女之及期與過而見干者無不周施一旦成邑人謂之小東明平生襟抱坦明大兵屠考縣噍無遺類一生哀祈生曰吾某官良庖也遂匿全之後召客俾具饌皆草惡不可進君怒詰則吐實曰初豈是能特誑主脱死耳其不疑人見欺此類不飲酒而好客與成輩數人為耆年㑹盡歡移日忘疲言惟前朝事絶口府縣得失鄉鄰短長聞人誤及此者則欠伸思睡掩耳而起時以長者多之每恨失學兵間課責諸子讀書如日不足嘗今今孫國子助教鳯輟書掃霜葉庭下則起奪帚自為曰無廢而業于斯須頃且然其急其篤于成者可知已年七十三疾卧不言數日子庭玉方令通許歸省則曰吾忍死待汝遂卒實至元戊寅秋七月二十有三日也𦵏以九月十有五日肇塋黄頭原東後三十二年至大已酉鳯求表君阡殊懇用是計君始家之原年猶未满三十方壯士也當戰伐始休喘蘇悸定之時在他人則徴逐貴介聲妓是娱弋獵是習吹笙鼓簧馳馬嗾狗以快酬十年席盾枕戈死所幸生之勞而獨自求口食于田畝觸風雨犯霜露與農夫耦耕頭蓬葆手蠒而脛不毛矻矻作苦終嵗而不悔比開餘饒衣食于其子孫而先賑恤鄉鄰俾不迫于寒飢亦志而智且惠人哉前夫人張二子庭玉卒令鄆城今平章翰林學士承旨閻公復實銘其碑庭芝使監太名酒繼夫人王二子庭蘭兩淮運鹽提領庭英同提舉鎮江財賦二女歸劉源馮珪珪嘗為江浙行省叅政男孫八人鵬懐孟􅀈總管府知事鶚使監長垣税次鳯也鴻福建巡撿見善使監内黄税見道見賢見可女孫三歸士族張鼎楊謙楊某男曽孫六好徳好義好謙好智好文好信好義翰林國史院史績學纘文銘曰聞古子弟多暴凶嵗荒歉則然矧在金世豪傑彚征戰伐是閑其視殺人如芟草菅人有子女我壓奴使人有貨財利取有已闕穰穰厥家何為不成安事耕畬嗟哉惟君獨嵗勤力匪種穀求惟以種徳善也吾苗不善吾藨期實百年庾維溢髙責報于天如執左契篤生孫子文士陛下黄頭之原土厚俗敦大史銘之式表墓門醫隠閻君阡表至元二十有六年蒼龍在赤奮若餘月初吉士子宏也持所自為其祖事状來請曰昔漢故民呉仲山他傳記無見嘗由發蔵賑施其郷而碑之至今千年風雨㫁剥之餘過而誦者猶懐其人不置也非託筆金石力耶嗚呼我先祖者生不策名于天官殁不受諡于太常處地卑約功烈無所表見一世獨有修之于家興所惠活斯人者故不可碑之記銘善言之士使得以示今而垂後比漢故民耶敢以是累公燧哀其志揚親又喜克用刀于文故序之曰維閻氏曹之漆園人後徙陳之西莘曾祖諱遵令陳之宛丘祖諱某考諱孟兩世不仕君諱瑀字潤夫生而明頴孝謹長由其外舅申璉與張子和同侍疾英邸故盡得其術業事親加以潜覃究誦先秦雨漢方書八年詣到積中故施念于外者疾輒已人徳報之則曰天實生之非必一出吾術也人間不自矜鬻求築其門者日亦滋衆壬辰踰河而北僑居宣徳府以所取衣直衣食寒士申兵陳邃孫周郭通至其館其廬去則贐之魏學士邦彦玉峯亦畧行位與遊時召諸道醫悉領于奉御田濶将以君偕北進尚醫列固以學識淺淺不可親上辭稍居南留真定二紳踰河将復郾城以先業蕭條無誰與鄰留鄢陵十年徙洧川年五十飭其子曰吾從學良醫又勤心竒書古方卒遇一疾猶眩迷于先民數十成説竟不敢必何方定可已疾殆以疾試方况君無吾問學者得吾術自已其疾則可無輕出治人也遂亦自棄醫儒服教子孫讀書恭儉質真異不忤物而同不循俗而介不附勢而强不赫威又精衛攝凡飲奕談謔無益泊戕魂神者終身絶不蹈為故能夀耉八十二卒實至元二十三年十月二十有八日妻申渤海宦族能通孝經論語天父天夫賢孝兩聞年六十二凡前君卒十七年至是合葬洧川某原二子鼎吉今尉潭之瀏陽縣逢吉前君卒一年女子二人一適太原劉麟一適鄢陵張琮男孫八人宏也獻民天民舜民他未名女孫七人幼男曾孫二人益幼銘曰彼函工猶擅仁矧君醫志全仁業卅年起死頻以其嬴及士貧晚棄學篤自信父一郷儒冠巾八十二年疇倫髙可隠墳洧賓夷先考由令陳陁三世迭不振維穹蒼運環循屈之久宜浸伸傳瀏陽初命臣授汝戈盗之眴在後昆奚異身非千嵗磨不磷黙然信期茲珉安西路同州儒學正潘君阡表至大之元江南行臺監察御史潘汝劼時為中臺照磨兼獄丞于安西校官楊定序壬辰變遷闗輔民其祖徳卿與祖妣彭衙段者訣或我他曰相失兵間前配封出子浚與祖子温生五年矣俟時清謐無使廢學雜行遷民失所如徃妣流離平陽風雨寒暑窘蔽土屋井汲竈煬匪躬不致須紡緝傭資學二子艱百罹為操益確久人信之婦婦姆女皆取為法且圖諸孫受所鐫誨有踐與别于所序前頌詠盈軸燧奪史事獨未遑詩今年再手太子文學張養浩事狀欲表其考學正之阡嗚呼不腆之文豈足増華𤣥閭而煩諄復見丐耶惟潘氏同之白水人君字仲良則諱温者曽祖宏登宋武科嘗令赤縣祖挺考震亨則徳卿以詞賦魁金進士夫人則鄉先生叚適安之妷由徴平陽童男入燕繡局資浚以行惟督君學比其還秦六籍之文言熟義通郭温伯女以妷之子楊時邳大用裴子法吕仲和來明之顧副言楊君美諸公皆先朝明進士孟駕之張器玉又其少者而君無不遊造其門得其延譽聚徒教授道化之行鄉鄰訟嚚不愬公宫司平其家恚至歡去仇解好合川蜀之士奴于人者賦錢富室贖登儒籍廟學卑陋捐幣為的倡其郡民徙基髙明州守邑令為咈民欲每自愧匿恐其聞知一臧否言為采風謡取以陟黜由朝廷旌别奴民勢家訟君及民十餘家云皆其父祖俘自軍中君倡赴秦省力辯其非或曰汝自士籍明詔已拔齊編氓何苦于他人為哉君則曰吾與是皆同鄉視其誣不一手援其溺非義竟還正民絶口不矜徳由已然人則恵之至元二十年擢同之學正是前一年走副秦憲凡三輔郡縣而皆嘗驅車馮翊朝邑郃陽澄城白水為同之屬縣獨君位是師儒身任表式數百里間篤民明倫亦豈輕哉教又非昔私淑人者為將十年既謝病歸自號安分野人為約白水凡我同姓塋是邑者歲時上冡無間疎戚老幼畢集周及諸宗實獲古人糺族遺意而入燕兄不聞問者五十餘年攜一子歸悲盡繼喜晨夕奉之若大賓然年七十五年大徳辛丑夏五七日卒疾革來諸子前曰吾于吾親雖孝無所顯揚而獲免玷辱惟忠不及事君若曹他日或有用世其竟吾志走哀之曰莫匪臣也惟視所在晨門夜柝不廢乃事猶足曰忠矧君尊聞行知範其鄉州不調十年亦事君矣奚其訏謀廟堂捍禦疆場奔走豆籩金粟當會郡縣率職始名宣力耶二夫人楊燕子八人長勮次劼也勵勉効勣助朂勣鞏昌帥府奏差他皆業儒一女歸信氏男孫十人未名銘曰繄考府君盛文華竄身金亂死不家妣夫人為魯人髽生君五年猶羈童㷀㷀逺逐遷民東天窮其身操不窮夫其所安人何嗟束君于學蓬在麻闕幘貯腹書盈車返秦先進門刺通杖者倒屣相將逢展于朋儕異其瞳由是聞譽日益加私淑筆耕代菑畬以古指南塗安差蒐才乃如平章公用官州校禄小豐身教不令士自從十年謝老歸彭衙敦宗諸潘方拜嘉忽焉白露淒蒹葭垂絶不忘帝降衷尚飭八子以孝忠八子喻指無齊同南紀劼今綰青緺鐵冠峩峩豸觸邪振而家聲後將遐鄢陵主簿毛府君阡表世所曰君子者二焉曰位焉徳也位其名徳其實位顯而徳不充人則與其名曰幸也致然君子則未也徳脩而位卑人則與其實曰不幸不得敷施所藴一時雖然君子自若也有人于此學以潤身道以悦親莊以齊家恭以與人清以涖官幼老一致無可疵纇可不謂徳乎可不謂君子矣乎燧于聰山毛君見之君諱憲一諱順字吉父廣平肥鄉人曽祖弼祖仁考冲霄金扶溝主簿金亡反其鄉與竇司徒文正公遊妣全前卒事繼妣成惟孝十五能自植授徒其鄉我先世父文獻公聞其善學大書夙夜以思無益不如學也十字為勸扶溝卒廬墳終䘮郡舉孝亷監洺磁常平倉受米八萬石責守其出七年而絶猶羡三千石司徒為翰學授檢討官日為史太尉忠武公講治鑑歲餘辟主鄢陵簿求便妣養歸為邢之書表令臾始邢與洺鈞州及陞邢為順徳府君則白侯邢洺鈞功臣封邑由邢嘗開安撫司故洺受其節度今邢已府而洺猶州求諸地志洺實古廣平郡領邢洺磁威四州洺獨不能引為比耶事聞陞廣平府各為路始不相一侯有病郡井鹵敗者議渠洺灌隍以流惡君曰渠洺不如渠滏洺去郡北五十里餘其流先卑逆導之難滏在郡西南其逺雖倍而髙渠之可勢必至旱資溉田潦資筏材薪蒸秸藁或免車檐可水輪地聽民為業郡食甘冽反餘利也侯是其言發民渠之再歲而成其所永頼一如君策筐篚餘力必集諸曹勸之讀書曲周民妖言惑人責與其令故山南亷副馮岵治獄芟其牽辭不多追逮惟置首惡于理凡椽府十二年都目沁州滿去而人益思轉汴梁提控按牘兼照磨官物務殷繁裁析裕暇于邢于洺于沁于汴侯牧來者皆客遇之不吏也及除濟南上口巡檢乃太息曰吾家世儒顧棄所素而逐盜耶兒淵副巴圖總管于江陵松滋吾其從養號聰山出與邑士唱酬詩入陶韋社中家居卷不去手老而彌篤于學如此以至元已丑五月十一日年六十三而卒創塋松滋瀼東夫人張氏賢淑有聞子三人光祖淵洧光祖前卒淵和粹敏明善文能官今以朝列大夫真為總管洧從仕郎管民總管一女歸鄭州張某男孫頴孫女歸同邑金尚書右丞文定董公師中孫植幼居室銘曰於維毛公為周司空受遺成王太保奭同後十六王當襄末世粤有毛伯猶王卿士遂客平原備十九人從楚一言完趙却秦自時竹帛賢哲世有君其遺苗居徳孔阜授徒肥鄉終養扶溝斗食晨門便妣是謀辭尊而卑輟行以躓匪人之為實我之自而位不充命也如何遺澤在洺滏水同波享在其子受服三命為良牧臣足鴻爾慶瀼水之東馬鬛其封走銘之阡可示無窮阡碣提刑趙公夫人楊君新阡碣維蔚州蜚狐趙氏系不可逺本由今江西湖東道肅政亷訪使秉政而上推得二世祖崑金帥府評事卒葬其鄉二子珪瑨珪將萬夫戍蜚狐後遷刺蠡州留瑨在鄉守舍天馬南牧度形勢不支倡縣民以城下之從太師國王狥地至蠡其刺猶城守礮殺王悍將蕭大夫王恚欲坑城公請以身贖母兄死王哀之併全蠡民以戰績每最進兾州元帥虎符復推與其兄廷議多其悌讓改公兾州軍民總管别錫虎符入覲受和睿宗承制監易州再遷行省中都金平監中山府當憲廟世世祖方淵龍收召聞望之臣求治道之宜今者置經略司于河之南宣撫司從宜府于陜之西行部于秦都漕于衛東西二千里道不拾遺而邢則今中書右丞相之祖封國政弛民散最號弗治求潛藩制官惟歲入其貢賦為置安撫司後邢易為順德升州為府乃以近古太師廣平王從祖托克托與公為斷事官位安撫上公年盛强俾與開國勲臣苗胄為友則潛藩期任公者己不小矣世祖踐極制監真定路位總管上俄遷順天路宣慰使肇置四道提刑按察司以公使燕南河北轉使河北河南累章請老不可年七十九始聽歸卒年八十三以監中山有田朱固鄉不返𦵏飛狐即塋是鄉堯封原亦昭時崇顯夀考人也夫人既同享有其樂公當不恙亦以官植業順徳盡析秉政夫人從養及子貴食其禄以終年八十二不及公才一年何夀考萃是一門哉因惟女子子天父天夫者也父不能必子之貴能之者夫子焉耳而難其全今之儲才將相係望海内者每在乎風紀之官夫人以提刑使之妻而母亷訪使詩曰教誨爾子式榖似之彼奕葉襲芳不隕世徳夫人之功亦鮮儷哉古邦君之妻邦人曰小君禮士䘮妾不得匹其夫必曰君妻曰女君後世封羊祜妻為萬歳鄉君則令甲郡縣君之原可為今不敢氏夫人而君之之凡其不反𦵏中山即别塋順徳李馬村若不同穴記稱合𦵏非古也因求之吾家嶲州都督文獻公開元宰相考也𦵏陕之峽石百官咸㑹焉及妣夫人劉卒則𦵏萬安嵩高西趾去峽石二百里耳以唐相之貴月入俸錢三千緡有力不足于至哉則不合祔者亦從古也今秉政斯兆未必始亦由此燧以其于古有徵為發之夫人生三男二女男秉政秉彞秉衷女適焦簡周某孫男九人秉政政又曰吾他日亦域是嘗聞諸師古人不諱死惟不趨取死之途今之人鼎鼎焉惟死度之趨復苦諱死亦惑哉如師之言則秉政不狥流俗語身後事于其生亦庶幾古達者也銘曰襄國所直趙南魏北其西太行冀方四塞求田惟良宜莫如襄衍沃平平千里其疆生家其間沒即斯瘞奚取日者風水焉泥孰培平原如阜而尊左之右之昭婦穆孫天厚其門既夀既祉流澤淵淵未艾來只世生顯人如夫如子牧庵集卷二十七
