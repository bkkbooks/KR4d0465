body:
  text: 牧庵集卷二十九元姚燧撰墓誌銘雷君伯靜甫墓誌銘昔者嘗徵先師魯齋至闗輔闗輔學者則而化之始踐修人倫日用之實不變于流俗之駭議斷斷乎以復古自負能久于其道不數人而伯靜甫其一也然伯靜不及事先師事今昭文大學士潜齋埸公最稱善學而潜齋亦先師視之若友者也先師晚聞伯靜名嘗書示進學之要嗚呼觀兩公之知與亦可概見其為人矣伯靜諱復始字國明由避家諱改今字生以歲丁酉冬十二月二十一日在㓜稚舉動如成人父知事君已有虞曰是大吾家兒也長知讀書不輟朝夕寒暑君戒其躭苦為疾雖暫休之而勤益力不得則思有聞斯人經史諸子積貫淹洽講磨朋友長善救失敬以下之雖不巳若不敢自有餘與人汎接周愛不為町畦惟嚴于擇友事君承顔悦心曲極孝敬一不甘味或終日自咎廢食喪母情文不便今俗之簡失勿行一以禮經為師哀毁摧杖始能興日至君側則變色為舒以安其䀌傷心也友五弟豫世忠恒益觀甚篤然教誘之際凛乎若嚴師莅側晨省各授事出出還必究先軰誰見何得何問遲歸則侯之門疾則親䕶視娣姒晝聚一堂不得還私室均勞同食故久益睦無間言閨門之中翦然有法不幸以至元丙子夏五月八日卒且卒謂弟若子曰吾顧棄大人使哭子耶吾目不瞑下土也汝盡孝終養之其友徴士蕭􅆽哭之曰嗚呼若伯靜者以夷曠淵黙之資醇正精微之學篤信允蹈之力道被其身教行其庭使出而遇必為知務識治之臣振徳蜚聲以利澤一世若不難為也而其成其施已此竟不淑耶燧讀之既悲伯靜之不年大徴士之善言徳行且知言也按雷氏同之郃陽人後徒河中府之河東縣陶邑鄉者八世曽祖希齊不仕祖震通太傅僕府經歴父守義太傅濮府知事由妣夫人趙卒不反葬陶邑特瑩安西之咸寧白鹿鄉平里故從葬平里瑩左妻侯無子後以弟豫子遹今亦卒銘曰義理之在人心者固未嘗泯然非先覺之賢卓識之士唱而鳴之學者安遽能知為帝降之衷民秉之彛而踐行乎人倫日用之間哉古之人聞而知之于百世下猶若得其心傳矧伯靜甫與先師魯齋其師潜齋生並世或親承面命而得其緒論者乎斯文修塗發軔未半而車亡其軸噫此古之人重發不幸類之之歎也然君平日東弟若子師之至矣彼不哀君之未究其躬而忍輟心夙聞家學于其身乎反是思之伯靜又奚以憾為也白鹿之原平里之阡左蔽蓬顆之萋綿而髙可隠者下惟其埏噫乎哉斯賢噫乎哉斯賢瀏陽縣尉閻君墓誌銘閻宏少燧十七年識之七年矣走未嘗遇以凡士宏亦願遊吾門彙所述焉始託銘其祖醫隠君墓于時尉瀏陽考府君不恙也今焉六年又求銘其墓嗚呼何兩君皆不及知而幸襮潜徳其幽宏豈有見走文可以信後世然歟走不讓為者則以荅其為好私余故也君諱鼎吉字和卿醫隠長子其鄉其世其遷徙與醫隠所以教者皆見先誌以至元二十一年尉瀏陽二十六年受代三十年秋七月十七日卒年六十八僑墓長沙元配姚氏再配白氏二子宏掾省江西與蕃也四女一適郡人徒單全一適南陽髙舉二在室孫男女三人宏將以明年五月庚寅歸葬其鄉先瑩自狀曰君㓜躭誦記敏為文辭異其時他門兒者皆其小徳削不致詳而日勤于筆録如易正義論語注漢記傳舊唐傳治鑑節文選杜詩註十餘書無慮數百萬言具藏吾家手澤尚新可以汙車牛未聞人有辨為者與學仕事人則從張公邦彦宣撫天平為四川行樞宻院柴楨照磨用禮卿王博文薦出官瀏陽非賢不即與居母申憂廬墓毁悴杖而後起皆出處不苟倫理至篤者又曰君胷中廓廓無城府商古今人物成敗賢不肖必當其實諌及過不計嫌怨盡我責善樽俎之容粹如不流為詩千餘篇號訥齋以宏信愛必不誣親燧取筆之曰君喟然吾少厲志嗜學官止一尉殆天戯人者則不可也亦思尉為君行道資乎蓋尉有難為有利為江南大縣戸動十萬一尉兵額止于數十而押綱衛使恒抽其半又其身有疾疢喪婚之請其直司日不盈三二十軰盗逐不得必尉焉罪小則輟禄大而奪官是不諒其力少不足以制姦而惟責其專印不職也是其所難凡尉一世同者而君有獨焉在令尉恒居縣禦㓂無敢他遣而湖省犯法臣持遣數千里送所市紗羅京師賦出非其口也入納非其手也市者顧不必送而顧必令不遣者送有司又大其尺度重其鈞權從而責其輕短不使得歸取償有司必舉息立輸又遭例大鉤孝無問其嘗與否迫令首受治民間遺楮緡二千五百其家府又遣修􅲥海戰艦欽亷人難其一君難其三此其所由以貧也其利為者必求為盗罪不扺死嘗墨其肌月呈身有司者署使伺盗曰蛇之所塗蛇能知之吾使過耳口不言所指使自喻之彼方困拘罪籍一朝得交平民出入惟求圖報雖身為盗將不避為況囊槀他盗頥指冨室惟所便取坐受其有盗得其粗我得其細擇世所共寳不可形迹敗者歸之尉有司覈盗不得依日月則杖尉兵一杖加一等三杖而止耳伺盗持尉權一時宜宻置無迹何及焉尉所輟禄幾何而伺盗資之什伯不貲也盗為伺盗忠臣伺盗為尉忠臣又其巧者與隣尉交歡私要言曰吾得盗必使誣汝縣富室曰嘗巢窟焉曰屢資給焉幸羅之獄足吾欲縱之民惟知徳吾耳汝得盗亦如是取償吾縣易地為之胥相益也其月縱兵歸詭代家人責入傭直與民以兵備歛者又所得為也凡是數事今之尉者十出其半又聞一尉始至子嘗借衣尉兵其無可知也比滿積楮緡十五萬歲入稻萬石而不知何術取之也或曰是由賊不急其期日民貸其家責券數月子與母侔無則入其田屋今埒封君不思仕矣嗚呼尉乎禦盗歟師盗歟凡觀夫人觸法肆行徼倖未露悸人大語則君掩耳此倫拘拘恪恪自靖其道不少萌憂不足休休吾心賢何如也是為銘奉議大夫廣州治中閻君墓誌銘至大之元明年燧以學士承㫖翰林閻氏子然來自江西拜且泣言先人嘗以公金石之文獨髙當代故求曽王父醫隠君王父尉潭之瀏陽君與外王父金童子進士秦君道隆之墓不于時人三皆訪公然不天思可銘先人墓者敢越先志他求人哉敢泣血請余感其言而序之君之先始家䝉之漆園入金由其五世祖遵卒令陳之宛丘子仲徙西華再徙洧州生肇自是而下再世則醫隠君瑀與瀏陽君鼎吉生君諱宏字子濟若不好弄而嗜學母氏歸寧亦挾書以從不暫廢誦鄉隣異之成童嘗為冬庠于農隙得束修皆用資已事師聞士子有聲望他郡者不逺數百里徒往致拜就正而知君莫如余先至元茂子辭直翰林客鄧君方壻南陽醫學提舉劉君大亨亦家鄧始以其文為摯相過甚殷余既以所得文法告之及示其所注遺山集余則曰子有進道之資而弊參天地賛化育精神于此耶斯與箋爾雅蟲魚奚異恐以是小知妨大受也君不示以余言為逆其聼而止歸覲瀏陽時故翰林承㫖徐公琰持憲長沙手所為文以先徐公竒之荅詩以譽及參江西省政引以為掾事資其謀抜士子有學行者進為校官㑹故翰林承㫖瓠山王公構調廣選于江省省臣以君晨夕給事元貞之元詔脩世祖實録士在外可與脩者聼其召入瓠山為侍講用其薦為國史院編修官將仕郎凡是二百七十一之帙籖皆其所書滿考進應奉翰林文字官徴事郎同知制誥兼國史院編修上言中書請加左丞崔斌封謚以雪盗殺臣讐其忠讜之誣時相多之選掾中書君不可改承事郎出檢校江西省列曹諸掾簿書稽緩違失皆聼以疏其事達省受罰人無尤者㑹朝廷遣宣撫四道分行天下郡國功罪皆聼升黜今參河南省政陳公某至江西雅知君引以自佐君言貪贓固可汰苟其人初未之知子孫家人為之持憲諸臣必其服者亦宜哀而伸之使不廢棄終身清白國足囬然亦有矯俗僥倖以千名者未可遽以為信不覈其實而受其罔此邵子所以見善未嘗急去也陳公大然之由是此他道廢事皆輕平無怨家赴愬于朝者大徳乙巳余參江西省政君猶檢校見其戞去矜鬻多識敦信義理之學反躬而篤其行温然大雅君子然後自驗嚮所期有進道資言不失也余以明年九月以疾辭去又明年當十年五月十有一日而君卒豫章寓舍年五十二貧無以殯今平章議樞宻事李世安罷左丞休于家買棺藁藏郭東門外又明年官奉議大夫廣州路治中之制下人一歎其不及拜命于生一復華其賁九原也平生不妄笑言風度凝逺望而知其為有諸中者遇士君子家法書名畫與古彛銘欵與一言一行之善莫不筆之雖家空匱人或問之揆義而取不苟其得其達巳者終身不忘容齊卒東平訃聞君以其為江西日嘗新徐孺子祠故即是地為位立叙其情以哭之又圖其像求余為賛歲時以事為翰林日其僕健而才瓠山愛其任事當意遂借役之終出檢校不忍發口召還竟死其家與人交不以合已而翕翕炎于始不以逆已而悻悻叛于終若泛愛然心所與者視其窮約極其力可至以周之洛人王君卿五十生子而妻死謀求乳婦困于無貲從求貸假遂質象笏以應其須子幸不天讀法上章寧用槐板其友楊行簡贖以見歸友人劉景温孝而貧事老母凡百為皆身之為買妾以給役使其急赴義多此類曽祖妣某氏祖妣某氏妣姚氏君則其出繼妣白氏妻秦氏繼劉氏二子然以治中恩澤尉龍興之新建江西憲臣多其好學而文顧遣逐盗用違其長以職官召為屬吏季遷男孫址嗚呼太史公傳夷齊哀其餓死西山引顔淵屢空糟糠不厭而卒蚤夭盗跖日殺不辜肝人之肉竟以夀終以明天道無親常與善人之非然盖天道逺人以數十寒暑之身不要其歸固宜云爾必如周太史筮陳公子完非此其身在其子孫驗于五世昌為正卿八世莫與之京者始不膠于一定姑置夷齊顔子雖夭當世配饗孔子至今諸孫五十餘代猶䝉其澤復無所與盗跖栁下惠弟也安知其子孫不一再世而微絶其栁氏賢而傳之史者又安知非下惠裔邪畧古以求惟徴而家宛丘而下三世不仕積將百年尉瀏陽秋纔九品視古一命顯而未著至君之身操觚牘于鑾坡近負從槖為天子私人出又檢校江右之省月旦為清議所歸顯方著矣僅踰知命而卒明年而治中五品之制下實古五命雖未嘗一展驥足其恩澤猶及子然視其王父尉若異地為職則鈞王父已是然猶進未艾也其大震耀非然之身在其子孫者人亦孰得而必其世哉由是以思天道無親常與善人信也非歟是為銘京路醫學教授李君墓誌銘君李姓諱網字文紀其先真定人祖安道以字行考諱顯榮金廣威將軍内鄉酒使歲壬辰桓山公武仙聞可將任置為千夫長使戰浙川盖當太上皇由興元循漢東出兵也君年方十二以孝聞學能詩矣㑹鄧之節度使耶律瑗盡以州民降宋君侍母郝至襄陽制閫皆處之屬城分君随州明年還鄧乙未歲饑以皇子庫庫齊教徙洛之西君以儒業醫故思到精詣為人診治疾輒巳雖先輩善其術久其道者君不以年少下之人亦捨彼不即而惟君歸也年二十四或云廣威君不亡嘗見之雲中趼足徃求不獲無有也號歸失明乃籲天自悼曰吾壯而為世棄人如母氏之老何于是將身克慎攻治益力盖三年而視復故中統元年制授南京路醫學教授至二十一年改襄陽醫學教援尋詔尚醫今本草中土物且遺闕多又畧無四方之藥宜徧徴天下醫師夙學多聞者議板増入君在徴中三以老丐不就車二十六年歲已丑夏六月三日年六十九卒鄧越五日葬穰縣亭子坡嗚呼人倫之大莫先能子有是一者則天下萬善可必其畢集吾躬摧是言之則君處已之慈祥恭儉與人之忱信和厚者孝基之也六子友直友諒友聞友端友徳友誠恪服訓言近奉晨夕逺職官守皆馴馴有脩謹稱其化家又何如也諒前將仕郎提舉靜江府茶鹽聞前奉訓大夫知夀昌府君不恙時四方達官賢士有過此者或識不識必造其廬州縣牧宰旬好而月聞之亦此邦之雅望君子獨與燧相能方疾委篤猶遣端也求書獲安將掲其寢尚兾其可速已㑹燧疾不親筆硯不果而竟已此哀哉娶金徴仕郎化平令胡士元女六子同出前君卒三月女二人一適張升一適提領常徳路交鈔張居敬男孫五人未名女六人幼誠也縗杖致諸兄命哭請銘乃泣系之銘曰維古中夀七十率有宰物者司入出偶于君年不足一子而全歸始曰卒善遺後人昌後必魂神徂升降體質其千斯年安此室趙君和父墓誌銘至元十六年燧先嬪闗西夫子紫陽翁楊公奐之中女卒禮夫為服齋衰杖期然必三年而後娶達子志也十八年燧時為秦憲聞同之士子趙君和父中女年二十有四由嚴於擇對在室通書聘之君乃聚其族謀曰使君以故中書左轄公猶子顧肯求結䄜吾門是其心非求婦氏閎閥裒選姿顔者苐不欲以失節者匹其身其志已絶其庸人誠可嗣為兄弟者禮辭即許燧以不腆先君之幣迎之巳婚往拜其門君以外舅自居若視其壻為清門子非其耦者乃大副所願自慶得良婦翁從其鄉來長安聚居踰月其年十二月翁歸兩未虞竟自是為死生訣也明年壬午以十一月二十卒露井社其家年止四十九訃至燧與妻蘋自長安三百里各服子壻女服往哭之以其月十六日舉納之其鄉先瑩壬含來㑹塟者或逺數百里老日哭之如失子弟少者哭之如喪父兄自其居至墓所十里祭不絶路或曰嗚呼哉天乎若人之年耶如是者盈千人匹夫可以化其鄉未見有如斯比者夫豈無自然耶君諱居中字和父厥考彦和鄉人誅為明理先生祖考惟良曽祖考師肱髙祖考孚自君而上八世醫行其鄉不徙業又自祖考而下三世兼業儒以醫及人以儒修已人益誦一鄉之善士君之為尤事明理以孝有譽友其弟居仁及馬氏妹逾篤豈惟疾者藂然來歸鄉人有為不善者必訓飭之聞者受言不敢岸傲咈拒之有訟不之府縣而求司直其家取醫直集穀常千斛歲歉則貸之貧無積者凡哭而哀者皆常飲惠食徳人也妻鄧相敬如賓三十餘年無反目言一子惟義君卒之年甫再歲四女長歸同里楊某次歸燧次歸韓瓛幼在室後卒之六年當至元二十四年戊子外姑氏謂燧曰乃外舅汝知己也汝不哀其窮而在下生志不遂乎汝直翰林職史館銘賢公卿墓者夥矣可不有言發其𤣥宅潜輝乎不然則平生修為之勤愈不聞將來矣燧敬應之銘曰生不五十孰謂其年耶業仁冒其鄉道行其室冀缺之賢耶子稚而氣質粹實或幸賴以為傳耶十一世之躓迺今猶然耶彼不絶夫㳙㳙之滴將待夫他日之為淵耶其為世所甚惜者又烏知夫有在天耶嗚呼吾銘之幽石其可以告夫邈緜也非耶故民鍾五六君墓銘文興字叔進繄鍾徙吉潁川自迫於靖康繹騷避吉而來岳世方四由元而冨仕明至實生文興叔進字郎行五六以族次凡是四世皆不位吁哉五六遯迹市乃如天啓所狀事居家孝謹文縝緻嚴訓厥子俾知義自奉殊貶忘勤勩基約以極豐其積此邦師之陶猗視居鄉侃侃和以易不私其有善分施歲荒民饑閃瘠瘁發我廪庾飫老稚崩梁壞塗捷石治至今行者賴其利乙丑之閏月庚出年六十八世廼棄𦵏之三陽先墟比黄室之子南秀嗣南英南金又其季一女結䄜未决議男孫滿十女半是一庭孌兮貫魚似椒聊蕃升必天意豈憐之家久踣躓一朝起行當遐致況如南秀士服被下及二季皆學仕始卑終髙若登陞或者而宗由曲熾匍匐哀求銘𤣥誌伊誰成厥孝子志苟有善兮必門地漢民仲山凡豈異奮筆發隠太史燧臨江路總管府判官夏居母夫人張氏墓誌銘大徳十有一年秋八月臨江路總管府判官夏元亨通燧于郢拜而言曰元亨母汝陽張氏世家也是家金以友義嘗旌其門至居士某者百有八年以終三男二女夫人其姊吾夏氏與同里生十九年而歸先人後徙家洛祖府君諱某金尚醫年九十餘妣朱年八十餘以終于時無他臧獲躬服勞以養姻里孝稱之尚醫不恙時每訓先入汝未盡讀吾書而得吾術其無為醫師以誤人授汝必方為痬醫自業先人守是言及四子天瑞元亨與利貞徳常生教之讀書元亨長矣責使學仕曰汝欲事人必親其大一世者乃遣宿衛皇孫妃今皇太后積勤有年欶提舉龍興茶局歲貢名荈其邸大徳六年調令臨江將上其年十二月七日先人卒年八十有九人曰天者獨鍾夀考于之二家耶既􅉎偃師某鄉獨輦夫人來南有公相與禄以慈㫖甘為醪醴歲時晨夕歌舞為夀而歡其心八年當婦郝卒之明年夫人已為納幣趙矣急其婚期元亨欲俟三月終某杖期求日夫人則曰吾得吉矣竟以八月三日合巹纔六日其日浴已又沐已又易衣家人問其然曰吾所欲也明旦元亨奉檄祠閤早山未至而追者及之以卒告其月九日也年七十有八殯而待其滿秩舟其柩返葬于洛亦嘗揆之順章貢彭蠡大江以溯淮達汴陸去洛讒十五含為便且邇所以由石鐘山溯江漢餘二千里以至此又去此而㐮陸行千里始至吾洛不敢以為迂逺必公見者以公鄉先生文有時譽昔參江西省政嘗書薦其臨江忠慎亷平為知已恃此如得銘先妣幽墟以歸則生與死者華賜及燧燧哀之曰嗚呼使如汝言終杖期郝歸于數日則夫人為不及饗趙婦且古治喪絶而後沐浴而襲今不疾沐浴者猶人之常隨以易衣若襲然明日遂終由前則行嘉禮于喪由後則豫死事于生豈逆知其將然不以語之人乎栁初未之知或天者誘之俾其然也所可甚惜太后正位東朝其澤必先丐其舊臣則元亨亦依日月末光者其榮以禄將大于今夫人不及見之其將歆其豐祀乎天瑞道之營道令未上而卒利貞龍興提舉徳常醫學正男孫三人男曽孫如干人曰事耄姑翁負孝稱其躬有子序鴻皆婦夏之功天報之豐俾食子禄以終歸而君子之穴與同于洛邑天地之中可謂世所憾者無其恫矣牧庵集卷二十九
