body:
  text: 牧庵集卷四元姚燧撰序序江漢先生死生嵗乙未王師徇地漢上軍法凡城邑以兵得者悉阬之徳安由嘗逆戰其斬刈首馘動以十億計先公受詔凡儒服挂浮籍者皆出之得故江漢先生見公戎服而髯不以南人士子遇之至帳中見陳琴書愕然曰北人亦知事此耶公為之一莞與之言信奇士即出所為文若干篇以九族殫殘不欲北因與公訣蘄死公止共宿實覊戒之既覺月色爛然惟寢衣留故所公遽鞍馬周號於積尸間無有也行及水裔見已被髪脱履仰天而祝葢少須臾蹈水未入也公曰果天不君與衆已同禍爰其全之則上承千百年之統而下垂千百世之洪緒者將不在是身耶徒死無義可除君而北無他也至燕名益大著北方經學實賴鳴之遊其門者將百人多逹材其間燧生也後不及拜其屨前獲識其子卿月者七年矣凡再見之初以府僚見之洛陽雖嘗以好兄余猶未語此今以憲屬來鄧始及之且徳先公不忘也燧曰嗚呼自先公言之夫既受詔出之軍中而使之死不以命非善其職且儒同出者乎千數纔得如先生一人而使之泯没無聞非崇其道此公所懼而必生之也自先生觀之孰親親其七尺之軀而大其所闗入持瓦缶將盿之猶有惜而不果者必茹毒罹禍不可一日居故忍而為此出處非不思也乃中夜以興蹀膏血以禦魑魅徑竹莽以觸虎豹而始及水仰天而祝其行非不祝也夫思而後行行之以決則其勢多難奪于中路使非先公自行而他人赶之能捨所忍為以回其復生之志收其巳逰之志反就是一日不可居之禍毒乎由是言之先生之死求以無辱不全以歸其生也不以不赴而以知巳此其胷中揆制一時相為高下之權衡也然古之人為知巳死者有之無有為知己而生者先生以古人所不為者報之先公而先公所受先生也巳多矣奚徳哉卿月與余相視一泫卿月歸序所與言者贖之别丁編修序至元十九年余辭秦憲而歸東周明年復受命貳荆憲自惟才之非也行路之遼也家貧而力之薄也多疾而江南風土之未宜也實難其來然不遑偃蹇自寜者公則壓于君命勢不容巳私則以為人生文軋混同之時不及夫年未艾以覽江山人物之勝勿之則有歉然之悔斯意之不欲巳者出處之大畧然也自厯制憲至今其間望舒二十四弦晦居府者三一而水舟陸馬周厯乎復灃峡歸鼎五州十七縣者反居三之二焉其于江山之清駛奇峭人才之標特秀異實若富于胷中求如鼎之前編修宻院官丁公及事勝國三朝嘗先顯者或無有倫焉宜其文章之宏肆年徳之髙邵日聞天朝累起而將官之而公辭之至今又于嚮見干進而不釋者之中所無也余以是多公公之報遇于余者宜與人異按部巳竟將還憲府辱以髙文叙行再三讀之愛其詞甚華而義至嚴情甚宻而禮至周而其病在夫一失之不攻衆長之是諛曰雄其文粹其學正其傳尚其世而善其政斯豈余所虞于公者公之世所知其學文其文果余匹其傳與政果不學加乎豈均無之姑為是人甘言相遇乎非歟余如何公而知如是為一報余如告人公以善懐述不余知也公心焉如何不然公誠無意焉而余過疑及此則反取罪為髙明妄人矣或有意督遇將肆公所責之心公焉又如何獨甚善于公者巳辭徴不仕若忘世肆志而能損巳有權輿沅陽書院聚徒而育師聖而祝釐以成已而開物詠歌太平以老不可以謂賢者不出而無益斯世也書院之基巳移文鼎牧俾給左契復移文軍府俾拔其園蔬又為榜懸之院門以觀其速成而戒其中止今余之歸或得請去荆憲而北不知公由何事何時相遇中原一握手復道今日為請或蒼蒼者再牽而南又過十州必覩書院既成升堂以揖峩弁之士來而告之曰子觀大夫役之築者乎十人為什操杵負畚而力作者九人逸者一人䄂手旁歌俾九人者勤力而忘勞力董率而犒功逸者與受直焉今日之居諸君知徳編修負畚操杵之勞亦思䄂手傍歌者乎以是為學者引譬而資公一笑送宰先生至元三年二月未盡之三日宰相生謂燧曰余將遊秦子能序文兹行乎予掉鞅遊天下殆周獨秦未嘗一至又秦士捨修撰雷君亦莫有一識子昔家秦其所忠者誰人所通信者又誰盍枚舉之予階子言一進謁之也燧曰秦固衣冠之藪澤也在燧未有遍加者焉蓋年之前乎燧者率隆名碩徳既幼燧而未與之言後乎燧者燧何所慕賴乎彼而為之伍故遺十百而得一二也請為先生誦之有楊元父者吾師與之抗禮者也其學也粹而正其操履也堅而不渝其執親之憂也哀而禮其能也愽而肆之䆳史學讀至落落奇倚之士必慷慨感激思見其人于今使先生之至不嫌于自明肯曰向之儒服登常山一言折猖狂之盜而落其角距者實余也彼有聞而不奇先生者乎雖先生夙有負氣使酒之聲彼將視為古奇傑士之恒態必濶畧而有取乎此也先生行哉其尚有合于斯人歟又有韓邦傑劉無競吕伯充者皆吾師之弟子也年皆長于燧若韓之能官劉之天質之羙吕之學問之該徹皆燧所不敢望而及計之今以吕以練服在躬未可出之二人有造先生之館煩從者為燧一訊安焉送雷季正序余從魯齋先生遊最故且乆于同門之士學為最怠而不加進自親夏楚時猶爾况今載名仕版逺處數千里之外哉昔之怠者為忘不加進者阤而為退矣宜季正之取友而差際余之心安焉而不敢有憾不謂徒以從遊之乆故愿因鄙言獲進拜先生屨前嗚呼其志則勤其意則良惜所藉以為介福其一人也是一也义先生自謝致而歸屏跡桑梓養安泉石家事不以干于心鄉人莫得見其面于時欲求如祭酒之授徒來則受之亦難也余則止之無行雖然以先生平昔樂教之心且熟子之兄伯静之名嘗哀其愿見未得竟抑志以卒有弟如此篤學而善學行已以化鄉岸然不流于今俗翹然自是以古人千里羸糧而就正焉又觀夫人有可進成徳逹才之具必不拒其見也余則勸之令行且景星鳳凰之為物人或睹之猶為生之幸况大人君子徳道之容可以興起一世仁義之言足以發揮百王者哉或一進拜而聞其緒論必决滯為通易暗為明大有得於曩昔也有得而私之仁人之用心不然行哉余將湏其歸而見告也送暢純甫序歐陽子為宋一代文人一時所交海内豪俊之士計不千百而止及謝希深尹師魯二人者死序集古録遂以無謝尹知者之恨嗚呼豈文昌也作者難而知之者尤難歟余嘗思古之人惟其言之可以後行為恃以待他日子雲者出將不病夫舉一世之人不余知也今乃若是其亦有知者為快而失之為悲歟余冠首時未嘗學文視輩流所作惟見其不如古人者雖不敢輕非諸口而亦未嘗輕是于心也過而自思人之能者余操慮持論且然余不能之何以免人無嫉賢之機余年二十四始取韓文讀之走筆式為持以示人譬如童子之問草彼能是予亦能是彼有是余亦有是特為士林禦海之一技焉耳或謂有作者風私心益不喜以為彼忠厚者不欲遽相斥笑姑為是諛言以愚之不然殆鼓舞之希進其成也自是䝉恥益作既示之人且就正于先師先師亦賞其辭而戒之曰弓矢為物以待盜也得盜得之亦將待人文章固發聞士子之利噐然先有能一世之名將何以應人之見役者非其人而與之之與廢其人而拒之鈞罪也非周身斯世之道也余用是廢作有亦不以示人絶甫自言得余雙字不言不録而棄之又言世無知公者豈惟知之讀而能句句而得其意者猶少嗚呼世固有厭空桑之瑟而思聞鼓缶者乎然文章以道輕重道以文章輕重世復有班孟堅者出表古今人物九品之中必以一等置歐陽子則為去聖賢也有級而不逺其文雖無謝尹之知不害于後後猶以失之為悲下下之外豈别有等置余為哉則為去聖賢也無級而絶逺其文如風花之逐水霜葉之委土朝夕腐耳豈有一言之㡬乎古可聞之將來乎純甫獨信之自余不可不謂之知己足為百年之快恐純甫由此而取四海不知言之非也然純甫實善文其不輕以出者將以今為未積積而至于他日以騷雅末流典謨一致乎將恃夫位民既而循吏持憲既為才御史富民又將為良大農道行一時無暇于為言乎豈以世莫巳知有之而退藏于宻也由積而為書他日與道行一時無暇于為言則可由莫巳知而不出若余也雖不善文而善知文則純甫為失人矣今以農副行田隴右于其别也叙以問之至元丁亥七夕送郭肅政安道序書有道有體有勢謂為太耶周官則班之六藝謂細耶次之禮樂難耶舉天下之人孰不為之易耶則纊一代能名世者不數人若是者亦未可以細視易言之也斯其道也其體則有篆𨽻草三等本而上之草出𨽻𨽻出篆則篆者書之源或曰𨽻而下有正走則曰唐湖刺楊漢公跋千禄字書以顔魯公𨽻書為盡鍾繇之精能則正者實𨽻也其勢則有拘有束以言篆譬則弁冕端人將執事于郊廟于于其趨縮縮其循周旋則至圓不能如規折旋則至方不能過矩𨽻則常服燕居不可多拘家人視以為嚴君而亦可少放草則雄勇武夫夫纓曼胡而衣短後挺茅運鈹進勇退躍蹤横入出頓挫起卸揮霍研拂極其放而惟吾意之所至焉然為是者雖云出乎手而一心為之師心拘亦拘心放亦放未有心放而能篆亦未有心拘而能草勢必至理必然者也走嘗觀今為篆者無牧舉其誰求一蹴而可臻古人之閫戺者則郭肅政安道一人焉耳夫日為是拘藝則心存而不放豈不幾于克念作聖者耶視走之惟事乎草心放而不知拘者相逺萬也安道號西埜好學而善文無乎是則書不能獨振耀今之世矣将别而紏郡于岳序以問之送李茂卿序太凡今仕惟三塗一由宿衛一由儒一由吏由宿衛者言出中禁中書奉行制敕而巳十一之由儒者則校官及品者提舉教授出中書未及者則正録而下出行省宣慰十分一之半由吏者省臺院中外庻司郡縣十九有半焉吏部病其自九品而上宜得者䋲絶來無窮而吾應者貟有盡故為格以扼之必歴月九千始許入官猶以為未也再下令後是增多至百有二十月嗚呼積十年矣勞乎哉李君茂卿嘗同燧受學先師司徒公儒者也父户部恩澤既推其兄之子及將試吏堂帖令出掾湖廣省盈九十月將赴銓中書燧賀之曰人有不職幸不紏於御史者君以勤效無此人有饕墨幸不罹罪罟者君以清慎無此人有依庇有力竊離所事同列之懽以自求容一時幸不譴斥者君以中行不阿無此人有挾任而商賊之州縣而倍責嬴入以肥其家幸不私于民與衆樹姻黨子弟入官以防後至之塗幸不貶于士者君禄入外無他營捨僕馬則顧影無朋舉無此舉無為為賀其可賀者諺曰兩姑之間難為婦上政事堂下㕘幕多或二千人其事之來抱素求署無一可後者皆視其色聴其言動止移畧比不齟齬使馴馴如式從已而出譬則庖人善適衆口酸鹹者好之不齊然非暫也必八年之乆大而經國子民細而米鹽甲兵于盡得夫人之情而熟知夫事之勢増益其所不能者不既多乎今之老于力筆筐篋以致逹官貴人皆下視之吾逄掖以為言闊事情而不適為用者恃其能此焉爾君既能之是行也以軍國公相知之素無曰峻擢惟循所宜資亦卑善之昔也人吏之今焉吏人其留中其居外主乎聞司徒平生六經仁義之言而濟以今所能古所謂以儒術餙吏事者非君其誰哉大徳己亥秋八月上弦日書送姚嗣輝序取士以文始于隋而盛于唐其法有司擇學修其家名聞其鄉者歌鹿鳴而進之朝謂之貢至則試之以聲律之文中程度者謂之選猶未即得仕必待有位者之舉猶視舉主何人或衆且賢以㫁其人之材否始授之官勝國因之而小變焉選即官之惟不使得為令必制置提刑轉運諸司五人舉始用為令令而上郡牧侍從五府之官無不能至者則自貢而選為舉千百人不一得焉亦磽乎其艱哉吾宗嗣輝勝國選士也赫奕其時瞠後塵者千百人烏可少跋迨今改止聲名昭晰不可絡闋猶官洪校滿秋而觀光天朝求通刺秉政之臣盧公吳公門者千里人未有一得獨于嗣輝傾身接之迎譽諸公閭文云乎哉有間于道徳之實耳士而得此亦曰逢矣逢而至於逹也奚惑然終不能増多其舊尺寸復調武岡益逺於洪豈兩公面是而中不力耶曰非也囿于法制之宻先得之多兩公拱視不可躐其級也以故南榿汝意而往既軑燧告之曰凡今仕者聞職乎民以有治賦聴訟之事為莫不色喜聞職乎士則以無有貢選利禄之望人怠于學虚師席而夏楚不試卒不懌乎其中嗣輝将亦若是乎盍亦思之官風化俗之原治忽所寄也無逺稽古而監之今司徒文正許公微時于大名于輝于秦于河内以倡鳴斯道為己任諄諄私淑少長不一其年也鋭純不齊其材也積多至數百人聞之天聰徴為成均俄拜左相嵗餘辭免復求成均後其弟子繼司鼎鉉者将十人卿曹風紀二千石使棊錯中外者又十此焉其於隆平之治豈不少賛乎嗣輝苟以是為心規矩薰陶是邦之多士得其逹才一二以用斯世使海内之人指而誦曰是大夫所梯接者于以亞匹吾司徒公其獲將多行矣勉事乎此嗣輝蜀人以蜀多榿木雖寓荆吳不忘其鄉號南榿云李平章畫像序陛下之未出閣由李道復日侍講讀親而敬之嘗召繪工惟肖其形賜號秋谷命集賢大學士王顒大書之手刻為扁而署其上又側注曰大徳三年四月吉日為山人李道復製至大四年辛亥春正位宸極制授道復光禄大夫中書平章致事以盡學焉後臣之義装演是圗填金刻扁而摹賜號與御署卷加標軸寵耀至矣人孰與儔敕臣燧序之將俾詞臣頌歌其中而親覽焉臣聞命屏營反覆究思在昔帝王圗其臣者商髙宗之傅嚴漢中宗之麒麟閣世祖之雲臺唐太宗之凌烟閣四焉耳麟閣而下皆將相之開國家承平亂亡以賛彌綸資訏謨以致陰平者傅巖不然初未有是赫赫顯烈肖其夢形求得諸野爰止作相以道復肖形可同乎説髙宗圖于既王三年之後陛下則圖於未帝一紀之先其時繪工運思有所未至手設為色髙宗於説有是乎哉斷所無者李泌從肅宗于途人指目曰黄衣者聖人也白衣者山人也已乃為相而道復姓偶同乎泌亦曰其衣余亦已相謂道復山人可同泌乎為之賜號刻扁肅宗于泌有是乎㦲亦斷所無者泌雖賢者而言涉神仙迂怪以故史氏短之惟説則無間然嘗攷觀之古今之世相去若異帝王為治道罔不同何則陛下所居則列聖之位也列聖君臨之中土堯舜昔嘗有也乃若高宗亦商聖賢之君耻其不為堯舜故命説曰若金用汝作礪若濟巨川作舟楫嵗大旱作霖雨作酒醴惟麴孽作和􅃵惟鹽梅取喻再三求其交修者皆陛下有虞道復之心今謂道復其才有足方説孰敢犯是不韙然其所處則説地也如較其學焉後臣顧説所無能求多聞以建事學古訓以道積厥躬招俊人以列庶位對揚天子之命亦足襲説遺芳餘烈報陛下矣然非舊學之臣世不以是責報俟夫治定而功成徳尊而年及或遂懸車于秋月釣雲月以弄泉石朝堂有疑馳使諮之猶不得専為山人世則目曰山中宰相者所不免也是年夏五月序馮雪崖二孫名字序余以漢刻瑞碑筆意深古嘗模麟麒二字促而小之刻瑜玉珮為私章故人馮雪崖憲副見而求之曰將賜吾孫以為名也故長曰麒次曰麟後十年主長林簿者謂余兒麒輩元服矣盍字之因思漢孝明圖功臣于南宫雲臺實本孝宣之麒麟閣而征西大将軍陽夏侯與居其間當諸将論功侯獨避而休息大樹之陰世多其不伐目為大樹将軍而麒其遺苗宜字曰漢功周穆馳八駿以升崑崙之墟後好事者圖其褰翔若麟鳳栁子厚誕之余觀天閑馬其名而麟其形者奚少况瑞刻所圖延首而長鳴振尾而髙驤孔阜以碩如馬而角則駿之去麟有不大相逺者麟字曰周駿如是命之以必難犯則新而不奇也以求義意則係而不離也且各即其人性情之近似漢功循循歛宻王母嘗稱其克孝如父夫能守家法于今不能逺而言念追鼻祖之踵于古乎其出而仕見之事功可期以不伐者周駿翹翹發達類疆有力者則夫道逺千里可一日而致焉者亦或可幸以焉大徳庚子閠月中休日序序牡丹余于牡丹始于中統之元見夀安紅洛西劉氏園三年見左紫洛陽故趙相南園兩花皆千葉株皆四尺夀安二十萼廣經七寸髙與之等左紫四萼八寸髙等又三年見千秋状元紅燕都故相楊大參宅株五尺四十萼七寸髙等後二十年見之長安毛氏園最多將百株株二尺少然皆單葉小大參差不齊無絶奇者後二十年玉板白洛陽楊氏欄株亦二尺少多葉千萼七寸少鄧州見三日張氏肖齋之衡山紫陳氏終慕堂之淺紅色兩花皆千五葉衡紫株二尺少将二十萼五寸少淺株三尺少將五十蕚六寸少惟蕭仁卿之承顔亭白花天株三尺大可六七十萼七寸少葉最盛又有色緋紫碧相錯株尺少尺可四五十萼盛亞白花七尺大復有緋花株單十萼八寸二花皆多葉而緋花獨奇故為佳品今失其名者别有鶴翎紅為千葉小株獨萼五寸大高等他日株大花則故大矣是為鄧花之冠仁卿舊云此落陽夀安福孫自余觀之大非夀安則淺紅而今名余所命之葢即其形色近似為言也長安洛陽諸花余忘其香孰勝萃鄧花而校噴勃穠綿可喜如紫薇者衡紫為第一此余生五十一年所見者然自元年至今為二十九年其見六年六見自燕長安洛陽而至此㡬數千里中元及三年與至元二十年三見洛陽為同地至元六年十八年二十五年各見之燕秦鄧為異地亡慮百十株而千葉名品纔四見則千葉名難遇亦猶千人為英萬人為傑尤世不恒有者矧賞酬有數耶劉趙二圓雖皆有酒年甚少不善飲楊參時與先世父中書左丞同朝為父執與之酒不敢飲毛園時為秦憲毛氏方業市酒纔下馬行觀擇剪數萼不同飲而去楊氏欄時滿秦憲將走荆憲借居其廬客懐牢寂無誰與為飲張齊陳堂纔持一二觴各箭一二萼歸不名為飲其盡醉相歡者惟承顔亭一焉而已嗚呼似齒五十一年之老行數千里之逺始觀至今廿九年之久六年六見之希而無負可當賞酬者醉明日仁卿求記其事余口未拒而心勿是之以為樽爼之樂屑屑者奚足筆其夏白花忽槁死其秋又固求記之余始思昔者之坐斯定也孰逆知是花旋踵不可復見亦可謂異事也又思左紫止一株已移植嵩山廟中洛陽余亦絶聞夀安固在其玉板白及毛園百株將如左紫余植他人耶無亦若是花之已槁死也嗚呼徃者既然况來者之不可必耶細者且然况大此之倍蓰十百者耶則吾平生所當勉吾身而因循弗力以去不可追者已多也誠可為老將至之一慨而植物之死生又不足怪也仁卿惟喜余文已記其承顔而求之屢如老父取張長史判吾特賢其能以是心至而已然又益思六年之間不善飲不敢飲不可飲無誰與為飲與不名為飲非他葢無詩人同臭味者發其極意焉耳而承顔是日者則梁宣慰貢父張總管孟卿王工部景韓是皆善詩安知不可為他日故實亦未易以復得者據蘭亭例為序惜其時無唱酬未嘗罰依金谷酒斗數也牧庵集卷四
