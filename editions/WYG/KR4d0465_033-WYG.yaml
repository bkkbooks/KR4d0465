  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0465_WYG_033-1a, image: WYG1201/WYG1201-0746a.png}
body:
  text: 牧庵集卷三十三元姚燧撰七言古詩題甘河遇仙宫并引李天樂真人自余去年客秦日求賦甘河遇仙宫其地盖重陽真君遇異人酌甘水為酒相酢之所由是名甘而不知甘即夏帝啓與有扈戰此今其縣猶曰鄠其名舊矣天樂託石子玉遣其弟子自秦入鄧千里求詩為之詠此鄠即古扈字也終南下甘河水我絜瓶嘗作泉比如何仙翁酌飲人一唾世上無醪醴是何濡軌不成川北流赴渭朝宗然東海相絶㡬千里餘波開此黄金蓮河之源委且不見味更幽渺人豈辨詩翁乗雲能再來醉擲餘盃須一吮題西鄰王景韓茅亭次韻朝陽洞深纔尋丈欠身舉手已捫上誰識中有盤谷客黜陟不聞時得喪夸夫鐵甲薄于顋有手不解持螯盃時許雪曉穿蠟屐踏破瓊瑶來看梅人家買宅得鄰㡬墻東避世渠妄比可憐過愛醉後書未見來禽與青李猶嫌洞逺如隔波茅亭别構髙客駝兩僮日聞語音熟呼門不復相誰何題張肖齋所藏雙鶉圗日躔鶉首在天未午為鶉火已鶉尾十有二次分四方彼鶉居南獨三次是鳥尾短不復軀翼花斑斑鷓鴣如首雖善鬭易馴狎握粟已逐兒童呼豈無鸞鳯為月紀未必星翁曉何以冩生亦箋爾雅徒耗墨晴窗費縑紙天寒江非烟如雲車馬輸充鼎俎珍今日此邦惟罕汝畫師應不是穰人謝馬希聲甆香鼎吳侯建盌侔紫鐵表裏㕙毫瑩鋪雪每愁射日動精采倒㬌過目晴電掣人云煮茗何足道黄金百鍊終不裂惠然持餉耽詩兄供啜幽齋真一絶馬家處鼎同青瑤左右梁耳圓索綯預憂凝塵助脆滑失聲脱腕春冰抛我思焚香固其物丹砂九轉疑可燒何當去求善畫史取並清玩誰相髙盛荷不慳随所欲攜歸僮輩笑偃伏白頭主人好惡異乃寳瓦磔賤金玉前年禁林辭千鍾今乃貪此盈一匊但知焚香煮茗趣亦念饑僮隠雷腹先生一笑呼來前吾意汝豈知其然出門仕徑方爾率陽在隂中陽逆旅人來正可飲醇酒孔方交絶今㡬年聊将二物代飽徳試問孰與空歸賢適有江南墨光紙一掃新詩三百字為余走送藝聖軒足與渠濃作囘施趙温甫自汴託人求詩傳君家今汴水在博雅外無他嗜愛牙籖架揷鄴侯書玉軸壁藏永存盡伊人何状不及知與世異尚有此竒楮縑且寶况彞鼎勃磎一室應累累我於朽銅如二豎百藥膏盲攻不去劇青拂紫可瘠饑每被人嘲友康匏白頭留滯周南村怫鬰襟期無與論天寒塵生筆水硯日暮雪落蒼山樽㡬時月明虹貫夜相遭傾續千金價定将餘有易所無莫畏先聲避三舍爰裔堂牡丹宣相家牡丹雖多然止三種玉板白葉底紫淺紅惟二十一日最研盛邵子所謂看花須及未開時今已凋落矣録呈時中繋􅀈盡室遊長沙假舘適許鄰宣衙千紅萬紫紛爛漫獨餘牡丹纔蘗芽苦遭夾旬風雨惡手自揷架扶横斜天香國艶付寂寞已分抱恨歸舟拏今晨青陽劃研暖一日盡開三䦨花左䦨後䦨鬭鉛華綽約仙臉粲朝霞重趺單萼異肥瘠玉環飛燕無敢瑕西闌兩株玉板白虢姨色羞脂粉加中叢昭容垂紫袖朝儀雙引肩相肩非縁門前行馬設已有遊女填闉闍我昔縁髪洛浦涯繡韉慣逐遺簮車老來自信此夢絶何意猶眩東皇奢夜䦨秉燭清味薄晝短常畏啼棲鴉學詩未知正而葩學書劣能綰秋蛇酬春烏可不一醉二豪笑口人誰逼明朝芳蹊縱百遶彩雲墜何及嗟坐無徐黄冩冩生手不拂東絹圗還家大農椽樂子英求詩吾友秋澗兼髙廬詩稱子英發菆塗履霜兩楹草已宿顔色不少平生殊先軫歸元如生面處父死敵固堪羡慙徳參乎啓手足淵冰要見兢兢戰卒絶欒盈遙遙孫傳芳簮居終懿門尚期千古骨不腐血肉未敗何須論三君将成孝子志皆借毛頴傳其事泉臺長卧誠有知洛誦雄篇凜生意張肖齋蠟梅為黄雀啄食余家牡丹芽為浴鷄所壊趙家堂前蠟梅樹叢枝已綴薔薇露醉歸紅袖折簮㡌似與華髪慰遲暮遙應此日開更妍萬斛清香撲軒戸欲破已為黄簷角寂寞春風殊未覺君云落英地如蠟欲破已為黄雀啄可憐終是主人仁不把金九散飛雹我庭秋培牡丹芽屢灌期以開嵗花曽覆一簣䕶霜雪忽遭鷄浴騰塵沙翠枚紫荔蕩無有枯枿齊試快莫耶翰音無知無可垢汝口平日差牛後豈無糞土振蚤蟲非有黍粟充饑脰投畀湯火諒不難議功姑以能鳴宥梅花啄殘開疎遲牡丹今同抱蔓歸静求二蟲相惱故無乃㝠有教使之坐因吾儕對花飲歌舞不避傍人嗤不如無花無酒過嘲謔狂詩為誰作果如造物意在爾玉汝於人私㡬大墨卿明白莫司箴只取二蟲圗置坐次齊彦提刑和余肖齋蠟梅詩韻聞辭湘中巖桂樹盡㦸凝香正風露此時清趣肝膈横遙應半嵗猶朝暮移節南陽但茅屋低雜邑人三百戸冠雖觸邪心麟角公論非我出先覺化行仁厚到生蟲踐之未忍那肯啄定國治獄民不寃安有六月飛霜雹萋萋碧草春風芽相逢官路黄栁花繡衣驄馬未出宿先聲已過河干沙東西百里不易見况使南北千里耶又聞不避南陽詬官舍盡室無一後已遣魚軒還潞水但畏兒童癭生脰久知是邦多此疾賢如元凱終不宥蹇我白頭學詩遲佳句求法将軍歸伻來一月再惠寄無乃有意幸教之我雖不作能知詩評君一語君莫嗤古人復生不是過百泉梅花更竒作篇終用意愈精神餘子工夫無許大束鄰好事有肖齋併取歸家玩行坐招貢夫探梅去年南陽雪積丈苦寒更在燕山上荒園栢樹舊冬青一夜生意随凋喪今年半冬汗浹顋馬蹄誰是散銀盃愆陽騰威蟲出蟄到處盡芳年後梅城中知春能有㡬千樹西園雪羞比不復乗雲過玉川但看明月揮桃李願分伏瓮新金波我烹封麏如稚駝相擕吾黨二三子白頭一醉君如何次探梅韻明日余醉先歸貢父與史鄧州令妓歌飲至城次韻山頭落日髙三丈我醉思歸馬先上來及城門市已燈纔下雕鞍路迷喪行人笑指駢肩顋不見使君荒郊盃百步一止歌吹發清切驚落千林海是邦能詩輪指㡬横槊吾猶驍健比夜深却相醉尉逢不識将軍隴西李近聞北涉漢江波千錢糴穀載一駝吾儕寄公不喜樂其如負此時平何楊丞彦先見和復次韻二首短兵最長不見家善用逺在威弧上惟君詩筆可配之未信於今士風喪無錫如花越女顋人云無此不持盃解組歸來卧衡宇寂寞巡簷空嗅梅出門欵段朋儔㡬我䇿駑頑時竊比不繙異書友蔡楊且玩竒古傲牛李一日不見古井波相逢莫話襄銅駝白沙翠竹江路好蒼生安石如卿何猶仁巾冠蒙在上縱齒衆中人不咍直饒白髪三千丈猶賴巾冠蒙在上縱齒衆中人不咍年少風流氣先喪最恨白髪顑顑顋􅆴􅆴未飲先垂盃顔壮自羞追勝集不是有詩真負梅兩疏黄金在餘㡬入手把玩春冰比莫從車上貢餘桃分棄路旁齊苦李萊田茅屋臨湍波持家惟有書數駝欲教兒癡未解讀及此正可遊無何八景樓公乎何年謝鈞軸卧樓臨此湘一曲太行山色髙入雲千里空青照沙麓胡為捨之不命駕無乃風土西南熟丹梯不樹三丈旗已使元龍卧牀足世誇入景何足道自有萬象供遊瞩因之不遣别製名可見靈臺不違俗樓中楮書三萬卷時與多聞來勘讀每讀北海空樽罍差此東山廢縣竹却思十年帥邕管日夜不解衣三屬至今起跪必依人半足左江炎瘴毒㡬時按圖數包貢尚恨未縛交州牧區區與公晚傾盖握手論心如昔夙歸檣相煩就屢别濡滯憐儂晝三宿莫言處隂影可休安坐晚食能當肉九重方務老成人㑹見鳯書來起復江溆漁舟圗漁人無田鈎為耒生長水中安於水解維一葉信所如朝發荆江暮沅澧湍施梁笥淵罾窊謀食日掇獱獺餘無産可乏佐軍策作俑什伍官征租年年冬月寒潭碧鳴榔驚起蛟龍蟄縱横沉網深刮泥鼓鬛潜逃萬無一小魚大魚盈千舠刀腸斧首砧脂膏然薪夜照作鹽腊百步未至聞腥臊越商巴賈持陼堵接艣連檣争售取解道困魚魚有神豈惜羣分命如縷杜陵實獲我心人解道困魚魚有神縣官丁中連四海計口筭賦何虞貧問誰晝此非無意尺楮無褒惟有刺前年下詔蠲此租咸若君恩小天地留别奉御李侯李侯吾取何所似騏􅂹絶塵日千里人生一朝緩急間凡馬焉能託生死觀其平時善赴義竭出問門常倒屣千金傾槖報一餐片言杯酒忘百恥靈臺雖負横水鏡月旦絶口不臧否果如形勢心所非壁喙教謏無一唯族胄貴挾北方强是性受得由母氏乃知衆善出天賦齊變而魯非學使拱壁李云曠代珍小小瑕疲何足指適吾有覽吳㑹興握手不謂遭南紀鸚鵡洲邉月再盈朝出暮歸月轡箠日復一日無怠色骨肉未必真能爾古人亦貴意氣豁􅀈交何必同調止况今卜居尚悠悠白髪相捨誰鄰里非來漢陽即漢隂斯言或食如江水清明日陪詩僧悟栁山登落星寺詩扺掌女媧前功捐鍊石力盡還霣天怒飛十有八萬里擲陷彭蠡三重淵藏山於澤信所力愚公欲移重莫肩州民譌謂恒山路漫向麟史求何年安知自爾牛斗躔天穴山當匡廬巔銀河一決不復塞至今飛流掛長川我來正逄槐火莭艤磯蹔繫東呉船相㩦詩僧上佛閣箕踞對酒談其然渠聞舌橋若自夫子辯乃出鄒衍前何書太古何所得為言烏有先生傅檣烏吳城山頭尾畢通飛來行舟檣上呼舟中主人適中欲委肉投飯供朝晡云是巡湖王使者從卜禍福知前途家人化之亦信向恐我偶忘或誤謳絶嫌魚網戒張設見彈必毁仍藏弧因思神林鳥亦黠怙勢不必専城狐過龍興昌邑山望海亭去年憶登望湖亭空雲凝空雨雪零撫碑三復石砮記賜觀欲藉王威靈廟令老人曰嘗有烟塵失自兵初經南昌歸來舟復停亭邉楊栁春風青纔思㑹稽探禹穴湖海濤瀨達東溟牽牲榼酒來炷馨再拜卜吉王之庭洋洋在上孰敢侮正虞白日飛雷霆廟中道流師雲谷顔色憔悴如獨醒率然一物置我所五采十之再咸扃槊鋒劍脊握有半鉈刀鑱若新發硏一砭疑為扁鵲石三嗅尚帶陳隼腥惜無矢人與羽筈之弓試矢而㝠冥重為雲谷語丁寕英之新之君其聴平生記古此第一過日若忘心已銘商夷周目搃後出逆推已自三千也百年天門孰曰夀嗟我與子其秋螢牧庵集卷三十三
