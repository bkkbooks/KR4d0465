body:
  text: 牧庵集卷八元姚燧撰記喬木堂記余讀孟氏書至所謂故國者非謂喬木而謂世臣者歎漢之通侯其鼻祖頭蓬葆而手胼胝百戰以得之子孫恃其有王與民相師非度傳纔一再罪以國除其善失者坐酧金巵惡而免耳幸復念功徳世續之無㡬何時已後效前嗚呼尚何有于故國世臣者今兼有者纔汪氏盖義武公以金亡明年乙未開壁天門山來歸而有隴西廿有四州之地介于羌渾氐凉之間将其衆首殘全蜀諸子顯者忠讓忠烈忠恵忠烈子忠肅三世五公忠讓推節其弟忠烈從憲廟伐蜀盡瘁死綏忠恵斬叛将燉煌忠肅擒叛王略畔國家皆恃為西陲長城自外将相使牧猶廿有餘人名以世世通侯而豈慚焉中統之未詔奪强諸侯之世其土者俾不得而有轉使牧州獨是一門父死而子以繼兄終而弟可及旄鉞相後先圭衮相焜煌自乙未至庚戌七十有六年襲守其土而不變非列聖私之亦克終為下有以致也嗚呼不曰故國謂之何哉校今名臣無亞匹者忠讓之孫懐逺大将軍荘浪路總管安昌求名其堂為喬木且語其故曰國固不賴乎喬木以為故然無是亦以之知為故國何則其始也世臣樹之自夫甲拆而蘖培而溉之而拱把不枉斧斤使得全其天年而後至于喬其極者可表以百尋不然世臣去之故國遷焉則亦何顔而存為匠石所尋資矩矱矣雖有條枚萌蘖之生樵蘇利之牛羊牧焉㡬何不為牛山之濯哉則人所樹也南北異宜南方氣燠葉斾斾然凌冬不改必春而新葉挺出而始隕籜其喬也易故厥木維喬書載惟揚南有新木漢廣詩歌北方氣寒木生于春而夏以長秋而零冬藏之根生纔半年隴西得金氣之先而寒逾早其遲于喬也逾倍他方而史遷曰十年種木百年種徳觀今十年纔拱把耳雖乃鼻祖樹于種徳之初至今七十六年未必能百尋其百尋者非貫千嵗不能以至君能知乃祖種徳之難亦邁種之自身而子而孫而雲仍期百尋乎千載之後則為國益固而臣之世數益多則喬木者豈不與故國世臣相始而相終歟是為記其年二月清明書于神州客舍遺安堂記故上懐㤙監州唐古君齊年友也以燧之生偶先兄命之其不恙時嘗謂記其遺安堂疾革猶促為将啟手足顧言其子師臯曰記成當奠几筵以告嗚呼君欲鄙文忍死以俟而吾遲忽于操牘其真負君哉追記之曰時有治亂故士有顯晦炎漢末世何時哉中原板蕩曹操託故討賊挾天子令諸侯孫䇿再戰而有江東以故龎公荆州焉依劉表葢幸是方無有日尋干戈之大伐事為避地謀耳及表即隴上來候發不官無以遺子孫之問故對以遺安表終其白其心之不欲已臣徒髙其事而去自今思之畎畆果可以盡天下之安乎是有二焉在定在之安有無定在之安有定在則道無定在則義猶權衡也加銖于兩則不安而仰徙石于鈞則不安而頫且錯置輕重于尺寸之間而不安有是焉况大此者乎三仁同事殷矣微子安去箕子安囚比干安死二老同歸周矣太公安為伐紂之師而鷹揚伯夷恥不聼其扣馬安亦不可必人之安伊尹又異是焉方耕莘畆非不安已及湯三聘遂任天下之重一人之身始終之安自不能同者非易所謂時義者乎義之安可推移于一時道猶規矩也哲匠亦此守此有不能捨以為方圎如君止仁臣止敬子止孝父止慈交國人止信非書所謂安汝止者乎道之安可不易于萬世以君生平一官裔夷呼嘘毒癘不難為往既時其出至郡逾年而求終養其親以歸歸有道俾師其子篤其成材與自汴而鄂安而能徙又時其處臣責塞子責供而父道周矣其安于道義者何如君其深思乎故于先民歌哭聚族之地揭以是名其意以為取之古未若師之今與其法之人未若本之今然遺必有受師臯其受者也年方壮矣好學有譽其行于家既如君之孝其家者孝其親其聞諸郷又如君之信之友者信于友推是移忠他日有不能如君事其上者事其君乎君見龎公之䇿可施其時未可施是家于休明之世也大徳龍集辛丑十月記夀萱堂記至元十一年既詔大軍南伐别遣宿衛之臣将􅊳騎萬人出荆州為之聲威大将下鄂東岳湖廣諸軍謀方江陵沙市是軍已翺翔峡澧江陵之郊入聞曰三郡某縣吾所下也封之萬家領以一府俾嵗傳置其賦京師待以分賚衛士毛君巨源由副縂管而縂管踰二十年自燧二憲山南分刺其守寄治松滋也聞唱邑士舉司焉温公真率㑹約而月修之使民知長長于鄊因惟曰弟實孝之推也非善老老其家不知篤此遂友之亦十五年矣大徳之元請記其夀萱堂為賦伯兮之卒章曰焉得萱草言樹之背竊怪漢儒鄭𤣥許慎同其釋而異其文箋者曰諠草令人㤀憂説文者引以為藼曰諼萱同物後本草者亦第言忘憂不及所㤀之方将枵然徒對之耶之耶餌之耶至唐孔頴逹疏之専訓諼為忘盖欲得今人善㤀憂之草不謂萱為草名始與諸説判不相契矣斯堂製名其在于忘憂乎夫曰忘者猶始有憂有待于排解消拂之也使初無憂烏乎施忘燧未嘗及識夫人之几杖以君白髮占之則夫人之黄髪而者其年者從可知也夫以黄髪之親頫而俯其上白髪之子仰而承其下四表之内兩間之中得是㡬家雖啜菽飲水猶胥與樂况宅是光顯而奉以華堂定省以侯晨夕也温凊以莭寒暑也悦其口體有甘㫖之充也伺其色言有使令之偹也是府乆其官而不調無三嵗一徙陸走水浮資車與舟衘橜維節之戒也為之鍳者人嵗訟之至以罪去而獨無絲毫汙盖善慎身羞親之所不蹈顯親之事必立憂情以忘用是道也萱何為哉不然彼閭閻之子力為可憂譴于有司詬于鄉鄰無理之聲日盈親問而富樹萱求以㤀之雖甚昧者皆知其不可也故萱能忘不憂之憂而不能忘有憂之憂疏者未深信之盖亦若愚推類而不得説者也雖然凡耆年之人方歡而歎不疾而呻者情所同然同乎憂乎求易于愉心而快目者莫草木敷華之若或當其時君服命服為夀而前萬室之人其戚且故從而母之得其一莞而忘之者誰曰非萱之徳哉承顔亭記嘗謂人子之事親不難于燠寒其衣㫖甘其味以適其口體之奉而難于承顔以得其歡心斯正孔子語子夏以色難者也又嘗思之夫人之心變動于中千百不動而㡬微必形于顔靣塗人過前其安而色舒志而色厲荘而色専有懐者其色鬰而肆滿者其色揚揚也吾皆得以識之况人子者日侍親側乆接熟伺而不去者乎其承顔也亦易焉而已耳雖然天之厚薄于人者不齊有役是心履霜踐露不及承顔者斯固非人力所為末如之何也已又有生而不學倫理不明㤙爱不篤不知承顔者亦有墮四支束于貧而力不能自㧞不足于􅎵瀡之其不能承顔者力至矣或牽于禄仕仁逰逺適委親而不遑将反曰吾能公爾忘私不得承顔者是數者皆五典之罪人曰仁卿嘗侍矣行年五十而母氏八襄猶康强咸禁不就其色養而仁卿思以終身寕燕休心娱目乃作亭中園周植嘉樹竒石名卉叢篠綺張繡錯麝芬雲蓊者亡慮百品風雪之朝花月之夕稱一觴為夀其間其善承顔者哉詩曰孝子不匱永錫爾類客之登斯亭者内顧其家而及承顔者将同是樂其内顧非家無有承顔者将有不勝履霜踐露之悲則亦斯亭之感之為者矣亭舊其名余病其不關子職也故以易之仁恕名恕遼氏遺裔也由金人惡耶律為字有父嫌譌為移喇後逃亂奔宋再譌為蕭云朋簮堂記天下之道有二君子小人而已矣然各視其為執孰主而孰賓之主而人賓則人從己巳賓而人主則已從人無有無其朋者易之為書本為君子謀不為小人設于小人則懼其為朋故泰之六四曰翩翩不富以其鄰不戒以孚于君子則恐其不朋故豫之九四曰由豫大有得勿疑朋合簮盖豫之為卦五隂一陽九四以才幹之臣上見信于六五柔中之君而無多忌之嫌是以若是易為成功也大傳曰崇髙莫大乎富貴然使爻位之貴孰加于四臣而五君貴之所在富不必言矣而卦亦有専言富者不于他爻而亦恒在四五故泰六四與謙六五皆言不富以其鄰家人六四亭曰富家大吉苟無位之士而富其勢亦與崇髙之一故亦由我和順得志開誠而朋從之則富者又為兼善之資而有朋從之來耶然又思朋從則羣居羣居則必有事為而言及義必也如兊大彖之講習乃有互長相滋之益有必粹也而得其要如乾爻言學聚問辨寛居仁行以行其徳斯盡善矣聞者其然余斯言乎非歟非踐行有素乎驟歟史君生洛渉穰竒士也名儀客仲威其封殖若可比封君素侯力善而泛爱赴急而施積寒士之來歸者争效之浥泉流隨其小大而斟酌飽滿之不虚其往而遂所願欲言其處易時位可當豫九四適余讀易求名詩堂為書朋簮俾揭之楣間盖仲咸與余同邑以年偶先嘗兄之禮意甚至言其可諛况濟齊先生之弟子猶懼其盍簮與燕逰好也故又舉兊象乾文言者申告亦庶㡬輔仁之一道也至元戊子日次實沉歸來園記嵗壬子余與令今醴泉雷君損之交至至元丁亥最之三十六年為故人始余從先世父中書左轄公爱讀四書君與横經几席為同業交不為淺年不為淺故凡見其小不足余意者必為之盡言盖君自踐仕至今三十年位止一令所至與去人稱其賢今老矣不厭不已猶為之将行道耶縣之上莅而壓之者數十府寺守成法而遵之幸且無事苟鬻之其能自用其情折摇手觸禁而罪隨之是其道非易行也将為貧耶諸子孝且克家有脂田十頃終南堂室髙麗固其墅植榆楊雜果數千小者圍桮椀大則合抱充棟梁嵗入絹多于江陵李衡木奴其本富已埒封君素侯矣嗚呼豈余蒙闇之甚未真甞宦味之甘便者耶余嘗激之使委印而去君以故人同業之故受其説而不愠焉此可見其寛有容也然復有優㳺牽制未㫁之言焉曰今遽不可吾必以開嵗某月而行嗚呼君子進三揖退一揖所以礪難進易退于平居也如君所言正如東萊譏魯隠當授即授何謂将授當營即營何謂将營之説也君又不以余為躁而斥已肯服其非是又見其善從人也徐曰吾家有園鑿池其中中池為堂外為四亭東亭藝蘭蘭則春芳取楚屈原之辭曰紉蘭南亭北軒闞池種蓮蓮則夏敷取周子之説曰爱蓮西亭植菊菊則秋榮取陶潛之詩曰采菊北亭樹梅梅則冬花取林逋之句曰疎影順四時草木秀發循環流居四亭期没吾亭獨中池之堂與園未名子為製之余曰屈原之愛君周子之鳴道陶潛之明逹林逋之隘狷能發四賢足矣又可他求為耶詩曰髙山仰止景行行止宜名之曰景山雖然周子為人鄒孟氏之亞其言亦六經洙泗之遺餘固不在淺學之妄論餘三子則皆有説屈原之不忘君其失未免怨懟激發而不􅊭林逋終身遁棄而㤀君又類潔身亂倫其吟嘯多賦近體句律清快可誦者有數陶潛既仕矣則其心為不㤀君知其不可以恥束帶見督郵為目以去正得孔子燔肉不至微罪行之遺意又其言和􅊭微婉猶𤣥酒希聲後世雖有效而和之終不能一造其堂奥三子之中古所謂吾無間然者也園宜以歸來名君試誦其辭将不待人之勸激懼窮日力而歸矣以是為記是嵗十月晦書楚山山房記孟徳麟作楚山山房或疑而問曰古人之樂山者皆有所指名晉謝傳之東山唐白傅之香山宋王舒公之半山雖枚舉之将不能一而盡未有若徳麟之槩而名椘山者因而思之盡禹貢荆州之域皆曰椘宋火維衡嶽崇其髙大與細而丘垤皆則椘之為地大抵人亡慮周數千里之逺也山之為名雖布斗粟為算有不能以殚之之名也而自命之無乃鮮亷而已貪乎使止曰楚山猶曰隨吾厯覧之所至何所非椘何地無山猶足禦人而綴以山房之名乎孟子之言堂髙數仭盖人臣之居其極不過乎是是房也崇不踰于尋文深不出乎數轍今将舉是名是盡禹貢荆州之域周數千里之逺者之椘與火維衡嶽巍大細而丘垤雖布斗粟為算有不可殚其名之多之山曰吾将納之一房則並蔵山于澤者為尤誕也良不信之燧聞而笑曰子辯辯余真能納辯天壌之間二者而已曰同耳曰獨耳同則與人共之獨則我其知之今一世一人鼎鼎所趨逐者意亦曷甞在山意不在山是人之所棄也太史公曰人棄我取余所獨得者也烏乎貪然之山也人有廬其麓者梁其澤者車來其川者舟其川者材其林者藪其藪者曷嘗不與世共之是人之所取也太史公曰人取我與是人所同得者也烏乎亷且以跡求之房誠不足以納楚之山由理言之徳麟生平厯覧之熟或時讀書之休飲酒之醒作詩之暇看雲白畫而眠聼雪清夜以思則夫崔然崒然嶻然岌然藂而離離峭矗而坡陀千變萬殊不易状名者莫不呈露彷彿于眉睫今見納之一枕之上而有餘豈崇以尋丈深以数轍之房有容而不足者耶㦯者舌撟不下惴聾而退噫余由愛椘山買田郊郢以分是風煙泉水之勝而南郢實楚都去郊郢纔數舍亦将名楚山君能視同廬者梁者車者舟者材者蒐者來即共之則已或校其君先将謂余後則余将以郢去楚都踰千里未免以逺近為訟上勞山林聼其直之誰在也徳麟名之紱在勝國為少保佳公子明時在令潭之湘鄊今辭仕而休居焉牧庵集卷八
