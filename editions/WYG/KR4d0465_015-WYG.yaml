body:
  text: 牧庵集卷十五元姚燧撰神道碑中書左丞姚文獻公神道碑公諱樞字公茂事世祖潜邸十年左右宸極十有九年居近宻之地受尊寵之任可謂必世之久惟其不固富貴進退禮敬窮達一節不易寒士故不取耻當時明哲保身以薨帝為震悼賻楮泉為千百千五百閔惟子煒生十五年未授之室賜聘財如所賻明年官以禮部郎中皆異數也既沒世而名聲日延後十九年當元貞二年裕聖太后以嘗侍講裕宗言之成宗贈諡榮禄大夫少師文獻公至大三年武宗追號嘉猷程世舊學功臣太師開府儀同三司魯國公諡仍其舊又推恩再世考仲宏贈太保儀同三司魯國康懿公祖騎銀青榮禄大夫大司徒魯國惠靖公妣張氏祖妣李氏皆魯國夫人惟姚氏為神明之後厯三代秦漢魏晉宋齊傳次或絶或續與梁陳隋唐可譜究者别載世録惟本五季梁唐六鎮節度使勍勍生金吾將軍漢英漢英周廣順初太祖遣之使遼見留事世景聖三宋加安時制節𢎞化翊亮功臣開府儀同三司樞宻使檢校太師兼政事令上柱國東陽郡公生中書門下平章事北面宣徽使衡之衡之生給事中同中書門下平章事居政居政生太師左金吾衡上將軍䖍州節度使景祥景祥生太子洗馬去華去華生金東上閤門使金州圍練使玢玢生閤門祇候武徳將軍佺佺生武徳將軍獲嘉令錡錡生安逺大將軍慶陽安化丞淵後更名仲宏生公及弟楨格公自稚弱一力于學晝則經紀其家嚮晦則讀書夜分不輟魯國夫人恐傷耽苦每止之乃塞牕不使見燭就枕必盡三鼓聞將遷闗中康懿公録事判官于許俾取師氏姑及姑之夫子昌以來公徒行懐書困休于樹宿止于邸亦出以誦自期甚髙宋内翰九嘉少登科甲時有重名方聞居許幕折行位與之遊一日賓㑹録事名召内内翰怒曰公茂負佐王之畧豈可若是易之先祖曰同僚呼兒輩宜然猶竟席不樂其為前輩見推如此壬辰許城被圍州判公軍資庫使與副夜直四鼓聞牕外嘆曰人獻東門出索之無得副曰吾嘗遭兵河朔鬼物云然宜捄吾家乃相與歸街陌横鈴索斷行見其懐印若赴州計事者至家乃盡出金銀酒具奩飾裹餱糧為逃死謀日出而東門果破邀軍將蕭姓者入家盡付所出蕭曰吾嘗受丘真人教汝軍中惟救人無殺吾捄乃死公聞太宗詔學士十八人即長春宫教之俾楊中書惟中監督則往依焉中書少公六年兄稱之與偕北覲時龍庭無漢人士夫帝喜其來甚重之乙未詔二太子南征俾公從楊中書即軍中求儒道釋醫卜酒工樂人㑹破棗陽併公所招將盡坑之大將幕竹林間公前辯折明詔如此他日將何以復命乃蹙數人逃入竹中潜歸其營匿嚴侯軍中纔脱死數十人繼㧞徳安得江漢先生趙復仁甫見公公戎服而髯不以漢人遇人至帳中見陳琴書駭曰西域人知事此乎公為一筦與之言信竒士所為文數十篇以九族殫殘不欲北與公訣蘄死公留宿帳中既覺月皓而盈惟寢衣存乃鞍馬號積尸間求至水裔脱履被髪仰天而號欲投溺而未入也公曉以徒死無益汝存則子孫或可傳緒百世吾保而北無他也遂還盡出程朱二子性理之書付公江漢至燕學徒從者百人北方經學自兹始歲辛丑賜衣金符以郎中伊嚕斡齊行臺于燕時惟事貨賂天下諸侯競以掊克入媚以公幕長必分及之乃一切拒絶又有以銀二笏來見既謝却乃出置氊簾間遣人追及與之遂携家來輝墾荒蘇門糞田數百畆修二水輪誅茅為堂城中置私廟奉祀四世堂龕魯司寇容傍􅂷周兩程張邵司馬六君子像讀書其間衣冠莊肅以道學自鳴佳時則鳴琴百泉之上遯世而樂天若將終身後生薄夫或造庭除出語人曰幾褫吾魄又汲汲以化民成俗為心自版小學書語孟或問家禮俾楊中書版四書田和卿版尚書聲詩折衷易程傳書蔡傳春秋胡傳皆于燕又以小學書流布未廣教弟子楊古為沈氏恬版與近思録東萊經史說諸書散之四方時先師許魏國文正公魯齋在魏出入經傳子史泛濫釋老下至醫卜筮兵刑貨殖水利算數靡所不究公過魏與竇漢卿相聚茅齋聽公言義正粹先師遂造蘇門盡録是數書以歸謂其徒曰曩所授受皆非今始聞進學之序若必欲相從當盡棄前習以從事于小學四書為進徳墓不然當求他師衆皆曰惟先生命則魏國公由窮理致知反躬踐實為世大儒者又公所梯接云歲庚戌盡室來輝相依以居㑹上在潜邸遣托克托故平章趙璧驛至彰徳恐公避托克托留璧獨至輝以過客見審其為公始致見徵之旨公曰天下之人同是姓名何限恐使者誤徵不敢妄應璧曰汝非棄伊魯斡齋隱此者乎公曰是則然矣璧曰良是乃偕往彰徳受命遂行既至上大喜曰客遇之俾居衛從後列惟不直宿時召與語隨問而言久之詢及治道公見上聰明神聖才不世出虚已受言可大有為感以一介見信之深見問之切乃許捐身馳驅宣力盡其平生所學敷心瀝膽為書數千百言首以二帝三王為學之本為治之序與治國平天下之大經彚為八目曰修身力學尊賢親親畏天愛民好善遠佞次及其救時之弊為條三十曰立省部則庶政出一綱舉紀張令不行于朝而變于夕辟才行舉逸遺慎銓選汰職員則不專世爵而人才出班俸禄則贜穢塞而公道開定法律審刑獄則收生殺之權于朝諸侯不得而專丘山之罪不致苟免毫髪之過免罹極法而寃抑有伸設監司明黜陟則善良姦窳而得而舉刺閣徴斂則部族不横于誅求簡驛傳則州郡不困于需索修學校崇經術旌節孝以為育人才厚風俗美教化之基使士不媮于文華重農桑寛賦税省徭役禁游惰則民力紓不趨于浮偽且免習工技者歳加富溢勤耕織者日就飢寒肅軍政使田里不知行營徃復之擾攘賙匱乏恤鰥寡使顛連無告者有養布屯田以實邉戍通漕運以廩京都倚債負則賈胡不得以子為母如牸生牸牛十年干頭之法破稱貸之家廣儲蓄復常平以待凶荒立平凖以權物估却利便以塞倖塗杜告訐以絶訟源各疏弛張之方其下本末兼該細大不遺文不具述上竒其才由是動必見詢使授太子經以太師淇陽王之兄故丞相圗們格爾故右丞布哈濟達今司馬圗們婁為之伴讀日以三綱五常先哲格言薫陶徳性明年憲宗即位凡軍民在赤老温山南者聽上總之大為張宴羣下罷酒將遣人正公頃者諸人皆賀汝獨黙然豈有意耶對曰臣欲陳之他日不謂遽問且今天下土地之廣人民之殷財賦之阜有加漢地者乎軍民吾盡有之天子何為異時庭臣間之必悔見奪不若惟持兵權供億之須取之有司則勢順理安上曰慮所不及者遣人入聞願總兵與國戮力報可公䇿太祖承天大命兵取天下功未及竟而遂陟遐太祖平金遣二太子總大軍南伐䧏唐鄧均徳安四地㧞棗陽光化留軍戍邉襄樊夀泗繼亦來歸而夀泗之民盡于軍官分有由是降附路絶雖歳加兵淮蜀軍將惟利剽殺子女玉帛悉歸其家城無居民野皆榛莾何若以是秋去春來之兵分屯要地冦至則戰冦去則耕積榖髙廪邉備既實俟時大舉則宋可平上善之始置屯田經畧司于汴西起穰鄧宿重兵與襄陽制閫犄角東連陳亳清口桃源列障守之又置都運司于衞轉粟于河繼餽諸州陜西則移隴右汪義武公戍利州劉忠惠公黑馬于城都割河東觧之鹽池歸陜西置從宜所中糧興元猶懼不繼置行部秦州順嘉陵漕潼關沔地轉粟入利其年大封同姓敕上于南京關中自擇其一公曰南京河徙無常土薄水淺舄鹵生之不若關中厥田上上古名天府陸海上願有關中帝曰是地户寡河南懷孟地狹民夥可取自益遂兼有河内壬子夏入覲受命征大理至曲先腦而夜宴羣下公為陳宋祖遣曹彬取南唐敕無效潘美伐蜀嗜殺及克金陵市不易肆以其主歸明日早行上據鞍呼曰汝昨夕言曹彬不殺者吾能為之公馬上賀曰聖人之心仁明如此生民之幸有國福也明年夏禡牙六盤大張教條俾公以王府尚書身至京兆置宣撫司以楊中書為使奏諸干夫長不法奪有人室者旬月之間民大和浹道不拾遺師行留裕宗後謂曰姚公茂吾不能離恐廢汝學今遣竇漢卿教汝先遣三使入大理諭招許不殺掠大軍經土蕃刋木求塗以前三使先至諭㫖彼以為誑磔其尸于樹大師及城其相高祥登陴望之見吾軍威之盛駭愕口張不收飭公盡裂槖帛為幟書止殺之令分號街陌由是其民父子完保軍士無一人敢取一錢直者惟急求三使之首或曰投洱水中遣漁者無得也俾公為文以祭賜其家人數十戸世無有與及歸馬多道死公惟一馬瘠不可乘之則牽之襟榖數升時摇末盂以飼雪深三尺軍馬所經踏為氷梯惟旄牛負槖以從徒步僅千里而中原馬至分賚之始免繭足上駐六盤公疾求居闗中教使勸農身至八州諸縣諭上重農之㫖凡今闗中桑成列者皆所訓植嵗丙辰公入見或讒王府得中土心帝遣阿勒達爾大為勾考置局闗中推究經畧宣撫官吏及征商無遺羅以百四十二條曰俟終局日入此罪者惟劉史兩萬戸以聞餘悉不請以誅上聞不樂公曰帝君也兄也吾弟且臣事難與較逺將受禍未若盡是邸妃主以行之為乆居謀疑將自釋復初好矣上難之翌曰語再及曰臣過是無策思乆之曰從汝從汝先遣使以來覲告時帝在河聞不信之之曰是心異矣曰來詐也再使至詔許馳二百乘傳棄輜重先及見天顔始霽大㑹之次上立酒尊前帝酌之拜退復坐及再至又酌之三至帝泫然上亦泣下竟不令有所白而止敕罷闗西鈎考廢行部安撫經畧宣撫都漕諸司帝規自將南伐與上閲地圗俾公跪指瀕江州郡津步要地可舟越者遂復上兵遣由鄂入歲已未秋及江而憲廟崩渝問至上猶濟江駐兵結層樓蒙以臯比日居其上臨攻鄂城東北賈似道聞公􅖴謀軍中比為王猛城垂㧞前茅上及長沙下及隆興聞叛王將為非覬子家遣前芧還遂振旅斷浮梁以歸帝即大位以王文統為平章盡止藩府舊臣立十道宣撫使諸侯惟嚴忠濟為强横難制乃以公為東平至居庸北制下受命即南或勸無入當入覲陛辭公曰文統新當國彼將以我為奪其位至治郡置勸農檢察二人以監之推物力以均賦役罷鐵官居三月大駕北征天后留燕遣使召公曰兒輩㓜時汝授之書何久留彼時圖們格爾為丞相惟專從衛宫閫諸事疑則見謀二年拜太子太師公曰皇太子惟立安可先有太師還到中書改大司農公在在太宗世詔孔子五十一代孫元措仍襲封衍聖公卒其子與族爭求嗣為訟及潜藩帝時曰第往力學俟有成徳達才我則官之又聞曲阜有太常雅樂命東平守臣輦其歌工舞郎與樂色爼豆祭服至日月山帝親臨觀飭東平守臣員闕充補無輟肆習臣宣撫東平嘗閔先聖之賢之後詩書不通義理不䆒與凡庶等叛洛士揚庸選孔顔孟三族諸孫俊秀者授之經而學夫禮盍真授庸教官以成國家育才待聘風動四方之美又詳議王鏞亦善士練習故實宜令提舉禮樂庶其歲久不致崩壊皆從之又具奏八事曰舉老成以輔皇子重省臣以振朝網定法制以齊庶政立銓選以轉百官其四如兵衛屯田學校農桑皆所屢陳又具四事保民守信强幹弱枝修内治外敦本抑末子兵衛又申奏曰内地之民不習武事不耐勞苦第可使出財賦以資國用西京北京諸路之民習武耐勞可盡復其差賦充本路保甲屯田使進有取而出有歸可鎮内竊以禦外侮漢軍除守禦内邊可選進勇富强三萬燕京東西分屯置營以壯神都此左右中三衛起本者詔赴中書議事講定條格且勉諭曰姚樞辭避台司朕甚嘉焉省中庶務須賴一二老成同心圖贊仰與左三部尚書劉肅往盡乃心其尚無隱除成與丞相史忠武公奏之帝深嘉納後詔中書右丞相安圖同知樞宻院事巴延翰林學士承旨哈喇哈遜近史天澤姚樞講定新格朕已親覽可行于今卿等聞否亦當一一參改速行其間一二可増損者記録以聞李璮召其質子彦簡竊歸反有迹矣帝問卿料如何對曰使璮乘吾北征之釁留後兵寡瀕海搗燕閉闗居庸惶駭人心為上䇿與宋連和負固持久令數擾邊使吾罷于奔救為中䇿如出兵濟南待山東諸侯應援此成擒耳帝曰若是賊將何出對曰出下䇿三年文統伏誅西域之人為所壓抑者伏闕羣言回回雖時盗國錢物未若秀才敢為反逆帝曰在昔潜藩商訂天下人物亦及文統姚公茂言此人學術不純以游説干諸侯他日必反去年竇漢卿工書累數千言亦發其必為亂首秀才豈盡皆斯人然文統之相參知政事商以挺實譽之至是費寅以九事中時恚忌訟商公為文統西南之朋引陜西郎中行宣撫使趙良弼為徴幽商公上都以良弼多智畧疑為文統流亞械繋于獄㑹遣鄂托克行院成都而無輔行俾省擇人公奏惟商挺可陛下寛其前罪責成斯行遂出而遣之公又入奏方踐阼之初非良弼詗事闗中恐後事㑹寧身負矯擅誅東西川兩帥之罪以寛陛下西顧之憂推是為心忠純皎然安得與文統蓄異志者比臣請質闔門百口必其無他帝悟出之四年拜中書左丞至元之元出省臣三罷世侯置牧守遷轉河東山西河南山東官吏公行省河東山西明年而歸或言中書政事大壊帝怒大降大臣罪有入不測者公上言太祖開創跨越前古施治未遑自後數朝官盛刑濫民困財殫陛下天資仁聖自昔在潜聼聖典訪老成日講治理如刑州河南陜西皆不治之甚者為置安撫經略宣撫三司共法選人以君職頒俸以養亷去汚濫以清政勸農桑以富氏不及三年號稱大治諸路之民望陛下之治已如赤子求母先帝陟遐國難並興天開聖人纉承大統即用厯代遺制内立省部外設監司自中統至今五六年間外侮内叛㫁繼不絶然能使官離債負民安賦役府庫粗實倉廩粗完鈔法粗行國用粗足官吏轉換政事更新皆陛下克保祖宗之基信用先王之法所致今陛下于基業為守成于治道為創始正宜息聖心荅天心結民心睦親族以固本建儲副以重祥定大臣以當國開經筵以格心修邊傋以防虞蓄糧餉以待歉立學校以育才勸農桑以厚生是可以光先烈可以成帝徳可以遺子孫可以流逺譽以陛下才畧行此有餘邇者伏聞聰聼日煩朝廷政令者改月異如始栽之本生而復移既架之屋起而復毁逺近臣民不勝戰懼惟恐大本一廢逺業難成為陛下之後憂國家之重患帝恚為釋五年用兵襄陽立河南行省經理屯田以公僉省八年十覲十年拜昭文館大學士祥定禮儀使其年襄陽下問其事宜公對曰文煥以江淮一使兼上路總管生劵軍縱還熟劵徙之河北皆可十一年初議大舉奏如大將非中書右丞相安圖同志樞宻院事巴延不可七月左丞相巴延陛辭付敕書惟逆戰者如軍律餘止殺掠古之善取江南者惟曹彬一人汝能不殺是亦一彬也既濟江下鄂使至夜召見公帝憂見色曰自太祖戡定天下列聖繼之豈固存之豈久帝制南國耶盖天命未絶朕昔濟江而家難作天不終此大惠而歸今巴延雖濟江天能終此與否猶未可知是家三百年天下天命未在吾家先在于彼勿易視之其有事宜可書以進公言嚴兵守鄂無使荆閫㫁陽羅渡先遣使責負歲帑留行之罪明明年公又言由陛下降不殺虜之詔巴延濟江兵不踰時西起蜀川東薄海隅降城三十户踰百萬自古平南若未有此之神㨗者然自夏徂秋不秋不降皆有軍官不思國之大計不體陛下之深仁利財剽殺是致降城四壁之外縣邑丘虚曠土無民國將安用比聞揚州焦山淮安人殊死戰我雖克勝所傷亦多宋之不能為國審矣而臨安未肯輕下好生惡死人常情蓋不敢也惟懼吾招倈止殺之信不實詐其來耳是用力拒宜申遣公幹官専輔巴延宣布止殺之詔有犯令者必誅無赦若此則賞罰必立恩信必行聖慮不勞軍力不廢老氏有曰大兵之後必有凶年疾疫隨之軍雖不試而民止其半今况民去南畆來嵗之食將安何仰帕手腰刀必倡為亂袒背一呼數十萬衆不難集也雖非勁軍壁山柵水卒未易平是一宋未亡復生一宋又南方官府以情破法鞭背文面或盛竹絡投諸江中又鹽鐵酒酤榷始漢代其後因之不廢今方新附若復徴之人㪚離制曰鞭背黥面及諸濫刑宜急除之而榷酤後議十三年罷昭文館拜翰林院學士承㫖仍詳定禮儀宋平凡其侍從之臣以士子入見者必令見公詢其學行而官之九月享廟拜大禮使明年上以自九月不雨至于三月問可以恵利斯民者公曰糜榖之多無若醪醴麴孽京師列肆百數日釀有多者二三石者月已耗榖萬石百肆計之不可勝算與祈神賽社費亦不貲宜悉禁絶皆從之初公方奏事得疾忽跽不能言帝急命從臣扶出登車至家未甦百日而愈後三年疾再至昏黙三日薨夀七十八京師士夫哭祭如失親戚曰自今帝側圖回天下者豈復有斯人者耶惟僉宻院趙良弼賻俸半嵗而位祭其家終䘮時孤侄燧仕陜西提刑煒獨舉其咎藁𦵏京城東南方墅後十八年當元貞二年五煒煒徙𦵏卜于西洛金門土祖塋别兆于輝菊山之陽公天資含𢎞而仁怒恭敏而勤儉理生惟務本實不事末作未嘗疑人欺已有負其徳亦不留怨胷中憂患之來不見言色魏國公每譽其善于順受人莫可及在京晩屢輟禄雖奉朝請假質劵劑盈束視貧甘心不一出言恃其久故千人聞不足于上有來即請必反覆忠告惟恐吾言之不盡及東筆中書或咎公獨遺門牆故人公曰用人威福當出天子果若賢材烏避不聞其瑣尾者烏敢藉權樹親貧市私恩乎他善衆多今惟表其大益斯世者四其一倡鳴斯道使今天下鄉校䝉童之師猶知以小學四書為先雖戴恵文身為刀筆筐篋之行與非華人亦手披口誦是書求厠士列者往往多然故丞相之制辭有曰徳全天意學得聖傳㫖固有在于斯也再則中土士夫不知為廟作主奉以天祀自公始輝人多化之而祖考妥靈有所三征西南夷為陳曹彬取南唐兵不血刃賛神武以不殺四世祖之淵龍規一幅隕之判裂也請開屯田淮蜀以兵戍之固已起平宋之本及議南伐而難大將又上言非中書丞相安圖同知宥宻巴陵兩人不可宋平又與諮謀其新國圖任其降臣隨有兩王作難海隅當十五年炎燼撲滅而公始薨古以揆之晉羊祜首䇿平吳吳平而身不及見樂毅有曰善作者不必善成蓋當其時自明其身不終所事于燕恵數百年後猶能取必于祜今焉不效于公歟四夫人惟王氏先公卒繼宋氏後公七年卒公贈少師贈吳興郡夫人及公國魯與完顔氏李氏皆從封魯國夫人從公三十四完顔亦卒故三夫人皆祔煒李出今中奉大夫河南北亷使具忠厚清慎有克繼先烈之譽二女姊宋出娣完顔出姊卒娣繼皆嫁為開封府武公中子杞淮東肅政肅訪使妻偕卒孫尚孩嗚呼燧生三嵗而孤公卵翼之不知其蒙闇教督而急其成俾初有聞承乏翰林復世公官恐公事業不能詳盡不敢干他詞臣故惟自述文不過華質不至俚而摭其實焉而已銘曰惟天聰明視聴自民沃天子心啓莫匪臣舜察邇言昌言禹拜稱聖萬世臣何與在粤若世祖方龍躍淵載命徴車遐蒐逸賢即輝起之爰置左右授太子經靡不叩公感一介盡其平生所學與知傾敷悃誠首八事脩身以始親賢畏天愛民以次申以州條捄弊方施治所宜如紀在綱上總兵民工請民去上封國公擇地所征而南詔公陳遏劉上曰汝言吾行優展也神武操既有要天下定一于時已兆移兵戍邊首蜀尾淮免夫春秋剽殺去來汴置經畧秦以宣撫三年其民歌舞樂土治效若斯公于之是一出為猷不為贊彌又從濟江内難方蹶帝遄其歸大統入繼移昔已試施諸萬方帝思舊人台衮用章公拜稽首元良未建臣何力有太師顧先改為大農尋拜左丞申以責難書存可徴南土既平諮謀新國昭文禁林必首見及後聖相承言行其生没為法程謚以諱名既又進加功臣開府莫尊太師莫尊國魯哀榮若斯大書穹碑比其生全千祀可貽董文忠神道碑公諱文忠字顔誠真定藁城人董世不可逺系其考諱俊材太祖以兵略金地由農畝將鄉民萬衆來歸官以龍虎衛上將軍左副元帥知中山府事時太尉史忠武公兄河北西路都元帥天倪開閫真定其倅武仙殺元帥家百口據真定叛而臣金太尉集兄散卒復之仙走壁雙門夜又襲入太尉惟與故侍衛親軍都指揮李伯祐投䟦渉塹奔藁左副聞亂已艤舟滹沱即馬入藁合力再復之仙走壁抱犢旋踰河太宗以太尉為真定河間東平濟南大名五路萬户左副長千夫從追義宗歸徳薄北門而陳左右皆陂澤太尉以無戰地為言首帥薩竒蘇布哈不從而大將蘇布特自汴召太尉計事金縱兵撃没其軍左副死事夫人李氏九子公次居八諸兄鞠友之憲宗即位明年壬子年二十有二始入侍世祖潜藩承㫖王文康公鶚言詩教問公能乎對曰臣少讀書惟知入則竭力以事父母出則致身事君而已詩非所學從征南詔其兄平章忠獻公文炳耻不得從自藁將家僮二百騎追之大軍深入矣路經吐蕃戰而後逹纔餘數騎已未伐宋王師臨江與忠獻率勇士百人乘鵃䑠先濟教遣他將舟師繼之三㨗得敵䝉衝百艘遂圍鄂上正宸極中統之元置符寶局以公為郎後官奉訓大夫居益近宻上嘗不名惟第呼董八亦異數也而公不為容悦随時獻納中禁事秘外多不聞舉所可知如至元二年安圖以右丞相入領中書建陳十事言忤天聽公曰丞相由勲閥王孫夙以賢聞今其始政人方延佇傾耳而所請若是後何以為乃從旁代對懇悃詳切如身條是䟽者始得報可八年侍講徒單公履欲行貢舉知上于釋崇教抑禪乘是隙言儒亦有是科書生類教道學類禪上怒已召先少師文獻公司徒許文正公與一左相庭辯公自外入上曰汝日誦四書亦道學者公曰陛下每言士不治經究心孔孟而為賦詩何闗修身何益為國由是海内之士稍知從事實學臣今所誦皆孔孟言烏知所謂道學哉而俗儒守亡國餘習求售已能欲錮其説恐非陛下上建皇極外修人紀之頼也事為之止君子以為善于羽翼斯文十一年以大師南伐民困供億奏蠲常嵗他名之征後燕見降將問宋所由以亡皆曰賈似道當國薄武人而惟文儒之宗武人怨之故大師至外而疆場内而京都莫有闘志釋甲投戈歸命恐後上問公其言何如公曰似道薄汝而君則爵以貴汝禄以富汝未嘗汝薄也而以有憾而相移怨而君不戰而坐視亡國如臣節何似道薄汝豈以逆知汝曹不足恃為一旦用乎上深善之詔徙大都獵户郢中奏止還貧弱者弛收官鬻田器之税聴民自為以勸本富民會患多盜敇苟犯皆殺無赦所在繫纍充牣犴獄公言今殺人于貨與窃一錢直上鈞死一㫁不屬憯黷莫甚恐于陛下致祥之氣好生之徳多所干傷敇革之或漢人毆國人傷又或告太府屬盧某盗監監布上命殺以懲衆言言今刑曹于囚罪入死者已有司辭猶必詳讞是事未可因人一言遽寘重典宜付有司薄責閲實以俟後命乃遣近臣圖門覆傷公覆監布告毆得誣杖遣之監布葢太府始受端外皆有羡尺適上方工官有需其人惜毀成端㫁以給非身利而為也降㫖原之責侍臣曰方朕怒際卿曹皆結喙非董八啓沃朕心則殺是非辜必竊竊取議中外矣賜金尊曰用旌卿直儲皇亦曉宫臣曰方壓以雷霆而容止話言暇不失次卒矯以正實人臣難能者太府屬摯而泣謝曰鄙人腰領賴公以全公曰吾雅非知子其必拯諸阽危者蓋與國平刑非期予見徳也其返而摰自安圖北伐犯法臣阿哈瑪特獨用國柄盗弄威福衆立親黨懼平章亷布憲復相為防其私表以右丞行省江陵者踰年公奏希憲昭代名臣今端揆虚席尚多不可久使居外以孤人望宜蚤賜環從之十六年十月乙亥還自萬夀宫祝釐所奏曰陛下始以燕王為中令樞宻使纔一至中書後冊儲皇累使明習軍國事者十有餘年終守謙抑非不奉明詔也亦朝廷處之未極其道夫事已奏裁而始啓白為人臣子惟有唯黙避任不敢以命令可否制敕而已以臣所知曷令有司啓而後聞其有未安㫁以制改則理順而分不踰必不敢辭責元良矣其日盡前省院䑓臣将百人上面諭曰自今庻務聴皇太子臨决而後入聞尋語儲皇以八宗植國本者其識勿亾禮部吕昌元請立門下省封駁制敕以絶中書風曉近習奏請之源上鋭欲行之詔庭臣雜議怒承㫖少保王文忠公磐曰如是益事汝不入告而使南土後至之臣言之用學何為必今日開是省庭臣三日始奏公為侍中兼其屬多至數十人其臣弗便也入言陛下將别置省斯誠其時得人則可寛聖心以新民聽今聞盗詐之臣與居其間言多目公公恚辯曰上每稱臣不盗不詐今汝顧臣而言意實在臣其顯言盗詐何事上出奏者公猶愬不止且攻其賊國之姦上曰朕自知之彼不汝言也然終忌公得君清慎無過莫可指以為報者乃以楮鏹萬緡為夀求歡擯棄不取忠獻公卒官中書左丞故太傅巴延公表其可相上使嗣為公曰臣兄有戡定南土之勞位是則可臣暬御居中宣何力焉而可嗣為十八年陞局為典瑞監郎為卿官以正議大夫俄授資徳大夫僉書樞宻院事卿如故始不從蹕留居大都儿宫籞城門直舍徼道環衛營屯禁兵太府少府軍器尚乘等監皆領焉兵馬司舊隸中書併付公將權臣累請奪還中書不報始大明殿皆資遼右浮海濕材有司急其成功遽丹漆之不能十年叩之皆抨然中空為抽二十餘極比乘與逺壯加其舊是冬十月二十有五日雞鳴入直忽踣家庭氣息奄奄上遣中使持藥投救不及遂絶傷怛不已猶覬其息敕勿速斂五日乃匶且知公圖書外無他居積賻錢數千萬儲􅀢等是以十月六日歸𦵏其鄉髙里先塋從始至終實三十年征伐蒐田無地不從凡乘輿衣服鞶帶藥餌大小無慮數百十橐靡不司之中夜有需不湏燭索可立至前風雨寒暑饑渇駿奔心無怠萌口絶勩語屬屬乎惟以執事不恪獲譴為懼故能滋久眷寵彌深上中嵗多足疾一日樞宻院奏軍務上卧晝可公在御榻枕扶而跽比終奏日已移晷屏氣肅肅曽不流盻他日院臣言始吾以公居中而逸烏知其勞如是在他人不可一日彊志勉力為者何可幾及何可幾及公曰君所見特是時吾固日雞一鳴而跽燭入而出後或長直四十日不至家夜雜妃嬪候侍休寢榻下上呼之方憊熟寐不應命妃蹴興之妃不敢前上詈曰董八誠愛之専敬慎之至事朕踰父汝以妾母蹴之何嫌而為是拘拘其感孚聖心得是見與有舉一世億萬維人所未能者為臣則然其在家出門弟弟敦宗賢賢信友淵毅而明炳遜恭而易直倫理之間人文粲然元臣故老奉朝請者上所存問及有欲言皆由公傳達權幸不敢讒危之及是則皆出涕几筵曰哀哉若人曽未終夀而不淑自兹君側失正人矣一貴戚獨曰天乎世無吾曹千人誠不加少而奪公歸耶下至傭人販夫亦失聲投業後二十有一年當大徳辛丑今天子言念其功贈光禄大夫司徒封夀國公謚忠貞配顧氏從封夀國夫人聖語褒揚六珈増麗男五人士珍中書省㕘知政事某以門功令保定之曲揚某内供奉某未仕女三人長適太尉子中書左丞彬中蚤卒季適中書左丞張公子集賢大學士某男孫五人未仕女孫六人長由其姑歸史氏故又適左丞子某餘㓜在姆士珍將銘墳道持遼陽行省㕘政王公思亷之狀逺走江東而以訪燧義有二焉一以其伯仲父忠獻與故㕘知政事翰林承㫖文用與公由先少師儲邸舊學命之不官必曰先生一于燧嘗同受學司徒文正公且與今忠獻子其兄江浙行省右丞士選相好實再世契奚言而辭銘曰在易六位以爻居四上承五君多懼之地於皇前聖與天巍巍神明其變雷霆其威公三十年日侍帷幄出入起居不辱于數初匪智計其身包周臣職克脩敬慎無尤天府其觀曰郎典寶其自任重引君當道不剛悻悻不柔容容揆義為中闕焉彌縫或攻聖學異教之似公曰其言皆孔孟氏彼去其實務華詞章為利達資何闗倫常足明其心斯道力衛展與朋黨弭禍于未父子之間進説多艱庶政既先國本泰山其入告内無是為大他随事陳罔遺于外其非廷尉獄由平反施今必臧等乎納言姦窳滔天庭伐其慝雖未即誅中劇矛㦸黄髪番番致臣而家嵗時存問天語柔嘉晚書宥宻瑞監仍柄何天不弔年過知命前聖終之賻以送終嗣聖功之追爵上公人臣寵光至是焉極矧子廊廟清劭執徳無石維年竹帛豈夷頼乖体聲其以是詩牧庵集卷十五
