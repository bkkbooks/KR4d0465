body:
  text: 牧庵集卷十四元姚燧撰神道碑平章政事蒙古公神道碑燧持憲節使江之東三年當大徳癸卯光禄大夫上柱國江浙行省平章政事公之三子山東宣慰使罕都與江東建康道肅政㢘訪副使巴圗及行河南省參知政事額森特穆爾譜其系状其事以請曰先公三宿墳莽矣其忠以事國孝以䋲家光大而雄偉者不及今焉鑱之金石将日逺日㤀奚以示遺胄于無窮敢屬筆子燧以與憲副聨事此道義不可辭乃序之曰公蒙古氏諱博囉罕輝和爾公之曽孫扎木和拉公之孫扎固和托公之子始輝和爾與兄威伊特俱事太祖時岱酬盛彊威伊特謀往歸之輝和爾苦止曰帝何負汝而為是竟去追之不復雪泣而歸請獨宣力帝貳之曰汝兄與衆皆往獨留何為無以自明乃折矢誓曰所不終事帝者有如此矢帝感其誠易名希禪約為諳逹葢明炳幾先與友同死生之稱帝後與王汗陳于哈喇展彼衆我寡敕烏嚕一軍先發其將敏珠爾丹玩鞭馬鬛不應希禪請曰戰猶鑿也匪斧不入我先為鑿諸軍斧継顧帝訣曰臣萬一不還三黄頭兒将軫聖慮者辰入疾戰大敗其軍晡猶逐北敕使止之乃旋師免胄為殿腦中流矢帝傷之曰朕戒卿蚤休兵竟創而歸親為傅藥寝與同帳逾月而卒帝曰曩濟勒錦為敵将實禦希禅其以濟勒錦民百户属希禅子世世嵗賜勿絶其族散亾者收完之即封北方萬家太宗以其子蒙古為郡王又俾貴臣呼喇呼大料漢民分城邑以封功臣割泰安州民萬家封郡王歸奏帝問蒙古之民何如是少對曰臣今差次惟是太祖之舊舊多亦多舊少亦少帝曰不然舊民少而戰績則多其増為二萬户與十功臣同為諸侯者民異其編烏嚕争之蒙古舊兵不及臣半今封顧多于臣帝曰汝㤀而先玩鞭馬鬛事耶後諸侯王與十功臣既有土地人民凡事干其城者各遣断事官自司聴直于朝公年十六為㫁事官世祖正宸極以從攻叛王額勒布格功賜其軍騬馬四百匹金銀幣帛稱是尋詔入宿衛曉近臣曰是勲閥諸孫從其出入禁闥無輙誰何李璮反詔将蒙古一軍圍南鈔益都萊州賊平決獄燕南南人稱明允賜衣一襲雲南王呼格齊為其省臣巴哈丹輩毒殺事聞敕中書擇可治其獄者凡四奏人皆不當㫖丞相希札舉公且言敗事臣請從坐帝曰之人則可公曰臣不愛死第年少目不知書帝曰朕方恃卿求皇子死尚書拜特穆爾知書惟可使之簿責其事是否一委自卿明日慎無歸咎輔行也且聞卿不善飲彼地多瘴宜少飲敵之未至四五驛所巴哈丹遣人負金六籯來迓公曰雲南去朝廷遼邈省臣握兵不安其心将懼而變乃好為語遣之既至盡以金歸省而竟其獄得置毒情殺之而還奏可顧希札曰卿舉得人賜兼金為兩五十武備寺奏令入筋角惟蒙古以時夥于常嵗帝曰其報賜之自今凡蒙古事無大細如扎拉爾事統安圖者悉統于博囉罕八年授昭勇大将軍右衛親軍都指揮使虎符大都則專右衛上都則三衛兼總十一年授金吾衛上将軍中書右丞大師南伐分軍為兩制曰其右受巴延阿珠節度左悉委卿指一犯法臣曰如博和哩黙色朕不責也俄授兼淮東都元帥軍于下邳公策諸将曰清河居宋北鄙城小而固與泗州昭信淮安實相掎角當水陸衝未易卒拔可頓大兵為疑海州東海石秋違此數百里其守必懈吾将輕兵倍程而東其守臣可襲虜也師至海州丁安撫果下石秋東海隨下清河史安撫聞之亦下一月而下四城宋主既降而江淮東諸州猶城守故太傅巴延入覲還宻詔公進兵㧞淮安南堡戰白馬頭又戰寳應棄髙郵不攻由西小河達漕河據灣頭堡断通泰援竟拔揚州斬其制帥李庭芝淮東諸州悉下賜西域藥及蒲萄酒介胄弓矢鞍勒㑹分江南之州隸諸侯王及十功臣又益封公桂陽州十四年遣平叛王珠爾噶岱于應昌賜玉鞶帶幣帛與博囉罕同署樞宻院事未乆授北京右丞既至召還㑹南土多反者詔募民能從大軍進討者俾自為軍其百夫千夫惟聴其萬夫長節度不役他軍制命符節一與正同已行矣公疾不能自陳令董司徒文忠入言今有日所出入勝兵何啻百萬何假此曺無賴僥倖之徒以壮軍威臣恐一踐南土肆為貪虐斬伐平民妾其婦女槖其貨財民畏且仇反将滋衆非便召輿疾入帝視其色瘁然賜坐與語重陳董奏可之適常徳入朔唐古特一軍殘暴其境如公所策敇斬以徇諸是軍皆罷之十六年哈喇蘇博囉蘇烏拉罕蘓哷肯皆强宗也勢不相一求遣大臣來蒞詔令公往凡居是三年十八年以右丞行省甘肅時大軍駐西北仰哺省十數萬人自陜西隴右河湟皆不可舟惟車輦而畜負之塗費之夥十石不能致一米石至百緍公經畫得方供億不乏賊不敢窺邉者二年二十有一年授龍虎衛上将軍御史大夫江南諸道行御史臺事黄華反徴内地戍兵進討未能平賊多奴良民以歸公令監察御史提刑按察司隨在糾覈皆土還之以疾歸㑹諸侯王納延反帝欲自将征之公曰始太祖分封東諸侯王及矦其地與户臣始知之以二十率之彼得其九蒙古烏嚕札喇爾翁吉喇特伊竒喇􅀈五諸侯得其十一彼力滋多吾亦滋多吾有衰耗彼亦衰耗然要其歸五侯之力終多彼二惟責徴兵五侯自足當之何煩乘輿臣昔疾今愈請事東征制可賜甲胄弓矢鞍勒命公董是五諸侯兵以行與納延接戰屢摧其鋒再與其黨一王塔布岱戰淫雨不止軍以乏食求却公曰兩陣之間勿作事先已而彼軍先動公悉衆乘之逐北二日身中三矢禽塔布岱斬和掄輩後與伊囉勒太師合力始誅之賜銀為兩四百五十幣帛九不再月其黨一王哈坦復叛公再請往詔與諸侯王奈曼討之公狃于屢勝一日不虞賊以游兵卒至止從三騎返走有壑絶前廣二丈深加廣半追兵且及獨公策馬能越三人後者皆見殺人以為天相忠義後逐北極于東海之壖哈坦自引去獲其二妃斬其子拉塔于陣凡戰四年所俘金銀悉散将士以故人致死力賊平敕一妃賜奈曼岱一妃賜公陳金銀器延春閣召東征諸侯王及公至将分賜之問公汝家是器幾何鞶帶有無公曰以陛下威徳奉身之物亦畢備矣帝曰朕出此物本酬卿曺之勞在人則伐其能以幸多取朕問猶曰既有可謂謙挹不眩于貨者豈令其徒手歸姑賜是器五百兩二十八年改河南宣慰司為行中書省求可首是省平章者凡三奏皆不允末乃及公則可授榮禄大夫平章政事淮鹽為引嵗六十五萬前政多逋至公如額而集賜異幣一開封監縣特穆爾告廉訪使胡某不戢其民昏集曙散縣簿陳勣置廵屋器械于村又周劉光店為墻四其門扄鐍司亱出入詔公按之皆誣杖而徙戍南邉後詔天下括馬不當及公等之家公曰吾家有馬羣連郊坰不思佐國無以為方三千里官民之倡其入騬馬十有八匹河水遷流無常民訟退灘連嵗不絶或以其地投獻諸侯王求為佃民自蔽公奏正之仍著為令河後泛濫堤埽横潰歸徳睢州汴梁水及城下漭為巨浸公親行視督有司捍完之皇上元貞二年遷公平章陜西未行而改復為河南入覲奏蒙古一軍戍北嵗乆衣率故弊請以臣泰安州五户嵗入絲一斤積四千斤盡輸内帑易為匹帛分賚諸軍上以為善敕逓車送達軍中賜銀為兩百五十幣帛三陛辭之日上諭之曰卿今白鬚世祖徳言實足聴聞事更加慎中書平章喇勒智宣政院使大食蠻合奏始者伐宋世祖分軍為兩右則屬之巴延阿珠左屬之博囉罕今巴延阿珠皆有田民而博囉罕獨無可後上曰何乆不言豈彼耻自白耶其于淮東所嘗戰地髙郵已籍之民賜五百户以上中下率之上一而中下各二及圈背銀倚比再至汴踰年凡流外官乆滯不銓旅食道宫者旬月皆出之大徳之元叛王永和爾烏蘭布哈來歸公遣使驛聞始是諸王叛由其父是輩小弱若無與知今焉來歸𡨕棄前惡以勸未至上曰是奏深契朕衷改平章湖廣賜金鞍勒至汝寧合福建省于江浙授公光禄大夫上柱國江浙等處行中書省平章政事賜白玉帶夏旱隨禱而雨杭之豪民十家入賂于官大為醸務髙其估而專其利酒日醨惡公變其法張省四凴其富畜凌轢府縣肆為姦利自刻木牌與交鈔襍行民間實侵貨幣與國爭利又盜隄海之名墻其私居公欲斬之而中書刑曺當以杖然亦由是大姓始重足立矣以大徳庚子五月二十有二日薨于臨安寓舎年六十有五以其年七月八日葬于檀州西北太行山不封最其平生典兵則右衛都指揮使都元帥樞宻院風紀則御史大夫宰相則三為右丞四為平章與夫四十七年馬足所及西南雲南西北金山東北海隅東髙句驪東南呉閩再討叛臣四征叛王其間事平而疾聞變請行惟以有國艱虞為憂視轉鬬乎萬里之逺厯嵗之乆若堂奥之朝夕焉雖風雪皸瘃其膚鋒矢交集其躬飲食飢渇不時其口體皆不避恤必致宼首戲下歸報終事而止真凛凛有曽考風上尤眷重之若世祖身御櫜鞬弓矢皆百世傳寳不以賜臣下者惟以賜公海東青雜骨先朝多或十賜惟至白鶻觜𤓰玉如聖語曉曰是禽惟朕及鷹師所鞲以卿世臣諸孫宣力之多日桑榆矣無以娯心河南治地平衍而逺且多陂澤鵝鸛所集時出縱之使民得見昭代春秋蒐田之盛不敢萌啟邪心皆殊鍚也夫人某氏男四人宣尉憲副參政季博囉公于廷臣居家最名有法夜分不寐諸子列侍其前聴談祖宗故實母敢或歸私室宴奉樽爼迭歌舞以娯賓亦無有酒失者女六人長適國戚巴拜次適色徹肯平章子僉書樞宻院事諤勒哲次適國王弟布哷齊次適伊克徹爾太師弟克哷楚次適山東宣慰使璸匝雅幼在室銘曰皇矣太祖肇造方夏右之左之惟十臣者公之曽考展一其中矢矢瀝告帝視友同敵陳來加抵戈以出大崩其軍免胄而入五兵之長無矢不仁懋功是創由賊叩輪帝惻其心百俘償死顧成嘉止既王其子迨分茅土帝自等差國以泰安二萬其家公祖王季勤勣克類再傳而公世祖之事勲閥遺苗帝植以培而獨于公嘗譽其材聴于禁闈無止入出翼翼其心彌謹自律隨遇而公利患靡干承命即往奚逺奚難東北海隅西南六詔甌閩炎陬金山遐徼聞有難虞必請赴趨大獄叛藩無一漏誅人臣憲憲曰省臺院平章大夫宥宻鈞踐先聖今聖賚予優優良史天閑豪集御鞲櫜健介胄鞍帶衣裘黄白之金委家如丘皇矣太祖于疆于理惟公曽考實成其始遺厥大艱畀之神孫神孫世祖闢乾翕坤考其皇與南北猶判孰是浙右羸鬼歆祼大興師征嶻嶪百城罔不簞壺竭蹷義聲傳其國都孱主銜璧蕞爾淮東諸州猶壁詔公進攻盪殱渠兇九域攸同公焉成終将天之意悠悠或在成始之孫宜際斯㑹益封桂陽江嶺外内于乃先烈克光以大嘗聞古先誓侯功臣泰山如礪國以永存嗟公王孫國泰山下權輿礪如其自今也平章政事徐國公神道碑公揚珠濟逹氏諱徹爾曽祖塔齊爾初將突騎百夫宿衛從太祖戡定中夏又􅗴平宋彭義斌俶擾山東太宗分土功臣由徐邳再刳于兵户不足萬故國以兩州祖納呼憲宗伐宋師由蜀入從攻合之釣魚山戰疾力考竒嚕俱監其國以世祖建極中統之元庚申夏五月十有二日生公六嵗而孤母夫人富察君介介自持動以禮節親戚不敢干以非義教子讀書天貭粹美不勤外𫝊六經二氏悉涉源委以故聰明開益日多才畧兼人恒以匡君經國自期至元十有八年軀幹盈常襲其祖衣長不能勝則知其先益魁傑也其年入見帝賜之問而竒其對進侍帷幄湛露龍光汪濊涵濡絶其等夷時詢民情細微敷告無隠一諸侯王稱兵東北帝自将征入其地矣軍中夜驚公出撫遏人識言音喧咈一寂跳梁既平為奏兵餘之民艱窶剥膚不賑恤之将不生活敕賜穀帛牛馬脱寒飢者無慮數十萬人歸擢利用監古武庫也匪簡在帝心人者不以付之二十有三年詔求逸遺于江之南且省其俗時相方急治賦鬻民學田官有其直令既行矣公則止還諸學用為完廟養賢之資歸以事聞制甚嘉可明年僧格分中書庶務立尚書省初為平章後為丞相凡昔盜殺臣為領部為制國用使為尚書省所逋錢粟併歸中書舉誣為中書失徵殺其二相大為計局鉤考毫釐諸省承風鄂省已劇浙省尤酷延蔓以求失其主者逮及其親又失代輸其隣追繫收坐岸獄充牣榜掠百至或闗夫三木責妻市酒以償民不堪命自經裁與瘦死者已數百人虐熖熏天諸王貴戚亦莫誰何無不下之獨公奮然數其姦賍帝初未然益犯威顔言色俱厲帝以為醜詆大臣失幾諌禮怒遣左右批其頰辯不為止曰臣非有仇于彼而然直不忍其罔上自私敢因雷霆一擊遂爾結舌使明帝有不直言之名臣實憤恥帝意始解命将衛介百人控鶴倍之入籍其家得金寳衍溢棟宇他物可資計者将半内帑罪既彰白始鈐其人諸繫計局者皆出之又命籍黨惡浙省諸臣平章左右丞參政烏瑪喇黙哷實都王濟等家併僧格之姻鄂省約蘓穆爾皆醢以謝天下以成其獄凡四過徐不入其家為帝所忠怒御史臺臣不善瘅惡坐觀政紕其自當汝罪皆曰奪職追禄杖三者唯命江浙平章夙有怨于臺乘其慿怒自傍激之謂湖北廉使功臣諸孫盗燒鈔八百定堂帖二十下容姦數年贓終未入抱案帝前示曰稽是可也誤裂卷為兩縫留半印公曰縫用印者以杜罔欺汝為宰相持半印案以訟人餘半烏在其人言塞帝顧罵而起臺誣始釋明日拜御史中丞無幾時拜榮禄大夫平章政事行省福建賜為兩金五十銀五千令行禁止民便安之惟汀漳劇盜積嵗未平公身為諸戍之兵申明約束不貪勝不蹂禾稼不入民舍惟張皇武威過栅不攻示以整暇晝則合圍山中夜則税野偃旗仆鼓賊或偽降覘其何為乃豐酒肉飲食曉曰汝昔由不堪汙吏侵暴潛迯居此能棄險而還耕桑則平民矣吾安忍被汝反名而加誅夷寡人之妻孤人之子獨人父母而利其財悉縱歸之他柵聞者相率以出其渠鄂特新日戩南奔大兵隨之偷生隝中其黨縳致于軍血鋒刄者纔是一馘自是方三千里枹鼓不鳴正席其堂畫諾而已聞帝不豫馳歸京師嘗藥晨夕俄然賔天與諸侯王大臣定策禁中遣使逆成宗龍庭入踐天位大徳之元拜江南諸道行御史大夫一日召其都事賈鈞今參議中書者謂曰明詔責使肅清宣明風俗教化而刀筆流為御史者肆為苛虐惟急徴贓以多為功至廹子證父妻證夫弟證其兄奴告其主敗風教者我實行之汝宜以是出訓其屬帝聞之以為得職風紀大體㣲意柏臺七年改浙省平章政事其治如臺門無私謁以轉粟京師多資東南居天下什六七而松江填淤嵗久富民利之當水出塗築為圍田以故瀰漫浸灌沮洳廣逺民不可稻公發卒數萬浚決疊石堤之𨗳水入海使復其故凡身董役經時而成民得良田若干萬頃至今賴之九年召入平章中書贊右丞相専力一心燮和庶政希致隆平纔一暑寒責右丞相曰方帝不豫而乃阿中專政吾誠不忍汝見敗國以䘮元也遂疾不出以十月十八日薨年四十七立朝之士在野之民齎咨咸曰古人有言昊天不弔殱我良人矧鉅臣哉葢棺之日最其家楮緍不滿二百而債劵積多至十萬大臣清貧無公比倫足昭炳白樂施為仁不富之實官給轊車始克歸𦵏于徐邳岠山之陽前夕兹山列炬如晝人則以為公之營魄結為光耀以助臨照之祥既貴顕矣妣夫人杖之受不敢迯其孝又何如也後公薨之三年當至大之元制贈推忠守正佐理功臣太傅開府儀同三司上柱國徐國公諡忠肅嗚呼今聖不㤀哀而崇之所以為人臣下賁幽墟可謂竭盡而無餘矣銘曰維昔大帝立極之嵗人生是時不億其麗何獨于公光嶽氣鍾娠是元臣豈億所同加敦詩書聞見開益甫踰弱冠帷幄出入于狩于征無逺不從靡夕與朝勤不懈恭天寵之承其言易直衮闕可彌慿怒安卹大沃宸聰盡殱孔壬于福平章百其贈金汀漳夙盜知公來臨投其殳斨耕鑿謳吟成宗繼序曰秦漢下御史大夫丞相之亞俾行南臺不專䋲愆體仁德音風教是宣移平章杭先民所急浚通松江壞防巨室中書平章曽不嵗餘責右已相阿中速辜行馬施門用示不出憤疾以忠救時望失将窆徐方岠山之陽貧僅能歸其清益彰嗟兹九土奠自神禹岱宗巖巖北徐為襟其帶伊何淮流在南今其疆理蹙乎古始河齧彭城其水瀰瀰初公曽祖以佐運功雖國是徐猶爵未崇於皇今聖公德之令哀蚤隕祚上公是命既土既爵傳子而孫帶礪山河國以永存徽州路總管府達嚕噶齊兼管内勸農事虎公神道碑李氏國凉為宋金西北陲患三百年太祖徂征猶傃天戈以故多取殱夷烏訥城帥實與宋臣戰死惟戲下鈐部官穆蘇和拉由首出䧏獨全從帥子惟忠則贈銀青榮禄大夫平章政事諡武愍公恒之考𨽻分土淄州諸侯王王多其氣貌異倫精藝騎射能諭説他國言為漢言如周象胥氏教以為其國軍民總管從征淮南年七十二卒二子長則公諱益曰古人以王父字為姓我其法之我先人諱中其取一言姓遂虎姓未冠教參其國萬户府謀議李璮反盗據濟南詔徵諸道兵誅之公在王國軍中分城長圍㫁其遁塗七月而罪人投首以軍諮勞賜廐馬鞍勒衣服甲胄弓矢白金為兩五十後命于朝官以承事郎知萬户府事用兵襄陽王國軍亦徴公在行中復城長圍不釋甲六年當至元十年其守帥文徳始下明年詔故太傅巴延以中書右丞相督圍襄諸軍濟以新籍之兵南伐既渡江分兵五之一留故中書左丞相阿爾哈雅時以右丞戍鄂大軍次浙西右丞相徇地湖南詔虞兩軍相距懸邈無以應急緩俾武愍公時以左副都元帥将是軍徇地江西公在行中從破劉槃熊飛呉浚張文虎文天祥諸軍下江西州七閩中州三廣東州十四䕶送纍臣入覲凡所詢軍旅事機陳對皆可官以中順大夫監龍興路是州為新造之邦而宋餘孽兩王改元海中遣問四出官誅故臣在在起應蜂屯蟻附左剪右攘數年未平獨公善威讋而信柔之一境肅謐及陞帥府為省滿秩省以其民安公聞制留再為凡監龍興五年移監撫州路始以日本之師繼以交趾之師供億百萬一令之下急踰星火動裁以失軍興法其事之集獨先隣路省喜利臣復大加鉤覈既徴于書又煩為條約使利自實有牟于民而冒出于官者皆責償之自以為功而媒貨其門鮮有不入罪罟者公獨完潔無絲毫得凡十年移監袁州路三年改監徽州路皆位總管上撫陞中議大夫徽陞少中夫夫袁徽州皆兼管内勸農事滿徽而歸連牧四州天訖宋命㑹其成功受任先朝洪撫袁徽連牧四州服三品服人臣願欲而不得者身享有之餘二十年可以止矣豈如他人上覬将相以致敗耶過汴慨息曰吾祖世官西河之壖吾考寓墳東海之濵是邦去洛而邇亦地之中于是為家可以西望吾祖東望吾考遂買田休居以大徳三年辰在己亥十有一月二十有八日卒年六十三夫人楊氏嚴于内治閨門截若男二人文煇文煥女三人長適武愍孫今湖廣行省左揆世安子利用監某次適池州總管府判官隋載子某幼姆始公之卒弟儀哭曰吾兄不滿年格果于遺榮期以自樂于日薄山西也曽未中夀而遽已是我可不念其拓境之艱成家之難以厚其死乎凡䘮𦵏須吾力能及不必出兄之家既墳請左揆曰乃曽考帥烏訥城我先人其鈐部官兄從戎淮漢江閩又惟乃考先正武愍是從今以男女故託姻里聞公有所善翰學嘗詩武愍麗甥碑者幸為吾丐銘于以掲今而訊後死而有知骨不腐矣故左揆走書見懇曰儀非直克弟加善植業同里有貸黄金二鎰者死曰吾可同俗訟其妻子與見知者必其歸耶裂劵火之又能以禮律至里門則捨馬而徒其為人槩是宜若不可拒者燧曰嗚呼世有兄夷牀未寒已利奪其財于嫂姪手遑恤夫葬與銘聞儀之風亦庶可少愧矣况兼是數美誠難能也故附書之儀由将東諸侯王射士制官承務郎提舉崇明州塩場今領天后位之民夫人四其亞趙三子文郁文燦文炳銘曰嗚呼維公少而即戎與齊長圍平賊内訌先皇賚之騕褭以乘雕弓貝胄華衣晝映繼兵㐮陽荷殳于中既下明年大伐是從分戍鄂省皇旋有命大師及呉江右靡定移武愍軍往徇于洪從收閩廣狼烟一空馳以入覲山川形勝軍民休戚隨問隨答言悃而忠沃星宸楓曰洪汝牧虎節以庸公既戾止嚴威信令植柔鋤强敦皇齊聖滿考再為隣盗如蜂獨其境敉郊農市工移無十年其事始盛倭征交征一食日併海艘督造陸水仰供彼婪婪徒私先後公涅入淄出官刑忘鏡紛紛觸禁如獸投穽噫哉維公克潔其躬移袁移徽一其初終六秩言歸時寵絶兢如車善柅撃節月評平馬夷山突如防封于阡表之有碑穹崇載銘其陽其烈足證其來後昆其賴其慶牧庵集卷十四
