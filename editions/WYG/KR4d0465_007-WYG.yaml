body:
  text: 牧庵集卷七元姚燧撰記江漢堂記江漢南北之限也三王之徳之封建嬴秦之力之郡縣漢氏則曰吾王霸雜兼封建郡縣而犬牙之是時無有裂幅員而自帝者殆漢始有之徳不能以相髙力不能以相卑雖皆畫是為守而帝南者直不能北有尺地藉以一天下能一之者皆自北而南也故呉自帝晉平之宋齊梁迭自帝迄之于陳隋平之宋自帝我元又平之豈江漢能限世道之否不能限天運之通與嘗合二代而觀之以皇上之冠古無倫晉武隋文何人斯哉然非有君無以開其功非有臣孰能成是功古今人不相及而謀或一揆隋臣不道也晉羊祜首䇿平呉呉平而身不及見武帝追念其功封其夫人萬嵗鄊君于太尉忠武史公其事差似盖公自事潛藩嘗使經畧于汴縂兵十萬屯田千里不専强武而恵信是敦耕商之民錯行其疆不相賊殺有獲俘亡皆生還之雖隣國臣亦許其自負羊公者無慚徳焉于是當曰江漢固已張吾雄噬南紀之本皇上踐阼又以四聖元臣丞相忠書燮和雍熈者十有六年方將百萬之衆南伐至郢而疾詔他將専制而還公于軍其詞若曰畫翦宋䇿汝也成功而疾汝俟何言誠有不諱俾汝之勲班汝之爵予不可必死者之知能知之者非人與汝子孫耶四海聞之以皇上歸平宋公于公之生已賢乎思祜于死及薨有今贈諡又詔其元子格以􅊭章政事行省湖廣季子彬宅端揆于中皆相繼薨又詔中子杠為中書左丞行省湖廣孫燿以平章政事行省江西視封祜妻萬嵗郷又何以如也左丞今至無第于鄴完官屋于居謀名其堂燧應曰曰新堂也非專晝訪而夕修必将嵗時奉嘗太尉其鋪張勞庸揚侈蝉冕報皇上而歸美必文為聲歸之笙鐘侑其利成為詩之名舍曰續江漢者他宜無稱于以格其精神魂魄乗雲御風陟降在庭必懌然曰始為吾室比此千里于時未踰江漢也後數十年吾子乃能尸祝吾於江漢庶其善承先志哉漢祖之誓功臣曰黄河如帶泰山如礪國以永寕爰及苖裔今由河而視江漢曽不得其三一河誠可帶江海猶當為襟計将來及吾苗裔者或終古而無究也必容與依歸不是去焉公曰記之吾思不及者公字柔明以至元壬辰下車人見其不儉不及不豐過中恢乎有容屬屬乎敬坦以明也相與以為託太尉遺體而得其遺風詩曰雖無老成人尚有典刑其嵗嘉平庚寅胐記奎章閣記臣嘗官外每聞詔下惟諭行省院臺行慰亷訪轉達三司與司軍民之官讀已則還之中書或掌于行省院使亷訪轉運而宣慰與職民者省治之職軍者院􅎔之故惟受其成文以行無有所掌三司中宣慰班最髙諭所及者猶無所掌况提舉學校五品居職軍民官下其受成文以行無惑也然其治必居宣慰亷訪所治府州教官聴其約束者其地與二司等此實世祖建元後故事也二十五年始方降詔復江淮多士力役俾一提學自掌其一由是師生鼓舞相語以為平日諭所不及一旦與行省院䑓亷訪轉運者同有是掌卑于名而尊其實其勢反若居宣慰職軍民者上自十三年􅊭宋後所無北方人士聞之曰是豈獨無平宋之後列聖兹降所無實興起斯文萬世之成規也今上皇帝當宁首致意扵學校為分降訪如世祖又加宻焉其宏綱曰聖人之道垂教萬世其目則還正貢荘學田為釋奠養老完廟與師生之廩俾有司舉其才徳亦一提學自掌其一江西提學臣王謙亨龍興教授臣葉聖明相與謀曰至矣聖祖賢孫之恵逢掖也復其力役既富之還正學田以廩其師生又教之俾有司抜其才徳又庸之士生斯時何其幸哉觀今掌詔者多随印所歸秘之私家其完是六經閣表曰奎章鏤櫝而丹髹之錦韜而金鐍之職教之官日夕番直其下庻以逺䙝而少致崇敬亦小臣報上區區萬分一也請諸省臣省臣曰宜俾臣為記臣聞虞夏商周四代之書曰典也謨也訓誥與誓命也其為體者六詔有其五焉曰尚書所請近于謨誕播多方鈞乎誥為法将來則訓俾職教臣恪以持則命先儒謂二典者册在丌上尊閣也今是重屋上以除風雨下以逺塵濕既翼矣金匱其上豈不加盛于丌孰曰非典也耶表曰奎章敬以侈二聖作之君師之錫且風厲是道方千里之士使人人自飭責成徳達才于躬云南平樓記天下有形便之地如衣之領身之項也在戰國時秦函谷齊即墨韓宜陽魏馬陵趙井陘燕易水我守之足以為國敵有之踵不旋國随以亡方地千里且然况楚之襄漢為南土六千里東南兩際海可出戰以入守之領項乎晉羊祜之規以平吴梁蕭野之資以襲齊無不由此者也其甚惜者當顧成廟襄陽下矣守臣百人歌謳思歸棄而弗戍使宋竊築闢荆制圍因唐莭度牙城南門為雄樓扁曰山南東道恃為北鄙以扞天刑豈彼炎趙九鼎時未淪泗耶世祖潛藩嵗壬子炭置屯田千户府于鄧後易為都督府又易為統軍司戍兵積榖與襄掎角凡十五年廼大集天下之兵又長圍六年而下之其明年詔故太傅巴延公莭度圍襄諸軍而濟以新師南伐比其啟行尚下申令斯樓旬月亂漢而南浮江而東瀕岸之城迎下恐後雖驚風之槁葉若瓴水之建髙屋有未易以踰其速者宋社既墟循本以求髙觀而思則斯樓其南平之基乎後為戍守故萬户楊侯珪奉之治事其上嵗久檐傾榱腐人之過之必仰視鞭馬疾馳惴惴然瓦木之擊軋嗣侯萬户顯侯謀新之賦竹石木瓦一軍或勸其聼省命或以為役大作衆非盡嵗成功不能或教小易故敗無大擿修則應之曰事所義為奚省之白吾一軍三抽其一可不再月而落且材已集為苟完計贏将安施分有之乎就省罪其擅興吾不能為請身任之不以累諸君也副萬户張侯塔塔尔岱亦以為然從而鼔舞之不盈一月而㫁手嗚呼果哉大徳蒼龍辛丑端月丙午兩萬户侯觴賓其上酒酣余起謂侯曰是扁山南東道者勝國之臣所書豈堂皇巍煥之吾元可仍夫人之舊稱乎其易為南􅊭樓兩萬户侯跽受曰甚善遂酌酬而椘歌曰翳南土之幅員兮實三甲子焉于兹世祖自其龍潛兮肇豐屯于漢之湄夜火鼓之千里兮晝萬耦其耘耔蓄威武以積嵗兮乃大濟以天下之師三進夾寨而薄隍兮踰五稔乃下之制曰乘勢可逞志兮亦猶鎡基之待時前太傅假以黄鉞兮即襄陽其禡旗将師景從紛若雲兮矕龍虎之陸離曰受誓于斯樓兮義聲先路而交馳齊千萬艘以鼔棹兮江永之不可方思彼孱主知不能國兮組靣縛而頸縻思就是振古之功兮太傳固命世之雄竒匪世祖之祖明兮混庭臣黽勉其疇知緬今在天之靈兮猶臣都而君咨曰授坤輿于今皇兮克玉執而盈持來萬方而臻百瑞兮如舜恭已而衣垂誶曰太史生斯昭代兮亦井坐而天闋乏求金馬碧雞之才兮歌樂職其或宜南書平碣之翬楹兮頌寳厯于無期兩萬户侯無他言惟北向瞻跂曰鼓鼙之臣知捐身報國而已滕王閣記龍興即唐之洪宋之龍興世祖賜今名以封裕皇者也故闢省乎是其治所及北始江而南際之西澨而北盡乎人跡所不可踐者􅅻三分有一地不足並也滕王髙祖支子而視裕皇為世祖元嫡今天子皇考其位與聖又不足並也觀察非有是省之尊所觀察地已于八州亦無是廿有八城之逺之衆葺者支傾補敝故易敗非若今出錢隆福宫一瓦一木不階其舊悉秌而新之如是不變其名猶曰滕王閣盖不欲求勝前人又以見太后之仁也鳴呼得恭記之其侈盛羙當何如㢤當何如㢤今記者之遇閣之不遇也雖然事由可知不可知由可知言龍興距兩都數千里塗非乗輿所出尹府之臣圖閣上之亦必經聖覧或者裕皇在天從二先王風馬雲車遐狩八極過之而一息者人則不得而知也三賢堂記奉訓大夫知輝州司侯仁以至元三十年下車奠謁孔廟已乃謂曰是州學官堂而不陛簡漏至矣薦盥春秋何以稱百事之奔走籩豆捐奉為勸鼓舞士民撤而改為凡再閲嵗殿廡門垣崇卑適宜豐儉居中既嚴以翼人之改觀可十百于千昔矣又舉我先世父太子太師公故翰林學士承㫖王公故中書左揆許公語州人曰之三賢者比股肱元首為今聞曽毓徳含休實在乎此白叟及見而談黄童所聞而知其可不祠乃以羨材為堂三楹于殿之東像而事之元貞蒼龍丙申夏五燧以得告㑹燧葬先公之于輝侯求記之燧曰古之人必其生也世之相繼情洽而道符功夷而徳齊而後死可合食一堂也近世祀唐白居易宋蘇軾林逋三賢一堂而不揆其世不相及貴賤勢殊文章非倫孰與四皓之同不臣秦同避漢之髙帝而同應恵之招成功而同歸死而為墓相邇同廟商於情洽而道符功夷而徳齊也今以三公方之固不如是出處齊同若其􅊭生之相與微顯之相後先同其大者有不得而讓焉矧成功反有過之者合而祀之誰曰不然哉然燧于先公也左揆也承也則為猶子為弟子為故人子親而尊之者也智慮未嘗少及乎是由侯發之使人終死以觀反覆以思損其一則後其相與而失于遺也加其一則所志不相如而難為輩也雖有善權人物者終亦不能推移其間盖以語友也先公生以辛酉承㫖少一嵗左揆少八嵗齒固不大相絶吾姚氏營人先公生于汾承㫖永年左揆河内于輝非絻一旦聚居而為寓公其處同也先公以癸夘來此而承㫖已師是方後将以事趋燕盡前其徒假先公以函文俾師之以無廢受業迨庚戌左揆徙家自魏方先公為相即其年無㡬時先公出應世祖之招左揆獨留師是方其道同也先公中統建元之明年由常侍讀裕皇以東􅊭宣撫使拜太子太師四年拜中書左丞官而翰林學士承㫖詳定禮儀事左揆之聘則在癸丑惟居長安中統之元始召入對至元七年拜中書左丞以昭文館大學士領太史院事去位承㫖則由中統三年燭璮亂徴自海濵輦妻妾逃回濟南世祖忠之始兆入對自講讀為學士為承㫖去位一官翰林三十二年則左揆之相雖後先公而同賛元承㫖之長禁林亦後先公而同為代言其出又同也以語其學得聖徳濟人利物于干戈之際上説而下教贊神武以不殺開文物之先肇太平之基已裨巍巍之化進寸退尺拱而讓人與夫建大義决大疑不瘖結舌視身如捐觸試雷霆與道徳仁義化服一世扶植人極為儒臣宗而不少詭其守于正致君謀國不同為道而同為心其事載諸今史燧與有聞不敢漏于為言以告人者嗚呼君子用世譬則治田不難于耰播而勞于齦根枿于荒世有以是為知言者然後可語三公之易地也先公以十五年卒年七十八左揆十八年年七十三承㫖三十年年九十三其卒若以顯之先後為次與兩公遂其去位先公獨卒官京師盖由于久故請而不釋也與承㫖不後者此為異焉爾今惟左揆葬其郷承㫖雖𦵏天下必時魂逰永年是州東北望永年西南望河南實道里均嵗時合食雖主輝人則先公有田有私廟與墓此者又非兩公之專于賔也又嘗思古者大臣死為明神配食廟庭于以左右先王隂隲下民者也或三公者将終古廟食止一州乎亦從祀有時此起本也嗚呼二家子孫其無㤀司侯始之志焉先公諱樞字公茂號雪齋承㫖諱磐字文炳號虎庵左揆諱衡字仲平號魯齋侯字毅夫觀所事不濫而宜則守土吏民善于其職從可知也原註後是記一年而三公同受贈諡先公少師文獻公左揆司徒文正公承㫖少保文忠公則記所謂有時者豈非不亦億則一中乎大徳辛丑嘉平月戊辰朏謹識牧庵集卷七
