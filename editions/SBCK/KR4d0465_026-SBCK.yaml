body:
  text: 元姚燧撰先德碑開府儀同三司太尉太保太子太師中書右丞相史公先德碑至大之元秋七月二十有八日制曰丞相慶公之先及事列聖繼世忠謹者旣敕有司旣諡旣封非刻金石終恐不能􅂷示悠久其令翰林學士承旨臣燧爲撰次之臣聞命兢惕誠以不文不能鋪張大君子盛烈上負明詔其冬而其家乘始至自夏故得反復究觀公夏人史姓曾祖考持持理威夏臣贈同德濟難功臣諡康穆祖考拉吉爾威宿衞太祖贈服勤翊衛功臣諡敬簡考算智爾威關弓馳馬拳勇絶人入侍世祖潛籓歲癸丑從平雲南諸國以驍果聞及歸行賞賜馬五匹鈔二千五百兩價與銀埓已未又從濟江攻鄂戰疾力明年帝正天位從征叛王漠北小大之戰十五賜白金幣錦以爲􅀩古唐古軍民達爾噶齊年七十八終贈推誠翊運功臣諡忠宣三世皆太師儀同三司上柱國公祖考加開府曾祖妣伊拉齊氏祖妣蔡氏妣烏納氏夏王外孫皆從封夏國夫人七子同出五人公次居二以奇塔特布濟克名行自童幼從忠宣出入世祖帷幄天監灼其巳克恭勤至元丙寅選侍裕宗于東宮將二十年敬畏益加無少僣忒逮順考生皇上儲皇詔公保育鞠視之毎帝召見則必左右兼抱之至前方幼而學詔教之經以其嫡于額爾吉納侍讀俟其遨嬉廢誦輒撻其子以警之故能終業大會將畢聚諸侯王讀太祖大訓加丁寧吿戒之始遣就國或皇上儲皇不在列必邀致之使與有聞出申飭曰是汝他日所宜爲者其謹識之必舉其辭無庸怠忘徽仁裕聖皇后以善于薰陶翊賛也責其四衛番􅀡諸臣事皆咨聞大德二年成宗詔皇上撫軍漠北曰是昔大帝授朕者今以付汝且以輔導扈從壹是軍務悉聽于公宿衞諸將皆父事之至則訓練六軍總裁法令胥地所宜可屯田者必分耕之以佐軍實屠羊不湯其毛而皮之與餫餽棄餘諸物皆集以市諸部易皮爲裘禦戰士冬四年以文移無印難杜罔欺又身入聞得裕宗信寶以歸明年八月寇大至公敎吾軍表紅衣于甲以自别俾鬨不迷大崩其羣自是㓂望紅衣軍則退不戰九年皇上踰金山公視軍士失馬徒者空其羣散之死則不責其償十一年成宗賓天使至皇上欲棄大軍入主居憂公曰是使之來惟以告哀且彼事宜難以遙度須召赴使皇太后儲皇隨以削平內難見吿且促其來卽日假公平章政事驛至大都輦致金帛于北爲朝集備五月皇上立極眞授榮祿大夫中書平章政事蓋公雖厯事世祖裕順成三宗其貴有位則始平今踰月儲皇入陳疇昔調䕶之勞制亦曰非夫人之力安及此加銀靑封慶國公妻庫庫楞同封慶國夫人七月進儀同三司太子太保九月加開府太子太傅明年至大之元二月拜中書左丞相復以爲太子太保加上柱國四月拜太保六月進太子太傅再進太子太師七月加錄軍國重事十一月中書右丞相十九易朔之間凡九降制人臣之位至是極焉又以其兄阿拉克布濟克弟昻齊皆榮祿大夫司徒兄兼都元帥弟遙授平章政事弟日爾塞榮祿大夫使宣政院寧夏甘肅釋都總統托羅岱管軍千戸蚤卒他母亦烏納氏二子烏尼爾威珠特爾威男孫十有七人達實和爾布管軍萬戸虎符倫圖爾威塔海諾海都廸爾威伊齊特穆爾額爾吉納年二十二至漠北之明年寇出金山南庫布哩額爾吉納將左衛射士居顔行當㓂驍將旣接戰刀槊兩不能施手搏墮馬斬其首明日皇上解御衣所乘馬鞍勒爲賜仍偶一良家女㓂夜襲他部輜重以遁又將數百騎追敗而止還之四年又殄㓂于昂吉爾圖􅀗人畜財貨不可口匹貲算又明年宼舉國至又戰于哈喇台以數十騎出入其陳數四所當披靡莫之與敵宼大駭􅁍皇上乘之遂大潰斬馘不可級計十年踰金山前茅􅀗俘萬餘人斯皆効死于乘輿前天目昭覩者明年宼平第諸將功膽略材武推爲冠軍立極之日授資德大夫同知樞密院事六月賜虎符使太府院事唐古親軍都指揮使七月加特進遙授中書左丞相又進知樞密院事又兼使典瑞院至大之元五月兼使仁虞院十一月拜御史大夫哩日初事晉王有謹敏稱皇上至軍之明年大戰庫布哩雖勝而宼退未遠與晉軍合而大官廩肉不足則日餽二羊又繼諸軍糧其府又盡則賦他部供億後多其忠從晉王求致左右立極再月授資善大夫翰林學士承旨十月進榮祿大夫遙授平章政事行大宗正府伊克扎爾固齊十二月授􅀸典牧至大之元二月使尚服五月拜光祿大夫遙授中書左丞相七月兼使將作院爾祿幼爲沙門十一年至軍中賜御服帽帶俾不祝髪其年官以正議大夫僉宣政院事女孫十八人有從者十曰戩伊特楚曰按巴曰哈達遜曰斡斡曰聶辰曰世兼千戸曰聶爾布曰吉連布曰染齊曰善布男曾孫六人額爾吉納威玖哲爾威布都爾威宿衞乗輿卓爾齊阿嚕琿徹爾濟勒爾威女曾孫二人臣嘗槩公父子有四德焉一則曰保育聖躬再則曰舊學三則曰周旋軍中十易寒暑脩扞于艱終則曰扶植皇極宏濟登兹高明一門之間三爲丞相無盛與儔人奚間然敢再拜稽首而銘之曰維史胄岀書焉有質伊誰云從則周史佚踰二千載餘慶茂蕃推而上之實一其原嗟公之家中土亦始其來姑臧不知其紀可系而名則由其曾奕奕其繩陛陛其登祖衞聖武左右興祚龍咆虎號風雲胥附考事世皇荷祋與戈昉于南韶爨僰壘摩再從濟江攻鄂東北舞干梯衝執訊雲壁又偕度漠氷雪峩峩手瘃足皸拳勇維何固叛是求凡十五戰不搖疾飈勁草乃見歸以壽終生子如公帝灼其心惟一効忠式昭德音選臣裕廟其盡其職其德其要洞洞其信屬屬其恭介介其守廓廓其容皇上儲皇旣生順考詔輔翼之俾躬是保及惰授經撻子示懲止其遨嬉大訓服膺其彌爲善若是非一臣鄰德將疇與爲匹成廟降制俾從撫軍朔方十年日伺宼氛晝橫雕戈夜袵龍盾惟彼不至至戰必遁未踰金山危巢是傾竟令飛揚不逭大刑惟皇作極言念大德旣贈祖考公以夏國美諡崇階罔一或遺父子丞相百辟用師尙服其衣尚乘其馬門戸輝光世無二者爰詔史臣樂石特書賀蘭可磨而銘始渝先德碣河內李氏先德碣至大庚戌鄃王府長史兼經歴典食司與所部人匠都府官李惟恭持其鄉士席雲漢狀其祖潤文玉使懷之利用庫日民調商征之入吏祿公須之出不遺于受不僣于發如他人侵蠧以益其家􅀒而債償罪没產者皆無之與人交以誠御下以寛禮賢樂善者求表其阡燧曰管庫之官則古委吏亦下士也所可筆者豈專由孫貴耶蓋鄃王之考初尚主世祖再尚主裕宗自稱晉王克用裔孫爲置守冡數十戸于雁門禁民樵牧由分地在高唐卽是進爵爲王世居靜安黑水之陽爲廟以祠孔子元貞始年表賀聖節獨書漢字庶其尊禮斯文者惟恭今臣其子觀其所事者賢若不可辭矧有大此者懷之爲州憲宗大封同姓初國世祖于秦以戸寡益封之至元之末以封其孫順宗旣之國末至疾返賜名懷寧以王今聖時方撫軍于北皇太后儲皇往居者二年刖懷爲三聖龍潛之地傳曰小國之君當大國之􅀸爲下士是􅀖者當宜何哉則君善職管庫者有不必言矣卒以大德乙巳三月十有八日年六十七垂絶猶念惟恭不置曰吾平昔鍾愛是孫今遠宦數千里不及聞吾顧言可憾也哉妣王後二年亦卒二子從鼎從信孫則惟恭其長初由王府郞中羅忠國使懷聞其好學慤有立志遂與偕北卽壻其家進之干王王甚禮之言無不從事必見咨妻卒賜楮緡二千五百爲取元氏子季惟寅銘曰荀􅀸子言臂非長升高而招所見彰斯若可用爲君方惟懷爲州河之陽實爲三聖淵龍鄉其間下士雖守藏或小大國君􅀸當其貴可參攀鱗翔况復有孫翼賢王遠塞而近孔子堂仕優學以能自彊何畏潛德無輝光墓碣朝列大夫飛騎尉淸河郡伯張君先墓碣章邱爲濟南屬邑士子張養浩年少而志厲績學而善文受知平章魯國康利公曰汝學仕耶今之仕者莫不由吏發軔遂用爲儀曹史超掾中書滿其年考岀令堂邑一守敕約便行弊袪形勢不撓惸鰥不侮民惠之懷咸稱曰自停年之制行令吾縣者前十餘輩無右吾令求紀于右走未遑爲今聖淵龍召爲宫師府文學進司經宮府隨拜監察御史轉翰林待制今都中書右司事由武宗詔内外臣五品而上列五爵三土階勲而等威之封生贈死其先五品則縣子男從而正子與四品郡伯皆止父一世三品二品皆郡三侯二公上及其祖再世一品國公逮其曾三世矣故官父郁朝列大夫勲飛騎尉爵土淸河郡伯養浩思異斯寵碣諸墳道且自爲狀受姓之遠與家章邱世數可知者則自其高曾然猶兩世皆逸其諱惟知曾常官武略將軍監陽邱之燕鎭酒其致斯者任子耶入粟耶武功耶皆見無所武畧四子伯不年而仲不後叔萬季山叔娶郭氏六子澤職管庫于蜀彬德正德林秀敏孫十有五思敬思忠四川行省宣使思誠居郵耐禡獮崇興特綬裳履繼季娶苗氏二子一失兵間次朝列則今淸河郡君生子英塞皆天顯今者惟養浩祖及諸父振粟其鄉禦盜于家脫人以刃縋井取飲活友于死者有家乘詳惟夫不大振顯數世而發是一旦者可不爲明之且人持衡猶必稱物而使之平矧天所司惟一福善而禍淫視其力行非度盛而著者故有不終歲阤爲衰微而安行所遇必數世而始進于盛著譬之鉅室徹則一日可爲平土構且累歲不能以落其成古人監此所以垂從惡如崩從善如登之戒也夫如是則章邱之藴美含章雖武略之僅官􅅦酤而猶不能頡頏時榮其上之晦迹又不知其爲世幾何亦庶安行所遇者蒙莊有言今夫水其積也不厚則其􅀒大舟也無力朝列之先厚水者也資其後以􅀒大舟也佐五命而所生享報如是未艾其年子之位日高而所生又隨之而加非若陳省華與三堯共躋台袞者不止也雖然是猶以子貴推言使當其時朝列責其子爲農爲技則亦不儒而己矣又何自開廣聰明漸涵道德工其語言流其聲譽居茲淸列哉然朝列又爲子擇術之精者銘曰嗟今士子人孰不期煜其華辭震耀一時惟其才資得天者薄雖竭爾力而竟落莫矧古有作如車司南能不背馳千百兩三孰興靈奇章邱君子名疇與昭魯國振起引以試吏㧞其俗常令諸近畿佳政用張文學司經寄帝耳目轉而待制典國竿牘進而顯矣推恩所生􅈴伯土之清河郡城人曰子學其父所詔有赫今隆則爲子報子明能然由居止仁維以勸忠示禮使臣圭首方趺碣其墓隧孫熾仍昌其來無止河南道勸農副使白公墓碣彥隆始由太原徒行至河內致其父書魯齋先生願遊其門未有介也乃因吾友翰林侍讀高凝得操几杖主凝家二年而歸侍其親而先生亦召北矣尋由避宅左揆以集賢館大學士祭酒國學敎貴胄乃奏召舊弟子散居四方者以故王梓自汴韓思永蘇郁自大名耶律有尙自東平孫安與凝燧燉自河內劉季偉吕端善劉安中自秦獨公自太原十二人者皆驛致館下三年吾儕或病告官去而先生亦浩乎其歸乃奏有尙與公從仕郞國子助教昔者貴胄友也一旦能横經下心事之爲師屬非其道聳是曹不可得其馴然北面俄侍裕廟東宫公爲講鄭伯克段于鄢己講而出裕廟語人曰是非空言意固有在也以國史院編修從仕郞仍助教擢奉訓大夫監察御史發阿哈瑪特賊國諸不法彼顧誣公糾摘非實捕送刑部獄引隣婦有色者教誣公嘗竊往來而鄰婦力明其無有鞫之墮孕而事始白又糾膺帥西京宣慰使道拉實以巳憾殺其幕僚凡是皆庸懦縮首危者而峻風節者咸偉之出僉陜西漢中道提刑按察司事燧亦爲其道副故得詳西上所爲其按厯皆分險僻荒寒諸州南而褒鳳金洋北而綏麟葭丹塗經龍門西河絶崖高可去水百尺止通一騎必遣導者先之有來騎使駐之寛所卒至則兩不可班視燒棧猶車衢也如是之地皆周焉制度卒有反者不卽覺捕惟罪社長監郡與憲司麟州人告陰濟民乘馬疾馳其識仇也問曰所懷何書濟民紿以反書仇上變延安延安移文吾憲公又請往治之所牽連二百許人繼燭治之再旬是州小僻無􅁓至覆舊案以書適近侍臣括馬其州館鄰牆也聞獄吏呵問終曉得公姓名歎曰世有克勉其職如斯人者使人勞苦之曰吾見陛下當首聞公竟白濟民無他特杖其紿仇非宜言者公位憲諸君下會王相府拜布哈右丞勲臣子開省京兆特異禮公其按問諸司皆拱聽者改僉河南河北提刑按察司事臺檄檢覈中興鈔庫中興故李夏都隷隴右河西道憲令竟事始聽東任公又走沙莽往復近萬里半歲而歸與其副使程思廉發數縣民完堤以捍河水罷當暑賦民牛車轉粟入淇又改僉燕南河北道提刑按察司事趣裝其考巳疾行至衞而卒公與兄楹卽藏衞西輝之蘇門周卜村南原而其妣亦疾乃朝夕哀死事生卽敎授于輝明年燧召􅀡翰林感其毁瘁骨見衣表弔哭之餘其徒數十人拜庭進退朋讓賓敬之道囂囂然先生成法也爲歎曰嗚呼燧亦先生弟子者何嘗有一善及人如是明年燧疾滿告歸鄧而故司農卿侯爵託語彥隆或河南北農副制下必墨縗以岀世議隘薄自便非時燧傭車過衞不可留不得身見爲書語其然聞方督課有績其妣亦卒附其考墓竟以是謝所事以至元己丑秋八月三日年四十六卒苫廬嗚呼學可以範世行可以礪俗而已是哉夫人賈也以燧平昔善公錄河南北道勤農副使苟宗道理辭求銘神道每一讀之一抆淚擲筆數年終不能敘其事去冬以史事又召入翰林過輝夫人祈世母夫人爲言持幣泣請且使其子安禮與遊其門者庭拜燧還其幣曰吾無答吾亡友者以是佐刻石須嗚呼非公仁義行家能使婦人如是切切惟恐没其夫子一善可曰賢巳公諱棟考天祿雖官而不顯居頤樂堂號頤樂先生唐白居易家狀云白姓家太原者楚熊君孫勝白公見殺于楚其子奔秦孫乙丙與裔孫起爲秦將封武安君賜死杜郵始皇思其功封其子仲太原公豈其苗裔耶銘曰聞古五十年不稱天公是不盈天道未曉學不篤耶得譽先師道不行耶裕廟嘗知職不舉耶三憲著效力不本耶耕播之教况冠獬角敢言人難彈射柄臣聽者毛寒猶枚其外未及其內視親于喪觀婦于介靡一匪善靡一可凉非我友私月旦章章嗚呼白公耳孫猶令其貫古松歲遠滋勁士不盛位而盛吾賢盛位者衰盛賢日延有方其趺有剡其首碣石阡隅千祀無朽國子司業滕君墓碣觀漢諸碑凡門生爲師作者其文多稱在三之義蓋本欒恭子民生于三父生師教君養惟其所在爲言又列郡邑姓名字官人出幾何錢于碑陰多至百人或倍之令人每興今無古者篤于其師之􅁣至大巳酉燧長翰林之明年國史院編脩官東平蔡文淵狀其師國子司業滕君之行與門生許質求表其阡以君之再入成均橫經丈席者嘗數百人礱石所資一不偕人出二子獨加異乎古豈不于在三足拔浮俗斯時耶君諱安上字仲禮其先自洛徙中山不可推采其世考府君某隱德委吏斗食自捐生君八年而不祿妣李夫人撫君誨曰而性質開朗記識兼人且金名士趙燦離孫不可以貧廢學感聖善言師西巖君克自砥礪勤心聖學曁其長也尊聞行知如不足日私居自持衣冠齊遫及出接物一誠以和郡無少長相謂不字咸稱先生學積其躬道行其家化及其鄉府臣歸高薦名于朝敕敎中山是府多士求親輝光謦欬欲聞鼎鼎其來服縫掖者將半齊魯庭臣善其職士有聞用以職民主禹城簿壓于爲監爲令與丞刑或過中必揆以義馴馴上說不使黥涅妄加疑盜廢棄永世仁譽旣章宣司所臨若縣與州事有未竟必檄往治裁中情法守令憚之出將入迎若事大吏徵爲國子博士以其平昔自律有先蚤作晏脩誨誘諄諄發􅀩疏疑立懦克剛各因其才矯拂于善黨坐羣行齒而序之其極弗率有黜與扑成均作則井然有條卽升監丞再丞太常世祖賓天成宗繼序圓丘請諡太室升祔凡厥禮文酌古損今皆所訂稽元貞之元拜監察御史京師地震上疏曰君失其道謫見于天其咎在内庭竊干外政小人顯厠君子名實混淆刑賞僣差陽爲陰乘致靜者動宜兢兢祗畏側身修行反昔所爲以盡弭之之道其說累數千百言反覆深切有司不敢以聞君則曰吾不得于言者遂委印去反關其家著書自怡尋起爲國子司業時已疾矣顧言其子治喪無用二氏以其年乙未夏六月二十有五日卒年五十四葬府城東南崔丘里爲女一本理義辭旨暢逹不爲險譎非有裨世教者不言有東菴􅀋稿十五卷故江西廉訪使趙秉政板之行世矣又有易解洗心管見藏之家亦多乎哉其不年者世同哀之而文淵猶以不侍經筵職絲綸謀廟堂爲憾嗚呼夫旣師成均官奉常歴臺諫而又有德有言足矣奚必兼彼數者始爲至耶夫人李氏貞順柔嘉姻里範焉後君八年卒子翊尉東明自致終喪亦足彰君刑家之自今尉元氏兄羽有文行蚤世銘曰孰不曰士于學始志迄用有成千百一二允矣滕君敏脩篤行鐘鼓衡門益大其聲敕起布衣于定敦教祁祁縫掖來則來效再主禹城簿領勾稽不枉刑墨仁聞日躋滿秩而召入爲胄監由博而丞俊髦是範轉而奉常禮文斯綱或革而因酌損用章遷拜御史爲帝耳目言責塞求龍鱗逆觸一不見入納履而行反關立言行後是程方徵司業年過知命遽啓手足理也莫竟短者已而其長斯存何以貞之石有誄言金故甄官署令魏府君墓碣燧還吳中過廣陵日今嘉議大夫行臺御史中丞初請曰吾祖靖肅公顧言以吾曾祖甄官署令卽死所藏亂離失其處他日必虛爲丘先塋石載其事無使吾先人魂遊徬徉無所于歸而一善之或遺也子義爲銘隨又遣其少子可亨拏舟廣陵五千里追之襄陽不及返而及之鄂授其考所輯家塾記曰掇是事銘嗚呼􅃀哉遠而勞焉廼本之曰魏氏由唐相知古子林刺朔州子孫居桑乾桑乾爲今宏之順聖遼有延恕者生中奉大夫守成中奉生通奉大夫餘慶通奉生兜答館酒使子貞兠答實生甄官署令君諱允元改德元字信之甄官生進士特賜及第笏特賜生思廉卽記家塾者思廉生初初生翰林脩撰必復可系者是九世其大于金由兜答弟資德大夫參知政事柱國鉅鹿郡開國公子平相世宗致治隆平祖考中奉通奉再世官皆以公貴贈兜答及子隴右令景元甄官與逸其諱一人再世官皆以公貴􅄻君始監順聖酒改宏州酒使鄧州􅅦使抽稅設防有方與宜平不增歛姦無走匿額有贏籌民不苛之入副堂㕑庫又爲使改文繡上林兩署令同知易州入令裁縫署改令甄官署以卒年六十三官止廣威將軍夫人高氏七男笏珫瑜琦玠璠玉琦大中大夫行部侍郞玠朝列大夫延安司獄璠翰林脩撰今益靖肅公與特賜皆以明經進士官珫懷遠大將軍耀州庫使瑜監豐利酒皆􅄻官玉進士未祿卒二女一歸同知荆州節度使事秦德美一歸其鄉右姓孫氏君究心本富計田疇第舍牛馬雜樹􅀡可爲錢千者五萬歲入粟爲石者三萬歲抽五十一爲七子求師取友須令節休旬大集衣冠令枚誦所業覈其進惰巳則鴈序立前侍飲前脩聲輝耳目漸涵化淪其心由是成德達才多萃其門章宗甚嬖李妃夫人視妃母王姑也數召通籍禁中不可後從秋獵易州君方除道橋諸水復召曰吾思與若晜弟語久矣終不能一致今行之所在是而夫子倅是便且時也無終見避之深夫人以君出不敢專行俾子瑜請之亦不可曰是家膏也親將汚人人有爲不善者不憚取戾府縣惟憚君知兵興下令急甚敢有舍奴婢亡命不吿者罪及其鄰人猶利其傭輕私役之覺則殺以滅迹或致大獄君時鄉居聞有岀入非常者召問得情嚴其錮防書致其主歸之約示薄威以懲其再無殘其生終不語其主以􅀗之誰舍所也比卒免家僮久故者民之作詩與新世訣沐浴冠衣揆日而逝君之孝友天得非學其使堂㕑以鉅鹿公子叔元未仕曰大臣子故屯其膏澤不見及耶三求推所居官縣官以故事無有不可又恤其無子以靖肅後之靖肅又無子顧言後初則甄官子孫世世圖報鉅鹿者何如也其家塾自序曰由吾季曾鉅鹿輔政兹降脩仁潔義可謂曰久仕之逹者列品而九不過中中天嗇爲報將待夫後之人耶最初之仕外僉提刑司事爲副爲使入爲監察御史治書侍御史侍御史御史中丞三十年間風憲之官無不揚歴司淸議者猶大有期曰將不巳是于今嗚呼自序君其知子哉矧必復于靖肅公克世其官可大可久與亨學行嶷嶷可述銘曰反覆觀先民吁可哀積充報銜身期後來門令容駟馬堂三槐必責于天者如取懷惟中奉亦然詳用獄至鉅鹿再傳旣鈞軸官不私其子甄官承承三遜其季叩莫譍又仁厥乏祀脩撰繩官以祀比言祀則大以今脩撰孫後者再小宗旣顚蕃大宗賴藏偶失故所魂依依招之從先墓來如歸膴膴桑乾原終天地碣孰華其文太史燧臣汪滋畹恭校
