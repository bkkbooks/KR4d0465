front:
  text: 牧庵集卷三十六
  hash: sha256:7ff96683442b28d6db284daad24ca4929600ef3e5203b2fc884953b27feb0cd5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0465_SBCK_036-1a}
body:
  text: 元姚燧撰詩餘玉漏遲與暢純父學士同舟過鹿門山遡丹靑未了森然玉立相迎雲表勞苦詩人鄭重鹿門淸曉耆舊猶今好在算竊比山靈年少靑蓋照宜余翠葆蕭蕭華皎渺渺漢水滄波問流盡人問幾多悲嘯對羊公片石一尊相弔喚起長庚小妾試看坐金鞍歌笑飛蚋小澹澹長空孤鳥滿江紅廉野雲左揆求賦南園原注慶雲都城善謳者面勢林塘􅂃橫􅊿觚稜如削還更比城南韋杜去天盈握便有名園能甲乙他山峛崺先尊岳甚一花一石總都將平泉學雖􅁂髮流光覺渾未厭朋來數有慶雲善譜新聲天樂正爾關弓鴻鵠至可知棄屣麒麟閣只北山逋客􅀒塵纓滄浪濯送李景山使交趾六詔江山十年厭拏舟還轍但只有日南遐域未嘗持節八月秋風來朔漠燕然己汲鞍韉雪料此時銅柱瘴雲收無炎􅀬御尺一行宜决煩重爲雕題說道皇元威德萬方臣妾􅀡以越裳聲敎阻千金裝匭渠誰屑要降王明日共輶軒來金闕送張子正廣西宣慰司都事瘴海盲風更誰避樓船檣折長記得鐃歌歸路獲嘉時節日夜丹青麟閣夢論功􅂊補朱衣缺問世間求寵有門無終迷轍爲此錯乎生鐵踰嶺嶠皆炎􅀬獨梅花萬里桂林冰雪躍馬十年銷髀肉遠遊一債償難徹笑悠悠造物戲人哉冠纓絶滿庭芳寄趙宣慰平遠有北先寒來時鴻鴈記經何地初霜問渠鵝鸛何苦上顔行浩蕩煙波萬頃怕誰去爭許三湘聊容與誰求繫帛傳語寄炎荒丹山如鳳鳥相逢定是問我行藏說於今華髮爲汝增傷晩笑巢阿覽德莫貪快千仞翺翔和鳴擬從吹嶰管終不似朝陽水調歌頭幽居開軒對朝爽吾亦愛吾廬君亭有笏堪拄人道富於余尚恐軒裳念在前日朱門故態消釋未全除反覆看如此儂豈遽慚渠最同是烟滅竈釡生魚年年客裏相値佳興􅀒當初縱使軒亭無恙亦取山靈抵掌猿鶴怨移書樽酒酹江月何日賦歸歟買田天生門外買地近隍壑十頃展平瀾相如漫說雲夢八九可􅅐蟠巳具扁舟放鶴又且觀魚知樂何忍利投竿却恐避地下鷗鷺怨盟寒屋茨茅蹊種竹畹滋蘭天生此所宜着素髮颯垂冠手苦彎弓難合惟有招麾毛頴筋力尚桓桓攜我二三子日往將詩壇送徐大山崇仁送行役囘首十周星因今常武丞去衣繡記曾經西北桃源山峻東北洞庭春盡浩浩際滄溟鄂渚玉薪米連月雨冥冥天氣佳殊未暮莫揚舲便令綰印遲上誰奪老槐㕔一語嗟卑烏用覽鏡還宜自重如此鬢毛靑軒冕暮塗看馭日與鞭霆岳陽寄定菴王萬戸兹遊太奇絶我亦壯君侯春風殷地悲歗笳鼓萬􅆛貅平昔心􅅐吞着八九江南雲夢今上岳陽樓尊酒浣塵土山􅀨戰靑油竟陵客又挾病入西州惟余與汝湍水東決則東流遙想凝香畫㦸談笑兜鍪晝息莫賦大刀頭麟閣看他日居右有人不守歲六十一年似窻􅂩白駒馳人家守歲癡計明日怕容辭萬事纔堪一笑何必朱顔年少誰不侮吾衰只看屠酥酒先酌襁中兒無以爲閒櫽括謫仙詩人生日日渾醉百歲以爲期三萬六千塲耳一日盃傾三百巧歴算能推試問自今去餘有幾何巵燭影搖紅新齋肅政李元讓座間任氏婦歌海棠開後之語非專爲海棠設故别賦二首錄呈太初宣相時中天寶三郞愛環睡起紅妝嬾背渠素手洗朱鉛吹裂寧王管羯鼓嵬坡塵散記紅氷淫淫淚斷際天長恨蜀棧靑螺錦江難浣千古驚魂泛蘭轉蕙光風暖嫣然一笑尚傾城桃李空繁滿銀燭春宵苦短願靑軒流光緩緩借諸任袖回施新齋捧案原闕三字嫋嫋東風碧湘左畔羣山囿海棠無語不成蹊桃李羞牛後生臉朱脣暈酒問坡仙肝腸錦繡未容花睡銀燭高燒何如晴晝十事之中不隨人意長居九結貽顦顇􅀏靈均蘭茝盈襟袖今代巫陽恐有劔南呼樵人畫手向靑軒底貌取妖妍爲司花壽木蘭花慢淸明上巳同日亦吾生少遇賦樂府奉呈判縣伯陽志友兼寄高侍讀暢光風嫋嫋轉幽蕙泛崇蘭最上巳淸明相期一日百歲逢難鞦韆自兒女事快隣翁覆手羽觴乾莫道韶華一月從今巳屬春殘故人回首隔長安輪􅀡下金鑾對賜火新煙應思祓褉何地江干依然齒牙牢在並年時花似霧中看獨賴中書未老言時髪尚衝冠石州慢失題高與䨇崖馮雪魏靑三子皆人傑當年慣見中宵天外德星難拆華觴雕俎淸辭細切琅玕定應袖有錕鋙鐵而我獨離羣卧南陽甘節書絶故人石影新翻欲譜調踈聲拙誰遣巫陽喚起滕王長別珠簾畫棟縈飛南浦朝雲當時此句雖淸切何似倚危欄滿西山晴雪賀新郞失題杜宇爲謀拙只當時西州已報鼈靈功烈何事爲心輕傳禪坐取名隳身滅化怨鳥春山啼血試聽不如歸去語怕君遠未曉吾能說􅁈憤在失金闕胡爲不叩天閽裂枉人間丁寧控訴欲求誰雪蜀道思歸誠何有便隔雲山千疊一再舉猶堪橫絶苦趣東君行不早到千紅萬紫飛時節呼謝豹愼捫舌摸魚子賦玉簪錄呈趙太初兼與時中茂異更休㝷玉山瑤草蓬萊知在何處司花嫌被春風妬留待九秋淸露還解語試問看當時月夜乘鸞女何年遺汝甚不怕高寒靑冥萬里鬟鬢亂風霧人間世無物有香如許靈均遺恨千古芙蓉杜若何堪佩顦顇行吟沅浦空自苦誚敎得揚雄不信離騷賦雲牕月戸恨白髮詩翁年來多病不識醉鄕路蘭陵王昨日奉候知玉體已不恙軒從可北矣其戒行何時作蘭陵王曲問之上雪崖使君雪崖雪玉壘浮雲變滅蓬婆外晴白界天西嶺窻涵古今絕秦山置下列􅀋媵姬姜娣姪望太白三百去天六月人猶失炎􅀬緇塵苦爲涅問誰可配兹千仞高潔惟君雅號相優劣有北正寒冽傳將移節及門再命益罄折未聞賜環玦我拙誤名竊甚此日徵書亦到巖穴何人轣轆同車轍華首最相悅忍爲輕別定成行不乞爲汝􅀒羈絏綠頭鴨贈辛尚書家琵琶妾何氏錦堂深獸爐香噴沉煙紫檀槽金泥花面美人斜抱當筵輕羅綬素肌瑩玉近鸞翅雲鬢梳蟬玉筍輕抛魚文細撥鳳凰飛上四條􅃶碎牙板煩襟消盡秋氣滿庭軒今宵月依稀向人欲鬬嬋娟變新聲能翻舊曲眼前風物凄然路漫漫漢妃出塞夜悄悄商婦移船馬上愁思江邊怨感分明都向曲中傳困無力勸人金盞須要倒垂蓮􅂸沉醉紅塵惝恍一夢遊仙六州歌頭賦木蓮花靈均不信木末搴芙蓉徒自潔好奇服芰荷縫看心胷霽月光風似愛蓮叟云難狎應亦未觀林下澹丰容坐蔭高花十丈身疑在玉井三峰甚東皇遣與桃李鬬春濃男色昌宗失昌丰訪平泉記奇草木惟赤柏與金松岷嶺導江浩浩發臨卭進吳儂萬里江南北行欲遍未曾逢堪悵恨風與雨苦相攻怕學瓊花不墜潛飛去地上無蹤奈明朝酒醒空對夕陽舂流水溶溶臣徐立綱恭校
