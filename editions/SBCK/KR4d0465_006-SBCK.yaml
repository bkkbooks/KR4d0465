body:
  text: 元姚燧撰記聖元寧國路總管府興造記至元丙子宋亡詔列諸道憲司于江之南建行臺揚州以統之後由徙臺建康復徙江東道之治建康者于寧國居有其府徙府于南倅廳二十有七年燧思士生文軌混同之時亦千載之曠遇江山之形勝風土之媺惡民俗之澆淳必一求觀遂浮洞庭亂彭蠡而東極海門南折而至乎餘杭于之數者若盡得焉大率宮室園苑土木工麗者皆將相侍從私居而公署皆苟簡取足朝聽夕視而巳大德辛丑余持憲節使江之東病其堂室門廡凌萃風􅀨凜乎其將壓也旣一改爲憲司且然則府于倅廳者其牧皆取過目前以幸滿秩而去孰有爲善後之謀一加繕完哉斯余所目擊者皇慶改元之冬故平章政事子陳侯􅂎來牧是􅀖涖事之初因􅁣歎曰􅂎受明命以守此土統屬縣六戸二十萬地周千里可十古公侯之國坐視府署老􅁦不治則爲誤恩乃倡府僚捐俸爲的厚􅀡市取府北民居通㑹同塲以廣隘陋圖其譙樓儀門㕔以聽政堂以燕處廳翼兩室右居府推左居幕府吏列兩廡架閣交鈔軍資諸庫與夫庖廏各自爲所集郡豪傑授其成俾分爲之民用歡趨經始明年之春役不三時如圖告成位置之序輪奐之美翦然一新大饗落之闔郡之氓稱咨嘖嘖服其神速又闢金光塞門經府前東􅀡靑陽門靑陽之外雙溪夏秋􅁀漲泛入民舍南橋植柱中流載板其上朔望謁廟踰此千歩始至余畏湍悍舍馬徒過一府僚乘馬示勇板陷墜溺抱柱而免北橋疊石爲之水後齧去侯皆造舟爲梁又新廟學百楹狀其事遣屬吏汪杓元盛天佑三千里走郢求記其興作歲月將告來者因懸度之鈞大役也廟易而府難蓋學校之設明詔每飭有司勉勵廟有學田貢莊步泊歲入錢穀資廩師生猶有羡焉又且士籍不雜民版無有賦役凡厥修營責使佐力夫誰敢違府則不然雖牧欲舉有焉其連署則監郡焉同知治中焉判與推焉下乃幕僚屬吏上下相司權分而不專動必衆詢烏可一遺一或有言府無公須山虞澤衡皆有例禁財無所于取也民不可擅徵而役也是非叢前利害相傾又有以事不巳出媢其成功歸美他人陰計撓之以幸猶未敢率作上干風紀司風紀者亦非一官必先以不可安居闔府諸官圖以改爲者口陳于堂足及其家辯告往來懇切悃欵少或旬時不得要領伺其肯曰將審計而徐思之情有見從而始入牒俟其報可末纔及民民小人也未知學道夫豈易使于出貢賦佐天子􅀖經徵斂有期後則刑以隨之猶有頑驁不時入者矧出話言告之正所謂築室道謀者其怠忽前却又不可束之以威非禮致而誠格之使怵然有孚於中知義爲如子之幹父蠱能是乎哉兌彖傳曰說以使民民忘其勞其不信然若是之難其强志一力特立而獨行者事狀蔑有余以意求而知其勢必至理固然也繼侯至者無徒樂其成盍亦知所自哉侯雖昧其平生而先正則及識之于朝觀其子之能仕又可得其教忠于趨庭云不可曉者宣在勝國升州爲府反下取属縣寧國爲名不嫌于重又金光則唐長安都城西門今猶仍不變焉不知何時取稱于此故併及之千戸所廳壁記我元駐戌之兵皆錯居民間以故萬夫千夫百夫之長無􅅟城邑者其有統齊徵發之政無文移惟遣伻銜言至受命大帥或依高邱曠野爲律以行此近代之故事也克哷蘇卜實君長千夫洛陽鳴臯山下繇祖曁身三世矣舊集其屬恒卽佛宇神祠不然于其私居聖皇中統以來制度寖備官始有品祿始有秩統齊徵發之政一信于書故君得以斂是一軍之祿買田爲􅅟門以表堂堂以聽事廡以居吏儲書有庫閱射有亭數十年苟簡之弊一朝而新又思居乎此者必有所箴警始不敢弛然而怠故書堂曰居敬亭曰觀德由未識余千里走書于鄧以其友乃滿子堅爲先求記其然余聞其知學周公仲尼之道者爲告之曰今夫人過祠廟必聳肅起敬如有精神魂魄在其上而立其傍者何哉由夫平居無事之時未嘗敬也使平居無事之時恒有上帝臨汝之心則兩間百神其尊且大孰有加于上帝雖日過祠百千而心與敬一不待有所起而無不聳肅矣敬實聖人傳心之至言而學者由狂躋聖之基豈惟五典賴是而惇以及應事接物無有外此而能中道者況軍旅之事尤在能敬孔子所愼齊戰疾與夫臨事而懼者也敬乎敬乎其可斯須離而弗居乎或曰射于何而觀德曰若知夫鑑也明足以燭鬚髪塵弃之久或步仞而不見邱山此無他用不用之分也惟兵亦然五兵之長莫長弓矢至不仁之器也王者用以威天下則足以芟暴亂而仁元元逮功成治定而無所試必世之間老將宿兵日益耗亡膏粱紈袴之子制外閫焉無賴惰窳之人備前驅焉不幸卒有狗吠之警使其曹出而禦之而能必其康靖乎古人見其然故歲訓而時講之于鄉射蓋束是不仁之器修之于俎豆之中雖有頑驁弗率之人相漸以禮而相摩以樂不敢萌啓邪心知尊君親上而易使于一旦此先王維持太平之宏綱大經也其法主賓有送迎之拜耦繼有上下之比弓有橫郤兼弣弛張之度矢有搢挾順羽拾取之儀行有鈎楹相左之章揖有當階及階當物及物當楅及楅取矢卒取矢之數衣有袒襲決拾有說翿有舉偃籌有奇鈞而侯有去􅀒司正有請誘作命之目燕饗有獻酬酢旅之節奠觶有豐糾過有扑日出卽事窮日而休必强志勉力之士能無衰堕以有終否者或取恥一庭也故曰可以觀德行惟志乎復古者可與言此而君以國人不在禁挾弓矢之科宜于貫革尙武之射何待夫試閱始閑其技其名是亭欲納是身于禮樂以觀德一方其有見于維持太平者在此而不在彼也嗚呼其知所務哉然天下萬事皆出吾心而有本有文居敬本也觀德文也合堂與亭記之夫豈二道歟忠勤堂記皇上立極曾未踰月詔建儲宮位其下者院因裕廟之舊惟詹事肇置宮師府首以六傅統中允洗馬庶子文學舍人學率更司經合掾屬將百人由無􅅟舍惟會佛宇後以不足聳民具瞻下令發官帑爲緡二十餘萬有奇市人私第爲府居無幾時病其事少而員夥也罷黜之六傅之開府者聽于其家徙家令舊􅀠詹事者治是府令丞文者將侈其美名堂忠勤李昭文溥光書扁楣間賜酒燕樂之下令俾集賢大學士姚燧爲記燧曰大哉爲名臣之居其職而職修授以事而事治惟忠以盡其心勤以致其力焉耳然二者相須忠內也非盡其心則不能本以爲勤勤外也非致其力則無以見諸行事而實其忠禹湯聖人禹臣虞克勤于􅀖舜賢之湯臣夏爲下克忠伊尹明之然非忠之至勤之極也不可曰克兩聖則然下兩聖者宜如何哉先民不日賢希聖君之職臣未嘗不以賢官之職其官者亦未嘗不以賢自居不聖焉希烏可冀其克萬有一稽唐六典家令出入乘軺車具禮儀先諸官以導祭祀賓客供酒食以爲獻主今則增劇領凡􅊢官之民與捕獵鷹師綿戸稻田自安西河南遠及成都秩登三品總管者五府與典樂一司降一品者嘉醖一司又降一品者典膳典設典幄三署與供用一庫七品者兩都柴塲在他司則聽于朝而視于夕其㑹與歸猶有恒時是司則不然由供奉之近也出納之富也呼召之煩也需索之星火其急也故傳餐于晝而夜更􅀡始不失其應焉且時有規切酒食歲上旬遠郡味色變者徒勞生重焉啓止勿進亦可謂居職而修授事而治盡其心而致其力其于克也亦庶乎哉抑又聞前事之不忘後事之師爲今令丞夫旣若是將必久是必階而升後之來者或曹隨蕭規則爲無負于居斯堂苟或劣焉非獨見貶于月評必目速戾于官箴矣且爲記令六人庫克岱穆爾圖老哈特穆爾張君讓三閭薛處敬惟庫克岱官通奉君讓三閭正奉三人皆中奉丞二人科爾羅尉遲德誠朝列經歴完者都從仕都事法哈魯克都閻士芳皆將仕其年至大三年其歲上章閹茂其月餘月其日下􅁌乙酉云舊德堂記初太師淮安忠武王戡炎趙于江南也詔濟衞士萬人爲突􅀐以盛軍容而撓敵敕游江陵澧州之郊及南紀平卽割二境萬家之民江陵􅂊十之二澧獨居八置府松滋不關中書惟領宥密歲集其賦待以分賜衞士而毛君巨源實爲總管李君德隆經歴宥密大德乙已制以兩君易地爲之巨源旣入而德隆出或疑德隆舍是要津而甘爲人制聽命于外㑹燧歸自西江相遭于鄂從而問焉則曰吾家自遼世居縉山距先塋木蘭山甚邇爲堂吾鄕將時溫淸奉晨夕于膝下大人以嘗主灃陽簿有田車渚顧慕忘歸今則不能留家弟守舎而來便養願名斯堂成夙志焉且示其先太保忠憫公祔葬興太師功德二石幢記前記作于乾統壬午載太保諱傑以言斥死忠憫其追褒末具三茅官西京馬軍都虞候銀青榮祿大夫檢校刑部尙書行左千牛衞大將軍開國男佺洺州刺史銀青榮祿大夫檢校左散騎常侍隴西縣開國男儆朝散大夫守少府監知儒州軍事騎都尉賜金魚袋開國伯偓後紀則乾統丙戌不載太師何諱其文有曰自保寧統和迭承重任徽太師由食舊德益部時爲桂州管內觀察留後檢校司徒兼侍御史騎都尉開國伯惟易將部銀靑自若也儒州則保信軍節度使廬州觀察處置等使金紫光祿大夫檢校太傳御史中丞騎都尉開國侯嗚呼世有以金石刻辭爲溢美無刺或失其事實忽不之信曾未究孟子雖無武成之血流漂杵然亦不遺失二三䇿而取之則于金石豈不可以若是觀矧由以得何代何地何歲何人何爲者匪細益也稽之以史乾統海濵王之始元十年爲天慶又十年爲保大五年遼亡保寧景宗之始元統和聖宗之始元推後記上之至保寧己巳實百三十有六年可考而知太師曁孫三世四爲公師者非金石爲賴耶則保寧而下奕葉垂芳珪袞蟬嫣失爲何人者豈不益可􅁣也其曰桂曰洺曰廬皆中夏之州遼非其有必是取名因見其不忘南伐者儒近幽州唐末所置然名之不可常者惟郡國而山川或終古有不變夫旣曰居邇木蘭則縉山豈故治􅁘可重感者其地當居庸交衝經遼金皇元三易代之兵子孫不去其鄉尤曠今無有者古之人曰爾祖爾思以取法于人不若本其家之功也扁顔舊徳奚以尚之君復請記余曰君爲憲山南按部歸也余叙其行矣作孔子廟于澧新虞帝廟于鼎也余碣其成旣三矣其于顯親之孝勵學之力繩愆之嚴恤民之隱禮神之䖍亦旣言之不逺矣今又記茲人無謂獨私君諛善者君曰昔人有愛吳張旭書者虞得無從寧受健訟之名每千其判狀僕其公言區區瀆求豈不亦若是乎遂相視一莞而書遐觀堂記長安城西二塗西北通咸陽王公之開府于此與西南北三陲之使冠蓋之去來樽俎之候餞者所出行旅之夥不列也西南入鄠抵山無所適貲乃令承餘則田夫樵婦與城居有墅于郊者所出斯固巳可爲倦遊而休仕者所託廬矣二􅂗同出其相逺無幾何而喧寂異然亦可見利勢之在與所無也鄠塗之北距城不數里則宣慰張公之别業規園其中築臺爲堂崇袤尋丈縱廣十轍淸風之朝長日之夕四方勝槩極目千里凡秦漢隋唐之陵廟池籞由人力以廢興可弔而遊可登而覽者在所不取其高上如華陽終南太白嵯峨吳嶽岐梁之奇峰絶巘爲三輔之鎭窮古而有者皆環列乎軒戸之外而臥對之几席之上余曰遐乎觀哉古人堂者多矣其壯有加于此乎使誠有耶雖風摧雨剝于千載之上亦宜畧存阤然之迹可尋于今今則束板以載之􅀒畚以興之以是知無因于前而獨始于公也今我與公屬觴乎此夫豈苟然哉百年之身其有幾何是及賞其成而不及憂其敗也及樂其完而不及悲其毁也後之時或風摧雨剥于千載之下有登吾阤然之迹者曰嘻斯何世何人之爲公名不旣壽矣乎公笑曰吾何嘗期如是之久哉第擇君言與吾堂稱者卽名曰遐觀盍記諸余曰公通介貴臣也請與之言臣可乎古之人惟見危受命者故得守節仗義殺身成仁之名乎可見無死而死猶爲徒死而傷勇然則出處之際死生之所關死生之所關善惡之攸歸者莫大於爲人臣使不遇存亡危急之㑹亦未嘗不以明哲保身爲賢斯揆道歸義之臣所能也嘗聞之望諸君善作者不必善成善始者不必善終九原可作將無謂秦無人也今之仕者吾不知孰爲道義之臣能志功名者亦鮮矣志富貴私身以毒世卒離尤而蹈禍者駢首接踵也是于計功謀利之間且有不能况揆道而歸義乎哉究公平生嘗吏民矣嘗治兵矣亦嘗持憲矣忠炳日星而難不辭于湯火氣吞湖海而信不移於邱山視竹帛之書鼎鍾之勒恒有晚古人薄前世不足爲之心以故在庭之百辟山東數州秦蜀九路之氓瀘嶲荷旃方三千里之獠孰不聞其名而奇其才沐其愛而怛其威年五十二竟以許國盡瘁而歸鼓舞僮奴千指而食其力甘自儕于匹夫讀書以敎子飮酒以樂賓將終其身非熟爛世故遐觀一代之表者能是乎哉蓋天下之事觀遐則先識先識則幾矣雉􅈷之不能搏人誰不知之突起道左或失聲辟易而喪其常守以其卒然遇之也使前見于數百步之外無曰雉􅈷雖虎兕之􅁀人得以爲備將不患矣斯不亦吾堂言外之微意乎未易以語他人將惟公可公名庭瑞字天表至元癸未以太中大夫諸蠻夷部宣慰使致事云又四年丁亥六月下澣日記淸風堂記榮祿大夫湖廣行中書省平章政事劉公齊人也由左右丞與副樞與今平章皆在于鄂視齊顧爲寓舍鄂其家焉肇基斯堂深廣崇庳題節繪飾勢與省夷嗚呼位不極臣而爲斯則妄功不葢代而居斯則僭有位以功人則宜之求扁于太史公牛馬走爲賦尹吉甫頌仲山甫烝民之卒章穆如淸風者書曰淸風世喜曰今之人或不如於古使誠不如古人引與之匹固如所譏誠如古人則引者非謏而匹者亦奚憾而多爲辭讓今枚觀公其式是百辟者仲山甫也好是懿德小心翼翼者仲山甫也不侮鰥寡不畏彊禦旣明且哲以保其身者亦仲山甫也是其所同若夫補袞職闕于內出納王命而爲之喉舌以賦政于外與四牡八鸞出祖而徂齊者則公無也援袍鼓以前三軍北戍于龍庭西踐于庸髳而南鋤乎交之兩江百戰餘軀鋒鏑所創發作無節與今制地廣隕數千里敷施天子德澤使海隅蒼生無怨咨于饑寒悉獲我所者復仲山甫所無也若是究思孰大而孰多孰細而孰賢豈不易判乎哉然是堂也雖公獨居其推是淸風蓬蓬然戸至于南荒吹滌瘴癘使民不罹薦瘥視徒穆如爲賜如何也或曰子賦尹吉甫頌仲山甫者頌公其以尹吉甫自况歟走則曰尹吉甫之賢走何跂及然以後妻掇蜂之䜛逐伯奇而使履霜中野世今懲之九原可作或聞斯言當一莞也大德辰在庚子二月初吉董氏立本堂記立者顚之反也本者末之􅀒也天下無無本之物亦無不大之本其觀植戈乎下鐓則立下刃則顚鐓大而刃小大爲之本而小其末也語學則不然大顧其末而小爲之本故天下本國國本家而家本身至于身則居億兆人之一若是小矣要其歸也乃爲天下安危治亂之關則身非獨本一家實爲本于天下故曰小者本之大者末之然立本有道而非他立吾身焉耳矣孔子語孝子之終節第立身于事親事君之後則立身者惟忠孝之家爲克對而無著聞今評董氏者曰世將如漢絳侯世相如韋賢家法則石奮以故十七年故商大参公爲今中書左丞公時以翊衞指揮使書先正平章忠獻公碑因扁堂曰立本嗚呼非知道者孰能名斯堂非篤道者孰可居斯堂哉後十餘年上以江浙省臣處非其據詔公來換之燧以士生皇輿一軌之時誠千載之曠遇浮遊江湖求觀南紀禹迹疆理之槩相遭東吳見其圖畫之敘措注之宜潔白之守任負之力有非喬木故家漸涵庭訓上結主知者不能詩曰雖無老成人尙有典刑孫叔子劣甚叔敖楚王思其先烈猶封之況託忠獻遺體式穀似之者宜聖皇擢繩父武爰立作相也暇則相語曰昔者商公特書扁耳時未堂也去年始落矣其記諸燧思藁公鄉堂此以告苗胄固宜今是東吳忠獻以大參左相兩嘗開府旣薨公季父今承旨公又大參乎是去位而公繼至一門再世之間三相而四開府矣豈國家惓惓忠獻徇地是􅀖撫綏有勞非弟若子不命出鎭不足以繫其民情然歟又益思夫董氏之大立本忠獻忠獻之相立本東吳公不可不原爲堂於此也仁知堂記金溪危侯季梁舊家于邑闤闠之南湫焉得閒壤距其居百步前有溪溪上有池可魚有園可花竹且宅于山水之要有曰翠雲嶺者有曰卓筆峯者有曰僊山者嶒􅗆崷崒奇踴秀擢則山之峙乎前者也有自翠雲關而發者自有石眼泉而溢者有自白面塢合流而來者逶迤委折自遠凑近則水之滙於前者也危侯自糾廬陵歸始得以其俸之贏築堂以爲讀書之地左竹右木嚮池面溪春則翠色蘢葱練光繚繞夏則濃陰四合陂澤如秋秋則木痩潦凈月焉而益淸冬則水落石出雪焉而愈絶殆人間希有之境也堂以仁知名雖取選詩卜此仁知居之語而究其本始則亦自孔氏知者樂水仁者樂山之訓發之夫動而無窮者水也知之達于事理周流無滯者實似之靜而有常者山也仁之安于義理厚重不遷者實似之夫知者豈必不山之樂而仁者豈必不水之樂哉特指其動靜之似耳仁知四端之二人所同有本無所輕重其生質則有近于仁者有近于知者故其成也氣象似分焉如夫子則元氣不可名也如顔子則可以仁言矣如孟子則可以知言矣雖然仁者必知知者必仁不仁不足以爲知不知不足以爲仁非知者不必有仁仁者不必有知也苟局於一不得謂之兼體用矣紫陽夫子作精舍于武夷其堂亦名仁知其詩曰雖無仁知心偶自愛山水蒼崖無古今碧澗日千里夫無古今者體也日千里者用也危侯其亦有得于此乎性之仁其情之發爲惻隱性之知其情之發爲是非充之則達德也危侯尹高安其治盗議獄緩刑或以不快人意譏之侯曰吾非不能斷擊特非辜而誤則不可耳此心也其是非之正惻隱之眞乎充乎此言則知仁之達德幾矣顔之仁孟之知可希矣紫陽之仁知堂講道之堂也危侯之仁知堂亦讀書之所也必有得乎此矣故記之臣馬啟泰恭校
