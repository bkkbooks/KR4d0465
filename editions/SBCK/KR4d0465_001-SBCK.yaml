body:
  text: 元姚燧撰祝冊加諡祖宗告祀南郊祝文維至大二年蒼龍巳酉冬十月庚戌朔十有九日戊辰嗣皇帝臣某臣賴上天之祐祖宗之靈得以眇末之躬託于億兆京垓臣民之上持盈守成凡今三年身至太廟兩嘗祼將非獨于親立愛臣家庶亦孝治可先天下而祠官讀祝于太祖室惟曰聖武皇帝睿宗室亦惟曰景襄皇帝至世祖室則曰聖德神功文武皇帝名譽之美垂無窮者多及六言顧於創業之祖垂統之宗開我後人繼繼承承億萬維年者稱述成功盛德有所未盡心實欿然謹遣太尉尚書右丞相臣某禋致牲玉燔柴泰壇昭告昊天上帝加諡太祖曰法天啟運聖武皇帝睿宗曰仁聖景襄皇帝伏惟圓靈居髙聽卑灼臣微忱敕我祖宗歆此嘉誄臣不勝感激戰栗之至皇帝尊號玉冊文維至大二年正月乙酉朔越七日辛卯皇太子中書令樞密使臣某謹率中外文武百僚頓首頓首謹言昔我世祖旣平炎趙質之於書幅員廣長振古無倫覆燾之下八紘萬國莫敢不庭何獨一王西北岸然憑道阻修方命正朔德綏之而不摯威董之而不讋夫豈不能聲罪致罰深入其地終以聖人親其宗親包荒有年成宗繼序憤久驁頑天鑒昭明於裕皇孫獨異陛下授以太祖皇帝信寶撫軍漠北是固以張足付神器之本時未及冠承命卽行其視萬里莽閴寒冽之鄕不遠不難如堂適庭至則奬厲諸軍修明法志簡㧞果毅均苦分勞解衣燠寒推食飫飢洸洸汔汔士氣日作睿算伐謀待宼歲至奪人以先身踐戎行霆馳電擊大北其羣虚巳不矜日愼一日始終十年不狃屢勝狂狡不懲悉銳來加當以選鋒伺間出奇盡襲輜重彷徨無歸度不能軍耄倪纍纍降口百萬致兹敉寧平四十年未靖之梗成兩祖宗未究之志天下之人聞其風聲思覩天光者顒顒翹翹九圍一心握是乾符歸正宸極弛武事之夙習洽新化以文治立愛自親曾未旬浹上尊太后問安以時下建儲宮庶政是先又舉列聖未遑之典欽崇元祀玉瓚黃流薦祼太室還蹕龍興徘徊太祖龍旂九斿劗金于斯肇基帝業爲城中都又以孔子垂範百王將二千年而顯諡未稱加大成于至聖文宣王上立勞于軍與凢庭臣悉大賚之間歲不登旣賬旣恤虞施未愽民罹罪罟再肆大宥至德難名赫赫巍巍惟天爲大掛一漏萬井觀如斯求可盡臣下歸美報上者惟是徽稱謹奉玉册玉寳上尊號曰統天繼聖欽文英武大章孝皇帝欽惟陛下立心天地立極生民茂對鴻名于億萬年皇太后尊號玉册文維至大三年歲次庚戌冬十月甲辰朔越五日戊申嗣皇帝臣某臣伏思顯考順宗未臨海㝢眇眇小子託其遺體顧踐丕基惟事聖母養以天下何無不有何欲不臻而隆名盛典辭未見俞非臣所以表微忱酬大德也欽惟皇太后陛下眞順而齊肅淵哲而剛明居常處變愛威異施臣在先朝受詔漠北往撫諸軍可謂遠役以義割恩縱臾其行迨􅛍河陽永懷彌切親至五臺禱于佛乘尚憑陰隲早遂振旅殿閣是崇靈貺用昭旋聞國恤併日馳赴邪謀方興授册儲皇曾不再日掃淸宫掖待臣以來􅂌付神器自非睿斷安敉內訌往歲鑾輅再􅛍五臺净供大修以畢夙願極心爲臣天燾地持日居月諸其大其明非言所喻詩之言曰母氏劬勞推之眇末咻仁喣慈百倍爲艱圖以報塞惟崇顯號者強而名之庶幾聖德昭明天下是用􅀋于上帝禋于太室奉玉冊玉寳上尊號曰儀天興聖慈仁昭懿壽元皇太后欽惟皇太后陛下慶躋莫上之尊福衍無疆之歴菲躬是保慈訓是承詔制行銅錢詔年十月至大二錢幣之法其來遠矣三代以降沿革不常世祖皇帝建元之初頒行交鈔以權民用巳有錢幣兼行之意蓋錢以權物鈔以權錢子母相資信而有證今鈔法一新期於公私兩利重惟經久之計必復鼓鑄之規至大三年十月赦朕自嗣守丕基致孝太室奉上玉冊寶加諡太祖爲法天啓運聖武皇帝光獻翼聖皇后睿宗仁孝景襄皇帝顯懿莊聖皇后世祖聖德神功文武皇帝昭睿順聖皇后裕宗文惠明孝皇帝徽仁裕聖皇后順宗昭聖衍孝皇帝成宗欽明廣孝皇帝貞慈靜懿皇后于斯之時宜降德音誕告天下猶恐數赦或賊良民今因西北叛王不受正朔五十餘年其子齊博爾蓋愆前人盡數部衆歸命闕庭乃庫庫齊謀爲非覬未忍置理刑以輕典與夫崇建大刹上爲列聖報德冥冥下爲生民祈福昭昭者亦旣成功皆我聖母之德之致己於此月五日奉玉冊玉寳上尊號曰儀天興聖慈仁昭懿壽元皇太后屬大慶禮成宜敷渙號以新民聽於戲凡在有司一乃心力以輔予治期底隆平卽位詔年三月至大四惟昔先帝事皇太后撫朕眇躬孝友天至由朕同託順考遺體重以母弟之嫡加有削平內難之功于其踐阼曾未踰月授以皇太子寶領中書令樞宻使百揆機務聽所總裁于今五年先帝奄棄天下勲戚元老咸謂大寶之繩旣有成命非與前聖賓天而始徴集宗親議所宜立者比當稽周漢晉唐故事卽正宸極朕以國恤方新誠有未忍是用經時今則上奉皇太后勉進之命下徇諸王勸戴之勤三月十八日于大都大明殿卽皇帝位凡尚書省誤國之臣先巳伏誅同惡之徒亦巳放殛百司庶政悉歸中書命丞相鐵木迭兒平章政事完澤李道復等從新殛治其可爲今法程拯民急者具如左方於戲凡爾有官君子皆古所謂治天職食天祿者宜一心力欽乃攸司無替朕命左丞許衡贈官制天非繼聖學之墜緒則不生命世之大才國欲與王道以比隆肆用爲烝民之先覺何物故之巳久尚人思之未忘故資善大夫中書左丞集賢大學士兼國子祭酒兼領太史院事許衡玉裕而金相準平而繩直出處則惟義所在言動亦以禮自持休休焉有容屬屬乎其敬人能􅀪道惟朝聞夕死之是期我欲至仁匪晝誦夜思而不得行巳似秋霜烈日化人如時雨和風來席下之摳衣滿戸外者列屨達簡在帝心者率多丞弼窮固守師說者不失善良鶴鳴九臯而聲聞於高鳯翔干仭必德輝乃下爰立相以堯君舜民之志所告上皆伊訓說命之言丹扆斥姦少不避雷霆之軋擊靑臺治歴本于筴日月而送迎繇理窮而智益明隨任使而職斯舉今旣亡矣誰其嗣之於戲在爾身有垂沒世之名于朕心有失同時之恨雖成廟納書以命諡固巳振木鐸之高風而功臣胙土則未加用申錫蜜章于下地光靈如在寵數其承可贈正學垂憲佐運功臣太􅀓開府儀同三司追封魏國公仍諡文正中書右丞相塔喇台追封淇陽王制出入帷幄在人十能而巳則干訏謀廟堂爲相一年而疾居半竟􅀖家之殄瘁宜王禮以追崇具官某維昔開國之遺苗乃今太師之元嗣由爾世胄爲我親臣事世祖至今也凡三朝職食官而久者非一日灼其廉明而忠亮與夫恭遜而溫文眷兹中書出庶政之原居以右相絶百僚之席使加中政機總六軍善調護而長宮師監纂修以成國史加此重責皆所裕爲一德可以寛鄙夫片言奚止簡繁務思過榮之可懼視倖利以不貪同綰銀艾者十人爾先辭免其太尉均受錫田以萬畝爾獨還致于司空觀父子之並相一門求聖賢與尚友千古攺爲攺作緇衣何賴乎武桓拜後拜前赤舄未慙於周魯方歌功於淸廟倐委魄於􅀇閭豈意少者殁而老者存益信神難明而理難測憐乃公獨傷於漠北誓爾後均胙乎淇陽於戲何但上下牀盡餘子可束之高閣如失左右手􅁣正人不作於下泉咨爾靈明歆朕休命可特贈封諡爲懷忠昭德佐治功臣開府儀同三司太師上柱國淇陽惠穆王索隆噶台贈營國威翼公制朕聞康王之入端門其從呂伋文帝之來代邸亦拜宋昌固知非心膂之臣不以付爪牙之士某官某任足以致遠㫁可爲克剛以世祖見萬里之明于親臣極一時之選愛其春秋之方盛責以夙夜之惟勤昉試于中俾執干而衞闕旋出之外與受鉞以平淮召移全軍往追叛戚旣誓捐軀之許敢辭奔命之勞何以報之所未聞者杯盂璨瑳以陳玉賓虞秩秩之初筵鞍勒盤陀以校金人避騤騤之上駟榮生如此哀死可無庸建爾於上公卽家爲國廣綏予之孝子與親共尊靈而有知歆是殊渥楊恭懿贈􅀪農郡文康公制聲相應而氣相求允謂風流之二老生有封而死有贈式昭恩數於九原其肩隨許魏國者誰歟而目爲秦君子則公也故集賢館學士太中大夫兼太史院事楊恭懿抱經濟學恥章句儒守四書爲入道之階梯持一敬爲立身之根柢其辨析則江河之莫禦其操履則山嶽而不移信蠶有績而蟹有匡化三輔喪親之自致無鶉生突而䍧生奥視萬鍾於我亦何加所師授者皆成德逹才有朋來者必忠告善道非商山之幣不起而宣室之席始前由道德禮樂刑政蘊之胸故歴象日月星辰指諸掌明朝花謝數之精者堯夫何處星來君其問諸李郃是皆非常人所企及宜其爲吾道之指歸今也則亡誰其能及於戲天下之事日銷月鑠惟餘不朽之聲名關西之風山高水長尚爾克開其苖裔英靈不昧異渥其承劉秉忠贈趙國文正公制運際風雲不可謂生時之無益名垂宇宙斯克當沒世而不忘將求若人展無與匹開府儀同三司太傅上柱國趙國文正公某淵深而智山靜其仁方見龍之在田嘗迨天之未雨貫百王之一其道于聖學以開明敷五典之三爲綱肇人紀之修叙身本斯立政條用張頒祿于陜之東西屯田于淮之南北從征六詔與越三江贊神武不殺之仁洽民心好生之德咸嘉謨之入告至大業之佐成是以楓宸之念功俾于蘭省而總政屬王旅簞壺之迎勞隨王輿文軌之混同而獨身不及見之亦衆心所甚惜者至元之贈進保爲傅大德之諡以正易眞在先朝之恤雖曰己隆自今日而思猶答末盡何功臣之見後復太師之未加豈朕待爲于爾其告於戲非登朝霞以棲其魄從往聖陟降于帝庭則抱明月而遊乎方訪裔孫徘徊於神道章追刻密恩重書棺王思廉之考贈恒山郡正獻公制陰雨膏之由太山出雲于膚寸滄浪淸者乃嶓冡導􅃞之濫觴卽物理巳然而求見世德自微而著某官某之考炳禀姿温粹涖事敏恭知惟讀其父書示不忘乎家學方􅈷在野之並逐猶鴻集澤之未安筮仕其時立勞于國爲令雖囿乎百里施治可型之四方收􅃻朴之威以求得情乎獄拒摧筦之策以堙興利之源得古人用其一緩其二之心故取民也有制非後世朝而三暮而四之術其得民也以仁逮夫中統之建元治最十路于宣幕不享其身者淵停而雲滀以昌爾後者天施而地生由服勤祖宗之兩朝俾進秩丞疑於二品於戲推子以及其父不子大郡以疏封知臣宜莫如君曷報舊人之共政妣贈恒山郡夫人制婦人之爵視夫若子之貴賤而爲崇卑夫貴而子卑官始大而終成寥寥無聞夫卑官子致位將相故人生榮而死哀之雖勢之必至營魄有知寵數欽若然猶視嫓德娠賢之何如某官某之妣武氏其夫雖未至于顯庸而盡瘁州縣惟恐利澤不加于民而聲名日延可謂嫓德迨其子壯美知世祖典瑞於中大官再上食必以見及而不後之隨時燠寒歲賜之服而克翼翼小心未嘗見貶于聖訓者兩朝四紀自宥密而進丞疑而館閣于月旦評者推􅀓相爲稱首謝事而去晚有宫賔之招亦以老辭凡若此者皆出斷機之敎可謂娠賢汝武氏兼有之斯具美矣散周氏塔塔爾贈蜀國武定公制朕惟他臣之家由其子孫位登將相故褒命其親上及三代皆有國之禮經崇大臣也具官某惟爾家則不然尚論其世雖源遠未分而同出於天潢矧其考博囉岱呼爾罕有功太祖立國之初及爾之身承是勲勞由帶憲宗御器械出秉旄鉞疆理四川西起劍閣而東盡蘷門勁騎一蹂而宋人去平土城郭壁山柵水假息歲月不敢出犯其鋒非獨爲國震耀武威張今混一之本使爾子孫席是以興接武爲將纘乃舊服亦爲爾家邁德之祖求他臣家由子孫貴以褒命者語豈同日哉於戲可嘉也巳考贈蔡國武穆公制知臣宜莫如君凡曰有勞而必報推子以及其父父雖未仕而亦封實原始之教忠特飭終而追恤具官之考福寛初由力穡旋致豐貲嘗倒囷以周窮率裂劵而免􅀒俾鄉鄰傾心而懷惠善頌其冢鍾光嶽全氣以生賢元勲于國祿及養以五鼎年幾躋於九齡於戲世皆流澤于目前潢汙隨涸爾獨揚名于身後華袞何加尚其光靈服此茂渥妣贈牛氏蔡國夫人制四民之中士無恒產工利器用商遷有無而皆資衣食于農斯古有國官人必于力田由善務本故生子勞而向義多爲鉅臣具官某之妣牛氏由生令子當今季朝砧夕鼎之時獨完其宗來歸吾元以開勲爲顯諸侯而與其夫安享祿養以終循是褒章宜及所自某官之考贈韓國敬穆公制惟勤夙夜莫踰暬御之臣何物暑寒敢曰休安其室屬世皇之違豫召路寢以入居方憑几之道揚俄綴衣之庭出恨不攀龍髯而俱上悼其附鳳翼之不終從事孫曾如臨父母最是三朝之知遇加於百辟之等威何以報之先德用章庶其逝者下泉無憾某官某之考秉氣通正爲才裕優當僉其國之都議司聞振下民之餓羸者損布爲端之三百與米爲斛之一千百銀桶之副諸五金品之亞者初匪干民之譽如家量貸而公量收實以推君之仁示朝信道而工信度種德若此生賢則宜求臣鄰之顯親至師垣之極爵於戲高車駟馬維不覬于生前袞冕桓圭亦足華于身後光靈不泯明命用歆妣賈氏贈韓國太夫人制夫封婦命雖君禮臣之所同子貴母榮以古驗今而尤異欲彰孝之潔白可後典其焚黃某官某之妣賈氏賦質柔嘉爲心恭懿出移天北山之李宜爾室家求奉祀南澗之蘋奠其宗牖匪眞善閨門之主饋又佐割帑廩以振饑如聞壼外之婣皆曰女中之士篤生哲嗣實爲親臣於戲由雛引以鳳飛故得飾終於下土信蟹匡而蠶績可以興孝于他門妻韋氏封韓國夫人制惟爾之家世緒絶逺自漢儒賢及􅀇成父子繼爲丞相傳魯論於􅁅燼之末實開道統之源至唐其族尤盛女爲后而男尚主與仙李蟠根相終始歴數百年其遺澤餘波及爾身者與衮衣赤芾者匹最爲近象于魁三而朱幩翟茀以朝何異去天之尺五出門輝耀行路咨嗟可謂極命婦之榮而未正小君之號不其闕歟爲降恩綸中書左丞相阿都台追封順昌郡王制臣爲委質勞於同軌之間國以念功恩以襚衣之後雖飾終其時有所未及在追恤今日烏可或遺爰􅃂幽褒用昭異數具官某力齊嶽􅀒量與川涵託開國將種之苞根挺明堂工師之大木受任閫外賈勇籌邊爲憲宗入蜀之前鋒因殘百粤非世祖投江以尺箠不返三苗報効之私寤寐不置百其身以奚恤一乃心之是期會師征險順而貞得夬剛决柔之兆考版圖之幅裂秉旄􅃏以鼓行將削尊號于偏方必使義聲以先路􅀔乗破竹名正苞茅有不待陳風蛇之蟠而已飛塵星馹之捷如震如怒袵金革北方之强于理于疆盡江漢南國之紀羣黎壺漿而崩角幼主席槀以泥頭瘁事非伊成功能爾凡十年爲丞于行省奄一旦違世於先朝白雲香歸于青山淸風空遺于黃閣像未麟臺之貎服先龍袞之升旣進師垣又建王國俾大書于神路過者式焉示絶等于臣鄰忠則勸矣尚膺茂渥少慰營魂妻扎拉爾氏追贈順昌郡夫人制大帝立極之十五年嘗曰昔我太祖戡定中夏日不暇給由天未厭宋德帝制偏方命將出師一家天下今惟其時曾不三年墟其廟社雖曰睿算萬舉萬全亦大臣奉辭宣力死職忘身有以致兹厥功茂哉用是追崇故光祿大夫江西等處行中書省左丞相阿都台爲推忠翼運功臣開府儀同三司太師上柱國順昌郡武敏王其故妻札拉爾氏在父母家幽閑而禮其移天也淑愼有聞所可䀌傷在不壽考以語嫓德不及夫丞相建希世之功以語娠賢不得食子大夫紏官邪之祿非賁􅀇壤曷慰貞魂妻哈達奇氏封順昌郡王太夫人制漢祖王吳芮於長沙郡史豈及其家爲晉武君祐妻以萬歲鄉夫則未嘗王也求能兼者伊何人斯非爲臣利用行師有瓴水建高屋之功則其婦大疏封爵無女蘿施長松之好具官某妻姆于華望嬪我元勲貞順範乎閨門恭儉化其姻里問安興聖錫宴大明導必中貴人以前坐則外命婦之上寵莫宜于象服光何賴乎魚軒皎日穴同天豈私從其死矢高風物表人則爭仰其生榮與爾貽謀服我休命張􅀪範贈齊國忠武公制由弓冶而爲箕裘世其家之餘子用詩書以驅鋒鏑儒能將者幾人非資文武之全才安立功名于昌運鎭國上將軍江東建康道宣慰使都元帥贈銀青榮祿大夫平章政事諡武烈公張􅀪範純明而敏學沈毅而善謀爲二千石則有譽于魏􅀖嗣萬夫長克用光于蔡國城濟南夾寨卒圍齊盜以梟夷壁漢陰上游式遏荆蠻之豕突􅎔長江而先濟拔列郡之後降獨制帥堅守其揚州盡全師反攻吾木柵奮前茅以騎擊居顔行纔十三人麾後騎以鼓乘斬首虜倍九千級震兵威于淮右授使節于江東方遣伻趣三宫之入朝其丞相挾兩王以出國建僞號以干正朔萃亡命而蠢甌閩率趨利之􅀌軍活坐屠之一郡􅀗俘不馘就敵是求遂令衆叛以親離猶且兄終而弟及轉偷生于溟海竟滅跡于崖山萬里言旋九重入覲殷腆之紀緒巳絕吳語之勞苦甚温方恃爲祈父之爪牙而遽啓曾參之手足於戲雖爾身不及識而世祖告䇿則具存于朕心不能忘在功臣胙土之未錫故即發身之自爰疏賜履之封尚其明靈服此茂渥妣贈齊國夫人制身先齊家所以立興仁之本天昌厥後昭其有教子之方憫爾劬勞寵之贈䘏贈推忠效節翼運功臣太師開府儀同三司上柱國齊國忠武公張􅀪範之母趙氏肅穆持正含􅀪有容心靜而安惟修善以積慶氣稟者秀能爲國以毓賢信有開之必先庸厚報其所自令譽永傳于千古湛恩下及于九泉於戲後之視此亦猶今典章具在逝者如斯未嘗往神爽如生妻封齊國夫人制因親教愛孝可移忠揚名顯親報不忘本􅂜倫所繫典則用彰贈推忠效節翼運功臣太師開府儀同三司上柱國齊國忠武公張􅀪範之妻某氏厚積慶源恪遵禮範純乎坤道能靜守于母儀正于家人可敦勸于風化親見門閭之高大載加名爵以推崇佩此光榮俾之耆艾於戲寵章所賁推吾永錫之仁慈敎是遵尚勵堅貞之節鼐呼封營國顯公制開國居先亦旣攀龍而附鳯傳家有託尤在峙鵠而停鸞非天不享而日斯邁故北京路噠嚕噶齊鼐呼自夫幼學以及壯行藹翩翩佳公子之稱植矯矯大丈夫之操嗣爲元帥代其耄親虎節相承可謂父菑而子播龍光不爽式昭臣敬而君仁纔纘舊服之數年遽棄慈闈于一旦噫雖功不施于遠而芳其流則多有後而才方將天門之宿衞於中何憾巳增泉壤之輝光加有褒章以慰貞魄妻封營國夫人制仙李蟠根天桃華灼旣及閨其名族而作配于元戎內佐堂構其父基外勉勤勞于王事棄詩書乎馬上髀肉從消對勲業于鏡中􅁂毛未攺何爲不淑俾稱未亡求斯世之賢哉亦爲女之士者於戲適從夫而死從子身旣令始而令終高爲谷而深爲陵名必傳今以傳古烏雅爾贈營國忠勇公制惟太祖之基命龍遂乘雲有良臣以樹勲魚猶得水展我同姓豈伊異人具官某氣鍾光嶽之純全誠貫金石之堅􅃀智足謀國勇則冠軍佐天運之維新憤人心之未定旣降復叛必煩以行旣自北而徂南首遼尾魏亦攘左而塞右膺齊背秦語其跋履於四方數豈戎衣之百襲爲庸巳懋其報宜豐可當非劉氏之不王姑啓若魯侯之大宇併申褒典少慰英靈噫佳城之鬱年三千名固巳昭乎白日分國於肇州十二澤期不斬於黃河妻李氏贈營國夫人制佐命龍飛及見九斿之大斾剖符虎節可輕十乘之元戎贈以報其忠勞禮宜均乎伉儷具官某之妻由有淑質莫不令儀鬱桃李之穠華藹茝蘭之芳佩季女齊而奠牖吉蠲克謹其禴祠之子狩而韔弓險阻備嘗于軍旅實從于疆而于理豈專宜室而宜家於戲雖魚軒未及于生歸以新觀美而􅁚服可由乎死冺不大疏封張柔贈蔡國武康公制風雲從而龍虎騰物有感于􅀋應日月出而螢爝息理無待于他求具官某當聖武蹂山東而北歸旋貞祐棄河朔而南播俾司留鑰兼秉帥麾知歴數之將窮束干戈而胥附殄孔山堅壁之賈瑀抗眞定反虜之武仙徙治保州斬荆棘以立府寺從戎汴闕棄寶玉而收圖書事睿太憲之三宗封易淶遂以萬戸至世皇移全軍以成毫偃枹鼓不鳴郊壘者十年懲齊虜削諸侯俾城燕平板榦可壯􅀖畿於千里年雖云其耄矣功誰出其右焉求先朝爵之上公何啻無十一於千百故今朕贈以太傅實加異㝷常而再三又增賁於九原兼追揚及二代而父而子皆使同大帝之已封我祖我孫可謂于功臣而無􅀒庸躋絶等以慰明靈妻毛氏贈蔡國夫人制朕惟祖宗創業之艱必有摧鋒宣力不二心之臣雲從影附克戡多難以成耆定之功是用賁以追錫之榮而配亦與焉於戲非吾將相勲業之家其孰能得之具官某之妻毛氏淑愼柔嘉渉獵書史在金叔世實與蔡國同其艱危及後爲顯諸侯憤世婦人妒悍爲俗寧殄其夫之後不使媵侍在側者而獨善逮其下藹有惠及小星之譽男女二十餘人教養不異巳出故敦勸閨壼者莫不舉是爲師先朝旌異之賜衣一襲詩曰鐘鼓于宮聲聞于外者其不信然死旣同穴而追崇者其可異諸乎臣馬啟泰恭校
