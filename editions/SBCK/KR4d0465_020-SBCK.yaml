body:
  text: 元姚燧撰神道碑資善大夫同知行宣政院事張公神道碑維張氏汴之浚儀鉅姓金由歲甲戌宣宗播汴河朔逃兵之民皆扶攜婦子從之而南蕞爾之土其岀惟是一夫之耕不足以食百人有司又括粟餉軍以就盡之運抗方興之師徭賦百至猶不能支故人心曰離望望焉而思大兵之至以紓其急歲壬辰睿宗大殄其軍鈞之三峯山義宗播歸德大河失守故其祖得棄鄉北渡樂而家燕會燕薦饑嘗散居積以振之祖考之諱皆逸惟知其考字善甫三妣戴李南李實生公諱天祐字吉甫就傅讀書聰頴絕羣兒筮仕經歴工匠總管府以儒術飾吏事至元十有四年轉尹歴城未赴改同知棣州十八年詔發濟南傍近十路民五萬人濬交河以通海漕責公董役丞相噶巴齊臨治其上自春徂冬方十一月天寒水冰數言宜休役待春徵集不爲臨治所可及行堤見僵死暴棄則衋傷曰吾曹媚上急功使民凍夭如是悉縱遣之民歡躍歸因彰言曰脫上見尤吾請身坐不以相及事聞帝大嘉異裕宗時爲儲皇下令升經歴功德使司尋改總判院官奉訓仍經歴二十三年官太中太原路總管爲纔一年有德􅀖民刻石頌之明年官中議參議尚書省參議要官非其才可以彌綸宰相圖回天下者不足舉其職又二年官中奉拜中書參知政事大德四年僉宣政院七年官資善同知江南行宣政院以三官釋門故于佛氏爲敎信奉而篤守之􅄌祥惠愛多所及物有司政或病民如徙江浙巧工入將作爲之授方使吏不得爲姦利居刺樂業而行輕去其鄉不怨焉宣政五年祝髪之徒安之以爲不繁岀令以重斂諸山者惟公一耳拜疏于朝請留者數十上至大已酉卒年六十三越十七曰從葬西山其祖始卜之宅嘗稽後世官制貴賤與古反易古自一命至九命上公而極今則九品而進乎一公起布衣積官報政與知院致位二品實古八命侯國之君非獨歲時有以加數備儀奉嘗其先爲子孫者亦得衣被休光以紆朱紫眞善大其門者一女弟同李出適士族夫人耶律氏次王氏劉氏范氏索氏七男志惠忠懇慧恕億五出夫人惟恕王出億劉出六女四出夫人長適實喇巴哈三爲監州一王出一范岀王劉范索卒皆前公夫人子其男女恩過所生至大庚戌翰林學士承旨耶律希亮曰夫人吾從祖妹也持其從祖兄戩鄂特之狀求銘公碑其辭曰因陵其高力半功倍孰與平地進覆一簣繄張之先發我庾餘責報于天如持左符實生令公始學自力迨其筮仕共工是歴後銓尹縣薄而不爲改倅棣州州用事治浚交漕海五十萬指自春徂冬急役未弛公憫凍殤丞相不謀下令縱之擅吾受尤事畫上聞帝嘉曰果遷牧于并頌石璨瑳尙書中書機務兩參事輒背馳資言指南出知宣政實司祝髪故于釋典得其津筏昔人之爲箕斂諸山今公之來退食閉關僧徒安之聞欲滿秩留者抗章上凡數十可因灼見舉職之能鼎鼎宜其名與位升卒從其先西山之兆勒銘隧首千祀有耀少中大夫叙州等處諸部蠻夷宣撫使張公神道碑公諱庭瑞字天表姓張氏其先臨横全人州曾祖淵祖士明以有功金初再世千夫長考楫皇北京都轉運使徙家白霫三子公其季也幼志不凡巳以功名自許讀書力學經史之餘兵法地志風星卜筮靡所不闚旣冠宿衞憲宗俾從征蜀佐軍前鋒帥如所策戰皆捷會其陟方帥持兩端世祖斬之軍中獨忠謹公仍佐前鋒軍中統始元之明年詔元帥府全師戍淸居賜金符俾參其府幕議合時未下􅀡淸居南百餘里虛實動靜皆可相聞日夜戒備袽漏塞罅敵無得乘加善綏懷所􅀗詗俘不誅全之小物利人慮亦必及中土艱蜀藥其地饒橘課軍士之休役者曰袖手何爲其人日入皮幾何升皆庫貯之莫曉爲何以也視商旅有貧喪其資滯不能東者召以其所有畜來無問幾何蹄畜給一石皆感泣歸語父母妻子曰三相救我自爾相之名籍籍行路用兵開達以虎嘯山闞渠江可絶二州漕塗詔公爲帥府先鋒使將五千人城之旬日而營壘儲偫皆完以充制使夏貴集四川兵數萬圍之諸將勉宜速戰公曰無庸彼衆十我往則殱矣可遣間取援帥府須至爲圖今惟有分地死守以老之吾不爲主而爲客􅁘敵礮吾壁當所皆穿築柵捍之柵連壞乃離柵爲堵虛本不築裂牛馬革衣大樹縻之令可去來礮至則偃巳乃復植敵以城不可井必資澗飮泉出甚微下薪土實之公沸人畜溲溺釡中入土以泄其臭人日數合吻皆創裂終夜行壘至于立寐如是踰月援至不敢前公下令曰敵䇿吾怯不岀必嚴外而懈内今與之角可必逞志分千五百人爲三夜擣貴營果大崩潰禽斬都統欒俊雍貴胡世榮等五人馘首千遺委資械萬計以遁公亦身負數創功聞加賚之澤舉軍覃焉授奉議大夫守高唐州濟師襄陽始抽中民之家爲兵賦州若千百人恐吏出入爲市身按籍取其壯者與借衣仗尉兵權宜􅂌之編諸行伍敎以進退不相干越或曰足是抽數州責止矣教之何爲公曰吾所抽兵比其啓行縣官或遣使或覆閱耒耜之衣不掩肘骭雖材賁育誰則信之其時留甲退乙更逐紛紛徒自後期衣之兵衣鞬弓手㦸自足觀矣閱使至果惟曰高唐之兵精良教民力穡野無萊田暇則使脩孝悌于鄉校豪梗戢縮盜去其疆鄰獄疑留率咨平􅀡大司農考績以治最聞遷朝列大夫濮州尹詔布多方仍黜其殿者一人爲長吏勸辭之省曰如司農言正守職也豈敢爲勞且州非守獨爲上監下貳功則均功獨旌何爲不敢奉詔省奏倂陞監貳廼尹濮御史臺賢之奏遷中順大夫陜西四川道提刑按察副使風紀峻肅吏重足立爲京兆者弗便也中之秦藩都漕公及夫人皆不恙入謝奉教不謹都漕曰吾嘗憂汝昆弟涖官庸懦不足受任今居鷹鸇以擊搏見傷誠克舉之良子酌酒壽之庭臣閔其誣也爲避之奏徙四川屯田經略副使踰年以東西兩川各開樞府大徵兵圍重慶其舟楫兵仗糧儲資取成都者十八換成都路總管而四川中書左丞李忠宣公德輝以王相理賦四川凡屯田征商與鹽茗木竹山澤之産民已輸而算未入官者皆蒐剔之事皆倚公以集一歲而羨衍彌倍以繼餽漕自餘學校農桑津梁陂渠府寺館傳先政廢弛者莫不興張蜀平升少中大夫諸蠻夷部宣慰使雜獠犬牙綿絡盧叙思播施夔之壤者五十餘種椎結荷旃將數千里統御羈縻枿其州縣繩削而碉門羌有偕婦女老稚入市者爭􅀡殺人爲宣慰碉門魚通司繫于理其酋斷繩橋止蜀商于徼謀大動兵入㓂篡之其司馳告汪忠肅公惟正以中書左丞行省成都問進討謀公曰羌俗悍獷喜馴怒逆具所性然由殺一人而遽待以門墻之㓂小兵不能威大兵不煩興惟可遣使開諭彼雖凌信而昧理至撼以禍福亦豈有不囘者􅁘忠肅曰無踰公者遂從數騎就塗前遣人曰吾至矣其相徯而界羌盛陳兵來公曰吾從數人而猜備如是何爲羌人蜀人舉天子民殺人償死一律治之今有司逮所偕來特使辭其見知情之所由爲援質耳非併盡誅之也而汝爲是跳梁行省如以狀聞萬一赫怒徵近郡加誅而汝噍有遺􅀋乎亦奚不薛之盡劉可鑒也何乃負叛名爲之續使壯士推首白刃妻奴人乎此宣慰魚通司碉門者宜言吾懼汝之妄舉而自孽也故越吾司而曉汝其酋率種屬羅拜曰吾苜者取羊生磔其脾卜之視肉理何食曰吉白馬將來可不煩兵公乘果白馬神語昭昭敢不惟命乃論殺羌賊而出所偕卽日復繩橋還蜀商通市遂與約自今市者如故事無入碉門惟集郊關日昃而歸其酋等曰亦惟命又以民歲摘茗官收糴之爲局自鬻公變其法聽民入券自與羌市令􅀺雅戍兵屯田自廩罷泝楊山江漕穀以免嘉定舟民覆溺都掌蠻反詔公以行省兵誅之公請罪止首惡無及非辜可之其俗惟善挾槍擲人而以過顙厚握松板爲盾自蔽己陳公馳馬射之矢出盾背半笴其種駭怛曰何物弓矢如是其力也遂捐兵屈服惟斬其酋達蘭雲輩十人再授叙州等處諸部變夷宣撫使後仍故官轉潭州總管浮舟岀峽過南郡燧時貳荆憲相語曰吾聞是州戸滿百萬良足爲治而湖廣省臣方事朘剥禍賊變詐月異歳新吾不呵之祇益罪耳不能爲也遂去之秦其前植業在樊柱者上田五千畝渠義谷水灌之雜蒔桑果可材之木萬根奴婢千指旣􅂌兩兄田賦歲下不以及兄糴谷入之其自取者惟城中一第與西郊之園百畝耳今歸每不城居徜徉輞川泉石間南􅀡聖燈巖爲堂罟魚于淵穽鹿于山賔客過之留飮彌日頗知爲詩嘯歌自娱凡居三年忽曰吾樂吾成都竹溪秦父老遮不能止時已疾矣後是二年當至元二十七年四月十四日卒夫人劉氏淑質懿行公所敬友及是偕其三子巘岑岷扶匶還葬安西之咸寧少陵原都漕公之闕且爲書託山南江北道肅政暢師文以今集賢盧摯誌銘求銘墓碑摯之言曰公與仲氏俱名良二千石爲時所器期以公輔年位未究者豈以公年僅過其兄一年止五十七耶惜哉公孝悌忠厚深沈明炳朋友􅀌􅊔有不能家必周之使可安以終身有妾慧艷若嬖之或告與人語屏所問之則曰吾父也召諸逆旅貎若甚肖叩其離兵失家歲月與曩聞同隱痣且是公曰而民􅁘人役也父曰民爾曰欲得之乎對曰鄙人之來􅀡以兒在公所不訪而識之非人父情豈求俱歸公曰而女居吾家終不能㧞列羣婢令夫人盡取其奩飾衣服署良券歸其父曰資是嫁之父子泣曰何以報公惟有繪像事之蘄其壽考耳吾友勸農使韓世英歎曰以義斷愛人所難能其力于爲善率此􅀋三子惟岑爲嫡二女長適李鵬翼次適某銘曰維公自少期我振耀薄宦入臣入衛憲廟憲廟受臣其審其難一簡在心誠推用殫六飛之巡前茅劍外大斾攸經有順無悖方號賓天遭顧世皇佐戎淸居屢摧斧斨虎嘯孤軍保新立壁飲血勸忠一逐宼十帝曰歸哉久勞汝西其守高唐字我東􅀺鼓鼙之臣熟手威忍或于元元未善憂軫考績多方治獨最之誕誥尹濮俾長吏師俄貳秦憲旋蜀經畧輟士矛弧授以錢鎛邊穀用豐就牧成都大兵圍渝十萬仰餔需急應繁無少豫暇朝聽之殷恒燭繼夜庸蜀平矣帝曰僰夷厥俗荷旃惟汝使宜其慰其撫節以華汝大狂兵之小頑訓語始猶革面久悛其心陸馬水舟相望獻琛晩移長沙羞姦窳輩以完吾前惟駕早稅凡蜀齊秦長民總戎三十維年四稔居東人遠遙之在庭使簉其收爲庸寧巳是茂我銘豐碑匪伊桓楹英風百世凛凛猶生山南廉訪副使馮公神道碑公以至元二十八年年五十九九月六日卒官朝請大夫山南江北道肅政廉訪副使于襄陽燧遊吳會還過行臺廣陵得訃于故御史中丞魏初所遂出涕相弔後三年始拜其墓指桓楹誓曰公平生交友間文惟我怡者他日當銘是爲報子休復亦巳叙所履歴見求因記前卒六年嘗敘馮氏三世遺文有曰以中議年五十九卒官同知山東西路轉運使故中順方年六十以同知臨海軍節度使致事至通議亦以同知集慶軍節度使六十致事三世皆止同知亦理之不偶然事之可異者公抵掌曰若是同知不善吾家耶吾他日有避而不爲耳今公之壽僅齊中議校所卒官廉副班序正與轉運節度同知者等六命四世卒致皆不逾六十嗚呼造物之迹人果可以意智闚耶中議中順通議爲高曾祖諱仲尹子翼壁考中書右部郞中諱渭世稱馮孝子公之先諱由通議築松庵崧山曰崧後更岵字壽􅀸童子聰警于書博觀彊識賞于中書忠肅公許妻以季之子闕幘由貧試史征商屹屹自飭不盪華惰中統建元時年未壯入掾中書職奏事曹䇿識沉明得失先事曰從丞相造膝淸光右部爲郞自丞相辨章而下皆友諮之父子並政法制未苛不嫌也人榮耀焉或讒禁中省曹多徒顓庸在列庭加汰擢公以風度修凝敷對有次畱後一故相長左右幕喜氣排人諸曹讋縮公不下之故事諸曹岀皆總管判官獨抑公眞定轉運經歴換衞輝總管經歷官承事郞令眞定之無極事治考最換令洺之曲周狀其簿貪懦黜之圍襄陽急發民益兵河之北公惟視丁地入中甲者戸抽一人籍之請託不行苞苴不入形勢富室施計無所凡竄名他役者皆出僚吏無所姦利其間江南旣一陞奉議大夫僉山南湖北道提刑按察司事換僉嶺北湖南道提刑按察司事二境皆錯壤夷蠻人所憚行公冒阻凌歊瘴鄉蠱俗上下山谷至不可馬或轎以杖殆數千里刺舉周治簡削冗長官吏數百臺臣勞之移近畿甸換河北河南道提刑按察司僉事官市民物不輒與􅀡責悉還之罪去官吏三百籍沒賕賂且三千定霜摧電掣蠧朽皆折唐之監州諱發其伏逃訟于朝顧列公實田湖陽三十頃禁殺日殺紆塗乘傳多燒驛薪不法十餘事詔御史問之無絲髮得抵其誣罪陞朝請大夫江西湖北道提刑按察副使未代棄歸尋仍前官換山北遼西道提刑按察副使以疾辭行臺臣終曰舉職風紀求歸者其私不可釋也擇其去家近在十舍外者以便之再換山南江北道肅政廉訪副使命下數日卒僑塟檀溪之東筮仕至是三十餘年恬忽時榮退易進難數命皆家受之臨繁處劇暇豫而集遭佳林泉野服佩寳璐鳴琴賦詩忘反移日觀所號雪崖亦可得其嗜尚巳俸入盡于給故家之孤嫠與娛賓購鼎􅂜書畫故遺產不盈十金所標襮其閥甚高跬步恒以羞親爲心迨氣息奄奄猶大書松菴墓馮孝子墓雪崖墓賜休復曰各伐石表之阡亦自喜其善全歸也遺文千篇晚而筆力逾進辭多雄剛深古卑于文者不能句求凡再配前夫人楊氏卽忠肅公妻者今夫人王氏其母休復與休復母之兩致其道不知者不以爲前夫人之生觀行有家爲德如何女温香幼三男孫鶴齡􅀛齡彪齡二女孫皆下殤銘曰公生自孱見靈奇也葱衡鏘然妙爲辭也人一善偏巳兼之也其藴淵淵介介持也其履平平循循施也入司奏牋出縣爲也同不俗牽異不離也責言言宣責事治也憲府所􅄤吏不欺也風行嶺壖江之湄也幾耳順年不云耆也厚夜長眠寤何時也聞之幅隕多舊悲也曰良弓傳子爲箕也柔木不􅁌世業卑也獨公靑氈守不移也世德陶甄不外師也子于父田播其菑也父材楠楩子構基也有華蟬嫣冠雙綏也與乃祖肩官醜夷也皆不持銓袞職裨也豈天爲懸座右巵也不盈其泉斯不敧也信彼微權馮氏私也滹沱之川浩瀰瀰也苗胄必賢餘波滋也毋折楚篿以筮疑也麗牲有穿徵銘詩也中書右三部郞中馮公神道碑中統之元肇分天下爲十道道置使以宣撫之我先世父中書左丞公受任天平僚列聽自辟傳過眞定將以公偕懼不能致乃踵門自起之曰天平地方千里戸版賦出將半諸道而寄治庸淺非得淸厚和愼舊德雅望如先生者孰與匡政令之不逮而抑其過先生􅀒用世才不及見之太平有兆之時隂拱何施敢再拜以參議相屈公荅拜曰某學不切時無有可資吾相取者然不敢虛盛招遂就車行參議無幾時中書省召入爲右三部郎中我先世父以奪吾賢佐吾誰賴以爲理居無幾時亦去公在右部故相贈太尉史忠武公贈太傅文貞劉公平章趙公宋公張公我先世父及左丞張公大參楊公賈公尚書劉公稽古議制動見咨諏又其始至密院未闢憲臺未建尚書未分兵刑工三曹之事叢闒繁會決畫開裕于刑尤愼恤禁天下諸侯不得專殺罪入死者奏可乃論輯要令條付之法史俾有持循獄成不輒置辟必疏其情文疑闕讞下有司緩須臾無死以冀萬分一朝或生之也遇于倫敗常者必峻治竟之羇縻之國臣或失對都堂欲詰其謾公言宜示有容不可苛明以怛嚮化以故于今之治文物燦然非夫人與有佐理中元力耶公諱渭字淸父姓馮氏其先居定之中山嘗臣五代晉由齊王虜于遼從徙北京家長興遼滅來南系緒則自公六世祖可譜蓋昱生遵讓再世不仕讓生金承務郞居泗承務生中議大夫同知山東西路轉運使事仲尹中議生中順大夫同知臨海軍節度使事子翼中順生通議大夫同知集慶軍節度使事壁公之考也自中議而下三世比及進士第獨公由任子仕人疑其爲問則曰延賞及世自有虞巳然歴古不刊如曰假以爲忠勞之勸是後世訹迫以利之術非聖人大公至正遇下以誠不忘先烈之義故其子孫不敢以能自致富貴爲賢而以獲繩祖父踵武爲光也自後世科選之法興風聲之相盪波流之相軋鼓舞奔走一世之人使子孫恒有不藉基祖父可得自我之心甚失興孝天下之道近世惟程夫子仕由先庇我法行之上有稽先王之經下不絶先人之澤初􅁺尚書刑曹移掌機務後掾尚書省知選除金巳蹙國一闕守者無慮數人懷告身致曠數考無所于任吏是職者人恒聚詬其短有見讎轢者公勾覈精密先後黜陞動有比依號爲允平出佐靈壁帥府李全聚兵楚州觀望前􅁍不一其操于金于宋皆未有屬帥遣公馳說之欲屬而軍受命卽行不爲吾身叵測毛髪計至則撼以大義陳譬懇悃其旨惟在不可遺棄故君一言全未卽從亦壯其能使不侵辱善還之守均州軍事判官改南京右廂機察初金還汴通議將逾河追及行所在失公妣夫人趙嬴博間公竄避梗棘茹苦徒行勤以事存哀以求亡通議感其志曰禮父在爲母齊衰期父必三年然後娶達子之志也曾參以孝巳殺伯奇放皆自後妻爲曾元不娶終身吾年今五十其達汝志亦不娶終身金亡侍通議北渡河崎嶇齊魯郊以還眞定出則親僕御入則操井臼求釋孤臣亡國之戚不失故家素宦之習可旨甘其口體而夷懌其心思者皆劬躬爲之日夕不去側立而坐休而出一命之須略不自遂積歲爲世不異一日戴白紛如猶爲孺子時也執喪奉祭哀敬兩致世多不字惟曰馮孝子化行閨門夫人事之嚴師也出與人交賢貴愚賤一接以敬别置白黑胸中故與學士魏玉峰內翰元遺山學士李欒城故承旨王愼獨今承旨王鹿菴最相款習讀書爲文不廢風雨寒暑節錄經史細及箋訓又蒐輯金代文章凡積若干百卷專經左氏春秋爲右部年七十曰吾家由轉運卒官年五十九故臨海集慶再世皆六十致仕獨吾貪榮滿年格歸若後矣會子今朝列大夫江西湖東道提刑按察副使岵自省郎出令無極曰吾祖臨海爲是吾獲從養于是天之私我多也平生曉行衞生法年八十二猶神形精彩動人以至元庚午閏十一月十有九日卒無極寓舍還葬眞定三橋里之南原通議之兆文有常山集行世凡再娶前夫人王後夫人師金尚書右丞安石其從祖父岵母也孫休復男曾孫鶴齡龜齡二人方童女曾孫一人尙穉後葬之十九年當二十五年戊子岵以公未碑棄江西憲副舟達襄陽六月又蒙暑人鄧示燧所自爲埋辭白以先人與而先公相好爲故人今繼室汝姚氏甥爲婣銘先墓碑非子誰義爲蓋朝請先夫人楊今夫人王其父詳議諱德溶我姚氏所自出之離孫先世父昆弟叔視之夫人燧姑道也用是不辭銘曰維斧鉞威君之所司奚取于臣人牧專持用誠允明猶属僭弄矧肆師心刑典不奉中元乾綱旣收旣張有罪我在敢越奏當公時用獄上體帝德疑昭枉信情狀巳襮宜刑于辟宜亟徐之恩澤涵柔或幸庶幾輕平匪寛猛匪深害今三十年作則攸賴古曰仁人利溥一言矧士弼敎岀治所原乂曰仁人立本孝子反覆揆公終始良是公孝越俗格父之􅄌弊齒寧鰥矢不再妻曾元以還兼公而兩淸風在碑無期將卭臣戴聯奎恭校
