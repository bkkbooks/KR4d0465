body:
  text: 元姚燧神道碑平章政事􅀩古公神道碑燧持憲節使江之東三年當大德癸卯光祿大夫上柱國江浙行省平章政事公之三子山東宣慰使罕都與江東建康道肅政廉訪副使拜都及行河南省參知政事額森特穆爾譜其系狀其事以請曰先公三宿墳莽矣其忠以事國孝以繩家光大而雄偉者不及今焉鑱之金石將日遠日忘奚以示遺冑于無窮敢屬筆子燧以與憲副聘事此道義不可辭乃序之曰公􅀩古氏諱博囉罕輝和爾公之曾孫嘉木和爾公之孫扎魯和托公之子始輝和爾與兄威伊特俱事太祖時太疇盛彊威伊特謀徃歸之輝和爾苦止曰帝何􅀒汝而爲是竟去追之不復雪泣而歸請獨宣力帝貳之曰汝兄與衆皆往獨留何爲無以自明乃折矢誓曰所不終事帝者有如此矢帝感其誠易名希襌約爲按答蓋明炳幾先與友同死生之稱帝後與王罕陳于哈喇眞彼衆我寡敕烏嚕一軍先發其將瑪楚岱玩鞭馬鬛不應希襌請曰戰猶鑿也匪斧不入我先爲鑿諸軍斧繼顧帝訣曰臣萬一不還三黃頭兒將軫聖慮者辰入疾戰大敗其軍晡猶逐北敕使止之乃旋師免胄爲殿腦中流矢帝傷之曰朕戒􅀸蚤休兵竟創而歸親爲傅藥寢與同帳踰月而卒帝曰曩濟勒錦爲敵將實禦希襌其以濟勒錦民百戸屬希襌子世世歲賜勿絕其族散亡者收完之卽封北方萬家太宗以其子􅀩克爲郡王又俾貴臣呼特呼大料漢民分城邑以封功臣割泰安州民萬家封郡王歸奏帝問􅀩古之民何如是少對曰臣今差次惟視太祖之舊舊多亦多舊少亦少帝曰不然舊民少而戰績則多其增爲二萬戸與十功臣同爲諸侯者民異其編烏嚕爭之􅀩古舊兵不及臣半今封顧多于臣帝曰汝忘而先玩鞭馬鬛事耶後諸侯王與十功臣旣有土地人民凡事干其城者各遣斷事官自司聽􅀡于朝公年十六爲斷事官世祖正宸極以從攻叛王額哷布格功賜其軍騬馬四百匹金銀幣帛稱是尋詔入宿衞曉近臣曰是勳閥諸孫從其出入禁闥無輙誰何李璮反詔將􅀩古一軍圍濟南鈔益都萊州賊平決獄燕南人稱明允賜衣一襲雲南王呼格齊爲其省臣巴哈丹輩毒殺事聞敕中書擇可治其獄者凡四奏人皆不當旨丞相希札舉公且言敗事臣請從坐帝曰之人則可公辭臣不愛死第年少目不知書帝曰朕方恃􅀸求皇子死尚書拜特穆爾知書惟可使之簿責其事是否一委自􅀸明日愼無歸咎輔行也且聞􅀸不善飮彼地多瘴宜少飮敵之未至四五驛所巴哈丹遣人􅀒金六籯來迓公曰雲南去朝廷遼邈省臣握兵不安其心將懼而變乃好爲語遣之旣至盡以金歸省而竟其獄得置毒情殺之而還奏可顧希札曰􅀸舉得人賜兼金爲兩五十武備寺奏令入筋角惟蒙古以時夥于常歲帝曰其報賜之自今凡􅀩古事無大細如扎拉爾事統安圖者悉統于博囉罕八年授昭勇大將軍右衞親軍都指揮使虎符大都則專右衞上都則三衞兼總十一年授金吾衞上將軍中書右丞大師南伐分軍爲兩制曰其右受巴延阿珠節度左悉委􅀸指一犯法臣曰如博和哩黙色朕不責也俄授兼淮東都元帥軍于下邳公䇿諸將曰淸河居宋北鄙城小而固與泗州昭信淮安實相犄角當水陸衝未易卒㧞可頓大兵爲疑海州東海石秋違此數百里其守必懈吾將輕兵倍程而東其守臣可襲虜也師至海州丁安撫果下石秋東海隨下淸河史安撫聞之亦下不一月而下四城宋主旣降而淮東諸州猶城守故太傅巴延入覲還密詔公進兵拔淮安南堡戰白馬頭又戰寳應棄高郵不攻由西小河達漕河據灣頭堡斷通泰援竟拔揚州斬其制帥李庭芝淮東諸州悉下賜西域藥及蒲萄酒介胄弓矢鞍勒會分江南之州隷諸侯王及十功臣又益封公桂陽州十四年遣平叛王珠爾噶岱于應昌賜玉鞶帶幣帛與博囉罕同署樞密院事未久授北京右丞旣至召還㑹南土多反者詔募民能從大軍進討者俾自爲軍其百去千夫惟聽其萬夫長節度不役他軍制命符節一與正同已行矣公疾不能自陳令董司徒文忠入言今有日所出入勝兵何啻百萬何假此曹無賴僥倖之徒以壯軍威臣恐一踐南土肆爲貪虐斬伐平民妾其婦女槖其貨財民畏且仇反將滋衆非便召輿疾入帝視其色瘁然賜坐與語重承董奏可之適常德入朔唐古特一軍殘暴其境如公所策敕斬以狥諸是軍皆罷之十六年哈喇蘇博囉蘇烏拉罕蘇呼肯皆彊宗也勢不相一求遣大臣來莅詔令公往凡居是三年十八年以右丞行省甘肅時大軍駐西北仰哺省者十數萬人自陜西隴右河湟皆不可舟惟車輦而畜􅀒之塗費之夥十石不能致一米石至百緡公經畫得方供億不乏賊不敢窺邊者二年二十有一年授龍虎衞上將軍御史大夫江南諸道行御史臺事黃華反徵內地戍兵進討未能平賊多奴良民以歸公令監察御史提刑按察司隨在紏覈皆土還之以疾歸㑹諸侯王乃顔反帝欲自將征之公曰始太祖分封東諸侯王及侯其地與戸臣始知之以二十率之彼得其九􅀩古烏嚕札喇爾鴻吉喇特伊奇喇斯五諸侯得其十一彼力滋多吾亦滋多吾有衰耗彼亦衰耗然要其歸五侯之力終多彼二惟責徵兵五侯自足當之何煩乘輿臣昔疾今愈請事東征制可賜介胄弓矢鞍勒命公董是五諸侯兵以行與乃顔接戰屢摧其鋒再與其黨一王塔布岱戰淫􅀨不止軍以乏食求􅁍公曰兩陣之間勿作事先巳而彼軍先動公悉衆乘之逐北二日身中三矢擒塔布岱斬和掄輩後與伊羅勒太師合力始誅之賜銀爲兩四百五十幣帛九不再月其黨一王哈丹復叛公再請往詔與諸侯王鼐瑪岱討之公狃于屢勝一日不虞賊游兵卒至止從三騎返走有壑絶前廣二丈深加廣半追兵且及獨公策馬能越三人後者皆見殺人以爲天相忠義後逐北極于東海之壖哈丹自引去􅀗其二妃斬其子拉塔于陣凡戰四年所俘金銀悉散將士以故人致死力賊平敕一妃賜鼐瑪岱一妃賜公陳金銀器延春閣召東征諸侯王及公至將分賜之問公汝家是器幾何鞶帶有無公曰以陛下威德奉身之物亦畢備矣帝曰朕出此物本酬卿曹之勞在人則伐其能以幸多取朕問猶曰旣有可謂謙挹不􅅭于貨者豈令其徒手歸姑賜是器五百兩二十八年改河南宣慰司爲行中書省求可首是省平章者凡三奏皆不允末乃及公則可授榮祿大夫平章政事淮鹽爲引歲六十五萬前政多逋至公如額而集賜異幣一開封監縣特穆爾告廉訪使胡某不戢其民昬集曙散縣簿陳勣置巡屋器械于村又周劉光店爲墻四其門扄鐍司夜出入詔公按之皆誣杖而徒戍南邊後詔天下括馬不當及公等之家公曰吾家有馬羣連郊坰不思佐國無以爲方三千里官民之倡其入騬馬十有八匹河水遷流無常民訟退灘連歲不絶或以其地投獻諸侯王求爲佃民自蔽公奏止之仍著爲令河後泛濫堤埽橫潰歸德睢州汴梁水及城下漭爲巨浸公親行視督有司捍完之皇上元貞二年遷公平章陜西未行而改復爲河南入覲奏􅀩古一軍戍北歲久衣率故弊請以臣泰安州五戸歳入絲一斤積四千斤盡輸內帑易爲匹帛分賚諸軍上以爲善敕逓車送達軍中賜銀爲兩百五十幣帛三陛辭之日上諭之曰􅀸今白鬚世祖德言實足聽聞事更加愼中書平章喇眞宣政院使大食蠻合奏始者伐宋世祖分軍爲兩右則屬之巴延阿珠左屬之博囉罕今巴延阿珠皆有田民而博囉罕獨無可後上曰何久不言豈彼恥自白􅁘其于淮東所嘗戰地高郵己籍之民賜五百戸以上中下率之上一而中下各二及圈背銀倚比再至汴踰年凡流外官久滯不銓旅食道宫者旬月皆出之大德之元叛王雍和爾烏蘭巴哈來歸公遣使馹聞始是諸王叛由其父是輩小弱若無與知今焉來歸宜棄前惡以勸未至上曰是奏深契朕衷改平章湖廣賜金鞍勒至汝寧合福建省于江浙授公光祿大夫上柱國江浙等處行中書省平章政事賜白玉帶夏旱隨禱而兩杭之豪民十家入賂于官大爲釀務高其估而專其利酒日醨惡公變其法張省四憑其富畜凌轢府縣肆爲姦利自刻木牌與交鈔雜行民間實侵貨幣與國爭利又盜隄海之石墻其私居公欲斬之而中書刑曹當以杖然亦由是大姓始重足立矣以大德庚子五月二十有二日薨于臨安寓舍年六十有五以其年七月八日葬于檀州西北太行山不封最其平生典兵則右衞都指揮使都元帥樞密院風紀則御史大夫宰相則三爲右丞四爲平章與夫四十七年馬足所及西南雲南西北金山東北海隅東高句驪東南吳閩再討叛臣四征叛王其間事平而疾聞變請行惟以有國艱虞爲憂視轉鬬乎萬里之遠歴歲之久若堂奥之朝夕焉雖風雪皸瘃其膚鋒矢交集其躬飮食飢渴不時其口體皆不避恤必致寇首戲下歸報終事而止眞凛凛有曾考風上尤眷重之若世祖身御􅐤鞬弓矢皆百世傳寳不以賜臣下者惟以賜公海東靑雜鶻先朝多或十賜惟至白鶻觜爪玉如聖語曉曰是禽惟朕及鷹師所鞲以卿世臣諸孫宣力之多日桑榆矣無以娛心河南治地平衍而遠且多陂澤鵝鸛所集時出縱之使民得見昭代春秋蒐田之盛不敢萌啟邪心皆殊錫也夫人某氏男四人宣慰憲副參政季博羅公于庭臣居家最名有法夜分不寐諸子列侍其側聽談祖宗故實母敢或歸私室宴奉樽俎迭歌舞以娱賔亦無有酒失者女六人長適國戚巴拜次適色徹肯平章子僉書樞密院事完者次適國王弟布哷齊次適伊克徹爾太師弟克哷出㳄適山東宣慰使必匝雅幼在室銘曰皇矣太祖肇造方夏右之左之惟十臣者公之曾考展一其中矢矢􅄋告帝視友同敵陳來加挺戈而出大崩其軍免胄而入五兵之長無矢不仁懋功是創由賊叩輪帝側其心百俘償死顧成嘉止旣王其子迨分茅土帝自等差國以泰安二萬其家公祖王季勤勣克類再傳而公世祖之事勲閥遺苗帝植以培而獨于公嘗譽其材聽于禁闈無止入出翼翼其心彌謹自律隨遇而安利患靡干承命卽往奚遠奚難東北海隅西南六詔甌閩炎陬金山遐徼聞有難虞必請赴趨大獄叛藩無一漏誅人臣憲憲曰省臺院平章大夫宥密鈞踐先聖今聖賚予優優良駟天閑豪集御鞲櫜鞬介胄鞍帶衣裘黃白之金委家如邱皇矣太祖于疆于理惟公曾考實成其始遺厥大艱􅂌之神孫神孫世祖闢乾翕坤考其皇輿南北猶判孰是浙右羸鬼歆裸大興師征嶻嶪百城罔不簞壺竭蹶義聲傳其國都孱主銜壁叢爾淮東諸州猶壁詔公進攻盪殲渠兇九域攸同公焉成終將天之意悠悠或在成始之孫宜際斯㑹益封桂陽江嶺外內于乃先烈克光以大嘗聞古先誓侯功臣泰山如礪國以永存嗟公王孫國泰山下權輿礪如其自今也平章政事徐國公神道碑公伊札吉臺氏諱徹爾曾祖台齊初將突騎百夫宿衞從太宗戡定中夏又􅗴平宋彭義斌俶擾山東太宗分土功臣由徐邳再刳於兵戸不足萬故國以兩州祖納呼憲宗伐宋師由蜀入從攻合之釣魚山戰疾力考奇嚕俱監其國以世祖建極中統之元庚申夏五月十有二日生公六歲而孤母夫人富察君介介自持動以禮節親戚不敢干以非義敎子讀書天質粹美不勤外傅六經二氏悉涉源委以故聰明開益日多才略兼人恒以匡君經國自期至元十有八年軀幹盈常襲其祖衣長不能勝則知其先益魁傑也其年入見帝賜之問而奇其對進侍帷幄湛露龍光汪濊涵濡絕其等夷時詢民情細微敷告無隱一諸侯王稱兵東北帝自將征入其地矣軍中夜驚公出撫遏人識言音喧沸一寂跳梁旣平爲秦兵餘之民艱窶剝膚不賑恤之將不生活頼賜榖帛牛馬脫寒飢者無慮數十萬人歸擢利用監古武庫也匪爾在帝心人者不以付之二十有三年詔求逸遺于江之南且省其俗時相方急治賦鬻民學田官有其􅀡令旣行矣公則止還諸學用爲完廟養賢之須歸以事聞制甚嘉可明年僧格分中書庶務立尙書省初爲平章後爲丞相凡昔盜殺臣爲領部爲制國用使爲尚書省所逋錢粟倂歸中書舉誣爲中書失微殺其二相大爲計局鉤考毫釐諸省承風鄂省己劇浙省尤酷延蔓以求失其主者逮及其親又失代輸其鄰追繫收坐岸獄充牣榜掠百至或關夫三木責妻市酒以償民不堪命自經裁與瘦死者巳數百人虐熖熏天諸王貴戚亦莫誰何無不下之獨公奮然數其姦贓帝初未然益犯威顔言色俱厲帝以爲醜詆大臣失幾諫禮怒遣左右批其頰辯不爲止曰臣非有仇于彼而然􅀡不忍其罔上自私敢因雷霆一擊遂爾結舌使明帝有不受言之名臣實憤恥帝意始解命將衞介百人控鶴倍之入籍其家得金寳衍溢棟宇他物可資計者將半內帑罪旣彰白始鈐其人諸繫計局者皆出之又命籍黨惡浙省諸臣平章左右丞參政烏瑪喇黙哷實都王濟等家併僧格之姻鄂省約蘇穆爾皆醢以謝天下以成其獄凡四過徐不入其家爲帝所忠怒御史臺臣不善癉惡坐觀政紕其自當汝罪皆曰奪職追祿杖三者唯命江浙平章夙有怨于臺乘其慿怒自傍激之謂湖北廉使功臣諸孫盜燒鈔八百定堂帖二十下容姦數年贓終未入抱案帝前示曰稽是可見誤裂卷爲兩縫留半印公曰縫用印者以杜罔欺汝爲宰相持半印案以訟人餘半烏在其人言塞帝顧罵而起臺誣始釋明日拜御史中丞無幾時拜榮祿大夫平章政事行省福建賜爲兩金五十銀五千令行禁止民便安之惟汀漳劇盜積歲未平公身將諸戍之兵申明約束不貪勝不蹂禾稼不入民舍惟張皇武威過柵不攻示以整暇晝則合圍山中夜則稅野偃旗仆鼓賊或僞降覘其何爲乃豐酒肉飮食曉曰汝昔由不堪汙吏侵􅁀潛逃居此能棄險而還耕桑則平民矣吾安忍被汝反名而加諸夷寡人之妻孤人之子獨人父母而利其財悉縱歸之他柵聞者相率以出其渠鄂特新日戩南奔大兵隨之偷生隖中其黨縛致于軍血鋒刃者􅂊是一馘自是方三千里枹鼓不鳴正席其堂畫諾而已聞帝不豫馳歸京師嘗藥晨夕俄然賓天與諸侯王大臣定策禁中遣使逆成宗龍庭入踐天位大德之元拜江南諸道行御史大夫一日召其都事賈鈞今參議中書者謂曰明詔責使肅淸宣明風俗敎化而刀筆流爲御史者肆爲苛虐惟急徴贓以多爲功至迫子證父妻證夫弟證其兄奴告其主敗風敎者我實行之汝宜以是出訓其屬帝聞之以爲得職風紀大體微意柏臺七年改浙省平章政事其治如臺門無私謁以轉粟京師多資東南居天下什六七而松江塡淤歲久富民利之當水出塗築爲圍田以故瀰漫浸灌沮洳廣遠民不可稻公發卒數萬浚決疊石堤之導水入海使復其故凡身董役經時而成民得良田若干萬頃至今頼之九年召入平章中書贊右丞相專力一心燮和庶政希致隆平纔一暑寒責異巳相曰方帝不豫而乃阿中專决吾誠不忍汝見敗國以喪元也遂疾不出以十月八日薨年四十七立朝之士在野之民齎咨咸曰古人有言昊天不弔殲我良人矧鉅臣哉蓋棺之日最其家楮緡不滿二百而債券積多至十萬大臣清貧無公比倫足昭炳白樂施爲仁不富之實官給轊車始克歸葬于徐邳岠山之陽前夕兹山列炬如晝人則以爲公之營魄結爲光耀以助臨照之祥旣貴顯矣妣夫人杖之受不敢逃其孝又何如也後公薨之三年當至大之元制贈推忠守正佐理功臣太傅開府儀同三司上柱國徐國公諡忠肅嗚呼今聖不忘哀而崇之所以爲人臣下賁幽墟可謂竭盡而無餘矣銘曰維昔大帝立極之歲人生是時不億其麗何獨于公光嶽氣鍾娠是元臣豈億所同加敦詩書聞見開益甫踰弱冠帷幄出入于狩于征無遠不從靡夕與朝勤不懈恭天寵之承其言易􅀡袞闕可彌憑怒安䘏大沃宸聰盡殲孔壬于福平章百其贈金汀漳夙盜知公來臨投其殳戕耕鑿謳吟成宗繼序曰秦漢下御史大夫丞相之亞俾行南臺不專繩愆體仁德音風敎是宣移平章杭先民所急浚通松江壞防巨室中書平章曾不歲餘責右巳相阿中速辜行馬施門用示不出憤疾以終救時望失將窆徐方岠山之陽貧僅能歸其淸益彰嗟兹九土奠自神禹岱宗巖巖北徐爲襟其帶伊何淮流在南今其疆理蹙乎古始河齧彭城其水瀰瀰初公曾祖以佐運功雖國是徐猶爵未崇於皇今聖公德之令哀蚤隕祚上公是命旣土旣爵傳子而孫帶礪山河國以永存徽州路總管府達嚕噶齊兼管內勸農事虎公神道碑李氏國凉爲宋金西北陲患三百年太祖徂征猶傃天戈以故多取殲夷烏訥城帥實與宋臣戰死惟戲下鈐部官穆蘇和勒由首出降獨全從帥子惟忠則贈銀靑榮祿大夫平章政事諡武愍公恒之考􅊢分土淄州諸侯王王多其氣貎異倫精藝騎射能諭說他國言爲華言如周象胥氏敎以爲其國軍民總管從征淮南年七十二卒二子長則公諱益曰古人以王父字爲姓我其法之我先人諱中其取一言姓遂虎姓未冠敎參其國萬戸府謀議李璮反盜據濟南詔徴諸道兵誅之公在王國軍中分城長圍斷其遁塗七月而罪人投首以軍諮勞賜廐馬鞍勒衣服甲胄弓矢白金爲兩五十後命于朝官以承事郞知萬戸府事用兵襄陽王國軍亦徵公在行中復城長圍不釋甲六年當至元十年其守帥文德始下明年詔故太􅀓巴延以中書右丞相督圍襄諸軍濟以新籍之兵南伐旣渡江分兵五之一留故中書左丞相阿爾哈雅時以右丞戍鄂大軍次浙西右丞相徇地湖南詔虞兩軍相距懸邈無以應急緩俾武愍公時以左副都元帥將是軍徇地江西公在行中從破劉槃熊飛吳浚張文虎文天祥諸軍下江西州七閩中州三廣東州十四護送纍臣入覲凡所詢軍旅事機陳對皆可官以中順大夫監龍興路是州爲新造之􅀖而宋餘孽兩王改元海中遣間四出官訹故臣在在起應蜂屯蟻附左翦右攘數年未平獨公善威讋而信柔之一境肅謐及陞帥府爲省滿秩省以其民安公聞制留再爲凡監龍興五年移監撫州路始以日本之師繼以交趾之師供億百需一令之下急踰星火動裁以失軍興法其事之集獨先隣路省喜利臣復大加鉤覈旣徵于書又繁爲條約使吏自實有多牟于民而冒出于官者皆責償之自以爲功而媒貨其門鮮有不入罪􅅈者公獨完潔無絲毫得凡十年移監袁州路三年改監徽州路皆位總管上撫陞中議大夫徽陞少中大夫袁徽皆兼管內勸農事滿徽而歸曰吾旣得從戎天訖宋命㑹其成功受任先朝洪撫袁徽連牧四州服三品服人臣願欲而不得者身享有之餘二十年可以止矣豈如他人上覬將相以致敗耶過汴􅁣息曰吾祖世官西河之壖吾考寓墳東海之濱是􅀖去路而邇亦地之中于是爲家可以西望吾祖東望吾考遂買田休居以大德三年辰在巳亥十有一月二十有八日卒年六十三夫人楊氏嚴于內治閨門截若男二人文煇文煥女三人長適武愍孫今湖廣行省左揆世安子利用監某次適池州總管府判官隋載子某幼姆始公之卒弟儀哭曰吾兄不滿年格果于遺榮期以自樂于日薄西山也曾未中壽而遽已是我可不念其拓境之艱成家之難以厚其死乎凡喪葬須吾力能及不必出兄之家旣墳請左揆曰乃曾考帥烏訥城我先人其鈐部官兄從戎淮漢江閩又惟乃考先正武愍是從今以男女故託姻里聞公有所善翰學嘗詩武愍麗牲碑者幸爲吾丐銘于以揭今而訊後死而有知骨不腐矣故左揆走書見懇曰儀非􅀡克弟加善植業同里有貸黃金二鎰者死曰吾可同俗訟其妻子與見知者必其歸耶裂劵火之又能以禮自律至里門則捨馬而徒其爲人槩是宜若不可拒者燧曰嗚呼世有兄夷牀未寒巳利奪其財于嫂姪手遑恤夫葬與銘聞儀之風亦庶可少愧哉况兼是數美誠難能也故附書之儀由將東諸侯王射士制官承務郞提舉崇明州鹽埸今領天后位之民夫人四其亞趙三子文郁文燦文炳銘曰嗚呼維公少而卽戎與齊長圍平賊內訌先皇賚之騕褭以乘雕弓貝胄華衣晝映繼兵襄陽荷殳于中旣下明年大伐是從分戍鄂省皇旋有命大師及吳江右靡定移武愍軍往徇于洪從收閩廣狼烟一空馳以入覲山川形勝軍民休戚隨問隨應言悃而忠沃心宸楓曰洪汝牧虎節以庸公旣戾止嚴威信令植柔鋤强敦皇齊聖滿考再爲隣盜如蜂獨其境敉郊農市工移撫十年其事始盛倭征交征一食日倂海艘督造陸水仰供彼婪婪徒私先後公涅入緇出官刑忘鏡紛紛觸禁如獸投穽噫哉維公克潔其躬移袁移徽一其初終六秩言歸時寵絶競如車善柅擊節月評平馬夷山突如防封于仟表之有碑穹崇載銘其陽其烈足證其來後昆其賴其慶臣劉鳯誥恭校
