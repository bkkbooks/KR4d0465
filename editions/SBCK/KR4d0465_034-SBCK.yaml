body:
  text: 元姚燧撰五言律詩感事致位丞凝地䕫龍伯仲間星當朝北斗日巳薄西山取謗因讎惡貪權失丐閒此行雖䥫甲未足比慙顔輿病高崖道中作役役乾坤逺栖栖道路頻五年三入蜀十夢九歸秦塵病偏凌客山英定笑人無勞問前渡祇覺白頭新發舟靑神縣靑神開百丈江岸轉荒凉薜荔緣松起蒹葭並竹長深披􅉘虎徑毒犯虺蛇鄉何莫非王事農夫可惋傷舟達黃溪草木隨寒暑殊方榮悴同葦華兼露白檉葉未霜紅日月雙飛鳥江湖一病翁晩來沙嶼上愁坐獨書空七言律詩大都寄盧處道家弟去冬溫室見玉音問汝死耶非因知洛下思常切雖樂江南告巳違一旦去妻鄰舍棗三年遊子溧陽衣無尊君父無親母有底牽留未卽歸元日昨夜中星仰看昏攝提驚轉帝車轅三千單紒苦寒盡五十二年今日元與宴記霑魚在藻退歸甘免鶴乘軒膝當木榻穿皆穴髮比霜蓬不斷根四年甲午再過龍興訪雲谷玩石砮留一月而還贈之石砮射隼中應雙一集陳庭一此鄕楛笴久隨毛血化石稜猶作劍鋒剛知音道適逢坡老得寳神陰相豫章廟令收藏要知法謂看垂矢在東房感白髮霜􅁂休輕比素絲素絲經染一爲緇叅同知白意端是始終守黑更無移不似鬢毛難上色百方無有再􅀇時􅀧檢形骸無一可醒尋泉石醉吟詩寄題陳肩夔兄弟夢草堂謝池草句本無奇千古流傳五字詩祇是可人醒枕席許多生意在壎篪信渠風雨聽眠處快甚江山得助詩顧我此懷今巳矣羡君兄弟撚霜髭寄題武安節推同年萬君定翁露香齋取趙淸獻夜則以日所爲告之天也是官也蓋淸獻初仕云盡將心事寫成碑大要操脩在不欺此一瓣香前輩似只三箇字老天知素瓶貯豆應先滿匹馬擕琴料自隨吾榜得人今又甚會排介甫擊升之道中卽事十九首半生奔走路塵紅老合投閒向此中炙背可親冬日叟脅肩休笑夏畦翁前除梧檟皆黃葉别院橙柑尚綠叢榮悴不齊誰使爾欲將斯理問高空􅀧檢荒圍新植物長身君子不居中花惟名牡可爲牝竹旣曰孫元有翁九月未霜先挺荔幾時因雨試移叢欲爲奇品少遮日早願新梢高拂空閒人濶畧俗能容胥責區區禮法中泥酒有時遭郡守借書嘗夜過隣翁江珧荔子幸同味玉樹蒹葭何敢叢交比盧仝儘平易猶騎騄駬上虛空月出瀼瀼秋露濃舉頭天運定方中休官止酒愛陶令對客賦詩輸杜翁燈盡不挑垂暗橤葉聲閒聽墜枯叢馳心弄墨誠餘事度日悠悠遠勝空買犢賣刀方課僮躬耕來此近隆中䕶堤􅂊置木龍子穫稻已輸秧馬翁林遠薪蒸難似桂庭荒藜藿茂如叢金穰己應田家卜儲粟瓶知不告空人家山郭蕭條裏客子秋光荏苒中川逝無情將老汝土非何物不悲翁鴈書終日度遙漢螢火經霖生腐叢只有文窮能作祟一時袂送若爲空富貴貧賤交態一何人耐久伴閒中書繁插架儘良友筆老免冠眞秃翁睡起蟫魚沿敗楮吟來蚯蚓發寒叢忘君畎畝吾何敢正賀三邊候燧空􅁍比周郞似不聾回頭曲誤妓闈中樽前客豈可無我詩裏人多非自翁落落旣爲喬木世翹翹宜㧞錯薪叢或云尙續樊川叟未要風流掃地空俗自窮余余不窮無羞俯仰兩間中叩門聾僕強迎客索飯嬌兒能叫翁葦縱聽浮身一粟蓬飛未甚鬢雙叢爾來每爲家人笑煑茗哦詩夢亦空往古來今無限士何人不在好名中窪樽牛飮笑聱叟絶筆漁歌奇放翁關內舊詩傳菊帚穰間新事縛蓍叢至將大衍供除掃烹鶴燒琴不是空衛生道至東坡簡坐驗朝昏視息中解使水男親火女卽爲木母嫁金翁聖人愛嗇文多秘方士支離語漫叢只壽百年身健死不須白日上凌空年少諸賢莫笑儂人逾五十日過中白頭持未到君耳造化豈私令我翁南國香橙難似橘西川慈竹本名叢世間貴耳多如此磈磊孤懷正要空僻性知難與俗同舊交新識往還中嫌爲厚貎重關相愛不機心抱瓮翁鼯鼠躍林窮五技橘奴輸絹止三叢遙應世母神州說孤姪生涯尚鑿空時才位地難齊同過猶不及非是中禦人潄石信辯士爲子移山眞拙翁鵬翻溟渤扶搖水鷃搶榆枋樸􅈪叢萬物自人惟自我爲君高視九圍空憂國惟求一歲豐商歌遙夜幾時中長懸謗木古來主欲獻食芹何處翁虛應蒼麟纔一角瑞時朱草必孤叢傷心千載懷沙賦日月何嘗不在空老困撥書非自慵徒令憂喜塞胸中費桃一日殺三士剖橘何時見四翁單極綆多能斷榦千章木穉已超叢子魚未是忘筌者回首遼東半席空無補明時山處同一毛得失九牛中雲山不是世爭物田舍正宜吾作翁文或問津牛馬走才難入網鳳麟叢燈前百萬呼盧擲未問家儲甔石空駟馬難追言數窮猶龍自守不如中口知余媿三緘士臂亦難爲九折翁流水必趨恒下地狂風多折最高叢若人有問安身策拙學區區過此空未曾齒豁與頭童年少應無日再中四海固多知巳士一門惟失譽兒翁蕭蕭霜葉紛辭樹粒粒燈花細妥叢遙夜誰家發砧杵月明如玦半橫空次曹訓導韻詩筆高冠無此流雄音壯節得前修淸明􅀨過桃花浪上已風連桑落洲江路帆檣容少住鐘山杖履遂奇遊獨來乘興闌還去千古何人識子猷此詩石刻在今湖口縣學敘云前翰林􅀡學士奉政大夫知制誥兼修國史姚燧以靑龍辛卯春三月四日獨來縣學諸君適無一人知者偶縣教訓導曹君餉余詩爲和之所謂鐘山蓋石鐘山也挽王敬夫憲僉素韠孤兒拜屨前令人未問巳淒然同官南郡􅂊三日隔世東州忽一年夜月誰家虛燕席春風客路􅀒雞綿玉碑老子埋銘在潛德何憂世不傳别駕劉之問邀燧同府倅余叔器田别乘顯􅀸姬府教伯陽以癸巳九日飮郢判席上言懷去歲君山孤櫂遠如今盡室石城州明年白髮桑榆日何地靑山萸菊秋客氣已爲彊弩末宦情空繞大刀頭果成問舍求田策未讓元龍百尺樓次劉時中反和杜紫微韻贈李若水并序至大始元二月舟過高郵有李若水者爲屋數百楹以祠東嶽自號睡著余竊笑之豈是舉嬴皆夢中爲耶因其求詩取水驛壁間士子劉時中反和杜紫微齊山登高韻以贈其人㓜年自閹云何事仙人亦毳衣􅀩茸如菼曜朱暉潔身自說年華盛睟面誰傳夜氣歸能爾用師三晝返不知去俗幾塵微睡嬰外務何曾著常恐金烏出海飛次時中留别反和杜紫微韻身世支離似敗衣有戈誰􅁍魯陽暉不知次日公車召又俟何時野服歸花信正愁風駘蕩麥苗還喜雨霏微分擕江上休回首恐見檣烏作背飛次時中參錯和前韻留别且勉其進德無怠二首啼鵑休訴不如歸我亦從來賦式微竹塢且宜鳩杖立柴門不謂鶴書飛舟行遠後忘經驛酒禁嚴來往典衣爲問石城鷗與鷺幾時相對弄晴暉多君問道粗知歸雲霧何人識少微爾後驊騮終獨步自前鷙鳥不羣飛淮南數日將寒食客裏三春尙臘衣安得鑾坡同給札不妨苜蓿對朝暉次劉時中和唐牧之齊山詩韻有足斯奔有翼飛靜常觀物入希微名慚窺管文章竊跡喜收身劍履歸影與金樽邀夜月夢無玉斧照晨暉白頭坐取移文誚又爲前生一倒衣次韻時中再和簡呂正字登淮安城樓久知戎服笑儒衣終尚晴窻惜寸暉上馬人扶甘伏老擕家旅食亦安歸嗟君無事乘淸興尚友新詩和紫微相勉殷勤養鱗翼㑹能川泳與雲飛喜雪鄙句奉子英提學天上雲紋漾水波人間山色映兜羅東風盡日楊花落南畝今年楚澤多稼穡生成知帝力昇平消息聽民歌漢家始建營田計未厭牙籤沒馬過七言絶句賞花吟十首常歲花開必禁煙今年開在禁煙前坐令姚魏皆牛後但媚殘春穀雨天嘗並牡丹爲妬婦一枝惟許一花開從今記取花前飲莫遣猶持媵爵來陰翕陽施草木知牡丹烘日巳離披明晨浥露還收合恰比芳苞欲吐時少年騎馬縱春遊紫禁名園訪欲周今日病中扶杖看白頭先已爲花羞出門京國事無涯虛擲東風五物華却謝病歸催不起故園今見碧桃花手栽修竹􅀡檀欒十畝清隂六月寒西掖歸來但篁篠被人皆斫上林竿酴醿寶相海金沙條蔓縈籬四面花莫道詩人例窮苦繡屏圍坐是誰家大蓋靑油一丈陰未須持入海棠林好乘麗日光風看猶勝銀釭照夜深佛桑艶艷欲燒空猶愧山茶鶴頂紅更是並他凡卉異謝時連蒂綴東風東風試手送韶華落盡梅花落杏花留得西園桃李在尚能十日媚山家張總管淸富軒米船明月白虹光未半王詵寶繪堂今日又􅄈淸富出兩家遺物滿筐箱許道寧幽人曳杖圖噴壑飛流雷怒鳴切雲老幹凛將傾深山窟宅皆豺虎說與幽人莫獨行題米元暉楚岫蒸雲圖得法君家海嶽翁靑林翠岫白雲中夜牕不是瀟湘雨定有當時月貫虹剔耳曲音小誤已回頭得此人生莫過求堪笑殷君太聰聽却妨聞蟻鬬如牛節婦􅀩氏卷三首死别哀思盡有期最無窮已是生離如今筐篋同州吏誰肯分擕襁􅀒兒今年西北靜氛埃前日跳梁􅅃附來早晩君王罷邊戍良人應逐踐更廻能爲聖代立綱常何獨雷門爛有光太史諸人爭淬筆流芳􅀡與漆沮長張仲牧牛圖牛力農家惜百金畫師眞得老農心釋耕不忍還騎去仨可牽牛步逺林王氏祖塋詩卷讀渠滎澤墓田詩太息師垣尚未碑從此南歸得終願衛人應有賦蟬緌題孫大方眞人秋聲軒五首牕竹蕭蕭夜撼風秋聲何處不相同却休八表神遊客認作匡山紫極宮醉翁詩法似長庚序集東坡有此評不和蕭蕭動牕竹却從庭樹賦秋聲畫竹今推兩李魁魚牋鵝絹訴爲災試披風葉霜枝看似覺秋聲入耳來晉賢長歗只孫登君是苗遺必也能肯聽秋聲成一笑攬衣燒酒對宵興心許神交羽服流讀書惟此一天游幾時却向秋聲夜醉臥朝元百尺樓黄華墨竹湖州再變到黃華兩竹離披自一家萬斛顚風掣旗脚軍民吹屈最高牙樂山卷老思吟詠恐傷神多少求題委案塵展卷樂山殊喜作自緣身是愛山人巫山圖神女行雲安在哉當年魂夢費蘭臺絶癡更有杜陵叟尚想空山幽佩哀題步隲奉瓜圖二首從來道屈不伸身特傳吾嘗笑史臣簞食豆羮情最見征羌還􅁍善觀人世有淳于定例冠祝田求狹責奢難若從今日論􅀲􅀡未必償渠飯一盤題曾子耘􅀲圖誤斷瓜根罪甚微未消狂晳奮餘威鳴琴不怨參眞孝尙學風雩鼓瑟希書琴工萬古音卷後聞道爲琴獨苦心新琴能發古時音百年􅁍視今爲昔不說雷琴說萬琴寄耕鋤隱者倪元鎭谷口靑松夾徑生鶴巢松頂雪初晴此時知有經鋤者獨抱長鑱嶺上行檢校傅伯賢求挽其父憲使五首憲節崎嶇瘴嶺持歸與多少引舟旗東甌除却令尹祝别道誰家有立祠公雖歸葬汶陽莊留得閩中像在堂好記儂言看他日遺苗終有視爲鄕鴂舌將何歲奉嘗荔丹橘粲與焦黃蓬萊日落天風急營魄時應一望洋累帙百篇先在吟鏗然一字敵南金向人求請尤無已足見終天孝子心知生知死弔傷俱紀德於詩事不誣我僅知生不知死弔章魚目混驪珠三老圖三首宋人金季反兵時徒遣荆州往乞師撫劍歸來天歩艱無因死病怨良醫從臥封龍十頃雲閎中肆外溢爲文若非用事多排比黨蔡諸公不足羣勃磎姑婦入龍庭得意攜毫雪佾亭向使遺文盡收此後生尊作吐辭經陳雲心題君近昌江山巳深更依天岳最高岑月明淸夜援琴鼓惟有白雲知汝心挽雲南參政張顯􅀸四首其祠在碧雞山誰昔新知紫鳳山正當持節日南還曾談不足能專對不得深輸九虎關萬里橋西遠寄詩但知相見可重期如今繙閱傷垂老却是幽冥永訣辭自非威信結夷蠻祠廟誰修爨僰間從此旃裘具牲酒不來徼福碧雞山人臣用世孰無能由子非才不見稱觀此移忠與純孝是家台席有重登趙信庵墨梅廣平援筆賦梅時鐵石心腸吐媚辭千載信庵湔此恨􅁍將鐵石作梅枝楊補之墨梅枯枿殘枝三數花似臨淸淺照橫斜草元善學營邱筆水木齊行自一家題剡溪回舟圖戴逵失策遣人哀禮也元無往不來明日相過莫相見扁舟却與到門迴臣徐立綱恭校
