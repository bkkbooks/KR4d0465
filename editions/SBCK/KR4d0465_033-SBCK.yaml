body:
  text: 元姚燧撰七言古詩題甘河遇仙宮并引李天樂眞人自余去年客秦日求賦甘河遇仙宫其地蓋重陽眞君遇異人酌甘水爲酒相酢之所由是名甘而不知甘卽夏帝啓與有扈戰此今其縣猶曰鄠其名舊矣天樂託石子玉遣其弟子自秦入鄧千里求詩爲之詠此鄠卽古扈字也終南下甘河水我挈瓶嘗作泉比如何仙翁酌飮人一唾世上無醪醴是何濡軌不成川北流赴渭朝宗然東海相絶幾千里餘波開此黃金蓮河之源委且不見味更幽渺人豈辨詩翁乘雲能再來醉擲餘盃須一吮題西鄰王景韓茅亭次韻朝陽洞深纔㝷丈欠身舉手己捫上誰識中有盤谷客黜陟不聞時得喪夸夫鐵甲薄于顋有手不解持螯盃時許雪曉穿蠟屐踏破瓊瑤來看梅人家買宅得鄰幾墻東避世渠妄比可憐過愛醉後書未見來禽與靑李猶嫌洞遠如隔波茅亭别構高容駝兩僮日聞語音熟呼門不復相誰何題張肖齋所藏雙鶉圖日􅄤鶉首在夫未午爲鶉火已鶉尾十有二次分四方彼鶉居南獨三次是鳥尾短不覆軀翼花斑斑鷓鴣如首雖善鬬易馴狎握粟已逐兒童呼豈無鸞鳳爲月紀未必星翁曉何以寫生亦箋爾雅徒耗墨晴窓費縑紙天寒江北網如雲車馬輸充鼎爼珍今日此􅀖惟罕汝畫師應不是穰人謝馬希聲處甆香鼎吳侯建盌侔紫鐵表裏㕙毫瑩鋪雪每愁射日動精采倒景過目睛電掣人云煑茗何足道黃金百鍊終不裂惠然持餉耽詩兄供啜幽齋眞一絶馬家處鼎同青瑤左右梁耳圓索綯預憂凝塵助脆滑失聲脫腕春冰抛我思焚香固其物丹砂九轉疑可燒何當去求善畫史取並淸玩誰相高盛荷不慳隨所欲擕歸僮輩笑偃伏白頭主人好惡異乃寶瓦礫賤金玉前年禁林辭千鍾今乃貪此盈一匊但知焚香煮茗趣亦念饑僮殷雷腹先生一笑呼來前吾意汝豈知其然出門仕徑方爾窄陽在隂中陽逆旋人來正可飮醇酒孔方交絶今幾年聊將二物代飽德試問孰與空歸賢適有江西麥光紙一掃新詩三百字爲余走送藝聖軒足與渠儂作回施趙温甫自汴託人求詩傳君家今汴水在博雅外無他嗜愛牙籤架插鄴侯書玉軸璧藏永存畫伊人何狀不及知與世異尚有此奇楮縑且寶况􅃔鼎勃磎一室應累累我於朽銅如二豎百藥膏肓攻不去劘靑拂紫可療饑每被人嘲友康瓠白頭留滯周南村怫鬱襟期無與論天寒塵生碧水硯日暮雪落蒼山尊幾時月明虹貫夜相遭傾櫝千金價定將餘有易所無莫畏先聲避三舍爰裔堂牡丹宣相家牡丹雖多然止三種玉板白葉底紫淺紅惟二十一日最妍盛邵子所謂看花須及未開時今巳凋落矣錄呈時中繫帆盡室遊長沙假館適許鄰宣衙千紅萬紫紛爛漫獨餘牡丹纔蘖芽苦遭浹旬風雨惡手自挿架扶橫斜天香國艶付寂寞巳分抱恨歸舟拏今晨靑陽劃妍暖一日開盡三闌花左闌後闌鬬鉛華綽約仙臉粲朝霞重趺單蕚異肥瘠玉環飛燕無敢瑕西闌兩株玉板白虢姨色羞脂粉加中叢昭容垂紫袖朝儀雙引肩相差非緣門前行馬設巳有遊女塡闉闍我昔綠髪洛浦涯繡韉慣逐遺􅆪車老來自信此夢絶何意猶􅅭東皇奢夜闌秉燭淸味薄晝短尚畏啼棲鴉學詩未知正而葩學書劣能綰秋蛇酬春烏可不一醉二豪笑口人誰遮明朝芳蹊縱百遶彩雲飛墜何及嗟坐無徐黃寫生手不拂東絹圖還家大農掾樂子英求詩吾友秋澗兼高廬詩稱子英發菆塗履霜兩楹草已宿顔色不少平生殊先軫歸元如生面處父死敵固堪羡慙德參乎啓手足淵冰要見兢兢戰卒絶欒盈遙遙孫傳芳簪居終懿門尚期千古骨不腐血肉未敗何須論三君將成孝子志皆借毛頴傳其事泉臺長臥誠有知洛誦雄篇凛生意張肖齋蠟梅爲黃雀啄食余家牡丹芽爲浴雞所壞趙家堂前蠟梅樹叢枝已綴薔薇露醉歸紅袖折簪帽似與華髪慰遲暮遙應此日開更妍萬斛淸香撲軒戸如何肖齋茅簷角寂寞春風殊未覺君云落英地如蠟欲破已爲黃雀啄可憐終是主人仁不把金丸散飛雹我庭秋培牡丹芽屢灌期以開歲花曾覆一簣護霜雪忽遭雞浴騰塵沙翠枚紫荔蕩無有枯枿齊試快莫􅁘翰音無知無可詬汝口平日羞牛後豈無糞土振蚤蟲非有黍粟充饑脰投􅂌湯火諒不難議功姑以能鳴宥梅花啄殘開疎遲牡丹今同抱蔓歸靜求二蟲相惱故無乃冥有教使之坐因吾儕對花飮歌舞不避傍人嗤不如無花無酒過嘲謔狂詩爲誰作果如造物意在爾玉汝於成德幾大守墨應遵老氏箴只取二蟲圖置坐次齊彥提刑和余肖齋蠟梅詩韻聞辭湘中巖桂樹畫㦸凝香正風露此時清趣肝膈橫遙應半歲猶朝暮移節南陽但茅屋低雜邑人三百戸冠雖觸邪心麟角公論非我岀先覺化行仁厚到生蟲踐之未忍那肯啄定國治獄民不􅁈安有六月飛霜雹萋萋碧草春風芽相逢官路黃柳花繡衣驄馬未岀宿先聲巳過河干沙東西百里不易見况使南北千里耶又聞不避南陽詬官舍盡室無一後己遣魚軒還潞水但畏兒童癭生脰久知是􅀖多此疾賢如元凱終不宥蹇我白頭學詩遲少陵不作誰與歸伻來一月再惠寄無乃有意幸敎之我雖不作能知詩評君一語君莫嗤古人復生不是過百泉梅花更奇作篇終用筆愈精􅂃餘子工夫無許大東鄰好事有肖齋併取歸家玩行坐招貢父探梅去年南陽雪積丈苦寒更在燕山上荒園栢樹舊冬靑一夜生意隨凋喪今年半冬汗浹顋馬蹄誰是散銀盃愆陽騰威蟲出蟄到處盡芳年後梅城中知春能有幾千樹西園雪羞比不須乘雲過玉川但看明月輝桃李願分伏瓮新金波我烹封麏如稚駝相攜吾黨二三子白頭一醉君如何次探梅韻昨日余醉先歸貢父與史鄧州令妓歌飮至城次韻山頭落日高三丈我醉思歸馬先上來及城門市己燈纔下雕鞍路迷喪行人笑指駢肩顋不見使君荒郊盃百步一止歌吹發淸切驚落千林梅是􅀖能詩輪指幾橫槊吾猶驍健比夜深却怕醉尉逢不識將軍隴西李近聞北涉漢江波千錢糴穀載一駝吾儕寄公不喜樂其如􅀒此時平何楊丞彥先見和復次韻二首短兵最長不及丈善用遠在威弧工惟君詩筆可配之未信於今士風喪無錫如花越女顋人云無此不持盃解組歸來卧衡宇寂寞巡簷空嗅梅出門欵段朋儔幾我策駑頑時竊比不繙異書友蔡揚且玩奇石傲牛李一日不見古井波相逢莫話襄銅駝白沙翠竹江路好蒼生安石如􅀸何􅀡饒白髮三千丈猶賴巾冠􅀩在上縱齒衆中人不咍年少風流氣先喪最恨白髮磔顑顋毿毿未飮先垂盃顔壯自羞追勝集不是有詩眞負梅兩疏黃金在餘幾入手把玩春冰比莫從車上貢餘桃分棄路傍齊苦李萊田茅屋臨湍波持家惟有書數駝欲敎兒癡未解讀及此正可遊無何八景樓公乎何年謝鈞軸結樓臨此湘一曲太行山色高入雲千里空靑照沙􅅢胡爲捨之不命駕無乃風土西南熟丹梯不樹三丈旗巳使元龍臥牀足世誇八景何足道自有萬象供遊矚因之不遣别製名可見靈臺不違俗樓中儲書三萬卷時與多聞來勘讀每讀北海空樽罍差比東山廢絲竹􅁍思十年帥邕管日夜不解衣三屬至今起跪必依人半是左江炎瘴毒幾時按圖數包貢尚恨未縛交州牧區區與公晩傾葢握手論心如昔夙歸檣相就煩屢别濡滯憐儂晝三宿莫言處陰影可休安坐晩食能當肉九重方務老成人㑹見鳳書來起復江漵漁舟圖漁人無田鈎爲耒生長水中安於水解維一葉信所如朝發荆江暮沅澧湍施梁筍淵􅊻罛謀食日掇􅆩獱餘無産可乏佐軍策作俑什伍官征租年年冬月寒潭碧鳴楖驚起蛟龍蟄縱橫沉網深刮泥鼓鬛潛逃萬無一小魚大魚盈千舠刀腸斧首砧脂膏然薪夜照作鹽腊百步未至聞腥臊越商巴賈持阿堵接艣連檣爭售取首腸不棄亦酢糟豈惜羣分命如縷杜陵實獲我心人解道困魚魚有神縣官丁役連四海計口算賦何虞貧問誰畫此非無意尺楮無褒惟有刺前年下詔蠲此租咸若君恩小天地留别奉御李侯李侯吾取何所似騏驥絶塵日千里人生一朝緩急間凡馬焉能託生死觀其平時善赴義竭蹷出門常倒屣千金傾槖報一餐片言杯酒忘百恥靈臺雖􅀒橫水鏡月旦絶口不臧否果如形勢心所非避喙教諛無一唯族胄貴挾北方强是性受得由母氏乃知衆善出天賦齊變而魯非學使拱璧巳云曠代珍小小瑕疵何足指適吾有覽吳㑹興握手不謂遭南紀鸚鵡洲邊月再盈朝岀暮歸同轡箠日復一日無怠色骨肉未必眞能爾古人亦貴意氣豁論交何必同調止况今卜居尚悠悠白髮相捨誰隣里非來漢陽卽漢陰斯言或食如江水淸明日陪詩僧悟柳山登落星寺詩抵掌女媧前功捐鍊石力盡還霣天怒飛十有八萬里擲陷彭蠡三重淵藏山於澤信所力愚公欲移重莫肩州民譌謂恒山路漫向麟史求何年安知自爾牛斗􅄤天穴上當匡廬巓銀河一决不復塞至今飛流掛長川我來正逢槐火節艤磯蹔繫東吳船相攜詩僧上佛閣箕踞對酒談其然渠聞舌撟􅀂自失子辯乃出鄒衍前何書太古何所得爲言烏有先生傳檣烏吳城山頭尾畢逋飛來行舟檣上呼舟中主人適中飮委肉投飯供朝晡云是巡湖王使者從卜禍福知前途家人化之亦信向恐我偶忘或誤驅絶嫌魚網戒張設見彈必毁仍藏弧因思神林烏亦􅃛怙勢不必專城狐過龍興昌邑山望湖亭去年憶登望湖亭騰雲凝空雨雪零撫碑三復石砮記賜觀欲藉王威靈廟令老人曰嘗有煙塵失自兵初經南昌歸來舟復停亭邊楊柳春風靑纔思㑹稽探禹穴湖海濤瀨達東溟牽牲榼酒來炷馨再拜卜吉王之庭洋洋在上孰敢侮正虞白日飛雷霆廟中道流師雲谷顔色憔悴如獨醒率然一物置我所五采十襲再緘扃槊鋒劔脊握有半鋩刃鑱若新發硎一砭疑爲扁鵲石三嗅尚帶陳隼腥惜無矢人與羽筈關弓試􅗤鴻冥㝠重爲雲谷語丁寧莫輕新識君其聽平生記古此第一過目暫忘心已銘商􅃔周鼎總後岀逆推巳自三千齡百年天閼孰曰壽嗟我與子其秋螢臣吳玉綸㳟校
