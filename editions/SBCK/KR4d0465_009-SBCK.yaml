body:
  text: 元姚燧記暖翠亭記九江爲州居廬山之陰城有二阜焉其一在州治東南一射上故有亭邇南門則都漕公宇距堂西北無有三十步軔其阜南北延而東西狹巋然獨荒邱辛君持使節來之明年當大德乙巳而茗産諸河南湖廣江西江淛四省之地廣周且萬里之賦爲緡幾九百萬半歲而集人誦以爲前政未有君以事治思有自娱其秋八月作亭三楹八日而成中楹東西爲門相􅀡北其墉而南其牗可洞闢以納廬山勝槪余由洪江告老而歸首塗疾作艤舟九江五旬而始少間君集同官觴余其上由扁未名求以命之爲賦歐公廬山高辭而􅁣曰東坡公門下士也其賞公詩則稱滄波萬古流不盡白鳥孤飛意自閒萬馬不嘶聽號令諸蕃無事樂耕耘未嘗一言及是辭山谷坡友也獨甚愛之大書而鑱諸石巳一異也其甚異者在漢甄鸞之測海島一立重表累矩無有遠邇而高深廣袤皆可坐致其前無所遁形于芒忽韓公南山之詩亦復如是目其強韻險語實則步驟北征然山谷又謂方之北征雖不作可歐之與韓特變其音節爾山谷親爲書無乃譏其始作而媚夫繼爲乎自後世推歐亦一代文宗是辭固瞠南山後塵至叙巖岫出縮泉石窈深雲烟變滅之得于天禽魚飛沈草木蕃暢之遂爲物道流釋子依居其下大爲室屋以侈靡相軋由人力益致夫奇秀者非巨筆如杠孰彷彿其全體能爾之盡兹亭取名苟外是焉將奚以今余與君屬觴乎此爲何時哉當建子月水火地坼而衰日暄融助爲明妍浮嵐佳氣綿亘百里容容勃勃泛溢簷尸之外豈兹山之英顯幽發微于賢主乎抑爲病客而然也平昔之遊熟秦與蜀天宇之濃綠石壁之空靑皆身至其所而目接焉角之以是無少退讓于時且然則夫春風方永之晝秋露暑雨晞霽之朝其倍蓰什伯不啻焉者可意知也其以暖翠名之何如君則曰善君名仲實字仲和號松隱其年日短至書於廬山太平宫易安齋記醫之爲業有相道焉伊尹耕莘説築傅巖之野太公釣渭諸葛亮耕南陽之數子者其始豈有心求商湯高宗周文與漢昭烈之知巳乎哉彼四君者知有命世之才可與共天位故或三聘或俾以形旁求天下或見于卜兆或聞之水鏡三顧草廬之中身先求之深拒固閉弗得弗巳彼數臣者由禮至情篤始起而應之是與夫醫者不求疾家而疾家懇懇夫我奚以異哉是一也彼爲相者見時君任巳貳而不專則解冠納履而去是與夫醫之爲彼疾家不專主已參以他醫則卷其術不發藥而委去亦奚以異哉是二也其甚不異者古賢相之爲治也必當天下阽危之際其君任之信之成焉由汝圮焉由汝而後爲相者始自任天下之重展其所蘊措幅貟于天下四維之安天下後世誦之曰彼相之才能易危而安者也夫人誰不有疾非必委頓之劣而後爲危凡小不康失治于蚤者皆危漸也爲醫者惟疾家知之仗之生焉惟汝死焉惟汝而後始敢盡其搦髓擢胃剔蛇斃犬之技如扁鵲華佗之爲而易危爲安范文正公之言曰得志願爲賢宰相不得志願爲良醫其眞知言哉醫師趙君濟和鄧之良醫也秦和古之良醫趙君字和其尊其名者巳與秦和者符況其讀書多學以濟其術乎其居有亭故扁以易安蓋取晉陶淵明歸去來辭也或嫌與婦人李易安名同謂余可更余曰更不必也變去爲入聲讀則義意自異矣余思醫與相皆易危爲安者故以是諶之然又思余不難于徙居而難于其居之學無師友而疾無良醫焉今穰城有濟和求吾身之危將託以易而安者舍之其誰賴于二者之中先有其一矣朝陽洞記穰秦魏冉侯國也余所寓西隣王工部景韓園邇于城西墉因鑿窟室樹桐其東暎蔽朝陽余嘗過而遊憩其中爲賦大雅卷阿之辭曰鳳凰鳴矣于彼高岡梧桐生矣于彼朝陽又聞鳳鳥見濁世之險微無德輝之可覽翺翔千仞而不下此賈誼所以重歎夫屈原之無時也然由書契而來至于今唐虞夏商周五代略而不道視秦漢晉隋唐宋六代之一家天下者若皆慚德于吾元亦人生曠世所難遇者而余與子沐浴太平斯洞之中則所際爲何時也且漢之中宗未爲盛治其時猶致五鳳之集顧于今有不可得見者􅁘然鳯凰棲必梧桐黃帝之時蔽日而至嘗止東園不去則固致鳳物也其後重華臣禹翦嶧陽孤桐張而絲之爲琴瑟及八音倫諧而簫韶九成鳳凰來儀若然則翦桐爲樂猶足以致鳳其封漑是桐以待其止或不能致其翦桐爲樂以待來儀二者或有一焉是二吾君于黃帝重華也誠及見之余雖老尚能揚厲天休播之金石詠歌率舞以沒餘齒斯區區之幸願也如終不可致天其或者使景韓出而遇能一言而傾四海之聽如古人之鳯鳴朝陽逾美矣奚必飛鳥之出􅀋者始名鳳也耶康瓠亭記金石爲物至壽者也壽之極上止三代九鼎淪泗而夏金絕石則無先岐陽之鼓故金始商而石始周則金又壽于石所曰三代者實二代耳余晩無所嗜惟得二代􅃔器則喜而忘寐行隨而坐皆與之接若多聞爲益之師友焉若至親甚密之晜弟焉其置也褥以文錦櫝以髹漆一不役人而惟身之猶以爲䙝也嘗建一亭名曰康瓠而特居之于商則殳丁㔽父辛爵禾目鬲周則屈生敦台夫鼎麟鳯罍惟罍無銘以飾命之猶恨厪辨其世不知爲臣何王何人先之也漢之鼎壺洗鑑鐎斗鐙鑊方之六物猶王公之皂􅊢故亦班之下陳或曰賈誼所謂斡棄周鼎寶康瓠者譏賢否易處賤尚貴也君之商􅃔光輝出周鼎上寶之又極其道所以使君怫鬱軒冕而淸寂山林者職此孰曰玩物者非君爲道之賢乎何至誣一世之人而詬二代之器矯曰康瓠余聞而笑之子必以陶器爲康瓠故宜其言之膠膠余有感而云爾古者製銘如㔽曰敦作殳丁寳尊􅃔首字未詳葢殳丁子之名也敦曰屈生始作寶敦子子孫孫其萬有年用享如在或以繼上或以垂下􅀋非賊國之臣覆宗之子所能爲也必世家鉅室有民與廟諸侯􅀸士之賢哲二代諸侯􅀸士之賢哲有民與廟爲世家鉅室者何啻乎萬人求其豐祀而儀享者將不人作一器而止于宜乾瀋生熟殊用而異施者莫不畢備而悉陳之有其副焉則世雖有二三鉅萬爲數不足夥也秦惟務除先王之道其禍豈專于燔書銷兵爲金人鐘鐻者未必無此吾何以知之宋景祐作樂銅不足充以寳龢鐘則世之發諸荒祠敗塚之間售之窮鄕賤肆之下而毁于野人鼓于冶工者又可旣也耶今名賞鑒若余篤者世無百人惟嘗柄政一二家積多至數十餘皆一二有亦有一無者以吾所有六物均之世無數百其盪而無迹者曾不如康瓠之有礫焉然則今所存皆康瓠之遺餘也矧是六物卣梁斷而爵折戈鬲項穿而罍腐臀鼎葢亦缺康瓠之兆形矣惟敦完然而猶重哀夫屈生而子而孫用享何人如在安在自夏至今三千餘年而九鼎淪泗者千六百年使後是之年如夏至今則商周之金悉爲九鼎能獨俟夫萬有年耶余感如此以理要歸而命之何誣乎人而何詬于器其曰職此而怫鬱軒冕淸寂山林以玩物資爲道者眞若高識所燭焉赫羲亭記人莫不有嗜其甚有志者能克絕于暫或不能必終身之不蹈焉雖大賢如程子之好獵旣嘗痛自克絕自謂巳忘之可終吾身又質之其師以鬻學道之進周子甚不然其說及後遇獵雖不與馳逐其心猶躍然喜者存始以周子爲知言自今思之獵之事如影之于目聲之于耳旣過而無可尋之迹猶克絶難忘如是况金玉珠璣爲物目視之而有形手觸之而有質可以貧人可以富人其利者大前乎吾身而存後乎吾身而不忘其壽也久人旣巳嗜矣一旦驟然欲克絕而不有之誠難故嗜而積積而至于鉅有鉅有而人嫉者衆以及于禍法書名畫亦物也歲久則爲敗縑壞楮不得不足以爲貧得之不足以爲富嗜金玉珠璣者弗顧也雖賞鑒之家求之得以彷彿古人遺意于千載之下雖聚有之而人不爭且無禍焉斯非嗜之可爲之一道耶余白首來亦痛自戛去此習故于巳之甚愛者人或欲之畧不留吝篋笥中無十年物可謂不積矣然見人尤物猶時有覬得之心或發口以求嗚呼嗜之賊人也如是乎哉是可謂終吾身不善克絕者之戒也余故有右軍三帖皆出宣和中秘嘗以姊告安和者􅂌馮憲副壽􅀸今又以遣書者􅂌張總管夢􅀸其所存者子鸞而巳嗚呼是書也姑率蘭亭永和癸丑退數之以及至元戊子爲九百三十六年如曰非眞皆出唐臨亦五百餘年物也俱可爲兩公家法書第一夢􅀸儒將也其用世才有聞于時年甚盛其事業方水湧而山出非宦成退居託物以怡老玩心敗縑壞楮之間者也去年自湖湘行營得告歸展先墓卽其第省齋爲亭東偏求名余思晦菴嘗書湘西嶽麓之頂曰赫羲臺後知彼爲不足以當之將移之雲谷然赫羲之文實原屈子騷經余愛其雄偉嘗名余長安賜第之樓又思彼嶽麓猶不足當易爲祇芳今輟以名斯亭而義意異焉爲疏之曰羲之右軍名也赫者章明較著之也將章明較著右軍之書于斯亭固可名赫羲由右軍之書而斯亭之名益章明較著亦可名赫羲是亦蕭齋寳晉之例斯得齋記南陽醫師劉君大亨有齋如舟來求扁顔書斯得歸之懼未達其旨也又記之曰舊疑叔向譏子產之鑄刑晝爲非夫作士如臯陶可謂曰能而虞書不曰象以典刑典卽刑書也不有所垂示何以使人知避其犯後聞先師談筮謂昔子師可嘗疾診證宜餌峻劑而心猶豫拂蓍扣之遇噬嗑之上九曰何校滅耳凶或者曰弗善也我則曰此罪人斯得之徵飮是而愈燧曰嗚呼世亦有悲士師以疾爲罪人方爲刑書用獄如醫者乎醫乃生民司命弱者恃以强脆者恃以堅危者恃以安而夭者恃以爲耆也惟施治神巧使疾不測所禦故能如罪人斯得而昧者爲之顧使疾先得其爲疾之淺疎肆而侮之遁刑爲罪于攻所不及之地以不可必得故先師之詩曰醫能宛轉深求病病亦間關巧避醫夫爲疾求愈而卒不愈職誰之由此古人所以有藥石入喉甚于莫耶之歎也且莫耶爲物非能自躍而前以殺人必有手之者後世以春秋爲仲尼刑書誡律以是爲斷則爲法受惡而手莫耶者誰耶嗚呼可畏哉然又聞斯語辭也風雅頌咸多作思則思者亦可同斯乎蓋天下之事其理則具于吾心弗思則弗得矧醫于疾尤欲致思則思得者斯得之基而斯得者又思得之搆也今醫之居藥市惟知招徠求巳者之衆貪得而泛應以幸爲利率未暇深致夫思安求能斯得乎大亨非其術可服輩流孰能推而先之以師是州人之服而推而先是州必其爲術之密而善爲思者古語有曰官怠于宦成弗思然也醫至于業進而名著亦宦成矣其怠而弗思人情同然大亨以余年先而求有言余可爲佞惟稱其所長不進其未至乎故是以警之大亨于醫言將藥石之歟莫耶之歟又在夫思之斯得也學稼亭記孔子之言不可執一求學者由之不可執一居樊遲請學稼出則曰小人哉樊須也南宮适問禹稷躬稼而有天下出則曰君子哉若人夫君子小人所以槪終身没世善惡義利極致爲言或曰小人細人也其不相及亦不啻什百而千萬而乃進适退須如此進而君子亦可巳矣猶以爲未然繼又曰尙德哉若人豈于稼也學于今者爲非而躬于古者爲是乎豈須之問也以巳小而私适之問也以聖人大而公乎嗚呼聖人之生德天也知不知之人也蓋當其時雖不尤桓魋匡人之莫我知亦未嘗不與儀封人太宰之知我况須适日親而月炙宜時化而歲遷者其知我益非儀封人太宰之可與其莫我知又益非桓魋匡人之漠然不足尤也使須聞吾不如老農之拒有禹稷躬稼之對意在于知聖人亦可得君子尚德之稱顧請學圃爲問愈下殆于适什百千萬而不啻矣雖然須事聖人猶子之事父母無隱苟其心所未安必將辯而求義理之眞是不憚見拒于聲音顔色而止故能自拔于三千之徒終厠七十二子之列與适也並其困知勉行而後有至者歟吾故曰言不可執一求其學者由之不可執一居者官使然也且官以農爲名而曰吾學稼之是羞敎督之不先也藝樹之不勤也銍穫之失有秋也使千耦之夫環視其授法如此曠怠而窳豈惟大農他日隨以不恪之殿就曰無之亦非臣職可一朝安也蓋君仲修爲丞屯田南陽之東穰明年市牛課僮墾萊疇盈數百畝視日晨昕以爲作止候時寒暑以趣發斂以一身爲千耦之倡故歲入增多諸屯卽墅爲亭余榜以學稼所以著夫善其職也雖然視有若可易而事實關世道之大蓋天下之民去南畝而遊食擇金玉之易持逐逐於販夫販婦之末罔利相攘于市路而較錐刀者爲日巳久是以錢益輕物益重廊廟恒低估改幣以救之其勢莫之能止也今守令之近民者孰不兼官訓農使聞其風者人人如斯人之善其職亦不可以少復本富而衰澆風乎仲修由嘗受學今太子賛善劉君夢吉是以始政知所先務天寳壇記壇之名肇于書而詳見于周官書止曰爲三壇同墠周官則曰爲壇三成疏者曰一成敦丘再成陶丘三成崑崙丘至太史公封禪書曰三坎釋者曰三坎豈三成自趾而升三坎者自顚降耶後世爲壇必皆三成其取法此又病夫蕆祠之時或風􅀨害其行事也爲屋覆之天寳之壇惠慈利物至德眞人作于金亡其時汴南倍百里與宋錯壤小大城皆戍守諸將爭撤汴宮資材爲樓柵故惠慈得摭其所遺而汴之守臣捍者不彼之禁專視是宫委積在目􅊿間利將奪而有之適道流族居者且數百人彼憚與鬬而止爲道流者猶心且覬之未止也益急其程夜則燃火構之與通明閣作于一時故閣上下四周未門壇礱石爲之上淸宫故物徙置乎此門楹皆未丹蓋牽于他營而勢有不至者餘六十年矣資德大夫參知政事朱公淸行省于汴謁而太息謂崇􅀇誠德洞陽眞人曰大哉役乎不因于前也不取材于國也不藉力于民也皆方外之士親寒暑于其肌膚撙衣食于其口體月積歲進而自爲之良不易哉凡今壇閣之未竟役者吾思佐之乃戒其家髹沐之工市汞鍊朱卽儀其門將百闔盡丹壇楹閣門惟丹其陽他方皆墨最其􅀡可萬五千緡提􅀧孫履道由徵朝元宮銘于郢爲燧言此且曰公之言曰吾故貧賤宋平而始官賴先聖今聖之德致位將相吾亦不知吾嘗所由以來義不可爲不可得吾銖兩于所宜爲邱山之失不愛焉自我得者自我盡之不猶愈于鄙出而力守甚愛而厚藏一日子孫不能有皆歸之官耶燧曰嗚呼是皆熟于世故明理之言可謂積而能散者也然自惠慈之逝經文醇德懿知常與虛􅀇應物通和兩眞人而至乎崇􅀇凡四人終一甲子以待公豈斷手有數耶使公初無是志而有求之言出于崇􅀇之先公亦未必滿其應崇􅀇無有是言出公之誠非崇􅀇之德足以動人亦不可得其所捐若是之多目擊心傳其相知與爲何如也又聞周廡尚有缺所公面促其基之豈佐竟之志不巳是􅁘可筆也太平宮新莊記眞君殿碑蓋龍興據其所見而作及以疾歸留宮踰月與身見而言傳者或異遂更訂而丹書之旣入石矣猶有一遺其曰始田履畝纔及三千金萬有奇若合其舊爲一而言今則不然由沖靜眞常凝妙法師湯君提􅀧之宮錄江州路道教之後之致者獨萬有一千其道有三曰貨取曰施入曰力作余歎其用志之確親勞之多無文以彰之世烏乎知爲目其諸莊與地在所及其施入之主之名自多裒之以及其寡今最貨取三千六百五十惟石門千二百八十爲多其不足是者啓石二百八十錦溪七百五十石塘九百一十龍岡九百六十上龍溪千一百三十惟啓石居興國大冶餘皆江之德化最施入者五千三百五十惟翠麓二千二百爲多高岸半之元山千二百萬安千七百福興千七百四十趙陳二千一十惟高岸居興國之永興元山居蘄之黃梅其故主則厲堅孫項至大餘皆江之屬縣翠麓湖口萬安德安福興彭澤趙陳瑞昌其主周恕胡榮呂師山則福州路同知者與齊永年云力作者創茶磨四所凡四十二盤于德化莊曰義興又墾田二千肇爲五庵宫之前三曰東西太平與紫元宮之後二曰湧翠穀峰其始皆菅茅樸􅈪衆所薪牧之囿皆募人錢鎛銍斧而出高蒔松杉柏茗皆摘實挼子畦而苗之移置其地下種薑芋藷莤與水可塍稻者皆令募人有之其利不入公宮以勸夫未至者余聞之肩輿歴至其所而觀焉經始久者方五年近者一歲而木之布列岡阜新者雖没草間而生意茁然久者巳離立如人將數萬本其畦而未分猶盈畝焉篁篠則斬梢而不傷其鞭畚故土取諸他山爲箇不可計意者倍蓰乎木筍巳叢出其下特未林耳君登高邱指宫林以相語曰聞之故老之山始亦榛莽如是吾所材而用者皆基先民今荒山可芟治者猶或數里天假吾年而爲之不置可使盡闢百年木皆連抱後人以資治宮亦吾于世生不虛也余曰嗚呼君之所言正古人所謂人棄我取本富之要也迹是爲心何事不可爲何功不可集宜人之動盪鼓舞割所愛惟懼施入之後不然彼其家田民賴以食其力者也將以尺帛斗米遺之猶戀嫪移時呴呴然收恩而後以授况是連阡亘陌非有動其心者能然耶余惟久此又聞其將大衆之法道流非有故不入田民家民之入錢取薪炭山者皆給之劵恒遣力人持挺行邏林間盜采者有罰錢穀出入井井有稽舂磨之細不遺糠籺公宫大庖日炊米十斛可食千人其徒皆就食公堂來必道服以示不䙝職宮事者各有子院有釜鬲不作飮食待煑茗頮水之須其僮奴之守舍與諸菴遠在數里者爲飮食皆日賦之子院不得設塑像旦夕惟卽瞻禮于宮余問其然則曰子院强則公宮弱強日益富則公宫日益不足不足勢必下求子院一則應再而緩三則柔者德之以色剛者拒之以言上下之情寖以離矣不若同甘共苦以公宮所廩養之爲可恒也嗚呼他道流能逺計若是乎嘗與一二知巳私竊評之白鬚蝟磔有熊豹之姿巳見其力足任事加以深沈有謀寡言而信威而和誠而恪視數百人黃童白叟約束如一使不爲老子法用世而爲將帥可以進退三軍立勲萬里今顧爲九江黃冠師枯槁山林巳是也耶因敘田及此君名德潤字季玉號香澗其左右君靡朝以夕盡其勞勩忠于其宮同成功者中外四十九人紀諸殿碑可考而知嘗觀漢費鳳韓仁諸碑書多不滿石或三之一或半焉而空其後豈待夫嗣有所書耶故余例之亦法古之一也儲宮賜龍興寺永業田記史稱後漢孝明永平中由夢金人遣博士遵自乾竺求迎其法至函夏或又曰在先漢孝武世驃騎將軍霍去病過焉祁山得休屠王祭天金人則後世範金像佛者實其遺法至唐藩鎭趙王鎔爲大悲像于龍興寺具千手目高七丈三尺以語其大九圍之間無有與京爲閣三重五霤覆之歴宋而金補壞爲完易舊而新者四百年元貞始元端月八日午時儲皇猶未出閣金剛上師丹巴開長生講修番漢二疏領講主明公住公僧判迭凡巴求主等之功德皇上立極旣正元良明年至大之元辰在戊申四月十有五日乃爲下令割眞定屬縣􅀗鹿􅊢震宮石同北魏劉三邨與官院營之田五千畝賜爲永業資開講席又舉太祖太宗世祖成宗四聖成訓凡僧道伊囉勒琨以名與國祈天永命門徭田稅旣屢蠲復申飭兵民之官驛傳之使諸郡之臣自今水輪廐馬在野之墅在城之肆是所業無敢千騷祝髪之徒或恃有此肆爲不度罔知所畏者則入畏矣明年三月俾翰林學士承旨姚燧爲文刻之石燧亦嘗思惟昔儒臣于佛氏書臻藴奥凡爲寺碑必能槪舉備言其法燧性顓􅀩于周孔書童而習之白首不知其源矧于佛書未嘗一望其塗涯豈敢妄謂曰知然以壓于儲皇之命不敢禮辭故惟卽夫賜田以言蓋民恃粒食以生彼學佛者苟無田自業􅀔必見求之人積日而月月而歲民自有仰事俯畜其家且歲或豐凶亦安能裒其所有久應其無巳之求此諸山無田之衆所由以聚散不恒也今有賜田盈五千畝率以夏秋入止一石當爲榖五千姑大其耗糠粃四之猶得精鑿三千日人賦升可食八百人以一宮居而八百人者交無身口之累夫誰力哉其不開講席演法言與國祈天永命者又將何爲雖然猶有穽民者存不可不預言之蓋由溝洫畎澮之制廢天下無有畔之田必與民犬牙相錯末世衰風讓畔其誰古之人防其訟也旣明劵契且書所由質劑于官以待異日可恃爲徵如是又私于界表石以識又虞可轉或十百步椓杙地中穴實石粉計亦周矣而猶不能弭人之爭矧是賜也東西南北必畔民田祝髪之徒將奔走服勞錢鎛耒耨務盡地力以供歲事或如奕人布施于局稍蠶食之利其寸尺之畔而盜侵以耕挑釁交惡怙􅀔力取則民將奮起而致死以訟矣今文之終戒者豈在是歟其年夏五記臣錢開仕恭校
