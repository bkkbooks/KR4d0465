body:
  text: 元姚燧撰傳太華眞隱褚君傳雲臺眞隱褚君幼業儒長而遭時艱求所以託焉而逃者寄跡老子法中受學劉眞常栖遲不在城邑多名山中如保之葛洪琅邪之七峰應之嶽神無常居焉後由眞常主華陰之雲臺宮始從之西眞常逝而徙上方留弟子主雲臺雲臺華嶽也爲山益奇上方又天下之絶險自北望之石壁切雲霄峻峭正矗非恃鐵絙不得緣墜上下又不知鐵絙成於何代何人意者古能險之聖也將至其顚下臨壑谷深數里盲煙幕翳其中非神完氣勁鮮不視􅅭而魄震君􅀒食上下自給如由室適奥嬉然不爲艱薄寒則上下負食益勤爲禦冬備一歲偶未集冰雪塞山門計廩纔得當冬之半始服氣減食爲胎息遠則數日一炊明年山門開弟子往哭求其尸見歩履話言不衰他時方神其爲非庸人同下山止之曰不可復有往也已設向師食不繼僵死冰雪弟子雖有喙何說自白其能孝於天下必勿復往也巳君難逆其請指牛心谷曰此漢太尉楊公震授徒之槐市也或聞而稽疑其傅止得公常敎授胡不見其居華陰者不識君何據曰然谷南􅀡中方入行二里許深林奇石泉濺濺鳴其下懇地盈畝構室延袤不足尋丈環蒔佳花美箭人之來者始則愛其蕭爽不自知置身塵埃之外居不昃晷旣巳欠伸弛然而思去矣君又屏弟子獨居或勸宜留一人自佐曰吾居此樂彼居此戚所安先不同猶彊而留之能施期月之外要終相棄去吾故與之爲約非舂糧採薪不至絶而繼具而去亦古之君子以人望人不竭忠也其出山還雲臺必以水冰無所仰飮十月爲候二月還谷性嗜讀書逾熟左氏博議日食數龠飮酒未醺而止不盡醉也人家得名酒爭攜餉之至則沉罌泉中時依林坐石引瓢獨酌日入則入室而休或坐罷寢覺起行庭中一夕如聞林間行聲戛戛君則曰獸也雖不得其名可試而知引石投之曰麋鹿哉將驚而奔或止而不去者虎耳果止聽不去明旦視樊垣外虎跡縱橫再夜起行如前夕不以自戒而止聞而談者神明之亦有他士樵人獵夫之適山初未聞君爲孰何人責之具炊寢則假榻甚者易而詬之隨之益勤以安無難色忿言其外若職宜然者去或問姓名惟他語不告終問之則曰吾求人知耶必求人知而求若知耶吾居此在人所不問而吾所不告也人見其苦身不近人情如是然不違俗上自王公而下及臺皁爭以一際顔色爲快燧亦嘗再造廬焉告以人間聲利泛如秋風之過耳噤不酬應叩之山間爲樂何如必盡舉平生所見好石幽樹佳泉危棧亹亹忘罷若幸夫人之一往而我能先之者相送以岀覺胸臆塵鄙如雪之見晛消釋無留餘者數日益信夫遊方之外有恬愉靜退之士如君者罕􅀋例求也君名志通字伯達名聞天聰俾禱有應不爲沴賜號佑德眞人提􅀧嶽祠灝靈宫又以嶽祠風雨將騫內出鈔萬八千繦爲完葺費三千易敝而新飾漶爲翬過者改觀始知有應務之才特韜之耳年八十得益深聞益彰聖皇思見益急當歲巳卯至元十六年詔中使起之北面受命稽首曰草莽之臣通也自知審矣疇昔壯也言不足以資廊廟擇力不足以彊禦侮今老矣先狗馬塡壑晨夕至蒙冐龍光力疾以行終不達恐傷陛下仁及草木之化是以昧死請中使竟虛車而返今李大參公號知君深且樂誦人善者戒燧傳之無俾不聞於今而泯於後焉公名德輝字仲實前北京等路行中書省今以中奉大夫出相安西府云行狀中書左丞李忠宣公行狀公諱德輝字仲實世居通之潞縣曾祖某祖全再世不仕考朴尚書吏部主事妣宗夫人三子長德英次德芬季公吏部君生三十九年且卒指公謂宗夫人曰吾爲吏治獄不任悍􅋧刻削人􅀩吾力脫罪罟齒平民者衆天或報施善人是兒其大吾門者勿憂貧且賤公方五歲哭之如成人家􅂊儲五升菽夫人舂蓬稗爲糧芼藜莧爲葅活之荒歲旣就外傅嗜讀書束於貧無以自資輟業十六監酒豐州祿食先足旨甘有餘則市筆札錄書夜誦不休夫人以過耽苦慮傷其孱薄也爲滅燭止之巳乃厭糟麴歎曰志士顧安此也耶仕不足以匡君福民隱不足以歡親善身兩間之間人壽幾何烏可無或有聞死同腐草木也絶少年軰不游召其所親與率一時名公碩儒歲丁未用故太傅劉文貞公秉忠薦徵至潛藩俾侍今皇太子講讀薦故翰林待讀學士竇黙故宣撫司參議智迂賢皆就徴癸丑先朝封周親割京兆􅊢潛藩擇庭臣可理賦者使調軍食實出公從宜使辟故眞州總管高逸民自佐時汪忠烈公始宿兵利州扼四川衿喉規進取數萬之師仰哺於公乃募民入粟綿竹散幣集之或給鹽劵使歸京兆受􅀡陸輓興元水漕嘉陵一年而錢粟充棟於軍中宋臣余玠議葉平土卽雲頂運山大􅀗得漢白帝釣魚靑居苦竹築壘移成都蓬閬洋夔合順慶隆慶八府州治其上號爲入柱不戰而自守矣蹙蜀之本實張於斯丁巳深峻用事臣大集關西河南諸臣入計局以中嘗爲潛藩用者文致多方於公獨無絲髪得己未從南征至鄢留後行營庚申以爲南京經略使再月又以爲北京宣慰使其年皇帝卽位中統改元五月又以爲燕京宣撫使燕多劇賊造私幣雜眞行民間陰結死友相誓復仇怨殺人公悉捕誅之雖中書開府在燕令行禁止多不上白由是忤時相意以誣去位從北征還守北山諸關三年惡己相反誅以爲山西宣慰使罪權􅀔之籍民爲奴免而良者將千人至元改元罷宣慰司授公嘉議大夫太原路總管兼府尹至是潛藩故臣相無有出爲二千石吏者上以太原難治故留居此會我先左丞公當分省遷調山西湖東世職守令卽遣諭旨公拜稽首曰陛下以臣堪一縣俾爲令臣烏乎可擇況以千里寄治非材大懼任使不稱以傷陛下之明敢薄之耶自爾愈益勤勵崇學校以明人倫表孝節以敢風俗逐姦贓以剔民賊裁婚葬俾師簡儉敦耕桑以富生理之出立社倉以虞水旱之歉一權度以絶欺詐之攘嚴鼓柝以警奇衺之覬凡可與民漸摩仁義者無弛不張嘉禾瑞麥六岀其境滿秩左部差功最天下右部考過惟草竊盜不􅀗一人五年徴入爲右三部尙書人有由訟財而失其兄子者公曰何疑焉叔殺之也深竟其獄公所信厚及權貴言可撼公者莫不請求保爲衣冠之族無有是也皆漫不爲應懸已俸爲賞購之其家人果上變告情狀呈露言者慙服叔竟以是病死俄轉戸部尚書事無大小必决之一日書判煩勞指爲之蠒七年會上以蝗旱爲憂俾錄山西河東囚行至懷仁民有魏氏發得木偶持告其妻挾左道厭勝謀殺已經數獄服詞皆具自以爲不􅁈公燭其誣召鞫其妾搒掠一加服不移晷蓋妬其女君謂獨陷以是罪可殺之也卽􅀡其妻而杖其夫之溺愛受欺當妾死罪觀者神之或咨賞泣下八年授中奉大夫參知北京行尚書省事九年罷尚書省以故官參知北京行中書省事京南水歲泛溢至城下爲患公築堤捍去皇子安西王有土關中之明年當十一年奏求公輔巳以故官改安西王相至則視瀕涇營牧故地可得數千頃起廬舍疎溝澮其中假牛種田具賦予貧民二千家屯田最一歲入得粟麥石十萬芻槀束百萬公是來也貧不能從妻子留之京師事或上聞賜錢二千緡遣之明年詔以王相撫蜀其年重慶猶城守東西川各開樞府合兵數萬人圍之公至成都兩府爭遣使咨受兵食方略公危語動之曰宋今旣亡重慶以巨擘之地不降何歸正以公輩利其剽殺不得有子女懼而不來耳不然他日兵未嘗戰及招討畢某偕中使奉璽書來赦最宜正言明告嚴備止攻以須其至反購得軍吏杖之爲僞得罪懷之入降水陸之師雷鼓繼進實堅其不下也中使不喻詐計竟以不奉明詔反命如是者皆公輩玩寇疆場心迹之著白者况復軍政不一相訾紛紛朝夕敗矣豈能必成功爲哉兩府多致金帛子女爲謝曰戎捷與人法令所不禁也公讓不受出未至秦瀘州畔而重慶圍果潰再退守瀘州十三年秋也明年詔以巴哈與公代爲西川副樞公兼王相大軍旣發公留成都供億食纔支半月賦粟繼之官船不足括商民船千艘日夜督運其年復瀘州十五年重慶之圍再合踰月卽下紹興南平䕫施思播諸山壁水柵隨之皆下而東樞府猶故將也懲前與西川相觀望致敗惡相屬願獨軍圍合州初公撫蜀徑東川歸以爲重慶帥閫受圍必徵諸屬州兵盡銳拒守合州宜虛誠使諜人持書曉之兵隨其後亦制合一奇也卽出合俘繫順慶獄者縱之使歸語州將張珏以天子威德遠布宋室淪亡三宫皆北又頌聖量含宏錄功忘過能早自歸必取將相與夏呂比又爲書反覆禮義禍福譬解其言以爲均爲臣也不親於其子孫合之爲州不大於宋之天下子孫舉天下而歸我其臣顧偃然􅀒阻窮山而曰吾忠於所事不亦甚惑乎昔也此州人不自爲謀求去就者以國有主寧死不欲身被不義之名故爾得制其死命主今亡猶欲以是行之則戲下以盜賊遇君竊若首以徼福一旦不難也其說累數千百言又約書言爲檄刊木於山浮板於江珏未及報而公還王邸至是合遣李興張郃十二人者詗事成都皆􅀗之當斬復爲書縱歸使喻其將王立其言如喻珏者而益剴切興至立亦計夙與東府有深怨懼誅復興等導帥幹楊獬􅀗獵書間至成都降公從兵纔數百人赴之東府害其來爭有言前歲公爲書招珏誠亦極矣竟不見寤無功而還今立珏牙校也習狙詐不信人特以計致公來使與吾爭垂成之功延命晷刻耳未必定降定降公冒吾圍而來受何物視我必不汝進公曰前歲合以重慶存故力可以同惡今也孤絶窮而來歸亦其勢然吾非攘􅀂功者誠懼汝憤其後服誣以嘗抗蹕先朝利其剽奪快心於屠城也吾爲國活此民豈計汝嫌怒爲哉卽單舸濟江薄城下呼立出降安集其民而罷置其吏立德之輿金玉飾少艾爲謝公曰若以吾爲是來耶吾無事乎此其持往餽之東府合人自立而下家繪事之川蜀平復以王相還邸是年王薨公感其受知深而悼夫棄國之蚤也哭之幾不能生十七年詔公與南省參政程某卽其地聽思播湖南所訟鎭遠王平田㑹西南夷羅氏􅀑國叛别詔雲南湖南四川合兵三萬人誅之前茅及境矣公曰蠻夷無親爲俗吝貪始由邊將撫之失策積怨以叛好事之臣請加兵誅旁諸小夷洶懼相擅繼叛者必衆恐非􅀡三萬人能嵗月平也吾賴天子仁聖馳一介之使招之可坐俟其徠豈必煩兵不及以聞遣安珪止三道兵張孝思諭鬼國降其酋阿齊熟公名問曰是活合李公耶其人明信可恃卽日受命身至播州降語且泣曰吾屬百萬人非公惠活寧鬬死不降事畢驛聞上爲之開可改鬼國爲順元路以其弟阿哩爲宣撫使其年王相府罷十一月二十一日始至黃平是夜也星如斗霣館垣外公弗善也歎曰他日嘗夢主烏江今播水適名烏江與是星皆吾死徵也夫吾嘗誦馬伏波老當益壯之言而奇曹武惠爲將不殺得今活羅鬼馬革裹尸歸何憾二十七日卒後七日資政大夫中書左丞安西行中書省之命下蠻夷望轊車爲位祭且哭者動百千人塗所經男女空家咨嗟聚觀合之安撫使立衰絰率吏民迎哭傾振山谷爲發百人䕶喪達興元上聞而悼之贈光祿大夫中書右丞諡忠宣公賜錢二千緡具葬先妃嗣王遣前僉書王相府事博囉賻錢五百緡具奠明年僉播州安撫司事何彥抗章請卽州治之東爲廟制曰可薨年六十二夫人胡氏前公卒今夫人某氏子一人嘉議大夫安西路總管兼府尹諸軍敖拉頍也女二人長適嘉議大夫禮部尚書劉秉恕幼在室嘗槩公平居以先夫人剛嚴其弟宗亨有小過對衆奮杖撻之不少惜公若何而歡奉使未嘗有厲色遽言其亦能子哉二兄旣位不大耀於時每分吾有不至以寡乏見告其盡禮姊氏不以語人人知爲姑􅀂從母不以爲兄弟也與人交誠易炳白不張城市機穽不面爲許退與他人語必諄諄暴其人所長而韜其不及至繩檢姦慝奮發忿急不能容其過然亦不能留怨惡於􅅐中雖舊欲擠已入不測淵者事已輙忘之略無校言復意自奉甚薄有積則施之不爲子孫他日計西川副樞上嘗賜以玉帶錦衣錢二千五百緡止留其服物餘悉分之親戚賓客一日而盡人問之則曰曩吾家多責劵縣官憐而賜償之無􅀒矣吾貴而薄功又可富而厚享耶不思而兩有之神不福人幸以是人曰我貧吾利器也故自入官非素所往來有相答報者未嘗恃形勢取一錢􅀡餽再爲尚書權臣力能生殺人恥公共事累年足跡獨不及吾門以薄祿用奢爲言願奉母錢百金交歡令取子自益卻之亦不爲謝王相七年及事先王五年言必切切臣職子道請聞斯行以絶事嫌簡約侍衞以裁浮費無急土木殫匱民力者中外所厭誦凡人賢而有聞滿調將東歸必薦汲之王陞秩留之故關輔得士爲多皆視爲已職當然未嘗語人由我而然以期見德遇事謹敏好謀善問多不自用及其末路生人之心愈切取信蠻夷聞其諭招椎結荷旃竭蹶慕義三道之兵爲之抑首思徼利於萬里羞成功於一介霣星烏江馬革包柩斬木通道舁歸要荒抑嘗觀今中統以來將相臣死率於其家天下之情稱其平生所爲功高者惜德大者思不過如是而極然未有若公逢掖死事爲世所壯者也嗚呼賢哉又嘗觀古君臣莫難于合尤莫難于信蓋合或可伺所欲以中而信則必不可襲取于一時自公始侍潛藩聖皇非遽貴之地亦嘗身接之面訓之指受之親以細微觀其敬忽置之糾紛試其理解讋以雷霆察其變常納之汙濁驗其潔白旣久而後知遇也其後三十三年之中或使或牧或從或留或相或傅諸侯王或將凡賞勳勞優􅂄舊可以勸人臣者公皆與爲之至商論羣臣能否于公不曰淸則曰剛或曰不欺不見有貶于聖訓用未盡年未耄人猶未足其悲受任于己試知遇于旣久可與疇咨海內者將不知誰在也嗚呼悲哉後三年頍彚進遺事求狀公行燧亦荷公知且久遊其門又與頍嘗同受學義不得以不文爲讓姑爲論次如此臣謝墉恭校
