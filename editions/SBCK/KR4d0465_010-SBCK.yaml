body:
  text: 元姚燧撰廟碑重修中太一宮碑勝國昔有中土也作三太一宮太平興國于東南郊慶厯于西郊元豐于汴都故隨其方東西中爲名中後火于崇寧政和復之其東西見毁者豈在金垂亡恐資敵用爲攻具􅁘何以知之若熙春閣亦傑構也嘗賦一軍令薪之以艱于撤欲火傾之取其餘材束藴巳然或惜而撲以滅予于中統辛酉屢躋覽焉及觀黔迹故曉中太一惟半存者豈異然耶嘗求太一所由楚辭九歌首以東皇太一居楚東以配東帝故曰東皇其後漢武感神仙亳人繆忌奏祠太一方曰天神貴者太一其佐曰五帝中宮天極星其一明者太一常居也古者天子以春秋祠之東南郊後遣祠官寛舒具太一壇壇三垓五帝壇居其下各如其方祭亦曰郊與天地同太牢祝宰祠太一衣紫及繡五帝各如其方色今不知五帝謂太皥炎帝黃帝少皥顓頊耶抑他有是神也淮南子又曰太微者太一之庭紫宫者太一之居至宋太平興國作東南郊猶守其舊惟覆壇以屋慶厯元豐作于西中至以道流易郊爲醮祠而不殺牲皆異乎古始者近世陰陽之流以太一與六壬遁甲爲三式有司設科試之以驗其學之精疎卽書以求壬最先出吳王囚越王石室將赦之越王心獨喜之又恐其不卒也以告范蠡以爲十二月戊寅日時加日出戊囚日也寅陰後之辰合庚辰歲後會也夫以戊寅日聞喜不以其罪罰日也時加卯而賊戊功曹爲騰蛇而臨戊謀利事在青龍青龍在勝先而臨酉死氣也而尅寅是時尅其日月又助之所求之事上下有憂豈非天網四張萬物盡傷者乎迹此則壬在春秋世已有其說後讀獨􅀌及八陣記門具將發然後合戰漫不知其如何因問厯翁孫氏子渠云韜鈐之家惟視三門具不具五將發不發蓋三門謂遁甲之客大主小開休生五將謂監本與主因攷沈括筆談太一之外其九太一各自爲目曰五福天一地一君基臣基民基大遊九氣十神唯太一最尊不可別名止謂之太一三年一移後人遂對大遊而爲之小遊實出誤加京師東西太一宮正殿祠五福而顧居太一于廡甚爲失序熙寧中初營中太一宮下太史考定神位余時領太史與議爲二殿前祠五福後祠太一各全其尊惟謂三基爲棊者由避唐明皇諱而改不能正之仍襲舊云嘗考其制爲殿三重前榜眞室中膺慶後太歲今疑眞室爲九太一所共膺慶則太一專之如應沈議共以前祠三淸事萃九太一于膺慶者豈改于金源氏耶不然天下三淸殿榜或􅀡曰三淸或曰金闕寥陽無有名眞室者亦足證也後陰陽家無太一九氣十神于五福天地一君臣民三基大遊之外別加文昌飛符始擊計神主客叅爲十六神蓋變遁之小者爲叅耳又壬用天一貴神者實太一神之一或曰若然是三式相爲用者皆出人爲何以推人事吉凶得失無不巧發而奇中皇元祝金厯于甲午之歲宮由凋于兵榱棟傾落墻戺崩弛風􅀨震凌牛羊降陟知開封府富察君哀之謂非藉名德之師疇能以興乃書遣警副董德輝香幣迎致惠慈利物至德眞人于河朔請主上淸及是宮上淸由規南征撤以造舟眞人求得重陽開化眞君爲道所廬作新朝元宫他不暇爲署其徒提㸃張志夷知宮田志凈責使營葺若有緒矣而志夷逝後惟志凈與知宫王志實吳志超提㸃劉道資朱道輝爲之積七十餘年而三淸殿眞室歲君殿周廡庖廩旣美旣完泰定虛白文逸眞人孫君履道實四傳而嗣其師惠慈之位以有國者作之于全盛之時而數子者修之于己壞之後度力校財不能萬一其舉贏于時詘瘁盡而智殫久其年而勤不少懈迄用有成與國妥神祈天永命惓惓爲心其如何也請其友燧宜文諸石遂詩之曰古有國惟上帝祗羣祀禮秩疇與夷太一名肇見楚辭武帝耽惑偓佺思爲壇三垓太一祠大牲一以郊爲儀千載勝國乃取師去壇而屋凡三爲兵惟中存東西隳存者罅漏風􅀨闚伊誰哀之曰惠慈來前其徒責繕治匹夫位微爲功遲甲子一周一紀奇六子迭守成其􅃜于焉妥神神安怡何必三年始推移願于皇輿歲周馳上錫吾君壽無期左右相協帝績熙中爲百辟登稷䕫癉共殛吺絶姦欺下與萬方澤羣􅀺奮張百穀不廩饑凡是厥職神所司迺今國家歲禳祈峙焉嶽靈流川􅅘與夫無文亦秩之非于天神獨見遺由彼無廟禋安施自爾豐報當有時延釐寺碑大德八年蒼龍甲辰之秋制移江東憲使臣燧于江之西參行省政十月而至裁再閱月嘉平上􅁌王相塔齊自軍中啓遣開成路總管府判官常謙數千里驛致安西王敎于燧曰吾繇不忘世祖聖德神功文武皇帝順聖皇后深恩大惠常請于帝求卽六盤興隆池園爲寺用資兩聖冥福以永帝之億萬惟年制可加賜黃金兩計者二百五十楮幣貫計者五萬米石計者千四百五十規制一以都城敕建諸寺爲師而小之又虞衆設顓俾有司緩則後功急將罷力命王相阿爾輝身綱維之而時其饔勞節其休作經始于元貞丙申省成于大德癸卯非託金石將無以白始此者吾之心成此者帝之力也汝製寺名而文之碑其令集賢學士劉懸書徵士蕭􅆽篆額燧敬受而伏思之今焉詞垣之臣雲蒸林立教不是徵而燧之命實由燧者嘗以文學及侍先王烏乎可辭敢上本所自而言曰在昔憲廟大封宗室以世祖母弟國之關中于後立極之十三年當至元九年詔立皇子爲安西王以淵龍所國國之明年至長安營于素滻之西毳殿中峙衞士環列車間容車帳間容帳包原絡野周四十里中爲牙門譏其入出故老望之眙目怵心齎咨嘖嘖以爲有國而來名王雄藩無有若是吾君之子威儀盛者其時犍河之外秦固內地教令之加于隴于凉于蜀于羌諸侯王郡牧蕃酋星羅棊錯於是聞者靡不輿金篚帛效馬獻琛輻輳庭下勃磎竭蹶如恐或後其大如軍旅之振治爵賞之予奪威刑之寬猛承制行之自餘商賈之征農畝之賦山澤之產鹽鐵之利不入王府悉邸自有又明年詔益封秦王綰二金印易府在長安者爲安西六盤者爲開成皆聽爲宮邸用不足取之朝廷歲或多至楮幣貫計者百三十萬裁七年而弃其國明年詔遣今王嗣國之四年當十九年益封江西吉州實食之戸六萬五千歲入楮幣貫計者十萬三千春秋之服紵縑爲匹各千嗚呼斯又歴古展親之未聞者于吉王未始至歲惟關中夏則樂其高寒卽六盤居稽諸地者實漢北地郡之略畔道道下于縣其吏長而不令後廢隋義寧中置樂蟠縣旣譌略畔矣六盤又樂蟠之譌然以其地介乎凉隴羌渾之交時平則列置監牧攻駒而蕃息之有警則命將出禦無有常制四海無所爲而至者惟世祖淵龍之加兵大理也旣嘗禡牙于茲及平而歸又飮至焉最其駐蹕三易寒暑夫旣久此必遺澤餘波深浹他􅀖而王父子再世受之古稱河潤九里海潤百里信如斯言則發源天潢衍溢涵濡將不千里其藩輔天子寛西顧憂者又不百世而止也亦竊思之王之有國二十有六年克自卑抑恒遠之宮而弗遑處爲天子援枹鼓進退諸軍于外以捍侮西北其忠勤如何于此之地心焉慺慺求祈年今聖于昭昭追福往聖于冥冥王考妣亦與薦焉爲宇事佛猶不率作得可而行其孝恭如何枚是數者善美孰與大書之言曰天道福善又曰作善降之百祥易又曰積善之家必有餘慶燧學儒者未嘗知爲佛氏之言如佛亦視是忠勤而孝恭者爲善而福之則其教與儒可殊􅂗而同歸也禮諸侯祭其封內山川華之爲嶽實王封內嶽祠之門揭爲宣釐則表寺之名莫延釐爲宜也銘曰於昭列聖事佛盡敬爰質之書古無有並土木之工雕楹繪墉朱塵綺疏匹帝之宫金莖一氣頡頏上下靜供之修乘輿必駕佛遊悠乆其言斯存孰爲其言百世梵孫帝度其孫而教善治無間邇遠京師必致匪徒致之曰時予師坐而袵連出轡並馳有如今王于親則懿制地千里規爲時寺頤指其相展若易然矧錫金粟帝開其先面勢畧畔八稔成績巋然都城敕建遺則帝師帝師時寺門楣以長以雄匪弟子誰鼓鐘之音梵唄之力釐帝之餘必王見及帝億萬年王年斯千爲盤石宗以固以綿燧作是詩刻時樂石尙憑佛乘垂示無極崇恩福元寺碑天德十有一年先帝立極親祼太室乃􅁣然曰予曾予祖世祖聖德神功文武皇帝裕宗文惠明孝皇帝至元三十有一年成宗旣祔廟矣而惟皇考實誕眇躬未大尊顯肆類上帝誄行定諡曰順宗昭聖衍孝皇帝􅅣玉寳冊納諸廟中尊皇太后以儀天興聖慈仁昭懿壽元之號邇之爲子遠之爲孫其孝以慈可謂致極而于宸心猶若未然明年至大之元詔羣臣曰昔朕萬里撫軍北荒險阻踐踰躬擐甲胄北寇底平實難實棘時有願言皇曾考妣皇祖考妣之豐功茂德皇考太后之厚澤深仁圖以報塞必俟他日振旅而南大建寳刹馮依佛乘上爲往聖薦福冥冥慈闈祝釐昭昭下而億兆臣民休祥􅀩賴初匪有永年千百世專利一己􅀸曹其灼是懷惟以其日鑾輅親巡胥地所宜于都城南不雜闤闠得是吉卜敕行工曹甓其外垣爲屋再重踰五百礎門其前而殿于後左右爲閣樓其四隅大殿孤峙爲制正方四出翼室文石席之玉石爲臺黃金爲趺塑三世佛後殿五佛皆範金爲席臺及趺與前殿一諸天之神列塑諸廡皆作梵像變相詭形怵心駭目使人勸以趨善懲其爲惡有不待繙誦其書巳悠然生生者矣至其榱題梲桷藻繪丹碧緣飾皆金不可貲算楯檻衡縱捍陛承宇一惟玉石皆前名刹所未曾有榜其名曰大崇恩福元寺用實願言外爲僧居方丈之南延爲行宁屬之後殿庫廐庖湢井井有條所置隆禧院比秩二品守以相臣割田外郡收其租入以給祝髪日廩月餼坤維爲殿乘輿時臨留必信宿久或旬浹其急其成爲何如哉功垂什八期以四年正月八日大慶賛將徧賚工官下及役夫何意其日奄以奉諱羣臣進勸宜如故事卽踐天位皇帝未忍宅恤經時而始受朝稱天誄曰武宗仁惠宣孝皇帝恭抑之道亦云至矣又哀先志之弗竟懼成功之將墜飭敦匠臣益䖍乃職罷行工曹入于留鑰曰凡修營木石陶繪百工衆技汝實司之與煩文移入取汝所何若從汝自爲則易爲力而程蚤集矣且敕臣燧汝文之碑臣管以闚天子以四海爲家何適非鄉而獨不忘其生所者人情之同漢祖西都關中若忘沛矣及平英布歸過其鄕賦大風使子弟歌之曰朕千秋萬歲魂魄猶思沛太祖奮跡龍庭斯固其郷由世祖都燕宮室池籞百官府庫根柢乎此一歲乘輿留居者半以故武宗巡幸之還蒐田而歸必于是焉大饗飮至若鄉然矧建大刹位置行列棊錯星羅出其睿畫爲往聖今聖薦福祝釐者尤所惓惓陟遐之日有未訖工在天之靈懷乎故都他日過之睹是翦然而完粲然而新必甚懌曰畢吾願者眞嗣皇爲賴哉臣燧載拜稽首爲之頌曰鈞之爲地匪福不異其異維何由建而寺且地之有于開闢初何千萬年混爲民廬何于其時曾不􅀩福而至今也梵宫大築曰不難知譬人之身正氣周流隨日而新嗟若梵宮相方視址授其成規維昔天子寫材于江伐石于山言出風行草靡庶頑又假相臣汝往敦匠易衣寒暑饑俟汝餉于兹三年大立細捐垂欲落之而陟配天皇帝曰噫朕兄所志有銜未究其在傳次乃敕攸司無替爾程其用則取􅀖賦之經佛宇敕爲前古有是而其所無兩聖之治前聖往矣于佛焉依今聖萬年與日齊輝濡軌長江拳石喬嶽善頌之存梵唄攸記重建南泉山大慈化襌寺碑皇慶之元普蓮宗主明照慧覺大師慈昱書遣弟子嗣瑞嗣泌敘南泉山大慈化寺爲臨濟十三世孫普庵印肅所基以勝國乾道巳丑示化旣累諡矣至皇元大德庚子實百三十一年昱再爲之請諡于朝成廟制可卽以其年大德者加舊諡寂感妙濟眞覺昭貺之上其褒其德無以侔大視昔八字猶爝火之當皎日黯不輝矣又叙寺火于至元壬辰之春主僧去之府縣具僚合諸山高德請南源山廣利萬安正叟禪師紹中經理其廢四年乙未昱始繼席循復完矣當是加諡之歲再火再繕治之踰紀乃成且錄劉必大爲國博應奉翰林文字翰林修撰提舉湖廣省儒學所撰加贈大德禪師萬佛寶閣圓堂普蓮堂普度橋袁士趙璧之橋墩吉士宋處仁之昭烈廟與立仰山太平興國寺佛鑑大師希陵之壽山慈化寺與主南康開先寺了萬之天竺圓通殿及昱自爲高麗金字經諸記丐燧曰以是爲迹銘之寺碑爲讀盡卷漫不知位置何地乃詢瑞輩俾圗示之而統其要寺蓋距州百二十里蓮蕩橫前三門之內對峙二塔儲金字經左右鼓鐘二樓中拱二殿相沓前曰普光明以事佛後曰定光以覆普庵塔次萬佛寳閣􅀨化堂達本堂圓堂樓下祠武安忠靖兩王武安之爲漢關羽者世則知之忠靖爲五季漢周張翼佐南嶽者則世莫聞廡以周之門左右則東西藏殿儲經三藏自餘齋閤方丈香林書院月臺仍普庵之舊爲大圓堂諸小殿僧寮賔館倉庫庖湢再廡周之凡三重中兩廡皆重屋凡千四百楹南泉之山四環其外盤盤如城天竺圓通與昭烈皆在寺北黃圃市壽山之間昭烈則忠靖原廟普蓮堂與橋則在州中堂有亭閣廊門橋當隆興吉瑞鄂潭東西南北通塗石墩十四秀江中貫而梁其上有佛閣鐘鼓樓與普蓮各五十楹亦大役也役大財不屈巳力之獨其攻金攻木攻石陶冶髹漆彩繪百工無一可後之又衣食其徒多至千人若是其衆也衆則用奢而寺無寸田以自業惟恃昱之言出化行鼓舞作興于江湖西南方三千里地之民最歲施入多至中統楮泉千計者百萬有奇而佐力操畚鍤具薪爨者猶不與存何修而臻此哉謂普庵澤歟何前乎此學佛之人不能振舉至昱爲人心服而動趨于事者非􅀡其才致然亦有道也且人之情能勉志竭力于一燬之後再燬則弛而怠焉昱不加退規制益侈輪奐益美易曰神而明之存乎其人其不信乎雖然猶當上求其所自西方之敎行中土也漢唐而下正朔所及有遠踰海國若今者乎星羅棋錯小而鄉縣大而府州爲佛宮者何啻萬區爲其言祝除毛髪者其徒又無慮百有餘萬列聖爲制不雜民版又屢降璽書禁人無侵覬其産驛傳不宿官物不儲飮食燕樂不聽肆筵􅅝雜于中其崇禮而保祐之巳至矣皇上又以司是僧爲正錄者衣食百需取足諸山虞日繭絲使就困削爲罷黜之歲一再誦經五千四百八卷天下何啻千藏集祝髪之徒散幣饋食果茗膏燭之微一出公帑人又別加賜焉是舉天下爲徒百有餘萬沾浹恩波無有一人或遺也嗚呼昱所以能就事功與人之風行草靡樂推與者豈不亦乘是機偶是時也余儒者也文乃儒之一事言之不文則行之不遠昱其有見乎此遠以求余自非警頴童而習之白首不知其原矧余平生未踐其域不嚌其味者苟剽而強爲之知終亦膚近而多所謬失爲自欺且欺人以速專門者所疵韓子嘗曰如欲聞浮屠之說當自就其師而問之何故謁吾徒而來請余知守此故不敢效必大之博洽爲浮圖說探其懷以與之祇屢書其善興而敎日夕祝􅁵上酬帝力下昭祖德者而詩之其辭曰普庵肅公僧中之雄由篤其道爲世所崇遇有潦熯爲民祈禴曰􅀨曰暘罔不時若衆嚮其化爲新攸居日月幾何雲屋渠渠尋復示寂其在勝國八言用褒節惠己極去世悠遠傳之昱孫猶以哀榮上敷帝閽於皇成廟閔其克孝不斥異代加諡有詔維兹大德表厯紀年不僭誄之其仁立天肅由是名充塞普率雖昱于藍未敢曰出作室燼餘無田菑畬人以賄來如取寄諸伐材赭山鑱礎窮石百工鼎鼎孰後爾職杵之騰騰斧之矜矜視址視方其􅀡引繩栭以􅀒棟實千四百丹漆之塗如翬斯赫嘗觀有司鉅室責爲有書以徵有罰以隨人將趨事憚貽巳勩巧爲避逃猶幸不至于何浮圖無罰與書視所欲爲諾不待呼功成不有歸之其祖于橋殿堂必字以普倡其徒千釋言日宣于以祝釐天子萬年天子萬年期昱孫子有來源源世受其祉臣蔡共武恭校
