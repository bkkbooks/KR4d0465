  text: 牧庵集卷三十五
  hash: sha256:3d56cd157baf989b32746d0485ad990b920411657eb0e254467dc29849781f55
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0465_SBCK_035-1a}
body:
  text: 元姚燧撰詩餘浣溪沙舟中紀事白髪年來自笑余孔方從有絶交書誰憐多病麴生踈兩岸行人爭抵掌誰家舟上載籃輿江南休問看山無菩薩蠻皇慶癸丑春賞花詞兩閒日月同悠久算來無比東君壽一歲一歸來光風吹九垓花枝依舊好只自傷垂老七十六年人見花能幾春中秋雨素娥㑹把詩人調衰顔不􅀡圓蟾照特地變雲陰江城三日霖今宵佳節過天上冰輪破纔却放餘輝要看淸興違淸平樂失題二首水仙裝束風致淸逾淑春竟枝頭添蕚緣要與梅花仲叔生紅從此羞顔甘同桃李漫山不是冥鴻過盡情敎銜子荆蠻菲菲香雪更照溶溶月管被司花嫌太潔故遣啼鵑濺血方舒笑臉迎丹雨聲深院􅃢􅃢有底春愁未訴向人紅淚闌干聞鴈春方北度又送秋南去萬里長空風雨路誰汝冥鴻知處朝朝舊所窺魚由渠水宿林居爲問江湖苦樂汝於白鷺何如大德改元之明年辰在戊戌春三月十有一日宣慰􅅢堂邀飮怪坐客無吾肖齋或云逃生朝矣卽席賦淸平樂以壽之南陽昔歲此日懸弧記不料長沙今欵避紅袖青軒􅀒醉橫欄􅀡楯西東飄殘萬紫千紅不是荼䕷噴雪爭些閒殺春風浪淘沙爲柴氏題河水發崑崙浩浩泉源餘波九里潤猶存若問是家誰胄出顯德諸孫今日在淸門玉季金昆能時夏凊與冬溫􅀡得鑾坡褒一字華袞休論競渡楚俗至今朝服艾盈腰喧江鐃鼓節蘭橈士女􅂿歌巫覡舞魚腹魂招去古旣云遙讒毁言消修名立與日昭昭免向重華敷衽跪來􅀡臯陶余年七十洪山僧相過言别公十餘年面頰紅潤益加於昔有道然耶因爲一莞賦此曉之七十􅁂雙蓬巳分衰翁煩君休譽面如童只此正爲吾老騐物理曾窮天地一微躬草木還同桃花初也笑春風及到離披將謝日顔色逾紅大德丙午端月十四日立春巧連燈夕求西野澹齋月澗同賦春燕玉􅁫騰又試初燈天公節序巧相仍纖手靑絲盤出看寶焰層層鞭絶土牛繩巳送嚴凝牙旗鐵馬響春冰六十九年余治學老病宵興送貢應奉仲章歸覲宣城明月萬家砧蟋蟀哀音何人不起故園心一語最難留斷袖說覲雲林囘首玉堂深誰綍綸音都門無酒與君斟只賦祈招當贈别如玉如金贈重陽奴初度菊花秋霜水痕收可知不肯離荆州元就龍山風力軟破㡌颼颼今夕定開舟漲水磯頭淵明解印去來休夢遶橘齋新草閣檀板輕謳鷓鴣天遐觀堂暮飮誰道䕫龍不致君白頭離亂不曾聞三秦碧樹生春色千里青山入暮雲何事業底功勲百年五十已中分從今萬八千塲醉莫酹劉伶荷鍤墳虞美人牧庵卽事爲李元素作竹風吹落疎疎雨紈扇收殘暑小軒驀地細香來莫是鄰家早有木犀開玉環穿耳誰家女自獻歌金縷新聲和徹紫檀槽袖出烏絲纔說要揮毫玉梳贈內子相輝瑜珥瑤􅁫鳯寶翼蜻蜓動新妝又得水蒼梳人道秋風何物不瓊琚人無玉質容何害玉德斯堪愛尚慙猶未十分生聽取明年環佩戛璆然減字木蘭花劉子善得常德壽梅圖持歸鎭江壽其父梅軒壽梅紙本傳常武遠壽梅軒歸北固愛梅無有似君貪東極吳中西盡楚黃昬淸淺孤山路能對春風旬日許不如滿歳畫中看冷蘂疎枝常照戸南鄕子遊洪山寺良月大洪山楓葉靑靑桕葉殷一樹桃花修竹裏天慳連見春風一歲間爭挽挿雲鬟日暮金鞍未擬還偏與歌姝相暎照朱顔應笑詩人兩􅁂斑次馮雪崖韻二首荆憲品皆加纔罷還除世共華恨殺峴山山下路梅花誰醉􅀟瓶玉照沙涂水聽宣麻行脚陽春起未涯君去莫嗟風土異堪誇君祖鄉鄰我祖家日覺􅁂霜加欲對淸罇戀物華離别紛紛長􅅭眼生花易散難摶掌上沙蓬意不依麻未必移居漢水涯前日曾於遺集序張誇素範淸風有幾家小重山蕤女歸寧還襄陽江渚蒹葭白露晞雲間渾未有蚤鴻飛人情難在别庭闈攜諸幼孤艇溯流歸七十古來稀乃翁筋力尙未衰微峴山不是遠相違猶能徃淸淚莫沾衣風雨折枝詞早是淸明應候風勢如滄海浪怒號空更兼潑火􅀨冥􅄥如何得枝上有殘紅最惜牡丹叢曉來吹盡折教兒童且爲支拄曲欄中還堪否留客一樽同定風波南州以菌生竹間爲蕈幷樹雞瘦薄而赭雖日乾猶可煑茹此筆竹絲爲之蕈蓋得竹餘氣而生然以世多未見故祥之余以理推如此唐古憲僉筆生菌繪爲圖因有是作五馬雙旌出郡堂歸來椽筆對凝香只爲好書天作意相戲故生三秀在毫鋩不是畫師生手觸拳曲層雲連葉幾何長我有一占君試記何事巳開他日判花祥題軸軒左右埋二石檻植荷其中族汲淸泉石斛方便疑身巳置江鄕八九吞胸雲夢小應笑白頭兒戲未曾忘荷葉且看張翠蓋此外芙蓉誰望集朱裳還有不如人意處遮去碧天明月照泱泱洞仙歌石山伊誰斧鑿此玲瓏巖岫至巧先天化工手又不知何地夜壑深藏今留待白髪詩人攜走向宣和廢苑睥睨高株欲轉愁回萬牛首期岀處與君偕立則參前卷密可懷之襟袖尚未敢云能此私從怕雷􅀨冥冥六丁來取對梅疎枝冷蘂臘前時初破年後􅂊多玉妃墮問梅軒白髪寂對空株期三百六十誰同幽坐孔方兄善幻半幅溪藤貌出緇塵素衣涴當盛暑展圖看遽失炎蒸甚欲摘傾筐三箇又却被傍人勸休休怕他日鹽羮鳯毛無和江梅引謝王子勉提刑送江梅二首西湖不近上林隈問江梅定誰栽莫是冥鴻銜子遠飛來紫陌遊人多不識但驚看靑天霽一樹開獨有使君憐寂寞爲持盃能幾回玉纖橫管東風外落日樓臺不恨明朝飛雪滿蒼苔恨殺南溪調􅂦手恐遲暮到而今霜􅁂催年年江上見寒梅幾枝開暗香來疑是月宮僊子下瑤臺冷艶一枝折入手斷魂遠相思切寄與誰怨極恨極嗅玉蘂念此情家萬里暮霞散綺楚天外幾片輕飛爲我多愁特地􅀧征衣我巳飄零君又老正心碎那堪聞塞管吹臣徐立綱恭校
