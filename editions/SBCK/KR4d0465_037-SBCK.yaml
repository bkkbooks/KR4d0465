body:
  text: 年譜案先生撰其世父魯國文獻公神道碑叙姚氏神明之後歴三代秦漢魏晉宋齊傳次或絶或續與梁陳隋唐可譜究者别載世錄惟本梁唐六鎭節度使勍勍生金吾將軍漢英漢英周廣順初太祖遣之使遼見留事世景聖三宗加安時制節􅀪化翊亮功臣開府儀同三司樞密使檢校太師兼政事令上柱國東陽郡公生中書門下平章事北面宣徽使衡之衡之生給事中同中書門下平章事居政居政生太師左金吾衞上將軍䖍州節度使景祥景祥生太子洗馬去華去華生金東上閤門使金州團練使玠玠生閤門祗候武德將軍佺佺生武德將軍􅀗嘉令錡錡生安遠大將軍慶陽安化丞淵後更名仲宏生嘉猷程世舊學功臣太師開府儀同三司魯國公諡文獻樞及弟楨格樞生今行河南省左丞煒楨生故江東憲僉燉格生先生諱燧集賢大學士榮祿大夫翰林學士承旨知制誥同修國史諡曰文其先柳城人今興中府卽古營州慕容皝所都也其族大以蕃先生送馮雪崖序亦云九世祖東陽郡公有孫嘗王柳城今其地有姚山館姚家陀猶以吾姓姓之墳墓咸在焉然其後皆不讀書舉爲鮮卑人矣太宗英文皇帝十年戊戌當宋嘉熙二年先生生十二年庚子先生三歲案先生爲馮松菴挽詩序云松菴殁以庚子七月我先人之棄其孤亦以是年文獻公碑云燧生三歲而孤公卵翼之不知其􅀩闇教督而急其成俾粗有聞承乏翰林復世公官爲承旨也定宗簡平皇帝五年庚戌當宋淳祐九年先生十三歲是年始見魯齋先生案先生與許德􅀸書云燧生十三年拜先履絇於蘇門憲宗恒肅皇帝五年乙卯當宋寶祐三年先生十八歲始受學於魯齋先生案與許德􅀸書曰十八年謬齒弟子之列於長安時立下席自是至其奠楹實二十有九年世祖聖德神功文武皇帝中統元年庚申當宋景定元年先生二十三歲中統二年辛酉先生二十四嵗送暢純父序云余冠首時未嘗學文視輩流所作惟見其不如古人雖不敢非諸口而未嘗不輕之於心年二十四始取韓文讀之走筆試爲或謂有作者風就正於先師先師亦賞其辭蓋是年方學爲文三辰儀銘等當作於其時案此譜多以所作之文系于每年之下亦有約畧附之者集雖不全其目多見于此至元元年甲子當宋咸淳元先生二十七歲案文獻公碑云至元始元詔罷世侯以左丞行省河東是歲今河南省左丞文獻公子煒生至元三年丙寅先生二十九歲有送宰伯魯遊秦序至元四年丁卯先生三十歲案文獻公碑至元四年拜中書左丞至元之元岀省臣三罷世侯置牧守遷轉河東山西河南山東官吏公行省河東山西明年而歸又云五年用兵襄陽立河南行省公僉省事八年入覲十年拜昭文館大學士祥定禮儀使參政焦公碑云至元之初少師以中書左丞行省河東還以昭文館大學士休政京師賓客之送迎皆遂將命而識公與文獻碑不合先君日記云中統二年奉旨令右丞相公於平陽太原行中書省平陽太原河東山西也是中統至元皆嘗行省其地右丞則前書記張公也本姓魯父名聚社日生小字社住太原臨州臨泉縣使君莊人父爲人所殺其母􅀒公行丐於市至郝太守家有張孔目者無子攜去養以爲子因冒張姓長祝髮爲僧及遇知世祖皇帝得所攀附云至元五年戊辰先生三十一歲其年用兵襄陽闢省河南文獻僉省事是年建御史臺至元六年己巳先生三十二歲是年置諸道提刑按察司事見山南廉司題名記至元七年庚午先生三十三歲勸農白公碑云魯齋先生避左揆以集賢館大學士祭酒國學教貴胄乃奏召舊弟子散居四方者王梓自汴韓思永蘓郁自大名耶律有尚自東平孫安高凝與燧燉自河內劉季偉呂端善劉安中自秦獨公自太原十二人驛致館下蓋同是年也至元八年辛未先生三十四歲是年文獻公入覲碑云八年入覲者至元十年癸酉先生三十六歲是年文獻公拜昭文館大學士祥定禮儀使至元十二年乙亥先生三十八歲始爲秦邸文學未幾授奉議大夫兼提舉陜西四川中興等路學校張詹丞碑云當十有二年太師奉朝請京師燧秦邸文學俾從之西凡偕以三使蜀及轉陜西憲副引爲掾屬至元十三年丙子是年宋亡先生三十九歲文獻公碑云十年拜昭文館大學士先生有壽公水調詞云相公奉朝請京輦巳三年當是此年寄賀者九頂山題名云天子嗣位之十五年大參公相秦藩明冬以王教安輯庸蜀又明年以漢嘉新下入諭其民休旬佳日公因訪李冰遺烈登山東九頂之上書公及同遊者姓名三月二十四日其歲丙子其年至元之十有三年王府文學姚燧記則先生與大參公同在嘉州豈使蜀之一耶是年又奉教招王立合州使蜀之二也其年南宋平所謂大參蓋商公左山也嗣位之十五年以中統初元考之亦不合至元十五年戊寅先生四十一歲黎施州序云十五年奉先王教安集夔府新下之民始與黎侯相識其三使蜀者亦其一歟王希眞祠堂銘云族姪自汴至長安求銘無歲月可考亦當在此年也是歲秋七月二十三日文獻公薨壽七十有八至元十六年已卯先生四十二歲有何敬夫醉經堂記是年始娶紫陽先生中女楊氏至元十七年庚辰先生四十三嵗爲峽西漢中道提刑按察司副使夫人楊氏生楊氏婦而卒至元十八年辛已先生四十四歲爲秦憲副是年娶今夫人趙氏年二十有四見其外舅和父墓誌有送雷季正見魯齋序至元十九年壬午先生四十五歲居秦有劉天麟爲其父求撰神道碑兵馬總管袁公碑云十八年燧以陜西憲副錄囚延安明年子克良持書謁銘蓋此年也其年五月二日蕤女生長適楊萬戸孝基至元二十年癸未先生四十六歲爲山南湖北道提刑按察司副使案澧州廟學記云二十年燧副使是道明年按部至焉大德乙亥爲記時在武昌末云書于鄂之南陽書院之楚梓堂是歲魯齋先生卒與許德􅀸書云立下席二十九年蓋憲宗五年乙卯至是爲二十九年也至元二十一年甲申先生四十七歲爲湖北憲副按部澧州有寄家人壽日南柯子七月初二日夫人生朝又有别枉渚德公詩云孤姪貳荆憲又曰枉渚訪先友德公嘗與文獻公交處枉渚在常德江南岸與招屈亭相望亭相傳以爲昔楚人招屈原於此故名近嵗仕宦于彼者懲司憲者廹人屈招惡其名爲招屈遂去其扁枉渚見楚辭是年九月二十日長子壎生至元二十二年乙酉先生四十八歲爲荆憲副有別丁編修序至元二十三年丙戌先生四十九歲松菴挽詩序云二十有三年夏以湖北憲副奉檄趨京謂爲􅀡學士也以疾留襄陽會河南憲僉馮君岵求爲其先序并馮氏三世遺文序臨湘縣㕔壁記又婆羅門序云余由荆憲奉檄趨京病留襄陽馮憲僉由汴梁至梁宣慰貢父張總管夢􅀸皆由長沙至三君飮餞漢賓壽􅀸賦此聲南陽道中依韻和寄之跋張總管父都漕公手澤云至元丙戌姚燧觀都漕濟江調兵記自題肖齋淸富軒先伯父三帖黃門飛鞚圖許道寧幽人曳杖圖元暉山水圖雙鶉圖補之梅黄華竹時苗留犢江溆魚舟等皆作於是年肖齋家物也先生與之交處最稔其人多讀書工於詩喜蓄書畫襟懷灑落無塵俗氣居潭之西城引流種樹甚有清致武弁中好事者世不一二數卽所謂張總管夢􅀸者也是年又有臨湘縣􅆹壁記至元二十四年丁亥先生五十歲時爲翰林􅀡學士有送暢純父序太醫鄭公碑寄盧處道詩張天表遐觀堂記雷君損之歸來園記送余春谷序參政胡公碑云二十三年始相其年十月五日薨明年五月諸子自江南歸葬八月吉有日子瓚從其諸父按察使讓來請銘亦必是年也至元二十五年戊子先生五十一歲歸自燕居于鄧有朋􅆪堂記牡丹序遐觀臺序云二十五年罷􅀡玉堂與張肖齋史仲威宋齊彥梁貢父王景韓等遊處並見集中有右三部馮郞中碑肖齋赫曦亭記覆瓿藁詩招貢父探梅及次探梅韻書米元暉山水末云肖齋以至元戊子夏五月購得之姚燧爲識末幅蓋皆是年作至元二十六年巳丑先生五十二歲居鄧有除日試臨安竹絲筆金星歙硯書事答肖齋餽歲及海岳堂記閻醫隱銘李文紀碑送馮壽􅀸副憲遼西序金將仕秦君志銘楊彥亨遐觀臺唱和詩序至元二十七年庚寅先生五十三嵗授大司農丞樗菴集序云後君沒之十九年至元庚寅子京岀其譜而見其然且求叙是年先生自漢浮江東遊會稽過江州見濂溪書院記後四年再過記方刻石汴梁學記亦庚寅夏四月夏爲􅀡學士豈農丞之後耶至元二十八年辛卯先生五十四歲按察司其年改廉訪司盜臣僧格約蘇穆爾伏誅有湖口縣學次曹訓導韻自跋云靑龍辛卯三月四日獨步縣學無人訓導曹君餉予詩爲和之署銜爲前􅀡學士刻石縣學至元二十九年壬辰先生五十五歲挈家寓武昌有送徐大山序題王西溪珍翰跋語第二子圻生於武昌劉彦淸序亦當在是年至元三十年癸巳先生五十六歲是歲始自鄧居郢木蘭花云再年逾耳順來七稔石城居癸巳至已亥七年也至元三十一年甲午先生五十七歲遊江西龍興有滕王閣記宣慰王公碑招撫使王公碑云王彦弼總管南康過燧舟中求其先人墓銘幷閻宏求銘其考瀏陽尉亦當在是年歸至鄂中書遣􅀡省舍人札哈勒台以朝請大夫翰林學士召與高道凝同赴别鄰詩序云靑龍甲午十二月十一日赴召劉武敏公碑云三十一年知鄧州劉克仁來言曰亦疑是年也元貞元年乙未先生五十八歲與道凝同修世皇實錄有長春宫碑崇陽學記董氏棣華堂記元貞二年丙申先生五十九歲因改葬少師于輝襄事歸郢勸農白公碑云夫人賈以苟宗道埋辭求銘墳道數年不能叙其事去冬以史事入翰林過輝夫人祈姨母爲言是必葬少師之時也又有壽詞春從天上來先生元貞之元在翰林明年改葬少師而岀此詞有蠻荆之語當是三年未改大德之春作者大德元年丁酉先生六十歲有毛氏壽萱堂記曹州學記龎禮部母夫人序云元貞始元同官翰林前年訪以史事去年迫南歸今閒退於郢故書致三千里之賀時先生居郢故云判官劉君誌銘云至元乙酉七月七日卒後十二年丐銘其墓均州萬戸翟公碑亦是年也幼女楚楚生大德二年戊戌先生六十一歲江陵廟學記云至元乙亥江陵下之四年廟學火至今大德之戊戌凡二十四年又云嘗貳憲于此再入鑾坡求記當是其年作是歲安陸府學記云大德戊戌分司撤毁殿别搆冬十一月歸末云嘉平中休日記是年挈家遊長沙􅅢堂宣慰和尚館公於爰裔堂堂名公所命也未幾疎齋盧公處道由集賢學士出祝海岳過長沙同館斯堂盧以堂名未盡厥美因共更爲世臣先生大書之予以爲丗三十一也改作世亦三十一竟爲麓堂公享年之䜟云又有贈疎齋三絕句及與憲使陳時舉留別詩并其母夫人李君神道銘致先懷集府君墓銘爰裔堂牡丹長句羣山囿宴集燭影搖紅李新齋憲副趙子昻畫夫子小影賛靜壽堂記趙監倉銘壽肖齋淸平樂又守歲水調歌頭云六十一年似窻􅂩白駒馳等作致以是年始拜先生於潭舉致湖南憲府吏云大德三年已亥先生六十二歲寓武昌居南陽書院之楚梓堂春遊黃州有贈賈芳春綠頭鴨龐氏先德碑云元貞丙申翰撰詠手書鉅軸相授曰吾先德也其賜之銘後云大德巳亥趣書乃筆削其書夏五月有送劉仲信燕南經歴序段立夫建昌府判官序秋八月李茂􅀸序九月李德隆序十有一月澧州學記十二月上懷恩州唐君碑寄疎齋贈平章劉公綠頭鴨故左丞相阿爾哈雅碑振衣亭記平章劉公創甲第武昌求三堂名并記於先生先生以淸風􅂷紳益壯名之致時爲湖南憲府吏疎齋除湘南憲致乘傳請上至武昌與先生會先生喜分題賦平章劉公三堂先生得淸風疎齋垂紳致忝益壯焉是歲幼子石城生於郢木蘭花云再年逾耳順來七稔石城居記白髮添丁云云其年六十二也大德四年庚子先生六十三歲居郢城春猶在武昌有重修虞帝廟碑南泉慈化寺碑淸風堂記馮雪崖二孫名字序送郭幹􅀸序輝州三賢堂記大德五年辛丑先生六十四歲授中憲大夫江東憲使有南平樓記寧國修造記都統榮公碑徽州路達嚕噶齊虎公碑讀史管見序劉氏六子名說僉密院趙公碑遺安堂記司徒董公碑云大德辛丑天子念功贈諡中盡左丞子士珍將銘墳道持遼陽參政王思廉狀遠走江東而訪燧亦在是年也大德六年壬寅先生六十五歲有國統離合表序參政焦公碑總管高公碑大德七年癸卯先生六十六歲案饒州明倫堂記云大德癸卯通議大夫饒之總管趙侯訓以路政修舉新學餘五十楹遺􅀡學士黃叟走書求記並案靑神陳氏碑云大德戊戌後五年陳時舉總管建康求撰宋太常靑神陳氏碑蓋是年也又有􅀩古光祿表勲碑文撰序紫陽先生文集序戎大參父九十絶句十首戎時爲奉使宣撫巡歴江東又金正議大夫王公碑云大德癸卯以省郞從宣撫江東俾銘其碑又太史楊公碑云二十一年卒後十年子寅求銘墳道三十一年甲午至癸卯十年也謝顯􅀸序云大德辛丑燧使江之東顯􅀸副是道先生二十有七月之間禮浹而恭云云是歲嘉平移節浙西疑爲此年十二月也六月望日有錄壽細君樂章集爲軸等作大德八年甲辰先生六十七歲自宣城移病居太平之潢池鎭有江東憲􅅆鷓鴣天二首萬戸邸公喬公征行元帥趙公等碑是嵗拜中奉大夫江西行省參知政事冬十月至龍興奉安西王敎撰延釐寺碑大德九年乙巳先生六十八歲居龍興有太平興國官碑臨江府判官夏君母夫人碑荆湖宣慰司興造記淮安忠武王畫像賛徐子方眞賛袁之上佐高氏子字說文選序秋八月望日至西山翠巖寺同行僉憲郝子明檢校閻子濟儒學副提舉祝靜得與致竣事少憇于洪厓丹井石上飮酒樂甚先生賦臨江仙致與靜得有和致又反和之先生亦有答者子濟別賦婆羅門引致又别賦五言古詩皆命致書貽紫淸道友王梅叟碑刻之石又架木物爲梯凳俾致跨水題名丹井厓石之上致云是以章子厚待我也諸公爲之一笑先生持酒相勞九月移疾北歸至吳城山子濟靜得亦來會子濟取吳城山三字與靜得約致分韻賦臨江仙以寫攀戀之意子濟自叙云九月七日舟行送牧菴先生過樵舍至吳城山與靜得賦臨江仙取吳城山三字爲韻留山字邀時中作去歲迎公樵舍驛今年送别重湖靑山知我往來無揆材慚杞梓聞道覬桑榆勝日黃華重九日喜浮五老眉鬚淸尊何惜駐檣烏分風行咫尺千里異荆吳右子濟一代文章千載事區區外物虛名了知此老去留輕銜舟攜二客襆被送兼程渺渺望湖樓下水連朝無此秋晴新霜紅葉錦爲城重陽誰共醉五老定相迎右靜得先生致所賦見自藁明日程公雪樓以學士赴召亦至相與留連南康累日雪樓北上先生解舟至江州㑹馬漕副克復相留迎醫病間遊廬山留興國宮提􅀧湯公爲建牧菴亭且立先所撰採訪眞君碑又爲撰新莊記漕司暖翠亭記舊德堂記云大德乙巳某歸自西江相遭德隆于鄂求名斯堂等作皆於是年也大德十年丙午先生六十九歲客武昌郭安道爲僉憲許澹齋儒學提舉有贈二公浪淘沙又有與安道論書序達嚕噶齊裴公碑案荆湖北道興造記云經始於大德乙巳之十月壬午以丙午春三月之癸酉訖功夏五月遣􅁺屬趙茂陵告成亦是年作五月十一日閻子濟卒大德十一年丁未先生七十歲有夏府判母張氏碑布色兵馬碑平章游公碑云公以至元十九年拜榮祿平章明年薨於位後二十有三年當大德丁未元子永錫遣猶子某自汴而郢以碑見託正是年也冬宮師府遣正字呂洙持太子太師瀋陽王王璋書如漢徵四皓故事趣爲太子賓客授正奉大夫十二月至維揚與第二子圻定婚焦氏婦龍陽梁孝子碑經歴呂君碣皆作於眞州葢是年也至大元年戊申先生七十一歲仁宗居藩邸開宮師府春二月先生舟過高郵有次致和杜紫微齊山詩又有次韻贈李若水及留别柬呂正字登淮安城樓幷參錯和勉致進德無怠等詩致侍舟行至崔鎭水驛而別有齊哩克台先廟碑龍興寺永業田記右丞相史公先德碑是嵗由賔客授資善爲承旨又除太子少傅不拜武宗諭之先生再拜曰昔先伯父嘗除是官亦辭不拜臣何敢受至大二年巳酉先生七十二歲拜榮祿大夫集賢大學士翰林學士承旨知制誥同修國史案雍國賀公碑至大二年七月二十有九日行在南坡公碑未銘敕翰林學士承旨燧撰述之又龍興寺永業田記云至大戊辰令下明年三月俾學士承旨姚燧爲文末云其年夏五月記是三月傳旨五月文始成也又有朝元萬壽宮碑招撫李君墓表至大三年庚戌先生七十三嵗是年舉致爲汴省掾有滕文穆公碑瀋王詩序許文正公祠堂記元帝祠記忠勤堂記喬木堂記雪堂雅集跋語孫侍郞碑楚公畫賛郊宮樂府南鄕子等作至大四年辛亥先生七十四歲爲中子圻娶焦氏婦閠七月至杭未幾中書遣陳檢閱復以承旨召病不克赴十月至京口買舟西歸致與先生別儀眞遂成長別是歲有完顏公碑南寺碑寺武皇所創設行工部董其役未成而上仙遂輟工一日佛座前紋石上有二巨跡一靴跡一佛跡僧以吿行工部官事聞上成之命先生爲文先生時巳得請南歸中道文成進之李宗師書丹刻石僧有取碑中祝髮與前聖往矣于佛焉依等語訓曰祝髮斷髮也罵僧爲秃焉依者焉爲未定之辭此謗無佛訟之太后后怒命諸老與集議之宗師詰其人曰祝髮字文人多用之焉字語助也何謂詈僧謗無佛乎其人曰宗師亦僧也謂我曹爲斷髪去秃幾何李因曰國家使我曹飽食煖衣者亦何用哉其人遽曰將以祝皇上萬萬年壽也李曰然則祝字固佳字也僧茫然失措無以應議上命趙子昻元復初別撰其文張希孟祭先生文有磨平淮碑之語今文去祝髮語因紀之皇慶元年壬子先生七十五歲居廬山作匡山精舍記慈化寺碑皇慶壽詞上巳淸明同日樂府皇慶二年癸丑先生七十六歲是年復以翰林承旨召先生巳卧病郢城矣有寧國路修廟學碑賞花十詩九日感皇恩樂府蓋先生絶筆也先生九月十有四日薨葬郢城北臺之陂鄉臣徐立綱恭校
