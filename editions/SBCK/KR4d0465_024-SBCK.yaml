body:
  text: 元姚燧撰神道碑武略將軍知􅀪州程公神道碑由程氏世爲太原祁縣人燧考歐陽公表唐相系曰程出風姓顓頊生稱稱生老童老童生重離其後世掌天地之官裔孫封程爵伯洛陽上程聚則其地也至周休父失其官守以諸侯入爲王司馬及銘文簡公琳碑則云莫盛于唐宗分爲七廣平中山濟陽靈洗其三則皆祖魏安鄉侯昱而系表皆無是言惟异上三四世而止豈今居太原祁者或廣平中山分歟其可系則自其高大父主簿祁政生曾大父禮武科取官忠翊郞至右武大夫守隆州冒陳金兵以殁宋愍節死賜錢百萬歸葬其鄉大父天祐醫以自業卒葬文水考達以太祖建龍旗九斿卽位之年丙寅至戊寅兵金之年爲十三年年二十餘與兄通弟進倡豪傑來歸完保其鄉爲提控爲監軍鎭撫軍民都彈壓管民總管銀符甲午金亡之明年還鄉民五百亦占屯籍詔易金符位總管上發平陽河中京兆民二千屯田鳯翔實僑客其地城中猶荒錯荆棘逐虎狼則田疇非立茇舍伐株橛芟蒿萊不可以入錢鎛以觀銍艾戛戛其囏哉矧西則秦鞏未臣行金正朔南大散關距宋百里北山饑盜縱橫日夕相㓂殺丙申又爲征蜀所塗師旅去來館餽之須十以率之屯供億七鳳翔纔三後鳳翔民稍集資屯猶六焉爲之七年當歲壬寅以終其賢其能其勤其勞有盧昭文摯墓碑言公諱介福字伯祥故事父死子得嗣爲歲辛亥宋四川制使余玠潛遣偏裨火絶棧道木閣身將大軍攻圍興元城方孤圍公將屯兵五百從都元帥都爾蘇入援及絶無從得塗値三人自圍所亡歸許貰其死令導由他山刊木岀陳倉玠以爲自天而下焚圍宵遁其年憲宗卽位凡中土列聖符節告身盡收之官明年入覲還金符仍位總管上屯田鳳翔制許專殺有王姓民毆兄至死旣就逮其親請鄉鄰善公者懷白金二鎰來貨曰死非他人吾長子也今又以季子償死吾誰與爲養惟哀而全之公却金曉曰虎狼獸耳父子兄弟且不相噬人而賊殺同氣其不仁也暴甚虎狼此而不誅何以正是􅀖之斁敗天倫者竟尸之市尋岐雍民家奴皆蜀俘百十爲曹相煽亡歸公悉止還朝廷聞之率以爲反遣特濟來按事連其主將盡殱之公曰民奴羣逃主何與知惟當罪首亂者由是惟誅七人孟待制嘉之因扁其堂曰明恕戊午憲宗進討西川乘輿入由鳳翔多其津梁館餽廩餼修治豐潔賜金幣五白金爲兩百互十世祖立極中統庚申收上符節吿身如先朝以前屢入覲潛藩熟公還金符至元四年丁卯以平陽河中屯民爲軍假公子松長千夫將戍成都其還鄉民五百入傳官公武略將軍知􅀪州下車渠桑乾水灌田五十里新州􅅟以示安榮一刮夙昔苟簡之􅁦饑封民民所食木膚草實上之中書得發廪以贍械素豪猾之干治以病民者于市懲衆擢曹徵君子汝弼敎授以師是􅀖使士知學其古人所謂糾姦示惡流恩襃善者􅀋歟十年四川上松戰功制問故符安在對以􅀪州仍佩制解傳松滿秩還岐二十有六年已丑年六十七冬雨木冰羣烏噪集庭樹三日公弗善之覽鏡入奩前諸子訓曰吾平生無他長人惟俯仰無怍愧人耳若曹可篤學學自修則在家在􅀖不患無孝忠之聞也惟求善惡在已有無無以人過于毁譽而輕愠易喜語訖而卒實十一月二十一日也二月從塟于其考鳳翔之召亭鄉兆次兩夫人皆前卒謝君四十一年富察君二年四子長松次檜八藩副都元帥虎符皆不祿悌彬業儒孫五人萬里秦山殤壽山業儒文演陜西萬戸虎符文饒未仕女十人皆歸名族其天質仁厚剛方孝友明信哀孤敦宗民奴禮士者有陜西賈提學某墓誌銘銘曰猗歟將軍賴基父勲田岐雍郊千耦其耘人初小之治寄是府勢􅀂異然此客爾主後一歲中校其賦輸爾財四三此六七居無事而農我艾我銍警將一旅從㓂入岀憲廟兵宋師由褒斜百須餽供應求咄嗟帝用嘉止幣金實篚其爲龍光疇與儔比于後世皇詔其子松將屯千夫戍鄰莋卭其半屯民雍歧之􅂌私公刺􅀪足乃騰驥乃渠桑乾膏潤孔多履道以仁越度用苛視民之飢猶已紾背亟請于朝發廩以食滿秩養安十五餘年靈烏告凶得氣之先觀古史臣爲人紀善雖一行言亦取立傳志在行後尚鑒用勸子孝孫􅄌乃祖考思惟懼平昔有美棄遺託諸能言金百昭垂走非其人彬爾來卽拜手過求先德爲述誄婉而章其言洋洋匪資礎􅀛疇遠闡揚譚公神道碑譚在周千七百國之一子爵幽王之譚大夫衛碩人之私譚公皆其遺苗後世子孫遂以國姓史代有人其居德興之懷來高祖而上不得其世曾祖信金鎭防壽州千夫長祖伯全家累千金父資榮以徇北功皇元帥左都監虎符寄治交城遂令其縣削平盜賊賢士逃亂者多往爲依公生以歲戊寅髫年入學穎慧彊敏㧞異羣兒成人兆緒嶷嶷則見十五綜經緯史講貫精熟會課朔望每魁諸生爲交牧盧帥所奇以女妻焉軍中得書則馳送之故其家多積至萬卷國初爲制皆世其官父死子繼兄終弟及或父兄存將傳子弟者亦惟命故考府君以元帥左都監交城令推其弟資用卒公以嫡長嗣爲十九年矣太宗之八年丙申州縣守令上皆置監動惟國言公不能也而受成說譯人慮其見欺乃私與國言者游日薰而月聒之滿歲而悉能精曉他日郡議不資用譯應務無滯人悉異其不學而至朝廷置斷事官于燕曰司瓊林園之臺人人則曰行臺府檄公往計事歸請省諸工料費橫取民者府僚便之舊文谷水分漑交城爲平牧郭帥所遏專利其縣民累訟之終不見􅀡躬造大府爭之郭帥少公恃爲父執至或肆詬公不爲報惟理譬折彼遂噤屈至今其水縣􅀩其利杖部民持吏短長恣爲非法者幾死民惠且威俄入覲因中書耶律公面陳初乙末料民州縣率以無産僑客入籍用示其庶及賦下悉避逃徙責徵實存官無所取稱貸賈胡困不能償廹改立約以子爲母譬以牸生牸牛十年千頭滋息日增帝爲哀之制許貰其逋懸無鉤見民公私之負三年勿徵子母對止亡民能歸其復三年縣境大甦而鄰民曰吾獨不居交城耶州縣守令益害其能請督一府遠輸之糧于平陽及至又移輸京兆仍守其出比盡而返數年由是縣民困劇鄰矣憲宗壬子復大料民公削其逃徙兼其貧弱雖捐戸數故是縣差不艱窘歲甲寅世祖淵龍平大理還始入見嘉其舉趾凝重岀話愼詳留居藩府官而不名以其弟山阜代爲縣遣邇臣出使必以公偕先是分封世祖以京兆田戸寡益以懷孟且韶總天下之兵遂置經略司于河南宣慰司從宜所于關西行部于秦州漕運司于衞安撫司于邢盡遣諸軍屯田戍邊首淮尾蜀以休秋冬士馬往來之勞東西數千里道不拾遺中侯屯庶翕然歸心歲丁巳宗親間之遂解兵柄他王遣阿勒達爾至京兆大集汴蜀兵民之官下及管庫征商之吏皆入計局爲條百四十二文致多方且曉衆曰惟劉萬戸史萬戸兩人罪請于朝蓋謂忠順公丞相忠武兩公也自餘我到專殺虐焰薰天多迫人于死世祖遣庫濟靑左丞與公來臨無與鈎考而彌縫其間時通動息藩府會明年世皇身至帝所命下而事始緩猶仗兵民諸官凡昔所置諸司皆廢公歸丁妣郝太夫人艱藩府奪哀起之世祖始分兵南征俾公治懷歳旱復鑿唐溫渠引沁水河內諸縣中統建元制褒其賦性寛和練習政事以爲懷孟路總管明年入覲賜金符四年換虎符訟隨日决曾不留獄教民植業桑疇麥陂稻塍芡湖果圃苧區水輪步船無有遺利或用致饒民其臧􅀗侯克寛孫宥等家男女數十人引蕭讓爲府史升知事積官運使按察使至元二年罷世侯省懷孟衛輝兩總管入彰德以公爲同知無幾時官嘉議遷河南路總管兼府尹明年奔元帥府君喪交城中書不聽終制迫懷涖職􅈆水疊石爲岸梁木其上歲易腐敗規爲樓十二楹覆之慮其財擅取帑力輕用民得請戸曹而始究工上下列肆月收傭值資府公須參政楊公紀績于碑官少中平灤路總管旣至疾歸七年散階例降二等與職上下官奉議司農少􅀸尋進嘉議京兆總管兼府尹者一年改陜西四川道提刑按察使當按行四川以邊方軍政多所闕略未可以內地文法遽繩修舉大綱而止州胥府史坐贓汚者以始犯罪皆輕平下令治事之餘使學官聚爲講解期通一經庶少變其筐篋刀筆之習漸摩禮義則恥貪凂而不或蹈時詔禁有妻娶妾乃建言不孝有三無後爲大世德下衰婦人以悍妬成俗巳旣無子又以是訐制其夫將遏絶苗嗣曾不省恤請自今男子四十無子聽其娶妾中書是之遍示天下十年中書左丞昝順時爲宋帥嘉定入寇大敗僉省嚴忠範于成都沙坎入其郛我師退保子城上械忠範至都俾公代爲僉省至則瘞其􅁀骸完其焚屋賑其飢貧集其流亡撫定一年西南夷羅羅斯內附上以文武兼資可使鎭撫新國以爲副都元帥同知宣慰使還京兆治裝或說蠻夷無親不常叛服宜以老疾辭行公曰受國厚恩圖報無所以皇上之威德遠被何往不可何私自幸其安乎就死其所懷人德我馬革裹骨歸窆是焉志願畢矣遂行未至行槖盡爲河西所刼事聞上慰安之再爲降制及軍中所須至其境方諭皇元同仁不間遠邇特置大帥安集招懷以捍外侮非利徵求朘削汝也國人大悅而公以不能風土竟疾卒至元乙亥九月二十有七日也年五十八門壻李某護其喪歸子克脩迎之中塗號慟屢絶懷路之民哭柩致奠者將三百里以明年某月日葬河内某地後踰三紀公之孫質拜而言曰君及知先祖且與先人同事許文正公求可銘先祖碑者舍君焉將誰託筆燧曰鳴呼公奉命始至秦于時識之其後尹洛燧時家洛遊處必見召常謂忘年友雖辭而不敢居抑不可不謂之知巳于其平生若可槪焉子之言曰惟仁者能好人能惡人蓋先師以初入見潛藩之年驛召至秦後四年公使至見其道德之容聞其仁義之言考其卓絶之行憂世之志樂天之心出謂人曰今顏子也先師還懷公爲之牧以求言焉則謂之曰學者或滯于形迹而不適用中理合而一之始可謂善學者猶導公以用世之方身親接久而始示以性理之妙而操修之又使克脩盡弃其學而事之其能好人也如何黙爾吉爲監于懷以暴戾跋扈名聞一時同列少逆其意或詬詈侵辱不異僕􅀠公與處八年細故則讓事或害政則誠意馴導以理使孚信之能改而止惟逺以不惡而嚴又游顯代張左丞宣撫大名爲諸路總管求金符奏巳上公言之中書辭不受命曰聖上不識譚澄耶爲顯所舉省爲去之其能惡人比􅀋亦庶幾其仁者歟太師趙國劉文正公論天下人牧得邢之張芸夫懷之譚彥淸何憂不治哉先師亦言譚侯辭氣温雅雍容樂易達時識治足畏服人其爲兩公推與華袞之褒何以尙之夫人盧氏勤儉惠和不侈旣貴能以身率不輟婦功故婢數千指約束如一壺範之嚴所至化之克脩事裕皇出爲江南湖北河南北陜西漢中三道提刑按察使秉受懿美得之天問學脩爲受之師忠信愷弟臨政與人皆踐其父武女九人適淮東宣慰使傅爽延川令李某湖南書史石某江南􅅦稅使賈時益汾州萬戸子杜某杭州總管子楊某灃州總管子鄂屯某參政子盧某交城以次官子王某男孫三人忠尹大名之南樂質宿衛成廟己銓未除文庶未仕女孫七人適湖廣省員外郞袁景韓知陵州杜明耶律太傅濮國公孫某東昌總管之孫宿衞成廟許誼宣慰使子傅蔓閔某竇某銘曰有翼其恭有溫其雍有訒其言有裕其容人有其一足曰善士矧公兼之宜克用世魯昭十九猶有童心公于其時帥政己臨視民之傷猶已致者奔走不遑說上教下事大定憲由邈皇居與率土臣衆以視諸入侍大帝藩府帷幄而日廼與俊義簉擢凡厥大猷亦與有聞權臣肆虐恃解其紛大帝南征歸正天統于懷于洛于灤于雍于是有衆迭司牧之惠績寵嘉虎節陸離追之風紀詰姦秦蜀惟政以仁不一文律嘉帥縱兵入㓂成都劉吾人民灾其外郛奪嚴諸侯于彼僉省以公代往責使撫定安鎭一年移師西戎皇威甫張而遄告凶最公之仕歴年四十其二十年爲帝賞識矧其有子官風紀三其取于天而得己貪走賦是詩鑱石墳道期爾後昆百世是保轉運鹽使曹公神道碑維曹肇國則自文王子振鐸以武王弟故與唐康管蔡霍屬以别之鈞曰叔春秋十二國曹猶存其後子孫雖散之四方亦皆曰吾先人顯諸侯捨姬氏惟國姓至參以沛吏佐高帝興漢功侯平陽國故絶或續魏文帝丕篡漢以有中土者凡四傳四十六年自是聞人史不絶書至金初曾祖儀貫籍睢之考城以明罰執法爲郡功曹生蔚解試魁開封生鸞以材武受知皇元帥劉公引爲天下規運提舉妣夫人赫舍哩氏金源貴族生公諱世貴字仲明由翰林國史院書寫爲元帥府提控初高麗自太祖世納欵而國王穆呼哩方總兵歲東征不休䖍劉人民而臧獲其子女高麗患之棄王城徙其民江華島世祖哀其首服爲罷歲征使復王城今瀋王之祖惑其令公林演之說而安其所不以時徙帝怒命嗣國王塔納格爾兵其界遣平章政事趙璧行征東省公爲行省宣使入諭演與同惡豎惟茂禮書宋松禮侍郞洪紊陳兵以逆公叱責曰汝海􅀖小夷敢以威脅天子之使則反矣戮十餘人縳演致闕國王導之入覲帝嘉其忠敕授忠翊校尉曹之城武令有惠其民勒石頌之凡三遷皆同知劇郡吉州歲荒發庾以賑餓羸隆興羣盜據華洞數調官軍討不能平遣公諭招之悉棄險來下皆齒平民建康去以母喪會廷議凡前峻官者例阤之改温之治中以未終祥禫辭明年官朝列福建閩海道提刑按察副使職乎民者進爲風紀非聞望岀常調者憲臺不輕以􅂌至則糺閩省平章黙勒賊民蠧政下詔誅之彼其同列大爲振肅滿秩官中順遷興化路總管兼管内勸農事凡民爲羣盜鍾明亮劫脅汚染進討將士取而奴者無慮千人皆汰之遷福建都轉運鹽使永上而卒實大德六年六月二十有九日也年六十一葬太平之須城登賢鄉夫人趙氏南京提舉趙晉之女妻道母儀姻里範之五子定國尹江陰州兼勸農事靖國同武昌等􅅦茶提舉皆夫人出次室葛正國安國輔國皆葛岀方勵學女孫三人銘曰率土之逖將帥侯牧有沒其齒天威不覿公一布衣從省東征問罪高麗􅀒羈以行檄先俘海徙江華島敢拒爲亂魁脅縳討王孫導之入告爲猷甚爲帝嘉邑令用優旣試牛刀易猛以惠尋峻其階吉洪昇倅言拯歲荒洪咨諭降持憲于閩渠兇斧亢爲牧興化凡寇滋蔓波汙平民悉頼以澣轉而閩漕鹺利是專甲子方周白日遽捐平昔履歴盡萃乎此在􅀖必聞可無媿已而所未白在家亦聞衰俗滔滔在官幸身親未卒哭期月已出王事是從笑言自若公則異諸昇䕶輴車改溫又辭練服未除若是自致庶古少跂化民興行足裨至治須鄕登賢而祖有阡碑以表之庸信其傳少中大夫孫公神道碑至元二十有三年燧以􅀡學士召至翰林孫公時爲閩省郞中數千里狀其考盧川府君之行將託之石見求旣爲銘其墳道矣大德四年爲懷孟總管且卒顧言其子壻郭忠恕曰死必求姚翰學銘吾碑至大二年燧方承旨翰林忠恕其時已爲宗正府郞中始致是婦翁之命嗚呼何公區區不鄙余言若是之不忘也公諱顯字榮甫其鄉望遷徙考妣年􅁙兄姪名爵前述悉之公幼學旣長以其家􅀠兵籍歲從大將南征世祖立極置江淮江漢兩大都督東則李璮開閫益都西則史權開閫鄧州與宋揚州襄陽兩制帥猗角及璮誅廢督府皆爲統軍至元五年大集天下兵圍襄陽起本平宋八年敕統軍駐淮北實制下流西擾之兵明年改行樞密院者二年改行中書省于淮之西十年襄陽下廢省復行院明年丞相巴延行中書省將大軍濟江又廢院與是省合公以從戎捍敵應變倉卒益示暇豫未嘗窘錯故由書吏至令史數年不調宋亡明年積是勞勤官中順大夫遙授知英德府同知太平路總管府事又明年改江西行省郎中宋餘孽兩王盜據廣海遣將給餽凡其征需動咨幕畫隨亦殄平十八年官少中同知荆湖北道宣慰司事朝廷遣使鈎考錢穀及侵牟者遂大徵集諸道官吏無慮數千于鄂省責公主計局其使善煩其令爲藳甫定則一易之傍求多塗約束計吏于行苞苴公衆辯曰册己具矣何至衆多爲是持久不絶之務乎有絲髪遺罪請身任使爲之止其不屈威暴如此乃歸計吏二十三年廷議以平南國升秩過竣例阤公爲朝列遷福建行省郞中以犯法臣隂狡貪賊盜官楮緡十三萬定能正而不阿卒無所染明年以僧格爲丞相爲尙書省中書六曹悉以歸之而鈎考尤酷省臣而下或杖辱而閩中獨輕平未嘗若浙省迫人于死者南雄械賊百餘人爲草竊者當死公讞之惟刑三十人他悉縱遣安溪賊連十五砦爲㓂公諭下之省議苟下惟罪首惡至是下者數千衆欲盡屠壯士分有其子女公㧞劍止曰省議云何敢掠取者論如律惟磔首惡一人大德二年復少中大夫懷孟路總管兼諸軍敖拉兼管内勸農事民􅀩其利者惟竹始竹之徵利財自戊戍宣課所惟在洛西懷與輝舊皆民産由馮德用爲河南漕長以兩郡之竹妨其課利請官有之制國用司爲奏可而禁之法密雖其故主輒取一箇亦坐以盜數其節爲布罰園傍之田民耦耕侵犯而出亦止爲罪民甚害之官使竭園伐取竹日益耗而課入不除公策千部請令故主與鄰地䕶守撫禁斬伐惟責輸賦是亦復民産之漸也符下從之今鬱爲茂矣譙樓庫舍廟學有老弊者無不新完諸王妃主經郡賦民木席爲屋絡綵周之晝食夜息各異爲所或前期一月具而不至民又守視不去去又官吏規取其物無所于訴公至製卉布爲大幕容倍百人可以離合卷舒旣便以輕載以十車之力送往迎來無不至所皆前政未爲者病革猶卧治事卒于郡治仰崧堂之别室是年秋九月九日也年六十一夫人程卒以至元十八年繼夫人楊卒以二十有三年今夫人李嘗刲股肉羮進覬巳其疾斂則斷髪納柩中示與同穴子五二十有年長某舟死江中次某以任子爲單州州判官餘未仕女四長程出郭宗正妻今寡次李出適智某餘幼銘曰崧高詩言竣極于天維嶽降神王不時巡而公之先世家其下其仕其隱譜無究者及公之生珥筆從戎志期掁㧞以立事功周旋統軍行省行院雖屢易置爲史不變以才見留謀資其優逮夫濟江勞力大酬英德太平遙領知倅官之中順副以金瑞尋于江西長省幕僚進而少中其秩益超轉而荆南同知宣閫奔走聽命踰十名郡例阤始躋朝列稍卑于吳于閩省幕再爲後移內地理問汴省復其少中總管懷孟平生履歴其止于斯治兵涖民何事不爲爲則事治有譽無刺其于爲臣亦盡其義其所卒地郡堂仰崧何公于崧生彼此終豈人之爲造物者意歸安崧邱後昆以利勸農使陳公夫人李君神道碑少中大夫嶺北湖南道肅政亷訪使陳元凱語其妣夫人平生于其友姚燧曰河東李氏有開國于金爲金吾衛上將軍者子孫雖世搢紳多顯人人不目之惟上本其先曰李金吾云夫人則其諸孫陜令欽若之女先君勸農使將授室祖考妣規措公賈潁川郡君審于采擇聞夫人淑姿懿行布幣聘之夫人旣廟見吾陳氏世緒絶遠族大以蕃先君上有參議提學奉職三兄善于閨壺修職謹事舅姑孝之娣姒友之姻戚睦之而僕妾恩之咸曰非漸涵姆訓有素不若是以履度循法也歲壬長規措卒天兵􅗴金河南獨奉職以詔使死亂他族皆完自洛之西徙家解梁夙所居積蕩無遺矣會歲大荒夫人擷穭爲糧然火照績以事潁川雖流離造次其故家遺風不衰平時二年而潁川亦卒叅議與張夫人嫂也事之如規措潁川先君叅謀軍中或自軍所來槖之一錢尺帛不有之私室必歸兄嫂先君求得奉職二孤女民間夫人子過所生歸諸令門元凱生有三年不爲天所恤以歲丁未四月四日卒年三十四葬之嶷出先塋亦賴天之靈獲託其遺體者今白首矣毎悼夫人棄世之早前先君二十四年先君後躋位光顯不及同其祿而元凱之仕則濡先君休澤者祿養滋不及矣今惟有表章德美于是金石以慰靈下泉開示子孫于方來者猶或及焉敢屬筆子燧曰吾姚氏與陳同姓也燧之曾祖妣亦李金吾諸孫不知于夫人姑歟又戚屬也此燧不敢以不文爲讓者勸農使諱膺夫人二子元凱元英英殤孫坤女孫二人皆有歸矣銘曰良農于穡天勤其力或報之秋秩秩夫人來嬪于陳百罹艱憂君子中道弗偕其老年復不修何天隂隲嗇施淑德貽子是酬持斧繡裳風紀四方民瘼之瘳爲時聞臣人賢其娠誰異其謀夀母之子名不世齒泯泯堪羞剡首之碣有美枚列以表阡邱臣程嘉謨恭校
