body:
  text: 元姚燧撰神道碑宋太常少􅀸陳公神道碑大德戊戌燧舟遊湖湘而陳公元凱方持憲節使湖之南旣求追撰妣夫人李氏埋銘爲粗叙陳姚同爲有虞遺裔矣後五年燧持憲節使江之東而公以總管來莅建康馳書請曰吾八世祖宋太常少􅀸公以治平二年卒塟洛陽其後子以官爲家死不以返塟故於太常墓失其地所曾祖少中公訪而得之筆地之名與距城幾何里步以詔後昆志亦懃哉會薦離大兵終無有能至者七十餘年矣元凱始成其志如所筆發墓驗之果得范公鎭所撰誌銘摹以蠟紙副吾家乘願爲銘樹石以表墓道燧受讀之其先頴川人唐遷于京兆廣明中違亂於蜀家眉之靑神其可系者瓊生延祿延祿生贈兵部侍郞顯忠兵部生希亮卽太常公太常生京東轉運使忱轉運生簡州司士參軍揮司士生金儒林郞灝儒林生國子監丞克基國子生耀州三白渠規措使仲謙規措生皇東平勸農使膺農使生嘉議大夫建康路總管兼管內勸農事則元凱也子敬立最之凡十二世聞者􅁣息以爲非淸風素望之門孰能完有家乘得其傳次如是之多哉遂曰是足爲多乎哉苟推其世德而上之之十二世者又十二世而一耳嘗讀太史公書至其敘傳於司馬氏受姓所從上起顓頊子孫官居功烈文辭下及其身而止豈顯親者不嫌自明宜然耶故燧例之由譜姚氏亦遠本曰黃帝生昌意昌意生高陽是爲顓頊顓頊生窮蟬窮蟬生敬康敬康生橋牛橋牛生瞽叟瞽叟妻握登見大虹意感而生舜姚墟故姚姓舜三妃堯二女娥皇無子女英生商均一妃癸比生二女宵明燭光禹受舜天下封商均虞城以奉先祀服其服禮樂如之以客見天子示不敢臣傳夏歴商三十二世書可見者虞思箕伯􅀡柄虞遂伯戲五世耳至虞閼父爲周陶正武王賴其利器用妻以元女太姬生滿賜嬀姓而封諸陳以備三恪是爲胡公胡公卒子申公犀立申公卒弟相公臯羊立臯羊卒子釐公孝立釐公卒子孝公突立孝公卒子愼公圉戎立愼公卒子夷公說立夷公卒弟平公燮立平公卒弟文公圉立文公卒長子桓公鮑立桓公卒弟五父佗其母蔡女故蔡人殺太子免而立佗生子完周太史過陳使以周易筮之遇觀之否是爲觀國之光利用賓於王此其代陳有國乎不在此其在異國非此其身其在子孫若在異國必姜姓姜太岳之後山岳則配天物莫能兩大陳衰此其昌乎佗取蔡女數如蔡太子免之三弟躍林杵臼共令蔡人誘殺佗而立躍是爲厲公厲公卒弟莊公林立莊公卒弟宣公杵臼立殺其太子禦寇完與禦寇相愛恐禍奔齊桓公使爲工正齊懿仲欲妻完卜之占曰是爲鳳凰于飛和鳴鏘鏘有嬀之後將育于姜五世其昌並于正􅀸八世之後莫之與京卒妻完以陳氏爲田氏聲之近也或曰食采田完諡敬仲生田穉孟夷生湣孟莊孟莊生文子須無文子生桓子無宇桓子生武子開與􅁵子乞釐子生成子恒及楚滅陳而恒得政於齊生襄子盤襄子生莊子白莊子生太公和遷齊康公貸於海上食一城太公㑹魏文侯於濁澤請天子求爲諸侯天子命之是爲田齊太公卒子桓公午立桓公卒子威王因齊立威王卒子宣王辟疆立宣王卒子湣王地立燕齊楚三晉合謀各出銳師伐齊敗之濟西燕將樂毅盡取齊寳藏器湣王出亡及莒楚將淖齒殺之莒人立其子法章是爲襄王田單大敗燕軍迎襄王入臨淄齊故地盡復爲齊襄王卒子建立秦始皇帝兼天下滅齊虜王建遷之共自商均國虞至是千九百六十三年矣此吾姚與陳始同爲虞中同爲嬀卒同爲田之未分者後建三子桓稱王氏軫將陳氏而不及昇豈昇仍氏田耶自是田或多失傳次王莽自以桓裔追封完爲敬王以田豐爲世睦侯奉敬王後莽死豐子恢辟亂過江居吳興改姓嬀五世孫敷復改姓姚惟陳可以世求軫生秦東陽令史嬰嬰生成安君餘餘生軌軌生審審生安安生恒恒生願願生四子淸察齊尚齊生源源三子寔崱邃寔字仲弓後漢大將軍掾屬文範先生六子紀䕫洽諶休光諶字秀方獻文先生生靑州刺史忠二子佐和佐二子隼徽隼字道基晉太尉黃陵元公生伯眕建興中渡江居曲阿新豐湖生匡二子赤世達世達長城令徙居長城下若里生丞相掾康康生盱眙太守英英生尚書郞公弼公弼生步兵校尉鼎鼎生散騎侍郞高高生懷安令詠詠生安成太守猛猛生太常􅀸道巨道巨生文讚文讚三子談先覇先休先談先梁東宫􅀡閣將軍義興昭烈公覇先代梁猶以姓號國曰陳諡武談先子曇倩繼立諡文子伯宗繼立崩文弟曇頊繼立諡宣傳子叔寳亡陳凡五代三十二年叔寳四子莊􅀪徽某某㑹稽郡司馬司馬生某晉陵郡司功參軍司功生兼右補闕翰林學士某翰林三子監察御史當大理評事萇秘書少監京少監以從子鹽官令褒繼鹽官生高安丞灌高安二子伯宣伯黨伯宣著作郞生旺旺生機伯黨生元史元史生徽温州司戸參軍其自軫至機三十九世晜弟列者正書其傳然自廣明至治平實伯八十七年以三十年一易世率之爲六世太常而上四世其不可推知者二世耳嗚呼籍載以來不隕其世德者惟獨一門吾姚氏則自梁高平令可系而至今者廿有六世其上則或絶或續匹夫之家其可小覬哉嗚呼亦有甚可感者古人爲誌納之壤下必載其世次官勲實用備或世變時遷人有竊發知爲何代大賢君子揜之不忍及其匶焉初不預爲裔孫克念其祖求徵而謀也今元凱悼陳氏入蜀中微太常公始震而耀之亦其家之鼻祖也故旣發視元石而得其眞大封樹之碑表賁道刻石人獸如其始窆於三易代八世之後亦古未聞者故燧感之且敬焉推吾遠本三千歲之上皆有稽於竹帛者詳次授之非足止慰元凱於生死而有知亦必曰吾同姓表章及此其庶幾乎孝子不匱永錫爾􅀋者邪因爲楚人之辭歲時上冡使歌以祀其言曰峻南峙兮崧高阻西騖兮函崤趾北邙兮坡陀壖洛水兮波滔滔堂封兮偃斧古爲藏兮幾何所旣夷兮己焉有不夷兮疇焉主將帝私兮之家俾鬼䕶兮神訶待裔孫兮爲告賴􅀇石兮不磨維裔孫兮思愼其守不忍嘿兮求牛馬走曰先志兮其成庶階兹兮來嗣可究余亦虞兮遺苗匪妄冑兮華遙其統緖兮可尋具方冊兮昭昭年數千兮世踰百生民祖兮或幾及豈伊神明之後兮不與他族而中絕而何孟氏一言遽必五世而斬君子之澤坐令自今讀其書兮亦取二三武成之䇿重曰往者兮垂芳來者兮是望勿替兮休聲與嬀水兮齊悠長皇元高昌忠惠王神道碑銘幷序上畋柳林二月六日丞相臣大都平章臣扎蘭宣徽使臣拜達實克御史中丞臣布延􅀡侍行殿臣託克托丞相臣圖沁特穆爾奏金紫光祿大夫遙授右丞相宣政使徽丞相政使臣阿拉克巴哈言臣伏自去年言念祖考往事列聖嘗著微勞妄干威顔請褒幽隧聖量含􅀪曲賜允俞爲降誥命追贈臣祖考布爾哈推誠賛治功臣儀同三司大傅昌國莊愍公考銀靑榮祿大夫平章軍國重事宣政使翰林學士承旨領泉府司事達實密推忠益國輔治功臣開府儀同三司太師上柱國高昌忠惠王祖妣呼特呼訥完顔氏金源貴侯從封昌國夫人高昌王夫人臣雖糜軀補報無所惟有刻諸金石用章天休庶幾先烈託􅂷無窮敢昧死請制曰可太師臣託爾齊延丞相託克托又言昔盜殺大臣嘗求王文忠公褒揚其功文忠不可其碑故存請發兵士如千百人挽之制曰無庸其令十象輦致仍勅翰林學士承旨臣燧集賢學士臣愻翰林學士承旨臣仲壽撰書篆額臣燧稽首承命謹按王曾祖考伊埓庫們實奇爾氏初以百夫長事王汗可汗之爲大號自唐以然今惟曰罕王今所加故兼稱之曾祖妣夫人脫倫怯昵生圖巴哈齊哩克薩理斡罕合臘斡罕四人太祖方以神武戡定朔漠王罕與之有間圖卜巴哈率其屬二百戸來歸徑雍古爲其王所止居之􅀩古魯地遣其子約速穆爾僞爲商至帝所控其然帝遣托掄薩理必塔台二人使雍古王阿勒呼木實克奇呼爾所召其弟與二百戸者偕來帝問圖卜巴哈在王汗所何官曰爲質也俾仍爲質宴享則賜班坐大臣位帝征西域盡率其屬以從㑹旌戰勞賜回鶻戸五百四十有八在太宗世又從帝弟睿宗平金明年乙未之詔定憲宗時以兩諸侯王與蘇布特再征西域又率其屬至有在行中明年至袞騰吉斯與諸侯王巴圖㑹征欽察斡羅斯至阿蘇齊黙斯城皆先登薩理斡罕夫人哈喇哈納生昌公蘇卜特達巴太宗分封功臣割順天屬縣束鹿􅊢昌公初掌睿宗奉記睿宗上征事莊聖太后領所部民千戸歲辛亥憲宗立極從莊聖所求致之詔􅀩克薩勒爲丞相昌國位其亞天下庶務惟决二人又領諸王副車僧道伊囉勒琨大食蠻朝覲貢獻敷奏宣發號令諸事明年因勑掌帑藏與祠祀醫卜諸臣於昌國原申前制後二年􅀩克薩勒卒領中書省終憲廟世權寵不移四子長故湖廣行省丞相也先不次故御史中丞茂巴爾次王季四川行省平章巴哈特穆爾王自幼事世祖初與今太師淇陽王伊徹察喇同掌奏記後獨掌第一宿衞奏記兼監斡脫總管府持爲國假貸權歲出入恒數十萬定緡月取子八釐寔輕民間緡取三分者幾四分三與海舶市諸蕃者兼戸部尚書內八府宰相如馬湩酹郊燔肉告神皆大祀也惟王司之又諸臣喪疾可通籍入與否必是焉白詔凡祝釐金帛惟視其署有司始給十八年升總管府爲泉府司丞相哈喇哈遜嘗奏罷之二十有五年王請復立其年東諸侯王納延叛帝自將往征王前矛而後殿之詔諸侯王而下生殺惟命亦旣底平明年其黨一王哈丹又叛成宗時皇孫詔王將衞士千人從討之大破其軍獲輜重不可貲算哈丹挺身走引分海隅歸奏衞士疾戰之勞請人賜白金爲兩五十制可及改制置爲宣政院以王爲使凡天下職僧之官何人宜爲從所調奏祝髪之徒入罪罟者惟與是官同聽有司不得專决二十七年叛王罕都犯西北鄙帝又自將往征至杭海王累戰皆捷叛王遠遁摭安邊兵與置驛傳而還明年拜榮祿大夫泉府大􅀸凡諸侯王副車贄壤奠至庭者王則傳臚受之成宗元貞之元罕都遣諸侯王額琳沁出兵犯西陲帝召王曰􅀸名素重非身往不可􅀸能行無對曰効死臣職惟陛下命加銀靑平章軍國重事十月􅀗額琳沁與所部偕來大德三年兼翰林學士承旨領泉府司事最其賜賚珠衣寳帶海東青鶻白鷹及豹出中帑外坊者月異而歳新之不次計以大德八年七月二十有五日薨享年五十七葬狼山水峪二子丞相其長今宿衞皇太后寔世王官掌傳臚都王副車凡贄壤奠初尙諸侯王葉卜肯公主布爾罕再尚諸侯王阿濟格之孫公主都掄呼都拉次布喇尼敦宿衞乘輿內八府宰相銀靑榮祿大夫大司徒遥授左丞相使太府院翰林學士承旨娶廣平忠武王女布哷齊女二人長特濟格爲東平忠憲王子大司徒鄂都岱夫人次女姑姑爲諸侯王瑪納斯妃孫女古濟格爲諸侯王哈濟妃因嘗槩王自至元甲子以及薨年迨事兩朝惟近淸光一日未嘗居外實閔四十一寒暑世之知者纔是職守與從蹕討叛數事而止自餘朝夕訏謀左右彌縫入宿出衞所以奠枕九重者其功將多中禁深秘外不得聞惟帝知之故雖沒世猶不能忘特崇其爵於百揆上王之高昌使臣鄰無以復尚匪獨其身又貴其子兩皆入踐台袞矧其晜弟從子布列中書宥密者猶衆有之嗚呼盛哉銘曰人臣之位等絕數異進爵及王爲世極致嗟王生臣祖宗兩朝禁近身居蜚聲遠遙帝崇象教王使宣政九有祝􅄠竭蹙聽命王在泉府舶交諸蕃匪利貨還來遠志存疆場雲擾王每從討險阻踐踰帝躬是保斯皆其外人所易知毗賛於中誰悉密微其悉密微獨今皇上哀其沒世大賁􅀇壤異姓而王胙之高昌潛德由斯爛其昭章猶若爲未襲貴其冑丞相聯翩兄先弟後婦王之女女王之妃伊誰能方門閥巍巍􅀛負螭挐碑是墳道塡金載銘天子之詔湖廣行省左丞相神道碑初公以中書右丞下江陵驛聞大帝爲大燕三日曉近臣曰布延東兵阿爾哈雅孤軍戍鄂朕嘗深憂或荆蜀連兵順流而東人心未牢必翻城爲應根本斯蹶孰謂小北庭人能覆全荆江浙聞是肝膽落矣而吾東兵可無後虞朕喜以此御筆爲北庭書昔嚕嚕哈西地所生阿爾哈雅爲大將有功信實聰明而安詳其加􅀸爲阿虎耳愛虎赤嫡近越名赤給日別平章求之億萬維臣之中降是宸翰昭乎雲漢之章藹如天語之溫崇功襮德匪夸一時可華及子孫百世者纔公一家視古丹書鐵劵出臣子手者何足道也卽江陵民封之千家始公微時侍燕惟席地坐後持置榻班諸侯王實愛拉下賜之金􅎆曰竢至而省必合樂鼓某曲飮是他雜以靑白縹色龍鳳御服御帽金玉珠帶白貂裘西錦珠衣海東白鶻凡所以侈服貴近由娛其心者靡不及公嗚呼盛哉公北庭人妣夫人圖沁呼都魯化胞生剖而出公考額森和卓弗善也將棄之夫人未忍益謹鞠公幼聰頴而辯長躬豐耕喟然曰大丈夫當樹勲國家何至與細民勤本畎畆釋耒去求讀北庭書一月而盡其師學甚爲舅氏實喇岱達爾罕所異歎曰而家門戸其由子大及從事大將布拉吉達俾其子故中庸右丞相呼嚕巴哈從受北庭書又薦其忠謹得宿衞大帝潛藩巳未從濟江帝射虎未殪公捨馬而徒挺矛舂殺之攻鄂先衆而登禽一人還流矢貫喉出項帝勇之賜銀爲兩半百先是聞吐蕃有貯甘露寳函石室藏山穴者凡再使求之皆爲大蛇奇獸所懼莫至最後遣至其所無所見竟與俱歸勸進之初諸侯王議未一惟一王闒察耳嘗有書帝忘其誰在也顧左右問公曰臣所有之書出而决兩事皆甚合㫖中統三年制以爲中書省郞中褒曰久侍禁庭已著勞蹟至元改元加朝請大夫參議中書省事發言惟以當可事宜爲心不憚伯相而阿其所志人有小疵必曰帝前衆畏其口明年進嘉議大夫僉南京河南大名順德洺磁彰德懷孟等路行中書省事始罷世侯而易置其地又明年轉亷訪使虎符領鷹坊凡鳥獸皮角筋羽悉征輸官尋領諸路鷹師獵戸再兼中都路闌遺又明年進中議大夫僉制國用使司使又明年故中書左丞劉武敏公拯爲䇿襄陽吾故物由棄弗戌使宋得竊築爲彊藩復此浮漢入江則宋可平帝大然之徵天下兵領以元帥府觀武襄陽城白河別開行中書省以我少師文獻公僉省公爲同簽凡襄鄧唐申裕在太宗世所殘漢上諸州之民避荒汴洛間與下戸賦寡者悉徙而南屯由給餉尋罷帥府又明年詔故平章合丹開府儀同三司平章軍國重事贈太尉史忠武公天澤來莅師宋遣人餽鹽茗襄陽乃築長圍起萬山包百丈楚山盡鹿門以絕之又城峴首開省其上兵興事劇星火公專入奏能日馳八百里敗宋殿帥今平章范文虎於灌灘又明年分中書省爲尙書拜中奏大夫參知河南等路行尚書省事又明年兼漢軍都元帥分將新軍四千六十及廢尚書復以爲河南等路行中書省事宋遣都統張貴張順將舟師從上游送袍甲犒師自萬山接戰二十里斬順殺溺過所當貴獨以餘衆入後水􅁀漲慮貴乘出下令軍中舟置燈篝岸積薪槱貴果結戰艦爲陣宵遁盡然燈薪戰四十餘里斬之櫃門關又明年遂請以西域礮攻樊城㧞而屠之無噍􅀋遺襄陽甚慘移攻具臨之且曉守臣呂文煥君以孤軍禦我數年今鳥飛路絶帝實嘉能忠而王信降必尊官重賜以勸方來終不仇汝置死所也文煥感而出降十年二月也詔公偕以八覲眞拜參知政事明年授資德大夫中書右丞同忠武公行荆湖等路樞密院公策能籍民爲兵十萬合舊軍或丞相安童布延一人將之南伐宋社必墟制皆從之故太傅布延與忠武時皆以左丞相贈開府儀同三司太保并國武宣公阿珍以平章與公及故平章文煥以參政行省將大軍發襄陽將至郢忠武疾還敵宿兵數萬築新郢夾江爲城橫鐵絙鏁戰艦江中巢礮彍弩遏我舟師郢北黃灣岸西去江三里所港通藤湖達漢敵壁其上攻拔之拖舟入港丞相惟以公數十騎覘新郢趙范兩都統鼓伏兵發葭林諸將倉卒有未甲者人人奮先殄其一軍兩將之首皆致公割趙腦膚撓酒飮之行克沙洋新城以臨復守臣翟貴逆降大軍去而復叛及漢陽故平章夏貴以制置舟師陳漢口水軍千戸馬成爲導由巳未濟江沙武口塗入江拔陽邏青山白湖諸壁走貴軍鄂守臣張晏然王該王勝以城下遂徇州民衣冠關㑹仍其服行鄉郭帖然無有奪菜秉者民爭德吾元仁政義聲恨服化晚檄下漢陽壽昌信陽德安大兵旣東分四萬人戍鄂咨公留後尋進官榮祿大夫自陽邏置驛以便行商至蔡方請移師江陵而荆閫安撫高世傑將艨艟千六百艘卒二萬規襲鄂公分兵禦之大敗之荆江口降諸洞庭桃花灘下岳承制以守臣孟之紹爲安撫使卽西師至公安誓曰自今功者健兒陞長百夫百夫長千夫千夫長萬夫萬夫取進止因南風大沙市戰城上又戰城中屠之江陵精銳於是焉盡制置使朱禩孫辭疾高節度達出降下令安集如鄂岳傳檄歸峽灃常德辰沅靖荆門隨郢復皆下之官其守臣如岳除宋苛法衣食惸嫠詔故平章廉希憲以右丞行省江陵以世傑窮而來歸棄江陵市禩孫徵至京師死猶没入其妻子還公于鄂移兵長沙行拔湘隂潭守臣植滉柱江中自喬口至城凡十五所皆斷之又㧞城西柵射書招其守帥李芾速下以活州民不然拔城屠矣不答乃令諸將畫地分圍決隍水以樹梯衝礮鐵埧石心臺百日公中流矢創甚責戰益急申命諸將凡所由久頓兵者卒伍前驅諸將安行其後也自令萬夫千夫百夫之長皆居前列有退衂者定以軍興法從事三日而拔謀諸將曰國家爲制城拔必屠是州生齒繁夥口數百萬悉魚肉之非大帝諭布延以曹彬不殺旨也其屈法生之發倉以賑餓人傳檄郴全道桂陽永衡武岡寶慶江西袁連皆下之幼主面縛公入覲賀始庭拜平章政事還移兵靖江破嚴關敗馬都統臨川陳張兩總管小溶江諭經略馬曁不下凡攻三十餘日而拔公以靖江遠中土非長沙匹民性驁􅅝易叛難服不重典刑之廣西它州不可言以綏徠其坑之市斬曁傳檄下柳鬱林橫邕廉象潯藤梧貴昭融賓宜賀化高容欽雷爲州二十廣東肇慶德慶特爲州三特磨農土貴南丹牧莫大秀皆請內屬乃牐全之湘水三十六所以通逓舟承制以萬戸史格行宣慰司靖江還潭宋餘孽益衞兩王改元海中㗖人以爵規復其舊全永諸州與潭屬縣之民文才喻周隆張虎羅飛之倫大或集衆數萬小方千數在在爲羣與江之北黄蘄相煽以動皆削平之僞將張世傑傳欲襲肇慶雷詔公討之且略地海外無爲賊巢過柳州嶺時暑軍士病渴所乘馬蹄地出泉人資沃飮至今名馬蹄泉而僞安撫趙與珞巳戍海南白沙港公航海五百里不崇朝而至擊與珞并獲僞使冉南國黃之紀皆磔之諭降瓊南寧萬安吉陽聞僞王陷南恩公還襲走之降方經略㑹衞王死崖山乃還復諭降八番以其酋龍文貌入覲置宣慰司從鎭南王伐交趾其君蹈海去得文毅昭國兩王以歸後二年入覲上都庭拜光祿大夫湖廣等處行中書省左丞相再月而疾勑尙醫四人診視求見登馬而劇歸卽與夫人訣當廿有三年丙戌五月廿五日薨上都享年六十塟都城西高梁河公元配特哩帝旣才公敕陳亳頴元帥郝謙女爲亞妃前卒敕復以其妹爲繼自陳三召傳至京師順聖皇后爲加幗服白金爲兩二千五百男六人特哩生故資善大夫湖廣行中書省左丞和斯哈雅長郝生正奉大夫湖廣行中書省參知政事虎符監兩淮軍格齊格繼郝生輔國上將省湖南道宣慰虎使符監潭州軍賜玉􅅁一品富華善如夫人者蕭生巴圖爾哈雅阿實克哈雅媵生圖嚕黙色哈雅女五人一適政嘉議大夫同知廣西道宣慰司事錫里薩巴一適承務郞大司農少􅀸僧嘉努一適中書省斷事官埓爾錦一適昭勇大將軍監平陽太原軍布延一適傳詔巴爾雅男孫三人碩被實哈雅圖圖哈雅和塔拉哈雅女孫六人一適郝某一適平章庫爾濟蘇子博囉一適監平陽太原軍子集賽餘幼後公薨十四年今正奉輔國以神道未碑出公凡受制書與御筆及公平生行實請燧曰徵是爲銘嗚呼兄弟爭與昭揚先德於其子職責巳塞矣嘗讀望諸君書善作者不必善成善始者不必善終未嘗不興􅁣歎於武敏開用兵端視南國爲奇貨思圖形丹靑􅂷譽竹帛於今日後者如取諸懷及襄陽下方戍淮西功巳不出乎巳大師南伐復分兵淮東渡江㨗聞一失聲而死豈先福始禍者誠如道家所忌邪而公鼓其孤軍留戍所餘不能倍萬名城通都身至力取利盡海表圖地籍民半宋疆理其時將相雖瞠後塵猶不可望公少見最所下州荆之南十四淮西四湖南九江之西二廣西二十有一廣東河南各四凡五十八自餘洞夷山獠荷氊被毳大主小酋棊錯輻裂連數千里受縻聽令者猶不與存其依日月之末光張雷霆之餘威以㑹其成功者亦一世之雄哉今列其由省幕戎麾與所受降登宰相者丞相二􅀩古岱阿理罕平章十二鄂囉齊呼圖克特穆爾阿里史格呂文煥特穆爾巴哈李庭李順張􅀪範劉國傑程鵬飛史弼右丞四索多元顔諾海閾出柔落也訥左丞四塔齊哈唐古特劉深趙修巳參政十三賈文備鄭也可何瑋張鼎樊揖朱國寶張榮實囊嘉特烏瑪喇博囉和塔拉高達馬應龍雲從龍都元帥宣慰使總管萬夫千夫之長又什伯是觀出其門衆多又足徴公善推勞人也初北上田租畆取三升戸調歲惟四兩及定湖廣稅法畆取三升盡除宋他名徵後征海南度不足於用始權宜抽戸調三之一佐軍時以爲虐今較江浙諸省槩增倍蓰獨西南頼以輕平其境館傳修潔亦甲他省生祠所在岳潭柳雷公安興安皆一而嚴關與全獨二銘曰疇曰江漢南北之限天裂幅􅊷可恃爲捍天混皇輿其險則那古以求之同軌不多秦漢茲降吳平於晉陳兼於隋矧趙遺􅅌曜靈生東有炎朱光爝火之微宜爾滅藏於皇大帝神武不世行所睿思效若􅀛筮由夫潛藩自將六師鵃䑠浮江亦旣越之歸正丹扆羣策明試加兵襄陽五稔克止公曰乘勝籍民授兵將以大臣南國用平帝曰俞哉惟爾協朕假爾以鉞誅彼干禁大師克鄂鼓行而東四萬其徒留後卑公公乃按圗吾與吾守待敵伺先孰與進取自鄂而岳自岳而荆長沙桂林皆劗以兵餘州數十雖定傳檄勢讋言綏心亦孔棘又鋤武庚子海之南左右皇子交州是戡疇知公勞大帝簡在衣裘禽集靡有遺賚不事故常墮其奎章㨗㨗翩翩龍騰鳳翔又錫金罍合樂而飮臣鄰之家寵未有甚猶若未然丞相是崇與太􅀓公同元元功甲子二終􅀇閭是宅壽止名垂晰晰竹帛北方諸流所王維河九里漸濡尚其餘波宜公有子匪相伊使不專美虞賞克延世其北居庸盧溝在西有碑斯豐流峙與齊臣劉鳯誥恭校
