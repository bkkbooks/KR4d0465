body:
  text: 提要臣等謹案牧庵集三十六卷元姚燧撰燧字端甫號牧庵河南人姚樞從子也人元無柳城當是據案元史稱樞為柳城其祖貫耳志狀之文著初以薦為秦王府文學後歷官至翰林學士承㫖集賢大學士諡曰文事迹具元史本傳燧雖受學於許衡而文章則過衡遼甚張養浩作是集序稱其才驅氣駕縱橫開闔紀律惟意如古徑將率巿人戰鼓行六合無敵不北柳貫作燧諡議稱其典册之雅奧詔令之深醇抉去浮靡一返古轍而銘志針誦雄偉光潔家傳人頌莫得而掩雖不免同時推奬之詞然宋濂撰元史稱其文閎肆該治豪而不宕剛而不厲舂容盛大有西漢風宋末弊習為之一變國初黃宗羲選明文其序亦云唐之韓柳宋之歐曾金之元好問元之虞集姚燧其文皆非有明一代作者所能及則皆異代論定其語如出一轍燧之文品亦可概見矣其集久佚不傳明文淵閣書目有牧庵集二十冊而諸家著録皆未之及劉昌輯中州文表所選燧詩較元文類僅多數首文則無出文類之外者昌跋稱牧庵集五十卷聞松江士人家有刻本南北奔走竟莫能致今所得乃録本多殘缺視刻本僅十之二黃宗羲序天一閣書目云嘗聞胡震亨有牧庵集後求之不得蓋巳久佚惟永樂大典所收頗夥校以劉致年譜中所載文目雖少十之二三而較之文類所選則多十之五六矣詩詞更多出諸家選本之外謹排比編次釐為三十六卷以存其概劉致年譜一卷亦附於後集中諸體皆工而碑志諸篇叙述詳贍尤多足補元史之闕又不僅以詞釆重焉牧庵集目録卷一祝册三首詔制二十八首卷二詔制二十六首卷三序十四首卷四序十一首卷五記四首卷六記八首卷七記五首卷八記七首十九記十首卷十廟碑四首卷十一廟碑三首卷十二廟碑四首卷十三神道碑三首卷十四神道碑三首卷十五神道碑二首卷十六神道碑四首卷十七神道碑五首卷十八神道碑四首卷十九神道碑三首卷二十神道碑四首卷二十一神道碑四首卷二十二神道碑三首卷二十三神道碑四首卷二十四神道碑五首卷二十五墳道碑三首神道碣四首卷二十六先德碑一首先德碣一首墓碣四首卷二十七阡表四首阡碣一首卷二十八墓志銘六首卷二十九墓志銘七首卷三十傳一首行狀一首卷三十一經義一首名字說三首題跋六首銘六首贊二首卷三十二賦一首五言古詩三十八首卷三十三七言古詩十九首卷三十四五言律詩四首五言排律詩一首七言律詩三十五首七言絶句四十八首卷三十五詩餘二十八首卷三十六詩餘十九首附録年譜
