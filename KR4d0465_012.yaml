body:
  text: 元姚燧撰廟碑報恩寺碑報恩寺者女僧妙德之所創也德金城韓氏子考諱誥任兵馬都元帥彰國軍節度使其先仕唐遼金大顯德適晉陽王氏王氏佩金符爲工正生三子而夫卒久之子娶婦各能自立德悉以王氏業歸之而繁峙之聶營元帥有別業昔以與德德將老于是旣而聞有語其考方國初用兵際搜討所愾于山因燬諸佛廬事德愴然深念父武臣爲國闢地之功雖大亦多斬刈焚盪之慘曩同氣百人今存者獨我吾婦于人而又寡子旣植王氏矣吾其事浮圖法庶得以資福韓宗乃削髪爲比邱尼卽聶營别業創殿像佛第建食堂㕑庫前翼三門後敞丈室而贍衆有田如千頃及山林園圃水磑等利號曰報恩寺仍以沙門某見開山住持見卽工正之弟而身別院以與尼居德翊運勳臣之後趣向孤夐名達于徽仁裕聖皇后召見命坐賜之僧衣而元貞璽書及皇太后敎兩下以麻衛其寺是年裕聖幸五臺德實從眷睞優渥及還駐華嚴嶺命今衞王阿穆格及親王妃主從官數百人以香幣至寺尋以寺爲衞王集禧所今德請紀其事于石余學周公孔子之道而于佛氏之書蓋未暇也夫未學其道而爲之言必將有戾德又女僧也而志得吾文余辭之爲宜然金城韓氏與吾先令公爲姻戚而元帥公奮迹戎行克振世業武而不殘風誼藹然其後當著顧無聞焉而德也出大室嬪貴族諸子有立乃割愛剷榮棲慕枯寂閔其父家中替求資福于浮圗而劬躬所事事集不居可慨也巳况其寺復爲國家集禧之所而歸美報上臣職攸在揆諸義不得終辭雖然寺名報恩將孰恩之報耶若曰生我者父母也食我者大君也謂覺皇氏闢大法門儲福利崇其像設冀收善果延洪聖壽于億萬年而宗支同茂覃及其幽明濟度而有獲斯酬其志亦足書巳遂次第其顚末而系之以銘文曰偉韓鼻祖穆于周武奕奕梁山變雅用取于後裔孫國以姓之不侯而民何千萬斯其千萬斯中絕不後漠乎無聞安所爲究嗟維德君生侯富驕移大盛門諸子翹翹三十而嫠介操勤志悼其考澤遽斬一世祝髪而僧曰韓吾承卽其考田佛宇肇興期以報德昊天罔極迹是爲孝展婦之特且虞吾身而不永年僧子以孫斯宇賴傳俾爾歸離奉嘗宅相是其爲言聞者惻愴我則譬之天與人殊嗟今諸韓胥彼桂如自根而幹而柯而葉爲葉茂繁何啻千億其間豈無一蘀先零夫亦何害貫古青青在人視之侯之家索自天者視猶一隕蘀西銘有言民吾同胞矧爾同姓四海滔滔反覆始終理亦昭晰覺皇貞之韓氏未絶希眞先生祠碑王氏自其大父義年四十生棄其父定定四十一亦生棄君與君凡再世爲男官始李冲虛居丹陽菴後以奉金主元辰京官朝朔望祝釐隘陋縣官易殿廡爲雄麗賜額丹陽觀君年十七從冲虚學者十九年師卒初卽汴藁藏後遷之其鄉德興龍陽觀塋居三年還汴再居丹陽觀汴人敬之如見其師四方賢士大夫假館其廬無有虛月雖其徒厭譏不卹也視其尤寒窘者或質衣爲具歸之其施如此其入也殊有擇初汴受兵有富人將逃亂藏金二穴去後數年來訪張人觀聽卽詐喪服若發埋骨者兆緒將見謾謂役夫可市取祭物僅探得一穴恐禍巳不暇及其餘也約公取之而歸我其半指藏所去去而其主死竟君死未嘗語人無有知其處者與之期事雖風雨寒暑未嘗爽言于孺子問以前朝勳戚大家事其言亹亹能傾究其隆赫衰摧之由聽者忘倦皆可筆之野史亦知爲詩精于賞識裝褫書畫蓋與其師及從翰苑諸公遊故聞見獨不囿于道流之狹也年八十五至元十三年十二月十三日無疾而終前終二年爲塋曹門外表之以碑凡夙與其師相友與非其師之友嘗名價重一時者皆具棺衾移葬其中又各傳其鄉里世次年壽爲誌以別墓至是其同門友王道祐及其弟子張某者葬之新塋從顧言也後七年族姪埭自汴至長安無他營求惟誦君夙昔之賢曰是埭所善也且其爲人亦公所詳宜銘其祠燧曰王君賢也王君方外人無形勢可藉以動人子徒以故舊而不忘之爲計其久遠子亦賢也君諱道淸字正之河中臨晉人賜號希眞純素大師銘曰謂爲不壽耶年幾九十而人誰與夷謂爲壽也耶享止其身而後者嗟誰由尊其所聞而不疑行之曰君所安我又何悲哉噫從享其師表祠有碑平昔之善載筆于斯尚俾來者可考而知資善大夫中書左丞贈銀青榮祿大夫平章政事諡武愍公李公家廟碑燧嘗觀人臣私廟之祭易乎古而難于今三代不論也漢之時功臣侯者土地人民傳及子孫故嗣侯得以致隆數于其祖考世世無有所殺後封功臣皆虛邑無有土地人民子孫或官卑力微往往不能爲廟記曰父爲大夫子爲士葬以大夫祭以士祭旣用生者之祿勢有必不能致隆者姑借先宋氏言之如文潞公作廟洛西其先未嘗將相顧受祭將相潞國嘗將相者其子及甫惟得祭以大夫祿是于不爲將相者致隆其眞爲將相者復加殺也如斯者幾何人哉惟吕正獻惠穆于文靖范忠宣恭獻于文正世其將相者史册二百年間纔一二見事亦曠世希有者也然自中元以來漢人父子繼相者故丞相史忠武公與今資善大夫中書左丞贈銀靑榮祿大夫平章政事諡武愍公二家重輝襲芳震耀一時豈獨爲之子者信敬于昭昭厥考亦足以慰靈于冥冥矣惟李氏家隴西成紀者實秦將信諸孫漢至六朝門閥甚峻惟與崔盧鄭世姻不連他族唐季王西夏甚盛彊雖宋金嘗加兵終莫能服我太祖始平之其宗有守某某城者獨戰死不下子惟忠尚少求從父死爲今分士淄州諸侯王所得于公爲考後以金符監淄州有子十三人公次居四王妃愛其頴異嘗子之在先朝故事凡諸侯王各以其府一官入參决尚書事公代其兄爲之李璮爲逆有迹淄州君獨從公馳聞璮繫闔門獄中璮誅得出上盡賜償所亡失授公淄萊路奥魯總管後改宣威將軍益都淄萊路新軍萬戸與城夾寨圍吕文煥襄陽四年而下之加明威將軍虎符丞相布延南征宋兵戍郢十萬城西郢鎻戰艦絶隘爲陣我舟不可越乃渠黃灣拖舟泛藤湖以出唐港棄郢去留公後拒敗其追兵行拔新城沙洋下復破夏貴陽邏口下鄂漢陽從故丞相阿里公時以左丞戰荆口禽高世傑下岳進沅沙市下荆南傳檄歸峽辰沅靖澧常德諸州皆下之又徙鎭常德左丞狥地湖南丞相兵及淛西以地遠援踈詔公與宋都統張茂實呂師䕫闢都元帥府江右公爲左副都元帥破劉槃軍下隆興擒熊飛建昌撫瑞吉贑與廣閩諸州皆下會宋幼主出降其將相陳宜中張世傑挾益王昰衞王昺浮海趨福立益王元以景炎閩廣諸州應者十五郡縣豪傑亦爭起兵公出定反地大破吳浚軍十萬南豐浚走如張文虎復合兵十萬又破之兜港伏尸三十里浚走合其相文天祥瑞金又大破之天祥走據汀别將孔遵窮追併破趙孟瀯軍復其州而還龍興守帥覬利鉅室罪以陰與賊連己誅夷百三十家公還白其非辜出其未盡誅者獄中帥府改宣慰司加昭勇大將軍同知江西宣慰司事尋加鎭國上將軍福建宣慰使又改江西宣慰使天祥復陷汀州收兵出興國又擊走之追四百里及之空坑散降其衆二十餘萬禽趙時賞以下文武將吏數百人拜參知政事行中書省江西益王殂廟以端宗世傑復立衞王元以祥興移柵海中崖山近去廣治四百里授蒙古漢軍都元帥經略廣東進復梅循英德與廣之淸遠走王道夫擊凌震海上獲船三百艘禽將吏宋邁以下二百人又破其餘軍茭塘江淮省亦遣都元帥張宏範至自彰與共圍崖山勢計窮蹙度不能國資政陸秀夫抱衞王蹈海死獲其金璽其將吏死焚溺者十萬餘人翟國秀凌震皆降世傑遁去風壞舟死海陵港南海平朝京師上勞苦之賜宴其將佐之有功陞者千授資善大夫中書左丞移省荆湖凡虜民男女奴鬻之者皆罪而正之常德辰澧沅靖五州大荒民至易子以糴爲發廩賑之所活爲口亡慮十萬計征占城詔使給糧仗造舟海南取得其宜黎儋之民勸趨之疾還詔從皇子鎭南王征交趾敗其兵天長府其王遂舉國航海將舟師追之敗諸洋中獲海艦三百始公策城天長儲穀待賊敓衆議不果盛夏軍士疾作漲潦冒營遽議旋軍賊躡敗吾後拒王以公殿賊閉永平關傅藥弩矢射公貫膝負瘡敓關出竟以毒發薨思明州年止五十最其平生小大百戰下城邑百有五十爲戸三百萬嗚呼其亦勤巳後薨七年而贈官賜諡封公之命始下玉音仁煦恩重書棺人臣獲此哀榮極矣公雖不可作巳安知其不骨肉九原耶公諱恒字德卿自號長白篤孝純至淄州君卒方擊兩王閩廣淄州君顧言我死必無訃吾兒使㑹喪縱敵南海平始克銜哀摧動屢絶且薨謂所從曰爲我語晜弟妻子吾不得以時喪先公旣抱恨以終天今復棄養太夫人而身先朝露于是遐夷吾目不瞑下泉矣其謹事之夫人王氏視分土諸侯王之妃姑也訃至夫人秘不敢聞之姑惟發哀私室公則再見夢太夫人曰兒今死戰日南矣太夫人泣言吾再夢如是豈誠然耶夫人始情告曰婦恐無以安吾姑氏心也覆是久矣始位哭服喪嗚呼死而精魄猶惓惓其親可哀也已可哀也巳子二人世安以監廣州從朝京師授新軍萬戸同知江西宣慰司事再嗣公益都淄萊本軍萬戸後以正議大夫仍將本軍僉江西行中書省事再陞中奉大夫叅知政事行尚書省江西尙書省罷今以上官叅知政事行中書省仍江西嗚呼六官而三踐公武巳可見其才之無羞子職者自其旣相亦解兵其弟世雄以宣武將軍將之乃作河洪之詩使歌以祀公其辭曰李氏之在與水細大河洪姑臧有夏而王越三百年傳厯旣長極崇而墮亦天之道日月作矣衆星匿曜王孫始卑徂東自西淄水幽幽束楚之流曰位不豐猶監一州有蟊吾民有梟吾土吾力不能天子肆汝從父奔告帝嘉乃心寖向用公廼涉潛沉泱泱漢水南紀所恃乃地襄陽金湯陛陛公將萬夫長圍四禩而竟下之岷江失藩沿流列城振落摧乾至莫難一文軌判裂萬里收功九重授策維是武庚狂志復殷爵人號年大蠢甌閩終兄弟及公膺奮擊與鬬四年崖山翦克血其䲔鯢南海無波廏馬笥衣其賚如何帝曰汝烈宜置左相授兵而子西䕶湖廣公拜稽首天子萬年帝德聖神臣何力焉湖廣聽命壤三千里隂翕陽施賞刑自巳及兵占城轉粟黎儋歸佐皇子致討日南不測風洋冒履而三由淄而漢由江而海其涉日深蜚聲日大蕞爾南夷曰尺箠笞狃勝者衆輕于出危賊策我師不能炎暑雕弓緜緜犀甲敗雨避來弗迎邀歸以爭旣奔先編左廣亦傾孰作士氣公殿奮武斬輻短兵援枹鼓鼓格鬬比死冠纓不顚裹轊馬革踐迹文淵維昔禡時皂纛有翩廼今旋歸粉篆丹旃兆寢悠悠魂魄遼遠致身移忠惟孝其本黼扆思之錄其庸勞寵幽上公可謂曰遭公亡不亡公有良子亦秉國鈞實法實似有嚴作廟籩簋維時神容與耶去此奚之維淄維漢維江維海其流或枯廟主斯毁何以麗牲樂石峨峨太史詩之以侑以歌袁氏先廟碑嘗謂天下之人光顯其家者由二道焉一則曰積德有漸二則曰成功有會之二者不相資以始則相須以終如升也有階而搆也有基開也有門而來也有塗無有無所乘依而徑得者且千金之子將運千金之資猶不輕以相卑必擇善賈可付而後授況造物者儲靈奇之氣賦經綸之才假光濟之具俾佐興太平之業非求夫修仁潔行善爲燾後之謀沒身百年窮躓不變未享其報者之家他子孫孰克當此哉蓋袁氏由高王父而下皆以諸生學修于其躬道行于其家化及于其鄕不吏祿而本富于田者四世一轍而公受之始克大施于今嗚呼積德之難也如此夫而成功之難也又如此夫高王父諱亨曽王父諱廸王父諱企京父諱鐸公諱湘字潤夫位至延安路兵馬都總管其功烈之備年壽之至子孫之麗燧巳最而叙之墓碑其可以屢書者今申言之曰方天之訖金命也提王公佐一節度之師來歸吾元㧞之鋒鏑之下而臥之衽席之上脫民兵死狥地鄜延拓境千里凡負險羣聚資人爲糧者莫不投甲相率而至去民盜死治延之初假之種牛而授以耒耜免民飢死自燕市藥負以百十馬牛卽城爲樓居之致醫司掌爲劑其間有以疾來者視所宜藥與餌不求贏利去民疫死至今州民戴白者道舊相語猶泫然指城樓謂曰吾司命也昔漢朱邑爲桐鄉嗇夫其惠止于未嘗笞辱人且死其子曰後世子孫奉嘗我不如桐鄕民必葬我桐鄕自今觀之一鄕之政非有夫千里之治也嗇夫之貴非有夫通侯之位也不笞辱人未嘗日拯民于死也奉嘗者民而非歆其子也然魂魄猶徘徊戀嫪不忘其土無惑乎公遂爲明神以禍福斯民歲時妥靈享黍稷之馨于其孝子之手也廟在今延安屬縣膚施之東川去府治十里外袁氏別墅取延民之助祭之來之易也其年至元十九年其歲庚午其子昭勇大將軍克忠其存今者兮匪孫伊子生者逃亂兮奔公爲依死者白骨兮魂魄公歸矧公後兮鼎昌子奉嘗兮孫尸華衣兮綷䌨金章兮玉帶總總兮林林來廟庭兮覲拜歌鐘兮舞鼓蘭烝兮桂糈舍登數兮備儀公飽德兮焉所公何爲兮睨顰曰哀繭絲兮日窶吾民曩者五袴之家兮或今也無襦吾又何心兮獨樂乎余身公子孫兮聞聳羣民子孫兮感而繼泣謂公逝兮幾年猶闚有無兮于余一室公明神兮若兹苟有善兮將知我祖父兮且母公欺我子孫兮可公鬼飢子越兮父令婦齟齬兮夫命俗斁兮紊帶公不刃誅兮猶殺之以病稼我田兮蠶吾桑糗我腹兮完我衣裳輸賦孔時兮無後倉箱無重俾公兮一日增傷臣蔡共武恭校
