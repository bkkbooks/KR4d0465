body:
  text: 元姚燧撰賦烏木杖賦去年史仲威得烏木杖大徑尺高可過顙嘗析一杖遺余許為賦報之其秋仲威疾歷三時未勿藥也今年余生朝使人肩木之半相壽且促曰吾疾於以嬰綿者豈思不償賦致耶不佞誠得一誦其辭或可釋杖而起矣余勤其言而賦曰或曰炎海之山珍木産焉金為之聲石與其堅魋結伐荷投諸瀧淵依居蛟蜃潄沫濡坎歲月俟之化而為元要出人為非得自天此島夷假以售利於中土之微權也抑齊聞而笑之曰昔賈鬻鞭梔蠟其膚市者一濯已呈蒼枯胥是黝材裏表一如從可占知乃受形其本初者也胡子以由彼而然乎今夫中山之山有衆其植斧取觀之內各異色樟作稠文杜棗栵赤檀柏柘黃蒲檭棫白與爾萬里遐裔絶域瀘嶲杉紫儋黎沉褐罽賓雞舌相半白黑一隅斯舉三可反賾兹度品之爛爛果熟漚以何澤况於兩間滋雨噓風敷土華耀為白為紅深淺濃淡萬不齊同令人感之欣心悅瞳問誰為之能然皆著妙於化工夫其見諸柯葉之外者如此又何惑理質於其中哉且水火之赤黑不一其色者雖童子猶能知之至語其相賊而為用有戴白之老所未思維男丁與婦壬實雄黑而赤雌始若離而難馭終為夫之所移今其色之幽幽乃昔赤之由基是何資於遠譬只煬竈亦可窺彼炎赩而烈者焰也其煙液為煤必黔而緇因以曉夫巧繒之棄鉛朱亦懼夫既久漫漶而為黟又以信道書坎盛之侵離也不然南服之洲祝融之宅也歊金石而焦流蓋火熾之己極非盛其水以滅之則物將不能以生活故伊人之睟面不渥赭而深黑亦火色索藏惟獨見夫水而己矣其木理之如漆者又何惑乎哉史鰌之孫其畏可象析而杖之奔走相餉輟矛廬於猛士配几屨於席上試扶衰以起策觸爪甲而鏗響思卷鐵而含簧陋柳侯之為匠必求同於所異才黑蛇之佛倣噫物之變化不可期兮猶足以乘雷而騰往也五言古詩寄王憲使立夫庭樹生秋風炎熾奪如失小蟲鳴喓喓高隼飛鴥鴥緬懷素心人若髮未忘櫛百年能幾見過眼徂電疾而君有官事出言千里律何暇喜蛩音情與逃空一昨因趙卿至戒遣書新述篇軸不害多無憚費紙筆且約來北州樽酒留十曰晴天逼佳夕共看華月出非不思餘論門無一親即吾私如汲車己脫復縈繘晚菘生待種早稻行可銍少須黃花發秋風亦蕭瑟倒冠獨山巔茲遊或能必次韻閻子濟二首我友宋僉憲頗聞思湘中每云所遇奇未易言説窮崇蘭春風花巖桂秋露叢三年一官內身在香國東朝航汨羅波翻動海日紅暮揖嶽麓寺蒼煙樓觀窿喧喧名都邑百貨聚商工何時訪君遊盡歷西南雄霜水收風濤江船穩歸路惟應江間月照汝來往屢長沙隔南雲尚飽艱險趣天涯念棊錯睽闊皆舊故新知苟會心何必歡有素黃鍾未懸業衆目齊瓦釜大音故希聲欲説難至戶况我言毛輶誰復聽其句所恃君盛年學仕猶未暮丈夫重道義自足輕外騖觀今紛華儔愠喜隨一芧願終藏山書榮於鹿鳴賦寄徐中丞容齋李侯安慶來遭君江間柂問云歸湍水示聲偶及我自揆衰鈍質舊學日兼墮百事於大賢資取無一頗始疑逄蒙弓亦有虛發笴終知匠石斧材不捐瑣瑣增慚失喜餘背覺芒刺荷平生聲相接睟面見未可文字親友間屢得觀藻火况聞間世故盤走夜光顆仰止高山思願並餘子夥歷推天日行蟻右風輪左吾徒不相值其故正此坐何時廣陵遊傾蓋願終果寄嶽教吳忠畝我友右轄公人物愼臧否獨于甌閩士推心一忠畝勝國己太博椽筆入其手用之敵干將可斷姦窳首一軌名始北上徹宸纊黈蒲車嘗及門竟以疾自守不使橋門觀執醬餽黃耉余聞敢藐藐日月藏心久秋風歸天嶽往綰州學綬堆盤青青橘求薦傾蓋酒何人天壤間亦有牛馬走問知為高賢重壓邱山負行年滿卦數不見顔如叟翻比少九齡衰悴先蒲柳只看形諸外已卜內所有如何辭萬鍾反就祿升斗無乃仁人心終始一善誘非有金鏞德安應小大叩且溫石轄語通誦或盈口因知人有媒言出隨好莠豈但資娶妻亦賴用擇友不期一日中三接杖履後甚欲進所業一嘗恐輒嘔至今貧賈肆深櫝千金帚溮泉聞素心亦誤見私厚諷讀卷阿篇明璣照軒牖其稱媚天子例必登拜受鄙言何足道魚目辱兼取敢不先木桃旋期報瓊玖挽孟商州元亨六里商於山而子往倅之人嘗隘其邑霜蹄局權奇所欣多曠暇得以放瓊辭城闉四晧墳下有餘紫芝長吟薄采采薦以松醪巵娛樂豈不仙久此壽奚疑如何奪善地調降華判卑方聞有力儔揚譽於雲逵佳城鬱長夜白日見無期因傷先待制抱業既未施積燾宜及躬年位亦如斯覽古事每爾為昌來者基秦藩官聯曹生別且長思雖余後聞訃宿草寧不悲春水清漣漪營魄今何為挽甥壻趙啇來扣門袖出史侯書開緘倏惻愴知汝巳元閭是侯太尉子兩嘗妹壻余汝視則婦翁見訃語豈虛有疑讀反覆不見日月初汝昔似猶子嗣業文貞餘文貞今留侯乏世埋可噓吾甥顔蕣豔令譽由閨居及婦劉氏門帨紛結華裾其姑况難事厲色歲一舒前年一子生在亡未知渠兹焉抱􅑏嫠茹苦何日除南州穰侯國臨湍上高墟東望酹一腸老淚血漣如呼魂逺致否己矣何言歟京師病中六首埏土以為杯小大不異形尺箠以叩之千百不同聲耳去目能幾同異乃爾爭二物於吾身受形與俱生云何一易地聞見皆聾盲况於六合間擾擾羣黎行妍醜既殊狀賢德豈齊情區區出門交心曲安可明膴仕初足華終竟外侮攖人云禦之策惟有安歸耕古人不若意得酒以自歡而我不能飮安敵憂患千臥病兩月周曰夜防痺殘神州桂玉地富室居猶難三千里外身驅率就一官吹灰終不然豈但枳棘寒囊空到稱假豈能久盤桓又顧穰城家新立四壁單小兒雖善步神骨尚未完吾家三族中慰意獨此看思之腸九回何以生羽翰少年厭治生但慕官爵好騎馬雜高蓋奔走長安道雖有良田園廢沒但蕪草及為荆楚憲盡室辭豐鎬登山復涉水往費尤浩浩黃金火銷氷質賣無一保豈無升斗入喪失嶽山倒滄海去悠悠白曰行杲杲朱顔先憔悴素髮亂蓬葆今年四十九知非殊不早稔嚼世味薄滿口木膚稿人云豐城後接武瀛州島安知走朱門惟去是求禱朝允暮載途南土甘投老買宅亦巳得求田不多寶此邦衣食易宜稻及桑棗時節勞農苦對酒槃一考與汝車上妻從人喚翁媪束髮慕元理佩服三皇篇千周粲可覩不受天老傳得此西南朋飛龍亦潛淵神哉中夜氣使我沉疴痊如何負道德亹亹區中緣逝將脫塵鞅庶永桑榆年寒風振虛幌蘭膏淡無姿披衣復撫枕傾耳候晨雞夙昔不成夢憮然嗟吾衰盛年苟無聞光景忽若馳欲為流水吟朱絃為誰揮恥從季主卜將與陵陽期古來方術士越人與長桑採芝鍊五石繫肘皆神方伊余抱微病湯液己遍嘗斯人不可見反側心煩傷倐悟養生理靜極神明康致物以却老嗤此竟渺茫平章廉公挽章嗚呼平章公懿質天所性氣鍾三光粹量包九澤淨加以資學問寸晷如與競不有斯人徒孰佐天子聖山立當軒陛侃侃言議正搜賢及耕釣巖藪沾幣聘十年泰階平四海弓不檠奇才管蕭匹餘子非季孟事隨乃來毁輦轂奉朝請名園平泉比花石不可姓門前施行馬外物軒冕盛相過盡詞伯聞至倒履迎淸風佳月夕劇談雜腸咏絶口溫室樹肯干蘭省政屢典千金裘好客遠慕鄭焉知靈臺上憂世常炳炳天下尚可為惜哉司馬病何期龍蛇歲壽僅滿知命憶昨訃下初遠近聲淚併胡夭陋巷仁反福東陵橫巫陽不可作百載生不更豈其黔嬴遊默運元化柄其栖景星鳳出為斯世慶將遂為神明山川主雩禜蒼蒼高在上此理幽莫鏡優孟效叔敖猶足楚人敬况公自有子育德宜爾令不見提刑君氣岸殊豪徑秋風鷹隼厲肝膽裂梟獍他日霜瀾平勳業未可竟一門周司徒竹帛看輝映時苗留犢圖君子中庸貴不專行怪高嘗讀稗官書抵掌嗤時苗生犢當去縣還汝故主牢得妾以其子宜往何所留理在不可推如瑟柱傅膠畫師斷章耳意取警貪叨貌為盈尺軸丹青爛生綃二十餘七人妍醜兼耆髦目既殊盼睞手亦異持操或戴爐炷香或捧巵薦醪或擁板伏揖或撫手逍遙或結領佇思或左顧有求或岸巾爪額或拳拱僂腰或賞彈指嗟或戚反袂號或向緇黃列致辭前不休或含春風姿鬢髮雲為翹仍携兩童女芳年未蘭苕婆娑輟緝麻倚巾顔弗妖或荷槖鞭犢或弛擔挾輈可傷轅下牸滿脰黃鍾牟忍割舐子愛如彪念楊修凡此舉隅耳曲折態豈周名不著為誰代可必前朝位置內供奉無乃王雲曹憶與三害圖高下不相超所恨百里侯骨相尋常流不見操介介盎睟容昭昭以是方古作如武美簫韶余評法魯史功罪不少饒詩拾畫記唾僵走追韓豪已架屋下屋他日從人嘲萑葦嘆瀕江不可禾歲惟蒹葦茁靑林無端倪永與江水匹由為薪蒸恃責以租賦出園人誠貪夫苞苴黃金鎰暮夜鑽權幸入牒妻子質輸課或未償沒之良不恤他家豈辦為得者皆富室秋風霜霰落百穀時巳實處處傭千夫豚酒健刀銍稛載向城市官外私羡溢遺滯狼籍陳入者必見叱或因取束藴隨以盜米律春風將新萌剪伐未十七下策付一炬災火赤天日坐視煨燼空不丐民貧疾因推是為心可見無仁術周官行虞禁為法未爾密亦巳開市源千年誰能窒舟中落梅折梅天門山含白未舒蕚東風登艫去一笑破孤酌嗟汝如佳人賦命所向薄縱拔榛菅蒙還持媚篷篛方彝縮頸脰借潤江一勺固泛水月奇復避霜雪虐曉芳惟衣襲夜影燈與約相擕千里行十日春有腳開敷既爛漫理亦宜飄落正愁鄰檣姝橫玉裂纖搦遙應故山樹縞袂巳寂寞紛然委泥塵無此藉茵幕却有和羮須旁求到巖壑幸否相倚伏世事安可度益感先民言貴賤隨所託書懷二首南州仲冬月天氣如春暄旅貧無衣褐差便卒歲溫矧又稻麥價倍蓰賤都門不待付千錢翠濤瀲盈樽瀏瀏水泮氷舉網鱨鯉繁蔬茹不鹽酢旋擷靑靑園謀腹易為飽足頥道義尊地偏席門外時有駐高軒華簪惠秀句欣賞難具言巳可慰離索適我從弟晜五馬近守裕思往三日暾考槃在兹陸吾駕無回轅麴生素狂士濡首相禍賊誓言遠絶之麴生慍見色前陳君處世簪笏巳雞肋貧賤交態薄獨我時在側既通知舊好亦健文章力衰顔借渥丹愁壘助攻墨論功猶小小况有此大德君看無何鄉與彼華胥國百年忘彭夭萬事齊失得是邦去人間奚翅路千億非我導之往君安有羽翼不知何所負而乃見猜愎君誠中道棄豈無他人迹聞之始自曲前語吾其食願終平生歡相對怡朝夕送朱教授野翁赴都下江東窮秋月風露已淒淸候蟲息沸響朔鴻喧哀鳴壯哉騶人子裹糧事北行都門于兹時飛雪九衢平市求一狐腋委擲黃金輕廣文先冷官未愁與寒爭况恃身上衣手線留縱橫不須更挾纊襲可春暉生但愁觀國光牛後羞羣英長安足故舊朱輪照華纓搜才佐昭代不遺一藝名譬彼求王人路無棄連城夙料身未至薦剡有飛聲藉此一簣基旋觀臺九成相摯或見問為言親𫾣搒晨夕几間書促促衡石程無庸移文至始反北山耕題姚嗣輝南榿堂彼榿有土性生植惟峨岷欒欒千雲姿才與樗散鄰匠石過不睨焬夫取蒸薪所貴故山樹寧計世莫珍一別十畝陰淸溪俄幾春華名堂楣上如對故鄉親請事小辨詩桑梓亦惟寅盛德古自卑木惡何關人不見樗里疾智囊終相秦君才負棟柱未許溝斷均無以榿自期上孤明堂晨送梁貢父尚書使安南詩并引貢父吏部交豫最密以年偶先嘗兄之較其逸足絶塵豫輩皆瞪目乎後者今使絶域賦長韻以送之茫茫今皇輿歷古疆理褊溟海無洪波喬嶽失絶巘萬方爭率職象胥不能件如何南交宅琛貢走籓衍中塗俄負固至爾勞師遣崛強尚與爭為識無巳淺聖量終含宏恐彼宗社殄前迷許新之未忍再禽獮親閲庭臣中誰可銜命選曰汝吏書曹是境嘗入踐更往喻斯旨首鼠疑必免君聞拜奉詔臣技等鷹犬惟所縱使之綿力猶思勉仍命百僚右相率華飮餞鞭馬辭神州遭我乎漢沔鼓榜壯于役未暇兒女泫似聞陳王氏學以究墳典文物知慕華舉俗巳丕變因失事大禮無媒自求戩君至敷利害亹亹專對善正如沉疾人發藥得和扁必感丹扆衷偕來覲旒冕白雉隨以入黃屋亦席卷何減陸大中儒生服鄒兗璽書入南越坐屈尉他辨但乏槖中裝歸路千金輦功成貌麟閣竹帛日星顯多少前使儔垂頭視人􅌤雲東樓君家雲東樓未暢昔所題問言雲之東下有吾東溪翩翩多諸黃玉槊華簪齊無因我其舍屢容躡丹梯于時十月半風雨號雙凄八荒同一雲豈辨東所倪平生未至地愈望溪愈迷但愛樓中兒鴻序參差低大兒行酒腸小兒盤栗齎婉孌膚玉雪嶢嶢頭插犀門楣巳可占奚由墜塗泥且歡盡今夕明日當分携歸舟何所逐泛泛並鳬鷖雲東樓中牀竹裏雙鴉啼雲東樓下花移芳滿城畦兩皆思君物凝望雲東悽每壯尚意氣門馬常滿蹄誦我雲東詩回首還雲西田氏樂門堂憂樂惟聖人萬古無小蔽所樂乃樂天其憂在憂世不悖可並行譬彼巫醫藝巫云疾當死無日中野瘞為子猶拜醫懇悃求投劑巫者由命言醫則以義制萬事天人雜略不相鑿枘後人昧樂天顧託門永誓揆道良不可忘君自為計一塗或庶幾奔競差可礪田侯非楚産今卜宅三澨良駟滿千蹄連阡禾稻翳考槃願止此暇食誰之惠豈惟憂世忘其樂亦已細南風墮華教堂扁託書隸巳有雪崖筆妍壯安敢儷翻思漢諸田實出重華裔吾姚源媯汭循本皆同系平生未傾蓋深言應速戾要為兄弟警愼莫輕裂眥作詩至元年十月戊子歲題肖齋覆瓿藁至元戊子十月上浣余啜茗肖齋偶見覆瓿藁漫不知何人之詩質諸夢卿始得為渠作持下帙歸再日反復究觀古意踈暢洞達近體淸拔奇警有作者風實足起余為次首章嶽祠韻以見推服之私其詞曰將種張用道六籍窮軻邱矧於前人光克對實無羞淸名海嶽著亷潔冰露修惜也蘊未伸封猶千戶侯興移登石廪萬象供冥搜東睞扶桑波北瞰洞庭流一杯英皇弔為洗蒼梧憂重華老南征其故難詢諏復思靈均降攝提貞孟陬真堪書咄咄已矣賦休休至元辛卯再過吳城王祠師雲谷示東坡所藏石砮留詩贈之别來四周星尚爾雙鬢緑且矜氣彌厲能新火餘屋因知道氣深舉嬴當時屈我髮已霜草衰薄不禁沐豈但形容然志亦忘石鏃今年雨何甚湖漲冬未伏白浪如銀山行舟避騰蹙倚欄乘雲閣聊以寓歸目非君誰能來寬此冰炭腹夕隹亭甲午冬十月洪都雨潺潺三旬乃一霽羈思忽若刪驅馬柴君居突兀拔市闤炎州淸霜晚林葉恰半殷已有朱茶花照耀菊斑斑亭依湖東岸坐對江西山西山兩舍外如立步軔間鮮鮮沐濯餘翠葆萬煙鬟夕陽借隹景盡發天所慳只知柴桑翁芳躅人無攀焉知此凝睇亦與飛鳥還主人退自公時得兼爾間明朝駕君去依稀動心顔吳君淡軒以大德甲辰冬自潭移録道教於洪示內相踈齋前為潭憲日贈別之什燧賦跋之誤書淡軒為鶴臞亦道流善詩者還之欲余改書以無暇並前書失之而來求數數不置為別賦此詩仙石崖殞繼作惟淡軒嘗示余三藁披閲再朝昏盡卷長太息造語淸而敦豈於三百萹口吟瓶水翻非然學猶龍寄身道紀尊理洞萬物母氣完中夜存所以兼儒能由心徵其原洪都一傾蓋以受儀茶溫旋出踈齋叟湘東贈行言寶唾楚臣拾結貽皆荃蓀既為大夫譽月旦窮疵論因羡靈奇賦偏爾鍾斯門間間隔神州聯璧難弟晜何時聚伯仲貫如吹篪塤當今載賡輩噤舌無庸捫題趙平江令淸溪昔我行簡地生齒經戰伐蕭條煙火稀路紆豺虎窟是時霜天後黃葉隕林樾彌望皆靑山巖岫高兀兀下有淸溪流未審何源發濺濺寒碧流爽欲徹毛骨朝漱巫峽雲夜泛峨眉月主人已避地何所猶奔突安知即今君膴仕方吳越且恐淸溪名寂寂人不曰身縱不果歸取名自表揭而我豈善文詠詩慙求謁知君桑梓志未忘西車軏何時真脂韋一弔故城闕還訪淸溪水獨喜存不沒但慮彼淪漪反不識華髮開樽磐石上坐嘯遺簪笏莫使猿鶴儔相嗔涴塵襪落照落照在東壁倒影西墻紅我身恍自失如坐虹霓中問誰為此幻無乃由天公故出新巧奇欲試詩律工彼哉誠善戲拙技恐易窮斯須忽變滅寒雲翳蒼穹右丞索賦復有此作南地秋冬際五月無雲陰上帝遣心膂用汝作傅霖新苗飽新澤布地勝布金吾民未乘高示爾風雲侵世事祗如此憂樂長相尋皇天老眼在一如父母臨人心惟順受天意良自斟助爾耕懇力實我豐穰心無非聖所感共戴君恩深和溮泉二詩老成稀何如月出數螢爝一粲見典型誠想優孟謔三年東吳走敬望縫掖綽歸塗得夫夫欲灌四鄰瀹餘事乃文字噓動如槖籥愈出愈益奇險韻安足縛又凛如干將脫鞘爛霜鍔勿云乏鏤冰滅迹郢斤堊問渠筆何力砥柱幹不弱可方騶雕龍不下韓逐鰐僕僕雖亟拜未酬嘉意酢由兹一饜飫噎噦屠門嚼自許宜何施庶幾晨門柝遽以安石輩月旦無太錯視君千仞鳳巧弋避繒􅗤何時鳴朝陽免聒鵂鶹虐壽人百年耳過眼奔電灼難聚真摶沙易散劇飄蘀相逢一觴詠豈不賢棊博由淵爾何人願學言志各草木凡根荄託土乃恆性獨暢弔蘭生無藉地氣應懸叢危簷上朽索以為命青青雖弱質不挫霜雪徑敷花况妍好妝陋桃李靚依依光風泛皓皓華月映香疑非人間恍若來空迥詩老杖其下淸芬誰汝競兒女奚自攀安辱寶叉並但愁姑射仙綽約玉顔頸一朝乘龍過袖去逐無徑我來昌邑山豪欲分廟令必云付環珓與奪神所柄不如且止之俟旋滄江艇殷勤先杯酒隨以奇貨聘歸詑石城人管且化工盛楊補之墨梅原注肖齋家藏古之賢達士名託技以傳由來含毫人不及縑楮年雖求異世知存一遺百千偉也淸富君緑髮金印懸脫落貴介習博雅嗜奇偏巨唐鄴侯架寶晉滄江船墨梅取無咎軸首珠犀填使有透絹詩詎讓花光前虛堂淸風夕斂襟泛爐煙對此冰雪姿若失炎燠然令人起幽思杖履西湖泉武昌寄劉時中思君誦君詩賢於對君顔昔也坐我側守口如閉關今兹言盡懷翻宜隔湖山文章靈奇氣賦與天所慳古人遊巳遙古風力孤攀及肩曹劉壘窺奧長信班不取為貧仕傷和霣清潸仲尼且委吏重耳嘗險艱丈夫無不為大弨況能彎入手無眼箭安識雍容蠻歸來弄緑綺九霄鳴佩環挾是文武資未憂身恫􅘃大路橫至寶誰不收裹還報章因南鴻滅影秋色間轉令感白髮羈思無由刪過開先寺天人喜遊戲試劍當層巒截落萬丈崖瀉出千丈湍隱如白瓊瑤蘊此靑琅玕仰睞轉飛動有物相控摶散空摩尼珠受以頗黎盤龍公日夜汲暘旱不敢乾才足供騷人萬古詭異觀我來過中歲素髮紛垂冠窮源歷絶巘自懼身不完但能至其麓蔭翳松欒欒嘉與萬上人枵然坐蒼磐揮杯吸微液已足當朝餐明發入黃塵復爾俗務干未期江山會石城淸夢寒過大孤山左山如騰龍右山如伏獫約束彭蠡湖秋夏傍泛瀲我行正窮臘豪浪殊未歉危檣蒲帆舞日出風力贍大孤水中央千尺入驚覘何人插雲根上刃餘折劒留示爾後人萬古斷鼇驗至今鋒鍔赤猶帶膏血染昔當南北裂夢寐嘗在念一朝獲身歷償盡平生欠山靈必知詩投卑未為僣小孤山彭磯擁千山布陳如劉沛小孤乃窮羽獨戰氣彌倍灔澦僕命之砥柱非其對層巔摩晴穹雲木搖斾斾大江中貫流萬頃納一嘬東溟供潮汐日夜至一再去帆天馬奔回首蒼靄外巳愁風鷁還進尺亦尋退不及躡巑岏一覽淮甸槩臣吳玉綸恭校
