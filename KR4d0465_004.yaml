body:
  text: 元姚燧撰序序江漢先生事實某歲乙未王師狥地漢上軍法凡城邑以兵得者悉坑之德安由嘗逆戰其斬刈首馘動以十億計先公受詔凡儒服挂俘籍者皆出之得故江漢先生見公戎服而髯不以華人士子遇之至帳中見陳琴書愕然曰公亦知事此耶公為之一莞與之言信奇士即出所為文若干篇以九族殫殘不欲北因與公訣蘄死公止共宿實羈戒之既覺月色爛然惟寢衣留故所公遽鞍馬周號於積尸間無有也行及水裔見己被髮脫履仰天而祝蓋少須臾蹈水未入也公曰果天不生君與衆已同禍爰其全之則上承千百年之統而下垂千百世之緒者將不在是身耶徒死無義可保君而北無他也至燕名益大著北方經學實賴鳴之遊其門者將百人多逹材其間燧生也後不及拜其屨前獲識其子卿月者七年矣凡再見之初以府僚見之洛陽雖嘗以好兄余猶未語此今以憲屬來鄧始及之且德先公不忘也燧曰嗚呼自先公言之夫既受詔出之軍中而使之死不以命非善其職且儒同出者將千數才得如先生一人而使之泯沒無聞非崇其道此公所懼而必生之也自先生觀之孰親于其七尺之軀而大其所關人持瓦缶將敗之猶有惜而不果者必茹毒罹禍不可一日居故忍而為此出處非不思也乃中夜以興蹀膏血以禦魑魅徑林莽以觸虎豹而始及水仰天而祝其行非不决也夫思而後行行之以决則其勢多難奪于中路使非先公自行而他人赴之能捨所忍為以回其復生之志收其巳遊之魄反就是一日不可居之禍毒乎由是言之先生之死求以無辱不以全歸其生也不以有赴而以知巳此其胸中揆制一時相為高下之權衡也然古之人為知己死者有之無有為知己而生者先生以古人所不為者報之先公而先公所受先生也已多矣奚德哉卿月與余相視一泫卿月歸序所與言者贈之别丁編修序至元十九年余辭秦憲而歸東周明年復受命二荆憲自惟才之非也行路之遼也家貧而力之薄也多疾而江南風土之未宜也實難其來然不遑偃蹇自寧者公則壓于君命勢不容己私則以為人生文軌混同之時不及夫年未艾以覽江山人才之勝勿之則有歉然之悔斯意之不欲巳者出處之大略然也自歷荆憲至今其間望舒二十四弦晦居府者三一而水舟陸馬周歷乎復灃峽歸鼎五州十七縣者反居三之二焉其于江山之淸駛奇峭人才之標特秀異實若富于胸中求如鼎之前編修密院官丁公及事勝國三朝嘗光顯者或無有倫焉宜其文章之宏肆年德之高邵日聞天朝纍起而將官之而公辭之至今又于嚮見干進而不釋者之中所無也余以是多公公之報遇于余者宜與人異今按部己竟將還憲府辱以高文叙行再三讀之愛其辭甚華而義至嚴情甚密而禮至周而其病在夫一失之不攻衆長之是諛曰雄其文粹其學正其傳尚其世而善其政斯豈余所虞于公者公之世所不知其學其文果余匹乎其傳與政果不與加乎豈均無之姑為是甘言相愚乎非歟余如何知公而知如是為報余如告人以公善懷術不余知也公心焉如何不然公誠無意焉而余過疑及此則反取罪為高明妄人矣或有意督過將肆公所責之公心焉又如何獨甚善于公者巳辭徵不仕若忘世肆志而能損己有權輿沅陽書院聚徒而育林師聖而祝釐以成巳而開物詠歌太平以老不可謂賢者不出而無益斯世也書院之基巳移文鼎抆俾給左契復移文軍府俾拔其園蔬又為榜懸之院門以勸其速成而戒其中止余今之歸或得請去荆憲而北不知公由何事何時相遇中原一握手復道今日為舊或蒼蒼者再牽而南又過是州必覩書院既成升堂以揖峩辨之士來而告之曰子觀夫大役之築者乎十人為什操杵負畚而力作者九人逸者一人袖手傍歌俾九人者勤力而忘勞乃董役而犒功逸者與受直焉今日之居諸君知德編修負畚操杵之勞亦思袖手傍歌者乎以是為學者引譬而資公一笑送宰先生序至元三年二月未盡之三日宰先生謂燧曰余將遊秦子能序余兹行乎豫掉鞅遊天下殆周獨秦未嘗一至又秦士捨修撰雷君亦莫有一識子昔家秦其所忠者誰人所通信者又誰盍枚舉之豫階子言一進謁之也燧曰秦固衣冠之藪澤也在燧有未遍知者焉蓋年之前乎燧者率隆名碩德既幼燧而未與之言後乎燧者燧何所慕賴乎彼而為之伍故遺十百而得一二也請為先生誦之有楊元父者吾師與之抗禮者也其學也粹而正其操履也堅而不渝其執親之憂也哀而禮其能也博而肆尤邃史學讀至落落奇傑之士必慷慨感激思見其人于今使先生之至不嫌于自明肯曰向之儒服登常山一言折猖狂之盜而落其角距者實余也彼有聞而不奇先生者乎雖先生夙有負氣使酒之聲彼將視為古奇傑士之恆態必濶略而有取乎此也先生行哉其尚有合于斯人歟又有韓邦傑劉無競呂伯充者皆吾師之弟子也年皆長于燧若韓之能官劉之天質之美呂之問學之該徹皆燧所不敢望而及計之今日呂以練服在躬未可出之二人有造先生之館煩從者為燧一訊安焉送雷季正序余從魯齊先生遊最故且久于同門之士學為最怠而不加進自親夏楚時猶爾況今載名仕版遠處數千里之外哉昔之怠者為忘不加進者阤而為退矣宜季正之取友而羞際余之心安焉而不敢有憾不謂徒以從遊之久故願因鄙言獲進拜先生屨前嗚呼其志則勤其意則良惜所藉以為介者非其人也是一也又先生自謝政而歸屏跡桑梓養安泉石家事不以干于心鄉人莫得見其面于時求欲如祭酒之授徒來則受之亦難也余則止之無行雖然以先生平昔樂教之心且熟子之兄伯靜之名嘗哀其願見未得竟抑志以卒有弟如此篤道而善學行巳以化鄉岸不然流于今俗翹然自視以古人千里贏糧而就正焉又觀夫人有可進成德達才之具必不拒其見也余則勸之令行且景星鳯凰之為物人或睹之猶為生之幸況大人君子道德之容可以興起一世仁義之言足以發揮百王者哉獲一進拜而聞其緒論必決滯為通易暗為明大有得于曩昔也有得而私之仁人之用心不然行哉余將須其歸而見告也送暢純甫序歐陽子為宋一代文宗一時所交海內豪俊之士計不千百而止及謝希深尹師魯二人者死序集古録遂有無謝尹知音之恨嗚呼豈文章也作者難而知之者尤難歟余嘗思古之人惟其言之可以行後為恃以待他日子雲者出將不病夫舉一世之人不余知也今乃若是其以有知者為快而失之為悲歟余冠首時未嘗學文視輩流所作惟見其不如古人者雖不敢輕非諸口而亦未嘗輕是於心也過而自思人之能者余操慮持論且然余不能之何以免人無嫉賢之譏余年二十四始取韓文讀之走筆試為持以示人譬如童子之鬬草彼能是余亦能是彼有是余亦有是特為士林禦侮之一技焉耳或謂有作者風私心益不喜以為彼忠厚者不欲遽相斥笑姑為是諛言以愚之不然殆鼓舞之希進其成也自是蒙恥益作既示之人且就正于先師先師亦賞其辭而戒之曰弓矢為物以待盜也使盜得之亦將待人文章固發聞士子之利器然先有能一世之名將何以應人之見役者哉非其人而與之與非其人而拒之鈞罪也非周身斯世之道也余用是廢作有亦不以示人純甫自言得余隻字一言不棄而録之又言世無知公者豈惟知之讀而能句句而得其意者猶寡嗚呼世固有厭空桑之瑟而思聞鼓缶者乎然文章以道輕重道以文章輕重世復有班孟堅者出表古今人物九品之中必以一等置歐陽子則為去聖賢也有級而不遠其文雖無謝尹之知不害于行後猶以失之為悲下下之外豈别有等置余為哉則為去聖賢也無級而絶逺其文如風花之逐水霜葉之委土朝夕腐耳豈有一言之幾乎古可聞之將來乎純甫獨信之自余不可不謂之知巳足為百年之快恐純甫由此而取四海不知言之非也然純甫實善文其不輕以出者將以今為未積積而至於他日以騷雅末流典謨一致乎將恃夫涖民既為循吏持憲既為才御史富民又將為良大農道行一時無暇于為言乎豈以世莫已知有之而退藏于密也由積而為書至於他日與道行一時無暇于為言則可由莫巳知而不出若余也雖不善文而善知文則純甫為失人矣今以農副行田隴右于其别也敘以問之至元丁亥七夕送郭肅政安道序書有道有體有勢謂為大耶周官則班之六藝謂細耶次之禮樂難耶舉天下之人孰不為之易耶則曠一代能名世者不數人若是者亦未可以細視易言之也斯其道也其體則有篆􅊢草三等本而上之草出􅊢􅊢出篆則篆者書之源或曰隸而下有正走則曰唐湖刺楊漢公跋干祿字書以顔魯公隸書為盡鍾繇之精能則正者實􅊢也其勢則有拘有放篆譬則辨冕端委之人將執事于郊廟于于其趨縮縮其循周旋則至圓不能加規折旋則至方不能過矩隸則常服燕居不可多拘家人視以為嚴君而亦不可少放草則雄勇武夫纓曼胡而衣短後挺矛運鈹進踴退躍橫入傍出頓挫起抑揮霍斫拂極其放而惟吾意之所至焉然為是者雖云出乎手而一心為之師心拘亦拘心放亦放未有心放而能篆亦未有心拘而能草勢必至理必然者也走嘗觀今為篆者無枚舉其誰求一蹴而可臻古人之閫戺者則郭肅政安道一人焉耳夫日為是拘藝則心存而不放豈不幾于克念作聖者耶視走之惟事乎草心放而不知拘者遠相萬也安道號西野好學而善文無乎是則書不能獨振耀今之世矣將别而紏郡于嶽序以問之送李茂卿序大凡今仕惟三塗一由宿衛一由儒一由吏由宿衛者言出中禁中書奉行制敕而巳十之一由儒者則校官及品者提舉教授出中書未及者則正録而下出行省宣慰十分一之半由吏者省臺院中外庶司郡縣十九有半焉吏部病其自九品而上宜得者繩繩來無窮而吾應者員有盡故為格以扼之必歷月九十始許入品猶以為未也再下令後是增多至百有二十月嗚呼積十年矣勞乎哉李君茂卿嘗同燧受學先師司徒公儒者也父戶部恩澤既推其兄之子及將試吏堂帖令出掾湖廣省盈九十月將赴銓中書燧賀之曰人有不職幸不糾於御史者君以勤效無此人有叨墨幸不罹罪罟者君以淸愼無此人有依庇有力竊竊離所事同列之歡以自求容一時幸不譴斥者君以中行不阿無此人有挾仕而商賦之州縣而倍責贏入以肥其家幸不訟于民與衆樹姻黨子弟入官以妨後至之塗幸不貶于士者君祿入外無他營捨僕馬則顧影無朋舉無此舉無為為賀其可賀者諺曰兩姑之間難為婦上政事堂下參幕多或二十人其事之來抱案求署無一可後者皆視其色聽其言動立移晷比不齟齬使馴馴如式從已而出譬則庖人善適衆口酸鹹嗜好之不齊然非暫也必八年之久大而經國子民細而米鹽甲兵于盡得夫人之情而熟知夫事之勢增益其所不能者不既多乎今之老于刀筆筐篋以致達官貴人者皆下視吾逢掖以為言闊事情而不適為用者恃其能此焉爾君既能之是行也以軍國公相知之素無曰峻擢惟循所宜資亦卑善所昔也人吏之今焉吏人其留中其居外主乎聞司徒平生六經仁義之言而濟以今所能古所謂以儒術飾吏事者非君其誰哉大德己亥秋八月上弦日書送姚嗣輝序取士以文始于隋而盛于唐其法有司擇學修其家名聞其鄉者歌鹿鳴而進之朝謂之貢至則試之以聲律之文中程度者謂之選猶未即得仕必待有位者之舉猶視舉主何人或衆且賢以斷其人之材否始授之官勝國因之而小變焉選即官之惟不使得為令必制置提刑轉運諸司五人舉始用為令令而上郡牧侍從五府之官無不能至者則自貢而選而舉千百人不一得焉亦磽乎其艱哉吾宗嗣輝勝國選士也赫奕其時瞪後塵者千百人烏可少跋逮今改玉聲名昭晰不可終閼猶官洪校滿秩而觀光天朝求通刺秉政之臣盧公吳公門者千百人未有一得獨于嗣輝傾身接之迎譽諸公間文云乎哉有見於道德之實耳士而得此亦曰逢矣逢而至於達也奚惑然終不能增多其舊尺寸復調武岡益遠于洪豈兩公面是而中不力耶曰非也囿于法制之密先得之多兩公拱視不可躐其級也以故南榿安意而往既軷燧告之曰凡今仕者聞職乎民以有治賦聽訟之事為莫不色喜聞職乎士則以無有貢選利祿之望人怠于學虛師席而夏楚不試卒不懌乎其中嗣輝將亦若是乎盍亦思校官風化之原治忽所寄也無遠稽古而監之今司徒文正許公微時于大名于輝于秦于河內以倡鳴斯道為己任諄諄私淑少長不一其年也鋭鈍不齊其材也積多至數百人聞之天聰徵為成均俄拜左相歲餘辭免復求成均後其弟子繼司鼎鉉者將十人卿曹風紀二千石使棊錯中外者又十此焉其于隆平之治豈不少贊乎嗣輝苟以是為心規矩薰陶是邦之多士得其達才一二以用斯世使海內之人指而誦曰是大夫所梯接者于以亞匹吾司徒公其獲將多行矣勉事乎此嗣輝蜀人以蜀多榿木雖寓荆吳不忘其鄉號南榿云李平章畫像序陛下之未出閣由李道復日侍講讀親而敬之嘗召繪工惟肖其形賜號秋谷命集賢大學士王顒大書之手刻為扁而署其上又側注曰大德三年四月吉日為山人李道復製至大四年辛亥春正位宸極制授道復光祿大夫中書平章政事以盡學焉後臣之義裝潢是圖填金刻扁而摹賜號與御署加卷標軸寵耀至矣人孰與儔敕臣燧序之將俾詞臣頌歌其下而親覽焉臣聞命屏營反覆究思在昔帝王圖其臣者商高宗之傅巖漢中宗之麒麟閣世祖之雲臺唐太宗之凌煙閣四焉耳麟閣而下皆將相之開國承家平亂亡以贊彌綸資訏謨以致隆平者傅巖不然初未有是赫赫顯烈肖其夢形求得諸野爰立作相以道復肖形可同說乎高宗圖于既王三年之後陛下則圖於未帝一紀之先其時繪工運思有所未至手為設色高宗于說有是乎哉斷所無者李泌從肅宗于途人指目曰黃衣者聖人也白衣者山人也巳乃為相而道復姓偶同乎泌亦曰其衣今亦巳相謂道復山人可同泌乎為之賜號刻扁肅宗于泌有是乎哉亦斷所無者泌雖賢者而言涉神仙迂怪以故史氏短之惟說則無間然嘗考觀之古今之世相去若異帝王為治道罔不同何則陛下所居則列聖之位也列聖君臨之中土堯舜昔嘗有也乃若高宗亦商聖賢之君恥其不為堯舜故命說曰若金用汝作礪若濟巨川作舟楫歲大旱作霖雨作酒醴惟麴蘖作和羮惟鹽梅取喻再三求其交修者皆陛下有虞道復之心今謂道復其才有足方說孰敢犯是不韙然其所處則說地也如較其學焉後臣顧說所無能求多聞以建事學古訓以道積厥躬招俊乂以列庶位對揚天子之命亦足襲說遺芳餘烈報陛下矣然非舊學之臣世不以是責難俟夫治定而功成德尊而年及或遂懸車于秋谷釣雲月以弄泉石朝堂有疑馳使咨之猶不得專為山人世則目曰山中宰相者所不免也是年夏五馮雪崖二孫名字序余以漢刻瑞碑筆意深古嘗模麒麟字促而小之刻諸瑜玉佩為私章故人馮憲副雪崖見而求之曰將賜吾孫以為名也故長曰麒次曰麟後十年主長林簿者謂余兒麒輩元服矣盍字之因思漢孝明圖功臣于南宫雲臺實本孝宣之麒麟閣而征西大將軍陽夏侯與居其間當諸將論功侯獨避而休于大樹之陰世多其不伐目為大樹將軍而麒其遺苗宜字曰漢功周穆馳八駿以升崑崙之墟後好事者圖其騫翔若麟鳳柳子厚誕之余觀天間馬其名而麟其形者奚少况瑞刻所圖延首而長鳴振尾而高驤孔阜以碩如馬而角則駿之去麟有不大相遠者麟字曰周駿如是命之以必難犯則新而不奇也以求義意則係而不離也且各即其人性情之近似漢功循循斂密王母嘗稱其克孝如父夫能嗣守家法於今不能遠而言念追鼻祖之踵于古乎其出而仕見諸事功可期以不伐者周駿翹翹發達類彊有力者則夫道遠千里可一日而致焉者亦或可幸冀焉大德庚子閏月中休日序序牡丹余于牡丹始于中統之元見壽安紅洛西劉氏園三年見左紫洛陽故趙相南園兩花皆千葉株皆四尺壽安二十萼廣經七寸高與之等左紫四萼八寸高等又三年見千葉狀元紅燕都故楊相大參宅株五尺四十萼七寸高等後二十年見之長安毛氏園最多將百株株二尺少然皆單葉小大參參不齊無絶奇者後二年見玉板白洛陽楊氏園株亦二尺少多葉十萼七寸少鄧州見三家張氏肖齊之衡山紫陳氏終慕堂之淺紅兩花皆千五葉衡紫株二尺少將二十萼五寸少淺株三尺少將五十萼六寸少惟蕭仁卿之承顔亭白花大株三尺大可六七十萼七寸少千葉最盛又有色緋紫碧相錯株三尺少可四五十萼盛亞白花七尺大復有緋花株單十萼八寸二花皆多葉而緋花獨奇故為佳品今失其名者別有鶴翎紅為千葉小株獨萼五寸大高等他日株大花則隨大矣是為鄧花之冠仁卿舊云此洛陽壽安諸孫自余觀之大非壽安則淺紅而今名余所命之蓋即其形色近似為言也長安洛陽諸花余忘其香孰勝萃鄧花而校噴勃穠綿可喜如紫薇者衡紫為第一此余生五十一年所見者然自元年至今為二十九年其間六年六見自燕長安洛陽而至此幾數千里中元及三年與至元二十年三見洛陽為同地至元六年十八年二十五年各一見之燕秦鄧為異地亡慮百十株而千葉名品才四見則千葉獨難遇亦猶千人為英萬人為傑尤世不恆有者矧賞酬有數耶劉趙二園雖皆有酒年甚少不善飮楊大參時與先世父中書左丞同朝為父執與之酒不敢飮毛園時為秦憲毛氏方業市酒才下馬行觀擇剪數萼不可飮而去楊氏欄時滿秦憲將走荆憲借居其廬客懷牢寂無誰與為飮張齊陳堂才持一二觴各剪一二萼持歸不名為飮其盡醉相歡者惟承顔亭一焉而巳嗚呼以齒五十一年之老行數千里之遠始觀至今草九年之久六年六見之希而無負可當賞酬者醉明日仁卿求記其事余口未拒而心勿是之以為樽俎之樂屑屑者奚足筆其夏白花忽槁死其秋又固求記之余始思昔者之坐斯亭也孰逆知是花旋踵不可復見亦可謂異事也又思左紫止一株巳移植嵩山廟中洛陽今亦絶聞壽安固在其玉板白及毛園百株將如左紫移植他人耶無亦若是花之已槁死也嗚呼往者既然况來者之不可必耶細者且然况大此之倍蓰十百者耶則吾平生所當勉吾身而因循弗力以去不可追者巳多也誠可為老將至之一慨而植物之死生又不足怪也仁卿惟喜余文巳記其承顔而求之屢如老父取張長史判吾特賢其能以是心至而已然又益思六年之間不善飮不敢飮不可飮無誰與為飮與不名為飮非他蓋無詩人同臭味者發其極意焉耳而承顔是日者則梁宣慰貢父張總管孟卿王工部景韓是皆善詩安知不可為他日故實亦未易以復得者據蘭亭例為序惜其時無唱酬未嘗罰依金谷酒斗數也臣馬啓泰恭校
