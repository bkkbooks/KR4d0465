body:
  text: 元姚燧撰記武陵縣重修虞帝廟記昔司馬遷由病孔子所傳宰予五帝德帝系姓儒者或不傳故于唐虞夏紀曰帝嚳之子帝摯立而弗善崩帝放勲立舜名重華禹名文命旣弗深攷二典三謨之書曰放勲曰重華協于帝曰文命敷于四海曰允廸厥德皆虞史賛堯舜禹臯陶三聖一賢之辭且以天下相傳事孰大是堯不曰重華曰汝舜舜不曰文命曰汝禹則舜禹之爲名章矣後千有餘年孔子稱德三聖止曰堯舜禹又况紀自戾其言乎前乎堯者帝嚳帝摯後乎禹者帝啓帝仲康中獨堯舜爲非名豈坐信五帝德帝系文耶二篇見大戴記孔安國家語無帝系其五帝德雖小異文亦止曰堯舜禹故後儒辨之以文命爲禹名則敷四海爲何事而臯陶不名允廸鏡是則紀所名之非名又章矣或曰孟子放勲殂落屈原陳詞重華者皆非歟曰不若是也今之君子于大賢之不可字者猶以鄉邑齋居命之況三聖乎其遠而不斥擇賛辭而號之亦厚德之至也如必其信百世而不惑舍孔子焉折衷奚以惟帝舜崩葬與二妃事他經于書鑿枘者多虞書曰舜生三十徵庸三十在位五十載陟方乃死崩未知地也至孟子始曰舜卒於鳴條鳴條在安邑甚邇蒲坂以避堯子南河之南例之帝固未嘗遠所都也然虞書實百一十年孔安國以爲百一十二年自今積之詢考底績三載陟帝位二十八載喪堯三載在位三十三載薦禹于天十七年而崩所謂三載皆再期耳由置底績在徵庸在位之間故多書二年猶未大遠紀以爲二十以孝聞三十堯舉之五十攝行天子事五十八堯崩六十一代堯三十九年南巡狩崩于蒼梧之野葬于江南九疑是爲零陵總之纔百年鄭玄則徵庸二十爲句攝位至崩共五十年總之亦百年與紀皆不足十年如紀則舉之十九年無所事攝位九年喪堯三年爲天子四十年玄則登庸二十無所事攝位喪堯三十年爲天子二十年宜唐孔穎達皆排而謬之又大戴止言葬蒼梧之野家語則以爲陟方岳死蒼梧之野而葬故紀遂曰南廵狩不知薦禹十七年之中當三巡狩帝皆親之耶獨崩年徃也如皆親之禹何爲哉崩年往也于時百一十年矣必將以歲二月柴岱宗岱宗之去南岳何啻踰五千里吉行五十車埃風而舟濤瀨者不曠一日百日而始至焉是獨勤身于數千里不勤心于萬幾倦于九十三而不倦于百一十年也檀弓亦云舜塟于蒼梧之野蓋三妃未之從也玄以爲帝嚳帝堯皆四妃舜無正妃故止三妃以天子之女不爲正妃則正妃將待何人爲哉屈原九歌謂娥皇湘君女英湘夫人君與夫人固有别矣君非正妃矣穎達乃傍牽晉皇甫謐帝王世紀以實之曰娥皇無子女英生商均次妃癸比生二女霄明燭光癸比山海經作登比皆不知爲何說也秦皇南浮江至湘山祠而風問博士湘山何神對曰堯女舜妻塟此大怒發刑徒三千人赭其山而謐云塟衡山雖不同地可徵于帝塟而未之從王逸不詳未之從爲不祔合而曰帝征有苗二女從之不及道死沅湘之中又曰墜于湘水之渚固已自二其說且有苗已來格分北而竄之三危矣豈侮帝老復逆命耶其煩六師投帝以艱禹何爲哉又二女者在釐降時或上下少帝十歲方幼艾也至是崩年皆嫗然而耼矣中原無急變帝何爲不及將二妃二妃何爲不及從必追之而取道死水乎由遷則祀由逸則戎翬翟簉之非盛舉也觀後世匹帝者雖甚幼艾率土之臣莫敢不母未聞旣母率土之臣八十餘年而後世猶女之又帝系曰舜娶堯子謂之女匽氏然堯伊耆姓陶唐氏子而不係其父而別氏焉皆不可以理究者也二妃之祠湘中原世云然亦尚矣哉惟沅洞莫知所始嘗火于宋民雷立倡郡人復宇之宋德夫爲郡病其專祠二妃而遺帝始大其官而合食焉皇元大德之元僉江南湖北道肅政廉訪司事李僕庭詠按部常德夏六月一夕洪水驟至平地尋丈幾冒城郭乃率曹牧諸君日夜行水戒民具畚築登陴以捍之發義倉積下其估以廩餓人不足則勸富民出榖以繼水去今左丞相方平章湖廣省侯請曰常德爲郡岸沅之東古人虞水齧城當其衝波西南爲二石埽延袤里所尾入江中順導其勢以遏東潰罹此暴漲盡根株去大浸稽天四縣槩及其實土爲防者宜盪而無有遺餘也可乘農休急務修復以倉粟傭役人則民必舒困于今而功亦賴垂于後也丞相是之民利得食爭日赴程工不踰時衆作斷手乃謁帝祠而告成功見其榱棟庭墀傾落蕪穢詰牧守曰明詔有曰聖帝明王其令有司歲時致祭今乃若此甚非陛下欽崇禋祀之㫖宜帝不顧享而降此大沴也其議完之五通爲鬼經禮無文祠顧宏麗妍縟其撤而資其材爲門五楹殿三楹行宇五楹寢三楹兩序八楹爲老子法者李道昌主諸鍠鑰旦望祝釐别爲宮以居其徒三淸殿三楹兩序六楹歲德眞官殿皆一楹民之聳觀十其舊矣後三年其郡官民多侯奉詔之恪恤民之勤而禮神之䖍也求記所由嗚呼惟帝之名載諸六籍而不泯泯日月在天未加其明岱華在地未儕其高與穹壤相終窮者世則知之前帝諸皇功斯人者太昊帝春炎帝帝夏黄帝帝土少炅帝秋顓頊帝冬旣分五辰而司之與穹壤相終窮者世亦知之以帝之功何斯皇之弗若而況乎過之其爲明神左右上帝斡元化以順行四時或乘雲御風省方下土福善癉惡于斯宮與穹壤相終窮者理所固然也烏乎知哉故燧惟列夙疑而未瑩者首之未敢少及法程萬世人倫之至者之德之如何也汴梁廟學記自魯哀公十六年當周敬王四十一年壬戌孔子卒歴六國秦漢至孝武卽位之年辛丑爲三百四十年其聞而知者纔司馬遷一人而止耳旣編其年與夫言行出處之槩爲世家又爲弟子傳載其居里問對與夫經事何君又攷知其少孔子幾何歲是書皆孔門弟子與孟氏所未著其有功聖門眞非淺淺哉然猶病夫時有不一其說不可參伍者也世家弟子蓋三千焉身通六藝者七十二人而弟子傳則曰孔子曰受業身通者七十有七人皆異能之士也夫旣曰身通六藝矣雖未盡合聖人爲敎之本然而猶有所指名也其曰受業身通竟不發爲所通何業亦晦焉而已耳又曰皆異能之士聖人爲敎于以修叙彝倫而容異能者于其間孔子自言七十有七人則七十二人者誰後是五人耶其爲傳亦多淆雜而無次先顏回曾參而後無繇蒧固巳戾于明人倫其甚誤至以闞止子我爲宰予又曰孔子之所嚴事者于周則老子于衞蘧伯玉于楚老萊子于鄭子產于齊晏平仲于魯孟公綽孔子于公綽止稱其不欲與優爲趙魏老子產有君子之道四其他不足孔子者亦多也老萊子書今存其爲道術尚黃帝老子爲聖人所與者不經見子入太廟每事問况老子周守藏室之史問禮則有之使及見其書曰失道而後德失德而後仁失仁而後義失義而後禮已不知道德仁義禮根于人心之固有而視爲世降之不同未必不見黜于孔子况爲其道乎哉惟蘧伯玉寡過未能爲不悖于聖學故與之特深至漢文翁圖石室列之七十二人中亦可灼其非師而實弟子云晏平仲者如遷之言足以暴其人賊賢之罪何也夫人旣嚴事乎巳苟于學術之僻歸宿之差何害于明告告不爲止則隨以不屑之誨始盡夫師弟子之義焉當欲封孔子尼谿之田乃說其君景公曰儒者滑稽不可軌法倨傲自順不可爲下崇喪遂哀破産厚葬不可爲俗游說乞貸不可爲國盛容飾繁登降累世不能殫其學當年不能究其禮非所以移齊俗而先細民也若預憂一旦代有齊政惟懼醜詆之不力焉夫善交久敬報人嚴事之道者固如是乎哉先儒嘗疑晏子尚儉墨子欲貴其道取必于晏子之言不然何爲亦見墨子之書而遷辯之不明也又自叙曰儒者累世不能通其學當年不能究其禮博而寡要勞而少功由是知二語者非必一出晏子乃遷薄儒素定於胸中不易者也遷嘗適魯徒觀諸生以時鄉飮大射其家迷眩於規規節文之細低徊不去以爲是足盡聖人之道斯正經生博士之汨汨以皓首者也豈聖學爲巳之切致哉故燧有功于遷而亦有是數者之恨況又甚惑未盡祛于今者也孔子卒哀公誄之子貢以爲非禮至漢平帝始封諡褒成侯宣尼公蓋王莽假善以收譽將遂其姦謀也後魏孝文法之諡文宣尼父後周宣帝封鄒國公唐高宗贈太師僞周武氏封隆道公玄宗諡爵文宣王宋眞宗加玄聖後易爲至至今遵之焉有若以自生民以來未有盛於孔子誠是言也雖極天下之美諡猶不足萬分一盛德之形容斯燧發其目而不深言者一也杜預春秋傳敘曰子路欲使門人爲臣孔子以爲欺天而云仲尼素王邱明素臣又非通論也斯言爲獲聖人之心而後世王之堯舜二帝也宰我以夫子遠賢堯舜何王之不可居然後世天子之子有功之臣皆曰王以孔子之聖卒下比爵於其子臣誠不知其可也斯燧發其目而不深言者二也其享配諸位善乎柳宗元序道州廟碑曰從于陳蔡亦各有號言出一時非盡其徒也于後失厥所謂妄異科等坐祀十人以爲哲豈夫子志哉後之時進顔孟並孔子南面别躋曾子以足是十人于非夫子志中之又非者而江之左又進曾子子思並顔孟別躋子張于曾子之舊由孟子而視子思師也由子思而視曾子又師也子思孔子孫也弟子于師孫于祖坐而語道者有之非可並南面燧知四子巳避讓于冥冥中不能一日自安其身一堂之上况又祀無繇蒧鯉于庭其失至于崇子而抑父又非遷之爲傳矣夫爲是學官將以明人倫于天下而倒施錯置于數筵之地如此奚以爲訓又在在之廟皆泥像其中北史敢有造泥人銅人者門誅則泥人固非中土爲主以祀聖人法也後世莫覺其非亦化其道而爲之郡異縣殊不一其狀短長豐瘠老少美惡惟其工之巧拙是隨就使盡善亦豈其生盛德之容甚非神而明之無聲無臭之道也曩長安新廟成繪六十一人與二十四儒于廡畫工病其爲面之同縱人觀之而擇貴臣圖其上蓋肖今人之貌而冠以先賢之名使過而識者抵掌相語曰是某也是某也未見其起敬于他日顧先足來不恭于一時是邦如是孰必其他邦之不爲是一歲再祀第借位于先賢以俎豆夫今之人也其可哉曰是溺習之已然若何而變曰人臣有見上布是區區則可若夫議禮也制度考文也天子司之亦幸一旦遑于稽古之事學禮之臣必有能策其一二得所當議者矣至元庚寅汴梁新廟成學錄劉元佐爲狀以其府諸公之意求記其由故燧首之以此其狀曰宋建隆中南宫城數里立太學後爲國子監金貞祐都汴國日益蹙大城少兵難守度中宫垣大城再城之監當城所經弗便也壞而徙之東南大城之下不及屋而亡皇元受多方始爲殿七楹亦廢宮屋也其制度宏麗爲天下甲壬子楊中書忠肅公來董括舟役又壞宮取材以其餘爲門廡至元癸酉故同知宣慰使袁裕時爲是府判官始構講堂于廟西神庖于堂東鑿池其南勢如半璧瀹汴注之擬魯頖水殆足觀矣歲月滋久風雨騫屋困于撑拄自總管提刑悉捐金割俸起新之總管則權輿于成某斷手于杜思敬其同力者同知胡某治中益祖判官完顔某推官姜某提刑使則闍闍都高某副使王忱僉事劉某始終五十餘年凡資畫十二官而後完富民佐財力以就功者又多也燧曰嗚呼不易乎哉自今師生之講肄于斯其移學文之力而篤志于切問近思責其躬以成德達才而收夫化民成俗之功于他日斯不孤縣官待多士志矣是歲夏四月記灃州廟學記至元十有四年肇置諸道提刑按察司而澧在山南湖北道所糾郡二十年燧副使是道明年按部至焉拜瞻廟庭未嘗不病其爲制之隘陋也殿南閣曰六經因語校官張公綬曰易書詩春秋其繫定刪作實出夫子之手周官雖云周公之書冬官篇亡當以考工記與小戴記禮者皆漢儒豈可與是四經班而爲六且今四海禮殿皆名大成爲改書曰金聲玉振之閣後時議不欲諸道紏郡者錯壤江之北南改爲肅政亷訪澧遂割入江南湖北元貞乙未居民不戒于火廟爲延燒總管是道者故鄂屯實魯將復之俾計吏最其學租直纔五千餘緡曰是所謂時詘而舉贏者也乃下令郡士在籍多田者勸之佐爲凡又得萬緡委材集工責校官李寓學正張子仁身敦其役而糾郡諸公如副使賈仁僉事蔣某姚某李庭詠郭貫凡至者必促其成功五年而落之其橅構則稽梓人之書爲四柱屋古者王居之制也惟太行一山似之故曰王屋重門周序講肄之堂合食之舍庖廩之室燕遊之亭秩秩馮馮靡一或遺凡百有三楹周以繚垣百三十餘丈雖未嘗身見然聞之談者舉以爲可甲湖之北南諸州豈天者厭昔隘陋火之使改爲耶亦偶然也又範金爲祭器二百七十有二竹木髹漆之具三百有四嗚呼備乎哉然嘗思夫子之道之在兩間無間治亂古今如饑食而渴飮夫婦之愚莫不由之不可一日而離焉固不以廟之存毁而加汚隆國家必聚耆英俊髦教育乎是蓋須其成德達才舉而庸之以立化民成俗之本也則廟學豈不甚有所關哉地以求之衡之爲州南灃千有餘里南嶽在焉舜五載一巡狩所也及誅四凶放驩兠于崇山實今澧之屬縣慈利則放流之人顧居巡狩之境之內戰國時楚都南郢在漢則南郡江陵澧去西南鳥逕不二百里屈原之逐常行吟者故九歌曰澧浦澧蘭則放流之所近薄修門是皆不可曉知者澧于其時爲黔中秦欲以武關之外易之楚方怒張儀謂曰願得張儀而獻黔中夫以甘心一人寧棄地而不恤固以要荒鄙之也而今也料次戸口之繁庶貢賦之征入澧則亞于長沙而近湖廣省治岳鄂諸州不能半之豈天時風土有古今之變而人事亦隨以遷而異耶士四民一也民庶而士必衆洙泗夫子之居也士爲洙泗之言者也灃去洙泗西南將三千里非密邇也賴皇上仁不忘遠守土之臣視要荒與洙泗鈞然洙泗也燧嘗至其地焉戸不能當澧四之一戸損則士不多亦理勢然不知自今澧民沐士之化要荒而洙泗乎士不能㧞民之溺洙泗而要荒乎要荒而洙泗正國家所頼以化民成俗者洙泗而要荒其身之不能成德達才何有乎推之人士是之思則居縣官所築之室食縣官所樹之粟必知黽勉其躬圖報稱矣庭詠俾子仁求記所由興作于翰林學士朝請大夫知制誥同修國史姚燧大德巳亥冬十有一月日短至書于鄂之南陽書院楚梓堂崇陽學記世祖御極之十有七年當至元十有三年宋平凡江之南財之儲府庫賦之產山澤者悉輸京師獨遺貢莊學田仍卑之學俾資教育後尚書用非人大網羅天下之利奪歸之官在庭之士子媒進取而不得者乃希其意求分道鈎覈素所出入于職學之官責償其負而促爲期有關木而嬰笞者士窮不堪至圖其慘以上之帝聞不善也其人罪誅希意者亦竄廢詔還所奪至仁也皇上嗣聖申詔若曰聖人之道垂憲萬世其還正貢莊學田以爲釋奠完廟養老師生之廩之須至明也爲良有司昭覩兩聖崇植斯文之盛在在莫不作新廟學求稱宣化將仕郞主鄂之崇仁簿夏承祖書來諗曰是縣學官二十五年陳彧爲尹一旣完之于今七年可曰未久迨承祖始治事而入謁也上棟旁楹穿漏傾撓巳窘風雨承祖傷之乃割己俸爲邑士先萃其附而應者俾龔應旂葛公亮敦匠再完之積役傭二萬六千錢米不計也願鑱之石爲佐財著勞者勸曰夫究心此者狃國人習雅不識書忽不知爲也囿文法吏急赴事功迂不知爲也非知學孔子如承祖者爲之責將誰在哉雖然簿在一邑惟筆朱墨鈎校出入其職其上有監丞焉壓抑者非一人也比其道行乎百里言信乎羣士越而出爲爲之而成功不制于同官其彊有力歟戛戛其難有倍乎昔尹之爲者嗚呼賢者也然以張山翁所記參伍今書而惑焉始爲陳尹敦匠者應旂公亮也今而夏簿敦匠者亦應旂公亮也以兩君善于作室歟亦烏有苟于爲心而不固俾旋踵有今之隳不善作室歟于何舉所旣敗者復使爲之而不固于後豈邑士爲才無兩君比歟將懲其不固于今奮然思改自必異前可不隳于後歟皆未足爲信也要也非作者之罪也守之者之不獲其力也夫人極其思而創之劬其躬而樂之美矣完矣舉以卑之職學之官而守之且屋以待風雨者也而風雨亦所以賊屋者也諒非一日可遽隳也亦必有其漸焉雨罅而入微而視之日未害也今日而不加覆焉風有隙而乘徐而安之曰未害也明日而不加塞焉月弛慢而歲因仍以及于隳乃咎夫敦匠者始苟于其事之致也嗚呼果苟于其事歟當佐陳尹之時勗其自捐凡爲楮緡二千一百可獨當學廩邑士之半曷若靳是而不捐不知于今峽敎龔必勝漢陽尉葉桂發德安尉黃朝英壽昌山長徐逢午敎諭趙泰來徐應奇葉常春與煥彭黄裳熊萃老十子者之中其捐有多寡也予誠嘉其始終忠是學也非有故而私夫人曰非作者之罪也守之者之不獲其力也嗚呼守者之不獲其力特不職爾其小者也甚者爲罪其間蓋江南學田宋故有籍守者利之私櫝其家或投水火以滅其迹使他日無所稽曰城下之日學吏持而失之也或曰其人死不知何歸也以幸迷誤久而爲巳產一聞有司將加覈正反肆爲謗語訐揚其短恐之使不得竟又有身爲教官自詭佃民一莊之田連亘阡陌名歲入租學得其一巳取其九又有以巳磽确易所上腴曰故簿惟是至與學吏爲訟詆譸囂租入廋矣猶掊諸生之堂餽留耆儒之廩俸而虛爲之名以徵逐府縣而歸餘其室提學之司又繁爲文魚鱗而取之惟與求薦敎職入賄爲市罪而去者相踵也嗚呼守以是曹譬如以狼牧羊不盡不止也或曰人之言曰髪有疾幘則冒之手有疾袂則蔽之子而記學不諄諄乎敎養之道而惟歴發職學之慝非長者也曰上之膏澤斯士也如何而不善其職者屯之事有急此乎且始疾者猶先其標何也苛痛呻苦之所在也敎養之道如三代以德行六藝賓興賢能漢舉孝廉經術而廷策之魏晉尚文辭猶不遺乎經術隋煬始專賦詩唐因之雖置科明經而止乎記誦又有投牒自售之賤貢舉之法熄楊綰李德裕極言其非宋神宗始罷之治五經語孟哲宗復賦詩遼金不革者有我世父太子太師公故竇太子太傅公故楊昭文君議貢舉之法在皆朝廷制度考文之事非州縣所得擅擇歴古所宜于今而爲者惟得是說而爲鍼石庶巳罪而未敢者聞之懼其掩剽于冥冥而廷臣亦有灼見其然者知所悛也是亦救失之一道也臣馬啟泰恭校
